<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人员信息浏览</title>
    <meta name="renderer" content="webkit">
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />

    <link rel="stylesheet" href="../../css/person/reset.css" />
    <link rel="stylesheet" href="../../css/person/style.css" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>

    <!-- 工具 -->
    <script type="text/javascript" src="../../js/tools/verification.js"></script>
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
<script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <script type="text/javascript" src="../../js/constantPage/projectConstant.js"></script>
    <style>
        html{
            background: #fff;
        }
        .con_box{
            height: auto;
            padding:0 4% 4% 4%;
        }
        .subbox{
            width: auto;
        }
    </style>
</head>

<body style="background-color: white">

    <div class="con_box">

        <!--必填信息-->
        <div class="staff_cent">
            <span class="sta_tips">必填信息</span>

            <!--左边-->
            <ul class="sta_ul" style="float:left;width:50%;display: flex;flex-direction: column;">
                <li class="sta_lis subbox">
                    <!-- 照片-->
                    <div class="img_sub">
                        <img name="photo" id="photo" onerror="photoError(obj)">
                    </div>
                </li>

                <li class="sta_lis subbox">
                    <span class="staff_tit">评定时间：</span>
                    <span class="staff_text" id="grantDate"></span>
                </li>

                <li class="sta_lis subbox">
                    <span class="staff_tit">手机：</span>
                    <span class="staff_text" id="mobile"></span>
                </li>

                <li class="sta_lis subbox">
                    <span class="staff_tit">当前职称：</span>
                    <span class="staff_text" id="titleName"></span>
                </li>
            </ul>
            <ul class="sta_ul" style="float:right;width:50%;display: flex;flex-direction: column;">
                    <li class="sta_lis subbox">
                            <span class="staff_tit">姓名：</span>
                            <span class="staff_text" id="personName" style="cursor: pointer;"></span>
                        </li>
                        <li class="sta_lis subbox">
                            <span class="staff_tit">性别：</span>
                            <span class="staff_text" id="sex"></span>
                        </li>
                        <li class="sta_lis subbox">
                            <span class="staff_tit">证件号：</span>
                            <input type="hidden" id="hdnCertId">
                            <span class="staff_text" id="certId"></span>
                        </li>
                        <li class="sta_lis subbox">
                            <span class="staff_tit">出生日期：</span>
                            <span class="staff_text" id="birthday"></span>
                        </li>
                        <li class="sta_lis subbox">
                            <span class="staff_tit">年龄：</span>
                            <span class="staff_text" id="age"></span>
                        </li>
                        <li class="sta_lis subbox">
                            <span class="staff_tit">科室：</span>
                            <span class="staff_text" id="deptName"></span>
                        </li>
                        <li class="sta_lis subbox zhejiang_hide">
                            <span class="staff_tit">在编状态：</span>
                            <span class="staff_text" id="isIntheseriesName"></span>
                        </li>
                        <li class="sta_lis subbox zhejiang_hide">
                            <span class="staff_tit">职称聘任年度：</span>
                            <span class="staff_text" id="jobDate"></span>
                        </li>
                        <li class="sta_lis subbox zhejiang_show">
                            <span class="staff_tit">人员类型：</span>
                            <span class="staff_text" id="medicalType"></span>
                        </li>
            </ul>
        </div>

        <!--联系信息-->
        <div class="staff_cent">
            <span class="sta_tips">联系信息</span>


            <ul class="sta_ul">
                <li class="sta_lis">
                    <span class="staff_tit">联系电话：</span>
                    <span class="staff_text" id="telephone"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">电子邮箱：</span>
                    <span class="staff_text" id="email"></span>
                </li>
            </ul>
        </div>

        <!--选填信息-->
        <div class="staff_cent">
            <span class="sta_tips">选填信息</span>

            <ul class="sta_ul">
                <li class="sta_lis">
                    <span class="staff_tit">原IC卡号：</span>
                    <span class="staff_text" id="otherNo"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">执业资格证书号：</span>
                    <span class="staff_text" id="profCertId"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">民族：</span>
                    <span class="staff_text" id="nationName"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">毕业院校：</span>
                    <span class="staff_text" id="university"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">学历：</span>
                    <span class="staff_text" id="educationName"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">学位：</span>
                    <span class="staff_text" id="degreeName"></span>
                </li>
                <li class="sta_lis" id="li_administratorlevelName">
                    <span class="staff_tit">行政级别：</span>
                    <span class="staff_text" id="administratorlevelName"></span>
                </li>
                <li class="sta_lis"  id="li_administratordutyName">
                    <span class="staff_tit">行政职务：</span>
                    <span class="staff_text" id="administratordutyName"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">院内职务：</span>
                    <span class="staff_text" id="hospitalDutyName"></span>
                </li>
                <li class="sta_lis">
                    <span class="staff_tit">内部编号：</span>
                    <span class="staff_text" id="internals"></span>
                </li>
                <li class="sta_lis shanxi">
                    <span class="staff_tit">籍贯：</span>
                    <span class="staff_text" id="nativePlace"></span>
                </li>
                <li class="sta_lis shanxi ">
                    <span class="staff_tit">微信号：</span>
                    <span class="staff_text" id="wechatNumber"></span>
                </li>

                <li class="sta_lis stf">
                    <span class="staff_tit">备注：</span>
                    <span class="staff_text" id="remark"></span>
                </li>
            </ul>
        </div>

    </div>
</body>

</html>

<script>

    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    });

    layui.use(['form', 'jquery', 'layer', 'tool'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var layer = layui.layer;
        var tool = layui.tool;

        const IS_ZHEJIANG = StandardKind.ZHE_JIANG == getCmeStandardKindId();

        specialConfig();

        window.photoError=function(obj){
            $(obj).attr("src","/img/person/nophoto.png");
        }

        function getCmeStandardKindId () {
            return localStorage.getItem("standardkind-id");
        }

        function isGuangxiProvinceManager () {
            return getCmeStandardKindId() == StandardKind.GUANG_XI
                && localStorage.getItem("user-type") == "11"
                && localStorage.getItem("unit-user-type") == "5";
        }

        function formatCertId (certId) {
            if (certId == null) {
                return "";
            }
            if (IS_ZHEJIANG || isGuangxiProvinceManager()) {
                return certId;
            }
            return certId.substring(0, 14) + '****';
        }

        function specialConfig () {

            if(IS_ZHEJIANG) {
                $(".zhejiang_hide").hide();
                $(".zhejiang_show").show();
            } else {
                $(".zhejiang_hide").show();
                $(".zhejiang_show").hide();
            }
        }

        $(function () {
            var comPersonId = getQueryString("comPersonId");
            $.ajax({
                type: "get",
                url: huayi_personorg_url + 'comperson/getOne',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                data: { comPersonId: comPersonId },
                success: function (result) {
                    if (result.success == true) {
                        var person = result.data;
                        $("#personName").text(person.personName);
                        $("#sex").text(person.sex);
                        $("#certId").text(formatCertId(person.certId));
                        $("#hdnCertId").val(person.certId);
                        $("#birthday").text(person.birthday);
                        var age = "";
                        if (person.birthday !== "" && person.birthday != undefined && person.birthday != null) {
                            var nowYear = (new Date()).getFullYear();
                            var birthDayYear = person.birthday.substring(0, 4);
                            age = parseInt(nowYear) - parseInt(birthDayYear);
                        }
                        $("#age").text(age);
                        $("#personName").text(person.personName);
                        $("#deptName").text(person.deptName);
                        $("#personName").text(person.personName);
                        $("#grantDate").text((person.grantDate==null)?"":person.grantDate);
                        var isIntheseriesName = "";
                        if (person.isIntheseries !== "" && person.isIntheseries != undefined && person.isIntheseries != null) {

                            isIntheseriesName = (person.isIntheseries === 1) ? "不在编" : "在编";
                        }
                        $("#isIntheseriesName").text(isIntheseriesName);
                        $("#mobile").text(person.mobile);
                        $("#jobDate").text((person.jobDate==null)?"":person.jobDate);
                        $("#medicalType").text((person.medicalType==null) ? "" : person.medicalType==1 ? "西医" : person.medicalType==2 ? "中医":"疾控"   );
                        $("#titleName").text(person.titleName);

                        $("#telephone").text(person.telephone == null ? "" : person.telephone);
                        $("#email").text(person.email == null ? "" : person.email);

                        $("#otherNo").text(person.otherNo == null ? "" : person.otherNo);
                        $("#profCertId").text(person.profCertId == null ? "" : person.profCertId);
                        $("#nationName").text(person.nationName == null ? "" : person.nationName);
                        $("#university").text(person.university == null ? "" : person.university);
                        $("#educationName").text(person.educationName == null ? "" : person.educationName);
                        $("#degreeName").text(person.degreeName == null ? "" : person.degreeName);
                        $("#administratorlevelName").text(person.administratorlevelName == null ? "" : person.administratorlevelName);
                        $("#administratordutyName").text(person.administratordutyName == null ? "" : person.administratordutyName);
                        $("#hospitalDutyName").text(person.hospitalDutyName == null ? "" : person.hospitalDutyName);

                        $("#internals").text(person.internals == null ? "" : person.internals);
                        $("#remark").text(person.remark == null ? "" : person.remark);

                        $("#nativePlace").text(person.nativePlace == null ? "" : person.nativePlace);
                        $("#wechatNumber").text(person.wechatNumber == null ? "" : person.wechatNumber);

                        if( person.photo!=null &&person.photo!=undefined && person.photo!="" ){
                            let photoUrl = tool.getComAliyunUrl(person.photo);
                            $("#photo").attr("src",  photoUrl).height(182).width(130);
                        }else{
                            $("#photo").attr("src",  "/img/person/nophoto.png").height(182).width(130);
                        }


                        if(person.cmeStandardKindId.toLowerCase()=="db0d980b-03d4-4c9c-b2d4-9f890109ed47"){
                            $("#li_administratorlevelName").hide();
                            $("#li_administratordutyName").hide();
                            $(".shanxi").show();
                        }else{
                            $("#li_administratorlevelName").show();
                            $("#li_administratordutyName").show();
                            $(".shanxi").hide();
                        }


                    } else {
                        layer.msg(result.msg);
                    }
                },
                error: function () {
                    layer.msg("请求失败");
                }
            });
        })
    });


</script>
