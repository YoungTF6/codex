    <style>

            padding: 0 !important;

                    </ul>
            </div>
            <!-- 搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">

                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline layui-col-sm4 layui-col-md3">

                                <input type="text" id="personName" placeholder="请输入" autocomplete="off" class="layui-input">

                        </div>
                        <div class="layui-inline layui-col-sm4	layui-col-md3">

                                <input type="text" id="certId" placeholder="请输入" autocomplete="off" class="layui-input">

                        </div>
                        <div class="layui-inline layui-col-sm4	layui-col-md3">
                            <label class="layui-form-label">手机号码</label>
                            <div class="layui-input-block">
                                <input type="text" id="mobile" placeholder="请输入" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline  tree-select layui-col-sm4 layui-col-md3" lay-filter="deptSelectArea">
                            <label class="layui-form-label">科室</label>
                            <div class="layui-input-block">
                                <input type="text" autocomplete="off" class="layui-input" disabled
                                    lay-filter="deptSelect" id="deptSelect" name="deptId" placeholder="请选择科室">
                            </div>
                            <input type="hidden" id="hidden_dept_id" />
                        </div>

                        <!-- <div class="layui-inline" lay-filter="personStateSelectArea">
                            <label class="layui-form-label">审核状态</label>
                            <div class="layui-input-block">
                                <select id="checkStateSelect">
                                <option value="0">未审核</option>
                                <option value="1">审核通过</option>
                                <option value="4">已驳回</option>
                            </select>
                            </div>
                        </div> -->
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable();getPersonCheckStateGroupCount();" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                </div>
                <!-- <div class="layui-inline" style="float: right">
                    <div class="layui-input-block">
                        <a class="layui-icon" id="hint"><span style="color: red;">&#xe60b;</span></a>
                    </div>
                </div> -->

                <!-- </blockquote> -->
            </div>


            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="comPerson" lay-filter="comPerson" style="margin: 0px 0px;">
                </table>
            </div>


        </div>
    </div>

    <!--表格内数据编辑、删除按钮 -->
    <script type="text/html" id="rowBar">
        {{# if (d.checkState == 0) { }}
        <a class="layui-btn layui-btn-xs btn-row" lay-event="pass">通过</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="reject">驳回</a> {{# } else { }}
        <a class="layui-btn layui-btn-xs layui-btn-disabled btn-disabled-row">通过</a>
        <a class="layui-btn layui-btn-xs layui-btn-disabled btn-disabled-row">驳回</a> {{# } }}
    </script>
    <script type="text/html" id="bar">
        <span style="margin-left: 5px;">
            <input type="checkbox" name="like1[read]" id="checkboxCurrent"
                lay-filter="checkboxCurrent" title="本页全选">
            </span>
            <div style="float: right;">
        <a class="layui-btn layui-btn-sm" lay-event="pass_batch" id="btnPassBatch">批量通过</a>
        <a class="layui-btn layui-btn-sm layui-btn-danger" lay-event="reject_batch"  id="btnRejectBatch">批量驳回</a>
    </div>
    </script>
    <script type="text/html" id="checkbox">
        {{# if (d.checkState == 0) { }}
        <input type="checkbox" name="select_one" title="" lay-skin="primary" data-id="{{ d.comPersonId }}"> {{# } else { }}
        <input type="checkbox" name="select_one" title="" lay-skin="primary" disabled data-id="{{ d.comPersonId }}"> {{# } }}
    </script>
    <script>
        // var unitId            = '090101';
        // var cmeStandardKindId = 'b7864061-7bd4-4ee7-a868-9b24009e92df';
        var unitId            = localStorage.getItem('unit-id');
        var userName          = localStorage.getItem('user-name');
        var cmeStandardKindId = localStorage.getItem('standardkind-id');


        layui.config({
            base: '../../js/layui/ext/'
        }).extend({
            treeSelect: 'treeSelect'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer','element', 'treeSelect'], function () {
            var table = layui.table,
                form  = layui.form,
                element = layui.element,
                $     = layui.jquery,
                treeSelect = layui.treeSelect,
                layer = layui.layer;

            var tabIndex=1;

            /* 表格相关操作 */
            // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem            : '#comPerson',
                    url             : huayi_personorg_url + 'comperson/list',
                    headers         : {
                        'Authorization' : localStorage.getItem('token'),
                        'KJPT-USER-ID'  : localStorage.getItem('user-id')
                    },
                    title: '用户表',
                    defaultToolbar  : [],
                    where           : {
                        unitId     : unitId,
                        personName : $('#personName').val(),
                        certId     : $('#certId').val(),
                        mobile     : $('#mobile').val(),
                        deptId     : $("#hidden_dept_id").val(),
                        checkState : getCheckState()
                    },
                    cols: [
                        [
                            // layui 原生
                            // { align: 'center', type: 'checkbox', minWidth: 50 },

                            // 自定义 1
                            // { align: 'center', width: 50, templet: '#checkbox',
                            //     title: '<input type="checkbox" name="select_all" lay-skin="primary" lay-filter="select_all">'
                            // },

                            // 自定义 2，这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                            { field:'CheckCustom' ,title:'选择', align: 'center', width:60,
                                templet:function (d) {
                                    let templateHtml = '<input type="checkbox" name="layTableCheckbox" ' +
                                            'lay-skin="primary" value="'+d.comPersonId+'"><i class="layui-icon"></i>';
                                        //利用三元表达式判断本条数据是否需要加载checkbox
                                        return d.checkState != 0 ? '—' : templateHtml
                            }},
                            { align: 'center', title: '操作', toolbar: '#rowBar', minWidth: 110 },
                            { field: 'personName', title: '姓名', align: 'center', minWidth: 100, sort: true,
                                templet: function (d) {
                                    return '<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" ' +
                                        'lay-event="detail">' + d.personName + '</a>';
                            }},
                            { field: 'certId', title: '证件号码', align: 'center', minWidth: 160, sort: true },
                            { field: 'personNo', title: '人员编号', align: 'center', minWidth: 120, sort: true },
                            { field: 'mobile', title: '手机号码', align: 'center', minWidth: 120, sort: true },
                            { field: 'deptName', title: '科室', align: 'center', minWidth: 130, sort: true,
                                templet: function(d){
                                    console.log(d.chainDeptName);
                                    let chainDeptName = (d.chainDeptName==null || d.chainDeptName=="") ? "" :d.chainDeptName ;
                                    let transObj = {'comPersonId':d.comPersonId,'chainDeptName': chainDeptName.replace(/ > /g,'&gt;')};
                                    return "<div id='lblDeptName_"+d.comPersonId+"'" 
                                    +" onmouseover=showChainDeptName('"+JSON.stringify(transObj)+"') onmouseleave='closeTips()' style='cursor:pointer;'>"+d.deptName+"</div>";
                                }
                             },
                            { field: 'titleName', title: '当前职称', align: 'center', minWidth: 110, sort: true },
                            { field: 'addTime', title: '注册时间', align: 'center', minWidth: 170, sort: true },
                            { field: 'checkState', title: '审核状态', align: 'center', minWidth: 110, sort: true,
                                templet: function (d) {
                                    if (d.checkState == 0) {
                                        return '<span>未审核</span>';
                                    } else if (d.checkState == 1) {
                                        return '<span style="color: #5FB878;">审核通过</span>';
                                    } else if (d.checkState == 4) {
                                        return '<span style="color: #FF5722;">已驳回</span>';
                                    }
                            }},
                            { field: 'checkTime', title: '审核时间', align: 'center', minWidth: 170, sort: true },
                            { field: 'unitName', title: '审核单位', align: 'center', minWidth: 200, sort: true },
                            { field: 'checkReason', title: '驳回原因', align: 'center', minWidth: 200, sort: true }
                        ]
                    ],
                    toolbar         : '#bar',
                    cellMinWidth    : 100,
                    id              : 'comPerson',
                    height          : 'full-160',
                    page            : true,
                    limit           : 10,
                    limits          : [10, 50, 100, 150, 200],
                    parseData       : function (res) {
                        return {
                            'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                            'msg': res.message, // 解析提示文本
                            'count': res.data.recordsTotal, // 解析数据长度
                            'data': res.data.records, // 解析数据列表
                            'page': res.data.pageNum, // 当前页
                            'limit': res.data.pageSize, // 每页条数
                        }

                    },
                    request         : {
                        pageName  : 'pageNum', // 页码的参数名称，默认：page
                        limitName : 'pageSize' // 每页数据量的参数名，默认：limit
                    },
                    done            : function (res, curr, count) {
                        // layui 原生
                        // table_data = res.data;
                        // trNum = count;
                        // for (var i = 0; i < res.data.length; i++) {
                        //     var state = res.data[i].checkState;
                        //     if (state != 0) {
                        //         var index = res.data[i]['LAY_TABLE_INDEX'];
                        //         var $checkbox = $('.layui-table tr[data-index=' + index + '] input[type="checkbox"]');
                        //         $checkbox.prop('disabled',true);
                        //         $checkbox.next().addClass('layui-btn-disabled');
                        //         $checkbox.prop('name', 'caib');
                        //     } else {
                        //         // table_data.push(res.data[i]);
                        //     }
                        // }

                        // 自定义 1
                        // form.on("checkbox(select_all)", function () {
                        //     var status = $(this).prop("checked");
                        //     $.each($("input[name=select_one]"), function (i, value) {
                        //         if ($(this).prop('disabled') == false) {
                        //             $(this).prop("checked", status);
                        //         }
                        //     });
                        //     form.render();
                        // });

                        // 自定义 2
                        for (var i = 0; i < res.data.length; i++) {
                            var state = res.data[i].isPass; // 根据status状态判断，不为0时，禁止勾选
                            // var checkallinfo = $('#checkboxAll').is(':checked');
                            var checkboxCurrent = $('#checkboxCurrent').is(':checked');
                            var templateHtml = '';
                            // 如果全选
                            if (checkboxCurrent) {
                                var index = res.data[i]['LAY_TABLE_INDEX'];
                                // 如果已公布
                                if (state == null) {
                                    $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                    $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                                }
                            }
                        }
                    }
                });
            };

            
            // 初始化表格
            loaderTable();
            // 监听头部新增按钮
            table.on('toolbar(comPerson)', function (obj) {
                // layui 原生
                // let datas        = table.checkStatus(obj.config.id).data,
                //     comPersonIds = '';
                // for (let i = 0; i < datas.length; i++) {
                //     // debugger;
                //     comPersonIds += datas[i].comPersonId + ',';
                // }

                // 自定义 1
                // let ids               = [],
                //     comPersonIds_temp = '',
                //     comPersonIds      = '';
                // $.each($('input[name=select_one]:checked'), function (i, value) {
                //     // ids[i] = $(this).attr('data-id');
                //     // console.log(ids);
                //     let id = $(this).attr('data-id');
                //     if (comPersonIds_temp.indexOf(id) < 0) {
                //         comPersonIds_temp += id + ',';
                //     } else {
                //         comPersonIds += id + ',';
                //     }
                // });

                // 自定义 2
                let comPersonIds = '',
                    child        = $('input[name="layTableCheckbox"]');
                child.each(function (index, item) {
                    if (item.checked === true) {
                        comPersonIds += item.defaultValue + ',';
                    }
                });
                if (comPersonIds.length < 1) {
                    layer.msg('请选择要操作的人员', { icon: 7, time: 1500 });
                    return false;
                } else {
                    comPersonIds = comPersonIds.substring(0, comPersonIds.length - 1);
                }

                console.log(comPersonIds);
                // return;

                let params = { comPersonIds: comPersonIds };
                let msg;
                if (obj.event === 'pass_batch') {
                    layer.confirm('确认通过所选人员的注册审核吗？', function (index) {
                        params.checkState = 'PASS';
                        msg = '审核';
                        personRegisterInfoCheck(params, msg);
                    });
                } else if (obj.event === 'reject_batch') {
                    layer.prompt({
                        formType: 2,
                        title: '请输入驳回原因',
                        area: ['400px', '150px'],
                        btnAlign: 'c',
                        yes: function (index, layero) {
                            var value = layero.find(".layui-layer-input").val();
                            params.checkState = 'REJECT';
                            params.checkReason = value;
                            msg = '驳回';
                            personRegisterInfoCheck(params, msg);
                        }
                    });
                } else {
                    return false;
                }
            });

            // 监听行内按钮
            table.on('tool(comPerson)', function (obj) {
                var datas = obj.data;
                var params = {
                    comPersonIds: datas.comPersonId
                };
                var msg;

                if (obj.event === 'pass') {
                    layer.confirm('确认通过 <span style="font-weight: bold">' + datas.personName + '</span> 的注册审核吗？',
                        function (index) {
                            params.checkState = 'PASS';
                            msg = '审核';
                            personRegisterInfoCheck(params, msg);
                    });
                } else if (obj.event === 'reject') {
                    layer.prompt({
                        formType: 2,
                        title: '请输入驳回原因',
                        area: ['400px', '150px'],
                        btnAlign: 'c',
                        yes: function (index, layero) {
                                var value = layero.find(".layui-layer-input").val();
                                params.checkState = 'REJECT';
                                params.checkReason = value;
                                msg = '驳回';
                                personRegisterInfoCheck(params, msg);
                            }
                            // }, function (value, index, elem) {
                            //     params.checkState = 'REJECT';
                            //     params.checkReason = value;
                            //     msg = '驳回';
                            //     personRegisterInfoCheck(params, msg);
                            //     // layer.close(index);
                    });
                } else if (obj.event === 'detail') {
                    layer.open({
                        type: 2,
                        title: '人员信息',
                        content: 'baseInfoDetails.html?comPersonId=' + datas.comPersonId,
                        area: ['900px', '600px']
                    });
                }
            });

            //本页全选
            form.on('checkbox(checkboxCurrent)', function(data){
                if(data.elem.checked){
                    $("#checkboxAll").prop("checked",false);
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = true;
                    });
                }else{
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = false;
                    });
                }
                form.render('checkbox');
            });


            /** 科室选择下拉列表初始化 */
            var deptTreeSelect;
            window.initDeptTree = function (deptId) {
                var unitId = localStorage.getItem("unit-id");
                deptTreeSelect = treeSelect.render({
                    elem: '#deptSelect',
                    data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + unitId,
                    type: 'get',
                    search: true,
                    style: {
                        folder: {     // 父节点图标
                            enable: true   // 是否开启：true/false
                        },
                        line: {     // 连接线
                            enable: true   // 是否开启：true/false
                        }
                    },
                    click: function (data) {
                        $("#hidden_dept_id").val(data.current.id);
                    },
                    success: function () {
                        if (deptId != null && deptId != undefined && deptId != "") {
                            deptTreeSelect.checkNode('deptSelect', deptId);
                        }
                    }
                });
            }
            initDeptTree();

            // 人员注册信息审核
            function personRegisterInfoCheck(params, msg) {
                if (params.checkState == 'REJECT' && params.checkReason.trim().length < 1) {
                    layer.msg('请输入驳回原因', {
                        icon: 7
                    });
                    return false;
                }
                params.operateUnitId    = unitId;
                params.operateUesrName  = userName;
                axios({
                    method: 'post',
                    url: huayi_personorg_url + 'comperson/registerInfoCheck',
                    headers: {
                        'Content-Type': 'application/json;charset=UTF-8'
                    },
                    responseType: 'json',
                    data: JSON.stringify(params)
                }).then(response => {
                    var resData = response.data
                    if (response.status == 200 && resData.status == 200) {
                        layer.closeAll();
                        layer.msg(msg + '成功', {
                            icon: 1
                        });
                        loaderTable();
                        getPersonCheckStateGroupCount();
                    } else {
                        layer.msg(msg + '失败', {
                            icon: 2
                        });
                    }
                }).catch(error => {
                    layer.msg('网络异常，请稍后再试', {
                        icon: 2
                    });
                    console.log(error);
                });
            }



            /* 查询项初始化 */
            // 人员状态选择初始化
            axios({
                method: 'get',
                url: huayi_sjwh_url + 'cmePersonState/getPersonStateListByCmeStandardKindId',
                responseType: 'json',
                params: {
                    cmeStandardKindId: cmeStandardKindId
                }
            }).then(response => {
                if (response.status == 200 && response.data.status == 200) {
                    var data = response.data.data;
                    var personStateStr = '<option value="">全部</option>';
                    for (var i = 0; i < data.length; i++) {
                        personStateStr += '<option value="' + data[i].person_state_id + '">' +
                            data[i].person_state_name + '</option>';
                    }
                    $('#personStateSelect').html(personStateStr);
                    // form.render('select', 'personStateSelectArea');
                } else {
                    console.log('人员状态选择初始化失败');
                }
            }).catch(error => {
                console.log('人员状态选择初始化失败');
                console.log(error);
            });



            /* form表单相关操作 */
            // 新增/修改表单提交
            form.on('submit(submit)', function (data) {
                // 用于判断是新增还是修改
                var formTableId = $("#add-comPerson input[name='comPersonId']").val();
                var datas = JSON.stringify(data.field);
                var URL;
                if (formTableId === '' || formTableId === null) {
                    // 走新增逻辑
                    URL = kjpt_url + 'comPerson/save';
                } else {
                    // 走修改逻辑
                    URL = kjpt_url + 'comPerson/update';
                }
                $.ajax({
                    type: 'post',
                    url: URL,
                    data: datas,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        layer.msg("修改成功");
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
            });

            element.on('tab(checkStateTab)', function(data){
                tabIndex = data.index;
                table.reload("comPerson", 
                    {
                        url             : huayi_personorg_url + 'comperson/list',
                        headers         : {
                            'Authorization' : localStorage.getItem('token'),
                            'KJPT-USER-ID'  : localStorage.getItem('user-id')
                        },
                        where         : {
                            unitId     : unitId,
                            personName : $('#personName').val(),
                            certId     : $('#certId').val(),
                            mobile     : $('#mobile').val(),
                            checkState :  getCheckState()
                        }
                    }
                );
                if(tabIndex != 1){
                    $("#btnPassBatch").hide();
                    $("#btnRejectBatch").hide();
                }
            });

            function getCheckState(){
                let checkState = "";
                switch(tabIndex){
                    case 0:
                        checkState = "-1";
                        break;
                    case 1:
                        checkState = "0";
                        break;
                    case 2:
                        checkState = "1";
                        break;
                    case 3:
                        checkState = "4";
                        break;
                }
                return checkState;
            }

            window.getPersonCheckStateGroupCount = function(){
                axios({
                    method: 'post',
                    url: huayi_personorg_url + 'comperson/getPersonCheckStateGroupCount',
                    responseType: 'json',
                    params: {
                        unitId:localStorage.getItem("unit-id")
                    }
                }).then(response => {
                    if (response.status == 200 && response.data.status == 200) {
                        let data = response.data.data;
                        console.log(data);
                        let cntAll = data["all"];
                        let cnt0 = data["0"];
                        let cnt1 = data["1"];
                        let cnt4 = data["4"];
                        //<span class="layui-badge">61728</span>
                        $("#tabAll").text("全部("+cntAll+")");
                        $("#tab0").html('未审核<span class="layui-badge">'+cnt0+'</span>');
                        $("#tab1").text("审核通过("+cnt1+")");
                        $("#tab4").text("已驳回("+cnt4+")");
                    } else {
                        console.log('系统报错，请联系管理员');
                    }
                }).catch(error => {
                    console.log('发送请求失败');
                    console.log(error);
                });

            }

            getPersonCheckStateGroupCount();



            //鼠标悬停提示特效
            $("#hint").hover(function () {
                openMsg();
            }, function () {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {
                    tips: [1, '#ff6700'],
                    time: 30000
                });
            }

            var tipsValue=0; 
            window.showChainDeptName = function(transObj){
                transObj = JSON.parse(transObj);
                let comPersonId = transObj.comPersonId;
                let chainDeptName = transObj.chainDeptName;
                let id = "#lblDeptName_"+comPersonId;
                let msg = "<div style='font-size:16px;color:#5FB878;'>"+chainDeptName+"</div>";
                tipsValue = layer.tips(msg,id,{tips:[1,"#fff"]});
            }

            window.closeTips = function(){
                layer.close(tipsValue);
            }

        });
    </script>
</body>

</html>
