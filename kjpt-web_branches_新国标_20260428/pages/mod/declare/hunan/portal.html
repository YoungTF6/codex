<script type="text/javascript">
    function cbverify(item, msg) {
        let val = $(item).parent().find("input[type='checkbox']:checked").val();
        if (isHunanRp(_dbase.info.scoreLevelId) && (typeof (val) == "undefined")) return msg;
    }
    $.extend(true, _dbase, {
        verify: {
            json: {
                rpTransferMode: (value, item) => cbverify(item, '请选择项目主要传输方式'),
                rpMedia: (value, item) => cbverify(item, '请选择媒体应用'),
                rpInteraction: (value, item) => cbverify(item, '请选择项目教学交互设计'),
                rpResource: (value, item) => cbverify(item, '请选择资源提供方式'),
                rpKnowledge: (value, item) => cbverify(item, '请选择知识点讲解及覆盖方式'),
                rpExam: (value, item) => cbverify(item, '请选择考试与练习设计方式'),
                rpValuation: (value, item) => cbverify(item, '请选择学习评价方式'),
            },
        },
        calc: {
            calcScore: function (courseArr, cycleArr) {
                const that = this;
                let limit = isHunanRp(_dbase.info.scoreLevelId) ? 5 : 10;
                that.score = Math.min(limit, Math.ceil(that.period / 3));
                $('input[name=score]').val(that.score);
                //
                that.days = Math.ceil(that.period / 6);
                $('input[name=days]').val(that.days);
                //
                layui.form.val('page4-form', {score: that.score, days: that.days});
            },
            calcDays: function () {
            },
        },
        fix: {
            fixForm: function () {
                $('select[name=isLecturer]').attr('disabled', 'true').toggleClass('layui-disabled');
                $('select[name=isInJob]').attr('disabled', 'true').toggleClass('layui-disabled');
                layui.form.val('page2-form', {'isLecturer': 1, 'isInJob': 1});
                if (isHunanRp(_dbase.info.scoreLevelId)) {
                    $('.only_rp').show();
                    $('#hold_place_label').text('教学网站:');
                } else {
                    $('input[name=rpPersonName]').attr('lay-verify', '');
                    $('input[name=rpGender]').attr('lay-verify', '');
                    $('input[name=rpAge]').attr('lay-verify', '');
                    $('input[name=rpPhone]').attr('lay-verify', '');
                    $('input[name=rpDuty]').attr('lay-verify', '');
                    $('input[name=rpWorkUnit]').attr('lay-verify', '');
                    $('textarea[name=rpResume]').attr('lay-verify', '');
                }
            }
        },
    });
</script>
