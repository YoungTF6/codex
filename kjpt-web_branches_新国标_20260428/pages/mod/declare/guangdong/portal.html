                                        <input type="text" name="projectName" lay-verify="required|projectName"

                                    </div>
                                </div>
                                <div class="layui-col-md3">
                                    <label class="layui-form-label"><span
                                            style="color:red">*&nbsp;</span>II级学科:</label>
                                    <div class="layui-input-block">
                                        <select name="knowledgeTwoId" lay-filter="knowledgeTwoIdSelect"
                                                lay-verify="required"
                                                lay-search="true">
                                            <option value="">请选择</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-col-md3">
                                    <label class="layui-form-label"><span
                                            style="color:red">*&nbsp;</span>III级学科:</label>
                                    <div class="layui-input-block">
                                        <select name="knowledgeId" lay-filter="knowledgeIdSelect" lay-verify="required"
                                                lay-search="true">
                                            <option value="">请先选择二级学科</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <!-- row2 -->
                            <div class="layui-form-item">
                                <div class="page-row-item">
                                    <label><span style="color:red">*&nbsp;</span>本省或国内外本领域的最新进展（至少300字，最多不超过3000字）:</label>
                                    <div>
                                        <textarea name="progress" placeholder="请输入内容" class="layui-textarea"
                                                  lay-verify="required|progress"></textarea>
                                    </div>
                                </div>
                                <div class="page-row-item">
                                    <label><span style="color:red">*&nbsp;</span>本领域存在的问题（至少300字，最多不超过3000字）:</label>
                                    <div>
                                        <textarea name="question" placeholder="请输入内容" class="layui-textarea"
                                                  lay-verify="required|question"></textarea>
                                    </div>
                                </div>
                            </div>
                            <!-- row3 -->
                            <div class="layui-form-item">
                                <div class="page-row-item">
                                    <label><span
                                            style="color:red">*&nbsp;</span>活动的目标（至少300字，最多不超过3000字）:</label>
                                    <div>
                                        <textarea name="target" placeholder="请输入内容" class="layui-textarea"

                                    </div>
                                </div>
                                <div class="page-row-item">
                                    <label><span style="color:red">*&nbsp;</span>活动的创新之处（至少300字，最多不超过3000字）:</label>
                                    <div>

                                    </div>
                                </div>
                            </div>
                            <!-- row4 -->
                            <div class="layui-form-item"
                                 style="vertical-align:bottom;display: flex;align-items: flex-end">
                                <div class="page-row-item">
                                    <label><span style="color:red">*&nbsp;</span>活动培训需求及效益、效果分析（最多不超过3000字）:</label>
                                    <div>

                                </div>
                                <div class="page-row-item">

<script type="text/javascript">
    const validateProgressLength = (value, min, max) => {
        let len = (value || '').length;
        if (len < min) return `不少于${min}字`;
        if (len > max) return `最多${max}字`;
    };
    $.extend(true, _dbase, {
        _courseTableColArr: [
            {field: 'teacherName', title: '姓名', align: 'center', minWidth: 90, edit: 'text', sort: false, hide: false, fixed: 'left'},
            {field: 'certType', title: '证件类型', align: 'center', minWidth: 145, sort: false, hide: false, templet: '#courseCertTypeCell'},
            {field: 'idCardNo', title: '证件号码', align: 'center', minWidth: 180, edit: 'text', sort: false, hide: false},
            {field: 'titleId', title: '专业技术职务', align: 'center', minWidth: 123, sort: false, hide: false, templet: '#courseTitleIdCell'},
            {field: 'researchDirection', title: '主要研究方向', align: 'center', minWidth: 123, edit: 'text', sort: false, hide: false},
            {field: 'workUnit', title: '所在单位', align: 'center', minWidth: 120, edit: 'text', sort: false, hide: false},
            {field: 'teachTopic', title: '讲授题目', align: 'center', minWidth: 200, edit: 'text', sort: false, hide: false},
            {field: 'content', title: '内容', align: 'center', minWidth: 400, edit: 'text', sort: false, hide: false},
            {field: 'period', title: '讲授学时', align: 'center', minWidth: 95, edit: 'text', sort: false, hide: false},
            {field: 'teachingMethod', title: '教学方法', align: 'center', minWidth: 143, sort: false, hide: false, templet: '#courseTeachingMethodCell'},
            {field: 'operate', title: '操作', align: 'center', minWidth: 70, sort: false, hide: false, templet: '#courseOperationCell'}
        ],
        verify: {
            course: {
                mustCertId: false,
                single: (course) => {
                    const period = Number(course.period);
                    if (isNaN(period)) return '';
                    if ( period > 3) {
                        return '讲授学时最大为3';
                    }
                    return '';
                },
            },
            json: {
                progress: (value, item) => validateProgressLength(value, 300, 3000),
                question: (value, item) => validateProgressLength(value, 300, 3000),
                target: (value, item) => validateProgressLength(value, 300, 3000),
                innovation: (value, item) => validateProgressLength(value, 300, 3000),
                projAnalyze: (value, item) => validateProgressLength(value, 1, 3000),
                jobSummary: (value, item) => validateProgressLength(value, 1, 3000),
                days: (value, item) => {
                    const dayVal = Number(value);
                    if (!isNaN(dayVal) && dayVal > 7) return '举办周期不能超过7天';
                    const startStr = $('input[name="dateStart"]').eq(0).val();
                    const endStr = $('input[name="dateEnd"]').eq(0).val();
                    if (startStr && endStr) {
                        const s = moment(startStr);
                        const e = moment(endStr);
                        if (s.isValid() && e.isValid()) {
                            const diff = e.diff(s, 'days') + 1;
                            if (diff > 7) return '举办周期不能超过7天';
                        }
                    }
                },
                period: (value, item) => {
                    if (value < 0) return '授课时长不满足要求';
                },
            },
        },
        calc: {
            calcDays: function(cycleArr) {
                var startStr = '';
                var endStr = '';
                if (cycleArr && cycleArr.length > 0) {
                    startStr = cycleArr[0].dateStart || '';
                    endStr = cycleArr[0].dateEnd || '';
                }
                if (!startStr || !endStr) {
                    var $startInput = $('input[name="dateStart"]').eq(0);
                    var $endInput = $('input[name="dateEnd"]').eq(0);
                    if ($startInput.length === 0 || $endInput.length === 0) return;
                    startStr = $startInput.val();
                    endStr = $endInput.val();
                }
                if (startStr && endStr) {
                    var s = moment(startStr);
                    var e = moment(endStr);
                    if (s.isValid() && e.isValid()) {
                        var diff = e.diff(s, 'days') + 1;
                        if (diff > 0) {
                            var $daysInput = $('input[name="days"]');
                            if (diff > 7) {
                                layui.lat.failMsg('举办周期不能超过7天');
                            }
                            if ($daysInput.val() != diff) {
                                $daysInput.val(diff);
                            }
                        }
                    }
                }
            },
            calcScore: function () {
                const that = this;
                let totalPeriod = accAdd(that.period_ll, that.period_sy);
                let score = totalPeriod > 0 && totalPeriod < 6 ? 0.2 : Math.floor(totalPeriod / 6);
                that.score = Math.min(10, score);
                if (typeof gProjectDetail !== 'undefined') {
                    gProjectDetail.score = that.score;
                }
                let retry = 6;
                const fillScore = () => {
                    layui.form.val('page4-form', {score: that.score});
                    const $score = $('#page4-form input[name=score]');
                    if ($score.length > 0) {
                        $score.val(that.score);
                        return;
                    }
                    if (retry-- > 0) {
                        setTimeout(fillScore, 120);
                    }
                };
                fillScore();
            },
        },
        fix: {
            fixForm: function () {
                
            }
        },
    });
</script>
