<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>以人员方式审核-人员-学分明细</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>

    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->

    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- pdf查看 -->
   <script type="text/javascript" src="/js/pdfjs/build/pdf.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/iife.min.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <div class="profile">
            <span>姓名：</span><label id="personNameLabel"></label>
            <span>职称：</span><label id="titleLabel"></label>
            <span>人员编号：</span><label id="personNoLabel"></label>
            <span>单位：</span><label id="unitNameLabel"></label>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="scoreDetailTable" lay-filter="scoreDetailTable" style="margin: 0;"></table>
        </div>
    </div>
</div>
<ul class="photo-window" id="photoWindow" style="display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; max-height: 80vh;"></ul>
</body>
<!-- scoreDetailTable toolbar -->
<script type="text/html" id="sdtToolbar">
    <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
    <a class='layui-btn layui-btn-sm' lay-event='approveBtn'>审核通过</a>
    <a class='layui-btn layui-btn-sm layui-btn-danger' lay-event='rejectBtn'>审核不通过</a>
    <a class='layui-btn layui-btn-sm' lay-event='backBtn'>返回</a>
    <a class="table-tips" style="color: red">提示：远程学分仅省卫健委和指定市县卫健委可在远程学分审核模块审核</a>
</script>
<script type="text/html" id="thumbCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="showThumb">查看</a>
    {{# if(d.evidenceNameVerifyAbnormal){ }}
    <span class="evidence-verify-warn-badge">!</span>
    {{# } }}
</script>
<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        tool: 'tool'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'tool', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let tool = layui.tool;
        let lat = layui.lat;    
        let gLayerIndex = -1;
        let gReason;
        let gAction;
        const _comPersonId = getUrlParamByName('comPersonId');
        const _personNo = getUrlParamByName('personNo');
        const _personName = getUrlParamByName('personName');
        const _titleName = getUrlParamByName('titleName');
        const _unitName = getUrlParamByName('unitName');
        const _scoreTypeVal = getOrDefault(getUrlParamByName('scoreTypeVal'), 7);
        const _startDate = getUrlParamByName('startDate') ? unixs2sec(getUrlParamByName('startDate')) : null;
        const _endDate = getUrlParamByName('endDate') ? unixs2sec(getUrlParamByName('endDate')) : null;
        const _checkState = getOrDefault(getUrlParamByName('checkState'), '');
        const _checkStates = getOrDefault(getUrlParamByName('checkStates'), '');
        console.info('checkState: %s, checkStates: %s', _checkState, _checkStates);
        const EVIDENCE_VERIFY_WARN_TIP = '该佐证材料照片中疑似未包含学分归属人姓名，请您关注并查验';
        /** 为佐证核验异常角标绑定 layer 悬停提示，避免表格单元格裁剪原生 title */
        function bindEvidenceVerifyWarnBadgeTips(tableView) {
            let tipIndex;
            tableView.find('.evidence-verify-warn-badge')
                .off('mouseenter.evidenceWarn mouseleave.evidenceWarn')
                .on('mouseenter.evidenceWarn', function () {
                    tipIndex = layer.tips(EVIDENCE_VERIFY_WARN_TIP, this, {tips: [2, '#808080']});
                })
                .on('mouseleave.evidenceWarn', function () {
                    layer.close(tipIndex);
                });
        }
        window.showTips = showTips;
        window.closeTips = closeTips;
        window.solveReason = solveReason;
        let phototitle = _isZhejiang ? '佐证材料' : '学分证明照片';
        let viewFile = "viewFile", photoWindow = "photoWindow";
        function getPdfFromUrl(url, id) {
            tool.viewPdfBack(url, id);
        }
        table.on('toolbar(scoreDetailTable)', function (obj) {
            if ('backBtn' === obj.event) {
                closeCurrModal();
                return;
            }
            let checkStatus = table.checkStatus(obj.config.id);
            let selectedRowArr = checkStatus.data;
            selectedRowArr = selectedRowArr.filter(selectedRow => !_tips.canCheck(selectedRow));
            if (selectedRowArr.length < 1) {
                layer.msg('先选择要审核的学分');
                return false;
            }
            if ('approveBtn' === obj.event) {
                gReason = '';
                if (needpassreason()) {
                    gLayerIndex = layer.open({
                        type: 2,
                        shade: 0.4,
                        shadeClose: true,
                        title: '审核意见',
                        content: `./ReasonModal.html?phase=3&state=3`,
                        area: ['800px', '600px'],
                        end: function (layero, index) {
                            if (ModalActionEnum.CONFIRM === gAction) {
                                docheckscore(selectedRowArr, CheckStateEnum.APPROVE, 'approve');
                            }
                        }
                    });
                } else {
                    docheckscore(selectedRowArr, CheckStateEnum.APPROVE, 'approve');
                }
            } else if ('rejectBtn' === obj.event) {
                gReason = '';
                gLayerIndex = layer.open({
                    type: 2,
                    shade: 0.4,
                    shadeClose: true,
                    title: '不通过原因',
                    content: `./ReasonModal.html?phase=3&state=2`,
                    area: ['800px', '600px'],
                    end: function (layero, index) {
                        if (ModalActionEnum.CONFIRM === gAction) {
                            docheckscore(selectedRowArr, CheckStateEnum.REJECT, 'reject');
                        }
                    }
                });
            }
        });
        function solveReason(reason, action) {
            gReason = reason;
            gAction = action;
            layer.close(gLayerIndex);
        }
        function needpassreason() {
            if (_isJilin) return false;
            return true;
        }
        table.on('tool(scoreDetailTable)', function (obj) {
            let rowData = obj.data;
            if ('showThumb' === obj.event) {
                if (rowData.scoreTypeVal === 4 || rowData.scoreTypeVal === 2) {
                    layer.msg(`继教项目和院内活动无${phototitle}`);
                    return false;
                }
                let visit = huayi_projectscore_url + 's1/single/photo/' + rowData.scoreId;
                getAction(visit).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        if(jsonRes.data.length <= 0) {
                            layer.msg(`无佐证材料`);
                            return false;
                        }
                        let imgElems = '';
                        for(let tempObj of jsonRes.data){
                            if(tempObj.scorePhotoUrl.indexOf(".pdf")>0) continue;
                            imgElems += `<li><img class="list-show-img" src="${tempObj.scorePhotoUrl}" alt="${tempObj.fileName}"></li>`;
                        }
                        $('#photoWindow').html(imgElems);
                        for(let tempObj of jsonRes.data){
                            if(tempObj.scorePhotoUrl.indexOf(".pdf")>0) {
                                getPdfFromUrl(tempObj.scorePhotoUrl,'photoWindow');
                            }
                        }
                        layer.open({
                            type: 1,
                            shade: 0.8,
                            offset: 'auto',
                            area: ['90%','90%'],
                            shadeClose:true,
                            scrollbar: false,
                            title: "预览",
                            content: $('#photoWindow')
                        });
                    }
                });
            }
        });
        $(function () {
            $('#personNameLabel').append(_personName);
            $('#titleLabel').append(_titleName);
            $('#personNoLabel').append(_personNo);
            $('#unitNameLabel').append(_unitName);
            loadScoreDetailTable();
        });
        function docheckscore(selectedRowArr, state, action) {
            let params = {
                'msiList': getMsiList(selectedRowArr, {
                    'checkState': state,
                    'flowChainState': getFcsByCs(state),
                    'checkUnit': _unitId,
                    'checkUser': _unitId,
                    'checkMemo': gReason
                }),
                'action': action + '-byperson-modal',
                'fcs': getFcsByCs(CheckStateEnum.APPROVE),
                'fp': fp,
                'userId': _userId,
            };
            checkScoreAction(params).then((response) => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    layer.msg('审核完成', {time: 500}, function () {
                        table.reload('scoreDetailTable');
                    });
                } else {
                    layer.msg(jsonRes.msg);
                }
            }).catch(error => {
                layer.msg('error:审核学分');
            }).finally(() => {
            });
        }
        function loadScoreDetailTable() {
            table.render({
                elem: '#scoreDetailTable',
                id: 'scoreDetailTable',
                url: huayi_projectscore_url + 'pgsi/score/page/byperson', // byPerson
                method: 'post',
                contentType: 'application/json',
                page: true,
                limit: getPageSize(),
                limits: [10, 50, 100, 150, 200],
                height: 'full-82',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: {
                    'scoreTypeVal': _scoreTypeVal,
                    'comPersonId': _comPersonId,
                    'startDate': _startDate,
                    'endDate': _endDate,
                    'checkState': _checkState,
                    'checkStates': _checkStates
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                toolbar: '#sdtToolbar',
                defaultToolbar: [],
                cols: [[
                    {
                        title: '选择', width: 60, align: 'center', fixed: 'left', templet: function (data) {
                            let m = _tips.canCheck(data);
                            if (m) return `<img src="/pages/mod/img/disableIcon.png" style="width:24px;" alt="${m}" onmouseenter="showTips(this)" onmouseleave="closeTips()"/>`;
                            else return `<input type="checkbox" name="layTableCheckbox" lay-skin="primary">`;
                        }
                    },
                    {field: '', title: phototitle, width: 130, align: 'center', sort: true, fixed: 'left', templet: '#thumbCell'},
                    {field: 'studyDate', title: '活动日期', width: 120, align: 'center', sort: true},
                    {field: 'projNo', title: '项目编号', width: 120, align: 'center', sort: true},
                    {field: 'projName', title: '项目名称', minWidth: 200, align: 'center', sort: true},
                    {field: 'extdata', title: '详细信息', minWidth: 200, align: 'center', sort: true, templet: data => _txt.ext__data(data)},
                    {field: 'scoreKindName', title: '学分分类', width: 120, align: 'center', sort: true},
                    {field: 'scoreLevelName', title: '学分子分类', width: 120, align: 'center', sort: true},
                    {field: 'knowledgeName', title: '学科', width: 120, align: 'center', sort: true},
                    {field: 'holdTypeName', title: projectLabels.lblActivityForm, width: 120, align: 'center', sort: true},
                    {field: 'projType', title: projectLabels.lblActivityType, width: 120, align: 'center', sort: true, templet: data => _txt.projType(data.projType)},
                    {field: 'scoreType', title: projectLabels.lblActivityContent, width: 120, align: 'center', sort: true, templet: data => _txt.scoreType(data.scoreType)},
                    {field: 'score', title: '学分', width: 120, align: 'center', sort: true},
                    {field: 'period', title: '学时', width: 120, align: 'center', sort: true},
                    {field: 'addUnitName', title: '授分单位', minWidth: 160, align: 'center', sort: true, templet: (data) => _txt.gantScore(data)},
                    {field: 'addUnitName', title: '发证机构', minWidth: 160, align: 'center', sort: true, templet: (data) => _txt.fazhengUnit(data)},
                    {field: 'checkUnitName', title: '审核单位', minWidth: 160, align: 'center', sort: true},
                    {field: 'checkUnit', title: '审核用户', width: 120, align: 'center', sort: true},
                    {field: 'checkState', title: '审核状态', width: 120, align: 'center', sort: true, templet: (data) => _txt.checkState(data)},
                    {field: 'ifAvail', title: '有效状态', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.ifAvail(data)},
                    {field: 'checkMemo', title: '审核意见', width: 120, align: 'center', sort: true, templet: (data) => (data.checkMemo ? ('.' === data.checkMemo ? '' : data.checkMemo) : '')},
                    {field: 'checkTime', title: '审核时间', width: 120, align: 'center', sort: true},
                    {field: 'addTime', title: '录入时间', width: 120, align: 'center', sort: true},
                    {field: 'scoreMode', title: '录入方式', width: 120, align: 'center', sort: true, templet: (data) => _txt.scoreMode(data)},
                    {field: 'remark', title: '备注', width: 120, align: 'center', sort: true}
                ]],
                done: function (res, curr, count) {
                    let tableView = this.elem.next();
                    for (let i = 0; i < res.data.length; i++) {
                        if (res.data[i].evidenceNameVerifyAbnormal) {
                            tableView.find('tr[data-index="' + i + '"]').addClass('score-evidence-name-abnormal');
                        }
                    }
                    bindEvidenceVerifyWarnBadgeTips(tableView);
                }
            });
        }
    });
</script>
<style>
    .profile {
        display: block;
        width: 66%;
        margin-left: 20px;
        height: fit-content;
    }
    .profile label {
        line-height: 30px;
        font-size: 14px;
        color: indianred;
        width: fit-content;
        margin-right: 10px;
    }
    .profile label:last-child {
        margin-right: 0;
    }
    .photo-window > img, .photo-window > li > img {
        display: block;
        max-width: 80%;
        margin: 10px auto;
    }
    .photo-window > li {
        width: 95%;
        margin: 15px auto;
    }
    .score-evidence-name-abnormal > td {
        background: #fff1f0 !important;
        color: #cf1322;
    }
    .evidence-verify-warn-badge {
        display: inline-block;
        margin-left: 6px;
        width: 16px;
        height: 16px;
        line-height: 16px;
        border-radius: 50%;
        text-align: center;
        background: #ff4d4f;
        color: #fff;
        font-size: 12px;
        cursor: help;
    }
</style>
</html>
