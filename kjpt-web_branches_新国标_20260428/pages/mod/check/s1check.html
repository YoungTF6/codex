        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label"><span data-id="lblYear" data-name="">年度</span></label>
                        <div class="layui-input-block"></div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><span data-id="lblScoreLevel" data-view-mode="__1" data-name="" data-label="学分分类" data-check-parent="1">学分级别</span></label>
                        <div class="layui-input-block"></div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><span data-id="lblActivityForm" data-name="holdType" data-multi="1">活动形式</span></label>
                        <div class="layui-input-block"></div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><span data-id="lblMedicalSystem" data-name="medicalType">所属医学体系</span></label>

                    <div class="layui-inline">

                    <!--<div class="layui-inline">-->

                    <div class="layui-inline">
                        <label class="layui-form-label">活动日期</label>
                        <div class="layui-inline">

                                <input type="text" autocomplete="off" id="rangeSel" class="layui-input" placeholder="至">
                            </div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">录入时间</label>
                        <div class="layui-inline">
                            <div class="layui-input-inline">
                                <input type="text" autocomplete="off" id="rangeSelAdd" class="layui-input" placeholder="至">
                            </div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">审核时间</label>
                        <div class="layui-inline">
                            <div class="layui-input-inline">
                                <input type="text" autocomplete="off" id="rangeSelCheck" class="layui-input" placeholder="至">
                            </div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员类别</label>
                        <div class="layui-input-block">
                            <select name="medicaltype">
                                <option value="">全部</option>
                                <option value="1">西医类别</option>

                <div class="layui_display">
                    <button class="layui-btn layui-btn-sm" lay-submit

        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">

                   style="margin: 0;"></table>

<script type="text/html" id="personDetailCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="personDetailBtn">人员明细</a>
    {{# if(d.evidenceNameVerifyAbnormal){ }}
    <span class="evidence-verify-warn-badge">!</span>
    {{# } }}

<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script>
    const scoreKindId = getUrlParamByName('scoreKindId');
    const scoreLevelId = getUrlParamByName('scoreLevelId');
    scoreKindId && $('span[data-id=lblScoreLevel]').attr('data-echo-values', scoreKindId);
    scoreLevelId && $('span[data-id=lblScoreLevel]').attr('data-echo-values', scoreLevelId);
    setmedicaltype();
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        excel: 'excel',
        lat: 'lat',
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'excel', 'lat'], function () {
        let table = layui.table, layer = layui.layer, form = layui.form, laydate = layui.laydate, dropdown = layui.dropdown, element = layui.element, $ = layui.jquery, xmSelect = layui.xmSelect, excel = layui.excel, lat = layui.lat;
        let gLayerIndex = -1;
        let gPageNum = 1;
        let gCheckState, gCheckStates, gReason, gAction;
        const EVIDENCE_VERIFY_WARN_TIP = '该佐证材料照片中疑似未包含学分归属人姓名，请您关注并查验';
        /** 为佐证核验异常角标绑定 layer 悬停提示，避免表格单元格裁剪原生 title */
        function bindEvidenceVerifyWarnBadgeTips(tableView) {
            let tipIndex;
            tableView.find('.evidence-verify-warn-badge')
                .off('mouseenter.evidenceWarn mouseleave.evidenceWarn')
                .on('mouseenter.evidenceWarn', function () {
                    tipIndex = layer.tips(EVIDENCE_VERIFY_WARN_TIP, this, {tips: [2, '#808080']});
                })
                .on('mouseleave.evidenceWarn', function () {
                    layer.close(tipIndex);
                });
        }
        dogetconfig('fun_check_score_by_person_list,value_forbid_some_operate_on_last_year_data', null);
        window.solveReason = solveReason;
        window.reloadTable = reloadTable;
        $(function () {
            _lbl_inst.rdysel2 = lat.renderDayRangeSel('#rangeSel', aMonthAgo(), today(), {min: `1970-01-01`, max: `${_cur_year}-12-31`});
            _lbl_inst.rdysel_add2 = lat.renderDayRangeSel('#rangeSelAdd', null, null, {min: `1970-01-01`, max: `${_cur_year}-12-31`, btns: ['clear', 'now', 'confirm']});
            _lbl_inst.rdysel_check2 = lat.renderDayRangeSel('#rangeSelCheck', null, null, {min: `1970-01-01`, max: `${_cur_year}-12-31`, btns: ['clear', 'now', 'confirm']});
            setTimeout(() => {
                renderSingleScoreCheckTable();
            }, 400);
        });

        let getTableBar = function() {
            let barHtml = `<input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
            <a class="layui-btn layui-btn-sm" lay-event="sscTableExport">导出Excel</a>
            <a class='check_btn layui-btn layui-btn-sm' lay-event='batchApproveBtn'>审核通过</a>
            <a class='check_btn layui-btn layui-btn-sm layui-btn-danger' lay-event='batchRejectBtn'>审核不通过</a>`;
            if(localStorage.getItem("standardkind-id") !== "08e44437-5789-44e0-8ff8-9ecb00a6348a") {
                barHtml += `<a class="table-tips" style="color: red">提示：远程学分仅省卫健委和指定市县卫健委可在远程学分审核模块审核</a>`;
            }

            return `<div>${barHtml}</div>`;
        }

        table.on('tool(singleScoreCheckTable)', function (obj) {
            let rowData = obj.data;
            if ('personDetailBtn' === obj.event) {
                showPpdCheckModal(rowData);
            }
        });
        table.on('toolbar(singleScoreCheckTable)', function (obj) {
            let checkStatus = table.checkStatus(obj.config.id);
            let selectedRowArr = checkStatus.data;
            let event = obj.event;
            if ('sscTableExport' === event) {
                if (selectedRowArr.length < 1) {
                    layer.msg('选择要导出的数据');
                    return false;
                } else {
                    // table.exportFile('singleScoreCheckTable', selectedRowArr, 'csv');
                    lay_exportExcel('singleScoreCheckTable', '个人活动.xlsx', 'xlsx');
                }
            } else if ('batchApproveBtn' === event || 'batchRejectBtn' === event) {
                selectedRowArr = selectedRowArr.filter(row => !_tips.canCheck(row));
                if (!(selectedRowArr && selectedRowArr.length > 0)) {
                    layer.msg('先选择要审核的学分');
                    return false;
                }
                if (selectedRowArr.filter(row => _reHtName.includes(row.holdTypeName)).length > 0) {
                    layer.msg('勾选项目中包含远程学分，请取消勾选后再审核');
                    return false;
                }
                let scoreIds = selectedRowArr.map(selectedRow => selectedRow.scoreIds).join(",");
                // let scoreIdTypeMap = scoreIds.split(',').map(scoreId => {
                //     let res = {};
                //     res[scoreId] = 1;
                //     return res;
                // }).reduce((a, b) => {
                //     $.extend(a, b);
                //     return a;
                // });
                let msiList;
                let params;
                if ('batchApproveBtn' === obj.event) {
                    gReason = '';
                    gLayerIndex = layer.open({
                        type: 2,
                        shade: 0.4,
                        shadeClose: true,
                        title: '审核意见',
                        content: `./modals/ReasonModal.html?phase=3&state=3`,
                        area: ['800px', '600px'],
                        end: function (layero, index) {
                            if (ModalActionEnum.CONFIRM === gAction) {
                                msiList = scoreIds.split(',').map(scoreId => {
                                    return {
                                        'scoreId': scoreId,
                                        'scoreTypeVal': 1,
                                        'standardKindId': _standardKindId,
                                        'unitUserType': localStorage.getItem('unit-user-type'),
                                        'flowChainState': getFcsByCs(CheckStateEnum.APPROVE),
                                        'checkState': CheckStateEnum.APPROVE,
                                        'checkUnit': _unitId,
                                        'checkUser': _unitId,
                                        'checkMemo': gReason
                                    };
                                });
                                params = {
                                    'msiList': msiList,
                                    'action': 'approve-s1check',
                                    'fcs': getFcsByCs(CheckStateEnum.APPROVE),
                                    'fp': fp,
                                    'userId': _userId,
                                };
                                docheckbatchs1(params);
                            }
                        }
                    });
                } else if ('batchRejectBtn' === obj.event) {
                    gReason = '';
                    gLayerIndex = layer.open({
                        type: 2,
                        shade: 0.4,
                        shadeClose: true,
                        title: '不通过原因',
                        content: `./modals/ReasonModal.html?phase=3&state=2`,
                        area: ['800px', '600px'],
                        end: function (layero, index) {
                            if (ModalActionEnum.CONFIRM === gAction) {
                                msiList = scoreIds.split(',').map(scoreId => {
                                    return {
                                        'scoreId': scoreId,
                                        'scoreTypeVal': 1,
                                        'standardKindId': _standardKindId,
                                        'unitUserType': localStorage.getItem('unit-user-type'),
                                        'flowChainState': getFcsByCs(CheckStateEnum.REJECT),
                                        'checkState': CheckStateEnum.REJECT,
                                        'checkUnit': _unitId,
                                        'checkUser': _unitId,
                                        'checkMemo': gReason,
                                    };
                                });
                                params = {
                                    'msiList': msiList,
                                    'action': 'reject-s1check',
                                    'fcs': getFcsByCs(CheckStateEnum.REJECT),
                                    'fp': fp,
                                    'userId': _userId,
                                };
                                docheckbatchs1(params);
                            }
                        }
                    });
                }
            }
        });
        form.on('select(csSelector)', function (data) {
            gPageNum = 1;
        });
        function solveReason(reason, action) {
            gReason = reason;
            gAction = action;
            layer.close(gLayerIndex);
        }
        function docheckbatchs1(params) {
            gLayerIndex = layer.load(1, {
                shade: [0.1, '#fff']
            });
            singleCheckBatchAction(params).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    layer.msg('已审核', {time: 500}, function () {
                        reloadTable();
                    });
                }
            }).catch(error => {
            }).finally(() => {
                // close loading
                layer.close(gLayerIndex);
            });
        }
        function confirm() {
            layer.confirm('确定要删除吗？', {
                title: '提示',
                btn: ['删除', '取消']
            }, function () {
                // confirm
            }, function () {
                // cancel
            });
        }
        function getSifter() {
            const cs = $('#csSelector').val();
            const csEq0 = (cs.length > 0) && (0 === toNum(cs));
            gCheckState = csEq0 ? null : cs;
            gCheckStates = csEq0 ? '0,4' : null;
            //
            const medicaltype = toNum($('select[name=medicaltype]').val());
            let titletypes = null, unittypes = null;
            if(_isHenan) unittypes = medicaltype === 1 ? '1,0' : (medicaltype === 2 ? '2' : null);
            else titletypes = medicaltype === 1 ? _titleTypes1 : (medicaltype === 2 ? _titleTypes2 : null);
            
            let scoreLevelIds = _lbl_inst.getVal('lblScoreLevel_ids');
            if(!scoreLevelIds) {
                let tempArr = lat.getAllIds(_lbl_inst.lblScoreLevel.options.data);
                if(tempArr.length > 0) {
                    scoreLevelIds = tempArr.join(',');
                }
            }

            return {
                'standardKindId': _standardKindId,
                'unitId': pickUnitId(_unitId),
                'depth': getDepthPlus(),
                'scoreTypeVal': 1,
                'showReScore': true,
                'projName': $('#projNameInput').val(),
                'checkState': gCheckState,
                'checkStates': gCheckStates,
                'startDate': toDayHeader(lat.parseDayRange('#rangeSel').start),
                'endDate': toDayTail(lat.parseDayRange('#rangeSel').end),
                'startDateAdd': toDayHeader(lat.parseDayRange('#rangeSelAdd').start),
                'endDateAdd': toDayTail(lat.parseDayRange('#rangeSelAdd').end),
                'startDateCheck': toDayHeader(lat.parseDayRange('#rangeSelCheck').start),
                'endDateCheck': toDayTail(lat.parseDayRange('#rangeSelCheck').end),
                'scoreLevelIds': scoreLevelIds,
                'holdTypes': _lbl_inst.getVal('lblActivityForm_ids'),
                'medicalType': _lbl_inst.getVal('lblMedicalSystem_id'),
                // 'unitTypes': unittypes,
                'titleTypes': titletypes,
                'downId': PseudoNull.UUID,
                // 'statex': '___3',
            };
        }
        function toggleCheckBtn(val) {
            // if ('210000,218000'.includes(_unitId))
            if (val && 0 === Number(val)) {
                $('.check_btn').show();
            } else {
                $('.check_btn').hide();
            }
        }
        function renderSingleScoreCheckTable() {
            table.render({
                id: 'singleScoreCheckTable',
                elem: '#singleScoreCheckTable',
                height: 'full-150',
                url: huayi_projectscore_url + 's1/proj/page',
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                page: true,
                limit: getPageSize(),
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    gPageNum = res.data.pageNum;
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                toolbar: getTableBar(),
                defaultToolbar: [],
                cols: [[
                    {
                        title: '选择', width: 60, align: 'center', fixed: 'left', templet: function (data) {
                            let m = _tips.canCheck(data);
                            if (m) return `<img src="/pages/mod/img/disableIcon.png" style="width:24px;" alt="${m}" onmouseenter="showTips(this)" onmouseleave="closeTips()"/>`;
                            else return `<input type="checkbox" name="layTableCheckbox" lay-skin="primary">`;
                        }
                    },
                    {title: '人员明细', width: 140, align: 'center', fixed: 'left', templet: '#personDetailCell'},
                    {field: 'studyDate', title: '活动日期', minWidth: 120, align: 'center', fixed: 'left', sort: true},
                    {field: 'projName', title: '活动名称', minWidth: 300, align: 'center', fixed: 'left', sort: true},
                    {field: 'projNo', title: '项目编号', minWidth: 160, align: 'center', sort: true},
                    {field: 'extdata', title: '详细信息', minWidth: 160, align: 'center', sort: true, templet: data => _txt.ext__data(data)},
                    {field: 'scoreLevelName', title: projectLabels.lblScoreLevel, minWidth: 230, align: 'center', sort: true},
                    {field: 'knowledgeName', title: '学科', minWidth: 120, align: 'center', sort: true},
                    {field: 'holdTypeName', title: projectLabels.lblActivityForm, minWidth: 120, align: 'center', sort: true},
                    {field: 'medicalType', title: projectLabels.lblMedicalSystem, minWidth: 120, align: 'center', sort: true, templet: data => _txt.medicalType(data.medicalType)},
                    {field: 'score', title: '学分', minWidth: 80, align: 'center', sort: true},
                    {field: 'period', title: '学时', minWidth: 80, align: 'center', sort: true},
                    {field: 'teachUnit', title: '举办单位', minWidth: 160, align: 'center', sort: true, templet: data => _txt.holdUnit(data)},
                    {field: 'personCnt', title: '人数', minWidth: 80, align: 'center', sort: true}
                ]],
                data: [],
                done: function (res, curr, count) {
                    toggleCheckBtn($('#csSelector').val());
                    gPageNum = curr;
                    let tableView = this.elem.next();
                    for (let i = 0; i < res.data.length; i++) {
                        if (res.data[i].evidenceNameVerifyAbnormal) {
                            tableView.find('tr[data-index="' + i + '"]').addClass('score-evidence-name-abnormal');
                        }
                    }
                    bindEvidenceVerifyWarnBadgeTips(tableView);
                }
            });
        }
        function reloadTable() {
            table.reload('singleScoreCheckTable', {
                where: getSifter(),
                page: {
                    curr: gPageNum
                }
            });
        }
        function showPpdCheckModal(rowData) {
            localStorage.setItem('tmp_score_ids', rowData.scoreIds);
            let obj = {
                scoreTypeVal: 1,
                projNo: rowData.projNo,
                projName: rowData.projName,
                studyDate: rowData.studyDate,
                timestamp: new Date().getTime()
            };
            // console.info(JSON.stringify(obj));
            layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: true,
                title: '人员明细',
                content: './modals/SingleScoreModal.html?' + jsonStr2urlParam(JSON.stringify(obj)),
                area: ['100%', '100%'],
                end: function (layero, index) {
                    reloadTable();
                }
            });
        }
    });
</script>

        background: #fff1f0 !important;

        margin-left: 6px;
        width: 16px;
        height: 16px;
        line-height: 16px;
        border-radius: 50%;
        text-align: center;
        background: #ff4d4f;
        color: #fff;
        font-size: 12px;
        cursor: help;
