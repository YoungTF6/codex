<script>
    let _cmeStandardKindId = localStorage.getItem("standardkind-id");
    const isGuangDong = StandardKind.GUANG_DONG == _cmeStandardKindId;
    const cycleOperationWidth = isGuangDong ? 360 : 220;
    const _isjilin = 'acd09b62-333b-4aee-934f-9ec500a9d46d' === _standardKindId;
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        opTable: 'opTable/opTable',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'opTable', 'lat'], function () {
        let table = layui.table, layer = layui.layer, form = layui.form, laydate = layui.laydate, dropdown = layui.dropdown, element = layui.element, $ = layui.jquery, xmSelect = layui.xmSelect, opTable = layui.opTable, lat = layui.lat;
        let cycleTable;
        let gLayerIndex = -1;
        let modalAction = ModalActionEnum.CREATE;
        const _projId = getOrDefault(getUrlParamByName('projId'), '30c09c6d-7787-5efd-f750-9415f9bacfbf');
        const _projPeriod = getOrDefault(getUrlParamByName('projPeriod'), '1');
        const _cmeYear = getOrDefault(getUrlParamByName('cmeYear'), new Date().getFullYear());
        const _userType = localStorage.getItem('user-type');
        const GUANGDONG_MAX_CYCLE_DAYS = 5;
        const GUANGDONG_MAX_CYCLE_DAYS_ERROR = '活动的起止时间不能超过5天';
        let projectVo = {};
        let cycleVoList = [];
        let gEditingDownId = '';
         const   _standardKindId = localStorage.getItem('standardkind-id'),
                _isZheJiang     = StandardKind.ZHE_JIANG ===_standardKindId;
        window.qsqpass = qsqpass;
        const HAINAN_CYCLE_DURATION_ERROR = '举办周期时长不能小于活动预设小时数，请重新设置。';
        const HAINAN_COURSE_TOTAL_ERROR = '单一举办周期下课程总时长不能小于活动预设小时数，请重新设置。';
        function getCycleDurationHours(startDate, endDate) {
            if (!startDate || !endDate) {
                return 0;
            }
            let startMoment = moment(startDate);
            let endMoment = moment(endDate);
            if (!startMoment.isValid() || !endMoment.isValid()) {
                return 0;
            }
            return endMoment.diff(startMoment, 'hours', true);
        }
        function getCycleCourseTotalHours(teachVoList) {
            if (!Array.isArray(teachVoList) || 0 === teachVoList.length) {
                return 0;
            }
            return teachVoList.reduce((total, courseVo) => total + Number(courseVo.period || 0), 0);
        }
        function validateHainanCycleCourseTotal() {
            let presetHours = Number(_projPeriod || 0);
            if (!_isHainan || !(presetHours > 0)) {
                return true;
            }
            let invalidCycle = (cycleVoList || []).find(cycleVo => getCycleCourseTotalHours(cycleVo.teachVoList) < presetHours);
            if (invalidCycle) {
                lat.failMsg(HAINAN_COURSE_TOTAL_ERROR);
                return false;
            }
            return true;
        }
        // 不使用 laydate 的 min/max，避免历史值被初始化清空；改为面板渲染后补禁用态。
        const todayStartTime = new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate()).getTime();
        const yearStartTime = new Date(Number(_cmeYear), 0, 1).getTime();
        const yearEndTime = new Date(Number(_cmeYear), 11, 31, 23, 59, 59).getTime();

        function disablePastDateCells() {
            // laydate 面板 DOM 在切换年月后会重新渲染，稍微延后再给过去日期补禁用态。
            setTimeout(function () {
                $('.layui-laydate-content td[lay-ymd]').each(function () {
                    let $td = $(this);
                    let ymd = $td.attr('lay-ymd');
                    if (!ymd) {
                        return;
                    }
                    let parts = ymd.split('-');
                    let cellTime = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2])).getTime();
                    let beforeMinDate = cellTime < yearStartTime;
                    let afterMaxDate = cellTime > yearEndTime;
                    let beforeToday = (isGuangDong || _isZheJiang) && cellTime < todayStartTime;
                    $td.toggleClass('laydate-disabled', beforeMinDate || afterMaxDate || beforeToday);
                });
            }, 10);
        }

        function renderCycleDateTimePicker(options) {
            return laydate.render($.extend({
                format: 'yyyy-MM-dd HH:mm',
                trigger: 'click',
                type: 'datetime',
                fullPanel: true,
                btns: ['clear', 'confirm'],
                // 初次打开和切换年月时都重新置灰过去日期。
                ready: function () {
                    disablePastDateCells();
                },
                change: function () {
                    disablePastDateCells();
                }
            }, options || {}));
        }

        layer.ready(function () {
            renderCycleDateTimePicker({
                elem: '#startDateSelector'
            });
            renderCycleDateTimePicker({
                elem: '#endDateSelector',
                change: function () {
                    disablePastDateCells();
                }
            });
        });
        $(function () {
            if (_isHainan) {
                $('#hainanCycleTip').show();
            }
            loadProjDetailById(_projId);
        });
        $('#preStepBtn').on('click', function () {
            if (!validateHainanCycleCourseTotal()) {
                return;
            }
            closeCurrModal();
            parent.showGroupProjModal(ModalActionEnum.EDIT, {"groupProjectId": _projId});
        });
        $('#backToListBtn').on('click', function () {
            if (!validateHainanCycleCourseTotal()) {
                return;
            }
            parent.refreshTable();
        });
        table.on('toolbar(groupProjCycleTable)', function (obj) {
            if ('openAll' === obj.event) {
                cycleTable.openAll();
                layer.msg("展开全部 isOpenAll: " + cycleTable.isOpenAll());
            } else if ('closeAll' === obj.event) {
                cycleTable.closeAll();
                layer.msg("关闭全部 isOpenAll: " + cycleTable.isOpenAll())
            } else if ('addCycle' === obj.event) {
                if (isGuangDong && cycleVoList && cycleVoList.length > 0) {
                    lat.failMsg('只能添加一个举办周期');
                    return;
                }
                modalAction = ModalActionEnum.CREATE;
                let cycleFormVal = {
                    'projId': _projId,
                    'downId': null,
                    'unitId': _unitId,
                    'startDate': '',
                    'endDate': ''
                };
                showCycleFormModal(cycleFormVal);
            }
        });
        // 1. 自定义时间有效性校验（精确到分钟）
        function isTimeValid(startStr, endStr) {
            if (!startStr || !endStr) return true;
            // 判断开始时间是否早于结束时间
            return moment(startStr).isBefore(moment(endStr));
        }

        // 2. 自定义时间重叠校验（精确到分钟）
        function isTimeOverlap(startStr, endStr, cycleArr) {
            if (!startStr || !endStr) return false;
            let newStart = moment(startStr);
            let newEnd = moment(endStr);

            return cycleArr.some(cycle => {
                let existStart = moment(cycle.startDate);
                let existEnd = moment(cycle.endDate);
                // 核心判断逻辑：只要新周期的开始早于旧周期的结束，并且新周期的结束晚于旧周期的开始，就判定为重叠
                return newStart.isBefore(existEnd) && newEnd.isAfter(existStart);
            });
        }
        function getCycleSpanDays(startStr, endStr) {
            if (!startStr || !endStr) {
                return 0;
            }
            let startMoment = moment(startStr).startOf('day');
            let endMoment = moment(endStr).startOf('day');
            if (!startMoment.isValid() || !endMoment.isValid()) {
                return 0;
            }
            return endMoment.diff(startMoment, 'days') + 1;
        }
        function validateGuangDongCycleRange(startStr, endStr) {
            if (!isGuangDong || !startStr || !endStr) {
                return;
            }
            if (getCycleSpanDays(startStr, endStr) > GUANGDONG_MAX_CYCLE_DAYS) {
                return GUANGDONG_MAX_CYCLE_DAYS_ERROR;
            }
        }

        //
        form.verify({
            startDate: function (value) {
                let endDay = $('#endDateSelector').val();
                if (endDay && !isTimeValid(value, endDay)) {
                    return '周期开始日期不能晚于周期结束日期';
                }
                let guangDongRangeMsg = validateGuangDongCycleRange(value, endDay);
                if (guangDongRangeMsg) {
                    return guangDongRangeMsg;
                }
                if (endDay) {
                    let cycleArr;
                    if (ModalActionEnum.CREATE === modalAction) {
                        cycleArr = JSON.parse(JSON.stringify(cycleVoList));
                    } else if (ModalActionEnum.EDIT === modalAction) {
                        cycleArr = cycleVoList.filter(cycleVo => cycleVo.downId !== gEditingDownId);
                    }
                    if (isTimeOverlap(value, endDay, cycleArr)) {
                        return '该时间范围内已存在周期';
                    }
                }
            },
            endDate: function (value) {
                let startDay = $('#startDateSelector').val();
                if (startDay && !isTimeValid(startDay, value)) {
                    return '周期开始日期不能晚于周期结束日期';
                }
                let guangDongRangeMsg = validateGuangDongCycleRange(startDay, value);
                if (guangDongRangeMsg) {
                    return guangDongRangeMsg;
                }
                if (startDay) {
                    let cycleArr;
                    if (ModalActionEnum.CREATE === modalAction) {
                        cycleArr = JSON.parse(JSON.stringify(cycleVoList));
                    } else if (ModalActionEnum.EDIT === modalAction) {
                        cycleArr = cycleVoList.filter(cycleVo => cycleVo.downId !== gEditingDownId);
                    }
                    if (isTimeOverlap(startDay, value, cycleArr)) {
                        return '该时间范围内已存在周期';
                    }
                }
            }
        });
        table.on('tool(groupProjCycleTable)', function (obj) {
            let cycleRowData = obj.data;
            debugger
            if ('editCycle' === obj.event) {
                if (isGuangDong && cycleRowData.hasHold) {
                    lat.failMsg('该周期已有考勤，不能操作');
                    return;
                }
                if (isGuangDong && cycleRowData.downloadLocked) {
                    lat.failMsg('课程已下载，当前批次仅可选择考勤机');
                    return;
                }
                if (qsqpass(cycleRowData)) {
                    lat.failMsg('举办前申请已提交，无法修改');
                } else {
                    modalAction = ModalActionEnum.EDIT;
                    gEditingDownId = cycleRowData.downId;
                    let cycleFormVal = {
                        'projId': _projId,
                        'unitId': _unitId,
                        'downId': cycleRowData.downId,
                        'startDate': cycleRowData.startDate,
                        'endDate': cycleRowData.endDate
                    };
                    showCycleFormModal(cycleFormVal);
                }
            } else if ('deleteCycle' === obj.event) {
                if (isGuangDong && cycleRowData.hasHold) {
                    lat.failMsg('该周期已有考勤，不能操作');
                    return;
                }
                if (isGuangDong && cycleRowData.downloadLocked) {
                    lat.failMsg('课程已下载，当前批次仅可选择考勤机');
                    return;
                }
                deleteCycle(cycleRowData);
            } else if ('addCourse' === obj.event) {
                if (isGuangDong && cycleRowData.hasHold) {
                    lat.failMsg('该周期已有考勤，不能操作');
                    return;
                }
                if (isGuangDong && cycleRowData.downloadLocked) {
                    lat.failMsg('课程已下载，当前批次不可维护课程');
                    return;
                }
                let courseFormVal = {
                    'projId': _projId,
                    'projPeriod': _projPeriod,
                    'occupiedPeriod': getOccupiedPeriod(cycleRowData.teachVoList, ''),
                    'downId': cycleRowData.downId,
                    'downStart': moment(cycleRowData.startDate, DateTimePattern.DAY).startOf('day').valueOf(),
                    'downEnd': moment(cycleRowData.endDate, DateTimePattern.DAY).endOf('day').valueOf(),
                    'occupiedCse': getOccupiedCse(cycleRowData.teachVoList, '')
                };
                showCourseModal(ModalActionEnum.CREATE, courseFormVal);
            } else if (obj.event == "choose") {
                let tid = layer.open({
                    title: "选择考勤机",
                    type: 2,
                    content: "/pages/project/cmeProjPosDownloadList.html?downId=" + obj.data.downId ,
                    area: ['80%', '67%'],
                    maxmin: true,
                    closeBtn: 1
                });
            }
        });
        form.on('submit(cycleFormSubmit)', function (data) {
            let create = ModalActionEnum.CREATE === modalAction;
            let edit = ModalActionEnum.EDIT === modalAction;
            let visit;
            let fields = data.field;
            fields.standardKindId = _standardKindId;
            let guangDongRangeMsg = validateGuangDongCycleRange(fields.startDate, fields.endDate);
            if (guangDongRangeMsg) {
                lat.failMsg(guangDongRangeMsg);
                return false;
            }
            if (_isHainan && getCycleDurationHours(fields.startDate, fields.endDate) < Number(_projPeriod || 0)) {
                lat.failMsg(HAINAN_CYCLE_DURATION_ERROR);
                return false;
            }

            if (isGuangDong && edit) {
                let oldCycleVo = cycleVoList.filter(cycleVo => cycleVo.downId === gEditingDownId)[0];
                let totalPeriod = oldCycleVo.teachVoList ? oldCycleVo.teachVoList.reduce((acc, c) => acc + Number(c.period), 0) : 0;
                let ds = moment(fields.startDate).startOf('day');
                let de = moment(fields.endDate).startOf('day');
                let days = de.diff(ds, 'days') + 1;
                if (totalPeriod > days * 6) {
                    lat.failMsg('讲授时长超过要求，请重新调整');
                    return false;
                }
            }
            
            if (create) {
                visit = huayi_projectscore_url + 'pgsi/gcy/create';
            } else if (edit) {
                visit = huayi_projectscore_url + 'pgsi/gcy/edit';
            }
            postAction(visit, fields).then((response) => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    let newCycleVo = jsonRes.data;
                    if (create) {
                        newCycleVo.firstCol = '课程列表';
                        newCycleVo.teachVoList = [];
                        cycleVoList.push(newCycleVo);
                        projectVo.cycleVoList = cycleVoList;
                    } else if (edit) {
                        let oldCycleVo = cycleVoList.filter(cycleVo => cycleVo.downId === newCycleVo.downId)[0];
                        oldCycleVo.startDate = newCycleVo.startDate;
                        oldCycleVo.endDate = newCycleVo.endDate;
                    }
                    cycleVoList.sort((a, b) => {
                        let bf = moment(a.startDate, DateTimePattern.SECOND).isBefore(moment(b.startDate, DateTimePattern.SECOND));
                        return bf ? -1 : 1;
                    });
                    layer.close(gLayerIndex);
                    renderCycleTable();
                    loadProjDetailById(_projId);
                } else {
                    lat.failMsg(jsonRes.msg);
                }
            }).catch(error => {
                lat.errorMsg('error:保存院内活动周期');
            });
            return false;
        });
        function loadProjDetailById(projId) {
            let visit = huayi_projectscore_url + 'pgsi/gproj/detail/' + projId;
            getAction(visit).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    projectVo = jsonRes.data;
                    cycleVoList = projectVo.cycleVoList ? projectVo.cycleVoList : cycleVoList;
                }
            }).catch(error => {
                lat.failMsg('error:加载项目详情');
            }).finally(() => {
                $('#projNo').html(projectVo.projNo);
                $('#projName').html(projectVo.projName);
                if (isGuangDong) {
                    $('#projPeriodScoreDiv').show();
                    let totalPeriod = 0;
                    if (cycleVoList && cycleVoList.length > 0) {
                        cycleVoList.forEach(cycle => {
                            if (cycle.teachVoList && cycle.teachVoList.length > 0) {
                                cycle.teachVoList.forEach(course => {
                                    totalPeriod += Number(course.period || 0);
                                });
                            }
                        });
                    }
                    let score = 0;
                    if (totalPeriod > 0 && totalPeriod < 6) score = 0.2;
                    else if (totalPeriod >= 6) {
                        score = Math.floor(totalPeriod / 6);
                        if (score > 5) score = 5;
                    }
                    $('#projPeriodLabel').html(totalPeriod);
                    $('#projScoreLabel').html(score);
                    
                    if (projectVo.period != totalPeriod || projectVo.score != score) {
                        projectVo.period = totalPeriod;
                        projectVo.score = score;
                        let hp = parent.location !== window.location;
                        if (hp && parent.lat && parent.lat.getFormVal) {
                            let correctVo = parent.lat.getFormVal('groupProjForm');
                            correctVo.period = totalPeriod;
                            correctVo.score = score;
                            correctVo.userUpdate = _unitId;
                            postAction(huayi_projectscore_url + 'pgsi/gproj/update', correctVo).then(res => {
                                if(res.data && res.data.success){
                                    console.log('学时学分自动同步更新成功');
                                } else {
                                    lat.failMsg('学分自动同步保存失败: ' + (res.data ? res.data.msg : '未知错误'));
                                }
                            });
                        } else {
                            // fall back to get details if no parent
                            getAction(huayi_projectscore_url + 'pgsi/gproj/get/' + _projId).then(getRes => {
                                if(getRes.data && getRes.data.success) {
                                    let correctVo = getRes.data.data;
                                    correctVo.period = totalPeriod;
                                    correctVo.score = score;
                                    correctVo.userUpdate = _unitId;
                                    postAction(huayi_projectscore_url + 'pgsi/gproj/update', correctVo).then(res => {
                                        if(res.data && res.data.success){
                                            console.log('学时学分自动同步更新成功');
                                        } else {
                                            lat.failMsg('学分自动同步保存失败: ' + (res.data ? res.data.msg : '未知错误'));
                                        }
                                    });
                                }
                            });
                        }
                    }
                }
                cycleVoList.forEach(cycle => cycle.firstCol = '课程列表');
                fillCycleDownloadLocked().finally(() => {
                    renderCycleTable();
                    cycleTable.openAll();
                });
            });
        }
        function fillCycleDownloadLocked() {
            cycleVoList.forEach(cycle => cycle.downloadLocked = false);
            if (!isGuangDong || !cycleVoList || cycleVoList.length === 0) {
                return Promise.resolve();
            }
            let queryList = cycleVoList.map(cycle => {
                if (!cycle.downId) {
                    cycle.downloadLocked = false;
                    return Promise.resolve();
                }
                let visit = huayi_projectscore_url + 'cmeProjPosDownloadList/isCourseDownloaded?downId=' + encodeURIComponent(cycle.downId);
                return getAction(visit).then(response => {
                    let jsonRes = response.data;
                    cycle.downloadLocked = !!(jsonRes && jsonRes.success && jsonRes.data === true);
                }).catch(() => {
                    cycle.downloadLocked = false;
                });
            });
            return Promise.all(queryList);
        }
        function renderCycleTable() {
            cycleTable = opTable.render({
                elem: '#groupProjCycleTable',
                id: 'groupProjCycleTable',
                height: 'full-175',
                page: false,
                limit: 20,
                openType: 1,
                isAloneColumn: false,
                toolbar: '#cycleTableToolbar',
                defaultToolbar: [],
                where: {},
                cols: [[
                    {
                        field: 'firstCol',
                        title: '展开全部',
                        align: 'center',
                        width: 160,
                        templet: () => '课程列表-----'
                    },
                    {title: '操作', align: 'center', width: cycleOperationWidth, templet: '#cycleOperation'},
                    {
                        field: 'batch',
                        title: '举办批次',
                        align: 'center',
                        templet: (data) => '第' + (data.LAY_INDEX + 1) + '批次'
                    },
                    {field: 'startDate', title: '举办开始日期', align: 'center'},
                    {field: 'endDate', title: '举办结束日期', align: 'center'},
                    {
                        field: 'hasHold',
                        title: '是否已举办',
                        align: 'center',
                        templet: (data) => data.hasHold ? '是' : '否'
                    },
                ]],
                openTable: function (cycleRowData) {
                    return renderCourseTable(cycleRowData)
                },
                onOpen: function (cycleRowData, rowIndex, rowDom, childTable) {
                    console.log("onopen:cycleRowData ");
                    console.log(cycleRowData);



                    table.on('tool(' + childTable.config.id + ')', function (obj) {
                        let courseRowData = obj.data;
                        if (isGuangDong && courseRowData.hasHold) {
                            lat.failMsg('该周期已有考勤，不能操作');
                            return;
                        }
                        if (isGuangDong && courseRowData.downloadLocked) {
                            lat.failMsg('课程已下载，当前批次不可维护课程');
                            return;
                        }
                        if ('editCourse' === obj.event) {
                            let courseFormVal = {
                                'projId': _projId,
                                'projPeriod': _projPeriod,
                                'occupiedPeriod': getOccupiedPeriod(cycleRowData.teachVoList, courseRowData.teachId),
                                'downId': cycleRowData.downId,
                                'teachId': courseRowData.teachId,
                                'downStart': moment(cycleRowData.startDate, DateTimePattern.DAY).startOf('day').valueOf(),
                                'downEnd': moment(cycleRowData.endDate, DateTimePattern.DAY).endOf('day').valueOf(),
                                'occupiedCse': getOccupiedCse(cycleRowData.teachVoList, courseRowData.teachId)
                            };
                            showCourseModal(ModalActionEnum.EDIT, courseFormVal);
                        } else if ('deleteCourse' === obj.event) {
                            deleteCourse(courseRowData);
                        }
                    });

                },
                data: cycleVoList
            });
        }
        function getOccupiedPeriod(teachVoList, escapeTeachId) {
            return teachVoList.filter(course => course.teachId !== escapeTeachId)
                .map(course => course.period)
                .reduce((accumulator, currentValue) => {
                    return accumulator + currentValue;
                }, 0);
        }
        function getOccupiedCse(teachVoList, escapeTeachId) {
            let targetCourseVoList = teachVoList.filter(teachVo => teachVo.teachId !== escapeTeachId);
            if (targetCourseVoList.length > 0) {
                let occupiedCseArr = targetCourseVoList.map(teachVo => {
                    return [{s: teachVo.startDate, e: teachVo.endDate}];
                }).reduce((ses, newSe) => {
                    return [...ses, ...newSe];
                });
                return JSON.stringify(occupiedCseArr);
            } else {
                return '';
            }
        }
        function renderCourseTable(cycleRowData) {
            let teachVoList = cycleRowData.teachVoList;
            if (teachVoList != null) {
                teachVoList.forEach(t => {
                    t.hasHold = cycleRowData.hasHold;
                    t.downloadLocked = cycleRowData.downloadLocked;
                });
            }
            return {
                elem: '#courseTable_' + cycleRowData.LAY_INDEX,
                id: 'courseTable_' + cycleRowData.LAY_INDEX,
                page: false,
                limit: 99,
                openVisible: false,
                where: {},
                cols: [[
                    {title: '操作', align: 'center', width: 160, templet: '#courseOperation'},
                    {field: 'startDate', title: '课程开始时间', width: 150, align: 'center', hide: isGuangDong || _isHainan},
                    {field: 'endDate', title: '课程结束时间', width: 150, align: 'center', hide: isGuangDong || _isHainan},
                    {field: 'teachSubject', title: '讲授题目', align: 'center'},
                    {field: 'teacherNames', title: '授课教师', align: 'center'},
                    {field: 'period', title: '时长', align: 'center'},
                ]],
                data: teachVoList,
                done: function () {
                }
            }
        }
        function showCycleFormModal(cycleFormVal) {
            let create = ModalActionEnum.CREATE === modalAction;
            let edit = ModalActionEnum.EDIT === modalAction;
            gLayerIndex = layer.open({
                type: 1,
                shade: 0.4,
                shadeClose: true,
                title: create ? '添加举办周期' : (edit ? '编辑举办周期' : ''),
                content: $('#cycleFormModal'),
                area: ['500px', '180px'],
                success: function (layero, index) {
                    form.val('cycleForm', cycleFormVal);
                },
                end: function () {
                    $('#cycleFormModal').hide();
                }
            });
        }
        function qsqpass(row) {
            return (_isHenan || isGuangDong) && '234'.includes(+row.qsqstate);
        }
        function deleteCycle(cycleRowData) {
            if (qsqpass(cycleRowData)) {
                lat.failMsg('举办前申请已提交，无法删除');
            } else if (cycleRowData.hasHold) {
                lat.failMsg('已有考勤或已授分，不可删除');
            } else {
                let msg = '确定删除' + cycleRowData.startDate + '至' + cycleRowData.endDate + '的周期吗？';
                if (cycleRowData.teachVoList && cycleRowData.teachVoList.length > 0) {
                    msg = '该周期有' + cycleRowData.teachVoList.length + '条课程信息，确定一起删除吗？';
                }
                gLayerIndex = layer.confirm(msg, {
                    title: '提示',
                    btn: ['删除', '取消']
                }, function () {
                    let visit = huayi_projectscore_url + 'pgsi/gcy/delete/' + cycleRowData.downId;
                    postAction(visit).then((response) => {
                        let responseData = response.data;
                        if (responseData.success) {
                            lat.okMsg('已删除');
                            let targetIndex;
                            cycleVoList.forEach((item, index) => {
                                if (item.downId === cycleRowData.downId) {
                                    targetIndex = index;
                                }
                            });
                            cycleVoList.splice(targetIndex, 1);
                            projectVo.cycleVoList = cycleVoList;
                            renderCycleTable();
                            parent.layer.close(gLayerIndex);
                        }
                    }).catch((error) => {
                        lat.errorMsg(getErrorMsg(error, 'error:删除院内活动周期'));
                    }).finally(() => {
                    });
                }, function () {
                    parent.layer.close(gLayerIndex);
                });
            }
        }
        function deleteCourse(courseRowData) {
            gLayerIndex = layer.confirm('确定删除课程' + courseRowData.teachSubject + '吗？', {
                title: '提示',
                btn: ['删除', '取消']
            }, function () {
                let visit = `${huayi_projectscore_url}pgsi/gco/delete/${courseRowData.downId}/${courseRowData.teachId}`;
                postAction(visit).then((response) => {   
                    let res = response.data;              
                    if (res.success) {
                        lat.okMsg('删除完成');
                        parent.refreshCycle();
                    } else {
                        lat.failMsg(res.msg);
                    }
                   
                }).catch((response) => {
                    lat.failMsg('删除课程失败');
                }).finally(() => {
                    //parent.layer.close(gLayerIndex);
                });
            }, function () {
                parent.layer.close(gLayerIndex);
            });
        }
        function showCourseModal(action, courseFormVal) {
            let haveParent = parent.location !== window.location;
            if (haveParent) {
                parent.showCourseModal(action, courseFormVal);
            } else {
                let create = ModalActionEnum.CREATE === action;
                let edit = ModalActionEnum.EDIT === action;
                layer.open({
                    type: 2,
                    shade: 0.4,
                    title: create ? '添加课程' : (edit ? '编辑课程' : ''),
                    content: './CourseModal.html?' + jsonStr2urlParam(JSON.stringify(courseFormVal)),
                    area: ['100%', '100%'],
                    success: function (layero, index) {
                    }
                });
            }
        }
    });
</script>
</html>
