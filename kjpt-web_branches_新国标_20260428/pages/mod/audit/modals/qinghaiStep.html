<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <div style="width: fit-content; margin: auto;">
            <table class="layui-table" id="log_table" lay-filter="log_table"></table>
        </div>
    </div>
</div>
</body>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let layer = layui.layer, table = layui.table, $ = layui.jquery;
        const _cmeYear = getOrDefault(getUrlParamByName('cmeYear'), '2024');
        const _comPersonId = getOrDefault(getUrlParamByName('comPersonId'), 'fffbb97d-c009-4975-a13f-ae0101045238');
        const _courseId = getOrDefault(getUrlParamByName("courseId"), 'fffbb97d-c009-4975-a13f-ae0101045238');
        layer.ready(function () {
            renderTable();
        });
        $(function () {
            getAction(`${huayi_sjwh_url}audit/qinghai/checkStep/${_courseId}/${_comPersonId}`).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    table.reload('log_table', {data: jsonRes.data});
                }
            }).catch(error => {
                layer.msg('error:加载审核步骤');
            }).finally(() => {
            });
        });
        const _scoreStateEnum = {
            '0': '未提交',
            '123': '已提交',
            '143': '地市审核通过',
            '153': '省委审核通过',
            '122': '审核不通过',
            '161': '推送成功',
            '162': '推送失败',
            '171': '提交人社成功',
            '172': '提交人社失败',
            Z_NOT: 0,
            Z_YET: 123,
            Z_CITY_OK: 143,
            Z_PROVINCE_OK: 153,
            Z_REJECT: 122,
        };
        function stateTxt(state, desc) {
            if ('162,172'.includes(state)) {
                return desc;
            }
            let ss;
            if (undefined === state) {
                ss = '0';
            } else {
                ss = String(state);
            }
            return _scoreStateEnum[ss];
        }
        function renderTable() {
            table.render({
                id: 'log_table',
                elem: '#log_table',
                page: false,
                limit: 99,
                cols: [[
                    {field: 'unitId', title: '单位编号', width: 90, align: 'center',},
                    {field: 'unitName', title: '单位名称', width: 200, align: 'center',},
                    {field: 'checkState', title: '审核状态', width: 240, align: 'center', templet: data => stateTxt(data.checkState, data.stateDesc)},
                    {field: 'checkDate', title: '时间', width: 164, align: 'center',},
                ]],
            });
        }
    });
</script>
