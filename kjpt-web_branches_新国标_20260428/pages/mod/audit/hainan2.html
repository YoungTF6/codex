<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <!-- row1 -->
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block">
                            <select name="cmeYear" id="cmeYearSelector">
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">达标状态</label>
                        <div class="layui-input-block">
                            <select name="passResult">
                                <option value=""></option>
                                <option value="1">达标</option>
                                <option value="0">不达标</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员状态</label>
                        <div class="layui-input-block">
                            <div id="personStateIdSelector" data-name="" style="width: 180px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline only_unit">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="personNo" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline only_unit">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline only_gov">
                        <label class="layui-form-label">单位编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="unitId" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline only_gov">
                        <label class="layui-form-label">单位名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="unitName" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit onclick='loadTransferData("query")'
                                style="margin:auto 0">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea2" style="">
            <!-- row1 -->
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>校验负责人</label>
                        <div class="layui-input-block">
                            <input type="text" name="operatorName" lay-verify="" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">文件名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="fileName" lay-verify="" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit
                                onclick="exportHaiNanXlsx()" style="margin:auto 0">
                            <i class="layui-icon layui-icon-export layuiadmin-button-btn"></i>导出Excel
                        </button>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit
                                onclick="exportHaiNanPdf()" style="margin:auto 0">
                            <i class="layui-icon layui-icon-export layuiadmin-button-btn"></i>导出PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- gov: 单位 单位 单位-->
        <div id="tree_transfer_container_gov" class="tree_transfer_container" style="background: #fff; display: none">
            <div id="tree_box_unit" class="tree_box">
                <div>
                    <span>选择单位</span>
                    <div class="search_box">
                        <input type="text" autocomplete="off" placeholder="输入关键字"/>
                        <i class="layui-icon layui-icon-search"></i>
                    </div>
                </div>
                <div id="tree_content_unit" class="tree_content"></div>
            </div>
            <div id="transfer_box_unit" class="transfer_box"></div>
        </div>
        <!-- unit: 科室 人员 人员-->
        <div id="tree_transfer_container_unit" class="tree_transfer_container" style="background: #fff; display: none">
            <div id="tree_box_dept" class="tree_box">
                <div>`
                    <span>选择科室</span>
                    <div class="search_box">
                        <input type="text" autocomplete="off" placeholder="输入关键字"/>
                        <i class="layui-icon layui-icon-search"></i>
                    </div>
                </div>
                <div id="tree_content_dept" class="tree_content"></div>
            </div>
            <div id="transfer_box_person" class="transfer_box"></div>
        </div>
    </div>
</div>
<div style="display: none" id="dldp">
    <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
        <div class="layui-progress-bar" lay-percent="0%"></div>
    </div>
</div>
</body>
