<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>

    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <style>
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
    </style>
    <style>
        .layui-layer-content {
            overflow: visible !important;
        }
        .tab_others {
            width: 100px !important;
        }
        .tab_this {
            width: 100px !important;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }
        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }
        .layui-treeSelect .ztree li {
            line-height: initial !important;
            padding: 2px 0;
        }
        .layui-table-tool-temp {
            padding-right: 10px;
        }
    </style>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <!-- row1 -->
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block" style="width:186px;">
                            <select name="cmeYear" id="cmeYearSelector" lay-verify="" lay-filter="cmeYear">
                            </select>
                            <input type="hidden" name='startDate' id="startDate"/>
                            <input type="hidden" name='endDate' id="endDate"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <div class="layui-form-mid layui-word-aux">
                            <label id="lb_cme_year_range"></label>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="personNo" lay-verify="" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" lay-verify="" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline only_unit">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block">
                            <div id="deptIdSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员状态</label>
                        <div class="layui-input-block">
                            <select name="personStateId" id="personStateIdSelector">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit onclick="reloadTable()"
                                style="margin:auto 0">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="fujianPersonTable" lay-filter="fujianPersonTable" style="margin: 0;"></table>
        </div>
    </div>
</div>
<div style="display: none" id="dldp">
    <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
        <div class="layui-progress-bar" lay-percent="0%"></div>
    </div>
</div>
</body>
<!-- Operation Cell -->
<script type="text/html" id="operationCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="personScoreDetail">详细情况明细</a>
    <a class="layui-btn layui-btn-xs btn-row" lay-event="print">导出</a>
</script>
<!-- toolbar -->
<script type="text/html" id="apTableToolbar">
    <div class="layui_mess">
        <div class="layui_display">
            <div class="layui-input-inline">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选"
                       lay-filter="layTableAllChoose">
            </div>
            <li class="layui-input-inline" style="margin-left: 10px">
                <span style="color:red">所选年度不达标人员无法打印学分登记表</span>
            </li>
            <li class="layui-input-inline" style="margin-left: 10px">
                <a class="layui-btn layui-btn-xs btn-row a-pdf-icon margin-left:30px;" lay-event="downAuditPdfBatch">导出PDF</a>
            </li>
        </div>
    </div>
</script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat', 'treeSelect'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let treeSelect = layui.treeSelect;
        let lat = layui.lat;
        let gTitleTreeData = [];
        let gTitleTreeSelector;
        let gLayerIndex = -1;
        let gDeptTreeData;
        let gDeptTreeSelector;
        window.reloadTable = reloadTable;
        $(function () {
            lat.verifyTenancy(_isFujian);
            watermark.set('福建省卫生健康委员会');
            lat.renderCmeYear2('#cmeYearSelector');
            getDeptTreeData(_unitId, 9).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gDeptTreeData = jsonRes.data;
                    gDeptTreeSelector = lat.renderDeptTreeSelector('#deptIdSelector', gDeptTreeData);
                }
            }).catch(error => {
                layer.msg('error:加载deptTreeData');
            }).finally(() => {
                //
            });
            getTitleTreeData().then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gTitleTreeData = jsonRes.data;
                }
            }).catch(error => {
                layer.msg('error:加载titleTreeData');
            }).finally(() => {
                gTitleTreeSelector = lat.renderTitleTreeSelector('#titleTreeSelector', gTitleTreeData, {
                    tree: {
                        strict: false,
                        clickExpand: true
                    }
                });
            });
            lat.renderPersonState('#personStateIdSelector');
            setTimeout(() => {
                renderFujianPersonTable();
            }, 1000);
        });
        function renderDept() {
            // 科室树初始化
            var deptTreeSelect = treeSelect.render({
                elem: '#deptIdInput',
                data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + _unitId,
                type: 'get',
                search: true,
                style: {
                    folder: { // 父节点图标
                        enable: true // 是否开启：true/false
                    },
                    line: { // 连接线
                        enable: true // 是否开启：true/false
                    }
                }
            });
        }
        form.on('select(cmeYear)', function (data) {
            let startDate = $(data.elem).find("option[value='" + data.value + "']").attr("startDate");
            let endDate = $(data.elem).find("option[value='" + data.value + "']").attr("endDate");
            $("#startDate").val(startDate);
            $("#endDate").val(endDate);
            $("#lb_cme_year_range").text(startDate + ' 至 ' + endDate);
        });
        table.on('tool(fujianPersonTable)', function (obj) {
            let rowData = obj.data;
            if ('personScoreDetail' === obj.event) {
                showPsdAuditModal(rowData);
            } else if ('print' === obj.event) {
                downloadAuditPdf(rowData.comPersonId, $('#cmeYearSelector').val());
            }
        });
        table.on('toolbar(fujianPersonTable)', function (obj) {
            if ('downAuditPdfBatch' === obj.event) {
                let selectedRowArr = table.checkStatus(obj.config.id).data;
                if (selectedRowArr.length < 1) {
                    layer.msg('先选择人员');
                } else {
                    let selectedComPersonIds = selectedRowArr.map(item => item.comPersonId).join(',');
                    let selectedPersonNames = selectedRowArr.map(item => item.personName).join('、');
                    if (selectedRowArr.length > 5) {
                        selectedPersonNames = '所选人员';
                    }
                    gLayerIndex = layer.confirm('导出' + selectedPersonNames + '的学分证书？', {
                        title: '提示',
                        btn: ['确定', '取消']
                    }, function () {
                        // confirm
                        downloadAuditPdf(selectedComPersonIds, $('#cmeYearSelector').val());
                        layui.layer.close(gLayerIndex);
                    }, function () {
                        // cancel
                    });
                }
            }
        });
        function downloadAuditPdf(comPersonIds, cmeYear) {
            let visit = huayi_sjwh_url + 'audit/pdf/down'; // 福建-1 comPersonIds
            // visit = `${_pdp}/kjpt_tmp/audit/pdf/down`;
            let params = {
                'pdfType': 1, // year
                'standardKindId': _standardKindId,
                'comPersonIds': comPersonIds,
                'cmeYear': cmeYear,
                'cmeYears': cmeYear,
                'personCmeYear': cmeYear,
                'unitId': _unitId,
                'depth': _depth
            }
            lat.downloadWithProgress(visit, params, '学分登记表.pdf');
        }
        function showPsdAuditModal(personRowData) {
            layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: true,
                title: '详细情况明细',
                content: './modals/AuditScoreDetailModal.html?comPersonId=' + personRowData.comPersonId + '&startDate=' + $("#startDate").val() + '&endDate=' + $("#endDate").val(),
                area: ['100%', '100%']
            });
        }
        function renderFujianPersonTable() {
            table.render({
                elem: '#fujianPersonTable',
                id: 'fujianPersonTable',
                page: true,
                height: 'full-178',
                url: huayi_sjwh_url + 'audit/common/person/page/last',
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                toolbar: '#apTableToolbar',
                defaultToolbar: [],
                cols: [[
                    {title: '选择', width: 60, align: 'center', fixed: 'left', type: 'checkbox'},
                    {field: 'personNo', title: '人员编号', minWidth: 135, align: 'center', sort: true},
                    {field: 'personName', title: '姓名', minWidth: 115, align: 'center', sort: true},
                    {field: 'deptName', title: '科室', minWidth: 150, align: 'center', sort: true},
                    {field: 'titleName', title: '职称', minWidth: 120, align: 'center', sort: true},
                    {
                        field: 'sex',
                        title: '性别',
                        width: 73,
                        align: 'center',
                        sort: true,
                        templet: (data) => genderFromIdCardNo(data.certId)
                    },
                    {
                        field: 'birthday',
                        title: '出生日期',
                        width: 125,
                        align: 'center',
                        sort: true,
                        // templet: function (data) {
                        //     // return data.certId;
                        //     return birthdayFromIdCardNo(data.certId);
                        // }
                    },
                    {field: 'personStateName', title: '状态', minWidth: 90, align: 'center', sort: true},
                    {
                        field: 'passResult',
                        title: '达标结果',
                        minWidth: 90,
                        align: 'center',
                        sort: true,
                        templet: (data) => PassResultEnum[data.passResult]
                    },
                    {title: '操作', minWidth: 200, align: 'center', templet: '#operationCell'},
                ]]
            });
        }
        function reloadTable() {
            table.reload('fujianPersonTable', {
                where: getSifter()
            });
        }
        function getSifter() {
            return {
                unitId: _unitId,
                depth: _depth,
                scoreTypeVal: 7,
                cmeYear: $('#cmeYearSelector').val(),
                personNo: $('input[name=personNo]').val(),
                personName: $('input[name=personName]').val(),
                deptIds: idsFromTree(gDeptTreeSelector, gDeptTreeData, 'deptId'),
                titleIds: gTitleTreeSelector ? gTitleTreeSelector.getValue('valueStr') : '',
                personStateId: $('#personStateIdSelector').val(),
                standardKindId: _skId,
                ifAvail: 1,
                passResult: 1
            };
        }
    });
</script>
<style>
    .a-pdf-icon {
        background: transparent url(/img/icon_pdf.gif) center left no-repeat;
        padding-left: 18px;
    }
</style>
</html>
