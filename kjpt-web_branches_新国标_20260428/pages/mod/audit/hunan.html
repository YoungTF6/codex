<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>audit.hunan</title>
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <!--<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">-->

    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->

    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>

    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">

    <!-- base -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>

    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script><script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>

    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .layui-table-tool-temp {
            padding-right: 0;
        }
    </style>
</head>
<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card">

        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">

                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block">
                            <select name="cmeYear">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>

                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label only_unit hide">科室</label>
                        <label class="layui-form-label only_gov hide">单位</label>
                        <div class="layui-input-block">
                            <div id="udIdSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="tel" name="personNo" placeholder="请输入" autocomplete="off" class="layui-input"/>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label">人员姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" placeholder="请输入" autocomplete="off" class="layui-input"/>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label">身份证号</label>
                        <div class="layui-input-block">
                            <input type="tel" name="certId" placeholder="请输入" autocomplete="off" class="layui-input"/>
                        </div>
                    </div>

                    <!--<div class="layui-inline">-->
                    <!--    <label class="layui-form-label">达标结果</label>-->
                    <!--    <div class="layui-input-block">-->
                    <!--        <select name="passResult">-->
                    <!--            <option value=""></option>-->
                    <!--            <option value="1">达标</option>-->
                    <!--            <option value="0">不达标</option>-->
                    <!--        </select>-->
                    <!--    </div>-->
                    <!--</div>-->

                    <div class="layui-inline">
                        <label class="layui-form-label">上报状态</label>
                        <div class="layui-input-block">
                            <select name="reportState" lay-filter="reportState">
                                <option></option>
                                <option value="0#39">未上报</option>
                                <option value="40#999">已上报</option>
                            </select>
                        </div>
                    </div>

                    <div class="layui-inline check_state_item">
                        <label class="layui-form-label">审核状态</label>
                        <div class="layui-input-block">
                            <select name="checkState">
                                <option value=""></option>
                                <option value="40" class="ph_unit_hide">市级待审核</option>
                                <option value="43" class="ph_unit_hide">市级审核通过</option>
                                <option value="42" class="ph_unit_hide">市级审核不通过</option>
                                <option value="50">省级待审核</option>
                                <option value="53">省级审核通过</option>
                                <option value="52">省级审核不通过</option>
                                <option value="99">已推送至人社</option>
                            </select>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label">上报日期</label>
                        <div class="layui-inline">
                            <div class="layui-input-inline">
                                <input type="text" autocomplete="off" id="rangeSel" class="layui-input" placeholder="至">
                            </div>
                        </div>
                    </div>

                </div>

                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm btnRounded" lay-submit onclick="refreshTable(true)">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>

            </div>

        </div>

        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="table_id" lay-filter="table_id" style="margin: 0;"></table>
        </div>

    </div>
</div>

</body>

<!-- toolbar -->
<script type="text/html" id="tableToolbar">
    <div class="layui_mess">
        <div class="layui_display">
            <div class="layui-input-inline">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
            </div>
            <a class="layui-btn layui-btn-sm only_unit hide" lay-event="report" style="margin-left: 10px;">上报</a>
            <a class="layui-btn layui-btn-sm only_gov hide" lay-event="approve" style="margin-left: 10px;">审核通过</a>
            <a class='layui-btn layui-btn-sm layui-btn-danger only_gov hide' lay-event='reject'>审核不通过</a>
        </div>
    </div>
</script>

<script type="text/javascript" src="/pages/mod/audit/js/hunan.js"></script>

<style>

</style>
</html>
