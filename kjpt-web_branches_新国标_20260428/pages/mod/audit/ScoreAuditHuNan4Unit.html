<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <title>年度个人活动学分考核 - 湖南（单位）</title>

    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">

    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script><script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <style>
        html {
            background-color: #ffffff;
        }
        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-layer-content {
            overflow: visible !important;
        }
        .tab_others {
            width: 100px !important;
        }
        .tab_this {
            width: 100px !important;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }
        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }
        .layui-treeSelect .ztree li {
            line-height: initial !important;
            padding: 2px 0;
        }
        .layui-table-tool-temp {
            padding-right: 10px;
        }

        #lb_cme_year_area {
            height: 38px;
        }
        #lb_cme_year, #lb_cme_year_range {
            display: inline-block;
            line-height: 38px;
            height: 38px;
        }
        #lb_cme_year {
            width: 75px; 
            position: relative;
            top: -2.5px;
        }
        #lb_cme_year_range {
            margin-left: 10px;
            width: calc(186.4px - 15px); 
            color: blue;
            position: relative;
            top: -2px;
        }
        xm-select, xm-select[size='small'], xm-select > .xm-label.single-row .scroll {
            min-height: 37px !important;
            line-height: 37px !important;
        }
        xm-select[size='small'] .xm-label .scroll .label-content  {
            min-height: 31px !important;
            line-height: 31px !important;
        }
        #deptIdSelector, #titleTreeSelector {
            width: 187px;
        }
        .layui-icon-search.layuiadmin-button-btn {
            position: relative;
            top: -2px;
        }
        .layui-form-checkbox span {
            font-size: 12px;
        }
        .table-tip {
            color: red;
            font-size: 12px;
            font-weight: bold;
        }
        .a-pdf-icon {
            background: transparent url(/img/icon_pdf.gif) center left no-repeat;
            padding-left: 18px;
            margin-right: 3px;
        }
        .layui-table-tool .layui-input-inline + .layui-input-inline {
            margin-left: 20px;
        }
        .layui-table-tool .layui-btn+.layui-btn {
            margin-left: 5px;
        }
        
        #dldp {
            display: none;
            padding: 15px;
        }
    </style>
</head>
<body class="body-area">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area" id="queryArea">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block" id="lb_cme_year_area">
                            <span id="lb_cme_year">
                                <select name="cmeYear" id="cmeYearSelector" lay-verify="" lay-filter="cmeYear"></select>
                                <input type="hidden" name='startDate' id="startDate"/>
                                <input type="hidden" name='endDate' id="endDate"/>
                            </span>
                            <span id="lb_cme_year_range"></span>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="personNo" lay-verify="" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" lay-verify="" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline only_unit">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block">
                            <div id="deptIdSelector" data-name=""></div>
                        </div>
                    </div>
                    <!-- <div class="layui-inline">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name=""></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员状态</label>
                        <div class="layui-input-block">
                            <select name="personStateId" id="personStateIdSelector">
                                <option value=""></option>
                            </select>
                        </div>
                    </div> -->
                </div>
                <div class="layui_display">
                    <div class="layui-inline btn-search-positon">
                        <button class="layui-btn layui-btn-sm" lay-submit onclick="reloadTable()" style="margin:auto 0">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="hunanPersonTable" lay-filter="hunanPersonTable" style="margin: 0;"></table>
        </div>
    </div>
</div>

<div id="dldp">
    <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
        <div class="layui-progress-bar" lay-percent="0%"></div>
    </div>
</div>
</body>

<!-- Operation Cell -->
<script type="text/html" id="operationCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="personScoreDetail">详细情况明细</a>
    <a class="layui-btn layui-btn-xs btn-row" lay-event="print">导出</a>
</script>

<!-- toolbar -->
<script type="text/html" id="apTableToolbar">
    <div class="layui_mess">
        <div class="layui_display">
            <div class="layui-input-inline">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
            </div>
            <li class="layui-input-inline">
                <span class="table-tip">为了减少您的等待时间，建议每次导出人数少于500人</span>
            </li>
            <li class="layui-input-inline">
                <a class="layui-btn layui-btn-xs btn-row" lay-event="downAuditScorePdfBatch"><i class="a-pdf-icon"></i>导出PDF</a>
                <a class="layui-btn layui-btn-xs btn-row" lay-event="downAuditPdfBatch"><i class="a-pdf-icon"></i>导出“年度合格证明”</a>
            </li>
        </div>
    </div>
</script>


<script>
    layui.config({
        base        : '/js/layui/ext/'
    }).extend({
        xmSelect    : 'xm-select',
        treeSelect  : 'treeSelect',
        lat         : 'lat'
    }).use([ 'table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat', 'treeSelect' ], () => {
        let table = layui.table,
            layer       = layui.layer,
            form        = layui.form,
            laydate     = layui.laydate,
            dropdown    = layui.dropdown,
            element     = layui.element,
            $           = layui.jquery,
            xmSelect    = layui.xmSelect,
            treeSelect  = layui.treeSelect,
            lat         = layui.lat;

        let gTitleTreeData      = [],
            gTitleTreeSelector,
            gLayerIndex         = -1,
            gDeptTreeData,
            gDeptTreeSelector;
            

        $(() => {
            pageResize();
            $(window).resize(e => pageResize());

            lat.verifyTenancy('13e2e203-7fdd-47ab-b90f-a1480112b5e5' === _standardKindId);

            /* 年度 */
            renderCmeYear();

            /* 科室 */
            getDeptTreeData(_unitId, 9).then(res => {
                let jsonRes = res.data;
                if (jsonRes.success) {
                    gDeptTreeData = jsonRes.data;
                    gDeptTreeSelector = lat.renderDeptTreeSelector('#deptIdSelector', gDeptTreeData);
                }
            })
            .catch(error => layer.msg('Error：加载科室数据失败', { icon: 7, time: 1500 }))
            .finally(() => {});

            /* 职称 */
            // getTitleTreeData().then(res => {
            //     let jsonRes = res.data;
            //     if (jsonRes.success) gTitleTreeData = jsonRes.data;
            // })
            // .catch(error => layer.msg('Error：加载职称数据失败', { icon: 7, time: 1500 }))
            // .finally(() => {
            //     gTitleTreeSelector = lat.renderTitleTreeSelector('#titleTreeSelector', gTitleTreeData, {
            //         tree: {
            //             strict      : false,
            //             clickExpand : true
            //         }
            //     });
            // });

            /* 人员状态 */
            // lat.renderPersonState('#personStateIdSelector');

            setTimeout(() => renderFujianPersonTable(), 1000);
        });

        
        function renderCmeYear() {
            getCmeYearOption().then(res => {
                let jsonRes = res.data;
                if (jsonRes.success) {
                    let str = '';
                    jsonRes.data.forEach((item, idx) => {
                        if (idx === 0) {
                            str = item.startDate + ' 至 ' + item.endDate;
                            $('#startDate').val(item.startDate);
                            $('#endDate').val(item.endDate);
                        }
                        let $option = $('<option></option>').val(item.cmeYear)
                            .attr('startDate', item.startDate).attr('endDate', item.endDate).text(item.cmeYear);
                        $('#cmeYearSelector').append($option);
                    });
                    $('#lb_cme_year_range').text(str);
                }
            })
            .catch(error => lat.errorMsg('Error：加载cmeYear'))
            .finally(() => layui.form.render('select'));
        };

        /* 科室树初始化 */
        function renderDept() {
            let deptTreeSelect = treeSelect.render({
                elem: '#deptIdInput',
                data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + _unitId,
                type: 'get',
                search: true,
                style: {
                    folder: { // 父节点图标
                        enable: true // 是否开启：true/false
                    },
                    line: { // 连接线
                        enable: true // 是否开启：true/false
                    }
                }
            });
        }

        form.on('select(cmeYear)', data => {
            let startDate   = $(data.elem).find("option[value='" + data.value + "']").attr('startDate'),
                endDate     = $(data.elem).find("option[value='" + data.value + "']").attr('endDate');
            $('#startDate').val(startDate);
            $('#endDate').val(endDate);
            $('#lb_cme_year_range').text(startDate + ' 至 ' + endDate);
        });


        table.on('tool(hunanPersonTable)', obj => {
            let rowData = obj.data;
            if ('personScoreDetail' === obj.event) showPsdAuditModal(rowData);
            else if ('print' === obj.event) downloadAuditPdf(rowData.comPersonId, $('#cmeYearSelector').val());
        });

        table.on('toolbar(hunanPersonTable)', obj => {
            if ('downAuditPdfBatch' === obj.event) {
                let selectedRowArr = table.checkStatus(obj.config.id).data;
                if (selectedRowArr.length < 1) layer.msg('请先选择人员', { icon: 7, time: 1500 });
                else {
                    let selectedComPersonIds    = selectedRowArr.map(item => item.comPersonId).join(','),
                        selectedPersonNames     = selectedRowArr.map(item => item.personName).join('、');
                    if (selectedRowArr.length > 5) selectedPersonNames = '所选人员';
                    gLayerIndex = layer.confirm('确认导出' + selectedPersonNames + '的学分证书？', {
                        title       : '提示',
                        btn         : ['确定', '取消'],
                        btnAlign    : 'c'
                    }, 
                    () => {
                        downloadAuditPdf(selectedComPersonIds, $('#cmeYearSelector').val());
                        layui.layer.close(gLayerIndex);
                    }, 
                    () => {});
                }
            }else if ('downAuditScorePdfBatch' === obj.event){
                let selectedRowArr = table.checkStatus(obj.config.id).data;
                if (selectedRowArr.length < 1) layer.msg('请先选择人员', { icon: 7, time: 1500 });
                else {
                    let selectedComPersonIds    = selectedRowArr.map(item => item.comPersonId).join(','),
                        selectedPersonNames     = selectedRowArr.map(item => item.personName).join('、');
                    if (selectedRowArr.length > 5) selectedPersonNames = '所选人员';
                    gLayerIndex = layer.confirm('确认导出' + selectedPersonNames + '的电子学分表？', {
                        title       : '提示',
                        btn         : ['确定', '取消'],
                        btnAlign    : 'c'
                    }, 
                    () => {
                        downloadScorePdf(selectedComPersonIds, $('#cmeYearSelector').val());
                        layui.layer.close(gLayerIndex);
                    }, 
                    () => {});
                }
            }
        });

        function downloadAuditPdf(comPersonIds, cmeYear) {
            let visit = huayi_sjwh_url + 'audit/pdf/down';
            let params = {
                'pdfType': 5, // year
                'standardKindId': _standardKindId,
                'comPersonIds': comPersonIds,
                'cmeYear': cmeYear,
                'cmeYears': cmeYear,
                'personCmeYear': cmeYear,
                'unitId': _unitId,
                'depth': _depth
            }
            lat.downloadWithProgress(visit, {
                'pdfType'           : 5, // year
                'standardKindId'    : _standardKindId,
                'comPersonIds'      : comPersonIds,
                'cmeYear'           : cmeYear,
                'cmeYears'          : cmeYear,
                'personCmeYear'     : cmeYear,
                'unitId'            : _unitId,
                'depth'             : _depth
            }, '年度学分合格证明.pdf');
        }

        function downloadScorePdf(comPersonIds, cmeYear) {
            let visit = huayi_sjwh_url + 'audit/pdf/down';
            lat.downloadWithProgress(visit, {
                'pdfType'           : 6, // year
                'standardKindId'    : _standardKindId,
                'comPersonIds'      : comPersonIds,
                'cmeYear'           : cmeYear,
                'cmeYears'          : cmeYear,
                'personCmeYear'     : cmeYear,
                'unitId'            : _unitId,
                'depth'             : _depth
            }, '年度电子学分表.pdf');
        }
        function showPsdAuditModal(personRowData) {
            layer.open({
                type        : 2,
                shade       : 0.4,
                shadeClose  : true,
                title       : '详细情况明细',
                content     : './modals/AuditScoreDetailModal.html' + 
                    '?comPersonId=' + personRowData.comPersonId + '&startDate=' + $('#startDate').val() + '&endDate=' + $('#endDate').val(),
                area        : [ '100%', '100%' ]
            });
        }

        function renderFujianPersonTable() {
            table.render({
                elem            : '#hunanPersonTable',
                id              : 'hunanPersonTable',
                page            : true,
                height          : 'full-120',
                url             : huayi_sjwh_url + 'audit/common/person/page/last',
                method          : 'post',
                contentType     : 'application/json',
                headers         : {
                    'Authorization' : localStorage.getItem('token'),
                    'KJPT-USER-ID'  : localStorage.getItem('user-id')
                },
                where           : getSifter(),
                parseData       : res => {
                    return {
                        'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg'   : res.message, // 解析提示文本
                        'count' : res.data.recordsTotal, // 解析数据长度
                        'data'  : res.data.records, // 解析数据列表
                        'page'  : res.data.pageNum, // 当前页
                        'limit' : res.data.pageSize // 每页条数
                    }
                },
                request         : {
                    pageName    : 'pageNum',  // 页码的参数名称，默认：page
                    limitName   : 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                toolbar         : '#apTableToolbar',
                defaultToolbar  : [],
                cols            : [ [
                    { fixed: 'left', title: '选择', width: 60, align: 'center', type: 'checkbox' },
                    // { fixed: 'left', title: '操作', width: 180, align: 'center', templet: '#operationCell' },
                    { fixed: 'left', field: 'personNo', title: '人员编号', width: 140, align: 'center', sort: true },
                    { fixed: 'left', field: 'personName', title: '姓名', width: 100, align: 'center', sort: true },
                    { field: 'deptName', title: '科室', minWidth: 150, align: 'center', sort: true },
                    { field: 'titleName', title: '职称', minWidth: 150, align: 'center', sort: true },
                    { field: 'sex', title: '性别', width: 75, align: 'center', sort: true,
                        templet: data => genderFromIdCardNo(data.certId) },
                    { field: 'birthday', title: '出生日期', width: 125, align: 'center', sort: true },
                    { field: 'personStateName', title: '状态', minWidth: 100, align: 'center', sort: true },
                    { field: 'passResult', title: '达标结果', minWidth: 100, align: 'center', sort: true,
                        templet: data => PassResultEnum[data.passResult] }
                ] ],
                limits          : [ 10, 50, 100, 200, 500 ],
            });
        }

        window.reloadTable = () => {
            table.reload('hunanPersonTable', {
                where: getSifter()
            });
        }

        function getSifter() {
            return {
                unitId          : _unitId,
                depth           : _depth,
                scoreTypeVal    : 7,
                cmeYear         : $('#cmeYearSelector').val(),
                personNo        : $('input[name=personNo]').val(),
                personName      : $('input[name=personName]').val(),
                deptIds         : idsFromTree(gDeptTreeSelector, gDeptTreeData, 'deptId'),
                titleIds        : gTitleTreeSelector ? gTitleTreeSelector.getValue('valueStr') : '',
                personStateId   : $('#personStateIdSelector').val(),
                standardKindId  : _skId,
                ifAvail         : 1,
                passResult      : 1
            };
        }


        window.pageResize = () => {
            watermark.set('湖南省卫生健康委员会');
        }

    });
</script>
</html>
