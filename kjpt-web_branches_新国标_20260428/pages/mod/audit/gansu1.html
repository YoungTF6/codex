<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>audit.gansu-1</title>
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <!--<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">-->
    <!-- base -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/api/base64.min.js"></script>
    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/vendor.gdcb47af.s51f94bf.js?a=123"></script>
    <style>
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
    </style>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <!-- row1 -->
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block">
                            <select name="cmeYear" lay-filter="cmeYear"></select>
                            <input type="hidden" name='startDate' id="startDate"/>
                            <input type="hidden" name='endDate' id="endDate"/>
                        </div>
                    </div>
                    <!--<div class="layui-inline">-->
                    <!--    <div class="layui-form-mid layui-word-aux">-->
                    <!--        <label id="lb_cme_year_range"></label>-->
                    <!--    </div>-->
                    <!--</div>-->
                    <div class="layui-inline">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="personNo" autocomplete="off" class="layui-input" value="">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline only_unit only_dept only_not_person hide">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block">
                            <div id="deptIdSelector" data-name="" style="width: 168px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">职称级别</label>
                        <div class="layui-input-block">
                            <select name="titleLevel">
                                <option></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name="" style="width: 168px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员状态</label>
                        <div class="layui-input-block">
                            <select name="personStateId">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">专业</label>
                        <div class="layui-input-block">
                            <div id="specTreeSelector" data-name="" style="width: 168px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">达标结果</label>
                        <div class="layui-input-block">
                            <select name="passResult">
                                <option value=""></option>
                                <option value="1">达标</option>
                                <option value="0">不达标</option>
                                <!--<option value="2">不计达标</option>-->
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_unit only_dept only_not_person hide">
                        <label class="layui-form-label">提交状态</label>
                        <div class="layui-input-block">
                            <select name="state">
                                <option value=""></option>
                                <option value="0">未提交</option>
                                <option value="1">已提交</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_gov only_not_person hide">
                        <label class="layui-form-label">审核状态</label>
                        <div class="layui-input-block">
                            <select name="statex">
                                <option value=""></option>
                                <option value="0">待审核</option>
                                <option value="3">审核通过</option>
                                <option value="2">审核不通过</option>
                            </select>
                        </div>
                    </div>
                    <input type="checkbox" name="all_pass" value="all_pass" title="终审通过" lay-skin="primary">
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit onclick="refreshTable({page:{curr:1}})"
                                style="margin:auto 0">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="table_id" lay-filter="table_id" style="margin: 0;"></table>
        </div>
    </div>
</div>
<div class="hide">
    <div type="text/html" id="promoteCell">
        {{# if(showPromoteSel(d)) { }}
        <select name="promote" id="promote_sel_{{d.LAY_TABLE_INDEX}}" idx="{{d.LAY_TABLE_INDEX}}"
                lay-filter="promote_sel" data-value={{d.promote}}>
            <option value="0">否</option>
            <option value="1">是</option>
        </select>
        {{# } }}
    </div>
</div>
<div style="display: none" id="dldp">
    <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
        <div class="layui-progress-bar" lay-percent="0%"></div>
    </div>
</div>
<div id="busubmit_modal" style="display: none;">
    <form class="layui-form" style="margin: 20px;">
        <div class="layui-form-item">
            <label class="layui-form-label" style="width: fit-content;"><span style="color: red; ">*&nbsp;</span>补审原因</label>
            <div class="layui-input-block">
                <textarea class="layui-textarea" name="buReason" placeholder="请输入" style="width: 460px; height: 200px; resize: none"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label" style="width: fit-content;"><span style="color: red; ">*&nbsp;</span>附件上传</label>
            <div class="layui-input-block">
                <p>附件的要求：请使用单位红头文件，详细说明上年度未完成年度学分审验的原因，单位继教医学教育负责人签字，并加盖单位手工印章。</p>
                <p>格式的要求：图片或PDF文件</p>
                <button type="button" id="btn_upload" style="width: 40px;">上传</button>
                <div id="file_box">
                    <!--<a class="layui-btn layui-btn-xs btn-normal-row js-file-name" onclick="viewfile(this)" data-url="url">a-1.PNG</a>-->
                    <!--<a class="layui-btn layui-btn-xs btn-danger-row" onclick="delfile(this)" data-id="123">移除</a>-->
                </div>
            </div>
        </div>
        <div class="layui-form-item" style="margin-top: 25px;">
            <div class="layui-input-block">
                <a class="layui-btn" id="btn_busubmit">提交</a>
            </div>
        </div>
    </form>
</div>
</body>
<script type="text/html" id="detailCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="detail">明细</a>
</script>
<script type="text/html" id="stepCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="step">查看</a>
</script>
<!-- toolbar -->
<script type="text/html" id="tableToolbar">
    <div style="position: relative; display: flex; justify-content: flex-start;">
        <div class="only_gov hide">
            <div class="layui-input-inline">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
            </div>
            <a class='layui-btn layui-btn-sm' lay-event='approve'>审核通过</a>
            <a class='layui-btn layui-btn-sm layui-btn-danger' lay-event='reject'>审核不通过</a>
        </div>
        <a class="table-tips" style="color: red">注：终审通过人员才可以导出年度审验登记表</a>
        <div style="position: absolute; right: -60px;">
            <li class="layui-input-inline only_unit" style="margin-left: 10px">
                <a class="layui-btn layui-btn-xs btn-row a-excel-icon" lay-event="down_excel">导出Excel</a>
            </li>
            <li class="layui-input-inline" style="margin-left: 10px">
                <a class="layui-btn layui-btn-xs btn-row a-pdf-icon" lay-event="down_pdf">导出终审通过人员登记表</a>
            </li>
        </div>
    </div>
</script>
<script type="text/javascript" src="/pages/mod/audit/js/gansu1.js"></script>
<style>
    /* select-cell */
    td:has(select) {
        padding: 0 !important;
    }
    td:has(select) .layui-table-cell {
        padding: 0;
        height: 100%;
        overflow: visible !important;
    }
    td:has(select) input {
        border: none !important;
        text-align: center;
    }
    td:has(select) input[value='否'] {
        color: #f56c6c !important;
    }
    td:has(select) input[value='是'] {
        color: #27b1a2 !important;
    }
    .layui-table-fixed .layui-table-body:has(.layui-form-selected) {
        overflow: visible;
    }
    /* icon */
    .a-excel-icon {
        background: transparent url(/img/icon_excel.gif) center left no-repeat;
        padding-left: 18px;
    }
    .a-pdf-icon {
        background: transparent url(/img/icon_pdf.gif) center left no-repeat;
        padding-left: 18px;
    }
</style>
</html>
