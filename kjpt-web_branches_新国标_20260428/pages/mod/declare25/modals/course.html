<body style="background-color: white;">
<iframe id="ifm_main" src=""></iframe>
</body>
<script>
    window.layerclose = function () {
        parent.layer.closeAll();
    }
    $(function () {
        let str = window.location.search;
        if (_isQinghai) {
            $('#ifm_main').attr('src', `/pages/mod/declare25/modals/course-qinghai.html${str}`);
        } else if (_isHenan){
            $('#ifm_main').attr('src', `/pages/mod/declare25/modals/course-henan.html${str}`);
        } else if (_isZhejiang){
            $('#ifm_main').attr('src', `/pages/mod/declare25/modals/course-zhejiang.html${str}`);
        } else if (_isGuangdong){
            $('#ifm_main').attr('src', `/pages/mod/declare25/modals/course-guangdong.html${str}`);
        } else if (_isHainan){
            $('#ifm_main').attr('src', `/pages/mod/declare25/modals/course-hainan.html${str}`);
        }else {
            $('#ifm_main').attr('src', `/pages/mod/declare25/modals/course-default.html${str}`);
        }
    });
</script>
<style>
    #ifm_main {
        width: 100%;
        height: 100%;
        border: none;
        margin: 0;
        padding: 0;
        position: absolute;
        top: 0;
        left: 0;
