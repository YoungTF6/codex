<!-- toolbar -->
<script type="text/html" id="tempProjTableToolbar">
    <div class="layui-input-inline">
        <input type="checkbox" name="selectFlag" value="cp" title="本页全选" lay-filter="selectFlag">
    </div>
    <a class="layui-btn layui-btn-sm" onclick="exportExcel()" style="float: right;">导出Excel</a>

<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table, layer = layui.layer, form = layui.form, laydate = layui.laydate, dropdown = layui.dropdown, element = layui.element, $ = layui.jquery, lat = layui.lat, xmSelect = layui.xmSelect;
        let gLayerIndex = -1, tempProjTable;
        let flagEnum = {'select': 'select', 'cp': 'cp', 'all': 'all'};
        let exportFlag = flagEnum.select;
        let gUnitTreeData = [], gUnitIdTreeSelector2;
        window.exportExcel = exportExcel;
        window.refreshTable = refreshTable;
        window.closeTmpModal = function (refresh) {
            layer.close(gLayerIndex);
            if (refresh) refreshTable({page: {curr: 1}});
        }
        table.on('tool(tempProjTable)', function (obj) {
            let rowData = obj.data;
            if (obj.event === 'assignUnit') {
                showAssignUnitModal(rowData.projId, rowData.startDate, rowData.endDate);
            } else if (obj.event === 'editTempProj') {
                showTmpModal(ModalActionEnum.EDIT, rowData)
            } else if (obj.event === 'delTempProj') {
                deleteTempProj(rowData);
            } else if (obj.event === 'toProjectDetail') {
                showTmpModal(ModalActionEnum.VIEW, rowData);
            }
        });
        form.on('checkbox(selectFlag)', function (data) {
            // let isChecked = $(this).prop('checked');
            let isChecked = data.elem.checked;
            exportFlag = isChecked ? data.elem.value : flagEnum.select;
            if (isChecked) {
                let that = data.elem;
                $.each($("input[name=selectFlag]"), function () {
                    if (this !== that) {
                        // $(data.elem).siblings('input').prop("checked", !isChecked);
                        $(this).prop('checked', !isChecked);
                    }
                })
            }
            $("input[name=select_all]").prop('checked', isChecked);
            $.each($("input[name=select_one]"), function (i, value) {
                if ($(this).prop('disabled') === false) {
                    $(this).prop("checked", isChecked);
                }
            });
            form.render();
        });
        form.on('submit(aufSubmit)', function (data) {
            let unitId = gUnitIdTreeSelector2.getValue('valueStr');
            if (!unitId) {
                lat.failMsg('先选择单位');
                return false;
            } else {
                let fields = data.field;
                fields.unitId = unitId;
                let visit = huayi_projectscore_url + 'tempProj/assign/unit';
                postAction(visit, fields).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        layer.msg('分配单位完成！', {
                            time: 1000,
                            end: function (o) {
                                layer.close(gLayerIndex);
                                refreshTable();
                            }
                        })
                    } else {
                        lat.failMsg(jsonRes.msg);
                    }
                }).catch((error) => {
                    lat.errorMsg('error:分配单位');
                });
                return false;
            }
        });
        layer.ready(function () {
            renderTempProjTable();
            renderUnitTree();
        });
        $(function () {
            $('#addTempProjBtn').on('click', function () {
                showTmpModal(ModalActionEnum.CREATE, {});
            });
        });
        function renderUnitTree() {
            getUnitTreeData(_unitId).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gUnitTreeData = jsonRes.data;
                }
            }).catch(error => {
                lat.errorMsg('error:加载unitTreeData');
            }).finally(() => {
                // lat.renderUnit('#unitIdSelector1');
                let ext = {
                    tree: {
                        clickExpand: true,
                    },
                    filterDone: function (val) {
                        gUnitIdTreeSelector2.changeExpandedKeys(!!val);
                    }
                };
                gUnitIdTreeSelector2 = lat.renderUnitTreeSelector('#unitIdSelector2', gUnitTreeData, ext);
            })
            form.render('select');
        }
        function getSifter() {
            return {
                unitId: _unitId,
                depth: 9,
                projNo: $('#projNoInput').val(),
                projName: $('#projNameInput').val(),
                unitName: $('#unitNameInput').val(),
                userCreate: _unitId,
                cmeYears: _lbl_inst.getVal('lblYear_id'), // gCmeYearsSel ? gCmeYearsSel.getValue('valueStr') : (new Date()).getFullYear()
                scoreLevelIds: _lbl_inst.getVal('lblProjectLevel_ids'),
                holdType: _lbl_inst.getVal('lblActivityForm_id'),
                projType: _lbl_inst.getVal('lblActivityType_id'),
                scoreType: _lbl_inst.getVal('lblActivityContent_id'),
            };
        }
        function refreshTable(ec) {
            let s = getSifter();
            let conf = {where: s};
            if (ec) $.extend(true, conf, ec);
            table.reload('tempProjTable', conf);
        }
        function renderTempProjTable() {
            tempProjTable = table.render({
                id: 'tempProjTable',
                elem: '#tempProjTable',
                url: huayi_projectscore_url + 'tempProj/page',
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                page: true,
                height: 'full-125',
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                toolbar: '#tempProjTableToolbar',
                defaultToolbar: [],
                cols: [[
                    {
                        width: 60,
                        align: 'center',
                        fixed: 'left',
                        templet: '#checkboxTpl',
                        // title: '<input type="checkbox" name="select_all" lay-skin="primary" lay-filter="select_all">'
                        title: '选择'
                    },
                    {align: 'center', title: '操作', templet: '#operationCell', minWidth: 190, fixed: 'left'},
                    {field: 'projNo', minWidth: 200, align: 'center', title: '项目编号', sort: true},
                    {
                        field: 'projName',
                        minWidth: 200,
                        align: 'center',
                        title: '项目名称',
                        sort: true,
                        templet: '#projNameTpl'
                    },
                    {field: 'cmeYear', minWidth: 80, align: 'center', title: '年度', sort: true},
                    {field: 'scoreLevelName', minWidth: 150, align: 'center', title: projectLabels.lblScoreLevel, sort: true},
                    {field: 'holdTypeName', minWidth: 150, align: 'center', title: projectLabels.lblActivityForm, sort: true},
                    {field: 'projType', minWidth: 150, align: 'center', title: projectLabels.lblActivityType, sort: true, templet: data => _txt.projType(data.projType)},
                    {field: 'scoreType', minWidth: 150, align: 'center', title: projectLabels.lblActivityContent, sort: true, templet: data => _txt.scoreType(data.scoreType)},
                    {field: 'unitName', minWidth: 150, align: 'center', title: '举办单位', sort: true, templet: (data) => (UnitUserTypeEnum.UNIT === Number(data.unitUserType) ? data.unitName : '')},
                    {field: 'startDate', minWidth: 190, align: 'center', title: '拟开始日期', sort: true},
                    {field: 'endDate', minWidth: 190, align: 'center', title: '拟结束日期', sort: true},
                    {field: 'score', minWidth: 80, align: 'center', title: '学分', sort: true},
                    {field: 'period', minWidth: 90, align: 'center', title: '总学时', sort: true}
                ]],
                done: function (res, curr, count) {
                    form.on("checkbox(select_all)", function () {
                        let isChecked = $(this).prop("checked");
                        exportFlag = isChecked ? flagEnum.cp : flagEnum.select;
                        $.each($("input[name=select_one]"), function (index, value) {
                            if ($(this).prop('disabled') === false) {
                                $(this).prop("checked", isChecked);
                            }
                        });
                        $.each($("input[name=selectFlag]:first"), function (index, value) {
                            if ($(this).prop('disabled') === false) {
                                $(this).prop("checked", isChecked);
                            }
                        });
                        form.render();
                    });
                    form.on("checkbox(select_one)", function () {
                        let isChecked = $(this).prop("checked");
                        if (!isChecked) {
                            exportFlag = flagEnum.select;
                            $("input[name=select_all]").prop('checked', false);
                            $.each($("input[name=selectFlag]"), function (index, value) {
                                $(this).prop("checked", false);
                            })
                        }
                        form.render();
                    });
                }
            });
        }
        function deleteTempProj(rowData) {
            gLayerIndex = layer.confirm('确定删除临时项目《' + rowData.projName + '》？', {
                title: '提示',
                btn: ['删除', '取消']
            }, function () {
                let visit = huayi_projectscore_url + 'tempProj/del/' + rowData.projId;
                postAction(visit).then((response) => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        layer.msg('删除完成！', {
                            time: 1000,
                            end: function (o) {
                                layer.close(gLayerIndex);
                                refreshTable();
                            }
                        })
                    } else {
                        lat.failMsg(jsonRes.msg);
                        layer.close(gLayerIndex);
                    }
                }).catch((error) => {
                }).finally(() => {
                    parent.layer.close(gLayerIndex);
                })
            }, function () {
                parent.layer.close(gLayerIndex);
            });
        }
        function getSelectedIds() {
            let ids = '';
            $.each($('input[name=select_one]:checked'), function () {
                let id = $(this).attr('data-id');
                ids += id + ',';
            })
            return ids;
        }
        function exportExcel() {
            // table.exportFile(tempProjTable.config.id, data, 'xls');
            let selectIds = getSelectedIds();
            if ('' === selectIds) {
                lat.failMsg('先选择要导出的临时项目');
                return false;
            }
            let visit = huayi_projectscore_url + "tempProj/exportExcel";
            let params = {
                unitId: _unitId,
                userCreate: _unitId,
                depth: 9,
                projIds: selectIds
            };
            downloadFile(visit, params, '临时项目.xlsx');
        }
        function showAssignUnitModal(projId, startDate, endDate) {
            gLayerIndex = layer.open({
                type: 1,
                shade: 0.4,
                shadeClose: false,
                title: '分配举办单位',
                content: $('#assignUnitModal'),
                area: ['500px', '300px'],
                success: function () {
                    form.val('assignUnitForm', {
                        'projId': projId,
                        'startDate': startDate,
                        'endDate': endDate
                    });
                }
            });
        }
        function showTmpModal(action, rowData) {
            let title = '添加';
            if (ModalActionEnum.EDIT === action) title = '编辑';
            if (ModalActionEnum.VIEW === action) title = '查看';
            localStorage.setItem('tmp_tmp_proj', JSON.stringify(rowData));
            gLayerIndex = layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: false,
                title: title,
                content: `/pages/mod/interim/modals/TmpModal.html?action=${action}`,
                area: ['96%', '86%'],
                success: function (layero, index) {
                }
            });
        }
    });
</script>
