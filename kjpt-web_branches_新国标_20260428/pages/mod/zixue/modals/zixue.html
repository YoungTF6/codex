        };
        /** 当前机构用户类型对应的 zixue/conf 行（内蒙自学结果填报时间窗） */
        let gZiConfRow = null;

        window.viewfile = function (elem) {
            let url = $(elem).data('url');
            if (tool.isImg(url)) {
                tool.openViewImg(url);
            } else {
                tool.viewPdfBack(url,"viewFile");
                layer.open({
                    type: 1,
                    shade: 0.8,
                    offset: 'auto',

        window.delfile = function (elem) {

                _f.remove_file(id, ts, elem);

            let row = null;
            (arr || []).forEach(function (c) {
                if (c.unitUserType === _uut) {
                    row = c;
                }
            });
            return row;
        }

        /**
         * 内蒙古套：当前在「事后-自学结果」页签且配置了结果填报窗时，若不在窗内则返回提示文案。
         */
        function neimengResWindowBlockMsg() {
            if (typeof _isNeimeng === 'undefined' || !_isNeimeng || 'res' !== gPhase) {
                return '';
            }
            if (!gZiConfRow || !gZiConfRow.resStartTime || !gZiConfRow.resEndTime) {
                return '';
            }
            let rs = gZiConfRow.resStartTime, re = gZiConfRow.resEndTime;
            if (!moment().isBetween(rs, re, undefined, '[]')) {
                return '不在自学结果填报时间内(' + String(rs).substring(0, 10) + '至' + String(re).substring(0, 10) + ')';
            }
            return '';
        }

        /**
         * 加载自学时间配置后执行回调。
         */
        function loadZiConf(done) {
            postAction(huayi_sjwh_url + 'zixue/conf', {'unitId': _unitId, 'cmeYear': _cur_year}).then(function (resp) {
                let jsonRes = resp.data;
                if (jsonRes.success && jsonRes.data) {
                    gZiConfRow = pickZiConfRow(jsonRes.data);
                } else {
                    gZiConfRow = null;
                }
                done && done();
            }).catch(function () {
                gZiConfRow = null;
                done && done();
            });
        }

        function validate(fields, fileArr) {
            if ('bef' === gPhase) {
                if (!fields.startDate) {
                    lat.failMsg(_isNeimeng ? '请选择自学周期开始日期' : '请选择开始日期');
                    return false;
                }
                if (!fields.endDate) {
                    lat.failMsg(_isNeimeng ? '请选择自学周期结束日期' : '请选择结束日期');
                    return false;
                }
                if (!fields.content) {
                    lat.failMsg(_isNeimeng ? '请输入学习目标' : '请输入自学内容');
                    return false;
                }
                if (!fields.content.match(/^[\s\S]{1,200}$/)) {
                    lat.failMsg(_isNeimeng ? '学习目标最多200字' : '自学内容最多200字');
                    return false;
                }
                if (_isNeimeng) {
                    if (!fields.planText || !String(fields.planText).trim()) {
                        lat.failMsg('请输入学习计划');
                        return false;
                    }
                    if (String(fields.planText).length > 1024) {
                        lat.failMsg('学习计划最多1024字');
                        return false;
                    }
                }
                if (!_isNeimeng) {
                    if (_zi.isselht() && !fields.formId) {
                        lat.failMsg('请选择自学形式');
                        return false;
                    }
                    if (_zi.isselsl() && !fields.scoreLevelId) {
                        lat.failMsg('请选择学分子分类');
                        return false;
                    }
                }
                if (_isGuangdong) {
                    if (!fields.plannedScore) {
                        lat.failMsg('请输入拟学学分');
                        return false;
                    }
                    if (parseFloat(fields.plannedScore) <= 0) {
                        lat.failMsg('拟学学分必须大于0分');
                        return false;
                    }
                    if (parseFloat(fields.plannedScore) > 5) {
                        lat.failMsg('拟学学分最大值不能超过5分');
                        return false;
                    }
                }
            }
            if ('res' === gPhase) {
                let nmWin = neimengResWindowBlockMsg();
                if (nmWin) {
                    lat.failMsg(nmWin);
                    return false;
                }
                let summary = String(fields.studyResult || '');
                if (_isNeimeng) {
                    if (!summary.trim()) {
                        lat.failMsg('请输入成果总结');
                        return false;
                    }
                    if (!summary.match(/^[\s\S]{1,200}$/)) {
                        lat.failMsg('成果总结最多200字');
                        return false;
                    }
                    let sid = currentNmScoreLevelId();
                    let cfg = NM_RES_FIELD_CFG[sid];
                    if (!cfg) {
                        lat.failMsg('请先在事前选择学分子分类');
                        return false;
                    }
                    if (cfg.categoryOptions) {
                        let cval = String(fields.nmResCategoryType ?? '');
                        if (!cfg.categoryOptions.some(function (x) { return x.v === cval; })) {
                            lat.failMsg('请选择' + cfg.categoryLabel);
                            return false;
                        }
                    }
                    if (cfg.rankOptions) {
                        let rval = String(fields.nmResRankNo ?? '');
                        if (!cfg.rankOptions.some(function (x) { return x.v === rval; })) {
                            lat.failMsg('请选择' + cfg.rankLabel);
                            return false;
                        }
                    }
                    if (cfg.metricLabel) {
                        let n = Number(fields.nmResMetricValue);
                        if (!Number.isFinite(n) || n <= 0) {
                            lat.failMsg('请输入' + cfg.metricLabel);
                            return false;
                        }
                        if ('int' === cfg.metricKind && !/^\d+$/.test(String(fields.nmResMetricValue))) {
                            lat.failMsg(cfg.metricLabel + '需为整数');
                            return false;
                        }
                    }
                } else if (!summary.match(/^[\s\S]{0,200}$/)) {
                    lat.failMsg('学习心得最多200字');
                    return false;
                }
            }
            if (fileArr.length < 1) {
                if (!('bef' === gPhase && _isNeimeng)) {
                    lat.failMsg('请上传附件');
                    return false;
                }
            }
            return true;
        }

                            return '只有第四季度能提交';

                    if (nmRes) {
                        return nmRes;
                    }

                _bind.el_mouse();
            },
            file_li: function (file) {
                let phase = file.phase, $ul;
                if ('bef' === phase) {
                    $ul = $('#bef_ul');
                    befFileArr.push(file);
                } else if ('ing' === phase) {
                    $ul = $('#ing_ul');
                    ingFileArr.push(file);
                } else {
                    $ul = $('#res_ul');
                    resFileArr.push(file);
                }
                let str = `<li>
                            <a class="layui-btn layui-btn-xs btn-normal-row js-file-name" onclick="viewfile(this)" data-url="${file.fileUrl}">${file.fileName}</a>
                            <a class="layui-btn layui-btn-xs btn-danger-row" onclick="delfile(this)" data-action="del" data-id="${file.id}" data-timestamp="${file.timestamp}">移除</a>
                        </li>`;
                $ul.append(str);
            },
            echozixue: function (entity) {
                gId = entity.id;
                gBefState = entity.befState ?? 0;
                gIngState = entity.ingState ?? 0;
                gResState = entity.resState ?? 0;
                gNmResEcho = {
                    category: entity.nmResCategoryType ?? null,
                    rank: entity.nmResRankNo ?? null,
                    metric: entity.nmResMetricValue ?? null,
                };
                form.val('bef_form', entity);
                $('textarea[name=planText]').val(entity.planText != null ? entity.planText : '');
                $('textarea[name=studyResult]').val(entity.studyResult);
                $('select[name=nmResCategoryType]').val(entity.nmResCategoryType != null ? String(entity.nmResCategoryType) : '');
                $('select[name=nmResRankNo]').val(entity.nmResRankNo != null ? String(entity.nmResRankNo) : '');
                $('input[name=nmResMetricValue]').val(entity.nmResMetricValue != null ? entity.nmResMetricValue : '');
                (entity.zixueFileList ?? []).forEach(f => this.file_li(f));
                this.fixform();
            }
        }
        const _f = {
            file_id: function (ts, id) {
                $(`a[data-timestamp=${ts}]`).attr('data-id', id)
            },
            add_file: function (file) {
                _echo.file_li(file);
            },
            remove_file: function (id, ts, elem) {
                $(elem).parent('li').remove();
                if ('bef' === gPhase) this.splice(befFileArr, id, ts);
                if ('ing' === gPhase) this.splice(ingFileArr, id, ts);
                if ('res' === gPhase) this.splice(resFileArr, id, ts);
            },
            splice: function (arr, id, ts) {
                for (let i = 0; i < arr.length; ++i) {
                    if (id === arr[i].id || ts === arr[i].timestamp) arr.splice(i, 1);
                }
            },
        }
        const _act = {
            dosavefile: function (fileName, fileUrl, fileSize) {
                let ts = moment().valueOf();
                let file = {
                    'id': '', 'zixueId': gId, 'phase': gPhase,
                    'fileName': fileName, 'fileUrl': fileUrl, 'fileSize': fileSize,
                    'timestamp': ts,
                };
                _f.add_file(file);
                if (!gId) return;
                postAction(`${huayi_sjwh_url}zixue/file_save`, file).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        _f.file_id(ts, jsonRes.data);
                    } else {
                        lat.failMsg(jsonRes.msg);
                    }
                }).catch(error => {
                    lat.errorMsg('error:save file');
                });
            },
            dodelfile: function (id, ts, elem) {
                postAction(`${huayi_sjwh_url}zixue/file_del/${id}`).then(response => {
                    if (response.data.success) _f.remove_file(id, ts, elem);
                    else lat.failMsg(response.data.msg);
                }).catch(error => {
                    lat.errorMsg('error:del file');
                });
            },
            dostate: function (fields, cb) {
                fields.userId = _userId;
                postAction(`${huayi_sjwh_url}zixue/state`, fields).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        lat.okMsg(_isPerson ? '已提交' : '已审核');
                        if (fields.befState) gBefState = fields.befState;
                        if (fields.ingState) gIngState = fields.ingState;
                        if (fields.resState) gResState = fields.resState;
                        _echo.fixform();
                        cb?.();
                    } else {
                        lat.failMsg(jsonRes.msg);
                    }
                }).catch(error => {
                    lat.errorMsg('error:state');
                });
            },
            dosavezi: function (fields, fileArr, state) {
                const that = this;
                if (!gId) fields.zixueFileList = fileArr;
                fields.id = gId;
                fields.updateTime = moment().format(DateTimePattern.SECOND);
                if (_isZhejiang) {
                    fields.scoreLevelId = _var.zhejiang.scoreLevelId;
                    fields.knowledgeId = _var.zhejiang.knowledgeId;
                }
                if (_isHenan) {
                    fields.knowledgeId = _var.henan.knowledgeId;
                    fields.formId = _var.henan.formId;
                }
                if (_isNeimeng) {
                    fields.knowledgeId = _var.neimeng.knowledgeId;
                    fields.formId = _var.neimeng.formId;;
                }
                if (!_isNeimeng) {
                    delete fields.planText;
                }
                postAction(`${huayi_sjwh_url}zixue/save`, fields).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        lat.okMsg('已保存');
                        gId = jsonRes.data.id;
                        let fileArr = jsonRes.data.zixueFileList;
                        if (fileArr && fileArr.length > 0) {
                            fileArr.forEach(f => _f.file_id(f.timestamp, f.id));
                        }
                        if (state) {
                            state.id = gId;
                            that.dostate(state);
                        }
                    } else {
                        lat.failMsg(jsonRes.msg);
                    }
                }).catch(error => {
                    lat.errorMsg('error:save');
                });
            },
            doload: function () {
                if (!gId) {
                    let e = {'cmeYear': _cur_year, 'comPersonId': _pid, 'unitId': _unitId};
                    _echo.echozixue(e);
                    return;
                }
                getAction(`${huayi_sjwh_url}zixue/detail/${gId}`).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        _echo.echozixue(jsonRes.data);
                    } else {
                        lat.failMsg(jsonRes.msg);
                    }
                }).catch(error => {
                    lat.errorMsg('error:load');
                });
            },
        };
        function renderUploader() {
            upload.render({
                elem: '#btn_upload',
                url: `${huayi_upload_url}uploadApi/upload`,
                size: 15 * 1024,
                accept: 'file',
                exts: 'pdf|png|jpg|jpeg|doc|docx|xls|xlsx',
                multi: false,
                choose: function (obj) {
                    gLayerIndex = lat.loadingShade();
                },
                before: function (obj) {
                    let files = this.files = obj.pushFile();
                    for (let key in files) {
                        gFileName = files[key].name;
                        gFileSize = (files[key].size / 1014).toFixed(1);
                    }
                    let fileType = isImg(gFileName) ? 'IMAGE' : 'DOC';
                    this.data = {
                        fileType: fileType,
                        path: `/zixue/${_cur_year}/${_standardKindId}`,
                    }
                },
                done: function (res, index, upload) {
                    delete this.files[index];
                    if (res.code !== 200) {
                        lat.failMsg('上传失败');
                    } else {
                        let fileUrl = res.data.picUrl;
                        _act.dosavefile(gFileName, fileUrl, gFileSize);
                    }
                    layer.close(gLayerIndex);
                },
                error: function () {
                    lat.errorMsg('上传失败');
                }
            });
        }
    });
</script>
<style>
    .file_ul {
        width: 640px;
        height: 90px;
        display: flex;
        flex-direction: column;
    }
    .file_ul > li {
        height: 30px;
    }
    .btn_upload {
        width: 40px;
        transform: translateY(6px);
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none !important;
    }
    input[type='number'] {
        -moz-appearance: textfield;
    }
</style>
</html>
