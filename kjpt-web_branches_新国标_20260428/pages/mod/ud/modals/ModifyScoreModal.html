<body style="background-color: white;">
<div class="layui-fluid" style="left: -16px">
    <div class="layui-card" style="padding:20px">
        <form class="layui-form" id="modifyScoreForm" lay-filter="modifyScoreForm">
            <!-- row1 -->
            <input type="hidden" name="scoreTypeVal">
            <input type="hidden" name="scoreId">
            <input type="hidden" name="checkState">
            <div class="layui-form-item">
                <div class="layui-col-xs4">
                    <label class="layui-form-label">人员编号</label>
                    <div class="layui-input-block">
                        <input type="text" name="personNo" id="personNo" placeholder="" autocomplete="off"
                               class="layui-input layui-disabled" disabled/>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label">人员姓名</label>
                    <div class="layui-input-block">
                        <input type="text" name="personName" id="personName" placeholder=""
                               autocomplete="off" disabled class="layui-input layui-disabled"/>
                    </div>
                </div>
            </div>
            <!-- row2 -->
            <div class="layui-form-item">
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span style="color:red">*&nbsp;</span>活动名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="projName" id="projectName" placeholder="" autocomplete="off"
                               lay-verify="required" class="layui-input layui-disabled" disabled/>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label">活动编号</label>
                    <div class="layui-input-block">
                        <input type="text" name="projNo" id="projNo" placeholder="" autocomplete="off"
                               class="layui-input layui-disabled" disabled/>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span style="color:red">*&nbsp;</span>授分日期</label>
                    <div class="layui-input-block">
                        <input type="text" name="studyDate" id="studyDate" placeholder=""
                               autocomplete="off" disabled class="layui-input layui-disabled"/>
                    </div>
                </div>
            </div>
            <!-- row3 -->
            <div class="layui-form-item">
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span data-id="lblScoreLevel" data-name="scoreLevel" data-required="1" data-label="" data-check-parent="0">学分级别</span></label>
                    <div class="layui-input-block">
                        <div data-id=""></div>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span data-id="lblActivityForm" data-name="holdType" data-required="1" data-label="" data-multi="0">活动形式</span></label>
                    <div class="layui-input-block">
                        <div data-id="lblActivityForm"></div>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span style="color:red">*&nbsp;</span>学分</label>
                    <div class="layui-input-block">
                        <input type="number" name="score" id="score" min="0" placeholder="" autocomplete="off"
                               class="layui-input number_ph"/>
                    </div>
                </div>
            </div>
            <!-- row4 -->
            <div class="layui-form-item">
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span style="color:red">*&nbsp;</span>二级学科</label>
                    <div class="layui-input-block">
                        <!--<input type="text" name="knowledgeTwoName" id="knowledgeTwoName" placeholder=""-->
                        <!--       autocomplete="off" class="layui-input layui-disabled" disabled/>-->
                        <select name="knowledgeTwoId" lay-filter="knowledgeTwoIdSelect" lay-verify="required"
                                class="layui-disabled" disabled>
                            <option value=""></option>
                        </select>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span style="color:red">*&nbsp;</span>三级学科</label>
                    <div class="layui-input-block">
                        <!--<input type="text" name="knowledgeName" id="knowledgeName" placeholder=""-->
                        <!--       autocomplete="off" disabled class="layui-input layui-disabled"/>-->
                        <select name="knowledgeId" lay-filter="knowledgeIdSelect" lay-verify="required"
                                class="layui-disabled" disabled>
                            <option value=""></option>
                        </select>
                    </div>
                </div>
                <div class="layui-col-xs4">
                    <label class="layui-form-label"><span style="color:red">*&nbsp;</span>学时</label>
                    <div class="layui-input-block">
                        <input type="number" name="period" id="period" min="0" placeholder=""
                               autocomplete="off" class="layui-input number_ph"/>
                    </div>
                </div>
            </div>
            <!-- row5 -->
            <div class="layui-form-item only_single">
                <div class="layui-col-xs8">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-input-block">
                        <input type="text" name="remark" id="remark" placeholder="" autocomplete="off"
                               class="layui-input"/>
                    </div>
                </div>
            </div>
            <!-- row6 -->
            <div class="layui-form-item only_single from_down_hide">
                <div class="layui-col-xs6">
                    <label class="layui-form-label">发证机构</label>
                    <div class="layui-input-block">
                        <input name="teachUnitName" placeholder="请选择单位" autocomplete="off" class="layui-input"/>
                        <input name="teachUnit" type="hidden"/>
                    </div>
                    <div style="margin-left: 110px; color: red;">
                        <p>外省机构请录入单位名称，本省机构点击选择</p>
                    </div>
                </div>
                <div class="layui-col-xs6">
                    <button class="layui-btn layui-btn-sm" id="selectUnitBtn" style="margin:5px 5px 5px 10px;">
                        选择单位
                    </button>
                </div>
            </div>
            <!-- row7 -->
            <div class="layui-form-item hide only_single only_ud_photo">
                <div class="layui-upload">
                    <span style="color:red;" class="only_must_photo">*&nbsp;</span>
                    <button type="button" class="layui-btn layui-btn-sm" id="chooseFileBtn">选择学分证明材料</button>
                    <button type="button" class="layui-btn layui-btn-sm" id="mobileFileBtn">手机端上传</button>
                    <button type="button" class="layui-btn layui-btn-sm" id="submitFileBtn">开始上传</button>
                    <div class="layui-upload-list" style="max-width: 1000px;">
                        <table class="layui-table">
                            <colgroup>
                                <col>
                                <col width="100">
                                <col width="100">
                                <col width="100">
                                <col width="100">
                            </colgroup>
                            <thead>
                            <tr>
                                <th>文件名</th>
                                <th>大小</th>
                                <th>缩略图</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="file_list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- row8 -->
            <div class="layui-form-item">
                <div class="layui-col-sm12">
                    <div style="text-align: center;">
                        <!-- <button class="layui-btn layui-btn-primary" lay-filter="atpfCancel" onclick="javascript:;">取消</button>-->
                        <a class="layui-btn layui-btn-primary layui-layer-close" style="position: relative"
                           onclick="closeCurrModal()">取消</a>
                        <button class="layui-btn" type="submit" lay-submit lay-filter="modifyScoreSubmit">保存</button>
                    </div>
                </div>
            </div>

    </div>
</div>
<div id="qr_code" style="display: none;"></div>
</body>
<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        ysUpload: 'ysUpload',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat', 'ysUpload'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let upload2 = layui.ysUpload;
        let gScoreId;
        let gUploadInst;
        let gUploadCntLimit = 3;
        let gTimestamp;
        let gInterval;
        let gFileArr = [];
        let gStartDate, gEndDate;

        let cache = localStorage.getItem('tmp_modify_score');
        if (cache) {
            let data = JSON.parse(cache);
            if (data.studyDate) {
                // 直接覆盖变量，不管它是字符串还是数字，js拉取接口时都会自动处理
                _cur_year = data.studyDate.substring(0, 4);
            }
        }
        const _scoreCeil = +getOrDefault(getUrlParamByName('scoreCeil'), '9999');
        const _flag = {
            isSingle: false,
            isZhuJiang: false,
            isFromDown: 1 === +getOrDefault(getUrlParamByName('from_down'), '0'),
            canUdPhoto: function () {
                if (this.isFromDown) return false;
                return this.isSingle && !this.isFromDown;
            },
            mustPhoto: function () {
                return this.isSingle && _isGuangxi && !this.isZhuJiang;
            }
        };
        window.getChildUnitMsg = setUnitFromModal;
        window.deleteFile = deleteFile;
        layer.ready(function () {
            $('input[name=score]').on('change', function () {
                if (this.value > _scoreCeil) {
                    lat.failMsg(`不能超过项目的学分（${_scoreCeil}）`);
                    this.value = null;
                }
            });
        });
        form.on('submit(modifyScoreSubmit)', function (data) {
            if (_flag.mustPhoto() && gFileArr.length < 1) {
                lat.failMsg('未上传学分证明材料');
                return false;
            }
            let fields = data.field;
            if (fields.score <= 0) {
                lat.failMsg('学分应大于0');
                return false;
            }
            if (fields.period <= 0) {
                lat.failMsg('学时应大于0');
                return false;
            }
            let params = {
                'msiList': getMsiList(Array.of(fields), {
                    'score': fields.score,
                    'period': fields.period,
                    'remark': fields.remark,
                    'teachUnit': fields.teachUnit,
                    'teachUnitName': fields.teachUnitName,
                    'projNo': fields.projNo,
                    'studyDate': fields.studyDate,
                    'projName': fields.projName,
                    'scoreLevelId': fields.scoreLevel,
                    'holdTypeId': fields.holdType,
                    'knowledgeId': fields.knowledgeId
                }),
                'action': 'edit',
                'fp': fp,
                'userId': _userId,
            };
            // edit
            modifyScoreAction(params).then((response) => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    lat.okMsg('保存完成', function () {
                        parent.refreshTable();
                        closeCurrModal();
                    });
                } else {
                    layer.msg(jsonRes.msg);
                }
            }).catch(error => {
                layer.msg('error:修改学分');
            }).finally(() => {
            });
            return false;
        });
        form.on('select(knowledgeTwoIdSelect)', function (data) {
            let k2id = data.value;
            lat.render3rdKnowledge('select[name=knowledgeId]', _cur_year, k2id);
        });
        $(function () {
            echo();
            $('#selectUnitBtn').click(() => {
                layer.open({
                    area: ['100%', '100%'],
                    type: 2,
                    title: '选择单位',
                    content: '/pages/controls/unit/unitsMessage.html'
                });
                return false;
            });
            $("input[name=teachUnitName]").keyup(function () {
                $("input[name=teachUnit]").val("000000");
            });
        });
        function echo() {
            let modifyScoreFormVal = JSON.parse(localStorage.getItem('tmp_modify_score'));
            gStartDate = modifyScoreFormVal.startDate;
            gEndDate = modifyScoreFormVal.endDate;
            let k2id = modifyScoreFormVal.knowledgeTwoId;
            let k3id = modifyScoreFormVal.knowledgeId;

            // Step1: 同步写入 data-echo-values，供 renderScoreLevelTree / renderActivityForm 的 initValue 使用
            $('span[data-id^=lbl]').each(function () {
                let name = $(this).data('name');
                let values = String(modifyScoreFormVal[name] ?? '');
                $(this).attr('data-echo-values', values);
            });

            // Step2: 渲染学分级别（initValue 已就绪，xmSelect 创建时自动回显，on 回调联动加载活动形式）
            _sel_render.renderScoreLevelTree('lblScoreLevel', _cur_year);
            // 补充：若回显值已存在但未触发 on，也主动渲染活动形式，保证 holdType 回显
            if (modifyScoreFormVal.scoreLevel) {
                _sel_render.renderActivityForm('lblActivityForm', modifyScoreFormVal.scoreLevel);
            }

            // Step3: 异步加载二级学科 → 回显选中值 → 再加载三级学科 → 回显选中值 → 最后回显其余表单字段
            $('select[name=knowledgeTwoId]').empty().append(new Option());
            getKnowledgeOption({
                'standardKindId': _standardKindId,
                'cmeYear': _cur_year,
                'knowledgeType': 2,
            }).then(function (response) {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    jsonRes.data.forEach(function (knowledge) {
                        let op = new Option(knowledge.knowledgeName, knowledge.knowledgeId);
                        op.setAttribute('kcode', knowledge.knowledgeCode);
                        $('select[name=knowledgeTwoId]').append(op);
                    });
                }
            }).catch(function () {
                layer.msg('error:加载二级学科');
            }).finally(function () {
                // 二级学科 options 已就绪，设置选中值
                $('select[name=knowledgeTwoId]').val(k2id);
                form.render('select');

                // 继续加载三级学科
                $('select[name=knowledgeId]').empty().append(new Option());
                if (k2id) {
                    getKnowledgeOption({
                        'standardKindId': _standardKindId,
                        'cmeYear': _cur_year,
                        'knowledgeType': 3,
                        'knowledgeTwoId': k2id
                    }).then(function (response) {
                        let jsonRes = response.data;
                        if (jsonRes.success) {
                            jsonRes.data.forEach(function (knowledge) {
                                let op = new Option(knowledge.knowledgeName, knowledge.knowledgeId);
                                op.setAttribute('kcode', knowledge.knowledgeCode);
                                $('select[name=knowledgeId]').append(op);
                            });
                        }
                    }).catch(function () {
                        layer.msg('error:加载三级学科');
                    }).finally(function () {
                        // 三级学科 options 已就绪，设置选中值
                        $('select[name=knowledgeId]').val(k3id);
                        form.render('select');
                        // 回显其余普通表单字段
                        form.val('modifyScoreForm', modifyScoreFormVal);
                    });
                } else {
                    form.val('modifyScoreForm', modifyScoreFormVal);
                }
            });

            fixForm(modifyScoreFormVal);
        }
        function fixForm(modifyScoreFormVal) {
            _flag.isSingle = 1 === toNum(modifyScoreFormVal.scoreTypeVal);
            _flag.isZhuJiang = Boolean(modifyScoreFormVal.downId);
            gScoreId = modifyScoreFormVal.scoreId;
            if (!_flag.isSingle) {
                $('.only_single').hide();
                // 非个人学分：等待组件渲染完成后禁用学分级别和活动形式
                setTimeout(function () {
                    if (_lbl_inst.lblScoreLevel) {
                        _lbl_inst.lblScoreLevel.options.disabled = true;
                        _lbl_inst.lblScoreLevel.update();
                    }
                    if (_lbl_inst.lblActivityForm) {
                        _lbl_inst.lblActivityForm.options.disabled = true;
                        _lbl_inst.lblActivityForm.update();
                    }
                }, 400);
            }
            if (_flag.canUdPhoto()) {
                $('.only_ud_photo').show();
                renderUpload();
                bindMobileBtn();
                loadScorePhoto();
                lat.renderDaySelector('input[name=studyDate]', modifyScoreFormVal.studyDate);
                enableUpload();
                disableSubmit();
                if (!_flag.mustPhoto()) $('.only_must_photo').hide();
            }
            if (_isGuangxi && _flag.isSingle && !_flag.isZhuJiang) {
                $('input[name=projNo]').removeAttr('disabled').toggleClass('layui-disabled');
                $('input[name=projName]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                // $('input[name=studyDate]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=scoreLevel]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=holdType]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeTwoId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
            }
            if (_isHainan && _flag.isSingle) {
                $('input[name=projName]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                // $('input[name=studyDate]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=scoreLevel]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=holdType]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeTwoId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
            }
            if (_isFujian  && _flag.isSingle) {
                $('input[name=projName]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                // 个人学分场景：活动编号不做必填校验（保留可编辑）
                $('input[name=projNo]').removeAttr('disabled').toggleClass('layui-disabled').removeAttr('lay-verify');
                // $('input[name=studyDate]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=scoreLevel]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                if (_lbl_inst.lblScoreLevel) {
                    _lbl_inst.lblScoreLevel.options.disabled = false;
                    _lbl_inst.lblScoreLevel.update();
                }
                $('select[name=holdType]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeTwoId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
            }
            // 个人学分场景：无论省份，只要不是从下推来的，就允许编辑表单并展示文件上传
            // 说明：mustPhoto 仍按原有业务规则控制是否必传，这里只负责“可编辑开关”。
            if (_flag.isSingle && !_flag.isFromDown) {
                // 个人学分场景：活动编号不做必填校验（保留可编辑）
                $('input[name=projNo]').removeAttr('disabled').toggleClass('layui-disabled').removeAttr('lay-verify');
                $('input[name=projName]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                // $('input[name=studyDate]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=scoreLevel]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=holdType]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeTwoId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                $('select[name=knowledgeId]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
            }
            if (_flag.isFromDown) {
                $('.from_down_hide').hide();
                // $('input[name=studyDate]').removeAttr('disabled').toggleClass('layui-disabled').attr('lay-verify', 'required');
                // $('#remark').attr('disabled', 'true').toggleClass('layui-disabled');
                lat.renderDaySelector('input[name=studyDate]', modifyScoreFormVal.studyDate, {min: gStartDate, max: gEndDate});
            }
        }
        function setUnitFromModal(unitId, unitName, hospitalLevelId, unitLevelName) {
            form.val('modifyScoreForm', {
                'teachUnit': unitId,
                'teachUnitName': unitName,
            });
        }
        // ====================================
        function loadScorePhoto() {
            let visit = `${huayi_projectscore_url}s1/single/photo/${gScoreId}`;
            getAction(visit).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    echoFile(jsonRes.data);
                }
            });
        }
        function renderUpload() {
            gUploadInst = upload2.render({
                elem: '#chooseFileBtn',
                elemList: $('#file_list'),
                url: huayi_upload_url + 'uploadApi/upload',
                exts: 'jpg|png|bmp|jpeg|pdf',
                size: 10 * 1024,
                accept: 'file',
                multiple: false,
                number: gUploadCntLimit,
                auto: false,
                bindAction: '#submitFileBtn',
                before: function (obj) {
                    this.data = getFileData(this.files);
                },
                choose: function (obj) {
                    enableSubmit();
                    let that = this;
                    let files = that.files = obj.pushFile();
                    if (Object.keys(files).length + gFileArr.length >= gUploadCntLimit) {
                        disableUpload();
                    }
                    // 读取本地文件
                    obj.preview(function (index, file, result) {
                        let imgSrc = file.type.indexOf("pdf") >= 0 ? '/img/pdf.png' : result;
                        let $tr = $(`<tr id="file_row_${index}">
                            <td><a>${file.name}</a></td>
                            <td>${(file.size / 1014).toFixed(1)}kb</td>
                            <td><img id="showSmallPic${index}" class="layui-upload-img" src="${imgSrc}" alt="${file.name}" key-id="" file-source="" file-name="" file-url="" file-size=""></td>
                            <td>未上传</td>
                            <td>
                            <a class="layui-btn layui-btn-xs hide reupload_btn222">重传</a>
                            <a class="layui-btn layui-btn-xs layui-btn-danger delete_btn" type="button" key-id="" file-source="" file-name="" file-url="" file-size="">删除</a>
                            </td>
                            </tr>`);
                        // 单个重传
                        $tr.find('.reupload_btn').on('click', function () {
                            obj.upload(index, file);
                        });
                        // 删除
                        $tr.find('.delete_btn').on('click', function (event) {
                            layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                                for (let i = 0; i < gFileArr.length; i++) {
                                    if (gFileArr[i].tmpKeyId === index) {
                                        gFileArr.splice(i, 1);
                                        break;
                                    }
                                }
                                delete files[index];
                                $tr.remove();
                                gUploadInst.config.elem.next()[0].value = '';
                                //
                                enableUpload();
                                (0 === Object.keys(files).length) && disableSubmit();
                                //
                                let $deleteBtn = $tr.find('.delete_btn');
                                deleteScorePhoto($deleteBtn.attr('file-source'), $deleteBtn.attr('key-id'), $deleteBtn.attr('file-name'), $deleteBtn.attr('file-url'), $deleteBtn.attr('file-size'));
                                layer.closeAll();
                            });
                        });
                        that.elemList.append($tr);
                        $("#showSmallPic" + index).bind('click', function () {
                            // viewPhoto(result, file);
                        });
                    });
                },
                done: function (res, index, upload) {
                    let that = this;
                    if (res.code === 200) {
                        let tr = that.elemList.find(`tr#file_row_${index}`), tds = tr.children();
                        tds.eq(3).html('已上传');
                        tds.eq(4).find('.reupload_btn').addClass('layui-hide');
                        //
                        let fileSize = (that.files[index].size / 1014).toFixed(1);
                        gFileArr.push({
                            'fileName': that.files[index].name,
                            'scorePhotoUrl': res.data.picUrl,
                            'photoSize': fileSize,
                            'tmpKeyId': index,
                            'source': 'unit'
                        });
                        //
                        saveScorePhoto(that.files[index].name, res.data.picUrl, fileSize, `file_row_${index}`);
                        delete that.files[index];
                        //
                        (0 === Object.keys(that.files).length) && disableSubmit();
                        return;
                    }
                    that.error(index, upload);
                },
                allDone: function (obj) {
                    //
                },
                error: function (index, upload) {
                    let that = this;
                    let tr = that.elemList.find(`tr#file_row_${index}`), tds = tr.children();
                    tds.eq(3).html('上传失败');
                    tds.eq(4).find('.reupload_btn').removeClass('layui-hide'); //显示重传
                }
            });
        }
        function getFileData(fileObj) {
            let res = {};
            let year = new Date().getFullYear();
            let path = `/individualScoreManage/${_standardKindId}/${year}/${_unitId}`;
            for (let key in fileObj) {
                let fileData = {path: path, scale: 0.6, outputQuality: 0.6};
                // 判断文件大小, 超过3M压缩比例改为0.3
                if (fileObj[key].size > 3000000) {
                    fileData = {path: path, scale: 0.3, outputQuality: 0.3};
                }
                const tempType = fileObj[key].type;
                if (tempType.indexOf("image") >= 0) {
                    fileData.fileType = "IMAGE";
                } else if (tempType.indexOf("application/pdf") >= 0) {
                    fileData.fileType = "DOC";
                } else {
                    fileData.fileType = "OTHER";
                }
                res[key] = fileData;
            }
            return res;
        }
        function disableUpload() {
            $("#chooseFileBtn").addClass("layui-btn-disabled").attr("disabled", true);
            $("#mobileFileBtn").addClass("layui-btn-disabled").attr("disabled", true);
        }
        function enableUpload() {
            $("#chooseFileBtn").removeClass("layui-btn-disabled").attr("disabled", false);
            $("#mobileFileBtn").removeClass("layui-btn-disabled").attr("disabled", false);
        }
        function disableSubmit() {
            $("#submitFileBtn").addClass("layui-btn-disabled").attr("disabled", true);
        }
        function enableSubmit() {
            $("#submitFileBtn").removeClass("layui-btn-disabled").attr("disabled", false);
        }
        function bindMobileBtn() {
            $("#mobileFileBtn").click(function () {
                gTimestamp = new Date().getTime();
                let uploadFileNum = $("#file_list").children().length;
                let mobileUrl = window.location.origin + `/pages/mobile/scoreImgUpload.html?userId=${_userId}&unitId=${_unitId}&standardkindId=${_standardKindId}&timestamp=${gTimestamp}&configFileNum=${gUploadCntLimit}&uploadFileNum=${uploadFileNum}`;
                $('#qr_code').empty().qrcode({
                    text: mobileUrl,
                    width: '280',
                    height: '280'
                });
                layer.open({
                    type: 1,
                    title: false,
                    closeBtn: false,
                    area: ['300px', '300px'],
                    shade: 0.6,
                    shadeClose: true,
                    scrollbar: true,
                    id: 'LAY_layuipro',
                    moveType: 1,
                    content: $(`#qr_code`),
                    end: function () {
                        $('#qr_code').hide();
                        gInterval && clearInterval(gInterval);
                    }
                });
                gInterval = setInterval(function () {
                    loadMobileFile();
                }, 2000);
            });
        }
        function loadMobileFile() {
            let visit = `${huayi_projectscore_url}cmeSingleprojScoreMobilePhoto/list`;
            let params = {userId: _userId, timestamp: gTimestamp};
            postAction(visit, params).then(response => {
                let jsonRes = response.data;
                let fileArr = jsonRes.data;
                echoFile(fileArr, true);
            });
        }
        function echoFile(fileArr, fromMobile) {
            let tmpArr = [];
            label:
                for (let i = 0; i < fileArr.length; i++) {
                    for (let j = 0; j < gFileArr.length; j++) {
                        if (fileArr[i].scorePhotoUrl === gFileArr[j].scorePhotoUrl) continue label;
                    }
                    tmpArr.push(fileArr[i]);
                }
            let $fileList = $("#file_list");
            for (let i = 0; i < tmpArr.length; i++) {
                if (gFileArr.length >= gUploadCntLimit) {
                    break;
                }
                let tmpFile = tmpArr[i];
                if (fromMobile) {
                    saveScorePhoto(tmpFile.fileName, tmpFile.scorePhotoUrl, tmpFile.photoSize);
                }
                gFileArr.push({
                    'fileName': tmpFile.fileName,
                    'scorePhotoUrl': tmpFile.scorePhotoUrl,
                    'photoSize': tmpFile.photoSize,
                    'tmpKeyId': tmpFile.keyId,
                    'source': 'unit'
                });
                // 兼容编辑回显：pdf 只展示缩略图图标，避免 <img src="pdf地址"> 无法正常渲染
                const isPdfFile = (tmpFile.fileName && tmpFile.fileName.toLowerCase().endsWith('.pdf')) ||
                    (tmpFile.scorePhotoUrl && tmpFile.scorePhotoUrl.toLowerCase().indexOf('.pdf') > -1);
                const imgSrc = isPdfFile ? '/img/pdf.png' : tmpFile.scorePhotoUrl;
                let tr = `<tr id="file_row_${tmpFile.keyId}">
                    <td>${tmpFile.fileName}</td>
                    <td>${tmpFile.photoSize}kb</td>
                    <td><img class="image-table-tr" onclick222="viewPhoto('${tmpFile.scorePhotoUrl}')" src="${imgSrc}" alt="${tmpFile.fileName}" key-id="${tmpFile.keyId}" filel-source="${tmpFile.source}" file-name="${tmpFile.fileName}" file-url="${tmpFile.scorePhotoUrl}" file-size="${tmpFile.photoSize}"></td>
                    <td>已上传</td>
                    <td>
                    <a class="layui-btn layui-btn-xs layui-btn-danger" key-id="${tmpFile.keyId}" file-source="${tmpFile.source}" file-name="${tmpFile.fileName}" file-url="${tmpFile.scorePhotoUrl}" file-size="${tmpFile.photoSize}" onclick="deleteFile(this)">删除</a>
                    </td>
                    </tr>`;
                $fileList.append(tr);
            }
            if ($fileList.children().length >= gUploadCntLimit) {
                disableUpload();
            }
        }
        function deleteFile(elem) {
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function (windowIndex) {
                let keyId = elem.getAttribute("key-id");
                let source = elem.getAttribute('file-source');
                let name = elem.getAttribute('file-name');
                let url = elem.getAttribute('file-url');
                let size = elem.getAttribute('file-size');
                let visit = `${huayi_projectscore_url}cmeSingleprojScoreMobilePhoto/deleteById?keyId=${keyId}`;
                postAction(visit).then(response => {
                    let jsonRes = response.data;
                    for (let i = 0; i < gFileArr.length; i++) {
                        if (gFileArr[i].tmpKeyId === keyId) {
                            gFileArr.splice(i, 1);
                            break;
                        }
                    }
                    elem.parentElement.parentElement.remove();
                    deleteScorePhoto(source, keyId, name, url, size);
                    //
                    enableUpload();
                }).catch(error => {
                }).finally(() => {
                    layer.close(windowIndex);
                });
            });
        }
        function saveScorePhoto(name, url, size, trId) {
            let visit = `${huayi_projectscore_url}s1/single/photo/save`;
            let params = {
                'scoreId': gScoreId,
                'fileName': name,
                'scorePhotoUrl': url,
                'photoSize': size,
                'cstate': 1
            };
            postAction(visit, params).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    let keyId = jsonRes.data;
                    //
                    if (trId) {
                        let $tr = $(`#${trId}`);
                        $tr.find('img').attr('file-source', 'unit').attr('key-id', keyId).attr('file-name', name).attr('file-url', url).attr('file-size', size);
                        $tr.find('.delete_btn').attr('file-source', 'unit').attr('key-id', keyId).attr('file-name', name).attr('file-url', url).attr('file-size', size);
                    }
                    lat.okMsg('保存文件完成');
                }
            }).catch(error => {
            }).finally(() => {
            });
        }
        function deleteScorePhoto(source, keyId, name, url, size) {
            let visit = `${huayi_projectscore_url}s1/single/photo/update`;
            let params = {
                'source': source,
                'keyId': keyId,
                'fileName': name,
                'scorePhotoUrl': url,
                'photoSize': size,
                'cstate': 0
            };
            postAction(visit, params).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    lat.okMsg('删除文件完成');
                }
            }).catch(error => {
                lat.errorMsg('error:删除文件失败');
            }).finally(() => {
            });
        }
    });
</script>
