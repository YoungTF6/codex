                id: id,

                title:title,
                toolbar: toolbar,

                height: height,
                page: isPage,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                where: params,
                cols: tempColArr,
                parseData: function (res) {
                    let tempObj = {"code": res.status === 200 ? 0 : res.status,"msg": res.message};
                    if(res.status != 200) return tempObj;
                    if(isPage){
                        tempObj["data"] = res.data.records;
                        tempObj["count"] = res.data.recordsTotal;
                        tempObj["page"] = res.data.pageNum;
                        tempObj["limit"] = res.data.pageSize;
                        return tempObj;
                    }

            let tempArr = getLeafArr(data.data);

                $(".ts-knowledge-tips").remove();

                    let htmlKnowledge = `<div class="ts-knowledge-label ts-single-row"><div class="ts-knowledge-scroll"><div class="ts-label-content"></div></div></div>`;
                    $("#knowledgeTreeInput").append(htmlKnowledge);
                    let container = document.querySelector(".ts-knowledge-scroll");
                    container.addEventListener("wheel", (event) => {
                        event.preventDefault();
                        container.scrollLeft += event.deltaY;
                    });
                }
                let htmlItem = "";
                for (const obj of tempArr) {
                    htmlItem +=`<div class="ts-label-block ts-label-block-${obj.id}"><span style="width:calc(100% - 20px);">${obj.label}</span><i class="layui-icon layui-icon-close js-treeSelect-close" data-id="${obj.id}"></i></div>`;
                }
                $(".ts-label-content").append(htmlItem);

                    eleKnowledgeTree.unChecked(this.getAttribute("data-id"));

            } else {

        // 传入一级节点，返回所有二级节点数组
        let getLeafArr = function(data,leafArr = []){
            if(data.isLeaf) {
                leafArr.push({"id":data.id,"label":data.label});
                return leafArr;
            }
            bb:for(const obj of knowledgeTreeData){
                if(obj["id"].indexOf(data.id) < 0) continue;
                for (const child of obj.children) {
                    leafArr.push({"id":child["id"],"label":child["label"]});
                }
                break bb;
            }
            return leafArr;
        }

                },
                success : function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error   : function () {
                    layer.msg('获取配置失败');
                }
            });
        }

        //页面加载入口
        let htmlInit = function(){
            tool.setMedicalTypeSelectById("#medicalType1");

            dateInit();
            renderPage1DDL( $("#cmeYear1").val());
           
            renderPage2DDL($("#cmeYear2").val());

            getPeopleTitleField();
            bindOtherElem();
            getConfig("fun_record_info_when_export_score");
            getConfig("value_declare_file_when_export_score");
        }
        htmlInit();
    });
</script>
