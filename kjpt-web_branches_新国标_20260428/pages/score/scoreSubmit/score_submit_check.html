<script type="text/javascript">
    layui.config({
        base: 'https://cdn.staticfile.org/layui/2.6.8/'
    }).use(['form', 'laydate', 'layer', 'jquery', 'table'], function () {
        var layer = layui.layer,
            $ = layui.jquery,
            form = layui.form,
            laydate = layui.laydate,
            table = layui.table;

        // 全局单位ID，供整个页面使用
        var unitId = localStorage.getItem("unit-id") || "";
        if (!unitId) {
            console.warn("无法获取单位信息");
        }

        // 生成年度选项
        function generateYearOptions() {
            var currentYear = new Date().getFullYear();
            var select = $('#cme_year');
            select.empty();

            // 生成最近10年的选项
            for (var i = currentYear; i >= currentYear - 10; i--) {
                select.append('<option value="' + i + '">' + i + '</option>');
            }

            form.render('select');
        }
        function Format(datetime, fmt) {
            if (datetime === null || datetime === undefined) {
                return "";
            }
            // 修复时间戳处理逻辑
            if (typeof datetime === 'string') {
                // 移除可能的非数字字符
                datetime = datetime.replace(/[^\d]/g, '');
            }
            let timestamp = parseInt(datetime);
            // 根据时间戳长度判断单位是秒还是毫秒
            if (timestamp.toString().length === 10) {
                timestamp *= 1000;
            }
            datetime = new Date(timestamp);
            var o = {
                "M+": datetime.getMonth() + 1,                 //月份
                "d+": datetime.getDate(),                    //日
                "h+": datetime.getHours(),                   //小时
                "m+": datetime.getMinutes(),                 //分
                "s+": datetime.getSeconds(),                 //秒
                "q+": Math.floor((datetime.getMonth() + 3) / 3), //季度
                "S": datetime.getMilliseconds()             //毫秒
            };
            if (/(y+)/.test(fmt))
                fmt = fmt.replace(RegExp.$1, (datetime.getFullYear() + "").substr(4 - RegExp.$1.length));
            for (var k in o)
                if (new RegExp("(" + k + ")").test(fmt))
                    fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            return fmt;
        }

        // 初始化年度选项
        generateYearOptions();

        // 获取设置信息
        function loadSettings() {
            unitId = localStorage.getItem("unit-id") || "";
            if (!unitId) {
                console.warn("无法获取单位信息");
                return;
            }
            
            $.ajax({
                url: huayi_projectscore_url + 'core-submit-setting/getByUnitId',
                type: 'get',
                data: { unitId: unitId },
                success: function (response) {
                    if (response.success === true && response.data) {
                        var setting = response.data;
                        // 设置审核状态
                        $("#lbl_check_status").text(setting.status === 1 ? "已开启" : "未开启");
                        // 设置日期范围
                        var startDate = setting.startDate ? setting.startDate : "未设置";
                        var endDate = setting.endDate ? setting.endDate : "未设置";
                        $("#lbl_date").text(startDate + "——" + endDate);
                    } else {
                        console.log("暂无设置信息");
                        $("#lbl_check_status").text("未开启");
                        $("#lbl_date").text("未设置——未设置");
                    }
                },
                error: function (xhr, status, error) {
                    console.error("获取设置信息失败:", xhr.responseText);
                    // 默认显示
                    $("#lbl_check_status").text("未开启");
                    $("#lbl_date").text("未设置——未设置");
                }
            });
        }
        
        // 页面加载时获取设置信息
        loadSettings();

        // 渲染表格（页面加载时不请求接口；点击“查询”再加载数据）
        var main_table = table.render({
            elem: '#train_info'
            , height: 'full-198'
            , loading: false
            , method: 'get'
            , defaultToolbar: ['filter', 'columns']
            , title: '专业课数据表'
            , page: true //开启分页
            , data: [] // 初始化空数据，避免页面加载时请求接口
            , toolbar: true // 确保工具栏显示
            , where: {
                operate: "query"
            },
            request: {
                pageName: 'pageNum' // 页码参数名，改为后端使用的 pageNum
                , limitName: 'pageSize' // 将默认的limit改为pageSize
            }
            , cols: [
                [ //表头
                    {fixed: 'left', title: '操作', toolbar: '#table-toolbar', width: 100 }
                    , { field: 'cmeYear', title: '年度', sort: false, width: 75 }
                    , { field: 'personNo', title: '人员编号', sort: true, width: 110 }
                    , { field: 'personName', title: '姓名', sort: false, width: 100, templet: function (d) {
                        return d.personName || '';
                    }}
                    , { field: 'titleName', title: '职称', sort: false, width: 120 }
                    , { field: 'unit', title: '单位编号', sort: true, width: 110 }
                    , { field: 'unitName', title: '单位名称', sort: false, width: 200 }
                    , { field: 'deptName', title: '科室', width: 100 }
                    , { field: 'totalScore', title: '专业课总学分', sort: true, width: 150 }
                    , { field: 'totalPeriod', title: '专业课总学时', sort: true, width: 150, templet: function (d) {
                        return d.totalPeriod || '0';
                    }}
                    , { field: 'totalPeriodXxk', title: '选修课总学时', sort: true, width: 150, templet: function (d) {
                        var str = "";
                        if (d.totalPeriodXxk == undefined || d.totalPeriodXxk == null || d.totalPeriodXxk == 0)
                            str = "不存在或未计算";
                        else
                            str = d.totalPeriodXxk;

                        return str;
                    }}
                     // 修改审核状态列，添加状态文本映射
                    , { field: 'checkState', title: '审核状态', sort: false, width: 110, templet: function(d) {
                        var statusMap = {
                            '1': '未审核',
                            '2': '审核通过',
                            '3': '不需要审核',
                            '4': '审核不通过'
                        };
                        return statusMap[d.checkState] || '';
                    }}
                    , { field: 'checkTime', title: '审核时间', sort: true, width: 180, templet: '<div>{{ Format(d.checkTime,"yyyy-MM-dd hh:mm:ss")}}</div>' }
                    , { field: 'gdrstSwapstate', title: '同步状态', sort: false, width: 110, templet: function (d) {
                        var str = "";
                        if (d.gdrstSwapstate == 0)
                            str = "未同步";
                        else if (d.gdrstSwapstate == 1)
                            str = "同步中";
                        else if (d.gdrstSwapstate == 2)
                            str = "同步成功";
                        else
                            str = "同步失败";

                        return str;
                    }}
                    , { field: 'addTime', title: '日志时间', sort: false, width: 180 }
                    , { field: 'message', title: '日志信息', sort: false, width: 150 }

                ]
            ],
            parseData: function (res) {
                if(res.status === 200){
                    // 处理不同格式的返回数据
                    var count = 0;
                    var data = [];
                    var page = 1;
                    var limit = 10;
                    
                    // 如果data是数组格式（正常表格数据）
                    if(res.data && typeof res.data === 'object' && res.data.records){
                        count = res.data.recordsTotal || 0;
                        data = res.data.records || [];
                        page = res.data.pageNum || 1;
                        limit = res.data.pageSize || 10;
                    }
                    // 如果data是简单对象或数字（如审核返回的结果）
                    else if(res.data !== undefined && res.data !== null){
                        // 这种情况下通常是操作结果，不是表格数据
                        // 可以设置默认值或者根据实际情况处理
                        count = 0;
                        data = [];
                    }
                    
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message || res.msg, //解析提示文本
                        "count": count, //解析数据长度
                        "data": data, //解析数据列表
                        "page": page, //当前页
                        "limit": limit //每页条数
                    }
                }else{
                    layer.msg("请求失败");
                    console.log(res);
                    return {
                        "code": res.status || 500,
                        "msg": res.message || res.msg || "请求失败",
                        "count": 0,
                        "data": [],
                        "page": 1,
                        "limit": 10
                    };
                }
            },
            done: function(res, curr, count){
                // 表格渲染完成后执行
                console.log('表格数据加载完成:', {
                    currentPage: curr,
                    totalCount: count,
                    dataLength: res.data ? res.data.length : 0
                });
                
                // 如果没有数据，显示提示信息
                if(count === 0 && res.data && res.data.length === 0){
                    console.log('暂无数据');
                }
            }
        });

        // 工具栏按钮点击事件
        $('.toolbar button').on('click', function () {
            var event = $(this).attr('lay-event');
            switch (event) {
                case 'checkAllthisPage':
                    is_check_this_page = !is_check_this_page;
                    is_check_all = false;
                    $("[name='check_line']:enabled").prop("checked", is_check_this_page);
                    form.render("checkbox");
                    break;
                case 'checkAll':
                    is_check_all = !is_check_all;
                    is_check_this_page = false;
                    $("[name='check_line']:enabled").prop("checked", is_check_all);
                    form.render("checkbox");
                    break;
                case 'pass':
                    check(2);
                    break;
                case 'no_pass':
                    check(4);
                    break;
                case 'export':
                    exportData();
                    break;
                case 'add_manual':
                    layer.open({
                        title: "手动添加待上传记录（慎重使用）",
                        type: 1,
                        shadeClose: true, //点击遮罩关闭
                        content: $('#add_manual_div'),
                        btn: ['确认', '取消'],
                        yes: function (index, layero) {
                            var com_person_id = $("#but_add_check").data("com_person_id");
                            var pass = $("#but_add_check").data("pass");
                            if (pass != 1) {
                                layer.msg("请先输入人员编号，点击【检查】按钮");
                                return false;
                            }
                            var year = $('#txt_add_year').val();
                            var score = $('#txt_add_score').val();
                            var period = $('#txt_add_period').val();
                            if (com_person_id && com_person_id.length > 10) {
                                var regNum = /[1-9]\d*.\d*|0.\d*[1-9]\d*/i;
                                var regYear = /20[1,2][0-9]/i;
                                if (regNum.test(period) && regNum.test(score) && regYear.test(year)) {
                                    $.ajax({
                                        url: huayi_projectscore_url + 'ScoreSubmitZy/add',
                                        type: "post",
                                        data: {
                                            operate: 'add_score',
                                            com_person_id: com_person_id,
                                            year: year,
                                            score: score,
                                            period: period
                                        },
                                        success: function (response) {
                                            if (response.data) {
                                                layer.alert("添加成功");
                                                layer.close(index);
                                            }
                                            else {
                                                layer.alert("添加失败，稍后再试！");
                                            }
                                        },
                                        error: function () {
                                            layer.alert("网络错误，请检查网络连接！");
                                        },
                                        dataType: "json"
                                    })
                                }
                                else {
                                    layer.msg("学分/年度信息有误，请核对");
                                }
                            }
                            else {
                                layer.msg("人员信息有误，请核对后点击【检查】按钮");
                            }
                        },
                        btn2: function (index, layero) {
                            layer.close(index)
                        }
                    });
                    break;
            }
        });

        // 表单开关事件
        form.on('switch(check_line)', function (data) {
            console.log(data.elem); //得到checkbox原始DOM对象
            console.log(data.elem.checked); //开关是否开启，true或者false

        // 导出函数
        function exportData() {
            var menuUnitId = localStorage.getItem("menu-unit-id") || localStorage.getItem("unit-id") || "";
            var params = {};
            
            // 只有在执行过查询后才使用查询参数
            if (hasQueryExecuted) {
                params = {
                    operate: "query",
                    startDate: $("#start_date").val(),
                    endDate: $("#end_date").val(),
                    unitId: $("#unit_id").val(),
                    subUnitId: menuUnitId,
                    personNo: $("#person_no").val(),
                    personName: $("#person_name").val(),
                    checkStatus: $("#sele_check_status").val(),
                    syncStatus: $("#sele_submit_status").val(),
                    startTime2: $("#start_time2").val(),
                    endTime2: $("#end_time2").val(),
                    cmeYear: $("#cme_year").val()
                };
            } else {
                // 未执行查询时，只传递基本参数
                params = {
                    operate: "query",
                    subUnitId: menuUnitId,

                };
            }
            
            // 构建URL
            var url = huayi_projectscore_url + 'ScoreSubmitZy/export';
            var queryString = $.param(params);
            if (queryString) {
                url += '?' + queryString;
            }
            
            // 使用XMLHttpRequest实现无新窗口下载
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            token_verify();
            if(localStorage.getItem('token')){
                xhr.setRequestHeader('Authorization', localStorage.getItem('token'));
                xhr.setRequestHeader('KJPT-USER-ID', localStorage.getItem('user-id'));
            }
            xhr.responseType = 'blob';
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    // 创建Blob对象
                    var blob = new Blob([xhr.response], { type: 'application/vnd.ms-excel' });
                    // 创建下载链接
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = '学分上报数据_' + new Date().getTime() + '.xls';
                    document.body.appendChild(a);
                    a.click();
                    // 清理
                    setTimeout(function() {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 100);
                } else {
                    layer.alert('导出失败，请稍后重试！');
                }
            };
            
            xhr.onerror = function() {
                layer.alert('网络错误，请检查网络连接！');
            };
            
            xhr.send();
        }
    });

    // 日期格式化函数
    function Format(datetime, fmt) {
        if (datetime === null || datetime === undefined) {
            return "";
        }
        console.log(parseInt(datetime));
        if (parseInt(datetime) == datetime) {
            if (datetime.length == 10) {
                datetime = parseInt(datetime) * 1000;
            } else if (datetime.length == 13) {
                datetime = parseInt(datetime);
            }
        }
        datetime = new Date(datetime);
        var o = {
            "M+": datetime.getMonth() + 1,                 //月份
            "d+": datetime.getDate(),                    //日
            "h+": datetime.getHours(),                   //小时
            "m+": datetime.getMinutes(),                 //分
            "s+": datetime.getSeconds(),                 //秒
            "q+": Math.floor((datetime.getMonth() + 3) / 3), //季度
            "S": datetime.getMilliseconds()             //毫秒
        };
        if (/(y+)/.test(fmt))
            fmt = fmt.replace(RegExp.$1, (datetime.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt))
                fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }
