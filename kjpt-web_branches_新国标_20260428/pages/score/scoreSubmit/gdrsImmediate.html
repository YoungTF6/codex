<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>选修课即时表维护</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8">
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <style>
        .pageContainer {
            padding: 10px;
            background-color: #fff;
        }

        .flowContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .searchSection {
            background: #f5f5f5;
            border: 1px solid #f0f0f0;
            padding: 12px 15px 0;
        }

        .tableSection {
            border: 1px solid #f0f0f0;
        }

        /* 允许本页弹窗内的下拉面板超出弹窗显示，避免在弹窗内出现滚动条 */
        .gdrsImmediateLayer .layui-layer-content {
            overflow: visible !important;
        }

        .gdrsImmediateLayer .layui-form-select dl {
            max-height: none !important;
            overflow-y: visible !important;
        }
    </style>
</head>

<body>
    <div class="layui-fluid pageContainer">
        <div class="flowContainer">
            <div class="searchSection">
                <form class="layui-form" lay-filter="gdrsImmediateSearchForm">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">证件号</label>
                            <div class="layui-input-inline" style="width: 260px;">
                                <input id="searchCertId" name="certId" type="text" autocomplete="off" placeholder="请输入证件号"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">医通卡号</label>
                            <div class="layui-input-inline" style="width: 260px;">
                                <input id="searchPersonNo" name="personNo" type="text" autocomplete="off" placeholder="请输入医通卡号"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <button class="layui-btn layui-btn-sm" lay-submit lay-filter="searchXxkImmediate">
                                <i class="layui-icon layui-icon-search"></i>条件查询
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="tableSection">
                <table id="gdrsImmediateTableElem" lay-filter="gdrsImmediateTable"></table>
            </div>
        </div>
    </div>

    <script type="text/html" id="gdrsImmediateToolbarTpl">
        <div class="layui-btn-container">
            <button type="button" class="layui-btn layui-btn-sm" lay-event="addRow">新增</button>
        </div>
    </script>

    <script type="text/html" id="gdrsImmediateRowBarTpl">
        <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="editRow">编辑</a>
        <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delRow">删除</a>
    </script>

    <script>
        layui.use(['table', 'form', 'layer'], function () {
            var table = layui.table;
            var form = layui.form;
            var layer = layui.layer;

            // 选修课即时表接口前缀（与后端 Controller 约定，需在后端落地）
            var xxkImmediateApi = {
                selectByParam: huayi_projectscore_url + 'pushZykAndXxk/selectXxkImmediate',
                update: huayi_projectscore_url + 'pushZykAndXxk/updateXxkImmediate',
                delete: huayi_projectscore_url + 'pushZykAndXxk/deleteXxkImmediate',
                insert: huayi_projectscore_url + 'pushZykAndXxk/insertXxkImmediate'
            };

            // 从 JSONResult 中解析列表数组，兼容 data 为数组或 null
            function parseListFromResponse(res) {
                if (!res || typeof res !== 'object') {
                    return [];
                }
                var raw = res.data;
                if (Array.isArray(raw)) {
                    return raw;
                }
                return [];
            }

            // 判断接口是否成功（与 scorePushGrds 等页一致）
            function isJsonResultOk(res) {
                if (!res || typeof res !== 'object') {
                    return false;
                }
                if (res.status === undefined || res.status === null) {
                    return true;
                }
                return Number(res.status) === 200;
            }

            // 同步状态展示文案（0 未同步、2 已同步、4 同步失败）
            function renderGdrstSwapstateText(state) {
                if (state === 0 || state === '0') {
                    return '未同步';
                }
                if (state === 2 || state === '2') {
                    return '已同步';
                }
                if (state === 4 || state === '4') {
                    return '同步失败';
                }
                return state === undefined || state === null || state === '' ? '' : String(state);
            }

            // 取行上人员主键：删除接口参数名为 personId，实体字段常为 comPersonId
            function getRowPersonId(row) {
                if (!row || typeof row !== 'object') {
                    return '';
                }
                var v = row.comPersonId !== undefined && row.comPersonId !== null ? row.comPersonId : row.personId;
                return v === undefined || v === null ? '' : String(v).trim();
            }

            // 将接口返回的列表渲染到表格（无分页，一次展示全部行）
            function applyTableData(list) {
                table.reload('gdrsImmediateTable', {
                    data: list || [],
                    page: false
                });
            }

          

            // 按证件号、医通卡号条件查询并刷新表格
            function requestSelectByParamAndRender(certId='', personNo='') {
                var loadIdx = layer.load(1, { shade: [0.15, '#000'] });
                $.ajax({
                    url: xxkImmediateApi.selectByParam,
                    type: 'get',
                    dataType: 'json',
                    data: {
                        certId: certId || '',
                        personNo: personNo || ''
                    },
                    success: function (res) {
                        layer.close(loadIdx);
                        if (!isJsonResultOk(res)) {
                            layer.msg((res && res.msg) ? res.msg : '查询失败');
                            applyTableData([]);
                            return;
                        }
                        applyTableData(parseListFromResponse(res));
                    },
                    error: function () {
                        layer.close(loadIdx);
                        layer.msg('请求失败，请稍后重试');
                        applyTableData([]);
                    }
                });
            }

            // 提交删除：按人员ID与继教年度删除即时表一行（参数名与后端 deleteXxkImmediate 对齐）
            function requestDeleteRow(row, afterOk) {
                var personId = getRowPersonId(row);
                var cmeYear = row && row.cmeYear !== undefined && row.cmeYear !== null ? String(row.cmeYear).trim() : '';
                if (!personId || !cmeYear) {
                    layer.msg('缺少人员或年度，无法删除');
                    return;
                }
                var loadIdx = layer.load(1, { shade: [0.15, '#000'] });
                $.ajax({
                    url: xxkImmediateApi.delete,
                    type: 'get',
                    dataType: 'json',
                    data: {
                        personId: personId,
                        cmeYear: cmeYear
                    },
                    success: function (res) {
                        layer.close(loadIdx);
                        if (!isJsonResultOk(res)) {
                            layer.msg((res && res.msg) ? res.msg : '删除失败');
                            return;
                        }
                        layer.msg('删除成功');
                        if (typeof afterOk === 'function') {
                            afterOk();
                        }
                    },
                    error: function () {
                        layer.close(loadIdx);
                        layer.msg('删除请求失败，请稍后重试');
                    }
                });
            }

            // 提交更新：同步状态等（请求体与后端 updateXxkImmediate 对齐，可按实体扩展字段）
            function requestUpdateImmediate(payload, afterOk) {
                var loadIdx = layer.load(1, { shade: [0.15, '#000'] });
                $.ajax({
                    url: xxkImmediateApi.update,
                    type: 'post',
                    dataType: 'json',
                    // 后端按 @RequestParam 接收，需使用表单参数提交
                    data: {
                        comPersonId: payload && payload.comPersonId !== undefined ? payload.comPersonId : '',
                        cmeYear: payload && payload.cmeYear !== undefined ? payload.cmeYear : '',
                        gdrstSwapstate: payload && payload.gdrstSwapstate !== undefined ? payload.gdrstSwapstate : ''
                    },
                    success: function (res) {
                        layer.close(loadIdx);
                        if (!isJsonResultOk(res)) {
                            layer.msg((res && res.msg) ? res.msg : '保存失败');
                            return;
                        }
                        layer.msg('保存成功');
                        if (typeof afterOk === 'function') {
                            afterOk();
                        }
                    },
                    error: function () {
                        layer.close(loadIdx);
                        layer.msg('保存请求失败，请稍后重试');
                    }
                });
            }

            // 提交新增：占位接口，需后端实现 insert 与入参实体
            function requestInsertImmediate(payload, afterOk) {
                var loadIdx = layer.load(1, { shade: [0.15, '#000'] });
                $.ajax({
                    url: xxkImmediateApi.insert,
                    type: 'post',
                    dataType: 'json',
                    // 后端按 @RequestParam 接收，需使用表单参数提交
                    data: {
                        comPersonId: payload && payload.comPersonId !== undefined ? payload.comPersonId : '',
                        cmeYear: payload && payload.cmeYear !== undefined ? payload.cmeYear : '',
                        gdrstSwapstate: payload && payload.gdrstSwapstate !== undefined ? payload.gdrstSwapstate : ''
                    },
                    success: function (res) {
                        layer.close(loadIdx);
                        if (!isJsonResultOk(res)) {
                            layer.msg((res && res.msg) ? res.msg : '新增失败');
                            return;
                        }
                        layer.msg('新增成功');
                        if (typeof afterOk === 'function') {
                            afterOk();
                        }
                    },
                    error: function () {
                        layer.close(loadIdx);
                        layer.msg('新增请求失败，请稍后重试');
                    }
                });
            }

            // 打开新增弹窗，提交后刷新当前列表（默认重新查全部，便于与后端列表一致）
            function openAddDialog() {
                var fixedCmeYear = '2025';
                var uid = 'add_' + Date.now();
                var html = ''
                    + '<div class="layui-form" lay-filter="' + uid + '" style="padding:16px 24px 0 24px;">'
                    + '  <div class="layui-form-item">'
                    + '    <label class="layui-form-label">人员ID</label>'
                    + '    <div class="layui-input-block">'
                    + '      <input type="text" id="' + uid + '_comPersonId" placeholder="comPersonId / personId" autocomplete="off" class="layui-input" />'
                    + '    </div>'
                    + '  </div>'
                    + '  <div class="layui-form-item">'
                    + '    <label class="layui-form-label">继教年度</label>'
                    + '    <div class="layui-input-block">'
                    + '      <input type="text" id="' + uid + '_cmeYear" value="' + fixedCmeYear + '" readonly class="layui-input layui-disabled" />'
                    + '    </div>'
                    + '  </div>'
                    + '  <div class="layui-form-item">'
                    + '    <label class="layui-form-label">同步状态</label>'
                    + '    <div class="layui-input-block">'
                    + '      <select id="' + uid + '_gdrstSwapstate">'
                    + '        <option value="">请选择</option>'
                    + '        <option value="0">未同步</option>'
                    + '        <option value="2">已同步</option>'
                    + '        <option value="4">同步失败</option>'
                    + '      </select>'
                    + '    </div>'
                    + '  </div>'
                    + '</div>';
                layer.open({
                    type: 1,
                    skin: 'gdrsImmediateLayer',
                    title: '新增选修课即时表',
                    area: ['480px', '360px'],
                    content: html,
                    btn: ['保存', '取消'],
                    success: function () {
                        form.render('select');
                    },
                    yes: function (index) {
                        var comPersonId = ($('#' + uid + '_comPersonId').val() || '').trim();
                        var cmeYear = fixedCmeYear;
                        var gdrstSwapstateRaw = $('#' + uid + '_gdrstSwapstate').val();
                        if (!comPersonId) {
                            layer.msg('请填写人员ID');
                            return;
                        }
                        if (gdrstSwapstateRaw === '' || gdrstSwapstateRaw === null) {
                            layer.msg('请选择同步状态');
                            return;
                        }
                        var payload = {
                            comPersonId: comPersonId,
                            cmeYear: cmeYear,
                            gdrstSwapstate: parseInt(gdrstSwapstateRaw, 10)
                        };
                        requestInsertImmediate(payload, function () {
                            layer.close(index);
                            requestSelectByParamAndRender();
                        });
                    }
                });
            }

            // 打开编辑弹窗：提交人员主键、年度、同步状态（兼容 personId/comPersonId 两种主键字段）
            function openEditDialog(row) {
                var personId = getRowPersonId(row);
                var cmeYear = '2025';
                var stateVal = row && row.gdrstSwapstate !== undefined && row.gdrstSwapstate !== null ? String(row.gdrstSwapstate) : '';
                var uid = 'edit_' + Date.now();
                var html = ''
                    + '<div class="layui-form" style="padding:16px 24px 0 24px;">'
                    + '  <div class="layui-form-item">'
                    + '    <label class="layui-form-label">人员ID</label>'
                    + '    <div class="layui-input-block">'
                    + '      <input type="text" id="' + uid + '_comPersonId" readonly class="layui-input layui-disabled" />'
                    + '    </div>'
                    + '  </div>'
                    + '  <div class="layui-form-item">'
                    + '    <label class="layui-form-label">继教年度</label>'
                    + '    <div class="layui-input-block">'
                    + '      <input type="text" id="' + uid + '_cmeYear" readonly class="layui-input layui-disabled" />'
                    + '    </div>'
                    + '  </div>'
                    + '  <div class="layui-form-item">'
                    + '    <label class="layui-form-label">同步状态</label>'
                    + '    <div class="layui-input-block">'
                    + '      <select id="' + uid + '_gdrstSwapstate">'
                    + '        <option value="">请选择</option>'
                    + '        <option value="0">未同步</option>'
                    + '        <option value="2">已同步</option>'
                    + '        <option value="4">同步失败</option>'
                    + '      </select>'
                    + '    </div>'
                    + '  </div>'
                    + '</div>';
                layer.open({
                    type: 1,
                    skin: 'gdrsImmediateLayer',
                    title: '编辑选修课即时表',
                    area: ['480px', '360px'],
                    content: html,
                    btn: ['保存', '取消'],
                    success: function () {
                        $('#' + uid + '_comPersonId').val(personId);
                        $('#' + uid + '_cmeYear').val(cmeYear);
                        $('#' + uid + '_gdrstSwapstate').val(stateVal);
                        form.render('select');
                    },
                    yes: function (index) {
                        var gdrstSwapstateRaw = $('#' + uid + '_gdrstSwapstate').val();
                        var gdrstSwapstate = parseInt((gdrstSwapstateRaw || '').trim(), 10);
                        if (gdrstSwapstateRaw === '' || gdrstSwapstateRaw === null || isNaN(gdrstSwapstate)) {
                            layer.msg('请选择同步状态');
                            return;
                        }
                        var payload = {
                            // 兼容后端按 personId 或 comPersonId 更新
                            personId: personId,
                            comPersonId: personId,
                            cmeYear: cmeYear,
                            gdrstSwapstate: gdrstSwapstate
                        };
                        requestUpdateImmediate(payload, function () {
                            layer.close(index);
                            requestSelectByParamAndRender();
                        });
                    }
                });
            }

            // 初始化表格（无分页；数据由接口加载后 reload）
            table.render({
                elem: '#gdrsImmediateTableElem',
                id: 'gdrsImmediateTable',
                toolbar: '#gdrsImmediateToolbarTpl',
                defaultToolbar: [],
                data: [],
                page: false,
                limit: 200,
                text: { none: '暂无数据' },
                cols: [[
                    { type: 'numbers', title: '序号', width: 60, align: 'center' },
                    { field: 'comPersonId', title: '人员ID', align: 'center', minWidth: 190, templet: function (d) {
                        return getRowPersonId(d) || '';
                    }},
                    // { field: 'cmeYear', title: '继教年度', align: 'center', width: 90 },
                    {
                        field: 'gdrstSwapstate',
                        title: '同步状态',
                        align: 'center',
                        width: 90,
                        templet: function (d) {
                            return renderGdrstSwapstateText(d.gdrstSwapstate);
                        }
                    },
                    { fixed: 'right', title: '操作', align: 'center', toolbar: '#gdrsImmediateRowBarTpl', width: 150 }
                ]]
            });

            // 表头工具栏：新增
            table.on('toolbar(gdrsImmediateTable)', function (obj) {
                if (obj.event === 'addRow') {
                    openAddDialog();
                }
            });

            // 行工具：编辑、删除
            table.on('tool(gdrsImmediateTable)', function (obj) {
                var row = obj.data;
                if (obj.event === 'editRow') {
                    openEditDialog(row);
                } else if (obj.event === 'delRow') {
                    layer.confirm('确定删除该条记录？', { icon: 3, title: '提示' }, function (index) {
                        layer.close(index);
                        requestDeleteRow(row, function () {
                            requestSelectByParamAndRender();
                        });
                    });
                }
            });

            // 条件查询提交
            form.on('submit(searchXxkImmediate)', function () {
                var certId = ($('#searchCertId').val() || '').trim();
                var personNo = ($('#searchPersonNo').val() || '').trim();
                requestSelectByParamAndRender(certId, personNo);
                return false;
            });


            // 重置搜索框并加载全部
            $('#btnResetSearch').on('click', function () {
                $('#searchCertId').val('');
                $('#searchPersonNo').val('');
                requestSelectByParamAndRender();
            });

            // 首次进入加载全部数据
            requestSelectByParamAndRender();
        });
    </script>
</body>

</html>
