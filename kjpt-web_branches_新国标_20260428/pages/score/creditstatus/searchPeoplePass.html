<body class="body-area"></body>


<script>
    const GUANGDONG_test = "289bf0ca-52cb-4b19-b737-9bd200a69ce1";
    const NEIMENGGU_test = "08e44437-5789-44e0-8ff8-9ecb00a6348a";
    let getCmeStandardKindId = function () {
        return localStorage.getItem("standardkind-id");
    }

    let scriptSrc = '/pages/score/creditstatus/js/searchPeoplePass-default.js';

    //不同的套维护不同的js，以后各个套改动可以便捷一点
    if(getCmeStandardKindId() == GUANGDONG_test) {
        scriptSrc = '/pages/score/creditstatus/js/searchPeoplePass-guandong.js';
    } else  if(getCmeStandardKindId() == NEIMENGGU_test) {
        scriptSrc = '/pages/score/creditstatus/js/searchPeoplePass-neimenggu.js';
    }
    let script = document.createElement('script');
    script.src = scriptSrc;
    script.onload = function() {   console.log('加载js成功') };
    script.onerror = function() { console.error('加载js失败') };
    
    document.head.appendChild(script);
</script>
