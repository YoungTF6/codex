<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head runat="server">
    <meta charset="UTF-8">
    <title>非本省人员打印学分</title>
    <link href="/css/score/index.css" rel="stylesheet" type="text/css" />
    <link href="/css/score/reset.css" rel="stylesheet" type="text/css" />
    <script src="/js/provinceScore/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="../../../js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script src="../../../js/layui-v2.6.8/layui/layui.js"></script>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <script type="text/javascript" src="../../../js/axios.min.js"></script>
</head>


<body style="background: url(/img/province_score_print_new/bg.png) no-repeat center center;">
    <div class="dialog" id="repDiv" style="display: none;">
        <div class="dialog_box">
            <div class="dialog_item">
                <div class="close_box">
                    <img src="/img/province_score_print_new/clo_img.png" onclick="closeDialog()">
                </div>
                <div class="tb_card">
                    <div class="tit_box">
                        <h1>下载证书</h1>
                    </div>
                    <div style="height:500px;overflow:auto;background-color:#eee" id="certificateList">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="box_main">
        <div class="box_item">
            <div class="cont_box">
                <div class="ht_tit">
                    <h1><b>证书查询与下载</b></h1>
                    <div class="t_box"></div>
                </div>
                <div class="mess_box">
                    <ul>
                        <li>
                            <p><b>*</b>选择年度</p>
                            <div class="inp_box">
                                <select id="dropYear" class="layui-input" lay-verify="required">
                                </select>
                            </div>
                        </li>
                        <li>
                            <p><b>*</b>项目编号</p>
                            <div class="inp_box">
                                <input type="text" id="txt_projNo" placeholder="请输入项目编号" class="layui-input" />
                            </div>
                        </li>
                        <li>
                            <p><b>*</b>项目名称</p>
                            <div class="inp_box">
                                <input type="text" id="txt_projName" placeholder="请输入名称" class="layui-input" />
                            </div>
                        </li>
                        <li>
                            <p><b>*</b>学生姓名</p>
                            <div class="inp_box">
                                <input type="text" id="txt_personName" placeholder="请选择姓名" class="layui-input" lay-verify="required" />
                            </div>
                        </li>
                    </ul>
                </div>
                <div class="btn_box">
                    <button class="theBtn" lay-submit lay-filter="BtnSearch">查询</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        layui.use(['form', 'layer', 'jquery'], function () {
            var form = layui.form,
                layer = layui.layer,
                $ = layui.jquery;

            // 初始化年度下拉框
            $(document).ready(function () {
                loadYears();
            });

            // 表单提交事件
            form.on('submit(BtnSearch)', function (data) {
                searchCertificates();
                return false;
            });

            function loadYears() {
                // 模拟加载年度数据 
                var yearSelect = $("#dropYear");
                yearSelect.empty();
                yearSelect.append('<option value="">请选择年度</option>');
                //加载最近5年的年度
                var currentYear = new Date().getFullYear();
                for (var i = 0; i < 5; i++) {
                    var year = currentYear - i;
                    // 默认选中当前年度
                    if (year == currentYear) {
                        yearSelect.append('<option value="' + year + '" selected>' + year + '</option>');
                    } else {
                        yearSelect.append('<option value="' + year + '">' + year + '</option>');
                    }
                }
                form.render('select');
            }

            function searchCertificates() {
                var year = $("#dropYear").val();
                var projNo = $("#txt_projNo").val();
                var projName = $("#txt_projName").val();
                var personName = $("#txt_personName").val();

                if (!year) {
                    layer.alert("请选择年度！");
                    return false;
                }
               
                if (!projNo && !projName) {
                    layer.alert("项目编号或者项目名称请任意填写一项！");
                    return false;
                }
                if (!personName) {
                    layer.alert("学员姓名不能为空！");
                    return false;
                }

                $.ajax({
                    url: huayi_projectscore_url + 'cmeProvinceProjScore/selectProvinceProjectScoreList',
                    type: 'POST',
                    data: {
                        year: year,
                        projNo: projNo,
                        projName: projName,
                        personName: personName
                    },
                    success: function (data) {
                        if(data.data.length === 0){
                            layer.alert("未查询到相关数据！");
                            return false;
                        }
                        updateCertificateList(data.data);
                    },
                    error: function (error) {
                        console.error("Error:", error);
                    }
                });
            }

            function updateCertificateList(data) {
                var certificateList = $("#certificateList");
                certificateList.empty();
                data.forEach(function (item) {
                    var certificateHtml = '<div style="border-bottom:5px solid #eee;background-color:#fff">' +
                        '<div class="table_box">' +
                        '<table>' +
                        '<tr><td style="width: 80px;">项目编号：</td><td colspan="3"><span>' + item.proj_no + '</span></td></tr>' +
                        '<tr><td>项目名称：</td><td colspan="3"><span>' + item.proj_name + '</span></td></tr>' +
                        '<tr><td>学员姓名：</td><td><span>' + item.person_name + '</span></td><td style="width: 90px;">日期：</td><td><span>' + item.end_date + '</span></td></tr>' +
                        '<tr><td>学时：</td><td><span>' + item.period + '</span></td><td>学分：</td><td><span>' + item.score + '</span></td></tr>' +
                        '</table>' +
                        '<div class="tg_img"><img src="' + item.imgstate + '" /></div>' +
                        '</div>' +
                        '<div class="btn_box">' +
                        (item.check_state === "审核通过" ? '<button class="theBtn" onclick="downloadCertificate(\'' + item.score_id + '\')">下载证书</button>' : '') +
                        '</div>' +
                        '</div>';
                    certificateList.append(certificateHtml);
                });
                $("#repDiv").show();
            }

            window.downloadCertificate = function (scoreId) {
                // 实现下载证书的逻辑
                console.log("下载证书，scoreId:", scoreId);
                var scoreIdList = [];
                scoreIdList.push(scoreId);
                if (scoreIdList.length < 1) {
                    layer.msg('请先选择学分', {icon: 7, time: 1500});
                    return false;
                }
                let scoreIds = scoreIdList.join(',');
                console.log('scoreIdList: ', scoreIdList);
                console.info('scoreIds: ', scoreIds);

                let visit = huayi_sjwh_url + 'audit/pdf/down/fps/' + scoreIds; // 4
                downloadFile(visit, {}, '外省人员学分证书.pdf');
                return false;
            }

            window.closeDialog = function () {
                $("#repDiv").hide();
            }
        });
    </script>
</body>
</html>
