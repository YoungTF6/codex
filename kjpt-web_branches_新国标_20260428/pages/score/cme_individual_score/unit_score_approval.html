<script>

    const scoreKindId = getUrlParamByName('scoreKindId');
    const scoreLevelId = getUrlParamByName('scoreLevel');
    scoreKindId && $('span[data-id=lblScoreLevel]').attr('data-echo-values', scoreKindId);
    scoreLevelId && $('span[data-id=lblScoreLevel]').attr('data-echo-values', scoreLevelId);
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        treeSelect: 'treeSelect',
        tool: 'tool'
    });
    layui.use(['table', 'form','laydate', 'treeSelect','tool'], function () {
        let table = layui.table,form = layui.form,laydate = layui.laydate,
        treeSelect=layui.treeSelect,tool=layui.tool;
        let height = 0,ajaxNum=0;
        let loading,deptId,userType,nowRowData,approvalData,approvalType,nowScoreIds;
        let flagEnum = {'select': 'select', 'cp': 'cp'};
        let approvalUrl = huayi_projectscore_url + "cmeDeptSingleprojScore/unitApprovalScore";
        let standardkindId = localStorage.getItem("standardkind-id");
        let userId = localStorage.getItem("user-id");
        let unitId = localStorage.getItem("unit-id");
        let scale = 3,viewFile = "viewFile",photoWindow = "photoWindow";
        const _isHainan = '6eec6713-670a-43cc-ad4d-9bd700a92928' === standardkindId; // 海南

        //海南-审批判断90天内的
        let hain_unitId = _isHainan? unitId : "";

        //关闭closeLoading的判断
        let closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }
        var laydateStart ,laydateEnd;


        function maxDate() {
            var nowDate = new Date();
            return nowDate.getFullYear() + "-" + (nowDate.getMonth() + 1) + "-" + nowDate.getDate();
        }
        function minDate() {
            var nowDate = new Date();
            return nowDate.getFullYear() + "-01-01";
        }
        const yearCur = new Date().getFullYear();
        /* 举办年度 */
        $('#cmeYear').empty();
        for (let i = yearCur; i >= yearCur - 8; i--) {
            $('#cmeYear').append($('<option value="' + i + '" ' + (i == yearCur ? 'selected' : '') + '>' + i + '</option>'));
        }
        window.getCmeYear = () => {
            return $('#cmeYear').val();
        }
        form.on('select(cmeYear)', date => (initScoreLevelSel(), getCmeYearStartEnd(cmeYear)));
        // window.initScoreLevelSel = () => {
        //     let year = $('#cmeYear').val();
        //     window.scoreLevelSel && (treeSelect.destroy('scoreLevel'), $('#scoreLevel').val(''));
        //     window.scoreLevelSel = treeSelect.render({
        //         elem    : '#scoreLevel',
        //         data    : huayi_sjwh_url + 'option/scoreLevel/tree/' + standardkindId + '/' + year + '/__1',
        //         type    : 'get',
        //         search  : true,
        //         style   : {
        //             folder  : { enable: false }, // 父节点图标
        //             line    : { enable: true} // 连接线
        //         },
        //         click   : d => (reloadTable()),
        //         success : d => (reloadTable())
        //     });
        // }
        // initScoreLevelSel();

        //时间组件绑定
        let dateInit = function(){
            laydateStart = laydate.render({elem: '#startDate',type: 'date',max: maxDate(), min: minDate()});
            laydateEnd = laydate.render({elem: '#endDate',type: 'date',max: maxDate(), min: minDate()});
        }
        dateInit();
        // 活动日期限制
        let getCmeYearStartEnd = function(){
            let minMaxObj ;
            let url = huayi_sjwh_url + "cmeYear";
            $.ajax({
                async: false,
                url:url,
                data: { cmeYear: $('#cmeYear').val() },
                success: function(res) {
                    let data = res.data;
                    let startDate = "";
                    let endDate = "";
                    if(data != null && data.length > 0) {
                        startDate = data[0].startDate;
                        endDate = data[0].endDate;
                        $("#startDate").val(startDate);
                        $("#endDate").val(endDate);
                        startD = new Date(startDate);
                        endD = new Date(endDate);
                        minMaxObj = {
                            min:{ year: startD.getFullYear(),month: startD.getMonth(), date: startD.getDate()},
                            max:{ year: endD.getFullYear(),month: endD.getMonth(), date:  endD.getDate()}
                        };
                        laydateStart.config.min =  minMaxObj.min;
                        laydateStart.config.max =  minMaxObj.max;
                        laydateEnd.config.min =  minMaxObj.min;
                        laydateEnd.config.max =  minMaxObj.max;
                    }
                }
            });
        }
        getCmeYearStartEnd();
        //设置时间选取范围<=90
        let limitCount = 0;
        $.ajax({
                type: "get",
                url: huayi_projectscore_url +"cmeDeptSingleprojScore/getSingleScoreLimitDay",
                data: {unitId: unitId},
                dataType: 'json',
                async: false,
                success: function (res) {
                    limitCount = res.data == null? 0 : res.data;
                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            });
        let now = new Date();
        let curYear = now.getFullYear();
        let month = now.getMonth()+1;
        let day = now.getDate();
        let currentDate = curYear + "-" + month + "-" + day;
        let nowtime = new Date().getTime();
        let befor = new Date(nowtime-3600 * 1000 * 24 * limitCount);
        let befYear = befor.getFullYear();
        let befmonth = befor.getMonth()+1;
        let befday = befor.getDate();
        let beforeDate = curYear + "-1-1" ;
        //限制时间范围 海南套
        if (_isHainan && limitCount > 0) {
            beforeDate = befYear + "-" + befmonth + "-" + befday;
            laydate.render({
            elem: '#endDate', //指定元素
            // max: currentDate,
            // min: beforeDate
            });
            laydate.render({
                elem: '#startDate', //指定元素
                // min: beforeDate,
                // max: currentDate
            });
        }


        window.reloadTable = function() {
            table.reload('deptScoreTable',{
                where: {
                    certId : $('#certId').val(),
                    personName : $('#personName').val(),
                    checkState : $('#checkState').val(),
                    singleProjName : $('#singleProjName').val(),
                    startDate : $('#startDate').val(),
                    endDate : $('#endDate').val(),
                    deptId:$('#hidden_dept_id').val(),
                    scoreLevel: $('#scoreLevel').val(),
                    personNo: $('#personNo').val(),
                    unitId:unitId,
                },
                page: {
                    curr: 1 //重新从第 1 页开始
                }
            });
        }

        window.loaderTable = function(){
            table.render({
                elem : "#deptScoreBox",
                id: "deptScoreTable",
                url: huayi_projectscore_url + "cmeDeptSingleprojScore/unitApprovalList",
                toolbar: '#toolBar',
                height: height,
                cellMinWidth: 100,
                defaultToolbar: [],
                page: true,
                limits: [10, 50, 100, 150, 200],
                limit: 10,
                where: {
                    certId : $('#certId').val(),
                    personName : $('#personName').val(),
                    checkState : $('#checkState').val(),
                    singleProjName : $('#singleProjName').val(),
                    startDate : $('#startDate').val(),
                    endDate : $('#endDate').val(),
                    deptId:$('#hidden_dept_id').val(),
                    scoreLevel: $('#scoreLevel').val(),
                    personNo: $('#personNo').val(),
                    unitId:unitId,
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                cols: [[
                    {type: 'CheckCustom',title:'选择', fixed: 'left',align: 'center',width:60,
                        templet:function(d){
                            let checkHtml = `<input type="checkbox" name="select_one" lay-filter="select_one" title="" lay-skin="primary" data-id="${d.scoreId}">`;
                            if(d.checkState == 1 || d.checkState == 2 || d.checkState == 3 || d.checkState == 99){
                                checkHtml = `<img src="/img/score/disableIcon.png">`;
                            }
                            return checkHtml;
                        }},
                    {title: '操作',align: 'center', width: 210, toolbar: '#rowBar', fixed: 'left'},
                    {field:'photo',title:'学分证明图片',align:"center",minWidth:120,toolbar:'#photoBar'},
                    {field:'checkState',title: '审核状态',align:"center", width: 140,sort:true, templet: function (d) {
                        if(d.checkState == 0 || d.checkState == 3) return "未审核";
                        if(d.checkState == 1) return "退回";
                        if(d.checkState == 2) return "审核不通过";
                        if(d.checkState == 99) return "审核通过";
                    }},
                    {field:'personName',title: '姓名',align:"center",sort:true},
                    {field:'deptName',title: '科室',align:"center",sort:true},
                    // {field:'singleProjName',title: '内容',align:"center",sort:true, width: 200,},
                    {field:'studyDate',title: '活动日期',align:"center",minWidth:110,sort:true},
                    {field:'extData',title: '详细信息',align:"center",minWidth:300,
                        templet:function(d){
                            // 单元格鼠标悬浮显示
                            var cellValue = buildExtDataHtml(d.extData);
                            // 为内容添加唯一标识，以便后续绑定事件
                            var cellId = 'ext-data-cell-' + d.LAY_TABLE_INDEX;
                            // 返回带有唯一 ID 的单元格内容
                            return `<div id="${cellId}" class="layui-table-cell layui-ext-data-cell">${cellValue}</div>`;
                        }
                    },
                    {field:'singleProjName',title: '活动名称',align:"center",minWidth:200,sort:true},
                    {field:'singleProjNo',title: '项目编号',align:"center",minWidth:180,sort:true},
                    {field:'kindName',title: projectLabels.lblScoreLevel,align:"center",minWidth:130,sort:true},
                    {field:'scoreLevelName',title: projectLabels.lblScoreLevelChild,align:"center",minWidth:180,sort:true},
                    {field:'holdTypeName',title: projectLabels.lblActivityForm,align:"center",minWidth:180,sort:true},
                    {field:'score',title: '学分',align:"center",sort:true},
                    {field:'period',title: '学时',align:"center",sort:true},
                    {field:'remark',title: '备注',align:"center"},
                    {field:'reportDate',title: '上报日期',align:"center",minWidth:180,sort:true},
                    {field:'approvalTime',title: '审核日期',align:"center",sort:true,minWidth:180},
                    {field:'approvalContext',title: '审核意见',align:"center",sort:true,minWidth:200},
                    {field:'teachUnitName',title: '发证机构',align:"center",minWidth:150,sort:true},
                ]],
                parseData: function (res) {
                    if(res.status == 200){
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }
                    }
                },
                done:function(res,curr,count){
                    if(res.status == 500) return;
                    // 检查所有数据中是否有 extData 不为空的记录
                    let hasExtData = res.data.some(item => item.extData);
                    // 如果没有任何数据有 extData，则隐藏该列
                    if (!hasExtData) {
                        $('.layui-table-box').find('[data-field="extData"]').hide();
                        // 同时隐藏表头
                        $('.layui-table-header').find('[data-field="extData"]').hide();
                    }
                    let trElems = $(".layui-table-fixed .layui-table-body .layui-table tbody tr");
                    if(res.data.length != trElems.length) return;
                    form.on("checkbox(select_one)", function () {
                        //如果取消选中，就将全选取消
                        if(!$(this).prop("checked")){
                            $("input[name=selectFlag]").prop('checked',false);
                        }
                        form.render();
                    });

                    // 绑定单元格悬浮事件
                    bindExtDataTips();

                }
            });
        }

        //审批意见表格
        let loaderApprovalTable = function(){
            table.render({
                elem : "#approvalTextBox",
                id: "approvalTextTable",
                data:approvalData,
                toolbar: '#dictToolBar',
                defaultToolbar: [],
                page: false,
                limit:approvalData.length,
                cols: [[
                    {title: '操作',align: 'center', width:120, toolbar: '#dictRowBar', fixed: 'left'},
                    {field:'approvalText',title: '描述',align:"center",templet:"#approvalTextBar"}
                ]],
                done:function(){ bindInputValue();}
            });
        }

        let initFrom = function(){
            form.render('select');
            // let objData = ["#activityDate","#startDate","#endDate"];
            // for (let elem of objData) {
            //     laydate.render({ elem: elem, type: 'date' });
            // }
            // let now = new Date();
            // let curYear = now.getFullYear();
            // let month = now.getMonth()+1;
            // let day = now.getDate();
            // $("#startDate").val(beforeDate);
            // $("#endDate").val(curYear+"-"+month+"-"+day);


        }
        //监听头工具栏事件和行内操作按钮
        let bindTableTool = function() {
            //监听学分表
            table.on('toolbar(dept-score-box)', function(obj){
                if(obj.event == "safeApproval") {
                    safeApproval();
                }else{
                    let scoreIds = [];
                    $.each($(".layui-table-fixed input[name=select_one]"), function (i, value) {
                        if ($(this).prop('checked') === true && this.getAttribute("data-id").length>0) {
                            scoreIds.push(this.getAttribute("data-id"));
                        }
                    });
                    if(scoreIds.length == 0){
                        layer.msg("请至少勾选一个");
                        return;
                    }
                    nowScoreIds = Array.from(new Set(scoreIds));
                    obj.event == "passBatch" && passBatch(scoreIds);
                    obj.event == "noPassBatch" && noPassBatch(scoreIds);
                    obj.event == "backBatch" && backBatch();
                }
            });
            table.on('tool(dept-score-box)', function (obj) {
                const rowData = obj.data;
                let scoreIds = [rowData.scoreId];
                nowScoreIds = Array.from(new Set(scoreIds));
                obj.event == "pass" && passBatch(scoreIds);
                obj.event == "noPass" && noPassBatch(scoreIds);
                obj.event == "back" && backBatch();
                obj.event == "view" && viewScore(rowData);
                obj.event == "viewAllPhoto" && viewAllPhotos(rowData);
            })
            //监听审批意见表
            table.on('toolbar(approval-text-box)',function(obj){
                obj.event == "add" && addApproval();
                obj.event == "save" && saveApproval();
            })
            table.on('tool(approval-text-box)', function (obj) {
                const rowData = obj.data;
                obj.event == "delete" && deleteApproval(rowData)
            })

        }
        //监听动态表格的input框
        let bindInputValue = function(){
            //输入框的值改变时触发
            $(".js-approval-input").change("input", function (e) {
                const index = getIndex(e.target);
                const value = e.target.value;
                approvalData[index]["approvalText"] = value;
            });
        }
        //判断数据是第几行，这里获取的是下表
        let getIndex = function (elem) {
            if (elem.tagName == "TR") {
                return elem.getAttribute("data-index");
            } else {
                return getIndex(elem.parentElement);
            }
        }
        //编辑审批意见
        let safeApproval = function(){
            layer.open({
                type: 1,
                title: '维护审核意见',
                content: $('#editApproval'),
                area: ['550px', '500px'],
                success:function(){ loaderApprovalTable(); },
                cancel:function(){
                    let tempArr = [];
                    for (let obj of approvalData) {
                        obj.approvalText!="" && tempArr.push(obj)
                    }
                    approvalData = tempArr;
                }
            })
        }
        //增加审批意见
        let addApproval = function(){
            approvalData.push({userId:userId,approvalText:"",tempId:new Date().getTime()});
            loaderApprovalTable();
        }
        //删除审批意见
        let deleteApproval = function(rowData){
            let idStr = "dictId";
            if(!rowData.hasOwnProperty("dictId")) idStr="tempId";
            for (let i = 0; i < approvalData.length; i++) {
                if(approvalData[i].hasOwnProperty(idStr)&&approvalData[i][idStr]==rowData[idStr]){
                    approvalData.splice(i,1);
                    continue;
                }
            }
            loaderApprovalTable();
        }
        //保存数据
        let saveApproval = function(){
            let approvalContexts = [];
            for (let i = 0; i < $(".js-approval-input").length; i++) {
                if($(".js-approval-input")[i].value!="") {
                    approvalContexts.push($(".js-approval-input")[i].value);
                }
            }
            let saveUrl = huayi_projectscore_url + "cmeDeptSingleprojDict/saveAll";
            commonAjax('post',saveUrl,{"approvalContexts":approvalContexts},function(){layer.msg("保存失败");},
                function(res){
                    if (res.status === 200) {
                        layer.msg("保存成功");
                    }else{  layer.msg("保存失败"); }
                }
            );
        }

        //查看学分
        let viewScore = function(rowData){
            form.val('score-info-form', rowData);
            $(".js-people-no").html(rowData.personNo);
            $(".js-people-name").html(rowData.personName);
            getFilesByScoreId(rowData.scoreId,"view");
            applyBaseInfoConfigByScoreLevel(rowData.scoreLevel, 'view');

            viewScoreDetail('score-info-form', rowData, 'view');
            if (window.applyGuangdongTeachUnitLabel) window.applyGuangdongTeachUnitLabel(rowData.scoreLevel, $("#scoreInfoWindow"));
            return;

            layer.open({
                type: 1,
                title: '学分详情',
                content: $('#scoreInfoWindow'),
                area: ($(window).width() < 1100) ? ['90%', '480px'] : ['750px','480px'],
                cancel: function(index, layero){ $("#viewFileList").html(""); }
            })
        }
        //批量通过和单个通过共用这一个方法
        let passBatch = function(scoreIds){
            let data = {"scoreIds":scoreIds,"approvalContext":"",checkState:3,"unitId":hain_unitId};
            commonAjax('post',approvalUrl,data,function(){layer.msg("操作失败");},
                function(res){
                    if (res.status === 200) {
                        layer.msg("操作成功");
                        reloadTable();
                    }else{  layer.msg(res.msg); }
                }
            );
        }
        //批量不通过和单个不通过共用这一个方法
        let noPassBatch = function(){openWindowWriteApproval(2);}
        //批量退回和单个不通过共用这一个方法
        let backBatch = function(){  openWindowWriteApproval(1);  }
        //打开填写审核意见
        let openWindowWriteApproval = function(tempType = 1){
            approvalType = tempType;//审核类型，是退回还是审核不通过
            layer.open({
                type: 1,
                title: '请填写审核意见',
                content: $('#approvalScoreWindow'),
                area: ['550px', '270px'],
                cancel: function(index, layero){ $(".js-approval-text").val("");}
            })
        }

        //查看证明图片
        let viewAllPhotos = function(rowData){
            commonAjax('post',huayi_projectscore_url + 'cmeDeptSingleprojPhoto/list',
                {scoreId: rowData.scoreId},
                function(){layer.msg("获取证明文件失败");},
                function(res){
                    if(res.status == 200){
                        if(res.data == null || res.data.length==0) {
                            layer.msg("未上传证明图片");
                            return;
                        }
                        let imgElems = '';
                        for(let tempObj of res.data){
                            if(tempObj.scorePhotoUrl.indexOf(".pdf")>0) continue;
                            imgElems += `<li><img class="list-show-img" src="${tempObj.scorePhotoUrl}" alt="${tempObj.fileName}"></li>`;
                        }
                        $(`#${photoWindow}`).html(imgElems);
                        //处理pdf
                        for(let tempObj of res.data){
                            if(tempObj.scorePhotoUrl.indexOf(".pdf")>0) {
                                getPdfFromUrl(tempObj.scorePhotoUrl,photoWindow);
                            }
                        }
                        layer.open({
                            type: 1,
                            shade: 0.8,
                            offset: 'auto',
                            area: ['90%','90%'],
                            shadeClose:true,//点击外围关闭弹窗
                            scrollbar: false,//不现实滚动条
                            title: "预览", //不显示标题
                            content: $(`#${photoWindow}`)
                        });

                    }else{ layer.msg("获取证明文件失败"); }
                });
        }

        function  getPdfFromUrl(url,id){
            tool.viewPdfBack(url,id);
        }



        //获取审批数据
        let getApprovalData = function(){
            let approvalListUrl = huayi_projectscore_url + "cmeDeptSingleprojDict/list";
            commonAjax('get',approvalListUrl,{},function(){layer.msg("获取审批意见失败");},
                function(res){
                    if (res.status === 200) {
                        approvalData = res.data;
                    }else{  layer.msg("获取审批意见失败"); }
                });
        }

        //获取科室信息树
        let getDeptTree = function(){
            treeSelect.render({
                elem: '#deptSelect',
                data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + unitId,
                type: 'get',
                search  : true,
                click:function(data){
                    $("#hidden_dept_id").val(data.current.id);
                }
            })
        }

        //监听所有按钮
        let bindAllBtn = function(){
            //监听图片点击
            tool.imgChangeBind(".list-show-img");
            //监听选择审批意见按钮
            $(".js-choose-approval").click(function(){
                let lastIndex = layer.open({
                    type: 1,
                    title: '填选择审核意见',
                    content: $('#chooseApprovalWindow'),
                    area: ['360px', '300px'],
                    success:function(){
                        let liHtml = "";
                        for (let i = 0; i < approvalData.length; i++) {
                            const element = approvalData[i];
                            if(element.approvalText != null && element.approvalText!=''){
                                liHtml += `<li class="js-approval-li">${element.approvalText}</li>`;
                            }
                        }
                        $(".js-approval-ul").html(liHtml);
                        //监听审批意见的ul
                        $(".js-approval-li").click(function(){
                            $(".js-approval-text").val($(this).text())
                            layer.close(lastIndex);
                        });
                    }
                })
            })

            //监听提交按钮
            $(".js-submit-approval").click(function(){
                const approvalValue = $(".js-approval-text").val();
                if(approvalValue == ""){
                    layer.msg("请填写审批意见！",{icon:5});
                    return;
                }
                let data = {"scoreIds":nowScoreIds,"approvalContext":approvalValue,checkState:approvalType,"unitId":hain_unitId};
                commonAjax('post',approvalUrl,data,function(){layer.msg("操作失败");},
                    function(res){
                        if (res.status === 200) {
                            layer.msg("操作成功");
                            layer.closeAll();
                            $(".js-approval-text").val("");
                            reloadTable();
                        }else{  layer.msg(res.msg); }
                    }
                );
            })

            //监听本页全选
            form.on('checkbox(selectFlag)', function (data) {
                let isChecked = data.elem.checked;
                exportFlag = isChecked ? data.elem.value : flagEnum.select;
                if (isChecked) {
                    let that = data.elem;
                    $.each($("input[name=selectFlag]"), function () {
                        if (this !== that) {
                            $(this).prop('checked', !isChecked);
                        }
                    })
                }

                $("input[name=select_all]").prop('checked', isChecked);

                $.each($("input[name=select_one]"), function (i, value) {
                    if ($(this).prop('disabled') === false) {
                        $(this).prop("checked", isChecked);
                    }
                });
                form.render();
            });
        }

        //公共ajax
        let commonAjax = function(type="get",url,data,failFun,successFun){
            openLoading();
            $.ajax({
                type    :   type,
                url     :   url,
                data    :   data,
                success :   function (res) {
                    closeLoading();
                    successFun(res);
                },
                error    :   function(res){
                    closeLoading();
                    failFun();
                }
            });
        }

        //通过学分获取文件
        let getFilesByScoreId = function(scoreId,type){
            commonAjax('post',huayi_projectscore_url + 'cmeDeptSingleprojPhoto/list',
                {scoreId: scoreId},
                function(){layer.msg("获取证明文件失败");},
                function(res){
                    if(res.status == 200){
                        if(res.data == null) return;
                        for(let tempObj of res.data){
                            createPhoto(tempObj.fileName,tempObj.photoSize,tempObj.scorePhotoUrl,tempObj.keyId);
                        }
                    }else{
                        layer.msg("获取证明文件失败");
                    }
                });
        }

        //构建图片列表
        let createPhoto = function(fileName,fileSize,fileUrl,fileId=""){
            let imgSrc = fileUrl.indexOf(".pdf")>0 ? '/img/pdf.png' : fileUrl;
            let fileHtml = `<tr>
                <td>${fileName}</td><td>${fileSize}kb</td>
                <td><img class="image-table-tr" src="${imgSrc}" alt="${fileName}" file-size="${fileSize}" file-id="${fileId}" onclick="viewPhoto('${fileUrl}')"></td>
                <td></td>
                </tr>`;
            $("#viewFileList").append(fileHtml);
        }

        // 图片预览
        window.viewPhoto = function(srcUrl){
            $(`#${viewFile}`).empty();
            if(srcUrl.indexOf("pdf") > 0){
                getPdfFromUrl(srcUrl,viewFile);
                layer.open({
                    type: 1,
                    shade: 0.8,
                    offset: 'auto',
                    area: ['90%','90%'],
                    shadeClose:true,//点击外围关闭弹窗
                    scrollbar: false,//不现实滚动条
                    title: "预览", //不显示标题
                    content: $(`#${viewFile}`)
                });
            }else{
                tool.openViewImg(srcUrl);
            }

        }

        //得到最终高度
        let getTableHeight = function(){
            let allHeight = document.documentElement.clientHeight;
            let otherHeight = document.getElementById("searchCard").offsetHeight;
            height = allHeight -otherHeight - 60;
        }
         //获取学分级别
         let getScoreLevel = function () {
            let tempUrl = huayi_sjwh_url + "/cmecomscorelevel/list";
            commonAjax('get', tempUrl, { "cmeStandardKindId": standardkindId }, function () { layer.msg("学分级别加载失败"); },
                function (res) {
                    if (res.status != 200) {
                        layer.msg("学分级别加载失败"); return;
                    }
                    setOptions(res.data, "scoreLevelId", "scoreLevelName", "scoreLevel_id");
                });
        }
        let setOptions = function (data, idParam, valueParam, id) {
            let option = '<option value="">全部</option>';
            for (let obj of data) {
                option += `<option value="${obj[idParam]}">${obj[valueParam]}</option>`;
            }
            $(`#${id}`).html(option);
            form.render();
        }

        let htmlInit = function() {
            let tempCheckState = tool.getParamFromUrl("checkState");
            if(!tool.isEmpty(tempCheckState) && tempCheckState==0){
                document.getElementById("checkState").value = "0";
            }
            // 初始化表单名称: 学分级别/举办方式等 js/constantPage/projectConstant.js
            renderLables();
            getScoreLevel();
            bindAllBtn();
            getTableHeight();
            initFrom();
            bindTableTool();
            getApprovalData();
            getDeptTree();
            setTimeout(function(){
                loaderTable();
            },300);
        }

        htmlInit();
    })
</script>
</body>
