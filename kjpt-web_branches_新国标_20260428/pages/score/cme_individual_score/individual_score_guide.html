<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>录入个人学分授分标准</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/pages/score/cme_singleproj_score/js/singleproj.js" ></script>

<style>
    /* layui-table 表格内容允许换行 */
    .layui-table-cell {
        height: auto;
    }

    .myBoder {
        border: 1.5px solid #6086b5;
    }
    
    html {
        background-color: white;
        color: #666;
    }
     /* 学分级别下拉框变形处理 */
    .layui-treeSelect .ztree li{
        line-height: normal !important;
    }
</style>
</head>

<body>

     <!-- 筛选条件 -->
     <div class="layui-form layui-card-header condition-area" lay-filter="div-search">
        <form id="form-query">
            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                <label class="layui-form-label">举办年度</label>
                <div class="layui-input-block">
                    <select name="cmeYear" id="cmeYear" lay-filter="cmeYear"></select>
                </div>
            </div>
            <!-- 学分级别查询项 -->
            <div class="layui-inline">
                <label class="layui-form-label" name="lblScoreLevel"></label>
                <div class="layui-input-block" style="width: 300px;">
                    <input type="text" autocomplete="off" name="scoreLevel" class="layui-input"
                         lay-filter="scoreLevel" id="scoreLevel" placeholder="请选择">
                </div>
            </div>

            <!-- 查询按钮 -->
            <div class="layui-inline">
                <a class="layui-btn layui-btn-sm btn-search" id="searchBtn" onclick="loaderTable()"
                    lay-filter="table-search" data-type="reload">
                </a>
            </div>
        </form>
    </div>

     <!-- 授分标准分类选项卡 10-继教项目, 20-科研、专利、论文、著作, 30-进修、培训、考试, 40-其他 -->
     <div id="tabDiv" class="layui-tab layui-tab-brify layui-tab--hover" lay-filter="docDemoTabBrief" style="display: none;">
        <ul class="layui-tab-title">
            <li value="10" class="tab-default layui-this">继教项目</li>
            <li value="20" class="tab-default">科研、专利、论文、著作</li>
            <li value="30" class="tab-default">进修、培训、考试</li>
            <li value="40" class="tab-default">其他</li>
        </ul>
    </div>
    <!--        表格区域         -->
    <div class="layui-tab-content">
        <div class="layui-tab-item layui-show myBoder">
            <table class="layui-table" id="cmeProjPosDownList" lay-filter="cmeProjPosDownList"
                style="margin: 0px 0px;">
            </table>
        </div>
    </div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    {{# if(d.kind == '01'){ }}
        <a href="individual_score_research_paper.html?scoreLevel={{d.type}}&cmeYear={{d.cmeYear}}&grantscoreStandardId={{d.grantscoreStandardId}}&grantName={{d.name}}" class="layui-btn layui-btn-xs" lay-event="scoreInput" target="_blank" style="color: #6086b5;background-color: transparent;">学分录入</a>
    {{# }else{ }}
        <!-- 如果套id是 广东套/深圳套 且 序号id为1/13 ,直接进入项目授分页面 -->
        {{# if((d.cmeStandardKindId == '广东套' || d.cme_standard_kind_id == '深圳套') && (d.id == 1 || d.id == 13)){ }}
            <a href="individual_score_singleproj.html" class="layui-btn layui-btn-xs" lay-event="scoreInput" target="_blank" style="color: #6086b5;background-color: transparent;">学分录入</a>
        {{# }else{ }}
            <a href="individual_score_middle.html?grantName={{d.name}}&unitName={{d.unitName}}&description={{d.description}}&cmeYear={{d.cmeYear}}&unitNum={{d.unitNum}}&unitScore={{d.unitScore}}&unitMaxscore={{d.unitMaxscore}}&scoreLevel={{d.type}}" class="layui-btn layui-btn-xs" lay-event="scoreInput"   style="color: #6086b5;background-color: transparent;">学分录入</a>
        {{# } }}
    {{# } }}
</script>

<!--增加序号列-->
<script type="text/html" id="rank">
    {{d.LAY_TABLE_INDEX+1}}
</script>

<script>

    // 全局配置及引入相关的模块
    layui.use(['table', 'form'], function () {
        let $ = layui.jquery, table = layui.table, form = layui.form, layer = layui.layer;
        let ajaxNum =0,loading;
        let cmeStandardKindId = localStorage.getItem("standardkind-id");
        var unitId = localStorage.getItem("unit-id");
        var userType = localStorage.getItem("user-type");
        var hasGrantscoreType = false;
        let specArrs = [];
        var grantscoreType = '';
        const _isGuangdong = cmeStandardKindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1';

        let getConfig = function(){
            let configName1 = "fn_grantscore_type";
            let configUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${unitId}&configNames=${configName1}`;
            $.ajax({
                type    :   "post",
                url     :   configUrl,
                async   :   false,
                success :   function (res) {
                    if(res.status == 200){
                        if(res.data){
                            if(res.data.hasOwnProperty(configName1) && res.data[configName1] == 1){
                                hasGrantscoreType = true;
                            }
                        }else{ layer.msg("配置加载失败"); }
                    }else{ layer.msg("配置信息加载失败"); }
                }
            });
        }
        getConfig();
        
        // 隐藏授分标准分类选项卡
        if(hasGrantscoreType){
            $('#tabDiv').show();
            grantscoreType = '10';
        }else{
            $('#tabDiv').hide();
        }

        // 鼠标悬浮切换选项卡
        $(function () {
            $('.layui-tab--hover .layui-tab-title li').mouseenter(function () {
                $(this).addClass('layui-this').siblings().removeClass('layui-this')
                const tabRoot = $(this).closest('.layui-tab--hover')
                const tabContent = tabRoot.find('.layui-tab-content')
                const index = $(this).index()
                tabContent.find('.layui-tab-item').eq(index).addClass('layui-show').siblings().removeClass('layui-show')
            
                // 重新加载表格
                grantscoreType = this.getAttribute("value");
                loaderTable();
            })
        })

        // 表格配置
        window.loaderTable = function () {
            var colsArr;
            if(_isGuangdong){
                colsArr = [[
                    { field: 'xuhao', title: '序号', templet: '#rank',align: "center", width: 60 },
                    { title: '操作', toolbar: '#rowBar', align: "center", width: 120 },
                    { field: 'scoreKindName', title: projectLabels.lblScoreLevel, align: "center" },
                    { field: 'name', title: '具体名称', align: "center" },
                    { field: 'description', title: '具体规定', align: "center" },
                    { field: 'scoreLevelName', title: projectLabels.lblScoreLevelChild, align: "center" }
                ]];
            }else{ 
                colsArr = [[
                    { field: 'xuhao', title: '序号', templet: '#rank',align: "center", width: 60 },
                    { title: '操作', toolbar: '#rowBar', align: "center", width: 120 },
                    { field: 'name', title: '具体名称', align: "center" },
                    { field: 'description', title: '具体规定', align: "center" },
                    { field: 'scoreLevelName', title: projectLabels.lblScoreLevel, align: "center" }
                ]];
            }
            table.render({
                elem: '#cmeProjPosDownList',
                url: huayi_sjwh_url + 'cmegrantscorestandard/wizardEntryList',
                title: '向导录入',
                async:false,
                defaultToolbar: [],
                where: {cmeStandardKindId: cmeStandardKindId,
                        unitId: unitId,
                        cmeYear: $('#cmeYear').val(),
                        userType: userType,
                        projType: 3,
                        type: $('#scoreLevel').val(),
                        grantscoreType: grantscoreType,
                        hasGrantscoreType: hasGrantscoreType
                    },
                cols: colsArr,
                cellMinWidth: 100,
                id: "cmeProjPosDownList",
                parseData: function (res) {
                    debugger
                    // TODO: 临时限制 筛选数据, 上级单位是开封卫健委，则仅展示 授分标准名称包含“开封” 的数据
                    // $.ajax({
                    //     async:false,
                    //     url: huayi_personorg_url + "comunit/parentUnits?unitId="+unitId,
                    //     success: function(data){
                    //         for (var i = 0; i < data.length; i++) {
                    //             if(data[i].unitId=='160500'){
                    //                 for (var j = 0; j < res.data.length; j++) {
                    //                     if(res.data[j].name.indexOf("开封") == -1){
                    //                         res.data.splice(j, 1);
                    //                         j--;
                    //                     }
                    //                 }
                    //                 break;
                    //             }
                    //         }
                    //     }
                    // })
                    if (res.status != 200) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": '获取数据失败', //解析提示文本
                        }                        
                    }
                    res.data.forEach(function (item) {
                        item.cmeYear = $('#cmeYear').val();
                    });
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.length, //解析数据长度
                        "data": res.data, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },


            });

        };
        // 初始化表格 
        // 延迟加载loaderTable
        setTimeout(function () {
            loaderTable();
        }, 200);


    });

</script>
</body>

</html>
