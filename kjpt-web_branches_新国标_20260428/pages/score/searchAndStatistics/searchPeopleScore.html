<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人员得分情况查询</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../../js/auth.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <link rel="stylesheet" href="../../../css/score/scoreStatistics.css" media="all">

</head>

<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card">
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <!-- <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form"> -->
                        <div class="layui-inline">
                            <label class="layui-form-label">姓名</label>
                            <div class="layui-input-block">
                                <input type="text" name="projNo" id="projNo" placeholder="姓名" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">证件号</label>
                            <div class="layui-input-block">
                                <input type="text" name="projName" id="projName" placeholder="证件号" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">人员编号</label>
                            <div class="layui-input-block">
                                <input type="text" name="projName" id="projName" placeholder="人员编号" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <div class="layui-input-block">
                                <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                                    lay-filter="table-search" data-type="reload">
                                    <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="searchPersonScoreList" lay-filter="searchPersonScoreList"
                    style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>


</body>

<script>
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        eleTree: 'eleTree',
        tool: 'tool'
    });
    layui.use(['table', 'form', 'element', 'laydate', 'tool'], function () {
        var $ = layui.jquery
            , table = layui.table
            , element = layui.element
            , form = layui.form
            , laydate = layui.laydate
            , layer = layui.layer
            , tool = layui.tool;
        var unitId = localStorage.getItem("unit-id")
            , configDictId = '00a74154-6853-11ec-9896-fa163e376cc4' // 学分级别配置
            ;
        var cmeStandardKindId = localStorage.getItem("standardkind-id");

        var scoreLevelCols; // 学分级别表头
        var scoreKindCols; // 学分类别表头

        laydate.render({
            elem: '#startDate',
            type: 'date'
        });
        laydate.render({
            elem: '#endDate',
            type: 'date'
        });

        // 根据taoId获取学分级别表头
        let getScoreLevel = function () {
            $.ajax({
                type: "get",
                url: huayi_sjwh_url + "cmecomscorelevel/taoId",
                dataType: 'json',
                data: {
                    cmeStandardKindId: cmeStandardKindId
                },
                success: function (res) {
                    if (res.status == 200) {
                        scoreLevelCols = res.data;
                        getColsData();
                        loaderTable();
                    }
                },
                error: function (res) {
                    layer.msg("响应失败" + res.msg);
                }
            });
        }
        // 根据taoId获取学分类别表头
        let getScoreKind = function () {
            $.ajax({
                type: "get",
                url: huayi_sjwh_url + "cmecomscorekind/list",
                dataType: 'json',
                data: {
                    cmeStandardKindId: cmeStandardKindId
                },
                success: function (res) {
                    if (res.status == 200) {
                        scoreKindCols = res.data;
                        getScoreLevel();
                        // getColsData();
                        // loaderTable();
                    }
                },
                error: function (res) {
                    layer.msg("响应失败" + res.msg);
                }
            });
        }

        // 组装表头模板
        let tempArr = [];
        let getColsData = function () {
            if (tool.isEmpty(scoreLevelCols)) {
                layer.msg("必要参数未加载");
                return;
            }
            let fieldArr = [];
            fieldArr.push({
                filed: "personNo", title: "人员编号", align: 'center', minWidth: 120,
                templet: function (d) { return d["personNo"] }
            });
            fieldArr.push({
                filed: "personName", title: "姓名", align: 'center', minWidth: 70,
                templet: function (d) { return d["personName"] }
            });
            fieldArr.push({
                filed: "deptName", title: "科室", align: 'center', minWidth: 100,
                templet: function (d) { return d["deptName"] }
            });
            fieldArr.push({
                filed: "titleName", title: "职称", align: 'center', minWidth: 100,
                templet: function (d) { return d["titleName"] }
            });
            fieldArr.push({
                filed: "personSpecName", title: "专业", align: 'center', minWidth: 100,
                templet: function (d) { if (d["personSpecName"] == null) return ''; return d["personSpecName"] }
            });
            fieldArr.push({
                filed: "personStateName", title: "人员状态", align: 'center', minWidth: 100,
                templet: function (d) { return d["personStateName"] }
            });
            fieldArr.push({
                filed: "totalScore", title: "总学分", align: 'center', minWidth: 80,
                templet: function (d) { if (d["totalScore"] == null) return 0; return d["totalScore"] }
            });
            fieldArr.push({
                filed: "totalPeriod", title: "总学时", align: 'center', minWidth: 80,
                templet: function (d) { if (d["totalPeriod"] == null) return 0; return d["totalPeriod"] }
            });
            for (const obj of scoreKindCols) {
                fieldArr.push({ filed: "tt", minWidth: 100, title: obj["kindName"], align: 'center', factorId: obj["kindId"], templet: setTemplate });
            }
            for (const obj of scoreLevelCols) {
                fieldArr.push({ filed: "tt", minWidth: 100, title: obj["scoreLevelName"], align: 'center', factorId: obj["scoreLevelId"], templet: setTemplate });
            }


            tempArr[0] = fieldArr;
            return tempArr;
        }

        //动态标签页方法
        let setTemplate = function (data) {
            debugger
            if (data.scoreKindMap != null && data.scoreKindMap.hasOwnProperty(this.factorId)) {
                return data.scoreKindMap[this.factorId];
            }
            return 0;
        }

        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#searchPersonScoreList',
                id: 'searchPersonScoreList',
                url: huayi_projectscore_url + 'cmeSearchPeopleScore/searchPeopleScore',
                // toolbar: toolbar,
                defaultToolbar: [],
                cellMinWidth: '80px',
                // height: height,
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                where: {},
                cols: tempArr,
                parseData: function (res) {
                    if (res.status === 200) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }
                    } else {
                        layer.msg("请求失败");
                        console.log(res);
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });

        };

        //页面加载入口
        let htmlInit = function () {
            getScoreKind();


        }
        htmlInit();

    });
</script>
