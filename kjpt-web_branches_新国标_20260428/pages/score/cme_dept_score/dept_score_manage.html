<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>录入学分查询管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../../css/communal.css" media="all">

<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <div id="searchCard" class="layui-form layui-card-header layuiadmin-card-header-auto">
            <div class="layui-inline">
                <label class="layui-form-label">开始时间</label>
                <div class="layui-input-block">
                    <input type="text" name="startDate" id="startDate"  placeholder="请选择开始时间" autocomplete="off" class="layui-input" readonly>
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">截止时间</label>
                <div class="layui-input-block">
                    <input type="text" name="endDate" id="endDate"  placeholder="请选择截止时间" autocomplete="off" class="layui-input" readonly>
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">审核状态</label>
                <div class="layui-input-block">
                    <select name="checkState" id="checkState" lay-filter = "layui-select-type">
                        <option value="">请选择</option>
                        <option value="-1">未上报</option>
                        <option value="0">未审核</option>
                        <option value="2">审核不通过</option>
                        <option value="3">审核通过</option>
                    </select>
                </div>
            </div>

            <div class="layui-inline">
                <label class="layui-form-label">姓名</label>
                <div class="layui-input-block">
                    <input type="text" id="personName" placeholder="请输入" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">证件号</label>
                <div class="layui-input-block">
                    <input type="text" id="certId" placeholder="请输入" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">人员编号</label>
                <div class="layui-input-block">
                    <input type="text" id="personNo" placeholder="请输入" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">手机号</label>
                <div class="layui-input-block">
                    <input type="text" id="mobile" placeholder="请输入" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-inline right" style="float:right">
                <a class="layui-btn layui-btn-sm btn-search" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                    <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
                </a>
            </div>
        </div>

        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="deptScoreBox" lay-filter="dept-score-box">
            </table>
        </div>

        <!-- 修改的弹窗 -->

                    <span class="title">填写活动信息</span>

                    <input type="hidden" name="checkState"  autocomplete="off" class="layui-input">
                    <div id="content_ext_edit"></div>
                    <div id="content_edit">
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">人员编号</label>
                                <div class="layui-input-block default-align-center js-people-no"></div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">人员姓名</label>

                        </div>

                                    <input type="text" name="singleProjName" placeholder="请输入活动名称"

                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">

                                </div>

                                </div>

                        </div>
                        <div class="layui-form-item-box">

                                    <input type="text" name="scoreLevel" autocomplete="off" class="layui-input" lay-filter="scoreLevel" id="scoreLevel" placeholder="请选择">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">

                                </div>
                            </div>

                                    </select>
                                </div>

                        </div>
                        <div class="layui-form-item-box">

                                <label class="layui-form-label"><font color="red">*&nbsp;</font>三级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeId" id="knowledgeThree" lay-verify="required" required lay-search>
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">

                                <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span><label name="lblActivityContent"></label></label>

                                </div>

                        </div>
                        <input type="hidden" name="projTypeKind" id="projTypeKind" autocomplete="off" class="layui-input">

                                <div class="layui-input-block">

                            </div>
                        </div>
                        
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <!-- 所属医学体系 -->

                                <div class="layui-input-block">
                                    <select name="medicalType" id="medicalTypeSelector" lay-verify="required">
                                        <option value=""></option>
                                        <option value="1">西医</option>
                                        <option value="2">中医</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label"><font color="red">*&nbsp;</font>学分</label>
                                <div class="layui-input-block">
                                    <input type="number" name="score" id="score" placeholder="请输入学分"

                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label"><font color="red">*&nbsp;</font>学时</label>
                                <div class="layui-input-block">
                                    <input type="number" name="period" id="period" placeholder="请输入学时"

                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label"><font color="red">*&nbsp;</font>活动日期</label>
                                <div class="layui-input-block">
                                    <input type="text" name="studyDate" id="activityDate" placeholder="请输学分证上项目举办日期" autocomplete="off" class="layui-input" readonly lay-verify="required" required>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label"><font color="red">*&nbsp;</font>发证机构</label>
                                <div class="layui-input-block" style="position: relative;">
                                    <input type="text" id="text_unit_name" name="teachUnitName" placeholder="请选择单位"
                                        autocomplete="off" class="layui-input" style="display: inline;"  lay-verify="unitNameVerify" required>
                                    <button class="layui-btn  select-unit-btn" id="selectUnitBtn">选择单位</button>
                                    <input type="hidden" id="hidden_unit_id" name="teachUnit">
                                </div>
                                <div style="margin-left: 110px; color: red;">
                                    <p>外省机构请录入单位名称，本省机构点击选择</p>
                                </div>
                            </div>
                        </div>
                        <!-- <div class="layui-form-item-box" style="width: 98%;"> -->
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">备注</label>
                                <div class="layui-input-block">
                                    <input type="text" name="remark" id="remark" autocomplete="off"
                                        placeholder="备注" class="layui-input sql_keyword" lay-verify="remarkVerify">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item-box js-photo-box" style="width: 98%;">
                        <div class="layui-upload" >
                            <div id="uploadFileBtnBox">
                                <font color="red" >*&nbsp;</font>
                                <button type="button" class="layui-btn layui-btn-sm" id="chooseFileBtn">选择学分证明材料</button>
                                <button type="button" class="layui-btn layui-btn-sm" id="mobileChooseFileBtn">手机端上传</button>
                                <button type="button" class="layui-btn layui-btn-sm layui-btn-disabled" id="submitFileBtn" disabled="true">开始上传</button>
                                <p style="margin-left: 10px; color: red;display: inline-block;" id="uploadTips"></p>
                            </div>
                            <div class="layui-upload-list" style="max-width: 1000px;">
                                <table class="layui-table">
                                    <colgroup>
                                        <col><col width="100"><col width="100"><col width="100"><col width="100">
                                    </colgroup>
                                    <thead>
                                        <tr><th>文件名</th><th>大小</th><th>缩略图</th><th>状态</th><th>操作</th></tr>
                                    </thead>
                                    <tbody id="fileList"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <button class="layui-btn" lay-submit lay-filter="submit">保存</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- 查看学分详情的弹窗 -->
        <div id="scoreInfoWindow" style="display: none;">
            <form class="layui-form approval-score-form" lay-filter="score-info-form">
                <div class="score-model">
                    <input type="hidden" name="scoreId">
                    <div id="content_ext_view"></div>
                    <div id="content_view">
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">人员编号</label>
                                <div class="layui-input-block default-align-center js-people-no"></div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">人员姓名</label>
                                <div class="layui-input-block default-align-center js-people-name"></div>

                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">

                                    <input type="text" name="singleProjNo" class="layui-input layui-disabled" disabled="true">

                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label" name="lblScoreLevel"></label>
                                <div class="layui-input-block">
                                    <input type="text" name="scoreLevelName" class="layui-input layui-disabled" disabled="true">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label" name="lblActivityForm"></label>
                                <div class="layui-input-block">
                                    <input type="text" name="holdTypeName" class="layui-input layui-disabled" disabled="true">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">二级学科</label>
                                <div class="layui-input-block">
                                    <input type="text" name="knowledgeTwoName" class="layui-input layui-disabled" disabled="true">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">三级学科</label>
                                <div class="layui-input-block">
                                    <input type="text" name="knowledgeName" class="layui-input layui-disabled" disabled="true">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <!-- 活动内容 -->
                                <label class="layui-form-label"><label name="lblActivityContent"></label></label>
                                <div class="layui-input-block">
                                    <select name="scoreType" disabled>
                                        <option value="1">专业课</option>
                                        <option value="2">选修课</option>
                                        <option value="3">公需课</option>
                                    </select>
                                </div>

                        <input type="hidden" name="projTypeKind" id="projTypeKind" autocomplete="off" class="layui-input layui-disabled">

                            <div class="layui-form-item">
                                <label class="layui-form-label"><label name="lblActivityType"></label></label>
                                <div class="layui-input-block">
                                    <select name="projType" disabled>
                                        <option value="">全部</option>

                                    <input type="number" name="period" class="layui-input layui-disabled" disabled="true">
                                </div>

                        <div class="layui-form-item-box">
                            <div class="layui-form-item">

                                <div class="layui-input-block">
                                    <input type="number" name="score" class="layui-input layui-disabled" disabled="true">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item-box">
                            <div class="layui-form-item">
                                <label class="layui-form-label">活动日期</label>
                                <div class="layui-input-block">
                                    <input type="text" name="studyDate" class="layui-input layui-disabled" disabled="true">

                        <div class="layui-form-item-box">

                                <label class="layui-form-label">发证机构</label>

                                    <input type="text" name="teachUnitName" class="layui-input layui-disabled" disabled="true">
                                </div>

<!-- 查看全部图片 -->
<ul class="photo-window" id="photoWindow" style="display: none;"></ul>

<div id="viewFile" style="display: none;"></div>

<div id="qrCode" style="display: none;"></div>

<script type="text/javascript" src="/pages/score/cme_singleproj_score/js/singleproj.js"></script>

<script>
    const taoId = localStorage.getItem("standardkind-id");
</script>
<!-- 表头按钮 -->
<script type="text/html" id="toolBar">
    <input type="checkbox" name="selectFlag" value="cp" title="本页全选" lay-filter="selectFlag">
    <div style="float: right;">
        <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="report">上报</a>
        <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="addGuide" >依据本省学分管理方法向导录入</a>
         <!-- 浙江、广东取消非向导录入 -->
         {{# if(taoId != '190c480d-d43c-450b-8472-a6fd00a6729d' && taoId != '289bf0ca-52cb-4b19-b737-9bd200a69ce1') {  }}
         <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="addNoGuide" >非向导录入学分</a>
         {{# } }}
    </div>
</script>
<!-- 行内操作按钮 -->
<script type="text/html" id="rowBar">
    <!-- 上报 -->
    {{# if(d.checkState == -1 || d.checkState == 1){ }}
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="report">上报</a>
    {{# }  }}
    <!-- 修改，查看 -->
    {{# if(d.checkState == -1 || d.checkState == 1){ }}

                exportFlag = isChecked ? data.elem.value : flagEnum.select;
                if (isChecked) {
                    let that = data.elem;
                    $.each($("input[name=selectFlag]"), function () {
                        if (this !== that) $(this).prop('checked', !isChecked);
                    })
                }

                $("input[name=select_all]").prop('checked', isChecked);

                $.each($("input[name=select_one]"), function (i, value) {
                    if ($(this).prop('disabled') === false) $(this).prop("checked", isChecked);
                });
                form.render();

            });

        //公共ajax
        let commonAjax = function(type="get",url,data,failFun,successFun){
            openLoading();
            $.ajax({
                type    :   type,
                url     :   url,
                data    :   data,
                success :   function (res) {
                    closeLoading();
                    successFun(res);
                },
                error    :   function(res){
                    closeLoading();
                    failFun();
                }
            });
        }

        //清空表单，原生的无法清空
        let removeFormValue = function(){
            $("#formScore")[0].reset();
            isCanChooseBtn(true);
            isCanSubmitBtn(true);
            sendClickNum = 0;
            timestamp = new Date().getTime();
            $("input[type='hidden']").val("");
            $("#fileList").html("");
            form.render();
            if(uploadFiles!=null){
                for(let index in uploadFiles){  delete uploadFiles[index]; }
            }
        }

        //轮训向服务器获取手机上传的图片,只执行一次
        let getTempMobileFile = function(){
            if(sendClickNum==0 || $("#fileList").children().length >= configFileNum) return;
            setTimeout(getMobileRequrest, delayTime);
        }

        //向后台发送请求
        let getMobileRequrest = function(){
            let getPhotoData = {userId:userId,timestamp:timestamp};
            $.ajax({
                type    :   "post",
                url     :   getPhotoUrl,
                data    :   JSON.stringify(getPhotoData),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success :   function (res) {
                    if(res.status==200 && !tool.isEmpty(res.data)&& res.data.length >0){
                        handerMobileData(res.data);
                    }
                    getTempMobileFile();
                },
                error    :   function(res){ getTempMobileFile(); }
            });
        }

        let handerMobileData = function(datas){
            let tempPhotos = [];
            aa:
            for (let i = 0; i < datas.length; i++) {
                for (let j = 0; j < fileUrls.length; j++) {
                    if(datas[i].scorePhotoUrl == fileUrls[j].scorePhotoUrl) continue aa;
                }
                tempPhotos.push(datas[i]);
            }
            for (let i = 0; i < tempPhotos.length; i++) {
                if(fileUrls.length >= configFileNum){
                    break;
                }
                let tempObj = tempPhotos[i];
                fileUrls.push({
                    fileName:tempObj.fileName,
                    scorePhotoUrl:tempObj.scorePhotoUrl,
                    photoSize:tempObj.photoSize,
                    tempId:tempObj.keyId
                })
                createPhoto(tempObj.fileName,tempObj.photoSize,tempObj.scorePhotoUrl,tempObj.keyId,"mobile");
                delayTime = delayTime + 1000;
            }
            if($("#fileList").children().length >= configFileNum) {
                isCanChooseBtn(false);
                isCanOpenQcode(false);
                sendClickNum = 0;
                delayTime = 5000;
                timestamp = new Date().getTime();
            }
        }

        //通过学分获取文件
        let getFilesByScoreId = function(scoreId,type){
            commonAjax('post',huayi_projectscore_url + 'cmeDeptSingleprojPhoto/list',
                {scoreId: scoreId},
                function(){layer.msg("获取证明文件失败");},
                function(res){
                    if(res.status == 200){
                        if(res.data == null) return;
                        if(res.data.length >=configFileNum){
                            isCanChooseBtn(false);
                            isCanSubmitBtn(false);
                            isCanOpenQcode(false);
                        }else{
                            isCanChooseBtn(true);
                            isCanSubmitBtn(false);
                            isCanOpenQcode(true);
                        }
                        fileUrls = [];
                        for(let tempObj of res.data){
                            fileUrls.push({fileName:tempObj.fileName,
                                scorePhotoUrl:tempObj.scorePhotoUrl,
                                photoSize:tempObj.photoSize,
                                tempId:tempObj.keyId});
                            createPhoto(tempObj.fileName,tempObj.photoSize,tempObj.scorePhotoUrl,tempObj.keyId,type);
                        }
                    }else{
                        layer.msg("获取证明文件失败");
                    }
                });
        }

        //获取配置信息
        let getConfig = function(){
            let configName1 = "fun_singleproj_photo_upload",
            configName2="value_single_proj_score_photo_count";;
            let configUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${unitId}&configNames=${configName1}&configNames=${configName2}`
            commonAjax('post',configUrl,
                {},function(){layer.msg("配置信息加载失败");},
                function(res){
                    if(res.status == 200 || tool.isEmpty(res.data)){
                        if(res.data.hasOwnProperty(configName1) && res.data[configName1] == 0){
                                // 隐藏类layui-upload下的font
                                $(".layui-upload").find("font").addClass("hide");
                            isUploadPhoto = false;
                        }
                        if(res.data.hasOwnProperty(configName2) && res.data[configName2] != "") {
                            configFileNum = res.data[configName2];
                        }
                        updateFile();
                    }else{ layer.msg("配置信息加载失败"); }
                });
        }

        //上传文件
        let updateFile = function(){
            let uploadListIns = ysUpload.render({
                elem: "#chooseFileBtn",
                elemList: $("#fileList"),
                url: huayi_upload_url + 'uploadApi/upload',
                exts     : fileExts,
                size: fileSize ,//大小小于10M
                accept: 'file',
                number: configFileNum,
                auto: (standardkindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1'),
                bindAction: '#submitFileBtn',
                before: function(obj){
                    this.data = getFileType(obj.pushFile());
                },
                choose: function(obj){ 
                    isCanSubmitBtn(true);
                    var that = this;
                    // var files = this.files = obj.pushFile(); //将每次选择的文件追加到文件队列
                    uploadFiles = obj.pushFile();
                    // 文件上传数量限制
                    if (Object.keys(uploadFiles).length + fileUrls.length >= configFileNum) {
                        isCanChooseBtn(false);
                        isCanOpenQcode(false);
                    }
                    //读取本地文件
                    obj.preview(function (index, file, result) {
                        let imgSrc = file.type.indexOf("pdf") >=0? '/img/pdf.png' : result;
                        var tr = $([`<tr id="upload-${index}">
                            <td><a>${file.name}</a></td><td>${(file.size / 1014).toFixed(1)}kb</td>
                            <td><img id="showSmallPic${index}" src="${imgSrc}" alt="${file.name}" class="image-table-tr"></td>
                            <td>${standardkindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1' ? '上传' : '未上传'}</td>
                            <td>
                                <a class="layui-btn layui-btn-xs layui-btn-danger demo-delete">删除</a>
                                <a class="layui-btn layui-btn-xs demo-reload layui-hide">重传</a>
                            </td></tr>`].join(''));
                        //单个重传
                        tr.find('.demo-reload').on('click', function () { obj.upload(index, file); });
                        //删除
                        tr.find('.demo-delete').on('click', function () {
                            layer.confirm('确认删除', {icon: 3, title: '提示'}, function (windowIndex) {
                                for(let i=0 ; i<fileUrls.length ; i++){
                                    if(fileUrls[i].tempId==index){
                                        fileUrls.splice(i,1);
                                        break;
                                    }
                                }
                                delete uploadFiles[index]; //删除对应的文件
                                tr.remove();
                                uploadListIns.config.elem.next()[0].value = '';//清空input file值,以免删除后出现同名文件不可选
                                isCanChooseBtn(true);
                                isCanOpenQcode(true);
                                if (Object.keys(uploadFiles).length == 0) {
                                    isCanSubmitBtn(false);
                                }
                                layer.close(windowIndex);
                            });
                        });
                        that.elemList.append(tr);
                        //某图片放大预览
                        $("#showSmallPic"+index).bind('click',function () { viewPhoto(result,file); });
                    })
                },
                done: function(res,index,upload){
                    let that = this;
                    let tr = that.elemList.find('tr#upload-' + index);
                    let tds = tr.children();
                    if(res.code == 200){
                        let fileSize = (uploadFiles[index].size/1014).toFixed(1);
                        fileUrls.push({
                            fileName:uploadFiles[index].name,
                            scorePhotoUrl:res.data.picUrl,
                            photoSize:fileSize,
                            tempId:index
                        })
                        tds.eq(3).html('已上传');
                        tds.eq(4).find('.demo-reload').addClass('layui-hide'); //显示重传
                        delete uploadFiles[index]; //删除文件队列已经上传成功的文件
                        if(Object.keys(uploadFiles).length == 0){
                            isCanSubmitBtn(false);
                        }
                        return;
                    }
                    this.error(index, upload);
                },
                error: function(index,upload){  
                    var that = this;
                    var tr = that.elemList.find('tr#upload-' + index);
                    var tds = tr.children();
                    tds.eq(3).html('上传失败');
                    tds.eq(4).find('.demo-reload').removeClass('layui-hide'); //显示重传
                }
            });
            if (standardkindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1') {
                $('#submitFileBtn').hide();
            }
        }

        //获取文件类型
        let getFileType = function(filesObj) {
            let tempDatas = {};
            let year = new Date().getFullYear();
            let path = `/individualScoreManage/${standardkindId}/${year}/${unitId}`;
            for(let key in filesObj){
                let fileData = {path:path,scale:0.6,outputQuality:0.6};
                // 判断文件大小, 超过3M压缩比例改为0.3
                debugger
                if(filesObj[key].size > 3000000 ){
                    fileData = {path:path,scale:0.3,outputQuality:0.3};
                }
                const tempType = filesObj[key].type;
                if(tempType.indexOf("image") >= 0){
                    fileData.fileType = "IMAGE";
                } else if(tempType.indexOf("application/pdf") >= 0){
                    fileData.fileType = "DOC";
                } else {
                    fileData.fileType = "OTHER";
                }
                tempDatas[key] = fileData;
            }
            return tempDatas;
        }

        //构建图片列表
        let createPhoto = function(fileName,fileSize,fileUrl,fileId="",type="edit"){
            let imgSrc = fileUrl.indexOf(".pdf")>0 ? '/img/pdf.png' : fileUrl;
            let btnHtml = `<td></td>`,jsClass=``;
            if(type=="edit"){
                btnHtml = `<td><a class="layui-btn layui-btn-xs layui-btn-danger" file-id="${fileId}" onclick="deletePhoto(this)">删除</a></td>`;
            }
            if(type=="mobile"){
                btnHtml = `<td><a class="layui-btn layui-btn-xs layui-btn-danger" file-id="${fileId}" onclick="deleteMobilePhoto(this)">删除</a></td>`;
            }
            if(type!="view") jsClass = `js-photo`;
            let fileHtml = `<tr>
                <td>${fileName}</td><td>${fileSize}kb</td>
                <td><img class="image-table-tr ${jsClass}" onclick="viewPhoto('${fileUrl}')" src="${imgSrc}" alt="${fileName}" file-size="${fileSize}" file-id="${fileId}"></td>
                <td>已上传</td>
                ${btnHtml}
                </tr>`;
            if(type=="edit"||type=="mobile") $("#fileList").append(fileHtml);
            if(type == "view") $("#viewFileList").append(fileHtml);
        }

        window.deleteMobilePhoto = function(elem){
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function (windowIndex) {
                let index = elem.getAttribute("file-id");
                if(tool.isEmpty(index)){
                    elem.parentElement.parentElement.remove();
                    layer.close(windowIndex);
                    return;
                }
                let deleteUrl = huayi_projectscore_url + "cmeSingleprojScoreMobilePhoto/deleteById";
                commonAjax('post',deleteUrl,{keyId:index},
                    function(){layer.msg("删除失败");},
                    function(res){
                        if(res.status == 200){
                            for(let i=0 ; i<fileUrls.length ; i++){
                                if(fileUrls[i].tempId==index && fileUrls.splice(i,1)) break;
                            }
                            elem.parentElement.parentElement.remove();
                            isCanChooseBtn(true);
                            isCanOpenQcode(true);
                        }else{ layer.msg("删除失败"); }
                    });
                layer.close(windowIndex);
            });
        }

        //删除图片
        window.deletePhoto = function(elem){
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function (windowIndex) {
                let fileId = elem.getAttribute("file-id");
                if(tool.isEmpty(fileId)){
                    elem.parentElement.parentElement.remove();
                    layer.close(windowIndex);
                    return;
                }
                for(let i=0 ; i<fileUrls.length ; i++){
                    if(fileUrls[i].tempId==fileId && fileUrls.splice(i,1)) break;
                }
                elem.parentElement.parentElement.remove();
                isCanChooseBtn(true);
                isCanOpenQcode(true);
                layer.close(windowIndex);
            });
        }

        //得到最终高度
        let getTableHeight = function(){
            let allHeight = document.documentElement.clientHeight;
            let otherHeight = document.getElementById("searchCard").offsetHeight;
            height = allHeight -otherHeight - 60;
        }

        window.getChildUnitMsg = function (unitId, unitName, hospitalLevelId, unitLevelName) {
            $("#hidden_unit_id").val(unitId);
            $("#text_unit_name").val(unitName);
            $("#select_cme_unit_level").val(hospitalLevelId);
            form.val("cmeDetail", { "select_cme_unit_level": hospitalLevelId});
            form.render('select');
        }

        //是否可以选择按钮
        let isCanChooseBtn = function(flag=true){
            if(flag) {
                $("#chooseFileBtn").removeClass("layui-btn-disabled");
                $("#chooseFileBtn").attr("disabled", false);
            }else{
                $("#chooseFileBtn").addClass("layui-btn-disabled");
                $("#chooseFileBtn").attr("disabled", true);
            }
        }
        //是否可以提交按钮
        let isCanSubmitBtn = function(flag=true){
            if(flag) {
                $("#submitFileBtn").removeClass("layui-btn-disabled");
                $("#submitFileBtn").attr("disabled", false);
            }else{
                $("#submitFileBtn").addClass("layui-btn-disabled");
                $("#submitFileBtn").attr("disabled", true);
            }
        }

        //是否可以弹出二维码
        let isCanOpenQcode = function(flag = true){
            if(flag){
                $("#mobileChooseFileBtn").removeClass("layui-btn-disabled");
                $("#mobileChooseFileBtn").attr("disabled", false);
            }else{
                $("#mobileChooseFileBtn").addClass("layui-btn-disabled");
                $("#mobileChooseFileBtn").attr("disabled", true);
            }
        }

        //是否确定提交
        let backSubmit = function(){
            let scoreId = $("#formScore input[name='scoreId']").val();
            if(scoreId =="" || scoreId ==null) {
                layer.msg("该学分数据异常");
                return;
            }
            layer.open({
                type:1,
                title:false,
                area:['260px','130px'],
                btn:['继续授分','取消'],
                closeBtn :0,
                btnAlign: 'c',
                content:'<div class="is-yes-context">该人员已存在该学分，请谨慎授分</div>',
                yes:function(){
                    openLoading();
                    submitData.isYes = 1;
                    $.ajax({
                        type: 'post',
                        url: updateUrl,
                        data: JSON.stringify(submitData),
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            closeLoading();
                            if (res.status === 200) {
                                window.EvidenceOcrVerify.notifySaveSuccess(submitData, function () {
                                    layer.closeAll();
                                    removeFormValue();
                                    loaderTable();
                                });
                            } else if (res.status === 500) {
                                layer.msg(res.msg);
                            }
                        },
                        error: function () {
                            closeLoading();
                            layer.msg("保存失败");
                        }
                    })
                },
                btn2:function(index,layero){
                    closeLoading();
                }
            })
        }

        // 保存提交
        form.on('submit(submit)', function (data) {
            let scoreId = $("#formScore input[name='scoreId']").val();
            if(scoreId =="" || scoreId ==null) {
                layer.msg("该学分数据异常");
                return;
            }
            if(isUploadPhoto && fileUrls.length<=0){
                layer.msg("请上传证明材料",{icon:5});
                return false;
            }
            data.field.addUnit = unitId;
            if(!data.field.projType) data.field.projType = 0;
            /**
             * 科室管理页按当前编辑人员执行 OCR 核验，避免异常记录漏标。
             */
            const personName = (nowRowData && nowRowData.personName) || '';
            window.EvidenceOcrVerify.run({
                unitId: unitId,
                scoreLevel: data.field.scoreLevel,
                fileUrls: fileUrls,
                personNames: [personName],
                resetUpload: function () {
                    fileUrls = [];
                    $("#fileList").empty();
                    $("#fileListTips").empty();
                }
            }, function (verifyRes) {
                if (!verifyRes.pass) {
                    return;
                }
                Object.assign(data.field, verifyRes.patchFields || {});
                // 浙江套独立表单 singleproj.js
                setExtData(data);
                submitData = data.field;
                submitData.cmeDeptSingleprojPhotos = fileUrls;
                openLoading();
                $.ajax({
                    type: 'post',
                    url: updateUrl,
                    data: JSON.stringify(data.field),
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        closeLoading();
                        if (res.status === 200) {
                            //直接保存
                            if(res.data == null || isNaN(res.data)){
                                window.EvidenceOcrVerify.notifySaveSuccess(verifyRes, function () {
                                    layer.closeAll();
                                    loaderTable();
                                    removeFormValue();
                                });
                            }else{
                                backSubmit();
                            }
                        } else if (res.status === 500) {
                            layer.msg(res.msg);
                        }
                    },
                    error: function () {
                        closeLoading();
                        layer.msg("保存失败");
                    }
                });
            });
            return false;
        });
