<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>详细情况明细</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <!-- <script type="text/javascript" src="../../js/global_ajax_setting.js"></script> -->

    <!-- 工具 -->
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>
    <script type="text/javascript" src="../../js/base64.js"></script>

    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
<script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>

</head>
<body>

    <div class="layui-fluid">
        <div class="layui-card">

            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="comPersonOperateLog" lay-filter="comPersonOperateLog"
                    style="margin: 0px 0px;">
                </table>

            </div>
        </div>
    </div>

    <script type="text/html" id="bar">
        <!-- <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="add">
            <i class="layui-icon">&#xe654;</i>新增</a> -->
        <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="back">返回</a>
        <span id="userInfo"
                style="font-weight: bold; position: relative; top: 2px; left: 50px;"></span>
    </script>
    <script>
        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form'], function() {
            var table   = layui.table;
            var form    = layui.form;
            var $       = layui.jquery;
            var layer   = layui.layer;

            /* 表格相关操作 */
            // 表格配置
            window.loaderTable = function() {
                table.render({
                    elem            : '#comPersonOperateLog',
                    url             : huayi_projectscore_url + "scoreaudit/findYearScoreRegistrationDetail",
                    headers         : {
                        'Authorization' : localStorage.getItem('token'),
                        'KJPT-USER-ID'  : localStorage.getItem('user-id')
                    },
                    title           : '详细情况明细',
                    defaultToolbar: [ 'print', 'exports'],
                    where           : {
                        // standKind:'396942d5-f16e-4898-95a7-9c4800b52821',//套id
                        // comPersonId:'b58611b3-1aec-4fae-8194-a99e00954d5c',//人员编号
                        // cmeYear:'a6810173-c361-48e3-995b-aca30148b952'//年度
                        standKind:getQueryString('standKind'),//套id
                        comPersonId:getQueryString('comPersonId'),//人员编号
                        cmeYear:getQueryString('cmeYear')//年度

                    },
                    cols            : [[
                        {field: 'studyDate', title: '日期', align: 'center', width: 170, sort: true},
                        {field: 'projName', title: '内容', align: 'center', width: 200, sort: true},
                        {field: 'kindName', title: projectLabels.lblScoreLevel, align: 'center', minWidth: 200, sort: true},
                        {field: 'scoreLevelName', title: projectLabels.lblScoreLevelChild, align: 'center', minWidth: 200, sort: true},
                        {field: 'knowledgeId', title: '三级学科', align: 'center', minWidth: 200, sort: true},
                        {field: 'holdType', title: '形式', align: 'center', minWidth: 200, sort: true},
                        {field: 'score', title: '学分', align: 'center', minWidth: 50, sort: true},
                        {field: 'period', title: '学时', align: 'center',sort: true}
                    ]],
                    toolbar         : '#bar',
                    cellMinWidth    : 100,
                    id              : 'comPersonOperateLog',
                    height          : 'full-50',
                    page            : false,
                    parseData       : function(res) {
                        return {
                            'code'  : res.status === 200 ? 0 : res.status,  // 解析接口状态
                            'msg'   : res.message,                          // 解析提示文本
                            'data'  : res.data,                     // 解析数据列表

                        }
                    },
                    done: function(res, curr, count){
                        //如果是异步请求数据方式，res即为你接口返回的信息。
                        //如果是直接赋值的方式，res即为：{data: [], count: 99} data为当前页数据、count为数据总长度
                        // $('#userInfo').html(Base64.decode(getQueryString('info')));
                    }
                });
            };

            // 初始化表格
            loaderTable();
            // 监听头部新增按钮
            table.on('toolbar(comPersonOperateLog)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'back') {
                    parent.layer.closeAll();
                }
            });

            // 鼠标悬停提示特效
            $("#hint").hover(function () {
                openMsg();
            }, function () {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
            }

        });

    </script>
</body>
</html>
