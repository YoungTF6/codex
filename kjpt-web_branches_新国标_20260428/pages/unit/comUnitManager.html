<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>专家评审</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/common.js"></script>
    <style>
        .tab_others {
        background-color: #009688;color:#ffffff;margin-left: 6px;
        width: 173px;
    }
    .tab_this {

        background-color: #f5f5f5;color:#404040;margin-left: 6px;
        width: 173px; border-bottom: 1px solid #F5F5F5;
    }
    .layui-table-tool-temp{
        padding-right: 10px;
    }

        /* 新增代码 */
        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

.layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

    </style>
</head>
<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card">
        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <div class="layui-tab-content">
                <div class="layui-tab-item layui-show">
                    <table class="layui-table" id="comUnitManager" lay-filter="comUnitManager" style="margin: 0px 0px;"></table>
                </div>
              </div>

        </div>
    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="delManager">删除</a>
</script>

<script>

    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var userId=getUrlParam("userId");

        table.render({
            method:'post'
            ,elem: '#comUnitManager'
            ,url: huayi_personorg_url + 'comdept/getComUnitManagerByUserId'
            ,cellMinWidth: 80 //全局定义常规单元格的最小宽度，layui 2.2.1 新增
            ,height: 'full-100'
            ,cols: [[
                {align: 'center', width: 100, toolbar: '#rowBar', title: '操作'},
                {field: 'user_real_name', width: 107,  title: '姓名',align: 'center'},
                {field: 'user_phone', width: 120,  title: '联系方式',align: 'center'},
                {field: 'max_add_time', width: 247,  title: '最后登录时间',align: 'center'}
            ]]
            ,where: {
                userID: userId
            },
            parseData: function(res) {
                if(res.data!=null){
                    return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "data": res.data, //解析数据列表
                            "count": res.data.recordsTotal, //解析数据长度
                        }
                }else{
                    return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "data":  null
                        }
                }
            }
        });

         /* 行工具栏 */
         table.on('tool(comUnitManager)', function (obj) {
                var formData = obj.data;
                if (obj.event === 'delManager') {
                    layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                        $.ajax({
                            type        : 'post',
                            url         : huayi_permission_url + 'comUserManager/delete/'+formData.manager_id,
                            data        : { userName: localStorage.getItem("user-name") },
                            success     : function (res) {
                                if (res.status == 200) {
                                    layer.msg('删除成功', { icon : 1, time : 1500 });
                                    table.reload('comUnitManager');
                                } else {
                                    layer.msg('删除失败', { icon : 2, time : 1500 });
                                }
                            },
                            error       : () => {
                                layer.msg('网络异常，请稍后再试', { icon : 7, time : 1500 });
                            }
                        });
                    });
                }
            });


    });

</script>

</body>
</html>
