<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/api/cpt.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/common.js"></script>
    <script type="text/javascript" src="../../js/constantPage/projectPageUrl.js"></script>
    
</head>
<style>
.wrap-cell {
    white-space: normal;
    word-break: break-all;
}
</style>

<body style="background-color: white;">

    <div class="layui-fluid">
        <div class="layui-card">

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="project" lay-filter="project"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 联合体申请弹窗 -->
    <div id="unitedApplyModal" style="display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; z-index:9999; padding:24px 32px; border-radius:8px; box-shadow:0 2px 16px rgba(0,0,0,0.2); min-width:400px;">
        <div style="margin-bottom:16px;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                <label style="font-weight: 500; min-width: 90px; text-align: right; display: inline-block;"><a style="color: red;"> * </a>联合体类型：</label>
                <select id="unitedType" class="layui-select" style="width: 296px;">
                    <option value="">请选择</option>
                    <option value="0">医联体</option>
                    <option value="1">医共体</option>
                    <option value="2">城市医疗集团内部</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <label style="font-weight: 500; min-width: 90px; text-align: right; display: inline-block;">选择单位：</label>
                <input type="text" id="unitedApplyInput" class="layui-input" placeholder="请输入单位名称" style="width: 300px;">
            </div>
        </div>
        <!-- 固定表头 -->
        <table class="layui-table" style="margin-bottom:0;">
            <thead>
                <tr>
                    <th style="width: 104px">操作</th>
                    <th>单位名称</th>
                </tr>
            </thead>
        </table>
        <!-- 滚动内容区域 -->
        <div style="max-height:240px;overflow-y:auto;">
            <table class="layui-table" style="margin-top:0;">
                <tbody id="unitedApplyBody">
                    <!-- 动态生成的内容将插入到这里 -->
                    <tr><td colspan="2" style="text-align:center;">无数据</td></tr>
                </tbody>
            </table>
        </div>
        <div style="text-align:right;">
            <button class="layui-btn layui-btn-primary" id="unitedApplyClose" style="margin-right:8px;">关闭</button>
            <!-- 上报按钮 -->
            <button class="layui-btn layui-btn-normal" id="unitedApplySubmit">上报</button>
        </div>
    </div>
  
    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
    {{# if(d.unitCheck=="未上报"){}}
        <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #27b1a2;background-color: transparent;">编辑</a>
    {{# }else {}}
        <a class="layui-btn layui-btn-xs" lay-event="" style="color: #27b1a2;background-color: transparent;cursor: default;">已上报</a>
    {{# }}}
    </script>
    <script type="text/html" id="rowBarUnitedApply">
        <a class="layui-btn layui-btn-xs" lay-event="removeUnit" style="color: #27b1a2;background-color: transparent;">移除</a>
    </script>

    <script type="text/html" id="bar">
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="add">联合体申请</button>
    </script>


    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element'], function() {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;
            var element = layui.element;
            var userid= localStorage.getItem("unit-id"),
            standardkindId=localStorage.getItem("standardkind-id"), 
            unitId= localStorage.getItem("unit-id"); 
   
            // 表格相关操作
            // 表格配置
            function loaderTable() {
               table.render({
                    elem: '#project',
                    url: huayi_personorg_url + 'comunitunited/getComUnitUnited',
                    title: '用户表',
                    defaultToolbar: [],
                    where: {
                        unitId: unitId,
                        standardkindId: standardkindId,
                    },
                    cols: [[
                        { field: 'unitedid', align: 'center', title: 'unitedid', hide:true },
                        {field: 'center',toolbar: '#rowBar',title: '操作',fixed: 'left',align: 'center', width: 100},
                        { field: 'unitMainId', align: 'center', title: '单位ID', hide:true },
                        { field: 'unitName', align: 'center', title: '主单位' },
                        { 
                            field: 'unitList', 
                            align: 'center', 
                            title: '联合单位',
                            style: '-moz-box-align: start;',
                            templet: function(d){
                                return `${d.unitList || ''}`;
                            }
                        },
                        { field: 'applyTime', align: 'center', title: '申请时间'},
                        { field: 'unitCheck', align: 'center', title: '联合体状态' }, 
                        { 
                            field: 'unitedType', 
                            align: 'center', 
                            title: '联合体类型',
                            templet: function(d) {
                                if (d.unitedType === '0' || d.unitedType === 0) return '医联体';
                                if (d.unitedType === '1' || d.unitedType === 1) return '医共体';
                                if (d.unitedType === '2' || d.unitedType === 2) return '城市医疗集团内部';
                                return '';
                            }
                        },
                        { field: 'checkMsg', align: 'center', title: '不通过原因' }
                    ]],
                    toolbar: '#bar',
                    id: "project",
                    height: 'full-155',
                    page: false,
                    done: function (res) {
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });
                    },
                    parseData: function(res) { //res 即为原始返回的数据
                        return {
                            "code": 0, //解析接口状态
                            "msg": res.msg, //解析提示文本
                            "count": res.count, //解析数据长度
                            "data": res.data //解析数据列表
                        };
                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };
  
            // 存储已添加的单位，防止重复
            var addedUnits = [];
            var UnitsedId = '';

            $(function() {
                // 点击输入框和建议项以外区域时关闭建议项
                $(document).on('mousedown', function(e) {
                    var $input = $('#unitedApplyInput');
                    var $list = $('#unitSuggestList');
                    // 如果建议项存在，且点击的不是输入框和建议项
                    if ($list.length && !$(e.target).closest('#unitedApplyInput, #unitSuggestList').length) {
                        $list.remove();
                    }
                });
                loaderTable();

                // 监听输入框变化（建议项绝对定位在输入框下方，追加到body）
                $('#unitedApplyInput').on('input', function() {
                    var $input = $(this);
                    var keyword = $input.val().trim();
                    $('#unitSuggestList').remove();
                    if (!keyword) return;
                    $.get(huayi_personorg_url + 'comunitunited/getComUnitByUM', { unitName: keyword,standardkindId:standardkindId }, function(res) {
                        var list = res.data || [];
                        var $list = $('<ul id="unitSuggestList" style="position:absolute;z-index:10000;background:#fff;border:1px solid #ccc;max-height:200px;overflow:auto;"></ul>');
                        if (list.length === 0) {
                            $list.append('<li style="padding:8px;color:#888;">无匹配单位</li>');
                        } else {
                            list.forEach(function(item) {
                                if (!addedUnits.includes(item.unitMainId)) {
                                    $list.append(`<li data-id="${item.unitMainId}" data-name="${item.unitName}" style="padding:8px;cursor:pointer;">${item.unitName}</li>`);
                                }
                            });
                        }
                        // 定位建议项到输入框下方
                        var offset = $input.offset();
                        var height = $input.outerHeight();
                        $list.css({
                            left: offset.left,
                            top: offset.top + height,
                            width: $input.outerWidth()
                        });
                        $('body').append($list);

                        // 点击建议项
                        $list.on('click', 'li[data-id]', function() {
                            var unitId = $(this).data('id');
                            var unitName = $(this).data('name');
                            var $tbody = $('#unitedApplyBody');
                            $tbody.find('tr:contains("无数据")').remove();
                            $tbody.append(
                                `<tr data-id="${unitId}">
                                    <td style="width: 104px">
                                        <a class="layui-btn layui-btn-xs" lay-event="removeUnit" style="color: #27b1a2;background-color: transparent;">移除</a>
                                    </td>
                                    <td>${unitName}</td>
                                </tr>`
                            );
                            addedUnits.push(unitId);
                            $('#unitSuggestList').remove();
                            $input.val('');
                        });
                    });
                });
                //点击关闭时
                $('#unitedApplyClose').on('click', function() {
                    $('#unitedApplyModal').hide();
                    $('#unitedApplyInput').val('');
                    $('#unitedApplyBody').empty().append('<tr><td colspan="2" style="text-align:center;">无数据</td></tr>');
                    addedUnits = []; // 清空已添加的单位
                    $('#unitSuggestList').remove(); // 关闭建议项
                });

                // 提交按钮
                $('#unitedApplySubmit').on('click', function() {
                    //unitedType 
                    var unitedType = $('#unitedType').val();
                    if (!unitedType) {
                        layer.msg('请选择联合体类型');
                        return;
                    }
                    var unitIds = addedUnits.join(',');
                    if (unitIds.length === 0) {
                        layer.msg('请至少选择一个单位');
                        return;
                    }
                    // 提交数据
                    $.get(huayi_personorg_url + 'comunitunited/addComUnitUnited', {
                        unitId: unitId,
                        standardkindId: standardkindId,
                        unitedUnitIds: unitIds,
                        unitsedId: UnitsedId,
                        unitedType: unitedType
                    }, function(res) {
                        if (res.status === 200) {
                            layer.msg('提交成功');
                            $('#unitedApplyModal').hide();
                            $('#unitedApplyInput').val('');
                            $('#unitedApplyBody').empty().append('<tr><td colspan="2" style="text-align:center;">无数据</td></tr>');
                            addedUnits = []; // 清空已添加的单位
                            loaderTable(); // 重新加载表格
                        } else {
                            layer.msg('提交失败');
                        }
                    });
                });
                
                // 移除单位
                $('#unitedApplyBody').on('click', '[lay-event="removeUnit"]', function() {
                    var $tr = $(this).closest('tr');
                    var unitId = $tr.data('id');
                    $tr.remove();
                    addedUnits = addedUnits.filter(id => id !== unitId);
                    // 如果表格为空，显示“无数据”
                    if ($('#unitedApplyBody tr').length === 0) {
                        $('#unitedApplyBody').append('<tr><td colspan="2" style="text-align:center;">无数据</td></tr>');
                    }
                });
               


            }); 
        

           

            // 监听头部新增按钮
            table.on('toolbar(project)', function(obj) { 
                var datas = obj.data;
                //document.getElementById("form-Project").reset();
                if (obj.event === 'add') {
                    //初始化
                    UnitsedId = '';
                    // 显示弹窗
                    $('#unitedApplyModal').show();
                }
            });
            // 监听表格行内编辑按钮
            table.on('tool(project)', function(obj) {
                var data = obj.data;
                if (obj.event === 'edit') {
                    UnitsedId= data.unitedid;
                    //显示unitedApplyBody
                    $('#unitedApplyModal').show();
                    //读取数据库unitedid对应的单位数据拼接到unitedApplyBody中
                    $.get(huayi_personorg_url + 'comunitunited/getComUnitUnitedById', { unitedId: data.unitedid }, function(res) {
                        if (res.status === 200) {
                            var unitList = res.data || [];
                            $('#unitedApplyBody').empty();
                            if (unitList.length === 0) {
                                $('#unitedApplyBody').append('<tr><td colspan="2" style="text-align:center;">无数据</td></tr>');
                            } else {
                                unitList.forEach(function(unit) {
                                    $('#unitedApplyBody').append(
                                        `<tr data-id="${unit.unitMainId}">
                                            <td style="width: 104px">
                                                <a class="layui-btn layui-btn-xs" lay-event="removeUnit" style="color: #27b1a2;background-color: transparent;">移除</a>
                                            </td>
                                            <td>${unit.unitName}</td>
                                        </tr>`
                                    );
                                    addedUnits.push(unit.unitMainId);
                                });
                            }
                        } else {
                            layer.msg('获取单位信息失败');
                        }
                    });

                }
            });
 
        
        });
    </script>

</body>

</html>
