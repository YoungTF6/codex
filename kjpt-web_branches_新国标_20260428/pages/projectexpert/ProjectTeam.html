<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>专家组</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/constantPage/projectConstant.js"></script>
    <script type="text/javascript" src="../../js/tools/form_validation_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/dict_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/dateTools.js"></script>
    <script type="text/javascript" src="../../js/tools/num_tool.js"></script>
    <style>
        body {
            background: #fff;
        }
        .layui_body_box {
            padding: 0;
        }
        .layui-card {
            box-shadow: none;
        }
        .layui-form-select dl {
            max-height: 220px;
        }
        #add-projectTeam .layui-form-select dl {
            max-height: 85px;
        }
        .margin-bottom-5 {
            margin-bottom: 5px !important;
        }
        .layui-icon-ok {
            color: green; font-weight: bold;
        }
        .layui-icon-close.notok, .require, .error {
            color: red; font-weight: bold;
        }
        .layui-table-header th .layui-table-cell {
            text-align: center;
        }
        .layui-table-cell {
            height: auto;
        }
        .laytable-cell-2-0-4 {
            overflow: inherit;
        }
        .laytable-cell-2-0-5 {
            overflow: inherit;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-layer-content {
            overflow: visible !important;
        }
        .tab_others {
            width: 150px !important;
        }
        .tab_this {
            width: 150px !important;
        }
        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }
        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }
        .layui-card-body .layui-table {
            margin: 0;
        }
        .layui-table-tool-temp {
            padding-right: 10px;
        }
        [type="page"] {
            overflow: auto;
        }
        .layui-progress-big .layui-progress-text {
            color: #404040;
        }
        .layui-progress {
            margin-top: 5px;
        }
        .condition-area .layui_display:nth-child(1)  {
            margin-right: 15px;
        }
        .condition-area .layui-form-label {
            width: 90px;
            padding: 9px 10px;
        }
        .condition-area .layui-input-block {
            margin-left: 110px;
        }

        .cell-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #add-team {
            padding: 40px 40px 0 30px;
        }
        #add-team .layui-form-item {
            text-align: left;
        }
        #add-team .layui-inline {
            width: 500px;
        }
        #add-team .layui-form-label {
            width: 90px;
        }
        #add-team .layui-input-block {
            margin-left: 120px;
        }
        #add-team .footer {
            text-align: center;
            position: absolute;
            left: 0;
            bottom: 0;
            margin-bottom: 0;
            width: 100%;
            background-color: #fff;
            padding: 15px 0;
        }

        .layui-disabled, .layui-disabled:hover {
            background-color: #fafafa !important;
            color: #000000d9 !important;
        }
        .layui-select-disabled .layui-edge {
            display: none;
        }
        .layui-select-disabled input {
            padding-right: 10px;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-tab" lay-filter="tab-base">
                <ul class="layui-tab-title">
                    <li class="tab_others tab_this tabsRounded " lay-id="0">专家组</li>
                    <li class="tab_others tabsRounded" lay-id="1">已分配项目<span id="assigned"></span></li>
                    <li class="tab_others tabsRounded" lay-id="2">未分配项目<span id="undistributed"></span></li>
                    <li class="tab_others tabsRounded" lay-id="3">专家评审工作量统计<span id="workcollection"></span></li>
                </ul>
            </div>

            <!-- 1.1、专家组搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area" id="search4Team">
                <div class="layui_mess">
                    <div class="layui_display">
                        <form id="form-query-1">
                            <div class="layui-inline">
                                <label class="layui-form-label">专家组年度</label>
                                <div class="layui-input-block">
                                    <select class="year" name="year" id="year"></select>
                                </div>
                            </div>
                            <div class="layui-inline div-medicalType hide">
                                <label class="layui-form-label" name="lblMedicalSystem"></label>
                                <div class="layui-input-block">
                                    <select class="medical-type" name="medicalType" lay-filter="medicalType" id="medicalType" lay-search></select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">专家组名称</label>
                                <div class="layui-input-block">
                                    <input type="text" name="teamName" id="teamName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline div-batch hide"></div>
                        </form>
                    </div>

                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="tableOp.init()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>&nbsp;查询</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 1.2、项目搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area hide" id="search4Project">
                <div class="layui_mess">
                    <div class="layui_display">
                        <form id="form-query-2">
                            <div class="layui-inline">
                                <label class="layui-form-label">项目年度</label>
                                <div class="layui-input-block">
                                    <select class="year" name="holdYear" id="holdYear" lay-filter="holdYear"></select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">二级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledge" lay-filter="knowledge" id="knowledge" lay-search="true">
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">三级学科</label>
                                <div class="layui-input-block">
                                    <select name="subjectCode" lay-filter="subjectCode" id="subjectCode" lay-search>
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label" name="lblMedicalSystem"></label>
                                <div class="layui-input-block">
                                    <select class="medical-type" name="projectType" lay-filter="projectType" id="projectType" lay-search></select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">申报代码</label>
                                <div class="layui-input-block">
                                    <input type="text" name="projectCode" id="projectCode" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">项目名称</label>
                                <div class="layui-input-block">
                                    <input type="text" name="projectName" id="projectName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">项目负责人</label>
                                <div class="layui-input-block">
                                    <input type="text" name="personName" id="personName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">申报单位</label>
                                <div class="layui-input-block">
                                    <input type="text" name="unitMainId" id="unitMainId" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline tree-select">
                                <label class="layui-form-label">下级单位</label>
                                <div class="layui-input-block">
                                    <input type="text" class="layui-input" name="subordinateUnit" lay-filter="subordinateUnit" id="subordinateUnit" lay-search>
                                </div>
                            </div>
                            <!-- <div class="layui-inline">
                                <label class="layui-form-label">项目类型</label>
                                <div class="layui-input-block">
                                    <select name="projectType" lay-filter="projectType_filter" id="projectType_search" lay-search>
                                        <option>全部</option>
                                        <option value="1">西医</option>
                                        <option value="2">中医</option>
                                    </select>
                                </div>
                            </div> -->
                            <div class="layui-inline div-batch hide"></div>
                        </form>
                    </div>

                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtnForProject" onclick="tableOp.init()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>&nbsp;查询</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 1.3、工作量统计搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area hide" id="search4Work">
                <div class="layui_mess">
                    <div class="layui_display">
                        <form id="form-query-3">
                            <div class="layui-inline">
                                <label class="layui-form-label">年度</label>
                                <div class="layui-input-block">
                                    <select class="year" name="workYear" id="workYear" lay-filter="workYear"></select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label" name="lblProjectLevel"></label>
                                <div class="layui-input-block">
                                    <select name="projectLevel" id="projectLevel">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline div-medicalType hide">
                                <label class="layui-form-label" name="lblMedicalSystem"></label>
                                <div class="layui-input-block">
                                    <select class="medical-type" name="medicalTypeProj" lay-filter="medicalTypeProj" id="medicalTypeProj" lay-search></select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">专家组</label>
                                <div class="layui-input-block">
                                    <input type="text" name="workTeam" id="workTeam" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">姓名</label>
                                <div class="layui-input-block">
                                    <input type="text" name="workExpert" id="workExpert" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline div-batch hide"></div>
                        </form>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtnForWork" onclick="tableOp.init()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>&nbsp;查询</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2、表格区域 -->
            <div class="layui-card-body layui_body_box" id="div-table">
                <table class="layui-table" id="projectTeam" lay-filter="projectTeam"></table>
            </div>
        </div>
    </div>


    <!-- 表格内数据编辑、删除按钮 -->
    <script type="text/html" id="rowBar">
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a>
    </script>
    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm" lay-event="add" href="#"><i class="layui-icon layui-icon-add-1 layuiadmin-button-btn"></i>新增</a>
        <a class="layui-btn layui-btn-sm btn-auto-assign hide a-disabled" lay-event="auto-assign-1" href="#">第一批次一键分配</a>
        <a class="layui-btn layui-btn-sm btn-auto-assign hide a-disabled" lay-event="auto-assign-2" href="#">第二批次一键分配</a>
    </script>
    <script type="text/html" id="export">
        <a class="layui-btn layui-btn-sm " lay-event="exportExecl">导出 Excel</a>
    </script>
    <!-- 导出excel（统计） -->
    <script type="text/html" id="exportWork">
        <a class="layui-btn layui-btn-sm " lay-event="exportWorkExecl">导出 Excel</a>
    </script>
    <!-- 已分配及未分配项目行内按钮 -->
    <script type="text/html" id="barForProject">
        {{# if (d.projectType == 2 && dictTool.getUnitId() == '210000') { }}
        <a class="layui-btn layui-btn-xs layui-btn-disabled btn-disabled-row" lay-event="reassignmentForTeam">重新分配专家组</a>
        {{# } else { }}
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="reassignmentForTeam">重新分配专家组</a>
        {{# } }}
    </script>
    <script type="text/html" id="barForProject1">
        {{# if (d.projectType == 2 && dictTool.getUnitId() == '210000') { }}
        <a class="layui-btn layui-btn-xs layui-btn-disabled btn-disabled-row" lay-event="reassignmentForTeam">分配专家组</a>
        {{# } else { }}
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="reassignmentForTeam">分配专家组</a>
        {{# } }}
    </script>
    <script type="text/javascript">
        let tableName           = '0',
            toolBar             = '#bar',
            formId              = '#form-query-1',
            reviewStatus        = '0', // 查询条件（项目）
            knowledgSubject     = dictTool.getUnitId() === '218000' ? 2 : -1,
            medicalType         = dictTool.getManagerMedicalType(),
            standardKindId      = dictTool.getStandardKindId(),
            unitId              = dictTool.getUnitId(),
            unitUserType        = dictTool.getUnitUserType(),
            flag_guangxi        = StandardKind.GUANG_XI == standardKindId,
            flag_guangDong      = StandardKind.GUANG_DONG == standardKindId,
            flag_medicalType    = flag_guangDong && unitUserType == 5;

        layui.config({
            base        : '../../js/layui/ext/'
        }).extend({
            xmSelect    : 'xm-select',
            treeSelect  : 'treeSelect',
            tool        : 'tool',
            excel       : 'excel'
        }).use([ 'table', 'form', 'element', 'xmSelect', 'laytpl', 'laydate', 'treeSelect', 'tool', 'excel' ], () => {
            let { table, form, layer, element, xmSelect, laytpl, laydate, treeSelect, tool, excel } = layui,
                borderDefault = {
                    top     : { style: 'thin' },
                    bottom  : { style: 'thin' },
                    left    : { style: 'thin' },
                    right   : { style: 'thin' }
                };

            /** 初始化页面 */
            $(() => {
                $('.condition-area .layui-form-label').each((i, d) => {
                    let name = $(d).attr('name');
                    if (name) $(d).text(projectLabels[name] || '');
                });

                initYearSel();
                initKnowledgeSelBatch();
                initProjectTypeSel();
                loadUnitTree(dictTool.getUnitId());
                initScoreLevelSel();

                if (flag_guangxi) {
                    $('.div-batch').removeClass('hide')
                        .load('../mod/comFormItem.html .form-batch', (response, status) => form.render('select'));
                }

                element.tabChange('tab-base', 0);

                form.render();
            });

            window.initYearSel = () => {
                $('.year').empty();
                let data = dictTool.getYear('年度');
                if (data && data.length > 0) {
                    $.each(data, (i, item) => $('.year').append(new Option(item, item)));
                    form.on('select(holdYear)', data => initKnowledgeSelBatch());
                    form.on('select(workYear)', data => initScoreLevelSel());
                }

                form.render('select');
            };

            window.initKnowledgeSelBatch = () => {
                dictTool.initKnowledgeSel('#knowledge', '二级学科', { ...getVerParams(), knowledgeType: 2, knowledgSubject: knowledgSubject });
                $('#subjectCode').find('option:gt(0)').remove();
                let pId = $('#knowledge').val();
                if (pId) dictTool.initKnowledgeSel('#subjectCode', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: pId });

                form.on('select(knowledge)', data => {
                    $('#subjectCode').find('option:gt(0)').remove();
                    let pId = data.value;
                    if (pId) dictTool.initKnowledgeSel('#subjectCode', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: pId });
                    form.render();
                });

                form.render('select');
            };

            window.initProjectTypeSel = () => {
                let options = '<option value="2">中医</option>';
                if (dictTool.getUnitId() !== '218000') options = '<option value="">全部</option><option value="1">西医</option>' + options;
                $('.medical-type').empty().append(options);

                if (medicalType) {
                    $('#projectType').val(medicalType);
                    if (flag_medicalType) {
                        $('.medical-type').val(medicalType).attr('disabled', true);
                        $('.div-medicalType').css('display', 'inline-block');
                    }
                }

                form.render('select');
            };

            window.loadUnitTree = (unitId, data) => {
                while ($('.layui-treeSelect').length > 0) treeSelect.destroy('subordinateUnit');
                treeSelect.render({
                    elem    : '#subordinateUnit',
                    data    : huayi_personorg_url + 'comunit/childrenAllTreeRedis?unitId=' + dictTool.getUnitId(),
                    type    : 'get',
                    search  : true,
                    success : d => data,
                    fail    : d => layer.msg('单位树加载失败', { icon: 7, time: 1500 })
                });
            };

            window.initScoreLevelSel = () => {
                $.ajax({
                    type        : 'post',
                    url         : huayi_projectscore_url + 'projectDicRegionLevel/getLevelsByStandardIdAndTopUnit',
                    data        : {
                        getLevelsByStandardId   : dictTool.getStandardKindId(),
                        holdYear                : $('#workYear').val(),
                        unitId                  : dictTool.getUnitId()
                    },
                    async       : false,
                    dataType    : 'json',
                    success     : res => {
                        $('#projectLevel').empty();
                        if (res.status == 200 && res.success == true) {
                            $('#projectLevel').append(new Option('请选择',''));
                            $.each(res.data, (i, item) => $('#projectLevel').append(new Option(item.scoreLevelName, item.scoreLevelId)));
                        } else layer.msg('获取年度信息失败', { icon: 7, time: 1500 });
                    },
                    error       : () => layer.msg('获取年度信息失败', { icon: 7, time: 1500 })
                });

                form.render('select');
            };


            /** 选项卡 */
            $('.tab_others').on('click', function () {
                let index = $(this).index();
                $(this).addClass('tab_this').siblings().removeClass('tab_this');
            });
            element.on('tab(tab-base)', function () {
                let type = this.getAttribute('lay-id'); // 获取当前 tab 的 id 属性
                if (type === '0') {
                    tableOp.url     = huayi_personorg_url + 'projectTeam/all';
                    tableName       = '0';
                    toolBar         = '#bar';
                    formId          = '#form-query-1';
                    $('#search4Project, #search4Work').hide();
                    $('#search4Team').show();
                }
                else if (type === '1') {
                    tableOp.url     = huayi_projectscore_url + 'project/selectAllProjectWhereGroupIsNullOrNotNull';
                    tableName       = '1';
                    toolBar         = '#export';
                    formId          = '#form-query-2';
                    reviewStatus    = '1';
                    $('#search4Team, #search4Work').hide();
                    $('#search4Project').show();
                }
                else if (type === '2') {
                    tableOp.url     = huayi_projectscore_url + 'project/selectAllProjectWhereGroupIsNullOrNotNull';
                    tableName       = '2';
                    toolBar         = '';
                    formId          = '#form-query-2';
                    reviewStatus    = '0';
                    $('#search4Team, #search4Work').hide();
                    $('#search4Project').show();
                }
                else if (type === '3') {
                    tableOp.url     = huayi_projectscore_url + 'project/selectExpertRevieWorks';
                    tableName       = '3';
                    toolBar         = '#exportWork';
                    formId          = '#form-query-3';
                    $('#search4Team, #search4Project').hide();
                    $('#search4Work').show();
                }
                tableOp.init();
            });


            /** 表格相关 */
            window.tableOp = {

                url: huayi_personorg_url + 'projectTeam/all',

                init: () => {
                    table.render({
                        elem            : '#projectTeam',
                        url             : tableOp.url,
                        defaultToolbar  : [],
                        where           : tableOp.getQueryParams({
                            unitUserType    : dictTool.getUnitUserType(),
                        }, '#form-query-1', '#form-query-2', '#form-query-3'),
                        cols            : [ [
                            { fixed: 'left', align: 'center', width: 120, toolbar: '#rowBar', title: '操作', hide: !(tableName === '0') },
                            { fixed: 'left', field: 'teamName', title: '组名称', sort: true, minWidth: 150, hide: tableName !== '0' },
                            { field: 'teamKnowledge', title: '学科', sort: true, minWidth: 200, hide: tableName !== '0' },
                            { field: 'expertName', hide: tableName !== '0', title: '组成员', minWidth: 400, sort: true, templet: d => {
                                return '<div class="cell-flex"><div style="width: calc(100% - 75px);  text-wrap: initial;">' +
                                    (d.expertName || '<span>&nbsp;</span>') + '</div>' +
                                    '<a class="layui-btn layui-btn-xs" lay-event="allocationExpert">分配专家</a></div>';
                            } },

                return {
                    cmeStandardKindId   : dictTool.getStandardKindId(),
                    versionYear         : $('#holdYear').val()
                };
            };


            window.pageNum = 1;
            $(window).resize(() => {
                let pageNumCur = $('.layui-laypage-curr > em:nth-child(2)').text();
                pageNum = pageNumCur || pageNum;
                tableOp.init({ page: { curr: pageNum } });
            });

            // 行高同步函数（支持递归同步多次）
            function syncTableRowHeight() {
                var $mainRows = $('.layui-table-main tr');
                var $fixedRows = $('.layui-table-fixed .layui-table-body tr');
                // 遍历所有行，强制统一高度
                $mainRows.each(function(index) {
                    var $mainRow = $(this);
                    var $fixedRow = $fixedRows.eq(index);
                    if ($fixedRow.length) {
                        var mainHeight = Math.ceil($mainRow.height());
                        var fixedHeight = Math.ceil($fixedRow.height());
                        var targetHeight = Math.max(mainHeight, fixedHeight, 22); // 最小高度保护
                        
                        if (Math.abs(mainHeight - fixedHeight) > 1) {
                            $mainRow.height(targetHeight);
                            $fixedRow.height(targetHeight);
                        }
                    }
                });
                // 二次确保：某些情况下固定列和主行的最后一行可能漏掉，再扫描一次
                setTimeout(function() {
                    $mainRows.each(function(index) {
                        var $mainRow = $(this);
                        var $fixedRow = $fixedRows.eq(index);
                        if ($fixedRow.length && $mainRow.height() !== $fixedRow.height()) {
                            var h = Math.max(Math.ceil($mainRow.height()), Math.ceil($fixedRow.height()));
                            $mainRow.height(h);
                            $fixedRow.height(h);
                        }
                    });
                }, 50);
            }

        });
    </script>
</body>
</html>
