<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>专家评审</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/common.js"></script>
    <style>
        .tab_others {
        background-color: #009688;color:#ffffff;margin-left: 6px;
        width: 173px;
    }
    .tab_this {

        background-color: #f5f5f5;color:#404040;margin-left: 6px;
        width: 173px; border-bottom: 1px solid #F5F5F5;
    }
    .layui-table-tool-temp{
        padding-right: 10px;
    }

        /* 新增代码 */
        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

.layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

    </style>
</head>
<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card">
        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <div class="layui-tab-content">
                <div class="layui-tab-item layui-show">
                    <table class="layui-table" id="expertOption" lay-filter="expertOption" style="margin: 0px 0px;"></table>
                </div>
              </div>

        </div>
    </div>
</div>

<script>

    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var projId=getUrlParam("projectId");
        let column=""; 
            window.colArray = [
                    {field: 'expert_name', width: 107,  title: '专家姓名',align: 'center'},
                    {field: 'review_result', width: 90,  title: '评审结果',align: 'center'},
                    {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                        field:'explanation' ,title:'评审意见',align: 'center',width:205,templet:function (d) {
                            if(d.explanation!=null && (d.explanation).length<10){
                                return d.explanation
                            }else if (d.explanation!=null && (d.explanation).length>10){
                                return '<a href=\"#\" title = '+ d.explanation.replace(/\s*/g,"")+' >'+d.explanation.substring(0,10)+'...\</a>';
                            }else {
                                return '';
                            }
                                
                    }}
            ];

            if(localStorage.getItem("standardkind-id")!="73ba18db-33fd-4746-ab41-9beb009f69a1"){
                column={field: 'grade', width: 60,  title: '评分',align: 'center'};
                window.colArray.push(column);
                column={field: 'add_time', width: 113,  title: '评审时间',align: 'center'};
                window.colArray.push(column);
            }else{
                column={field: 'add_time', width: 173,  title: '评审时间',align: 'center'};
                window.colArray.push(column);
            }

        table.render({
            method:'post'
            ,elem: '#expertOption'
            ,url: huayi_projectscore_url + 'project/getProjExpertReview'
            ,cellMinWidth: 80 //全局定义常规单元格的最小宽度，layui 2.2.1 新增
            ,height: 'full-100'
            ,cols: [
                window.colArray
            ]
            ,where: {
                projectId: projId
            },
            parseData: function(res) {
                if(res.data!=null){
                    return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "data": res.data, //解析数据列表
                            "count": res.data.recordsTotal, //解析数据长度
                        }
                }else{
                    return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "data":  null
                        }
                }
            }
        });

    });

</script>

</body>
</html>
