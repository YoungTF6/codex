<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>专家评审工作量统计-项目详细列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/common.js"></script>
</head>
<body style="background-color: white;">
    <div class="layui-fluid">
        <div class="layui-tab-item layui-show">
            <table class="layui-table" id="projectOption" lay-filter="projectOption" style="margin: 0px 0px;"></table>
        </div>
    </div>


    <script>
        layui.use([ 'table', 'form','element' ], () => {
            let { table, form, jquery: $, layer, element } = layui,
                type        = getUrlParam('type'),
                workYear    = getUrlParam('workYear'),
                expertId    = getUrlParam('expertId'),
                teamId      = getUrlParam('teamId'),
                reserved2   = getUrlParam('reserved2'),
                reserved3   = getUrlParam('reserved3'),
                medicalType = getUrlParam('medicalType'); 


            table.render({
                elem            : '#projectOption',
                url             : huayi_projectscore_url + 'project/statisExpertRevieWorks',
                cellMinWidth    : 80,
                height          : 'full-52',
                page            : false,    
                where           : {
                    type            : type,
                    workYear        : workYear,
                    expertId        : expertId,
                    teamId          : teamId,
                    reserved2       : reserved2,
                    reserved3       : reserved3,
                    medicalTypeProj : medicalType,
                },
                cols            : [ [
                    { field: 'projectCode', title: '申报代码', align: 'center' },
                    { field: 'projectName', title: '项目名称', align: 'center' },
                    { field: 'unitName', title: '申报单位', align: 'center', hide: (type==='PS' || type === 'TJ') },
                    { field: 'reviewResult', title: '评审结果', align: 'center', width: 90, hide: !(type==='PS' || type === 'TJ') },
                    { field: 'recommendResult', title: '推荐结果', align: 'center', width: 90, hide: !(type === 'TJ') },
                ] ],
                limit           : 10,
                limits          : [ 10, 50, 100, 150, 200 ],
                parseData       : res => {
                    return {
                        'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg'   : res.msg, // 解析提示文本
                        // 'count' : res.data.recordsTotal, // 解析数据长度
                        'data'  : res.data.records, // 解析数据列表
                        // 'page'  : res.data.pageNum, // 当前页
                        // 'limit' : res.data.pageSize, // 每页条数
                    }
                },
                request         : {
                    pageName  : 'pageNum', // 页码的参数名称，默认：page
                    limitName : 'pageSize' // 每页数据量的参数名，默认：limit
                }
            });

        });
    </script>
</body>
</html>
