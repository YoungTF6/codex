<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <title>专家组</title>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/constantPage/projectConstant.js"></script>
    <script type="text/javascript" src="../../js/tools/form_validation_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/dict_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/num_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>
    <style>
        .layui-card {
            padding: 40px 40px 15px 20px;
            max-width: 800px;
            margin: 0 auto;
            margin-bottom: 70px !important;
        }
        .layui-form-item .layui-inline {
            margin-bottom: 15px;
        }
        .layui-form-item .layui-form-label {
            width: 70px;
        }
        .layui-form-item .layui-input-block {
            margin-left: 100px;
        }
        .footer {
            text-align: center;
            position: fixed;
            left: 0;
            bottom: 0;
            margin-bottom: 0;
            width: 100%;
            background-color: #fff;
            padding: 15px 0;
        }
        .scroll-body {
            max-height: 110px !important;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <form class="layui-form" id="form-team" lay-filter="add-filter" onsubmit="return false;">
                <div class="layui-form-item">
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <label class="layui-form-label"><i class="required-item"></i>组名称</label>
                        <div class="layui-input-block">
                            <input type="text" id="teamName" name="teamName" placeholder="组名称" autocomplete="off" lay-verify="required" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <label class="layui-form-label"><i class="required-item"></i>年度</label>
                        <div class="layui-input-block">
                            <select name="year" id="year" lay-filter="year" lay-verify="required" lay-search class="year"></select>
                        </div>
                    </div>
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <label class="layui-form-label"><i class="required-item hide"></i>二级学科</label>
                        <div class="layui-input-block">
                            <div id="xmSel_1"></div>
                        </div>
                    </div>
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <label class="layui-form-label"><i class="required-item hide"></i>三级学科</label>
                        <div class="layui-input-block">
                            <div id="xmSel_2"></div>
                        </div>
                    </div>
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12 div-batch-require hide"></div>
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12 div-maxProjNum hide">
                        <label class="layui-form-label">最大项目数</label>
                        <div class="layui-input-block">
                            <input type="text" id="maxProjNum" name="maxProjNum" placeholder="最大项目数" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>

                <input type="hidden" id="projectTeamId" name="projectTeamId">
                <input type="hidden" id="medicalType" name="medicalType">
                <input type="hidden" id="projectCount" name="projectCount" value="0">

                <div class="layui-form-item footer">
                    <div style="text-align: center;">
                        <button class="layui-btn" lay-submit lay-filter="submit">确定</button>
                        <button class="layui-btn layui-btn-primary" onclick="formReset()">重置</button>
                    </div>
                </div>
            </form>
        </div>
    </div>


    <script type="text/javascript">
        const   localSession    = layui.sessionData('ProjectTeamInfo'),
                { teamId, teamName, year, knowledgeId: knowledgSubject, medicalType, batch, maxProjNum, projectCount } = localSession,
                standardKindId      = dictTool.getStandardKindId(),
                unitUserType        = dictTool.getUnitUserType(),
                medicalType_user    = dictTool.getManagerMedicalType(),
                flag_guangxi        = StandardKind.GUANG_XI == standardKindId,
                flag_guangDong      = StandardKind.GUANG_DONG == standardKindId;

        let     knowledgeId         = new Array(),
                knowledgeTwoId      = new Array();


        layui.config({
            base        : '../../js/layui/ext/'
        }).extend({
            xmSelect    : 'xm-select',
            treeSelect  : 'treeSelect',
            tool        : 'tool',
            excel       : 'excel'
        }).use([ 'table', 'form', 'xmSelect', 'laytpl', 'laydate', 'treeSelect', 'tool' ], () => {
            let { table, form, layer, element, xmSelect, laytpl, laydate, treeSelect, tool, excel } = layui, 
                loadIdx = layer.load(1, { shade: [ 0.3 ] });


            /** 初始化页面 */
            $(() => {
                initYearSel();
                flag_guangDong && $('.required-item').removeClass('hide');
                if (flag_guangxi) {
                    $('.div-batch-require').removeClass('hide')
                        .load('../mod/comFormItem.html .form-batch', (response, status) => form.render('select'));
                    $('.div-maxProjNum').removeClass('hide');
                    $('.div-maxProjNum input').attr('lay-verify', 'required|positiveInteger');
                }

                teamId && $('#projectTeamId').val(teamId);
                teamName && $('#teamName').val(teamName);
                year && $('#year').val(year);
                $('#medicalType').val(medicalType || medicalType_user);
                maxProjNum && $('#maxProjNum').val(maxProjNum);
                projectCount && $('#projectCount').val(projectCount);

                teamId && (knowledgeTwoId = localSession.knowledgeTwoId.split(','), knowledgeId = localSession.knowledgeId.split(','));
                initKnowledgeXMSel(knowledgeTwoId, knowledgeId);

                if (flag_guangxi && batch) {
                    setTimeout(() => {
                        $('[name=batch]').val(batch);
                        form.render('select');
                    }, 0);
                }

                form.render();
                layer.close(loadIdx);
            });

            window.initKnowledgeXMSel = (valSet_1, valSet_2) => {
                let year    = $('#year').val(),
                    data_1  = [],
                    data_2  = [];
                if (year) data_1 = dictTool.getKnowledge('二级学科', { 
                    cmeStandardKindId   : dictTool.getStandardKindId(),
                    versionYear         : year, 
                    knowledgeType       : 2, 
                    knowledgSubject     : knowledgSubject 
                });
                if (valSet_1 && valSet_1.length > 0) data_2 = dictTool.getKnowledge('三级学科', { 
                    cmeStandardKindId   : dictTool.getStandardKindId(),
                    versionYear         : year, 
                    knowledgeType       : 3, 
                    knowledgeTwoId      : valSet_1.join(),
                    knowledgSubject     : knowledgSubject 
                });
                window.xmSel_1 = xmSelect.render({
                    el          : '#xmSel_1',
                    autoRow     : true,
                    name        : 'subTwo',
                    filterable  : true,
                    theme       : { color: '#5FB878' },
                    prop        : {
                        name    : 'knowledgeName',
                        value   : 'knowledgeId',
                    },
                    on          : ({ arr, change, isAdd }) => {
                        let knowledgeTwoId = '', data = [];
                        if (arr.length > 0) {
                            $.each(arr, (i, item) => knowledgeTwoId += ',' + item.knowledgeId);
                            data = dictTool.getKnowledge('三级学科', { 
                                cmeStandardKindId   : dictTool.getStandardKindId(),
                                versionYear         : year, 
                                knowledgeType       : 3, 
                                knowledgeTwoId      : knowledgeTwoId,
                                knowledgSubject     : knowledgSubject 
                            });
                        }
                        xmSel_2.update({ data: data });
                    },
                    data        : data_1,
                });
                xmSel_1.setValue(valSet_1 || []);
                window.xmSel_2 = xmSelect.render({
                    el      : '#xmSel_2',
                    autoRow : true,
                    name    : 'subThree',
                    empty   : '请选择二级学科',
                    theme       : { color: '#5FB878' },
                    prop    : {
                        name    : 'knowledgeName',
                        value   : 'knowledgeId',
                    },
                    data    : data_2
                });
                xmSel_2.setValue(valSet_2 || []);
            };

            window.initYearSel = () => {
                $('.year').empty();
                $.ajax({
                    type        : 'post',
                    url         : huayi_projectscore_url + 'projectDicRegionLevel/getHoldYear',
                    data        : { cmeStandardKind: dictTool.getStandardKindId(), unitId: dictTool.getUnitId() },
                    dataType    : 'json',
                    async       : false,
                    success     : res => {
                        if (res.status == 200 && res.success == true) {
                            $.each(res.data, (i, item) => $('.year').append(new Option(item, item)));
                            form.on('select(year)', data => initKnowledgeXMSel());
                        } else layer.msg('获取年度信息失败', { icon: 7, time: 1500 });
                    },
                    error       : () => layer.msg('获取年度信息失败', { icon: 7, time: 1500 })
                });

                form.render('select');
            };

            
            window.formReset = () => {
                document.getElementById('form-team').reset();
                initKnowledgeXMSel();
                teamId && $('#projectTeamId').val(teamId);
                teamId && $('#projectCount').val(projectCount || 0);
            };

            form.verify({
                positiveInteger: val => {
                    if (val && !numTool.isPositiveInteger(val)) return '请输入正整数';
                }
            });
            
            form.on('submit(submit)', data => {
                if (flag_guangDong) {
                    if (!data.field.subTwo || data.field.subTwo.length == 0) {
                        layer.msg('请选择二级学科', { icon: 7, time: 1500 });
                        return false;
                    }
                    if (!data.field.subThree || data.field.subThree.length == 0) {
                        layer.msg('请选择三级学科', { icon: 7, time: 1500 });
                        return false;
                    }
                }
                if (flag_guangxi) {
                    if (!data.field.subTwo || data.field.subTwo.length == 0) {
                        layer.msg('请选择二级学科', { icon: 7, time: 1500 });
                        return false;
                    }
                    if (!data.field.subThree || data.field.subThree.length == 0) {
                        layer.msg('请选择三级学科', { icon: 7, time: 1500 });
                        return false;
                    }
                    if (teamId && Number(data.field.maxProjNum || 0) < Number(data.field.projectCount || 0)) {
                        layer.msg('最大项目数不能小于已分配项目数', { icon: 7, time: 1500 });
                        return false;
                    }
                }
                data.field.reserved2 = dictTool.getStandardKindId();
                !teamId && (data.field.reserved3 = dictTool.getUnitId());
                let url = huayi_personorg_url + (!teamId ? 'projectTeam/save' : 'projectTeam/update');
                $.ajax({
                    type        : 'post',
                    url         : url,
                    data        : JSON.stringify(data.field),
                    contentType : 'application/json;charset=UTF-8',
                    async       : false,
                    dataType    : 'json',
                    success     : res => {
                        if (res.status == 200 && res.success == true) {
                            if (parent.window != window) {
                                parent.tableOp.init();
                                parent.layui.layer.closeAll();
                                parent.layui.layer.msg('操作成功', { icon: 1, time: 1500 });
                            }
                            layer.msg('操作成功', { icon: 1, time: 1500 });
                        } else layer.msg(res.msg, { icon: 7, time: 1500 });
                    },
                    error       : () => layer.msg('操作失败', { icon: 7, time: 1500 })
                });
                return false;
            });

        });
    </script>
</body>
</html>
