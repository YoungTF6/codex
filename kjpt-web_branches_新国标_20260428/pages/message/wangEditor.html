<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>富文本测试</title>

    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>

    <!--样式引用-->
    <!-- <link rel="stylesheet" href="__ADMINSTYLE__/wangEditor/css/wangEditor.min.css"> -->
    <!-- <script type="text/javascript" src="__ADMINSTYLE__/wangEditor/js/wangEditor.min.js"></script> -->

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/wangeditor@latest/dist/wangEditor.min.js"></script>

    <!-- xss -->
    <!-- <script src="https://rawgit.com/leizongmin/js-xss/master/dist/xss.js"></script> -->

</head>

<body>

    <!-- <div id="div1" class="div1" style="width: 80%;">
        <p>欢迎使用 <b>wangEditor</b> 富文本编辑器</p>
    </div> -->
    <!--html设置容器-->
    <div class="layui-form-item">
        <label for="phone" class="layui-form-label">文章内容</label>
        <div id="div1" class="div1" class="layui-input-inline">
            <!-- <textarea id="content" name="content" style="height:300px;width: 100%;"></textarea> -->
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-input-block">
            <input id="content2" name="content2" type="text" name="title" lay-verify="title" autocomplete="off"
                placeholder="请输入标题" class="layui-input">
        </div>
        <textarea id="content" name="content" style="height:200px;width: 100%;"></textarea>
        <button type="button" class="layui-btn" id="selectByClick">一个标准的按钮</button>
    </div>

    <div id="insertDiv">
    </div>
    <p id="insertP"></p>

    <script>alert('xss测试')</script>

</body>


<script type="text/javascript">
    layui.use(['form'], function () {
        form = layui.form,

            $ = layui.jquery;

        const E = window.wangEditor;
        const editor = new E('#div1');
        editor.config.height = 300;
        editor.config.uploadImgShowBase64 = true;
        editor.config.showLinkImg = false;
        editor.config.uploadFileName = 'file';  //对应后台上传图片接口参数的名字
        editor.config.uploadImgServer = 'http://localhost:8082/upload/editor'; //后台图片上传地址
        //    editor.config.uploadImgMaxSize = 3 * 1024 * 1024 // 将图片大小限制为 3M
        //    editor.config.uploadImgMaxLength = 1//限制一次最多上传 5 张图片

        editor.create()


        form.on('submit(submit)', function (data) {
            var tex = editor.txt.html();;
            console.log(tex);

            $.ajax({
                type: 'post',
                url: 'http://localhost:8082/upload/add',
                data: JSON.stringify(tex),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    layer.msg("发送成功");
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
        });

        $("#selectByClick").click(function () {
            $.ajax({
                type: 'get',
                url: 'http://localhost:8082/upload/select',
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    console.log(res.data);
                    $("#content").val(res.data);
                    $("#content2").val(res.data);
                    $('#insertDiv').append(res.data);
                    $('#insertP').append(res.data);
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
        });


    });

        // var editor = new E('#editor')

        // editor.customConfig.uploadImgServer = 'http://localhost:8082/upload/editor'

</script>

</html>
