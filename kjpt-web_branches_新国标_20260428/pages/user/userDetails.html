<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>用户编辑</title>
  <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
  <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
  <script type="text/javascript" src="https://v8.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
</head>

<body>
  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-card-body" style="padding: 15px;">
        <form class="layui-form" style="padding: 30px;" lay-filter='user-form-alert-edit' id='user-form-alert-edit'>
          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label"><font color="red">*&nbsp;</font>用户类型</label>
              <div class="layui-input-inline">
                <input type="text" name="userTypeStr" disabled="" style="background-color:#efefef;color:#666666" lay-verify="notBlank" placeholder="请输入用户名"
                  autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">关联套</label>
              <div id="userStandardSelect" class="layui-input-inline" data-name="userCmeStandards"></div>
            </div>
            <!--            <div class="layui-inline">
              <label class="layui-form-label">单位</label>
              <div id="user-form-select-unit" class="layui-input-inline" ></div>
            </div>-->
          </div>
          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label"><font color="red">*&nbsp;</font>用户名</label>
              <div class="layui-input-inline">
                <input type="text" name="userName" disabled="" style="background-color:#efefef;color:#666666" lay-verify="notBlank" placeholder="请输入用户名"
                  autocomplete="off" class="layui-input">
              </div>
            </div>
            <div class="layui-inline">
              <label class="layui-form-label">用户角色</label>
              <div id="userRoleSelect" class="layui-input-inline" data-name="userRole"></div>
            </div>
          </div>

          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label"><font color="red">*&nbsp;</font>状态</label>
              <div class="layui-input-block">
                <select name="cstate" lay-verify="notBlank">
                  <option value="1">正常</option>
                  <option value="4">已删除</option>
                </select>
              </div>
            </div>
          </div>
          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label">证件号</label>
              <div class="layui-input-block">
                <input type="text" name="certId" placeholder="请输入证件号" autocomplete="off" class="layui-input">
              </div>
            </div>
          </div>
          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label">手机号</label>
              <div class="layui-input-block">
                <input type="text" name="mobile" id="mobile" placeholder="请输入手机号" autocomplete="off" class="layui-input">
              </div>
            </div>
          </div>
          <div class="layui-form-item">
            <div class="layui-inline">
              <label class="layui-form-label">邮箱</label>
              <div class="layui-input-block">
                <input type="text" name="email" placeholder="请输入邮箱" autocomplete="off" class="layui-input">
              </div>
            </div>
          </div>

          <div class="layui-form-item">
            <div class="layui-inline">
              <div class="layui-input-block">
                <button type="submit" id="user-form-edit-submit" class="layui-btn" lay-filter='user-form-edit-submit' lay-submit>提交</button>
                <button onclick="return goToBack()" class="layui-btn">返回</button>
              </div>
            </div>
          </div>
          <div class="layui-form-item" style=" display:none">
            <div class="layui-inline">
              <div class="layui-input-block">
                <input type="text" name="userId" placeholder="用户id" />
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>

<script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
<script src="../../js/common.js"></script>
<script src="../../js/constant.js"></script>
<script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
<script>

  var format_url = /\\|\/$/gi;
  var domain = huayi_permission_url.replace(format_url, "");
  var sjwhUrl = huayi_sjwh_url.replace(format_url, "");

  var userEditUrl = domain + '/comuser/edit'
  var userDetailUrl = domain + '/comuser/detail';
  var roleListUrl = domain + '/comrole/list';

  var standardKindListUrl = sjwhUrl + "/cmestandardkind/list/all";

  var unitTop10Url = sjwhUrl + "/comunit/search/top10";

  var unitChildrenUrl = sjwhUrl + "/comunit/children";
  var unitParentUrl = sjwhUrl + "/comunit/parent";

  window.goToBack = function () {
    window.history.back();
    return false;
  };

  var formSnapShot = null;

  //防止表单重复提交
  var noRepeatLock = true;
  var noRepeat = function (fun) {
    if (noRepeatLock) {
      noRepeatLock = false;
      try {
        fun();
      } catch (e) {
        console.log(e);
      }
      setTimeout(function () {
        noRepeatLock = true;
      }, 3000);
    }
  };

  var formValue = function (formId) {
    var formObj = {};
    var dataArr = $(formId).serializeArray();
    if (dataArr == null || dataArr.length == 0) {
      return formObj;
    }
    for (var i = 0; i < dataArr.length; i++) {
      formObj[dataArr[i].name] = dataArr[i].value;
    }
    return formObj;
  }

  layui.config({
    base: '../../js/layui/ext/'
  }).extend({
    xmSelect: 'xm-select'
  }).use(['xmSelect', 'form', 'authtree', 'layer'], function () {
    var xmSelect = null;
    var xmSelectStandard = null;
    var form = layui.form;
    var authtree = layui.authtree;

    // ===============  获取角色数据,初始化角色下拉多选框  ============
    $.ajax({
      url: roleListUrl,
      type: 'get',
      //同步，避免用户绑定角色信息返显失败
      async: false,
      dataType: 'json',
      contentType: 'application/json;charset=UTF-8',
      success: function (res) {
        if (res.status == 200) {

          //加载角色框
          xmSelect = layui.xmSelect.render({
            el: '#userRoleSelect',
            autoRow: true,
            name: 'userRoles',
            // layVerify: 'required',
            data: res.data,
            model: {
              label: {
                type: 'showTemplate', //自定义与下面的对应
                showTemplate: {
                  template(data, sels) {
                    return "已选中 " + sels.length + " 项, 共 " + data.length + " 项"
                  }
                },
              }
            },
          });
        } else {
          layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
            time: 1000, //1s后自动关闭
            end: function (o) {
              layui.layer.closeAll();
            }
          });
        }
      },
      error: function (req, msg) {
        layui.layer.msg('系统繁忙，请稍后重试', {
          time: 1000, //1s后自动关闭
          end: function (o) {
            layui.layer.closeAll();
          }
        });
      }
    });

    // ===============  如果技术支持用户时获取套数据,初始化套下拉多选框  ============
    if (getUrlParam("userType") == 3) {
      $.ajax({
        url: standardKindListUrl,
        type: 'get',
        //同步，避免用户绑定套信息返显失败
        async: false,
        dataType: 'json',
        contentType: 'application/json;charset=UTF-8',
        success: function (res) {
          if (res.status == 200) {

            //加载套选择框
            xmSelectStandard = layui.xmSelect.render({
              el: '#userStandardSelect',
              autoRow: true,
              filterable: true,
              name: 'userCmeStandards',
              // disabled:true,
              data: function () {
                var standards = new Array();
                if (res.data != null && res.data.length > 0) {
                  for (var i = 0; i < res.data.length; i++) {
                    standards.push({ "name": res.data[i].description, "value": res.data[i].cmeStandardKindId });
                  }
                }
                return standards;
              },
              model: {
                label: {
                  type: 'showTemplate', //自定义与下面的对应
                  showTemplate: {
                    template(data, sels) {
                      return "已选中 " + sels.length + " 项, 共 " + data.length + " 项"
                    }
                  },
                }
              },
            });
          } else {
            layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
              time: 1000, //1s后自动关闭
              end: function (o) {
                layui.layer.closeAll();
              }
            });
          }
        },
        error: function (req, msg) {
          layui.layer.msg('系统繁忙，请稍后重试', {
            time: 1000, //1s后自动关闭
            end: function (o) {
              layui.layer.closeAll();
            }
          });
        }
      });
    } else {
      xmSelectStandard = layui.xmSelect.render({
        el: '#userStandardSelect',
        name: 'userCmeStandards',
        disabled: true
      });
    }



    // // ===============   初始化菜单树   ====================
    // $.ajax({
    //   url: 'tree.json',
    //   dataType: 'json',
    //   success: function(data){
    //     var trees = data.data.trees;
    //     // 如果后台返回的不是树结构，请使用 authtree.listConvert 转换
    //     authtree.render('#menu-white-tree', trees, {
    //       inputname: 'authids[]',
    //       layfilter: 'lay-check-auth',
    //       autowidth: true,
    //       checkType:'checkbox'
    //     });
    //   }
    // });

    // ===============  获取用户详情，回显数据 ==================
    var userId = getUrlParam('userId');
    //记录初始手机号，如果初始手机号有修改，需要验证 修改后的手机号 在数据库中是否存在；如果没有修改，则不需要验证
    var preMobile = "";
    $.ajax({
      url: userDetailUrl + '?userId=' + userId,
      type: 'get',
      dataType: 'json',
      contentType: 'application/json;charset=UTF-8',
      success: function (res) {
        if (res.status == 200) {
          form.val('user-form-alert-edit', res.data.base);
          //todo 过滤不必要的请求
          xmSelect.setValue(res.data.roles);
          xmSelectStandard.setValue(res.data.cmeStandardKinds);
          var formVal = formValue('#user-form-alert-edit');
          if (res.data.base.userType != 14) {
            $("#mobile").attr("disabled", "disabled").addClass("layui-disabled");
          }
          preMobile = res.data.base.mobile;
          // layui.xmSelect.render({
          //   el: '#user-form-select-unit',
          //   name:"unitId",
          //   //单选模式
          //   radio: true,
          //   clickClose: true,
          //   tree: {
          //     show: true,
          //     radio: true,
          //     strict: false,
          //     showFolderIcon: true,
          //     showLine: true,
          //     // indent: 20,
          //     expandedKeys: true,
          //     lazy: true,
          //     load: function(item, cb){
          //       $.ajax({
          //         url: unitChildrenUrl+"?parentUnitId="+item.value,
          //         success: function(data){
          //           cb(data.data);
          //         }
          //       })
          //     }
          //   },
          //   data(){
          //     var dataList = [];
          //     $.ajax({
          //       async:false,
          //       url: unitParentUrl+"?unitId="+res.data.base.unitId,
          //       success: function(data){
          //         dataList = data.data;
          //       }
          //     })
          //     return dataList;
          //   }
          // });
          // 服务器搜索回显下拉框
          // layui.xmSelect.render({
          //   el: '#user-form-select-unit',
          //   name:"unitId",
          //   radio: true,
          //   filterable: true,
          //   remoteSearch: true,
          //   tips:"请选择单位",
          //   searchTips:'请输入单位名称或编号',
          //   remoteMethod: function(val, reload, show){
          //     if(!val ){
          //       return reload(!res.data.base.unitId? []:[{
          //         name:res.data.base.unitName,
          //         value:res.data.base.unitId,
          //         selected:true
          //       }]);
          //     }
          //     $.ajax({
          //       url:unitTop10Url+"?unitName="+val,
          //       type:'get',
          //       success:function (res) {
          //         if(res.status == 200){
          //           reload(res.data);
          //         }
          //       },
          //       error:reload([])
          //     })
          //   }
          // });

          // formVal['userRoles'] = 'bdedea34-b0b1-a11b-16f2-b591645cda50';
          formSnapShot = JSON.stringify(formVal);
        } else {
          layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
            time: 1000, //1s后自动关闭
            end: function (o) {
              layui.layer.closeAll();
            }
          });
        }
      },
      error: function (req, msg) {
        layui.layer.msg('系统繁忙，请稍后重试', {
          time: 1000, //1s后自动关闭
          end: function (o) {
            layui.layer.closeAll();
          }
        });
      }
    });

    // 判断手机号是否已经存在
    window.checkMobileExists = function (mobile) {
      var check = false;
      $.ajax({
        async: false,
        type: "get",
        url: huayi_permission_url + "comuser/doesMobileExists",
        data: { "mobile": mobile },
        success: function (result) {
          if (result.success == true) {
            check = result.data > 0 ? true : false;
          }
        },
        error: function () {
          layer.msg("请求报错");
        }
      });
      return check;
    }

    /**判断是否是手机号**/
    window.isPhoneNumber = function (tel) {
      var reg = /^0?1[3|4|5|6|7|8][0-9]\d{8}$/;
      return reg.test(tel);
    }

    //监听form修改
    form.on('submit(user-form-edit-submit)', function (data) {
      if (data.field.userTypeStr == "个人用户") {
         if(!isPhoneNumber(data.field.mobile)){
             layer.msg("请输入正确的手机号");
             return false;
         }
      }
      if (data.field.userTypeStr == "个人用户"
        && (preMobile != data.field.mobile)
        && checkMobileExists(data.field.mobile)
      ) {
        layer.msg("该手机号已经存在于该平台内，请更换");
        return false;
      }

      noRepeat(function () {

        var formParam = data.field;

        if (formSnapShot == JSON.stringify(formParam)) {
          layui.layer.msg('没有需要更新的内容！', {
            time: 1000, //1s后自动关闭
            end: function (o) {
              layui.layer.closeAll();
            }
          });
        } else {
          $.ajax({
            url: userEditUrl,
            type: 'post',
            dataType: 'json',
            contentType: 'application/json;charset=UTF-8',
            data: JSON.stringify(formParam),
            success: function (res) {
              if (res.status == 200) {
                layui.layer.msg('操作成功！', {
                  time: 1000, //1s后自动关闭
                  end: function (o) {
                    goToBack();
                  }
                });
              } else {
                layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
                  time: 1000, //1s后自动关闭
                  end: function (o) {
                    layui.layer.closeAll();
                  }
                });
              }
            },
            error: function (xhr, status, error) {
              let msg = '系统繁忙，请稍后重试'
              if (xhr.status == '400') {
                msg = '请求参数包含特殊字符';
              }
              layui.layer.msg(msg || '系统繁忙，请稍后重试', {
                time: 1000, //1s后自动关闭
                end: function (o) {
                  layui.layer.closeAll();
                }
              });
            }
          });
        }
        formSnapShot = null;
      });
      return false;
    });
  });

</script>

</html>
