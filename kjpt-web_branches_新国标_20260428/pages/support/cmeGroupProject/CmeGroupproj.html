                        <div class="layui-inline zhejiang_show" style="display:none;">
                            <label class="layui-form-label">活动内容</label>
                            <div class="layui-input-block">
                                <select name="scoreType" id="scoreType_id">
                                    <option value="">全部</option>
                                    <option value="1">专业课</option>
                                    <option value="2">选修课</option>
                                    <option value="3">公需课</option>

                            </div>
                        </div>
                        <div class="layui-inline">
                            <!-- <label class="layui-form-label" style="color:red">内部培训由科室账号发起、举办及授分，单位账号负责审核</label> -->

                    </div>
                    <div class="layui_display">

                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">

                        </div>
                    </div>
                </div>
            </div>
            <!--        表格区域-->
            <div class="layui-card-body" style="padding:7px 5px">

        <div id="getMobileCode" style="display:none;">

<script>
    var projectStatus = 0;
    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    }).use(['table', 'form', 'element', 'laydate', 'tool', 'treeSelect'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        let tool = layui.tool;
        var treeSelect = layui.treeSelect;
        var element = layui.element, laydate = layui.laydate;
        const _standardKindId = localStorage.getItem('standardkind-id');
        const _unitId = localStorage.getItem('unit-id');
        const _isHainan = '6eec6713-670a-43cc-ad4d-9bd700a92928' === _standardKindId; // 海南
        const _isShanxiJin = 'db0d980b-03d4-4c9c-b2d4-9f890109ed47' === _standardKindId; // 山西
        const _isGuangxi = '4a6d91fb-8ba4-4560-a801-9c6f00e6d999' === _standardKindId;//广西
        const _isNingxia = 'eee87ca0-7df1-426c-aae3-7cae782b4d6b' === _standardKindId;//宁夏
        const _isZheJiang = '190c480d-d43c-450b-8472-a6fd00a6729d' === _standardKindId;//浙江
        

        let standardkindIds = localStorage.getItem("standardkind-id");
        let standardKindIdObj = {}
        var thisProjId = '';
        
        let gLayerIndex = -1;
        let gOpenedProjId = '';
        let gOpenedProjPeriod = 0;
        let gCmeYear = (new Date()).getFullYear();

               //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    if (res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }
        
        // 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            if($('#standardKindSearch').val() == ''){
                layer.msg('请选择套标准', {icon: 5});
                return false;
            }
            // 获取standardKindSearch的topunitid
            let topUnitId = $('#standardKindSearch').find('option:selected').attr('top-unit-id');
            let searchUnitId = $('#unitId').val();
            if(searchUnitId == ''){
                searchUnitId = topUnitId;
            }

            table.render({
                elem: '#cmeGroupproj',
                url: huayi_projectscore_url + 'cmeGroupProj/getList',
                title: '项目表',
                defaultToolbar: [],
                where: {
                    projectStatus: projectStatus,
                    cmeYear: $('#cmeYear_id').val(),
                    scoreLevel: $('#scoreLevel_id').val(),
                    holdType: $('#holdType_id').val(),
                    knowledgeId: $('#knowledgeId_id').val(),
                    groupProjectName: $('#groupProjectName_id').val(),
                    startDate: $('#startDate_id').val(),
                    selUnitId: searchUnitId,
                    withCheckInfo: true,
                    deptId: $('#hidden_dept_id').val(),
                    byUnit:$("#byUnit").val(),
                    cmeStandardKindId: $('#standardKindSearch').val(),
                    holdState: 'ALL',
                    unitUserType: 5,
                    fbStatus: $('select[name=fbStatus]').val(),
                    // 活动内容（仅浙江套使用，按当前下拉选中的套判断）
                    scoreType: ($('#standardKindSearch').val() === '190c480d-d43c-450b-8472-a6fd00a6729d')
                        ? ($('#scoreType_id').val() || '') : ''
                },
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                cols: [[
                    // 项目级别、是否已举办、添加账号、修改时间、代办科室。
                    { align: 'center', width: 125, toolbar: '#rowBar', title: '操作' },
                    {
                        field: 'userCreate', hide: (window["fun_dept_agent_groupproj"] == 1), title: '添加用户', align: 'center', minWidth: 200, templet: function (d) {
                            if (d.deptName != "" && d.deptName != null) return d.deptName;
                            return d.unitName;
                        }
                    },
                    { field: 'deptName', title: '代办科室', align: 'center' },
                    { align: 'center', width: 65, title: '序号', templet: '#rank' },
                    { field: 'groupProjectId', width: 100, align: 'center', title: '主键id', hide: true },
                    { field: 'groupProjectName', align: 'center', minWidth: 250, title: '活动名称' },
                    { field: 'otherNo', align: 'center', title: '编号', hide: !_isShanxiJin },
                    { title: '维护举办周期', align: 'center', toolbar: '#rowBar1' },
                    { title: '举办前申请', align: 'center', toolbar: '#projApplyRowBar' },
                    { title: '维护试卷', align: 'center', toolbar: '#rowBar2' },
                    { title: '扫码考勤', align: 'center', toolbar: '#rowBar3' },
                    { title: '授分', align: 'center', toolbar: '#rowBar4' },
                    { title: '执行情况反馈', align: 'center', templet: '#groupFbCell' },
                    { title: '项目评价表', align: 'center', toolbar: '#rowBar5' },
                    {
                        title: '代办科室分配', align: 'center',
                        hide: !(window["fun_dept_agent_groupproj"] == 1),
                        minWidth: 120,
                        templet: function (data) {
                            let groupProjectId = data.groupProjectId;
                            let deptId = data.deptId;
                            let html = '';
                            if (deptId == null || deptId == undefined || deptId == "") {
                                html = '<a class="layui-btn layui-btn-xs" lay-event="chooseDept" style="color: #5FB878;background-color: transparent;">选择科室</a>'
                            } else {
                                html = '<a class="layui-btn layui-btn-xs" lay-event="cancelDept" style="color: #5FB878;background-color: transparent;">取消分配</a>'
                            }
                            return html;
                        }
                    },
                    { field: 'unitName', title: '所在单位名称', align: 'center', },
                    { field: 'unitId', title: '所在单位账号', align: 'center', },
                    { field: 'scoreLevelName', title: '学分级别', align: 'center', },
                    // 活动内容（仅浙江显示）
                    { field: 'scoreType', title: '活动内容', align: 'center', minWidth: 120, 
                        templet: function(d){
                            switch (Number(d.scoreType)) {
                                case 1: return '专业课';
                                case 2: return '选修课';
                                case 3: return '公需课';
                                default: return '';
                            }
                        }
                    },
                    { field: 'knowledgeName', title: '学科', align: 'center', },
                    { field: 'score', title: '总学分', align: 'center', },
                    { field: 'period', title: '总学时', align: 'center', },
                    {
                        field: 'holdStatus', title: '是否已举办', align: 'center', templet: function (d) {
                            if (d.holdStatus === 0) {
                                return '未举办'
                            } else if (d.holdStatus === 1) {
                                return '部分举办'
                            } else if (d.holdStatus === 2) {
                                return '已举办'
                            } else {
                                return '未举办'
                            }
                        }
                    },
                    { field: 'addTime', title: '添加时间', align: 'center', width: 200 },
                    { field: 'updateTime', title: '修改时间', align: 'center', width: 200 }
                ]],
                // toolbar: '#bar',
                cellMinWidth: 150,
                id: "cmeGroupproj",
                height: 'full-140',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done: function (res, curr, count) {
                }
            });
        };

        // 监听头部新增按钮
        table.on('toolbar(cmeGroupproj)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'add') {
                showGroupProjModal(ModalActionEnum.CREATE, null);
            }
        });

        // 监听行内按钮
        table.on('tool(cmeGroupproj)', function (obj) {
            var datas = obj.data;
            console.log(datas);
            localStorage.setItem('unit-id', datas.unitId)

            if (obj.event === 'edit') {
                // 修改
                showGroupProjModal(ModalActionEnum.EDIT, obj.data);
            } else if (obj.event === 'del') {
                layer.confirm('确定删除该项目吗?', { icon: 3, title: '提示' }, function (index) {
                    // 获取登录用户手机号
                    $.ajax({
                        async: false,
                        type: "get",
                        url: huayi_permission_url + "comuser/detail",
                        data: { userId: localStorage.getItem("user-id") },
                        success: function (res) {
                            debugger
                            if (res.success == true) {
                                userMobile = res.data.base.mobile;
                            } else {
                                layer.msg("获取配置出错");
                            }
                        },
                        error: function () {
                            layer.msg("获取配置出错");
                        }
                    });
                    
                    thisProjId = obj.data.groupProjectId;
                
                    var formGetMobileCode = $("#form-getMobileCode")[0];
                    formGetMobileCode.reset();
                    formGetMobileCode[0].value = userMobile;
                    form.render();
                    layer.open({
                        type: 1,
                        title: '手机验证码',
                        content: $('#getMobileCode'),
                        area: ['500px', '250px']
                    });
                    
                   
                    layer.close(index);
                });
            } else if (obj.event === 'maintenanceCycle') {
                // 维护举办周期
                showCycleModal(datas.groupProjectId, datas.period,datas.cmeYear);
            } else if (obj.event === 'maintainTestPaper') {
                // 维护试卷
                layer.open({
                    // closeBtn: false,
                    title: '试卷维护',
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: false,
                    content: '/pages/project/CmeExamQuestion.html?projectId=' + obj.data.groupProjectId + '&paperName=' + obj.data.groupProjectName + '&projectType=2',
                    scrollbar: false
                });
            } else if (obj.event === 'sweepCodeAttendance') {
                let userId = localStorage.getItem("user-id");
                let attendanceUrl = '/pages/project/attendanceForTeach/AttendanceGroupChoose.html?projectId=' + obj.data.groupProjectId + '&projectType=2' + "&scoreLevel="+obj.data.scoreLevel;
                // 扫码考勤
                layer.open({
                    closeBtn: false,
                    title: false,
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: false,
                    content: attendanceUrl,
                    scrollbar: false
                });
            } else if (obj.event === 'grantPoints') {
                // 授分
                layer.open({
                    title: '授分',
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: true,
                    content: '/pages/project/givingForGroup/givingForGroupProject.html?projectId=' + obj.data.groupProjectId + '&projectType=2',
                    scrollbar: false
                });
            } else if (obj.event === 'projectEvaluation') {
                // 项目评价
                layer.open({
                    title: '项目评价',
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: true,
                    content: '/pages/project/CmeProjEvaluation.html?projectId=' + obj.data.groupProjectId + '&projectType=2',
                    scrollbar: false
                });
            } else if (obj.event === 'chooseDept') {
                // 维护代办科室
                //如果已经有了考勤,不允许分配科室
                layer.open({
                    title: '分配代办科室',
                    type: 2,
                    area: ['70%', '95%'],
                    maxmin: true,
                    content: '/pages/dept/deptsMessage.html?projId=' + obj.data.groupProjectId + '&deptName=' + obj.data.deptName,
                    scrollbar: false
                });
            } else if (obj.event === 'cancelDept') {
                layer.confirm('确实要取消把该院内活动分配给' + obj.data.deptName + '吗？', { icon: 3, title: '提示' }, function (index) {
                    cancelDistributeAgentDept(obj.data.deptName, obj.data.groupProjectId);
                    layer.close(index);
                });
            } else if (obj.event === 'editFeedback') {
                let gProjId = obj.data.groupProjectId;
                let content = `/pages/support/cmeGroupProject/CmeGroupProjFeedback.html?projectId=${gProjId}&cmeYear=${obj.data.cmeYear}&unitId=${obj.data.unitId}`;
                // let content = '/pages/support/cmeGroupProject/GroupFeedback.html?a=a&g_proj_id=' + gProjId;
                layer.open({
                    type: 2,
                    shade: 0.6,
                    shadeClose: true,
                    title: '执行情况反馈',
                    content: content,
                    area: ['100%', '100%']
                });
            } else if (obj.event === 'projApply') {
                // 举办前申请
                layer.open({
                    title: '举办前申请',
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: false,                   
                    content: 'GroupProjApplyBeforeHold.html?projectId=' + obj.data.groupProjectId + '&scoreLevel=' +  obj.data.scoreLevel + '&cmeYear=' +  obj.data.cmeYear ,
                    scrollbar: false
                });
            } 
        });

        var dateForYear = new Date().getFullYear();
         //获取举办年度
         let cmeYearInit = function() {
            var currentYear = (new Date()).getFullYear();
            for (var i = currentYear; i >= currentYear - 8; i--) {
                let option = "";
                if (i == currentYear) {
                    option = "<option value='" + i + "' selected>" + i + "</option>";
                } else {
                    option = "<option value='" + i + "'>" + i + "</option>";
