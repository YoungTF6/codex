<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>院内活动</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">

    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/common.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script><script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <script type="text/javascript" src="/js/api/number.js"></script>

    <style>
        .layui-form-select dl {
            max-height: 200px;
        }
    </style>

</head>

<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card" style="padding:20px; margin-top: -16px;">
        <blockquote class="layui-elem-quote layui-quote-nm only_hunan hide" style="color: #f56c6c;">单位组织的学术活动”每人每年有效学分最多10分，超过10分按照10分计入达标。</blockquote>
        <form class="layui-form" id="groupProjForm" lay-filter="groupProjForm">
            <!-- row1 -->
            <input type="hidden" name="groupProjId">
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>活动名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjName" lay-verify="required|groupProjName" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>学分级别</label>
                    <div class="layui-input-block">
                        <select name="scoreLevel" id="scoreLevel" lay-filter="scoreLevel"
                                lay-verify="required">
                            <option value=""></option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- row3 -->
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>举办方式</label>
                    <div class="layui-input-block">
                        <select name="holdType" id="holdTypeSelector" lay-verify="required" lay-search="true">
                            <option value=""></option>
                        </select>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>二级学科</label>
                    <div class="layui-input-block">
                        <select name="twoKnowledgeId" lay-filter="knowledgeTwo" id="knowledgeTwo"
                                lay-verify="required" lay-search="true">
                            <option value=""></option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- row4 -->
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>三级学科</label>
                    <div class="layui-input-block">
                        <select name="knowledgeId" lay-filter="knowledgeThree" id="knowledgeThree"
                                lay-search="" lay-verify="required|knowledgeId">
                            <option value="">请先选择二级学科</option>
                        </select>
                    </div>
                </div>
                <!-- <div class="layui-col-sm6">
                    <label class="layui-form-label">考核方式</label>
                    <div class="layui-input-block">
                        <select name="checkType" id="checkTypeSelector" lay-search="true">
                            <option value=""></option>
                        </select>
                    </div>
                </div> -->
            </div>

            <!-- row2 -->
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>学分</label>
                    <div class="layui-input-block">
                        <input type="number" name="score" id="score" min="0" lay-verify="required" autocomplete="off"
                               class="layui-input number_ph">
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>学时</label>
                    <div class="layui-input-block">
                        <input type="number" name="period" min="0" lay-verify="required" autocomplete="off"
                               class="layui-input number_ph">
                    </div>
                </div>
            </div>
       
            <!-- row7 -->
            <div class="layui-form-item">
                <div class="layui-col-sm12">
                    <div style="text-align: center;">
                        <button class="layui-btn" type="submit" lay-submit lay-filter="saveBack">保存</button>
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    }).use(['table', 'form', 'element', 'laydate', 'tool', 'treeSelect'], function () {
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        let tool = layui.tool;
        var treeSelect = layui.treeSelect;

        let cmeStandardKindId = getUrlParam('cmeStandardKindId');
        let cmeYear = getUrlParam('cmeYear');
        let projId = getUrlParam('projId');

        
        
           // 提交项目信息
        form.on('submit(saveBack)', function (data) {
            console.log(data.field);
            var confirmMsg = '';
            layer.confirm(confirmMsg + '确定修改项目信息吗?', { icon: 3, title: '提示' }, function (index) {
                $.ajax({
                    type: 'post',
                    url: huayi_projectscore_url + 'pgsi/gproj/update',
                    data: JSON.stringify(data.field),
                    dataType: 'json',
                    contentType: 'application/json;charset=UTF-8',
                    success: function (res) {
                        if (res.status === 200) {
                            parent.layer.closeAll();
                            parent.layer.msg('修改项目信息成功');
                        } else if (res.status === 500) {
                            layer.msg(res.msg);
                        }
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
            });

            return false;
        });


         

        let htmlInit = function () {
            //项目级别初始化
            $.ajax({
                async: false,
                url: huayi_sjwh_url + "cmecomscorelevel/taoIdAndYear",
                data: {
                    cmeStandardKindId: cmeStandardKindId,
                    cmeYear: cmeYear
                },
                success: function (re) {
                    if (re.success == true) {
                        var data = re.data;
                        $('#scoreLevel').html("<option></option>");
                        for (var i = 0; i < data.length; i++) {
                            var scoreLevel = data[i].scoreLevelId;
                            var scoreLevelName = data[i].scoreLevelName;
                            var option = $("<option value='" + scoreLevel + "'>" + scoreLevelName + "</option>");
                            $("#scoreLevel").append(option);
                            form.render('select');
                        }
                    } else {
                        layer.msg("查询学分级别报错");
                    }
                }
            });
        
              //获取举办方式
              $.ajax({
                async: false,
                url: huayi_sjwh_url + "cmeHoldType/listByStandardKindId",
                data: {
                    "standardKindId":cmeStandardKindId, "viewMode": '_1_'
                },
                success: function (re) {
                    if (re.success == true) {
                        var data = re.data;
                        $('#holdTypeSelector').html("<option></option>");
                        for (var i = 0; i < data.length; i++) {
                            var holdType = data[i].holdTypeId;
                            var holdTypeName = data[i].holdTypeName;
                            var option = $("<option value='" + holdType + "'>" + holdTypeName + "</option>");
                            $("#holdTypeSelector").append(option);
                        }
                        form.render('select');
                    } else {
                        layer.msg("查询举办方式报错");
                    }
                }
            });

            //二级学科
            $.ajax({
                async: false,
                url: huayi_sjwh_url + "comKnowledge",
                data: {
                    knowledgeType: 2,
                    cmeStandardKindId: cmeStandardKindId,
                    versionYear: cmeYear
                },
                success: function (re) {
                    if (re.success == true) {
                        var data = re.data;
                        $("#knowledgeTwo").find("option:gt(0)").remove();
                        for (var i = 0; i < data.length; i++) {
                            var knowledgeId = data[i].knowledgeId;
                            var knowledgeName = data[i].knowledgeName;
                            var option = $("<option value='" + knowledgeId + "'>" + knowledgeName + "</option>");
                            $("#knowledgeTwo").append(option);
                            form.render('select');
                        }
                    } else {
                        layer.msg("查询二级学科报错");
                    }
                }
            });

            //三级学科
            form.on('select(knowledgeTwo)', function (data) {
                var knowledgeTwoId = data.value;
                if (knowledgeTwoId) {
                    $.ajax({
                        async: false,
                        url: huayi_sjwh_url + "comKnowledge",
                        data: {
                            knowledgeType: 3,
                            knowledgeTwoId: knowledgeTwoId,
                            cmeStandardKindId: cmeStandardKindId,
                            versionYear: cmeYear
                        },
                        success: function (re) {
                            if (re.success == true) {
                                var data = re.data;
                                $("#knowledgeThree").find("option:gt(0)").remove();
                                for (var i = 0; i < data.length; i++) {
                                    var knowledgeId = data[i].knowledgeId;
                                    var knowledgeName = data[i].knowledgeName;
                                    var option = $("<option value='" + knowledgeId + "'>" + knowledgeName + "</option>");
                                    $("#knowledgeThree").append(option);
                                    form.render("select");
                                }
                            } else {
                                layer.msg("查询三级学科报错");
                            }
                        }
                    });
                }
                else {
                    $("#knowledgeThree").find("option").remove();
                    var option = $("<option value=''>全部</option>");
                    $("#knowledgeThree").append(option);
                    form.render("select");
                }
            });
            // tool.renderCheckType('#checkTypeSelector');
        }

            // 初始化表单
        function initData() {
            $.ajax({
                async: true,
                url: huayi_projectscore_url + "pgsi/gproj/get/" + projId,
                success: function (re) {
                    if (re.success == true) {
                        const knowledgeTwoSelector = document.getElementById('knowledgeTwo');
                        knowledgeTwoSelector.value = re.data.twoKnowledgeId; // 设置选中值
                        layui.event.call(this,'form','select(knowledgeTwo)', knowledgeTwoSelector);
                        form.val('groupProjForm', re.data);
                        form.render();
                    
                    } else {
                        layer.msg("查询项目信息报错");
                    }
                }
            });
        }

        htmlInit();
        initData();
        
    });
    
</script>
