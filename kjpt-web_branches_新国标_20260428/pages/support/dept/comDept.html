    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/communal.css">
    <link rel="stylesheet" href="/css/icon.css">

    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script src='/js/jquery-3.5.1.min.js'></script>

<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <!-- 搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <!-- <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form"> -->
                    <div class="layui-inline">
                        <label class="layui-form-label">请选择地区</label>
                        <div class="layui-input-block">
                            <select name="standardKindId" id="standardKindSearch" lay-filter="standard-kind-search">
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">查询项</label>
                        <div class="layui-input-block">
                            <span style="width:130px;display:inline-block;">
                                <select id="keywordColumn">
                                    <option value="cd.unit_id">单位编号</option>
                                    <option value="cu2.unit_name">单位名称</option>
                                    <option value="cd.dept_id">科室编号</option>
                                    <!-- <option value="cd.dept_name">科室名称</option> -->
                                </select>
                            </span>
                            <span style="width:200px;display:inline-block;">
                                <input type="text" id="keyword" placeholder="请输入"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label">关键字</label>
                        <div class="layui-input-block">
                            <span >
                                <input type="text"  id="fieldValue" placeholder="科室编号或科室名称"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div>

                    <div class="layui-inline" style="padding-left: 20px;">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                            lay-filter="table-search" data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
            </div>

            <!-- 表格区域-->
            <div class="layui-card-body content-right">
                <table class="layui-table" id="comDept" lay-filter="comDept" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>

    <div id="getMobileCode" style="display:none;">
        <form class="layui-form" id="form-getMobileCode">
            <div class="layui-form-item">
                <label class="layui-form-label">手机号:</label>
                <div class="layui-input-inline">
                    <input type="text" id="mobile" placeholder="请输入手机号" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">验证码:</label>
                <div class="layui-input-inline">
                    <input type="text" autocomplete="off" id="code" placeholder="请输入验证码" autocomplete="new-password" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">
                    <a class="layui-btn layui-btn-radius layui-btn-sm" id="getCode">获取验证码</a>
                </div>
            </div>
        </form>
        <div style="text-align:center">
            <a class="layui-btn layui-btn-radius layui-btn-sm" id="verifyCode">登录</a>
        </div>

    </div>

    <!-- 合并科室弹窗 -->
    <div id="dept-merge-form-area" class="hide">
        <form class="layui-form" style="padding-top: 20px; padding-left: 10px;"
                lay-filter="dept-merge-form" id="dept-merge-form">
            <!-- <div class="layui-form-item">
                <label class="layui-form-label" style="width: 100px;">合并后保留科室</label>
                <div class="layui-input-inline">
                    <select id="deptSelect" lay-filter="deptSelect"></select>
                </div>
            </div> -->
            <!-- <div class="layui-form-item hide">
                <div class="layui-inline">
                        <button type="submit" id="dept-merge-form-submit" class="layui-btn"
                                lay-filter="dept-merge-form-submit" lay-submit>提交</button>
                    </div>
                </div>
            </div> -->
        </form>
    </div>


    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="deptSys">进入科室版</a>
    </script>

    <!-- 头部工具 -->
    <!-- <script type="text/html" id="headerToolBars">
        <div class="layui-btn-container">
            <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="mergeDept">
                合并科室</a>
        </div>
    </script> -->


    <script type="text/javascript">
        var format_url           = /\\|\/$/gi,
            deptUrl              = huayi_personorg_url.replace(format_url, ''),
            deptTreeUrl          = deptUrl + '/comdept/tree',
            deptListUrl          = deptUrl + '/comdept/list/children',
            deptListSupportUrl   = deptUrl + '/comdept/list/support',
            deptAddUrl           = deptUrl + '/comdept/save',
            deptPasswordResetUrl = deptUrl + '/comdept/password/reset',
            deptEditUrl          = deptUrl + '/comdept/update',
            deptMergeUrl         = deptUrl + '/comdept/merge',
            deptDeleteUrl        = deptUrl + '/comdept/deleted';

        var deptDict             = {};
        let standardKindIdObj = {};
        var unitMainId, userMobile, unitUserId, deptUnitId, deptId;

        var unitId = localStorage.getItem("unit-id")
            , standardkindId = localStorage.getItem("standardkind-id")
            , userId = localStorage.getItem("user-id")
            ;


        window.treeParser = function (tree, parser) {
            if (!tree || tree.length == 0) {
                return ;
            }
            tree.forEach(function (item) {
                item = parser(item);
                treeParser(item.children, parser);
            });
        }


        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            eleTree: 'eleTree'
        }).use([ 'table', 'form', 'eleTree' ], function () {
            var table   = layui.table,
                form    = layui.form,
                $       = layui.jquery,
                layer   = layui.layer,
                eleTree = layui.eleTree;

            var eleTreeDept = null,
                unitId      = CurrentUser.getUnitId(),
                rootKey     = ''; // 虚拟root节点deptId

            /* 表格配置 */
            window.loaderTable = function () {
                var standardKindSearch = $('#standardKindSearch').val();
                var searchName = $("#keywordColumn").val();
                var searchValue = $("#keyword").val();
                var fieldValue = $("#fieldValue").val();
                if(!standardKindSearch) {
                    layer.msg('请选择套');
                    return false;
                }
                if(searchValue == '' && fieldValue == '') {
                    layer.msg('请输入查询条件');
                    return false;
                }
                var searchDatas = {unitId : unitId};
                if(searchName == 'dept_id'){
                    searchDatas.deptId = searchValue;
                }else if(searchName == 'dept_name'){
                    searchDatas.deptName = searchValue;
                }
                
                table.render({
                    elem            : '#comDept',
                    url             : deptListSupportUrl,
                    method          : 'post',
                    title           : '用户表',
                    defaultToolbar  : [],
                    toolbar         : '#headerToolBars',
                    contentType     : 'application/json',
                    where           : {
                        cmeStandardKindIds: strTool.isBlank(standardKindSearch) ? standardkindId : standardKindSearch,
                        unitId: unitId,
                        keywordColumn: $("#keywordColumn").val(),
                        keyword: $("#keyword").val(),
                        fieldValue: $("#fieldValue").val(),
                    },
                    cols: [[
                        {align: 'center', minWidth: 110, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                        {field: 'deptId', title: '科室编号', minWidth: 100, align: 'center',
                            templet: function (data) {
                                // 如果是海南套(一体化), 科室登录名添加"J"前缀
                                if (localStorage.getItem("standardkind-id") == '6eec6713-670a-43cc-ad4d-9bd700a92928'){
                                    return 'J' + data.deptId;
                                }
                                return data.deptId;
                            }
                        },
                        {field: 'deptName', title: '科室名称', minWidth: 100},
                        {field: 'unitId', title: '上级单位编号', minWidth: 100},
                        {field: 'unitName', title: '上级单位', minWidth: 200},
                        { field: 'description', title: '套', width: 120, sort: true },
                        {field: 'addTime', title: '添加时间', minWidth: 180, align: 'center'}
                    ]],
                    id              : 'comDept',
                    height          : 'full-160',
                    page            : true,
                    limit           : 10,
                    limits          : [10, 50, 100, 150, 200],
                    parseData       : function (res) {
                        if (res.success) {
                            return {
                                'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                                'msg'   : res.status === 200 ? res.message : '系统异常, 请联系技术支持', // 解析提示文本
                                'count' : res.data.recordsTotal, // 解析数据长度
                                'data'  : res.data.records, // 解析数据列表
                                'page'  : res.data.pageNum, // 当前页
                                'limit' : res.data.pageSize, // 每页条数
                            }
                        } else {
                            layer.msg('系统异常, 请联系技术支持');
                            return {
                                'code'  : res.status, // 解析接口状态
                                'msg'   : '系统异常, 请联系技术支持', // 解析提示文本
                                // 'count' : res.data.recordsTotal, // 解析数据长度
                                // 'data'  : res.data.records, // 解析数据列表
                                // 'page'  : res.data.pageNum, // 当前页
                                // 'limit' : res.data.pageSize, // 每页条数
                            }
                        }
                    },
                    request: {
                        pageName    : 'pageNum', // 页码的参数名称，默认：page
                        limitName   : 'pageSize' // 每页数据量的参数名，默认：limit
                    },
                    done: function () {
                        $(':checkbox[lay-filter="layTableAllChoose"]+').hide();
                        $(':checkbox[lay-filter="layTableAllChoose"]+').next().hide();
                        $(':checkbox[lay-filter="layTableAllChoose"]+').parent().append('选择');
                    }
                });
            };

            
        //套
        let standardKindInit = function () {
            var standardkindIdArr = standardkindId.split(",");
            console.log(standardkindIdArr);
            commonAjax('get', huayi_sjwh_url + "cmestandardkind/list/all", {},
                function () { layer.msg("套加载失败"); },
                function (res) {
                    let options = '<option value="" > 请选择套标准 </option>';
                    for (let tempObj of res.data) {
                        if (standardkindIdArr.includes(tempObj.cmeStandardKindId)) {
                            standardKindIdObj[tempObj.cmeStandardKindId] = {
                                description: tempObj.description,
                                topUnitId: tempObj.topUnitId
                            };
                            options += '<option top-unit-id="' + tempObj.topUnitId + '" value="' + tempObj.cmeStandardKindId + '">' + tempObj.description + '</option>';
                        }
                    }
                    $('#standardKindSearch').append(options);
                    form.render('select');
                });
        }

            /* 初始化表格 */
            // loaderTable();

            /* 行工具栏 */
            table.on('tool(comDept)', function (obj) {
                var datas = obj.data;
                // 进入科室版
                if (obj.event === 'deptSys') {
                    
                    // 获取登录用户手机号
                    $.ajax({
                        async: false,
                        type: "get",
                        url: huayi_permission_url + "comuser/detail",
                        data: { userId: localStorage.getItem("user-id") },
                        success: function (res) {
                            debugger
                            if (res.success == true) {
                                userMobile = res.data.base.mobile;
                            } else {
                                layer.msg("获取配置出错");
                            }
                        },
                        error: function () {
                            layer.msg("获取配置出错");
                        }
                    });
                
                    deptUnitId = datas.unitId;
                    deptId = datas.deptId;
                    unitUserId = datas.userId;
                    var formGetMobileCode = $("#form-getMobileCode")[0];
                    formGetMobileCode.reset();
                    formGetMobileCode[0].value = userMobile;
                    form.render();
                    layer.open({
                        type: 1,
                        title: '手机验证码',
                        content: $('#getMobileCode'),
                        area: ['450px', '220px']
                    });
                } 
            });


            /* 表单验证 */
            form.verify({
                pwd_strength : [
                    // /^(?=^.{8,25}$)(?=(?:.*?\d) {1})(?=.*[a-z])(?=(?:.*?[A-Z]) {1})(?=(?:.*?[!@#$%*()_+^&}{:;?.]) {1})(?!.*\s)[0-9a-zA-Z!@#$%*()_+^&]*$/,
                    /^(?=.*[0-9])(?=.*[A-Z])(?=.*[a-z])(?=.*[^a-zA-Z0-9]).{8,25}$/,
                    '密码必须8~25位，且包含数字、大小写和特殊符号'
                ],
                pwd_confirm  : function (value, items) {
                    if ($('#new-password-input').val() != value) {
                        return '两次输入的密码不一致';
                    }
                }
            });

            /* form表单相关操作 */
            form.on('submit(form-dept-add-submit)', function (data) { // 添加科室
                noRepeat(function () {
                    $.ajax({
                        type        : 'post',
                        url         : data.field.type == 'add'? deptAddUrl :deptEditUrl ,
                        data        : JSON.stringify(data.field),
                        contentType : 'application/json;charset=UTF-8',
                        dataType    : 'json',
                        success     : function (res) {
                            if (res.status == 200) {
                                window.reload(0);
                                layer.closeAll();
                                layer.msg('操作成功', { time : 1500, icon : 1 });
                            } else {
                                layer.msg(res.msg || '操作失败', { time : 1500, icon : 2 });
                            }
                        },
                        error       : function () {
                            layer.msg('网络异常，请稍后再试', { time : 1500, icon : 7 });
                        }
                    });
                });
                return false;
            });

                
            $("#getCode").click(function () {
                var myreg = /^[1][3,4,5,7,8,9][0-9]{9}$/;
                debugger
                mobile = $("#mobile").val();
                if (mobile === "") {
                    layer.msg("请输入手机号")
                    return
                } else if (!myreg.test(mobile)) {
                    layer.msg("请输入正确的手机号")
                    return
                }
                console.log(mobile);
                // 发送短信验证码
                $.ajax({
                    url: huayi_mcenter_url + 'message/code/send',
                    type: 'post',
                    contentType: 'application/json',
                    dataType: 'json',
                    data: JSON.stringify({
                        'msgCodeType': 'LOGIN',
                        'phone': encodeAesString(mobile).toString(),
                    }),
                    success: (res) => {
                        if (res.success == true) {
                            layer.msg("获取验证码成功")
                            // layer.msg('<sapn style="color: #666666;">验证码已发送，请注意查收</sapn>', 
                            //         { icon : 1, time : 1500 });

                            // // 重获验证码倒计时
                            // curCount = count;
                            // $('#login_' + cur_login + ' [name=code_btn]').html(curCount + '秒后重获');
                            // InterValObj = window.setInterval(SetRemainTime, 1000);

                        } else {
                            layer.msg("获取验证码失败")
                            // layer.msg('<sapn style="color: #666666;">' + res.msg + '</sapn>', 
                            //         { icon : 7, time : 1500 });
                            // $('#login_' + cur_login + ' [name=code_btn]').css('pointer-events', '').removeClass('layui-disabled');
                        }
                    },
                    error: (xhr, status, error) => {
                        layer.msg('<sapn style="color: #666666;">验证码发送失败</sapn>',
                            { icon: 2, time: 1500 });
                        $('#login_' + cur_login + ' [name=code_btn]').css('pointer-events', '').removeClass('layui-disabled');
                    }
                });
            })

            // 验证验证码
            $("#verifyCode").click(function () {
                var mobile = $("#mobile").val();
                var code = $("#code").val();

                $.ajax({
                    url: huayi_mcenter_url + 'message/code/check',
                    type: 'post',
                    contentType: 'application/json',
                    dataType: 'json',
                    data: JSON.stringify({
                        'msgCodeType': 'LOGIN',
                        'phone': encodeAesString(mobile).toString(),
                        'code': encodeAesString(code).toString()
                    }),
                    success: (res) => {
                        if (res.success == true) {
                            // 验证成功后发送登录请求，将localStorage替换成返回的信息,然后重定向到首页     
                            debugger
                            loginUnitByUnitMainId()
                        } else {
                            layer.msg("手机验证失败")
                            // layer.msg('<sapn style="color: #666666;">' + res.msg + '</sapn>', 
                            //         { icon : 7, time : 1500 });
                        }
                        // $('.verify-refresh').click();
                    },
                    error: (xhr, status, error) => {
                        layer.msg("手机验证失败")
                        // layer.msg('<sapn style="color: #666666;">手机验证码验证失败</sapn>', 
                        //         { icon : 2, time : 1500 });
                        // $('.verify-refresh').click();
                    }
                });
            })

            //获取配置的值
            window.getConfig = function () {
                var config_value = "";
                var config_name = "value_system_logout_url";
                $.ajax({
                    async: false,
                    type: "post",
                    url: huayi_sjwh_url + "cmeCommonConfig/getConfigByUnitFromRedis",
                    data: { unitId: localStorage.getItem("unit-id"), configNames: config_name },
                    success: function (res) {
                        debugger
                        if (res.success == true) {
                            if (config_name == "value_system_logout_url") {
                                config_value = res.data.value_system_logout_url;
                                localStorage.setItem('logout-url', config_value);
                            }
                        } else {
                            layer.msg("获取配置出错");
                        }
                    },
                    error: function () {
                        layer.msg("获取配置出错");
                    }
                });
                return config_value;
            }

            window.loginUnitByUnitMainId = function () {
                debugger;
                $.ajax({
                    url: huayi_permission_url + 'loginByTechnicalSupport',
                    type: 'post',
                    contentType: 'application/json',
                    dataType: 'json',
                    data: JSON.stringify({
                        'unit_id':  deptUnitId,
                        'deptId': deptId,
                        'userId': unitUserId,
                        'mobile': $("#mobile").val(),
                        'type': "3",
                        'technicalSupportId': localStorage.getItem("user-id"),
                        'userName': localStorage.getItem("user-name")
                    }),
                    success: (data, textStatus, xhr) => {
                        debugger
                        let datas = data.data;
                        if (data.status == 200) {
                            // 验证成功后发送登录请求，将localStorage替换成返回的信息,然后重定向到首页
                            localStorage.clear();
                            localStorage.setItem('login-url', window.location.href);
                            localStorage.setItem('token', xhr.getResponseHeader('Authorization') || '');
                            localStorage.setItem('token-exp-time', xhr.getResponseHeader('token-exp-time') || 0);
                            localStorage.setItem('refresh-token', xhr.getResponseHeader('refresh-token') || '');
                            localStorage.setItem('user-id', xhr.getResponseHeader('KJPT-USER-ID') || '');
                            localStorage.setItem('unit-id', datas.unitId || '');
                            localStorage.setItem('unit-name', datas.unitName || '');
                            localStorage.setItem('standardkind-id', datas.standardKindId || '');
                            localStorage.setItem('user-name', datas.userName || '');
                            localStorage.setItem('user-type', datas.userType || '');
                            localStorage.setItem('unit-user-type', datas.unitUserType || 0);
                            if (datas.userType == "13") {
                                localStorage.setItem('dept-id', datas.deptId || '');
                                localStorage.setItem('dept-name', datas.deptName || '');
                            }
                            // 添加文件验证cookie
                            setFileVerifyCookie(xhr);
                            localStorage.removeItem('menu-unit-id');
                            // window.parent.window.href("http://192.168.1.166/index.html");
                            window.parent.window.location.href = "/index.html";
                            // window.parent.window.open("https://kjpt.wsglw.net");
                            window.top.close()
                        } else {
                            layer.msg(data.msg)
                            return
                        }
                    },
                    error: (xhr, status, error) => {
                        layer.msg("手机验证失败")
                    }
                });

            }


            $(window).resize(e => {
                let height = $('.content-right').height();
                $('.content-left').css('height', height - 22);
            });
            $(() => {
                let height = $('.content-right').height();
                $('.content-left').css('height', height - 22);
            });


            /* 提示 */
            $('#hint').hover(function () {
                openMsg();
            }, function () {
                layer.close(subtips);
            });
            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff512c' ], time: 30000});
            }

            dynamicCss: {}

            //公共ajax
            let commonAjax = function (type = "get", url, data, failFun, successFun) {
                $.ajax({
                    type: type,
                    url: url,
                    data: data,
                    success: function (res) {
                        if (res.status != 200) {
                            layer.msg(res.msg);
                            return;
                        }
                        successFun(res);
                    },
                    error: function (res) {
                        failFun();
                    }
                });
            }

             // 初始化函数
            layer.ready(function () {
                standardKindInit();//套初始化
                // TODO 默认查询, 开发时打开
                // loaderTable();
                // layer.msg("提示")
            })
        });

       

    </script>
</body>
</html>
