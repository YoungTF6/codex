<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人员学分详情</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <style>
        .layui-table-tool-temp {
            padding-right: 0px;
        }

        .table-tool-title {
            display: flex;
            justify-content: space-between;
        }

        .table-tool-title>div {
            float: left;
            color: #027DB4;
            font-size: 14px;
        }
    </style>
</head>

<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <div class="layui_mess">
                    <!-- 筛选项 -->
                    <div class="layui_display">
                        <div class="layui-inline layui-form" lay-filter="statistical-year-div">
                            <label class="layui-form-label">查询年度</label>
                            <div class="layui-input-block">
                                <span style="width: 75px; display: inline-block;">
                                    <select id="statistical-year" lay-filter="statistical-year"
                                        name="statistical-year"></select>
                                </span>
                                <span style="display: inline-block; margin-left: 10px;
                                        width: calc(186.4px - 15px); color: blue;">
                                    <d1></d1>&nbsp;至&nbsp;<d2></d2>
                                </span>
                            </div>
                        </div>
                        <div class="layui-inline" style="margin-left: 15px;">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" lay-filter="table-search"
                                onclick="searchBtn()" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                    <div id="titlePersonInfo" class="layui-inline" style="margin-left: 40px;"></div>
                    <div id="personScoreDetails" class="layui-inline" style="margin-left: 40px;">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" lay-filter="table-search" onclick="scoreBtn()"
                            data-type="reload">各类学分汇总
                        </a>
                    </div>
                    <div id="backBtn" class="layui-inline" style="margin-left: 40px;">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" lay-filter="table-search" onclick="backBtn()"
                            data-type="reload">返回
                        </a>
                    </div>

                    <div id="titlePassInfo" style="margin-left: 40px;"></div>
                </div>
            </div>
            <div class="layui-card-body layui_body_box ">
                <table class="layui-table" id="personScoreTable" lay-filter="personScoreTable">
                </table>
            </div>

        </div>
    </div>
</body>

<script type="text/html" id="scoreExcBar">
    <div class="table-tool-title">
        <!-- <div id="tableTitle" style="width: 100%;"></div> -->
        <!-- <button class="layui-btn layui-btn-sm" lay-event="excel">导出Excel</button> -->
    </div>
</script>

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool',
        excel: 'excel'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'tool', 'excel'], function () {
        let table = layui.table, $ = layui.jquery, layer = layui.layer
            , form = layui.form
            ;
        let tool = layui.tool, excel = layui.excel;
        let standardkindId;
        var personId, startDt, endDt, checkState, ifAvail, personInfo, titleId, unitId, cmeYear, certId;
        const colsArr = [[
            { field: 'if_avail_name', title: '有效状态', align: 'center', minWidth: 150 },
            { field: '', title: '不计入达标原因', align: 'center', minWidth: 150 },
            // { field: 'person_name', title: '姓名', align: 'center', width: 80 },
            // { field: 'person_no', title: '人员编号', align: 'center', minWidth: 180 },
            {
                field: 'study_date', title: '活动日期', align: 'center', minWidth: 200, templet: function (d) {
                    if (d["study_date"] == null) return "";
                    return d["study_date"].replace("T", " ");
                }
            },
            { field: 'proj_no', title: '项目编号', align: 'center', minWidth: 160 },
            { field: 'proj_name', title: '内容', align: 'center', minWidth: 240 },
            { field: 'score_kind_name', title: projectLabels.lblScoreLevel, align: 'center', minWidth: 150 },
            { field: 'score_level_name', title: projectLabels.lblScoreLevelChild, align: 'center', minWidth: 150 },
            { field: 'knowledge_name', title: '学科', align: 'center', minWidth: 150 },
            { field: 'hold_type_name', title: '举办方式', align: 'center', minWidth: 150 },
            { field: 'score_input_unit_name', title: '授分单位', align: 'center', minWidth: 150 },
            { field: 'score_cert_unit_name', title: '发证机构', align: 'center', minWidth: 150 },
            { field: 'check_unit_name', title: '审核单位', align: 'center', minWidth: 150 },
            { field: 'score', title: '学分', align: 'center', minWidth: 90 },
            { field: 'period', title: '学时', align: 'center', minWidth: 90 },
            { field: 'score_mode_name', title: '录入方式', align: 'center', minWidth: 150 },
            {
                field: 'score_type', title: '学分类型', align: 'center', minWidth: 190, templet: function (d) {
                    if (d["score_type"] == null) return "";
                    if (d["score_type"] == 1) return "继教项目";
                    if (d["score_type"] == 2) return "院内活动";
                    if (d["score_type"] == 3) return "个人活动";
                    return d["score_type"];
                }
            },
            {
                field: 'add_time', title: '录入时间', align: 'center', minWidth: 190, templet: function (d) {
                    if (d["add_time"] == null) return "";
                    return d["add_time"].replace("T", " ");
                }
            },
            {
                field: 'check_time', title: '审核时间', align: 'center', minWidth: 190, templet: function (d) {
                    if (d["check_time"] == null) return "";
                    return d["check_time"].replace("T", " ");
                }
            },
            {
                field: 'update_time', title: '更新时间', align: 'center', minWidth: 190, templet: function (d) {
                    if (d["update_time"] == null) return "";
                    return d["update_time"].replace("T", " ");
                }
            },
            { field: 'check_state_name', title: '审核状态', align: 'center', minWidth: 150 },
            { field: 'remark', title: '备注', align: 'center', minWidth: 150 }
        ]];
        let gPassStandardVoList = [];

        //获取学分审核情况数据
        let getPersonScoreStatistics = function (personId, startDt, endDt, checkState, ifAvail) {
            const height = document.documentElement.clientHeight - 60;
            const params = {
                standardKindId: standardkindId,
                personId: personId, checkState: checkState,
                startDt: startDt, endDt: endDt, ifAvail: ifAvail
            };
            var isPass = '未知';
            var reason;
            var passMsg = '';
            let visit = huayi_projectscore_url + 'ps/all/person/support';
            let params2 = {
                cmeYear: cmeYear,
                certId: certId
            };
            postAction(visit, params2).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    let rdd = jsonRes.data;
                    gPassStandardVoList = rdd.passStandardVoList;
                }
            }).catch(error => {
                layer.msg('error:加载获取达标信息');
            }).finally(() => {
                renderPassStandard(gPassStandardVoList);
                renderTable();
            });
            
            // $.ajax({
            //     url: huayi_projectscore_url + 'cmeSearchPeopleScore/searchPeoplePass',
            //     type: 'get',
            //     async: false,
            //     dataType: 'json',
            //     data: {
            //         cmeStandardKindId: standardkindId,
            //         // comPersonId: personId,
            //         cmeYear: cmeYear,
            //         certId: certId,
            //         unitId: unitId
            //     },
            //     success: function (res) {
            //         if (res.status == 200) {
            //             console.log(res);
            //             if(res.data.records.length > 0){
            //                 var data = res.data.records[0];
            //                 if(data.passResult == 0){
            //                     isPass = '不达标';
            //                     passMsg = ' &nbsp; &nbsp; 达标结果: ' + isPass
            //                         + ' &nbsp; &nbsp; 不达标原因: ' + data.reason;
            //                 }else if(data.passResult == 1){
            //                     isPass = '达标';
            //                     passMsg = ' &nbsp; &nbsp; 达标结果: ' + isPass;
            //                 }else if(data.passResult == 2){
            //                     isPass = '';
            //                     passMsg = ' &nbsp; &nbsp; 达标标准未做要求';
            //                 }
            //             }
            //         } else {
            //             layer.msg('获取达标标准失败', { icon: 7, time: 1500 });
            //         }
            //     },
            //     error: function () {
            //         layer.msg('获取达标标准失败', { icon: 7, time: 1500 });
            //     }
            // });
            function renderPassStandard(passStandardVoList) {
                console.info('renderPassStandard');
                let k3List = [];
                passStandardVoList.forEach((passStandardVo, index) => {
                    if (passStandardVo.kind >= 3) {
                        k3List.push(passStandardVo);
                    }
                });
               
                if (k3List && k3List.length > 0) {
                    let msg = k3List[0].standardMsg;
                    if (msg.startsWith('不达标')) {
                        // 不达标
                        isPass = '不达标';
                        passMsg = ' &nbsp; &nbsp; 达标结果: ' + isPass
                        + ' &nbsp; &nbsp; 不达标原因: ' + msg.replace('不达标', '').replace('|', '');
                    } else if (msg.startsWith('达标')) {
                        // 达标
                        isPass = '达标';
                        passMsg = ' &nbsp; &nbsp; 达标结果: ' + isPass;
                    } else if (msg.startsWith('未知')) {
                        // 未知
                        isPass = '未知';
                        passMsg = ' &nbsp; &nbsp; 达标结果: ' + isPass
                        + ' &nbsp; &nbsp; 原因: ' + msg.replace('未知', '').replace('|', '');
                    } 
                } else {
                    // 未知
                    isPass = '未知';
                    passMsg = ' &nbsp; &nbsp; 达标结果: ' + isPass;
                }

            }

            // 渲染表格
            function renderTable(){
                table.render({
                    elem: '#personScoreTable',
                    id: 'scoreTable',
                    url: huayi_projectscore_url + 'projectScoreStatistis/getPeopleScoreStatistics',
                    // toolbar: '#scoreExcBar',
                    defaultToolbar: [],
                    cellMinWidth: 60,
                    height: 'full-250',
                    page: false,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    where: params,
                    cols: colsArr,
                    parseData: function (res) {
                        if (res.status == 200 && !tool.isEmpty(res.data)) {
                            // document.getElementById("tableTitle").innerText = res.data["scoreText"];
                            document.getElementById("titlePassInfo").innerHTML = res.data.scoreText + '<br>' + passMsg;
                        } else {
                            document.getElementById("titlePassInfo").innerHTML = '共0条记录' + passMsg;
                        }
                        return {
                            "code": res.status === 200 ? 0 : res.status,
                            "msg": res.message,
                            "data": (res.data == null) ? res.data : res.data.recordsTotal,
                        };
                    }
                });
            }
        }

        // 查询年度学分情况
        window.searchBtn = () => {
            getPersonScoreStatistics(personId, startDt, endDt, checkState, ifAvail);
        }

        // 查看学分汇总
        window.scoreBtn = () => {
            layer.open({
                type: 2,
                title: '各类学分汇总',
                content: 'personScoreDetails.html?personId=' +
                    personId + '&startDt=' + startDt + '&endDt=' + endDt
                    + '&checkState=' + '' + '&ifAvail=1'
                    + '&standardkindId=' + standardkindId
                    + '&cmeYear=' + cmeYear
                    ,
                btn: ['关闭'],
                btnAlign: 'c',
                yes: function () {
                    layer.closeAll();
                },
                area: ['60%', '100%'],
                // end: function(index, layero){
                //     loaderTable();
                // }
            })
        }

        // 返回
        window.backBtn = () => {
            layer.msg('返回')
            parent.layer.closeAll();
        }
        // Esc关闭弹窗
        window.onkeyup = function (ev) {
            var key = ev.keyCode || ev.which;
            if (key == 27) {
                parent.layer.close(parent.layer.index);
                console.log('layer.index = ' + parent.layer.index)
            }
        }

        var initCmeYear = function(){
            // 统计年度
            $.ajax({
                url: huayi_sjwh_url + 'cmeYear',
                type: 'get',
                async: false,
                dataType: 'json',
                data: { cmeStandardKindId: standardkindId },
                success: function (res) {
                    if (res.status == 200) {
                        let option = '';
                        statisticalYearList = res.data;

                        for (let i = 0; i < 10 && i < statisticalYearList.length; i++) {
                            option += '<option value="' + statisticalYearList[i].cmeYearId + '">' +
                                statisticalYearList[i].cmeYear + '</option>';
                        }
                        $('#statistical-year').append(option);
                        form.render('select', 'statistical-year-div');
                        $('#statistical-year').parent().next().find('d1').html(statisticalYearList[0].startDate);
                        $('#statistical-year').parent().next().find('d2').html(statisticalYearList[0].endDate);
                    } else {
                        layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                    }
                },
                error: function () {
                    layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                }
            });
        }
       

        // 统计年度事件
        form.on('select(statistical-year)', function (data) {
            for (let i = 0; i < statisticalYearList.length; i++) {
                if (statisticalYearList[i].cmeYearId == data.value) {
                    $('#statistical-year').parent().next().find('d1').html(statisticalYearList[i].startDate);
                    $('#statistical-year').parent().next().find('d2').html(statisticalYearList[i].endDate);
                    startDt = statisticalYearList[i].startDate;
                    endDt = statisticalYearList[i].endDate;
                    cmeYear = statisticalYearList[i].cmeYear;
                    break;
                }
            }
        });

        //页面加载入口
        let htmlInit = function () {
            personId = tool.getParamFromUrl("personId");
            startDt = tool.getParamFromUrl("startDt");
            endDt = tool.getParamFromUrl("endDt");
            checkState = tool.getParamFromUrl("checkState");
            ifAvail = tool.getParamFromUrl("ifAvail");
            personInfo = tool.getParamFromUrl("personInfo");
            unitId = tool.getParamFromUrl("unitId");
            certId = tool.getParamFromUrl("certId");
            titleId = tool.getParamFromUrl("titleId");
            cmeYear = tool.getParamFromUrl("cmeYear");
            standardkindId = tool.getParamFromUrl("standardkindId");
            document.getElementById("titlePersonInfo").innerText = personInfo;
            if (tool.isEmpty(personId)) {
                layer.msg("缺少必要参数");
                return;
            }
            initCmeYear();
            var yearId = $("#statistical-year").val();
            $('select[name="statistical-year"]').next().find('.layui-select-title input').click();
            $('select[name="statistical-year"]').next().find('.layui-anim').children('dd[lay-value="' + yearId + '"]').click();
            getPersonScoreStatistics(personId, startDt, endDt, checkState, ifAvail);
        }

        htmlInit();
    });
</script>
