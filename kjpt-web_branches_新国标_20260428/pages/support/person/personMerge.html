<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人员合并</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/tools/form_validation_tool.js"></script>

    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <style>
        xm-select>.xm-body .xm-search>i {
            left: 10px;
        }
    </style>


</head>

<body>

    <div class="layui-fluid">
        <div class="layui-card">
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width: 120px;padding-right: 10px;">要删除的医通卡号</label>
                        <div class="layui-input-block"  style="margin-left: 150px;">
                            <input type="text" id="personNoSrc" placeholder="请输入" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="width: 120px;padding-right: 10px;">合并后的医通卡号</label>
                        <div class="layui-input-block" style="margin-left: 150px;">
                            <input type="text" id="personNoDesc" placeholder="请输入" autocomplete="off" class="layui-input">
                        </div>
                    </div>

                    <div class="layui-inline">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                            lay-filter="table-search" data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
                    <div class="layui-inline">
                        <p style="color: red; margin-top: 10px;margin-left: 24px;">注意：请您在合并医通卡号前一定要仔细确认所有的详细信息，请确认无误后在进行合并医通卡号操作！</p>
                    </div>
                </blockquote>
            </div>

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="comPerson" lay-filter="comPerson" style="margin: 0px 0px;">
                </table>
            </div>
            <div class="layui-inline">
                <p style="color: red; margin-top: 10px;margin-left: 24px;">友情提示信息：人员所属地区不同，不可以合并医通卡号！</p>
            </div>
            <div class="layui-card-body layui_body_box">
                <button id="mergeBtn" style="margin-left: 40%;" type="button" class="layui-btn">合并医通卡号</button>
            </div>

  
        </div>
    </div>


</body>

</html>

<script type="text/html" id="operationRowBar">
      <span style="color: red;">{{ d.operation }}</span>
  </script>

<script>
    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select'
    }).use(['form', 'table', 'layer', 'xmSelect'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var xmSelect = layui.xmSelect;

        var unitId = localStorage.getItem("unit-id")
            , standardkindId = localStorage.getItem("standardkind-id")
            ;
        var tableDate = [];


        // 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            var personNoSrc = $('#personNoSrc').val();
            var personNoDesc = $('#personNoDesc').val();
            // 查询条件为空不加载
            if(strTool.isBlank(personNoSrc)){
                layer.msg('请输入要删除的医通卡号');
                return false;
            }
            if (strTool.isBlank(personNoDesc)) {
                layer.msg('请输入合并后的医通卡号');
                return false;
            }
            getPersonInfo();
            table.render({
                elem: '#comPerson',
                title: '人员信息',
                cols: [[
                    { field: 'operation', title: '操作', width: 120 , templet: "#operationRowBar"},
                    { field: 'personStateName', title: '人员状态', width: 90 },
                    { field: 'personNo', title: '人员编号', width: 110 },
                    { field: 'personName', title: '姓名', width: 90 },
                    { field: 'sex', title: '性别', width: 60 },
                    { field: 'titleName', title: '职称', width: 85 },
                    { field: 'certId', title: '证件号码', width: 180 },
                    { field: 'birthday', title: '出生日期', width: 110 },
                    { field: 'description', title: '套', width: 90 },
                    { field: 'unitName', title: '工作单位', width: 150 },
                    { field: 'deptName', title: '科室', width: 150 },
                ]],
                data: tableDate,
                id: "comPerson",
            });
        };

        var getPersonInfUrl = huayi_personorg_url + "comperson/getOne";
        // 根据输入人员编号获取人员信息
        function getPersonInfo(){
            tableDate = [];
            var personNoSrc = $('#personNoSrc').val();
            var personNoDesc = $('#personNoDesc').val();
            $.ajax({
                async: false,
                type: "get",
                url: getPersonInfUrl,
                data: { personNo: personNoSrc },
                success: function (res) {
                    if (res.success == true) {
                        if(res.data){
                            var personInfoSrc = res.data;
                            personInfoSrc.operation = '要删除的信息';
                            tableDate.push(personInfoSrc);
                            console.log(tableDate);
                        }
                    } else {
                        layer.msg("获取人员信息异常");
                    }
                },
                error: function () {
                    layer.msg("获取人员信息异常");
                }
            });
            $.ajax({
                async: false,
                type: "get",
                url: getPersonInfUrl,
                data: { personNo: personNoDesc },
                success: function (res) {
                    if (res.success == true) {
                        if(res.data){
                            var personInfoDesc = res.data;
                            personInfoDesc.operation = '合并后的信息';
                            tableDate.push(personInfoDesc);
                            console.log(tableDate);
                        }
                    } else {
                        layer.msg("获取人员信息异常");
                    }
                },
                error: function () {
                    layer.msg("获取人员信息异常");
                }
            });
        }
        layui.$('#mergeBtn').on('click', function(){
            if(tableDate.length < 2){
                layer.msg('人员数据不完整');
                return ;
            }
            if(tableDate[0].description != tableDate[1].description){
                layer.msg('人员所示地区不同, 不可以合并医通卡号')
                return;
            }
            
            var personNoSrc = $('#personNoSrc').val();
            var personNoDesc = $('#personNoDesc').val();
            if(personNoSrc == personNoDesc){
                layer.msg('所选人员编号相同');
                return ;
            }

            layer.confirm('请确认人员信息是否合并！', { icon: 3, title: '提示' }, function () {
                layer.msg('开始合并');
                
                var data = {
                    userId: localStorage.getItem("user-id"),
                    personNoSrc: personNoSrc,
                    personNoDesc: personNoDesc
                }
                $.ajax({
                    async: false,
                    type: "post",
                    url: huayi_personorg_url + "comperson/merge",
                    data: JSON.stringify(data),
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.success == true) {
                            layer.msg(res.data);
                            tableDate = [];
                            window.loaderTable();
                            $('#personNoSrc').val();
                            $('#personNoDesc').val();
                        } else {
                            layer.msg("合并异常" + res.msg);
                        }
                    },
                    error: function () {
                        layer.msg("合并异常" + res.msg);
                    }
                });
            })
        });


        window.layClose = function () {
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭
        }

        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    if (res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }
        // Esc关闭弹窗
        window.onkeyup = function (ev) {
            var key = ev.keyCode || ev.which;
            if (key == 27) {
                layer.close(layer.index);
                console.log('layer.index = ' + layer.index)
            }
        }

        // 初始化函数
        layer.ready(function () {
        })
    });

</script>
