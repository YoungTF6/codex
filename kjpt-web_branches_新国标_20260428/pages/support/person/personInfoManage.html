<script>

    var comPersonId;
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect'
    });

    /* 全局配置及引入相关的模块 */
    layui.use(['table', 'form', 'jquery', 'layer', 'xmSelect', 'treeSelect'], function () {
        var table = layui.table,
            form = layui.form,
            $ = layui.jquery,
            layer = layui.layer,
            xmSelect = layui.xmSelect,
            treeSelect = layui.treeSelect;

        var curDeptId;
        var unitMainId, userMobile, unitUserId;

        window.getUnitId = function () {
            return localStorage.getItem("unit-id");
        }
        window.getCmeStandardKindId = function () {
            return localStorage.getItem("standardkind-id");
        }
        window.getDeptId = function () {
            if (localStorage.getItem("user-type") == 13) {
                let userId = localStorage.getItem("user-id");
                $.ajax({
                    async: false,
                    headers: {
                        'Authorization': localStorage.getItem('token'),
                        'KJPT-USER-ID': localStorage.getItem('user-id')
                    },
                    url: huayi_permission_url + "comuser/detail",
                    type: "get",
                    data: { userId: userId },
                    success: function (res) {
                        if (res.success == true) {
                            if (res.data != null && res.data != undefined && res.data != "") {
                                curDeptId = res.data.base.unitId;
                            }
                        }
                    },
                    error: function () {
                        layer.msg("发送信息失败");
                    }
                });
            }
        }

        let getSearchValue = function () {
            var text = $("#text_value").val();
            if (text) {
                // 去除首尾空格
                text = text.replace(/(^\s*)|(\s*$)/g, "");
            }else{
                text = ""
            }
            return text;
        }

        /* 表格初始化 */
        window.initTable = function () {
            table.render({
                elem: '#comPerson',
                url: huayi_personorg_url + 'comperson/list/support',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                title: '用户表',
                defaultToolbar: ['filter', 'print', 'exports'],
                where: {
                    deptId: curDeptId,
                    cmeStandardKindId: window.getCmeStandardKindId(),
                    keywordColumn: $("#select_column").val(),
                    keyword: getSearchValue(),
                },
                cols: [
                    [{
                        align: 'center',
                        title: '',
                        toolbar: '#passDetailBar',
                        minWidth: 140,
                        fixed: 'left'
                    }, {
                        align: 'center',
                        title: '操作',
                        toolbar: '#rowBar',
                        minWidth: 70,
                        fixed: 'left'
                    }, {
                        align: 'center',
                        title: '个人版进入',
                        toolbar: '#personSysBar',
                        // minWidth: 110,
                        fixed: 'left'
                    }, {
                        align: 'center',
                        title: '状态/职称维护',
                        toolbar: '#stateTittleBar',
                        minWidth: 120,
                        fixed: 'left'
                    }, {
                        field: 'grantDate',
                        title: '职称更新时间',
                        align: 'center',
                        minWidth: 120,
                        // sort: true
                    }, {
                        field: 'personNo',
                        title: '人员编号',
                        align: 'center',
                        minWidth: 110
                    }, {
                        field: 'certId',
                        title: '证件号',
                        align: 'center',
                        minWidth: 160
                    }, {
                        field: 'personName',
                        title: '姓名',
                        align: 'center',
                        // minWidth: 100,
                        // templet: function (d) {
                        //     return '<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" ' +
                        //         'lay-event="detail">' + d.personName + '</a>';
                        // }
                    }, {
                        field: 'sex',
                        title: '性别',
                        align: 'center',
                        minWidth: 70
                    }, {
                        field: 'birthday',
                        title: '出生日期',
                        align: 'center',
                        minWidth: 110
                    }, {
                        field: 'mobile',
                        title: '联系电话',
                        align: 'center',
                        // minWidth: 70
                    }, {
                        field: 'unitName',
                        title: '单位',
                        align: 'center',
                        // minWidth: 70
                    }, {
                        field: 'description',
                        title: '套',
                        align: 'center',
                        // minWidth: 70
                    }, {
                        field: 'deptName',
                        title: '科室',
                        align: 'center',
                        // minWidth: 120
                    }, {
                        field: 'titleName',
                        title: '当前职称',
                        align: 'center',
                        // minWidth: 110
                    }, {
                        field: 'personStateName',
                        title: '人员状态',
                        align: 'center',
                        // minWidth: 120
                    }, {
                        field: 'checkState',
                        title: '审核状态',
                        align: 'center',
                        templet: function (row) {
                            if (row.checkState == 0) {
                                return "未审核";
                            } else if (row.checkState == 1) {
                                return "审核通过";
                            } else if (row.checkState == 4) {
                                return "驳回";
                            } else {
                                return "未知";
                            }
                        }                    }, {
                        field: 'transferState',
                        title: '调动状态',
                        align: 'center',
                        // minWidth: 120,
                        templet: function (row) {
                            if (row.transferState == 1) {
                                return "调出";
                            } else if (row.transferState == 2) {
                                return "调入";
                            } else {
                                return "";
                            }
                        }
                    }, {
                        field: 'tranInTime',
                        title: '调入日期',
                        align: 'center',
                        minWidth: 110
                    }, {
                        field: 'addTime',
                        title: '添加时间',
                        align: 'center',
                        minWidth: 160
                    },{
                        field: 'updateTime',
                        title: '修改时间',
                        align: 'center',
                        minWidth: 160
                    }, {
                        field: 'hasPhotoName',
                        title: '照片',
                        align: 'center',
                        // minWidth: 90,
                        templet: function (row) {
                            if (row.hasPhoto == "1") {
                                return '<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" ' +
                                    'lay-event="photo">有</a>';
                            } else {
                                return '无';
                            }
                        }
                    }, {
                        align: 'center',
                        title: '内蒙人社推送',
                        toolbar: '#neimengScoreBar',
                        minWidth: 120,
                        // fixed: 'left'
                    }, {
                        align: 'center',
                        title: '达标计算',
                        toolbar: '#passCalculateBar',
                        minWidth: 120,
                        // fixed: 'left'
                    }, {
                        align: 'center',
                        title: '密码重置',
                        toolbar: '#resetPwdBar',
                        // minWidth: 110,
                        // fixed: 'left'
                    }
                ]
                ],
                cellMinWidth: 100,
                id: 'comPerson',
                height: 'full-175',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    if(res.status != 200) {
                        layer.msg("查询失败");
                        return ;
                    }
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize, // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据量的参数名，默认：limit
                },
                done: function () {
                }
            });
        };
        // window.initTable();

        $(function () {
            getDeptId();
            if (curDeptId != null && curDeptId != undefined && curDeptId != "") {
                $("#hidden_dept_id").val(curDeptId);
                $("#deptSelect").val(localStorage.getItem('realname')).addClass("layui-disabled");

            } else {
                //两个treeSelect几乎同时加载，可能会加载不出来
                setTimeout(() => {
                    // window.initDeptTree();
                }, 200);

            }
            // window.initTable();
        });

        //#endregion

        //---------------------------------事件--------------------------
        window.reloadTable = function () {
            // window.initTable();
            table.reload("comPerson", {
                // url: huayi_personorg_url + 'comperson/list',
                url: huayi_personorg_url + 'comperson/list/support',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: {
                    cmeStandardKindId: window.getCmeStandardKindId(),
                    // unitId: window.getUnitId(),
                    keywordColumn: $("#select_column").val(),
                    keyword: getSearchValue(),
                    // spec: $("#hidden_spec").val(),
                    // deptId: $("#hidden_dept_id").val(),
                    // isIntheseries: $("#select_intheseries").val(),
                    // personStateId: $("#select_person_state_id").val(),
                    // hasPhoto: $("#select_has_photo").val(),
                    // titleIds: $("#hidden_title_ids").val()
                }, page: {
                    curr: 1 //重新从第 1 页开始
                }
            });
        }

        $("#searchBtn").click(function () {
            var textValue = getSearchValue();
            if (textValue == undefined || textValue == ''){
                layer.msg('请输入查询条件')
                return;
            }
            window.initTable();
            // window.reloadTable();
        })

        // 监听行内按钮
        table.on('tool(comPerson)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'edit') {
                form.val('add-filter', datas);
                layer.open({
                    type: 2,
                    title: '编辑人员',
                    content: "baseInfoAddOrEdit.html?operate=edit&comPersonId=" + datas.comPersonId 
                            + "&taoId=" + datas.cmeStandardKindId + "&unitId=" + datas.unitId,
                    skin: '',
                    area: ['900px', '600px'],
                    shadeClose: true
                });
            } else if (obj.event === 'del') {
                var personName = datas.personName;
                layer.confirm('确认删除' + personName + '?', {
                    icon: 3,
                    title: '提示'
                }, function () {
                    $.ajax({
                        type: 'post',
                        url: huayi_personorg_url + 'comperson/delete',
                        headers: {
                            'Authorization': localStorage.getItem('token'),
                            'KJPT-USER-ID': localStorage.getItem('user-id')
                        },
                        data: {
                            comPersonId: datas.comPersonId
                        },
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("删除成功");
                                table.reload('comPerson');
                            }
                        },
                        error: function () {
                            layer.msg("请求失败");
                        }
                    });

                });
            } else if (obj.event === 'detail') {
                layer.open({
                    type: 2,
                    title: '人员信息',
                    content: '../person/baseInfoDetails.html?comPersonId=' + datas.comPersonId,
                    area: ['900px', '600px']
                });
            } else if (obj.event === 'photo') {
                var url = datas.photo;
                $('#photoArea img').attr('src', url);
                layer.open({
                    type: 1,
                    title: false,
                    content: $('#photoArea'),
                    area: [, '400px'],
                    shadeClose: true
                });
            } else if (obj.event === 'passDetail') {
                // 达标明细查询
                // layer.msg('达标明细查询');
                var nowDate = new Date();
                var year = nowDate.getFullYear();
                // year = '2020';
                var startDt = year + '-01-01';
                var endDt = year + '-12-31';
                var datas = obj.data;
                var personInfo = '姓名: ' + datas.personName + ' &nbsp;&nbsp; 人员编号: ' + datas.personNo
                                + ' &nbsp;&nbsp; 职称: ' + datas.titleName + ' &nbsp;&nbsp; 单位: ' + datas.unitName
                layer.open({
                    type: 2,
                    title: '详细情况明细',
                    content: 'personScoreStatistics.html?personId=' +
                        datas.comPersonId + '&startDt=' + startDt + '&endDt=' + endDt 
                        + '&checkState=' + '' + '&ifAvail=1&' + 'personInfo=' + personInfo
                        + '&titleId=' + datas.titleId + '&unitId=' + datas.unitId + '&cmeYear=' + year
                        + '&standardkindId=' + datas.cmeStandardKindId + '&certId=' + datas.certId
                        ,
                    // btn: ['关闭'],
                    btnAlign: 'c',
                    yes: function () {
                        layer.closeAll();
                    },
                    area: ['100%', '100%'],
                })
            } else if (obj.event === 'resetPwd') {
                // 重置密码
                $.ajax({
                    type: 'get',
                    url: huayi_permission_url+"comuser/update/password/technicalSupport",
                    data: {"comPersonId": datas.comPersonId},
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.status === 200){
                            layer.confirm("密码重置已成功，默认密码为："+res.data, { title:'修改密码成功'}, function(index){
                                layer.close(index);
                            });
                            // layer.msg("密码重置已成功，默认密码为："+res.data)

    window.loginPersonByPersonId = function(){
        debugger;
        $.ajax({
            url         : huayi_permission_url + 'loginByTechnicalSupport',
            type        : 'post',
            contentType : 'application/json',
            dataType    : 'json',
            data        : JSON.stringify({
                'userId' : comPersonId,
                'mobile'       : $("#mobile").val(),
                'type'        : "1",
                'technicalSupportId': localStorage.getItem("user-id")
            }),
            success     : (data, textStatus, xhr) => {
                debugger
                     let datas = data.data;
                if (data.status == 200) {
                    // 验证成功后发送登录请求，将localStorage替换成返回的信息,然后重定向到首页
                    localStorage.clear();
                    localStorage.setItem('login-url', window.location.href);
                    localStorage.setItem('token', xhr.getResponseHeader('Authorization') || '');
                    localStorage.setItem('token-exp-time', xhr.getResponseHeader('token-exp-time') || 0);
                    localStorage.setItem('refresh-token', xhr.getResponseHeader('refresh-token') || '');
                    localStorage.setItem('user-id', xhr.getResponseHeader('KJPT-USER-ID') || '');
                    localStorage.setItem('unit-id', datas.unitId || '');
                    localStorage.setItem('unit-name', datas.unitName || '');
                    localStorage.setItem('standardkind-id', datas.standardKindId || '');
                    localStorage.setItem('user-name', datas.userName || '');
                    localStorage.setItem('user-type', datas.userType || '');
                    localStorage.setItem('unit-user-type', datas.unitUserType || 0);
                    if (datas.userType == "13") {
                        localStorage.setItem('dept-id', datas.deptId || '');
                        localStorage.setItem('dept-name', datas.deptName || ''); 
                    }  
                    // 添加文件验证cookie
                    setFileVerifyCookie(xhr);
                    localStorage.removeItem('menu-unit-id');
                    // window.parent.window.open("http://127.0.0.1:5500/login.html");
                    // window.parent.window.open("https://kjpt.wsglw.net");
                    // 福建
                    // window.parent.window.open('http://220.160.53.27:18021/');
                    window.parent.window.location.href = "/index.html";
                    // window.parent.window.open("http://192.168.1.166/index.html");
                    window.top.close()
                } else if(data.status == 500){
                    layer.msg(data.msg)
                }else {
                    layer.msg("手机号无法登录该账号")
                    return
                }
            },
            error       : (xhr, status, error) => {
                layer.msg("手机验证失败")
            }
        });

    }
