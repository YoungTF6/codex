<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>信息变更日志详情</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <!-- 工具 -->
    <script type="text/javascript" src="/js/tools/urlTools.js"></script>
    <script type="text/javascript" src="/js/base64.js"></script>
</head>
<body>

    <div class="layui-fluid">
        <div class="layui-card">


            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <!-- <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form"> -->
                    <!-- <div class="layui-inline">
                        <label class="layui-form-label">查询项</label>
                        <div class="layui-input-block">
                            <span style="width:130px;display:inline-block;">
                                <select id="keywordColumn">
                                    <option value="operator">操作人</option>
                                    <option value="memo">操作内容</option>
                                </select>
                            </span>
                            <span style="width:200px;display:inline-block;">
                                <input type="text" id="keyword" placeholder="请输入"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div> -->

                    <div class="layui-inline">
                        <label class="layui-form-label">操作账号</label>
                        <div class="layui-input-block">
                            <span >
                                <input type="text"  id="operator" placeholder="请输入"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">操作</label>
                        <div class="layui-input-block">
                            <span >
                                <input type="text"  id="memo" placeholder="请输入"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div>

                    <div class="layui-inline" style="padding-left: 20px;">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                            lay-filter="table-search" data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
            </div>
            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="comPersonOperateLog" lay-filter="comPersonOperateLog"
                    style="margin: 0px 0px;">
                </table>
            </div>


        </div>
    </div>

    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
        <!-- <a class="layui-btn layui-btn-xs  layui-btn-normal" lay-event="edit"><i
                class="layui-icon layui-icon-edit"></i>编辑</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del"><i
                class="layui-icon layui-icon-delete"></i>删除</a> -->
    </script>
    <script type="text/html" id="bar">
        <!-- <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="add">
            <i class="layui-icon">&#xe654;</i>新增</a> -->
        <!-- <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="back">返回</a> -->
        <span id="userInfo"
                style="font-weight: bold; position: relative; top: 2px; left: 50px;"></span>
    </script>
    <script>
        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form'], function() {
            var table   = layui.table;
            var form    = layui.form;
            var $       = layui.jquery;
            var layer   = layui.layer;

            /* 表格相关操作 */
            // 表格配置
            window.loaderTable = function() {
                table.render({
                    elem            : '#comPersonOperateLog',
                    url             : huayi_personorg_url + 'comInfoOperateLog/list',
                    headers         : {
                        'Authorization' : localStorage.getItem('token'),
                        'KJPT-USER-ID'  : localStorage.getItem('user-id')
                    },
                    title           : '用户表',
                    defaultToolbar: [],
                    where           : {
                        operator: $("#operator").val(),
                        memo: $("#memo").val(),
                    },
                    cols            : [[
                        {field: 'addTime', title: '操作时间', align: 'center', width: 170, sort: true},
                        {field: 'operator', title: '操作账号', align: 'center', width: 200, sort: true},
                        // {field: 'method', title: 'method', align: 'center', width: 150, sort: true},
                        // {field: 'type', title: 'type', align: 'center', width: 150, sort: true},
                        {field: 'memo', title: '操作', align: 'center', width: 200, sort: true, 
                            },
                        {field: 'showInfo', title: '操作内容', minWidth: 200},


                        // {field: 'operateUser', title: '操作人', align: 'center', width: 100, sort: true},
                        // {field: 'operateUnit', title: '操作单位', align: 'center', minWidth: 150, sort: true},
                        // {field: 'keyId', title: '主键自增', sort: true},
                        // {field: 'comPersonId', title: 'com_person的主键', sort: true},
                        // {field: 'type', title: '操作类型 1:人员信息  2:人员变动情况  3:人员审核', sort: true},
                        // {field: 'method', title: '操作方法 1:add  2:update  -1:delete  3:审核通过  4:审核不通过', sort: true},
                        // {field: 'info', title: '信息 可以存放修改之前的信息或者其他信息', sort: true},
                        // {field: 'info1', title: '信息1 可以存放修改之后的信息或者其他信息', sort: true},
                        // {field: 'memo', title: '备注', sort: true},
                        // {align: 'center', width: 250, toolbar: '#rowBar', title: '操作', fixed: 'right'}
                    ]],
                    toolbar         : '#bar',
                    cellMinWidth    : 100,
                    id              : 'comPersonOperateLog',
                    height          : 'full-150',
                    page            : true,
                    limit           : 10,
                    limits          : [10, 50, 100, 150, 200],
                    parseData       : function(res) {
                        return {
                            'code'  : res.status === 200 ? 0 : res.status,  // 解析接口状态
                            'msg'   : res.message,                          // 解析提示文本
                            'count' : res.data.recordsTotal,                // 解析数据长度
                            'data'  : res.data.records,                     // 解析数据列表
                            'page'  : res.data.pageNum,                     // 当前页
                            'limit' : res.data.pageSize,                    // 每页条数
                        }
                    },
                    request: {
                        pageName    : 'pageNum',    // 页码的参数名称，默认：page
                        limitName   : 'pageSize'    // 每页数据量的参数名，默认：limit
                    }
                });
            };

            // 初始化表格
            loaderTable();
            // 监听头部新增按钮
            table.on('toolbar(comPersonOperateLog)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'back') {
                    parent.layer.closeAll();
                }
            });

            // 监听行内按钮
            table.on('tool(comPersonOperateLog)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    form.val('add-filter', datas);
                    layer.open({
                        type: 1,
                        title: '修改',
                        content: $('#add-comPersonOperateLog'),
                        skin: '',
                        area: ['400px', '400px']
                    });
                } else if (obj.event === 'del') {
                    layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                        $.ajax({
                            type: 'get',
                            url: kjpt_url + 'comPersonOperateLog/deleted',
                            data: {
                                keyId: datas.keyId
                            },
                            contentType: 'application/json;charset=UTF-8',
                            dataType: 'json',
                            success: function (res) {
                                if (res.status === 200) {
                                    layer.msg("删除成功");
                                    table.reload('comPersonOperateLog');
                                }
                            }
                        });
                        layer.msg("删除成功");
                    });
                }
            });

            /* form表单相关操作 */
            // 新增/修改表单提交
            form.on('submit(submit)', function (data) {
                // 用于判断是新增还是修改
                var formTableId = $("#add-comPersonOperateLog input[name='keyId']").val();
                var datas = JSON.stringify(data.field);
                var URL;
                if (formTableId === '' || formTableId === null) {
                    // 走新增逻辑
                    URL = kjpt_url + 'comPersonOperateLog/save';
                } else {
                    // 走修改逻辑
                    URL = kjpt_url + 'comPersonOperateLog/update';
                }
                $.ajax({
                    type: 'post',
                    url: URL,
                    data: datas,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        layer.msg("修改成功");
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
            });

            // 鼠标悬停提示特效
            $("#hint").hover(function () {
                openMsg();
            }, function () {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
            }

        });

    </script>
</body>
</html>
