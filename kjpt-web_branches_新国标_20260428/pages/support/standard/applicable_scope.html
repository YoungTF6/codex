<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>适用医院及职称</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>

    <!-- 工具 -->
    <script type="text/javascript" src="/js/base64.js"></script>
    <script type="text/javascript" src="/js/tools/urlTools.js"></script>
    <script type="text/javascript" src="/js/tools/form_validation_tool.js"></script>

    <style>
        .layui-card-body.layui_body_box {
            /* padding: 0 !important; */
            padding-top: 25px !important;
        }
        /* .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        } */

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .table_toolbar_right {
            float: right;
            position: relative;
            right: -120px;
        }

        .layui-fluid .layui-form-label{
            width: 90px;
        }
        .layui-fluid .layui-input-block {
            margin-left: 120px;
        }
        .layui-textarea {
            resize: none;
        }
    </style>
</head>

<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <div class="layui-card-body layui_body_box">
                <div class="layui-form-item">
                    <label class="layui-form-label">序号</label>
                    <div class="layui-input-block">
                        <input type="text" id="standNo" class="layui-input" readonly>
                    </div>
                </div>
                <div class="layui-form-item layui-form-text">
                    <label class="layui-form-label">标准适用医院</label>
                    <div class="layui-input-block">
                        <textarea id="hospital-level" class="layui-textarea" readonly
                                style="min-height: 40px;"></textarea>
                    </div>
                </div>
                <div class="layui-form-item layui-form-text">
                    <label class="layui-form-label">标准适用职称</label>
                    <div class="layui-input-block">
                        <textarea id="title" class="layui-textarea" readonly
                                style="min-height: 190px;"></textarea>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <script type="text/javascript">
        const cmePassStandardId = getQueryString('cmePassStandardId'),
              standNo           = getQueryString('standNo');


        layui.config({
            base : '/js/layui/ext/'
        }).extend({
            excel : 'excel'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer'], function () {
            var table   = layui.table,
                form    = layui.form,
                $       = layui.jquery,
                layer   = layui.layer;


            /* 页面初始化 */
            $(() => {
                let msg        = '<span style="color: #666666;">&nbsp;正在查询&nbsp;···</span>',
                    load_index = layer.msg(msg, { icon: 16, shade: 0.3, time: 0 });
                            //    = layer.load(2, { shade: 0.3 });

                // 序号
                $('#standNo').val(standNo);

                // 适用医院及职称
                axios({
                    method       : 'get',
                    url          : huayi_sjwh_url + 'cmePassStandard/scope/' + cmePassStandardId,
                    responseType : 'json'
                }).then(res => {
                    if (res.status == 200 && res.data.status == 200) {
                        let hospitalLevelList = res.data.data.hospitalLevel,
                            titleList         = res.data.data.title,
                            hospitalLevel     = '',
                            title             = '';
                        for (let i = 0; i < hospitalLevelList.length; i++) {
                            if (strTool.isNotBlank(hospitalLevelList[i])) {
                                hospitalLevel += hospitalLevelList[i] + '，';
                            }
                        }
                        if (hospitalLevel.length > 0) {
                            hospitalLevel = hospitalLevel.substring(0, hospitalLevel.length - 1);
                            $('#hospital-level').val(hospitalLevel);
                        }
                        for (let i = 0; i < titleList.length; i++) {
                            if (strTool.isNotBlank(titleList[i])) {
                                title += titleList[i] + '，';
                            }
                        }
                        if (title.length > 0) {
                            title = title.substring(0, title.length - 1);
                            $('#title').val(title);
                        }
                        layer.close(load_index);
                    } else {
                        layer.close(load_index);
                        layer.msg('获取适用医院及职称失败', { icon : 2, time: 1000 });
                    }
                }).catch(error => {
                    layer.close(load_index);
                    layer.msg('获取适用医院及职称异常', { icon : 7, time: 1000 });
                    console.log(error);
                });

                // 表格初始化
                // loaderTable();
            });

        });
    </script>
</body>

</html>
