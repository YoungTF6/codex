<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>人员状态套标准管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <link rel="stylesheet" href="/js/layui-v2.6.4/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <!--<link rel="stylesheet" href="/css/layui/ext/eleTree.css">-->
    <link rel="stylesheet" href="/css/communal.css">
    <link rel="stylesheet" href="/css/icon.css">

    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script src='/js/jquery-3.5.1.min.js'></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/tools/form_validation_tool.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>

    <script src="/js/common.js"></script>
</head>
<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <!-- 搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <!-- <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form"> -->

                    <div class="layui-inline">
                        <label class="layui-form-label" style="width: 100px;">人员状态套标准</label>
                        <div class="layui-input-block" style="margin-left: 131px;">
                            <span >
                                <input type="text"  id="personStateDescriptionSerach" placeholder="请输入"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div>

                    <div class="layui-inline" style="padding-left: 20px;">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                            lay-filter="table-search" data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
            </div>

            <!-- 表格区域-->
            <div class="layui-card-body content-right">
                <table class="layui-table" id="personStateStandard" lay-filter="personStateStandard" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>

    
    <!--        添加弹窗-->
    <div id="addPersonStateStandard" style=" display:none;">
        <form class="layui-form" style="padding: 30px;" id="form-addPersonStateStandard" lay-filter="add-filter">
            <div class="layui-form-item" style="display: none;">
                <div class="layui-inline">
                    <label class="layui-form-label"></label>
                    <div class="layui-input-block">
                        <input type="text" name="personStateStandardId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>

            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">人员状态套标准描述</label>
                    <div class="layui-input-inline" style="width: 400px;">
                        <input type="text" name="personStateDescription" id="personStateDescription" autocomplete="off" class="layui-input" placeholder="请输入" lay-verify="required">
                    </div>
                </div>
            </div>
            
            <div class="layui-form-item" id="submitAndResetTeach">
                <div style="text-align: center;">
                    <button class="layui-btn" lay-submit lay-filter="submitTeach">提交</button>
                    <button id="resetBtn" type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>

        </form>
    </div>

    <!-- 头部工具 -->
    <script type="text/html" id="addPersonStateStandardBar">
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="addPersonStateStandard" type="button">添加</button>
    </script>

    <script type="text/html" id="rowBar">
        <a class="layui-btn layui-btn-xs btn-row" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs btn-row" style="color:red;" lay-event="del">删除</a>
    </script>
    <script type="text/javascript">

        let standardKindIdObj = {};
        var unitMainId, userMobile, unitUserId, deptUnitId, deptId;

        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            eleTree: 'eleTree'
        }).use([ 'table', 'form', 'eleTree' ], function () {
            var table   = layui.table,
                form    = layui.form,
                $       = layui.jquery,
                layer   = layui.layer,
                eleTree = layui.eleTree;

            var eleTreeDept = null,
                unitId      = CurrentUser.getUnitId(),
                rootKey     = ''; // 虚拟root节点deptId

            /* 表格配置 */
            window.loaderTable = function () {
                var standardKindSearch = $('#standardKindSearch').val();
                var searchValue = $("#keyword").val();
                var fieldValue = $("#fieldValue").val();
              
                var searchDatas = {unitId : unitId};
                
                table.render({
                    elem: '#personStateStandard',
                    url: huayi_sjwh_url + 'cmePersonStateStandard/standardList',
                    title: '用户表',
                    where: {
                        // cmeStandardKindIds: strTool.isBlank(standardKindSearch) ? standardkindId : standardKindSearch,
                        // unitName: $('#unitName').val(),
                        // keywordColumn: $("#select_column").val(),
                        personStateDescription: $("#personStateDescriptionSerach").val(),
                    },
                    cols: [[
                            { align: 'center', minWidth: 80,width: 130, toolbar: '#rowBar', title: '操作' },
                            {field: 'standardDescription', title: '套', minWidth: 100, align: 'center'},
                            {field: 'personStateDescription', title: '描述', minWidth: 100},
                            // {field: 'addTime', title: '添加时间', minWidth: 180, align: 'center'}
                        ]],
                    cellMinWidth: 80,
                    id: "personStateStandard",
                    toolbar: "#addPersonStateStandardBar",
                    defaultToolbar: [],
                    height: 'full-155',
                    page: false,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if (res.status == 200) {
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "data": res.data, //解析数据列表
                            }
                        } else {
                            layer.msg(res.msg);
                            return false;
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            // 监听头部新增按钮
            table.on('toolbar(personStateStandard)', function (obj) {
                document.getElementById("form-addPersonStateStandard").reset();
                if (obj.event == "addPersonStateStandard") {
                    addPersonStateStandardIndex = layer.open({
                        type: 1,
                        title: '新增人员状态套标准',
                        content: $('#addPersonStateStandard'),
                        skin: '',
                        area: ['710px', '80%'],
                    });
                }

            });

            // 监听行内按钮
            table.on('tool(personStateStandard)', function (obj) {
                var datas = obj.data;

                if (obj.event === 'edit') {
                    form.val('add-filter', datas);

                    layer.open({
                        type: 1,
                        title: '编辑',
                        content: $('#addPersonStateStandard'),
                        skin: '',
                        area: ['710px', '80%'],
                    });
                }else if (obj.event === 'del') {
                    layer.confirm('确认删除?', { icon: 3, title: '提示' }, function () {
                        $.ajax({
                            url: huayi_sjwh_url + 'cmePersonStateStandard/deleted?personStateStandardId=' + datas.personStateStandardId,
                            type: 'get',
                            dataType: 'json',
                            contentType: 'application/json;charset=UTF-8',
                            success: function (res) {
                                if (res.status == 200) {
                                    layui.layer.closeAll();
                                    $('#searchBtn').click();
                                    layer.msg('删除成功')
                                } else {
                                    layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
                                        time: 1000, //1s后自动关闭
                                        end: function (o) {
                                            layui.layer.closeAll();
                                        }
                                    });
                                }
                            },
                            error: function (req, msg) {
                                layui.layer.msg('系统繁忙，请稍后重试', {
                                    time: 1000, //1s后自动关闭
                                    end: function (o) {
                                        layui.layer.closeAll();
                                    }
                                });
                            }
                        });
                    })
                }
            });

            // 提交人员状态套标准信息
            form.on('submit(submitTeach)', function (data) {

                // 用于判断是新增还是修改
                var formTableId = $('#form-addPersonStateStandard input[name=\"personStateStandardId\"]').val();
                var URL = huayi_sjwh_url + 'cmePersonStateStandard/';
                var datas = data.field;
                datas.description = datas.personStateDescription;

                var flag = formTableId === null || formTableId === '';
                if (flag) {     // 走新增逻辑
                    URL += 'save';
                } else {        // 走修改逻辑
                    URL += 'update';
                }
                axios({
                    method: 'post',
                    url: URL,
                    data: JSON.stringify(datas),
                    headers: { 'Content-Type': 'application/json;charset=UTF-8' }
                }).then(response => {
                    if (response.status == 200 && response.data.status == 200) {

                        layer.closeAll();
                        layer.msg('操作成功');

                        loaderTable();
                    } else {
                        layer.msg(response.data.msg);
                    }
                }).catch(err => {
                    layer.msg('网络异常，请稍后再试');
                });
                return false;

            });

           
            //公共ajax
            let commonAjax = function (type = "get", url, data, failFun, successFun) {
                $.ajax({
                    type: type,
                    url: url,
                    data: data,
                    success: function (res) {
                        if (res.status != 200) {
                            layer.msg(res.msg);
                            return;
                        }
                        successFun(res);
                    },
                    error: function (res) {
                        failFun();
                    }
                });
            }

             // 初始化函数
            layer.ready(function () {
            })
        });

       

    </script>
</body>
</html>
