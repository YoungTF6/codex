<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>达标年度管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>

</head>

<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card">
            <!-- 搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                <div class="layui-inline">
                    <label class="layui-form-label">年度</label>
                    <div class="layui-input-block">
                        <input type="text" id="cmeYearSelect" placeholder="请输入年度" autocomplete="off"
                            class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm btn-search" id="searchBtn" onclick="loaderTable()"
                        lay-filter="table-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
                    </a>
                </div>
                </blockquote>
            </div>

            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="cmeYear" lay-filter="cmeYear" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>

            <!-- 添加/编辑弹窗 -->
            <div id="add-cmeYear" style="display: none; text-align: center;">
                <form class="layui-form" style="padding: 30px;" id="form-cmeYear" lay-filter="add-filter">
                    <div class="layui-form-item" style="display: none;">
                        <div class="layui-inline">
                            <label class="layui-form-label"></label>
                            <div class="layui-input-block">
                                <input type="text" name="cmeYearId" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <div class="layui-inline" style="display: block;">
                            <label class="layui-form-label">年度</label>
                            <div class="layui-input-inline">
                                <select name="cmeYear" id="cmeYearAdd" lay-filter="cmeYearAdd">
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <div class="layui-inline" style="display: block;">
                            <label class="layui-form-label" style="padding: 9px 10px;width: 90px;">起始日期</label>
                            <div class="layui-input-inline">
                                <input type="text" name="startDate" id="startDate" autocomplete="off"
                                    class="layui-input" placeholder="请选择" lay-verify="required">
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <div class="layui-inline" style="display: block;">
                            <label class="layui-form-label" style="padding: 9px 10px;width: 90px;">截止日期</label>
                            <div class="layui-input-inline">
                                <input type="text" name="endDate" id="endDate" autocomplete="off" class="layui-input"
                                    placeholder="请选择" lay-verify="required">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <div class="layui-input-block" style="margin-left: 0%;">
                                <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

    <!-- 表头新增按钮 -->
    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm" lay-event="add">
            <!-- <i class="layui-icon">&#xe654;</i> -->
            新增</a>
            <span style="padding-left: 40%; color: blue;font-size: larger;">当前套: {{localStorage.getItem("choose-standard-name")}}</span>
        </script>
    <!-- 表格内数据编辑、删除按钮 -->
    <script type="text/html" id="rowBar">
        <a class="layui-btn layui-btn-xs btn-row" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs btn-row" style="color:red;" lay-event="del">删除</a>
    </script>
<script type="text/javascript" src="js/standard.js"></script>
<script>
        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            xmSelect: 'xm-select'
        });

        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'jquery', 'layer', 'xmSelect', 'laydate'], function () {
            var table = layui.table,
                form = layui.form,
                $ = layui.jquery,
                layer = layui.layer,
                xmSelec = layui.xmSelect;
            let laydate = layui.laydate;


            laydate.render({
                elem: '#startDate',
                type: 'date'
            });
            laydate.render({
                elem: '#endDate',
                type: 'date'
            });
            /** 表格相关操作 */
            // 表格配置
            window.loaderTable = function () {
                if(!chooseStandard()) return;

                table.render({
                    elem: '#cmeYear',
                    url: huayi_sjwh_url + 'cmeYear',
                    headers: {
                        'Authorization': localStorage.getItem('token'),
                        'KJPT-USER-ID': localStorage.getItem('user-id')
                    },
                    title: '用户表',
                    defaultToolbar: [],
                    where: {
                        cmeYear: $('#cmeYearSelect').val(),
                        cmeStandardKindId: localStorage.getItem('choose-standard-id')
                    },
                    cols: [[
                        { type: 'numbers', title: '序号' },
                        { align: 'center', minWidth: 150, toolbar: '#rowBar', title: '操作' },
                        { field: 'cmeYear', title: '年度', sort: true, minWidth: 180 },
                        { field: 'startDate', title: '起始日期', sort: true, minWidth: 180 },
                        { field: 'endDate', title: '截止日期', sort: true, align: 'center', minWidth: 130 },
                    ]],
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: 'cmeYear',
                    height: 'full-155',
                    page: false,
                    parseData: function (res) {
                        if (res.status == 200) {
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "data": res.data, //解析数据列表
                            }
                        } else {
                            layer.msg(res.msg);
                            return false;
                        }
                    },
                    request: {
                        pageName: 'pageNum',    // 页码的参数名称，默认：page
                        limitName: 'pageSize'    // 每页数据量的参数名，默认：limit
                    }
                });
            };

            // 监听头部新增按钮
            table.on('toolbar(cmeYear)', function (obj) {
                var datas = obj.data;
                document.getElementById("form-cmeYear").reset();

                if (obj.event === 'add') {
                    // 加载年度下拉框
                    var date = new Date();
                    var year = date.getFullYear();
                    var lastYear = year + 10;
                    var options = '<option>请选择</option>';
                    for (var i = 0; i < 20; i++) {
                        options += '<option value="' + lastYear + '">' + lastYear + '年</option>';
                        lastYear = lastYear - 1;
                    }
                    $('#cmeYearAdd').append(options);
                    form.render('select');
                    layer.open({
                        type: 1,
                        title: '新增套标准',
                        content: $('#add-cmeYear'),
                        skin: '',
                        area: ['500px', '400px'],
                    });
                }
            });

            // 监听行内按钮
            table.on('tool(cmeYear)', function (obj) {
                var datas = obj.data;

                if (obj.event === 'edit') {
                    // 加载年度下拉框
                    var date = new Date();
                    var year = date.getFullYear();
                    var lastYear = year + 10;
                    var options = '<option>请选择</option>';
                    for (var i = 0; i < 20; i++) {
                        options += '<option value="' + lastYear + '">' + lastYear + '年</option>';
                        lastYear = lastYear - 1;
                    }
                    $('#cmeYearAdd').append(options);
                    form.render('select');
                    form.val('add-filter', datas);

                    layer.open({
                        type: 1,
                        title: '编辑',
                        content: $('#add-cmeYear'),
                        skin: '',
                        area: ['500px', '400px'],
                    });
                }
                else if (obj.event === 'del') {
                    layer.confirm('确认删除该年度?', { icon: 3, title: '提示' }, function () {
                        $.ajax({
                            url: huayi_sjwh_url + 'cmeYear/deleted?personStateId=' + datas.cmeYearId,
                            type: 'get',
                            dataType: 'json',
                            contentType: 'application/json;charset=UTF-8',
                            success: function (res) {
                                if (res.status == 200) {
                                    layui.layer.closeAll();
                                    $('#searchBtn').click();
                                    layer.msg('删除成功')
                                } else {
                                    layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
                                        time: 1000, //1s后自动关闭
                                        end: function (o) {
                                            layui.layer.closeAll();
                                        }
                                    });
                                }
                            },
                            error: function (req, msg) {
                                layui.layer.msg('系统繁忙，请稍后重试', {
                                    time: 1000, //1s后自动关闭
                                    end: function (o) {
                                        layui.layer.closeAll();
                                    }
                                });
                            }
                        });
                    })
                }
            });



            /** form 表单相关操作 */
            // 新增/修改表单提交
            form.on('submit(submit)', function (data) {

                // 用于判断是新增还是修改
                var formTableId = $('#add-cmeYear input[name=\"cmeYearId\"]').val();
                var URL = huayi_sjwh_url + 'cmeYear/';
                var datas = data.field;

                // 开关默认值
                if (datas.ifRealtimeComputePass == null || datas.ifRealtimeComputePass == '') {
                    datas.ifRealtimeComputePass = 0;
                }
                datas.cmeStandardKindId = localStorage.getItem('choose-standard-id');

                var flag = formTableId === null || formTableId === '';
                if (flag) {     // 走新增逻辑
                    URL += 'save';
                } else {        // 走修改逻辑
                    URL += 'update';
                }
                axios({
                    method: 'post',
                    url: URL,
                    data: JSON.stringify(datas),
                    headers: { 'Content-Type': 'application/json;charset=UTF-8' }
                }).then(response => {
                    if (response.status == 200 && response.data.status == 200) {

                        layer.closeAll();
                        layer.msg('操作成功');

                        loaderTable();
                    } else {
                        layer.msg(response.data.msg);
                    }
                }).catch(err => {
                    layer.msg('网络异常，请稍后再试');
                });
                return false;
            });

            // layer.ready(function () {
            //     if (localStorage.getItem('choose-standard-id')) {
            //         loaderTable();
            //     } else {
            //         layer.msg('请选择套标准')
            //     }
            // })

        });

    </script>

</body>

</html>
