<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>考勤明细</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <style>
        .layui-table-tool-temp {
            padding-right: 0px;
        }
    </style>

</head>

<body>

    <div class="layui-card">
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="searchDiv" lay-filter="searchDiv"
            style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">请选择批次</label>
                        <div class="layui-input-block">
                            <select name="batchSelect" id="batchSelect" lay-filter="batchSelect">
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">请选择课程</label>
                        <div class="layui-input-block">
                            <select name="teachSelect" id="teachSelect" lay-filter="teachSelect">
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">查询项</label>
                        <div class="layui-input-block">
                            <span style="width:130px;display:inline-block;">
                                <select id="select_column">
                                    <option value="personName">姓名</option>
                                    <option value="mobile">手机号</option>
                                    <option value="certId">身份证号</option>
                                    <option value="personNo">医通卡</option>
                                </select>
                            </span>
                            <span style="width:140px;display:inline-block;">
                                <input type="text" name="description" id="text_value" placeholder="请输入"
                                    autocomplete="off" class="layui-input">
                            </span>
                        </div>
                    </div>
                    <div class="layui-inline" style="padding-left: 10px;">
                        <a class="layui-btn layui-btn-sm" lay-submit lay-filter="LAY-app-order-search"
                            onclick="renderTable()">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
                </div>
                <div class="layui_display">
                    
                </div>
            </div>

        </div>
        <!--    表格栏-->
        <div class="layui-card" style="text-align: center">
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="effectiveStaff" lay-filter="effectiveStaff_filter"
                    style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>
</body>

<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="effectivAttendance">考勤详情</a>
</script>

<script type="text/html" id="bar">
    <!-- <button class="layui-btn layui-btn-sm btnRounded" lay-event="excel" style="float: right;">导出考勤明细</button> -->
</script>

<script>
    var teachId = getUrlParam("teachId");
    var downId = getUrlParam("downId");
    var projId = getUrlParam("projId");
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        excel: 'excel'
    }).use(['table', 'form', 'laydate', 'excel'], function () {
        var table = layui.table;
        var excel = layui.excel;
        var form = layui.form;

        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    if (res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }

        // 项目批次
        let batchSelect = function () {
            commonAjax('get', huayi_projectscore_url + 'cmeProjPosDownload/getListForProj?projId=' + projId, {},
                function () { layer.msg("批次加载失败"); },
                function (res) {
                    let options = '<option value="" > 请选择批次 </option>';
                    for (let tempObj of res.data) {
                        options += '<option value="' + tempObj.downId + '">第' + tempObj.batch + '批次</option>';
                    }
                    $('#batchSelect').append(options);
                    form.render('select');
                });
        }
        let teachSelect = function (downId) {
            commonAjax('get', huayi_projectscore_url + 'cmeCmeProjTeach/getCourcesByDownId?downId=' + downId, {},
                function () { layer.msg("批次加载失败"); },
                function (res) {
                    let options = '<option value="" > 请选择课程 </option>';
                    for (let tempObj of res.data) {
                        options += '<option value="' + tempObj.teachId + '">' + tempObj.teachSubject + '</option>';
                    }
                    $('#teachSelect').append(options);
                    form.render('select');
                });
        }
        batchSelect();//套初始化
        form.on('select(batchSelect)', function (data) {
            console.log(data.value); //得到被选中的值
            if (!data.value) {
                layer.msg('请选择批次')
            } else {
                teachSelect(data.value);
            }
        });

        window.renderTable = function () {
            downId = $('#batchSelect').val();
            if (!downId) {
                layer.msg('请选择批次');
                return false;
            }
            teachId = $('#teachSelect').val();
            // if (!teachId) {
            //     layer.msg('请选择课程');
            //     return false;
            // }
            var personName = '', personNo = '', mobile = '', certId = '';
            var select_column = $('#select_column').val();
            var text_value = $('#text_value').val();
            if (select_column == 'personName') {
                personName = text_value;
            } else if (select_column == 'personNo') {
                personNo = text_value;
            } else if (select_column == 'mobile') {
                mobile = text_value;
            } else if (select_column == 'certId') {
                certId = text_value;
            }

            table.render({
                method: 'post',
                elem: '#effectiveStaff',
                title: '考勤时间列表',
                url: huayi_projectscore_url + 'cmeProjAttendance/attendanceAnalysis',
                where: {
                    personName: personName,
                    personNo: personNo,
                    mobile: mobile,
                    certId: certId,
                    teachId: teachId,
                    downId: downId,
                },
                defaultToolbar: [],
                cols: [[
                    // { align: 'center', type: 'checkbox', title: '选择' },
                    { field: 'comPersonId', align: 'center', width: 250, title: '主键', hide: true },
                    { field: 'personName', align: 'center', width: 120, title: '姓名', },
                    { field: 'personNo', align: 'center', width: 150, title: '人员编号' },
                    { field: 'unitName', align: 'center', title: '所在单位' },
                    { field: 'deptName', align: 'center', title: '科室' },
                    { field: 'titleName', align: 'center', title: '职称' },
                    { align: 'center', title: '考勤信息', templet: '#rowBar' },
                ]],
                cellMinWidth: 100,
                id: "effectiveStaffTable",
                // height: 360,
                page: false,
                toolbar: '#bar',
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
            })
        }
        // renderTable();

        // （行内按钮）查看考勤详细信息
        table.on('tool(effectiveStaff_filter)', function (obj) {
            var comPersonId = obj.data.comPersonId;
            teachId = $('#teachSelect').val();
            if (obj.event === 'effectivAttendance') {
                layer.open({
                    title: '考勤详细信息',
                    content: '/pages/project/giving/attendanceInfo.html?comPersonId=' + comPersonId 
                                + '&projTeachId=' + teachId + '&downId=' + downId + "&type=1",
                    type: 2,
                    area: ['500px', '300px'],
                })
            }
            effectiveStaffList();
        })

        table.on('toolbar(effectiveStaff_filter)', function (obj) {
            if (obj.event === 'excel') {
                var index = layer.load(1);
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + '/attendance/exportExcel',
                    contentType: 'application/json;charset=UTF-8',
                    data: { 'teachId': teachId, 'projectType': "1", 'exportType': '1' },
                    dataType: 'json',
                    success: function (res) {
                        var data = res.data;
                        data = excel.filterExportData(data, [
                            'userName',
                            'personNo',
                            'sex',
                            'unitName',
                            'deptName',
                            'titleName',
                            'attendanceAddress',
                            'attendanceDate'

                        ]);
                        data.unshift({ userName: '人员姓名', personNo: '人员编号', sex: '性别', unitName: '所属单位', deptName: '科室', titleName: '职称', attendanceAddress: '考勤地点', attendanceDate: '考勤时间' });
                        excel.exportExcel(data, '考勤明细.xlsx', 'xlsx');
                        layer.close(index)
                    },
                    error: function () {
                        layer.close(index)
                        layer.msg("发送请求失败");
                    }
                })
            }
        })
    })
</script>

</html>
