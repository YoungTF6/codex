<script>
    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool',
    });

    layui.use(['table', 'form', 'element', 'upload', 'laydate', 'tool'], function () {
        var table = layui.table, form = layui.form, $ = layui.jquery, tool = layui.tool;
        var laydate = layui.laydate, element = layui.element, upload = layui.upload;
        window.layer = layui.layer;
        window.loading;
        window.ajaxNum = 0;
        myUnitId = tool.getParamFromUrl("unitId");
        var approvalIndex;//审批意见弹窗
        var isSubmit = 0;//是否可以提交
        var nowFeedbackInfoId, year=new Date().getFullYear(), nowProjectId, nowDownId, cmeStandardKindId;
        let userStandardkindId = localStorage.getItem("standardkind-id");
        let userUnitId = localStorage.getItem("unit-id");
        let unitUserType = localStorage.getItem("unit-user-type");
        let tempDeptId = (userType == 13) ? myDeptId : "";
        let tempUnitId = (userType == 12) ? myUnitId : "";
        var windowIndex;//单前弹窗
        let configName1 = "fun_feedback_file_upload",configName2="fun_feedback_tab",configName3="fun_feedback_proj_field",configName4="fun_feedback_is_analyse",configName5="fun_feedback_show_notice",configName6="fun_feedback_inspect";
        let configMap = {};
        let fileUpObj = [{"fileName":"会议通知和议程","require":false,"fileType":1},
            {"fileName":"会议现场照片","require":false,"fileType":2},
            {"fileName":"学员签到表","require":false,"fileType":3},
            {"fileName":"考试考题","require":false,"fileType":4},
            {"fileName":"执行情况反馈表","require":false,"fileType":5}];
        let showProjInfo = [{name:"projName",value:"项目名称:"},
            {name:"projNo",value:"项目编号:"},
            {name:"unitName",value:"填报单位:"},
            {name:"studyAddress",value:"举办地点:"},
            {name:"startDt",value:"开始时间:"},
            {name:"endDt",value:"结束时间"}];
        let reqInfoObj = [{name:"trainAnalyse",value:"实际培训效果分析:"},{name:"questionSuggest",value:"存在的问题和建议:"}];
        let flowArr = [],allFile,nowApprovalState;

        //关闭closeLoading的判断
        let closeLoading = function () {
            ajaxNum--;
            if (ajaxNum <= 0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function () {
            if (ajaxNum == 0) loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
            ajaxNum++;
        }

        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    closeLoading();
                    if(res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }

        // 表格配置
        let loaderTable = function (projectId) {
            table.render({
                elem: '#implementation',
                url: huayi_projectscore_url + 'cmeProjFeedbackApproval/getApplyFeedbacks',
                method: 'post',
                where: {
                    projectId: projectId,
                    unitId  :   tempUnitId,
                    deptId  :   tempDeptId
                },
                cols: [[
                    { align: 'center', width: 170, toolbar: '#rowBar', title: '操作', fixed: 'left' },
                    { field: 'status', title: '审批步骤', sort: true, align: 'center', toolbar: '#viewBar' , fixed: 'left' },
                    {
                        field: 'index', title: "举办批次", sort: true, align: 'center', templet: function (data) {
                            return "第" + data["batch"] + "批次";
                        }
                    },
                    { field: 'projNo', title: '项目编号', sort: true, align: 'center' },
                    { field: 'projName', title: '项目名称', sort: true, align: 'center' },
                    { field: 'startDt', title: '开始日期', sort: true, align: 'center' },
                    { field: 'endDt', title: '结束日期', sort: true, align: 'center' },
                    { field: 'status', title: '审核状态', sort: true, align: 'center',
                        templet: function (data) {
                            if (!data.hasOwnProperty("checkState")) return "未申请";
                            let state = data.checkState;
                            if (tool.isEmpty(state)) return "未反馈";
                            if (!tool.isEmpty(data.unitApprovalState )) {
                                if (data.unitApprovalState == 1) return "已退回";
                                if (data.unitApprovalState == 2) return "审批不通过";
                                if (data.unitApprovalState == 3) return "审批通过";
                                if (data.unitApprovalState == 4) return "审核中";
                            }
                            if (state == 0) return "未审核";
                            if (state == 1) return "已退回";
                            if (state == 2) return "审批不通过";
                            if (state == 3) return "审批通过";
                            if (state == 4) return "审核中";
                            return "未反馈";
                        }
                    },
                    { field: 'approvalContent', title: '审核意见', sort: true, align: 'center',templet: function (d) {
                        if(d.checkState==3 || tool.isEmpty(d.approvalContent)) return "";
                        return d.approvalContent;
                    } }
                ]],
                cellMinWidth: 100,
                id: "implementation",
                height: 'full-50',
                page: false,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "data": res.data, //解析数据列表
                    }
                },
                done: function (res, curr, count) {
                    let holdTipIndex = null;
                    $(".oprateSpan[data-holdqualification='false']").each(function (i, e) {
                        let id = "#" + $(this).attr("id");
                        $(e).parents("tr").mouseenter(function () {
                            holdTipIndex = layer.tips('该周期因逾期未举办或其他原因，已被取消举办资格,详情请咨询上级主管部门', id, {
                                tips: [2, '#78BA32']
                            });
                        })
                    });
                }
            });
        };

        //ajax获取配置信息
        let getTabConfig = function () {
            let tempConfigUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${myUnitId}&configNames=${configName1}&configNames=${configName2}&configNames=${configName3}&configNames=${configName4}&configNames=${configName5}&configNames=${configName6}`;
            commonAjax("post",tempConfigUrl,{},function(){},
                function(res) {
                    if(res.status == 200) {
                        configMap = res.data;
                        createFeedback(res.data);
                    }else{
                        layer.msg("加载配置信息失败");
                    }
                }
            )
        }

        //处理tab页，该可能是配置获得的，需要动态构建
        let createFeedback = function (datas) {
            //构建tab页
            let tabArr = tool.createFeedbackTab(datas,1,configName2,configName6);
            //第一页分析必填项构建
            tool.createFeedbackAnalyse(datas,reqInfoObj,configName4);
            //构建图片上传页
            if(tabArr.indexOf(2) > 0 || tabArr.indexOf("2") > 0) {
                fileUpObj = tool.createFeedbackImgUp(datas,fileUpObj,configName1);
                fileUpload();//文件上传按钮监听
            }
        }

        let createApplyFile = function() {
            let tempUrl = huayi_projectscore_url + `/cmeProjCycleApplication/getFilesByDownId`;
            commonAjax("post", tempUrl, { downId: nowDownId }, function () { },
            function (res) {
                if(res.status != 200) return;
                if(tool.isEmpty(res.data)) return;
                let tempConfig = tool.isEmpty(configMap[configName5])? "0" : configMap[configName5];
                if(tempConfig==0 || tempConfig=="0") return;
                let tempHtml = `<div class="file-upload-box">
                    <span class="file-title">会议通知及日程</span>
                    <ul>`;
                for(let tempObj of res.data){
                    tempHtml += `<li><a class="layui-btn layui-btn-xs btn-normal-row js-file-name" msg="${tempObj.fileName}" filepath="${tempObj.filePath}" onmouseover="mouseoverImageName(this)" onmouseout="mouseoutImageName(this)" onclick="downloadFeedFile(this)">${tempObj.fileName}</a></li>`;
                }
                tempHtml += `</ul></div>`;
                $("#projCycleFile").html(tempHtml);
            });
        }
        //给项目反馈信息赋值
        let createProjectTab = function (datas) {
            let propertyObj = { "trainAnalyse": ".js-trainAnalyse", "questionSuggest": ".js-questionSuggest", "textbookWorks": ".js-textbook-works", "textbookType": "#textbookType", "coursePeriod": ".js-course-period", "writeTime": ".js-write-time", "writeUnitPeople": ".js-textbook-unit", "textbookName": ".js-teaxtbook-name", "textbookSummary": ".js-textbook-summarize" };
            for (const key in propertyObj) {
                if (datas != null && datas.hasOwnProperty(key) != null && $(propertyObj[key]).length > 0) {
                    $(propertyObj[key]).val(datas[key]);
                }
            }
            form.render('select');
            nowFeedbackInfoId = (tool.isEmpty(datas) || tool.isEmpty(datas['feedbackInfoId'])) ? "" : datas["feedbackInfoId"];
        }
        //创建项目上传图片的tab页
        let createImageTab = function (datas,event) {
            //ajax请求获取该页面的数据
            let hiddenHtml = (isSubmit == 0) ? " js-hidden " : "";
            if (isSubmit == 0 && event != "approval") {
                $(".js-choose-file").addClass("js-hidden");
                $(".js-upload-btn-box").addClass("js-hidden");
            } else {
                $(".js-choose-file").removeClass("js-hidden");
                $(".js-upload-btn-box").removeClass("js-hidden");
            }
            if (datas == null) return;
            //图片渲染
            for (let i = 0; i < datas.length; i++) {
                if($(`.js-feedback${datas[i].fileType}`).length==0) continue;
                let htmlText = `<li file-id="${datas[i]["feedbackFileId"]}">` +
                    `<a class="layui-btn layui-btn-xs btn-normal-row js-file-name" msg="${datas[i]["fileName"]}" filePath="${datas[i]["filePath"]}" onmouseover="mouseoverImageName(this)" onmouseout="mouseoutImageName(this)" onclick="downloadFeedFile(this)">${datas[i]["fileName"]}</a>` +
                    `<a class="layui-btn layui-btn-xs btn-danger-row ${hiddenHtml}" onclick="deleteImage(this)">移除</a></li>`;
                $(`.js-feedback${datas[i].fileType}`).append(htmlText);
            }
            //图片渲染

        }

        //按钮点击事件
        let bindBtnClick = function () {
            let approvalType = 0;
            //上一页
            $('.js-last').click(function () {
                let liElems = $('.js-tabs').children();
                for (let i = 0; i < liElems.length; i++) {
                    if (liElems[i].classList.contains("layui-this")) {
                        liElems[i - 1].click();
                        break;
                    }
                }
            })
            //下一页
            $('.js-next').click(function () {
                let liElems = $('.js-tabs').children();
                for (let i = 0; i < liElems.length; i++) {
                    if (liElems[i].classList.contains("layui-this")) {
                        liElems[i + 1].click();
                        break;
                    }
                }
            })
            //点击保存
            $('.js-submit').click(function () {
                //先识别那个表单
                let dataType = "";
                let liElems = $('.js-tabs').children();
                for (let i = 0; i < liElems.length; i++) {
                    if (liElems[i].classList.contains("layui-this")) {
                        dataType = liElems[i].getAttribute("data-type");
                        break;
                    }
                }
                submitForm();
            })
            //反馈数据
            $('.js-apply').click(function () { submitForm(2); })
            $('.js-pass').click(function(){
                approvalType = unitUserType*10 +3;
                nowApprovalState = 3;
                let tempScore = $(".check-score").val();
                let tempPeriod = $(".check-period").val();
                if(tempScore) {
                    if(isNaN(tempScore)||tempScore<=0) {
                        layer.msg("请填入正确的学分");
                        return;
                    }
                }
                if(tempPeriod) {
                    if(isNaN(tempPeriod)||tempPeriod<=0) {
                        layer.msg("请填入正确的学时");
                        return;
                    }
                }
                openApprovalTextWindow("审批意见",$('#approvalText'),['500px', '280px']);
