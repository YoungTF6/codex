<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>菜单树</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="shortcut icon" th:href="@{/static/images/huayi1.jpg}" type="image/x-icon"/>
    <link rel="stylesheet" th:href="@{/static/css/font.css}">
    <script type="text/javascript" th:src="@{/static/js/jquery.js}"></script>
    <script th:src="@{/static/layui/layui.js}" charset="utf-8"></script>
    <script type="text/javascript" th:src="@{/static/js/xadmin.js}"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <link rel="stylesheet" th:href="@{/static/ztree/css/demo.css}" type="text/css">
    <link rel="stylesheet" href="../../css/ztree/metroStyle.css" type="text/css">
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
<script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script type="text/javascript" src="../../js/jquery.ztree.core.js"></script>
    <script type="text/javascript" src="../../js/jquery.ztree.excheck.js"></script>
    <script type="text/javascript" src="../../js/jquery.ztree.exedit.js"></script>
    <style>
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f6f6f6;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #aaa;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #747474;
        }

        ::-webkit-scrollbar-corner {
            background: #f6f6f6;
        }

        .layui-table-cell { /*最后的pic为字段的field*/
            height: 100%;
            max-width: 100%;
        }

        /*IE*/
        * {
            scrollbar-arrow-color: #ccc;
            /*三角箭头的颜色*/
            scrollbar-face-color: #ddd;
            /*立体滚动条的颜色*/
            scrollbar-3dlight-color: #fff;
            /*立体滚动条亮边的颜色*/
            scrollbar-highlight-color: #fff;
            /*滚动条空白部分的颜色*/
            scrollbar-shadow-color: #fff;
            /*立体滚动条阴影的颜色*/
            scrollbar-darkshadow-color: #fff;
            /*立体滚动条强阴影的颜色*/
            scrollbar-track-color: #fff;
            /*立体滚动条背景颜色*/
            scrollbar-base-color: #fff;
            /*滚动条的基本颜色*/
        }
    </style>
</head>


<body>

<form class="layui-form">
    <div class="layui-form-item">
        <label class="layui-form-label">选择权限</label>
        <div class="layui-input-block">
            <div id="LAY-auth-tree-index"></div>
        </div>
    </div>
    <div class="layui-form-item">
        <div class="layui-input-block">
            <button class="layui-btn" type="submit" lay-submit lay-filter="LAY-auth-tree-submit">提交</button>
            <button class="layui-btn layui-btn-primary" type="reset">重置</button>
        </div>
    </div>
</form>


<script src="../../js/index.js"></script>
<script>
    layui.config({
        base: '../../js/authTree/'
    }).extend({
        authtree: 'authtree'
    }).use(['authtree'], function () {
        var authtree=layui.authtree;


        // 添加也填充父级菜单下拉框
        $().ready(function () {
            $.ajax({
                url: 'http://localhost:8082/commenu/list',
                success: function (res) {
                    debugger;
                    var trees=[];
                        var menuTree=res.data;
                        console.log(menuTree);
                    var list=[{menuId: '1',menuName: '页面一', parentMenuId:'0'}
                        ,{menuId: '2',menuName: '页面二', parentMenuId:'1'}
                        ,{menuId: '3',menuName: '页面三', parentMenuId:'0'}]
                    trees = authtree.listConvert(list, {
                            primaryKey: 'menuId'
                            ,parentKey: 'parentMenuId'
                            ,nameKey: 'menuName'
                            ,valueKey: 'menuId'
                        ,startPid: '0'
                        });

                        authtree.render('#LAY-auth-tree-index', trees, {
                            inputname: 'menuId',
                            layfilter: 'lay-check-auth',
                            autowidth: true,
                            openall: true
                        });


                }
            });
        });

    });

</script>

</body>

</html>
