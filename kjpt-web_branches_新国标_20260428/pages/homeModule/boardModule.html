<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>驾驶舱模块</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <style>
        #addBoardModule .layui-inline {
            width: 80%;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                <div class="layui-inline">
                    <label class="layui-form-label">模块名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="moduleName" id="moduleNameSearch" placeholder="请填写模块名称" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm btn-search" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
                    </a>
                </div>
            </blockquote>
        </div>

        <!--表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="boardModuleTable" lay-filter="boardModuleTable" style="margin: 0px 0px;"></table>
        </div>

        <!-- 添加弹窗-->
        <div id="addBoardModule" style=" display:none;text-align: center">
            <form class="layui-form" style="padding: 30px;" id="boardModuleForm" lay-filter="add-filter">
                <input type="hidden" name="moduleId" autocomplete="off" class="layui-input">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>模板名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="moduleName" placeholder="请填写模板名称" autocomplete="off" class="layui-input" lay-verify="moduleName">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">模板标题</label>
                        <div class="layui-input-block">
                            <input type="text" name="moduleTitle" placeholder="请填写模板标题" autocomplete="off" class="layui-input" lay-verify="moduleTitle">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">模板副标题</label>
                        <div class="layui-input-block">
                            <input type="text" name="moduleSubhead" placeholder="请填写模板副标题" autocomplete="off" class="layui-input" lay-verify="moduleSubhead">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>模板编码</label>
                        <div class="layui-input-block">
                            <input type="text" name="moduleCode" placeholder="请填写模板编码" autocomplete="off" class="layui-input" lay-verify="moduleCode">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>宽度</label>
                        <div class="layui-input-block">
                            <input type="number" name="moduleWidth" placeholder="请填写模块宽度" autocomplete="off" class="layui-input" lay-verify="moduleWidth">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>高度</label>
                        <div class="layui-input-block">
                            <input type="number" name="moduleHeight" placeholder="请填写模块高度" autocomplete="off" class="layui-input" lay-verify="moduleHeight">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>模板构建类型</label>
                        <div class="layui-input-block">
                            <input type="number" name="moduleType" placeholder="请填写模板构建类型" autocomplete="off" class="layui-input" lay-verify="moduleType">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">模板tab的标题</label>
                        <div class="layui-input-block">
                            <input type="text" name="tabTitle" id="tabTitleForm" placeholder="请填写模板tab展示的标题" autocomplete="off" class="layui-input" lay-verify="tabTitle">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">模板跳转url</label>
                        <div class="layui-input-block">
                            <input type="text" name="moduleUrl" id="moduleUrlForm" placeholder="请填写模板跳转url" autocomplete="off" class="layui-input" lay-verify="moduleUrl">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">remark</label>
                        <div class="layui-input-block">
                            <textarea name="remark" placeholder="请填写备注" class="layui-textarea" placeholder="请填写备注" autocomplete="off" lay-verify="remark"></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit lay-filter="submit">提交</button>
                    </div>
                </div>
            </form>
        </div>
        
    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a>
</script>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="add">添加</a>
</script>
<script>
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        tool        :   'tool'
    });

    layui.use(['table', 'form','tool'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery;
        var layer = layui.layer,tool=layui.tool;

        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#boardModuleTable',
                url: huayi_sjwh_url + 'boardModule/list',
                title: '配置字典表',
                defaultToolbar: [],
                where: {
                    moduleName: $('#moduleNameSearch').val(),
                },
                cols: [[
                    {align: 'center',width: 120,toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    {field: 'moduleName', title: '模块名称',align: 'center'},
                    {field: 'moduleTitle', title: '模块标题',align: 'center'},
                    {field: 'moduleSubhead', title: '模块副标题',align: 'center'},
                    {field: 'moduleCode', title: '模块编码',align: 'center'},
                    {field: 'moduleWidth', title: '模块宽度',align: 'center'},
                    {field: 'moduleHeight', title: '模块高度',align: 'center'}, 
                    {field: 'moduleType', title: '模块类型',align: 'center'},
                    {field: 'tabTitle', title: '模块tab标题',align: 'center'},
                    {field: 'moduleUrl', title: '模块url',align: 'center'},
                    {field: 'remark', title: '备注',align: 'center'},
                    // {field: 'addTime', title: '创建时间',align: 'center'},
                ]],
                toolbar: '#bar',
                id: "boardModule",
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done:function(res,curr,count){
                    curr > 1 && res.data.length === 0 && loaderTable();
                }
            });
        };

        // 监听头部新增按钮
        table.on('toolbar(boardModuleTable)', function (obj) {
            if(obj.event != "add") return;
            openFormWindow();
        });

        // 监听行内按钮
        table.on('tool(boardModuleTable)', function (obj) {
            obj.event == "edit" && openFormWindow(obj.data);
            obj.event == "del" && deleteModel(obj.data.moduleId);
        });

        //新增，编辑时打开弹窗
        let openFormWindow = function(data=""){
            const title = (data=="") ? "新增":"修改";
            if(data=="") $("#addBoardModule input[name='moduleId']").val('');
            form.val("add-filter",data);
            layer.open({
                type: 1,
                title: title,
                content: $('#addBoardModule'),
                area: ['600px', '80%'],
                cancel: function(index, layero){ $("#boardModuleForm")[0].reset(); }
            })
        }

        let deleteModel = function(moduleId){
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                $.ajax({
                    type: 'get',
                    url: huayi_sjwh_url + 'boardModule/deleted',
                    data: { moduleId: moduleId },
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.status === 200) {
                            layer.msg("删除成功");
                            loaderTable();
                        }else{
                            layer.msg(res.msg);
                        }
                    }
                });
            })
        }

        // form表单相关操作
        // 新增/修改表单提交
        form.on('submit(submit)', function (data) {
            var moduleId = $("#boardModuleForm input[name='moduleId']").val();
            let URL = huayi_sjwh_url + 'boardModule/update';
            if(moduleId=="" || moduleId==null) {
                URL = huayi_sjwh_url + 'boardModule/save';
            }
            $.ajax({
                type: 'post',
                url: URL,
                data:JSON.stringify(data.field),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.status == 200){
                        layer.closeAll();
                        loaderTable();
                        $("#boardModuleForm")[0].reset()
                        layer.msg("保存成功");
                    }else{
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            return false;
        });

        //自定义验证规则
        form.verify({
            moduleName : function(value){
                if(tool.isEmpty(value)) return '模板名称不能为空';
                if(value.length > 70) return '模板名称不能超过70个字符';
            },
            moduleTitle: function(value){
                if(!tool.isEmpty(value) && value.length > 70) return '模板标题不能超过70个字符';
            },
            moduleSubhead: function(value) {
                if(!tool.isEmpty(value) && value.length > 40)  return '模板标题不能超过40个字符';
            },
            moduleCode : function(value){
                if(tool.isEmpty(value)) return '模板编码不能为空';
                if(value.length > 40) return '模板编码不能超过40个字符';
            },
            moduleWidth: function(value){
                if(value.length == 0) return '模板宽度不能为空';
                if(!Number.isInteger(Number(value))) return '模板宽度只能输入整数';
            },
            moduleHeight: function(value){
                if(value.length == 0) return '模板高度不能为空';
                if(!Number.isInteger(Number(value))) return '模板高度只能输入整数';
            },
            moduleType: function(value){
                if(value.length == 0) return '模板类型不能为空';
                if(!Number.isInteger(Number(value))) return '模板类型只能输入整数';
            },
            moduleUrl: function(value){
                if(!tool.isEmpty(value)) {
                    if(value.length > 120) return '模板tab标题不能超过120个字符';  
                } else {
                    let tabTitle = document.getElementById("tabTitleForm").value;
                    if(!tool.isEmpty(tabTitle))  return '模板url不为空时,tab标题不能为空';
                }
            },
            tabTitle: function(value) {
                if(!tool.isEmpty(value)){
                    if(value.length > 40) return '模板tab标题不能超过40个字符';
                } else {
                    let moduleUrl = document.getElementById("moduleUrlForm").value;
                    if(!tool.isEmpty(moduleUrl)) return '模板标题不为空时,模板url不能为空';
                }
            },
            remark: function(value) {
                if(!tool.isEmpty(value) && value.length  >120) return '备注不能超过120个字符';
            }
        });

        //页面初始化，通过查看参数是否都在来进行是否加载页面ed646370-a5f3-4f88-a640-d62fda36c4b8
        let htmlInit = function(){
            loaderTable();
        }

        htmlInit();

    });

</script>
</body>
</html>
