<script>
    layui.use(['table', 'layer', 'form','laypage'], function () {
        var table = layui.table;
        var form=layui.form;
        var $=layui.jquery;
        var laypage=layui.laypage;


        window.renderTable = function () {
            // 表格数据渲染
            var tableIns=table.render({
                elem: '#typeTable',
                url: huayi_sjwh_url+'cmegrantscorestandard',
                title: '课程类型列表',
                defaultToolbar: [],
                // initSort: {
                //     field: 'rank' //排序字段，对应 cols 设定的各字段名
                //     ,type: 'asc' //排序方式  asc: 升序、desc: 降序、null: 默认排序
                // },
                //
                where: {topunitId: $('#top_unit_id').val(), parama: $('#selectName').val(), title: $('#titlea').val(), grantscoreStandardId: $('#grantscore_standard_id').val()},
                cols: [[
                    {field: 'rank', title: '序号', width: 80, fixed: 'left', templet: '#rank',align:"center"},
                    // {field: 'id', width: 80, fixed: 'left', title: '序号'},
                    {field: 'topUnitId', width: 150, align: 'center', fixed: 'left', title: '套标准id', hide: true},
                    {field: 'grantscoreStandardId', width: 150, align: 'center', fixed: 'left', title: '授分标准id', hide: true},
                    {field: 'name', width: 200, fixed: 'left', title: '授分标准名称'},
                    {field: 'description', width: 200, title: '授分标准规定'},
                    {
                        field: 'kind', align: 'center', title: '类型', templet:
                            function (d) {
                                if (d.kind == '01') {
                                    return '成员';
                                } else {
                                    return '数量';
                                }
                            }
                    },
                    {field: 'type', align: 'center', title: '学分级别'},
                    {field: 'unitName', align: 'center', title: '单元名称'},
                    {field: 'unitNum', align: 'center', title: '单元数量'},
                    {field: 'unitScore', align: 'center', title: '单元学分'},
                    {field: 'unitMaxscore', align: 'center', title: '最高限分'},
                    {field: 'score1', align: 'center', title: '分1'},
                    {field: 'score2', align: 'center', title: '分2'},
                    {field: 'score3', align: 'center', title: '分3'},
                    {field: 'order1', align: 'center', title: '成员1'},
                    {field: 'order2', align: 'center', title: '成员2'},
                    {field: 'order3', align: 'center', title: '成员3'},
                    {align: 'center', width: 250, fixed: 'right', width: 180, toolbar: '#barDemo', title: '操作'}
                ]],
                toolbar: '#barDemo1',
                cellMinWidth: 100,
                id: "typeTable",
                height: 'full-155',
                page: true,
                limit: 30,
                limits: [10, 20, 30, 40, 200],
                parseData: function (res) {
                    return {
                        "code": res.code, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.total, //解析数据长度
                        "data": res.data.records //解析数据列表
                    }

                }
            });
        }
        // 查询按钮执行方法
        renderTable();

        // 主页及弹出页查询套标准下拉框
        $().ready(function () {
            // 加载套标准下拉框
           $.ajax({
               url: huayi_sjwh_url+'cmestandardkind',
               success: function (res) {
                   if (res.data.length>0) {
                       for (var i = 0; i < res.data.length; i++) {
                           $('#formCmeStandardKindId').append("<option value=\"" + res.data[i].cmeStandardKindId + "\">" + res.data[i].description + "</option>");
                           $('#grantscore_standard_id').append("<option value=\"" + res.data[i].cmeStandardKindId + "\">" + res.data[i].description + "</option>");
                           layui.form.render("select");
                       }
                   }else{

                   }
               }
           });

        });

        // 主页选择套标准时，更新单位下拉框信息。
        form.on('select(grantscore_standard_id_filter)',function (data) {

            if(data.value!=null && data.value!=''){
                var datas={'cmeStandardKindId': data.value}
                $('#top_unit_id').find("option").remove();
                $.ajax({
                    url: huayi_personorg_url+'comunit',
                    data: datas,
                    contentType:'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.data.length>0) {
                            for (var i = 0; i < res.data.length; i++) {
                                $('#top_unit_id').append("<option value=\"" + res.data[i].topUnitId + "\">" + res.data[i].unitName + "</option>");
                                $('#formCmeStandardKindId option[value='+data.value+']').attr("selected",true);
                                layui.form.render("select");
                            }
                        }else{
                            layui.form.render("select");
                        }
                    }
                })
            }else{
                $('#top_unit_id').find("option").remove();
                $('#top_unit_id').append("<option value=\"\">无数据</option>");
                $('#grantscoreStandardId').find("option").remove();
                $('#grantscoreStandardId').append("<option value=\"\">无数据</option>");
                layui.form.render("select");
            }

        })


        // 弹出框选择套标准时重新渲染单位树
        form.on('select(formCmeStandardKindId)',function (data) {
            if(data.value!=null && data.value!=''){
                var datas={'grantscore_standard_id': data.value}
                $('#topUnitid').find("option").remove();
                $.ajax({
                    url: huayi_personorg_url+'comunit',
                    data: datas,
                    contentType:'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.data.length>0) {
                            for (var i = 0; i < res.data.length; i++) {
                                $('#topUnitid').append("<option value=\"" + res.data[i].topUnitId + "\">" + res.data[i].unitName + "</option>");
                                // $('#formCmeStandardKindId option[value='+data.value+']').attr("selected",true);
                                layui.form.render("select");
                            }

<script>


    var zTreeObj;
    // zTree 的参数配置，深入使用请参考 API 文档（setting 配置详解）
    var setting = {
        // 可视界面相关配置
        view: {
            selectedMulti: false , //设置是否能同时选中多个节点
            showIcon: false, //设置是否显示图标
            showLine: true, //设置是否显示节点与节点之间的连线
            showTitle: true, //设置是否显示节点的title显示信息
        },
        // 数据相关配置
        data: {
            // simpleData: true,
            // idKey: 'unitId',
            // pIdKey: 'parentUnit',
            // rootPId: null,

        },
        // 复选框相关配置
        check: {
            enable: true, //是否显示radio/checkbox
            autoCheckTrigger: false,
            chkStyle: "radio",//值为checkbox或者radio表示
            radioType:"all",
            chkboxType: {"Y": "", "N": ""}//表示父子节点的联动效果，不联动
        },
        // 各类事件的回调函数配置
        callback: {
            // 点击节点时触发函数，加载子节点。
            onClick: onClickThisNode,
        },
        // 异步加载配置
        async: {
            // enable: true,
            // url: huayi_sjwh_url+'comunit/tree',
            // autoParam: [],

        },
        // 编辑配置
        edit: {

        },
    };
    // zTree 的数据属性，深入使用请参考 API 文档（zTreeNode 节点数据详解）
    var zNodes = [];

    var datas=[];


    // 点击input框弹出单位选择框
    $('#topUnitId').click(function () {

        $.ajax({
            url: huayi_personorg_url+'comunit/tree',
            data:{"unit_id": '',"cme_standard_kind_id" :$('#formCmeStandardKindId').val()},
            // contentType:'application/json;charset=UTF-8',
            // dataType: 'json',
            success: function (res) {
                if(res.data.length>0){
                    for(var i=0;i<res.data.length-1;i++){
                        var a={name: res.data[i].unitName,open:false,id: res.data[i].unitId}
                        zNodes.push(a);
                    }
                }
                layer.open({
                    type: 1,
                    content: $('#topUnitIds-open'),
                    title: '选择单位',
                    area:['400px','300px'],
                    btn: ['确定','取消'],
                    // 弹出成功后渲染第一层单位
                    success: function(layero, index){
                        $.fn.zTree.init($("#test2"), setting, zNodes);
                    },
                    // 点击确定按钮时，将选中的单位unit_id赋值给input框 并关闭当前层弹窗
                    btn1: function () {
                        var objs=$.fn.zTree.getZTreeObj("test2").getCheckedNodes(true);
                        $('#topUnitId').val(objs[0].id);
                        layer.close(layer.index);
                    },
                    // 点击取消按钮时执行相关语句
                    btn2: function () {
                        layer.close(layer.index);
                    }
                })
            }
        });
    });

    // 点击单位树节点时查询当前节点的子节点并渲染
    function onClickThisNode(event ,treeId, treeNode) {
        var objsa=$.fn.zTree.getZTreeObj(treeId);
        var node = objsa.getNodeByTId(treeNode.tId);
        if(!node.children) {
            $.ajax({
                url: huayi_sjwh_url+'comunit/tree',
                data:{"unit_id": treeNode.id,"cme_standard_kind_id": $('#formCmeStandardKindId').val()},
                success: function (res) {
                    if(res.data.length>0){
                        for(var i=0;i<res.data.length-1;i++){
                            var a={name: res.data[i].unitName, id: res.data[i].unitId}
                            datas.push(a);
                        }
                    }
                    objsa.addNodes(treeNode,0,datas,false);
                    datas=[];
                }
            })
        }
    }
</script>
