<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>学分审核不通过意见</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <style>
        #remark textarea[name=reason] {
            width: 500px;
            height: 200px;
            resize: none;
        }

        #remark select[name=reason2] {
            width: 500px;
        }
    </style>
</head>

<body>
    <div id="remark" class="layui-form layui-card" id="queryArea" style="background-color: #f5f5f5;height:100%">
        <div class="layui-card-body">
            
            <div class="layui-form-item layui-col-md6">
                <label class="layui-form-label">选择</label>
                <div class="layui-input-block" style="width:500px;">
                    <select name="reason2" lay-filter="reason_sel">
                        <option id="default_option" value="" disabled selected>选择在“系统设置及信息浏览->审核意见维护”菜单填写的“审核不通过”意见</option>

                    </select>
                </div>
            </div>

            <div class="layui-form-item layui-col-md6">
                <label class="layui-form-label"><span style="color: red; ">*</span>意见</label>
                <div class="layui-input-block">
                    <textarea type="text" name="reason" placeholder="请输入（最多200字）" autocomplete="off" class="layui-input"></textarea>
                </div>

            </div>


            <div class="layui-form-item">
                <div style="text-align: center;">
                    <button class="layui-btn  layui-btn-primary" id="btnCancel">取消
                    </button>
                    <button class="layui-btn" id="btnConfirm">确定
                    </button>
                </div>

            </div>
        </div>

    </div>
</body>

</html>
<script>

    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        myTable: 'table'
    }).use(['table', 'form', 'myTable', 'laydate', 'laytpl'], function () {
        var form = layui.form;
        var $ = layui.jquery;
        let checkStatus =  getUrlParam('checkStatus');

        function getCheckReason(checkStatus) {
            $.ajax({
                url: huayi_sjwh_url + "cmeCheckReason",
                type: "get",
                data: { state: checkStatus, phase: 3, unitId: localStorage.getItem("unit-id") },
                success: function (res) {
                    if (res.success) {
                        $("[name='reason2'] option:gt(0)").remove();
                        res.data.forEach((d) => {
                            $("[name='reason2']").append("<option value='" + d.reason + "'>" + d.reason + "</option>")
                        })
                        form.render();
                    }
                }
            });
        }

        function closeSelf() {
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index);
        }

        $("#btnCancel").click(function () {
            parent.CheckStatusDTOs = [];
            closeSelf();
        });

        $("#btnConfirm").click(function () {
            parent.check(checkStatus, $("[name='reason']").val());
            closeSelf();
        });

        form.on("select(reason_sel)", function (data) {
            // if (data.value != '') {
                $("[name='reason']").val(data.value);
            // }
        });


        $(function () {
            getCheckReason(checkStatus);
        });


    });







</script>
