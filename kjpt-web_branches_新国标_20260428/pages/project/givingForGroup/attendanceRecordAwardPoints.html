    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row"  lay-event="exportAttendance">导出EXECL</a>
    <label style="font-size:15px;float: right;padding-right: 40%;color: #1E9FFF;" id="peopleScoreTitle"></label>

<script>

    var projectId=getUrlParam("projectId");
    var downId=getUrlParam("downId");
    var projectType=getUrlParam("projectType")
    var startDate=getUrlParam("startDate")
    var endDate=getUrlParam("endDate")
    var cmeStandardKindId = localStorage.getItem("standardkind-id");
    var btnFilterScorePerson = document.getElementById("btnFilterScorePerson");
    if (btnFilterScorePerson) btnFilterScorePerson.textContent = (cmeStandardKindId === StandardKind.GUANG_DONG) ? "筛选预授分人员" : "筛选授分人员";
    // 全局配置及引入相关的模块
    layui.config({
            base: '../../../js/layui/ext/'
        }).extend({
            myTable: 'table',
            excel: 'excel'
        })
        .use(['form', 'laydate','myTable', 'excel'], function () {
        var table = layui.myTable;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate=layui.laydate;
        var excel =layui.excel;
        var checkedPersonIds = [], isReload = false, checkedTableInfo = new Map();
        var allTeachData = null;

        table.render({
            elem: '#teachList',
            url: huayi_projectscore_url + 'giving/getTeachList',
            title: '课程列表',
            defaultToolbar: [],
            where: {
                downId: downId,
                projectType: projectType
            },
            cols: [[
                // {align: 'center', width: 150, toolbar: '#rowBar1', title: '主讲人授分'},
                {align: 'center', toolbar: '#rowBar4', title: '考勤明细'},
                {align: 'center', width: 150, toolbar: '#rowBar', title: '考勤分析'},
                {align: 'center', toolbar: '#rowBar3',title: '考勤有效人员'},
                {field: 'teachId',align: 'center', title: '课程主键',hide: true},
                {field: 'teachName',align: 'center', title: '课程题目', },
                {field: 'teacherName',align: 'center', title: '授课教师', },
                {field: 'score', align: 'center',title: '学分',hide: true },
                {field: 'period',align: 'center', title: '学时', },
                {field: 'countResult', align: 'center',title: '考勤是否已分析',hide: true},
                {field: 'countSingleproj',align: 'center', title: '教师是否已授分', hide: true},
            ]],
            cellMinWidth: 100,
            id: "teachListTable",
            page: false,
            limit: 10,
            limits: [10, 50, 100, 150, 200],
            parseData: function (res) {
                return {
                    "code": res.status === 200 ? 0 : res.status, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "data": res.data, //解析数据列表
                }

            },
            request: {
                pageName: 'pageNum', //页码的参数名称，默认：page
                limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
        })

        // 监听行内按钮
        table.on('tool(teachListFilter)',function (obj) {
            if (obj.event === 'pendingPointsForStudent' || obj.event === 'analyzedForStudent'){
                layer.open({
                    // 考勤分析页面
                    closeBtn  : false,
                    title: false,
                    type: 2,
                    content: 'attendanceAnalysis.html?teachId='+obj.data.teachId+'&projectType='+projectType+'&downId='+downId,
                    area: ['100%', '100%'],
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }else if (obj.event === 'pendingPointsForTeach' || obj.event === 'awarded') {
                layer.open({
                    // 教师授分页面
                    type: 2,
                    content: 'GivingForTeachers.html?teachId='+obj.data.teachId+'&downId='+downId+'&projectType='+projectType,
                    area: ['100%', '100%'],
                    title: '给讲师授分页面',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }else if (obj.event === 'effectivAttendance'){
                layer.open({
                    // 查看课程下有效授分人员页面
                    type: 2,
                    content: 'teachIdAttendanceResult.html?teachId='+obj.data.teachId+'&downId='+downId+'&projectType='+projectType+'&startDate='+startDate+'&endDate='+endDate,
                    area: ['100%', '100%'],
                    title: '考勤有效人员',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })

            }else if (obj.event === 'attendanceList'){
                layer.open({
                    type: 2,
                    content: 'attendanceDetails.html?teachId='+obj.data.teachId+'&downId='+downId+'&projectType=2',
                    area: ['100%', '100%'],
                    title: '考勤人员列表',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }

        })

        // 按钮{已完成全部课程考勤分析，进入下一步}
        window.creditAnalysisFunction =function () {
            $("#creditAnalysisDiv").show();
            aaaaa();
        }
         // 返回考勤周期页面
        window.closeMyMSG = function(){
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭 
        }
        // 授分有效人员列表
        window.aaaaa=function() {
            var data1 = form.val("searchForQualifiedPersonnel");
            $.ajax({
                type 		: 'GET',
                contentType : 'application/json',
                url 		: huayi_projectscore_url + 'giving/givingForDownId',
                data 		: {
                    projectType:projectType,
                    downId: downId,
                    creditStrategy: $('#creditStrategy_id').val(),
                    evaluationResults: $('#evaluationResults_id').val(),
                    passResult: $('#passResult_id').val(),
                    personName: $('#personName_id').val(),
                    unitName: $('#unitName_id').val(),
                    deptName: $('#deptName_id').val(),
                    titleName: $('#titleName_id').val(),
                    attendanceAddress: $('#attendanceAddress_id').val(),
                    personSpecName: $('#personSpecName_id').val(),
                    studyDate: $("#creditStrategyDate_ids").val(),
                },
                success 	: (res) => {
                    if (res.status == 200) {
                        allTeachData = res.data;
                        allTeachData.sort(
                            function compareFunction(param1, param2) {
                                let sortIndex = param1.personName.localeCompare(param2.personName, 'zh-Hans-CN', {sensitivity: 'accent'});
                                return sortIndex;
                            }
                        );
                        initTeachTable(res.data);
                    }else {
                        layer.msg(res.msg)
                    }
                },
                error       :  (XMLHttpRequest, textStatus, errorThrown) => {
                    layer.msg("请求失败")
                }
            })
            
        }

        let initTeachTable = function(data) {
            table.render({
                elem: '#creditAnalysis',
                data: data,
                title: '符合授分人员',
                defaultToolbar: [],
                toolbar: '#rowBar6',
                cols: [[
                    {align: 'center', type: 'checkbox', title: '选择'},
                    {field: 'personId',align: 'center', width: 250, title: '主键',hide: true},
                    {field: 'personNo',align: 'center', width: 120, title: '人员编号',hide: false},
                    {field: 'personName',align: 'center', width: 120, title: '姓名', sort: true},
                    {field: 'unitName', align: 'center', title: '所在单位', sort: true},
                    {field: 'deptName', align: 'center', title: '科室', sort: true},
                    {field: 'titleName', align: 'center', title: '职称', sort: true},
                    {field: 'posTime', align: 'center', title: '首次考勤时间', sort: true},
                    {align: 'center', title: '考勤信息', templet: '#rowBar5'},
                ]],
                cellMinWidth: 100,
                id: "comPersonIdListTable",
                page: false,
                limit: 10000,
                autoSort: false,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done : function(res, curr, count){
                    $("#peopleScoreTitle").html(`待授分人数: (${res.data.length}人)`);
                    if( checkedPersonIds != undefined ){
                        //遍历集合
                        layui.each(res.data, function(index,item){
                            //将获取的选中行数据进行遍历
                            if( checkedPersonIds.indexOf('' + item.personId + '') > -1 ){ 
                                //点击去属性 lay-id='表格id'； index：要回显的行数下标，从0开始
                                $("div[lay-id='comPersonIdListTable'] td .layui-form-checkbox").eq(index).click();
                            } 
                        });
                    }
                }
            })
        }

        table.on('sort(creditAnalysisFilter)', function(obj){
            if(allTeachData==null || allTeachData.length==0) return;
            let type = obj.type;
            allTeachData.sort(
                function compareFunction(param1, param2) {
                    let sortIndex = param1[obj.field].localeCompare(param2[obj.field], 'zh-Hans-CN', {sensitivity: 'accent'});
                    if(type=="asc") return 0-sortIndex;
                    return sortIndex;
                }
            );
            table.reload('comPersonIdListTable', {
                data:allTeachData,
                initSort: obj,
            });
        })

        //以复选框事件为例
        table.on('checkbox(creditAnalysisFilter)', function(obj){
            
            // 全选
            if(obj.type == 'all'){
                var checkStatus = table.checkStatus('comPersonIdListTable');
                if(obj.checked == true){
                    for (var i = 0; i < checkStatus.data.length; i++) {
                        let indx =  checkedPersonIds.indexOf(checkStatus.data[i].personId);
                        let indxObj =  checkedTableInfo.has(checkStatus.data[i].personId);
                        if(indx < 0 ){ 
                            // 插入选中数组
                            checkedPersonIds.push(checkStatus.data[i].personId);
                            checkedTableInfo.set(checkStatus.data[i].personId, checkStatus.data[i]);
                        }
                    }
                }else if(obj.checked == false){
                    var datas = table.cache["comPersonIdListTable"]
                    for (var i = 0; i < datas.length; i++) {
                        let indx =  checkedPersonIds.indexOf(datas[i].personId);
                        let indxObj =  checkedTableInfo.has(checkStatus.data[i].personId);
                        if(indx >= 0){ 
                            // 从选中数组中去除
                            checkedPersonIds.splice(indx, 1);
                            checkedTableInfo.delete(checkStatus.data[i].personId);
                        }
                    }
                }
            }else{
                let indx =  checkedPersonIds.indexOf(obj.data.personId);
                let indxObj =  checkedTableInfo.has(obj.data.personId);
                if(obj.checked){
                    if(indx < 0 ){ 
                        checkedPersonIds.push(obj.data.personId);
                        checkedTableInfo.set(obj.data.personId, obj.data);
                    }
                }else{
                    if(indx >= 0){ 
                        checkedPersonIds.splice(indx, 1);
                        checkedTableInfo.delete(obj.data.personId);
                    }
                }
            }
            
            // let indx =  checkedPersonIds.indexOf(obj.data.personId);
            // let indxObj =  checkedTableInfo.indexOf(obj);
            // if(obj.checked){
            //     if(indx < 0 ){ 
            //         checkedPersonIds.push(obj.data.personId);
            //         checkedTableInfo.push(obj.data);
            //     }
            // }else{
            //     if(indx >= 0){ 
            //         checkedPersonIds.splice(indx, 1);
            //         checkedTableInfo.splice(indxObj, 1);
            //     }
            // }
            var chooseBtn = $("#allChooseBtn");
            chooseBtn[0].innerHTML = '已选中(' + checkedPersonIds.length + ')人';
        });

        window.openAllChoose = function(){
            // $("#creditAnalysisCheckedDiv").show();
            layer.open({
                type: 1,
                title: '所有选中人员',
                content: $('#creditAnalysisCheckedDiv'),
                area: ['90%', '90%'],
                shadeClose: true
            });
            table.render({
                elem: '#creditAnalysisChecked',
                data: [...checkedTableInfo.values()],
                title: '符合授分人员',
                defaultToolbar: [],
                toolbar: '#rowBar6',
                cols: [[
                    {field: 'personId',align: 'center', width: 250, title: '主键',hide: true},
                    {field: 'personNo',align: 'center', width: 120, title: '人员编号',hide: false},
                    {field: 'personName',align: 'center', width: 120, title: '姓名', sort: true},
                    {field: 'unitName', align: 'center', title: '所在单位', sort: true},
                    {field: 'deptName', align: 'center', title: '科室', sort: true},
                    {field: 'titleName', align: 'center', title: '职称', sort: true},
                    {align: 'center', title: '考勤信息', templet: '#rowBar5'},
                ]],
                cellMinWidth: 100,
                id: "checkedComPersonIdListTable",
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态

        window.exportBatchAllAttendanceExcel = function (downId, projectType, personIds) {
            $.ajax({
                type: 'POST',
                contentType: 'application/json',
                url: huayi_projectscore_url + 'attendance/ExportExeclForAttendanceByDownVO',
                data: JSON.stringify({"downId": downId, "personIds": personIds, "projectType": projectType}),
                success: (data, textStatus, xhr) => {
                    if (data.status == 200) {
                        var datas = data.data
                        var showAttendanceTypeCol = datas && datas.some(function (row) {
                            var v = row.signType;
                            return v !== null && v !== undefined && v !== '';
                        });
                        var aa = ['name', 'personNo', 'unit', 'dept', 'title', 'posTime', 'appAddress', 'isPassExam', 'isEvaluation']
                        var bb = { name: '人员姓名', personNo: '人员编号', unit: '单位', dept: '科室', title: '职称', posTime: '考勤时间', appAddress: '考勤地址', isPassExam: '考试结果', isEvaluation: '评价结果'}
                        if (showAttendanceTypeCol) {
                            aa.splice(aa.indexOf('appAddress') + 1, 0, 'signTypeLabel');
                            bb.signTypeLabel = '考勤类型';
                        }
                        datas = excel.filterExportData(datas, aa);
                        datas.unshift(bb);
                        excel.exportExcel(datas, '考勤详情.xlsx', 'xlsx');
                    } else {
                        layer.msg(data.msg)
                    }
                },
                error: (XMLHttpRequest, textStatus, errorThrown) => {
                    layer.msg("请求失败")
                }
            })
        }
