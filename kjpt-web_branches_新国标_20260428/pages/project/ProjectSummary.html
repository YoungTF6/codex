    <script>
        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            selectM :   'selectM',
            eleTree :   'eleTree',
            tool    :   'tool'
        });
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element','tool'], function() {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer,tool=layui.tool;
            var element = layui.element;
            var year = $('#holdYear').val();
            var my = new Date();
            var status = -1;
            var userid= localStorage.getItem("unit-id"); 
            var pendingExportAction = null;
            const standardkindId = localStorage.getItem("standardkind-id");
            const _isGuangdong = standardkindId === "289bf0ca-52cb-4b19-b737-9bd200a69ce1"; 

            function refreshPdfExportButtons() {
                $("button[lay-event='pdf'], button[lay-event='pdf2']").toggle(_isGuangdong);
            }

            // 将constantPage.js 常量赋值给label
            $("label").each(function() {
                const name = $(this).attr("name");
                if (projectLabels[name] !== undefined) {
                    $(this).text(projectLabels[name]);
                }
            });

            window.colArray = [{
                field: 'status',
                title: '状态',
                hide: true,
               
            }];

            function getSummaryQueryParams() {
                return {
                    HoldYear: $('#holdYear').val(),
                    CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                    ProjectName: $('#projectName').val(),
                    ProjectCode: $('#projectCode').val(),
                    holdTypeId: $('#holdType').val(),
                    personName: $('#PrincipalName').val(),
                    cmeStandardKindId: localStorage.getItem("standardkind-id"),
                    userCreate: localStorage.getItem("user-id"),
                    unitId: localStorage.getItem("unit-id"),
                    status: status,
                    isPublish: $('#isPublish').val(),
                    projType : $('#ActivityType').val(),
                    scoreType : $('#ActivityContent').val(),
                    projectType : $('#projectType').val(),
                    checkStatus : $('#checkStatus').val()
                };
            }

            function getExportHeaders() {
                return {
                    "Accept": 'application/json',
                    "Authorization": localStorage.getItem("token"),
                    "KJPT-USER-ID": localStorage.getItem("user-id"),
                    "cmestandard-id": localStorage.getItem("standardkind-id")
                };
            }

            function escapeHtml(value) {
                return String(value == null ? '' : value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function escapeHtmlWithLineBreak(value) {
                return escapeHtml(value).replace(/&lt;br\s*\/?&gt;/gi, '<br>');
            }

            function formatDateText(value) {
                if (!value) {
                    return '';
                }
                var text = String(value);
                var match = text.match(/\d{4}-\d{2}-\d{2}/);
                if (match) {
                    return match[0];
                }
                match = text.match(/\d{4}\/\d{2}\/\d{2}/);
                if (match) {
                    return match[0].replace(/\//g, '-');
                }
                return text;
            }

            function getProjectPrincipalName(item) {
                return item.personName || item.principalName || item.projManager || item.projManagerName || '';
            }

            function getProjectApplyDate(item) {
                return formatDateText(item.addTime || item.dateCreate || item.applyTime || item.createTime || '');
            }

            function getProjectNature(item) {
                if (item.previousIdName || item.projectNatureName || item.projectPropertyName || item.natureName) {
                    return item.previousIdName || item.projectNatureName || item.projectPropertyName || item.natureName;
                }
                var previousId = item.previousId;
                if (previousId === undefined || previousId === null || previousId === '') {
                    previousId = item.previous_id;
                }
                if (previousId === undefined || previousId === null || previousId === '') {
                    return '新申报项目';
                }
                return '备案项目';
            }

            function getProjectScore(item) {
                return item.score == null ? '' : item.score;
            }

            function getProjectTrainNumber(item) {
                return item.number == null ? '' : item.number;
            }

            function getProjectRemark(item) {
                return item.remark || item.provincialRemark || item.provincial_remark || '';
            }

            function getProjectSummaryPdfTitle() {
                var selectedText = $('#CmeComScoreLevel option:selected').text() || '';
                return $.trim(selectedText) + '项目汇总表';
            }

            function requireScoreLevelForPdf() {
                if ($('#CmeComScoreLevel').val()) {
                    return true;
                }
                layer.alert('请选择学分分类，点击查询后进行导出。', {icon: 5});
                return false;
            }

            function openExportDialog(exportAction) {
                if(window["fun_record_info_when_export_score"]!="1"){
                    exportAction();
                    return;
                }
                pendingExportAction = exportAction;
                let index = layer.open({
                    type: 1,
                    title: '导出信息',
                    content: $('#exportBox'),
                    btn: ["下载 ", "返回 "],
                    btnAlign: 'c',
                    area: ['50%', '63%'],
                    success: function () {
                        form.val("export-form",{
                            "userPwd":"",
                            "personName":"",
                            "mobile":"",
                            "code":"",
                        });
                        $("#hasRead").prop("checked","");
                    },
                    yes: function () {
                        let check =  checkExportInput();
                        if(!check){
                            return;
                        }
                        let data = tool.getFormVal('export-form');
                        data.userId = localStorage.getItem("user-id");
                        $.ajax({
                            type:"get",
                            url: huayi_projectscore_url + "projectScoreStatistis/verifyExportInfo",
                            data:data,
                            success:function(re){
                                if(re.success==true){
                                    if (typeof pendingExportAction === 'function') {
                                        pendingExportAction();
                                    }
                                    pendingExportAction = null;
                                    layer.close(index);
                                }else{
                                    layer.alert(re.msg, {icon: 5});
                                }
                            }
                        });
                    },
                    end: function () {
                        pendingExportAction = null;
                    }
                });
            }

            function fetchProjectSummaryPage(pageNum, pageSize) {
                return axios({
                    method: 'GET',
                    url: huayi_projectscore_url + 'project/selectProjSummary',
                    headers: getExportHeaders(),
                    params: $.extend({}, getSummaryQueryParams(), {
                        pageNum: pageNum,
                        pageSize: pageSize
                    })
                }).then(function (res) {
                    return res.data || {};
                });
            }

            function fetchProjectSummaryRecords(pageNum, pageSize, result) {
                var currentPageNum = pageNum || 1;
                var currentPageSize = pageSize || 200;
                var mergedResult = result || [];
                return fetchProjectSummaryPage(currentPageNum, currentPageSize).then(function (response) {
                    if (response.status !== 200 || !response.data) {
                        return Promise.reject(response.message || '项目汇总数据获取失败');
                    }
                    var pageData = response.data || {};
                    var records = pageData.records || [];
                    var total = pageData.recordsTotal || 0;
                    var allRecords = mergedResult.concat(records);
                    if (allRecords.length < total && records.length > 0) {
                        return fetchProjectSummaryRecords(currentPageNum + 1, currentPageSize, allRecords);
                    }
                    return allRecords;
                });
            }

            function buildPdfTableRows(records, startIndex) {
                return $.map(records, function (item, index) {
                    return '' +
                        '<tr>' +
                            '<td style="width:4%;"><div class="project-summary-pdf-cell">' + escapeHtml(startIndex + index + 1) + '</div></td>' +
                            '<td style="width:10%;"><div class="project-summary-pdf-cell">' + escapeHtml(item.projectCode || '') + '</div></td>' +
                            '<td style="width:21%;"><div class="project-summary-pdf-cell text-left">' + escapeHtml(item.projectName || '') + '</div></td>' +
                            '<td style="width:9%;"><div class="project-summary-pdf-cell">' + escapeHtml(getProjectNature(item)) + '</div></td>' +
                            '<td style="width:12%;"><div class="project-summary-pdf-cell text-left">' + escapeHtml(item.unitName || '') + '</div></td>' +
                            '<td style="width:5%;"><div class="project-summary-pdf-cell">' + escapeHtml(getProjectPrincipalName(item)) + '</div></td>' +
                            '<td style="width:17%;"><div class="project-summary-pdf-cell">' + escapeHtmlWithLineBreak(item.projectbatchtime || '') + '</div></td>' +
                            '<td style="width:8%;"><div class="project-summary-pdf-cell">' + escapeHtml(item.holdPlace || '') + '</div></td>' +
                            '<td style="width:5%;"><div class="project-summary-pdf-cell">' + escapeHtml(getProjectScore(item)) + '</div></td>' +
                            '<td style="width:5%;"><div class="project-summary-pdf-cell">' + escapeHtml(getProjectTrainNumber(item)) + '</div></td>' +
                            '<td style="width:4%;"><div class="project-summary-pdf-cell">' + escapeHtml(getProjectRemark(item)) + '</div></td>' +
                        '</tr>';
                }).join('');
            }

            function buildProjectSummaryPdfPages(records) {
                var rowsPerPage = 8;
                var pageHtml = [];
                var unitName = localStorage.getItem('unit-name') || '';
                var printDate = formatDateText(new Date().toISOString().slice(0, 10));
                var title = getProjectSummaryPdfTitle();
                for (var index = 0; index < records.length; index += rowsPerPage) {
                    var pageRows = records.slice(index, index + rowsPerPage);
                    pageHtml.push('' +
                        '<div class="project-summary-pdf-page">' +
                            '<div class="project-summary-pdf-title">' + escapeHtml(title) + '</div>' +
                            '<div class="project-summary-pdf-meta">' +
                                '<span>填报单位（公章）：' + escapeHtml(unitName) + '</span>' +
                                '<span>填报日期：' + escapeHtml(printDate) + '</span>' +
                            '</div>' +
                            '<table class="project-summary-pdf-table">' +
                                '<thead>' +
                                    '<tr>' +
                                        '<th style="width:4%;">序号</th>' +
                                        '<th style="width:10%;">申请代码</th>' +

            // 可选值：clear(更清晰)、compact(更小)、balanced(平衡)
            var projectSummaryPdfRenderMode = 'clear';
            var projectSummaryPdfRenderPreset = {
                clear: { margin: 10, scale: 2.6, jpegQuality: 0.92, compression: 'MEDIUM' },
                compact: { margin: 12, scale: 2.0, jpegQuality: 0.82, compression: 'FAST' },
                balanced: { margin: 12, scale: 2.3, jpegQuality: 0.88, compression: 'MEDIUM' }
            };

            function generateProjectSummaryPdf(pageNodes) {
                var renderConfig = projectSummaryPdfRenderPreset[projectSummaryPdfRenderMode] || projectSummaryPdfRenderPreset.balanced;
                var pdf = new jsPDF('l', 'pt', 'a4');
                var pageWidth = pdf.internal.pageSize.getWidth();
                var pageHeight = pdf.internal.pageSize.getHeight();
                var margin = renderConfig.margin;
                var maxRenderWidth = pageWidth - (margin * 2);
                var maxRenderHeight = pageHeight - (margin * 2);
                var canvasScale = Math.max(1.5, renderConfig.scale);
                var sequence = Promise.resolve();
                $.each(pageNodes, function (index, node) {
                    sequence = sequence.then(function () {
                        return html2canvas(node, {
                            allowTaint: true,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            scale: canvasScale,
                            windowWidth: node.scrollWidth,
                            windowHeight: node.scrollHeight,
                            logging: false
                        }).then(function (canvas) {
                            if (index > 0) {
                                pdf.addPage();
                            }
                            var renderWidth = maxRenderWidth;
                            var renderHeight = canvas.height * renderWidth / canvas.width;
                            if (renderHeight > maxRenderHeight) {
                                renderHeight = maxRenderHeight;
                                renderWidth = canvas.width * renderHeight / canvas.height;
                            }
                            pdf.addImage(canvas.toDataURL('image/jpeg', renderConfig.jpegQuality), 'JPEG', margin, margin, renderWidth, renderHeight, undefined, renderConfig.compression);
                        });
                    });
                });
                return sequence.then(function () {
                    pdf.save('申报项目汇总表.pdf');
                });
            }

                    var pageNodes = renderProjectSummaryPdf(records);
