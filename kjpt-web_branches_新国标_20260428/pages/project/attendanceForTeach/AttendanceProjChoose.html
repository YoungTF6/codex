<script>
    var pro_id = getUrlParam("pro_id");
    // 原始的
    var initialValueBatchCount ;
    // console.log(typeof Common);
    let scoreLevel = getUrlParam('scoreLevel');
    //获取单位
    window.getUnitId = function () {
        var unitId = localStorage.getItem("unit-id");
        return unitId;
    }
    window.getCmeStandardKindId = function () {
        var cskId = localStorage.getItem("standardkind-id");
        return cskId;
    }
    var projectType = '1';

    const standardkindId = localStorage.getItem("standardkind-id");
    const isZheJiang = "190c480d-d43c-450b-8472-a6fd00a6729d" == standardkindId;

    // 全局配置及引入相关的模块
    layui.config({
        base: '../../../js'
    }).extend({
        opTable: '/opTable/opTable'
    }).use(['table', 'form', 'opTable','laydate'], function () {
        var table = layui.table;
        var form = layui.form;
        var laydate = layui.laydate; 
        var $ = layui.jquery;
        var layer = layui.layer;
        
        var cycleApplicationMsg = '';
        const HUBEI = "73ba18db-33fd-4746-ab41-9beb009f69a1";
        const GANSU = "7068a5c0-2cd3-471a-90b9-9bf100aec95a";
        const isHaiNan = "6eec6713-670a-43cc-ad4d-9bd700a92928" == standardkindId;
        var projAttendBatchArrArray = new Array(60).fill([]);

        window.isHubei = function(){
            return standardkindId.toLowerCase() == HUBEI;
        }

        /* 获取配置 */
        window.getConfig = function (configParams, scoreLevel) {
            $.ajax({
                async   : false,
                type    : 'post',
                url     : huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${window.getUnitId()}&scoreLevelId=${scoreLevel}`+configParams,
                success : function (res) {
                    if (res.success == true) {
                        configNames.forEach(e=>{
                            window[e] = res.data[e];
                        });
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error   : function () {
                    layer.msg('获取配置失败');
                }
            });
        }

        let configNames=['fun_must_apply_before_hold',
                        'fun_scope_when_proj_attendance',
                        'fun_force_scope_when_proj_attendance',
                        'range_proj_AttendType',
                        'value_qrcode_attend_mode',
                        'fun_forbid_modify_end_dt_when_feedback_submit'];
        let configParams = '';
        configNames.forEach(e=>{
            configParams+=`&configNames=${e}`;
        })
        window.getConfig(configParams, scoreLevel);
    
        window.getParentTableCols = function() {
            let cols = [
                { align: 'center', field: 'batch', toolbar: '#rowBarForDownId', title: '批次' },
                { field: 'downId', title: '下载ID 主键，也用于关联项目课程表', sort: true, hide: true },

        window.renderBatchDates = function(res,layIndex,startDt,endDt) {
        
            let datas = res.data;
            
            for(let i=0;i<datas.length;i++) {
                let batch = datas[i];
                let batchId = batch.batchId;

                function getBatchRange() {
                    // let range = {min: startDt,max: endDt};
                    let range = {min: startDt.substring(0,16) + ':00',max: endDt.substring(0,16) +  ':59'};
                    if(i == 0){
                        if(startDt.substring(0,11) != endDt.substring(0,11)) {
                            range = {min: startDt,max: startDt.substring(0,11) + '23:59:59'};
                        } 
                    }
                    if(i == datas.length -1) {
                        if(startDt.substring(0,11) != endDt.substring(0,11)) {
                            range = {min: endDt.substring(0,11) + ' 00:00:00',max: endDt};
                        } 
                    }
                    return range;
                }

                laydate.render({
                    elem: '#startDate_'+batchId,
                    type: 'datetime',
                    format: 'yyyy-MM-dd HH:mm',
                    btns: ['confirm'],
                    trigger: 'click',
                    min: getBatchRange().min,
                    max: getBatchRange().max,
                    done: function(value) {
                        batch.startDate = value;
                    } 
                });
            
                laydate.render({
                    elem: '#endDate_'+batchId,
                    type: 'datetime',
                    format: 'yyyy-MM-dd HH:mm',
                    btns: [ 'confirm'],
                    trigger: 'click',
                    min: getBatchRange().min,
                    max: getBatchRange().max,
                    done: function(value) {
                        batch.endDate = value;
                    } 
                });
            }
        }


        window.checkDateRight = function(data,downStartDt,downEndDt) {
            let batchArr = data;
            let preEndDate;
            let startDate;
            let endDate;



            for(let i=0;i<batchArr.length;i++) {
                startDate = batchArr[i].startDate;
                endDate = batchArr[i].endDate;
                if(startDate == "" || startDate == null) {
                    layer.msg("请输入第"+batchArr[i].batch+"次的开始时间",{icon: 2 });
                    return false ;
                }
                if(endDate == "" || endDate == null) {
                    layer.msg("请输入第"+batchArr[i].batch+"次的结束时间",{icon: 2 });
                    return false ;
                }
            }
            for(let i=0;i<batchArr.length;i++) {
                let startDate =  batchArr[i].startDate;
                let endDate =  batchArr[i].endDate;
                if(endDate <= startDate) {
                    layer.msg("第"+batchArr[i].batch+"次的结束时间应该大于开始时间",{icon: 2 });
                    return false ;
                }
            }
            // for(let i=0;i<batchArr.length;i++) {
            //     startDate = batchArr[i].startDate;
            //     endDate = batchArr[i].endDate;
            //     if(startDate != "" && startDate != null && endDate != "" && endDate != null) {
            //         if(new Date(startDate) > new Date(endDate)) {
            //             layer.msg("第"+batchArr[i].batch+"次的结束时间应该大于开始时间",{icon: 2 });
            //             return false ;
            //         }
            //     }
            // }
            // for(let i=1;i<batchArr.length;i++) {
            //     preEndDate = batchArr[i-1].endDate;
            //     startDate = batchArr[i].startDate;
            //     if(preEndDate != "" && preEndDate != null && startDate != "" && startDate != null) {
            //         if(new Date(preEndDate) > new Date(startDate)) {
            //             layer.msg("第"+batchArr[i].batch+"次的开始时间应该大于上一次的结束时间",{icon: 2 });
            //             return false ;
            //         }
            //    }
            // }

            for(let i=0;i<batchArr.length;i++) {
                let startDate =  batchArr[i].startDate;
                let endDate =  batchArr[i].endDate;
                for(let j=0;j<batchArr.length;j++) {
                    if(j != i) {
                        if(batchArr[j].startDate < startDate && startDate < batchArr[j].endDate) {
                            layer.msg("各个考勤批次的时间范围不能有交叉",{icon: 2 });
                            return false ;
                        }
                        if(batchArr[j].startDate < endDate && endDate < batchArr[j].endDate) {
                            layer.msg("各个考勤批次的时间范围不能有交叉",{icon: 2 });
                            return false ;
                        }
                        if(batchArr[j].startDate == startDate && batchArr[j].endDate == endDate) {
                            layer.msg("各个考勤批次的时间范围不能有交叉",{icon: 2 });
                            return false ;
                        }
                        
                    }
                }
            }

            for(let i=0;i<batchArr.length;i++) {
                startDate = batchArr[i].startDate;
                endDate = batchArr[i].endDate;
                if(startDate != "" && startDate != null && endDate != "" && endDate != null) {
                    if(new Date(startDate) < new Date(downStartDt) || new Date(startDate) > new Date(downEndDt)) {
                        layer.msg("第"+batchArr[i].batch+"次的开始时间应该在项目周期的时间范围内",{icon: 2 });
                        return false ;
                    }
                    if(new Date(endDate) < new Date(downStartDt) || new Date(endDate) > new Date(downEndDt)) {
                        layer.msg("第"+batchArr[i].batch+"次的结束时间应该在项目周期的时间范围内",{icon: 2 });
                        return false ;
                    }
                }
            }
        

            return true;
        }

        layui.table.on('tool(cmeProjPosDownload)', function (obj) {
            
            let downInfo = obj.data;

            switch(obj.event){
                case 'appProjAttend':
                        
                    
                    let batchData = JSON.parse(downInfo.attendBatchListJson);
                    if(batchData == null || batchData.length  == 0) {
                        layer.msg("数据出现问题",{icon:2});
                        return false;
                    }
                    // 统一时间格式，兼容时间戳和日期字符串
                    let parseToMillis = function (timeValue) {
                        if (timeValue === null || timeValue === undefined || timeValue === '') {
                            return timeValue;
                        }
                        if (/^\d+$/.test(String(timeValue))) {
                            return parseInt(timeValue, 10);
                        }
                        let m = moment(timeValue);
                        return m.isValid() ? m.valueOf() : NaN;
                    };
                    // 判断内层批次表是否已展开（展开时输入框会被渲染到DOM）
                    let isChildOpened = false;
                    for (let i = 0; i < batchData.length; i++) {
                        let batchId = batchData[i].batchId;
                        if ($("#startDate_" + batchId).length > 0 && $("#endDate_" + batchId).length > 0) {
                            isChildOpened = true;
                            break;
                        }
                    }
                    // 展开时校验用户当前录入值；折叠时校验数据库已保存值
                    let validateBatchData = batchData.map(item => {
                        if (isChildOpened) {
                            // 内层展开：只校验用户当前录入值
                            return {
                                ...item,
                                startDate: $("#startDate_" + item.batchId).val(),
                                endDate: $("#endDate_" + item.batchId).val()
                            };
                        }
                        // 内层折叠：只校验数据库已保存值
                        return {
                            ...item,
                            startDate: parseToMillis(item.startDate),
                            endDate: parseToMillis(item.endDate)
                        };
                    });
                    let downStartDate = parseToMillis(downInfo.startDt);
                    let downEndDate = parseToMillis(downInfo.endDt);
                    if (isNaN(downStartDate) || isNaN(downEndDate)) {
                        layer.msg("项目周期时间格式不正确",{icon:2});
                        return false;
                    }
                    if(!isChildOpened && validateBatchData.some(item => isNaN(item.startDate) || isNaN(item.endDate))) {
                        layer.msg("开始时间或结束时间格式不正确",{icon:2});
                        return false;
                    }
                    // 统一走同一套批次时间规则校验（非空、先后、不交叉、周期范围）
                    if(!checkDateRight(validateBatchData, downStartDate, downEndDate)) {
                        return false;
                    }

                    let downCanHold = true;
                    let cycleApplicationMsg = '';
                    let checkState = downInfo.projCycleApplicationCheckState;
                    console.log("fun_must_apply_before_hold:"+window['fun_must_apply_before_hold']);
                    console.log("checkState:"+checkState);
                    
                    if ('t' == window['fun_must_apply_before_hold']) {
                        
                        if('0' == checkState || null == checkState) {
                            downCanHold = false;
                            cycleApplicationMsg = '请先提交举办前申请，待审核通过后方可举办';
                        }
                        if ('4' == checkState){
                            downCanHold = false;
                            cycleApplicationMsg = '您提交的举办前申请还没有审核通过';
                        }  
                        if ('2' == checkState) {
                            downCanHold = false;
                            cycleApplicationMsg = '您提交的举办前申请审核不通过，无法举办该项目' ;
                                                // + '审核不通过原因为：' + data.checkMemo;
                        }  
                        if ('1' == checkState){
                            downCanHold = false;
                            cycleApplicationMsg = '举办前申请被退回。请重新上报并审核通过后方可举办';
                        } 
                    }
                    if ('h' == window['fun_must_apply_before_hold']) {
                        if('0' == checkState || null == checkState) {
                            downCanHold = false;
                            cycleApplicationMsg = '请先提交举办前申请，待审核通过后方可举办';
                        } 
                    } 

                     // 判断举办前申请状态
                     if (downCanHold == false && cycleApplicationMsg != ''){
                        layer.alert(cycleApplicationMsg);
                        return;
                    }

                    if(downInfo.attendBatchTime == 0) {
                        layer.msg("请先设置考勤时间",{icon:2});
                        return;
                    }

                    let attendBatchList = JSON.parse(downInfo.attendBatchListJson);
                    console.log(attendBatchList);
                    //检查当前时间是否超过了最后的考勤批次的结束时间；
                    let now = new Date();
                    for(let i = 0;i< attendBatchList.length;i++) {
                        if(attendBatchList[i].beLast) {
                            let enDate = new Date(attendBatchList[i].endDate);
                            if(now > enDate) {
                                layer.msg("当前时间已超出最后的考勤批次时间范围",{icon:2});
                                return;
                            }
                        }
                    }

                    //查找当前时间在哪个考勤批次时间范围内,如果找不到，就找最近的下一个批次范围
                    let curBatchId = null;
                    for(let i=0;i<attendBatchList.length;i++) {
                        if(now > new Date(attendBatchList[i].startDate) && now < new Date(attendBatchList[i].endDate)) {
                            curBatchId = attendBatchList[i].batchId;
                            break;
                        }
                    }
                    if(curBatchId == null) {
                        for(let i=0;i<attendBatchList.length;i++) {
                            if(i == 0) {
                                if (now < new Date(attendBatchList[0].startDate)) {
                                    curBatchId = attendBatchList[0].batchId;
                                    break;
                                }
                            } else {
                                if( now > new Date(attendBatchList[i-1].endDate) && now < new Date(attendBatchList[i].startDate) ) {
                                    curBatchId = attendBatchList[i].batchId;
                                    break;
                                }
                            }
                        }
                    }
                    layui.data('attendanceInfo', {
                        key: 'attendBatches',
                        value: attendBatchList
                    });

                    layui.data('attendanceInfo', {
                        key: 'batchId',
                        value: curBatchId
                    });

                    layui.data('attendanceInfo', {
                        key: 'projectType',
                        value: 1
                    });


                    layui.data('attendanceInfo', {
                        key: 'teachId',
                        value: downInfo.projId
                    });

                    layui.data('attendanceInfo', {
                        key: 'downId',
                        value: downInfo.downId
                    });


                    layer.open({
                        type: 1,
                        title: '考勤配置',
                        content: $('#appAttendConfig'),
                        skin: '',
                        area: ['500px', '500px'],
                        btn: ['确定', '取消'],
                        btnAlign: 'c',
                        yes: function (index, layero) {
                            handlerPersonMaxForproj(index);
                        },
                        btn2: function (index, layero) {

                        },
                        success: function (layero, index) {
                            $(".projOrTeachNameDiv").find("label").text("项目名称: ");
                            $(".projOrTeachNameDiv").find("input:text").val(downInfo.projName);
                            if(downInfo.limitPerson!=null) {
                                $("[name='limit_str']").text('该项目拟授分' + downInfo.limitPerson + '人');
                            }

                        }
                    });
                break;
            }

        });

            let htmlText = "";
            let unitId = localStorage.getItem('unit-id');
            //如果开通了设置考勤范围的功能
            if(window["fun_scope_when_proj_attendance"] == 1 ){
                let checked = (window["fun_force_scope_when_proj_attendance"] == 1) ? true : false;
                if(checked){
                    $("#address_id").show();
                }
                htmlText = `<label class="layui-form-label">设置考勤范围</label>
                    <div class="layui-input-inline">
                        <input type="radio" lay-filter="attendanceScope_filter" name="attendanceScope" value="1" title="是" ${(checked)?'checked':''} >
                        <input type="radio" lay-filter="attendanceScope_filter" name="attendanceScope" value="0" title="否" ${(!checked)?'checked':"disabled='disabled'"}>
                    </div> `;
            }
            $("#attendanceScope").html(htmlText);
        }

        //创建考勤模式，根据tao的id进行测试
        let createAttendType = function() {
            
            let attendTypes =  window["range_proj_AttendType"].split(',');
            let htmlInputs = `<label class="layui-form-label">考勤模式选择</label>
                    <div class="layui-input-inline">`; 
            let min = 1000000;
            attendTypes.forEach(e=>{
               if(e < min){
                   min = e;
               }
            });
            attendTypes.forEach(e=>{
                 let inputStr = ``;
                 let checked = (e==min)?"checked":"";
                 switch(e){
                     case "0":
                        inputStr=`<input type="radio" lay-filter="attendanceType_filter" name="attendanceType" value="0" title="二维码考勤"  ${checked}>`;
                     break;
                     case "1":
                        inputStr=`<input type="radio" lay-filter="attendanceType_filter" name="attendanceType" value="1" title="学员刷脸考勤" ${checked}>`;
                     break;
                     case "2":
                        inputStr=`<input type="radio" lay-filter="attendanceType_filter" name="attendanceType" value="2" title="单位刷脸考勤" ${checked}>`;
                     break;
                 }
                 htmlInputs += inputStr;
            });
            htmlInputs += `</div>`; 
            $("#attendType").html(`${htmlInputs}`);
        }


        let htmlInit = function() {
           
            createAttendType();//考勤模式
            createScope();//考勤范围
            form.render();
        }

        htmlInit();
    });

</script>
</body>

</html>
