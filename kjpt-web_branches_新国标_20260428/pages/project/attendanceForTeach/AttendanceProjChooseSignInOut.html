        .attend-device-select-box {

            background-color: #fff;
        }

        /* 初始给一个较小占位高度，渲染后由嵌入页 postMessage 通知后再自适应到实际内容 */
        .attend-device-iframe {
            width: 100%;
            height: 80px;
            border: 0;
            display: block;
            background-color: #fff;
        }

        .attend-device-empty {
            color: #999;
            line-height: 28px;
            padding: 12px 16px;
            border: 1px solid #e6e6e6;
            background-color: #fff;
        }

        /* opTable 展开列：将默认的右/下箭头 SVG 改为「展开 / 收起」文字。
           原始样式：.opTable-i-table-open 用 SVG 作背景，展开时加 .opTable-open-dow 旋转 90deg。
           这里覆写背景与尺寸，用 ::before 输出文字；展开态文字切为「收起」并取消旋转。
           注意：opTable 渲染用 <i> 标签承载图标，浏览器对 <i> 默认 italic，需要显式置回 normal。 */
        .opTable-i-table-open {
            width: auto !important;
            height: auto !important;
            background: none !important;
            transform: none !important;
            transition: none !important;
            color: #000;
            font-style: normal;            
            font-size: 12px;
            line-height: 18px;
            padding: 0 2px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .opTable-i-table-open::before {
            content: '展开';
        }
        .opTable-i-table-open.opTable-open-dow {
            transform: none !important;
        }
        .opTable-i-table-open.opTable-open-dow::before {
            content: '收起';
        }
        /* 文字模式下不再需要图标占位块，避免文字被挤窄 */
        .opTable-span-seize {
            width: 4px;
        }

        /* 父表「展开/收起」首列加宽：opTable.js 内部把该列硬编码为 width:50，
           文字模式下太窄；这里通过 lay-id 精确锁定父表（子表 lay-id 形如 child0），
           并使用 > 直接子选择器逐层下钻，避免误命中嵌套在父表展开行内的子表节点。
           注意：opTable 的展开行结构为 <tr><td class='opTable-open-td' colspan='N'>...</td></tr>，
                 该 td 同样是 :first-child，必须用 :not(.opTable-open-td) 排除，否则会把
                 子表内的 .layui-table-cell 一起拉宽，导致子表所有列变成定宽。 */
        .layui-table-view[lay-id="cmeProjPosDownload"] > .layui-table-box > .layui-table-header > table > colgroup > col:first-child,
        .layui-table-view[lay-id="cmeProjPosDownload"] > .layui-table-box > .layui-table-body > table > colgroup > col:first-child {
            width: 60px !important;
        }
        .layui-table-view[lay-id="cmeProjPosDownload"] > .layui-table-box > .layui-table-header > table > thead > tr > th:first-child > .layui-table-cell,
        .layui-table-view[lay-id="cmeProjPosDownload"] > .layui-table-box > .layui-table-body > table > tbody > tr > td:first-child:not(.opTable-open-td) > .layui-table-cell {
            width: 60px !important;
        }
    </style>

            var form = layui.form;

            var $ = layui.jquery;

            let scoreLevel = getUrlParam('scoreLevel');
            const HUBEI = "73ba18db-33fd-4746-ab41-9beb009f69a1";
            const GANSU = "7068a5c0-2cd3-471a-90b9-9bf100aec95a";

            const HAINAN = "6eec6713-670a-43cc-ad4d-9bd700a92928";

            window.attendConfigText = isGuangdong ? '二维码考勤设置' : '考勤设置';
            window.saveAttendPresetText = isGuangdong ? '保存考勤时间预设' : '保存考勤预设';
            

            var projAttendBatchArrArray = new Array(20).fill([]);

            // 浙江套，县级以下单位活动需要举办前申请审核通过后（区县审核）才能举办。
            // 低级层级
            let lowUnitPropertyIds = [
                "d21466a1-1e38-4cbb-a05b-939320b44f4e",
                "bae7ceaa-5274-4f95-a015-410fb3369e4d",
                "be9477f0-c8d1-45e8-9bdd-ef1aedc68fcb",
                "23b00081-503e-49a3-8d05-7f1f933a3282",
            ];
            let highUnitPropertyIds = [
                "da63168c-5892-4495-a01a-6a933043e7c8",
                "f97fa085-23cf-48a7-95af-01c5e163612f",
                "a70fcf94-f90f-406d-9763-36ae8206a35c"
            ];
            let unitPropertyId = '';
            //获取单位

            window.renderBatchDates = function (res, layIndex, startDt, endDt) {

                let datas = res.data;

                for (let i = 0; i < datas.length; i++) {
                    let batch = datas[i];
                    let batchId = batch.batchId;

                    function getBatchRange() {
                        // let range = {min: startDt,max: endDt};
                        let range = { min: startDt.substring(0, 16) + ':00', max: endDt.substring(0, 16) + ':59' };
                        if (standardkindId == ZHEJIANG || standardkindId == HAINAN) {
                            if (i == 0) {
                                if (startDt.substring(0, 11) != endDt.substring(0, 11)) {
                                    range = { min: startDt.substring(0, 16) + ':00', max: startDt.substring(0, 11) + '23:59:59' };
                                }
                            }
                            if (i == datas.length - 1) {
                                if (startDt.substring(0, 11) != endDt.substring(0, 11)) {
                                    range = { min: endDt.substring(0, 11) + '00:00:00', max: endDt.substring(0, 16) + ':59' };
                                }
                            }

                        }
                        return range;
                    }

                    laydate.render({
                        elem: '#startDate_' + batchId,
                        type: 'datetime',
                        format: 'yyyy-MM-dd HH:mm',
                        btns: ['confirm'],
                        trigger: 'click',
                        min: getBatchRange().min,
                        max: getBatchRange().max,
                        done: function (value) {
                            batch.startDate = value;
                        }
                    });

                    laydate.render({
                        elem: '#endDate_' + batchId,
                        type: 'datetime',
                        format: 'yyyy-MM-dd HH:mm',
                        btns: ['confirm'],
                        trigger: 'click',
                        min: getBatchRange().min,
                        max: getBatchRange().max,
                        done: function (value) {
                            batch.endDate = value;
                        }
                    });

                }
            }
            // 校验考勤批次时间数据是否合法（非空、格式、先后顺序、不交叉、在项目周期内）
            window.checkDateRight = function (data, downStartDt, downEndDt) {
                let batchArr = data;
                let preEndDate;
                let startDate;
                let endDate;

                for (let i = 0; i < batchArr.length; i++) {
                    startDate = batchArr[i].startDate;
                    endDate = batchArr[i].endDate;
                    if (startDate == "" || startDate == null) {
                        layer.msg("请输入第" + batchArr[i].batch + "次的开始时间", { icon: 2 });
                        return false;
                    }
                    if (endDate == "" || endDate == null) {
                        layer.msg("请输入第" + batchArr[i].batch + "次的结束时间", { icon: 2 });
                        return false;
                    }
                }

                for (let i = 0; i < batchArr.length; i++) {
                    let startDate = batchArr[i].startDate;
                    let endDate = batchArr[i].endDate;
                    if (endDate <= startDate) {
                        layer.msg("第" + batchArr[i].batch + "次的结束时间应该大于开始时间", { icon: 2 });
                        return false;
                    }
                }

                for (let i = 0; i < batchArr.length; i++) {
                    let startDate = batchArr[i].startDate;
                    let endDate = batchArr[i].endDate;
                    for (let j = 0; j < batchArr.length; j++) {
                        if (j != i) {
                            if (batchArr[j].startDate < startDate && startDate < batchArr[j].endDate) {
                                layer.msg("各个考勤批次的时间范围不能有交叉", { icon: 2 });
                                return false;
                            }
                            if (batchArr[j].startDate < endDate && endDate < batchArr[j].endDate) {
                                layer.msg("各个考勤批次的时间范围不能有交叉", { icon: 2 });
                                return false;
                            }
                            if (batchArr[j].startDate == startDate && batchArr[j].endDate == endDate) {
                                layer.msg("各个考勤批次的时间范围不能有交叉", { icon: 2 });
                                return false;
                            }

                        }

                    }
                }


                for (let i = 0; i < batchArr.length; i++) {
                    startDate = batchArr[i].startDate;
                    endDate = batchArr[i].endDate;
                    if (startDate != "" && startDate != null && endDate != "" && endDate != null) {
                        if (new Date(startDate) < new Date(downStartDt) || new Date(startDate) > new Date(downEndDt)) {
                            layer.msg("第" + batchArr[i].batch + "次的开始时间应该在项目周期的时间范围内", { icon: 2 });
                            return false;
                        }
                        if (new Date(endDate) < new Date(downStartDt) || new Date(endDate) > new Date(downEndDt)) {
                            layer.msg("第" + batchArr[i].batch + "次的结束时间应该在项目周期的时间范围内", { icon: 2 });
                            return false;
                        }
                    }
                }


                return true;
            }

            function parseAttendTimeToMillis(timeValue) {
                if (timeValue === null || timeValue === undefined || timeValue === '') {
                    return timeValue;
                }
                if (/^\d+$/.test(String(timeValue))) {
                    return parseInt(timeValue, 10);
                }
                let m = moment(timeValue);
                return m.isValid() ? m.valueOf() : NaN;
            }

            // 用分钟级格式比较页面输入和数据库保存值，避免秒/时间戳格式差异造成误判。
            function formatAttendTimeForCompare(timeValue) {
                if (timeValue === null || timeValue === undefined || timeValue === '') {
                    return '';
                }
                let millis = parseAttendTimeToMillis(timeValue);
                if (isNaN(millis)) {
                    return String(timeValue);
                }
                return moment(millis).format('YYYY-MM-DD HH:mm');
            }

                $.ajax({

            // 子表已展开时，若输入框值和数据库值不一致，说明用户改了但还没保存。
            function hasUnsavedBatchDateChange(batchData) {
                for (let i = 0; i < batchData.length; i++) {
                    let item = batchData[i];
                    let $startInput = $("#startDate_" + item.batchId);
                    let $endInput = $("#endDate_" + item.batchId);
                    if (!$startInput.length || !$endInput.length) {
                        continue;
                    }
                    let savedStartDate = formatAttendTimeForCompare(item.startDate);
                    let savedEndDate = formatAttendTimeForCompare(item.endDate);
                    let inputStartDate = formatAttendTimeForCompare($startInput.val());
                    let inputEndDate = formatAttendTimeForCompare($endInput.val());
                    if (savedStartDate !== inputStartDate || savedEndDate !== inputEndDate) {
                        return true;
                    }
                }
                return false;
            }

            // 考勤设置、考勤机绑定共用：先拦截未保存输入，再只按数据库保存值校验。
            function getValidatedSavedDownInfoForHold(downId) {
                if (!downId) {
                    layer.msg("缺少批次标识", { icon: 2, time: 2000 });
                    return null;
                }
                let latestDownInfo = getLatestDownInfoFromDb(downId);
                if (!latestDownInfo) {
                    layer.msg("未找到对应下载批次，请刷新页面重试", { icon: 2, time: 2000 });
                    return null;
                }
                let batchData = parseAttendBatchListFromDownInfo(latestDownInfo);
                if (!batchData) {
                    return null;
                }
                if (hasUnsavedBatchDateChange(batchData)) {
                    layer.msg("考勤时间段已修改，请先" + window.saveAttendPresetText, { icon: 2, time: 2000 });
                    return null;
                }
                if (!validateBatchDatesFieldsForHold(latestDownInfo)) {
                    return null;
                }
                return latestDownInfo;
            }

            // 仅校验数据库已保存的批次时间段填写与规则（非空、格式、先后、不交叉、在项目周期内）；不含「当前是否已超过最后批次」
            function validateBatchDatesFieldsForHold(downInfo) {
                let batchData = parseAttendBatchListFromDownInfo(downInfo);
                if (batchData == null || batchData.length == 0) {
                    layer.msg("数据出现问题", { icon: 2 });
                    return false;
                }
                let validateBatchData = batchData.map(item => {
                    return {
                        ...item,
                        startDate: parseAttendTimeToMillis(item.startDate),
                        endDate: parseAttendTimeToMillis(item.endDate)
                    };
                });
                let downStartDate = parseAttendTimeToMillis(downInfo.startDt);
                let downEndDate = parseAttendTimeToMillis(downInfo.endDt);
                if (isNaN(downStartDate) || isNaN(downEndDate)) {
                    layer.msg("项目周期时间格式不正确", { icon: 2 });
                    return false;
                }
                if (validateBatchData.some(item => isNaN(item.startDate) || isNaN(item.endDate))) {
                    layer.msg("开始时间或结束时间格式不正确", { icon: 2 });
                    return false;
                }
                if (!checkDateRight(validateBatchData, downStartDate, downEndDate)) {
                    return false;
                }
                var lastBatchForHold = validateBatchData.filter(function (item) { return item.beLast; })[0]
                    || validateBatchData[validateBatchData.length - 1];
                if (AttendSignInOutThreshold.isBeyondLastBatchHoldWindow(lastBatchForHold, standardkindId)) {
                    layer.msg("当前时间已超出最后的考勤批次时间范围", { icon: 2 });
                    return false;
                }
                return true;
            }

            function getCmeProjPosDownloadListForValidate() {
                let list = [];
                if (table && typeof table.getData === 'function') {
                    try {
                        list = table.getData('cmeProjPosDownload') || [];
                    } catch (e) {
                        list = [];
                    }
                }
                if ((!list || !list.length) && table && table.cache) {
                    list = table.cache['cmeProjPosDownload'] || [];
                }
                return (list || []).filter(function (item) {
                    return item && !Array.isArray(item) && item.downId != null;
                });
            }

                // 经度
                layui.data('attendanceInfo',{
                    key: 'lat',
                    value: obj.lat
                })
                // 纬度
                layui.data('attendanceInfo',{
                    key: 'lng',
                    value: obj.lng
                })
                document.getElementById('address').value=obj.address
                document.getElementById('Scope').value=obj.fanwei
                layer.closeAll('iframe');
            
            }

            //初始化
            let htmlInit = function () {
                // 清空考勤本地缓存，避免上一次进入页面残留数据影响本次流程
                layui.data('attendanceInfo', null);
                createAttendType();//考勤模式
                createScope();//考勤范围
                form.render();
                getUnitInfo();
            }

            htmlInit();

        });

    </script>
