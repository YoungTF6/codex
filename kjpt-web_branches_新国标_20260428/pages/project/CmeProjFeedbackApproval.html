                        </fieldset>

                            <legend style="color:rgba(235, 39, 39, 0.514);text-align: left;font-weight: bold; font-size: 18px;;">

                                    <input type="text" id="expendFugaoExpertTotal" name="expendFugaoExpertTotal" class="layui-input" style="width:18%;float:left;height: 35px;"

                                    <input type="number" id="expendZhenggaoExpertCount" name="expendZhenggaoExpertCount" class="layui-input" style="width:10%;float:left;height: 35px;"

                                    <label class="layui-form-label layui-form-label-my"> 人， 合计金额</label>
                                    <input type="text" id="expendZhenggaoExpertTotal" name="expendZhenggaoExpertTotal" class="layui-input" style="width:18%;float:left;height: 35px;"
                                        lay-verify="required|number" />
                                    <label class="layui-form-label layui-form-label-my">元</label>

                                    <label class="layui-form-label layui-form-label-my" style="clear:left;"> 4.院士、全国知名专家</label>
                                    <input type="number" id="expendYuanshiExpertCount" name="expendYuanshiExpertCount" class="layui-input" style="width:10%;float:left;height: 35px;"

                                    <input type="text" id="expendYuanshiExpertTotal" name="expendYuanshiExpertTotal" class="layui-input" style="width:18%;float:left;height: 35px;"

                                </div>
                            </div>
    
                            <div class="layui-form-item">
    
                                <label class="layui-form-label">场地租赁费:</label>
                                <div class="layui-input-block">
                                    <input type="text" id="expendPlaceRent" name="expendPlaceRent" class="layui-input" style="width:18%;float:left;" lay-verify="required|number"

                            </div>
                            <div class="layui-form-item">

                                    <input type="text" id="expendEquipmentRent" name="expendEquipmentRent" class="layui-input" style="width:18%;float:left;"

<!-- 表格内按钮，当前只有查看和待审批 -->
<script type="text/html" id="rowBar">

    {{# if(d.canApproval == 1){ }}
        {{# if(d.holdQualification){ }}
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row btn-approval" lay-event="approval">待审批</a>
        {{# }else{ }}
    <a class="layui-btn layui-btn-xs layui-btn-disabled" disabled="true">待审批</a>
        {{# } }}
    {{# }else{ }}
    <!-- 只有查看的情况 -->
        {{# if(d.holdQualification){ }}
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="view">查看</a>
        {{# }else{ }}

        {{# } }}
    {{# } }}
</script>

        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" style="color: red;" lay-event="viewApproveLog">日志</a>
        {{# } }}
        {{# }else{ }}
    <a class="layui-btn layui-btn-xs layui-btn-disabled" disabled="true">查看</a>
        {{# } }}
    {{# } }}
</script>

<script type="text/html" id="attendBar">
    {{# if(d.comPersonId != null && d.comPersonId != '' &&(d.scoreMode == 4 || d.scoreMode == 6 || d.scoreMode == 9 || d.scoreMode == 11) ) { }}
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="attendance">查看</a>

<script>
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        tool        :   'tool',
    });

    layui.use(['table', 'form','element','tool','upload'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery,tool = layui.tool;
        var upload = layui.upload;
        window.layer = layui.layer;
        window.loading;
        window.ajaxNum = 0;
        var element = layui.element,nowProjectId,cmeYear;
        var nowDownId,year,nowBatch;
        let userStandardkindId = localStorage.getItem("standardkind-id");
        const myUnitId = localStorage.getItem("unit-id");
        var windowIndex;//单前弹窗
        var approvalIndex;//审批意见弹窗
        var unitUserType = 0;
        const GUANGXI_STANDARD_KIND_ID = '4a6d91fb-8ba4-4560-a801-9c6f00e6d999';
        const PROVINCE_UNIT_USER_TYPE = 5;
        const ARK_SCENE_FILE_TYPE = 2;
        const ARK_POLL_INTERVAL_MS = 20000;
        const ARK_POLL_MAX_MS = 120000;
        const ARK_MIN_DISPLAY_DELAY_MS = 15000;
        const ARK_HEAD_COUNT_HINT_TEXT = '受照片拍摄质量影响，识别人数略有出入，仅供参考';
        let arkPollTimer = null;
        let arkPollDelayTimer = null;
        let arkPollStartAt = 0;
        let arkClickAt = 0;
        let arkDialogEvent = '';
        let arkRecognizing = false;
        let arkLastListItems = [];
        let arkRevealedBeforeClick = {};
        let configName1 = "fun_feedback_file_upload",configName2="fun_feedback_tab",configName3="fun_feedback_proj_field",configName4="fun_feedback_is_analyse",configName5="fun_feedback_show_notice",configName6="fun_feedback_inspect",
        configName7="fun_feedback_score_check_pass",configName8="fun_feedback_teach_image",configName9="fun_feedback_ducha",configName10 = "fun_feedback_process_upload",configName11 = "fun_feedback_show_courseware",configName12 = "value_forbid_some_operate_on_last_year_data";
        let configMap = {};
        let fileUpObj = [{"fileName":"会议通知和议程","require":false,"fileType":1},
            {"fileName":"会议现场照片","require":false,"fileType":2},
            {"fileName":"学员签到表","require":false,"fileType":3},
            {"fileName":"考试考题","require":false,"fileType":4},
            {"fileName":"执行情况反馈表","require":false,"fileType":5}];
        let showProjInfo = [{name:"projName",value:"项目名称:"},
            {name:"projNo",value:"项目编号:"},
            {name:"unitName",value:"填报单位:"},
            {name:"studyAddress",value:"举办地点:"},
            {name:"startDt",value:"开始时间:"},
            {name:"endDt",value:"结束时间"}];
        let reqInfoObj = [
            {
                name: "trainAnalyse",
                value: (() => {
                    if (userStandardkindId === 'acd09b62-333b-4aee-934f-9ec500a9d46d') { //吉林套
                        return "实际培训效果分析(举办时间、地点、内容、参会人员情况、收到的效果)200字以上:";
                    } else if (userStandardkindId === '190c480d-d43c-450b-8472-a6fd00a6729d') { //浙江套
                        return "办班总结(含培训规模、现场情况、培训效果分析、省内和省外学员人数等):";
                    } else {
                        return "实际培训效果分析:";
                    }
                })(),
                require:1
            },
            {
                name: "questionSuggest",
                value: "存在的问题和建议:",
                require: (() => {
                    if (userStandardkindId === '190c480d-d43c-450b-8472-a6fd00a6729d') { //浙江套
                        return 0;
                    } else {
                        return 1;
                    }
                })()
            }
        ];
        let flowArr = [],allFile,nowApprovalState;
        let fileUpObj2 = [{"fileName":"审核表","require":false,"fileType":21}];

        //关闭closeLoading的判断
        window.closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }

        window.openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }

        //
        if(userStandardkindId=='acd09b62-333b-4aee-934f-9ec500a9d46d') { //吉林套
            $("#div-handout").show();
        } else {
            $("#div-textbook").show();
        }

        let isSuccessResponse = function(res) {
            if (!res) return false;
            return res.status === 200 || res.code === 0 || res.code === '0' || res.code === 200 || res.success === true;
        }

        let getResponseMsg = function(res, defaultMsg = "操作失败") {
            if (!res) return defaultMsg;
            return res.msg || res.message || defaultMsg;
        }

        let getTableResponseCode = function(res) {
            if (isSuccessResponse(res)) return 0;
            if (res && res.code !== undefined) return res.code;
            if (res && res.status !== undefined) return res.status;
            return 1;
        }

        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    closeLoading();
                    if(!isSuccessResponse(res)) {
                        layer.msg(getResponseMsg(res));
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }

        // 无全局 loading（用于 AI 识别人数轮询/刷新，避免每隔数秒转圈）
        let commonAjaxSilent = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    if (!isSuccessResponse(res)) {
                        layer.msg(getResponseMsg(res));
                        return;
                    }
                    successFun(res);
                },
                error: function () {
                    if (typeof failFun === 'function') {
                        failFun();
                    }
                }
            });
        }

        // 表格配置
        let loaderTable = function (projectId) {
            table.render({
                elem: '#implementation',
                url: huayi_projectscore_url + 'cmeProjFeedbackApproval/getApprovalFeedbacks',
                method: 'post',
                where: {
                    projectId:projectId,
                    unitId:localStorage.getItem('unit-id')
                },
                cols: [[
                    {align: 'center', width: 170, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    {field: 'status', title: '审批步骤', sort: true,align: 'center',width:120,toolbar: '#viewBar'},
                    {field: 'approvalContent', title: '审核意见', sort: true,align: 'center',width:180,hide:userStandardkindId != '190c480d-d43c-450b-8472-a6fd00a6729d',templet:function(d){
                        if(d.checkState==3 || tool.isEmpty(d.approvalContent)) return "";
                        return d.approvalContent;
                    }},
                    {field: 'batch',title:"举办批次",sort:true,align: 'center',templet:function(data){
                        unitUserType = data.unitUserType;
                        return "第"+data["batch"]+"批次";
                    }},
                    {field: 'projNo', title: '项目编号', sort: true,align: 'center',width:180},
                    {field: 'projName', title: '项目名称', sort: true,align: 'center',width:180},
                    {field: 'startDt', title: '开始日期', sort: true,align: 'center',width:180},
                    {field: 'endDt', title: '结束日期', sort: true,align: 'center',width:180},
                    {field: 'approvalContent', title: '审核意见', sort: true,align: 'center',width:180,hide:userStandardkindId === '190c480d-d43c-450b-8472-a6fd00a6729d',templet:function(d){
                        if(d.checkState==3 || tool.isEmpty(d.approvalContent)) return "";
                        return d.approvalContent;
                    }}
                ]],
                cellMinWidth: 100,
                id: "implementation",
                height: 'full-50',
                page: false,
                parseData: function (res) {
                    if(ableOperateLastYearData(cmeYear) == false) {
                        res.data.forEach(d => {d.canApproval = 0});
                    }
                    return {
                        "code": getTableResponseCode(res), //解析接口状态
                        "msg": getResponseMsg(res, ''), //解析提示文本
                        "data": res.data, //解析数据列表
                    }
                },
                request: {}
            });
        };

        window.ableOperateLastYearData = function(dataYear) {
            let cgv = configMap["value_forbid_some_operate_on_last_year_data"];
            if(cgv == null || cgv == "" || localStorage.getItem("unit-user-type") == 5) {
                return true;
            }
        
            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
        }

        //ajax获取配置信息
        let getTabConfig = function(){
            let tempConfigUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${myUnitId}&configNames=${configName1}&configNames=${configName2}&configNames=${configName3}&configNames=${configName4}&configNames=${configName5}&configNames=${configName6}&configNames=${configName7}&configNames=${configName8}&configNames=${configName9}&configNames=${configName10}&configNames=${configName11}&configNames=${configName12}`;
            commonAjax("post",tempConfigUrl,{},function(){},
                function(res) {
                    if(isSuccessResponse(res)) {
                        configMap = res.data;
                        createFeedback(res.data);
                    }else{
                        layer.msg("加载配置信息失败");
                    }
                }
            )
        }
        //处理tab页，该可能是配置获得的，需要动态构建
        let createFeedback = function (datas) {
            //构建tab页
            let tabArr = tool.createFeedbackTab(datas,1,configName2,configName6);
            //第一页分析必填项构建
            tool.createFeedbackAnalyse(datas,reqInfoObj,configName4);
            //构建图片上传页
            if(tabArr.indexOf(2) > 0 || tabArr.indexOf("2") > 0) {
                fileUpObj = tool.createFeedbackImgUp(datas,fileUpObj,configName1,1);
                fileUpload();//文件上传按钮监听
            }
            //构建审核表上传页
            if(tabArr.indexOf(7) > 0 || tabArr.indexOf("7") > 0) {
                fileUpObj2 = tool.createFeedbackProcessUp(datas,fileUpObj2,configName10,1);
                fileUpload2();//文件上传按钮监听
            }
        }

        
        //给项目反馈信息赋值
        let createProjectTab = function(datas){
            let propertyObj = {"trainAnalyse":".js-trainAnalyse","questionSuggest":".js-questionSuggest","textbookWorks":".js-textbook-works","textbookType":"#textbookType","coursePeriod":".js-course-period","writeTime":".js-write-time","writeUnitPeople":".js-textbook-unit","textbookName":".js-teaxtbook-name","textbookSummary":".js-textbook-summarize"};
            if(datas == null) return;
            for (const key in propertyObj) {
                datas.hasOwnProperty(key) && $(propertyObj[key]).val(datas[key])
            }
            $("#textbookType2").val(datas["textbookType"]);
            //赋值项目经费
            let fundsObj = datas.cmeProjFeedbackFunds;
            if (!tool.isEmpty(fundsObj)){
                for (const key in fundsObj) {
                    if (fundsObj.hasOwnProperty(key) && $(`input[name='${key}']`).length > 0) {
                        $(`input[name='${key}']`).val(fundsObj[key]);
                    }
                }
            }
            form.render('select');
        }
        let resolveUnitUserType = function () {
            let rowType = parseInt(unitUserType, 10);
            if (!isNaN(rowType) && rowType > 0) {
                return rowType;
            }
            let ls = parseInt(localStorage.getItem("unit-user-type"), 10);
            return isNaN(ls) ? 0 : ls;
        };

        let isGuangxiProvinceFeedbackArk = function () {
            return userStandardkindId === GUANGXI_STANDARD_KIND_ID
                && resolveUnitUserType() === PROVINCE_UNIT_USER_TYPE;
        };

        // 是否插入「AI识别人数」按钮：审批始终显示；查看时仍有未识别/未揭示现场照时显示
        let shouldShowArkButton = function (event, data) {
            if (event === 'approval') {
                return true;
            }
            if (event === 'view' && data) {
                return !!(data.hasUnrecognized || data.hasUnrevealedSuccess);
            }
            return false;
        };

        let stopArkPoll = function () {
            if (arkPollTimer) {
                clearInterval(arkPollTimer);
                arkPollTimer = null;
            }
            if (arkPollDelayTimer) {
                clearTimeout(arkPollDelayTimer);
                arkPollDelayTimer = null;
            }
        };

        let snapshotRevealedIds = function (items) {
            let map = {};
            if (!items || !items.length) {
                return map;
            }
            for (let i = 0; i < items.length; i++) {
                if (items[i].headCountRevealed == 1) {
                    map[items[i].feedbackFileId] = true;
                }
            }
            return map;
        };

        let shouldShowArkItem = function (item) {
            if (!item || item.headCountRevealed != 1) {
                return false;
            }
            if (arkDialogEvent === 'view') {
                return true;
            }
            // 再次进入或未点击：DB 已揭示项立即展示
            if (arkClickAt === 0 || arkRevealedBeforeClick[item.feedbackFileId]) {
                return true;
            }
            // 本次点击会话内新揭示项：满 15 秒后展示
            return Date.now() - arkClickAt >= ARK_MIN_DISPLAY_DELAY_MS;
        };

        let getArkSceneSection = function () {
            return $('.js-project-image ul.js-feedback' + ARK_SCENE_FILE_TYPE).closest('.meeting-notice');
        };

        let ensureArkButton = function (showButton) {
            let $section = getArkSceneSection();
            if (!$section.length || !isGuangxiProvinceFeedbackArk()) {
                return;
            }
            $section.find('.js-ark-head-count-actions, .js-ark-head-count-btn, .js-ark-head-count-hint-title').remove();
            let $title = $section.find('.file-title').first();
            if (!$title.length) {
                return;
            }
            let $row = $title.parent('.js-ark-title-row');
            if (!$row.length) {
                $title.wrap('<span class="js-ark-title-row"></span>');
                $row = $title.parent();
            }
            if (showButton) {
                $title.after(
                    '<span class="js-ark-head-count-actions">' +
                    '<button type="button" class="layui-btn layui-btn-xs layui-btn-normal js-ark-head-count-btn">AI识别人数</button>' +
                    '</span>'
                );
                $row.find('.js-ark-head-count-btn').off('click').on('click', onArkHeadCountClick);
            }
            let $anchor = showButton ? $row.find('.js-ark-head-count-actions') : $title;
            $anchor.after(
                '<span class="js-ark-head-count-hint js-ark-head-count-hint-title">' + ARK_HEAD_COUNT_HINT_TEXT + '</span>'
            );
        };

        let unwrapArkTitleRow = function () {
            getArkSceneSection().find('.js-ark-title-row').each(function () {
                let $row = $(this);
                $row.find('.js-ark-head-count-actions, .js-ark-head-count-btn, .js-ark-head-count-hint-title').remove();
                $row.children('.file-title').insertBefore($row);
                $row.remove();
            });
        };

        let formatArkCountLabel = function (item) {
            if (!item || item.headCountRevealed != 1) {
                return '';
            }
            if (item.status === 'SUCCESS') {
                if (item.headCount === null || item.headCount === undefined) {
                    return '0人';
                }
                return item.headCount + '人';
            }
            if (item.status === 'FAILED' || item.status === 'EXPIRED') {
                return '识别失败';
            }
            return '';
        };

        let renderArkHeadCounts = function (items) {
            if (!items || !items.length) {
                return;
            }
            for (let i = 0; i < items.length; i++) {
                let item = items[i];
                let $li = $('li[file-id="' + item.feedbackFileId + '"]');
                if (!$li.length) {
                    continue;
                }
                let $span = $li.find('.js-ark-head-count');
                if (!$span.length) {
                    $li.append('<span class="js-ark-head-count" style="margin-left:8px;color:#d9001b;"></span>');
                    $span = $li.find('.js-ark-head-count');
                }
                if (!shouldShowArkItem(item)) {
                    $span.text('');
                    continue;
                }
                $span.text(formatArkCountLabel(item));
            }
        };

        let applyArkListData = function (data) {
            if (!data) {
                return;
            }
            let items = data.items || [];
            arkLastListItems = items;
            renderArkHeadCounts(items);
            let showBtn = shouldShowArkButton(arkDialogEvent, data);
            ensureArkButton(showBtn);
            if (showBtn) {
                updateArkButtonState(data);
            }
        };

        let updateArkButtonState = function (data) {
            if (!data) {
                return;
            }
            let $btn = getArkSceneSection().find('.js-ark-head-count-btn');
            if (!$btn.length) {
                return;
            }
            if (arkRecognizing) {
                $btn.text('识别中').addClass('layui-btn-disabled').prop('disabled', true);
                return;
            }
            if (data.retryExhausted && !data.hasUnrecognized) {
                $btn.text('已达重试上限').addClass('layui-btn-disabled').prop('disabled', true);
                return;
            }
            if (!data.hasUnrecognized && !data.hasUnrevealedSuccess) {
                $btn.text('已识别').addClass('layui-btn-disabled').prop('disabled', true);
                return;
            }
            $btn.text('AI识别人数').removeClass('layui-btn-disabled').prop('disabled', false);
        };

        let fetchArkList = function (successFun) {
            commonAjaxSilent('post', huayi_projectscore_url + 'cmeProjFeedbackFile/listArkHeadCount', { downId: nowDownId },
                function () { },
                function (res) {
                    successFun(res.data || {});
                }
            );
        };

        let loadArkHeadCount = function (event) {
            if (!isGuangxiProvinceFeedbackArk() || !nowDownId) {
                return;
            }
            arkDialogEvent = event || arkDialogEvent;
            fetchArkList(function (data) {
                applyArkListData(data);
            });
        };

        let refreshArkAfterClick = function () {
            commonAjaxSilent('post', huayi_projectscore_url + 'cmeProjFeedbackFile/revealArkHeadCount', { downId: nowDownId },
                function () {
                    arkRecognizing = false;
                    loadArkHeadCount('approval');
                },
                function () {
                    fetchArkList(function (data) {
                        applyArkListData(data);
                        let terminal = !data.hasUnrecognized && !data.hasUnrevealedSuccess;
                        if (terminal || Date.now() - arkPollStartAt >= ARK_POLL_MAX_MS) {
                            arkRecognizing = false;
                            stopArkPoll();
                            if (!terminal && Date.now() - arkPollStartAt >= ARK_POLL_MAX_MS) {
                                layer.msg('识别超时，请稍后刷新重试');
                            }
                        }
                    });
                }
            );
        };

        let startArkPoll = function () {
            stopArkPoll();
            arkPollStartAt = Date.now();
            let tick = function () {
                if (Date.now() - arkClickAt < ARK_MIN_DISPLAY_DELAY_MS) {
                    return;
                }
                refreshArkAfterClick();
            };
            arkPollDelayTimer = setTimeout(tick, ARK_MIN_DISPLAY_DELAY_MS);
            arkPollTimer = setInterval(tick, ARK_POLL_INTERVAL_MS);
        };

        let onArkHeadCountClick = function () {
            if (arkRecognizing) {
                return;
            }
            arkRevealedBeforeClick = snapshotRevealedIds(arkLastListItems);
            arkRecognizing = true;
            arkClickAt = Date.now();
            let $btn = getArkSceneSection().find('.js-ark-head-count-btn');
            $btn.text('识别中').addClass('layui-btn-disabled').prop('disabled', true);
            let ut = resolveUnitUserType();
            commonAjaxSilent('post', huayi_projectscore_url + 'cmeProjFeedbackFile/revealArkHeadCount', { downId: nowDownId },
                function () {
                    arkRecognizing = false;
                    layer.msg('揭示失败');
                    loadArkHeadCount('approval');
                },
                function (res) {
                    commonAjaxSilent('post', huayi_projectscore_url + 'cmeProjFeedbackFile/triggerArkHeadCount',
                        { downId: nowDownId, unitUserType: ut },
                        function () {
                            arkRecognizing = false;
                            layer.msg('识别触发失败');
                            loadArkHeadCount('approval');
                        },
                        function () {
                            startArkPoll();
                        }
                    );
                }
            );
        };

        //创建项目上传图片的tab页
        let createImageTab = function(datas){
            //ajax请求获取该页面的数据
            if (datas == null) return;
            //图片渲染
            for (let i = 0; i < datas.length; i++) {
                let htmlText = `<li file-id="${datas[i]["feedbackFileId"]}">` +
                    `<a class="layui-btn layui-btn-xs btn-normal-row js-file-name" msg="${datas[i]["fileName"]}" filePath="${datas[i]["filePath"]}" onmouseover="mouseoverImageName(this)" onmouseout="mouseoutImageName(this)" onclick="downloadFeedFile(this)">${datas[i]["fileName"]}</a>` +
                    `<span class="js-ark-head-count" style="margin-left:8px;color:#d9001b;"></span>`;
                $(`.js-feedback${datas[i].fileType}`).append(htmlText);
            }
        }
        
        //打开审批信息弹窗
        let openApprovalTextWindow = function(title="审批意见",content=false,area,shadeClose=false,closeBtn=1){
            approvalIndex = layer.open({
                type: 1,
                title: title,
                content: content,
                closeBtn:closeBtn,
                area: area,
                shadeClose: shadeClose
            })
        }
        //按钮点击事件
        let onClickBtn = function(){
            let approvalType = 0;
            //上一页
            $('.js-last').click(function(){
                let liElems = $('.js-tabs').children();
                for(let i=0;i<liElems.length;i++){
                    if(liElems[i].classList.contains("layui-this")){
                        liElems[i-1].click();
                        break;
                    }
                }
            })
            //下一页
            $('.js-next').click(function(){
                let liElems = $('.js-tabs').children();
                for(let i=0;i<liElems.length;i++){
                    if(liElems[i].classList.contains("layui-this")){
                        liElems[i+1].click();
                        break;
                    }
                }
            })
            //点击审核不通过

                        if(elem.parentElement.classList.contains("inspect-table")) {
                            $("#inspectTable").removeClass("layui-btn-disabled");
                            $("#inspectTable").attr("disabled", false);
                        }
                        if(elem.parentElement.classList.contains("inspect-img")) {
                            $("#inspectImg").removeClass("layui-btn-disabled");
                            $("#inspectImg").attr("disabled", false);
                        }
                        layer.msg(getResponseMsg(res, "删除成功"));
                    } else {
                        layer.msg(getResponseMsg(res));
                    }
                },
                fail: function () {
                    closeLoading();
                    layer.msg("删除失败");
                }
            });
        }


         //tab页点击
        element.on('tab(tabcheck)', function(data){
            let num=data.index;
            let dataType = this.getAttribute("data-type");
            //全部隐藏
            $(".js-tab-page").addClass("js-hidden");
            $("."+dataType).removeClass("js-hidden");
            //存在就不创建，只需要解除hidden
            if($("."+dataType)[0].getAttribute("data-id")!=nowDownId && nowDownId != undefined){
                //获取数据并构建，同时还会设置到隐藏按钮
                changeStatusBtn(dataType);
            }
            //触发隐藏下面的按钮
            handlerNextAndLastBtns(num+1);
        });

        //预览
        window.onclickView = function (tabType) {
            if (tabType == 'js-project-tab') {
                layer.open({
                    title: '项目反馈表',
                    type: 2,
                    area: ['100%', '100%'],
                    content: 'CmeProjFeedbackPdf.html?downId=' + nowDownId + '&projId=' + nowProjectId + '&batch=' + nowBatch,
                });
            } else if (tabType == 'js-project-people') {
                layer.open({
                    title: '授分人员明细表',
                    type: 2,
                    area: ['100%', '100%'],
                    content: 'CmeProjFeedbackPeoplePdf.html?downId=' + nowDownId + '&projId=' + nowProjectId + '&batch=' + nowBatch,
                });
            } else if (tabType == 'js-project-textbook') {
                layer.open({
                    title: '教材明细',
                    type: 2,
                    area: ['100%', '100%'],
                    content: 'CmeProjFeedbackTextbookPdf.html?downId=' + nowDownId + '&projId=' + nowProjectId + '&batch=' + nowBatch,
                });

            } else if (tabType == 'js-inspect') {
                layer.msg("待开发。。。");

            }
            
        }

        //下载
        window.onclickDownload = function (tabType) {
            if (tabType == 'js-project-tab') {
                downloadPDF(tabType, "项目反馈信息");
            } else if (tabType == 'js-project-image') {
                downloadZip(tabType, "执行情况反馈课程图片");
            } else if (tabType == 'js-project-people') {
                downloadPDF(tabType, "授分人员明细表");
            } else if (tabType == 'js-project-textbook') {
                downloadPDF(tabType, "教材明细");
            } else if (tabType == 'js-inspect') {
                layer.msg("待开发。。。");

            } else {//全部下载
                downloadZip(tabType, "执行情况反馈相关文件");
            }
            
        }

        function downloadPDF(type, pdfName) {
            let index = layer.open({
                title    : '',
                closeBtn : 0,
                btn      : [],
                shade    : 0.3,
                content  :'<i class="layui-icon layui-icon-loading-1 layui-anim layui-anim-rotate' +
                    ' layui-anim-loop" style="font-size: 36px; margin-right: 15px; position: relative;' +
                    ' top: 7px;"></i><span id="packageMsg">正在导出，请稍候</span>',
                time     : 0
            });
            axios({
                    method: 'POST',
                    url: huayi_projectscore_url + "cmeProjFeedbackFile/downloadPdf",
                    params       : {downId:nowDownId, type:type, batch:nowBatch, projectId:nowProjectId, unitId:myUnitId},
                    responseType : 'blob'
                }).then(res => {
                    if (res.data.size < 100) {
                        layer.msg('未查询到信息', { icon: 7, time: 2000 });
                        return false;
                    }
                    const   blob = new Blob([res.data], { type: 'application/zip' }), // new一个二进制对象
                            url  = window.URL.createObjectURL(blob), // 转化为url
                            link = document.createElement('a'); // 创建个a标签
                    link.href = url;
                    link.download = pdfName + '.pdf'; // 重命名
                    link.click();
                    URL.revokeObjectURL(url); // 释放内存
                    layer.close(index);
                    layer.msg('导出完成', { icon: 1, time: 1500 });
                }).catch(function (thrown) {
                    layer.close(index);
                    if (axios.isCancel(thrown)) {
                        console.log('Request canceled', thrown.message);
                    } else {
                        console.error('Request failed', thrown);
                        layer.msg('导出失败', { icon: 2, time: 1500 });
                    }
                });
        }

        function downloadZip(type, pdfName) {
            let index = layer.open({
                title    : '',
                closeBtn : 0,
                btn      : [],
                shade    : 0.3,
                content  :'<i class="layui-icon layui-icon-loading-1 layui-anim layui-anim-rotate' +
                    ' layui-anim-loop" style="font-size: 36px; margin-right: 15px; position: relative;' +
                    ' top: 7px;"></i><span id="packageMsg">正在导出，请稍候</span>',
                time     : 0
            });
            axios({
                method       : 'POST',
                url          : huayi_projectscore_url + '/cmeProjFeedbackFile/downloadZip',
                params       : {downId:nowDownId, type:type, batch:nowBatch, projectId:nowProjectId, unitId:myUnitId},
                responseType : 'blob'
            }).then(res => {
                if (res.data.size < 100) {
                    layer.msg('未查询到信息', { icon: 7, time: 2000 });
                    return false;
                }
                const   blob = new Blob([res.data], { type: 'application/zip' }), // new一个二进制对象
                        url  = window.URL.createObjectURL(blob), // 转化为url
                        link = document.createElement('a'); // 创建个a标签
                link.href = url;
                link.download = pdfName + '.zip'; // 重命名
                link.click();
                URL.revokeObjectURL(url); // 释放内存
                layer.close(index);
                layer.msg('导出完成', { icon: 1, time: 1500 });
            }).catch(function (thrown) {
                layer.closeAll();
                if (axios.isCancel(thrown)) {
                    console.log('Request canceled', thrown.message);
                } else {
                    console.error('Request failed', thrown);
                    layer.msg('导出失败', { icon: 2, time: 1500 });
                }
            });
        }

        //文件下载或者文件另一个窗口打开
        window.downloadFeedFile = function(elem){
            let filePath = elem.getAttribute("filePath");
            let fileName = elem.innerText;
            if(fileName.indexOf(".jpg") >0||fileName.indexOf(".png") >0 || fileName.indexOf(".bmp") > 0 || fileName.indexOf(".JPG")>0 || fileName.indexOf(".PNG")>0 || fileName.indexOf(".BMP")>0||fileName.indexOf(".pdf")>0 || fileName.indexOf(".PDF")>0){
                window.open(filePath);
            }else{
                tool.downloadUseIfram(filePath);
            }
        }

    });

    //鼠标移入弹出文件信息
    let mouseoverImageName = function(elem){ showTips(elem.getAttribute("msg"), elem, '#000000', '#d3d3d3'); }

    window.onload = function () {

        if (feeFormDiv) {
            let inputs = feeFormDiv.querySelectorAll('input');
