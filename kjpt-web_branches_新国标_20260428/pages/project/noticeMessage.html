<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta charset="UTF-8">
        <title></title>
        <meta name="renderer" content="webkit">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
        <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
        <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
        <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
        <script type="text/javascript" src="../../js/api/cpt.js"></script>
        <script type="text/javascript" src="../../js/axios.min.js"></script>

        <!--    请求路径配置-->
        <script type="text/javascript" src="../../js/constant.js"></script>
        <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
        <!--    ajax全局配置-->
        <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
        <link rel="stylesheet" href="../../css/communal.css" media="all">
        <script type="text/javascript" src="../../js/common.js"></script>

    </head>

    <body>

    <div class="layui-fluid">
        <div class="layui-card">
        <div class="layui-card-body" style="padding: 15px;">
            <form class="layui-form" action="" lay-filter="component-form-group">
            <div class="layui-card">
                <div class="layui-card-header" style="text-align: center;" id="title"></div>
                <div class="layui-card-body" id="message"></div>
                <div class="layui-card-body" id="file"></div>
            </div>
            <div class="layui-form-item layui-layout-admin">
              
                <div style="left: 0; text-align: center  ;">
                    <button class="layui-btn" lay-submit="" lay-filter="component-form-demo1">同意</button>
                    <br/>
                    <input type="checkbox" id="ckNoDisplayed" title="下次不再显示" lay-skin="primary">
                </div>
            </div>
            </form>
        </div>
        </div>
    </div>
    </body>

    <script>

        function downloadNotice (fileId,fileNames) {
            axios({ // 用axios发送get请求
                method: 'get',
                url: huayi_projectscore_url + "project/downloadNotice", // 请求地址
                responseType: "blob",
                headers: {
                    "Accept": 'application/json',
                    "Authorization": localStorage.getItem("token"),
                    "KJPT-USER-ID": localStorage.getItem("user-id"),
                    "cmestandard-id": localStorage.getItem("standardkind-id")
                },
                params: {
                    fileId: fileId
                }
            })
            .then((res) => {
                    console.log(res);
                    // 地址转换
                    let url = window.URL.createObjectURL(res.data);
                    // 文件名
                    let fileName=fileNames;
                    const a = document.createElement("a");
                    a.setAttribute("href", url);
                    a.setAttribute("download", fileName);
                    document.body.append(a);
                    a.click();
                    document.body.removeChild(a);
                }
            );
        }

    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var userid= localStorage.getItem("unit-id");
        var url= window.location.href;
        var scoreLevelId=url;
        var scoreLevelId = getUrlParam("scoreLevelId");
        var holdYear = getUrlParam("holdYear");
        const _zhCN = getUrlParam("zhCN");
        const _declarePath = getUrlParam('declarePath');
        const _source = getUrlParam('source');
        let _noticeId="";
        $(function () {
            noticeMessage(scoreLevelId);
        });

        //TODO
        function noticeMessage(scoreLevelId){
            $.ajax({
                type: "POST",
                url: huayi_projectscore_url+"project/getNoticeMessage",
                data: {scoreLevelId:scoreLevelId,unitId:localStorage.getItem("unit-id")},
                async: false,
                dataType: 'json',
                success:function(object){
                    if(object.data.records[0]["noticeContent"]!=null){
                        $('#title').append(object.data.records[0]["noticeTitle"]);
                        $('#message').append(object.data.records[0]["noticeContent"]);
                        _noticeId=object.data.records[0]["noticeId"];
                        $.ajax({
                            type: "POST",
                            url: huayi_projectscore_url+"project/getNoticeFile",
                            data: {noticeId:object.data.records[0]["noticeId"]},
                            dataType: 'json',
                            success:function(object){
                                $.each(object.data.records, function(index, item) {
                                    //$('#file').append("<div  onclick=\"downloadNotice('"+item.fileId+"')\">"+item.fileName+"</div>");
                                    $('#file').append("<a href=\"#\" style=\"text-decoration: none;\"  onclick=\"downloadNotice('"+item.fileId+"','"+item.fileName+"')\">"+item.fileName+"</a><br/>");

                                })
                            }
                        })

                    }else{
                        //若无提示，则直接展示添加项目页面
                        layer.msg(object.data.msg);
                    }
                }

            })
        }

         /* 监听提交 */
        form.on('submit(component-form-demo1)', function(data){
            //需要跳转到项目申报并关闭当前页
            var parentindex=parent.layer.getFrameIndex(window.name);
            //parent.layer.close(index);
            var cmeStandardKindId = localStorage.getItem("standardkind-id")
                , userCreate = localStorage.getItem("user-id");
            //
            let standardKindId = localStorage.getItem("standardkind-id");
            let unitId = localStorage.getItem('unit-id');
            let userId = localStorage.getItem("user-id");

            //如果ckNoDisplayed 勾选下次不再提示，则访问接口，将noticeId存入数据库
            if($('#ckNoDisplayed').is(':checked')){

                $.ajax({
                    type: "POST",
                    url: huayi_mcenter_url + "noticeNews/updateNoticeNewsUserByid",
                    data: {noticeId: _noticeId, userId: userId},
                    async: false,
                    dataType: 'json',
                    success:function(object){
                        if(object.code==200){
                            parent.layer.close(parentindex);
                        }else{
                            layer.msg(object.msg);
                        }
                    }
                })
            }

            let cptUrl = getCptUrl(holdYear, scoreLevelId, 'declare') // create declarePath
                + '&standard_kind_id=' + standardKindId
                + '&unit_id=' + unitId
                + '&user_id=' + userId
                + '&score_level_id=' + scoreLevelId
                + '&hold_year=' + holdYear
                + '&source=' + _source
                + '&zh_cn=' + _zhCN;

            parent.layer.open({
                title: '填报',
                content: cptUrl,
                type: 2,
                area: ['100%', '100%'],
                end: function(index, layero){
                    parent.layer.close(parentindex);
                }
            })
            return false;
        });

      })
    </script>
</html>
