<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>项目申请年度表</title>
    <!-- 项目配置id和年份唯一确定一条数据 -->
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/tools/form_validation_tool.js?d=20240312"></script>


    <style>
        #form-ProjectDicRegionYear .layui-inline-660 {
            width: 90%;
        }
        #form-ProjectDicRegionYear .layui-form-label {
            width: 115px;
            padding: 9px 10px;
        }
        #form-ProjectDicRegionYear .layui-input-block {
            margin-left: 135px;
        }
        #form-ProjectDicRegionYear .layui-anim {
            max-height: 190px;
        }
        #form-ProjectDicRegionYear .layer-btn-div {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="layui-fluid">
    <div class="layui-card">


        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                <div class="layui-inline">
                    <label class="layui-form-label">申报配置</label>
                    <div class="layui-input-block">
                        <input type="text" name="regionLevelName" id="regionLevelName" placeholder="申报配置模板" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">申报年度</label>
                    <div class="layui-input-block">
                        <input type="text" name="year" id="yearSelect" placeholder="申报年度" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>

                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </a>
                </div>

                <div class="layui-inline" style="float: right">
                    <div class="layui-input-block">
                        <a class="layui-icon" id="hint"><span style="color: red;">&#xe60b;</span></a>
                    </div>
                </div>
            </blockquote>
        </div>


        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="projectDicRegionYear" lay-filter="projectDicRegionYear"
                   style="margin: 0px 0px;">
            </table>
        </div>


        <!--        添加弹窗-->
        <div id="add-projectDicRegionYear" style=" display:none;text-align: center">
            <form class="layui-form" style="padding: 30px;" id="form-ProjectDicRegionYear" lay-filter="add-filter">
                <div class="layui-form-item" style="display: none">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label">主键</label>
                        <div class="layui-input-block">
                            <input type="text" name="regionYearId" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <!-- <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>申报配置模板id</label>
                        <div class="layui-input-block">
                            <input type="text" name="regionLevelId" placeholder="申报配置模板id" autocomplete="off" class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div> -->
                <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>申报配置模板</label>
                        <div class="layui-input-block">
                            <select name="regionLevelId" lay-search id="projectDicRegionLevel" lay-filter="projDicRegionLevel" lay-verify="required">
                                <option value="" ></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>申报年度</label>
                        <div class="layui-input-block">
                            <select name="year" lay-search lay-filter="layui-select-year" id="year" lay-verify="required">
                                <option value=""></option>
                            </select>
                          </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label">专家评审模板路径</label>
                        <div class="layui-input-block">
                            <input type="text" name="reviewTmplPath" id="reviewTmplPath" placeholder="未配置则使用默认模板" autocomplete="off" class="layui-input"
                                    lay-verify="maxChar" maxChar="200">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label">备注</label>
                        <div class="layui-input-block">
                            <input type="text" name="memo" placeholder="备注" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>

                <div class="layui-form-item layer-btn-div">
                    <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </form>
        </div>


    </div>
</div>


<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn layui-btn-sm" lay-event="add">新增</a>
</script>
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a>
</script>


<script>
    // 全局配置及引入相关的模块
    layui.use([ 'table', 'form' ], () => {
        let table   = layui.table,
            form    = layui.form,
            layer   = layui.layer;

        // 申报年度设置
        let date     = new Date(),
            year     = date.getFullYear(),
            lastYear = year + 1,
            options  = '<option value="' + lastYear + '">' + lastYear + '年</option>';
        for (let i = 0; i < 10; i++) {
            options += '<option value="' + year + '">'+ year + '年</option>';
            --year;
        }
        $('#year').append(options);
        form.render('select');

        // 初始化申报模板配置下拉框
        let projectDicRegionLevelInit = () => {
            $.ajax({
                url     : huayi_projectscore_url +"/projectDicRegionLevel",
                type    : 'get',
                success : res => {
                    let projectDicRegionLevels = res.data;
                    if (projectDicRegionLevels && projectDicRegionLevels.length > 0) {
                        let options = '';
                        $.each(projectDicRegionLevels, (i, item) => {
                            options += '<option value="' + item.regionLevelId + '">' + item.configName+'</option>';
                        });
                        $('#projectDicRegionLevel').append(options);
                        form.render('select');
                    }
                    else console.log('score kind is null!');
                }
            });
        }
        projectDicRegionLevelInit();
        form.on('select(projDicRegionLevel)', data => {
            let val = data.value;
            if (!val) return false;
            $.ajax({
                url      : huayi_projectscore_url + 'projectDicRegionYear/getReviewTmplPath',
                type     : 'get',
                data     : { regionLevelId: val },
                dataType : 'json',
                success  : res => {
                    if (res.status === 200) {
                        $('#reviewTmplPath').val(res.data);
                    }
                    else layer.msg('获取专家评审模板路径失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg('获取专家评审模板路径失败', { icon: 7, time: 1500 })
            });
        });


        /** 表格相关操作 */
        /* 表格配置 */
        window.loaderTable = () => {
            table.render({
                elem            : '#projectDicRegionYear',
                url             : huayi_projectscore_url + 'projectDicRegionYear/getRegionYearList',
                title           : '用户表',
                defaultToolbar  : [],
                where           : {
                    regionLevelName : $('#regionLevelName').val(),
                    year            : $('#yearSelect').val()
                },
                cols: [ [
                    { align: 'center', width: 150, toolbar: '#rowBar', title: '操作', fixed: 'left' },
                    // { field: 'regionYearId', title: '主键', sort: true },
                    // { field: 'regionLevelId', title: '申报配置模板id', sort: true },
                    { field: 'regionLevelName', title: '申报配置', sort: true },
                    { field: 'year', title: '申报年度', sort: true, align: 'center' },
                    { field: 'reviewTmplPath', title: '专家评审模板' },
                    { field: 'memo', title: '备注', sort: true },
                    { field: 'addTime', title: '创建时间', sort: true, align: 'center' },
                    { field: 'updateTime', title: '更新时间', sort: true, align: 'center' }
                ] ],
                toolbar         : '#bar',
                cellMinWidth    : 100,
                id              : 'projectDicRegionYear',
                height          : 'full-155',
                page            : true,
                limit           : 10,
                limits          : [ 10, 50, 100, 150, 200 ],
                parseData: res => {
                    return {
                        'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg'   : res.message, // 解析提示文本
                        'count' : res.data.recordsTotal, // 解析数据长度
                        'data'  : res.data.records, // 解析数据列表
                        'page'  : res.data.pageNum, // 当前页
                        'limit' : res.data.pageSize, // 每页条数
                    } },
                request         : {
                    pageName    : 'pageNum', // 页码的参数名称，默认：page
                    limitName   : 'pageSize' // 每页数据量的参数名，默认：limit
                }
            });
        };

        /* 初始化表格 */
        loaderTable();

        /* 监听头部新增按钮 */ 
        table.on('toolbar(projectDicRegionYear)', obj => {
            let datas = obj.data,
                event = obj.event;

            document.getElementById('form-ProjectDicRegionYear').reset();
            
            if (event === 'add') {
                layer.open({
                    type    : 1,
                    title   : '新增项目申请年度表',
                    content : $('#add-projectDicRegionYear'),
                    skin    : '',
                    area    : [ '550px', '400px' ],
                });
            }
        });

        /* 监听行内按钮 */ 
        table.on('tool(projectDicRegionYear)', obj => {
            let datas = obj.data,
                event = obj.event;

            if (event === 'edit') {
                form.val('add-filter', datas);
                layer.open({
                    type    : 1,
                    title   : '修改项目申请年度表',
                    content : $('#add-projectDicRegionYear'),
                    skin    : '',
                    area    : [ '550px', '400px' ],
                });
            } 
            else if (event === 'del') {
                layer.confirm('确认删除', { icon: 3, title: '提示' }, () => {
                    $.ajax({
                        type        : 'get',
                        url         : huayi_projectscore_url + 'projectDicRegionYear/deleted',
                        data        : { regionYearId: datas.regionYearId },
                        contentType : 'application/json;charset=UTF-8',
                        dataType    : 'json',
                        success     : res => {
                            if (res.status === 200) {
                                layer.msg('删除成功');
                                table.reload('projectDicRegionYear');
                            }
                        }
                    });
                    layer.msg('删除成功');
                });
            }
        });


        /** 表单相关操作 */
        /* 表单验证 */
        form.verify($.extend(layuiVerify, {})); 

        /* 新增/修改表单提交 */
        form.on('submit(submit)', data => {
            let formTableId = $('#add-projectDicRegionYear input[name="regionYearId"]').val(),
                flag        = !formTableId,
                msg         = flag ? '新增成功' : '修改成功',
                URL         = huayi_projectscore_url + (flag ? 'projectDicRegionYear/save' : 'projectDicRegionYear/update');
            $.ajax({
                type        : 'post',
                url         : URL,
                data        : JSON.stringify(data.field),
                contentType : 'application/json;charset=UTF-8',
                dataType    : 'json',
                success     : res => {
                    if (res.status === 200) {
                        layer.closeAll();
                        layer.msg(msg);
                        table.reload('projectDicRegionYear');
                    } 
                    else if (res.status === 500) layer.msg(res.msg);
                },
                error       : () => layer.msg('发送请求失败')
            });
            return false;
        });


        // 鼠标悬停提示特效
        $('#hint').hover(() => openMsg(), () => layer.close(subtips));
        function openMsg() {
            subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
        };


        // Esc关闭弹窗
        window.onkeyup = function (ev) {
            var key = ev.keyCode || ev.which;
            if (key == 27) {
                layer.closeAll();
                if (parent) {
                    parent.layer.closeAll();
                }
            }
        }

    });
</script>
</body>
</html>
