<!--表格内数据编辑、删除按钮-->

    <script type="text/html" id="bar">
        <!-- <input type="checkbox" name="like1[read]" id="checkboxCurrent"  lay-filter="layTableAllChoose"  title="本页全选">  -->
        <input type="checkbox" name="layTableCheckbox" title="本页全选" lay-filter="layTableAllChoose" id="checkboxCurrent">
        <input type="checkbox" name="like1[read]" id="checkboxAll"  lay-filter="checkboxAll"  title="所有全选">
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="AllCheckPass">审核通过</button>
        <button id ="btnCheckNoPass" class="layui-btn layui-btn-sm layui-btn-danger" lay-event="AllCheckNoPass">审核不通过</button>

    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element', 'laydate'], function() {
            var table = layui.table,form = layui.form;
            var $ = layui.jquery,laydate = layui.laydate;
            var layer = layui.layer,element = layui.element;
            var my = new Date();
            var status = -1;
            var neimengStandardKindId = '08e44437-5789-44e0-8ff8-9ecb00a6348a';
            var isNeimeng = localStorage.getItem("standardkind-id") === neimengStandardKindId;
            // 日期范围
            laydate.render({
                elem:   '#studyDateCollection',
                range:  true,
                done: function(value, date, endDate) {
                    if (date.year !== endDate.year) {
                        layer.msg("日期不允许跨年");
                        // 重置选择
                        // 重置选择
                        laydate.render({
                            elem: '#studyDateCollection',
                            range: true
                        }).setValue('');
                    }
                }
            });
            // 将constantPage.js 常量赋值给label
            $("label").each(function() {
                const name = $(this).attr("name");
                if (projectLabels[name] !== undefined) {
                    $(this).text(projectLabels[name]);
                }
            });

            $(function() {
                var today = new Date();
                var beginDate=today.getFullYear()+'-01-01';
                var endDate=today.getFullYear()+'-01-01';

                var tYear = today.getFullYear();
                var tMonth = today.getMonth();
                var tDate = today.getDate();
                tMonth = doHandleMonth(tMonth + 1);
                tDate = doHandleMonth(tDate);

                $('#studyDateCollection').val(beginDate+' - '+ tYear+"-"+tMonth+"-"+tDate );
                if (isNeimeng) {
                    $('#teachUnitWrap').hide();
                }
                loaderTable();
                ddlList();

            });
            function doHandleMonth(month){
                var m = month;
                if(month.toString().length == 1){
                    m = "0" + month;
                }
                return m;
            }

            // 表格相关操作
            // 表格配置
            function loaderTable() {
                window.mainTable = table.render({
                    elem: '#project',
                    url: huayi_projectscore_url + 'cmeSingleprojScore/getRemoteScoreList',
                    title: '学分表',
                    method: 'post',
                    defaultToolbar: [],
                    where: {
                        studyDateCollection: $('#studyDateCollection').val(),
                        singleProjNo: $('#singleProjNo').val(),
                        singleProjName: $('#singleProjName').val(),
                        checkState: $('#checkState').val(),
                        holdType: $('#holdType').val(),
                        scoreLevel: $('#scoreLevel').val(),
                        unitId: localStorage.getItem("unit-id"),
                        menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                        teachUnit: $('#teachUnit').val(),
                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        unitUserType: localStorage.getItem("unit-user-type"),
                        personName: $('#personName').val(),
                        idCardNo: $('#idCardNo').val()
                    },

                    cols: [[
                        {   
                            title: '选择', width: 60, align: 'center', fixed: 'left',
                            templet: function (data) {
                                return '<input type="checkbox" name="layTableCheckbox" lay-skin="primary">';
                            }
                        },
                        // {fixed: 'left', title: '操作', type: 'checkbox', name:'layTableCheckbox', width: 100,
                        //     templet: function(d) {
                        //         return '<div>这是一些文字描述</div>';
                        //     }
                        // },
                        {field: 'center', width: 160, toolbar: '#rowBar', width:90,title: '人员明细'},
                        {field: 'singleProjNo', title: '项目编号', sort: true,align: 'center', width:120,},
                        {field: 'singleProjName', title: '项目名称', sort: true,align: 'center', width:190,},
                        {field: 'stunumber', title: '参与人数', sort: true,align: 'center', width:120,},
                        {field: 'teachUnitName', title: '授分单位', sort: true,align: 'center', width:180,},
                        {field: 'scoreLevelName', title: projectLabels['lblProjectLevel'], sort: true,align: 'center', width:120},
                        {field: 'holdTypeName', title: '举办方式', sort: true,align: 'center', width:120},
                        {field: 'period', title: '学时', sort: true,align: 'center'},
                        {field: 'score', title: '学分', sort: true,align: 'center'}
                    ]],
                    done:function(res, curr, count){
                        for(var i = 0;i<res.data.length;i++){
                            var state = res.data[i].isPass; //根据status状态判断，不为0时，禁止勾选
                            var checkallinfo=$("#checkboxAll").is(":checked");
                            var checkboxCurrent=$("#checkboxCurrent").is(":checked");
                            var templateHtml ="";
                            //如果全选
                            if (checkallinfo || checkboxCurrent){
                                var index = res.data[i]['LAY_TABLE_INDEX'];
                                if(state==null)
                                {
                                    $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                    $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                                }
                            }
                            //如果所有全选，那不允许修改复选框
                            if(checkallinfo || checkboxCurrent){
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop("disabled", true);
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-disbaled');
                            }else{
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop("disabled", false);
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().removeClass('layui-disbaled');
                            }
                        }
                        form.render('checkbox');
                        //$(".layui-table-box .layui-table-fixed .layui-table-header .laytable-cell-checkbox .layui-form-checkbox").hide();
                    },
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: 'projectlist',
                    height: 'full-200',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            $(".tab_others").on("click", function() {
                var index = $(this).index();
                $(this).addClass("tab_this").siblings().removeClass("tab_this");

            });

            function ddlList() {
                //加载项目级别
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url + "projectDicRegionLevel/getLevelsByRemoteScore",
                    data: {
                        unitId: localStorage.getItem("unit-id")
                    },
                    dataType: 'json',
                    success: function(data) {
                        $.each(data.data, function(index, item) {
                            $('#scoreLevel').append(new Option(item.scoreLevelName, item.scoreLevelId)); //往下拉菜单里添加元素
                        })
                        form.render('select'); 
                    },
                    error: function(data) {
                        layer.msg("响应失败");
                    }
                });
                //加载举办方式
                $.ajax({
                    type: "get",
                    url: huayi_projectscore_url + "projectDDL/holdTypeList/" + localStorage.getItem('standardkind-id'),
                    data: {
                        //dictId: "53d2d4c0-654b-11ec-b9f8-fa163e376cc4"
                    },
                    dataType: 'json',
                    success: function(data) {
                        $.each(data.data, function(index, item) {
                            if(item.dictName==="远程教育" || item.dictName==="全员培训"){
                                $('#holdType').append(new Option(item.dictName, item.dictId)); //往下拉菜单里添加元素
                            }
                        })
                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function(data) {
                        layer.msg("响应失败");
                    }
                });
                //加载举办单位
                if (!isNeimeng) {
                    $.ajax({
                        type: "post",
                        url: huayi_projectscore_url + "projectDDL/getcmeRemoteScoreUnit",
                        data: {
                            cmeStandardKindId: localStorage.getItem("standardkind-id")
                        },
                        dataType: 'json',
                        success: function(data) {
                            $.each(data.data, function(index, item) {
                                $('#teachUnit').append(new Option(item.unitName, item.unitId)); //往下拉菜单里添加元素
                            })
                            form.render('select'); //刷新select选择框渲染
                        },
                        error: function(data) {
                            layer.msg("响应失败");
                        }
                    });
                }
            }
            // 监听头部新增按钮
            table.on('toolbar(project)', function(obj) {
            var datas = obj.data;
            if (obj.event === 'AllCheckPass' || obj.event === 'AllCheckNoPass') {
                //审核项目 判断是否全选
                var checkallinfo=$("#checkboxAll").is(":checked");
                var singleProjNolist =[];
                var missage="";
                var postprojStatus=0;
                if(obj.event === 'AllCheckPass' ){
                    missage="确定全部审核通过吗?";
                    postprojStatus=3;
                }else if(obj.event === 'AllCheckNoPass'){
                    missage="确定全部审核不通过吗?";
                    postprojStatus=2;
                }
                if(checkallinfo){
                    if(obj.event === 'AllCheckPass' ){
                        layer.confirm(missage, {icon: 3, title: '提示'}, function () {
                            var loading = layer.load(0, {shade: false});
                            $.ajax({
                                type: "post",
                                url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreByProjNo",
                                data: {
                                    studyDateCollection: $('#studyDateCollection').val(),
                                    singleProjNo: $('#singleProjNo').val(),
                                    singleProjName: $('#singleProjName').val(),
                                    checkState: $('#checkState').val(),
                                    holdType: $('#holdType').val(),
                                    scoreLevel: $('#scoreLevel').val(),
                                    teachUnit:  $('#teachUnit').val(),
                                    ifAvail: 1,

                                    cmeStandardKindId: localStorage.getItem("standardkind-id"),
                                    unitId: localStorage.getItem("unit-id"),
                                    menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                                    projStatus:postprojStatus,
                                    type:1,
                                    unitUserType: localStorage.getItem("unit-user-type"),
                                    personName: $('#personName').val(),
                                    idCardNo: $('#idCardNo').val()
                                },
                                dataType: 'json',
                                success: function (res) {
                                    layer.close(loading);
                                    if (res.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('project');
                                        loaderTable();
                                    }
                                },
                                error: function (res) {
                                    layer.close(loading);
                                    layer.msg("响应失败");
                                }
                            });
                        })
                    }else if(obj.event === 'AllCheckNoPass'){
                        layer.prompt({formType: 2,title: missage},
                            function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                }else{
                                    var loading = layer.load(0, {shade: false});
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreByProjNo",
                                        data:{
                                            studyDateCollection: $('#studyDateCollection').val(),
                                            singleProjNo: $('#singleProjNo').val(),
                                            singleProjName: $('#singleProjName').val(),
                                            checkState: $('#checkState').val(),
                                            holdType: $('#holdType').val(),
                                            scoreLevel: $('#scoreLevel').val(),
                                            teachUnit:  $('#teachUnit').val(),
                                            checkMemo: value,
                                            ifAvail: 4,

                                            cmeStandardKindId: localStorage.getItem("standardkind-id"),
                                            unitId: localStorage.getItem("unit-id"),
                                            menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                                            projStatus:postprojStatus,
                                            type:1,
                                            unitUserType: localStorage.getItem("unit-user-type"),
                                            personName: $('#personName').val(),
                                            idCardNo: $('#idCardNo').val()
                                        },
                                        dataType: 'json',
                                        success: function (res) {
                                            layer.close(loading);
                                            if (res.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('project');
                                                loaderTable();
                                            }
                                        },
                                        error: function (res) {
                                            layer.close(loading);
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            }
                        );
                    }
                }else{
                    // var child = $("input[name='layTableCheckbox']");
                    //     child.each(function (index, item) {
                    //         if(item.checked===true){
                    //             singleProjNolist.push(item.defaultValue);
                    //         }
                    // });
                    var checkStatus = table.checkStatus(obj.config.id);
                    var data = checkStatus.data;
                    console.log(data);

                    if (data.length == 0) {
                        layer.alert("请选择项目");
                        return false;
                    }else{
                    if(obj.event === 'AllCheckPass' ){
                        layer.confirm("确定审核通过吗", {icon: 3, title: '提示'}, function () {
                            var loading = layer.load(0, {shade: false});
                            $.ajax({
                                type: "post",
                                url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreByProjNo",
                                data: {
                                    //singleProjNos: JSON.stringify(singleProjNolist),
                                    checkData: JSON.stringify(checkStatus.data),
                                    projStatus:postprojStatus,
                                    unitId: localStorage.getItem("unit-id"),
                                    menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                                    ifAvail: 1,
                                    type:2,
                                    unitUserType: localStorage.getItem("unit-user-type"),
                                    personName: $('#personName').val(),
                                    idCardNo: $('#idCardNo').val()
                                },
                                dataType: 'json',
                                success: function (res) {
                                    layer.close(loading);
                                    if (res.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('project');
                                        loaderTable();
                                    }
                                },
                                error: function (res) {
                                    layer.close(loading);
                                    layer.msg("响应失败");
                                }
                            });
                        })
                    }else if(obj.event === 'AllCheckNoPass'){
                        layer.prompt({formType: 2,title: missage},
                            function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                }else{
                                    var loading = layer.load(0, {shade: false});
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreByProjNo",
                                        data:{
                                            //singleProjNos: JSON.stringify(singleProjNolist),
                                            checkData: JSON.stringify(checkStatus.data),
                                            unitId: localStorage.getItem("unit-id"),
                                            menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                                            projStatus:postprojStatus,
                                            ifAvail: 4,
                                            type:2,
                                            checkMemo: value,
                                            unitUserType: localStorage.getItem("unit-user-type"),
                                            personName: $('#personName').val(),
                                            idCardNo: $('#idCardNo').val()
                                        },
                                        dataType: 'json',
                                        success: function (res) {
                                            layer.close(loading);
                                            if (res.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('project');
                                                loaderTable();
                                            }
                                        },
                                        error: function (res) {
                                            layer.close(loading);
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            });
                        }
                    }

                }
            }
            });
            // 监听行内按钮
            table.on('tool(project)', function(obj) {
                var datas = obj.data;
                datas.personName=$('#personName').val();
                datas.idCardNo=$('#idCardNo').val();
                //alert( datas.personName);
                if (obj.event === 'stuInfo') {
                    layer.open({
                        type: 2,
                        title: '人员明细',
                        content: encodeURI('remoteScoreStuCheck.html?projNo=' + datas.singleProjNo+'&checkState='+$("#checkState").val()
