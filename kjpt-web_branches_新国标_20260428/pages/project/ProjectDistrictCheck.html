<script>

    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    })
    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element','tool'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var tool = layui.tool;
        var year = document.getElementById("holdYear");
        var userid= localStorage.getItem("unit-id");
        var my = new Date();
        var status=0;
        var currentProjectCount = 0;
        var tabNumber=getUrlParam("tabNumber");
        var unitTypelocal=localStorage.getItem("unit_type");
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        var managerMedical = localStorage.getItem("manager-medical-type");
        var debounceTime=1500;
        const _isZheJiang = cmeStandardKindId === '190c480d-d43c-450b-8472-a6fd00a6729d';
        const _isGuangdong = cmeStandardKindId === "289bf0ca-52cb-4b19-b737-9bd200a69ce1";

        function refreshPdfExportButtons() {
            $("button[lay-event='pdf']").toggle(_isGuangdong && String(status) === '2');
        }

        function getExportHeaders() {
            return {
                "Accept": 'application/json',
                "Authorization": localStorage.getItem("token"),
                "KJPT-USER-ID": localStorage.getItem("user-id"),
                "cmestandard-id": localStorage.getItem("standardkind-id")
            };
        }

        function getDistrictQueryParams() {
            return {
                HoldYear: $('#holdYear').val(),
                CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                ProjectName: $('#projectName').val(),
                ProjectCode: $('#projectCode').val(),
                DictId: $('#holdType').val(),
                personName: $('#PrincipalName').val(),
                unitName: $('#UnitName').val(),
                knowledge2: $('#knowledge2').val(),
                knowledge3: $('#knowledge3').val(),
                UnitChildren: localStorage.getItem("menu-unit-id"),
                cmeStandardKindId: localStorage.getItem("standardkind-id"),
                status: status,
                unitId: localStorage.getItem("unit-id"),
                userCreate: localStorage.getItem("user-id"),
                unitUserType: localStorage.getItem("unit-user-type"),
                projectType: $('#projectType').val(),
                projType: $('#ActivityType').val(),
                scoreType: $('#ActivityContent').val()
            };
        }

        function requireScoreLevelForPdf() {
            if ($('#CmeComScoreLevel').val()) {
                return true;
            }
            layer.alert('请选择学分分类，点击查询后进行导出。', {icon: 5});
            return false;
        }

        function exportDistrictSummaryPdf() {
            if (!requireScoreLevelForPdf()) {
                return;
            }
            if (currentProjectCount < 1) {
                layer.msg('未查到项目信息');
                return;
            }
            var loading = layer.load(0, {
                shade: false
            });
            axios({
                method: 'GET',
                url: huayi_projectscore_url + 'projectExclel/pdfExportDistrictCheck',
                responseType: 'blob',
                headers: getExportHeaders(),
                params: $.extend({}, getDistrictQueryParams(), {
                    CmeComScoreLevelName: $('#CmeComScoreLevel option:selected').text() || ''
                })
            }).then(function (res) {
                var data = res.data;
                if (!data || !data.size) {
                    layer.close(loading);
                    layer.alert('PDF 导出失败，请稍后重试', {icon: 5});
                    return;
                }
                return data.slice(0, 5).text().then(function (headerText) {
                    layer.close(loading);
                    if (headerText !== '%PDF-') {
                        layer.alert('PDF 导出失败，请稍后重试', {icon: 5});
                        return;
                    }
                    var blob = new Blob([data], {type: 'application/pdf'});
                    var url = URL.createObjectURL(blob);
                    var exportLink = document.createElement('a');
                    exportLink.setAttribute('download', '已申报项目汇总表.pdf');
                    exportLink.href = url;
                    document.body.appendChild(exportLink);
                    exportLink.click();
                    document.body.removeChild(exportLink);
                    URL.revokeObjectURL(url);
                });
            }).catch(function (error) {
                layer.close(loading);
                layer.alert(typeof error === 'string' ? error : 'PDF 导出失败，请稍后重试', {icon: 5});
                console.error(error);
            });
        }

        // 将constantPage.js 常量赋值给label
        $("label").each(function() {
            const name = $(this).attr("name");
            if (projectLabels[name] !== undefined) {
                $(this).text(projectLabels[name]);
            }
        });

        function updateButtons() {
            var buttonP = document.getElementById("checkPase"); // 获取按钮元素
            var buttonNP = document.getElementById("checkNP");  
            var buttonBack = document.getElementById("checksendBack");

            if (cmeStandardKindId === "4a6d91fb-8ba4-4560-a801-9c6f00e6d999") {
                buttonP.textContent = "审查通过"; 
                buttonNP.textContent = "审查不通过"; 
                buttonBack.textContent = "退回下级"; 
            } else if (_isGuangdong) {
                buttonP.textContent = "审核通过";
                buttonNP.textContent = "审核不通过"; 
                buttonBack.textContent = "退回修改";

            } else {
                buttonP.textContent = "预审通过";
                buttonNP.textContent = "预审不通过"; 
                buttonBack.textContent = "退回修改"; 
            }
        }

        $(function () {
            //设置医学体系
            tool.setMedicalTypeSelectById("#projectType");
            //加载申报年度
            $.ajax({
                type: "post",
                url: huayi_projectscore_url +"projectDicRegionLevel/getHoldYear",
                data: {cmeStandardKind:localStorage.getItem("standardkind-id"),unitId:localStorage.getItem("unit-id")},
                dataType: 'json',
                async: false,
                success: function (data) {
                    for(var year of data.data.entries()){
                        $('#holdYear').append(new Option(year[1],year[1]));//往下拉菜单里添加元素
                    }
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败1");
                }
            });

            ddlList();
            loaderTable();
            loadReport();
            displayBtn();
            if(tabNumber!=null && tabNumber!=''){
                $('.layui-tab-title li').eq(tabNumber).addClass('tab_this layui-this').siblings().removeClass('tab_this layui-this');
                status=tabNumber;
                loaderTable();
                displayBtn();
            }
            updateButtons();
            loadLimitNum(); 
            refreshPdfExportButtons();
        });
        window.colArray=[
            {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                    var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.projectId+'"><i class="layui-icon"></i>';
                        //利用三元表达式判断本条数据是否需要加载checkbox
                        if( status==0){
                            return d.isPass != null ?'已审核':templateHtml
                        }else if(localStorage.getItem("unit-user-type")==3){
                            return d.isPass != null && d.flowChainState > 40 ?'上级已审核':templateHtml
                        }else if(localStorage.getItem("unit-user-type")==4){
                            return d.isPass != null && d.flowChainState > 50 ?'上级已审核':templateHtml
                        }
            }},
            {field: 'center', width: 200, toolbar: '#rowBar', title: '操作',align:'center'},
        ];
        if(localStorage.getItem("standardkind-id")!="73ba18db-33fd-4746-ab41-9beb009f69a1"){
            let column=""; 
            column={field: 'center',width: 100,toolbar: '#rowCheckBar',title: '审批进度',align: 'center'};
            window.colArray.push(column);
        }
         //如果是宁夏，拼接申报书上传列
        if(cmeStandardKindId=="eee87ca0-7df1-426c-aae3-7cae782b4d6b"){
            let column=""; 
            column={field:'center', title:'申报书', width:173, templet: '#uploadDecl',align: 'center'};
            window.colArray.push(column);
        }
        if (_isZheJiang) {
            let column="";
            column={field:'center', title:'项目负责人课件', width:173, templet: '#uploadDecl',align: 'center'};
            window.colArray.push(column);
        }
        if (_isGuangdong) {
            let column="";
            column={field:'center', title:'承诺书', width:173, templet: '#uploadDecl',align: 'center'};
            window.colArray.push(column);
        }
        let  column="";
        column={
                field:'center' ,title:'专家评审',align: 'center',width:100,templet:function (d) {
                    var templateHtml = '<a class="layui-btn layui-btn-xs" lay-event="viewProjExportOption"  style="color: #ffb82e;background-color: transparent;cursor: pointer;">查看</a>';
                        //利用三元表达式判断本条数据是否需要加载专家相关信息
                        if( d.topUnitId === userid){
                            return templateHtml;
                        }else{
                            return '';
                        }
                }
            };
            window.colArray.push(column);
            column= {   
                //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                field:'center' ,title:'推荐通过/不通过',align: 'center',width:140,templet:function (d) {
                    var templateHtml = ' <div class="layui-table-cell laytable-cell-1-0-2">'+d.proportion+'</div>';
                    if( d.topUnitId === userid){
                            return templateHtml;
                        }else{
                            return '';
                        }
            }};
            window.colArray.push(column);
 
            column= {
                field:'avggrade' ,title:'平均分',align: 'center',sort: true,width:100,templet:function (d) {
                    var templateHtml = d.avggrade;
                        //利用三元表达式判断本条数据是否需要加载专家相关信息
                        if( d.topUnitId === userid){
                            return templateHtml;
                        }else{
                            return '';
                        }
                }
            };
            window.colArray.push(column);
        $.ajax({
                type:"POST",
                headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                async:false,
                url: huayi_projectscore_url +"project/comcolumnList",
                data:JSON.stringify({"module_name": "ProjectDistrictCheck"}),
                contentType:"application/json",
                success:function(data){
                    $.each(data.data,function(index,item){

                                    unitId:localStorage.getItem("unit-id"),
                                    content:value,
                                    type:2
                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("操作成功");
                                        table.reload('project');
                                        loadReport();
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            })
                            layer.close(index);
                        }
                    },debounceTime)
                );
            }else if(obj.event==='sendBack'){

                layer.prompt({formType: 2,title: '退回原因'},
                debounce(function(value, index, elem){
                        if(value.length>100){
                            layer.alert("最多支持100个汉字");
                        }else{
                            $.ajax({
                                type:"post",
                                url: huayi_projectscore_url +"project/checkProjDistrict",
                                data:{
                                    projectIds: JSON.stringify(projectidlist),
                                    projStatus:1,
                                    unitId:localStorage.getItem("unit-id"),
                                    content:value,
                                    type:2
                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("操作成功");
                                        table.reload('project');
                                        loadReport();
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            })
                            layer.close(index);
                        }
                    },debounceTime)
                );
            }
            else if(obj.event==='cancelSendBack'){
                layer.confirm('确定要取消退回吗', {icon: 3, title: '提示'}, function () {
                    $.ajax({
                        type: "post",
                        url: huayi_projectscore_url +"project/checkProjDistrict",
                        data: {
                            projectIds: JSON.stringify(projectidlist),
                            projStatus:4,
                            unitId:localStorage.getItem("unit-id"),
                            type:2
                        },
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("操作成功");
                                table.reload('project');
                                loadReport();
                            }
                        },
                        error: function (res) {
                            layer.msg("响应失败");
                        }
                    });
                })
            } else if (obj.event === 'view') {
                var currentTarget = $(this);
                var viewProjectId = currentTarget.attr('data-project-id') || datas.projectId;
                var viewPreviousId = currentTarget.attr('data-previous-id');
                var viewHoldYear = currentTarget.attr('data-hold-year') || datas.holdYear;
                var viewScoreLevelId = currentTarget.attr('data-score-level-id') || datas.scoreLevelId;

                if (viewPreviousId === 'null' || viewPreviousId === 'undefined') {
                    viewPreviousId = '';
                }
                //备案项目不走申报表预览
                if(viewPreviousId){
                    layer.open({
                        type: 2,
                        title: '浏览',
                        content: 'projectRecord/fujian/record.html?projectId=' + viewPreviousId  + '&projectBeiAnId=' + viewProjectId + '&type=view',
                        // content: getCptUrl('cmeYear', obj.data.scoreLevelId, 'record_preview') + '&projectId=' + obj.data.projectId + "&projectBeiAnId=" + obj.data.projectBeiAnId,
                        skin: '',
                        area: ['90%', '90%'],
                    })
                }else{
                    let cptUrl =getProjectPageUrl(viewHoldYear, viewScoreLevelId, viewProjectId,'unit',1);
                    if (cptUrl === '') {
                        layer.msg('暂无申报页面配置');
                        return;
                    }

                    layer.open({
                        type: 2,
                        title: '浏览',
                        content: cptUrl,
                        skin: '',
                        area: ['100%', '100%'],
                    })
                }
                    
                }else if( obj.event ==='viewSubmitProj'){
                    layer.open({
                        type: 2,
                        title: '',
                        content: 'projectProgress/projCheckProgress.html?projectId=' + obj.data.projectId,
                        area: ['560px', '380px'],
                    })
                }else if( obj.event ==='viewProjExportOption'){
                    layer.open({
                        type: 2,
                        title: '',
                        content: '../projectexpert/ProjectExpertOption.html?projectId=' + obj.data.projectId,
                        area: ['660px', '380px'],
                    })
                }
        });

        // form表单相关操作
        // 监听查询
        form.on('submit(search)', function (data) {
            loaderTable();
            loadReport();
            displayBtn();
            updateButtons();
            loadLimitNum();
            refreshPdfExportButtons();
        });
        //下拉框值改变
        form.on('select(loadReport)', function (data) {
            $('#holdType').empty().append($('<option value="">请选择</option>'));
            $('#ActivityContent').empty().append($('<option value="">请选择</option>'));
            $('#ActivityType').empty().append($('<option value="">请选择</option>'));
            ddlList();
            loadReport();
            loaderTable();
            displayBtn();
            updateButtons();
            refreshPdfExportButtons();
        })
        function toggleCheckboxes(checked, disable) {
            var child = $("input[name='layTableCheckbox']");
            child.each(function (index, item) {
                item.checked = checked;
                item.disabled = disable;
            });
            form.render('checkbox');
        }
        //全选
        form.on('checkbox(checkboxAll)', function(data){
            if(data.elem.checked){
                $("#checkboxCurrent").prop("checked", false);
                toggleCheckboxes(true, true);
            } else {
                toggleCheckboxes(false, false);
            }
        });
        //本页全选
        form.on('checkbox(checkboxCurrent)', function(data){
            if(data.elem.checked){
                $("#checkboxAll").prop("checked", false);
                toggleCheckboxes(true, true);
            } else {
                toggleCheckboxes(false, false);
            }
        });

        //二级学科下拉框值改变
        form.on('select(changeknowledge2)', function (data) {
            //加载三级学科
            $.ajax({
                type: "post",
                url: huayi_projectscore_url +"projectDDL/selectknowledge",
                data: {type:3,know2: $('#knowledge2').val(),cmeStandardKindId:localStorage.getItem('standardkind-id'),year:$('#holdYear').val() },
                dataType: 'json',
                success: function (data) {
                    $('#knowledge3').empty();
                    $('#knowledge3').append(new Option("全部",""));
                    $.each(data.data,function(index,item){
                        $('#knowledge3').append(new Option(item.knowledgeName,item.knowledgeId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败1");
                }
            });
        })


        //鼠标悬停提示特效
        $("#hint").hover(function () {
            openMsg();
        }, function () {
            layer.close(subtips);
        });
        function openMsg() {
            subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
        }
        element.on('tab(tabcheck)', function(data){
            var nums=data.index;
            status=nums;
            loaderTable();
            displayBtn();
            loadReport();
            updateButtons();
            refreshPdfExportButtons();
            //屏蔽按钮
            switch (status) {
                case 2: $("#checkPase").attr("style","display:none");
                  break;
                case 3: $("#checksendBack").attr("style","display:none");
                  break; 
                case 4: $("#checkNP").attr("style","display:none");
                  break;
            }
        });
        form.on('select(loadHoldType)', function(data) {
            //加载举办方式
            let keyName     = projectLabels.lblProjectLevel,
            scoreLevel  = $('#CmeComScoreLevel').val();
            $.ajax({
                url     : huayi_sjwh_url + 'option/holdType/list/' +  localStorage.getItem("standardkind-id")+ '/' + scoreLevel + '/1__',
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#holdType');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            $.ajax({
                url     : huayi_sjwh_url + 'option/scoreLevelContent/list',
                data    : { scoreLevel: scoreLevel },
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#ActivityContent');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.value + '">' + d.scoreLevelContentName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        })

        function displayBtn(){
            if(status==2){
                $('#checkPase').attr('style','display:none');
            }else if(status==3){
                $('#checksendBack').attr('style','display:none');
            }else if(status==4){
                $('#checkNP').attr('style','display:none');
            }
        }
        //TODO 先判断是否是最高审核单位
        function getProjleveltype(projectidlist){
            var projecttypelist=[];
            var leveltypemessage;
            $.ajax({
                type: "post",
                async: false,
                url: huayi_projectscore_url +"project/getProjleveltype",
                data: {ProjectIdList:JSON.stringify(projectidlist)},
                dataType: 'json',
                success: function (data) {
                    $.each(data.data,function(index,item){
                        let tempObj = {};
                        tempObj[item.score_level_id] = item.case;
                        projecttypelist.push(tempObj);
                    })
                    let tempParam = {year: $('#holdYear').val(),unitId:localStorage.getItem("unit-id"),type:2,scoreLevelList:projecttypelist};
                    $.ajax({
                        type: "POST",
                        async: false,
                        url: huayi_projectscore_url+"projectApplyDate/isCheckDelay",
                        data: JSON.stringify(tempParam),
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success:function(object){
                            if(object.data.status=='5'){
                                leveltypemessage= "";
                            }else{
                                leveltypemessage= object.data.msg;
                            }
                        }
                    })
                },
                error: function (data) {
                    leveltypemessage= "响应失败";
                }
            });
            return leveltypemessage;
        }  
        function loadLimitNum(){
            if(localStorage.getItem("standardkind-id")!="08e44437-5789-44e0-8ff8-9ecb00a6348a"){
                $('#applyLimit').html("");
                return;
            }else{
                $.ajax({
                    type:"POST",
                    async: false,
                    url: huayi_projectscore_url + "project/getProjlimited",
                    data:  JSON.stringify({
                        unitid: localStorage.getItem("unit-id"),
                        holdyear: $('#holdYear').val(),
                        scoreLevelId:"6926b861-5d4a-44af-8ca3-9f0a01000b93",
                        cme_standard_kind_id: localStorage.getItem("standardkind-id")
                    }),
                    contentType: "application/json",
                    dataType: "json",
                    success: function(data) {
                
                        // 渲染模板
                        if(localStorage.getItem("standardkind-id")==="08e44437-5789-44e0-8ff8-9ecb00a6348a"){
                            var lblmsg="";
                            var toolbarHtml = $('#bar').html();
                            if(data!=null){
                                if(data.status==501){
                                    lblmsg=data.msg;
                                }else{
                                    lblmsg="自治区级推荐项目剩余上报数量:"+data.data;
                                }
                            }else
                            {
                                $('#applyLimit').html("");
                            } 
                            $('#applyLimit').html(lblmsg);

                        } 
                    },
                    error: function(data, xhr, stus) {
                        layer.msg("响应失败");
                    }
                })
            }
        } 
        window.getVerParams = () => {
            return {
                cmeStandardKindId   : dictTool.getStandardKindId(),
                versionYear         : $('#holdYear').val()
            };
        }
        window.initKnowledgeSelBatch = () => {
            $('#knowledge3').empty();
            dictTool.initKnowledgeSel('#knowledge2', '二级学科', { ...getVerParams(), knowledgeType: 2 });
            $('#knowledge3').find('option:gt(0)').remove();
            let knowledgeTwoId = $('#knowledge2').val();
            if (knowledgeTwoId) 
                dictTool.initKnowledgeSel('#knowledge3', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: knowledgeTwoId });
            form.on('select(knowledge2)', data => 
                dictTool.initKnowledgeSel('#knowledge3', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: data.value }));
        }       
    });

</script>
