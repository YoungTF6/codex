<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>考勤批次信息</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="../../../js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="../../../js/layui-v2.6.8/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
</head>
<body>
<div class="layui-fluid">
<!--    考勤详细信息弹出框-->
    <div class="layui-card" id="attendanceTable">
        <div class="layui-card">
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="batchInfo" lay-filter="batchInfo_filter" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
    var downId=getUrlParam("downId");
    var type = getUrlParam("type");
    layui.use(['table', 'form','laydate'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate=layui.laydate;

        // 考勤详细信息表格
        window.batchInfo=function () {
            table.render({
                elem: '#batchInfo',
                title: '考勤时间列表',
                url: huayi_projectscore_url+'/cmeProjPosDownload/cmeProjAttendBatchList/'+downId,
                where: {
                    downId: downId
                },
                headers: { Authorization: localStorage.getItem("token"), 'KJPT-USER-ID': localStorage.getItem("user-id") },
                defaultToolbar: [],
                cols: [[
                    { field: 'batch', title: "序号", sort: true, align: 'center',width:80 },   
                    { field: 'hasAttend', title: "考勤状态",  align: 'center',width:100,templet: function(d){
                         return d.hasAttend ? '已考勤' : '未考勤';
                    } },                  
                    { field: 'startDate', title: '开始时间', align: 'center' },
                    { field: 'endDate', title: '结束时间', align: 'center' }
                ]],
                cellMinWidth: 100,
                id: "effectiveStaffTable",
                height: 'full',
                page: false,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
            })
        }
        batchInfo();
    })
</script>
</body>
</html>
