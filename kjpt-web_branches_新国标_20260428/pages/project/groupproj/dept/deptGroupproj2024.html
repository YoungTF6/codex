<body style="background: #fff;">
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-tab layui-tab-card" lay-filter="my-filter">
                <ul class="layui-tab-title">
                    <li class="layui-this tab-default" lay-id="0" id="all">全部</li>
                    <li lay-id="1" id="hasBeenHeld" class="tab-default">已举办</li>
                    <li lay-id="2" id="notToHold" class="tab-default">未举办</li>
                    <li lay-id="3" id="notGivenPoints" class="tab-default">待授分</li>
                </ul>
            </div>
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label">举办年度</label>
                            <div class="layui-input-block">
                                <input type="text" id="cmeYearSearch" placeholder="请选择年度" autocomplete="off" class="layui-input">
                            </div>
                        </div>

                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label">项目级别</label>
                            <div class="layui-input-block">
                                <select id="scoreLevelSearch" lay-filter="scoreLevelFilter"></select>
                            </div>
                        </div>
                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label">举办方式</label>
                            <div class="layui-input-block">
                                <select id="holdTypeSearch"></select>
                            </div>
                        </div>
                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label">二级学科</label>
                            <div class="layui-input-block">
                                <select id="knowledgeTwoSearch" lay-filter="knowledgeTwoFilter"></select>
                            </div>
                        </div>
                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label">三级学科</label>
                            <div class="layui-input-block">
                                <select id="knowledgeThreeSearch"></select>
                            </div>
                        </div>

                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label" style="width: 85px;padding-right: 10px;">院内活动名称</label>
                            <div class="layui-input-block">
                                <input type="text" id="groupProjectNameSearch" placeholder="请输入院内活动名称" autocomplete="off" class="layui-input">
                            </div>
                        </div>

                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label" style="width: 85px;padding-right: 10px;">举办开始日期</label>
                            <div class="layui-input-block">
                                <input type="text" id="startDateSearch" required lay-verify="required" placeholder="请选择开始时间范围" autocomplete="off" class="layui-input">
                            </div>
                        </div>

                        <div class="layui-inline width_23_calc">
                            <label class="layui-form-label" style="width: 85px;padding-right: 10px;">执行情况反馈</label>
                            <div class="layui-input-block">
                                <select name="fbStatus">
                                    <option value="">请选择</option>
                                    <option value="1">已反馈</option>
                                    <option value="0">未反馈</option>
                                </select>
                            </div>
                        </div>

                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>

                </div>
            </div>
            <!--        表格区域-->
            <div class="layui-card-body"  style="padding:7px 5px">
                <table class="layui-table" id="cmeGroupproj" lay-filter="cmeGroupproj" style="margin: 0px 0px;"></table>
            </div>
            <div id="addGroupproj" style="display:none;text-align: center;padding: 35px;">
                <form class="layui-form" id="groupProjForm" lay-filter="addGroupProjForm">
                    <!-- row1 -->
                    <input type="hidden" name="groupProjId">
                    <div class="layui-form-item">
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>举办年度</label>
                            <div class="layui-input-block">
                                <select name="cmeYear" id="cmeYearForm" lay-verify="required">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>活动名称</label>
                            <div class="layui-input-block">
                                <input type="text" name="groupProjName" lay-verify="required|groupProjName" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                    </div>

                    <!-- row2 -->
                    <div class="layui-form-item">
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>学分级别</label>
                            <div class="layui-input-block">
                                <select name="scoreLevel" id="scoreLevelForm" lay-filter="scoreLevelForm" lay-verify="required"></select>
                            </div>
                        </div>
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>学分</label>
                            <div class="layui-input-block">
                                <input type="number" name="score" id="score" min="0" lay-verify="required" autocomplete="off" class="layui-input number_ph">
                            </div>
                        </div>
                    </div>

                    <!-- row3 -->
                    <div class="layui-form-item">
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>学时</label>
                            <div class="layui-input-block">
                                <input type="number" name="period" min="0" lay-verify="required" autocomplete="off" class="layui-input number_ph">
                            </div>
                        </div>
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>二级学科</label>
                            <div class="layui-input-block">
                                <select name="knowledgeTwoId" lay-filter="twoKnowledgeIdFrom" id="twoKnowledgeIdFrom" lay-verify="required" lay-search="true">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- row4 -->
                    <div class="layui-form-item">
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>三级学科</label>
                            <div class="layui-input-block">
                                <select name="knowledgeId" lay-filter="knowledgeIdSelector" id="knowledgeThreeFrom" lay-search="" lay-verify="required">
                                </select>
                            </div>
                        </div>
                        <div class="layui-col-sm6">
                            <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>举办方式</label>
                            <div class="layui-input-block">
                                <select name="holdType" id="holdTypeFrom" lay-verify="required">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- row5 -->
                    <div class="layui-form-item">
                        <div class="layui-col-sm6">
                            <label class="layui-form-label">考核方式</label>
                            <div class="layui-input-block">
                                <select name="checkType" id="checkTypeSelector">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-col-sm6">
                            <label class="layui-form-label" id="noLabel">其他编号</label>
                            <div class="layui-input-block">
                                <input type="text" name="otherNo" lay-verify="otherNo" autocomplete="off" class="layui-input" />
                            </div>
                        </div>
                    </div>

                    <!-- row6 -->
                    <div class="layui-form-item">
                        <div class="layui-col-sm6">
                            <label class="layui-form-label">备注</label>
                            <div class="layui-input-block">
                                <input type="text" name="remark" lay-verify="remark" autocomplete="off" class="layui-input" />
                            </div>
                        </div>
                    </div>
                    <!-- row7 -->
                    <div class="layui-form-item">
                        <div class="layui-col-sm12">
                            <div style="text-align: center;">
                                <button class="layui-btn" type="submit" lay-submit lay-filter="saveBack">保存并返回列表</button>
                                <button class="layui-btn" type="submit" lay-submit lay-filter="nextStep">下一步完善举办周期</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</body>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-sm" lay-event="add" id="groupAdd"><i class="layui-icon layui-icon-add-1 layuiadmin-button-btn"></i>新增</a>
</script>
<script type="text/html" id="rowBar1">

</script>
<script type="text/html" id="rowBarProjApply">

</script>
<script type="text/html" id="rowBar2">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="maintainTestPaper">维护试卷</a>
</script>
<script type="text/html" id="rowBar3">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="sweepCodeAttendance">扫码考勤</a>
</script>
<script type="text/html" id="rowBar4">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="grantPoints">授分</a>
</script>
<script type="text/html" id="rowBar5">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="projectEvaluation">项目评价表</a>
</script>

                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },

                    if (window["fun_dept_agent_groupproj"] == 1) {
                        $("[data-field='oprate']").css('display', 'none');

                        let fun_show_cols = range_dept_agent_groupproj_func_cols.split('|');

        //处理统计数据
        let handerCountNum = function (data) {
            let allCount = 0, holdCount = 0, noHoldCount = 0, waitScoreCount = 0;
            for (let tempObj of data) {
                allCount += tempObj.statusCount;
                //已举办
                if (tempObj.isHasAttendance || tempObj.isHasScore) {
                    holdCount += tempObj.statusCount;
                }
                //待授分
                if (tempObj.isHasAttendance && !tempObj.isHasScore) {
                    waitScoreCount += tempObj.statusCount;
                }
            }
            noHoldCount = allCount - holdCount;
            setCountForStatus(allCount, "0");
            setCountForStatus(holdCount, "1");
            setCountForStatus(noHoldCount, "2");
            setCountForStatus(waitScoreCount, "3");
        }

                renderScoreLevel();

            if (type == "add") {
                renderScoreLevel();
                changeHodeTypeByScoreLevel("", "holdTypeFrom");
                form.render("select");
            }
            const title = type == "add" ? "添加院内活动" : "编辑院内活动";

                type: 1,
                title: title,
                content: $('#addGroupproj'),
                area: ['820px', '520px'],
                success: function () {
                    if (_isHuBei || _isGuangxi) {

        let saveGroupProj = function (groupProj, action) {
            if(_isNingxia) {
                if(groupProj.score > 0.5) {
                    layer.msg("学分不得大于0.5分");
                    return false;
                }
            }
            let visit;
            if (groupProj.groupProjId) {
                // update
                visit = huayi_projectscore_url + 'pgsi/gproj/update';
                groupProj.userUpdate = _deptId;
            } else {
                // create
                visit = huayi_projectscore_url + 'pgsi/gproj/create';
                // not null constraint
                groupProj.userCreate = _deptId;
                groupProj.unitId = _unitId;
                groupProj.deptId = _deptId;
                groupProj.standardKindId = _standardKindId;
            }
            postAction(visit, groupProj).then((response) => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gProjId = jsonRes.data.groupProjId;
                    layer.msg('已保存院内活动');

        window.ableOperateLastYearData = function(dataYear) {
            let cgv = window["value_forbid_some_operate_on_last_year_data"];
            if(cgv == null || cgv == "") {
                return true;
            }
           
            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
