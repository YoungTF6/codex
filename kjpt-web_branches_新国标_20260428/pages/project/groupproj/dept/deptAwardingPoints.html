<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>授分</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script src="/js/common.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="cmeProjPosDownload" lay-filter="cmeProjPosDownload" style="margin: 0px 0px;">
            </table>
        </div>
    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    
    {{# if( checkBeforeStartDate(d.startDate) || (window["fun_must_apply_before_hold"] == 't' && d.groupprojCycleApplicationCheckState != 3   )) { }}
        <a class="layui-btn layui-btn-xs btn-normal-row layui-disabled">考勤记录授分</a>
        <a class="layui-btn layui-btn-xs btn-danger-row layui-disabled">手工补录学分</a>
        <a class="layui-btn layui-btn-xs btn-warm-row layui-disabled">主讲人授分</a>
    {{# } else { }}
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="attendanceRecordAwardPoints">考勤记录授分</a>
        {{# if(window['fun_close_bulu_proj_groupproj_score'] != '1'){ }}
        <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="manualCredits">手工补录学分</a>
        {{# } }}
        <a class="layui-btn layui-btn-xs " style="background-color: transparent; color:#5FB878"  lay-event="teacherScore">主讲人授分</a>
    {{# } }}
</script>
<script type="text/html" id="rowBarForDownId">
    <span>第{{d.LAY_TABLE_INDEX+1}}批次</span>
</script>
<script>

    var projectId=getUrlParam("projectId");
    var projectType=getUrlParam("projectType");
    var scoreLevel = getUrlParam('scoreLevel');
    // 全局配置及引入相关的模块
    layui.use(['table', 'form'], function () {
        var table = layui.table,form = layui.form, $ = layui.jquery,layer = layui.layer;
        // 表格相关操作
        // 表格配置
        let tableInit = function() {
            table.render({
                elem: '#cmeProjPosDownload',
                url: huayi_projectscore_url + 'giving/getDownList',
                title: '周期表',
                defaultToolbar: [],
                where: {
                    projectId: projectId,
                    projectType: projectType,
                },
                cols: [[
                    {align: 'center', width: 300, toolbar: '#rowBar', title: '操作'},
                    {field: 'downId', title: '周期主键',hide : true},
                    {field: 'projectOn', title: '项目编号', hide: true },
                    {field: 'projectName', title: '项目名称 ', },
                    {title: '批次 ',toolbar: '#rowBarForDownId', },
                    {field: 'startDate', title: '开始时间', },
                    {field: 'endDate', title: '截止时间', },
                    {field: 'givingStatus', title: '是否已授分', templet: function (d) {
                        if(d.givingStatus) return '是';
                        return '否'
                    }}
                ]],
                cellMinWidth: 100,
                id: "cmeProjPosDownload",
                height: getHeight('cmeProjPosDownload'),
                page: false,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }
                }
            });
        }

        window.getHeight = function(id) {
                var windowHeight = $(window).height();
                var divTop = $('#'+id).offset().top;
                var divHeight = windowHeight - divTop;
                return divHeight-35;
            }

        // 考勤分析
        let deptAttenAnalyse = function(data) {
            let tempUrl;
            if(window['value_qrcode_attend_mode'] == '2') {
                tempUrl = 'deptAttendanceAwardPointsForProj.html?downId='+data.downId+'&projectId='+projectId+'&projectType='+projectType+'&scoreLevel='+scoreLevel+'&startDate='+data.startDate+'&endDate='+data.endDate;
                // tempUrl = 'deptAttendanceAwardPoints.html?downId='+data.downId+'&projectId='+projectId+'&projectType='+projectType+'&startDate='+data.startDate+'&endDate='+data.endDate;
            } else {
                tempUrl = 'deptAttendanceAwardPoints.html?downId='+data.downId+'&projectId='+projectId+'&projectType='+projectType+'&startDate='+data.startDate+'&endDate='+data.endDate;
            }
            var index = layer.open({
                type: 2,
                title: "考勤记录授分",
                type: 2,
                content: tempUrl,
                skin: '',
                area: ['100%', '100%'],
            })
        }

        //手工补录学分
        let manualGivingScore =function(data) {
            console.log("data:");
            console.log(data);
            let tempUrl = 'deptManualEntryPoints.html?downId='+data.downId+'&projectType='+projectType+'&startDate='+data.startDate+'&endDate='+data.endDate+'&projectId='+projectId
            var index = layer.open({
                type: 2,
                title: '手工补录学分',
                content: tempUrl,
                area: ['100%', '100%'],
                skin: '',
            })
        }
        
        let teacherScore = function(data) {
            var index = layer.open({
                type: 2,
                title: '主讲人授分',
                content: '/pages/project/givingForGroup/GivingForTeachers.html?downId='+data.downId+'&projectType='+projectType+'&startDate='+data.startDate+'&endDate='+data.endDate,
                area: ['100%', '100%'],
                skin: ''
            });
        }
        

        // 监听行内按钮
        table.on('tool(cmeProjPosDownload)', function (obj) {
            obj.event == 'attendanceRecordAwardPoints' && deptAttenAnalyse(obj.data);
            obj.event == 'manualCredits' && manualGivingScore(obj.data);
            obj.event === 'teacherScore' && teacherScore(obj.data);
        });

        let htmlInit = function() {
            getConfig('value_qrcode_attend_mode', localStorage.getItem("unit-id"),null);
            getConfig('fun_must_apply_before_hold', localStorage.getItem("unit-id"),scoreLevel);
            getConfig('fun_close_bulu_proj_groupproj_score', localStorage.getItem("unit-id"), null);
            tableInit();
        }

        window.checkBeforeStartDate = function(startDateStr) {
            let now = new Date();
            let startDate = new Date(startDateStr);
            return now < startDate;
        }

        htmlInit();

    });

</script>
</body>
</html>
