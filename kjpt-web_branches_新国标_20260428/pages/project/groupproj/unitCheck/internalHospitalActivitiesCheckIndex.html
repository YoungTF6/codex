<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>单位-院内活动审核</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../../js/constant.js"></script>
    <script type="text/javascript" src="../../../../js/constantPage/projectConstant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../../js/common.js"></script>
    <script type="text/javascript" src="../../../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <script type="text/javascript" src="../../../../js/tools/dict_tool.js"></script>

    <style>
        /* card tabs */
        .layui-tab-title .layui-this {
            color: #404040 !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .layui-treeSelect .ztree li {
            line-height: 19.5px !important;
        }
    </style>
</head>

<body>
    <div>
        <div class="layui-fluid">
            <div class="layui-card">
                <div class="layui-tab" lay-filter="tabarea" id="tabarea">
                    <ul class="layui-tab-title">
                        <li id="tab_1" class="tab-default layui-this">全部<span id="all"></span></li>
                        <li id="tab_2" lay-id="0" class="tab-default">待审核<span id="toAudit"></span></li>
                        <!-- <li id="tab_3" lay-id="2" class="tab-default">退回修改<span id="returnToModify"></span></li> -->
                        <li id="tab_4" lay-id="3" class="tab-default">审核通过<span id="passTheAudit"></span></li>
                        <li id="tab_5" lay-id="1" class="tab-default">审核不通过<span id="auditFailed"></span></li>
                    </ul>
                </div>
                <!--        搜索框区域-->
                <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background: #f5f5f5;">
                    <div class="layui_mess">
                        <div class="layui_display">
                            <div class="layui-inline">
                                <label class="layui-form-label">举办年度</label>
                                <div class="layui-input-block">
                                    <!-- <input type="text" name="cmeYear" id="cmeYear_id" required lay-verify="required" placeholder="请输入标题" autocomplete="off" class="layui-input"> -->
                                    <select name="cmeYear" id="cmeYear_id" required lay-verify="required"  lay-filter="cmeYear">
                                    </select>
                                </div>
                            </div>

                            <!-- <div class="layui-inline">
                                <label class="layui-form-label">项目级别</label>
                                <div class="layui-input-block">
                                    <select name="scoreLevel" id="scoreLevel" lay-verify="required">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                            </div> -->

                            <!-- 项目级别 -->
                            <div class="layui-inline  tree-select">
                                <label class="layui-form-label" name="lblActivityLevel"></label>
                                <div class="layui-input-block">
                                    <input type="text" autocomplete="off" class="layui-input" 
                                        lay-filter="scoreLevel" id="scoreLevel" name="scoreLevel" placeholder="请选择">
                                </div>
                            </div>

                            <!-- <div class="layui-inline">
                                <label class="layui-form-label">举办方式</label>
                                <div class="layui-input-block">
                                    <select name="holdType" id="holdType" lay-verify="required">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                            </div> -->

                            <!-- 活动形式 -->
                            <div class="layui-inline">
                                <label class="layui-form-label" name="lblActivityForm"></label>
                                <div class="layui-input-block">
                                    <select name="holdType" id="holdType" lay-filter="holdType"></select>
                                </div>
                            </div>

                            <div class="layui-inline">
                                <label class="layui-form-label">二级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeTwo" id="knowledgeTwo_id" lay-filter="knowledge_search_filter" lay-verify="required">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">三级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeId" id="knowledgeId_id" lay-verify="required">
                                        <option value="">请先选择二级学科</option>
                                    </select>
                                </div>
                            </div>

                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 85px;padding-right: 10px;">院内活动名称</label>
                                <div class="layui-input-block">
                                    <input type="text" name="groupProjectName" id="groupProjectName_id" required lay-verify="required" placeholder="请输入标题" autocomplete="off"
                                        class="layui-input">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 85px;padding-right: 10px;">举办开始日期</label>
                                <div class="layui-input-block">
                                    <input type="text" name="startDate" id="startDate_id" required lay-verify="required" placeholder="请输入标题" autocomplete="off"
                                        class="layui-input">
                                </div>
                            </div>

                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 85px;padding-right: 10px;">执行情况反馈</label>
                                <div class="layui-input-block">
                                    <select name="fbStatus">
                                        <option value="">请选择</option>
                                        <option value="1">已反馈</option>
                                        <option value="0">未反馈</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline" lay-filter="deptSelectArea">
                                <label class="layui-form-label">科室</label>
                                <div class="layui-input-block">
                                    <input type="text" autocomplete="off" class="layui-input" disabled lay-filter="deptSelect" id="deptSelect" name="deptId"
                                        placeholder="请选择">
                                </div>
                                <input type="hidden" id="hidden_dept_id" />
                            </div>

                        </div>
                        <div class="layui_display">
                            <div class="layui-inline">
                                <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                                    <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <!--        表格区域-->
                <div class="layui-card-body layui_body_box">
                    <table class="layui-table" id="cmeGroupproj" lay-filter="cmeGroupproj_filter" style="margin: 0px 0px;">
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!--审核弹出框-->
    <div id="remark" style=" display:none;text-align: center">

        <form class="layui-form" style="padding: 15px;" id="form-ComDept" lay-filter="add-filter">
          
            <div class="layui-form-item layui-form-text" >
                <div class="layui-inline">
                    <label class="layui-form-label">审核说明</label>
                    <div class="layui-input-block">
                        <textarea  type="text" style="width:300px;height:140px;" name="remark" id="remark_id" autocomplete="off" class="layui-textarea"></textarea>
                    </div>
                </div>
            </div>
            <button type="button" class="layui-btn layui-btn-radius layui-btn-primary" onclick="choose()" style="display: none">选择</button>
        </form>
    </div>
</body>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-sm" lay-event="checkPass" style="visibility:hidden;" id="checkPassStyle">审核通过</a>
    <a class="layui-btn layui-btn-sm" lay-event="checkNoPass" style="visibility:hidden;" id="checkNoPassStyle">审核不通过</a>
</script>
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="attendance">授分人员考勤明细</a>
</script>
<script type="text/html" id="rowBar1">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="grantPoints">学分审核</a>
</script>
<script type="text/html" id="rowBar2">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="projectEvaluation">项目评价表</a>
</script>
<script type="text/html" id="rowBar3">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="examinationResult">考试结果查看</a>
</script>
<script type="text/html" id="groupFbCell">
    {{# if(d.fbCycleCnt > 0) { }}
    <a class="layui-btn layui-btn-xs btn-row" lay-event="viewFeedback">查看</a>
    {{# } else { }}
    <a class="layui-btn layui-btn-xs layui-btn-disabled btn-row btn-disabled-row">未反馈</a>
    {{# } }}
</script>
<script>
    let projectStatus;
    layui.config({
        base: '../../../../js/layui/ext/',
    }).extend({
        myTable: 'table',
        tool: 'tool'
    }).use(['table', 'form', 'element', 'laydate', 'tool', 'treeSelect'], function () {
        var table = layui.table, form = layui.form, element = layui.element
            , laydate = layui.laydate, $ = layui.$, treeSelect = layui.treeSelect;;
        let tool = layui.tool;
        let data = {}, downIds = [];
        
        
        // 搜索栏日期选择
        // laydate.render({
        //     elem: '#cmeYear_id',
        //     type: 'year',
        //     range: false,
        //     value: (new Date()).getFullYear(),
        //     done: function(value, date, endDate) {
        //         initScoreLevelSel(value);
        //         $('#knowledgeId_id').find("option:gt(0)").remove();
        //         dictTool.initKnowledgeSel('#knowledgeTwo_id', '二级学科', {knowledgeType:2,cmeStandardKindId:_standardKindId,versionYear:value});
        //     }
        // })
        laydate.render({
            elem: '#startDate_id',
            type: 'date',
            range: true,
        })

        const _standardKindId = localStorage.getItem('standardkind-id');
        const _isHainan = '6eec6713-670a-43cc-ad4d-9bd700a92928' === _standardKindId; // 海南
        const _isGuangxi = '4a6d91fb-8ba4-4560-a801-9c6f00e6d999' === _standardKindId; // 广西
        var permissions = localStorage.getItem("current-user-permissions")

        let standardId = localStorage.getItem("standardkind-id");
        let userType = localStorage.getItem("user-type");
        var standardKindId = localStorage.getItem("standardkind-id") == "{}" ? null : localStorage.getItem("standardkind-id")
        var unitId = localStorage.getItem("unit-id") == "{}" ? null : localStorage.getItem("unit-id")
        
        /* 获取配置 */
        window.getConfig = function (config_name) {
            $.ajax({
                async: false,
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data: {
                    unitId: localStorage.getItem("unit-id"),
                    configNames: config_name
                },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error: function () {
                    layer.msg('获取配置失败');
                }
            });
        }
        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }

        window.loaderTable = function () {
            table.render({
                elem: '#cmeGroupproj',
                title: '学分审核表',
                defaultToolbar: [],
                url: huayi_projectscore_url + 'cmeGroupProj/getProjectAndDownListForDept',
                id: 'cmeGroupprojTable',
                height: 'full-210',
                where: {
                    status: projectStatus,
                    year: $('#cmeYear_id').val(),
                    projectLevel: $('#scoreLevel').val(),
                    holdType: $('#holdType').val(),
                    knowledgeId: $('#knowledgeId_id').val(),
                    projectName: $('#groupProjectName_id').val(),
                    startDate: $('#startDate_id').val(),
                    unitId: localStorage.getItem("unit-id"),
                    deptId: $('#hidden_dept_id').val(),
                    userType: localStorage.getItem("user-type"),
                    fbStatus: $('select[name=fbStatus]').val(),
                    unitUserType: localStorage.getItem('unit-user-type')
                },
                cols: [[
                    { align: 'center', type: 'checkbox', title: '选择', hide: !(projectStatus === "0")  },
                    { field: 'projectId', title: '项目id', type: '', hide: true },
                    { field: 'downId', title: '周期id', type: '', hide: true },
                    // { field: '', title: '授分人员考勤明细', type: '', toolbar: '#rowBar', hide: false, align: 'center' },
                    { field: 'scoreCheck', title: '学分审核', type: '', toolbar: '#rowBar1', hide: false, align: 'center' },
                    { field: '', title: '项目评价表', type: '', width: 120, toolbar: '#rowBar2', hide: false, align: 'center' },
                    { field: '', title: '考试结果查看', type: '', width: 120, toolbar: '#rowBar3', hide: false, align: 'center' },
                    { title: '执行情况反馈', align: 'center', templet: '#groupFbCell', hide: (!_isHainan && !_isGuangxi) },
                    { field: 'cmeYear', title: '举办年度', type: '', hide: false, align: 'center' },
                    { field: 'deptName', title: '添加科室', type: '', hide: false, align: 'center' },
                    { field: 'groupProjectName', title: '院内活动名称', width: 220, type: '', hide: false, align: 'center' },
                    { field: 'scoreLevelName', title: projectLabels.lblActivityLevel, width: 220, type: '', hide: false, align: 'center' },
                    { field: 'holdTypeName', title:  projectLabels.lblActivityForm, type: '', hide: false, align: 'center' },
                    { field: 'score', title: '学分', width: 80, type: '', hide: false, align: 'center' },
                    { field: 'period', title: '学时', width: 80, type: '', hide: false, align: 'center' },
                    // { field: 'countbydownid', title: '授分人数(院内活动没有授分人数)', width: 150, type: '', hide: false, align: 'center' },
                    { field: 'twoKnowledgeName', title: '二级学科', type: '', hide: false, align: 'center' },
                    { field: 'knowledgeName', title: '三级学科', type: '', hide: false, align: 'center' },
                    { field: 'startDate', title: '开始日期', width: 180, type: '', hide: false, align: 'center' },
                    { field: 'endDate', title: '结束日期', width: 180, type: '', hide: false, align: 'center' },

                ]],
                cellMinWidth: 150,
                toolbar: '#bar',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    // 更新选项卡统计数量
                    // switch (projectStatus) {
                    //     case 0:
                    //     case '0':
                    //         document.getElementById("all").innerText = '(' + res.data.recordsTotal + ')';
                    //         break;
                    //     case '1':
                    //         document.getElementById("toAudit").innerText = '(' + res.data.recordsTotal + ')';
                    //         break;
                    //     case '3':
                    //         document.getElementById("passTheAudit").innerText = '(' + res.data.recordsTotal + ')';
                    //         break;
                    //     case '4':
                    //         document.getElementById("auditFailed").innerText = '(' + res.data.recordsTotal + ')';
                    //     default:
                    //         break;
                    // }
                    if (res.status != 200) {
                        layer.msg(res.msg);
                        return false;
                    }
                    getCount();
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done: function (res, curr, count) {
                    if (projectStatus === "0") {
                        document.getElementById("checkNoPassStyle").style.visibility = "visible";
                        document.getElementById("checkPassStyle").style.visibility = "visible";
                    } else {
                        document.getElementById("checkNoPassStyle").style.visibility = "hidden";
                        document.getElementById("checkPassStyle").style.visibility = "hidden";
                    }

                    //是否可以处理往年数据
                    if(res.data != null && res.data.length > 0) {
                        window.getConfig('value_forbid_some_operate_on_last_year_data');
                        let cmeYear = res.data[0].cmeYear;
                        let ableOper =  ableOperateLastYearData(cmeYear);
                        if(ableOper == false) {
                            $("td[data-field='scoreCheck']").find("a").removeAttr("lay-event").addClass("layui-disabled");
                        }
                    }
 

                }
            })
        }

        // 分类统计项目状态
        var getCount = function () {
            $.ajax({
                type: 'get',
                url: huayi_projectscore_url + 'cmeGroupProj/getCountForGroupDept',
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                data: {
                    status: projectStatus,
                    year: $('#cmeYear_id').val(),
                    projectLevel: $('#scoreLevel').val(),
                    holdType: $('#holdType').val(),
                    knowledgeId: $('#knowledgeId_id').val(),
                    projectName: $('#groupProjectName_id').val(),
                    startDate: $('#startDate_id').val(),
                    unitId: unitId,
                    deptId: $('#hidden_dept_id').val(),
                    userType: userType,
                    unitUserType: localStorage.getItem('unit-user-type')
                },
                success: function (res) {
                    if (res.status === 200) {
                        document.getElementById("all").innerText = '(' + res.data.all + ')';
                        document.getElementById("toAudit").innerText = '(' + res.data.toAudit + ')';
                        document.getElementById("passTheAudit").innerText = '(' + res.data.passTheAudit + ')';
                        document.getElementById("auditFailed").innerText = '(' + res.data.auditFailed + ')';
                        // document.getElementById("returnToModify").innerText = '(' + res.data.returnToModify + ')';
                    }
                }

            })
            return;
        }

        //获取学分级别
        let getScoreLevel = function () {
            let tempUrl = huayi_sjwh_url + "/cmecomscorelevel/list";
            commonAjax('get', tempUrl, { "cmeStandardKindId": standardId }, function () { layer.msg("学分级别加载失败"); },
                function (res) {
                    if (res.status != 200) {
                        layer.msg("学分级别加载失败"); return;
                    }
                    setOptions(res.data, "scoreLevelId", "scoreLevelName", "scoreLevel");
                });
        }
        let setOptions = function (data, idParam, valueParam, id) {
            let option = '<option value="">全部</option>';
            for (let obj of data) {
                option += `<option value="${obj[idParam]}">${obj[valueParam]}</option>`;
            }
            $(`#${id}`).html(option);
            form.render();
        }

        window.check = function () {
            layer.open({
                type: 1,
                title: '审核',
                content: $('#remark'),
                skin: '',
                area: ['500px', '300px'],
                btn: ['确定', '取消'],
                yes: function (index, layero) {
                    data.remark = $("#remark_id").val();
                    data.unitType = localStorage.getItem("unit-user-type")
                    var index = layer.load();
                    debugger;
                    $.ajax({
                        type: 'post',
                        url: huayi_projectscore_url + 'cmeGroupProjScore/checkByDownID',
                        contentType: 'application/json;charset=UTF-8',
                        data: JSON.stringify(data),
                        dataType: 'json',
                        success: function (res) {
                            layer.closeAll();
                            reloadTable();
                            layer.msg(res.data)
                            data = {};
                            downIds = [];
                        },
                        error: function (res) {
                            layer.msg("发送请求失败")
                        }
                    })
                },
                btn2: function (index, layero) {
                    data = {};
                    downIds = [];
                    layer.closeAll()
                }
            })
        }

        window.initCmeYear = ()=>{
            let curYear = (new Date()).getFullYear();
            for(let i=curYear;i>curYear-9;i--) {
                $("#cmeYear_id").append(`<option value='${i}'>${i}</option>`);
            }
            form.render();
        }
        window.initScoreLevelSel = (cmeYear) => { 
            window.scoreLevelSel && (treeSelect.destroy('scoreLevel'), $('#scoreLevel').val(''));
            window.scoreLevelSel = treeSelect.render({
                elem    : '#scoreLevel',
                data    : huayi_sjwh_url + 'option/scoreLevel/tree/' + standardKindId + '/' + cmeYear + '/_1_',
                type    : 'get',
                search  : true,
                style   : {
                    folder  : { enable: false }, // 父节点图标
                    line    : { enable: true} // 连接线
                },
                click   : d => (initHoldTypeSel()),
                success : d => (initHoldTypeSel())
            });
        }
        window.initHoldTypeSel = () => {
            let keyName     = projectLabels.lblProjectLevel,
                scoreLevel  = $('#scoreLevel').val();
            $.ajax({
                url     : huayi_sjwh_url + 'option/holdType/list/' + standardKindId + '/' + scoreLevel + '/1__',
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#holdType');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        }



        /** 科室选择下拉列表初始化 */
        var deptTreeSelect;
        window.initDeptTree = function (deptId) {
            var unitId = localStorage.getItem("unit-id");
            deptTreeSelect = treeSelect.render({
                elem: '#deptSelect',
                data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + unitId,
                type: 'get',
                search: true,
                style: {
                    folder: {     // 父节点图标
                        enable: true   // 是否开启：true/false
                    },
                    line: {     // 连接线
                        enable: true   // 是否开启：true/false
                    }
                },
                click: function (data) {
                    $("#hidden_dept_id").val(data.current.id);
                },
                success: function () {
                    if (deptId != null && deptId != undefined && deptId != "") {
                        deptTreeSelect.checkNode('deptSelect', deptId);
                    }
                }
            });
        }
    

        window.reloadTable = function () {
            table.reload('cmeGroupprojTable', {
                where: {
                    status: projectStatus,
                    year: $('#cmeYear_id').val(),
                    projectLevel: $('#scoreLevel').val(),
                    holdType: $('#holdType').val(),
                    knowledgeId: $('#knowledgeId_id').val(),
                    projectName: $('#groupProjectName_id').val(),
                    startDate: $('#startDate_id').val(),
                    fbStatus: $('select[name=fbStatus]').val(),
                    unitId: localStorage.getItem("unit-id")
                }
            });
        }

        window.ableOperateLastYearData = function(dataYear) {
            let cgv = window["value_forbid_some_operate_on_last_year_data"];
            if(cgv == null || cgv == "") {
                return true;
            }
        
            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
        }
       
        table.on('tool(cmeGroupproj_filter)', function (obj) {
            let projectId = obj.data.projectId;
            let downId = obj.data.downId;
            if (obj.event === 'grantPoints') {
                layer.open({
                    type: 2,
                    content: 'groupprojScoreCheck.html?downId=' + downId,
                    area: ['100%', '100%'],
                    title: '学分审核',
                    scrollbar: false
                })
            } else if (obj.event === 'attendance') {
                layer.open({
                    type: 2,
                    content: 'attendanceInfo.html?downId=' + downId+ '&projectType=2',
                    area: ['100%', '100%'],
                    title: '授分人员考勤明细',
                    scrollbar: false
                })
            } else if (obj.event === 'projectEvaluation') {
                layer.open({
                    type: 2,
                    content: '../../CmeProjEvaluation.html?projectId  =' + projectId + '&projectType=2',
                    area: ['100%', '100%'],
                    title: '项目评价',
                    scrollbar: false
                })
            } else if (obj.event === 'examinationResult') {
                layer.open({
                    type: 2,
                    content: 'givingResultsList.html?projectId=' + projectId + '&downId=' + downId,
                    area: ['100%', '100%'],
                    title: '考试结果',
                    scrollbar: false
                })
            } else if (obj.event === 'viewFeedback') {
                let content = '/pages/mod/group/modals/GroupFeedback.html?a=a&g_proj_id=' + projectId;
                layer.open({
                    type: 2,
                    shade: 0.6,
                    shadeClose: true,
                    title: '执行情况反馈',
                    content: content,
                    area: ['100%', '100%'],
                    scrollbar: false
                });
            }
        });

        // 监听头部新增按钮
        table.on('toolbar(cmeGroupproj_filter)', function (obj) {
            let unitId = localStorage.getItem("unit-id") == '{}' ? null : localStorage.getItem("unit-id");
            let checkStatus = table.checkStatus('cmeGroupprojTable');
            if (checkStatus.data.length > 0) {
                for (var i = 0; i < checkStatus.data.length; i++) {
                    downIds.push(checkStatus.data[i].downId);
                }
            } else {
                layer.msg("请选择审核项目");
                return;
            }
            data.unitId = unitId;
            data.userName = localStorage.getItem("user-name") == '{}' ? '' : localStorage.getItem("user-name")
            data.downIds = downIds;
            data.userType = parseInt(localStorage.getItem("user-type"));
            data.unitType = localStorage.getItem("unit-user-type");
            
            if (obj.event === 'checkPass') {
                layer.confirm('确认通过', { icon: 3, title: '提示' }, function () {
                    data.checkStatus = 3;
                    data.remark = '';
                    $.ajax({
                        type: 'post',
                        url: huayi_projectscore_url + 'cmeGroupProjScore/checkByDownID',
                        contentType: 'application/json;charset=UTF-8',
                        data: JSON.stringify(data),
                        dataType: 'json',
                        success: function (res) {
                            layer.closeAll();
                            reloadTable();
                            layer.msg(res.data)
                            data = {};
                            downIds = [];
                        },
                        error: function (res) {
                            layer.msg("发送请求失败")
                        }
                    })
                });
            } else if (obj.event === 'checkNoPass') {
                data.checkStatus = 1;
                data.remark = $("#remark_id").val();
                check();
            } 
        });

        // 选项卡切换事件
        element.on('tab(tabarea)', function (elem) {
            var type = this.getAttribute('lay-id');
            projectStatus = type;
            loaderTable();
        });

        form.on('select(knowledge_search_filter)', function (data) {
            dictTool.initKnowledgeSel('#knowledgeId_id',"三级学科", {'knowledgeType': 3, 'knowledgeTwoId': data.value,'versionYear': $("#cmeYear_id").val() });
           
        })

        //监听举办年度
        form.on('select(cmeYear)', function(data){
            window.initScoreLevelSel(data.value);
            dictTool.initKnowledgeSel('#knowledgeTwo_id', '二级学科', {knowledgeType:2,cmeStandardKindId:_standardKindId,versionYear:data.value});
        });

        $(function () {
            
            renderLables();
            initCmeYear();
            let userType = localStorage.getItem("user-type");
            let cmeYear = $("#cmeYear_id").val();
            initScoreLevelSel(cmeYear);
            dictTool.initKnowledgeSel('#knowledgeTwo_id', '二级学科', {knowledgeType:2,cmeStandardKindId:_standardKindId,versionYear:cmeYear});
            initDeptTree();
            loaderTable();
        });




    })
</script>

</html>
