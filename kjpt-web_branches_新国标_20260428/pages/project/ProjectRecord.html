            <!--        搜索框区域-->

                                    <option value="">全部</option>
                                    <option value="1">西医</option>
                                    <option value="2">中医</option>

                        <div class="layui-inline">

                            <label class="layui-form-label">项目名称</label>

                                <input type="text" name="projectName" id="projectName" placeholder="请填写项目名称关键字" autocomplete="off" class="layui-input">

                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">项目负责人</label>
                            <div class="layui-input-block">
                                <input type="text" name="PrincipalName" id="PrincipalName" placeholder="请填写项目负责人" autocomplete="off" class="layui-input">
                            </div>
                        </div>

                        <div class="layui-inline">
                            <label class="layui-form-label" name="lblActivityForm"></label>
                            <div class="layui-input-block">
                                <select name="holdType" id="holdType">
                                    <option value="">全部</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" name="lblActivityContent"></label>
                            <div class="layui-input-block">
                                <select name="ActivityContent" id="ActivityContent">
                                    <option value="">全部</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" name="lblActivityType"></label>
                            <div class="layui-input-block">
                                <select name="ActivityType" id="ActivityType">
                                    <option value="">全部</option>
                                    <option value="1">推荐项目</option>

                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" lay-submit lay-filter="LAY-app-order-search">

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="project" lay-filter="project" style="margin: 0px 0px;"></table>
                    </div>
                </div>

            </div>
        </div>

    <script type="text/html" id="viewProjInfo">
        <a class="layui-table-link orderNumber" style="cursor: pointer;" lay-event="viewProjInfo" title="点击查看项目详情">{{d.projectCode}}</a>
    </script>

    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
    {{# if(d.projectBeiAnId == null){}}
        <a class="layui-btn layui-btn-xs" lay-event="addBeianProj" style="color: #27b1a2;background-color: transparent;">备案</a>
    {{# }else if(d.isPass == null ){ }}
        <a class="layui-btn layui-btn-xs" lay-event="submitProj" style="color: #ffb82e;background-color: transparent;">上报</a>
        <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #27b1a2;background-color: transparent;">编辑</a>

        <a class="layui-btn layui-btn-xs" lay-event="view" style="color: #ffb82e;background-color: transparent;">浏览</a>
    {{# }else if(d.sendback ==1 || d.finalStatus==1 ){}}
        <a class="layui-btn layui-btn-xs" lay-event="submitProj" style="color: #27b1a2;background-color: transparent;">上报</a>
        <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #ffb82e;background-color: transparent;">编辑</a>
        <a class="layui-btn layui-btn-xs" lay-event="view" style="color: #ffb82e;background-color: transparent;">浏览</a>
    {{# }else {}}
        <a class="layui-btn layui-btn-xs" lay-event="" style="color: #27b1a2;background-color: transparent;cursor: default;">已上报</a>
        <a class="layui-btn layui-btn-xs" lay-event="view" style="color: #ffb82e;background-color: transparent;">浏览</a>
    {{# }}}
    </script>
    <script type="text/html" id="rowCheckBar">
        <a class="layui-btn layui-btn-xs" lay-event="viewSubmitProj" style="color: #ffb82e;background-color: transparent;">查看</a>
    </script>



    <script type="text/html" id="bar">
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="visbale" style="float: right;">设置显示列</button>
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="excel" style="float: right;margin-right:10px;">导出Excel</button>
    </script>


    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element'], function() {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;
            var element = layui.element;
            var year = $('#holdYear').val();
            var userid= localStorage.getItem("unit-id");
            var standardkindId= localStorage.getItem("standardkind-id");
            var my = new Date();
            var status = -1;
            
            // 将constantPage.js 常量赋值给label
            $("label").each(function() {
                const name = $(this).attr("name");
                if (projectLabels[name] !== undefined) {
                    $(this).text(projectLabels[name]);
                }
            });

            window.colArray = [{
                field: 'center',
                width: 228,
                toolbar: '#rowBar',
                title: '操作',
                fixed: 'left',
                align:'center',
            }, {
                field: 'center',
                width: 100,
                toolbar: '#rowCheckBar',
                title: '审批进度',
                fixed: 'left',
                align:'center',
            }, {
                field: 'projectBeiAnId',
                title: '备案项目ID',
                hide: true
            }
            , {
                field: 'projectId',
                title: '项目id',
                hide: true
            }];
            $.ajax({
                type: "POST",
                headers: {
                    "Accept": 'application/json',
                    "Authorization": localStorage.getItem("token"),
                    "KJPT-USER-ID": localStorage.getItem("user-id"),
                    "cmestandard-id": localStorage.getItem("standardkind-id")
                },
                async: false,
                url: huayi_projectscore_url + "project/comcolumnList",
                data: JSON.stringify({
                    "module_name": "ProjectRecord"
                }),
                contentType: "application/json",
                success: function(data) {
                    $.each(data.data, function(index, item) {
                        let column="";
                            if(item.columnCamelCase=="projectCode"){
                                column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth,toolbar:'#viewProjInfo'};
                            }else{
                                column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                            }
                        window.colArray.push(column);
                    })
                },
                error: function(data, xhr, stus) {
                    layer.msg("响应失败");
                }
            })


            // 表格相关操作
            // 表格配置
            function loaderTable() {
                window.mainTable = table.render({
                    elem: '#project',
                    url: huayi_projectscore_url + 'project/pojectRecord',
                    title: '用户表',
                    method: "POST",
                    defaultToolbar: [],
                    where: {
                        HoldYear: $('#holdYear').val(),
                        CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                        ProjectName: $('#projectName').val(),
                        projectCode: $('#projectCode').val(),
                        personName: $('#PrincipalName').val(),
                        projectType:  $('#projectType').val(),
                        holdTypeId: $('#holdType').val(),
                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        userid: localStorage.getItem("user-id"),
                        unitId: localStorage.getItem("unit-id"),
                        status: status,
                        projType : $('#ActivityType').val(),
                        scoreType : $('#ActivityContent').val()
                    },
                    done: function () {
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });
                        getDicApplyDate();
                    },
                    cols: [
                        //{field: 'center', width: 160, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                        window.colArray
                    ],
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: "project",
                    height: 'full-230',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            window.colSettingClaaback = function(obj) {
                var str = {
                    "module_name": "ProjectRecord"
                };
                $.ajax({
                    type: "POST",
                    headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                    async: false,
                    url: huayi_projectscore_url + "project/comcolumnList",

                    data: JSON.stringify(str),
                    contentType: "application/json",
                    success: function(data) {
                        window.colArray = [{
                            field: 'center',
                            width: 228,
                            toolbar: '#rowBar',
                            title: '操作',
                            fixed: 'left',
                            align:'center',
                        }, {
                            field: 'center',
                            width: 100,
                            toolbar: '#rowCheckBar',
                            title: '审批进度',
                            fixed: 'left',
                            align:'center',
                        }, {
                            field: 'projectBeiAnId',
                            title: '备案项目ID',
                            hide: true
                        }
                        , {
                            field: 'projectId',
                            title: '项目id',
                            hide: true
                        }];
                        $.each(data.data, function(index, item) {
                            let column="";
                            if(item.columnCamelCase=="projectCode"){
                                column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth,toolbar:'#viewProjInfo'};
                            }else{
                                column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                            }
                            window.colArray.push(column);
                        })
                        loaderTable();
                        if (obj && obj.success) {
                            layer.close(window.colLayerIndex);
                        } else {
                            layui.msg(obj.msg);
                        }
                    },
                    error: function(data, xhr, stus) {
                        layer.msg("响应失败");
                    }
                })
            }


            $(function() {
                ddlList();
                loaderTable();
                loadReport();

            });
            $(".tab_others").on("click", function() {
                var index = $(this).index();
                $(this).addClass("tab_this").siblings().removeClass("tab_this");

            });


            function ddlList() {
                //加载年度 目前只加载最大申报年度的上一年
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url +"projectDicRegionLevel/getHoldYear",
                    data: {cmeStandardKind:localStorage.getItem("standardkind-id"),unitId:localStorage.getItem("unit-id")},
                    dataType: 'json',
                    async: false,
                    success: function (data) {
                        // for(var year of data.data.entries()){
                        //     $('#holdYear').append(new Option(year[1],year[1]));//往下拉菜单里添加元素
                        // }
                        var max = Math.max.apply(null, data.data);
                        $('#holdYear').append(new Option(max-1,max-1));

                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function (data) {
                        layer.msg("响应失败1");
                    }
                });
                

                //加载项目级别
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url + "projectDicRegionLevel/getLevelsByStandardId",
                    data: {
                        getLevelsByStandardId: localStorage.getItem("standardkind-id"),
                        holdYear:  $('#holdYear').val(),
                        unitId:userid,
                        isMayBeianis:1
                    },
                    dataType: 'json',
                    async: false,
                    success: function(data) {
                        $.each(data.data, function(index, item) {
                            $('#CmeComScoreLevel').append(new Option(item.scoreLevelName, item.scoreLevelId)); //往下拉菜单里添加元素
                        })
                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function(data) {
                        layer.msg("响应失败");
                    }
                }); 

            }

            function loadReport() {
                //加载ProjectTabsNum
                $.ajax({
                    type: "get",
                    url: huayi_projectscore_url + "projectDDL/projectTabsNum",
                    dataType: "json",
                    data: {
                        year: $('#holdYear').val(),
                        cmeComScoreLevel: $('#CmeComScoreLevel').val(),
                        projectName: $('#projectName').val(),
                        projectCode: $('#projectCode').val(),
                        personName: $('#PrincipalName').val(),
                        projectType:  $('#projectType').val(),
                        holdType: $('#holdType').val(),
                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        userid: localStorage.getItem("user-id"),
                        unitId: localStorage.getItem("unit-id"),
                        status: status,
                        type: 14,
                        projType : $('#ActivityType').val(),
                        scoreType : $('#ActivityContent').val()
                    },
                    success: function(data) {
                        $('#loadNoReport').html('未备案(' + data.data[0]['noReport'] + ')');
                        $('#loadhasReported').html('已备案(' + data.data[0]['hasReported'] + ')');
                        $('#loadsendBack').html('退回修改(' + data.data[0]['sendBack'] + ')');
                    },
                    error: function(data) {
                        layer.msg("响应失败");
                    }
                })
            }




            // 监听头部新增按钮
            table.on('toolbar(project)', function(obj) {
                var datas = obj.data;
                //document.getElementById("form-Project").reset();
                if (obj.event === 'excel') {
                    //导出excel
                    var loading=layer.load(0, {
                        shade: false
                    });
                    axios({
                        method: 'GET',
                        url: huayi_projectscore_url + "projectExclel/excelExportProjRecord",
                        responseType: 'blob',
                        headers: {
                            "Accept": 'application/json',
                            "Authorization": localStorage.getItem("token"),
                            "KJPT-USER-ID": localStorage.getItem("user-id"),
                            "cmestandard-id": localStorage.getItem("standardkind-id")
                        },
                        params: {
                            HoldYear: $('#holdYear').val(),
                            CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                            ProjectName: $('#projectName').val(),
                            projectCode: $('#projectCode').val(),
                            projectType:  $('#projectType').val(),
                            personName: $('#PrincipalName').val(),
                            holdTypeId: $('#holdType').val(),
                            cmeStandardKindId: localStorage.getItem("standardkind-id"),
                            userId: localStorage.getItem("user-id"),
                            unitId: localStorage.getItem("unit-id"),
                            status: status,
                            modulename : "ProjectRecord",
                            projType : $('#ActivityType').val(),
                            scoreType : $('#ActivityContent').val()
                        }
                    }).then(function (res) {
                        layer.close(loading);
                        var data = res.data;
                        var blob = new Blob([data], {type: 'application/octet-stream'});
                        var url = URL.createObjectURL(blob);
                        var exportLink = document.createElement('a');
                        exportLink.setAttribute("download","项目信息.xlsx");
                        exportLink.href = url;
                        document.body.appendChild(exportLink);
                        exportLink.click();
                    })

                } else if (obj.event === 'visbale') {
                    window.colLayerIndex = layer.open({
                        content: "../../column_setting.html?module_name=ProjectRecord&callBack=colSettingClaaback",
                        type: 2,
                        area: ['600px', '600px']

                    })
                }
            });

            // 监听行内按钮
            table.on('tool(project)', function(obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    form.val('add-filter', datas);
                    //判断是否在备案时间内
                    $.ajax({
                        type: "POST",
                        url: huayi_projectscore_url+"projectApplyDate/isDelay",
                        data: {year:parseInt($('#holdYear').val())+1,unitId:localStorage.getItem("unit-id"),scoreLevelId:obj.data.scoreLevelId,type:2},
                        dataType: 'json',
                        success:function(object){
                            if(object.data.status=='5'){
                                //先判断是否允许备案，再打开备案页面
                                $.ajax({
                                    type: "post",
                                    url: huayi_projectscore_url + "project/allowRecord",
                                    data: {
                                        projectId: datas.projectId,
                                        cmeStandardKindId: localStorage.getItem("standardkind-id")
                                    },
                                    dataType: 'json',
                                    success: function(res) {
                                        debugger
                                        if (res.status === 200) {
                                            layer.open({
                                                type: 2,
                                                title: '修改',
                                                //这里替换成备案页面
                                                content: 'projectRecord/fujian/record.html?projectId=' + obj.data.projectId + '&projectBeiAnId=' + obj.data.projectBeiAnId  + '&holdYear=' + obj.data.holdYear ,
                                                // content: getCptUrl('cmeYear', obj.data.scoreLevelId, 'record') + '&projectId=' + obj.data.projectId
                                                    // + '&projectBeiAnId=' + obj.data.projectBeiAnId + '&unitId=' + localStorage.getItem("unit-id") + '&type=update',
                                                skin: '',
                                                area: ['90%', '90%'],
                                                end: function(index, layero){
                                                    loaderTable();
                                                    loadReport();
                                                }
                                            })
                                        }else {
                                            layer.msg("未进行执行情况反馈");
                                        }
                                    },
                                    error: function(res) {
                                        layer.msg("响应失败");
                                    }
                                });
                            }else{
                                layer.msg('备案已截止');
                            }
                        }
                    })
                } else if (obj.event === 'del') {
                    layer.confirm('确定要删除吗', {
                        icon: 3,
                        title: '提示'
                    }, function() {
                        $.ajax({
                            type: 'get',
                            url: huayi_projectscore_url + 'project/delete',
                            data: {
                                projectId: datas.projectBeiAnId
                            },
                            dataType: 'json',
                            success: function(res) {
                                if (res.status === 200) {
                                    layer.msg("删除成功");
                                    loadReport();
                                    table.reload('project');
                                }
                            }
                        });
                    })
                }else if (obj.event === 'addBeianProj') {
                    //判断是否在备案时间内
                    $.ajax({
                        type: "POST",
                        url: huayi_projectscore_url+"projectApplyDate/isDelay",
                        data: {year:parseInt($('#holdYear').val())+1,unitId:localStorage.getItem("unit-id"),scoreLevelId:obj.data.scoreLevelId,type:2},
                        dataType: 'json',
                        success:function(object){
                            if(object.data.status=='5'){
                                //先判断是否允许备案，再打开备案页面
                                $.ajax({
                                    type: "post",
                                    url: huayi_projectscore_url + "project/allowRecord",
                                    data: {
                                        projectId: datas.projectId,
                                        cmeStandardKindId: localStorage.getItem("standardkind-id")
                                    },
                                    dataType: 'json',
                                    success: function(res) {
                                        debugger
                                        if (res.status === 200) {
                                            layer.open({
                                                type: 2,
                                                title: '备案',
                                                //这里替换成备案页面
                                                content: 'projectRecord/fujian/record.html?projectId=' + obj.data.projectId + '&holdYear=' + obj.data.holdYear ,
                                                // content: getCptUrl(localStorage.getItem('standardkind-id'), 'record') + '&projectId=' + obj.data.projectId + '&unitId=' + localStorage.getItem("unit-id"),
                                                skin: '',
                                                area: ['90%', '90%'],
                                                end: function(index, layero){
                                                    loaderTable();
                                                    loadReport();
                                                }
                                            })
                                        }else {
                                            layer.msg("未进行执行情况反馈");
                                        }
                                    },
                                    error: function(res) {
                                        layer.msg("响应失败");
                                    }
                                });
                            }else{
                                layer.msg('备案已截止');
                            }
                        }

                    })


                } else if (obj.event === 'submitProj') {
                    //判断是否在上报时间内
                    $.ajax({
                        type: "POST",
                        url: huayi_projectscore_url+"projectApplyDate/isDelay",
                        data: {year:parseInt($('#holdYear').val())+1,unitId:userid,scoreLevelId:datas.scoreLevelId,type:2},
                        dataType: 'json',
                        success:function(object){
                            if(object.data.status=='5'){
                                layer.confirm('确定要上报吗', {
                                    icon: 3,
                                    title: '提示'
                                }, function() {
                                    var userType=localStorage.getItem("user-type");
                                    //科室不走流程
                                    if(userType==="13"|| userType==="14" ){
                                        $.ajax({
                                            type: 'post',
                                            url: huayi_projectscore_url + 'project/projectSubPerDept',
                                            data: {
                                                projectId: datas.projectBeiAnId,
                                                userid: localStorage.getItem("user-id"),
                                                userType: localStorage.getItem("user-type")
                                            },
                                            dataType: 'json',
                                            success: function(res) {
                                                if (res.status === 200) {
                                                    layer.msg("提交成功");
                                                    loadReport();
                                                    table.reload('project');

                                                }else{
                                                    layer.msg(res.msg);
                                                }
                                            }
                                        });
                                    }else{
                                        $.ajax({
                                            type: 'post',
                                            url: huayi_projectscore_url + 'project/submitProj',
                                            data: {
                                                flowName: '通用项目申报流程',
                                                cmeStandardKindId: localStorage.getItem("standardkind-id"),
                                                projectId: datas.projectBeiAnId,
                                                unitId: localStorage.getItem("unit-id"),
                                                projStatus: 4
                                            },
                                            dataType: 'json',
                                            success: function(res) {
                                                if (res.status === 200) {
                                                    layer.msg("提交成功");
                                                    loadReport();
                                                    table.reload('project');

                                                }else{
                                                    layer.msg(res.msg);
                                                }
                                            }
                                        });
                                    }
                                })
                            }else{
                                layer.msg(object.data.msg);
                            }
                        }

                    })

                } else if (obj.event === 'view') {
                    layer.open({
                        type: 2,
                        title: '浏览',
                        content: 'projectRecord/fujian/record.html?projectId=' + obj.data.projectId  + '&projectBeiAnId=' + obj.data.projectBeiAnId + '&type=view',
                        // content: getCptUrl('cmeYear', obj.data.scoreLevelId, 'record_preview') + '&projectId=' + obj.data.projectId + "&projectBeiAnId=" + obj.data.projectBeiAnId,
                        skin: '',
                        area: ['90%', '90%'],
                    })
                }else if( obj.event ==='viewSubmitProj'){
                    layer.open({
                        type: 2,
                        title: '',
                        content: 'projectProgress/projCheckProgress.html?projectId=' + obj.data.projectBeiAnId,
                        area: ['560px', '380px'],
                    })
                }else if (obj.event === 'viewProjInfo') {
                    let cptUrl =getProjectPageUrl(obj.data.holdYear, obj.data.scoreLevelId, obj.data.projectId,'unit',1);
                    if (cptUrl === '') {
                        layer.msg('暂无申报页面配置');
                        return;
                    }
    
                    layer.open({
                        type: 2,
                        title: '浏览',
                        content: cptUrl,
                        skin: '',
                        area: ['100%', '100%'],
                    })
                }
            });
            //项目级别改变
            form.on('select(loadScoreLevel)', function(data) {
                getDicApplyDate();

                //加载举办方式
                let keyName     = projectLabels.lblProjectLevel,
                scoreLevel  = $('#CmeComScoreLevel').val();
                $.ajax({
                    url     : huayi_sjwh_url + 'option/holdType/list/' +  localStorage.getItem("standardkind-id")+ '/' + scoreLevel + '/1__',
                    async   : false,
                    success : re => {
                        if (re.status == 200) {
                            let $item = $('#holdType');
                            $item.empty().append($('<option value="">请选择</option>'));
                            $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                        } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                    },
                    error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
                });
                $.ajax({
                    url     : huayi_sjwh_url + 'option/scoreLevelContent/list',
                    data    : { scoreLevel: scoreLevel },
                    async   : false,
                    success : re => {
                        if (re.status == 200) {
                            let $item = $('#ActivityContent');
                            $item.empty().append($('<option value="">请选择</option>'));
                            $.each(re.data, (i, d) => $item.append($('<option value="' + d.value + '">' + d.scoreLevelContentName + '</option>')));
                        } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                    },
                    error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
                });
                form.render();
            });
                //鼠标悬停提示特效
            $("#hint").hover(function() {
                openMsg();
            }, function() {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {
                    tips: [1, '#ff6700'],
                    time: 30000
                });
            }
            element.on('tab(tabcheck)', function(data) {
                var nums = data.index;
                status = nums;
                var nums = data.index;
                
                status = nums;
                if (nums == 1) {
                    window.colArray[1].hide = true;
                } 
                else if (nums == 2) {
                    window.colArray[0].hide = true;
                    window.colArray[1].hide = false;
                }
                //其他则重置window.colArray
                else {
                    window.colArray[0].hide = false;
                    window.colArray[1].hide = false;
                }


                loaderTable();
            });

             //下拉框值改变
             form.on('select(loadReport)', function(data) {
                //年度切换时重置其他条件
                $('#holdType').empty().append($('<option value="">请选择</option>'));
                $('#ActivityContent').empty().append($('<option value="">请选择</option>'));
                $('#ActivityType').empty().append($('<option value="">请选择</option>'));
                $('#projectType').val('');
                loadReport();
                loaderTable();
            })

            //点击查询按钮，重载表格
            $('#searchBtn').on('click', function() {
                loaderTable();
                loadReport();
            });
            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }
            function getDicApplyDate(){
                if ($('#CmeComScoreLevel').val()===null || $('#CmeComScoreLevel').val()==="" )  
                    return;
                
                // 项目级别发生改变时更改 lab内容
                $.ajax({
                    type: "post",
                    //url: huayi_projectscore_url + "projectApplyDate/getDicApplyDateByParam",
                    url: huayi_projectscore_url+"projectApplyDate/isDelay",
                    async: false,
                    //data: {
                        //unitId: localStorage.getItem("unit-id"),
                        //scoreLevelId: $('#CmeComScoreLevel').val(),
                        //holdYear: $('#holdYear').val(),
                        //type: 1
                    //},
                    data: {year:$('#holdYear').val(),unitId:localStorage.getItem("unit-id"),scoreLevelId:$('#CmeComScoreLevel').val(),type:1,from:''},
                    dataType: 'json',
                    success: function(data) {
                        //$('#applydateDg').html(  data.data=="" || data.data==null?"上级单位未设置":'申报截止时间为: '+data.data);
                        $('#applydateDg').html("申报时间:"+data.data.startDate+"~"+data.data.endDate);
                    },
                    error: function(data, xhr, stus) {
                        //layer.msg("响应失败");
                    }
                })
            }

        });
    </script>

</body>
