<script>
    layui.config({
        base: '../../js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'element', 'lat'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var treeSelect = layui.treeSelect;
        var element = layui.element;
        let lat = layui.lat;
        const HAINAN = '6eec6713-670a-43cc-ad4d-9bd700a92928';
        const SHANXI = 'db0d980b-03d4-4c9c-b2d4-9f890109ed47';
        const HUBEI = "73ba18db-33fd-4746-ab41-9beb009f69a1";
        const NEIMENG = "08e44437-5789-44e0-8ff8-9ecb00a6348a";
        const HUNAN = "13e2e203-7fdd-47ab-b90f-a1480112b5e5";
        const GUANGXI = "4a6d91fb-8ba4-4560-a801-9c6f00e6d999";
        const ZHEJIANG = "190c480d-d43c-450b-8472-a6fd00a6729d";

        var extendData = { holdState: '' }; // 签标签页的额外参数
        let gLayerIndex = -1;
        let gStartDateSel;
        let gEndDateSel;
        let gUnitTreeData = [];
        let gUnitIdTreeSelector2;
        const currentYear = (new Date()).getFullYear()+1;
 
        let unitUpward = localStorage.getItem("unit-upward");
        let topUnitId = "";
        let arr = unitUpward.split(",");
        for (let item of arr) {
            let match = item.match(/^5#([^#]+)#/); // 只匹配以5#开头的片段
            if (match) {
                topUnitId = match[1];
                break;
            }
        }
        if (!topUnitId) {
            topUnitId = localStorage.getItem("unit-id");
        }

        //获取套
        window.getCmeStandardKindId = function () {
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            if (cmeStandardKindId == "" || cmeStandardKindId == null || cmeStandardKindId == undefined) {
                cmeStandardKindId = "b7864061-7bd4-4ee7-a868-9b24009e92df";
            }
            return cmeStandardKindId;
        }
        //获取单位
        window.getUnitId = function () {
            var unitId = topUnitId;
            return unitId;
        }

        var tabIdCurrent = 'tab_1_0'; // 当前选中的二级标签页
        var extendData = { holdState: '' }; // 签标签页的额外参数
        var allConditionFlag = false; // 是否显示全部条件

        //初始化查询
        window.init = function () {
            $('.layui_mess label').each((i, d) => {
                let name = $(d).attr('name');
                if (name) $(d).text(projectLabels[name] || '');
            });
            laydate.render({
                elem: '#searchStartDate' //指定元素
            });
            laydate.render({
                elem: '#searchEndDate' //指定元素
            });

            //年度初始化

            for (var i = currentYear; i >= currentYear - 8; i--) {
                var option = "";
                if (i == currentYear) {
                    option = $("<option value='" + i + "' selected>" + i + "</option>");
                } else {
                    option = $("<option value='" + i + "'>" + i + "</option>");
                }
                $("#cmeYear").append(option);
            }

            form.on('select(cmeYear)', date => { initKnowledgeSelBatch(); $("#projType").val(""); $("#medicalType").val("") });
 

            //二级学科
            initKnowledgeSelBatch();

            (window.getCmeStandardKindId() == NEIMENG) && $("#medicalType").append("<option value='3'>蒙医</option>");

            form.render("select", "searchDiv");
        }


        //初始化表格
        window.initTable = function () {
            let data_default = {
                cmeStandardKindId: getCmeStandardKindId(),
                unitId: topUnitId,
                topUnitId: topUnitId,
                cmeYear: $("#cmeYear").val(),
                medicalType:"",
                projNo: $("#projNo").val(),
                unitName: $("#unitName").val(),
                withCheckInfo: true
            };
            var tex = localStorage.getItem("standardkind-id") == '73ba18db-33fd-4746-ab41-9beb009f69a1' ? '查看' : '维护';
            table.render({
                elem: '#cmeCmeProj',
                url: huayi_projectscore_url + 'cmeCmeProj/listView',
                // toolbar: '#toolbarBtns', //开启头部工具栏，并为其绑定左侧模板
                title: '用户表',
                autoSort: false,
                defaultToolbar: ['filter', 'print', 'exports'],
                where: $.extend({}, data_default, extendData),
                cols: [
                    [
                        //这四列不要动，原因见table的tool事件
                        { field: 'projId', align: 'center', title: 'projId', hide: true, fixed: 'left' },
                        { field: 'deptId', align: 'center', title: 'deptId', hide: true, fixed: 'left' },
                        { field: 'deptName', align: 'center', title: 'deptName', hide: true, fixed: 'left' },
                        { field: 'scoreLevel', align: 'center', title: 'scoreLevel', hide: true, fixed: 'left' },
                        {
                            field: 'projNo',
                            align: 'center',
                            title: '项目编号',
                            minWidth: 200,
                        },
                        {
                            field: 'projName',
                            title: '项目名称',
                            align: 'center',
                            minWidth: 300,
                            sort: true,
                            templet: function (d) {
                                if (d.projName == null || d.projName == '') {
                                    return '';
                                }
                                return '<span title="' + d.projName + '">' + d.projName + '</span>';
                            }
                        },{
                            field: 'holdTypeName',
                            title: '举办方式',
                            align: 'center',
                            minWidth: 120,
                            sort: true
                        },{
                            field: 'score',
                            title: '拟授学分',
                            align: 'center',
                            minWidth: 80,
                            sort: true
                        },{
                            field: 'unitName',
                            title: '举办单位',
                            align: 'center',
                            minWidth: 200
                        },{
                            field: 'batchDate', title: '拟举办时间', align: 'center', minWidth: 200
                            , templet: function (d) {
                                var html = "";
                                if (d.startDate &&  d.endDate){
                                    html = d.startDate.substring(0, 10) + " 至 " + d.endDate.substring(0, 10);
                                }
                                return html;
                            }
                        }, {
                            field: 'projManager',
                            title: '项目负责人',
                            align: 'center',
                            minWidth: 120
                        }   
                    ]
                ],
                cellMinWidth: 100,
                id: 'cmeCmeProj',
                height: getHeight(),
                page: true,
                limit: 20,
                limits: [20, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize, // 每页条数
                    }

                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                done: function (res, curr, count) {
                    //山西隐藏举办前申请列
                    if (getCmeStandardKindId().toString().toLowerCase() == SHANXI) {
                        $("[data-field='projApply']").css('display', 'none');
                    }
                    // 表格显示多行时操作列调整
                    $(".layui-table-main tr").each(function (index, val) {
                        $($(".layui-table-fixed-l .layui-table-body tbody tr")[index]).height($(val).height());
                        $($(".layui-table-fixed-r .layui-table-body tbody tr")[index]).height($(val).height());
                    });

                    //是否可以处理往年数据--此处代码功能放入了子页面中
                    // if(res.data != null && res.data.length > 0) {
                    //     window.getConfig('value_forbid_some_operate_on_last_year_data');
                    //     let cmeYear = res.data[0].cmeYear;
                    //     let ableOper =  ableOperateLastYearData(cmeYear);
                    //     if(ableOper == false) {
                    //         $("td[data-field='projApply']").find("a").removeAttr("lay-event").addClass("layui-disabled");
                    //         $("td[data-field='projScore']").find("a").removeAttr("lay-event").addClass("layui-disabled");
                    //         $("td[data-field='projFeedback']").find("a").removeAttr("lay-event").addClass("layui-disabled");
                    //     }
                    // }

                }
            });
        };

        window.getHeight = function () {
            var windowHeight = $(window).height();
            var divTop = $('#cmeCmeProj').offset().top;
            var divHeight = windowHeight - divTop - 20;
            return divHeight;
        }

        //表格再次加载
        window.reloadTable = function () {
            let data_default = getDefaultData();
            table.reload("cmeCmeProj", {
                url: huayi_projectscore_url + 'cmeCmeProj/listView',
                where: $.extend({}, data_default, extendData),
                page: {
                    curr: 1 //重新从第 1 页开始
                }
            });
            //window.getHoldRate();
        };

        window.closeChildPage = function (widowName) {
            var index = layer.getFrameIndex(widowName); //先得到当前iframe层的索引
            layer.close(index); //再执行关闭
            window.reloadTable();
        }

        /* 列表基础参数 */
        window.getDefaultData = function () {
            return {
                cmeStandardKindId: getCmeStandardKindId(),
                unitId: topUnitId,
                topUnitId: topUnitId,
                cmeYear: $("#cmeYear").val(),
                scoreLevel: "",
                holdType: $("#holdType").val(),
                scoreLevelContent: $("#scoreLevelContent").val(),
                projType: $("#projType").val(),
                medicalType: $("#medicalType").val(),
                projNo: $("#projNo").val(),
                projName: $("#projName").val(),
                projManager: $("#projManager").val(),
                knowledgeTwoId: $("#knowledgeTwo").val(),
                knowledgeId: $("#knowledgeThree").val(),
                searchStartDate: $("#searchStartDate").val(),
                searchEndDate: $("#searchEndDate").val(),
                projectCategory: $("#projectCategory").val(),
                withCheckInfo: true,
                holdState: '',
                applyBeforeHoldState: '',
                feedbackState: '',
                relatedMaterials: $("[name='relatedMaterials']").val(),
                hasUpload: $("[name='hasUpload']").val(),
                unitName: $("#unitName").val()
            };
        }

        //维护举办周期
        table.on('tool(cmeCmeProj)', function (obj) {
            var event = obj.event;
            var data = obj.data;
            // var projId = data.projId;
            // var deptId = data.deptId;
            // var deptName = data.deptName;
            // let scoreLevel = data.scoreLevel;

            let projId = obj.tr[0].cells[0].innerText;
            let deptId = obj.tr[0].cells[1].innerText;
            let deptName = obj.tr[0].cells[2].innerText;

        });

        //全局排序
        table.on('sort(cmeCmeProj)', function (obj) { //注：sort 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
            // console.log(obj.field);
            // console.log(obj.type); 
            // console.log(this); 
            let data_default = getDefaultData();
            let orderField = getRightField(obj.field);
            let orderType = obj.type;
            let orderExtendData = $.extend({}, extendData, { orderField: orderField, orderType: orderType });
            table.reload("cmeCmeProj", {
                initSort: obj,
                url: huayi_projectscore_url + 'cmeCmeProj/listView',
                where: $.extend({}, data_default, orderExtendData),
                page: {
                    curr: 1 //重新从第 1 页开始
                }
            });
            // 表格显示多行时操作列调整
            $(".layui-table-main tr").each(function (index, val) {
                $($(".layui-table-fixed-l .layui-table-body tbody tr")[index]).height($(val).height());
                $($(".layui-table-fixed-r .layui-table-body tbody tr")[index]).height($(val).height());
            });

            //  layer.msg('服务端排序。order by '+ orderField + ' ' + orderType);
            // return ;
        });

        let getRightField = function (field) {
            let rightFieldName = humpToUnderline(field);
            if (rightFieldName != "proj_name") {
                rightFieldName = rightFieldName.replace("_name", "_id");
            }
            return rightFieldName;
        }
        function humpToUnderline(str) {
            let temp = str.replace(/[A-Z]/g, function (match) {
                return "_" + match.toLowerCase();
            });
            // 如果首字母是大写，执行replace时会多一个_，这里需要去掉
            if (temp.slice(0, 1) === '_') {
                temp = temp.slice(1);
            }
            return temp;
        }



        window.initKnowledgeSel = (sel, name, data, callback) => {
            $(sel).find('option:gt(0)').remove();
            $.ajax({
                async: false,
                url: huayi_sjwh_url + 'comKnowledge',
                data: { ...data, ...getVerParams() },
                success: re => {
                    if (re.success == true) {
                        let data = re.data;
                        data.forEach(item => $(sel).append(`<option value="${item.knowledgeId}">${item.knowledgeName}</option>`));
                        if (typeof callback == 'function') callback(data);
                        form.render("select", "searchDiv");
                    }
                    else layer.msg(name + '加载失败', { icon: 7, time: 1500 });
                },
                error: () => layer.msg(name + '加载失败', { icon: 7, time: 1500 })
            });
        }
        window.initKnowledgeSelBatch = () => {
            initKnowledgeSel('#knowledgeTwo', '二级学科', { knowledgeType: 2 });
            $('#knowledgeThree').find('option:gt(0)').remove();
            form.on('select(knowledgeTwo)', data => initKnowledgeSel('#knowledgeThree', '三级学科', { knowledgeType: 3, knowledgeTwoId: data.value }));
        }



       


        /* 获取配置 */
        window.getConfig = function (config_name) {
            $.ajax({
                async: false,
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data: {
                    unitId: window.getUnitId(),
                    configNames: config_name
                },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error: function () {
                    layer.msg('获取配置失败');
                }
            });
        }
  

        window.getVerParams = () => {
            return {
                cmeStandardKindId: getCmeStandardKindId(),
                versionYear: $('#cmeYear').val()
            };
        }
        $(function () {
            window.init(); 
            window.initTable(); 
 
        });

    });
</script>
