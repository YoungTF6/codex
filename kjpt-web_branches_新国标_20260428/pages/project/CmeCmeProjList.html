<script>
    layui.config({
        base: '../../js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect',
        tool:'tool'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'element', 'treeSelect', 'lat','tool'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var treeSelect = layui.treeSelect;
        var element = layui.element;
        let lat = layui.lat;
        let tool = layui.tool;
        const HAINAN = '6eec6713-670a-43cc-ad4d-9bd700a92928';
        const SHANXI = 'db0d980b-03d4-4c9c-b2d4-9f890109ed47';
        const HUBEI = "73ba18db-33fd-4746-ab41-9beb009f69a1";
        const NEIMENG = "08e44437-5789-44e0-8ff8-9ecb00a6348a";
        const HUNAN = "13e2e203-7fdd-47ab-b90f-a1480112b5e5";
        const GUANGXI = "4a6d91fb-8ba4-4560-a801-9c6f00e6d999";
        const ZHEJIANG = "190c480d-d43c-450b-8472-a6fd00a6729d";
        const GUANGDONG = "289bf0ca-52cb-4b19-b737-9bd200a69ce1";

        var extendData = { holdState: 'HOLD' }; // 签标签页的额外参数
        let gLayerIndex = -1;
        let gStartDateSel;
        let gEndDateSel;
        let gUnitTreeData = [];
        let gUnitIdTreeSelector2;
        const currentYear = (new Date()).getFullYear();

        //获取套
        window.getCmeStandardKindId = function () {
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            if (cmeStandardKindId == "" || cmeStandardKindId == null || cmeStandardKindId == undefined) {
                cmeStandardKindId = "b7864061-7bd4-4ee7-a868-9b24009e92df";
            }
            return cmeStandardKindId;
        }
        //获取单位
        window.getUnitId = function () {
            var unitId = localStorage.getItem("unit-id");
            return unitId;
        }
        const tabIdByUrl = getUrlParamByName('tabId');
        const tabareaIdByUrl = getUrlParamByName('tabareaId');

        var tabIdCurrent = tabIdByUrl ? tabIdByUrl : 'tab_1_1'; // 当前选中的二级标签页
        var extendData = { holdState: 'NO_HOLD' }; // 签标签页的额外参数
        var allConditionFlag = false; // 是否显示全部条件

        //初始化查询
        window.init = function () {
            // 仅单位类型为 11 时展示「举办单位」查询项
            if (localStorage.getItem('unit-type') === '11') {
                $('#unitNameQueryWrap').css('display', '');
            } else {
                $('#unitNameQueryWrap').hide();
                $('#unitName').val('');
            }
            if(getCmeStandardKindId() == HAINAN) {
                // 海南套：筛选框三级学科不可选
                $("#knowledgeThree").val("").attr("disabled", "disabled");
                
            }
            if(getCmeStandardKindId() == GUANGDONG){
                $("#tab_1_3").html("待预授分");
            }
            $('.layui_mess label').each((i, d) => {
                let name = $(d).attr('name');
                if (name) $(d).text(projectLabels[name] || '');
            });
            laydate.render({
                elem: '#searchStartDate' //指定元素
            });
            laydate.render({
                elem: '#searchEndDate' //指定元素
            });

            //年度初始化

            for (var i = currentYear; i >= currentYear - 8; i--) {
                var option = "";
                if (i == currentYear) {
                    option = $("<option value='" + i + "' selected>" + i + "</option>");
                } else {
                    option = $("<option value='" + i + "'>" + i + "</option>");
                }
                $("#cmeYear").append(option);
            }

            form.on('select(cmeYear)', date => { initScoreLevelSel(); initKnowledgeSelBatch(); $("#projType").val(""); });

            initScoreLevelSel();

            //二级学科
            initKnowledgeSelBatch();

            form.render("select", "searchDiv");
        }

        let generateDynamicCols = function() {
            let standardKindId = getCmeStandardKindId();

        let getRightField = function (field) {
            let rightFieldName = humpToUnderline(field);
            if (rightFieldName != "proj_name") {
                rightFieldName = rightFieldName.replace("_name", "_id");
            }
            return rightFieldName;
        }
        function humpToUnderline(str) {
            let temp = str.replace(/[A-Z]/g, function (match) {
                return "_" + match.toLowerCase();
            });
            // 如果首字母是大写，执行replace时会多一个_，这里需要去掉
            if (temp.slice(0, 1) === '_') {
                temp = temp.slice(1);
            }
            return temp;
        }

        /* 标签页计数 */
        window.countNum = function () {
            let url = huayi_projectscore_url,
                tabId = tabIdCurrent,
                data = getDefaultData();

            //let data = $.extend({}, getDefaultData(), { topUnitId: getUnitId() });
            if (tabId.startsWith('tab_1')) {
                url += 'cmeCmeProj/holdState';
            } else if (tabId.startsWith('tab_2')) {
                url += 'cmeCmeProj/applyBeforeHoldState';
            } else if (tabId.startsWith('tab_3')) {
                url += 'cmeCmeProj/feedbackState';
            }
            axios({
                method: 'get',
                url: url,
                responseType: 'json',
                params: data
            }).then(response => {
                if (response.status == 200 && response.data.status == 200) {
                    var data = response.data.data;
                    if (tabId.startsWith('tab_1')) {
                        $('#tab_1_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_1_1').html('未举办&nbsp;&nbsp;(' + data.NO_HOLD + ')');
                        $('#tab_1_5').html('部分已举办&nbsp;&nbsp;(' + data.PART_HOLD + ')');
                        $('#tab_1_2').html('已举办&nbsp;&nbsp;(' + data.HOLD + ')');
                        let tempScoreText = (GUANGDONG == getCmeStandardKindId()) ? '待预授分' : '待授分';
                        $('#tab_1_3').html(`${tempScoreText}&nbsp;&nbsp;(${data.TO_SCORE})`);
                    } else if (tabId.startsWith('tab_2')) {
                        // $('#tab_2_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_2_1').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_2_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                        if (0 < data.BACK) $('#tab_2_4').addClass('shake_tab');
                        $('#tab_2_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                    } else if (tabId.startsWith('tab_3')) {
                        // $('#tab_3_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_3_1').html('未反馈&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_3_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_3_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_3_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ') ');
                        if (0 < data.BACK) $('#tab_3_4').addClass('shake_tab');
                        $('#tab_3_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                    }
                } else {
                    layer.msg('项目统计失败', { icon: 2, time: 1000 });
                }
            }).catch(error => {
                layer.msg('项目统计异常', { icon: 7, time: 1000 });
                console.log(error);
            });
        }

            //湖南套单位显示添加市级继教项目,湖北套显示添加会级二类项目
            if (window["fun_add_proj_in_cme_proj_list"] == "1") {
                $("#addTempProjBtn").show();
                //$("#projectCategory_3_option").show();
                $("#projectCategory option").eq(0).after('<option value="3">手工添加项目</option>');

                $('#addTempProjBtn').on('click', function () {
                    (getCmeStandardKindId() == HUNAN) && showTempProjModal();
                    (getCmeStandardKindId() == HUBEI) && showTempProjModalHubei();
                });

            }
        });




    });
