<script>
    const unitUserType = localStorage.getItem("unit-user-type");
    const userType = localStorage.getItem("user-type");
    const unitId = localStorage.getItem("unit-id");
    const unitName = localStorage.getItem("unit-name");
    const cmeStandardKindId = localStorage.getItem("standardkind-id");
    const HAINAN_MGMT_UNIT_ID = '218133';
    const TEMPLATE_FILES = [
        {saveAs: '附件1：申请说明.docx', path: '/file/tempProjApplyTemplate_HAINAN/apply_instruction.docx'},
        {saveAs: '附件2：2025年度继续医学教育项目申报书.docx', path: '/file/tempProjApplyTemplate_HAINAN/project_apply_form_2025.docx'},
        {saveAs: '海南省继续医学教育项目审批呈报表.doc', path: '/file/tempProjApplyTemplate_HAINAN/approval_report.doc'}
    ];

    layui.config({ base: '/js/layui/ext/' }).extend({ tool: 'tool', ysUpload: 'ysUpload', xmSelect: 'xm-select' });
    layui.use(['table', 'form', 'laydate', 'layer', 'ysUpload', 'tool'], function () {
        var table = layui.table, form = layui.form, laydate = layui.laydate, layer = layui.layer, ysUpload = layui.ysUpload, tool = layui.tool;
        var xmSelect = null;
        var fileUrls = [], uploadFiles = {}, currentRow = null, modalIndex = null;
        var labelInst = {}, labelValues = {};
        var formReadonly = false;
        var applyModalType = '';
        var viewFile = 'viewFile';

        if (StandardKind.HAI_HAN !== cmeStandardKindId) {
            layer.msg('本页面仅海南临时项目申请使用', {icon: 0, time: 0, shade: 0.3});
            return;
        }

        initYear();
        initStatus();
        initDate();
        renderTable();
        form.render();

        $('#searchBtn').on('click', function () { renderTable(); });
        $(window).on('resize', debounce(function () {
            table.reload('applyTable', {height: getTableHeight()});
        }, 150));
        $('#cancelApply').on('click', function () { layer.close(modalIndex); });
        $('#closeViewApply').on('click', function () { layer.close(modalIndex); });
        $('#approvalLogBtn').on('click', function () {
            if (currentRow && currentRow.applyId) {
                openApprovalLog(currentRow.applyId);
            }
        });
        $('#startDate,#endDate').on('change', function () { syncHoldDay('#' + this.id); });
        $('#period,#theoryTime,#demoTime').on('change', validatePeriod);

        form.verify({
            telephone: [/(^$)|^\d{8,11}$/, '电话格式不正确']
        });

        form.on('select(cmeYear)', function () {
            if (modalIndex) {
                renderLabelControls({});
            }
        });

        form.on('submit(saveApply)', function (data) {
            if (hasUploadQueue()) {
                layer.msg('请先点击“开始上传”上传申请附件', {icon: 0});
                return false;
            }
            if (fileUrls.length <= 0) {
                layer.msg('请上传申请附件', {icon: 0});
                return false;
            }
            if (!validatePeriod()) {
                return false;
            }
            var fields = data.field;
            if (!fillLabelFields(fields)) {
                return false;
            }
            if (Number(fields.score) > Number(fields.period)) {
                layer.confirm('学分大于学时，是否继续添加？', {
                    title: '提示',
                    btn: ['确定', '取消']
                }, function (idx) {

        function appendFileRow(file, index, readonly, uploaded) {

        ysUpload.render({
            elem: '#chooseFileBtn',

            accept: 'file',
            multiple: true,
            number: 10,
            size: 15 * 1024,
            auto: false,
            bindAction: '#submitFileBtn',
            before: function (obj) {
                this.data = getFileUploadData(this.files || uploadFiles);
            },
            choose: function (obj) {
                var that = this;
                uploadFiles = that.files = obj.pushFile();
                setUploadButtonEnabled(true);
                obj.preview(function (index, file) {
                    var tr = $('<tr id="upload-' + index + '"><td>' + file.name + '</td><td>' + formatFileBytes(file.size) + '</td><td>未上传</td><td><button type="button" class="layui-btn layui-btn-xs layui-btn-danger">删除</button></td></tr>');
                    tr.find('button').on('click', function () {
                        delete uploadFiles[index];
                        delete that.files[index];
                        tr.remove();
                        setUploadButtonEnabled(hasUploadQueue());
                    });
                    that.elemList.append(tr);
                });
            },
            done: function (res, index, upload) {
                var that = this;
                if (res.code == 200) {
                    var file = (that.files && that.files[index]) || uploadFiles[index];
                    if (!file) {
                        layer.msg('上传文件状态异常，请重新选择附件', {icon: 2});
                        return;
                    }
                    fileUrls.push({
                        fileName: file.name,
                        fileUrl: res.data.picUrl,
                        fileSize: bytesToKb(file.size),
                        remark: 'APPLY'
                    });
                    var tr = $('#upload-' + index);
                    tr.children().eq(2).html('已上传');
                    tr.children().eq(3).empty();
                    delete that.files[index];
                    delete uploadFiles[index];
                    setUploadButtonEnabled(hasUploadQueue());
                    return;
                }
                this.error(index, upload);
            },
            error: function (index) {
                $('#upload-' + index).children().eq(2).html('上传失败');
                layer.msg('上传失败', {icon: 2});
            }

        function hasUploadQueue() {
            for (var key in uploadFiles) {
                if (Object.prototype.hasOwnProperty.call(uploadFiles, key)) {
                    return true;
                }
            }
            return false;
        }

        function clearUploadQueue() {
            for (var key in uploadFiles) {
                if (Object.prototype.hasOwnProperty.call(uploadFiles, key)) {
                    delete uploadFiles[key];
                }
            }
            uploadFiles = {};
        }

        function setUploadButtonEnabled(enabled) {

        function bytesToKb(bytes) {
            return (Number(bytes || 0) / 1024).toFixed(1);
        }

        function formatFileBytes(bytes) {
            return formatFileSize(bytesToKb(bytes));
        }

        function formatFileSize(fileSize) {
            if (fileSize === null || fileSize === undefined || fileSize === '') {
                return '';
            }
            var value = String(fileSize).toLowerCase();
            if (value.indexOf('mb') > -1) {
                return parseFloat(value).toFixed(2) + 'MB';
            }
            var kb = parseFloat(value.replace('kb', ''));
            if (isNaN(kb)) {
                return fileSize;
            }
            var mb = kb / 1024;
            if (mb > 0 && mb < 0.01) {
                mb = 0.01;
            }
            return mb.toFixed(2) + 'MB';
        }

        function formatDateTime(value) {
            return value ? String(value).substring(0, 19) : '';

        function renderXm(key, el, data, prop, initValue, onChange) {
            if (labelInst[key] && labelInst[key].destroy) {
                labelInst[key].destroy();

            labelInst[key] = xmSelect.render({

                initValue: initValue ? [initValue] : [],
                on: function (d) {

                    labelValues[key] = node ? node[prop.value] : '';
                    if (onChange) {

        function buildTree(list, pid) {
            pid = pid || null;
            return (list || []).filter(function (item) {
                return (item.pid || null) === pid;
            }).map(function (item) {
                var node = $.extend({}, item);
                node.children = buildTree(list, item.id);
                return node;
            });
        }

            $.ajax({
                url: huayi_sjwh_url + 'option/scoreLevelContent/list',
                data: {scoreLevel: scoreLevel},
                success: function (res) {
                    renderXm('lblActivityContent', 'div[data-id=lblActivityContent]', res.data || [], {name: 'scoreLevelContentName', value: 'value'}, labelValues.lblActivityContent);
                }
            });
        }

        function renderMedicalSystem() {
            renderXm('lblMedicalSystem', 'div[data-id=lblMedicalSystem]', [
                {value: '1', name: '西医'},
                {value: '2', name: '中医'}
            ], {name: 'name', value: 'value'}, labelValues.lblMedicalSystem);
        }

        function initYear() {
            var now = new Date().getFullYear();
            $('#cmeYear,#cmeYearSearch').empty();
            $('#cmeYearSearch').append('<option value="">全部</option>');
            for (var i = 0; i < 6; i++) {
                var year = now - i;
                $('#cmeYear').append('<option value="' + year + '">' + year + '</option>');
                $('#cmeYearSearch').append('<option value="' + year + '">' + year + '</option>');
            }
            $('#cmeYear').val(now);
            $('#cmeYearSearch').val(now);
        }

        function isApplyUnit() {
            return userType == '12';
        }

        function initStatus() {
            var options = isApplyUnit()
                ? '<option value="">全部</option><option value="0">未提交</option><option value="submitted">已提交</option>'
                : '<option value="">全部</option><option value="pendingApproval">待审核</option><option value="2">市县同意举办</option><option value="3">市县不同意举办</option><option value="5">退回修改</option><option value="6">同意举办</option><option value="7">不同意举办</option>';
            $('#checkStatusSearch').html(options);
            $('#checkStatusLabel').text(isApplyUnit() ? '提交状态' : '审核状态');
            if (!isApplyUnit()) {
                $('#checkStatusSearch').val('pendingApproval');
            }
        }

        function initDate() {
            laydate.render({
                elem: '#startDate',
                type: 'datetime',
                format: 'yyyy-MM-dd HH:mm:ss',
                done: function (value) {
                    handleDatePicked('#startDate', value, '00:00:00');
                }
            });
            laydate.render({
                elem: '#endDate',
                type: 'datetime',
                format: 'yyyy-MM-dd HH:mm:ss',
                done: function (value) {
                    handleDatePicked('#endDate', value, '23:59:59');
                }
            });
        }

        function handleDatePicked(selector, value, defaultTime) {
            if (!value) {
                return;
            }
            var $input = $(selector);
            var oldValue = $input.data('lastValue') || '';
            setTimeout(function () {
                if (applyModalType === 'add' && !oldValue) {
                    $input.val(String(value).substring(0, 10) + ' ' + defaultTime);
                }
                $input.data('lastValue', $input.val());
                syncHoldDay(selector);
            }, 0);
        }

        function syncHoldDay(changedSelector) {
            var start = $('#startDate').val(), end = $('#endDate').val();
            if (!start || !end) return;
            var sd = parseDateOnly(start);
            var ed = parseDateOnly(end);
            if (!sd || !ed) return;
            if (sd > ed) {
                layer.msg('开始日期不能晚于结束日期', {icon: 0});
                $('#holdDay').val('');
                $(changedSelector || '#endDate').val('').removeData('lastValue');
                return;
            }
            $('#holdDay').val(Math.floor((ed - sd) / 86400000) + 1);
        }

        function parseDateOnly(value) {
            var parts = String(value || '').substring(0, 10).split('-');
            if (parts.length !== 3) {
                return null;
            }
            return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        }

        function validatePeriod() {
            var period = Number($('#period').val());
            var theory = Number($('#theoryTime').val());
            var demo = Number($('#demoTime').val());
            if ($('#period').val() && $('#theoryTime').val() && $('#demoTime').val() && period !== theory + demo) {
                layer.msg('总时长应等于讲授理论时长与实验（技术示范）时数之和', {icon: 0});
                return false;
            }
            return true;
        }

        function getFileUploadData(filesObj) {
            var datas = {};
            var year = new Date().getFullYear();
            var path = '/tempProjApply/' + cmeStandardKindId + '/' + year + '/' + unitId;
            for (var key in filesObj) {
                datas[key] = {path: path, fileType: 'DOC', scale: 0.6, outputQuality: 0.6};
            }
            return datas;
        }

        function downloadTemplate(index) {
            var item = TEMPLATE_FILES[index];
            if (!item) {
                layer.msg('未配置该模板文件', {icon: 0});
                return;
            }
            var a = document.createElement('a');
            a.href = window.location.origin + encodeURI(item.path);
            a.setAttribute('download', item.saveAs);
            a.rel = 'noopener';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function postJson(url, data, callback) {
            $.ajax({
                type: 'POST',
                url: huayi_projectscore_url + url,
                data: JSON.stringify(data),
                contentType: 'application/json;charset=UTF-8',
                success: function (res) {
                    if (res.success) {
                        callback && callback(res);
                    } else {
                        layer.msg(res.msg || '操作失败', {icon: 2});
                    }
                },
                error: function () {
                    layer.msg('请求失败', {icon: 2});
                }
            });
        }

        function verParams() {
            return typeof getVerParams === 'function' ? getVerParams() : {};
        }

        function statusName(status) {
            var map = {1: '已提交', 2: '市县同意举办', 3: '市县不同意举办', 5: '退回修改', 6: '同意举办', 7: '不同意举办'};
            return map[status] || status || '';
        }

        function displayCheckStatusName(row) {
            if (userType == '12' && String(row.checkStatus) === '1') {
                return '已提交';
            }
            return row.checkStatusName || '';
        }
    });
</script>
</body>
</html>
