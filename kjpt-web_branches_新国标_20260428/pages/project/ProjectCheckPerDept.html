<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-tab" lay-filter="tabcheck">
            <ul class="layui-tab-title">
                <li class="tab_others tab_this tabsRounded" id="loaderTable" >全部</li>
                <li id ="loadUnreviewed" class="tab_others tabsRounded"></li>
                <li id ="loadCheckPass"  class="tab_others tabsRounded"></li>
                <li id ="loadsendBack" class="tab_others tabsRounded"></li>
                <li id ="loadNoPass" class="tab_others tabsRounded"></li>
              </ul>

          </div>

        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                <div class="layui-inline">
                    <label class="layui-form-label">项目年度</label>
                    <div class="layui-input-block">
                        <select name="holdYear" id="holdYear"  lay-filter="loadReport">

                      </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">项目级别</label>

                        <select name="CmeComScoreLevel" id="CmeComScoreLevel">
                            <option value="">全部</option>
                        </select>
                      </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">申报代码</label>
                    <div class="layui-input-block">
                        <input type="text" name="projectCode" id="projectCode" placeholder="请填写申报代码" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">项目负责人</label>
                    <div class="layui-input-block">
                        <input type="text" name="PrincipalName" id="PrincipalName" placeholder="请填写项目负责人" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">申报单位</label>
                    <div class="layui-input-block">
                        <input type="text" name="UnitName" id="UnitName" placeholder="请填写项目名称关键字" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">二级学科</label>
                    <div class="layui-input-block">
                        <select name="knowledge2" id="knowledge2" lay-filter="changeknowledge2">
                            <option value="">全部</option>
                        </select>
                      </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">三级学科</label>
                    <div class="layui-input-block">
                        <select name="knowledge3" id="knowledge3">
                            <option value="">全部</option>
                        </select>
                      </div>
                </div>

                <div class="layui-inline">
                    <label class="layui-form-label">项目名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="projectName" id="projectName" placeholder="请填写项目名称关键字" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-inline">
                    <label class="layui-form-label">下级单位</label>
                    <div class="layui-input-block">
                        <input type="text" name="SubordinateUnit" id="SubordinateUnit" placeholder="请输入" autocomplete="off"class="layui-input">
                    </div>
                </div>
                </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" lay-submit lay-filter="search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                </div>

        </div>


        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <div class="layui-tab-content">
                <div class="layui-tab-item layui-show">
                    <table class="layui-table" id="project" lay-filter="project" style="margin: 0px 0px;"></table>
                </div>
              </div>

        </div>
    </div>
</div>

<script type="text/html" id="viewProjInfo">
    <a class="layui-table-link orderNumber" lay-event="view" title="点击查看项目详情">{{d.projectCode}}</a>
</script>
<!--表格内数据编辑、删除按钮-->

    <!-- isPass -->

        <a class="layui-btn layui-btn-xs" lay-event="checkPass" style="color: #27b1a2;background-color: transparent;">通过</a>

<script type="text/html" id="bar">
    <input type="checkbox" name="like1[read]" id="checkboxCurrent" lay-filter="checkboxCurrent"  title="本页全选">
    <input type="checkbox" name="like1[read]" id="checkboxAll"  lay-filter="checkboxAll"  title="所有全选">
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="AllCheckPass">预审通过</button>
    <button class="layui-btn layui-btn-sm layui-btn-danger" lay-event="AllCheckNoPass">预审不通过</button>
    <button class="layui-btn layui-btn-sm layui-btn-warm" lay-event="AllsendBack">退回修改</button>
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="visbale" style="float: right;">设置显示列</button>
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="excel" style="float: right;">导出Excel</button>
</script>
<style type="text/css">
    .tab_others {
        background-color: #009688;color:#ffffff;margin-left: 6px;
        width: 173px;
    }
    .tab_this {
        background-color: #f5f5f5;color:#404040;margin-left: 6px;
        width: 173px; border-bottom: 1px solid #F5F5F5;
    }
    .layui-table-tool-temp{
        padding-right: 10px;
    }
    .layui-select-title{
        width: 182px;
    }
</style>
<script>

    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var year = document.getElementById("holdYear");
        var my = new Date();
        var tabNumber=getUrlParam("tabNumber");
        var userid= localStorage.getItem("unit-id");
        var status=0;
        $(function () {
            var endYear = my.getFullYear()+1;// 获取当前年份
            for (var i = endYear; i > endYear-6; i--) {
                $('#holdYear').append(new Option(i,i));//往下拉菜单里添加元素
            }
            form.render('select'); //刷新select选择框渲染
            ddlList();
            loadReport();
            loaderTable();
            if(tabNumber!=null && tabNumber!=''){
                $('.layui-tab-title li').eq(tabNumber).addClass('tab_this layui-this').siblings().removeClass('tab_this layui-this');
                status=tabNumber;
                loaderTable();
                displayBtn();
            }

        });
        window.colArray=[
            {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                    var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.projectId+'"><i class="layui-icon"></i>';
                        //利用三元表达式判断本条数据是否需要加载checkbox
                        return d.isPass != null ?'已审核':templateHtml
            }},
            {field: 'center', width: 200, toolbar: '#rowBar', title: '操作',align:'center'},
        ];

        $.ajax({
                type:"POST",
                headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                async:false,
                url: huayi_projectscore_url +"project/comcolumnList",
                //url:'http://localhost:20004/permission/feign/getDisplayList',
                data:JSON.stringify({"module_name": "ProjectProcCheck"}),
                contentType:"application/json",
                success:function(data){
                    $.each(data.data,function(index,item){
                        let column="";
                        if(item.columnCamelCase=="projectCode"){
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                        }else{
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                        }
                        window.colArray.push(column);
                    })
                },
                error: function (data, xhr,  stus) {
                    layer.msg("响应失败");
                }
            })


// 表格相关操作
        // 表格配置
        function loaderTable() {
            window.mainTable = table.render({
                elem: '#project',
                url: huayi_projectscore_url + 'project/listProc',
                //本地先写死
                //url:'http://localhost:10005/project/list',
                title: '用户表',
                defaultToolbar: [],
                where: {
                    HoldYear: $('#holdYear').val(),
                    CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                    ProjectName: $('#projectName').val(),
                    ProjectCode: $('#projectCode').val(),
                    DictId: $('#holdType').val(),
                    personName: $('#PrincipalName').val(),
                    cmeStandardKindId:localStorage.getItem("standardkind-id"),
                    status:status,
                    unitId:localStorage.getItem("unit-id")
                },

                cols:[
                    //{field: 'center', width: 160, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    window.colArray
                ],
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "project",
                height: 'full-230',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });
        };
        function reloadTabletitle() {
            window.mainTable.reload({
                url: huayi_projectscore_url + 'project/listProc',
                //本地先写死
                //url:'http://localhost:10005/project/list',
                defaultToolbar: [],
                where: {
                    HoldYear: $('#holdYear').val(),
                    CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                    ProjectName: $('#projectName').val(),
                    ProjectCode: $('#projectCode').val(),
                    DictId: $('#holdType').val(),
                    personName: $('#PrincipalName').val(),
                    cmeStandardKindId:localStorage.getItem("standardkind-id"),
                    status:status,
                    unitId:localStorage.getItem("unit-id")
                },

                cols:[
                    //{field: 'center', width: 160, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    window.colArray
                ],
                done:function(res, curr, count){
                    for(var i = 0;i<res.data.length;i++){
                        var state = res.data[i].isPass; //根据status状态判断，不为0时，禁止勾选
                        var checkallinfo=$("#checkboxAll").is(":checked");
                        var checkboxCurrent=$("#checkboxCurrent").is(":checked");
                        var templateHtml ="";
                        //如果全选
                        if (checkallinfo || checkboxCurrent){
                            var index = res.data[i]['LAY_TABLE_INDEX'];
                            //如果已公布
                            if(state==null)
                            {
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                            }
                        }
                    }
                },
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            }, true);
        };
        window.colSettingClaaback = function( obj){
            var str={"module_name":"ProjectProcCheck"};
            $.ajax({
                type:"POST",
                headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                },
                url: huayi_projectscore_url +"project/comcolumnList",
                //url:'http://localhost:20004/permission/comcolumn/getDisplayList',
                //data:{"module_name": "projectReport"},

                data:JSON.stringify(str),
                contentType:"application/json",
                success:function(data){
                    window.colArray=[
                    {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                            field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                                var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.projectId+'"><i class="layui-icon"></i>';
                                    //利用三元表达式判断本条数据是否需要加载checkbox
                                    return d.isPass != null ?'已审核':templateHtml
                        }},
                        {field: 'center', width: 200, toolbar: '#rowBar', title: '操作',align:'center'},
                    ];
                    $.each(data.data,function(index,item){
                        let column="";
                        if(item.columnCamelCase=="projectCode"){
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                        }else{
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                        }
                        window.colArray.push(column);
                    })
                    reloadTabletitle();
                    if(obj && obj.success){
                        layer.close(window.colLayerIndex);
                    }
                    else{
                        layui.msg(obj.msg);
                    }
                },
                error: function (data, xhr,  stus) {
                    layer.msg("响应失败");
                }
            })
        }



        $(".tab_others").on("click", function () {
            var index = $(this).index();
             $(this).addClass("tab_this").siblings().removeClass("tab_this");

        });


        function ddlList(){
            //加载项目级别
            $.ajax({
                type: "post",
                url: huayi_projectscore_url +"projectDicRegionLevel/getLevelsByStandardId",
                data: {
                    getLevelsByStandardId: localStorage.getItem("standardkind-id"),
                    holdYear: $('#holdYear').val(),
                    unitId:userid
                },
                dataType: 'json',
                success: function (data) {
                $('#CmeComScoreLevel').empty();
                $('#CmeComScoreLevel').append(new Option("请选择",""));
                $.each(data.data,function(index,item){
                        $('#CmeComScoreLevel').append(new Option(item.scoreLevelName,item.scoreLevelId));//往下拉菜单里添加元素
                    })
                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            });
            //加载举办方式
            $.ajax({
                type: "get",
                url: huayi_projectscore_url +"projectDDL/holdTypeList/" + localStorage.getItem('standardkind-id'),
                dataType: 'json',
                success: function (data) {
                    $.each(data.data,function(index,item){
                        $('#holdType').append(new Option(item.dictName,item.dictId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            });
            //加载二级学科
            $.ajax({
                type: "post",
                url: huayi_projectscore_url +"projectDDL/selectknowledge",
                data: {type:2,cmeStandardKindId:localStorage.getItem('standardkind-id')},
                dataType: 'json',
                success: function (data) {
                    $.each(data.data,function(index,item){
                        $('#knowledge2').append(new Option(item.knowledgeName,item.knowledgeId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败1");
                }
            });

        }
        function loadReport(){
            //加载ProjectTabsNum
            $.ajax({
                type:"get",
                url: huayi_projectscore_url +"projectDDL/projectTabsNum",
                dataType:"json",
                data:{year: $('#holdYear').val(),unitid:localStorage.getItem("unit-id"),type:11},
                success:function(data){
                    if(data.data!=null){
                        $('#loadUnreviewed').html('未审核('+data.data[0]['unreviewed']+')');
                        $('#loadCheckPass').html('预审通过('+data.data[0]['checkPass']+')');
                        $('#loadsendBack').html('退回修改('+data.data[0]['sendBack']+')');
                        $('#loadNoPass').html('预审不通过('+data.data[0]['checkNoPass']+')');
                    }else{
                        $('#loadUnreviewed').html('未审核(0)');
                        $('#loadCheckPass').html('预审通过(0)');
                        $('#loadsendBack').html('退回修改(0)');
                        $('#loadNoPass').html('预审不通过(0)');
                    }



                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            })
        }




        // 监听头部新增按钮
        table.on('toolbar(project)', function (obj) {
            var datas = obj.data;
            //document.getElementById("form-Project").reset();
            if(obj.event === 'excel'){
                //导出excel
                $.ajax({
                    type:"get",
                    url: huayi_projectscore_url +"project/excelExportProj",
                    dataType:"json",
                    data:{year: $('#holdYear').val()},
                    success:function(data){
                        $('#loadNoReport').html('未上报('+data.data[0]['noReport']+')');
                        $('#loadhasReported').html('已上报('+data.data[0]['hasReported']+')');
                        $('#loadsendBack').html('退回修改('+data.data[0]['sendBack']+')');
                    },
                    error: function (data) {
                        layer.msg("响应失败");
                    }
                })
            }else if (obj.event === 'visbale') {
                window.colLayerIndex = layer.open({
                    content:"../../column_setting.html?module_name=ProjectProcCheck&callBack=colSettingClaaback",
                    type: 2,
                    area: ['600px', '600px']

                })
            }else if (obj.event === 'AllCheckPass' || obj.event === 'AllCheckNoPass' || obj.event === 'AllsendBack') {
                //审核项目 判断是否全选
                var checkallinfo=$("#checkboxAll").is(":checked");
                var projectidlist =[];
                var missage="";
                var postprojStatus=0;
                if(obj.event === 'AllCheckNoPass'){
                    missage="不通过原因";
                    postprojStatus=2;
                }else{
                    missage="退回原因";
                    postprojStatus=1;
                }
                if(checkallinfo){
                    if(obj.event === 'AllCheckPass' ){
                        layer.confirm('确定全部审核通过吗', {icon: 3, title: '提示'}, function () {
                            $.ajax({
                                type: "post",
                                url: huayi_projectscore_url +"project/checkProjProc",
                                data: {
                                    HoldYear: $('#holdYear').val(),
                                    CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                                    ProjectName: $('#projectName').val(),
                                    ProjectCode: $('#projectCode').val(),
                                    DictId: $('#holdType').val(),
                                    personName: $('#PrincipalName').val(),
                                    cmeStandardKindId:localStorage.getItem("standardkind-id"),
                                    status:1,
                                    unitId:localStorage.getItem("unit-id"),
                                    projStatus:3,
                                    type:1
                                },
                                dataType: 'json',
                                success: function (data) {
                                    if (data.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('project');
                                        loadReport();
                                    }
                                },
                                error: function (data) {
                                    layer.msg("响应失败");
                                }
                            });
                        })
                    }else if (obj.event === 'AllCheckNoPass' || obj.event === 'AllsendBack'){
                        layer.prompt({formType: 2,title: missage},
                            function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                }else{
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url +"project/checkProjProc",
                                        data:{
                                            HoldYear: $('#holdYear').val(),
                                            CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                                            ProjectName: $('#projectName').val(),
                                            ProjectCode: $('#projectCode').val(),
                                            DictId: $('#holdType').val(),
                                            personName: $('#PrincipalName').val(),
                                            cmeStandardKindId:localStorage.getItem("standardkind-id"),
                                            status:1,
                                            unitId:localStorage.getItem("unit-id"),
                                            projStatus:postprojStatus,
                                            content:value,
                                            type:1
                                        },
                                        dataType: 'json',
                                        success: function (data) {
                                            if (data.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('project');
                                                loadReport();
                                            }
                                        },
                                        error: function (data) {
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            }
                        );

                    }

                }else{
                    var child = $("input[name='layTableCheckbox']");
                        child.each(function (index, item) {
                            if(item.checked===true){
                                projectidlist.push(item.defaultValue);
                            }
                    });
                    if(projectidlist.length == 0){
                        layer.msg("请选择项目");
                        return;
                    }else{
                        if(obj.event === 'AllCheckPass' ){
                            layer.confirm('确定预审通过吗', {icon: 3, title: '提示'}, function () {
                                $.ajax({
                                    type: "post",
                                    url: huayi_projectscore_url +"project/checkProjProc",
                                    data: {
                                        projectIds: JSON.stringify(projectidlist),
                                        unitId:localStorage.getItem("unit-id"),
                                        projStatus:3,
                                        type:2
                                    },
                                    dataType: 'json',
                                    success: function (data) {
                                        if (data.status === 200) {
                                            layer.msg("审核成功");
                                            table.reload('project');
                                            loadReport();
                                        }
                                    },
                                    error: function (data) {
                                        layer.msg("响应失败");
                                    }
                                });
                            })
                        }else if (obj.event === 'AllCheckNoPass' || obj.event === 'AllsendBack'){
                            layer.prompt({formType: 2,title: missage},
                                function(value, index, elem){
                                    if(value.length>100){
                                        layer.alert("最多支持100个汉字");
                                    }else{
                                        $.ajax({
                                            type:"post",
                                            url: huayi_projectscore_url +"project/checkProjProc",
                                            data:{
                                                projectIds: JSON.stringify(projectidlist),
                                                unitId:localStorage.getItem("unit-id"),
                                                projStatus:postprojStatus,
                                                content:value,
                                                type:2
                                            },
                                            dataType: 'json',
                                            success: function (data) {
                                                if (data.status === 200) {
                                                    layer.msg("审核成功");
                                                    table.reload('project');
                                                    loadReport();
                                                }
                                            },
                                            error: function (data) {
                                                layer.msg("响应失败");
                                            }
                                        })
                                        layer.close(index);
                                    }
                                }
                            );
                        }
                    }
                }
            }
        });

        // 监听行内按钮
        table.on('tool(project)', function (obj) {
            var datas = obj.data;
            var projectidlist =[];
            projectidlist.push(datas.projectId);

            if (obj.event === 'checkPass') {
                layer.confirm('确定要审核通过吗', {icon: 3, title: '提示'}, function () {
                    $.ajax({
                        type: "post",
                        url: huayi_projectscore_url +"project/checkProjProc",
                        data: {
                            projectIds: JSON.stringify(projectidlist),
                            projStatus:3,
                            unitId:localStorage.getItem("unit-id"),
                            type:2
                        },
                        dataType: 'json',
                        success: function (data) {
                            if (data.status === 200) {
                                layer.msg("审核成功");
                                table.reload('project');
                                loadReport();
                            }
                        },
                        error: function (data) {
                            layer.msg("响应失败");
                        }
                    });
                })
            }else if (obj.event === 'checkNoPass') {
                layer.prompt({formType: 2,title: '不通过原因'},
                    function(value, index, elem){
                        if(value.length>100){
                            layer.alert("最多支持100个汉字");
                        }else{
                            $.ajax({
                                type:"post",
                                url: huayi_projectscore_url +"project/checkProjProc",
                                data:{
                                    projectIds: JSON.stringify(projectidlist),
                                    projStatus:2,
                                    unitId:localStorage.getItem("unit-id"),
                                    content:value,
                                    type:2
                                },
                                dataType: 'json',
                                success: function (data) {
                                    if (data.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('project');
                                        loadReport();
                                    }
                                },
                                error: function (data) {
                                    layer.msg("响应失败");
                                }
                            })
                            layer.close(index);
                        }
                    }
                );
            }else if(obj.event==='sendBack'){
                layer.prompt({formType: 2,title: '退回原因'},
                    function(value, index, elem){
                        if(value.length>100){
                            layer.alert("最多支持100个汉字");
                        }else{
                            $.ajax({
                                type:"post",
                                url: huayi_projectscore_url +"project/checkProjProc",
                                data:{
                                    projectIds: JSON.stringify(projectidlist),
                                    projStatus:1,
                                    unitId:localStorage.getItem("unit-id"),
                                    content:value,
                                    type:2
                                },
                                dataType: 'json',
                                success: function (data) {
                                    if (data.status === 200) {
                                        layer.msg("退回成功");
                                        table.reload('project');
                                        loadReport();
                                    }
                                },
                                error: function (data) {
                                    layer.msg("响应失败");
                                }
                            })
                            layer.close(index);
                        }
                    }
                );
            }
            else if(obj.event==='cancelSendBack'){
                layer.confirm('确定要取消退回吗', {icon: 3, title: '提示'}, function () {
                    $.ajax({
                        type: "post",
                        url: huayi_projectscore_url +"project/checkProjProc",
                        data: {
                            projectIds: JSON.stringify(projectidlist),
                            projStatus:4,
                            unitId:localStorage.getItem("unit-id"),
                            type:2
                        },
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("操作成功");
                                table.reload('project');
                                loadReport();
                            }
                        },
                        error: function (res) {
                            layer.msg("响应失败");
                        }
                    });
                })
            }
        });

        // form表单相关操作
        // 监听查询
        form.on('submit(search)', function (data) {
            loaderTable();
        });
        //下拉框值改变
        form.on('select(loadReport)', function (data) {
            ddlList();
            loadReport();
            loaderTable();
        })
        //全选
        form.on('checkbox(checkboxAll)', function(data){
            // console.log(data.elem); //得到checkbox原始DOM对象
            // console.log(data.elem.checked); //是否被选中，true或者false
            // console.log(data.value); //复选框value值，也可以通过data.elem.value得到
            // console.log(data.othis); //得到美化后的DOM对象
            if(data.elem.checked){
                $("#checkboxCurrent").prop("checked",false);
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = true;
                });
            }else{
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = false;
                });
            }
            form.render('checkbox');
        });
        //本页全选
        form.on('checkbox(checkboxCurrent)', function(data){
            if(data.elem.checked){
                $("#checkboxAll").prop("checked",false);
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = true;
                });
            }else{
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = false;
                });
            }
            form.render('checkbox');
        });

        //二级学科下拉框值改变
        form.on('select(changeknowledge2)', function (data) {
            //加载三级学科
            $.ajax({
                type: "post",
                url: huayi_projectscore_url +"projectDDL/selectknowledge",
                data: {type:3,know2: $('#knowledge2').val() },
                dataType: 'json',
                success: function (data) {
                    $('#knowledge3').empty();
                    $('#knowledge3').append(new Option("全部",""));
                    $.each(data.data,function(index,item){
                        $('#knowledge3').append(new Option(item.knowledgeName,item.knowledgeId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败1");
                }
            });
        })

        //鼠标悬停提示特效
        $("#hint").hover(function () {
            openMsg();
        }, function () {
            layer.close(subtips);
        });
        function openMsg() {
            subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
        }
        element.on('tab(tabcheck)', function(data){
            var nums=data.index;
            status=nums;
            loaderTable();
        });


    });

</script>
