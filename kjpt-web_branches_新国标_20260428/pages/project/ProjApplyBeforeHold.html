    <style>
        .btn-apply {
            color: #70B603;
        }

        .layui-form-label {
            padding: 9px;
        }
        #implementationFeedback .layui-card {
            margin-bottom: 0px;
            width: 96%;
            margin: auto;
        }

        #implementationFeedback .tab-default {
            width: 55px;
        }

        #tabPage {
            width: 96%;
            margin: 0px auto 20px;
            min-height: 380px;
            border: 1px solid #e6e6e6;
            border-top: 0px;
            padding-top: 25px;
        }

        #implementationFeedback .project-form {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        #implementationFeedback .project-form .layui-form-item {
            min-width: 300px;
            max-width: 460px;
            width: 45%;
        }

        #implementationFeedback .project-form .layui-form-item1 {
            width: 88%;
            margin-bottom: 15px;
        }

        #implementationFeedback .project-form .layui-input-block {
            display: flex;
            align-items: center;
            text-align: left;
        }

        .js-project-image>div,
        .js-project-textbook>div {
            width: 90%;
            margin: 0px auto 15px;
            padding: 8px 0px;
            border: 1px solid;
            min-height: 70px;
            position: relative;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .js-project-textbook>div {
            min-height: 350px;
        }

        .js-project-image span {
            display: inline-block;
            margin-right: 7px;
        }

        .meeting-notice>div,
        .meeting-overrall-view>div,
        .student-signin-table>div,
        .exem-questions>div,
        .feedback-table>div {
            width: 100%;
            margin-bottom: 5px;
        }

        #tabPage .meeting-notice::after {
            content: "会议通知和议程";
        }

        #tabPage .meeting-overrall-view::after {
            content: "会议全景照片";
        }

        #tabPage .student-signin-table::after {
            content: "学员签到表";
        }

        #tabPage .exem-questions::after {
            content: "考试考题";
        }

        #tabPage .feedback-table::after {
            content: "执行情况反馈表";
        }

        .js-project-textbook>div::after {
            content: "教材明细";
        }

        .js-project-image>div::after,
        .js-project-textbook>div::after {
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 0px;
            top: -11px;
            background: #FFF;
        }

        .meeting-notice>ul,
        .meeting-overrall-view>ul,
        .student-signin-table>ul,
        .exem-questions>ul,
        .feedback-table>ul {
            margin: 0px auto;
            width: 96%;
            display: flex;
            flex-wrap: wrap;
        }

        .meeting-notice>ul>li,
        .meeting-overrall-view>ul>li,
        .student-signin-table>ul>li,
        .exem-questions>ul>li,
        .feedback-table>ul>li {
            width: 20%;
            float: left;
        }

        .meeting-notice>ul>li>a:nth-child(1),
        .meeting-overrall-view>ul>li>a:nth-child(1),
        .student-signin-table>ul>li>a:nth-child(1),
        .exem-questions>ul>li>a:nth-child(1),
        .feedback-table>ul>li>a:nth-child(1) {
            width: 150px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meeting-notice>ul>li>a:nth-child(2),
        .meeting-overrall-view>ul>li>a:nth-child(2),
        .student-signin-table>ul>li>a:nth-child(2),
        .exem-questions>ul>li>a:nth-child(2),
        .feedback-table>ul>li>a:nth-child(2) {
            margin-left: 0px;
        }

        .js-project-tab>div {
            width: 90%;
            margin: 0px auto;
        }

        .js-hidden,
        .js-project-image>.js-hidden {
            display: none;
        }

        .flow-detail-window {
            padding: 10px;
        }

        .flow-detail-window>div {
            font-weight: 900;
            font-size: 20px;
            text-align: center;
            margin: 15px auto 35px;
        }

        .flow-detail-window>ul>li {
            min-height: 60px;
            position: relative;
        }

        .flow-detail-window>ul>li:not(:last-child)::before {
            content: "";
            border-left: 1px solid #3c3c3c;
            position: absolute;
            left: 105px;
            height: 100%;
        }

        .flow-detail-window>ul>li::after {
            content: "";
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid #3c3c3c;
            background: #FFF;
            position: absolute;
            left: 95px;
        }

        .flow-detail-window>ul>.approval-pass::after {
            content: "";
            border-radius: 50%;
            border: 1px solid #70B603;
            background: #70B603;
            position: absolute;
        }

        .flow-detail-window>ul>.approval-pass:nth-child(n-1):before {
            /* border-left: 1px solid #70B603; */
            border-color: #70B603;
        }

        .flow-detail-window>ul>li>div {
            display: block;
            min-width: 65px;
            max-width: 190px;
            margin: 0px 20px;
            float: left;
            min-height: 10px;
        }

        div.modleBoder {
            height: 100%;
            padding: 5px 30px;
            margin-bottom: 30px;
            /* margin-top:50px; */
            /* margin-left:150px; */
            border: 2px solid #CCCCCC;
            border-radius: 0.5em;
        }

        span.title {
            display: block;
            width: 150px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        span.title2 {
            display: block;
            width: 330px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        .file-title {
            display: inline-block;
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 30px;
            top: -11px;
            background: #FFF;
        }

        .js-upload-btn-box {
            margin-left: 10px;
        }

        @media only screen and (max-width: 1200px) and (min-width:1000px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 25%;
            }
        }

        @media only screen and (max-width: 999px) and (min-width:650px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 33%;
            }
        }

        @media only screen and (max-width: 649px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 50%;
            }
        }

        #upload-tip {
            padding-left: 10px;
            font-style: normal;
            font-size: 12px;
            color: #f25643;
        }

        .tips_inp {
            color: red;
        }
    </style>
</head>

            window.syncTeacherIdentityVerifyState = function () {
                if (!IS_GUANG_DONG) {
                    return;
                }
                let needScore = $('#needScore').prop('checked');
                let teachNo = $.trim($('#teachNo').val());
                let personNo = $.trim($('#personNo').val());
                let hasTeachNo = teachNo !== '';
                let hasPersonNo = personNo !== '';

                if (!needScore && !hasTeachNo && !hasPersonNo) {
                    $('#teachNo').removeAttr('lay-verify');
                    $('#personNo').removeAttr('lay-verify');
                    $('#cert_type').removeAttr('lay-verify');
                    $("[data-id='spanOnCert']").hide();
                    $('#spanOnTeachNo').hide();
                    $('#spanOnPersonNo').hide();
                    $('#teachNo').removeAttr('disabled').removeClass('layui-disabled');
                    $('#personNo').removeAttr('disabled').removeClass('layui-disabled');
                    return;
                }

                $('#spanOnTeachNo').toggle(!hasPersonNo);
                $('#spanOnPersonNo').toggle(!hasTeachNo);

                $('#teachNo').removeAttr('disabled').removeClass('layui-disabled');
                $('#personNo').removeAttr('disabled').removeClass('layui-disabled');
                if (hasTeachNo && !hasPersonNo) {
                    $('#personNo').attr('disabled', 'disabled').addClass('layui-disabled');
                }
                if (hasPersonNo && !hasTeachNo) {

                } else {
                    $('#teachNo').attr('lay-verify', 'required|rightCertId');
                    $('#personNo').attr('lay-verify', 'required');
                }
            }

            function normalizeTeacherSexValue(sex) {
                if (sex == null) {
                    return '';
                }
                let sexValue = $.trim(String(sex));
                if (sexValue === '') {
                    return '';
                }
                if (sexValue === '男' || sexValue === '男性' || sexValue === '1' || sexValue === 'M' || sexValue === 'm' || sexValue === 'male' || sexValue === 'MALE' || sexValue === 'true') {
                    return '1';
                }
                if (sexValue === '女' || sexValue === '女性' || sexValue === '0' || sexValue === 'F' || sexValue === 'f' || sexValue === 'female' || sexValue === 'FEMALE' || sexValue === 'false') {
                    return '0';
                }
                return sexValue;
            }

            function setTeacherSexValue(sex) {
                $('#sex').val(normalizeTeacherSexValue(sex));

                clearTeacherPersonMatch();

                if (hasFillValue(teacherData.teachName)) {

                if (hasFillValue(teacherData.comPersonId)) {

                        teacherData.personNo = $('#personNo').val();
                        teacherData.telephone = $('#telephone').val();
                    } else if (identitySource === 'personNo') {
                        teacherData.personNo = $('#personNo').val();
                        teacherData.teachNo = $('#teachNo').val();
                        teacherData.telephone = $('#telephone').val();
                    }
                }
                if (identitySource === 'teachNo' || identitySource === 'personNo') {
                    renderMatchedTeacherPersonData(teacherData);
                } else {
                    form.val('add-teacher', teacherData);
                    setTeacherSexValue(teacherData.sex);
                }
                let specValue = teacherData.personSpecId || teacherData.dept;
                if (specValue != null && specValue != undefined && specValue != '') {
                    specTreeSelect.checkNode('specSelect', specValue);

                        cmeStandardKindId: window.getCmeStandardKindId(),

                if (!$layuiSelect.length) {

                }
                if (disabled) {
                    $layuiSelect.addClass('layui-select-disabled');

                } else {
                    $layuiSelect.removeClass('layui-select-disabled');

            };

                // 对比applCourseVOList[i].teacherName 和 teacherList[i].teacherName变化率是否超过30%
                let changeRate = 0;
               
                // 计算教师名称变化率
                if(applTeacherNames.size > 0 || teacherList.length > 0) {
                    // 更新当前教师列表：如果正在修改特定教师，则更新其姓名
                    let updatedTeacherList = [...teacherList];
                    if(teacherId && thisTeacherName) {
                        let teacherToModify = updatedTeacherList.find(item => item.teacherId === teacherId);
                        if(teacherToModify) {
                            teacherToModify.teacherName = thisTeacherName;
                        }
                    }
                    // 添加教师
                    if(!teacherId && thisTeacherName) {
                        updatedTeacherList.push({
                            teacherName: thisTeacherName
                        });
                    }
                    
                    // 获取原始和当前的教师姓名集合
                    let originalTeacherNames = new Set(applTeacherNames);
                    let currentTeacherNames = new Set(updatedTeacherList.map(item => item.teacherName));
                    
                    // 计算变化量：通过找出两集合之间的差异来确定真正变化的数量
                     let notChangeCount = 0;
                    for(let name of originalTeacherNames) {
                        if(currentTeacherNames.has(name)) {
                            notChangeCount++;
                        }
                    }
                    // 删除的数量：在原列表中但不在新列表中的教师
                    // let removedCount = 0;
                    // for(let name of originalTeacherNames) {
                    //     if(!currentTeacherNames.has(name)) {
                    //         removedCount++;
                    //     }
                    // }
                    
                    // 新增的数量：在新列表中但不在原列表中的教师
                    let addedCount = 0;
                    for(let name of currentTeacherNames) {
                        if(!originalTeacherNames.has(name)) {
                            addedCount++;
                        }
                    }
                    
                    // 计算总基数（使用原来教师数量作为基准）
                    let totalTeachers = originalTeacherNames.size;
                    let currentTotalTeachers = currentTeacherNames.size;
                    if(totalTeachers === 0) return resultObj;
                    let isDel = changeType == 4 ? 1 : 0;
                    let changedCount = (currentTotalTeachers - notChangeCount + isDel);

                    if(changeType ==2 && changedCount> 0 ){
                        resultObj.code = 2; 
                        resultObj.msg = '教师发生变更，请上传教师变更说明';
                        return resultObj;
                    }

                    let maxAllowedChanges = totalTeachers <= 1 ? 0 : Math.ceil(totalTeachers * 0.3); // 30% 向上取整
                    // 计算变化率
                    // let changeRate = ((totalTeachers - notChangeCount) + addedCount) / totalTeachers;
                    
                    // 如果变化率超过30%，设置错误码
                    if(changedCount > maxAllowedChanges) {
                    // if(changeRate > 0.3) {
                        resultObj.code = 1; 
                        resultObj.msg = '教师变更率超过30%，请检查';
                    }
                }
                return resultObj;
            }

            form.verify({
                  // 重写required校验规则
                required: function(value, item){
                    // 判断元素是否可见
                    // if($(item).is(':hidden')) return;

                    // 检查layui渲染后的可见性状态
                    // 对于layui的select，需要检查其包装元素的可见性
                    var $originalElement = $(item);
                    var isLayuiSelect = $originalElement.is('select') && $originalElement.next('.layui-form-select').length > 0;
                    
                    if (isLayuiSelect) {
                        // 对于layui的select，检查其渲染后的元素是否被隐藏
                        var $renderedElement = $originalElement.next('.layui-form-select');
                        if ($renderedElement.is(':hidden') || $renderedElement.closest('[style*="display: none"]').length > 0 || 
                            $renderedElement.closest('[class*="layui-hide"]').length > 0) {
                            return;
                        }
                    } else {
                        // 对于非layui select元素，使用原来的检查方式
                        if($originalElement.is(':hidden')) return;
                    }
                    // 判断是否禁用
                    if($(item).attr('disabled')) return;
                    
                    // 原始required校验逻辑
                    var tip = item.getAttribute('lay-reqText') || '必填项不能为空';
                    if(typeof value === 'number'){
                        value = value.toString();
                    }
                    if(value === '' || value === null || value === undefined){
                        return tip;
                    }
                },
                studyAddress: [/^.{0,100}$/, '举办地点最多100个汉字'],
                unitName: [/^.{1,40}$/, '最多个40汉字'],
                period: function (value, item) {
                    if($(item).is(':hidden')) return;
                    if(value === '' || value === null || value === undefined){
                        return periodName + '不能为空';
                    }
                    if(value < 0){
                        return periodName + '不能小于0';
                    }
                    if(!IS_GUANG_DONG && value % 0.5 != 0){
                        return periodName + '必须是0.5的倍数';
                    }
                    if(projectPublishId){
                        applProjDetail(projectPublishId);
                        if(applPeriod !=0 && value > applPeriod){
                            return '学时不能大于项目公布时的学时';
                        }
                    }
                    return '';
                },
                applScore: function (value, item) {
                    // 修改学分时不能大于申报学分
                    var msg = "";
                    if (value < 0) {
                        return msg = '授予学分不能小于0';
                    }
                    if (projectPublishId) {
                        applProjDetail(projectPublishId);
                        //applScore !=0 防止数据有问题
                        if (applScore !=0 && value > applScore) {
                            msg = ("授予学分不能大于项目公布时的学分");
                        }
                    }
                    return msg;
                },
                "rightCertId": checkTeachNo,
                // “主要内容”字数限制1~300个汉字
                content: function(value, item) {
                    if($(item).is(':hidden')) return;
                    if(value.length > 300 || value.length < 1){
                        return "主要内容限制1~300个汉字";
                    }
                    return "";
                }
            });
