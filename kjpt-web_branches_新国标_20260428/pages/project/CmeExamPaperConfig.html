<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>试卷开启配置</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="/js/api/manage.js"></script>

    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>

    <style>
        #form-CmeExamPaperConfig .layui-inline{
            width: 65%;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto js-search-box">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                <div class="layui-inline">
                    <label class="layui-form-label">套</label>
                    <div class="layui-input-block">
                        <select name="cmeStandardKindId"  lay-search lay-filter = "search-select-tao" id="searchCmeStandardKindId">
                        </select>
                    </div>
                </div>

                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                       <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </a>

                </div>
            </blockquote>
        </div>

        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="cmeExamPaperConfig" lay-filter="cmeExamPaperConfig" style="margin: 0px 0px;">
            </table>
        </div>

        <!--        添加弹窗-->
        <div id="add-cmeExamPaperConfig" style=" display:none;text-align: center">

            <form class="layui-form" style="padding: 30px;" id="form-CmeExamPaperConfig" lay-filter="add-filter">
                <div class="layui-form-item" style="display: none">
                    <div class="layui-inline">
                        <label class="layui-form-label">主键</label>
                        <div class="layui-input-block">
                            <input type="text" name="paperConfigId" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">套</label>
                        <div class="layui-input-block">
                            <select name="cmeStandardKindId" lay-verify="notBlank" lay-search lay-filter = "layui-select-tao" id="cmeStandardKindId" lay-verify="required" required>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">最高机构</label>
                        <div class="layui-input-block">
                            <input type="text" id="topUnitId" name="topUnitId" lay-filter="topUnitId"  autocomplete="off" class="layui-input" readonly="true" style="background:#e6e6e6;" lay-verify="required" required>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">项目级别</label>
                        <div class="layui-input-block">
                            <select name="scoreLevelId" placeholder="项目级别" autocomplete="off" lay-search lay-filter = "layui-select-level" id="scoreLevelId"  lay-verify="required" required>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">项目类型</label>
                        <div class="layui-input-block">
                            <select name="projectType" placeholder="项目类型" autocomplete="off" lay-search   lay-verify="required" required>
                                <option value="">请选择</option>
                                <option value="1">继教项目</option>
                                <option value="2">院内活动</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">开启考试最低题目数量</label>
                        <div class="layui-input-block">
                            <input type="number" min="0" name="questionNum" placeholder="开启考试最低题目数量" autocomplete="off" class="layui-input" oninput = "value=value.replace(/[^\d]/g,'')" lay-verify="required" required>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                        <!-- <button type="reset" class="layui-btn layui-btn-primary">重置</button> -->
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a>
</script>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="add">新增</a>
</script>
<script>
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        treeSelect  :   'treeSelect',
        tool        :   'tool'
    });

    layui.use(['table', 'form','treeSelect','tool'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery;
        var layer = layui.layer,tool = layui.tool;
        var treeSelect = layui.treeSelect;
        var nowCmeStandardKindId;
// 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            let height = tool.getTableHeight("js-search-box")+40;
            table.render({
                elem: '#cmeExamPaperConfig',
                url: huayi_projectscore_url + 'cmeExamPaperConfig/listRelated',
                title: '用户表',
                defaultToolbar: [],
                where: {
                    cmeStandardKindId: $('#searchCmeStandardKindId').val(),
                },
                cols: [[
                    {field: 'cmeStandardKindName', title: '套', sort: true},
                    {field: 'topUnitName', title: '最高机构', sort: true},
                    {field: 'scoreLevelName', title: '项目级别', sort: true},
                    {field: 'projectType', title: '项目类型', sort: true,
                        templet:function(d){
                            if(d.projectType == 1){
                                return "继教项目";
                            }else if(d.projectType == 2){
                                return "院内活动";
                            }
                            return "";
                    }},
                    {field: 'questionNum', title: '最低题目数', sort: true},
                    {field: 'addTime', title: '创建时间', sort: true},
                    {align: 'center', width: 170, toolbar: '#rowBar', title: '操作', fixed: 'right'}
                ]],
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "cmeExamPaperConfig",
                height: height,
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done:function(res,curr,count){
                    if (curr > 1 && res.data.length === 0) {
                        loaderTable();
                    }
                }
            });
        };

        //初始化套标准下拉框
        let getStandardKind = function(){
            $.ajax({
                url: huayi_sjwh_url +"cmestandardkind/list/all",
                type:'get',
                success:function(res){
                    var standards = res.data;
                    if(standards != null && standards.length > 0){
                        var options = '<option value="" > 请选择套标准 </option>';
                        for(var i =0; i< standards.length; i++){
                            options += '<option top-unit-id="' + standards[i].topUnitId + '" value="' + standards[i].cmeStandardKindId + '">'+standards[i].description+'</option>';
                        }
                        $('#cmeStandardKindId').append(options);
                        $('#searchCmeStandardKindId').append(options);
                        form.render('select');
                    }else{
                        console.log('score kind is null!');
                    }
                }
            });
        }

        //监听套是否被选择，选中之后可以进行一些其他操作
        let standardKindBind = function(){
            $("#cmeStandardKindId").ready(function() {
                // 套的select下拉框选中触发事件
                form.on("select(layui-select-tao)", function(data){
                    if(data !="" && data!= null){
                        let unitId= $(data.elem).find("option:selected").attr("top-unit-id");
                        let cmeStandardKindId = $(data.elem).find("option:selected").val();
                        loadUnitTree(unitId);
                        loadLevelSelect(cmeStandardKindId);
                    }
                });
            });
        }

        //打开编辑窗口
        let openEditWindow = function(datas){
            let title = "新增";
            if(!tool.isEmpty(datas)){
                title = "修改";
                form.val('add-filter', datas);
                treeSelect.checkNode('topUnitId', datas.topUnitId);
            }else{
                while($(".layui-treeSelect").length > 0){
                    treeSelect.destroy('topUnitId');
                }
                document.getElementById("scoreLevelId").length = 0;
                removeFormValue();
                nowCmeStandardKindId = "";
            }
            layer.open({
                type: 1,
                title: title,
                content: $('#add-cmeExamPaperConfig'),
                skin: '',
                area: ['600px', '500px'],
                cancel: function(index, layero){
                    removeFormValue();
                }
            })
        }

        //加载机构树
        let loadUnitTree = function(unitId,datas){
            var loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            //清除掉机构树，下面会进行重新加载
            while($(".layui-treeSelect").length > 0){
                treeSelect.destroy('topUnitId');
            }
            treeSelect.render({
                elem    : '#topUnitId',
                data    : huayi_personorg_url + 'comunit/childrenAllTreeRedis?unitId='+unitId,
                type    : 'get',
                search  : true,
                success : function(d){
                    layer.close(loading);
                    if(!tool.isEmpty(datas)){
                        openEditWindow(datas);
                    }
                },
                fail    :function(d){
                    layer.close(loading);
                }
            });
        }

        //加载项目级别
        let loadLevelSelect = function(cmeStandardKindId){
            nowCmeStandardKindId = cmeStandardKindId;
            document.getElementById("scoreLevelId").length = 0;
            $.ajax({
                url: huayi_sjwh_url +"cmecomscorelevel/taoId?cmeStandardKindId="+cmeStandardKindId,
                type:'get',
                success:function(res){
                    var levels = res.data;
                    if(levels != null && levels.length > 0){
                        var options = '<option value="" > 请选择项目级别 </option>';
                        for(var i =0; i< levels.length; i++){
                            options += '<option value="' + levels[i].scoreLevelId + '">'+levels[i].scoreLevelName+'</option>';
                        }
                        $('#scoreLevelId').append(options);
                        form.render('select');
                    }else{
                        $('#scoreLevelId').append('');
                        form.render('select');
                        console.log('levels is null! please go to config!');
                    }
                }
            });
        }

        //清空表单
        let removeFormValue = function(){
            $("#form-CmeExamPaperConfig")[0].reset();
            $("#form-CmeExamPaperConfig input[name='topUnitId']").val('');
        }

        let htmlInit = function(){
            // 初始化表格
            loaderTable();
            //加载套标准
            getStandardKind();
            //监听套
            standardKindBind();
        }

        htmlInit();

        // 监听头部新增按钮
        table.on('toolbar(cmeExamPaperConfig)', function (obj) {
            var datas = obj.data;
            document.getElementById("form-CmeExamPaperConfig").reset();
            if (obj.event === 'add') {
                openEditWindow();
            }
        });

        // 监听行内按钮
        table.on('tool(cmeExamPaperConfig)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'edit') {
                if(nowCmeStandardKindId != datas.cmeStandardKindId){
                    loadLevelSelect(datas.cmeStandardKindId);
                    loadUnitTree(datas.cmeStandardKindUnitId,datas);
                }else{
                    openEditWindow(datas);
                }
            } else if (obj.event === 'del') {
                layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                    $.ajax({
                        type: 'get',
                        url: huayi_projectscore_url + 'cmeExamPaperConfig/deleted',
                        data: {
                            paperConfigId: datas.paperConfigId
                        },
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("删除成功");
                                table.reload('cmeExamPaperConfig');
                            }else{
                                layer.msg("删除失败");
                            }
                        }
                    });
                })
            }
        });

// form表单相关操作
        // 新增/修改表单提交
        form.on('submit(submit)', function (data) {
            // 用于判断是新增还是修改
            var formTableId = $("#add-cmeExamPaperConfig input[name='paperConfigId']").val();
            var datas = JSON.stringify(data.field);
            var URL;
            if (formTableId === '' || formTableId === null) {
                // 走新增逻辑
                URL = huayi_projectscore_url + 'cmeExamPaperConfig/save';
            } else {
                // 走修改逻辑
                URL = huayi_projectscore_url + 'cmeExamPaperConfig/update';
            }
            var submitLoading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            $.ajax({
                type: 'post',
                url: URL,
                data: datas,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.status == 200){
                        layer.closeAll();
                        //清空form表单
                        removeFormValue();
                        loaderTable();
                    }else{
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    layer.close(submitLoading);
                    layer.msg("发送请求失败");
                }
            })
            return false;
        });

    });

</script>
</body>
</html>
