
<div id="projectDetailPage4">
    <form class="page-form layui-form" action="" id="page4-form" lay-filter="page4-form">
        <input type="hidden" name="pageNum" value=4>
        <input type="hidden" name="cstate" value="1">


        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
            <legend>项目推广工作内容</legend>
        </fieldset>
        <div class="layui-form-item">
            <div class="page-row-item">
                <!-- <label><span style="color:red">*&nbsp;</span>安全性:</label> -->
                <div>
                    <textarea name="workContent" placeholder="技术推广的要点及指标、安全性和有效性、成本效益预期
                    " class="layui-textarea"
                              lay-verify="required|workContent"></textarea>
                </div>
            </div>
        </div>

        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
            <legend>项目推广方式</legend>
        </fieldset>
        <div class="layui-form-item">
            <div class="page-row-item">
                <!-- <label><span style="color:red">*&nbsp;</span>安全性:</label> -->
                <div>
                    <textarea name="promotionMethod" placeholder="包括构建平台、讲座、培训班、现场指导、进修、对口支援、网络远程培训等
                    " class="layui-textarea"
                              lay-verify="required|promotionMethod"></textarea>
                </div>
            </div>
        </div>

        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
            <legend>推广工作计划和预期目标</legend>
        </fieldset>
        <div class="layui-form-item">
            <div class="page-row-item">
                <!-- <label><span style="color:red">*&nbsp;</span>安全性:</label> -->
                <div>
                    <textarea name="planTarget" placeholder="
                    " class="layui-textarea"
                              lay-verify="required|planTarget"></textarea>
                </div>
            </div>
        </div>

        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
            <legend>考核内容和指标</legend>
        </fieldset>
        <div class="layui-form-item">
            <div class="page-row-item">
                <!-- <label><span style="color:red">*&nbsp;</span>安全性:</label> -->
                <div>
                    <textarea name="assessmentIndicators" placeholder="项目推广的社会、经济效益。包括编制培训资料、培训活动次数、培训人数、技术应用例数，提高基层医务人员技术水平和防病治病能力，基层医院专科建设，为患者减轻的疾病经济负担等
                    " class="layui-textarea"
                              lay-verify="required|assessmentIndicators"></textarea>
                </div>
            </div>
        </div>

        <!-- row7 -->
        <div class="layui-form-item">
            <div class="layui-col-sm12">
                <div style="text-align: center;">
                    <button class="layui-btn" type="submit" lay-submit lay-filter="save">保存</button>
                    <button class="layui-btn" type="submit" lay-submit lay-filter="saveToNext">保存并进入下一页</button>
                </div>
            </div>
        </div>


    </form>

</div>
