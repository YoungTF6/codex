<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title> 授分</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <script src="../../../js/common.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/common.js"></script>

    <style type="text/css">
        .layui-table-body{
            height: calc(100vh - 100px) ;
        }
    </style>

</head>

<body>

    <div class="layui-fluid">
        <div class="layui-card">
            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="cmeProjPosDownload" lay-filter="cmeProjPosDownload" style="margin: 0px 0px;">
                </table>
            </div>

        </div>
    </div>


    <script type="text/html" id="rowBarForDownId">
        <span>第{{d.batch}}批次</span>
    </script>
    <script>

        const GUANGDONG = "289bf0ca-52cb-4b19-b737-9bd200a69ce1";
        let getCmeStandardKindId = function () {
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            return cmeStandardKindId;
        }
        // var pro_id='2ac4d238-4f05-4464-9874-e8ce54698efb';
        var pro_id = getUrlParam("pro_id");
        let scoreLevel = getUrlParam('scoreLevel');
        var cmeYear = getUrlParam('cmeYear');

        /* 获取单位 */
        window.getUnitId = function () {
            return localStorage.getItem('unit-id');
        }

        // 全局配置及引入相关的模块
        layui.use(['table', 'form'], function () {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;


            /* 获取配置 */
            window.getConfig = function (config_name, scoreLevel) {
                $.ajax({
                    async: false,
                    type: 'post',
                    url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                    data: {
                        unitId: window.getUnitId(),
                        configNames: config_name,
                        scoreLevelId: scoreLevel
                    },
                    success: function (res) {
                        if (res.success == true) {
                            window[config_name] = res.data[config_name];
                        } else {
                            layer.msg('获取配置失败');
                        }
                    },
                    error: function () {
                        layer.msg('获取配置失败');
                    }
                });
            }

            let generateToolbar = function (d) {
                let btnHtml = ``;
                if (true != d.holdQualification  
                    || (('t' == window['fun_must_apply_before_hold'] && '3' != d.projCycleApplicationCheckState) 
                    || ('h' == window['fun_must_apply_before_hold'] && null == d.projCycleApplicationCheckState))
                    || ('1' == window['fun_forbid_score_when_feedback_submit'] && (2 == d.feedbackCheckState || 3 == d.feedbackCheckState || 4 == d.feedbackCheckState) 
                    || checkBeforeStartDate(d.startDt) ) 
                    || (window['fun_forbid_score_when_not_attend'] == "t" && d.hasAttend==false)
                    || ableOperateLastYearData(cmeYear) == false
                ) {
                    btnHtml += `<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row layui-disabled">考勤记录授分</a>`;
                    if(window['fun_close_bulu_proj_groupproj_score'] != '1'){
                        btnHtml += `<a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row layui-disabled" >手工补录学分</a>`;
                    }
                    btnHtml += `<a class="layui-btn layui-btn-xs layui-btn-warm btn-warm-row layui-disabled" >外省人员授分</a>

                        <a class="layui-btn layui-btn-xs layui-btn-warm btn-warm-row layui-disabled" >主讲人授分</a>`;
                } else {
                    btnHtml += `<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="attendanceRecordAwardPoints">考勤记录授分</a>`;
                    if(window['fun_close_bulu_proj_groupproj_score'] != '1' && d.allowManualInput==true){
                        btnHtml += `<a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="manualCredits">手工补录学分</a>`;
                    }
                    btnHtml += `<a class="layui-btn layui-btn-xs layui-btn-warm btn-warm-row" lay-event="provinceScore">外省人员授分</a>
                        <a class="layui-btn layui-btn-xs" style="background-color: transparent; color:#5FB878"  lay-event="teacherScore">主讲人授分</a>`;

                }
                let htmlText = `<span id="${d.downId}" class="oprateSpan" data-holdQualification="${d.holdQualification}">${btnHtml}</span>`;

                return htmlText;
            }

            // 表格相关操作
            // 表格配置
            window.renderTable = function(){

                table.render({
                elem: '#cmeProjPosDownload',
                url: huayi_projectscore_url + 'cmeProjPosDownload/getListForProj',
                title: '周期表',
                defaultToolbar: [],
                where: {
                    projId: pro_id
                },
                cols: [[
                    { align: 'center', width: 400, title: '操作', templet: (d) => {
                        return generateToolbar(d);
                    } },
                    { field: 'downId', title: '周期主键', hide: true },
                    { field: 'projNo', title: '项目编号',minWidth:160 },
                    { field: 'projName', title: '项目名称 ',minWidth:160 },
                    { field: 'batch', title: '批次 ', toolbar: '#rowBarForDownId', },
                    { field: 'startDt', title: '开始时间',minWidth:160 },
                    { field: 'endDt', title: '截止时间',minWidth:160 },
                    {
                        field: 'hasScored', title: '是否已授分', templet: function (d) {
                            if (d.hasScored == true) {
                                return '是'
                            } else {
                                return '否'
                            }
                        }
                    }
                ]],
                cellMinWidth: 100,
                id: "cmeProjPosDownload",
                //height: 'full-155',
                page: false,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done: function () {
                    let holdTipIndex = null;
                    $(".oprateSpan[data-holdqualification='false']").each(function (i, e) {
                        let id = "#" + $(this).attr("id");
                        $(e).parents("tr").mouseenter(function () {
                            holdTipIndex = layer.tips('该周期因逾期未举办或其他原因，已被取消举办资格,详情请咨询上级主管部门', id, {
                                tips: [2, '#78BA32']
                            });
                        });
                    });
                }
            });
            }

            window.ableOperateLastYearData = function(dataYear) {
                let cgv = window["value_forbid_some_operate_on_last_year_data"];
                if(cgv == null || cgv == "") {
                    return true;
                }
            
                let able = true;
                let deadline = new Date(cgv);
                let now = new Date();
                if(parseInt(dataYear) < now.getFullYear()){
                    if(deadline < now) {
                        able = false;
                    }
                }
                return able;
            }
            

            // 授分前校验评价/考试截止时间（未配置则不生效，保持原有逻辑）
            window.checkEndDtBeforeScore = function(data) {
                if (window['fun_check_end_dt_when_score'] != '1') {
                    return true;
                }
                if (!data.judgeEndDt || !data.examEndDt) {
                    layer.msg('请先设置评价截止时间和考试截止时间后再进行授分', { icon: 7, time: 2000 });
                    return false;
                }
                var now = new Date();
                var judgeEnd = new Date(String(data.judgeEndDt).replace(/-/g, '/'));
                var examEnd = new Date(String(data.examEndDt).replace(/-/g, '/'));
                if (now <= judgeEnd || now <= examEnd) {
                    layer.msg('评价截止时间或考试截止时间未到，暂不可授分', { icon: 7, time: 2000 });
                    return false;
                }
                return true;
            };

            // 监听行内按钮
            table.on('tool(cmeProjPosDownload)', function (obj) {
                //判断是否是广东项目，进行不同的处理
                let standardkindId = getCmeStandardKindId();
                if(standardkindId == GUANGDONG && obj.data.feedbackCheckState != 1 && obj.data.feedbackCheckState != null) {
                    layer.msg('已提交执行情况反馈，按省级主管部门要求，不能再补录学分', { icon : 7, time: 1000 });
                    return;
                }

                var datas = obj.data;
                if (obj.event === 'attendanceRecordAwardPoints') {
                    if (!checkEndDtBeforeScore(obj.data)) {
                        return;
                    }
                    let url;
                    if(window['value_qrcode_attend_mode'] == '2') {

                        let params = 'downId=' + obj.data.downId + '&projectId=' + pro_id + '&startDate=' + obj.data.startDt + '&endDate=' + obj.data.endDt + '&scoreLevel=' + scoreLevel + 
                        '&projNo=' + obj.data.projNo + '&score=' +obj.data.realScore + '&period='+obj.data.realPeriod;
                        url = '/pages/project/giving/attendanceRecordAwardPointsForProj.html?' + params;
                    } else {
                        url ='/pages/project/giving/attendanceRecordAwardPoints.html?downId=' + obj.data.downId + '&projectId=' + pro_id + '&startDate=' + obj.data.startDt + '&endDate=' + obj.data.endDt + '&scoreLevel=' + scoreLevel + '&projNo=' + obj.data.projNo + '&projName=' + obj.data.projName;
                    }
                    // 考勤分析
                    var index = layer.open({
                        type: 2,
                        title: "考勤记录授分",
                        content: url,
                        skin: '',
                        area: ['100%', '100%'],
                    });
                } else if (obj.event === 'manualCredits') {
                    var index = layer.open({
                        type: 2,
                        title: '手工补录学分',
                        content: '/pages/project/giving/ManualEntryPoints.html?downId=' + obj.data.downId + '&projectType=1&startDate=' + obj.data.startDt + '&endDate=' + obj.data.endDt + '&projectId=' + pro_id + '&scoreLevel=' + scoreLevel+ '&projNo=' + obj.data.projNo + '&projName=' + obj.data.projName,
                        area: ['100%', '100%'],
                        skin: '',
                    })
                } else if (obj.event === 'provinceScore') {
                    var index = layer.open({
                        type: 2,
                        title: '外省人员授分',
                        content: '/pages/project/giving/cmeProvinceProjScoreNew.html?downId=' + obj.data.downId + '&projectType=1&startDate=' + obj.data.startDt + '&endDate=' + obj.data.endDt + '&projectId=' + pro_id + '&scoreLevel=' + scoreLevel+ '&projNo=' + obj.data.projNo + '&projName=' + obj.data.projName+'&score='+ obj.data.planScore+'&period='+ obj.data.planPeriod,                                                                       
                        area: ['100%', '100%'],
                        skin: '',
                    })
                } else if (obj.event === 'teacherScore') {
                        layer.open({
                        type: 2,
                        content: '/pages/project/giving/GivingForTeachers.html?downId='+obj.data.downId +'&projNo='+obj.data.projNo +'&projName='+ obj.data.projName.replace('"','“') + '&endDate=' + obj.data.endDt + '&startDate=' + obj.data.startDt,
                        area: ['100%', '100%'],
                        title: '主讲人授分',
                        cancel: function (index ,layero) {
                            table.reload("teachListTable");
                        }
                    })
                }
            });

            window.closeAllForgivingForTeachers =function () {
                layer.closeAll();
            }

            window.checkBeforeStartDate = function(startDateStr) {
                let now = new Date();
                let startDate = new Date(startDateStr);
                return now < startDate;
            }


            $(function(){
                window.getConfig('fun_must_apply_before_hold', scoreLevel);
                window.getConfig('fun_close_bulu_proj_groupproj_score', scoreLevel);
                window.getConfig('fun_forbid_score_when_feedback_submit', null);
                window.getConfig('fun_forbid_score_when_not_attend', null);
                window.getConfig('value_forbid_some_operate_on_last_year_data', null);
                window.getConfig('value_qrcode_attend_mode', null);
                window.getConfig('fun_check_end_dt_when_score', null);
                renderTable();
            });

        });



    </script>
</body>

</html>
