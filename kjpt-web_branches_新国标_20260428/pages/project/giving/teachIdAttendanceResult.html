<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>课程下有效考勤人员信息表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="../../../js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="../../../js/layui-v2.6.8/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <style>
        .layui-table-tool-temp {
            padding-right: 0px;
        }
    </style>
</head>

<body>
    <div class="layui-fluid">
        <!--    课程下考勤有效人员列表-->
        <div class="layui-card">
            <div class="layui-card">
                <div class="layui-card-body layui_body_box">
                    <table class="layui-table" id="attendanceResultTable" lay-filter="attendanceResultTable_filter" style="margin: 0px 0px;">
                    </table>
                </div>
            </div>
        </div>
    </div>


    <script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="manualCredits">查看考勤信息</a>
</script>

    <script type="text/html" id="bar">
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="excel" style="float: right;">导出有效人员</button>
</script>


    <script type="text/javascript">
        var downId = getUrlParam("downId");
        var teachId = getUrlParam("teachId");
        // var teachId='fa68114b-d81d-4af8-a381-f5507a897f0d';
        layui.config({
            base: '../../../js/layui/ext/'
        }).extend({
            excel: 'excel'
        }).use(['table', 'form', 'laydate', 'excel'], function () {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;
            var laydate = layui.laydate;
            var excel = layui.excel;

            window.renderTable = function () {

                let ajaxObj = {};
                if (window['value_qrcode_attend_mode'] == '2') {
                    ajaxObj.url = huayi_projectscore_url + 'cmeProjAttendanceResult/getListForDownId';
                    ajaxObj.data = { downId: downId };
                } else {
                    ajaxObj.url = huayi_projectscore_url + 'cmeProjAttendanceResult/getListForProjTeachId';
                    ajaxObj.data = { projTeachId: teachId };
                }

                table.render({
                    elem: '#attendanceResultTable',
                    title: '有效人员列表',
                    url: ajaxObj.url,
                    where: ajaxObj.data,
                    headers: { Authorization: localStorage.getItem("token"), 'KJPT-USER-ID': localStorage.getItem("user-id") },
                    defaultToolbar: [],
                    cols: [[
                        { field: 'projTeachId', align: 'center', title: '课程id', hide: true },
                        { field: 'comPersonId', align: 'center', title: '人员id', hide: true },
                        { field: 'personName', align: 'center', title: '姓名' },
                        { field: 'unitName', align: 'center', title: '单位' },
                        { field: 'deptName', align: 'center', title: '科室' },
                        { field: 'titleName', align: 'center', title: '职称' },
                        { field: 'unitName', align: 'center', title: '考勤信息', templet: '#rowBar' },
                    ]],
                    cellMinWidth: 100,
                    id: "effectiveStaffTable",
                    height: 'full',
                    toolbar: '#bar',
                    page: false,
                    parseData: function (res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.msg, //解析提示文本
                            "data": res.data, //解析数据列表
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    },
                })
            }

            table.on('tool(attendanceResultTable_filter)', function (obj) {
                var comPersonId = obj.data.comPersonId;
                if (obj.event === 'manualCredits') {
                    layer.open({
                        title: '考勤详细信息',
                        content: 'attendanceInfo.html?comPersonId=' + comPersonId +'&downId='+downId+ '&projTeachId=' + teachId+'&type=1',
                        type: 2,
                        area: ['500px', '300px'],
                    })
                }
            })

            table.on('toolbar(attendanceResultTable_filter)', function (obj) {
                if (obj.event === 'excel') {
                    var index = layer.load(1);
                    $.ajax({
                        type: 'get',
                        url: huayi_projectscore_url + '/attendance/exportExcel',
                        contentType: 'application/json;charset=UTF-8',
                        data: { 'teachId': teachId, 'downId':downId,'projectType': "1", 'exportType': '2' },
                        dataType: 'json',
                        success: function (res) {
                            var data = res.data;
                            data = excel.filterExportData(data, [
                                'userName',
                                'personNo',
                                'sex',
                                'unitName',
                                'deptName',
                                'titleName',
                            ]);
                            data.unshift({ userName: '人员姓名', personNo: '人员编号', sex: '性别', unitName: '所属单位', deptName: '科室', titleName: '职称' });
                            excel.exportExcel(data, '有效人员名单.xlsx', 'xlsx');
                            layer.close(index)
                        },
                        error: function () {
                            layer.close(index)
                            layer.msg("发送请求失败");
                        }
                    })
                }
            })

            $(function () {
                getConfig('value_qrcode_attend_mode', localStorage.getItem('unit-id'), null);
                // 2: 按照项目考勤   1或者null: 按照课程考勤
                renderTable();
            })

        })
    </script>
</body>

</html>
