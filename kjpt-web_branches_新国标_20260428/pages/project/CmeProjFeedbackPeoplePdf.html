<script>
    $(function () {
        let unitId = localStorage.getItem("unit-id");
        var downId = getUrlParamByName('downId');
        var projId = getUrlParamByName('projId');
        var batch = getUrlParamByName('batch');
        let gProjectVo;

        $.ajax({
            type: 'get',
            url: huayi_projectscore_url + "cmeProjScore/getFeedbackPersonAllByDownId",
            data: { downId: downId },
            success: function (res) {
                if(res.status != 200) {
                    layer.msg(res.msg);
                    return;
                }

                var tr = '';
                var scoreMode = '';
                var data = res.data;
                for (var i = 0; i < data.length; i++) {
                    if (data[i].scoreMode == 1 || data[i].scoreMode == 2 || data[i].scoreMode == 5 || data[i].scoreMode == 8 || data[i].scoreMode == 10) {
                        scoreMode = '手工录入';
                    } else if(data[i].scoreMode == 4 || data[i].scoreMode == 6 || data[i].scoreMode == 9 || data[i].scoreMode == 11) {
                        scoreMode = '考勤得分';
                    } else if (data[i].scoreMode == 20) {
                        scoreMode = '外省人员授分';
                    } else if (data[i].scoreMode == 7){
                        scoreMode = '主讲人授分';
                    }
                    tr += '<tr>' +
                            '<td class="txt_content">' + data[i].personName + '</td>' +
                            '<td class="txt_content">' + (data[i].personNo == null? '' : data[i].personNo) + '</td>' +
                            '<td class="txt_content">' + (data[i].unitName == null? '' : data[i].unitName) + '</td>' +
                            '<td class="txt_content">' + (data[i].deptName == null? '' : data[i].deptName) + '</td>' +
                            '<td class="txt_content">' + scoreMode + '</td>' +
                            '<td class="txt_content">' + (data[i].posTime == null? '' : data[i].posTime) + '</td>' +
                          '</tr>';
                }
                $('#table1').append(tr);
            },
            error: function (res) {
                layer.msg(res.msg);
            }
        });

        function renderProject(projectVo) {
            if (!projectVo) {
                return false;
            }
            Object.keys(projectVo).forEach(key => {
                let $dom = $('#' + key);
                let val = projectVo[key];
                if (($dom.length > 0) && (typeof val) !== 'object') {
                    val = String(val);

                    $dom.text(val) || $dom.val(val);

                }
            });

        }

    });
</script>
