    <style>
        .layui-form-label-t {
            float: left;
            display: block;
            padding: 9px 15px;
            /* width: 80px; */
            font-weight: 400;
            line-height: 20px;
            text-align: right;
            width: 150px;
        }

        .layui-input-block-t {
            /* width: 200px; */
            margin-left: 180px;
        }
        #checkStatusSearchBox .layui-form-select dl {
            max-height: 350px;
        }
        #fileBox {
            background: #fbfcfe;
            border: 1px solid #e9edf3;
            border-radius: 8px;
            padding: 12px 10px 8px;
            box-sizing: border-box;
        }
        #fileTips {
            display: block;
            margin: 0 4px 12px !important;
            padding: 8px 12px;
            color: #d93025 !important;
            background: #fff4f4;
            border: 1px solid #ffd6d6;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
        }
        .js-project-image {
            width: 100%;
        }
        .js-project-image>div {
            width: 100%;
            margin: 0 0 12px;
            padding: 12px 14px;
            border: 1px solid #e5e9f0;
            border-radius: 8px;
            min-height: 84px;
            position: relative;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            background: #fff;
            box-sizing: border-box;
        }
        .meeting-notice>div {
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .file-title {
            display: inline-block;
            margin-right: 10px;
            font-size: 14px;
            /* font-weight: 600; */
            color: #1f2d3d;
            line-height: 1.4;
        }
        .js-upload-btn-box .js-upload-btn {
            border-radius: 6px;
        }
        .meeting-notice>ul {
            margin: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .meeting-notice>ul>li {
            width: 100%;
            float: none;
            margin-bottom: 0;
            padding: 8px 10px;
            border: 1px solid #eef1f6;
            border-radius: 6px;
            background: #fafbfc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            box-sizing: border-box;
        }
        .meeting-notice .upload-file-link {
            max-width: calc(100% - 90px);
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .meeting-notice .upload-file-remove {
            flex-shrink: 0;
        }
        .js-hidden {
            display: none;
        }
    </style>
</head>

                            <div class="layui-form-item-box">

                                </div>
                            </div>
                            <div class="layui-form-item-box">

                            <div class="layui-form-item-box">

                            <div class="layui-form-item-box">

                                        <font color="red">*&nbsp;</font>实际招生人数

                                    <div class="layui-input-block-t">

                                <div class="layui-form-item">

                                            placeholder="请选择">

                                </div>

                                <div class="layui-form-item">
                                    <label class="layui-form-label-t">
                                        <font color="red">*&nbsp;</font>协办单位

                            <div class="layui-form-item-box">
                                <div class="layui-form-item">
                                    <label class="layui-form-label-t">
                                        <font color="red">*&nbsp;</font>联系人

                                        <input type="text" name="videoNum" placeholder="请输入" autocomplete="off"

                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item-box">
                                <div class="layui-form-item">
                                    <label class="layui-form-label-t" name="lblActivityForm">
                                        <font color="red">*&nbsp;</font>
                                    </label>
                                    <div class="layui-input-block-t">
                                        <select name="holdType" id="holdType" lay-verify="required">
                                            <option value="">请选择</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item-box">
                                <div class="layui-form-item">
                                    <!-- 活动内容 -->
                                    <label class="layui-form-label-t"><span style="color: red; ">*&nbsp;</span><label
                                            name="lblActivityContent"></label></label>
                                    <div class="layui-input-block-t">
                                        <select name="scoreType" lay-verify="required" id="scoreLevelContent"
                                            lay-filter="scoreLevelContent"></select>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" name="projTypeKind" id="projTypeKind" autocomplete="off"
                                class="layui-input">
                            <div class="layui-form-item-box">
                                <div class="layui-form-item">
                                    <!-- 活动类别 -->
                                    <label class="layui-form-label-t"><span id="projTypeSpan"
                                            style="color: red; ">*&nbsp;</span><label
                                            name="lblActivityType"></label></label>
                                    <div class="layui-input-block-t">
                                        <select name="projType" id="projType" lay-verify="required">
                                            <option value="">请选择</option>
                                            <option value="1">推荐项目</option>
                                            <option value="2">推广项目</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item-box">
                                <div class="layui-form-item">
                                    <!-- 所属医学体系 -->
                                    <label class="layui-form-label-t"><span style="color: red;">*&nbsp;</span><label

                                        <select name="medicalType" id="medicalTypeSelector" lay-verify="required">

                                        </select>

                                </div>

                            <div class="layui-form-item-box js-photo-box" style="width: 98%;" id="fileBox">

                                <div class="js-project-image js-tab-page"></div>
                            </div>
                            <div class="layui-form-item" id="submitBox">
                                <button class="layui-btn" btn-type="save" lay-submit lay-filter="submit">保存</button>

                                    <!-- lay-filter="submit">保存并上报</button> -->
                                <a class="layui-btn js-btn js-back">返回</a>

                        </div>
                    </div>

            <!-- 查看学分详情的弹窗 -->

                <div style="margin: 10px;">

        </div>

    <!-- 表头按钮 -->
    <script type="text/html" id="toolBar">
        <div >
            <!-- 单位角色 -->
            {{# if(userType == '12'){ }}
                <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="addProj">添加</a>

                <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="downloadTemplate">下载模板</a>
                <!-- 文字提示 -->
                <span style="margin-left: 10px; color: red;">继续医学教育异地项目备案及监管要求（含附件表格）下载</span>
            {{# } }}
            <!-- 政府角色 -->

                <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="excel"

            {{# } }}
        </div>
    </script>
    <!-- 机构角色 行内操作按钮 -->
    <script type="text/html" id="rowBar1">
        <!-- 上报 -->
        {{# if(d.checkStatus != 7 && (d.checkStatus == 0 || d.checkStatus == 3 || d.checkStatus == 5)){ }}
            {{# if( d.checkStatus == 0){ }}
            <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="reportRow">上报</a>
            {{# } }}
            {{# if( d.checkStatus == 3 || d.checkStatus == 5){ }}
            <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="reportRow">重新上报</a>

            // 下载模板
            let downloadTemplate = function () {

                switch (cmeStandardKindId) {
                    case StandardKind.GUANG_DONG:

                        break;
                    case StandardKind.ZHE_JIANG:

                        break;

                        break;
                }

            /**
             * 下载项目备案附件压缩包（输入：项目ID/项目名称；输出：触发浏览器下载zip文件）
             */
            let downloadAttachmentZip = function (rowData) {
                let projId = rowData && rowData.projId;
                let projName = rowData && rowData.projName;
                if (!projId) {
                    layer.msg("项目ID缺失，无法下载附件");
                    return;
                }
                if (!projName) {
                    projName = "项目备案附件";
                }
                $.ajax({
                    type: 'post',
                    url: huayi_projectscore_url + "cmeRecordProj/downloadAttachmentsZip",
                    data: {
                        projId: projId,
                        projName: projName
                    },
                    xhrFields: {
                        responseType: 'blob'
                    },
                    success: function (blobData, status, xhr) {
                        let contentType = xhr.getResponseHeader('Content-Type') || '';
                        if (contentType.indexOf('application/json') >= 0) {
                            let reader = new FileReader();
                            reader.onload = function () {
                                try {
                                    let errObj = JSON.parse(reader.result || "{}");
                                    layer.msg(errObj.msg || "下载失败");
                                } catch (e) {
                                    layer.msg("下载失败");
                                }
                            };
                            reader.readAsText(blobData, 'utf-8');
                            return;
                        }
                        if (!blobData || blobData.size === 0) {
                            layer.msg("未查询到可下载附件");
                            return;
                        }
                        let disposition = xhr.getResponseHeader('Content-Disposition') || '';
                        let matched = disposition.match(/filename\*=UTF-8''([^;]+)|filename="?([^"]+)"?/i);
                        let fileName = `${projName}.zip`;
                        if (matched) {
                            fileName = decodeURIComponent(matched[1] || matched[2] || fileName);
                        }
                        let fileUrl = window.URL.createObjectURL(blobData);
                        let a = document.createElement('a');
                        a.href = fileUrl;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(fileUrl);
                    },
                    error: function () {
                        layer.msg("下载失败，请稍后重试");
                    }
                });
            }

            // 等待PDF加载完成的函数
            function waitForPdfLoad(callback) {
                let attempts = 0;
                const maxAttempts = 20; // 最大尝试次数，防止无限循环
                
                function checkPdfLoaded() {
                    attempts++;
                    
                    // 检查是否有canvas元素（PDF渲染通常会产生canvas元素）
                    const canvasElements = $(`#${viewFile} canvas`).length;
                    const pdfContentExists = canvasElements > 0;
                    
                    if (pdfContentExists || attempts >= maxAttempts) {
                        if (attempts >= maxAttempts) {
                            console.warn("等待PDF加载超时");
                        }
                        callback && callback();
                        console.log("检查PDF加载状态..." + attempts);
                        return;
                    }
                    
                    // 继续轮询
                    setTimeout(checkPdfLoaded, 100);
                }
                
                checkPdfLoaded();
            }

                    return false;
                }
                data.field.cmeRecordProjFileList = buildSubmitFileList();
                // 获取当前单位id
                data.field.unitId = unitId;
                let isEditMode = !!data.field.projId;
                if (!isEditMode) {
                    data.field.projId = createProjId();
                    currentProjId = data.field.projId;
                }
                if(currentProjId){
                    data.field.projId = currentProjId;
                }

                let url = '';
                if(isEditMode){
                    url = huayi_projectscore_url + "cmeRecordProj/update";
                }else{
                    url = huayi_projectscore_url + "cmeRecordProj/save";
                }
                $.ajax({
                    type: 'post',
                    url: url,
                    data: JSON.stringify(data.field),
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        closeLoading();
                        if (res.status === 200) {
                            let tempProjId = currentProjId || data.field.projId;
                            if(!tempProjId && res.data){
                                tempProjId = parseProjIdFromSaveRes(res.data);
                            }
                            if(!tempProjId){
                                layer.msg("保存成功，但未获取到projId，附件未落库");
                                return;
                            }
                            currentProjId = tempProjId;
                            saveFilePathToApplyTable(tempProjId, function(flag, msg){
                                if(!flag){
                                    layer.msg(msg || "附件保存失败");
                                    return;
                                }
                                layer.closeAll();
                                loaderTable();
                                layer.msg("保存成功");
                            });
                        } else {
                            layer.msg(res.msg);
                        }
                    },
                    error: function () {
                        closeLoading();
                        layer.msg("保存失败");
                    }
                })

                return false;
            })

            // 删除
            let deleteRowScore = function (rowData) {
                console.log(rowData);
                layer.confirm('确定要删除吗？', { icon: 3, title: '提示' }, function (index) {
                    commonAjax('get', huayi_projectscore_url + "cmeRecordProj/deleted",
                        { "projId": rowData.projId }, function () { layer.msg("删除失败"); },
                        function (res) {
                            if (res.status === 200) {
                                layer.msg("删除成功");
                                loaderTable();
                            } else { layer.msg(res.msg); }
                        }
                    );
                    layer.close(index);
                });
            }

            // 导出Excel
            let excelDownload = function(){
                layer.msg("下载中，请稍等",{icon:6 ,time: 2000});
                let url = huayi_projectscore_url + "cmeRecordProj/excel";
                let params =  getDefaultData();
                tool.exportExcelPost(url,params,"异地备案项目表.xlsx");
            }
           
            // 上传文件
            let fileUpload = function () {
                let uploadBtns = $(".js-upload-btn");
                for (let i = 0; i < uploadBtns.length; i++) {
                    let upType = Number(uploadBtns[i].getAttribute("data-type"));
                    let tempFileName = "";
                    let tempFileSize = "";
                    let tempUploadData = {};
                    let tempFileId = "";
                    let inst = upload.render({
                        elem: uploadBtns[i],
                        url: huayi_upload_url + 'uploadApi/upload',
                        size: fileSize,
                        accept: 'file',
                        multiple: false,
                        auto: false,
                        before: function () {
                            this.data = tempUploadData;
                        },
                        choose: function (obj) {
                            let files = this.files = obj.pushFile();
                            let hasFile = false;
                            for(let key in files){
                                hasFile = true;
                                let fileItem = files[key];
                                tempFileName = fileItem.name;
                                tempFileSize = (fileItem.size / 1024).toFixed(1);
                                if (!/\.(pdf|jpg|jpeg|png|bmp|gif|webp)$/i.test(tempFileName)) {
                                    layer.msg('仅支持上传图片或 PDF 文件');
                                    delete this.files[key];
                                    return false;
                                }
                                if (tempFileName.length > 100) {
                                    layer.msg('文件名长度不能超过100个字符');
                                    delete this.files[key];
                                    return false;
                                }
                                tempUploadData = createUploadData(fileItem);
                                tempFileId = `tmp_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
                                break;
                            }
                            if (!hasFile) return false;
                            loading = layer.msg('上传中', { icon: 16, shade: 0.3, time: 0 });
                            inst.upload();
                        },
                        done: function (res, index) {
                            layer.close(loading);
                            delete this.files[index];
                            if (res.code == 200 && res.data && res.data.picUrl) {
                                let tempFile = {
                                    fileName: tempFileName,
                                    fileUrl: res.data.picUrl,
                                    fileSize: tempFileSize,
                                    tempId: tempFileId,
                                    fileType: upType
                                };
                                fileUrls = fileUrls.filter(item => Number(item.fileType) !== upType);
                                fileUrls.push(tempFile);
                                $(`.js-feedback${upType}`).html("");
                                createPhoto(tempFile, "edit");
                                refreshUploadButton(upType);
                                layer.msg("上传成功");
                                return;
                            }
                            layer.msg(res.msg || "上传失败");
                        },
                        error: function () {
                            layer.close(loading);
                            layer.msg("上传失败，请稍后重试");
                        }
                    });
                }
            }
            // 获取上传参数
            let createUploadData = function(fileItem) {
                let year = new Date().getFullYear();
                let path = `/diffPlaceProjRecord/${cmeStandardKindId}/${year}/${unitId}`;
                let fileData = {path:path,scale:0.6,outputQuality:0.6};
                if(fileItem.size > 3000000 ){
                    fileData = {path:path,scale:0.3,outputQuality:0.3};
                }
                const tempType = fileItem.type || "";
                if(tempType.indexOf("image") >= 0){
                    fileData.fileType = "IMAGE";
                } else if(tempType.indexOf("application/pdf") >= 0){
                    fileData.fileType = "DOC";
                } else {
                    fileData.fileType = "OTHER";
                }
                return fileData;
            }
            //是否可以选择按钮
            let isCanChooseBtn = function (flag = true) {
                if (flag) {
                    refreshUploadButtons();
                    return;
                }
                $(".js-upload-btn").addClass("layui-btn-disabled").attr("disabled", true);
            }
            //是否可以提交按钮
            let isCanSubmitBtn = function (flag = true) {
                if (flag) {
                    $('#submitBox').show();
                    $('#fileBox').show();
                } else {
                    $('#submitBox').show();
                }
            }
            // 清空表单
            let removeFormValue = function(){
                // 解除表单禁用
                $('#editScore input, #editScore select, #editScore textarea, #editScore button').prop('disabled', false);
                $('#unitName').prop('disabled', true);
                currentProjId = "";
                fileUrls = [];
                clearPhotoTabs();
                $('.js-upload-btn-box').removeClass("js-hidden");
                isCanChooseBtn(true);
                isCanSubmitBtn(true);
                $("#formScore")[0].reset();
                $("input[type='hidden']").val("");
                form.render();
            }
            form.on('select(scorelevel)', function () {
                getTabConfig(function () {
                    clearPhotoTabs();
                    fileUrls = [];
                });
                initHoldTypeSel();
                initScoreLevelContentSel();
            });
            // 学科
            let initKnowledgeSel = (sel, name, data, callback) => {
                if ($('#knowledgeTwo').length < 1) {
                    return;
                }
                if (!getCmeYear()) {
                    return;
                }
                $.ajax({
                    async: false,
                    url: huayi_sjwh_url + 'comKnowledge',
                    data: { ...data, ...getVerParams() },
                    success: re => {
                        if (re.success == true) {
                            let data = re.data;
                            $(sel).find('option:gt(0)').remove();
                            data.forEach(item => $(sel).append(`<option value="${item.knowledgeId}">${item.knowledgeName}</option>`));
                            if (typeof callback == 'function') callback(data);
                            form.render('select');
                        }
                        else layer.msg(name + '加载失败', { icon: 7, time: 1500 });
                    },
                    error: () => layer.msg(name + '加载失败', { icon: 7, time: 1500 })
                });
            }
            // 三级学科
            let initKnowledgeSelBatch = () => {
                $('#knowledgeThree').find('option:gt(0)').remove();
                initKnowledgeSel('#knowledgeTwo', '二级学科', { knowledgeType: 2 });
                form.on('select(knowledgeTwo)', data => initKnowledgeSel('#knowledgeThree', '三级学科', { knowledgeType: 3, knowledgeTwoId: data.value }));
            }



            // 初始化表单名称: 学分级别/举办方式等
            $('label').each((i, d) => {
                let name = $(d).attr('name');
                if (name) {
                    let currentHtml = $(d).html();
                    let newLabel = projectLabels[name] || '';
                    $(d).html(currentHtml + newLabel);
                    // $(d).text(projectLabels[name] || '');
                }
            });

            // 举办方式
            let initHoldTypeSel = () => {
                let keyName = projectLabels.lblActivityForm,
                    scoreLevel = getScoreLevel();
                $.ajax({
                    url: huayi_sjwh_url + 'option/holdType/list/' + cmeStandardKindId + '/' + scoreLevel + '/1__',
                    async: false,
                    success: re => {
                        if (re.status == 200) {
                            let $item = $('#holdType');
                            $item.empty().append($('<option value="">请选择</option>'));
                            $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                        } else layer.msg(keyName + '加载失败', { icon: 7 });
                    },
                    error: () => layer.msg(keyName + '加载失败', { icon: 7 })
                });
                form.render();
            }

            // 活动内容
            let initScoreLevelContentSel = () => {
                let keyName = projectLabels.lblActivityContent,
                    scoreLevel = getScoreLevel();
                $.ajax({
                    url: huayi_sjwh_url + 'option/scoreLevelContent/list',
                    data: { scoreLevel: scoreLevel },
                    async: false,
                    success: re => {
                        if (re.status == 200) {
                            let $item = $('#scoreLevelContent');
                            $item.empty().append($('<option value="">请选择</option>'));
                            $.each(re.data, (i, d) => $item.append($('<option value="' + d.value + '">' + d.scoreLevelContentName + '</option>')));
                        } else layer.msg(keyName + '加载失败', { icon: 7 });
                    },
                    error: () => layer.msg(keyName + '加载失败', { icon: 7 })
                });
                form.render();
            }

            
            form.verify({
                studyAddress: [/^.{1,100}$/, '举办地点最多100个汉字'],
                unitName: [/^.{1,40}$/, '最多个40汉字'],
                period: [/^0(\.5{1}|\.0{1})$|^[1-9]+[0-9]*(\.5{1}|\.0{1})?$/, '学时必须是0.5的倍数'],
                // scoreVerify 学分保留两位小数
                scoreVerify: [/^[0-9]+(\.[0-9]{1,2})?$/, '学分最多两位小数'],
            });

            let initFrom = function () {
                initKnowledgeSelBatch();
                initHoldTypeSel();
                initScoreLevelContentSel();
                getTabConfig();

                // 广东适配
                if(IS_GUANG_DONG){
                    $("#formTips").text('异地备案项目：国家卫生健康委公布的项目或本省省卫生健康委公布的项目');
                    $("#fileTips").text('请按分项上传 3 份材料，每项仅可上传 1 个图片或 PDF 文件，均为必填项。');
                    $("#liveNum").hide();

                }
            }
            initFrom();

            $(".js-back").click(function(){  removeFormValue(); layer.closeAll(); });

            // 按键esc关闭弹窗
            $(document).keydown(function (event) {
                if (event.keyCode == 27) {
                    removeFormValue();
                    layer.closeAll();
                }
            });
        })
    </script>
</body>

</html>
