<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

	<title>继续医学教育管理系统 - 登录</title>

	<!-- <link rel="stylesheet" type="text/css" href="./login_files/default.css"> -->
	<!-- 必要样式 -->
	<link rel="stylesheet" type="text/css" href="./login_files/styles2.css">
	<link href="login3/css/login.css" rel="stylesheet" />
	<link rel="stylesheet" type="text/css" href="./login_files/files.css">
	<link rel="stylesheet" type="text/css" href="./login_files/loaders.css">
	<link rel="stylesheet" type="text/css" href="./login_files/css/verify.css">
	<link rel="stylesheet" type="text/css"
		href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
	<link rel="stylesheet" type="text/css"
		href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">

	<script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

</head>

<body>

	<script type="text/javascript" src="./js/jquery-3.5.1.min.js"></script>
	<script type="text/javascript" src="./login_files/js/verify.js"></script>
	<div class="OverWindows"></div>
	<script type="text/javascript" src="./js/constant.js"></script>
	<script type="text/javascript" src="./js/tools/form_validation_tool.js"></script>
	<script src="/pages/support/js/managerLogin.js"></script>

	<script type="text/javascript">
		localStorage.setItem('login-url', window.location.href);

		layui.use(['form', 'layer', 'jquery'], function () {
			let layer = layui.layer;

			//解析url参数
			let getParamFromUrl = function (paramName) {
				let urlStr = location.search;
				if (urlStr.indexOf(paramName) < 0 || urlStr.indexOf("?") < 0) return;
				let paramKV = urlStr.substr(1).split("&");
				for (let i = 0; i < paramKV.length; i++) {
					if (paramKV[i].indexOf(paramName) >= 0) {
						return paramKV[i].split("=")[1];
					}
				}
			}

			/* 一体化登录跳转 */
			window.login = () => {
				var param = getParamFromUrl("param");
			    param = decodeURIComponent(param);
				console.log(param);
				// param = param.replace('_', "{");
				param = param.replace(/\\/g, "");
				const data = JSON.parse(param);
				console.log(param);
				debugger
				if (data.userId != null && data.userId != undefined && data.userId != "") {
					localStorage.clear();
					// localStorage.setItem('login-url', window.location.href);
					localStorage.setItem('token', data.account.token || '');
					localStorage.setItem('token-exp-time', (Date.now() + 720000) || 0);
					localStorage.setItem('refresh-token', data.account.refreshToken || '');
					localStorage.setItem('user-id', data.account.userId || '');
					localStorage.setItem('unit-id', data.unitId || '');
					localStorage.setItem('unit-name', data.unitName || '');
					localStorage.setItem('standardkind-id', data.standardKindId || '');
					localStorage.setItem('user-name', data.userName || '');
					localStorage.setItem('user-type', data.userType || '');
					localStorage.setItem('unit-type', data.unitType === null ? '' : data.unitType.toString());
					localStorage.setItem('unit-user-type', data.unitUserType || 0);
					if (data.userType == '13') {
						localStorage.setItem('dept-id', data.deptId || '');
						localStorage.setItem('dept-name', data.deptName || '');
					}
					if (data.userType == '11') {
						localStorage.setItem('manager-medical-type', data.managerMedicalType || '');
					}
					// 添加文件验证cookie
					setFileVerifyCookie();
					var loginUrl = getConfig();
					console.log('login-url: ' + loginUrl);
					localStorage.removeItem('menu-unit-id');
					window.location.href = 'index.html';

				} else if (data.status == 501) {
					window.location.href = 'authentication.html' +
						'?flag=' + login_area + '&mobile=' + formData.mobile;

				} else {
					layer.msg('<sapn style="color: #666666;">' + data.msg + '</sapn>',
						{ icon: 7, time: 1500 });
					$('.verify-refresh').click();
				}
			}
			 //获取配置的值
			window.getConfig = function () {
				var config_value = "";
				var config_name = "value_system_logout_url";
				$.ajax({
					async: false,
					type: "post",
					url: huayi_sjwh_url + "cmeCommonConfig/getConfigByUnitFromRedis",
					data: { unitId: localStorage.getItem("unit-id"), configNames: config_name },
					success: function (res) {
						debugger
						if (res.success == true) {
							if (config_name == "value_system_logout_url") {
								config_value = res.data.value_system_logout_url;
								localStorage.setItem('logout-url', config_value);
							}
						} else if(localStorage.getItem("standardkind-id") == '6eec6713-670a-43cc-ad4d-9bd700a92928'
									&& localStorage.getItem("user-type") == 15){
							localStorage.setItem('logout-url', 'close');
						} else {
							layer.msg("获取配置出错");
						}
					},
					error: function () {
						layer.msg("获取配置出错");
					}
				});
				return config_value;
			}

			window.login();
		});

		


	</script>

</body>

</html>
