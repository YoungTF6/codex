    <script type="text/javascript">
        // 河南套首页tab加文字“业务驾驶舱”
        if (localStorage.getItem('standardkind-id') === 'eee87ca0-7df1-426c-aae3-7cae782b4d6b') {
            var homeTabLi = document.getElementById('homeTabLi');
            if (homeTabLi && !homeTabLi.innerText.includes('业务驾驶舱')) {
                homeTabLi.innerHTML += '<span style="margin-left:6px;">业务驾驶舱</span>';
            }
        }
        const unitId        = localStorage.getItem('unit-id'),
              userType      = localStorage.getItem('user-type'),
              userId        = localStorage.getItem('user-id'),
              unitUserType  = localStorage.getItem('unit-user-type'),
              standardId    = localStorage.getItem('standardkind-id');

        localStorage.removeItem('menu-unit-id'); // 清除左侧单位树选择
        localStorage.removeItem('menu-unit-depth');

        setUpward();

        function getClientHeight() {
            var clientHeight=0;
            if (document.body.clientHeight&&document.documentElement.clientHeight) {
                var clientHeight = (document.body.clientHeight < document.documentElement.clientHeight)
                        ? document.body.clientHeight : document.documentElement.clientHeight;
            } else {
                var clientHeight = (document.body.clientHeight > document.documentElement.clientHeight)
                        ? document.body.clientHeight : document.documentElement.clientHeight;
            }
            return clientHeight;
        }


        /* 这段请保留，菜单的点击控制逻辑在index.js里，因为是压缩过的，没办法摘出来，只能额外调用。 */
        layui.config({
            base: 'https://cdn.91huayi.com/hywupload/common/layui/v121/std/' // 静态资源所在路径
        }).extend({
            index: 'lib/index' //主入口模块
        }).use(['index']);

        /* 其余逻辑使用新版js即可。 */
        layui.use([ 'element', 'tree', 'util', 'jquery', 'form', 'searchTree' ], () => {
            let { tree, util, element, searchTree, layer } = layui;

            let unitData,
                units = new Array();



            ((doc, win) => {
                let p_height = getClientHeight() - 175;
                $('.demo-tree').css('height', p_height);
                window.onresize = function () {
                    let p_height = getClientHeight() - 175;
                    $('.demo-tree').css('height', p_height);
                }

                if (window.ExpertNoticeHelper && typeof window.ExpertNoticeHelper.showIfNeeded === 'function') {
                    window.ExpertNoticeHelper.showIfNeeded({
                        layer: layer,
                        userType: userType,
                        standardKindId: standardId
                    });
                }
                getNotice();
                getMessage();
                
            }) (document, window);

           

            // if (!unitId) $('#menu_header').find('LI').eq(1).hide();
            if (11 != userType) $('#menu_header').find('LI').eq(1).hide();
            else {
                // 判断是否是宁夏
                if (localStorage.getItem('standardkind-id') === 'eee87ca0-7df1-426c-aae3-7cae782b4d6b') {
                    $('#orgTabText').text('隶属关系表');
                } else {
                    $('#orgTabText').text('组织机构');
                }
                searchTree.render({
                    elem    : '#unit_tree',
                    data    : huayi_personorg_url + 'comunit/childrenAllTreeRedis?unitId=' + unitId,
                    type    : 'get',
                    search  : true,
                    success : function (d) {
                        unitData = d.data;
                    },
                    click   : function (d) {
                        localStorage.setItem('menu-unit-id', d.current.id);
                        localStorage.setItem('menu-unit-depth', d.current.isParent ? 9 : 1);

                        let frame = $('#LAY_app_body .layadmin-tabsbody-item.layui-show iframe'),
                            url   = frame.attr('src');
                        console.info(url);
                        if (null != url
                                && ( url.indexOf('statistical/compliance_unit_admin') >= 0
                                    || url.indexOf('project/CmeCmeProjectAdmin') >= 0
                                    || url.indexOf('person/comPerson') >= 0 ) ) {
                            frame.attr('src', url);
                        }

                        createAJAXRequest(huayi_personorg_url+'comunit/setSubUnit','POST',
                            {'id':d.current.id,'title':d.current.name},'application/json',
                            function (response) {
                                if (response.status === RESPONSE_CODE.SUCCESS.CODE) {
                                    // layer.alert(RESPONSE_CODE.SUCCESS.MSG);
                                }
                                else{
                                    for (let key in RESPONSE_CODE) {
                                        let keyType = typeof key;
                                        if (typeof key == 'string') {
                                            let element = RESPONSE_CODE[key];
                                            if (element.CODE===res.status) {
                                                layer.alert(element.MSG);
                                                break;
                                            }
                                        }
                                    }
                                }
                            }
                        );
                    },
                    fail    : function (d) {}
                });
            }


            /* 从json数据中获取搜索到的内容 */
            let searchUnitByData = function (keyWord) {
                if (keyWord) {
                    getUnits(unitData, keyWord);
                }
                let searchHtml = '';
                let tempClass = 'temp-' + new Date().getTime();
                for (let i = 0; i < units.length; i++) {
                    const element = units[i];
                    searchHtml += '<li class="'+tempClass+'" data-id="'+units[i]["id"]+'">'+units[i]["name"]+'</li>';
                }
                if (units.length == 0) {
                    searchHtml += '<li>无搜索内容</li>';
                }
                units = new Array();
                $(".huayi-search-words").html(searchHtml);
                bindKindWords(tempClass);
            }


            /* 递归遍历树形机构数据 */
            let getUnits = function (datas,unitName) {
                for(let i in datas) {
                    if (datas[i]["name"].indexOf(unitName) >=0) {
                        let unit = new Object();
                        unit["name"] = datas[i]["name"];
                        unit["id"] = datas[i]["id"];
                        units.push(unit);
                    }
                    if (datas[i].children) {
                        getUnits(datas[i].children,unitName);
                    }
                }
            }


            /* 监听输入框的回车按钮 */
            $('#searchUnit').keypress(function (elem) {
                if (elem.which == 13) {
                    let keyWord = document.getElementById('searchUnit').value;
                    searchUnitByData(keyWord);
                }
            });


            /* 监听点击事件 */
            let bindKindWords = function (className) {
                $('.' + className).click(function (elem) {
                    let keyUnitId = this.getAttribute('data-id');
                    searchTree.checkNode('unit_tree', keyUnitId);
                    $('.huayi-search-words').html('');
                    localStorage.setItem('menu-unit-id', keyUnitId);
                });
            }


            $('.demo-tree').click(function (elem) {
                $('.huayi-search-words').html('');
            });


            function createAJAXRequest(url, method, data, contentType, successCallbackFunction) {
                $.ajax({
                    url         : url,
                    type        : method,
                    data        : JSON.stringify(data),
                    headers     : {
                        'Accept'            : 'application/json',
                        'Authorization'     : localStorage.getItem('token'),
                        'KJPT-USER-ID'      : localStorage.getItem('user-id'),
                        'cmestandard-id'    : localStorage.getItem('standardkind-id')
                    },
                    processData : false,
                    contentType : contentType,
                    success     : successCallbackFunction,
                    error       : function (xhr, textStatus, errorThrown) {
                        let status  = xhr.status, // http status
                            data    = xhr.responseText,
                            message = '',
                            flag    = typeof (layer) == 'undefined';
                        if (data != undefined && data != '') {
                            let json        = JSON.parse(data),
                                exception   = json.exception;
                            if (exception)  message = exception;
                            else message = json.message;
                            message = message == undefined ? json.message : message;
                            if (json.code == 40015) {
                                localStorage.removeItem('token');
                                // cookie.delete('token');
                                if (flag) {
                                    alert(message);
                                    window.location.href = loginPage;
                                    return false;
                                } else {
                                    myLayer.Alert(message, 0, '', function () {
                                        window.location.href = loginPage;
                                        return false;
                                    })
                                }
                            }
                        }

                        if (status == 400) {
                            if (flag) alert(message);
                            else layer.msg(message);
                        } 
                        else if (status == 403) {
                            message = '未授权';
                            if (flag) alert(message);
                            else layer.msg(message);
                        } 
                        else if (status == 500) {
                            message = '系统错误：' + message + '，请刷新页面，或者联系管理员';
                            if (flag) alert(message);
                            else layer.msg(message);
                        } 
                        else if (status == 504) layer.msg(message);
                    }
                });
            }


            /* 退出登录 */
            $('#logout_btn').on('click', () => {
                axios({
                    method       : 'post',
                    url          : huayi_permission_url + 'logout',
                    responseType : 'json',
                    params       : { userId : userId }
                }).then(res => {
                    if (res.status == 200 && res.data.status == 200) {
                        layer.msg('退出成功', { icon : 1, time : 1500 });
                        try {
                            var rm = [];

        /* ===== 受保护菜单密码校验（通用） =====
         * 配置存储：cme_common_config_dict + cme_common_config
         *   - 字典项 config_dict_code = value_protected_menu_password
         *   - cme_common_config.config_value = JSON 数终字符串
         *     示例：[{"menu":"ProjectTeam.html","name":"项目分配专家","password":"***"}]
         *   - 按 套(cme_standard_kind_id) + 单位(top_unit_id，可空) 维度区分
         * 后端只下发 menu/name，不下发 password；verify 只回 true/false
         * 命中规则：菜单 a[lay-href] 的 url 包含 menu 子串
         * 通过状态：本会话内按 menuKey 维度记一次（sessionStorage）
         */
        var PROTECTED_MENU_DICT_CODE = 'value_protected_menu_password';
        var PROTECTED_PASS_FLAG_PREFIX = 'protected_menu_passed::';
        var PROTECTED_LOGIN_FINGERPRINT_KEY = 'protected_menu_login_fp';
        var __protectedMenuKeys = [];
        var __protectedMenuMap  = {};   // menuKey -> menuName

        // 仅在登录态变化时清理通过标志：刷新页面保留，重新登录后清理
        (function syncProtectedMenuPassFlagsByLogin() {
            try {
                var curFp = [
                    localStorage.getItem('token') || '',
                    localStorage.getItem('user-id') || '',
                    localStorage.getItem('unit-id') || '',
                    localStorage.getItem('standardkind-id') || ''
                ].join('|');
                var oldFp = sessionStorage.getItem(PROTECTED_LOGIN_FINGERPRINT_KEY) || '';
                if (oldFp && oldFp === curFp) return;

                var rm = [];
                for (var i = 0; i < sessionStorage.length; i++) {
                    var k = sessionStorage.key(i);
                    if (k && k.indexOf(PROTECTED_PASS_FLAG_PREFIX) === 0) rm.push(k);
                }
                for (var j = 0; j < rm.length; j++) sessionStorage.removeItem(rm[j]);
                sessionStorage.setItem(PROTECTED_LOGIN_FINGERPRINT_KEY, curFp);
            } catch (e) { /* ignore */ }
        })();

        function isProtectedHref(href) {
            if (!href || !__protectedMenuKeys.length) return null;
            for (var i = 0; i < __protectedMenuKeys.length; i++) {
                var key = __protectedMenuKeys[i];
                if (key && href.indexOf(key) >= 0) return key;
            }
            return null;
        }

        function bindProtectedMenuGuard() {
            if (!standardId) return;
            if (window.__protectedMenuBound) return;
            window.__protectedMenuBound = true;

            // 拉受保护菜单 key 列表（不下发密码）
            $.ajax({
                type: 'POST',
                url: huayi_sjwh_url + 'cmeCommonConfig/listProtectedMenuKeys',
                data: {
                    standardKindId: standardId,
                    unitId: unitId || '',
                    configDictCode: PROTECTED_MENU_DICT_CODE
                },
                success: function (res) {
                    if (res && res.success && res.data && res.data.length) {
                        // 后端可能返回纯字符串数组，也可能返回对象数组（{menu, name}）
                        $.each(res.data, function (i, item) {
                            if (typeof item === 'string') {
                                __protectedMenuKeys.push(item);
                            } else if (item) {
                                // 字段名兼容：menu / menuKey
                                var key  = item.menu || item.menuKey;
                                var name = item.name || item.menuName || '';
                                if (key) {
                                    __protectedMenuKeys.push(key);
                                    __protectedMenuMap[key] = name;
                                }
                            }
                        });
                        if (window.console) {
                            console.log('[protectedMenu] keys:', __protectedMenuKeys);
                        }
                    }
                },
                error: function () { /* 拉不到时按"无配置"放行，不打扰用户 */ }
            });

            // capture 阶段拦截，先于 layui 自身的 lay-href tab 处理
            document.addEventListener('click', function (e) {
                if (!__protectedMenuKeys.length) return;
                var target = e.target;
                while (target && target !== document) {
                    if (target.tagName === 'A' && target.hasAttribute('lay-href')) break;
                    target = target.parentNode;
                }
                if (!target || target === document) return;
                var href = target.getAttribute('lay-href');
                var hitKey = isProtectedHref(href);
                if (!hitKey) return;
                // 已通过则放行
                if (sessionStorage.getItem(PROTECTED_PASS_FLAG_PREFIX + hitKey) === '1') return;
                e.stopPropagation();
                e.preventDefault();
                openProtectedMenuPwd(target, hitKey);
            }, true);
        }

                    scrollMessageElement.append(cloneLabels);

                    let messageWidth = scrollMessageElement.children().first().outerWidth(true); // 计算一个 <label> 元素的宽度
                    function scrollMessage() {
                        scrollMessageElement.animate({
                            marginLeft: -messageWidth // 每次滚动一个 <label> 元素的宽度
                        }, 6000, 'linear', function() {

                            scrollMessageElement.children().first().appendTo(scrollMessageElement); // 将第一个 <label> 元素移动到消息列表的末尾
                            scrollMessage();
                        });
                    }
                    scrollMessage();

                    // 当鼠标移动到 .scroll-message 上时，停止动画
                    scrollMessageElement.mouseenter(function() {
                        scrollMessageElement.stop();
                    });

                    // 当鼠标离开 .scroll-message 时，重新开始动画
                    scrollMessageElement.mouseleave(function() {
                        scrollMessage();
                    });
                }
            });

                            "userId": localStorage.getItem('user-id')
                        }
                    };
                    $.ajax(settings).done(function (response) {
                        layer.close(index);
                    });
                }
            })
        }


        //赵晓的方法，我从js中提出来，后续如果都不使用kk_psninfo，psn_info就可以剔除掉
        function getPersonToLocal() {
            if('14' != userType) return;
            if(localStorage.getItem('kk_psninfo')) return;
            if (localStorage.getItem('kk_psninfo') != null && localStorage.getItem('kk_psninfo').length > 0) return;
            $.ajax({
                url: huayi_projectscore_url + `ps/person/info`,
                type: 'POST',
                contentType: 'application/json;charset=UTF-8',
                data: JSON.stringify({userId: localStorage.getItem('user-id')}),
                success: function (res) {
                    localStorage.setItem('kk_psninfo', JSON.stringify(res.data));
                    localStorage.setItem('psn_info', JSON.stringify(res.data));
                }
            })
        }

        getPersonToLocal();

        function infoIntegrity()  {
            getConfig('fun_input_unit_admin_force');
            if (window['fun_input_unit_admin_force'] != 1) return true;

                title       : '请完善信息',
                type        : 2, 
                // area        : [ '950px', '700px' ],
                area        : [ '100%', '100%' ],
                resize      : false,
                move        : false,
                closeBtn    : false,
                content     : 'pages/unit/comUnitAdminDetail.html?required=t',
            });
        }

            // 页面加载完成后自动触发侧边栏收缩
            $(document).ready(function(){

        //获取配置的值
        function getConfig(config_name) {
            let config_value = '';
            $.ajax({
                async   : false,
                type    : 'post',
                url     : huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data    : { unitId: localStorage.getItem('unit-id'), configNames: config_name },
                success : res => {
                    if (res.success == true) window[config_name] = res.data[config_name];
                    else layer.msg('获取配置出错');
                },
                error   : () => layer.msg('获取配置出错')
            });
        }
    </script>
