<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<title>首页</title>
	<meta name="viewport"
		content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no, viewport-fit=cover" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
	<link rel="stylesheet" href="front/css/reset.css" />
	<link rel="stylesheet" href="front/css/layout.css" />
	<link rel="stylesheet" type="text/css" href="front/css/default.css">
    <link rel="stylesheet" type="text/css" href="/js/disk/gridstack.css">
    <link rel="stylesheet" type="text/css" href="/css/fontPage.css">

    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
	<script src="front/js/jquery-ui.min.js"></script>
	<script src="front/js/lodash.min.js"></script>
	<script src="front/js/echarts.js"></script>	
    <script src="/js/disk/gridstack.js"></script>
	<!--    ajax全局配置-->
	<script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
	<script type="text/javascript" src="./js/constant.js"></script>

</head>
<script type="text/javascript">
	let reg = new RegExp('(^|&)rand=([^&]*)(&|$)', 'i');    // 匹配目标参数
	let result = window.location.search.substr(1).match(reg); // 对querystring匹配目标参数
	if(result == null){
		let url = window.location.href;
		let ch = (url.indexOf('?')>0)?'&':'?';
		window.location.href = url+ch+"rand="+(new Date()).getTime();
	}
 </script>
<body style="overflow: auto;">
    <div>
        <div class="menu-nav js-menu-nav"></div>
        <div class="menu-box js-menu-box">
            <!-- 里面是菜单列表 -->
            <ul id="menuUl"></ul>
        </div>
        <div class="home-show-box js-grid-box" >
            <div class="grid-box">
                <!-- 里面是展示的模块 -->
                <div class="grid-stack"></div>
            </div>
        </div>
    </div>
<script>
    var options = {
        float: true,
        animate: true,
        cell_height: 70,
        vertical_margin: 15
    };

    $('.grid-stack').gridstack(options);
    let homeGridSets = $('.grid-stack').data('gridstack');
    let echartSets = echarts;
        
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        tool    :   'tool'
    });

    layui.use(['table', 'form','treeSelect','tool'], function () {
        let table = layui.table,form = layui.form,$ = layui.jquery;
        let layer = layui.layer,tool = layui.tool;
        let ajaxNum =0,loading=null;
        const userType  = parseInt(localStorage.getItem("user-type"));
        const unitId = localStorage.getItem("unit-id");
        const unitUserType = localStorage.getItem("unit-user-type");
        const standardId = localStorage.getItem("standardkind-id");
        let menuListObj = {},showModulesArr=[],personData = null,projStatisData = {},projCheckData = {};
        let scoreObj = {};
        let titleObj={"初级":0,"中级":0,"副高":0,"正高":0};
        const moduleFunObj = {"person_num":"handlerPersonNum(1)",
                "professional_num":"handlerProfessionalNum(1)",
                "person_join_rate":"handlerPersonJoinRate(1)",
                "profession_compliance_rate":"professionComplianceRate(1)",
                "person_compliance_rate":"personComplianceRate(1)",
                "profession_join_compliance_num":"professionJoinComplianceNum(1)",
                "person_profession_statistics":"personProfessionStatistics(1)",
                "proj_checking_score":"projCheckingScore(1)",
                "group_checking_score":"groupCheckingScore(1)",
                "single_checking_score":"singleCheckingScore(1)",
                "dept_single_checking_score":"deptSingleCheckingScore(1)",
                "proj_apply_before_checking":"projApplyBeforeChecking(1)",
                "feedback_checking":"feedbackChecking(1)",
                "checking_register_person":"personRegisterChecking(1)",
                "final_checking_proj":"finalProjCheck(1)",
                "pro_checking_proj":"proProjCheck(1)",
                "checking_proj":"checkingProj(1)",
                "unit_checking_proj":"checkingProj(1)"};
        //关闭closeLoading的判断
        let closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=2 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }
        //公共ajax
        let commonAjax = function(type="get",url,data,failFun,successFun){
            openLoading();
            $.ajax({
                type    :   type,
                url     :   url,
                data    :   data,
                success :   function (res) {
                    closeLoading();
                    successFun(res);
                },
                error    :   function(res){
                    closeLoading();
                    // failFun();
                }
            });
        }


        //获取右侧展示的内容
        let getShowMenuList = function(){
            if(tool.isEmpty(standardId) || (userType != 11 && userType != 12)) return;
            const roleType = (userType == 11) ? userType*10 + unitUserType*1 : userType;
            //ajax获取到接口，开始构建右侧列表
            commonAjax("post",huayi_sjwh_url + "boardModuleRole/getBoardMenuListByRole",
                {standardId:standardId,roleType:roleType},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status != 200) return;
                    if(res.data == null) return;
                    createMenuList(res.data);
                    moduleInit(res.data);
                });
        }

        //创建右侧列表
        let createMenuList =  function(data){
            let menuContext = ``;
            for(let obj of data){
                menuListObj[obj.moduleCode] = obj;
                if(obj.showModule == 1) showModulesArr.push(obj);
                const className  = (obj.showModule == 1) ? "jy_sty" : "";
                menuContext += `<li class="${className}">   
                    <div class="add-module" module-width="${obj.moduleWidth}" module-height="${obj.moduleHeight}" module-x="${obj.locationx}" module-y="${obj.locationy}" module-name="${obj.moduleName}" module-id="${obj.moduleId}" module-image-url="" module-code="${obj.moduleCode}" module-type="${obj.moduleType}" module-title="${obj.moduleTitle}">
                        <i class="rig"></i><span>${obj.moduleName}</span>
                    </div>
                </li>`;
            }
            $("#menuUl").html(menuContext);
            createAllModule();
            bindMenuNav();
            bindAddModel();
        }

        //监听右侧编辑标签
        let bindMenuNav = function(){
            $('.js-menu-nav').on('click', function () {
                //编辑按钮关闭
                if($(this).hasClass("curen-active")){
                    $(this).css({ 'right': '0px' })
                    $('.js-menu-box').css({ 'right': '-220px' });
                    $(this).removeClass('curen-active');
                    $('.js-grid-box').css({ 'margin-right': '0px' });
                    $(".js-grid-box").removeClass("edit-grid-model");
                    saveModuleInfo();
                    _.map($('.grid-stack > .grid-stack-item:visible'), function (el) {
                        homeGridSets.movable(el, false)
                    });
                }else{
                    //编辑按钮打开
                    $(this).css({ 'right': '220px' })
                    $('.js-menu-box').css({ 'right': '0' });
                    $(this).addClass('curen-active');
                    $('.js-grid-box').css({ 'margin-right': '220px' });
                    $(".js-grid-box").addClass("edit-grid-model");
                    _.map($('.grid-stack > .grid-stack-item:visible'), function (el) {
                        homeGridSets.movable(el, true)
                    });
                }
            })
        }

        //监听添加模块
        let bindAddModel = function(){
            $('.add-module').click(function(){
                const tempModule = {
                    moduleWidth: $(this).attr('module-width'),moduleHeight: $(this).attr('module-height'),
                    moduleId:$(this).attr('module-id'),moduleCode:$(this).attr('module-code'),
                    moduleType:$(this).attr('module-type'),moduleTitle:$(this).attr('module-title'),
                    locationx: 0,locationy: 0,autoPosition: true
                };
                createModule(tempModule);
                $(this.parentElement).attr('class', 'jy_sty');
                if(moduleFunObj.hasOwnProperty(tempModule.moduleCode)) {
                    eval(moduleFunObj[tempModule.moduleCode]);
                }
            });
            $('.js-grid-box').height($(window).height());
        }

        //页面模块初始化
        let moduleInit = function(data){
            getPersonStatistics();//请求人员统计基础信息
            getProjScoreStatistics();//省市机构获取
            getProjCheckingStatistics();//获取待审核项目
            let runModule = {"proj_checking_score":0,"group_checking_score":0};
            for(let tempObj of data){
                if(runModule.hasOwnProperty(tempObj["moduleCode"])) {
                    runModule[tempObj["moduleCode"]] = 1;
                }
            }
            //是否执行继教项目学分统计
            if(runModule["proj_checking_score"] == 1) {
                getCheckProjScoreStatistics();
            }
            //是否执行院内活动学分统计
            if(runModule["group_checking_score"] == 1) {
                getCheckGroupScoreStatistics();
            }
        }

        //创建所有的模块
        let createAllModule = function(){
            for(let key in menuListObj){
                menuListObj[key].autoPosition= false;
                menuListObj[key].showModule == 1 && createModule(menuListObj[key]);
            }
            _.map($('.grid-stack > .grid-stack-item:visible'), function (el) {
                homeGridSets.movable(el, false)
            });
        }

        //创建要添加的模块,只创建模块，不创建里面的具体内容
        let createModule = function(moduleObj){
            let cardBoxHtml = `<div class="ren_box" id="${moduleObj.moduleCode}"></div>`;
            let cardHeaderHtml = tool.isEmpty(moduleObj.moduleTitle) ? "" : `<div class="xf_tit">${moduleObj.moduleTitle}</div>`;
            if(moduleObj.moduleType == 3 || moduleObj.moduleType == 5)  {
                cardBoxHtml = `<div class="ren_box">
                    <div class="card-header"><p>${moduleObj.moduleTitle}</p></div>
                    <div id="${moduleObj.moduleCode}" class="model-context-box"></div>
                </div>`;
            } else if(moduleObj.moduleType == 4){
                cardBoxHtml = `<div class="ren_box">
                    <div class="card-header"><p>${moduleObj.moduleTitle}</p></div>
                    <div class="model-context-box model-flex">
                        <div class="four-box js-${moduleObj.moduleCode}"></div>
                        <div class="four-box js-${moduleObj.moduleCode}"></div>
                        <div class="four-box js-${moduleObj.moduleCode}"></div>
                        <div class="four-box js-${moduleObj.moduleCode}"></div>
                    </div>
                </div>`;
            } else if(moduleObj.moduleType == 2){
                cardBoxHtml = `<div class="ren_box">
                    ${cardHeaderHtml}
                    <div id="${moduleObj.moduleCode}" class="full-box" ></div>
                </div>`;
            }
            let tempModel = `<div class="grid-stack-item ui-draggable ui-resizable ui-resizable-autohide" data-gs-moduleid="${moduleObj.moduleId}">
                <div class="grid-stack-item-content">
                    <div class="clo" onclick="bindCloseModel(this)"></div>
                    ${cardBoxHtml}
                </div></div>`;
            homeGridSets.add_widget(tempModel,moduleObj.locationx, moduleObj.locationy, moduleObj.moduleWidth, moduleObj.moduleHeight,moduleObj.autoPosition);
        }

        //各种人员统计,只依赖一个请求
        let getPersonStatistics = function(){
            commonAjax("GET",huayi_projectscore_url + "sumJjpersonStateTotal/getPersonStatusStatistics",
                {unitId:unitId,userType:userType},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status != 200) return
                    if(res.data == null) return;
                    personData = res.data;
                    personData.hasOwnProperty("personStatus") && handlerPersonNum();
                    personData.hasOwnProperty("personTitleJoin") && professionComplianceRate();
                    personData.hasOwnProperty("personTitleJoin") && professionJoinComplianceNum();

                    personData.hasOwnProperty("personTitleJoin") && handlerProfessionalNum();
                    personData.hasOwnProperty("personTitleJoin") && personProfessionStatistics();

                    personData.hasOwnProperty("personTitleJoin") && personComplianceRate();
                    personData.hasOwnProperty("personTitleJoin") && handlerPersonJoinRate();
                    
                });
        }

        //待审核机构，项目，学分，人员
        let getProjScoreStatistics = function(){
            if(userType !=11  && userType != 12) return;
            commonAjax("get",huayi_projectscore_url + "sumJjpersonStateTotal/getProvinceStatistics",
                {unitId	:unitId,unitUserType:unitUserType},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status !=200) return;
                    projStatisData = res.data;
                    // projCheckingScore();
                    // groupCheckingScore();
                    singleCheckingScore();
                    projApplyBeforeChecking();
                    feedbackChecking();
                    deptSingleCheckingScore();
                    personRegisterChecking();
                });
        }

        let getCheckProjScoreStatistics = function() {
            if(userType !=11  && userType != 12) return;
            commonAjax("get",huayi_projectscore_url + "sumJjpersonStateTotal/getCheckProjScoreStatistics",
                {unitId	:unitId,unitUserType:unitUserType},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status !=200) return;
                    scoreObj["scoreNum"] = res.data;
                    projCheckingScore();
                });
        }

        let getCheckGroupScoreStatistics = function() {
            if(userType !=11  && userType != 12) return;
            commonAjax("get",huayi_projectscore_url + "sumJjpersonStateTotal/getCheckGroupScoreStatistics",
                {unitId	:unitId,unitUserType:unitUserType},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status !=200) return;
                    scoreObj["groupScoreNum"] = res.data;
                    groupCheckingScore();
                });
        }

    

        //待审核项目预审，终审
        let getProjCheckingStatistics = function(){
            if(userType !=11  && userType != 12) return;
            const holdYear = new Date().getFullYear();
            commonAjax("get",huayi_projectscore_url + "sumJjpersonStateTotal/getProjCheck",
                {unitId	:unitId,cmeStandardKindId:standardId,userType:userType,unitUserType:unitUserType,holdYear:holdYear},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status !=200) return;
                    projCheckData = res.data;
                    finalProjCheck();
                    proProjCheck();
                    checkingProj();
                });
        }

        //人员总数
        let handlerPersonNum = function(isShow=0){
            const tempModuleCode = "person_num";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if($(`#${tempModuleCode}`).length <= 0) return;
            let statusArr = ["正常","不计达标","产假"];
            let numObj = {},count = 0;
            for(let title of statusArr){
                let partNum = 0;
                for(let obj of personData["personStatus"]){
                    if(obj["person_state_name"] != title) continue;
                    partNum = obj.hasOwnProperty("number")?obj["number"]:obj["total_person_number"];
                    count += obj.hasOwnProperty("number")?obj["number"]:obj["total_person_number"];
                }
                numObj[title] = partNum;
            }
            let statusHtml = `<dl> <dt><img src="front/img/xueyuan_img.png"></dt>
                <dd><p>人员总数</p><h1>${count}</h1></dd>`;
            for(let title of statusArr){
                statusHtml += `<dd><p>${title}</p><h1>${numObj[title]}</h1></dd>`;
            }
            statusHtml += `</dl>`;
            $(`#${tempModuleCode}`).html(statusHtml);
        }

        //人员职称分布情况汇总
        let handlerProfessionalNum = function(isShow=0){
            const tempModuleCode = "professional_num";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if($(`#${tempModuleCode}`).length <= 0) return;
            let titleHtml = `<dl> <dt><img src="front/img/xueyuan_img.png"></dt>`;
            for(let key in titleObj){
                for(let obj of personData["personTitleJoin"]){
                    if(obj["title_level_name"].indexOf(key) <0) continue
                    titleObj[key] = obj.hasOwnProperty("number")?obj["number"]:obj["total_person_number"];
                }
                titleHtml += `<dd><p>${key}</p><h1>${titleObj[key]}</h1></dd>`;
            }
            titleHtml += `</dl>`;
            $(`#${tempModuleCode}`).html(titleHtml);
        }

        //人员职称分布统计--环状图
        let  personProfessionStatistics = function(isShow=0){
            const tempModuleCode="person_profession_statistics";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if(!document.getElementById(tempModuleCode)) return;
            let dataArr = [];
            for(const key in titleObj){
                dataArr.push({value:titleObj[key],name:key});
            }
            let tempTitleOption = getEcharOption("人员职称分布统计",
                [{orient: 'horizontal',bottom: '30px',data: ['初级', '中级']},
                {orient: 'horizontal',bottom: '5px',data: ['副高', '正高']}],
                dataArr,['#6f91ed', '#e0aa83', '#d06d7e', '#7db692']);
            initEcharElem(tempTitleOption,document.getElementById(tempModuleCode));
        }
        
        //人员参与率
        let handlerPersonJoinRate = function(isShow=0){
            const tempModuleCode = "person_join_rate";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if(!document.getElementById(tempModuleCode)) return;
            let totalNumber = 0,joinNumber=0;
            let personJoinTemp = {};
            if(tool.isEmpty(personData["personTitleJoin"])) {
                personJoinTemp = {"total_person_number":0,"proj_person_number":0};
            } else {
                let tempTotal=0,projPersonNum=0;
                for(let obj of personData["personTitleJoin"]){
                    tempTotal += obj.hasOwnProperty("number")?obj["number"]:obj["total_person_number"];
                    projPersonNum += obj["proj_person_number"];
                }
                personJoinTemp = {"total_person_number":tempTotal,"proj_person_number":projPersonNum};
            }

            if(personJoinTemp.hasOwnProperty("total_person_number")) {
                totalNumber = personJoinTemp["total_person_number"];
            }
            if(personJoinTemp.hasOwnProperty("proj_person_number")) {
                joinNumber = personJoinTemp["proj_person_number"];
            }
            //参加率
            let tempJoinOption = getEcharOption("人员参与率",
                {orient: 'vertical',bottom: '5px',data: ['参与人数', '未参与人数']},
                [{ value: joinNumber, name: '参与人数' },{ value: totalNumber-joinNumber, name: '未参与人数' }]);
            initEcharElem(tempJoinOption,document.getElementById(tempModuleCode));
        }

        //按职称统计达标率
        let  professionComplianceRate = function(isShow=0){
            const tempModuleCode = "profession_compliance_rate";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if(tool.isEmpty(personData["personTitleJoin"]) || personData["personTitleJoin"].length == 0) {
                personData["personTitleJoin"] = [{pass_person_number: 0,
                    proj_person_number: 0,total_person_number: 0,
                    title_level_name: "初级职称"},
                    {pass_person_number: 0,proj_person_number: 0,
                    title_level_name: "中级职称", total_person_number: 0},
                    {pass_person_number: 0, proj_person_number: 0,
                    title_level_name: "副高级职称",total_person_number: 0},
                    {pass_person_number: 0,proj_person_number: 0,
                    title_level_name: "正高级职称",total_person_number: 0}];
            }
            const tempData = personData["personTitleJoin"];
            let tempElems = document.getElementsByClassName(`js-${tempModuleCode}`);
            if(tempElems.length != 4) return;
            const tempObj = {"初级职称":"初级职称","中级职称":"中级职称",
		        "副高级职称":"副高职称","正高级职称":"正高职称"};
            const tempLegend = {orient: 'vertical',bottom: '5px',data: ['达标人数', '未达标人数']};
            for (let i = 0; i < tempData.length; i++) {
                const tempTitle = tempObj[tempData[i]["title_level_name"]];
                if(tool.isEmpty(tempTitle)){
                    // 删除tempData多余数据（乡村医生、其他）
                    tempData.splice(i,1);
                    i--;
                    continue;
                } 
                const passNum = tempData[i]["pass_person_number"];
                // const joinNum = tempData[i]["proj_person_number"];
                const allNum = tempData[i]["number"]?tempData[i]["number"]:tempData[i]["total_person_number"];
                let tempOption = getEcharOption(tempTitle,tempLegend,
                    [{value: passNum, name: '达标人数' },{ value: allNum-passNum, name: '未达标人数'}]);
                initEcharElem(tempOption,tempElems[i]);
            }
        }

        //人员达标率
        let personComplianceRate = function(isShow=0){
            const tempModuleCode = "person_compliance_rate";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if(!document.getElementById(tempModuleCode)) return;
            let personJoinTemp = {};
            if(tool.isEmpty(personData["personTitleJoin"])) {
                personJoinTemp = {total_person_number:0,pass_person_number:0};
            } else {
                let tempTotal=0,passPersonNum=0;
                for(let obj of personData["personTitleJoin"]){
                    tempTotal += obj.hasOwnProperty("number")?obj["number"]:obj["total_person_number"];
                    passPersonNum += obj["pass_person_number"];
                }
                personJoinTemp = {total_person_number:tempTotal,pass_person_number:passPersonNum};
            }
            // const tempData = personData["personJoin"];
            let totalNumber = 0,passNumber=0;
            if(personJoinTemp.hasOwnProperty("total_person_number")) {
                totalNumber = personJoinTemp["total_person_number"];
            }
            if(personJoinTemp.hasOwnProperty("pass_person_number")) {
                passNumber = personJoinTemp["pass_person_number"];
            }
            let tempPassOption = getEcharOption("人员达标率",
                {orient: 'vertical',bottom: '5px',data: ['达标人数', '未达标人数']},
                [{ value: passNumber, name: '达标人数' },{ value: totalNumber-passNumber, name: '未达标人数' }]);
            initEcharElem(tempPassOption,document.getElementById(tempModuleCode));
        }

        //按职称统计参与及达标人数
        let professionJoinComplianceNum = function(isShow=0){
            const tempModuleCode = "profession_join_compliance_num";
            if(!menuListObj.hasOwnProperty(tempModuleCode)) return;
            if(isShow==0 && menuListObj[tempModuleCode].showModule == 0) return;
            if(!document.getElementById(tempModuleCode)) return;
            const tempData = personData["personTitleJoin"];
            let tempObj = {"初级职称":{count:0,join:0,pass:0},"中级职称":{count:0,join:0,pass:0},"副高级职称":{count:0,join:0,pass:0},"正高级职称":{count:0,join:0,pass:0}};
            if(!tool.isEmpty(tempData) && tempData.length>=0) {
                for(let obj of tempData){
                    let tempTitle = obj["title_level_name"];
                    let count = obj.hasOwnProperty("number")?obj["number"]:obj["total_person_number"];
                    let passNum = obj["pass_person_number"];
                    let joinNum = obj["proj_person_number"];
                    if(tool.isEmpty(tempObj[tempTitle])) continue;
                    tempObj[tempTitle].count = count;
                    tempObj[tempTitle].pass = passNum;
                    tempObj[tempTitle].join = joinNum;
                }
            }
            let tableOption = getEcharTable([['product', '继教对象人数', '参与人数', '达标人数'],
					['初级', tempObj["初级职称"].count, tempObj["初级职称"].join, tempObj["初级职称"].pass],
					['中级', tempObj["中级职称"].count, tempObj["中级职称"].join, tempObj["中级职称"].pass],
					['副高', tempObj["副高级职称"].count, tempObj["副高级职称"].join, tempObj["副高级职称"].pass],
					['正高', tempObj["正高级职称"].count, tempObj["正高级职称"].join, tempObj["正高级职称"].pass]]);
			initEcharElem(tableOption,document.getElementById(tempModuleCode));//省卫健委
        }

        //项目终审待审核
        let finalProjCheck = function(isShow=0){
            createCheckingModule("final_checking_proj",projCheckData,'finalProjCount',isShow);
        }

        //项目预审待审核
        let proProjCheck  = function(isShow=0){
            createCheckingModule("pro_checking_proj",projCheckData,'proProjCount',isShow);
        }

        //项目审核，机构，市区县卫健委该模块不一致
        let checkingProj = function(isShow=0){
            createCheckingModule("checking_proj",projCheckData,'checkProjCount',isShow);
            createCheckingModule("unit_checking_proj",projCheckData,'checkProjCount',isShow);
        }

        //项目学分审核
        let projCheckingScore = function(isShow=0){
            createCheckingModule("proj_checking_score",scoreObj,'scoreNum',isShow);
        }

        //院内活动学分审核，市县卫健委
        let groupCheckingScore = function(isShow=0){
            createCheckingModule("group_checking_score",scoreObj,'groupScoreNum',isShow);
        }

        //个人活动学分审核，市县卫健委
        let singleCheckingScore = function(isShow=0){
            createCheckingModule("single_checking_score",projStatisData,'singleScoreNum',isShow);
        }

        //科室、个人录入学分审核，单位
        let deptSingleCheckingScore = function(isShow=0){
            createCheckingModule("dept_single_checking_score",projStatisData,'singleScoreNum',isShow);
        }

        //举办前申请审核，省市卫健委
        let projApplyBeforeChecking =  function(isShow=0){
            createCheckingModule("proj_apply_before_checking",projStatisData,'cycleApplicationNum',isShow);
        }

        //项目执行情况反馈审核，省市卫健委
        let feedbackChecking = function(isShow=0){
            createCheckingModule("feedback_checking",projStatisData,'feedbackNum',isShow);
        }

        //待审核注册人员，机构
        let personRegisterChecking = function(isShow=0){
            createCheckingModule("checking_register_person",projStatisData,'checkingPeopleNum',isShow);
        }

        //创建待审核的模块，moduleType类型是2
        let createCheckingModule = function(moduleCode,data,key,isShow){
            if(!menuListObj.hasOwnProperty(moduleCode)) return;
            if(isShow==0 && menuListObj[moduleCode].showModule == 0) return;
            if(!document.getElementById(moduleCode)) return;
            if(!data.hasOwnProperty(key)) return;
            const tempObj = menuListObj[moduleCode];
            let subhead = tool.isEmpty(tempObj.moduleSubhead) ? "待审核" : tempObj.moduleSubhead;
            const moduleUrl = tool.isEmpty(tempObj.moduleUrl) ? "" : tempObj.moduleUrl;
            const tabTitle = tool.isEmpty(tempObj.tabTitle) ? "" : tempObj.tabTitle;
            let htmlText = `<dl>
                    <dt><img src="front/img/shenhe_img.png"></dt>
                    <dd><p>${subhead}</p>
                        <h1>
                            <span onclick="openIframeWindow(this)" url="${moduleUrl}" tab-title="${tabTitle}">${data[key]}</span>
                        </h1>
                    </dd>
                </dl>`;
            $(`#${moduleCode}`).html(htmlText);
        }

        window.openIframeWindow = function(elem){
            if(!elem.getAttribute("url") || !elem.getAttribute("tab-title")) return;
            let url = elem.getAttribute("url");
            let title = elem.getAttribute("tab-title");
            let id =  url.split("?")[0];
            window.parent.addNewTab('layadmin-layout-tabs', 
                {   id: id,
                    title: title,
                    attr: url,
                    content: url,});
        }

        //获取Echar需要的参数，扇形图
        let getEcharOption = function(title,legend,dataObj,colorArr=['#6f91ed', '#e0aa83']){
            return {
                tooltip: {
                    trigger: 'item',position: 'inside',
                    formatter: '{a} <br/>{b} : {c} ({d}%)',
                    textStyle: {fontSize: 8}
                },
                legend: legend,
                series: [
                    {
                        name: title, type: 'pie',
                        radius: ['40%', '55%'],
                        center: ['50%', '30%'],
                        color: colorArr,
                        label: {formatter: '{d}%',color: 'inherit'},
                        labelLine: { //label线的长度
                            normal: {
                                length: 0, // 改变标示线的长度
                                length2: 0,
                                maxSurfaceAngle: 0
                            }
                        },
                        data: dataObj
                    }
                ]
            };
        }

        //获取Echart参数，表格
        let getEcharTable = function(dataArr){
            return {
                legend: {
                    orient: 'horizontal',
                    x:'right',      //可设定图例在左、右、居中
                    y:'top',     //可设定图例在上、下、居中
                    padding:[0,100,0,0]   //可设定图例[距上方距离，距右方距离，距下方距离，距左方距离]
                },
                tooltip: {},
                dataset: {source: dataArr},
                xAxis: { type: 'category' },
                yAxis: {},
                series: [{ type: 'bar', color: '#6f91ed' ,barMaxWidth: '8%'},
                    { type: 'bar', color: '#e0aa83',barMaxWidth: '8%'},
                    { type: 'bar', color: '#d06d7e' ,barMaxWidth: '8%'}]
		    };
        }
        //装配进入Echar
        let initEcharElem = function(option,elem){
            let tempMyChart = echartSets.init(elem);
            tempMyChart.setOption(option);
            window.addEventListener("resize", function(){
                tempMyChart.resize();
            });
        }

        //监听关闭模块
        window.bindCloseModel = function(elem){
            var module_1 = $(elem.parentElement.parentElement).data('_gridstack_node');
            var module_2 = $(elem.parentElement.parentElement.parentElement).data('_gridstack_node');
            if (module_1 != undefined) {
                homeGridSets.remove_widget(elem.parentElement.parentElement, "undefined");
                var moduleid = $(module_1.el).attr('data-gs-moduleid');
                $('[module-id=' + moduleid + ']').parent().attr('class', '')
            }
            if (module_2 != undefined) {
                homeGridSets.remove_widget(elem.parentElement.parentElement.parentElement, "undefined");
                var moduleid = $(module_2.el).attr('data-gs-moduleid');
                $('[module-id=' + moduleid + ']').parent().attr('class', '')
            }
        }

        //是否改变了module定位,改变了就是true，没有改变就是false
        let isChangeModule = function(data = []){
            if(showModulesArr.length != data.length) return true;
            //之前没有模块展示，现在data还是0表示没有模块展示
            if(showModulesArr.length == 0) return false;
            for(const showModule of showModulesArr) {
                for(const obj of data) {
                    if(showModule.moduleId!=obj.moduleId) continue;
                    if(showModule.locationx != obj.locationx || showModule.locationy != obj.locationy) {
                        return true;
                    }
                }
            }
            return  false;
        }

        //保存模块定位和展示信息
        let saveModuleInfo = function(){
            let moduleData = _.map($('.grid-stack > .grid-stack-item:visible'), function (el) {
                homeGridSets.movable(el, false)
                    el = $(el);
                    var node = el.data('_gridstack_node');
                    return {
                        locationx: node.x,
                        locationy: node.y,
                        showModule: 1,
                        moduleId: $(el).attr('data-gs-moduleid')
                    };
                }, this);
            if(!isChangeModule(moduleData)) return;
            $.ajax({
                type: 'post',
                url: huayi_sjwh_url + "boardModuleUser/changeModulesPosition",
                data:JSON.stringify(moduleData),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.status == 200){
                        layer.msg("保存成功");
                    }else{
                        layer.msg("保存失败");
                    }
                },
                error: function () {
                    layer.msg("保存失败");
                }
            })
        }


        //页面加载入口
        let htmlInit = function(){
            if(userType!=11 && userType != 12) return;
            if(unitId == '630687' || unitId == '630620' || unitId == '638889') return;
            getShowMenuList();
        }

        htmlInit();
        
    });

    $(window).resize(function () {
        $('.js-grid-box').height($(window).height());
    })

</script>	
</body>

</html>
