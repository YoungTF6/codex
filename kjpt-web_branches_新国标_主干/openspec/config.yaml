schema: spec-driven
context: |
  项目形态：
  - 前后端分离，多仓协作（web/cloud）。
  - 网关统一入口，前端通过约定路径访问后端服务。
  - 变更优先保障联调稳定性与向后兼容。

  协作原则：
  - 需求变更分三类：fe-only / be-only / contract。
  - contract 类型必须先定义接口契约，再并行开发。
  - 所有接口变更必须可追溯到 proposal/design/tasks。

  前端关注点：
  - 页面与交互适配、参数拼装、错误提示、兼容旧字段过渡。
  - 接口契约变化需要同步 mock 与联调用例。

  后端关注点：
  - 保持返回结构稳定，优先兼容旧字段/旧语义。
  - 涉及 DB、网关路由、跨服务调用时，必须给出回滚路径。

rules:
  proposal:
    - 必须包含业务目标、非目标（Non-goals）、影响范围（前端/后端/契约）。
    - 若涉及接口变化，必须列出接口清单（方法、路径、请求、响应、错误码）。
    - 必须说明兼容策略（是否双字段/双版本、兼容周期、下线计划）。
    - 必须包含风险与回滚概要（联调风险、数据风险、发布风险）。

  design:
    - 必须给出接口契约细节与示例（请求 JSON、响应 JSON、错误码语义）。
    - 必须标明前端改动点与后端改动点的对应关系。
    - 若涉及数据库或配置中心变更，必须写明迁移步骤与回滚方案。
    - 若涉及跨服务调用，需写清调用链路、依赖服务及降级策略。

  tasks:
    - 任务必须可独立验证，并标注所属端（FE/BE/Joint）。
    - contract 变更必须包含：后端实现、前端适配、联合联调、回归验证。
    - 每个任务应包含验收方式（接口测试/页面验收/日志校验）。
    - 必须包含发布前检查与发布后观察项（关键指标、错误日志、告警）。
