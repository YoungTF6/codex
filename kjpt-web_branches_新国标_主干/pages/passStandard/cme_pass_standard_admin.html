<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>达标标准浏览（行政）</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <!-- 工具 -->
    <script type="text/javascript" src="../../js/base64.js"></script>

    <style>
        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .table_toolbar_right {
            float: right;
            position: relative;
            right: -120px;
        }
    </style>
</head>

<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <div class="layui_mess">

                    <!-- 筛选项 -->
                    <div class="layui_display">
                        <div class="layui-inline layui-form" lay-filter="statistical-year-div">
                            <label class="layui-form-label">选择年度</label>
                            <div class="layui-input-block">
                                <select id="statistical-year" lay-filter="statistical-year"></select>
                            </div>
                        </div>
                    </div>

                    <div class="layui_display">
                        <div class="layui-inline btn-search-positon">
                            <a class="layui-btn layui-btn-sm" onclick="loaderTable()"
                                    id="searchBtn" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>

                </div>
            </div>


            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" style="margin: 0px 0px;"
                        id="table_cme_pass_standard" lay-filter="table_cme_pass_standard">
                </table>
            </div>

        </div>
    </div>


    <!-- 表头工具条 -->
    <script type="text/html" id="table_toolbar">
        <span class="table_toolbar_right">
            <a class="layui-btn layui-btn-sm" lay-event="export_word">导出Word</a>
        </span>
    </script>


    <script type="text/javascript">
        const unitId            = localStorage.getItem('unit-id'),
              unitName          = localStorage.getItem('unit-name'),
              username          = localStorage.getItem('user-name'),
              cmeStandardKindId = localStorage.getItem('standardkind-id');


        layui.config({
            base : '../../js/layui/ext/'
        }).extend({
            excel : 'excel'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer', 'excel'], function () {
            var table   = layui.table,
                form    = layui.form,
                $       = layui.jquery,
                layer   = layui.layer,
                excel   = layui.excel;

            var statisticalYearList = [];


            /* 页面初始化 */
            $(() => {
                // 统计年度
                $.ajax({
                    url      : huayi_sjwh_url + 'cmeYear',
                    type     : 'get',
                    async    : false,
                    dataType : 'json',
                    data     : { cmeStandardKindId : cmeStandardKindId },
                    success  : function (res) {
                        if (res.status == 200) {
                            let option              = '';
                                statisticalYearList = res.data;

                            for (let i = 0; i < 10 && i < statisticalYearList.length; i++) {
                                option += '<option value="' + statisticalYearList[i].cmeYearId + '">' +
                                        statisticalYearList[i].cmeYear + '</option>';
                            }
                            $('#statistical-year').append(option);
                            form.render('select', 'statistical-year-div');
                            $('#statistical-year').parent().next().find('d1').html(statisticalYearList[0].startDate);
                            $('#statistical-year').parent().next().find('d2').html(statisticalYearList[0].endDate);
                        } else {
                            layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                        }
                    },
                    error    : function () {
                        layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                    }
                });

                // 统计年度事件
                // form.on('select(statistical-year)', function (data) {
                //     for (let i = 0; i < statisticalYearList.length; i++) {
                //         if (statisticalYearList[i].cmeYearId == data.value) {
                //             $('#statistical-year').parent().next().find('d1').html(statisticalYearList[i].startDate);
                //             $('#statistical-year').parent().next().find('d2').html(statisticalYearList[i].endDate);
                //             break;
                //         }
                //     }
                // });


                // 表格初始化（进页自动加载；也可点「查询」重新加载）
                loaderTable();
            });


            /* 加载表格 */
            window.loaderTable = (colsConfig, tableData) => {
                let msg        = '<span style="color: #666666;">&nbsp;正在查询&nbsp;···</span>',
                    load_index = layer.msg(msg, { icon: 16, shade: 0.3, time: 0 });
                            //    = layer.load(2, { shade: 0.3 });

                table.render({
                    elem            : '#table_cme_pass_standard',
                    url             : huayi_sjwh_url + 'cmePassStandard/list/all',
                    headers         : {
                        'Authorization' : localStorage.getItem('token'),
                        'KJPT-USER-ID'  : localStorage.getItem('user-id')
                    },
                    defaultToolbar  : [],
                    where           : {
                        cmeStandardKindId : cmeStandardKindId,
                        cmeYearId         : $('#statistical-year').val(),
                        unitId            : unitId
                    },
                    cols            : [[
                        { field: 'standNo', title: '序号', sort: true, width: 80, align: 'center' },
                        { field: 'category', title: '类型', sort: true, minWidth: 150 },
                        { field: 'topUnitId', title: '最高单位', sort: true, minWidth: 150 },
                        { field: 'score', title: '分值', sort: true, minWidth: 150 },
                        { field: 'ruleList', title: '具体规定', minWidth: 200, templet: (d) => {
                            let ruleList = d.ruleList == null ? '' : d.ruleList;
                            return '<span title="' + ruleList + '">' + ruleList + '</span>';
                        } },
                        { field: 'description', title: '描述', minWidth: 200, templet: (d) => {
                            let description = d.description == null ? '' : d.description;
                            return '<span title="' + description + '">' + description + '</span>';
                        } },
                        { title: '适用医院及职称', width: 140, align: 'center', templet: (d) => {
                            return '<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row"' +
                                    ' lay-event="applicableScope" style="font-size:14px;">适用医院及职称</a>';
                        } },
                        { title: '适用职称', width: 140, align: 'center', templet: (d) => {
                            return '<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row"' +
                                    ' lay-event="applicableScope2" style="font-size:14px;">适用职称</a>';
                        } }
                    ]],
                    title           : '达标标准浏览',
                    toolbar         : '#table_toolbar',
                    defaultToolbar  : [],
                    cellMinWidth    : 150,
                    id              : 'table_cme_pass_standard',
                    height          : 'full-120',
                    page            : false,
                    limit           : Number.MAX_VALUE,
                    parseData       : function (res) {
                        return {
                            'code' : res.status === 200 ? 0 : res.status, // 解析接口状态
                            'msg'  : res.msg, // 解析提示文本
                            'data' : res.data // 解析数据列表
                        }
                    },
                    done            : function (res, curr, count) {
                        layer.close(load_index);
                    }
                });
            };
            /* 监听表头工具条 */
            table.on('toolbar(table_cme_pass_standard)', function (obj) {
                let datas = obj.data;

                switch (obj.event) {
                    case 'export_word':
                        exportCmePassStandardToWord();
                        break;

                    default:
                }
            });
            /* 监听行工具条 */
            table.on('tool(table_cme_pass_standard)', function (obj) {
                let datas = obj.data;

                switch (obj.event) {
                    case 'applicableScope':
                        layer.open({
                            type     : 2,
                            title    : '适用医院及职称',
                            content  : 'applicable_scope.html' +
                                    '?cmePassStandardId=' + datas.cmePassStandardId +
                                    '&standNo=' + datas.standNo,
                            // maxmin   : true,
                            area     : [ '50%', '495px' ],
                            btn      : [ '关闭' ],
                            btnAlign : 'c'
                        });
                        break;
                    
                    case 'applicableScope2':
                        layer.open({
                            type     : 2,
                            title    : '适用医院及职称',
                            content  : 'cme_pass_standard_title.html' +
                                    '?cmePassStandardId=' + datas.cmePassStandardId +
                                    '&standNo=' + datas.standNo,
                            // maxmin   : true,
                            area     : [ '100%', '100%' ],
                            btn      : [ '关闭' ],
                            btnAlign : 'c'
                        });
                        break;
                    default:
                }
            });


			/* 导出Word */
            function exportCmePassStandardToWord() {
                let cmeYearId = $('#statistical-year').val(),
                    cmeYear   = $('#statistical-year').find("option:selected").text();

                axios({
                    method       : 'GET',
                    url          : huayi_sjwh_url + "cmePassStandard/export/word",
                    responseType : 'blob',
                    params       : { 
                        cmeStandardKindId : localStorage.getItem("standardkind-id"),
                        cmeYearId         : cmeYearId,
                        cmeYear           : cmeYear,
                        unitId            : localStorage.getItem("unit-id")
                    }

                }).then(function (res) {
                    let data       = res.data;
                    let blob       = new Blob([data], { type: 'application/octet-stream' });
                    let url        = URL.createObjectURL(blob);
                    let exportLink = document.createElement('a');

                    exportLink.setAttribute('download', cmeYear + '年度达标标准一览表.doc');
                    exportLink.href = url;
                    document.body.appendChild(exportLink);
                    exportLink.click();
                });
            }

        });
    </script>
</body>

</html>
