<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>达标标准浏览（职称）</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>

    <!-- 工具 -->
    <script type="text/javascript" src="../../js/base64.js"></script>
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>

    <style>
        .layui-card-header {
            text-align: center;
            color: #446DBD;
        }
        .layui-card-body.layui_body_box {
            padding: 20px !important;
        }
        /* .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        } */



        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .table_toolbar_right {
            float: right;
            position: relative;
            right: -120px;
        }

        .layui-fluid {
            background-color: #f2f2f2;
        }
        .layui-fluid .layui-form-label{
            width: 90px;
        }
        .layui-fluid .layui-input-block {
            margin-left: 120px;
        }
        .layui-textarea {
            resize: none;
        }

        .font-bold {
            font-weight: bold;
        }
    </style>
</head>

<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <div class="layui-card-header font-bold">达标规则</div>
            <div class="layui-card-body layui_body_box"></div>

        </div>
    </div>


    <script type="text/javascript">
        const cmePassStandardId = getQueryString('cmePassStandardId'),
              cmeYearId         = getQueryString('cmeYearId'),
              unitId            = localStorage.getItem('unit-id'),
              titleId           = getQueryString('titleId');


        layui.config({
            base : '../../js/layui/ext/'
        }).extend({
            excel : 'excel'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer'], function () {
            var table   = layui.table,
                form    = layui.form,
                $       = layui.jquery,
                layer   = layui.layer;


            /* 页面初始化 */
            $(() => {
                let msg        = '<span style="color: #666666;">&nbsp;正在查询&nbsp;···</span>',
                    load_index = layer.msg(msg, { icon: 16, shade: 0.3, time: 0 });
                            //    = layer.load(2, { shade: 0.3 });

                // 达标标准
                axios({
                    method       : 'get',
                    url          : huayi_sjwh_url + 'cmePassStandard/title',
                    responseType : 'json',
                    params       : {
                        cmeYearId : cmeYearId,
                        unitId    : unitId,
                        titleId   : titleId
                    }
                }).then(res => {
                    if (res.status == 200 && res.data.status == 200) {
                        let data    = res.data.data;//layui-card-body
                        let content = '';
                        for (let i = 0; i < data.length; i++) {
                            if (data[i]._standardmsg.indexOf('<b>') == 0) {
                                content += '<p style="padding: 15px 0 5px 0;">' + data[i]._standardmsg + '</p>';
                            } else {
                                content += '<p style="text-indent:2em">' + data[i]._standardmsg + '</p>';
                            }
                        }
                        $('.layui-card-body').html(content);
                        layer.close(load_index);
                    } else {
                        layer.close(load_index);
                        layer.msg('获取适用医院及职称失败', { icon : 2, time: 1000 });
                    }
                }).catch(error => {
                    layer.close(load_index);
                    layer.msg('获取适用医院及职称异常', { icon : 7, time: 1000 });
                    console.log(error);
                });

                // 表格初始化
                // loaderTable();
            });

        });
    </script>
</body>

</html>
