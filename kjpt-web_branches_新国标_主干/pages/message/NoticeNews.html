    <script>

        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            eleTree: 'eleTree',
            treeSelect: 'treeSelect',
            xmSelect: 'xm-select',
            ysUpload: 'ysUpload'
        });
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'laydate', 'element', 'upload', 'ysUpload', 'eleTree', 'treeSelect', 'util', 'xmSelect', 'tool'], function () {
            var table = layui.table
                , form = layui.form
                , $ = layui.jquery
                , layer = layui.layer
                , laydate = layui.laydate
                , element = layui.element //Tab的切换功能
                , upload = layui.upload
                , eleTree = layui.eleTree
                , treeSelect = layui.treeSelect
                , util = layui.util
                , xmSelect = layui.xmSelect
                , ysUpload = layui.ysUpload
                , tool = layui.tool
                ;
            var taoId = '';
            var taoName = '';
            var userTypeArr = []
                , scoreLevelTypeArr = []
                , fileUrls = [];
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            var unitId = localStorage.getItem("unit-id");
            let timestamp = new Date().getTime();
            var unitArr = [];

            // 设置全局变量以保存选中行信息
            let idsStudent = new Array();
            let idsExpert = new Array();
            // 保存当前页全部数据id，点击全选时使用
            let tableIdsStudent = new Array();
            let tableIdsExpert = new Array();
            //获取已选择的人员
            let noticeUser;

            laydate.render({
                elem: '#effectiveDate',
                type: 'datetime'
            });
            laydate.render({
                elem: '#expirationDate',
                type: 'datetime'
            });

            // 多文件列表
            var uploadListIns = ysUpload.render({
                elem: '#chooseFileBtn'
                , elemList: $('#fileList') //列表元素对象
                , url: huayi_upload_url + 'uploadApi/upload'
                , exts: 'jpg|png|bmp|jpeg|pdf|doc|docx'
                , accept: 'file'
                , multiple: false
                , number: 3
                , size: 1024*5
                , auto: false
                , bindAction: '#submitFileBtn'
                , before: function (obj) {
                    this.data = getFileType(this.files);
                }
                , choose: function (obj) {
                    isCanSubmitBtn(true);
                    var that = this;
                    var files = this.files = obj.pushFile(); //将每次选择的文件追加到文件队列
                    var imgLength = Object.keys(files).length;
                    // 文件上传数量限制
                    // (Object.keys(files).length + fileUrls.length >= uploadFileNum) && isCanChooseBtn(false);

                    //读取本地文件
                    obj.preview(function (index, file, result) {
                        let imgSrc = file.type.indexOf("pdf") >= 0 ? '/img/pdf.png' : result;
                        var tr = $(['<tr id="upload-' + index + '">'
                            , '<td><a >' + file.name + '</a></td>'
                            , '<td>' + (file.size / 1014).toFixed(1) + 'kb</td>'
                            , '<td>'
                            , '<button class="layui-btn layui-btn-xs demo-reload layui-hide">重传</button>'
                            , '<button class="layui-btn layui-btn-xs layui-btn-danger demo-delete" type="button">删除</button>'
                            , '<button class="layui-btn layui-btn-xs layui-btn-danger demo-delete2" type="button" style="display: none;">删除</button>'
                            , '</td>'
                            , '</tr>'].join(''));

                        //单个重传
                        tr.find('.demo-reload').on('click', function () {
                            obj.upload(index, file);
                        });

                        //删除
                        tr.find('.demo-delete').on('click', function () {
                            layer.confirm('确认删除', { icon: 3, title: '提示' }
                                , function () {
                                    for (let i = 0; i < fileUrls.length; i++) {
                                        if (fileUrls[i].fileId == index) {
                                            fileUrls.splice(i, 1);
                                            break;
                                        }
                                    }
                                    delete files[index]; //删除对应的文件
                                    tr.remove();
                                    uploadListIns.config.elem.next()[0].value = ''; //清空 input file 值，以免删除后出现同名文件不可选
                                    isCanChooseBtn(true);
                                    Object.keys(files).length == 0 && isCanSubmitBtn(false);
                                    layer.close(layer.index);
                                })
                        });
                        // 保存提交时删除, 无需确认
                        tr.find('.demo-delete2').on('click', function () {
                            for (let i = 0; i < fileUrls.length; i++) {
                                if (fileUrls[i].fileId == index) {
                                    fileUrls.splice(i, 1);
                                    break;
                                }
                            }
                            delete files[index]; //删除对应的文件
                            tr.remove();
                            uploadListIns.config.elem.next()[0].value = ''; //清空 input file 值，以免删除后出现同名文件不可选
                            isCanChooseBtn(true);
                            Object.keys(files).length == 0 && isCanSubmitBtn(false);
                        });

                        that.elemList.append(tr);

                        //某图片放大预览
                        $("#showSmallPic" + index).bind('click', function () {
                            viewPhoto(result, file);
                        });
                    });
                }
                , done: function (res, index, upload) { //成功的回调
                    // 保存文件路径
                    var that = this;
                    if (res.code == 200) { //上传成功
                        var tr = that.elemList.find('tr#upload-' + index)
                            , tds = tr.children();
                        let fileSize = (this.files[index].size / 1014).toFixed(1);
                        fileUrls.push({
                            fileName: this.files[index].name,
                            filePath: res.data.picUrl,
                            photoSize: fileSize,
                        });
                        tds.eq(3).html('已上传');
                        tds.eq(4).find('.demo-reload').addClass('layui-hide'); //显示重传
                        delete this.files[index]; //删除文件队列已经上传成功的文件
                        // 全部上传完成弹框提示
                        Object.keys(this.files).length == 0 && isCanSubmitBtn(false);
                        return;
                    }
                    this.error(index, upload);
                }
                , allDone: function (obj) { //多文件上传完毕后的状态回调
                    console.log(obj)
                }
                , error: function (index, upload) { //错误回调
                    var that = this;
                    var tr = that.elemList.find('tr#upload-' + index)
                        , tds = tr.children();
                    tds.eq(3).html('上传失败');
                    tds.eq(4).find('.demo-reload').removeClass('layui-hide'); //显示重传
                }
            });
            //获取文件类型
            let getFileType = function (filesObj) {
                let tempDatas = {};
                let path = `/noticeNewsFiles/${cmeStandardKindId}/${unitId}`;
                for (let key in filesObj) {
                    let fileData = { path: path };
                    const tempType = filesObj[key].type;
                    let fileNameArr = filesObj[key].name.split(".");
                    let tempFileType = fileNameArr[fileNameArr.length - 1];
                    if (tempType.indexOf("image") >= 0) {
                        fileData.fileType = "IMAGE";
                    } else if (tempType.indexOf("application/pdf") >= 0) {
                        fileData.fileType = "DOC";
                    } else if (tempFileType.indexOf("docx") >= 0 ||
                        tempFileType.indexOf("doc") >= 0 ||
                        tempFileType.indexOf("xls") >= 0 ||
                        tempFileType.indexOf("xlsx") >= 0 ||
                        tempFileType.indexOf("excel") >= 0) {
                        fileData.fileType = "DOC";
                    } else {
                        fileData.fileType = "OTHER";
                    }
                    tempDatas[key] = fileData;
                }
                return tempDatas;
            }
            //是否可以选择按钮
            let isCanChooseBtn = function (flag = true) {
                if (flag) {
                    $("#chooseFileBtn").removeClass("layui-btn-disabled");
                    $("#chooseFileBtn").attr("disabled", false);
                } else {
                    $("#chooseFileBtn").addClass("layui-btn-disabled");
                    $("#chooseFileBtn").attr("disabled", true);
                }
            }
            //是否可以提交按钮
            let isCanSubmitBtn = function (flag = true) {
                if (flag) {
                    $("#submitFileBtn").removeClass("layui-btn-disabled");
                    $("#submitFileBtn").attr("disabled", false);
                } else {
                    $("#submitFileBtn").addClass("layui-btn-disabled");
                    $("#submitFileBtn").attr("disabled", true);
                }
            }
            // 富文本
            const E = window.wangEditor;
            const editor = new E('#noticeContentEdit');
            editor.config.height = 300;
            editor.config.uploadImgShowBase64 = true;
            editor.config.showLinkImg = false;

            //     url: huayi_sjwh_url + "cmestandardkind/list/all",
            //     type: 'get',
            //     success: function (res) {
            //         var standards = res.data;
            //         if (standards != null && standards.length > 0) {

            //             for (var i = 0; i < standards.length; i++) {

            //             }

            //         }
            //     }

            // 初始化发送范围下拉框
            $.ajax({
                url: huayi_mcenter_url + "noticeNewsRange",
                type: 'get',
                success: function (res) {
                    var standards = res.data;
                    if (standards != null && standards.length > 0) {
                        var options = '<option value="" > 请选择 </option>';
                        for (var i = 0; i < standards.length; i++) {
                            options += '<option value="' + standards[i].rangeType + '">' + standards[i].rangeType + '</option>';
                        }
                        $('#noticeNewsRangeId').append(options);
                        form.render('select');
                    } else {
                        console.log('score kind is null!');
                    }
                }
            });

            // --------------- 选择发送范围 -----------
            // 监听发送范围按钮
            $("#chooseRange").click(function () {
                //获取noticeId
                var noticeId = $("#add-noticeNews input[name='noticeId']").val();
                taoId=cmeStandardKindId;
                if (taoId == '') {
                    layer.msg('请选择套标准')
                    return
                }
                //if (el.getChecked().length == 0) {
                // 每次点击需要重新加载树结构
                getUnitTree(taoId,noticeId);

                //数据回显
                getUnitByCheck(noticeId,'choose');
                //}
                if (scoreLevelXmSelect == undefined) {
                    getScoreLevels(taoId)
                }
                layer.open({
                    type: 1,
                    title: '选择发送范围',
                    content: $('#choose-range'),
                    skin: '',
                    area: ['90%', '90%'],
                    btn: '确认',
                    btnAlign: 'c' //按钮居中
                })
            });
            var el = eleTree({
                el: '.eletree',
                showCheckbox: true,
                highlightCurrent: true,
                data: [],
                sort: true,
                initSort: {
                    field: 'order',
                    type: 'asc'
                },
                request: {          // 对于树形数据字段名重定义
                    name: "name",
                    key: "id",
                    children: "children",
                    pid: "pid"
                },

            });
            //监听套是否被选择，选中之后获取单位树
            $("#cmeStandardKindId").ready(function () {
                // 套的select下拉框选中触发事件
                form.on("select(layui-select-tao)", function (data) {
                    if (data.value == '') {
                        return
                    }
                    taoId = data.value;
                    taoName = data.elem[data.elem.selectedIndex].text
                    getScoreLevels(taoId)
                });
            });

            var getUnitTree = function (cmeStandardKindId,noticeId) {
                $.ajax({
                    type: 'get',
                    // url: huayi_personorg_url + 'comunit/childrenAllTree?unitId=191001',
                    url: huayi_personorg_url + 'comunit/cmeStandardKindId?cmeStandardKindId=' + cmeStandardKindId,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    async: false,
                    success: function (res) {
                        var allNodes = el.getAllNodeData();
                        if (allNodes.length > 0) {
                            var rootId = allNodes[0].id;
                            el.remove(rootId)
                        }
                        
                        el.append(res.data);
                    }
                });
            }
            //获取单位选择范围
            function getUnitByCheck(noticeId,typeinfo) {
                $.ajax({
                    type: 'get',
                    url: huayi_mcenter_url + 'noticeNews/getNoticeUserById?noticeId=' + noticeId,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    async: false,
                    success: function (res) {
                        var data = res.data.records;
                        //如果是修改那么需要给unitArr赋值 根据data  构建unitArr  {unitId:1}
                        if(typeinfo == 'edit'){
                            var unitIds = [];
                            for (var i = 0; i < data.length; i++) {
                                unitIds.push({unitId: data[i]});
                            }
                            unitArr = unitIds;
                        }

                        var allNodes = el.getAllNodeData(); // 获取所有节点的数据
                        var nodeMap = {}; // 创建一个对象来存储节点数据

                        // 定义一个递归函数来遍历所有的节点
                        function mapNodes(nodes) {
                            for (var i = 0; i < nodes.length; i++) {
                                nodeMap[nodes[i].id] = nodes[i]; // 将节点数据存储到对象中
                                if (nodes[i].children) { // 如果节点有子节点，递归遍历子节点
                                    mapNodes(nodes[i].children);
                                }
                            }
                        }

                        mapNodes(allNodes); // 使用递归函数遍历所有节点

                        var idsToCheck = []; // 创建一个数组来存储要选中的节点的 id
                        for (var i = 0; i < data.length; i++) {
                            var node = nodeMap[data[i]]; // 从对象中获取节点数据
                            if (node != null) {
                                idsToCheck.push(node.id); // 将节点的 id 添加到数组中
                            }
                        }

                        el.setChecked(idsToCheck, true); // 一次选中所有要选中的节点
                    }
                });
            }
            //获取角色选择范围
            function getUserTypeIdbyId(noticeId){
                $.ajax({
                    type: 'get',
                    url: huayi_mcenter_url + 'noticeNews/getUserTypeIdbyId?noticeId=' + noticeId,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    async: false,
                    success: function (res) {
                        var data = res.data;
                        //遍历data集合赋值
                        var userTypeIds = [];
                        for (var i = 0; i < data.length; i++) {
                            userTypeIds.push(data[i].value);
                        }
                        roleXmSelect.setValue(userTypeIds);
                        userTypeArr = data;
                    }
                });
            }

            var loadUnitSelect = function (unitId) {
                treeSelect.render({
                    elem: '#topUnitId',
                    data: huayi_personorg_url + 'comunit/childrenAllTree?unitId=' + unitId,
                    headers: {
                        'Authorization': localStorage.getItem('token'),
                        'KJPT-USER-ID': localStorage.getItem('user-id')
                    },
                    type: 'get',
                    search: true,
                    success: function (d) {
                        $("#topUnitIdBlock").css("display", "inline-block");
                        $("#topUnitNameBlock").css("display", "none");
                    }
                });
            }
            // 渲染用户角色多选
            var roleXmSelect;
            $.ajax({
                type: 'get',
                url: huayi_permission_url + 'comrole/noticcelist',
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    roleXmSelect = xmSelect.render({
                        on: function (data) {
                            var elChecked = el.getChecked();
                            if (elChecked.length == 0) {
                                layer.msg("请选择单位")
                            }
                            //arr:  当前多选已选中的数据
                            userTypeArr = data.arr;
                        },
                        el: '#userType_xmselect',
                        autoRow: true,
                        name: 'subThree',
                        empty: '请选择用户角色',
                        prop: {
                            name: 'name',
                            value: 'value',
                        },
                        data: res.data
                    })
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            //初始化学分级别字典
            var scoreLevelXmSelect;
            var getScoreLevels = function (cmeStandardKindId) {
                $.ajax({
                    type: 'get',
                    url: huayi_sjwh_url + '/cmecomscorelevel/taoId',
                    data: {
                        cmeStandardKindId: cmeStandardKindId
                    },
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        scoreLevelXmSelect = xmSelect.render({
                            on: function (data) {
                                //arr:  当前多选已选中的数据
                                scoreLevelTypeArr = data.arr;
                            },
                            el: '#scoreLevel_xmselect',
                            autoRow: true,
                            name: 'subThree',
                            empty: '请选择学分级别',
                            prop: {
                                name: 'scoreLevelName',
                                value: 'scoreLevelId',
                            },
                            data: res.data
                        })
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
            }


            // 通知摘要，通知为重要消息时，摘要为必填项
            form.on('select(noticeImportance)', function (data) {
                if (data.value == '1') {
                    $('#noticeAbstract').attr("lay-verify", "required");
                } else {
                    $('#noticeAbstract').attr("lay-verify", "");
                }

            });

            //清空表单，原生的无法清空
            let removeFormValue = function () {
                fileUrls = [];
                isCanChooseBtn(true);
                isCanSubmitBtn(true);
                timestamp = new Date().getTime();
                $("#fileList").html("");

                form.render();
            }
            //公共ajax
            let commonAjax = function (type = "get", url, data, failFun, successFun) {
                $.ajax({
                    type: type,
                    url: url,
                    data: data,
                    success: function (res) {
                        successFun(res);
                    },
                    error: function (res) {
                        failFun();
                    }
                });
            }
            // 鼠标悬停提示特效
            $("#hint").hover(function () {
                openMsg();
            }, function () {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', { tips: [1, '#ff6700'], time: 30000 });
            };

            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
                removeFormValue();
            }

            window.showReadUnreadDetail=function (noticeId) {
                    layer.open({
                        type: 2,
                        title: '详细情况明细',
                        content: 'NoticeNewsDetails.html?noticeId=' + noticeId,
                        btn: ['关闭'],
                        btnAlign: 'c',
                            yes: function(){
                                layer.closeAll();
                            },
                            area: ['100%', '100%']
                    })
            }
        });

    </script>
