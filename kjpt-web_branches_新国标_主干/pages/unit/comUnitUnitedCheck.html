<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">

    <script type="text/javascript" src="../../js/api/cpt.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/common.js"></script>
    <script  type="text/javascript"  src="../../js/layui-v2.6.8/layui/layui.js"></script>
    <style>
        .layui-table-cell {
            height:auto;
        }
        .layui-layer-content {
            overflow: visible !important;
        }

        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui_display {
            flex: 1 auto;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }

        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }
        .layui-table-tool-temp {
            padding-right: 10px;
        }
    </style>
</head>

<body style="background-color: white;">

    <div class="layui-fluid">
        <div class="layui-card">
            
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">

                    <div class="layui-inline">
                        <label class="layui-form-label">申请时间</label>
                        <div class="layui-input-inline"  style="float: left;">
                            <input type="text" class="layui-input" id="applyTime" readonly=""
                                    placeholder="请选择">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">审核状态</label>
                        <div class="layui-input-block">
                            <select name="checkStatus" id="checkStatus">
                                <option value="0">未审核</option>
                                <option value="1">审核通过</option>
                                <option value="2">审核不通过</option>
                                <option value="-1">删除</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">联合体类型</label>
                        <div class="layui-input-block">
                            <select name="unitedType" id="unitedType">
                                <option value="">请选择</option>
                                <option value="0">医联体</option>
                                <option value="1">医共体</option>
                                <option value="2">城市医疗集团内部</option>
                            </select>
                        </div>
                    </div>
 
                    <div class="layui-inline">
                        <label class="layui-form-label">申请单位</label>
                        <div class="layui-input-block">
                            <input type="text" name="unitName" id="unitName" placeholder="请输入单位名称" autocomplete="off"
                               class="layui-input">
                        </div>
                    </div>

                    
                    <div class="layui-inline">
                         <label class="layui-form-label"style="width: auto;">是否查询本辖区所有单位</label>
                        <div class="layui-input-block" style="margin-left: 188px;">
                            <select name="jurisdiction" id="jurisdiction">
                                <option value="0">否</option>
                                <option value="1">是</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" lay-submit lay-filter="search">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                    </div> 
                </blockquote>
            </div>

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="project" lay-filter="project" style="margin: 0px 0px;"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- 联合体申请弹窗 -->
    <div id="unitedApplyModal" style="display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; z-index:9999; padding:24px 32px; border-radius:8px; box-shadow:0 2px 16px rgba(0,0,0,0.2); min-width:400px;">
        <div style="margin-bottom:16px;">
            <label id="checkMsgLabel">意见:</label>
            <input type="text" id="checkMsg" class="layui-input" placeholder="请输入意见">
        </div>
        <div style="text-align:right;">
            <button class="layui-btn layui-btn-primary" id="unitedApplyClose" style="margin-right:8px;">关闭</button>
            <button class="layui-btn layui-btn-normal" id="unitedApplySubmit">提交</button>
        </div>
    </div>

    <script type="text/html" id="bar">
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="checkPass">审核通过</button>
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="checkNoPass">审核不通过</button>

        <button class="layui-btn layui-btn-sm btnRounded" lay-event="enabledUnitUnited" style="float: right;">重新启用</button>
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="delUnitUnited" style="float: right;">删除联合体</button>
    </script>


    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element','laydate'], function() {
            var table = layui.table;
            var form = layui.form,laydate = layui.laydate;
            var $ = layui.jquery;
            var layer = layui.layer;
            var element = layui.element;
            var userid= localStorage.getItem("unit-id"),
            standardkindId=localStorage.getItem("standardkind-id"), 
            unitId= localStorage.getItem("unit-id"); 
            var unitUnitedIdList="";
            var unitUserType= localStorage.getItem("unit-user-type");
   
            // 日期范围
            laydate.render({
                elem:   '#applyTime',
                range:  true,
                done: function(value, date, endDate) {
                    if (date.year !== endDate.year) {
                        layer.msg("日期不允许跨年");
                        // 重置选择
                        // 重置选择
                        laydate.render({
                            elem: '#applyTime',
                            range: true
                        }).setValue('');
                    } 
                }
            });
            function doHandleMonth(month){
                var m = month;
                if(month.toString().length == 1){
                    m = "0" + month;
                }
                return m;
            }
            $(function() {
                var today = new Date();
                var beginDate=today.getFullYear()+'-01-01';
                var endDate=today.getFullYear()+'-01-01';

                var tYear = today.getFullYear();
                var tMonth = today.getMonth();
                var tDate = today.getDate();
                tMonth = doHandleMonth(tMonth + 1);
                tDate = doHandleMonth(tDate);

                $('#applyTime').val(beginDate+' - '+ tYear+"-"+tMonth+"-"+tDate );
                //重新渲染
                form.render('select');

                loaderTable(); 
                //点击关闭时
                $('#unitedApplyClose').on('click', function() {
                     //清空checkMsg
                    $('#checkMsg').val('');
                    $('#unitedApplyModal').hide();
                });

                // 提交按钮
                $('#unitedApplySubmit').on('click', function() {
                    var checkMsg = $('#checkMsg').val().trim();
                    if (unitedApplyType === 'nopass') {
                        if (checkMsg === '') {
                            layer.msg('请输入审核不通过原因');
                            return;
                        }
                        if (checkMsg.length > 200) {
                            layer.msg('审核不通过原因不能超过200字');
                            return;
                        }
                    } else if (unitedApplyType === 'delete') {
                        if (checkMsg.length > 200) {
                            layer.msg('删除意见不能超过200字');
                            return;
                        }
                    }
                    if (UnitsedId === '') {
                        layer.msg('请先选择要操作的联合体');
                        return;
                    }
                    var status = unitedApplyType === 'nopass' ? 2 : -1;
                    $.get(huayi_personorg_url + 'comunitunited/checkComUnitUnited', {
                        unitedIds: UnitsedId,
                        checkMsg: checkMsg,
                        checkStatus: status,
                        checkUnitId: unitId
                    }).then(function(response) {
                        if (response.status === 200) {
                            layer.msg(unitedApplyType === 'nopass' ? '审核不通过成功' : '删除成功');
                            $('#unitedApplyModal').hide();
                            UnitsedId = '';
                            $('#checkMsg').val('');
                            loaderTable();
                        } else {
                            layer.msg('操作失败: ' + response.data.message);
                        }
                    }).catch(function(error) {
                        console.error('Error:', error);
                        layer.msg('网络错误，请稍后再试');
                    });
                });
                
               


            }); 
            // 表格相关操作
            // 表格配置
            function loaderTable() {
                var applyTime = $('#applyTime').val();
                var checkStatus = $('#checkStatus').val();
                // 获取开始和结束日期
                var dates = applyTime.split(' - ');
                var startDate = dates[0] ? dates[0].trim()+" 00:00:00" : '';
                var endDate = dates[1] ? dates[1].trim()+" 23:59:59" : '';

                table.render({
                    elem: '#project',
                    url: huayi_personorg_url + 'comunitunited/getComUnitUnitedCheckList',
                    method: 'get',
                    where: {
                        standardkindId: standardkindId,
                        startDate: startDate,
                        endDate: endDate,
                        checkStatus: checkStatus,
                        unitName: $('#unitName').val().trim(),
                        jurisdiction: $('#jurisdiction').val().trim(),
                        unitId: unitId, // 传入当前单位ID
                        unitUserType:unitUserType,
                        unitedType: $('#unitedType').val()// 联合体类型
                    },
                    toolbar: '#bar',
                    defaultToolbar: [],
                    cols: [[
                        {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                            field:'CheckCustom' ,title:'选择',align:'center',width:80,templet:function (d) {
                                var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.unitedid+'"><i class="layui-icon"></i>';
                                // 可重复审核
                                // if( d.checkStatus==1){
                                //     return '审核通过'
                                // }else if(d.checkStatus==2){
                                //     return '审核不通过'
                                // }else if(d.checkStatus==0){
                                //     return templateHtml;
                                // }else if(d.checkStatus==-1){
                                //     return '已删除';
                                // }
                                return templateHtml;
                            }
                        },
                        { field: 'unitedid', align: 'center', title: 'unitedid', hide:true},
                        { field: 'unitName', align: 'center', title: '主单位', minWidth: 160 },
                        { 
                            field: 'unitList', 
                            align: 'center', 
                            title: '联合单位', 
                            minWidth: 160, 
                            templet: function(d){
                                return `<div style="white-space:normal;word-break:break-all;">${d.unitList || ''}</div>`;
                            }
                        },
                        { field: 'applyTime', align: 'center', title: '申请时间', minWidth: 160 },
                        { 
                            field: 'unitedType', 
                            align: 'center', 
                            title: '联合体类型',
                            templet: function(d) {
                                if (d.unitedType === '0' || d.unitedType === 0) return '医联体';
                                if (d.unitedType === '1' || d.unitedType === 1) return '医共体';
                                if (d.unitedType === '2' || d.unitedType === 2) return '城市医疗集团内部';
                                return '';
                            }
                        },
                        { field: 'unitCheck', align: 'center', title: '联合体状态', minWidth: 160 }, 
                        { field: 'checkMsg', align: 'center', title: '不通过原因', minWidth: 160}
                    ]],
                    page:true,
                    limit : 10,
                    limits : [10,20,30,50],
                    height: 'full-255',
                    done: function () {
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });
                    },
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };
  
            // 存储已添加的单位，防止重复
            var addedUnits = [];
            var UnitsedId = '';

            table.on('sort(project)', function(obj){ //sort 是工具条事件名
                //如果你的表格列表里有设置排序sort, 需要添加一个sort监听事件, 根据单元格内容的高度重新计算表格的行高
                $(".layui-table-main tr").each(function(index, val) {
                    $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                });
            });

            table.on('toolbar(project)', function(obj) {
                const checkStatus = table.checkStatus(obj.config.id);
                const data = checkStatus.data;
                if (['checkNoPass', 'checkPass', 'delUnitUnited', 'enabledUnitUnited'].includes(obj.event)) {
                    if (data.length === 0) {
                        let msg = {
                            checkNoPass: '请选择要审核不通过的联合体',
                            checkPass: '请选择要审核通过的联合体',
                            delUnitUnited: '请选择要删除的联合体',
                            enabledUnitUnited: '请选择要重新启用的联合体'
                        }[obj.event];
                        layer.msg(msg);
                        return;
                    }
                    UnitsedId = data.map(item => item.unitedid).join(',');
                }

                const request = (status, successMsg) => {
                    $.get(huayi_personorg_url + 'comunitunited/checkComUnitUnited', {
                        unitedIds: UnitsedId,
                        checkStatus: status,
                        checkUnitId: unitId
                    }).then(function(response) {
                        if (response.status === 200) {
                            layer.msg(successMsg);
                            loaderTable();
                        } else {
                            layer.msg(response.msg);
                        }
                    }).catch(function(error) {
                        console.error('Error:', error);
                        layer.msg('网络错误，请稍后再试');
                    });
                };

                switch (obj.event) {
                    case 'checkNoPass':
                        unitedApplyType = 'nopass';
                        $('#checkMsgLabel').html('<span style="color:red;">*</span>审核不通过原因:');
                        $('#checkMsg').attr('placeholder', '请输入审核不通过原因');
                        $('#unitedApplyModal').show();
                        $('#checkMsg').val('');
                        break;
                    case 'delUnitUnited':
                        unitedApplyType = 'delete';
                        $('#checkMsgLabel').html('删除意见:');
                        $('#checkMsg').attr('placeholder', '请输入删除意见');
                        $('#unitedApplyModal').show();
                        $('#checkMsg').val('');
                        break;
                    case 'checkPass':
                        request(1, '审核通过成功');
                        break;
                    case 'enabledUnitUnited':
                        request(0, '重新启用成功');
                        break;
                }
            });

            // 监听查询
            form.on('submit(search)', function (data) {

                //日期不能为空
                var applyTime = $('#applyTime').val();
                if (applyTime === '') {
                    layer.msg('申请时间不能为空');
                    return false;
                }
                loaderTable();
            });
    
        
        });
    </script>

</body>

</html>
