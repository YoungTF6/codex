<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>单位信息查看</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
</head>

<body>

    <div class="layui-fluid">
        <div class="layui-card">
    
    
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
    
                    <div class="layui-inline">
                        <label class="layui-form-label">单位编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="selUnitId" id="selUnitId" placeholder="请输入单位编号" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">单位名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="selUnitName" id="selUnitName" placeholder="请输入单位名称" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
    
    
                    <div class="layui-inline">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                           lay-filter="table-search" data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
    
                </blockquote>
            </div>
    
    
            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="comUnit" lay-filter="comUnit" style="margin: 0px 0px;">
                </table>
            </div>
    

        </div>
    </div>

    </body>
</html>

<script id="detail">
       <a class="layui-btn layui-btn-xs  layui-btn-normal" lay-event="details"><i
            class="layui-icon layui-icon-edit"></i>详情</a>
</script>



<script>
  layui.config({
        base:'../../js/layui/ext/'
    }).extend({
    }).use(['form','table','layer'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var unitId = localStorage.getItem("unit-id");

        window.loaderTable = function(){
            table.render({
                elem: '#comUnit',
                url:  huayi_personorg_url+'comunit/unitAdminList',
                title: '用户表',
                defaultToolbar: [],
                where: {
                    selUnitId: $('#selUnitId').val(),
                    selUnitName: $('#selUnitName').val(),
                    loginUnitId: unitId
                },
                cols: [[
                    {field: 'unitId', title: '单位编号',width: 120, align:"center",sort: true},
                    {field: 'unitName', title: '单位名称',width: 200, align:"center", sort: true},
                    {field: 'parentUnitName', title: '上级单位',width: 200, align:"center", sort: true},
                    {title: '管理员详情',width: 150, toolbar: '#detail', align:"center"},
                    {field: 'admin1Name', title: '管理员姓名',width: 150, align:"center"},
                    {field: 'admin1Phone', title: '管理员办公电话',width: 150,align:"center"},
                    {field: 'admin1Mobile', title: '管理员手机号',width: 150, align:"center"},
                    {field: 'unitAddress', title: '单位地址',width: 150, align:"center"},
                    {field: 'unitMail', title: '单位邮箱',width: 150, align:"center"},  
                ]],
                cellMinWidth: 100,
                id: "comUnit",
                height: 'full-155',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });
        }

        table.on('tool(comUnit)', function (obj) {
            let datas = obj.data;
            
            if (obj.event === 'details') {
                layer.open({
                    title   : false,
                    area    : [ '950px', '700px' ],
                    type    : 2,
                    content : 'comUnitAdminDetail.html?unitId=' + datas.unitId + '&opt=details'
                });
            }

        });


        $(function(){
            loaderTable();
        })


    });

</script>
