    <script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        // treeSelect: 'treeSelect'
    }).use(['table', 'layer', 'form', 'laypage', 'treeSelect'], function () {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var laypage = layui.laypage;
            var treeSelect = layui.treeSelect;
            let layer = layui.layer;
            var cmeStandardKindId = localStorage.getItem('choose-standard-id');
            var nextOrderIndex = 0;

            window.loaderTable = function () {
                if (!chooseStandard()) return;

                // 表格数据渲染
                var tableIns = table.render({
                    elem: '#typeTable',
                    url: huayi_sjwh_url + 'cmegrantscorestandard',
                    title: '课程类型列表',
                    defaultToolbar: [],
                    // initSort: {
                    //     field: 'rank' //排序字段，对应 cols 设定的各字段名
                    //     ,type: 'asc' //排序方式  asc: 升序、desc: 降序、null: 默认排序
                    // },
                    //
                    where: {
                        // topunitId: $('#top_unit_id').val(), 
                        parama: $('#selectName').val(), title: $('#titlea').val(),
                        standardId: localStorage.getItem('choose-standard-id')
                    },
                    cols: [[
                        { field: 'rank', title: '序号', width: 60, templet: '#rank', align: "center" },
                        { field: 'id', width: 80, title: '内排序' },
                        { field: 'topUnitId', width: 150, align: 'center', title: '套标准id', hide: true },
                        { field: 'grantscoreStandardId', width: 150, align: 'center', title: '授分标准id', hide: true },
                        { field: 'name', width: 200, title: '授分标准名称' },
                        { field: 'description', width: 200, title: '授分标准规定' },
                        {
                            field: 'kind', align: 'center', title: '类型', templet:
                                function (d) {
                                    if (d.kind == '01') {
                                        return '成员';
                                    } else {
                                        return '数量';
                                    }
                                }
                        },
                        { field: 'scoreLevelName', align: 'center', width: 200, title: '学分级别' },
                        { field: 'type', align: 'center', title: '学分级别', hide: true },
                        { field: 'grantscoreType', align: 'center', title: '标准分类', 
                            templet: function (d) {
                                // 10-继教项目, 20-科研、专利、论文、著作, 30-进修、培训、考试, 40-其他
                                if (d.grantscoreType == 10) {
                                    return '继教项目';
                                }
                                if (d.grantscoreType == 20) {
                                    return '科研、专利、论文、著作';
                                }
                                if (d.grantscoreType == 30) {
                                    return '进修、培训、考试';
                                }
                                if (d.grantscoreType == 40) {
                                    return '其他';
                                }
                                return '';
                            }
                        },
                        { field: 'grantscoreTypeOrder', align: 'center', title: '分类排序' },
                        { field: 'unitName', align: 'center', title: '单元名称' },
                        { field: 'unitNum', align: 'center', title: '单元数量' },
                        { field: 'unitScore', align: 'center', title: '单元学分' },
                        { field: 'unitMaxscore', align: 'center', title: '最高限分' },
                        { field: 'score1', align: 'center', title: '分1' },
                        { field: 'score2', align: 'center', title: '分2' },
                        { field: 'score3', align: 'center', title: '分3' },
                        { field: 'order1', align: 'center', title: '成员1' },
                        { field: 'order2', align: 'center', title: '成员2' },
                        { field: 'order3', align: 'center', title: '成员3' },
                        { align: 'center', width: 250, fixed: 'right', width: 140, toolbar: '#barDemo', title: '操作' }
                    ]],
                    toolbar: '#barDemo1',
                    cellMinWidth: 100,
                    id: "typeTable",
                    height: 'full-155',
                    page: true,
                    limit: 50,
                    limits: [10, 20, 30, 40, 200],
                    parseData: function (res) {
                        return {
                            "code": res.code, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.total, //解析数据长度
                            "data": res.data.records //解析数据列表
                        }

                    },
                    done: function (res) {
                        if (res.data != null && res.data.length > 0) {
                            nextOrderIndex = res.data[res.data.length - 1].id + 1;
                        } else {
                            nextOrderIndex = 1;
                        }
                    }
                });

                        let order = fields['order' + i];
                        if (score > 0) {

                        }
                    }
                    description = description.substring(0, description.length - 1);

                ]
