<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>达标标准浏览（医疗机构）</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>

    <!-- 工具 -->
    <script type="text/javascript" src="/js/base64.js"></script>
    <script type="text/javascript" src="/js/tools/urlTools.js"></script>

    <style>
        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .table_toolbar_right {
            float: right;
            position: relative;
            right: -5px;
            top: -3px;
        }

        #cme-unit-level {
            margin: 15px 20px;
            color: #446DBD;
        }
        .font-bold {
            font-weight: bold;
        }


        /* 新增代码 */

        .lay_box {
            display: flex;
            flex-wrap: wrap;
            /* padding: 15px; */
        }
        .tit_box{
            margin-bottom: 10px;
            color: #446DBD;
        }
        .lay_item{
            width: 230px;
            margin:20px;
        }
        .xx_list{
            background: #F3F1F2;
        }
        .mc_box{
            background: #f9f9f9;
            padding: 10px;
            text-align: center;
        }
        .lay_list{
            padding: 15px;
            height: 120px;
            overflow: auto;
        }
        .lay_list ul li{
            color: #446DBD;
            padding: 5px 0;
            cursor: pointer;
        }
    </style>
</head>

<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">

                <!-- 达标级别 -->
                <div id="cme-unit-level" class="font-bold">
                    <span class="table_toolbar_left">
                        适用医院级别：<span></span>
                    </span>
                    <span class="table_toolbar_right">
                        <!-- <a class="layui-btn layui-btn-sm" lay-event="export_word" id="export_word">导出Word</a> -->
                    </span>
                </div>

                <!-- 表格形式 -->
                <div class="lay_box">
                </div>

            </div>

        </div>
    </div>


    <!-- 表头工具条 -->
    <!-- <script type="text/html" id="table_toolbar">
        <span class="table_toolbar_right">
            <a class="layui-btn layui-btn-sm" lay-event="export_excel">导出Excel</a>
        </span>
    </script> -->


    <script type="text/javascript">
        const unitId            = localStorage.getItem('unit-id'),
              unitName          = localStorage.getItem('unit-name'),
              username          = localStorage.getItem('user-name'),
              cmeStandardKindId = localStorage.getItem('choose-standard-id');

        const cmePassStandardId = getQueryString('cmePassStandardId');

        layui.config({
            base : '/js/layui/ext/'
        }).extend({
            excel : 'excel'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer', 'excel'], function () {
            var table   = layui.table,
                form    = layui.form,
                $       = layui.jquery,
                layer   = layui.layer,
                excel   = layui.excel;

            window.layer = layui.layer;

            var statisticalYearList = [];
            var unitLevelId="";

            /* 页面初始化 */
            $(() => {
           
                // 加载内容
                loadContent();

            });


            /* 加载职称列表 */
            window.loadTitleList = () => {
                let msg        = '<span style="color: #666666;">&nbsp;正在查询&nbsp;···</span>',
                    load_index = layer.msg(msg, { icon: 16, shade: 0.3, time: 0 });
                            //    = layer.load(2, { shade: 0.3 });

                axios({
                    method       : 'get',
                    // url          : huayi_sjwh_url + 'comTitle/tree/' + cmeStandardKindId,
                    url          : huayi_sjwh_url + 'cmePassStandard/scope2/' + cmePassStandardId,
                    responseType : 'json',
                    params       : {
                        unitId : unitId
                    }
                }).then(res => {
                    if (res.status == 200 && res.data.status == 200) {
                        $('.lay_box').html('');
                        let data = res.data.data.title;
                        debugger
                        $('#cme-unit-level .table_toolbar_left span').html(res.data.data.hospitalLevel.join(", "));

                        for (let i = 0; i < data.length; i++) {
                            if(!data[i].children){
                                continue;
                            }
                            let lay_item = $('<div class="lay_item"></div>'),
                                tit_box  = $('<div class="tit_box font-bold"></div>');
                            tit_box.append(data[i].name);

                            let xx_list    = $('<div class="xx_list"></div>'),
                                mc_box     = $(''),
                                lay_list   = $('<div class="lay_list"></div>'),
                                ul         = $('<ul></ul>'),
                                title_list = data[i].children ? data[i].children : [];
                            for (let j = 0; j < title_list.length; j++) {
                                let li = $('<li onclick="showPassStandardForTitle(' +
                                        '\'' + title_list[j].value + '\', \'' + title_list[j].name + '\')">' +
                                        title_list[j].name + '</li>');
                                ul.append(li);
                            }
                            lay_list.append(ul);
                            xx_list.append(mc_box).append(lay_list);

                            lay_item.append(tit_box).append(xx_list);
                            $('.lay_box').append(lay_item);
                        }
                        layer.close(load_index);
                    } else {
                        layer.close(load_index);
                        layer.msg('获取职称列表失败', { icon : 2, time: 1000 });
                    }
                }).catch(error => {
                    layer.close(load_index);
                    layer.msg('获取职称列表异常', { icon : 7, time: 1000 });
                    console.log(error);
                });
            }

            /* 加载内容 */
            window.loadContent = () => {
                loadTitleList();
            }

        });
    </script>
</body>

</html>
