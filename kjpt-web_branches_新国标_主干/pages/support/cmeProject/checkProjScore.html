<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>学分审核</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

    </style>
</head>
<body style="background-color: white;">

<div class="layui-card">
    <!-- 搜索框区域 -->
    <div class="layui-form layui-card-header layuiadmin-card-header-auto" lay-filter="searchForQualifiedPersonnel">
        <!-- <blockquote class="layui-form layui-form-item layui-elem-quote one-btn"> -->
            <div class="layui_mess">
                <div class="layui_display">
            <div class="layui-inline">
                <label class="layui-form-label">职称</label>
                <div class="layui-input-block">
                    <input type="text" name="title" id="title_id" placeholder="输入职称"
                           autocomplete="off" class="layui-input">
<!--                    <select name="title" id="title"></select>-->
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">专业</label>
                <div class="layui-input-block">
                    <input type="text" name="knowledge" id="knowledge_id" placeholder="输入专业"
                           autocomplete="off" class="layui-input">
<!--                    <select name="scoreLevel" id="scoreLevel">-->
<!--                        <option value="">全部</option>-->
<!--                    </select>-->
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">所在单位</label>
                <div class="layui-input-block">
                    <input type="text" name="unitId" id="unitId_id" placeholder="所在单位"
                           autocomplete="off" class="layui-input">
<!--                    <select name="unitId" id="medicalType">-->
<!--                        <option value="">全部</option>-->
<!--                        <option value="1" selected>西医</option>-->
<!--                        <option value="2">中医</option>-->
<!--                    </select>-->
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">科室</label>
                <div class="layui-input-block">
                    <input type="text" name="dept" id="dept_id" placeholder="所在科室"
                           autocomplete="off" class="layui-input" >
<!--                    <select name="dept" id="dept">-->
<!--                        <option value="">全部</option>-->
<!--                    </select>-->
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">是否参与项目评价</label>
                <div class="layui-input-block" style="margin-top: 5px;">
                    <select name="evaluation" id="evaluation_id">
                        <option value="">全部</option>
                        <option value=true>是</option>
                        <option value=false>否</option>
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">是否考试通过</label>
                <div class="layui-input-block" style="margin-top: 5px;">
                    <select name="passingTheExam" id="passingTheExam_id">
                        <option value="">全部</option>
                        <option value=true>是</option>
                        <option value=false>否</option>
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">审核状态</label>
                <div class="layui-input-block" style="margin-top: 8px;">
                    <select name="checkState" id="checkState">
                        <option value=0>未审核</option>
                        <option value=3>审核通过</option>
                        <option value=2>审核不通过</option>
                        <option value=1>退回修改</option>
                        <option value=-1 >全部</option>
                        <!-- <option value=4>审核中</option> -->
                    </select>
                </div>
            </div>
            <div class="layui-inline" style="padding-left: 25px">
                <button class="layui-btn layui-btn-sm btnRounded" lay-submit
                onclick="loaderTable()">
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
               查询
                </button>
            </div>
        </div>
        <div class="layui_display">
            
        </div>
        </div>
    </div>
<!--        <div style="text-align: center; line-height: 0; padding-top: 20px;">-->
<!--            <a style="margin: 0 auto; width: 100px; font-size: 10px; color: #009688;"-->
<!--               href="javascript:void(0);" id="showConditionBtn">展开 ∨</a>-->
<!--        </div>-->

    </div>

    <!--        表格区域-->
    <div class="layui-card-body layui_body_box">
        <table class="layui-table" id="downInfo" lay-filter="downInfo_filter" style="margin: 0px 0px;">
        </table>
    </div>

<!--审核弹出框-->
<div id="remark" style=" display:none;text-align: center">

    <form class="layui-form" style="padding: 30px;" id="form-ComDept" lay-filter="add-filter">
        <div class="layui-form-item layui-form-text" >
            <div class="layui-inline">
                <label class="layui-form-label">审核说明</label>
                <div class="layui-input-block">
                    <textarea  type="text" name="remark" id="remark_id" autocomplete="off" class="layui-textarea"></textarea>
                </div>
            </div>
        </div>
        <button type="button" class="layui-btn layui-btn-radius layui-btn-primary" onclick="choose()">选择</button>
    </form>
</div>

</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-sm btnRounded" lay-event="checkPass">审核通过</a>
    <a class="layui-btn layui-btn-sm layui-btn-danger" lay-event="checkNoPass">审核不通过</a>
    <a class="layui-btn layui-btn-sm layui-btn-warm" lay-event="returnToModify">退回修改</a>
</script>


<script>
    var type=getUrlParam("type");
    var downId= getUrlParam("downId");
    let myIndex;
    let CheckStatusDTOs=[], data={};
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        myTable: 'table'
    }).use(['table', 'form','myTable','laydate','laytpl'], function () {
        var table = layui.myTable;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var laytpl = layui.laytpl;


        window.loaderTable =function () {
            table.render({
                elem: '#downInfo',
                title: '周期信息',
                url: huayi_projectscore_url + 'cmeProjScore/reviewForCmeProjScore',
                where: {
                    unitId: localStorage.getItem("unit-id") =='{}' ? '' : localStorage.getItem("unit-id"),
                    downId: downId,
                    titleName: $("#title_id").val(),
                    // knowledgeId: $("#knowledge_id").val(),
                    specName: $("#knowledge_id").val(),
                    unitName: $("#unitId_id").val(),
                    deptName: $("#dept_id").val(),
                    recognitionPass: $("#recognitionPass_id").val(),
                    evaluation: $("#evaluation_id").val(),
                    passingTheExam: $("#passingTheExam_id").val(),
                    scoreMode: '0',
                    checkState: $("#checkState").val() === undefined ? null : $("#checkState").val(),
                    cmeStandardKindId: localStorage.getItem("standardkind-id") =='{}' ? '' : localStorage.getItem("standardkind-id")
                },
                cols: [[
                    // {align: 'center', title: '审核',templet: '#rowBar1', hide: type==1},
                    // {align: 'center', title: '查看考勤信息',templet: '#rowBar' ,hide: type==2},
                    // {align: 'center', toolbar: '#rowBar', type: 'checkbox', title: '选择'},
                    {field: 'personId', align: 'center', title: '人员Id', hide: true},
                    {field: 'scoreId', align: 'center', title: '学分id', hide: true},
                    {
                        field: 'recognitionPass',
                        align: 'center',
                        title: '是否通过人脸识别',
                        event: 'recognitionPass_event',
                        width: '150',
                        hide: false,
                        templet: function (d) {
                            if (d.recognitionPass) {
                                return '<i class="layui-icon" style="color: #00B83F">&#xe605;</i>'
                            } else {
                                return '<i class="layui-icon" style="color: red">&#x1006;</i>'
                            }
                        }
                    },
                    {
                        field: 'evaluation',
                        align: 'center',
                        title: '是否参与评价',
                        event: 'evaluation_event',
                        width: '150',
                        hide: false,
                        templet: function (d) {
                            if (d.evaluation) {
                                return '<i class="layui-icon" style="color: #00B83F">&#xe605;</i>'
                            } else {
                                return '<i class="layui-icon" style="color: red">&#x1006;</i>'
                            }
                        }
                    },
                    {
                        field: 'passingTheExam',
                        align: 'center',
                        title: '是否通过考试',
                        hide: false,
                        event: 'viewTheResults',
                        width: '150',
                        templet: function (d) {
                            if (d.passingTheExam) {
                                return '<i class="layui-icon" style="color: #00B83F">&#xe605;</i>'
                            } else {
                                return '<i class="layui-icon" style="color: red">&#x1006;</i>'
                            }
                        }
                    },
                    {field: 'userName', align: 'center',width: '150', title: '姓名', hide: false},
                    {field: 'cart', align: 'center',width: '150', title: '身份证', hide: false},
                    {field: 'personNo', align: 'center',width: '150', title: '人员编号', hide: false},
                    {field: 'score', align: 'center',width: '150', title: '学分', hide: false},
                    {field: 'period', align: 'center',width: '150', title: '学时', hide: false},
                    {field: 'title', align: 'center',width: '150', title: '职称', hide: false},
                    {field: 'spec', align: 'center', width: '150',title: '专业', hide: false},
                    {field: 'personUnitName', align: 'center',width: '150', title: '所在单位', hide: false},
                    {field: 'dept', align: 'center',width: '150', title: '科室', hide: false},
                    {field: 'setUnitName', align: 'center',width: '150', title: '授分单位', hide: false},
                    {field: 'checkUnitName', align: 'center',width: '150', title: '审核单位', hide: false},
                    {field: 'checkTime', align: 'center',width: '150', title: '审核时间', hide: false},
                    {field: 'attendanceTime', align: 'center',width: '150', title: '考勤时间', hide: false},
                    {field: 'scoreMode', align: 'center',width: '150', title: '录入方式', hide: false},
                    {field: 'attendanceAddress', align: 'center',width: '150', title: '二维码扫码地址', hide: false},
                    {field: 'checkPersonName', align: 'center',width: '150', title: '审核用户', hide: false},
                    {field: 'noPassReason', align: 'center',width: '150', title: '审核意见', hide: false},
                    {field: 'checkStatus', align: 'center',width: '150', title: '审核状态', hide: false},
                    {field: 'flowChainId', align: 'center',width: '150', title: '流id', hide: true},
                    {field: 'flowChainState', align: 'center',width: '150', title: '流审核状态', hide: true},
                ]],
                defaultToolbar: [],
                // toolbar: "#rowBar",
                id: "teachersListTable",
                page: true,
                limits: [10, 50, 100, 150, 300],
                height: 'full-200',
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
            })
        }

        loaderTable();
        table.on('tool(downInfo_filter)',function (obj) {
            var downId=obj.data.downId;
            if (obj.event === 'recognitionPass_event'){
                if (obj.data.recognitionPass) {
                    layer.msg("人脸识别通过")
                }else {
                    layer.msg("人脸识别未通过")
                }
            }else if (obj.event === 'evaluation_event') {
                if (obj.data.evaluation) {
                    layer.msg("已对项目评价")
                }else {
                    layer.msg("未对项目评价")
                }

            }else if (obj.event === 'viewTheResults') {
                if (obj.data.passingTheExam) {
                    layer.open({
                        type: 2,
                        content: '../CmeExamPaper.html?projectId  =' + projectId,
                        area: ['90%', '90%'],
                        title: '考试结果',
                    })
                }else {
                    layer.msg("未通过考试不能查看")
                }
            }
        })

        table.on('toolbar(downInfo_filter)',function (obj) {
            debugger
            let checkStatus = table.checkStatus('teachersListTable');
            if (checkStatus.data.length > 0) {
                for (var i = 0; i < checkStatus.data.length; i++) {
                    var checkStatusDTO = {};
                    checkStatusDTO.businessId = checkStatus.data[i].scoreId
                    checkStatusDTO.flowChainId = checkStatus.data[i].flowChainId
                    checkStatusDTO.flowChainState = checkStatus.data[i].flowChainState
                    CheckStatusDTOs.push(checkStatusDTO)
                }
            } else {
                layer.msg("请选择审核人员");
                return;
            }
            data.dataList=CheckStatusDTOs;
            data.unitId=localStorage.getItem("unit-id") == '{}' ? null : localStorage.getItem("unit-id");
            data.userName=localStorage.getItem("user-name") == '{}' ? null : localStorage.getItem("user-name");
            if (obj.event === 'checkPass'){
                data.checkStatus=3;
                check();
            }else if (obj.event === 'checkNoPass'){
                data.checkStatus=2;
                layer.open({
                    type: 1,
                    title: '审核',
                    content: $('#remark'),
                    skin: '',
                    area: ['80%', '80%'],
                    btn: ['确定','取消'],
                    yes: function (index, layero) {
                        data.checkMemo=$("#remark_id").val();
                        check();
                    },
                    btn2: function (index, layero) {
                        data={};
                        CheckStatusDTOs=[];
                        layer.closeAll()
                    }
                })
            }else if (obj.event === 'returnToModify') {
                data.checkStatus=1;
                layer.open({
                    type: 1,
                    title: '审核',
                    content: $('#remark'),
                    skin: '',
                    area: ['80%', '80%'],
                    btn: ['确定','取消'],
                    yes: function (index, layero) {
                        data.checkMemo=$("#remark_id").val();
                        check();
                    },
                    btn2: function (index, layero) {
                        data={};
                        CheckStatusDTOs=[];
                        layer.closeAll()
                    }
                })
            }
        })

        // 审核提交数据
        window.check=function () {
            CheckStatusDTOs=[]
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + 'cmeProjScore/checkScore',
                contentType: 'application/json;charset=UTF-8',
                data: JSON.stringify(data),
                dataType: 'json',
                success: function (res) {
                    layer.closeAll();
                    loaderTable();
                    layer.msg(res.data)
                    data={};
                },
                error: function (res) {
                    layer.msg("发送请求失败")
                }
            })

        }

        window.choose=function () {
            // 获取点击选择的数据并填充到输入框
            myIndex = layer.open({
                type: 2,
                title: '选择原因',
                content: '../maintenanceOfAuditOpinions/CmeCheckReasonForLayer.html',
                skin: '',
                area: ['60%', '60%'],
            })
        }
        window.closeMyLayer=function (data) {
            $("#remark_id").val(data);
            layer.close(myIndex);
        }
    })
</script>
</body>
</html>
