<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>举办前申请</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <link rel="stylesheet" href="/js/layui/ext/selectInput/selectInput.css" media="all">
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/tools/verification.js"></script>
    <script type="text/javascript" src="/js/tools/urlTools.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <style>
        .btn-apply {
            color: #70B603;
        }

        #implementationFeedback .layui-card {
            margin-bottom: 0px;
            width: 96%;
            margin: auto;
        }

        #implementationFeedback .tab-default {
            width: 55px;
        }

        #tabPage {
            width: 96%;
            margin: 0px auto 20px;
            min-height: 380px;
            border: 1px solid #e6e6e6;
            border-top: 0px;
            padding-top: 25px;
        }

        #implementationFeedback .project-form {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        #implementationFeedback .project-form .layui-form-item {
            min-width: 300px;
            max-width: 460px;
            width: 45%;
        }

        #implementationFeedback .project-form .layui-form-item1 {
            width: 88%;
            margin-bottom: 15px;
        }

        #implementationFeedback .project-form .layui-input-block {
            display: flex;
            align-items: center;
            text-align: left;
        }

        .js-project-image>div,
        .js-project-textbook>div {
            width: 90%;
            margin: 0px auto 15px;
            padding: 8px 0px;
            border: 1px solid;
            min-height: 70px;
            position: relative;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .js-project-textbook>div {
            min-height: 350px;
        }

        .js-project-image span {
            display: inline-block;
            margin-right: 7px;
        }

        .meeting-notice>div,
        .meeting-overrall-view>div,
        .student-signin-table>div,
        .exem-questions>div,
        .feedback-table>div {
            width: 100%;
            margin-bottom: 5px;
        }

        #tabPage .meeting-notice::after {
            content: "会议通知和议程";
        }

        #tabPage .meeting-overrall-view::after {
            content: "会议全景照片";
        }

        #tabPage .student-signin-table::after {
            content: "学员签到表";
        }

        #tabPage .exem-questions::after {
            content: "考试考题";
        }

        #tabPage .feedback-table::after {
            content: "执行情况反馈表";
        }

        .js-project-textbook>div::after {
            content: "教材明细";
        }

        .js-project-image>div::after,
        .js-project-textbook>div::after {
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 0px;
            top: -11px;
            background: #FFF;
        }

        .meeting-notice>ul,
        .meeting-overrall-view>ul,
        .student-signin-table>ul,
        .exem-questions>ul,
        .feedback-table>ul {
            margin: 0px auto;
            width: 96%;
            display: flex;
            flex-wrap: wrap;
        }

        .meeting-notice>ul>li,
        .meeting-overrall-view>ul>li,
        .student-signin-table>ul>li,
        .exem-questions>ul>li,
        .feedback-table>ul>li {
            width: 20%;
            float: left;
        }

        .meeting-notice>ul>li>a:nth-child(1),
        .meeting-overrall-view>ul>li>a:nth-child(1),
        .student-signin-table>ul>li>a:nth-child(1),
        .exem-questions>ul>li>a:nth-child(1),
        .feedback-table>ul>li>a:nth-child(1) {
            width: 85px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meeting-notice>ul>li>a:nth-child(2),
        .meeting-overrall-view>ul>li>a:nth-child(2),
        .student-signin-table>ul>li>a:nth-child(2),
        .exem-questions>ul>li>a:nth-child(2),
        .feedback-table>ul>li>a:nth-child(2) {
            margin-left: 0px;
        }

        .js-project-tab>div {
            width: 90%;
            margin: 0px auto;
        }

        .js-hidden,
        .js-project-image>.js-hidden {
            display: none;
        }

        .flow-detail-window {
            padding: 10px;
        }

        .flow-detail-window>div {
            font-weight: 900;
            font-size: 20px;
            text-align: center;
            margin: 15px auto 35px;
        }

        .flow-detail-window>ul>li {
            min-height: 60px;
            position: relative;
        }

        .flow-detail-window>ul>li:not(:last-child)::before {
            content: "";
            border-left: 1px solid #3c3c3c;
            position: absolute;
            left: 105px;
            height: 100%;
        }

        .flow-detail-window>ul>li::after {
            content: "";
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid #3c3c3c;
            background: #FFF;
            position: absolute;
            left: 95px;
        }

        .flow-detail-window>ul>.approval-pass::after {
            content: "";
            border-radius: 50%;
            border: 1px solid #70B603;
            background: #70B603;
            position: absolute;
        }

        .flow-detail-window>ul>.approval-pass:nth-child(n-1):before {
            /* border-left: 1px solid #70B603; */
            border-color: #70B603;
        }

        .flow-detail-window>ul>li>div {
            display: block;
            min-width: 65px;
            max-width: 190px;
            margin: 0px 20px;
            float: left;
            min-height: 10px;
        }

        div.modleBoder {
            height: 100%;
            padding: 5px 30px;
            margin-bottom: 30px;
            /* margin-top:50px; */
            /* margin-left:150px; */
            border: 2px solid #CCCCCC;
            border-radius: 0.5em;
        }

        span.title {
            display: block;
            width: 150px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        @media only screen and (max-width: 1200px) and (min-width:1000px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 25%;
            }
        }

        @media only screen and (max-width: 999px) and (min-width:650px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 33%;
            }
        }

        @media only screen and (max-width: 649px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 50%;
            }
        }

        #upload-tip {
            padding-left: 10px;
            font-style: normal;
            font-size: 12px;
            color: #f25643;
        }

        .tips_inp {
            color: red;
        }

        
    </style>
</head>

<body>
    <div class="layui-fluid">
        <div class="layui-card">

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="applyBeforeHold" lay-filter="applyBeforeHold" style="margin: 0px 0px;">
                </table>
            </div>

            <!--        申请弹窗-->
            <div id="add-applyBeforeHold" style=" display:none;">
                <form class="layui-form" style="padding: 30px;" id="form-applyBeforeHold" lay-filter="add-filter">
                    <div class="modleBoder">
                        <span class="title" id="projectInfo" style="font-size: 20px; color: #05ACAC;">项目基本信息</span>
                        <div class="row">
                            <div class="layui-form-item" style="display: none">
                                <div class="layui-inline layui-inline-660">
                                    <label class="layui-form-label">主键</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="keyId" autocomplete="off" class="layui-input">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="projNameBlock" style="display: block;">
                                    <label class="layui-form-label">项目名称</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="projName" autocomplete="off" disabled="true" class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="projManagerBlock" style="display: block;">
                                    <label class="layui-form-label">项目负责人</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="projManager" autocomplete="off" disabled="true" class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="unitNameBlock" style="display: block;">
                                    <label class="layui-form-label">主办单位</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="unitName" autocomplete="off" disabled="true" class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="projNoBlock" style="display: block;">
                                    <label class="layui-form-label">项目编号</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="projNo" autocomplete="off" disabled="true" class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="holdTypeBlock" style="display: block;">
                                    <label class="layui-form-label">举办形式</label>
                                    <div class="layui-input-inline">
                                        <!-- <input type="text" name="holdFormName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled"> -->
                                        <select name="holdForm" id="holdForm" lay-filter="holdForm">
                                            <option value="">全部</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-inline" id="holdDayBlock" style="display: block;">
                                    <label class="layui-form-label">举办天数</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="holdDay" name="holdDay" autocomplete="off" disabled="true" 
                                            lay-verify="number" class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="scoreBlock" style="display: block;">
                                    <label class="layui-form-label">授予学分</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="score" name="score" autocomplete="off" disabled="true" 
                                            lay-verify="number" class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="linkmanBlock" style="display: block;">
                                    <label class="layui-form-label">联系人</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="linkman" name="linkman" autocomplete="off" placeholder="请输入联系人" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-inline" id="linkmanPhoneBlock" style="display: block;">
                                    <label class="layui-form-label">联系电话</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="linkmanPhone" name="linkmanPhone" autocomplete="off" placeholder="请输入联系电话" class="layui-input">
                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <div class="layui-inline" id="studyAddressBlock" style="display: block;">
                                    <label class="layui-form-label">项目举办地点</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="studyAddress" name="studyAddress" lay-verify="required|studyAddress" autocomplete="off" placeholder="" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-inline" id="periodBlock" style="display: block;">
                                    <label class="layui-form-label">学时</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="periodProj" name="period" autocomplete="off" disabled="true" 
                                             lay-verify="number" class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="limitPersonBlock" style="display: block;">
                                    <label class="layui-form-label">拟授分人数</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="limitPerson" id="limitPerson" autocomplete="off" placeholder="请输入拟授分人数" class="layui-input" lay-verify="number"
                                            onkeyup="value=value.replace(/[^\d]/g,'')">
                                        <!-- <span style="color: red;">设置为0，招收人数为无限制</span> -->
                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item">
                                <div class="layui-inline" id="remarkBlock" style="display: block;">
                                    <label class="layui-form-label">备注</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="remark" autocomplete="off" disabled="true" class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="setTemplateDiv" style="display: none;">
                                    <label class="layui-form-label">直播类型</label>
                                    <div class="layui-input-inline">
                                        <select name="setTemplate" id="setTemplate" lay-verify="required">
                                            <option value="ppt" selected>三分屏</option>
                                            <option value="alone">纯视频</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="layui-inline" id="maxWatchNumBlock" style="display: none;">
                                    <label class="layui-form-label">直播观看人数上限</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="maxWatchNum" id="maxWatchNum" autocomplete="off" placeholder="请输入直播观看人数上限" class="layui-input" onkeyup="value=value.replace(/[^\d]/g,'')">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modleBoder">
                        <span class="title" style="font-size: 20px; color: #05ACAC;">批次信息</span>
                        <div class="row">
                            <div class="layui-form-item">
                                <div class="layui-inline" style="display: block;">
                                    <label class="layui-form-label" style="width: 120px;">项目举办开始日期</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="startDt" autocomplete="off" class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                                <div class="layui-inline" style="display: block;">
                                    <label class="layui-form-label" style="width: 120px;">项目举办结束日期</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="endDt" autocomplete="off" class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="modleBoder">
                        <span class="title" id="teachInfo" style="font-size: 20px; color: #05ACAC;">课程信息</span>
                        <div class="row">
                            <div class="layui-card-body layui_body_box">
                                <table class="layui-table cmeProjPosDownList" id="cmeProjPosDownList" lay-filter="cmeProjPosDownList" style="margin: 0px 0px;">
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="modleBoder">
                        <span class="title" style="font-size: 20px; color: #05ACAC;">会议通知及日程</span>
                        <div class="row">
                            <div class="js-tab-page">
                                <!-- <div class="meeting-notice js-hidden"> -->
                                <div class="meeting-notice">
                                    <div class="js-upload-btn-box">
                                        <a class="layui-btn layui-btn-sm layui-btn-radius js-upload-btn" data-type="1">上传</a>
                                        <span id="upload-tip">请上传 PDF 格式文件或 JPG、PNG 图片文件，且小于10M</span>
                                    </div>
                                    <ul class="js-meeting-notice"></ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item" id="submitAndResetApply" style="width: 100%;">
                        <div class="layui-input-block" style="text-align: center;">
                            <button class="layui-btn" lay-submit lay-filter="saveInfo">保存并返回列表</button>
                            <button class="layui-btn" lay-submit lay-filter="application">保存并上报</button>
                        </div>
                    </div>

                    <div class="layui-form-item" id="submitAndResetApproval" style="width: 100%;">
                        <div class="layui-input-block" style="padding-left: 30%; padding-top: 10px;">
                            <button class="layui-btn" lay-submit lay-filter="pass" type="button">审核通过</button>
                            <button class="layui-btn" lay-submit lay-filter="back">退回修改</button>
                            <button class="layui-btn" lay-submit lay-filter="notPass">审核不通过</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!--        添加课程弹窗-->
    <div id="addTeach" style=" display:none;">
        <form class="layui-form" style="padding: 30px;" id="form-addTeach" lay-filter="add-teach">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="projTeachId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>

            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label" style="padding: 9px 10px;width: 90px;">课程开始日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="startDate" id="startDate" autocomplete="off" class="layui-input" placeholder="请选择" lay-verify="required">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label" style="padding: 9px 10px;width: 90px;">课程结束日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="endDate" id="endDate" autocomplete="off" class="layui-input" placeholder="请选择" lay-verify="required">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">讲授题目</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachSubject" id="teachSubject" autocomplete="off" class="layui-input" placeholder="讲授题目" lay-verify="required">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">学时</label>
                    <div class="layui-input-inline">
                        <input type="text" name="period" id="period" autocomplete="off" class="layui-input" placeholder="学时" lay-verify="required">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">教学方法</label>
                    <div class="layui-input-inline" style="text-align: left;">
                        <select name="teachingMethod" id="select_teaching_method">
                            <option value="">请选择教学方法</option>
                            <option value="理论">理论</option>
                            <option value="实验（技术示范）">实验（技术示范）</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="layui-form-item" id="submitAndResetTeach">
                <div style="text-align: center;">
                    <button class="layui-btn" lay-submit lay-filter="submitTeach">提交</button>
                    <button id="resetBtn" type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>

        </form>
    </div>

    <!--        添加教师弹窗-->
    <div id="addTeacher" style=" display:none;">
        <form class="layui-form" style="padding: 30px;" id="form-addTeacher" lay-filter="add-teacher">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="projTeacherId" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">课程id</label>
                    <div class="layui-input-block">
                        <input type="text" name="projTeachId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label"><span class="tips_inp">*</span>授课教师</label>
                    <div class="layui-input-inline">
                        <div id="teachName" placeholder="请输入授课教师姓名" lay-filter="teachName"></div>
                        <!-- <input type="text" name="teachName" id="teachName" autocomplete="off" class="layui-input" placeholder="请输入授课教师姓名" lay-verify="required"> -->
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label"><span class="tips_inp" id="spanOnTeachNo">*</span>身份证号</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachNo" id="teachNo" autocomplete="off" class="layui-input" placeholder="请输入身份证号" lay-verify="required"
                            onblur="teachNoBlur(this)">
                    </div>
                    <div class="layui-input-inline">

                    let stateText = "";
                    let goApprovalText = (data[i]["flowChainState"] % 10 == 0) ? "审批中" : "";

                    if (data[i]["flowChainState"] % 10 == 1) stateText = "已退回";
                    if (data[i]["flowChainState"] % 10 == 2) stateText = "审批不通过";
                    if (data[i]["flowChainState"] % 10 == 3 || data[i]["flowChainState"] == 99) stateText = "审批通过";

                    // parseData: function (res) { // 此参数仅在异步加载data数据下或者远程搜索模式下有效，解析回调，如果你的异步返回的data不是上述的data格式，请在此回调格式成对应的数据格式，回调参数是异步加载的数据
                    //     return res;
                    // },
                    error: function (error) { // 异步加载出错的回调 回调参数是错误msg

                    },
                    done: function (data) { // 异步加载成功后的回调 回调参数加载返回数据
                        console.log(data)
                    },
                    remoteMethod: function (value, cb) { // 远程搜索的回调函数
                        // value 是input实施输入的value值
                        // cb是回调处理函数，请在执行ajax搜索请求成功之后执行此回调函数

                        //案例
                        //这里如果val为空, 则不触发搜索
                        if (!value) {
                            return cb([]);
                        }
                        //这里的$.ajax去请求后台拿回数据
                        $.ajax({
                            async: false,
                            method: 'get',
                            url: huayi_projectscore_url + 'cmeCmeProjTeacher/getRecommendTeacherListByTeachName', // 此处是你服务端的接口
                            data: {
                                teacherName: value,
                            },
                            success: function (data) {
                                // 此处最好直接返回取你返回的 data属性，如：data.data，这样不限制你后端返回的数据对象格式，如果整体传参，必须满足：{"code":0,"msg":"success","data":[]}
                                return cb(data.data)
                            }
                        });
                    }

                });
                window.cb = function (arr) {
                    return arr;
                }
                var ins = selectInput.getInstance("#teachName");
                console.log(ins);
                // 监听input 实时输入事件
                ins.on('itemInput(teachName)', function (obj) {
                    let teacherName = $(obj).val();
                    console.log(teacherName);
                });

                // 监听select 选择事件
                ins.on('itemSelect(teachName)', function (obj) {
                    // console.log($(obj)[0].data);
                    let teacherName = $(obj).text().split('[')[0];
                    $("input[name='teachName']").val(teacherName);
                    let selVal = ins.getValue();
                    let teacherId = selVal.value;

                    if (teacherId != "" && teacherId != null && teacherId != undefined) {
                        //这里的$.ajax去请求后台拿回数据
                        console.log("teacherId=" + teacherId);
                        $.ajax({
                            async: false,
                            method: 'get',
                            // contentType: 'application/json;charset=UTF-8',
                            // dataType: 'json',
                            url: huayi_projectscore_url + 'cmeCmeProjTeacher/getTeacherById',
                            data: {
                                "projTeacherId": teacherId,
                            },
                            success: function (res) {
                                if (res.success == true) {
                                    if (res.data != null && res.data.length > 0) {
                                        let teacher = res.data[0];
                                        console.log(teacher);
                                        //删除这里的teacherId,这里只是带出来信息,不是要修改这个教师,防止在点击保存的时候，不清楚是新增还是编辑
                                        delete teacher.projTeacherId;
                                        delete teacher.projTeachId;
                                        console.log(teacher);
                                        form.val("add-teacher", teacher);
                                        if (teacher.personSpecId != null && teacher.personSpecId != undefined && teacher.personSpecId != "") {
                                            specTreeSelect.checkNode('specSelect', teacher.personSpecId);
                                        }
                                        if (teacher.titleName != null && teacher.titleName != undefined && teacher.titleName != "") {
                                            $("#text_title_name").val(teacher.titleName);
                                        }
                                        if(teacher.needScore==true){
                                           $("#spanOnTeachNo").show(); 
                                        }else{
                                            $("#spanOnTeachNo").hide(); 
                                        }
                                    } else {
                                        layer.msg("没有找到教师数据");
                                    }

                                } else {
                                    layer.msg(res.msg);
                                }
                            }
                        });
                    }
                });
            };
            selectInputTeachName();

            form.on('checkbox(needScore)', function (data) {
                // console.log(data.elem); //得到checkbox原始DOM对象
                // console.log(data.elem.checked); //是否被选中，true或者false
                // console.log(data.value); //复选框value值，也可以通过data.elem.value得到
                // console.log(data.othis); //得到美化后的DOM对象
                if (data.elem.checked) {
                    $("#spanOnTeachNo").show();
                } else {
                    $("#spanOnTeachNo").hide();
                }
            });

            form.verify({
                studyAddress: [/^.{1,100}$/, '举办地点最多100个汉字'],
                unitName: [/^.{1,40}$/, '最多个40汉字'],
            });
            //获取配置信息, 行政单位审核举办前申请时, 添加显示申报时的项目公布信息及课程教师信息
            let getConfig = function(){
                let configName1 = "fun_apply_approval_proj";
                let configUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${unitId}&configNames=${configName1}`
                commonAjax('post',configUrl,
                    {},function(){layer.msg("配置信息加载失败");},
                    function(res){
                        if(res.status == 200 || tool.isEmpty(res.data)){
                            if(res.data.hasOwnProperty(configName1) && res.data[configName1] == 1){
                                isLoadApplProj = true;
                            }
                        }else{ layer.msg("配置信息加载失败"); }
                    });
            }
            getConfig();
        });

    </script>
