<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title></title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/tools/urlTools.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">


</head>

<body style="background-color: white;">
    <div class="layui-fluid">
        <div class="layui-card">

            <!--        项目信息展示     -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui-inline" style="width: 100%;">
                    <label class="layui-form-label">项目编号</label>
                    <label class="layui-form-label" style="overflow: hidden;width: 150px;text-align: left;" id='projNo'></label>
                    <label class="layui-form-label">项目名称</label>
                    <label class="layui-form-label" style="overflow: hidden;width: 300px;text-align: left;" id='projName'></label>
                </div>
            </div>


            <!--        表格区域         -->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="cmeProjPosDownList" lay-filter="cmeProjPosDownList" style="margin: 0px 0px;">
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>



    <!--   添加举办周期     -->
    <div class="layui-form" style="background-color: #f5f5f5;display: none; text-align: center; " id="div_addPos">
        <input type="hidden" id="pop_operate" />
        <input type="hidden" id="pop_downId" />
        <div class="layui-form-item">
            <div class="layui-inline"  style="display: block;">
                <label class="layui-form-label">开始日期</label>
                <div class="layui-input-inline">
                    <input type="text" name="startDt" id="startDt" placeholder="举办开始日期" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-inline"  style="display: block;">
                <label class="layui-form-label">结束日期</label>
                <div class="layui-input-inline">
                    <input type="text" name="endDt" id="endDt" placeholder="举办结束日期" autocomplete="off" class="layui-input">
                </div>
            </div>
        </div>
        
        <div class="layui-form-item">
            <div class="layui-inline"  style="display: block;">
                <label class="layui-form-label">拟授学分</label>
                <div class="layui-input-inline">
                    <input type="text" name="planScore" id="planScore" autocomplete="off"  lay-verify="required|number|score"
                        class="layui-input">
                </div>
            </div>
            <div class="layui-inline" style="display: block;">
                <label class="layui-form-label">拟授学时</label>
                <div class="layui-input-inline">
                    <input type="text" name="planPeriod" id="planPeriod" autocomplete="off"  lay-verify="required|number|period"
                        class="layui-input">
                </div>
            </div>
        </div>
        
        <div class="layui-form-item">
            <div class="layui-inline"  style="display: block;">
                <label class="layui-form-label">实授学分</label>
                <div class="layui-input-inline">
                    <input type="text" name="realScore" id="realScore" autocomplete="off"  lay-verify="required|number|score"
                        class="layui-input">
                </div>
            </div>
            <div class="layui-inline" style="display: block;">
                <label class="layui-form-label">实授学时</label>
                <div class="layui-input-inline">
                    <input type="text" name="realPeriod" id="realPeriod" autocomplete="off"  lay-verify="required|number|period"
                        class="layui-input">
                </div>
            </div>
        </div>
        <br />
        <div class="layui-btn-container">
            <button type="button" class="layui-btn" id='btnCmeProjPosSave'>保存</button>
            <button type="button" class="layui-btn" id='btnCmeProjPosCancel'>取消</button>

        </div>
    </div>
</body>

<!--周期表格内数据编辑、删除按钮-->
<script type="text/html" id="cmeProjPosDonwloadRowBar">
    <span id="{{d.downId}}" class="oprateSpan" data-holdQualification="{{d.holdQualification}}">
    {{# if(d.holdQualification==true){  }}
    <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #27b1a2;background-color: transparent;">编辑</a>
    <a class="layui-btn layui-btn-xs" lay-event="del" style="color: #f25643;background-color: transparent;">删除</a>

    <a class="layui-btn layui-btn-xs layui-disabled"  style="color: #27b1a2;background-color: transparent;">编辑</a>

    </span>

<!--编辑删除课程-->
<script type="text/html" id="cmeProjTeachRowBar">
    {{# if(d.holdQualification==true){  }}
    <a class="layui-btn layui-btn-xs" lay-event="editCourse" style="color: #27b1a2;background-color: transparent;">编辑</a>
    <a class="layui-btn layui-btn-xs" lay-event="delCourse" style="color: #f25643;background-color: transparent;">删除</a>
    {{# }else{  }}
    <a class="layui-btn layui-btn-xs layui-disabled" style="color: #27b1a2;background-color: transparent;">编辑</a>
    <a class="layui-btn layui-btn-xs layui-disabled" style="color: #f25643;background-color: transparent;">删除</a>
    {{# } }}
</script>


<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="toolBar">
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="addPos">添加举办周期</button>
</script>






<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect',
        opTable: '/opTable/opTable'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'opTable'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var opTable = null;
        console.log(opTable);

        //获取套
        window.getCmeStandardKindId = function () {
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            return cmeStandardKindId;
        }
        //获取单位
        window.getUnitId = function () {
            var unitId = localStorage.getItem("unit-id");
            return unitId;
        }

        window.init = function () {
            getConfig('down_with_datetime');
            let type = (window["down_with_datetime"] == 1) ? "datetime" : "date";

            $(this).removeAttr("lay-key");
            laydate.render({
                elem: '#startDt' //指定元素
                , type : type
                , trigger: 'click'
            });
            laydate.render({
                elem: '#endDt' //指定元素
                , type : type
                , trigger: 'click'
            });

        }

        //页面的项目信息
        window.initProjInfo = function () {
            var projId = getQueryString("projId");
            var req_data = { projId: projId };
            $.ajax({
                type: "post",
                url: huayi_projectscore_url + "cmeCmeProj/getOne",
                data: JSON.stringify(req_data),
                contentType: "application/json",
                dataType: 'json',
                success: function (result) {
                    if (result.success == true) {
                        var data = result.data;
                        if (data != null && data != undefined) {
                            //projNo projName score period
                            $("#projNo").text(data.projNo);
                            $("#projName").text(data.projName);
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                }
            });

        };


        //初始化表格
        window.initTable = function () {
            var projId = getQueryString("projId");
            opTable = layui.opTable.render({
                elem: '#cmeProjPosDownList'
                , id: 'cmeProjPosDownList'
                , url: huayi_projectscore_url + 'cmeProjPosDownload'
                , where: {
                    projId: projId
                }
                , cols: [[
                    {
                        field: 'firstCol', title: '展开全部', align: 'center', width: 160,
                        templet: function (data) {
                            return '课程列表';
                        }
                    },
                    { title: '操作', toolbar: '#cmeProjPosDonwloadRowBar', align: "center" }
                    , {
                        field: 'batch', title: '举办批次', align: "center", width: 130, templet: function (data) {
                            return "第 " + data.batch + " 批次";
                        }
                    }
                    , { field: 'startDt', title: '举办开始日期', align: "center" }
                    , { field: 'endDt', title: '举办结束日期', align: "center" }
                ]],
                // toolbar: '#toolBar',
                cellMinWidth: 100,
                height: 'full-145',
                page: false,
                openType: 1,
                isAloneColumn: false,
                parseData: function (res) {
                    if(res.data.length>0){
                        for(let i=0;i<res.data.length;i++){
                            res.data[i].firstCol="展开课程";
                        }
                    }
                    return {
                        'code': res.status === 200 ? 0 : res.status,  // 解析接口状态
                        'msg': res.msg,                          // 解析提示文本
                        'count': res.data.length,                // 解析数据长度
                        'data': res.data                    // 解析数据列表
                    }

                },
                onOpen: function (itemData, itemIndex, dom, childTable) {
                    console.log("onOpen", '行数据：', itemData, "行下标：" + itemIndex, "行dom元素", dom, "子表实例：", childTable)
                    //保存展开行的数据
                    openRoWData = itemData;
                    //监听子表的行工具栏
                    table.on('tool(' + childTable.config.id + ')', function (obj) {
                        var data = obj.data;
                        var projTeachId = data.projTeachId;
                        if (obj.event === 'editCourse') {
                            var projId = getQueryString("projId");
                            let tid= layer.open({
                                title: "编辑课程",
                                type: 2,
                                content: "/pages/project/CmeCmeProjTeachAdd.html?projId=" + projId + "&downId=" + data.downId + "&projTeachId=" + projTeachId + "&mode=edit",
                                area: ['95%', '100%'],
                                maxmin: true,
                                closeBtn: 1
                            });
                            layer.full(tid);
                            console.log("addCourse");
                        } else if (obj.event === 'delCourse') {
                            layer.confirm('确认要删除该课程吗?', { icon: 3, title: '提示' }, function (index) {
                                let url = huayi_projectscore_url + "cmeCmeProjTeach/delete";
                                let data = { projTeachId: projTeachId,downId: obj.data.downId };
                                $.ajax({
                                    url: url,
                                    type: "post",
                                    data: data,
                                    success: function (re) {
                                        if (re.success == true) {
                                            layer.msg("课程删除成功");
                                            window.reloadTable();
                                        } else {
                                            layer.msg(re.msg);
                                        }
                                    }
                                });
                                layer.close(index);
                            });
                        }
                    });
                }

                , openTable: function (itemData) {
                    var downId = itemData.downId;
                    return {
                        elem: '#cmeCmeProjTeach_' + itemData.LAY_INDEX
                        , id: 'cmeCmeProjTeach_' + itemData.LAY_INDEX
                        , url: huayi_projectscore_url + 'cmeCmeProjTeach'
                        , page: false
                        , where: {
                            projId: projId,
                            downId: downId
                        }
                        , openVisible: false
                        , cols: [[
                            { title: '操作', toolbar: '#cmeProjTeachRowBar', align: "center" },
                            { field: 'startDate', title: '课程开始时间', align: "center" },
                            { field: 'endDate', title: '课程结束时间', align: "center" },
                            { field: 'teachSubject', title: '讲授题目', align: "center" },
                            { field: 'teacherNames', title: '授课教师', align: "center" },
                            // { field: 'score', title: '学分', align: "center" },
                            { field: 'period', title: '学时', align: "center" },
                        ]]
                        , parseData: function (res) {
                            return {
                                'code': res.status === 200 ? 0 : res.status,  // 解析接口状态
                                'msg': res.msg,                          // 解析提示文本
                                'count': res.data.length,                // 解析数据长度
                                'data': res.data                    // 解析数据列表
                            }

                        }
                    }

                }, done: function () {
                    console.log($(".oprateSpan").length);
                    console.log($(".oprateSpan[data-holdqualification='false']").length);
                    console.log($(".oprateSpan[data-holdqualification='true']").length);
                    let holdTipIndex = null;
                    $(".oprateSpan[data-holdqualification='false']").each(function (i, e) {
                        let id = "#" + $(this).attr("id");
                        $(e).parents("tr").mouseenter(function () {
                            holdTipIndex = layer.tips('该周期因逾期未举办或其他原因，已被取消举办资格,详情请咨询上级主管部门', id, {
                                tips: [2, '#78BA32']
                            });
                        })
                    });

                }
            })
        }

        window.reloadTable = function () {
            var projId = getQueryString("projId");
            opTable.reload({
                elem: '#cmeProjPosDownList'
                , id: 'cmeProjPosDownList'
                , where: {
                    projId: projId
                }
            });
        }

        window.closeChildPage = function (widowName) {
            var index = layer.getFrameIndex(widowName); //先得到当前iframe层的索引
            layer.close(index); //再执行关闭
            window.reloadTable();
        }
  /* 获取配置 */
        window.getConfig = function (config_name) {
            $.ajax({
                async: false,
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data: {
                    unitId: window.getUnitId(),
                    scoreLevelId: $("#scoreLevelId").val(),
                    configNames: config_name
                },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error: function () {
                    layer.msg('获取配置失败');
                }
            });
        }



        $(function () {
            window.init();
            window.initProjInfo();
            window.initTable();
        });
        var editIndex = null;
        //维护举办周期
        table.on('tool(cmeProjPosDownList)', function (obj) {
            var event = obj.event;
            var data = obj.data;
            var addCourseId = guid();
            if (event == "edit") {
                $("#pop_operate").val("edit");
                $("#pop_downId").val(data.downId);
                editIndex = layer.open({
                    title: "编辑举办周期",
                    type: 1,
                    area: ['700px', '400px'],
                    // offset: '100px',
                    // maxmin: true,
                    content: $('#div_addPos'),
                    closeBtn: 1,
                    success: function () {
                        //初始化周期编辑弹框
                        if ($("#pop_operate").val() == "edit" && $("#pop_downId").val() == data.downId) {
                            $.ajax({
                                url: huayi_projectscore_url + "cmeProjPosDownload/getOne",
                                type: "get",
                                data: { downId: data.downId },
                                success: function (re) {
                                    if (re.success == true) {
                                        var cmeProjPosDown = re.data;
                                        if (cmeProjPosDown != null && cmeProjPosDown != undefined && cmeProjPosDown != "") {
                                            var startDt = cmeProjPosDown.startDt;
                                            var endDt = cmeProjPosDown.endDt;
                                             if(window["down_with_datetime"] != 1 ) {
                                                startDt = startDt.substring(0,10);
                                                endDt = endDt.substring(0,10);
                                            }
                                            $("#startDt").val(startDt);
                                            $("#endDt").val(endDt);
                                            $("#planScore").val(cmeProjPosDown.planScore);
                                            $("#planPeriod").val(cmeProjPosDown.planPeriod);
                                            $("#realScore").val(cmeProjPosDown.realScore);
                                            $("#realPeriod").val(cmeProjPosDown.realPeriod);
                                        }
                                    } else {
                                        layer.msg(re.msg);
                                    }
                                }

                            });
                        }

                    }
                });

            }
            if (event == "del") {
                layer.confirm('确认要删除该举办周期吗?', { icon: 3, title: '提示' }, function (index) {
                    var downId = data.downId;
                    var projId = data.projId;
                    $.ajax({
                        url: huayi_projectscore_url + "cmeProjPosDownload/deleted",
                        type: "get",
                        data: { downId: downId, projId: projId },
                        success: function (re) {
                            if (re.success == true) {
                                //layer.alert("删除成功,还没有写考勤和授分限制的逻辑，记得以后要加喔");
                                window.reloadTable();
                            } else {
                                layer.msg(re.msg);
                            }
                        }
                    });

                    layer.close(index);
                });
            }
            if (event == "addCourse") {
                var projId = getQueryString("projId");
                let tid = layer.open({
                    title: "添加课程",
                    type: 2,
                    content: "/pages/project/CmeCmeProjTeachAdd.html?projId=" + projId + "&downId=" + data.downId + "&projTeachId=" + addCourseId + "&mode=add",
                    area: ['95%', '95%'],
                    maxmin: true,
                    closeBtn: 1
                }, function () {
                    //添加周期页面如果是通过关闭按钮关闭弹框，说明没有添加成功，所以需要删除可能添加的老师
                    //删除添加的老师信息
                    var url = huayi_projectscore_url + 'cmeCmeProjTeacher/deleteTeacherByProjTeachId';
                    var data = { projTeachId: addCourseId };
                    $.ajax({
                        type: 'post',
                        url: url,
                        data: data,
                        success: function (res) {
                            if (res.status === 200) {
                                parent.reloadTable();
                                layer.close(layer.index);

                            } else if (res.status === 500) {
                                layer.msg(res.msg);
                            }
                        }

                    });
                });
                layer.full(tid);
                console.log("addCourse");
            }

        });




        // 周期表格监听头部新增按钮
        var addIndex = null;
        table.on('toolbar(cmeProjPosDownList)', function (obj) {
            var event = obj.event;
            var data = obj.data;
            if (obj.event === 'addPos') {
                $("#pop_operate").val("add");
                $("#pop_downId").val("");
                $("#startDt").val("");
                $("#endDt").val("");
                addIndex = layer.open({
                    title: "添加举办周期",
                    type: 1,
                    area: ['600px', '170px'],
                    // offset: '100px',
                    // maxmin: true,
                    content: $('#div_addPos'),
                    closeBtn: 1
                }, function () {

                });

            }
        });

        //添加周期
        $("#btnCmeProjPosSave").click(function () {
            var startDt = $("#startDt").val();
            var endDt = $("#endDt").val();
            if(startDt=="" ||endDt=="" ){
                layer.msg("开始日期或者结束日期不能为空");
                return;
            }
            var projId = getQueryString("projId");
            var dst = new Date(startDt);
            var den = new Date(endDt);
            if (den < dst) {
                layer.msg("结束时间不能小于开始时间");
                return;
            }
            var data = { startDt: startDt, endDt: endDt, projId: projId, unitId: window.getUnitId(), typeId: 1 };
            var pop_operate = $("#pop_operate").val();
            var pop_downId = $("#pop_downId").val();
            if (pop_operate == "add" && pop_downId == "") {
                $("#startDt").val("");
                $("#endDt").val("");
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url + "cmeProjPosDownload/save",
                    data: JSON.stringify(data),
                    contentType: "application/json",
                    success: function (result) {
                        if (result.success == true) {
                            layer.msg("添加成功");
                            window.reloadTable();
                            layer.close(addIndex);
                        } else {
                            layer.msg(result.msg);
                        }
                    }
                });
            }
            if (pop_operate == "edit" && (pop_downId != "" && pop_downId != undefined && pop_downId != null)) {
                var startDt = $("#startDt").val();
                var endDt = $("#endDt").val();
                var planScore = $("#planScore").val();
                var planPeriod = $("#planPeriod").val();
                var realScore = $("#realScore").val();
                var realPeriod = $("#realPeriod").val();
                var cmeProjPosDownload ={};
                // $.ajax({
                //     async: false,
                //     url: huayi_projectscore_url + "cmeProjPosDownload/getOne",
                //     type: "get",
                //     data: { downId: pop_downId },
                //     success: function (re) {
                //         if (re.success == true) {
                //             cmeProjPosDownload.downId = re.data.downId;
                //         } else {
                //             layer.msg(re.msg);
                //         }
                //     }
                // });
                debugger
                cmeProjPosDownload.downId = pop_downId;
                cmeProjPosDownload.startDt = startDt + ' 00:00:00';
                cmeProjPosDownload.endDt = endDt + ' 23:59:59';
                cmeProjPosDownload.planScore = planScore;
                cmeProjPosDownload.planPeriod = planPeriod;
                cmeProjPosDownload.realScore = realScore;
                cmeProjPosDownload.realPeriod = realPeriod;
                var data = JSON.stringify(cmeProjPosDownload);
                $.ajax({
                    url: huayi_projectscore_url + "cmeProjPosDownload/update?notVerify=true",
                    type: "post",
                    data: data,
                    contentType: "application/json",
                    success: function (re) {
                        if (re.success == true) {
                            layer.msg("更新成功");
                            layer.close(editIndex);
                            window.reloadTable();
                        } else {
                            layer.msg(re.msg);
                        }
                    }
                })



            }
        });
