<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>给教师授分</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>

    <style>
        /*td .layui-form-select {*/
        /*    margin-top: -10px;*/
        /*    margin-left: -15px;*/
        /*    margin-right: -15px;*/
        /*}*/
    </style>

</head>

<body>
    <div class="layui-fluid">
        <div class="layui-card" style="text-align: center">
            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="teachersList" lay-filter="teachersList_filter" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>

    <script>
        var downId = getUrlParam("downId");
        var teachId = getUrlParam("teachId");
        var projNo = getUrlParam("projNo");
        var projName = getUrlParam("projName");
        let tabledata;
        // 学分等级
        var creditLevelSelecteds = '';
        // 二级学科
        var secondaryDisciplineSelecteds = '';
        // 三级学科
        var tertiarySubjectsSelecteds = '';
        // 举办方式
        var holdTypeSelecteds = '<option value="">请选择</option>';
        layui.config({
            base: '../../../js/layui/ext/'
        }).extend({
            myTable: 'table'
        }).use(['table', 'form', 'laydate', 'laytpl', 'myTable'], function () {
            var table = layui.myTable;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;
            var laydate = layui.laydate;

            const HUBEI = "73ba18db-33fd-4746-ab41-9beb009f69a1";
            let cmeStandardKindId = localStorage.getItem('standardkind-id');

            // 后台请求表单下拉框内容并处理select
            layer.ready(function () {
                $.ajax({

                })
            });

            window.loadTable = function () {
                table.render({
                    url: huayi_projectscore_url + 'cmeCmeProjTeacher/selectTeacherListForGiving',
                    elem: '#teachersList',
                    title: '课程讲师列表',
                    defaultToolbar: [],
                    where: {
                        // projTeachId: teachId,
                        downId: downId,
                    },
                    cols: [[
                        {
                            field: 'needScore', align: 'center', title: '是否主讲人授分', width: '150', hide: false, templet: function (d) {
                                if (d.needScore) {
                                    return '是'
                                } else {
                                    return '否'
                                }
                            }
                        },
                        {
                            field: 'hasScored', align: 'center', title: '是否已授分', hide: false, templet: function (d) {
                                if (d.hasScored) {
                                    return '是'
                                } else {
                                    return '否'
                                }
                            }
                        },
                        { field: 'teacherId', align: 'center', title: '主讲人id', hide: true },
                        { field: 'teacherName', align: 'center', title: '主讲人姓名' },
                        { field: 'teachName', align: 'center', title: '课程名称', width: '250', edit: 'text' },
                        { field: 'creditLevel', align: 'center', title: '学分级别id', hide: true, },
                        { field: 'creditLevelName', title: '学分级别', hide: false, },
                        { field: 'secondaryDiscipline', align: 'center', title: '二级学科id', hide: true, },
                        { field: 'secondaryDisciplineName', align: 'center', title: '二级学科', hide: false, },
                        { field: 'tertiarySubjects', align: 'center', title: '三级学科id', hide: true, },
                        { field: 'tertiarySubjectsName', align: 'center', title: '三级学科', hide: false, },
                        { field: 'holdType', align: 'center', title: '举办方式id', hide: true, },
                        { field: 'holdTypeName', align: 'center', title: '举办方式', hide: false, },
                        { field: 'studyDate', align: 'center', title: '授分日期', event: 'setDate', edit: 'text' },
                        { field: 'score', align: 'center', title: '学分', edit: 'text', },
                        { field: 'period', align: 'center', title: '学时', edit: 'text' },
                        { field: 'remark', align: 'center', title: '备注', width: '200', edit: 'text' }

                    ]],
                    done: function () {
                        bindInputValue();
                    },
                    cellMinWidth: 110,
                    id: "teachersListTable",
                    page: false,
                    height: 'full-155',
                    parseData: function (res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.msg, //解析提示文本
                            "data": res.data, //解析数据列表
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    },
                });
            }

            window.loadTable();

            // 日期选择框
            table.on('tool(teachersList_filter)', function (obj) {
                var data = obj.data;
                if (obj.event === 'setDate') {
                    var field = $(this).data('field');
                    laydate.render({
                        elem: this.firstChild,
                        show: true,
                        type: 'date',
                        format: 'yyyy-MM-dd',
                        done: function (value, date) {
                            data[field] = value;
                            obj.update(data);
                        }
                    })
                }
            })

            // 授分按钮，获取列表数据并提交后台
            window.givingForTeachers = function () {
                console.log(projName);
                var tableList = table.checkStatus("teachersListTable");
                var dataForgiving = [];
                if (tableList.data.length > 0) {
                    $("#btnGiving").addClass("layui-disabled").prop("disabled", "disabled");
                    for (var j = 0; j < tableList.data.length; j++) {
                        if (tableList.data[j].score == null || tableList.data[j].period == null || tableList.data[j].studyDate == null || tableList.data[j].teachName == null || tableList.data[j].teachName == '') {
                            layer.msg("所选数据学分、学时、授分日期、课程名称不能为空");
                            $("#btnGiving").removeClass("layui-disabled").removeAttr("disabled");
                            return;
                        }
                        debugger
                        let score = tableList.data[j].score;
                        if (score <= 0 || (cmeStandardKindId == HUBEI && Math.floor(score) != score)) {
                            layer.msg('主讲人授分分值只能填写整数')
                            $("#btnGiving").removeClass("layui-disabled").removeAttr("disabled");
                            return false;
                        }
                        if (tableList.data[j].period < 0) {
                            layer.msg('主讲人授分学时不能小于0')
                            $("#btnGiving").removeClass("layui-disabled").removeAttr("disabled");
                            return false;
                        }

                        var givingEntity = {};
                        givingEntity.projectType = 1;
                        givingEntity.downId = downId;
                        givingEntity.projTeachId = teachId;
                        givingEntity.score = tableList.data[j].score;
                        givingEntity.period = tableList.data[j].period;
                        givingEntity.comPersonId = tableList.data[j].teacherId;
                        givingEntity.scoreLevel = tableList.data[j].creditLevel;
                        givingEntity.holdType = tableList.data[j].holdType;
                        givingEntity.studyDate = tableList.data[j].studyDate;
                        givingEntity.remark = tableList.data[j].remark;
                        givingEntity.knowledgeId = tableList.data[j].tertiarySubjects;
                        givingEntity.singleProjNo = tableList.data[j].projNo;
                        givingEntity.singleProjName = tableList.data[j].teachName;
                        givingEntity.teachUnit = localStorage.getItem("unit-id");
                        givingEntity.addUnit = localStorage.getItem("unit-id");

                        dataForgiving.push(givingEntity)
                    }
                    $.ajax({
                        type: 'post',
                        url: huayi_projectscore_url + 'cmeSingleprojScore/insertList',
                        data: JSON.stringify(dataForgiving),
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg(res.data, { time: 5000 });
                                window.loadTable();
                            } else {
                                layer.msg(res.msg);
                            }
                        }
                    });
                } else {
                    layer.msg("所选数据为空");
                }
            }


            //监听动态表格的input框
            let bindInputValue = function () {
                //输入框的值改变时触发
                $(".js-approval-input").change("input", function (e) {
                    const index = getIndex(e.target);
                    const value = e.target.value;
                    approvalData[index]["approvalText"] = value;
                });

                //授分按钮复位
                $("#btnGiving").removeClass("layui-disabled").removeAttr("disabled", "disabled");

            }
            //判断数据是第几行，这里获取的是下表
            let getIndex = function (elem) {
                if (elem.tagName == "TR") {
                    return elem.getAttribute("data-index");
                } else {
                    return getIndex(elem.parentElement);
                }
            }

            //获取第几行
            function getLine(element) {
                if (!element.hasAttribute("data-index")) {
                    return getLine(element.parentElement);
                } else {
                    return element.getAttribute("data-index")
                }
            }
            // 关闭父页所有探窗
            window.closeOpen = function () {
                window.parent.closeAllForgivingForTeachers();
            }
        })
    </script>
</body>

</html>
