<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
</head>
<body>

<div class="layui-card" style="text-align: center">
    <!--        表格区域-->
    <div class="layui-card-body layui_body_box">
        <table class="layui-table" id="downInfo" lay-filter="downInfo_filter" style="margin: 0px 0px;">
        </table>
    </div>
</div>

<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="attendanceInfoTeacher">主讲老师授分明细</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="attendanceInfo">学员授分明细</a>
</script>

<script type="text/html" id="rowBar1">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="review">审核</a>
</script>

<script>
    var type=getUrlParam("type");
    var projectId=getUrlParam("projectId");
    layui.use(['table', 'form','laydate','laytpl'],function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var laytpl = layui.laytpl;



        table.render({
            elem: '#downInfo',
            title: '周期信息',
            url: huayi_projectscore_url+'cmeProjPosDownload/getListForProj',
            where: {
                projId: projectId
            },
            cols: [[
                {align: 'center', title: '审核',templet: '#rowBar1', hide: type==1},
                {align: 'center', title: '授分人员考勤明细',width: 235, templet: '#rowBar' ,hide: type==2},
                {field: 'downId', align: 'center', title: '主讲人id', hide: true},
                {field: 'projName', align: 'center', title: '项目名称', hide: false},
                {field: 'projNo', align: 'center', title: '项目编号', hide: false},
                {
                    field: 'index', title: "举办批次", sort: true, align: 'center', templet: function (data) {
                        return "第" + data["batch"] + "批次";
                    }
                },
                {field: 'startDt', align: 'center', title: '开始时间', hide: false},
                {field: 'endDt', align: 'center', title: '结束时间', hide: false},
            ]],
            defaultToolbar: [],
            id: "teachersListTable",
            page: false,
            height: 'full-155',
            parseData: function (res) {
                return {
                    "code": res.status === 200 ? 0 : res.status, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "data": res.data, //解析数据列表
                }

            },
            request: {
                pageName: 'pageNum', //页码的参数名称，默认：page
                limitName: 'pageSize' //每页数据量的参数名，默认：limit
            },
            data: [
                {'downId': '123456','projectName': '测试项目','projectNo': '123455','startDate': '2021-12-13','endDate': '2021-12-31'},
                {'downId': '123456','projectName': '测试项目','projectNo': '123455','startDate': '2021-12-13','endDate': '2021-12-31'},
                {'downId': '123456','projectName': '测试项目','projectNo': '123455','startDate': '2021-12-13','endDate': '2021-12-31'},
                ]
        })

        table.on('tool(downInfo_filter)',function (obj) {
            var downId=obj.data.downId;
            if (obj.event === 'attendanceInfo'){
                layer.open({
                    type: 2,
                    content: 'checkProjScore.html?downId='+obj.data.downId,
                    area: ['100%', '100%'],
                    title: '学员授分明细',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }else if (obj.event === 'attendanceInfoTeacher') {
                layer.open({
                    type: 2,
                    content: 'GivingForTeachers.html?teachId='+obj.data.projTeachId+'&downId='+downId,
                    area: ['100%', '100%'],
                    title: '主讲老师授分明细',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }
        })
    })
</script>
</body>
</html>
