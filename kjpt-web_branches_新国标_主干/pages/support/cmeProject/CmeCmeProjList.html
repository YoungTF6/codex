<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #5FB878;background-color: transparent;">编辑</a>
    <a class="layui-btn layui-btn-xs" lay-event="del"  style="color: #FF5722;background-color: transparent;">删除</a>
</script>
<!-- html = '<a class="layui-btn layui-btn-xs" lay-event="showPosDownList" style="color: #FFB800;background-color: transparent;">维护</a>'; -->

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect',
        tool: 'tool'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'element', 'treeSelect', 'tool'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        let tool = layui.tool;
        var treeSelect = layui.treeSelect;
        var element = layui.element;

        var unitId = ''
            , standardkindIds = localStorage.getItem("standardkind-id")
            , userId = localStorage.getItem("user-id")
            , cmeStandardKindId 
            ;
        let standardKindIdObj = {}
        var thisProjId = '';
            
           //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    if (res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }

        // 账号关联套
        let standardKindInit = function () {
            var standardkindIdArr = standardkindIds.split(",");
            cmeStandardKindId = standardkindIdArr[0];
            console.log(standardkindIdArr);
            commonAjax('get', huayi_sjwh_url + "cmestandardkind/list/all", {},
                function () { layer.msg("套加载失败"); },
                function (res) {
                    // let options = '<option value="" > 请选择套标准 </option>';
                    let options = '';
                    for (let tempObj of res.data) {
                        if (standardkindIdArr.includes(tempObj.cmeStandardKindId)) {
                            standardKindIdObj[tempObj.cmeStandardKindId] = {
                                description: tempObj.description,
                                topUnitId: tempObj.topUnitId
                            };
                            options += '<option top-unit-id="' + tempObj.topUnitId + '" value="' + tempObj.cmeStandardKindId + '">' + tempObj.description + '</option>';
                        }
                    }
                    $('#standardKindSearch').append(options);
                    $('#standardKindForm').append(options);
                    form.render('select');
                });
        }

        // 加载年度下拉框
        let initCmeYear = function(){
            var date = new Date();
            var year = date.getFullYear();
            var lastYear = year;
            var options = '';
            for (var i = 0; i < 10; i++) {
                options += '<option value="' + lastYear + '">' + lastYear + '年</option>';
                lastYear = lastYear - 1;
            }
            $('#cmeYear').append(options);
        }
        initCmeYear();
        standardKindInit();//套初始化

        //获取套
        window.getCmeStandardKindId = function () {
            var cmeStandardKindId = $('#standardKindSearch').val();
            return cmeStandardKindId;
        }
        //获取单位
        window.getUnitId = function () {
            var unitId = $('#unitId').val();
            return unitId;
        }

        var tabIdCurrent = 'tab_1_1'; // 当前选中的二级标签页
        var allConditionFlag = false; // 是否显示全部条件

        //初始化表格
        window.reloadTable = function () {
            cmeStandardKindId = $('#standardKindSearch').val();
            unitId = $('#unitId').val();
            if(!cmeStandardKindId){
                layer.msg('请选择地区');
                return false;
            }

            // localStorage.setItem('standardkind-id', cmeStandardKindId);

            window.getConfig('fun_pre_register');
            window.getConfig('fun_dept_agent_proj');

            let data_default = {
                unitId: window.getUnitId(),
                cmeYear: $("#cmeYear").val(),
                keywordColumn: $("#select_column").val(),
                keyword: $("#text_value").val(),
                projNo: '',
                searchTaoId: cmeStandardKindId
            };

            table.render({
                elem: '#cmeCmeProj',
                url: huayi_projectscore_url + 'cmeCmeProj/list',
                // toolbar: '#toolbarBtns', //开启头部工具栏，并为其绑定左侧模板
                title: '用户表',
                defaultToolbar: ['filter', 'print', 'exports'],
                where: data_default,
                cols: [
                    [
                        { align: 'center', width: 120, toolbar: '#rowBar', title: '操作', fixed: 'left' },
                        {
                            field: 'projNo',
                            align: 'center',
                            title: '项目编号',
                            minWidth: 150,
                            fixed: 'left'
                        },
                        {
                            field: 'projName',
                            title: '项目名称',
                            align: 'center',
                            minWidth: 200,
                            sort: true,
                            fixed: 'left'
                        },{
                            align: 'center',
                            title: '维护举办周期',
                            minWidth: 120,
                            templet: function (data) {
                                let html = "";
                                let downCount = data.downCount;
                                if (downCount == 0) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPosDownList" style="color: #FF5722;background-color: transparent;">未维护</a>';
                                } else {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPosDownList" style="color: #FFB800;background-color: transparent;">维护</a>';
                                }
                                return html;
                            }
                        }, {
                            align: 'center',
                            title: '维护试卷',
                            minWidth: 100,
                            templet: function (data) {
                                let examPaperState = data.examPaperState;
                                // * 0:  未维护 没有添加试题
                                // * 1： 未启用 添加了试题，但是没有启用试卷
                                // * 2： 已启用 启用了试卷
                                let html = '';
                                if (examPaperState === 0) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPaper" style="color: #FF5722;background-color: transparent;">未维护</a>'
                                }
                                if (examPaperState === 1) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPaper" style="color: #FF5722;background-color: transparent;">未启用</a>'
                                }
                                if (examPaperState === 2) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPaper" style="color: #5FB878;background-color: transparent;">已启用</a>'
                                }
                                return html;
                            }
                        }, {
                            field: 'projApply',
                            align: 'center',
                            title: '举办前申请',
                            minWidth: 100,
                            templet: function (data) {
                                let downNotApplyCount = data.downNotApplyCount;
                                let html = '';
                                if (data.downCount == 0) {
                                    html = '<a class="layui-btn layui-btn-xs"  style="color: #FF5722;background-color: transparent;">请添加周期</a>';
                                }
                                else {
                                    if (downNotApplyCount != 0) {
                                        html = '<a class="layui-btn layui-btn-xs" lay-event="ShowProjApplyBeforeHold" style="color: #FF5722;background-color: transparent;">未申请(' + downNotApplyCount + ')</a>'
                                    }
                                    else {
                                        html = '<a class="layui-btn layui-btn-xs" lay-event="ShowProjApplyBeforeHold" style="color: #5FB878;background-color: transparent;">已申请</a>'
                                    }
                                }
                                return html;
                            }
                        }, {
                            align: 'center',
                            title: '扫码考勤',
                            minWidth: 100,
                            templet: function (data) {
                                let downNotAttendanceCount = data.downNotAttendanceCount;
                                let html = '';
                                if (data.downCount == 0) {
                                    html = '<a class="layui-btn layui-btn-xs"  style="color: #FF5722;background-color: transparent;">请添加周期</a>';
                                }
                                else {
                                    if (downNotAttendanceCount != 0) {
                                        html = '<a class="layui-btn layui-btn-xs" lay-event="ShowAttendance" style="color: #FF5722;background-color: transparent;">未考勤(' + downNotAttendanceCount + ')</a>'
                                    }
                                    else {
                                        html = '<a class="layui-btn layui-btn-xs" lay-event="ShowAttendance" style="color: #5FB878;background-color: transparent;">已完成</a>'
                                    }
                                }

                                return html;
                            }
                        }, {
                            field: 'live',
                            align: 'center',
                            title: '线上直播',
                            // hide: !(getCmeStandardKindId().toString().toLowerCase() == "6427ddba-c02f-4229-bd73-49fc1c5d21f6"),
                            hide: true,
                            minWidth: 100,
                        }, {
                            align: 'center',
                            title: '授分',

                        layer.msg("获取验证码成功")
                        // layer.msg('<sapn style="color: #666666;">验证码已发送，请注意查收</sapn>', 
                        //         { icon : 1, time : 1500 });

                        // // 重获验证码倒计时
                        // curCount = count;
                        // $('#login_' + cur_login + ' [name=code_btn]').html(curCount + '秒后重获');
                        // InterValObj = window.setInterval(SetRemainTime, 1000);

                    } else {
                        layer.msg("获取验证码失败")
                    }
                },
                error: (xhr, status, error) => {
                    layer.msg('<sapn style="color: #666666;">验证码发送失败</sapn>',
                        { icon: 2, time: 1500 });
                    $('#login_' + cur_login + ' [name=code_btn]').css('pointer-events', '').removeClass('layui-disabled');
                }
            });
        })

        // 验证验证码
        $("#verifyCode").click(function () {
            var mobile = $("#mobile").val();
            var code = $("#code").val();

            $.ajax({
                url: huayi_mcenter_url + 'message/code/check',
                type: 'post',
                contentType: 'application/json',
                dataType: 'json',
                data: JSON.stringify({
                    'msgCodeType': 'LOGIN',
                    'phone': encodeAesString(mobile).toString(),
                    'code': encodeAesString(code).toString()
                }),
                success: (res) => {
                    if (res.success == true) {
                        // 验证成功后,  删除项目信息
                        debugger
                        delProj(thisProjId);
                    } else {
                        layer.msg("手机验证失败")
                        // layer.msg('<sapn style="color: #666666;">' + res.msg + '</sapn>', 
                        //         { icon : 7, time : 1500 });
                    }
                    // $('.verify-refresh').click();
                },
                error: (xhr, status, error) => {
                    layer.msg("手机验证失败")
                    // layer.msg('<sapn style="color: #666666;">手机验证码验证失败</sapn>', 
                    //         { icon : 2, time : 1500 });
                    // $('.verify-refresh').click();
                }
            });
        })

        var delProj = function(projId){
            console.log('删除项目信息: ' + projId)
            $.ajax({
                async: false,
                type: "delete",
                url: huayi_projectscore_url + "cmeCmeProj/deleted/" + projId,
                success: function (re) {
                    if (re.success == true) {
                        layer.closeAll();
                        table.reload('cmeCmeProj');
                        layer.msg("删除成功");
                    } else {
                        layer.msg(re.msg);
                    }
                }
            });
        }



        /* 选项卡 */
        // 一级选项卡
        element.on('tab(tabarea)', function (data) {
            const tabIdTemp = this.getAttribute('lay-id');
            // if (tabIdCurrent.startsWith(tabIdTemp)) { // 所选标签页为已选中状态时
            //     return;
            // }
            switch (tabIdTemp) {
                case 'tab_1':
                    $("#searchDiv").show();
                    $("#dataDiv").show();
                    tabIdCurrent = 'tab_1_1';
                    element.tabChange('tabarea_1', 'tab_1_1');
                    tabChange();

                    break;
                case 'tab_2':
                    $("#searchDiv").show();
                    $("#dataDiv").show();
                    tabIdCurrent = 'tab_2_1';
                    element.tabChange('tabarea_2', 'tab_2_1');
                    tabChange();

                    break;
                case 'tab_3':
                    $("#searchDiv").show();
                    $("#dataDiv").show();
                    tabIdCurrent = 'tab_3_1';
                    element.tabChange('tabarea_3', 'tab_3_1');
                    tabChange();
                    break;
                case 'tab_4':

                    tabIdCurrent = 'tab_4_1';
                    $("#searchDiv").hide();
                    $("#dataDiv").hide();
                    break;
                default:
                    return;
            }

        });
        // 举办状态，二级选项卡
        element.on('tab(tabarea_1)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent == tabIdTemp) { // 所选标签页为已选中状态时
                return;
            } else {
                tabIdCurrent = tabIdTemp;
                tabChange();
            }
        });
        // 举办签申请情况，二级选项卡
        element.on('tab(tabarea_2)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent == tabIdTemp) { // 所选标签页为已选中状态时
                return;
            } else {
                tabIdCurrent = tabIdTemp;
                tabChange();
            }
        });
        // 执行情况反馈情况，二级选项卡
        element.on('tab(tabarea_3)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent == tabIdTemp) { // 所选标签页为已选中状态时
                return;
            } else {
                tabIdCurrent = tabIdTemp;
                tabChange();
            }
        });

        /* 标签页计数 */
        window.countNum = function () {
            let url = huayi_projectscore_url,
                data = getDefaultData(),
                tabId = tabIdCurrent;
            //let data = $.extend({}, getDefaultData(), { topUnitId: getUnitId() });
            if (tabId.startsWith('tab_1')) {
                url += 'cmeCmeProj/holdState';
            } else if (tabId.startsWith('tab_2')) {
                url += 'cmeCmeProj/applyBeforeHoldState';
            } else if (tabId.startsWith('tab_3')) {
                url += 'cmeCmeProj/feedbackState';
            }
            axios({
                method: 'get',
                url: url,
                responseType: 'json',
                params: data
            }).then(response => {
                if (response.status == 200 && response.data.status == 200) {
                    var data = response.data.data;
                    if (tabId.startsWith('tab_1')) {
                        $('#tab_1_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_1_1').html('未举办&nbsp;&nbsp;(' + data.NO_HOLD + ')');
                        $('#tab_1_2').html('已举办&nbsp;&nbsp;(' + data.HOLD + ')');
                        $('#tab_1_3').html('待授分&nbsp;&nbsp;(' + data.TO_SCORE + ')');
                        $('#tab_1_4').html('逾期未举办&nbsp;&nbsp;(' + data.OVERDUE + ')');
                    } else if (tabId.startsWith('tab_2')) {
                        //$('#tab_2_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_2_1').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_2_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                        $('#tab_2_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                    } else if (tabId.startsWith('tab_3')) {
                        //$('#tab_3_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_3_1').html('未反馈&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_3_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_3_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_3_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ') ');
                        $('#tab_3_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                    }
                } else {
                    layer.msg('项目统计失败', { icon: 2, time: 1000 });
                }
            }).catch(error => {
                layer.msg('项目统计异常', { icon: 7, time: 1000 });
                console.log(error);
            });
        }


        /* 获取配置 */
        window.getConfig = function (config_name) {
            if(!unitId) return false;
            $.ajax({
                async: false,
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data: {
                    unitId: window.getUnitId(),
                    configNames: config_name
                },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        // layer.msg('获取配置失败');
                    }
                },
                error: function () {
                    layer.msg('获取配置失败');
                }
            });
        }


        //选择完代办科室后，获取选择的科室信息,绑定项目
        window.getChooseDeptInfo = function (deptId, projId) {
            console.log("deptId:" + deptId + ";   projId:" + projId);
            $.ajax({
                async: false,
                type: "post",
                url: huayi_projectscore_url + "cmeCmeProj/distributeAgentDept",
                data: {
                    unitId: window.getUnitId(),
                    deptId: deptId,
                    projId: projId,
                    userId: localStorage.getItem("user-id")
                },
                success: function (re) {
                    if (re.success == true) {
                        layer.msg("分配成功");
                        reloadTable();

                    } else {
                        layer.msg(re.msg);
                    }
                }
            });
        }

        //选择完代办科室后，获取选择的科室信息,绑定项目
        window.cancelDistributeAgentDept = function (deptId, projId) {
            console.log("deptId:" + deptId + ";   projId:" + projId);
            $.ajax({
                async: false,
                type: "post",
                url: huayi_projectscore_url + "cmeCmeProj/cancelDistributeAgentDept",
                data: {
                    unitId: window.getUnitId(),
                    deptId: deptId,
                    projId: projId,
                    userId: localStorage.getItem("user-id")
                },
                success: function (re) {
                    if (re.success == true) {
                        layer.msg("取消分配成功");
                        reloadTable();

                    } else {
                        layer.msg(re.msg);
                    }
                }
            });
        }
    });
</script>
