    <meta charset="UTF-8">

    <meta name="renderer" content="webkit">

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>

    <script type="text/javascript" src="/js/tools/urlTools.js"></script>

    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
<script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>

<body>

    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="cmePerson" lay-filter="cmePerson" style="margin: 0px 0px;">

                </table>
            </div>
        </div>
    </div>




</body>



<div style="display: none;" id="cmePersonAddOrEdit" class="layui-fluid">
    <div class="layui-card" style="margin:0 auto;">
        <!-- 表格区域 -->
        <div class="layui-card-body">
            <div class="layui-form" lay-filter="cmeDetail" style="text-align:center;">
                <div class="layui-form-item" style=" height: 100px;">
                    <div class="layui-inline marginRight80" style="text-align: left;">
                        <label class="layui-form-label">单位名称</label>
                        <div class="layui-input-inline width250">
                            <input type="text" id="text_unit_name" autocomplete="off" class="layui-input"

                            <input type="hidden" id="hidden_unit_id">
                        </div>
                    </div>
                    <div class="layui-inline" style="text-align: left;">
                        <label class="layui-form-label">单位级别</label>
                        <div class="layui-input-inline width250">
                            <select id="select_cme_unit_level">
                                <option value="">请选择</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline marginRight80">
                        <label class="layui-form-label"><span style="color: red;">*</span>年度</label>
                        <div class="layui-input-inline width250">
                            <input type="tel" name="phone" autocomplete="off" class="layui-input">

                    </div>

                        <label class="layui-form-label"><span style="color: red;">*</span>人员状态</label>
                        <div class="layui-input-inline width250">

                            </select>
                        </div>

                <div class="layui-form-item">
                    <div class="layui-inline marginRight80">
                        <label class="layui-form-label"><span style="color: red;">*</span>职称</label>

                            <input id="text_title_name" autocomplete="off" class="layui-input">
                            <input type="hidden" id="hidden_title_id" />

                    <div class="layui-inline">
                        <label class="layui-form-label"><span style="color: red;">*</span>评定时间</label>

                    <div class="layui-inline">
                        <div class="layui-btn-container">
                            <button type="button" class="layui-btn">保存</button>

        </div>

</div>

<!-- 表格头部工具栏 -->
<script type="text/html" id="toolbarBtns">
    <div sthle="padding:10px;">
        <div class="layui-btn-container" style="display: inline;">
            <!-- <button type="button" class="layui-btn layui-btn-normal" lay-event="add">添加</button> -->
            <button type="button" class="layui-btn layui-btn-primary layui-border-blue" lay-event="close">返回</button>
        </div>
         <div style="display: inline;">
           <label>人员编号：</label>
           <label id="label_person_no"></label>
           <label>姓名：</label>
           <label  id="label_person_name"></label>
           <!-- <label><span style="color:red">(如需设置新一年度的人员状态，请添加不要修改。)</span>   <a href="javascript:void(0)" onclick="showInfo()" >详细说明</a> </label> -->
         </div>
    </div>
</script>

<script type="text/html" id="rowBar">
    <div class="layui-btn-container">
        <button type="button" class="layui-btn layui-btn-sm" lay-event="edit">编辑</button>
        <button type="button" class="layui-btn layui-btn-danger layui-btn-sm" lay-event="delete">删除</button>
    </div>
 </script>


<script>
    /* 全局配置及引入相关的模块 */
    layui.use(['table', 'form', 'laydate'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;

        window.getCmeStandardKindId = function () {
            return getQueryString("cmeStandardKindId");
            // return localStorage.getItem("standardkind-id");
        }

        window.getUnitId = function () {
            return localStorage.getItem("unit-id");
        }

        window.getComPersonId = function () {
            return getQueryString("comPersonId");
        }

        window.layClose = function () {
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭
        }


        /* 表格初始化 */
        window.initTable = function () {
            table.render({
                elem: '#cmePerson',
                url: huayi_personorg_url + 'cmePerson/listNoPage',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                toolbar: '#toolbarBtns', //开启头部工具栏，并为其绑定左侧模板
                title: '人员变动表',
                defaultToolbar: [],
                where: {
                    comPersonId: getQueryString("comPersonId")
                },
                cols: [[
                    { align: 'center', title: '操作', toolbar: '#rowBar', minWidth: 140, fixed: 'left' },
                    { field: 'keyId', title: '主键', hide: true },
                    { field: 'cmeYear', title: '年度', align: 'center', minWidth: 100, sort: true },
                    { field: 'titleName', title: '职称', align: 'center', minWidth: 100 },
                    {
                        field: 'grantDate', title: '评定时间', align: 'center', minWidth: 140, sort: true, templet: function (data) {
                            if (data.grantDate != null && data.grantDate != undefined && data.grantDate1 != "") {
                                return data.grantDate.substring(0, 11);
                            } else {
                                return "";
                            }
                        }
                    },
                    { field: 'personStateName', title: '状态', align: 'center', minWidth: 100 },
                    { field: 'unit', title: '单位编号', align: 'center', minWidth: 80 },
                    { field: 'unitName', title: '单位名称', align: 'center', minWidth: 150 },
                    { field: 'hospitalLevelName', title: '单位级别', align: 'center', minWidth: 150 },
                    { field: 'remark', title: '备注', align: 'center', minWidth: 200 }
                ]],
                cellMinWidth: 100,
                id: 'cmePerson',
                height: 'full-155',
                page: false,
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status,  // 解析接口状态
                        'msg': res.msg,                          // 解析提示文本
                        'data': res.data                    // 解析数据列表
                    }
                },
                done: function () {
                    $("#label_person_no").text(getQueryString("personNo"));
                    $("#label_person_name").text(getQueryString("personName"));
                }
            });
        };

        window.initTable();

        // 监听头部新增按钮
        table.on('toolbar(cmePerson)', function (obj) {
            var datas = obj.data;
            console.log(datas);
            if (obj.event === 'add') {
                layer.open({
                    type: 2,
                    title: '新增',
                    content: 'cmeChangeDetailYearAddOrEdit.html?operate=add&unitId=' + window.getUnitId() + "&comPersonId=" + window.getComPersonId(),
                    area: ['60%', '80%']
                })
            }
            if (obj.event === 'close') {
                window.layClose();
            }
        });

        table.on('tool(cmePerson)', function (obj) {
            var data = obj.data;
            var keyId = data.keyId;

            var data = { keyId: keyId };
            data.operateUser = localStorage.getItem("user-name");
            data.operateUnit = localStorage.getItem("unit-id");
            if (obj.event === 'delete') {
                layer.confirm('确认删除吗？', function (index) {
                    let canDel = false;
                    $.ajax({
                        async: false,
                        type: "get",
                        url: huayi_personorg_url + "cmePerson/listNoPage?comPersonId=" + window.getComPersonId(),
                        headers: {
                            'Authorization': localStorage.getItem('token'),
                            'KJPT-USER-ID': localStorage.getItem('user-id')
                        },
                        success: function (result) {
                            if (result.success == true) {
                                let cmePersons = result.data;
                                if (cmePersons != null) {
                                    if (cmePersons.length == 1) {
                                        layer.msg("人员变动情况最少应有一条数据,不能删除");
                                        canDel = false;
                                    } else if (cmePersons.length > 1) {
                                        let maxYear = cmePersons[0].cmeYear;
                                        for (let i = 1; i < cmePersons.length; i++) {
                                            if (cmePersons[i].cmeYear > maxYear) {
                                                maxYear = cmePersons[i].cmeYear;
                                            }
                                        }
                                        if (obj.data.cmeYear == maxYear) {
                                            layer.msg("人员变动情况的最大年度不能删除");
                                            canDel = false;
                                        } else {
                                            canDel = true;
                                        }
                                    }
                                    else {
                                        canDel = false;
                                    }
                                }
                            } else {
                                layer.msg(result.msg);
                            }
                        },
                        error: function () {
                            layer.msg("发送数据失败");
                        }
                    });

                    if (canDel == true) {
                        $.ajax({
                            async: false,
                            type: "post",
                            url: huayi_personorg_url + "cmePerson/delete",
                            headers: {
                                'Authorization': localStorage.getItem('token'),
                                'KJPT-USER-ID': localStorage.getItem('user-id')
                            },
                            data: data,
                            success: function (result) {
                                if (result.success == true) {
                                    window.initTable();
                                    layer.close(index);
                                } else {
                                    layer.msg(result.msg);
                                }
                            },
                            error: function () {
                                layer.msg("发送数据失败");
                            }
                        });
                    }
                });
            } else if (obj.event === 'edit') {
                layer.open({
                    type: 2,
                    title: '编辑',
                    content: 'cmeChangeDetailYearAddOrEdit.html?operate=edit&keyId=' + keyId 
                                + '&cmeStandardKindId=' + getCmeStandardKindId(),
                    // area: ['900px', '780px']
                    area: ['70%', '80%']
                })
            }
        });


        window.showInfo = function () {
            layer.open({
                type: 2,
                content: "cmeChangeDetailInfo.html",
                area: ['750px', '80%'],
                scrollbar: false
            });
        }

    });

</script>
