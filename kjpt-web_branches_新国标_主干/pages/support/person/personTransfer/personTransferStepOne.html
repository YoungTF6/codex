<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人员调动向导</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
<script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <script type="text/javascript" src="/js/api/manage.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/tools/form_validation_tool.js"></script>

    <style>
        .myBoder {
            border: 1px solid #6086b5;
        }

    </style>
</head>

<body>


    <div class="layui-bg-gray" style="padding: 30px;">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header myBoder">
                        <h3 style="font-weight: bold;">第一步: 选择人员的原所在地</h3>
                    </div>
                    <div class="layui-card-body myBoder">
                        <div class="layui-card">
                            <!--        搜索框区域-->
                            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                                <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                                    <div class="layui-inline">
                                        <label class="layui-form-label">请选择地区</label>
                                        <div class="layui-input-block">
                                            <select name="standardKindId" id="standardKindSearch" lay-filter="standard-kind-search">
                                            </select>
                                        </div>
                                    </div>
                
                                    <div class="layui-inline">
                                        <label class="layui-form-label">查询项</label>
                                        <div class="layui-input-block">
                                            <span style="width:130px;display:inline-block;">
                                                <select id="select_column">
                                                    <option value="cert_id">身份证号</option>
                                                    <option value="person_no">医通卡号</option>
                                                </select>
                                            </span>
                                            <span style="width:140px;display:inline-block;">
                                                <input type="text" name="description" id="text_value" placeholder="请输入"
                                                    autocomplete="off" class="layui-input">
                                            </span>
                                        </div>
                                    </div>
                
                                    <div class="layui-inline">
                                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                                            lay-filter="table-search" data-type="reload">
                                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                                        </a>
                                    </div>
                                </blockquote>
                            </div>
                
                            <!--        表格区域-->
                            <div class="layui-card-body layui_body_box">
                                <table class="layui-table" id="comPerson" lay-filter="comPerson" style="margin: 0px 0px;">
                                </table>
                            </div>

                            <div class="layui-card-body layui_body_box">
                                <button id="nextStepBtn" style="margin-left: 40%;" type="button" class="layui-btn">下一步</button>
                            </div>
                
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        eleTree: 'eleTree',
        xmSelect: 'xm-select',
        zTreeSelectM: 'zTreeSelectM'
    });
    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'element', 'laydate', 'eleTree', 'xmSelect', 'zTreeSelectM'], function () {
        var $ = layui.jquery
            , table = layui.table
            , element = layui.element
            , form = layui.form
            , laydate = layui.laydate
            , xmSelect = layui.xmSelect
            , eleTree = layui.eleTree
            , zTreeSelectM = layui.zTreeSelectM
            , layer = layui.layer;

        let standardKindIdObj = {};
        var unitId = localStorage.getItem("unit-id")
            , standardkindId = localStorage.getItem("standardkind-id")
            , personData
            ;

        //套
        let standardKindInit = function () {
            var standardkindIdArr = standardkindId.split(",");
            console.log(standardkindIdArr);
            commonAjax('get', huayi_sjwh_url + "cmestandardkind/list/all", {},
                function () { layer.msg("套加载失败"); },
                function (res) {
                    let options = '<option value="" > 请选择套标准 </option>';
                    for (let tempObj of res.data) {
                        if (standardkindIdArr.includes(tempObj.cmeStandardKindId)) {
                            standardKindIdObj[tempObj.cmeStandardKindId] = {
                                description: tempObj.description,
                                topUnitId: tempObj.topUnitId
                            };
                            options += '<option top-unit-id="' + tempObj.topUnitId + '" value="' + tempObj.cmeStandardKindId + '">' + tempObj.description + '</option>';
                        }
                    }
                    $('#standardKindSearch').append(options);
                    $('#standardKindForm').append(options);
                    form.render('select');
                });
        }

        // 表格配置
        window.loaderTable = function () {
            var standardKindSearch = $('#standardKindSearch').val();
            var keyword = $("#text_value").val();
            // 查询条件为空不加载
            if (strTool.isBlank(standardkindId)) {
                layer.msg('该账号未配置套权限');
                return false;
            }
            if(strTool.isBlank(standardKindSearch) ){
                layer.msg('请选择地区');
                return false;
            }
            if(strTool.isBlank(keyword)){
                layer.msg('请输入查询条件');
                return false;
            }
            var certId, personNo;
            var select_column = $("#select_column").val();
            var text_value = $("#text_value").val();
            if( select_column == 'cert_id'){
                certId = text_value;
            } else if (select_column == 'person_no'){
                personNo = text_value;
            }
            table.render({
                elem: '#comPerson',
                url: huayi_personorg_url + '/comperson/getOne',
                title: '用户表',
                defaultToolbar: [],
                where: {
                    // cmeStandardKindIds: strTool.isBlank(standardKindSearch) ? standardkindId : standardKindSearch,
                    // keywordColumn: $("#select_column").val(),
                    // keyword: $("#text_value").val(),
                    certId: certId,
                    personNo: personNo
                },
                cols: [[
                    // 医通卡号 姓名 性别 职称 证件号码 出生日期     工作单位 科室 地区 人员调动状态。
                    { field: 'personNo', title: '医通卡号', width: 110, sort: true },
                    { field: 'personName', title: '姓名', width: 80, sort: true },
                    { field: 'sex', title: '性别', width: 75, sort: true },
                    { field: 'titleName', title: '职称', width: 110, sort: true },
                    { field: 'certId', title: '证件号码', width: 180, sort: true },
                    { field: 'birthday', title: '出生日期', width: 110, sort: true },
                    { field: 'unitName', title: '工作单位', width: 180, sort: true },
                    { field: 'deptName', title: '科室', width: 110, sort: true },
                    { field: 'description', title: '地区', width: 80 },
                    {
                        field: 'transferState', title: '人员调动状态', width: 130, templet:
                            function (d) {
                                if (d.transferState == 1) {
                                    return '调出 ';
                                } else if (d.transferState == 2) {
                                    return '调入';
                                } else if (d.transferState == 0) {
                                    return '未调动';
                                } else {
                                    return '未知';
                                }
                            }
                    },
                ]],
                id: "comPerson",
                parseData: function (res) {
                    if (res.status == 200) {
                        personData= res.data;
                        let datas = [];
                        datas.push(res.data);
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.msg, //解析提示文本
                            "data": datas, //解析数据列表
                        }
                    } else {
                        layer.msg(res.msg);
                        return false;
                    }
                }
            });
        };

        // 点击下一步
        layui.$('#nextStepBtn').on('click', function(){
            console.log(personData);
            if(!personData){
                layer.msg('人员数据不完整');
                return ;
            }
            layer.open({
                title: '',
                type: 2,
                area: ['100%', '100%'],
                maxmin: true,
                content: 'personTransferStepTwo.html?comPersonId=' + personData.comPersonId 
                                    + '&cmeStandardKindId=' + personData.cmeStandardKindId 
                                    + '&srcUnitId=' + personData.unitId 
                                    + '&unitName=' + personData.unitName 
                                    + '&personNo=' + personData.personNo 
                                    + '&personName=' + personData.personName,
                scrollbar: false
            });
            // window.location.href = 'personTransferStepTwo.html?comPersonId=' + personData.comPersonId 
            //                         + '&personNo=' + personData.personNo 
            //                         + '&personName=' + personData.personName;

        });

    
            //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    if (res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }

        // 下一步前校验输入
        $('#nextStep').click(function () {
            var completePeriod = $("#completePeriod").val();
            if(completePeriod == '' || completePeriod == null || completePeriod == undefined){
                layer.msg('实际完成内容不能为空')
                return false
            }
        })

           // 初始化函数
        layer.ready(function () {
            standardKindInit();//套初始化
        })

    });

</script>
</body>

</html>
