        function renderCmeYearSelector() {
            let cmeStandardKindId = $("#standardSelector").val();
            // 福建修改接口地址 
            // if (cmeStandardKindId == '8b1e9418-47ff-4ff7-9dd9-a9e0009a6951') {
            //     projUrl = 'http://220.160.53.27:18025/projectscore/';
            // } else {
            //     projUrl = huayi_projectscore_url;
            // }
            let visit = projUrl + 'ps/cmeYearList/personForSupport/' + $("#certId").val() + '?cmeStandardKindId=' + cmeStandardKindId;
            let jsonRes;
            let yearIndex = -1;
            getAction(visit).then(response => {
                jsonRes = response.data;
                if (jsonRes.success) {

                    let cmeYearSelector = $('#cmeYearSelector');
                    let personCmeYearVoList = jsonRes.data;
                    if (personCmeYearVoList.length > 0) {
                        // 判断所选年度是否存在
                        cmeYear = $("#cmeYearSelector").val();
                        personCmeYearVoList.forEach((personCmeYearVo, index) => {
                            if (cmeYear == personCmeYearVo.cmeYear) {
                                yearIndex = index;
                            }
                        });

                        $('#cmeYearSelector').html('');
                        personCmeYearVoList.forEach((personCmeYearVo, index) => {
                            $(cmeYearSelector).append(new Option(personCmeYearVo.cmeYear, personCmeYearVo.cmeYear, 0 === index, 0 === index));
                            if (index === yearIndex) {
                                if (strTool.isNotBlank(personCmeYearVo.startDate) && strTool.isNotBlank(personCmeYearVo.endDate)) {
                                    datePeriod = personCmeYearVo.startDate.substring(0, 10) + '—' + personCmeYearVo.endDate.substring(0, 10);
                                } else if (strTool.isNotBlank(personCmeYearVo.datePeriod)) {
                                    datePeriod = personCmeYearVo.datePeriod;
                                } else {
                                    datePeriod = '';
                                }
                                let selArr = personCmeYearVo.titleName.split('|');
                                cmeYear = personCmeYearVo.cmeYear;
                                unitId = personCmeYearVo.unitId;
                                titleId = personCmeYearVo.titleId;
                                // titleName = personCmeYearVo.titleName;
                                titleName = selArr[2];
                                $('p[name="titleName"]').val(titleName + datePeriod);
                                $('p[name="titleName"]').html(titleName + datePeriod);
                            }
                        });
                        $("#cmeYearSelector").val(cmeYear);
                    } else {
                        $('#cmeYearSelector').html('');
                        $('p[name="titleName"]').val('');
                        $('p[name="titleName"]').html('');
                    }
                    form.render('select', 'cmeYearSelector');
                    if (yearIndex == -1) {
                        layer.msg('未查到该年度信息');
                        console.log('未查到该年度信息');
                        clearDom();
                        return false;
                    }
                } else if (jsonRes.status == 500) {
                    return false;
                }
            }).catch(error => {
                layer.msg('error:加载年度');
            }).finally(() => {
                if (jsonRes.status == 500) {
                    clearDom();
                    layer.msg(jsonRes.msg);
                    console.log(jsonRes.msg);
                    return false;
                }
                if (yearIndex != -1) {
                    changeCmeYear();
                }
            });
        }

        function clearDom() {
            // 清空信息

        function changeCmeYear() {
            let cmeYearSelector = $("#cmeYearSelector");
            let titleNameInput = $('p[name="titleName"]');

            let selectedText = $(cmeYearSelector).find("option:selected").text();
            let selectedVal = $(cmeYearSelector).val();
            console.info('selectedText: %s, selectedVal:%s', selectedText, selectedVal);

            if (!selectedVal) {
                $(titleNameInput).html('职称')
            } else {
                debugger
                // let selArr = selectedVal.split('|');
                // cmeYear = selArr[0];
                // unitId = selArr[1];
                // let titleName = selArr[2] + selArr[4];
                // titleId = selArr[3];
                // console.info('selected cmeYear: %s, unitId: %s, titleId: %s, titleName: %s', cmeYear, unitId, titleId, titleName);

                $(titleNameInput).val(titleName + '  ' + datePeriod)
                $(titleNameInput).html(titleName + '  ' + datePeriod)

                let visit = projUrl + 'ps/all/person/support';
                let params = {
                    cmeYear: cmeYear,
                    // standardKindId: _standardKindId,
                    // unitId: unitId,
                    // comPersonId: comPersonId,
                    // titleId: titleId,
                    // userId: _userId,
                    certId: $('#certId').val()
                };

                let msg = '<span style="color: #666666;">&nbsp;正在查询&nbsp;···</span>';
                gLayerIndex = layer.msg(msg, { icon: 16, shade: 0.3, time: 0 });

                postAction(visit, params).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        let rdd = jsonRes.data;
                        $('.text_left1 span').html(rdd.personName);
                        $('.text_left1 p').html(rdd.certId);
                        debugger
                        if(rdd.checkStatus == 0){
                            $('#check_title').html('学员信息在继教系统未审核，请学员尽快联系工作单位审核。 学员添加实际：' + rdd.addTime)
                        }else if(rdd.checkStatus == 4){
                            $('#check_title').html('学员信息在继教系统审核被驳回，请学员联系工作单位。 学员添加实际：' + rdd.addTime)
                        }else{
                            // 隐藏
                            $('#check_title').html('')
                        }
                        comPersonId = jsonRes.comPersonId;
                        gPassStandardVoList = rdd.passStandardVoList;
                        gScoreTotalList = rdd.scoreTotalList;
                        gScoreDetailList = rdd.scoreDetailList;
                    }
                }).catch(error => {
                    layer.msg('error:加载获取达标信息');
                }).finally(() => {
                    renderPassStandard(gPassStandardVoList);
                    renderScoreTotal(gScoreTotalList);
                    renderScoreDetail(gScoreDetailList);
                    layer.close(gLayerIndex);
                });
            }
        }

        // step-1
        function renderPassStandard(passStandardVoList) {
            console.info('renderPassStandard');
            let k12List = [];
            let k3List = [];
            passStandardVoList.forEach((passStandardVo, index) => {
                if (passStandardVo.kind < 3) {
                    k12List.push(passStandardVo);
                } else {
                    k3List.push(passStandardVo);
                }
            });

            // if (k12List && k12List.length > 0) {
            //     let content = '<h4 style="color: #333333;"></h4>';
            //     k12List.forEach(item => {
            //         content += '<p style="text-indent:2em">' + item.standardMsg + '</p>';
            //     });
            //     $('.pass_rule div:eq(2)').html(content);
            // }

            if (k3List && k3List.length > 0) {
                let msg = k3List[0].standardMsg;
                if (msg.startsWith('不达标')) {
                    // 不达标
                    $('.yon_node:eq(0)').hide();
                    $('.yon_node:eq(1)').show();
                    $('.zong_text').html(msg.replace('不达标', '').replace('|', ''));
                } else if (msg.startsWith('达标')) {
                    // 达标
                    $('.yon_node:eq(0)').show();
                    $('.yon_node:eq(1)').hide();
                } else if (msg.startsWith('未知')) {
                    // 未知
                    $('.yon_node:eq(0)').hide();
                    $('.yon_node:eq(1)').show();
                    $('.zong_text').html('未知');
                }
            } else {
                // 未知
                $('.yon_node:eq(0)').hide();
                $('.yon_node:eq(1)').show();
                $('.zong_text').html('未知');
            }

            // 达标标准
            let passStandard;
            // let k12List = passStandardVoList.filter(item => item.kind < 3);
            if (k12List && k12List.length > 0) {
                passStandard = '<div><p>';
                k12List.forEach(passStandardVo => {
                    passStandard += passStandardVo.standardMsg + '<br/>';
                })
                passStandard += '</p></div>';
                $("#dabiao_text").show();
            } else {
                $("#dabiao_text").hide();
            }
            $("#dabiao_text").html('');
            $("#dabiao_text").append(passStandard);
        }

        // step-2
        function renderScoreTotal(scoreTotalList) {
            let totalScore, totalPeriod, score1, score2, score3;
            let totalScore_y, totalPeriod_y, score1_y, score2_y, score3_y;
            let label1 = '', label2 = '', label3 = '';
            scoreTotalList.forEach(item => {
                if (item.scoreType === 1 && item.kind === 1) {
                    // 全部学分
                    totalScore = item.score;
                    totalPeriod = item.period;
                } else if (item.scoreType === 1 && item.kind === 0) {
                    (1 === item.listOrder) && (score1 = item.score, label1 = item.scoreKindName);
                    (2 === item.listOrder) && (score2 = item.score, label2 = item.scoreKindName);
                    (3 === item.listOrder) && (score3 = item.score, label3 = item.scoreKindName);
                } else if (item.scoreType === 2 && item.kind === 2) {
                    // 计入达标学分
                    totalScore_y = item.score;
                    totalPeriod_y = item.period;
                } else if (item.scoreType === 2 && item.kind === 0) {
                    (1 === item.listOrder) && (score1_y = item.score);
                    (2 === item.listOrder) && (score2_y = item.score);
                    (3 === item.listOrder) && (score3_y = item.score);
                }
            });
            $('h1[data-id=total_score]').text(totalScore);
            $('h1[data-id=total_period]').text(totalPeriod);
            $('h1[data-id=score1]').text(score1);
            $('h1[data-id=score2]').text(score2);
            $('h1[data-id=score3]').text(score3);
            $('h1[data-id=total_score_y]').text(totalScore_y);
            $('h1[data-id=total_period_y]').text(totalPeriod_y);
            $('h1[data-id=score1_y]').text(score1_y);
            $('h1[data-id=score2_y]').text(score2_y);
            $('h1[data-id=score3_y]').text(score3_y);
            $('span[data-label=score1]').text(label1);
            $('span[data-label=score2]').text(label2);
            $('span[data-label=score3]').text(label3);
        }

        // step-3
        function renderScoreDetail(scoreDetailList) {
            table.reload('scoreDetailTable', {
                data: scoreDetailList ? scoreDetailList : []
            })
        }


    });
</script>
