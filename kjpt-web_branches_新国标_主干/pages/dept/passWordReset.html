<div id ='form-dept-password-reset' style=" display:none;text-align: center">
    <form class="layui-form" style = "padding-top: 20px;" lay-filter = 'form-dept-password-reset' >
<!--        <div class="layui-form-item">
            <label class="layui-form-label"><span style="color: red">*&nbsp;</span>原密码</label>
            <div class="layui-input-inline">
                <input type="password" name="oldPassword" placeholder="请输入原密码" autocomplete="off" class="layui-input">
            </div>
        </div>-->
        <div class="layui-form-item">
            <label class="layui-form-label">
                <span style="color: red; font-weight: bold;">*&nbsp;</span>新密码</label>
            <div class="layui-input-inline">
                <input type="password" style="width: 300px" class="layui-input" 
                        lay-verify="pwd_strength" id="new-password-input" name="newPassword" 
                        placeholder="请输入8~25位包含数字、大小写、符号的密码">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">
                <span style="color: red; font-weight: bold;">*&nbsp;</span>确认密码</label>
            <div class="layui-input-inline">
                <input type="password" style="width: 300px" class="layui-input"  
                        lay-verify="pwd_confirm" name="confirmPassword" placeholder="请再次输入密码进行确认">
            </div>
        </div>
        <div class="layui-form-item" style="display:none">
            <div class="layui-inline">
                <div class="layui-input-block">
                    <input type="text" name="deptId" >
                    <button type="submit" lay-submit
                            id="form-dept-password-reset-submit" 
                            lay-filter='form-dept-password-reset-submit'>提交</button>
                </div>
            </div>
        </div>
    </form>
</div>
