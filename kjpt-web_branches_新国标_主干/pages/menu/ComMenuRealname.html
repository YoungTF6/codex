<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>菜单套别名</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <style>
        #form-ComMenuRealname .layui-inline {
            width: 90%;
        }
    </style>

</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">


        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">

                <div class="layui-inline">
                    <label class="layui-form-label">选择套：</label>
                    <div class="layui-input-block">
                        <select name="cmeStandardKindId"  id="CmeStandardKindId">
                            <option value="">请选择</option>
                        </select>
                    </div>
                </div>


                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                       lay-filter="table-search"
                       data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </a>
                </div>

                <div class="layui-inline" style="float: right">
                    <div class="layui-input-block">
                        <a class="layui-icon" id="hint"><span style="color: red;">&#xe60b;</span></a>
                    </div>
                </div>

            </blockquote>
        </div>


        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="comMenuRealname" lay-filter="comMenuRealname" style="margin: 0px 0px;">
            </table>
        </div>


        <!--        添加弹窗-->

        <div id="add-comMenuRealname" style=" display:none;">

            <form class="layui-form" style="padding: 30px 0px;" id="form-ComMenuRealname" lay-filter="add-filter">

                <div class="layui-form-item" style="display: none">
                    <div class="layui-inline">
                        <label class="layui-form-label">主键</label>
                        <div class="layui-input-block">
                            <input type="text" name="menuRealnameId" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">套选择</label>
                        <div class="layui-input-block">
                            <select name="cmeStandardKindId"  id="formCmeStandardKindId" lay-search>
                                <option value="">请选择</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">选择标准菜单</label>
                        <div class="layui-input-block">
<!--                            <input type="text" name="menuId" placeholder="菜单编号" autocomplete="off" class="layui-input">-->
                            <div id="myselect" class="xm-select-demo"></div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">本套菜单别名</label>
                        <div class="layui-input-block">
                            <input type="text" name="menuRealname" placeholder="本套菜单别名.适用于某省某个菜单与标准菜单表的菜单名称不一致"
                                   autocomplete="off" class="layui-input">
                        </div>
                    </div>
<!--                    <p>本套菜单别名.适用于某省某个菜单与标准菜单表里的菜单名称不一致的情况</p>-->
                </div>

                <div class="layui-form-item">
                    <div style="text-align: center;">
                        <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>


    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="add"><i class="layui-icon">&#xe654;</i>新增</a>
</script>
<script>
    // 全局配置及引入相关的模块
    layui.config({
        base: '../../js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
    }).use(['table', 'form','xmSelect','authtree'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var xmSelect = layui.xmSelect;
        var authtree = layui.authtree;
        var selectPlus=layui.selectPlus;

        // 初始化树状下拉菜单
        var demo1 = xmSelect.render({
            el: '#myselect',
            empty: '无数据',
            tips: '请选择菜单',
            searchTips: '你想查看哪个目录下的所有菜单',
            filterable: true,
            radio: true,
            name: 'menuId',
            clickClose: true,
            // 设置后台数据字段对应前台字段。
            prop: {
                // name: 'menuName',
                // value: 'menuId',
                children: 'list'
            },
            tree: {
                show: true,
                strict: false,
                showFolderIcon: true,
                showLine: true,
                indent: 20,
                expandedKeys: [-1],
            },
            // 修改填充到input的样式
            model: {label: {type: 'text',}},
            style: {
                // marginLeft: '20px',
                // borderRadius: '50px',
                // height: '50px',
                width: '430px',
            },
        })
        // 添加页填充父级菜单下拉框
        $().ready(function () {
            // 请求菜单，生成菜单树
            $.ajax({
                url: huayi_permission_url + 'commenu/list',
                success: function (res) {
                    var trees = [];
                    if (res.data.length > 0) {
                        trees = authtree.listConvert(res.data, {
                            primaryKey: 'menuId'
                            , parentKey: 'parentMenuId'
                            , nameKey: 'menuName'
                            , valueKey: 'menuId'
                            , startPid: '-'
                        });
                        demo1.update({
                            data: trees,
                            autoRow: true,
                        })
                    } else {

                    }
                }
            });

            // 请求套数据
            $.ajax({
                type: 'get',
                url: huayi_sjwh_url+'cmestandardkind/list/all',
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.data.length>0){
                        for (var i=0;i<res.data.length;i++){
                            $('#formCmeStandardKindId').append("<option value='"+res.data[i].cmeStandardKindId+"'>"+res.data[i].description+"</option>")
                            $('#CmeStandardKindId').append("<option value='"+res.data[i].cmeStandardKindId+"'>"+res.data[i].description+"</option>")
                            layui.form.render("select");
                        }
                    }
                },
                error: function () {
                    layer.msg("加载套列表失败");
                }
            })

        });

// 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#comMenuRealname',
                url: huayi_permission_url + 'comMenuRealname/list',
                title: '套菜单别名',
                defaultToolbar: [],
                where: {
                    cmeStandardKindId: $('#CmeStandardKindId').val(),
                },
                cols: [[
                    {align: 'center', width: 150, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    {field: 'menuRealnameId', title: '主键ID', sort: true, hide: true},
                    {field: 'cmeStandardKindId', title: '套id', sort: true, hide: true},
                    {field: 'menuId', title: '菜单id', sort: true, hide: true},
                    {field: 'description', title: '套名称', sort: true},
                    {field: 'menuName', title: '菜单原名称', sort: true},
                    {field: 'menuRealname', title: '套菜单别名', sort: true},
                    // {field: 'menuUrl', title: '菜单路径', sort: true},
                    {field: 'addTime', title: '添加时间', sort: true},
                    {field: 'updateTime', title: '更新时间', sort: true}                    
                ]],
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "comMenuRealname",
                height: 'full-155',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });
        };

        // 初始化表格
        loaderTable();
        // 监听头部新增按钮
        table.on('toolbar(comMenuRealname)', function (obj) {
            var datas = obj.data;
            document.getElementById("form-ComMenuRealname").reset();
            obj.event === 'add' && openWindow();
        });

        let openWindow = function(title='新增'){
            layer.open({
                type: 1,
                title: title,
                content: $('#add-comMenuRealname'),
                skin: '',
                area: ['600px', '500px'],
            })
        }

        // 监听行内按钮
        table.on('tool(comMenuRealname)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'edit') {
                form.val('add-filter', datas);
                demo1.setValue([{name:datas.menuName,value:datas.menuId}]);
                openWindow("修改");
            } else if (obj.event === 'del') {
                layer.confirm('<span style="color: red">确认删除</span>', {icon: 3, title: '<span style="color: red">提示</span>'}, function () {
                    layer.confirm('<span style="color: red">你的删除操作会对你的业务造成一定的影响，请确认是否删除！</span>',{icon: 3, title: '<span style="color: red">提示</span>'},function () {
                    $.ajax({
                        type: 'get',
                        url: huayi_permission_url + 'comMenuRealname/deleted',
                        data: {
                            menuRealnameId: datas.menuRealnameId
                        },
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("删除成功");
                                table.reload('comMenuRealname');
                            }
                        }
                    });
                    layer.msg("删除成功");
                    })
                })
            }
        });

// form表单相关操作
        // 新增/修改表单提交
        form.on('submit(submit)', function (data) {
            // 用于判断是新增还是修改
            var formTableId = $("#add-comMenuRealname input[name='menuRealnameId']").val();
            var datas = JSON.stringify(data.field);
            var URL;
            if (formTableId === '' || formTableId === null) {
                // 走新增逻辑
                URL = huayi_permission_url + 'comMenuRealname/save';
            } else {
                // 走修改逻辑
                URL = huayi_permission_url + 'comMenuRealname/update';
            }
            $.ajax({
                type: 'post',
                url: URL,
                data: datas,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    layer.msg("修改成功");
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
        })


        //鼠标悬停提示特效
        $("#hint").hover(function() {
            openMsg();
        }, function() {
            layer.close(subtips);
        });
        function openMsg() {
            subtips = layer.tips('作用：本页面用于给套菜单设置别名。例如： 《人员达标情况查询》，在山东套需要设置别名为《个人合格情况查询》。<br>前提条件：必须有菜单和套', '#hint',{tips:[1,'#ff6700'],time: 30000});
        }
        //END 鼠标悬停提示特效

    });

</script>
</body>
</html>
