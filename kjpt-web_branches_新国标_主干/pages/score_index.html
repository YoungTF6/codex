<!DOCTYPE html>

        .layui-table-view .layui-form-checkbox, .layui-table-view .layui-form-radio, .layui-table-view .layui-form-switch{ margin-right: 10px;margin-bottom: 10px; }

                                <div class="layui-input-inline">

                                        <!-- 动态生成年度选项 -->
                                    </select>
                                </div>

                                <div class="layui-input-inline">
                                    <input id="person_no" name="person_no" type="text" class="layui-input" placeholder="人员编号" />
                                </div>
                                <label class="layui-form-label">同步状态</label>

                                    <select id="submit_status" name="submit_status" lay-verify="required">
                                        <option value="">全部</option>
                                        <option value="未上报">未上报</option>
                                        <option value="未同步">未同步</option>
                                        <option value="同步成功">同步成功</option>
                                        <option value="同步失败">同步失败</option>
                                    </select>
                                </div>
                            </div>

                                <label class="layui-form-label">科室</label>

                                    <select id="dept_id" name="dept_id" lay-verify="required">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                                <input type="button" class="layui-btn layui-btn-sm" data-type="reload" id="btn_search"
                                    value="查询" />
                            </div>
                            <div class="layui-inline">
                                <span class="warning-text">注：本页仅统计已达标学员</span>
                            </div>
                        </div>

                var currentYear = new Date().getFullYear() - 1;
                for (var i = 0; i <= 5; i++) {
                    var year = currentYear - i;
                    var option = '<option value="' + year + '"';
                    if (i === 0) {
                        option += ' selected';
                    }
                    option += '>' + year + '</option>';
                    cmeYearSelect.append(option);
                }

            });
        }
        
        // 日期格式化
        function Format(datetime, fmt) {
            if (parseInt(datetime) == datetime) {
                if (datetime.length == 10) {
                    datetime = parseInt(datetime) * 1000;
                } else if (datetime.length == 13) {
                    datetime = parseInt(datetime);
                }
            }
            datetime = new Date(datetime);
            var o = {
                "M+": datetime.getMonth() + 1,                 //月份   
                "d+": datetime.getDate(),                    //日   
                "h+": datetime.getHours(),                   //小时   
                "m+": datetime.getMinutes(),                 //分   
                "s+": datetime.getSeconds(),                 //秒   
                "q+": Math.floor((datetime.getMonth() + 3) / 3), //季度   
                "S": datetime.getMilliseconds()             //毫秒   
            };
            if (/(y+)/.test(fmt))
                fmt = fmt.replace(RegExp.$1, (datetime.getFullYear() + "").substr(4 - RegExp.$1.length));
            for (var k in o)
                if (new RegExp("(" + k + ")").test(fmt))
                    fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
            return fmt;
        }
    </script>
