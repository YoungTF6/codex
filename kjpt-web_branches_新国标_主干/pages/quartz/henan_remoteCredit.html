<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>河南远程学分同步控制台</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">

    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>

    <style>
        /* 简单的自定义样式增强 */
        .henan-badge {
            background-color: #1E9FFF; /* 河南专版使用蓝色标识 */
            color: #fff;
            padding: 2px 5px;
            border-radius: 2px;
            font-size: 12px;
            margin-right: 5px;
            vertical-align: middle;
        }
        .layui-card-header {
            font-weight: bold;
        }
        .quick-btn-group {
            margin-bottom: 15px;
            padding-left: 110px; /* 对齐输入框 */
        }
    </style>
</head>

<body style="background-color: #f2f2f2;">

<div class="layui-fluid">

    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <span class="henan-badge">河南专版</span> 远程学分同步任务管理
                </div>
                <div class="layui-card-body" style="padding: 20px;">

                    <div class="layui-form">

                        <div class="quick-btn-group">
                            <button type="button" class="layui-btn layui-btn-xs layui-btn-primary" onclick="setQuickTime('today')">今天</button>
                            <button type="button" class="layui-btn layui-btn-xs layui-btn-primary" onclick="setQuickTime('yesterday')">昨天</button>
                            <button type="button" class="layui-btn layui-btn-xs layui-btn-primary" onclick="setQuickTime('lastHour')">最近1小时</button>
                        </div>

                        <div class="layui-form-item">
                            <label class="layui-form-label">开始时间</label>
                            <div class="layui-input-inline" style="width: 200px;">
                                <input type="text" id="beginTime"
                                       placeholder="请选择开始时间"
                                       autocomplete="off"
                                       class="layui-input" readonly>
                            </div>

                            <label class="layui-form-label">结束时间</label>
                            <div class="layui-input-inline" style="width: 200px;">
                                <input type="text" id="endTime"
                                       placeholder="请选择结束时间"
                                       autocomplete="off"
                                       class="layui-input" readonly>
                            </div>

                            <div class="layui-inline">
                                <button class="layui-btn layui-btn-normal" id="btnSync" onclick="executeSync()">
                                    <i class="layui-icon layui-icon-refresh-3"></i> 执行同步
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">操作说明</div>
                <div class="layui-card-body">
                    <blockquote class="layui-elem-quote layui-quote-nm" style="border-left: 5px solid #1E9FFF;">
                        <p>1. 本功能仅用于触发<b>河南地区</b>的远程学分数据同步。</p>
                        <p>2. 系统已集成时间选择器，点击输入框即可选择，无需手动输入。</p>
                        <p>3. 点击“执行同步”后，任务将在后台队列中运行，请勿频繁重复点击。</p>
                        <p>4. 建议同步时间跨度不要超过 <b>24小时</b>，以免造成服务器压力。</p>
                    </blockquote>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    });

    layui.use(['layer', 'laydate'], function () {
        var layer = layui.layer;
        var laydate = layui.laydate;
        var $ = layui.jquery;

        // 初始化时间选择器
        var startLayDate = laydate.render({
            elem: '#beginTime',
            type: 'datetime',
            trigger: 'click', // 解决部分浏览器闪烁问题
            done: function(value, date){
                // 结束时间不能小于开始时间
                endLayDate.config.min = {
                    year: date.year,
                    month: date.month - 1,
                    date: date.date,
                    hours: date.hours,
                    minutes: date.minutes,
                    seconds: date.seconds
                };
            }
        });

        var endLayDate = laydate.render({
            elem: '#endTime',
            type: 'datetime',
            trigger: 'click'
        });

        // 快捷时间设置函数
        window.setQuickTime = function(type) {
            var now = new Date();
            var startStr, endStr;

            var formatDate = function(date) {
                var y = date.getFullYear();
                var m = (date.getMonth() + 1).toString().padStart(2, '0');
                var d = date.getDate().toString().padStart(2, '0');
                var h = date.getHours().toString().padStart(2, '0');
                var min = date.getMinutes().toString().padStart(2, '0');
                var s = date.getSeconds().toString().padStart(2, '0');
                return y + '-' + m + '-' + d + ' ' + h + ':' + min + ':' + s;
            };

            if (type === 'today') {
                var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
                var todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
                startStr = formatDate(todayStart);
                endStr = formatDate(todayEnd);
            } else if (type === 'yesterday') {
                var yesStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 0, 0, 0);
                var yesEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 23, 59, 59);
                startStr = formatDate(yesStart);
                endStr = formatDate(yesEnd);
            } else if (type === 'lastHour') {
                var oneHourAgo = new Date(now.getTime() - 60 * 60 * 1000);
                startStr = formatDate(oneHourAgo);
                endStr = formatDate(now);
            }

            $("#beginTime").val(startStr);
            $("#endTime").val(endStr);
        };

        // 触发远程学分同步
        window.executeSync = function () {
            let beginTime = $("#beginTime").val();
            let endTime = $("#endTime").val();

            if (!beginTime || !endTime) {
                layer.msg("请先选择开始时间和结束时间", {icon: 5, anim: 6});
                return;
            }

            layer.confirm(
                '确定要执行 <span style="color:red">河南</span> 远程学分同步任务吗？<br>时间范围：' + beginTime + ' 至 ' + endTime,
                {icon: 3, title: '高风险操作提示'},
                function (index) {
                    layer.close(index);

                    // UI 反馈：Loading 并禁用按钮
                    var loadIndex = layer.load(2, {shade: [0.3, '#000']}); // 加载层
                    var $btn = $("#btnSync");
                    $btn.addClass("layui-btn-disabled").prop("disabled", true).html('<i class="layui-icon layui-icon-loading layui-icon layui-anim layui-anim-rotate layui-anim-loop"></i> 同步中...');

                    $.ajax({
                        type: 'post',
                        // 保持原有的URL拼接逻辑
                        url: (typeof huayi_projectscore_url !== 'undefined' ? huayi_projectscore_url : '') + 'internal/api/sync/remote/credit/execute',
                        data: {
                            beginTime: beginTime,
                            endTime: endTime
                        },
                        dataType: 'json',
                        success: function (res) {
                            layer.close(loadIndex);
                            if (res.code === 200) {
                                layer.alert(res.msg || "同步任务已成功加入队列！", {icon: 1});
                            } else {
                                layer.alert(res.msg || "执行失败，请检查接口", {icon: 2});
                            }
                        },
                        error: function (xhr, status, error) {
                            layer.close(loadIndex);
                            layer.msg("接口调用异常: " + status, {icon: 2});
                        },
                        complete: function() {
                            // 恢复按钮状态
                            $btn.removeClass("layui-btn-disabled").prop("disabled", false).html('<i class="layui-icon layui-icon-refresh-3"></i> 执行同步');
                        }
                    });
                }
            );
        }
    });
</script>

</body>
</html>
