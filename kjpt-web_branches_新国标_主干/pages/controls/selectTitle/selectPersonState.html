<script>

    loadTitleTypes();

    function loadTitleTypes() {
        $.ajax({
            url: huayi_personorg_url + 'comperson/getPersonStateListByCmeStandardKindId',
            type:'post',
            async: false,
            data: { "cmeStandardKindId": localStorage.getItem("standardkind-id") },
            dataType: "json",
            success: function (result) {
                var personStates = result.data;
                if (personStates.length > 0) {
                    var personState = null;
                    for (var i = 0; i < personStates.length; i++) {
                        personState = personStates[i];
                        var $tr;
                        if (i % 4 == 0) {
                            $tr = $("<tr></tr>");
                        }
                        if ($tr != null) {
                            var $td = $('<td id="' + personState.person_state_id + '"><div>'+
                                '<input class="cb2" type="checkbox" name="" title="'+personState.person_state_name+'" value="'+personState.person_state_id+'">' +
                                personState.person_state_name+'</div></td>');
                            $tr.append($td);
                        }
                        if (i % 4 == 2) {
                            $("#dltitle2 tbody").append($tr);
                        }
                    }


                }
            }

        });
    }

<script type="text/javascript">

    function Arrcontains(ele, source) {
        for (i = source.length - 1; i >= 0; i--)
            if (ele == source[i])
                return true;
        return false;
    }

    function viewport() {
        return {
            x: $(window).scrollLeft(),
            y: $(window).scrollTop(),
            cx: $(window).width(),
            cy: $(window).height()
        };
    }

        $(function () {

        //确定 按钮
        $('#btnok1').click(function () {
            var arr_box = [];
            var personStateIds =$('input[type=checkbox]:checked').map(function() {
                return $(this).val()
            }).get();
            //数组
            var personStateNames =$('input[type=checkbox]:checked').map(function() {
                    return $.trim($(this).text());   
            }).get();
            personStateIds = personStateIds.join(',');
            personStateNames = personStateNames.join(',');
            window.parent.getChildPersonStates(personStateIds,personStateNames);
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭 
        });
    });
</script>
