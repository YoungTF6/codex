    loadTitleTypes();

    function loadTitleTypes() {
        var data = { "title_kind": "2" };
        $.ajax({
            url: huayi_sjwh_url + 'comTitle/list/all',
            async: false,
            data: { "titleKind": "2" },
            dataType: "json",
            success: function (result) {
                var titleTypes = result.data;
                if (titleTypes.length > 0) {
                    var titleTypePer = null;
                    for (var i = 0; i < titleTypes.length; i++) {
                        titleTypePer = titleTypes[i];
                        var $tr;
                        if (i % 3 == 0) {
                            $tr = $("<tr></tr>");
                        }
                        if ($tr != null) {
                            var $td = $('<td id="' + titleTypePer.titleId + '"><div><input class="cb2" type="checkbox">' +
                                '<a href="" tid="' + titleTypePer.titleId + '" class="tt2">' + titleTypePer.titleName + ' </a>' +
                                '</div></td>');
                            $tr.append($td);
                        }
                        if (i % 3 == 2) {
                            $("#dltitle2 tbody").append($tr);
                        }
                    }


                }
            }

        });
    }

    function loadTitlesByTitleType() {
        $.ajax({
            url: huayi_sjwh_url + 'comTitle/list/all',
            async: false,
            data: { titleKind: 3 },
            dataType: "json",
            success: function (result) {
                var titles = result.data;

                $("#dltitle2").find("tr:gt(0)").find("td").each(function () {
                    var title = null;
                    var $div1 = $('<div class="nn">' +
                        '<table class="tab" style="margin-top: 0px;">' +
                        '<tbody>' +
                        '<tr>' +
                        '<td style="text-align: left; padding-left: 30px;">' +
                        '<a href="" class="cls">关闭</a>' +
                        '</td>' +
                        '</tr>' +
                        '</tbody>' +
                        '</table>' +
                        '</div>');
                    for (var j = 0; j < titles.length; j++) {
                        title = titles[j];
                        if (title.titleType == $(this).attr("id")) {
                            var $tr1 = $('<tr><td>' +
                                '<input type="checkbox">' +
                                '<a tid="' + title.titleId + '" class="tt3" pid="' + title.titleType + '">' + title.titleName + '</a>' +
                                '</td></tr>');
                            $div1.find("tbody").append($tr1);
                        }
                    }
                    $(this).append($div1);

                });


            }
        });

    }


</script>

<script type="text/javascript">

    $.fn.toggle = function (fn, fn2) {
        var args = arguments, guid = fn.guid || $.guid++, i = 0,
            toggle = function (event) {
                var lastToggle = ($._data(this, "lastToggle" + fn.guid) || 0) % i;
                $._data(this, "lastToggle" + fn.guid, lastToggle + 1);
                event.preventDefault();
                return args[lastToggle].apply(this, arguments) || false;
            };
        toggle.guid = guid;
        while (i < args.length) {
            args[i++].guid = guid;
        }
        return this.click(toggle);
    };

    function Arrcontains(ele, source) {
        for (i = source.length - 1; i >= 0; i--)
            if (ele == source[i])
                return true;
        return false;
    }

    function viewport() {
        return {
            x: $(window).scrollLeft(),
            y: $(window).scrollTop(),
            cx: $(window).width(),
            cy: $(window).height()
        };
    }

    $(function () {

        //弹出子菜单
        $('a.tt2').toggle(function () {
            
            var top = $(this).offset().top + 10;
            var left = $(this).offset().left + 20;
            $('a.tt2[current]').click();
            $(this).attr('current', 1);

            $(this).parent().next().addClass('show').css({
                top: top + 'px',
                left: left + 'px'
            });
            var v = viewport();
            var h = $(this).parent().next()[0];
            // check horizontal position
            if (v.x + v.cx < h.offsetLeft + h.offsetWidth) {
                left -= h.offsetWidth;
                if (left < 0) {
                    left = 0;
                }
                $(h).css({
                    left: left + 10 + 'px'
                });
            }
            // check vertical position
            if (v.y + v.cy < h.offsetTop + h.offsetHeight) {
                top -= h.offsetHeight;
                if (top < 0) {
                    top = 0;
                }
                $(h).css({
                    top: top + 10 + 'px'
                });
            }
            return false;
        },

            function () {
                $(this).removeAttr('current');
                $(this).parent().next().removeClass('show')
                return false;
            });

        //选中3级职称
        $('a.tt3').click(function () {
            return false;
        }).prev().click(function () {

            if (this.checked) { //选中了
                console.log("tt3:checked");
                if ($('#for2 a[tid="' + $(this).next().attr('tid') + '"]').size() == 0) { //可以增加选中项                

                    var cba = $(this).parent().children().clone().removeClass('tt3');

                    cba.eq(0).click(function () {

                        $('a.tt3[tid="' + $(this).next().attr('tid') + '"]').prev().removeAttr('checked');

                        $(this).parent().remove();

                    });

                    var span = $('<span />').addClass('select').append(cba).appendTo('#for2');
                }

            } else { //取消
                console.log("tt3:unchecked");
                if (isOldId){
                    // 回显已选择数据
                    if ($('#for2 a[tid="' + $(this).next().attr('tid') + '"]').size() == 0) { //可以增加选中项                
                        var cba = $(this).parent().children().clone().removeClass('tt3');
                        cba.eq(0).click(function () {
                            $('a.tt3[tid="' + $(this).next().attr('tid') + '"]').prev().removeAttr('checked');
                            $(this).parent().remove();
                        });
                        cba[0].checked = true;
                        var span = $('<span />').addClass('select').append(cba).appendTo('#for2');
                    }
                } else {
                    $('#for2 a[tid="' + $(this).next().attr('tid') + '"]').prev().click();
                }
            }
        });


        //全选一组 3级职称
        $('.cb2').click(function () {
            if (this.checked) {

                let uncheckedCHs = $(this).parent().next().find(':checkbox').filter(function () {
                    return !this.checked
                });
                $.each(uncheckedCHs,function(i,e){
                    $(e).click();
                });
            } else {
                let checkedCHs = $(this).parent().next().find(':checkbox').filter(function () {
                    return this.checked
                });
                $.each(checkedCHs,function(i,e){
                    $(e).click();
                });
            }
        });

        //确定 按钮
        $('#btnok1,#btnok2').click(function () {
            var titleIds = $('#for1 a,#for2 a').map(function () {
                return $(this).attr('tid');
            }).get();
            var titleNames = $('#for1 a,#for2 a').map(function () {
                return $.trim($(this).text());
            }).get();
            titleIds = titleIds.join(',');
            titleNames = titleNames.join(',');
            window.parent.getChildTitles(titleIds,titleNames);
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭 
        });




        //var titleids = parent.$("#hf_tt").val();
        var titleids = getParamFromUrl("titleIds");

        var oldids = '';
        if (titleids != undefined && titleids != ''){
            oldids = titleids.split(',');
        }
        //var oldids="['"+titleids.replace(/\,/g, "','")+"']";
        //初始化以选中
        var isOldId = false;
        for (var i in oldids) {
            isOldId = true;
            var ss = $('a.tt3[tid="' + oldids[i] + '"]').prev().click();

            ss.attr('checked', 'checked');
            isOldId = false;
        }

        for (var k in oldids) {
            var curpid = $('a.tt3[tid="' + oldids[k] + '"]').eq(0).attr("pid");

            if (curpid) {
                var tidlist = $('a.tt3[pid="' + curpid + '"]');
                var bCheck = true;
                for (m = 0; m < tidlist.size(); m++) {
                    if (!Arrcontains(tidlist.eq(m).attr("tid"), oldids)) {
                        bCheck = false;
                        break;
                    }
                }

                if (bCheck) {
                    $('a.tt2[tid="' + curpid + '"]').eq(0).prev().attr('checked', 'checked');
                }
            }
        }
    });
    
    //解析url参数
    let getParamFromUrl = function (paramName) {
        debugger
        let urlStr = location.search;
        if (urlStr.indexOf(paramName) < 0 || urlStr.indexOf("?") < 0) return;
        let paramKV = urlStr.substr(1).split("&");
        for (let i = 0; i < paramKV.length; i++) {
            if (paramKV[i].indexOf(paramName) >= 0) {
                return paramKV[i].split("=")[1];
            }
        }
    }
    var titleIds = getParamFromUrl("titleIds");

</script>
