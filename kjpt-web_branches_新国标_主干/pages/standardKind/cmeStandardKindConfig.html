<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="cmeStandardKindConfig" lay-filter="cmeStandardKindConfig"
                    style="margin: 0px 0px;">
                </table>
            </div>


            <!-- 添加弹窗 -->
            <div id="add-cmeStandardKindConfig" style=" display: none; text-align: center;">
                <form class="layui-form" style="padding: 30px;" id="form-CmeStandardKindConfig" lay-filter="add-filter">
                    <div class="layui-form-item" style="display: none">
                        <div class="layui-inline">
                            <label class="layui-form-label"></label>
                            <div class="layui-input-block">
                                <input type="text" name="cmeStandardKindConfigId" autocomplete="off" class="layui-input">
                                <input type="text" name="isDefault" value="0" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item" style="display: none">
                        <div class="layui-inline">
                            <label class="layui-form-label"></label>
                            <div class="layui-input-block">
                                <input type="text" name="cmeStandardKindId" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item">
                        <div class="layui-inline layui-inline-660" id="unitSelectArea">
                            <label class="layui-form-label">
                                <span class="require">* </span>配置对应最高单位</label>
                            <div class="layui-input-block">
                                <input type="text" id="unitSelect" name="topUnitId" lay-filter="unitSelect"
                                        autocomplete="off" class="layui-input" lay-verify="required">
                                <!-- <div id="unitSelect" data-name=""></div> -->
                                <!-- <input type="text" name="unitName"
                                        autocomplete="off" class="layui-input" lay-verify="required"> -->
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-inline layui-inline-660">
                            <label class="layui-form-label">
                                <span class="require">* </span>配置描述</label>
                            <div class="layui-input-block">
                                <input type="text" name="description" placeholder="配置描述"
                                        autocomplete="off" class="layui-input" lay-verify="required">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-inline layui-inline-660">
                            <label class="layui-form-label">
                                <span class="require">* </span>举办后授分周期
                                <i class="layui-icon layui-icon-about tip-icon"id="grantscoreDateTips"
                                        msg="控制项目举办多少天后不允许再授分"></i></label>
                            <div class="layui-input-block">
                                <!-- 控制项目举办多少天后不允许再授分 -->
                                <input type="text" name="grantscoreDate" placeholder="项目举办后举办后授分周期" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item margin-bottom-5">
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">项目需审核
                                <i class="layui-icon layui-icon-about tip-icon"id="isNeedCheckTips"
                                        msg="项目是否需要审核"></i></label>
                            <div class="layui-input-block">
                                <!-- 项目是否需要审核 0不需要审核 1需要审核(默认设置成不需要审核) -->
                                <input type="checkbox" name="isNeedCheck" lay-filter="isNeedCheck"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">报表按时间控制
                                <i class="layui-icon layui-icon-about tip-icon"id="isControlReportprintTips"
                                        msg="报表打印是否需要分年度按时间控制"></i></label>
                            <div class="layui-input-block">
                                <!-- 报表打印是否需要分年度按时间控制，0为不需要，1为需要 -->
                                <input type="checkbox" name="isControlReportprint" lay-filter="isControlReportprint"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">显示学分类型
                                <i class="layui-icon layui-icon-about tip-icon"id="isNeedScoreTypeTips"
                                        msg="配置套下是否开通显示学分类型字段"></i></label>
                            <div class="layui-input-block">
                                <!-- 配置套下是否开通显示学分类型字段:0 不开通 1开通 -->
                                <input type="checkbox" name="isNeedScoreType" lay-filter="isNeedScoreType"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item margin-bottom-5">
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">控制授分时间
                                <i class="layui-icon layui-icon-about tip-icon"id="isGrantscoreDatestateTips"
                                        msg="是否控制授分时间"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否控制授分时间:0代表不控制 1代表需要控制 -->
                                <input type="checkbox" name="isGrantscoreDatestate" lay-filter="isGrantscoreDatestate"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">手工录入学分
                                <i class="layui-icon layui-icon-about tip-icon"id="isManualinputControlTips"
                                        msg="是否可以手工录入学分（关闭时为可以手工录入学分，开通可以对某个单位设置是否可以手工录入学分）"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否可以手工录入学分：0为关闭，关闭时为可以手工录入学分（默认值），1为开通，可以对某个单位设置是否可以手工录入学分 -->
                                <input type="checkbox" name="isManualinputControl" lay-filter="isManualinputControl"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">同步审核申报项目
                                <i class="layui-icon layui-icon-about tip-icon"id="isProjectreportingTips"
                                        msg="是否要同步审核项目申报的项目"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否要同步审核项目申报的项目，0：不需要，1：需要 -->
                                <input type="checkbox" name="isProjectreporting" lay-filter="isProjectreporting"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item margin-bottom-5">
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">二维码考勤
                                <i class="layui-icon layui-icon-about tip-icon"id="isOpenWeixinAttendanceTips"
                                        msg="是否开通二维码考勤"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否开通二维码考勤（按套开通） ，0未开通 1已开通 -->
                                <input type="checkbox" name="isOpenWeixinAttendance" lay-filter="isOpenWeixinAttendance"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">个人活动需学分证明
                                <i class="layui-icon layui-icon-about tip-icon"id="isSingleprojUploadPhotoTips"
                                        msg="个人活动学分是否要上传学分证明照片"></i></label>
                            <div class="layui-input-block">
                                <!-- 个人活动学分是否要上传学分证明照片，0：不需要，1：需要 -->
                                <input type="checkbox" name="isSingleprojUploadPhoto" lay-filter="isSingleprojUploadPhoto"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">拟举办周期内举办
                                <i class="layui-icon layui-icon-about tip-icon"id="isControlDateTips"
                                        msg="判断举办周期是否必须在拟举办周期之内"></i></label>
                            <div class="layui-input-block">
                                <!-- 判断举办周期是否必须在拟举办周期之内 -->
                                <input type="checkbox" name="isControlDate" lay-filter="isControlDate"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item margin-bottom-5">
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">拟举办人数控制
                                <i class="layui-icon layui-icon-about tip-icon"id="isControlPersonNumTips"
                                        msg="控制是否有拟举办人数控制"></i></label>
                            <div class="layui-input-block">
                                <!-- 控制是否有拟举办人数控制 -->
                                <input type="checkbox" name="isControlPersonNum" lay-filter="isControlPersonNum"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">办前通知，办后反馈
                                <i class="layui-icon layui-icon-about tip-icon"id="isOpenJubanqianhoucheckTips"
                                        msg="是否开通项目举办前通知，举办后反馈"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否开通项目举办前通知，举办后反馈 ，0未开通 1已开通 -->
                                <input type="checkbox" name="isOpenJubanqianhoucheck" lay-filter="isOpenJubanqianhoucheck"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">省厅自动审核项目
                                <i class="layui-icon layui-icon-about tip-icon"id="isOpenProjcheckAutopassTips"
                                        msg="项目审核，省厅是否开启自动审核通过功能"></i></label>
                            <div class="layui-input-block">
                                <!-- 项目审核 省厅是否开启自动审核通过功能 -->
                                <input type="checkbox" name="isOpenProjcheckAutopass" lay-filter="isOpenProjcheckAutopass"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item margin-bottom-5">
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">学分逐级审核
                                <i class="layui-icon layui-icon-about tip-icon"id="isOpenScoreStepCheckTips"
                                        msg="是否开启学分的逐级审核"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否开启学分的逐级审核 1 开启 0 未开启 -->
                                <input type="checkbox" name="isOpenScoreStepCheck" lay-filter="isOpenScoreStepCheck"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">删除学分需验证码
                                <i class="layui-icon layui-icon-about tip-icon"id="isDeleteScoreValidatecodeTips"
                                        msg="删除学分修改器是否需要发送手机验证码"></i></label>
                            <div class="layui-input-block">
                                <!-- 删除学分修改器是否需要发送手机验证码 0不需要、1需要 -->
                                <input type="checkbox" name="isDeleteScoreValidatecode" lay-filter="isDeleteScoreValidatecode"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">科室代办项目
                                <i class="layui-icon layui-icon-about tip-icon"id="isDpetDaibanProjTips"
                                        msg="是否开通科室代办项目功能"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否开通科室代办项目功能 1开通 0未开通 -->
                                <input type="checkbox" name="isDpetDaibanProj" lay-filter="isDpetDaibanProj"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item margin-bottom-5">
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">获取地理位置
                                <i class="layui-icon layui-icon-about tip-icon"id="isOpenWeixinLocationTips"
                                        msg="是否获取地理位置功能（开通时app能获取到就保存，关闭时不获取地理位置）"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否获取地理位置功能（扫码考勤）：1开通 app能获取到就保存 0：不获取地理位置 -->
                                <input type="checkbox" name="isOpenWeixinLocation" lay-filter="isOpenWeixinLocation"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                        <div class="layui-inline layui-inline-220">
                            <label class="layui-form-label">强制微信定位
                                <i class="layui-icon layui-icon-about tip-icon"id="isMustLocationTips"
                                        msg="是否强制开通微信app地理位置定位（扫码考勤，开通时获取不到地理位置不能保存考勤信息）"></i></label>
                            <div class="layui-input-block">
                                <!-- 是否强制开通微信app地理位置定位（扫码考勤） 1强制开通 ，获取不到地理位置不能保存考勤信息0未开通 -->
                                <input type="checkbox" name="isMustLocation" lay-filter="isMustLocation"
                                        lay-skin="switch" value="1">
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item" style="position: relative; top: 10px;">
                        <div class="layui-input-block">
                            <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                            <button class="layui-btn layui-btn-primary" id="form-CmeStandardKindConfig-reset">重置</button>
                        </div>
                    </div>
                </form>
            </div>


        </div>
    </div>

    <!--表格内数据编辑、删除按钮-->

        <a class="layui-btn layui-btn-xs btn-row" lay-event="edit">
            <!-- <i class="layui-icon layui-icon-edit"></i> -->
            编辑</a>
        {{# if (d.isDefault == 0) { }}
        <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">
            <!-- <i class="layui-icon layui-icon-delete"></i> -->
            删除</a>
        {{# } }}
    </script>
    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm" lay-event="add">
            <!-- <i class="layui-icon">&#xe654;</i> -->
            新增</a>
    </script>
    <script>
        layui.config({
            base : '/js/layui/ext/'
        }).extend({
            xmSelect    : 'xm-select',
            treeSelect  : 'treeSelect'
        });

        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'xmSelect', 'treeSelect'], function () {
            var table      = layui.table,
                form       = layui.form,
                $          = layui.jquery,
                layer      = layui.layer,
                xmSelect   = layui.xmSelect,
                treeSelect = layui.treeSelect;

            var cmeStandardKindId = getQueryString('id');
            var topUnitId         = getQueryString('unitId');
            var unitName          = getQueryString('unitName');



            /** 表格相关操作 */
            // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem: '#cmeStandardKindConfig',
                    url: huayi_sjwh_url + 'cmeStandardKindConfig/list',
                    headers        : {
                        'Authorization' : localStorage.getItem('token'),
                        'KJPT-USER-ID'  : localStorage.getItem('user-id')
                    },
                    title: '用户表',
                    defaultToolbar: [],
                    where: { cmeStandardKindId : cmeStandardKindId },
                    cols: [[
                        {align: 'center', minWidth: 150, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                        {field: 'unitName', title: '配置对应最高单位', sort: true, minWidth: 180, fixed: 'left',
                            templet: function (d) {
                                if (d.unitName == null && d.topUnitId != null) {         // 未选择单位
                                    return '<span style="color: red;">未知单位</span>';
                                } else if (d.unitName == null && d.topUnitId == null) {  // 未查到选择单位
                                    return '<span style="color: red;">未关联单位</span>';
                                } else {
                                    return d.unitName;
                                }
                            }
                        },
                        {field: 'description', title: '配置描述', sort: true, minWidth: 120},
                        {field: 'isNeedCheck', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="项目需审核">项目需审核</span>',
                            templet: function (d) {
                                if (d.isNeedCheck == 1) {          // 需要
                                    return '<i class="layui-icon layui-icon-ok"></i>'
                                } else if (d.isNeedCheck == 0) {   // 不需要
                                    return '<i class="layui-icon layui-icon-close notok"></i>'
                                }
                        }},
                        {field: 'isControlReportprint', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="报表分年度按时间控制">报表分年度按时间控制</span>',
                            templet: function (d) {
                                if (d.isControlReportprint == 1) {          // 需要
                                    return '<i class="layui-icon layui-icon-ok"></i>'
                                } else if (d.isControlReportprint == 0) {   // 不需要
                                    return '<i class="layui-icon layui-icon-close notok"></i>'
                                }
                        }},
                        {field: 'isNeedScoreType', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="显示学分类型字段">显示学分类型字段</span>',
                            templet: function (d) {
                                if (d.isNeedScoreType == 1) {          // 开通
                                    return '<i class="layui-icon layui-icon-ok"></i>'
                                } else if (d.isNeedScoreType == 0) {   // 关闭
                                    return '<i class="layui-icon layui-icon-close notok"></i>'
                                }
                        }},
                        {field: 'isGrantscoreDatestate', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="控制授分时间">控制授分时间</span>',
                            templet: function (d) {
                                if (d.isGrantscoreDatestate == 1) {          // 控制
                                    return '<i class="layui-icon layui-icon-ok"></i>'
                                } else if (d.isGrantscoreDatestate == 0) {   // 不控制
                                    return '<i class="layui-icon layui-icon-close notok"></i>'
                                }
                        }},
                        {field: 'grantscoreDate', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="举办后授分周期">举办后授分周期</span>',
                            templet: function (d) {
                                return d.grantscoreDate + ' 天'
                        }},
                        {field: 'isManualinputControl', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="手工录入学分">手工录入学分</span>',
                            templet: function (d) {
                                if (d.isManualinputControl == 1) {          // 开通
                                    return '<i class="layui-icon layui-icon-ok"></i>'
                                } else if (d.isManualinputControl == 0) {   // 关闭
                                    return '<i class="layui-icon layui-icon-close notok"></i>'
                                }
                        }},
                        {field: 'isProjectreporting', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="同步审核申报项目">同步审核申报项目</span>',
                            templet: function (d) {

                        {field: 'isOpenJubanqianhoucheck', sort: true, align: 'center', minWidth : 100,

                        }},
                        {field: 'isOpenProjcheckAutopass', sort: true, align: 'center', minWidth : 100,

                            templet: function (d) {

                        }},
                        {field: 'isDpetDaibanProj', sort: true, align: 'center', minWidth : 100,

                            templet: function (d) {

                        }},
                        {field: 'isOpenWeixinLocation', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="获取地理位置">获取地理位置</span>',
                            templet: function (d) {
                                if (d.isOpenWeixinLocation == 1) {          // 开通
                                    return '<i class="layui-icon layui-icon-ok"></i>'
                                } else if (d.isOpenWeixinLocation == 0) {   // 关闭
                                    return '<i class="layui-icon layui-icon-close notok"></i>'
                                }
                        }},
                        {field: 'isMustLocation', sort: true, align: 'center', minWidth : 100,
                            title: '<span title="强制微信定位">强制微信定位</span>',
                            templet: function (d) {
                                if (d.isMustLocation == 1) {          // 开通
                                    return '<i class="layui-icon layui-icon-ok"></i>'

                    ]],
                    toolbar      : '#bar',
                    cellMinWidth : 100,
                    id           : "cmeStandardKindConfig",
                    // height       : 'full-155',
                    height       : 'full-50',
                    page         : true,
                    limit        : 10,
                    limits       : [10, 50, 100, 150, 200],
                    parseData    : function (res) {
                        return {
                            "code"  : res.status === 200 ? 0 : res.status,  //解析接口状态
                            "msg"   : res.message,                          //解析提示文本
                            "count" : res.data.recordsTotal,                //解析数据长度
                            "data"  : res.data.records,                     //解析数据列表
                            "page"  : res.data.pageNum,                     //当前页
                            "limit" : res.data.pageSize,                    //每页条数
                        }
                    },
                    request      : {
                        pageName  : 'pageNum', //页码的参数名称，默认：page
                        limitName : 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            // 初始化表格
            loaderTable();

            // 单位选择初始化
            var treeSelect = treeSelect.render({
                elem    : '#unitSelect',
                data    : huayi_personorg_url + 'comunit/childrenAllTreeNew?unitId=' + topUnitId,
                headers : {
                    'Authorization' : localStorage.getItem('token'),
                    'KJPT-USER-ID'  : localStorage.getItem('user-id')
                },
                type    : 'get',
                search  : true
            });

            // 监听头部新增按钮
            table.on('toolbar(cmeStandardKindConfig)', function (obj) {
                var datas = obj.data;
                document.getElementById("form-CmeStandardKindConfig").reset();
                if (obj.event === 'add') {
                    if (topUnitId == null || topUnitId == 'null') {   // 未关联单位
                        layer.msg('请关联单位后操作');
                        return false;
                    }

                    try {
                        treeSelect.revokeNode('unitSelect');

                        $('#unitSelectArea input').prop('disabled', false);
                        $('#unitSelectArea input').css('background-color', '');
                        $('#unitSelectArea .layui-anim-upbit').css('display', '');
                    } catch (err) {
                        if (topUnitId == null || topUnitId == 'null') {   // 未关联单位
                            $('#unitSelectArea input').prop('disabled', true);
                            $('#unitSelectArea input').css('background-color', 'lightgray');
                            $('#unitSelectArea .layui-anim-upbit').css('display', 'none');
                        } else {                                    // 关联单位不在下拉列表选项中

                        }
                    }
                    $('[name="description"]').prop('disabled', false);
                    $('[name="description"]').css('background-color', '');

                    layer.open({
                        type: 1,
                        title: '新增',
                        content: $('#add-cmeStandardKindConfig'),
                        skin: '',
                        area: ['780px', '635px'],
                    });
                }
            });

            // 监听行内按钮
            table.on('tool(cmeStandardKindConfig)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    form.val('add-filter', datas);
                    try {
                        treeSelect.checkNode('unitSelect', datas.topUnitId);
                    } catch (err) {
                        if (topUnitId == null || topUnitId == 'null') {   // 未关联单位

                        }else {                                     // 关联单位不在下拉列表选项中
                            treeSelect.revokeNode('unitSelect');
                        }
                    }
                    if (datas.isDefault == 1) {     // 默认配置
                        $('#unitSelectArea input').prop('disabled', true);
                        $('#unitSelectArea input').css('background-color', 'lightgrey');
                        $('#unitSelectArea .layui-anim-upbit').css('display', 'none');

                        $('[name="description"]').prop('disabled', true);
                        $('[name="description"]').css('background-color', 'lightgrey');
                    } else {                        // 自定义配置
                        $('#unitSelectArea input').prop('disabled', false);
                        $('#unitSelectArea input').css('background-color', '');
                        $('#unitSelectArea .layui-anim-upbit').css('display', '');

                        $('[name="description"]').prop('disabled', false);
                        $('[name="description"]').css('background-color', '');
                    }
                    layer.open({
                        type    : 1,
                        title   : '编辑（' + datas.description + '）',
                        content : $('#add-cmeStandardKindConfig'),
                        skin    : '',
                        area    : ['780px', '635px'],
                    });
                }
                else if (obj.event === 'del') {
                    layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                        axios({
                            method  : 'get',
                            url     : huayi_sjwh_url + 'cmeStandardKindConfig/deleted',
                            params: {
                                cmeStandardKindConfigId: datas.cmeStandardKindConfigId
                            },
                            headers : { 'Content-Type' : 'application/json;charset=UTF-8' }
                        }).then(response => {
                            if (response.status == 200 && response.data.status == 200) {
                                layer.msg('删除成功');

                                // 表格重载
                                table.reload('cmeStandardKindConfig', {
                                    where : { cmeStandardKindId : cmeStandardKindId },
                                    page  : { curr : 1 }  // 重新从第 1 页开始
                                });
                            } else {
                                layer.msg(response.data.msg);
                            }
                        }).catch(err => {
                            layer.msg('网络异常，请稍后再试');
                        });
                        layer.msg("删除成功");
                    });
                }
            });



            /** form 表单相关操作 */
            // 新增/修改表单提交
            form.on('submit(submit)', function (data) {
                // 用于判断是新增还是修改
                var formTableId = $('#add-cmeStandardKindConfig input[name=\"cmeStandardKindConfigId\"]').val();
                var URL         = huayi_sjwh_url + 'cmeStandardKindConfig/';
                var datas       = data.field;

                // 开关默认值
                if (datas.isControlDate == null || datas.isControlDate == '') {
                    datas.isControlDate = 0;
                }
                if (datas.isControlPersonNum == null || datas.isControlPersonNum == '') {
                    datas.isControlPersonNum = 0;
                }
                if (datas.isControlReportprint == null || datas.isControlReportprint == '') {
                    datas.isControlReportprint = 0;
                }
                if (datas.isDeleteScoreValidatecode == null || datas.isDeleteScoreValidatecode == '') {
                    datas.isDeleteScoreValidatecode = 0;
                }
                if (datas.isDpetDaibanProj == null || datas.isDpetDaibanProj == '') {
                    datas.isDpetDaibanProj = 0;
                }
                if (datas.isGrantscoreDatestate == null || datas.isGrantscoreDatestate == '') {
                    datas.isGrantscoreDatestate = 0;
                }
                if (datas.isManualinputControl == null || datas.isManualinputControl == '') {
                    datas.isManualinputControl = 0;
                }
                if (datas.isMustLocation == null || datas.isMustLocation == '') {
                    datas.isMustLocation = 0;
                }
                if (datas.isNeedCheck == null || datas.isNeedCheck == '') {
                    datas.isNeedCheck = 0;
                }
                if (datas.isNeedScoreType == null || datas.isNeedScoreType == '') {
                    datas.isNeedScoreType = 0;
                }
                if (datas.isOpenJubanqianhoucheck == null || datas.isOpenJubanqianhoucheck == '') {
                    datas.isOpenJubanqianhoucheck = 0;
                }
                if (datas.isOpenProjcheckAutopass == null || datas.isOpenProjcheckAutopass == '') {
                    datas.isOpenProjcheckAutopass = 0;
                }
                if (datas.isOpenScoreStepCheck == null || datas.isOpenScoreStepCheck == '') {
                    datas.isOpenScoreStepCheck = 0;
                }
                if (datas.isOpenWeixinAttendance == null || datas.isOpenWeixinAttendance == '') {
                    datas.isOpenWeixinAttendance = 0;
                }
                if (datas.isOpenWeixinLocation == null || datas.isOpenWeixinLocation == '') {
                    datas.isOpenWeixinLocation = 0;
                }
                if (datas.isProjectreporting == null || datas.isProjectreporting == '') {
                    datas.isProjectreporting = 0;
                }
                if (datas.isSingleprojUploadPhoto == null || datas.isSingleprojUploadPhoto == '') {
                    datas.isSingleprojUploadPhoto = 0;
                }

                var flag = formTableId === null || formTableId === '';
                if (flag) {     // 走新增逻辑
                    URL += 'save';
                    datas.cmeStandardKindId = cmeStandardKindId
                } else {        // 走修改逻辑
                    URL += 'update';
                }
                axios({
                    method  : 'post',
                    url     : URL,
                    data    : JSON.stringify(datas),
                    headers : { 'Content-Type' : 'application/json;charset=UTF-8' }
                }).then(response => {
                    if (response.status == 200 && response.data.status == 200) {
                        layer.msg('添加成功');

                        layer.closeAll();

                        // 表格重载
                        table.reload('cmeStandardKindConfig', {
                            where : { cmeStandardKindId : cmeStandardKindId },
                            page  : { curr : 1 }  // 重新从第 1 页开始
                        });
                    } else {
                        layer.msg(response.data.msg);
                    }
                }).catch(err => {
                    layer.msg('网络异常，请稍后再试');
                });
                return false;
            });

            // 重置表单
            $('#form-CmeStandardKindConfig-reset').click(function () {
                var $descItem = $('[name="description"]');
                var descCont  = $descItem.val();
                $('#form-CmeStandardKindConfig')[0].reset();
                if ($descItem.prop('disabled') == true) {
                    $descItem.val(descCont);
                } else {
                    xmSelect.update({ data: [] });
                    xmSelect.setValue([]);
                }
                return false;
            });



            // 表格鼠标悬停提示特效
            $("#hint").hover(function () {
                openMsg();
            }, function () {
                layer.close(subtips);
            });
            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 0});
            }
            // 弹窗鼠标悬停提示特效
            $('#add-cmeStandardKindConfig .layui-icon-about').hover(function () {
                showTips($(this).attr('msg'), $(this).prop('id'), '#000000', '#d3d3d3');
                // showTips($(this).attr('msg'), $(this).prop('id'), '#ffffff', '#009688');
            }, function () {
                layer.close(subtips);
            });
            function showTips(msg, id, color, bgcolor) {
                msg = '<span style="color: ' + color + ';">' + msg + '</span>';
                subtips = layer.tips(msg, '#' + id, {tips: [1, bgcolor], time: 0});
            }

        });

    </script>
</body>
</html>
