<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>继续医学教育情况汇总表</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <!-- 工具 -->
    <script type="text/javascript" src="../../js/base64.js"></script>

    <style>
        #content-left {
            display: inline-block;
            width: 250px;
            border: 1px solid #e6e6e6;
            margin: 0 10px 0 0;
            vertical-align: top;
            overflow: auto;
            padding: 10px;
        }
        #content-right {
            display: inline-block;
            width: calc(100% - 290px);
            vertical-align: top;
        }
        #unit-tree {
            width: 310px;
        }

        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .layui-treeSelect .ztree li {
            line-height: initial !important;
            padding: 2px 0;
        }
        .table_toolbar_right {
            float: right;
            position: relative;
            right: -120px;
        }
    </style>
</head>

<body class="body-area">

    <div class="layui-fluid">

        <!-- 下级单位树 -->
        <div class="layui-card" id="content-left">
            <div id="unit-tree"></div>
        </div>


        <!-- 统计表格 -->
        <div class="layui-card" id="content-right" >

            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <div class="layui_mess">

                    <!-- 筛选项 -->
                    <div class="layui_display">
                        <div class="layui-inline layui-form" lay-filter="statistical-year-div">
                            <label class="layui-form-label">统计年度</label>
                            <div class="layui-input-block">
                                <span style="width: 75px; display: inline-block;">
                                    <select id="statistical-year" lay-filter="statistical-year"></select>
                                </span>
                                <span style="display: inline-block; margin-left: 10px;
                                        width: calc(186.4px - 15px); color: blue;">
                                    <d1></d1>&nbsp;至&nbsp;<d2></d2>
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" lay-submit lay-filter="LAY-app-order-search">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                            
                        </div>
                        <div class="layui-inline">
                            <button class="layui-btn layui-btn-sm" id="pdfpart" >导出PDF</button>
                        </div>
                        
                    </div>

                </div>
            </div>


            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" style="margin: 0px 0px;"
                        id="table_ducation" lay-filter="table_ducation">
                </table>
            </div>

        </div>
    </div>


    <script type="text/javascript">
        const unitId            = localStorage.getItem('unit-id'),
              unitName          = localStorage.getItem('unit-name'),
              username          = localStorage.getItem('user-name'),
              usertype          = localStorage.getItem('unit-user-type');

        let   menuUnitId        = localStorage.getItem('menu-unit-id');
              menuUnitId        = (null == menuUnitId || menuUnitId.trim().length < 1) ? unitId : menuUnitId;



        layui.config({
            base : '../../js/layui/ext/'
        }).extend({
            treeSelect : 'treeSelect',
            eleTree    : 'eleTree'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer', 'eleTree'], function() {
            var table       = layui.table,
                form        = layui.form,
                $           = layui.jquery,
                layer       = layui.layer,
                eleTree     = layui.eleTree;


            var statisticalYearList = [],
                eleTreeUnit         = null,
                unitIds         = '';


            if(usertype==2){
                $("#content-left").attr("style","display:none");
                $("#content-right").attr("style","width:calc(100% - 10px)");
            } 
            /* 页面初始化 */
            $(() => {
                // 单位树
                let unitDict = {},
                    rootKey  = ''; // 虚拟root节点
                $.ajax({
                    type        : 'get',
                    url         : huayi_personorg_url + 'comunit/childrenAllTreeNew?unitId=' + menuUnitId + '&depth=2',
                    contentType : 'application/json;charset=UTF-8',
                    dataType    : 'json',
                    async       : false,
                    success     : res => {
                        let rootNode             = [{ name : '全选', id : rootKey }];
                            rootNode[0].children = res[0].children;
                        eleTreeUnit = eleTree({
                            el                  : '#unit-tree',
                            defaultExpandedKeys : [rootKey],
                            defaultCheckedKeys  : [rootKey],
                            expandOnClickNode   : false,
                            highlightCurrent    : true,
                            showCheckbox        : true,
                            data                : rootNode,
                            sort                : true,
                            initSort            : {
                                field : 'order',
                                type  : 'asc'
                            },
                            request             : { // 对于树形数据字段名重定义
                                name     : 'name',
                                key      : 'id',
                                children : 'children',
                                pid      : 'pid'
                            },
                            customText          : function (data) {
                                let s                 = data.name;
                                    unitDict[data.id] = data.name;

                                return s;
                            }
                        });
                    }
                });

                // 统计年度
                $.ajax({
                    url      : huayi_sjwh_url + 'cmeYear',
                    type     : 'get',
                    async    : false,
                    dataType : 'json',
                    data     : { cmeStandardKindId : localStorage.getItem("standardkind-id") },
                    success  : function(res) {
                        if (res.status == 200) {
                            let option              = '';
                                statisticalYearList = res.data;

                            for (let i = 0; i < 10 && i < statisticalYearList.length; i++) {
                                option += '<option value="' + statisticalYearList[i].cmeYearId + '">' +
                                        statisticalYearList[i].cmeYear + '</option>';
                            }
                            $('#statistical-year').append(option);
                            form.render('select', 'statistical-year-div');
                            $('#statistical-year').parent().next().find('d1').html(statisticalYearList[0].startDate);
                            $('#statistical-year').parent().next().find('d2').html(statisticalYearList[0].endDate);
                        } else {
                            layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                        }
                    },
                    error    : function () {
                        layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                    }
                });

                // 统计年度事件
                form.on('select(statistical-year)', function(data) {
                    for (let i = 0; i < statisticalYearList.length; i++) {
                        if (statisticalYearList[i].cmeYearId == data.value) {
                            $('#statistical-year').parent().next().find('d1').html(statisticalYearList[i].startDate);
                            $('#statistical-year').parent().next().find('d2').html(statisticalYearList[i].endDate);
                            break;
                        }
                    }
                });

                let height = $(window).height();
                $('#content-left').css('height', height - 56);
                let height_h = $('#content-right .layui-card-header').height();
                $('#content-right .layui-card-body').css('height', height - height_h - 80);

                $(window).resize(e => {
                    let height = $(window).height();
                    $('#content-left').css('height', height - 56);
                    let height_h = $('#content-right .layui-card-header').height();
                    $('#content-right .layui-card-body').css('height', height - height_h - 80);
                });

            });
            function loaderTable() {
                unitIds='';
                // 选择单位ID
                if (null != eleTreeUnit) {
                    let checkedArray = eleTreeUnit.getChecked(false, false);
                    for (let i = 0; i < checkedArray.length; i++) {
                        if (checkedArray[i].id.trim().length > 0) {
                            unitIds += checkedArray[i].id + ','
                        }
                    }
                    if (checkedArray.length < 1) {
                        layer.msg('请选择要查询的子单位', { icon: 7, time: 1500 });
                        return false;
                    }
                    unitIds = unitIds.substring(0, unitIds.length - 1);
                }
                // var loading=layer.load(0, {
                //         shade: false
                //     });

                if(usertype==2){
                    unitIds=unitId;
                } 
                window.mainTable = table.render({
                    elem: '#table_ducation',
                    url: huayi_projectscore_url + 'comPersonCredit/getContinuingeducationsummary',
                    title: '用户表',
                    method: 'post',
                    defaultToolbar: [],
                    where: {
                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        cmeYear: $('#statistical-year').find("option:selected").text() ,
                        unitIds: unitIds,
                        exportUnittype: 1
                    },

                    cols: [
                        [{field: 'unit_name', title: '单 位',   align: 'center', halign: 'center',rowspan:2},
                         {title: '继 续 医 学 教 育 对 象',   align: 'center', halign: 'center',colspan:5},
                         {title: '继 续 医 学 教 育 合 格 人 数',  align: 'center', halign: 'center',colspan:5},
                         {title: '达 标 率',  align: 'center', halign: 'center',colspan:5}
                        ],
                        [{field: 'totals', title: '合计',  width:80,  align: 'center', halign: 'center'},
                        {field: 'doctors', title: '医生',  width:80,  align: 'center', halign: 'center'},
                        {field: 'nurse', title: '护理',  width:80,  align: 'center', halign: 'center'},
                        {field: 'curtrick', title: '医技',  width:80,  align: 'center', halign: 'center'},
                        {field: 'others', title: '其他',  width:80,  align: 'center', halign: 'center'},

                        {field: 'passtotal', title: '合计',  width:80,  align: 'center', halign: 'center'},
                        {field: 'passdoctors', title: '医生',  width:80,  align: 'center', halign: 'center'},
                        {field: 'passnurse', title: '护理',  width:80,  align: 'center', halign: 'center'},
                        {field: 'passcurtrick', title: '医技',  width:80,  align: 'center', halign: 'center'},
                        {field: 'passothers', title: '其他',  width:80,  align: 'center', halign: 'center'},

                        {field: 'standrestotal', title: '总达标率',  width:80,  align: 'center', halign: 'center'},
                        {field: 'standresdoctors', title: '医生',  width:80,  align: 'center', halign: 'center'},
                        {field: 'standresnurse', title: '护理',  width:80,  align: 'center', halign: 'center'},
                        {field: 'standrescurtrick', title: '医技',  width:80,  align: 'center', halign: 'center'},
                        {field: 'standresothers', title: '其他',  width:80,  align: 'center', halign: 'center'},
                        ]
                    ],
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: "personCredit",
                    height: 'full-125',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
                //layer.close(loading);
            };

            function pdfexport(){
                var loading=layer.load(0, {
                        shade: false
                    });
                    unitIds='';
                    // 选择单位ID
                    if (null != eleTreeUnit) {
                        let checkedArray = eleTreeUnit.getChecked(false, false);
                        for (let i = 0; i < checkedArray.length; i++) {
                            if (checkedArray[i].id.trim().length > 0) {
                                unitIds += checkedArray[i].id + ','
                            }
                        }
                        if (checkedArray.length < 1) {
                            layer.msg('请选择要查询的子单位', { icon: 7, time: 1500 });
                            return false;
                        }
                        unitIds = unitIds.substring(0, unitIds.length - 1);
                    }
                    if(usertype==2){
                        unitIds=unitId;
                    } 
                    //导出pdf
                    axios({
                        method: 'POST',
                        url: huayi_projectscore_url + "projectExclel/exppdfDacutionSummary",
                        responseType: 'blob',
                        headers: {
                            "Accept": 'application/json',
                            "Authorization": localStorage.getItem("token"),
                            "KJPT-USER-ID": localStorage.getItem("user-id"),
                            "cmestandard-id": localStorage.getItem("standardkind-id")
                        },
                        data: {
                            cmeStandardKindId: localStorage.getItem("standardkind-id"),
                            cmeYear: $('#statistical-year').find("option:selected").text() ,
                            unitIds: unitIds,
                            exportUnittype: 1,
                            mainUnitId: localStorage.getItem("unit-id")
                        }
                    }).then(function (res) {
                        layer.close(loading);
                        var data = res.data;
                        var blob = new Blob([data], {type: 'application/octet-stream'});
                        var url = URL.createObjectURL(blob);
                        var exportLink = document.createElement('a');
                        exportLink.setAttribute("download","继续医学教育情况汇总.pdf");
                        exportLink.href = url;
                        document.body.appendChild(exportLink);
                        exportLink.click();
                    })  
            }
            //点击查询按钮，重载表格
            $('#searchBtn').on('click', function() {
                loaderTable();
            });
            $('#pdfpart').on('click', function() {
                pdfexport();
            });
            
        });


    </script>
</body>

</html>
