<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>会员情况统计</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>

    <style>
        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 10px;
        }
        #content-left {
            display: inline-block;
            width: 250px;
            border: 1px solid #e6e6e6;
            margin: 0 10px 0 0;
            vertical-align: top;
            overflow: auto;
            padding: 10px;
            box-sizing: border-box;
        }
        #content-right {
            display: inline-block;
            width: calc(100% - 290px);
            vertical-align: top;
        }
        #unit-tree {
            width: 310px;
        }
        .member-situation-date .layui-form-label {
            width: 100px;
        }
        .member-situation-date .layui-input-block {
            margin-left: 130px;
        }
        .title-select input {
            cursor: pointer;
        }
        .table-summary-cell {
            font-weight: 600;
        }
        .condition-fields {
            flex: 1 1 auto;
        }
        .condition-fields .layui-inline {
            width: 293px;
        }
        .condition-fields .layui-form-label {
            width: 100px;
        }
        .condition-fields .layui-input-block {
            width: 163px;
            margin-left: 130px;
        }
        .condition-fields .layui-form-select,
        .condition-fields .layui-select-title,
        .condition-fields .layui-input {
            width: 100%;
        }
        .condition-actions {
            flex: 0 0 auto;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 8px;
        }
        .condition-actions .layui-inline {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 0;
            margin-right: 0;
        }
        #content-right .layui-table-tool-temp {
            display: block;
            padding-right: 0;
            text-align: right;
        }
        .member-situation-toolbar {
            display: block;
        }
        .member-header-tip {
            cursor: help;
        }
        .member-detail-link {
            color: #1e9fff;
            cursor: pointer;
        }
        .member-detail-dialog .layui-layer-content {
            background: #f5f7fa;
        }
        .member-detail-layer {
            padding: 10px;
            box-sizing: border-box;
            background: #f5f7fa;
            min-height: 100%;
        }
        .member-detail-empty {
            color: #666;
        }
        .member-detail-card {
            margin-bottom: 0;
        }
        .member-detail-condition {
            border-bottom: 1px solid #f0f0f0;
        }
        .member-detail-table-block {
            padding: 0;
        }
        .member-detail-query {
            padding-bottom: 0;
        }
        .member-detail-actions {
            flex: 0 0 auto;
        }
        .member-detail-table-block .layui-table-view {
            margin: 0;
            border-width: 0;
        }
        .member-detail-table-block .layui-table-tool-temp {
            display: block;
            padding-right: 0;
            text-align: right;
        }
        .member-detail-toolbar {
            display: block;
        }
    </style>
</head>
<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card" id="content-left">
            <div id="unit-tree"></div>
        </div>

        <div class="layui-card" id="content-right">
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <div class="layui_mess">
                    <div class="layui_display condition-fields">
                        <div class="layui-inline">
                            <label class="layui-form-label">统计年度</label>
                            <div class="layui-input-block">
                                <select name="checkYear" id="checkYear" lay-filter="checkYear"></select>
                            </div>
                        </div>
                        <div class="layui-inline title-select">
                            <label class="layui-form-label">职称</label>
                            <div class="layui-input-block">
                                <input type="text" autocomplete="off" class="layui-input" id="text_title_names" placeholder="全部" readonly>
                                <input type="hidden" autocomplete="off" class="layui-input" id="hidden_title_ids">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">在编状态</label>
                            <div class="layui-input-block">
                                <select id="seriesState" lay-filter="seriesState">
                                    <option value="ALL">全部</option>
                                    <option value="IN_THE_SERIES">在编</option>
                                    <option value="OUT_OF_THE_SERIES">不在编</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline member-situation-date">
                            <label class="layui-form-label">上报开始时间</label>
                            <div class="layui-input-block">
                                <input type="text" id="submitStartDate" autocomplete="off" readonly class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline member-situation-date">
                            <label class="layui-form-label">上报截止时间</label>
                            <div class="layui-input-block">
                                <input type="text" id="submitEndDate" autocomplete="off" readonly class="layui-input">
                            </div>
                        </div>
                    </div>
                    <div class="layui_display condition-actions">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                            <a class="layui-btn layui-btn-primary layui-btn-sm" id="resetBtn">重置</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="memberSituationTable" lay-filter="memberSituationTable"></table>
            </div>
        </div>
    </div>

    <script type="text/html" id="memberSituationTableToolbar">
        <span class="member-situation-toolbar">
            <a class="layui-btn layui-btn-sm" id="exportBtn" lay-event="export">
                <i class="layui-icon layui-icon-download-circle layuiadmin-button-btn"></i>按查询结果导出Excel
            </a>
        </span>
    </script>

    <script type="text/html" id="memberSituationDetailToolbar">
        <span class="member-detail-toolbar">
            <a class="layui-btn layui-btn-sm" lay-event="detailExport">
                <i class="layui-icon layui-icon-download-circle layuiadmin-button-btn"></i>导出Excel
            </a>
        </span>
    </script>

    <script type="text/javascript">
        layui.config({
            base: '../../js/layui/ext/'
        }).extend({
            eleTree: 'eleTree'
        });

        layui.use(['table', 'form', 'laydate', 'jquery', 'layer', 'eleTree'], function () {
            var table = layui.table;
            var form = layui.form;
            var laydate = layui.laydate;
            var $ = layui.jquery;
            var layer = layui.layer;
            var eleTree = layui.eleTree;
            var currentYear = new Date().getFullYear();
            var changchunUnitId = '082100';
            var eleTreeUnit = null;
            var exporting = false;
            var headerTipIndex = null;
            var titleSelectTarget = null;
            var submitStartDatePicker = null;
            var submitEndDatePicker = null;
            var detailEvents = {
                detailTotal: { type: 'TOTAL', title: '总人数' },
                detailSubmitted: { type: 'SUBMITTED', title: '上报人数' },
                detailMember: { type: 'MEMBER', title: '会员人数' },
                detailMemberPass: { type: 'MEMBER_PASS', title: '会员达标人数' },
                detailMemberPassRate: { type: 'MEMBER', title: '会员' }
            };

            function yearFirstDay() {
                return $('#checkYear').val() + '-01-01';
            }

            function yearLastDay() {
                return $('#checkYear').val() + '-12-31';
            }

            function renderYearOptions() {
                var options = '';
                for (var i = currentYear; i >= currentYear - 2; i--) {
                    options += '<option value="' + i + '">' + i + '</option>';
                }
                $('#checkYear').html(options).val(currentYear);
                form.render('select');
            }

            function resetDateRange() {
                $('#submitStartDate').val(yearFirstDay());
                $('#submitEndDate').val(yearLastDay());
            }

            function dateLimitConfig() {
                var selectedYear = parseInt($('#checkYear').val(), 10) || currentYear;
                return {
                    min: { year: selectedYear, month: 0, date: 1 },
                    max: { year: selectedYear, month: 11, date: 31 }
                };
            }

            function cloneDateConfig(dateConfig) {
                return {
                    year: dateConfig.year,
                    month: dateConfig.month,
                    date: dateConfig.date
                };
            }

            function applyDateLimit(datePicker, limitConfig) {
                if (!datePicker) {
                    return;
                }
                datePicker.config.min = cloneDateConfig(limitConfig.min);
                datePicker.config.max = cloneDateConfig(limitConfig.max);
            }

            function renderDatePickers() {
                if (submitStartDatePicker && submitEndDatePicker) {
                    var limitConfig = dateLimitConfig();
                    applyDateLimit(submitStartDatePicker, limitConfig);
                    applyDateLimit(submitEndDatePicker, limitConfig);
                    return;
                }
                submitStartDatePicker = laydate.render({
                    elem: '#submitStartDate',
                    min: yearFirstDay(),
                    max: yearLastDay(),
                    done: function (value) {
                        if (value && $('#submitEndDate').val() && value > $('#submitEndDate').val()) {
                            $('#submitEndDate').val(value);
                        }
                    }
                });
                submitEndDatePicker = laydate.render({
                    elem: '#submitEndDate',
                    min: yearFirstDay(),
                    max: yearLastDay(),
                    done: function (value) {
                        if (value && $('#submitStartDate').val() && value < $('#submitStartDate').val()) {
                            $('#submitStartDate').val(value);
                        }
                    }
                });
            }

            function padDateNumber(numberValue) {
                return numberValue < 10 ? '0' + numberValue : String(numberValue);
            }

            function replaceDateYear(dateText, targetYear) {
                var matched = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateText || '');
                if (!matched) {
                    return '';
                }
                var month = parseInt(matched[2], 10);
                var day = parseInt(matched[3], 10);
                var maxDay = new Date(targetYear, month, 0).getDate();
                return targetYear + '-' + padDateNumber(month) + '-' + padDateNumber(Math.min(day, maxDay));
            }

            function shiftDateRangeToYear(targetYear) {
                var startDate = replaceDateYear($('#submitStartDate').val(), targetYear) || yearFirstDay();
                var endDate = replaceDateYear($('#submitEndDate').val(), targetYear) || yearLastDay();
                if (startDate > endDate) {
                    endDate = startDate;
                }
                $('#submitStartDate').val(startDate);
                $('#submitEndDate').val(endDate);
            }

            function selectedUnitIds() {
                var unitIds = [];
                if (!eleTreeUnit) {
                    return '';
                }
                var checkedArray = eleTreeUnit.getChecked(false, false) || [];
                for (var i = 0; i < checkedArray.length; i++) {
                    if (checkedArray[i].id && checkedArray[i].id.trim().length > 0) {
                        unitIds.push(checkedArray[i].id);
                    }
                }
                return unitIds.join(',');
            }

            function queryParams(requireUnit) {
                var unitIds = selectedUnitIds();
                if (!unitIds && requireUnit) {
                    layer.msg('请选择要查询的单位', { icon: 7, time: 1500 });
                    return null;
                }
                var params = {
                    checkYear: $('#checkYear').val(),
                    startDate: $('#submitStartDate').val() || yearFirstDay(),
                    endDate: $('#submitEndDate').val() || yearLastDay(),
                    titleIds: $('#hidden_title_ids').val(),
                    seriesState: $('#seriesState').val()
                };
                if (unitIds) {
                    params.unitIds = unitIds;
                }
                return params;
            }

            function setExportButtonDisabled(disabled) {
                $('#exportBtn')
                    .toggleClass('layui-btn-disabled', disabled)
                    .attr('aria-disabled', disabled ? 'true' : 'false');
            }

            function headerTipTitle(title, tip) {
                return '<span class="member-header-tip" data-tip="' + tip + '">' + title + '</span>';
            }

            function bindHeaderTips() {
                $('#memberSituationTable').next('.layui-table-view').find('.member-header-tip')
                    .off('mouseenter.memberHeaderTip mouseleave.memberHeaderTip')
                    .on('mouseenter.memberHeaderTip', function () {
                        var tip = $(this).attr('data-tip');
                        if (!tip) {
                            return;
                        }
                        if (headerTipIndex) {
                            layer.close(headerTipIndex);
                        }
                        headerTipIndex = layer.tips(tip, this, { tips: [1, '#4d4d4d'], time: 0 });
                    })
                    .on('mouseleave.memberHeaderTip', function () {
                        if (headerTipIndex) {
                            layer.close(headerTipIndex);
                            headerTipIndex = null;
                        }
                    });
            }

            function isZeroDetailValue(value) {
                if (value == null || value === '') {
                    return true;
                }
                var numberValue = parseFloat(String(value).replace('%', ''));
                return !numberValue;
            }

            function detailLink(value, eventName, summary) {
                var content = value == null ? 0 : value;
                if (isZeroDetailValue(content)) {
                    return '<span class="' + (summary ? 'member-detail-empty table-summary-cell' : 'member-detail-empty') + '">' + content + '</span>';
                }
                var className = summary ? 'member-detail-link table-summary-cell' : 'member-detail-link';
                return '<a href="javascript:;" class="' + className + '" lay-event="' + eventName + '">' + content + '</a>';
            }

            function memberPassRateLink(row) {
                var content = row.passRate == null ? '0.00%' : row.passRate;
                if (!row.memberCount) {
                    return '<span class="' + (row.summary ? 'member-detail-empty table-summary-cell' : 'member-detail-empty') + '">' + content + '</span>';
                }
                var className = row.summary ? 'member-detail-link table-summary-cell' : 'member-detail-link';
                return '<a href="javascript:;" class="' + className + '" lay-event="detailMemberPassRate">' + content + '</a>';
            }

            function openDetail(row, detailConfig) {
                var baseParams = queryParams(false) || {};
                var inheritedTitleNames = $('#text_title_names').val() || '';
                var tableId = 'memberSituationDetailTable_' + new Date().getTime();
                var ids = {
                    personName: tableId + '_personName',
                    personNo: tableId + '_personNo',
                    deptName: tableId + '_deptName',
                    titleName: tableId + '_titleName',
                    titleIds: tableId + '_titleIds',
                    bizState: tableId + '_bizState',
                    search: tableId + '_search',
                    reset: tableId + '_reset'
                };
                var detailExporting = false;
                var showDept = String(baseParams.checkYear) === String(currentYear);
                var deptConditionHtml = showDept
                    ? '<div class="layui-inline"><label class="layui-form-label">科室</label><div class="layui-input-block"><input type="text" id="' + ids.deptName + '" autocomplete="off" class="layui-input"></div></div>'
                    : '';
                baseParams.detailType = detailConfig.type;
                if (row && row.unitId) {
                    baseParams.detailUnitId = row.unitId;
                }

                function detailParams() {
                    var params = $.extend({}, baseParams);
                    var personName = $('#' + ids.personName).val();
                    var personNo = $('#' + ids.personNo).val();
                    var deptName = showDept ? $('#' + ids.deptName).val() : '';
                    var titleIds = $('#' + ids.titleIds).val();
                    var bizState = $('#' + ids.bizState).val();
                    params.detailPersonName = personName || '';
                    params.detailPersonNo = personNo || '';
                    params.detailDeptName = deptName || '';
                    params.titleIds = titleIds || '';
                    params.detailBizState = bizState || '';
                    return params;
                }

                function setDetailExportDisabled(disabled) {
                    $('#' + tableId).next('.layui-table-view').find('[lay-event="detailExport"]')
                        .toggleClass('layui-btn-disabled', disabled)
                        .attr('aria-disabled', disabled ? 'true' : 'false');
                }

                function exportDetail() {
                    if (detailExporting) {
                        return;
                    }
                    detailExporting = true;
                    setDetailExportDisabled(true);
                    var loadIndex = layer.load(2);
                    $.ajax({
                        type: 'GET',
                        url: huayi_personorg_url + 'memberSubmit/query/situation/statistics/persons/export',
                        data: detailParams(),
                        xhrFields: {
                            responseType: 'blob'
                        },
                        success: function (blob) {
                            if (blob && blob.type && blob.type.indexOf('json') > -1) {
                                showExportError({ response: blob });
                                return;
                            }
                            var href = window.URL.createObjectURL(blob);
                            var downloadElement = document.createElement('a');
                            downloadElement.href = href;
                            downloadElement.download = '会员情况统计明细.xlsx';
                            document.body.appendChild(downloadElement);
                            downloadElement.click();
                            document.body.removeChild(downloadElement);
                            window.URL.revokeObjectURL(href);
                        },
                        error: function (xhr) {
                            showExportError(xhr);
                        },
                        complete: function () {
                            layer.close(loadIndex);
                            detailExporting = false;
                            setDetailExportDisabled(false);
                        }
                    });
                }

                layer.open({
                    type: 1,
                    skin: 'member-detail-dialog',
                    title: (row && row.unitName ? row.unitName + ' - ' : '') + detailConfig.title + '明细',
                    area: ['1120px', '700px'],
                    content: '<div class="member-detail-layer">'
                        + '<div class="layui-card member-detail-card">'
                        + '<div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area member-detail-condition member-detail-query">'
                        + '<div class="layui_mess">'
                        + '<div class="layui_display condition-fields member-detail-fields">'
                        + '<div class="layui-inline"><label class="layui-form-label">姓名</label><div class="layui-input-block"><input type="text" id="' + ids.personName + '" autocomplete="off" class="layui-input"></div></div>'
                        + '<div class="layui-inline"><label class="layui-form-label">人员编号</label><div class="layui-input-block"><input type="text" id="' + ids.personNo + '" autocomplete="off" class="layui-input"></div></div>'
                        + deptConditionHtml
                        + '<div class="layui-inline title-select"><label class="layui-form-label">职称</label><div class="layui-input-block"><input type="text" id="' + ids.titleName + '" autocomplete="off" class="layui-input" placeholder="全部" readonly><input type="hidden" id="' + ids.titleIds + '"></div></div>'
                        + '<div class="layui-inline"><label class="layui-form-label">审核状态</label><div class="layui-input-block"><select id="' + ids.bizState + '"><option value="">全部</option><option value="10">审核中</option><option value="20">审核退回</option><option value="30">终审通过</option></select></div></div>'
                        + '</div>'
                        + '<div class="layui_display condition-actions member-detail-actions">'
                        + '<div class="layui-inline">'
                        + '<a class="layui-btn layui-btn-sm" id="' + ids.search + '"><i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询</a>'
                        + '<a class="layui-btn layui-btn-primary layui-btn-sm" id="' + ids.reset + '">重置</a>'
                        + '</div></div></div></div>'
                        + '<div class="layui-card-body layui_body_box member-detail-table-block">'
                        + '<table id="' + tableId + '" lay-filter="' + tableId + '"></table>'
                        + '</div>'
                        + '</div>'
                        + '</div>',
                    success: function () {
                        $('#' + ids.titleName).val(inheritedTitleNames);
                        $('#' + ids.titleIds).val(baseParams.titleIds || '');
                        $('#' + ids.titleName).click(function () {
                            titleSelectTarget = {
                                ids: '#' + ids.titleIds,
                                names: '#' + ids.titleName
                            };
                            layer.open({
                                type: 2,
                                content: '../controls/selectTitle/selectTitles.html?titleIds=' + ($('#' + ids.titleIds).val() || ''),
                                area: ['600px', '395px'],
                                scrollbar: false
                            });
                        });
                        form.render('select');
                        var detailCols = [
                            { type: 'numbers', title: '序号', align: 'center', width: 70 },
                            { field: 'personNo', title: '人员编号', align: 'center', minWidth: 120 },
                            { field: 'personName', title: '姓名', align: 'center', minWidth: 100 },
                            { field: 'sex', title: '性别', align: 'center', minWidth: 80 },
                            { field: 'titleName', title: '职称', align: 'center', minWidth: 120 },
                            { field: 'mobile', title: '联系电话', align: 'center', minWidth: 130 },
                            { field: 'submitTime', title: '报名时间', align: 'center', minWidth: 160 },
                            { field: 'bizStateName', title: '审核状态', align: 'center', minWidth: 110 },
                            { field: 'passStateName', title: '达标状态', align: 'center', minWidth: 100 }
                        ];
                        if (showDept) {
                            detailCols.splice(4, 0, { field: 'deptName', title: '科室', align: 'center', minWidth: 120 });
                        }
                        table.render({
                            elem: '#' + tableId,
                            id: tableId,
                            url: huayi_personorg_url + 'memberSubmit/query/situation/statistics/persons',
                            headers: {
                                'Authorization': localStorage.getItem('token'),
                                'KJPT-USER-ID': localStorage.getItem('user-id')
                            },
                            where: detailParams(),
                            toolbar: '#memberSituationDetailToolbar',
                            defaultToolbar: [],
                            cols: [detailCols],
                            cellMinWidth: 100,
                            height: 470,
                            page: true,
                            limit: 10,
                            limits: [10, 50, 100, 150, 200],
                            parseData: function (res) {
                                var page = res.data || {};
                                if (res.status !== 200) {
                                    layer.msg(res.msg || '查询失败', { icon: 7, time: 1500 });
                                }
                                return {
                                    code: res.status === 200 ? 0 : res.status,
                                    msg: res.msg,
                                    count: page.recordsTotal || 0,
                                    data: page.records || [],
                                    page: page.pageNum,
                                    limit: page.pageSize
                                };
                            },
                            request: {
                                pageName: 'pageNum',
                                limitName: 'pageSize'
                            }
                        });
                        $('#' + ids.search).click(function () {
                            table.reload(tableId, {
                                page: { curr: 1 },
                                where: detailParams()
                            });
                        });
                        $('#' + ids.reset).click(function () {
                            $('#' + ids.personName).val('');
                            $('#' + ids.personNo).val('');
                            if (showDept) {
                                $('#' + ids.deptName).val('');
                            }
                            $('#' + ids.titleIds).val(baseParams.titleIds || '');
                            $('#' + ids.titleName).val(inheritedTitleNames);
                            $('#' + ids.bizState).val('');
                            form.render('select');
                            table.reload(tableId, {
                                page: { curr: 1 },
                                where: detailParams()
                            });
                        });
                        table.on('toolbar(' + tableId + ')', function (obj) {
                            if (obj.event === 'detailExport') {
                                exportDetail();
                            }
                        });
                    }
                });
            }

            function showExportError(xhr) {
                var blob = xhr && xhr.response;
                if (blob && blob.type && blob.type.indexOf('json') > -1) {
                    var reader = new FileReader();
                    reader.onload = function () {
                        var message = '导出失败';
                        try {
                            var result = JSON.parse(reader.result);
                            message = result.msg || result.message || message;
                        } catch (e) {}
                        layer.msg(message, { icon: 7, time: 1500 });
                    };
                    reader.readAsText(blob);
                    return;
                }
                layer.msg('导出失败', { icon: 7, time: 1500 });
            }

            function exportStatistics() {
                var params = queryParams(true);
                if (!params || exporting) {
                    return;
                }
                exporting = true;
                setExportButtonDisabled(true);
                var loadIndex = layer.load(2);
                $.ajax({
                    type: 'GET',
                    url: huayi_personorg_url + 'memberSubmit/query/situation/statistics/export',
                    data: params,
                    xhrFields: {
                        responseType: 'blob'
                    },
                    success: function (blob) {
                        if (blob && blob.type && blob.type.indexOf('json') > -1) {
                            showExportError({ response: blob });
                            return;
                        }
                        var href = window.URL.createObjectURL(blob);
                        var downloadElement = document.createElement('a');
                        downloadElement.href = href;
                        downloadElement.download = '会员情况统计.xlsx';
                        document.body.appendChild(downloadElement);
                        downloadElement.click();
                        document.body.removeChild(downloadElement);
                        window.URL.revokeObjectURL(href);
                    },
                    error: function (xhr) {
                        showExportError(xhr);
                    },
                    complete: function () {
                        layer.close(loadIndex);
                        exporting = false;
                        setExportButtonDisabled(false);
                    }
                });
            }

            function renderUnitTree(callback) {
                $.ajax({
                    type: 'get',
                    url: huayi_personorg_url + 'comunit/childrenAllTreeNew?unitId=' + changchunUnitId + '&depth=2',
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        var rootNode = [{ name: '全选', id: '', children: [] }];
                        if (res && res[0] && res[0].children) {
                            rootNode[0].children = res[0].children;
                        }
                        eleTreeUnit = eleTree({
                            el: '#unit-tree',
                            defaultExpandedKeys: [''],
                            defaultCheckedKeys: [''],
                            expandOnClickNode: false,
                            highlightCurrent: true,
                            showCheckbox: true,
                            data: rootNode,
                            sort: true,
                            initSort: {
                                field: 'order',
                                type: 'asc'
                            },
                            request: {
                                name: 'name',
                                key: 'id',
                                children: 'children',
                                pid: 'pid'
                            }
                        });
                        if (callback) {
                            callback();
                        }
                    },
                    error: function () {
                        layer.msg('获取单位树失败', { icon: 7, time: 1500 });
                        if (callback) {
                            callback();
                        }
                    }
                });
            }

            function renderTable() {
                var params = queryParams(false);
                table.render({
                    elem: '#memberSituationTable',
                    url: huayi_personorg_url + 'memberSubmit/query/situation/statistics',
                    headers: {
                        'Authorization': localStorage.getItem('token'),
                        'KJPT-USER-ID': localStorage.getItem('user-id')
                    },
                    where: params || {},
                    toolbar: '#memberSituationTableToolbar',
                    defaultToolbar: [],
                    cols: [[
                        { title: '序号', align: 'center', width: 70, templet: function (d) {
                            return d.summary ? '' : d.LAY_INDEX;
                        }},
                        { field: 'unitName', title: '单位名称', align: 'center', minWidth: 220, templet: function (d) {
                            return d.summary ? '<span class="table-summary-cell">' + d.unitName + '</span>' : d.unitName;
                        }},
                        { field: 'totalPersonCount', title: headerTipTitle('总人数', '当前年度聘任总人数'), align: 'center', minWidth: 110, templet: function (d) {
                            return detailLink(d.totalPersonCount, 'detailTotal', d.summary);
                        }},
                        { field: 'submittedCount', title: headerTipTitle('上报人数', '当前年度上报总人数'), align: 'center', minWidth: 110, templet: function (d) {
                            return detailLink(d.submittedCount, 'detailSubmitted', d.summary);
                        }},
                        { field: 'memberCount', title: headerTipTitle('会员人数', '当前年度上报会员人数'), align: 'center', minWidth: 110, templet: function (d) {
                            return detailLink(d.memberCount, 'detailMember', d.summary);
                        }},
                        { field: 'memberPassCount', title: headerTipTitle('会员达标人数', '当前年度上报会员中达标人数'), align: 'center', minWidth: 130, templet: function (d) {
                            return detailLink(d.memberPassCount, 'detailMemberPass', d.summary);
                        }},
                        { field: 'passRate', title: headerTipTitle('会员达标率', '会员达标人数/会员总人数'), align: 'center', minWidth: 110, templet: function (d) {
                            return memberPassRateLink(d);
                        }}
                    ]],
                    cellMinWidth: 100,
                    id: 'memberSituationTable',
                    height: 'full-120',
                    page: false,
                    parseData: function (res) {
                        if (res.status !== 200) {
                            layer.msg(res.msg || '查询失败', { icon: 7, time: 1500 });
                        }
                        return {
                            code: res.status === 200 ? 0 : res.status,
                            msg: res.msg,
                            count: res.data && res.data.rows ? res.data.rows.length : 0,
                            data: res.data && res.data.rows ? res.data.rows : []
                        };
                    },
                    done: function () {
                        bindHeaderTips();
                    }
                });
            }

            function reloadTable() {
                var params = queryParams(true);
                if (!params) {
                    return;
                }
                table.reload('memberSituationTable', {
                    where: params
                });
            }

            function resetMainQuery() {
                $('#text_title_names').val('');
                $('#hidden_title_ids').val('');
                $('#seriesState').val('ALL');
                form.render('select');
                resetDateRange();
                renderDatePickers();
            }

            $('#text_title_names').click(function () {
                var titleIds = $('#hidden_title_ids').val();
                titleSelectTarget = {
                    ids: '#hidden_title_ids',
                    names: '#text_title_names'
                };
                layer.open({
                    type: 2,
                    content: '../controls/selectTitle/selectTitles.html?titleIds=' + titleIds,
                    area: ['600px', '395px'],
                    scrollbar: false
                });
            });

            window.getChildTitles = function (hiddenTitleIds, titleNames) {
                var target = titleSelectTarget || {
                    ids: '#hidden_title_ids',
                    names: '#text_title_names'
                };
                $(target.names).val(titleNames);
                $(target.ids).val(hiddenTitleIds);
                titleSelectTarget = null;
            };

            form.on('select(checkYear)', function (data) {
                shiftDateRangeToYear(data.value);
                renderDatePickers();
            });

            $('#searchBtn').click(reloadTable);
            $('#resetBtn').click(resetMainQuery);
            table.on('toolbar(memberSituationTable)', function (obj) {
                if (obj.event === 'export') {
                    exportStatistics();
                }
            });
            table.on('tool(memberSituationTable)', function (obj) {
                if (detailEvents[obj.event]) {
                    openDetail(obj.data, detailEvents[obj.event]);
                }
            });

            renderYearOptions();
            resetDateRange();
            renderDatePickers();
            renderUnitTree(renderTable);

            function resizeContent() {
                var height = $(window).height();
                $('#content-left').css('height', height - 56);
            }
            resizeContent();
            $(window).resize(resizeContent);
        });
    </script>
</body>
</html>
