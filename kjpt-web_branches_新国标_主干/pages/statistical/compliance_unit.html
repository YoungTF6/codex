<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>单位达标情况查询（医疗机构）</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <!-- 工具 -->
    <script type="text/javascript" src="../../js/base64.js"></script>

    <style>
        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-treeSelect .ztree li {
            line-height: initial !important;
            padding: 2px 0;
        }
        .table_toolbar_right {
            float: right;
            position: relative;
            right: -120px;
        }

        .div-statistical-year span {
            float: left;
        }
        .div-statistical-year .span-left {
            width: 75px; 
            display: inline-block;
        }
        .div-statistical-year .span-right {
            display: inline-block; 
            margin-left: 10px; 
            width: calc(186.4px - 15px); 
            color: blue;
            height: 38px;
            line-height: 38px;
        }
    </style>
</head>

<body class="body-area">

    <div class="layui-fluid">
        <div class="layui-card">

            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <div class="layui_mess">

                    <!-- 筛选项 -->
                    <div class="layui_display">
                        <div class="layui-inline layui-form div-statistical-year" lay-filter="div-statistical-year">
                            <label class="layui-form-label">统计年度</label>
                            <div class="layui-input-block">
                                <span class="span-left">
                                    <select id="statistical-year" lay-filter="statistical-year"></select>
                                </span>
                                <span class="span-right"><d1></d1>&nbsp;至&nbsp;<d2></d2></span>
                            </div>
                        </div>
                        <div class="layui-inline layui-form" lay-filter="">
                            <label class="layui-form-label">统计维度</label>
                            <div class="layui-input-block">
                                <select id="statistical-dimension" lay-filter="statistical-dimension">
                                    <option value="TITLE_LEVEL">按职称级别统计</option>
                                    <option value="TITLE">按职称统计</option>
                                    <option value="DEPT">按科室统计</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline layui-form" lay-filter="dept-select-div">
                            <label class="layui-form-label">科室</label>
                            <div class="layui-input-block">
                                <input type="text" autocomplete="off" class="layui-input" disabled
                                        lay-filter="deptSelect" id="deptSelect" name="deptId" placeholder="请选择">
                            </div>
                        </div>
                        <div class="layui-inline layui-form" lay-filter="">
                            <label class="layui-form-label">在编状态</label>
                            <div class="layui-input-block">
                                <select id="series-state" lay-filter="series-state">
                                    <option value="">全部</option>
                                    <option value="IN_THE_SERIES">在编</option>
                                    <option value="OUT_OF_THE_SERIES">不在编</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="layui_display">
                        <div class="layui-inline btn-search-positon">
                            <a class="layui-btn layui-btn-sm" onclick="configTable()" id="searchBtn" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>

                </div>
            </div>


            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" style="margin: 0px 0px;"
                        id="table_compliance" lay-filter="table_compliance">
                </table>
            </div>

        </div>
    </div>


    <!-- 表头工具条 -->
    <script type="text/html" id="table_toolbar">
        <span class="table_toolbar_right">
            <a class="layui-btn layui-btn-sm" lay-event="export_excel">导出Excel</a>
        </span>
    </script>


    <script type="text/javascript">
        const unitId            = localStorage.getItem('unit-id'),
              unitName          = localStorage.getItem('unit-name'),
              username          = localStorage.getItem('user-name'),
              cmeStandardKindId = localStorage.getItem('standardkind-id');


        layui.config({
            base : '../../js/layui/ext/'
        }).extend({
            treeSelect : 'treeSelect',
            excel      : 'excel'
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer', 'treeSelect', 'excel'], function() {
            var table       = layui.table,
                form        = layui.form,
                $           = layui.jquery,
                layer       = layui.layer,
                treeSelect  = layui.treeSelect,
                excel       = layui.excel;

            var statisticalYearList = [];


            /* 页面初始化 */
            $(() => {
                // 统计年度
                $.ajax({
                    url      : huayi_sjwh_url + 'cmeYear',
                    type     : 'get',
                    async    : false,
                    dataType : 'json',
                    data     : { cmeStandardKindId : cmeStandardKindId },
                    success  : function(res) {
                        if (res.status == 200) {
                            let option = '';
                            statisticalYearList = res.data;

                            for (let i = 0; i < 10 && i < statisticalYearList.length; i++) {
                                option += '<option value="' + statisticalYearList[i].cmeYearId + '">' +
                                        statisticalYearList[i].cmeYear + '</option>';
                            }
                            $('#statistical-year').append(option);
                            form.render('select', 'div-statistical-year');
                            $('#statistical-year').parent().next().find('d1').html(statisticalYearList[0].startDate);
                            $('#statistical-year').parent().next().find('d2').html(statisticalYearList[0].endDate);
                        } else {
                            layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                        }
                    },
                    error    : function () {
                        layer.msg('获取统计年度列表失败', { icon: 7, time: 1500 });
                    }
                });


                // 统计年度事件
                form.on('select(statistical-year)', function(data) {
                    for (let i = 0; i < statisticalYearList.length; i++) {
                        if (statisticalYearList[i].cmeYearId == data.value) {
                            $('#statistical-year').parent().next().find('d1').html(statisticalYearList[i].startDate);
                            $('#statistical-year').parent().next().find('d2').html(statisticalYearList[i].endDate);
                            break;
                        }
                    }
                });

                // 科室
                let deptTreeSelect = treeSelect.render({
                    elem: '#deptSelect',
                    data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + unitId,
                    type: 'get',
                    search: true,
                    style: {
                        folder: { // 父节点图标
                            enable: true // 是否开启：true/false
                        },
                        line: { // 连接线
                            enable: true // 是否开启：true/false
                        }
                    }
                });

                // 表格初始化
                // configTable();
            });


            /* 获取表格配置及数据 */
            var load_index = -1,
                excelHead  = [],
                excelBody  = [];
            window.configTable = () => {
                let msg        = '<span style="color: #666666;">&nbsp;正在查询&nbsp;···</span>';
                    load_index = layer.msg(msg, { icon: 16, shade: 0.3, time: 0 });
                            //    = layer.load(2, { shade: 0.3 });


                let colsConfig      = [],
                    colsConfigData  = [],
                    tableData       = [];


                axios({
                    method       : 'get',
                    url          : huayi_projectscore_url + 'statisticsUtility/compliance/unit',
                    responseType : 'json',
                    params       : {
                        cmeStandradKindId    : cmeStandardKindId,
                        unitId               : unitId,
                        showZero             : 0,
                        statisticalYear      : $('#statistical-year').val(),
                        statisticalDimension : $('#statistical-dimension').val(),
                        deptId               : $('#deptSelect').val(),
                        seriesState          : $('#series-state').val()
                    }
                }).then(res => {
                    if (res.status == 200 && res.data.status == 200) {
                        let data           = res.data.data,
                            colNameList    = data.colName,
                            complianceList = data.compliance;

                            excelHead      = data.colName,
                            excelBody      = data.compliance;

                        // 表头
                        for (let i = 0; i < colNameList.length; i++) {
                            let colsConfig = {
                                field : colNameList[i],
                                title : colNameList[i],
                                align : 'center'
                            };
                            colsConfigData.push(colsConfig);
                        }

                        // 数据
                        tableData = complianceList;

                    } else {
                        layer.msg('查询失败', { icon: 2, time: 1500 });
                    }

                    colsConfig.push(colsConfigData);
                    loaderTable(colsConfig, tableData);

                }).catch(error => {
                    layer.msg('网络异常，请稍后再试', { icon: 7, time: 1500 });

                    colsConfig.push(colsConfigData);
                    loaderTable(colsConfig, tableData);

                    console.log(error);
                });
            }
            /* 加载表格 */
            window.loaderTable = (colsConfig, tableData) => {

                if (window.TextReplaceTool && typeof window.TextReplaceTool.changeYear === 'function') {
                    window.TextReplaceTool.changeYear($('#statistical-year option:selected').text().trim());
                }

                table.render({
                    elem            : '#table_compliance',
                    title           : '单位达标情况',
                    toolbar         : '#table_toolbar',
                    defaultToolbar  : [],
                    cols            : colsConfig,
                    data            : tableData,
                    cellMinWidth    : 150,
                    id              : 'table_compliance',
                    height          : 'full-165',
                    page            : false,
                    limit           : Number.MAX_VALUE,
                    done            : function (res, curr, count) {
                        layer.close(load_index);
                    }
                });
            };
            /* 监听表头工具条 */
            table.on('toolbar(table_compliance)', function(obj) {
                let datas = obj.data;

                switch (obj.event) {
                    case 'export_excel':
                        let fileName = '单位达标情况（' + new Date().toLocaleString() + '）.xlsx';
                        // excelBody = excel.filterExportData(excelBody, excelHead);
                        // excel.exportExcel({ '单位达标情况' : excelBody }, fileName, 'xlsx');
                        exportFile('table_compliance', fileName, 'xlsx');
                        break;

                    default:
                }
            });
            /* 监听行工具条 */
            table.on('tool(table_compliance)', function(obj) {
                let datas = obj.data;

                switch (obj.event) {
                    case '':
                        break;

                    default:
                }
            });


			/* 表格导出 */
            function exportFile(id, fileName, extension) {
                //根据传入tableID获取表头
                var headers = $('div[lay-id=' + id + '] .layui-table-box table').get(0);
                var htrs = Array.from(headers.querySelectorAll('tr'));
                var titles = {};
                for (var j = 0; j < htrs.length; j++) {
                    var hths = Array.from(htrs[j].querySelectorAll("th"));
                    for (var i = 0; i < hths.length; i++) {
                        var clazz = hths[i].getAttributeNode('class').value;
                        if (clazz != ' layui-table-col-special' && clazz != 'layui-hide') {
                            //排除居左、具有、隐藏字段
                            //修改:默认字段data-field+i,兼容部分数据表格中不存在data-field值的问题
                            titles['data-field' + i] = hths[i].innerText;
                        }
                    }
                }
                //根据传入tableID获取table内容
                var bodys = $("div[lay-id=" + id + "] .layui-table-box table").get(1);
                var btrs = Array.from(bodys.querySelectorAll("tr"))
                var bodysArr = new Array();
                for (var j = 0; j < btrs.length; j++) {
                    var contents = {};
                    var btds = Array.from(btrs[j].querySelectorAll("td"));
                    for (var i = 0; i < btds.length; i++) {
                        for (var key in titles) {
                            //修改:默认字段data-field+i,兼容部分数据表格中不存在data-field值的问题
                            var field = 'data-field' + i;
                            if (field === key) {
                                //根据表头字段获取table内容字段
                                contents[field] = btds[i].innerText;
                            }
                        }
                    }
                    bodysArr.push(contents)
                }
                //将标题行置顶添加到数组
                bodysArr.unshift(titles);
                //导出excel
                excel.exportExcel({ sheet1: bodysArr }, fileName, extension);
            }

        });
    </script>
</body>

</html>
