<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>已公布项目管理（行政）</title>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/constantPage/projectConstant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <script type="text/javascript" src="../../js/tools/dateTools.js"></script>
    <script type="text/javascript" src="../../js/tools/unitTool.js"></script>
    <script type="text/javascript" src="../../js/tools/form_validation_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/dict_tool.js"></script>
    <style type="text/css">
        .layui-card-body.layui_body_box, .layui-tab-content {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }
        .layui-tab-card-1 {
            background-color: #F5F5F5;
            padding: 10px 30px 0 30px;
            border: 0;
            box-shadow: none;
        }
        .layui-tab-title-1 {
            background-color: #f5f5f5 !important;
            height: auto;
            border: 0;
        }
        .layui-tab-title-1 li {
            margin-right: 40px !important;
            padding: 0;
            line-height: 32px;
            border: 0;
            border-bottom: 3px solid #F5F5F5;
            background-color: #F5F5F5;
            color: #404040;
        }
        .layui-tab-title-1 li:hover {
            background-color: #F5F5F5;
            color: #404040;
            opacity: 1;
        }
        .layui-tab-title-1 .layui-this {
            background-color: #f5f5f5 !important;
            color: #009688;
            border-bottom: 3px solid #009688;
        }
        .layui-tab-title-1 .layui-this:hover {
            color: #009688;
        }
        .layui-tab-title-1 .layui-this:after {
            border: 0;
        }
        .layui-tab-content.padding-0 {
            padding: 0;
        }
        .layui-tab-title .layui-this {
            color: #404040 !important;
        }
        
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .tab-title {
            display: flex;
        }
        .tab-title li {
            margin-right: 20px;
            padding: 8px 0;
            text-align: center;
            cursor: pointer;
        }
        .qh_tab {
            color: #00cdba;
            border-bottom: 2px solid #00cdba;
        }
        /* 标签抖动 */
        .shake_tab {
            text-align: center; 
            animation: shakeH .6s ease-in-out infinite alternate;
        }
        @keyframes shakeH {
            0% { transform: rotate(-5deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        .layui-table-header th .layui-table-cell {
            text-align: center;
        }

        .condition-area .layui_display:nth-child(1)  {
            margin-right: 15px;
        }
        .condition-area .layui_display:nth-child(1) .layui-inline {
            margin-top: 5px;
        }
        .condition-area .layui_display:nth-child(2) .layui-btn  {
            width: 75px;
        }
        .condition-area .layui-form-label {
            width: 120px;
            padding: 9px 10px;
        }
        .condition-area .layui-input-block {
            margin-left: 140px;
        }
        .div-dateCycle input {
            float: left;
            width: calc(50% - 15px);
        }
        .div-dateCycle span {
            float: left;
            width: 30px;
            text-align: center;
        }

        #form-query .layui-form-label {
            width: 100px;
        }
        #form-query .layui-input-block {
            margin-left: 120px;
        }
        #searchToggle {
            display: block; 
            text-align: center; 
            line-height: 0; 
            padding-top: 20px;
        }
        #btn-searchToggle {
            margin: 0 auto; 
            width: 100px; 
            font-size: 10px; 
            color: #009688;
        }
        #btn-searchToggle .layui-icon{
            position: relative; 
            top: 2px; 
            left: 5px; 
            line-height: 0;
        }

        #table-cmeCmeProj {
            margin: 0;
        }
        .layui-table-cell {
            height: auto;
        }
    </style>
</head>
<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card no-border">
          
            <!-- 2、搜索 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area" lay-filter="div-search">
                <div class="layui_mess">
                    <div class="layui_display">
                        <form id="form-query">
                            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                                <label class="layui-form-label">举办年度</label>
                                <div class="layui-input-block">
                                    <select name="cmeYear" id="cmeYear" lay-filter="cmeYear"></select>
                                </div>
                            </div>
                            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                                <label class="layui-form-label">项目编号</label>
                                <div class="layui-input-block">
                                    <input type="text" name="projNo" id="projNo" placeholder="请输入项目编号" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                                <label class="layui-form-label">项目名称</label>
                                <div class="layui-input-block">
                                    <input type="text" name="projName" id="projName" placeholder="请输入项目名称" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                                <label class="layui-form-label">项目负责人</label>
                                <div class="layui-input-block">
                                    <input type="text" name="projManager" id="projManager" placeholder="请输入项目负责人" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                                <label class="layui-form-label">主办单位</label>
                                <div class="layui-input-block">
                                    <input type="text" name="unitName" id="unitName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>                            
                            <div class="layui-inline layui-col-xs6 layui-col-sm4 layui-col-md3">
                                <label class="layui-form-label">项目状态</label>
                                <div class="layui-input-block">
                                    <select name="downState" id="downState">
                                        <option value="">全部</option>
                                        <option value="0">未开始</option>
                                        <option value="1" selected>举办中</option>
                                        <option value="2">已结束</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline layui-col-xs12 layui-col-sm8 layui-col-md6">
                                <label class="layui-form-label">举办开始时间</label>
                                <div class="layui-input-block div-dateCycle">
                                    <input type="text" name="searchStartDate" id="searchStartDate" placeholder="起始时间" autocomplete="off" class="layui-input">
                                    <span>-</span>
                                    <input type="text" name="searchEndDate" id="searchEndDate" placeholder="截止时间" autocomplete="off" class="layui-input" >
                                </div>
                            </div>

                        </form>
                    </div>
                  
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="tableOp.reload()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>&nbsp;查询</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 表格 -->
        <div class="layui-card-body layui_body_box">
            <div class="layui-tab-content">
                <div class="layui-tab-item layui-show">
                    <table class="layui-table" id="table-cmeCmeProj" lay-filter="table-cmeCmeProj"></table>
                </div>
            </div>
        </div>
    </div>
</body>



<script type="text/javascript">
    layui.config({
        base        : '../../js/layui/ext/'
    }).extend({
        xmSelect    : 'xm-select',
        treeSelect  : 'treeSelect'
    }).use([ 'table', 'form', 'laydate', 'element', 'treeSelect' ], () => {
        let { table, form, layer, laydate, treeSelect, element } = layui;

        const yearCur = new Date().getFullYear();


        /** 初始化页面 */
        $(() => {
            window.init();

            tableOp.init(); // 初始化表格
            
        });


        /** 搜索初始化 */
        window.init = () => {

            /* 举办年度 */
            for (let i = yearCur; i >= yearCur - 8; i--) {
                $('#cmeYear').append($('<option value="' + i + '" ' + (i == yearCur ? 'selected' : '') + '>' + i + '</option>'));
            }

            form.render('select', 'div-search');

            let lyStart = laydate.render({ elem: '#searchStartDate',done: (value,date) => { date.month = date.month-1; lyEnd.config.min =  date; } });
            let lyEnd   = laydate.render({ elem: '#searchEndDate', done: (value,date) => { date.month = date.month-1; lyStart.config.max = date; } });


        };

        
        window.getVerParams = () => {
            return {
                cmeStandardKindId   : dictTool.getStandardKindId(),
                unitId              : dictTool.getUnitId(),
            };
        };

        window.getMenuUnitId = () => localStorage.getItem('menu-unit-id') || localStorage.getItem('unit-id');

    
        /** 表格相关 */
        window.tableOp = {

            init: () => {
                table.render({
                    elem            : '#table-cmeCmeProj',                    
                    url             : huayi_projectscore_url + 'cmeCmeProj/getProjOverSeeList',
                    // toolbar         : '#toolbarBtns',
                    // defaultToolbar  : [ 'filter', 'print', 'exports' ],
                    where           : { ...tableOp.getQueryParams() },
                    cols            : [ [                        
                        { field: 'projNo', align: 'center', title: '项目编号', minWidth: 200,fixed:'left' },
                        { field: 'projName', title: '项目名称', align: 'center', minWidth: 200,fixed:'left', templet: d => tableOp.rowWithTitle(d.projName) },
                        { field: 'unitName', title: '主办单位', align: 'center', minWidth: 200},
                        { field: 'projManager', title: '项目负责人', align: 'center', minWidth: 130 },
                        { field: 'startDt', title: '举办开始时间', align: 'center', minWidth: 150, sort: true },
                        { field: 'endDt', title: '举办结束时间', align: 'center', minWidth: 150, sort: true },
                        { field: 'planAttendTime', title: '维护的考勤次数', align: 'center', minWidth: 170, templet: function(d) {
                             return '<a class="layui-btn layui-btn-xs" lay-event="showBatchList" style="color: #5FB878;background-color: transparent;">'+d.planAttendTime+'</a>';
                        } },
                        { field: 'attendState', title: '考勤状态', align: 'center', minWidth: 100 },
                        { field: 'realAttendTime', title: '实际的考勤次数', align: 'center', minWidth: 170},
                        
                    ] ],
                    cellMinWidth    : 100,
                    id              : 'table-cmeCmeProj',
                    height          : tableOp.computeHeight(),
                    page            : true,
                    limit           : 10,
                    limits          : [10, 50, 100, 150, 200],
                    parseData       : res => {
                        return {
                            'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                            'msg'   : res.message, // 解析提示文本
                            'count' : res.data.recordsTotal, // 解析数据长度
                            'data'  : res.data.records, // 解析数据列表
                            'page'  : res.data.pageNum, // 当前页
                            'limit' : res.data.pageSize, // 每页条数
                        } },
                    request         : {
                        pageName    : 'pageNum', // 页码的参数名称，默认：page
                        limitName   : 'pageSize' // 每页数据量的参数名，默认：limit
                    },
                    done            : (res, curr, count) => {
                        
                    }
                });

                
                table.on('tool(table-cmeCmeProj)', function (obj) {
                    var event = obj.event;
                    var data  = obj.data;

                    switch (event) {

                        case 'showBatchList':
                            var index = layer.open({
                                title: "查看考勤批次",
                                type: 2,
                                area: ['600px', '300px'],
                                maxmin: true,
                                content: 'attendanceForProj/batch.html?downId=' + data.downId,
                                closeBtn: 1
                            });
                            break;
                    }

                });

            },

            computeHeight: () => {
                let windowHeight    = $(window).height(),
                    divTop          = $('#table-cmeCmeProj').offset().top,
                    divHeight       = windowHeight - divTop;
                return  'full-' + Math.floor(divTop + 16);
            },

            getQueryParams: data => {
                return { ...$('#form-query').serializeObject(), ...getVerParams(),
                    topUnitId               : getMenuUnitId()
                };
            },

            rowWithTitle: val => val ? '<span title="' + val + '">' + val + '</span>' : '',

            reload: config => {
                
                table.reload('table-cmeCmeProj', {
                    height  : tableOp.computeHeight(),
                    where   : { ...tableOp.getQueryParams() },
                    page    : { curr: 1 }, // 重新从第 1 页开始
                    ...config
                });
            }

        };

    });
</script>
