<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>上报数量控制</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/api/cpt.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <style>
         .layui-table-cell {
            height:auto;
        }
        .layui-layer-page .layui-layer-content {
            overflow: hidden !important;
        }

        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui_display {
            flex: 1 auto;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }

        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }
        .layui-table-tool-temp {
            padding-right: 10px;
        }
        .add-unit-layer.layui-layer {
            border-radius: 4px;
            overflow: hidden;
        }
        .add-unit-layer .layui-layer-title {
            height: 56px;
            line-height: 56px;
            padding: 0 48px 0 24px;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            font-weight: 400;
            color: #333;
        }
        .add-unit-layer .layui-layer-setwin {
            top: 19px;
            right: 20px;
        }
        .add-unit-dialog {
            padding: 0;
            box-sizing: border-box;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .add-unit-form {
            padding: 20px 24px 10px;
            box-sizing: border-box;
            flex: 0 0 auto;
        }
        .add-unit-toolbar {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 8px;
            flex: 0 0 auto;
        }
        .add-unit-query {
            flex: 1;
            min-width: 0;
        }
        .add-unit-label {
            line-height: 20px;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .add-unit-search {
            display: flex;
            gap: 8px;
        }
        .add-unit-search .layui-input {
            flex: 1;
            min-width: 0;
            height: 36px;
            line-height: 36px;
        }
        .add-unit-search .layui-btn {
            height: 36px;
            line-height: 36px;
            padding: 0 18px;
        }
        .add-unit-limit-field {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0;
            white-space: nowrap;
            color: #666;
            line-height: 36px;
        }
        .add-unit-limit-input {
            width: 96px;
            height: 36px;
            line-height: 36px;
        }
        .add-unit-help {
            margin-bottom: 0;
            line-height: 18px;
            color: #8c8c8c;
            font-size: 12px;
            flex: 0 0 auto;
        }
        .add-unit-table-wrap {
            flex: 1 1 auto;
            min-height: 0;
            height: auto;
            overflow: hidden;
            padding: 14px 24px 20px;
            box-sizing: border-box;
        }
        .add-unit-table-wrap .layui-table-view {
            margin: 0;
            border-color: #e6e6e6;
        }
        .add-unit-table-wrap .layui-table-cell {
            height: 28px;
            line-height: 28px;
        }
        .add-unit-table-wrap .layui-table-header th {
            background-color: #f7f7f7;
            color: #666;
            font-weight: 400;
        }
        .add-unit-table-wrap .layui-table-body td {
            color: #4d4d4d;
        }
        .add-unit-table-wrap .layui-btn-xs {
            height: 28px;
            line-height: 28px;
            padding: 0 12px;
            border-radius: 4px;
        }
    </style>
</head>

<body style="background-color: white;">

    <div class="layui-fluid">
        <div class="layui-card">
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label">项目年度</label>
                            <div class="layui-input-block">
                                <select name="holdYear" id="holdYear" lay-filter="loadReport">
                                </select>
                            </div>
                        </div>
                        <!-- <div class="layui-inline">
                            <label class="layui-form-label">机构</label>
                            <div class="layui-input-block">
                                <select name="comUnit" id="comUnit">
                                </select>
                            </div>
                        </div>                           -->
                        <div class="layui-inline">
                            <label class="layui-form-label">机构名称</label>
                            <div class="layui-input-block">
                                <input type="text" name="unitName" id="unitName" placeholder="请填写机构名称关键字" autocomplete="off" class="layui-input">
                            </div>
                        </div>

                        
                     
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" lay-submit lay-filter="LAY-app-order-search">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                            <a class="layui-btn layui-btn-sm layui-btn-primary" id="addReportedUnitBtn" style="display: none;">
                                <i class="layui-icon layui-icon-add-1 layuiadmin-button-btn"></i>新增单位
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <script type="text/html" id="rowBar">

            </script>

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="project" lay-filter="project" style="margin: 0px 0px;"></table>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <div id="addReportedUnitDialog" class="add-unit-dialog" style="display: none;">
        <div class="add-unit-form">
            <div class="add-unit-toolbar">
                <div class="add-unit-query">
                    <div class="add-unit-label">可添加单位</div>
                    <div class="add-unit-search">
                        <input type="text" id="addReportedUnitKeyword" placeholder="单位名称 / 单位ID" autocomplete="off" class="layui-input">
                        <a class="layui-btn" id="addReportedUnitSearchBtn">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
                </div>
                <div class="add-unit-limit-field">
                    <span>限制数量：</span>
                    <input type="number" id="addReportedUnitInitialLimit" min="0" step="1" value="0" autocomplete="off" class="layui-input add-unit-limit-input">
                </div>
            </div>
            <div class="add-unit-help">添加后默认启用，并按该限制数量初始化当前年度各数量列。</div>
        </div>
        <div class="add-unit-table-wrap">
            <table class="layui-table" id="addReportedUnitTable" lay-filter="addReportedUnitTable"></table>
        </div>
    </div>
    <script type="text/html" id="addReportedUnitBar">
        <a class="layui-btn layui-btn-xs" lay-event="add">添加</a>
    </script>

    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element'], function() {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;
            var element = layui.element;
            var year = $('#holdYear').val();
            var userid= localStorage.getItem("unit-id");
            var standardkindId= localStorage.getItem("standardkind-id");
            var unitUserType = localStorage.getItem("unit-user-type");
            var guangDongStandardKindId = '289bf0ca-52cb-4b19-b737-9bd200a69ce1';
            var my = new Date();
            var status = -1;
            window.colArray = [{
                field: 'center',
                width: 228,
                toolbar: '#rowBar',
                title: '操作',
                fixed: 'left',
                align:'center',
            }];


            $(function() {

                ddlList();
                initAddReportedUnitBtn();
                buildTableHeader();
                //loaderTable();
                //loadReport();
            });

            function initAddReportedUnitBtn() {
                if (standardkindId === guangDongStandardKindId && unitUserType == '4') {
                    $('#addReportedUnitBtn').show();
                }
            }


            // 根据年度构建表头
            var header= [];
            window.buildTableHeader = () => {
                header= [];
                var header1= [
                    { field: 'key_id', align: 'center', title: '主键', hide: true },
                    { field: 'unitid', align: 'center', title: '机构Id', hide: true },
                    { field: 'top_unit_id', align: 'center', title: '最高级审核机构', hide: true },
                    { fixed: 'left',field: 'unitname', title: '机构名称', width: 180,align: 'center' },
                    { field: 'year', title: '控制年度', width: 110, align: 'center',style:"overflow: visible !important"}
                ];
                if (standardkindId === guangDongStandardKindId) {
                    header1.push({
                        field: 'extraAddFlag',
                        title: '单位类型',
                        width: 130,
                        align: 'center',
                        templet: function (d) {
                            if (d.extraAddFlag == 1) {
                                return '<span class="layui-badge layui-bg-green">非辖区内单位</span>';
                            }
                            return '';
                        }
                    });
                }
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url + "projectDicRegionLevel/getLevelsByStandardIdAndTopUnit",
                    async: false,
                    data: {
                        getLevelsByStandardId: standardkindId,
                        holdYear: $('#holdYear').val(),
                        unitId:userid
                    },
                    success: function (data) {
                        var datas = data.data;
                        if (datas.length>0){
                            var fieldname;
                            for (var i=0;i<datas.length;i++){
                                fieldname = datas[i].field1;
                                header1.push(
                                    {field: datas[i].scoreLevelId, minWidth: 150, title: datas[i].scoreLevelName, align: 'center',edit: 'text'
                                    })
                            }
                            header1.push(
                                {field: 'status', title: '操作', minWidth: 110, align: 'center', fixed: 'right',
                                    templet:function (d){
                                        if (d.status == 1) {
                                            return '<input type="checkbox" checked="checked" id="status" name="status" lay-filter="switchTest" lay-skin="switch" lay-text="启用|未启用" unitid=' + d.unitid + '>'
                                        } else if (d.status == 0) {
                                            return '<input type="checkbox" name="status" id="status" lay-filter="switchTest" lay-skin="switch" lay-text="启用|未启用" unitid=' + d.unitid + '>'
                                        }
                                    }
                                });
                            header.push(header1);
                            configTable();
                        }
                    }
                });
            }
            /* 获取表格配置及数据 */
            let tableData = [];
            window.configTable = () => {
                $.ajax({
                    method: 'GET',
                    url: huayi_projectscore_url + '/project/reportedQuaAllList',
                    dataType: 'json',
                    data: {
                        unitName: $('#unitName').val(),
                        year: $('#holdYear').val(),
                        cmeStandardKindId: standardkindId,
                        unitId:userid
                    },
                    success: function(res) {
                        if (res.status == 200) {
                            let data = res.data.records,
                                complianceList = data;

                            // 表头

                            // 数据
                            tableData = complianceList;
                        } else {
                            layer.msg('查询失败', { icon: 2, time: 1500 });
                        }
                        loaderTable(header, tableData);
                    },
                    error: function(error) {
                        layer.msg('网络异常，请稍后再试', { icon: 7, time: 1500 });
                        loaderTable(header, tableData);
                        console.log(error);
                    }
                });
            }
            // 表格相关操作
            // 表格配置
            window.loaderTable = (header, tableData) => {
                table.render({
                    elem            : '#project',
                    cols            : header,
                    data            : tableData,
                    height          : 'full-160',
                    defaultToolbar  : false,
                    loading         : true,
                    page            : false,
                    limit           : Number.MAX_VALUE,
                    done            : function (res, curr, count) {
                        tableData = table.cache.tableIns;

                        //设置编辑开关
                        //$(".layui-table").find('td').data('edit', false)
                        let tableView = this.elem.next();
                        layui.each(res.data, function(i, item) {
                            if (item.status === '1') {
                                tableView.find('tr[data-index=' + i + ']').find('td').data('edit', false);
                            }
                        });
                    }
                });
            };

            function openAddReportedUnitDialog() {
                layer.open({
                    type: 1,
                    title: '新增单位',
                    area: ['760px', '520px'],
                    skin: 'add-unit-layer',
                    shadeClose: true,
                    content: $('#addReportedUnitDialog'),
                    success: function () {
                        $('#addReportedUnitKeyword').val('');
                        $('#addReportedUnitInitialLimit').val('0');
                        setTimeout(loadAddReportedUnitTable, 0);
                    }
                });
            }

            function loadAddReportedUnitTable() {
                var tableBottomGap = 24;
                var tableHeight = Math.max(Math.floor(($('.add-unit-table-wrap').height() || 280) - tableBottomGap), 220);
                table.render({
                    elem: '#addReportedUnitTable',
                    url: huayi_projectscore_url + '/project/reportedQuaAddableUnitList',
                    method: 'GET',
                    where: {
                        keyword: $.trim($('#addReportedUnitKeyword').val()),
                        year: $('#holdYear').val(),
                        cmeStandardKindId: standardkindId,
                        unitId: userid
                    },
                    height: tableHeight,
                    page: false,
                    defaultToolbar: false,
                    parseData: function (res) {
                        if (res.status !== 200) {
                            layer.msg(res.msg || '查询失败', { icon: 7, time: 2000 });
                            return { code: 1, msg: res.msg || '查询失败', count: 0, data: [] };
                        }
                        return {
                            code: 0,
                            msg: '',
                            count: res.data.recordsTotal || 0,
                            data: res.data.records || []
                        };
                    },
                    cols: [[
                        { field: 'unit_id', title: '单位ID', width: 150, align: 'center' },
                        { field: 'unit_name', title: '单位名称', minWidth: 410 },
                        { title: '操作', width: 90, align: 'center', toolbar: '#addReportedUnitBar' }
                    ]]
                });
            }

            function addReportedUnit(row) {
                var initialLimit = $.trim($('#addReportedUnitInitialLimit').val());
                if (!/^\d+$/.test(initialLimit)) {
                    layer.msg('初始数量请填写非负整数', { icon: 7, time: 1500 });
                    return;
                }
                $.ajax({
                    url: huayi_projectscore_url + '/project/addReportedQuaUnit',
                    type: 'GET',
                    data: {
                        addUnitId: row.unit_id,
                        year: $('#holdYear').val(),
                        cmeStandardKindId: standardkindId,
                        unitId: userid,
                        initialLimit: initialLimit
                    },
                    success: function (res) {
                        if (res.status == 200) {
                            layer.msg('添加成功', { icon: 1, time: 1500 });
                            loadAddReportedUnitTable();
                            configTable();
                        } else {
                            layer.msg(res.msg || '添加失败', { icon: 7, time: 2500 });
                        }
                    },
                    error: function () {
                        layer.msg('网络异常，请稍后再试', { icon: 7, time: 1500 });
                    }
                });
            }

            


            $(".tab_others").on("click", function() {
                var index = $(this).index();
                $(this).addClass("tab_this").siblings().removeClass("tab_this");

            });


            function ddlList() {
                //加载年度 目前只加载最大申报年度的上一年
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url +"projectDicRegionLevel/getHoldYear",
                    data: {cmeStandardKind:localStorage.getItem("standardkind-id"),unitId:localStorage.getItem("unit-id")},
                    dataType: 'json',
                    async: false,
                    success: function (data) {
                        for(var year of data.data.entries()){
                            $('#holdYear').append(new Option(year[1],year[1]));//往下拉菜单里添加元素
                        }
                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function (data) {
                        layer.msg("响应失败1");
                    }
                });

                //加载省级与地市
                // $.ajax({
                //     type: "get",
                //     url: huayi_personorg_url + "comunit/getUnitByUnitUserType",
                //     data: {cmeStandardKindId:localStorage.getItem("standardkind-id")},
                //     dataType: 'json',
                //     async: false,
                //     success: function (data) {
                //         for(var unit of data.data.entries()){
                //             $('#comUnit').append(new Option(unit[1]["unitName"],unit[1]["unitId"]));//往下拉菜单里添加元素
                //         }
                //         form.render('select'); //刷新select选择框渲染
                //     },
                //     error: function (data) {
                //         layer.msg("响应失败2");
                //     }
                // });
            }

            //监听指定开关
        form.on('switch(switchTest)', function (data) {
            debugger
            var status = this.checked ? "1" : "0"; //锁定状态赋值为1，未锁定赋值为0，根据数据库中的值
            var unitid = data.elem.attributes['unitid'].nodeValue;
            var index  = data.othis.parents('tr').attr("data-index");
            var rowdata = tableData[index];
            rowdata.status = status;
            rowdata.cmeStandardKindId = standardkindId;
            rowdata.topUnitId =userid;
            
                $.ajax({
                    url: huayi_projectscore_url + '/project/saveReportedQuaNew',
                    type: 'GET',
                    data: {
                        type : JSON.stringify(rowdata)
                    },
                    success: function (res) {
                        if (res.status == 200) {
                            layer.msg('操作成功', { icon: 1, time: 1500 });
                        }else if (res.status == 500) {
                            layer.msg(res.msg, { icon: 7, time: 3000 });
                        } else {
                            layer.msg('操作失败', { icon: 2, time: 1500 });
                        }
                        let loadOption = {
                            where  : {
                                unitname : $('#unitName').val()
                            },
                            height : 'full-160'
                        };
                        table.reload('project', loadOption);
                        configTable();
                    },
                    error: function (xhr, status) {
                        layer.msg('网络异常，请稍后再试', { icon: 7, time: 1500 });
                    }
                });
                

            });
                //鼠标悬停提示特效
            $("#hint").hover(function() {
                openMsg();
            }, function() {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {
                    tips: [1, '#ff6700'],
                    time: 30000
                });
            }
             
            //点击查询按钮，重载表格
            $('#searchBtn').on('click', function() {
                buildTableHeader();
                configTable();
            });
            $('#addReportedUnitBtn').on('click', function() {
                openAddReportedUnitDialog();
            });
            $('#addReportedUnitSearchBtn').on('click', function() {
                loadAddReportedUnitTable();
            });
            $('#addReportedUnitKeyword').on('keydown', function(e) {
                if (e.keyCode === 13) {
                    loadAddReportedUnitTable();
                }
            });
            table.on('tool(addReportedUnitTable)', function (obj) {
                if (obj.event === 'add') {
                    addReportedUnit(obj.data);
                }
            });
            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }
             

        });
    </script>

</body>

</html>
