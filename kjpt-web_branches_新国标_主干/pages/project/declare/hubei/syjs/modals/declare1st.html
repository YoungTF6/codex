        <!-- 技术推荐单位 -->
        <div class="layui-form-item">
            <div class="layui-col-md6">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>单位名称:</label>
                <div class="layui-input-block">
                    <input type="text" name="unitName" lay-verify="required|unitName" autocomplete="off"

                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>单位所在地:</label>
                <div class="layui-input-block">
                    <input type="text" name="unitLocation" lay-verify="required|unitLocation" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>通讯地址:</label>
                <div class="layui-input-block">
                    <input type="text" name="unitAdress" lay-verify="required|unitAdress" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>联系电话(科研部门):</label>
                <div class="layui-input-block">
                    <input type="text" name="unitPhone" lay-verify="required|unitPhone" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>邮编:</label>
                <div class="layui-input-block">
                    <input type="text" name="postcode" lay-verify="required|postcode" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label">传真号码:</label>
                <div class="layui-input-block">
                    <input type="text" name="faxNumber" lay-verify="" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span
                        style="color:red">*&nbsp;</span>单位类别:</label>
                        <!-- 医院 科研院所 高等院校  事业单位  其他 -->

                    <select name="unitKind" lay-filter="unitKind" lay-verify="required" lay-search="">
                        <option value="医院">医院</option>
                        <option value="科研院所">科研院所</option>
                        <option value="高等院校">高等院校</option>
                        <option value="事业单位">事业单位</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>

        <fieldset class="layui-elem-field layui-field-title" style="margin-top: 30px;">
            <legend>技术推广负责人</legend>
        </fieldset>

        <div class="layui-form-item">
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>姓名:</label>
                <div class="layui-input-block">
                    <input type="text" name="principalName" lay-verify="required|principalName" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span
                        style="color:red">*&nbsp;</span>性别:</label>
                <div class="layui-input-block">
                    <select name="gender" lay-filter="genderSel" lay-verify="required" lay-search="">
                        <option value="F">女</option>
                        <option value="M">男</option>
                    </select>
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>证件号码:</label>
                <div class="layui-input-block">
                    <input type="text" id="certId" name="certId" lay-verify="required|certId" autocomplete="off"
                           class="layui-input" placeholder="请输入">
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>出生日期:</label>
                <div class="layui-input-block">
                    <input type="text" name="birthday" id="birthday" autocomplete="off"
                        class="layui-input js-write-time" readonly>
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>业务专业及研究方向:</label>

                    <input type="text" name="specDirection" lay-verify="required|specDirection" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span
                        style="color:red">*&nbsp;</span>职称:</label>
                        <!-- 正高级  副高级  中级及其他 -->
                <div class="layui-input-block">
                    <select name="title" lay-filter="titleSel" lay-verify="required" lay-search="">
                        <option value="正高级">正高级</option>
                        <option value="副高级">副高级</option>
                        <option value="中级及其他">中级及其他</option>
                    </select>
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>联系电话（手机）:</label>
                <div class="layui-input-block">
                    <input type="text" name="principalPhone" lay-verify="required|principalPhone" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span style="color:red">*&nbsp;</span>E-mail:</label>
                <div class="layui-input-block">
                    <input type="text" name="principalEmail" lay-verify="required|principalEmail" autocomplete="off"
                           class="layui-input" placeholder="请输入" >
                </div>
            </div>
        </div>

        <div class="layui-form-item">
            <div class="layui-col-md3">

                <div class="layui-input-block">

            </div>
            <div class="layui-col-md3">
                <label class="layui-form-label"><span
