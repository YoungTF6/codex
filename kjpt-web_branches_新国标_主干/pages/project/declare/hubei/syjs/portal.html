<div style="display: none" id="someTpl">

    <!-- course.title_id cell -->
    <div type="text/html" id="courseTitleIdCell">
        <div class="titleTreeSelector" id="titleTreeSelector{{d.LAY_TABLE_INDEX}}" idx="{{d.LAY_TABLE_INDEX}}"
             lay-filter="courseTitleId" data-value="{{d.titleId}}"></div>
    </div>
    <div type="text/html" id="courseSpecIdCell">
        <div class="specTreeSelector" id="specTreeSelector{{d.LAY_TABLE_INDEX}}" idx="{{d.LAY_TABLE_INDEX}}"
             lay-filter="courseSpecId" data-value="{{d.specId}}"></div>
    </div>
    <div type="text/html" id="courseBusinessIdCell" >
        <!-- <div class="layui-input-block"> -->
        <!-- <div class="businessSelector" id="businessSelector{{d.LAY_TABLE_INDEX}}" idx="{{d.LAY_TABLE_INDEX}}"
            lay-filter="courseBusinessId" data-value="{{d.businessId}}"></div> -->
        <select name="principalBusiness"  lay-filter="principalBusiness" lay-verify="required"
            id="principalBusiness{{d.LAY_TABLE_INDEX}}" idx="{{d.LAY_TABLE_INDEX}}" data-value="{{d.principalBusiness}}">
            <option >请选择</option>
        </select>
    </div>
    <!-- course.teaching_method cell -->
    <div type="text/html" id="courseTeachingMethodCell">
        <select name="teachingMethod" id="teachingMethod{{d.LAY_TABLE_INDEX}}" idx="{{d.LAY_TABLE_INDEX}}"

</script>

</script>
