<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>审批意见维护</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
    <script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>


</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">

        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="cmeCheckReason" lay-filter="cmeCheckReason" style="margin: 0px 0px;">
            </table>
        </div>


        <!--        添加弹窗-->

        <div id="add-cmeCheckReason" style=" display:none;text-align: center">

            <form class="layui-form" style="padding: 30px;" id="form-CmeCheckReason" lay-filter="add-filter">
                <div class="layui-form-item">
                    <div class="layui-inline" style="display: none">
                        <label class="layui-form-label">主键</label>
                        <div class="layui-input-block">
                            <input type="text" name="reasonId" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">审核意见</label>
                        <div class="layui-input-block" style="width: 280px;">
                            <input type="text" name="reason" placeholder="说明" autocomplete="off" lay-verify="required"
                                   class="layui-input">
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div style="text-align: center;">
                        <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>


    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <!-- <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="edit">编辑</a>
     <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a> -->
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-normal-row" lay-event="del">删除</a>
</script>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-sm" lay-event="add"><i class="layui-icon">&#xe654;</i>新增</a>
</script>
<script>
    // 全局配置及引入相关的模块
    layui.use(['table', 'form'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
// 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#cmeCheckReason',
                url: huayi_sjwh_url + 'cmeCheckReason',
                title: '审核意见列表',
                defaultToolbar: [],
                where: {
                    unitId: localStorage.getItem("unit-id") == '{}' ? '' : localStorage.getItem("unit-id")
                },
                cols: [[
                    {field: 'reasonId', title: '主键', sort: true,hide: true},
                    {field: 'unitId', title: '单位', sort: true,width:180},
                    {field: 'reason', title: '审核意见', sort: true},
                    {field: 'addTime', title: '添加时间', sort: true},
                    {align: 'center', width: 250, toolbar: '#rowBar', title: '操作', fixed: 'right'}
                ]],
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "cmeCheckReason",
                height: 'full-155',
                page: false,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "data": res.data, //解析数据长度
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });
        };

        // 初始化表格
        loaderTable();
        // 监听头部新增按钮
        table.on('toolbar(cmeCheckReason)', function (obj) {
            var datas = obj.data;
            document.getElementById("form-CmeCheckReason").reset();
            if (obj.event === 'add') {
                layer.open({
                    type: 1,
                    title: '新增',
                    content: $('#add-cmeCheckReason'),
                    skin: '',
                    area: ['500px', '300px'],
                })
            }
        });

        // 监听行内按钮
        table.on('tool(cmeCheckReason)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'edit') {
                form.val('add-filter', datas);
                layer.open({
                    type: 1,
                    title: '修改',
                    content: $('#add-cmeCheckReason'),
                    skin: '',
                    area: ['500px', '300px'],
                })
            } else if (obj.event === 'del') {
                layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                    $.ajax({
                        type: 'get',
                        url: huayi_sjwh_url + 'cmeCheckReason/deleted',
                        data: {
                            reasonId: datas.reasonId
                        },
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("删除成功");
                                table.reload('cmeCheckReason');
                            }
                        }
                    });
                    // layer.msg("删除成功");
                })
            }
        });

// form表单相关操作
        // 新增/修改表单提交
        form.on('submit(submit)', function (data) {
            debugger
            var dataa=data.field;
            dataa.unitId=localStorage.getItem("unit-id");
            var datas = JSON.stringify(dataa);

            $.ajax({
                type: 'post',
                url: huayi_sjwh_url + 'cmeCheckReason/saveOrUpdate',
                data: datas,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if (res.status === 200) {
                       	layer.closeAll();
                                parent.layer.msg("操作成功",{time: 2000});
                                table.reload('cmeCheckReason');
                            }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            return false;
        })

    });

</script>
</body>
</html>
