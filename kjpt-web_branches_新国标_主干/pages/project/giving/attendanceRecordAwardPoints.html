<script>

    var pro_id=getUrlParam("projectId");
    var down_id=getUrlParam("downId");
    var startDate=getUrlParam("startDate")
    var endDate=getUrlParam("endDate")
    var scoreLevel = getUrlParam("scoreLevel")
    var projNo = getUrlParam("projNo")
    var projName = getUrlParam("projName");
    var cmeStandardKindId = localStorage.getItem("standardkind-id");
    const HENAN = "a6280900-a9c2-11ec-84d6-fa163e9b64fb";
    const HUBEI = "73ba18db-33fd-4746-ab41-9beb009f69a1";
    var btnFilterScorePerson = document.getElementById("btnFilterScorePerson");
    if (btnFilterScorePerson) btnFilterScorePerson.textContent = (cmeStandardKindId === StandardKind.GUANG_DONG) ? "筛选预授分人员" : "筛选授分人员";
    // 全局配置及引入相关的模块
    layui.config({
            base: '../../../js/layui/ext/'
        }).extend({
            myTable: 'table',
            excel: 'excel'
        }).use(['myTable', 'form', 'laydate', 'excel'], function () {
        var table = layui.myTable;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate=layui.laydate;
        var openChannelId= false;
        var excel=layui.excel;
        var checkedPersonIds = [], isReload = false, checkedTableInfo = new Map();
        var allTeachData = null;
        var _isGuangxi = cmeStandardKindId == StandardKind.GUANG_XI;

        if(_isGuangxi) {
            $(".guangxi-show").show();
        }
        table.render({
            elem: '#teachList',
            url: huayi_projectscore_url + 'cmeCmeProjTeach/getTeachListForGiving',
            title: '课程列表',
            defaultToolbar: [],
            where: {
                downId: down_id
            },
            cols: [[
                // {align: 'center',  toolbar: '#rowBar1', title: '主讲人授分'},
                {align: 'center', toolbar: '#rowBar4', title: '考勤明细'},
                {align: 'center',  toolbar: '#rowBar', title: '考勤分析'},
                {align: 'center', toolbar: '#rowBar3',title: '考勤有效人员'},
                {field: 'projTeachId', align: 'center',title: '课程主键',hide: true},
                {field: 'teachSubject',align: 'center', title: '课程题目', },
                {field: 'teachName', align: 'center',title: '授课教师', },
                {field: 'score', align: 'center',title: '学分',hide: true },
                {field: 'period', align: 'center',title: '学时', },
                {field: 'isAnalyze',align: 'center', title: '考勤是否已分析',hide: true},
                {field: 'teachAttendance',align: 'center', title: '教师是否已授分', hide: true},
            ]],
            cellMinWidth: 100,
            id: "teachListTable",
            page: false,
            limit: 10,
            limits: [10, 50, 100, 150, 200],
            parseData: function (res) {
                return {
                    "code": res.status === 200 ? 0 : res.status, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "data": res.data, //解析数据列表
                }

            },
            request: {
                pageName: 'pageNum', //页码的参数名称，默认：page
                limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
        })

        // 监听行内按钮
        table.on('tool(teachListFilter)',function (obj) {
            if (obj.event === 'pendingPointsForStudent' || obj.event === 'analyzedForStudent'){
                layer.open({
                    closeBtn  : false,
                    title: false,
                    type: 2,
                    content: 'attendanceAnalysis.html?teachId='+obj.data.projTeachId,
                    area: ['100%', '100%'],
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }else if (obj.event === 'pendingPointsForTeach' || obj.event === 'awarded') {
                layer.open({
                    type: 2,
                    content: 'GivingForTeachers.html?teachId='+obj.data.projTeachId+'&downId='+down_id+'&projNo='+projNo+'&projName='+projName,
                    area: ['100%', '100%'],
                    title: '给讲师授分页面',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                });
            }else if (obj.event === 'effectivAttendance'){
                layer.open({
                    type: 2,
                    content: 'teachIdAttendanceResult.html?teachId='+obj.data.projTeachId+'&downId='+down_id,
                    area: ['100%', '100%'],
                    title: '考勤有效人员',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })

            }else if (obj.event === 'attendanceList'){
                layer.open({
                    type: 2,
                    content: 'attendanceDetails.html?teachId='+obj.data.projTeachId+'&downId='+down_id,
                    area: ['100%', '100%'],
                    title: '考勤人员列表',
                    cancel: function (index ,layero) {
                        table.reload("teachListTable");
                    }
                })
            }

        })

        // 按钮{已完成全部课程考勤分析，进入下一步}
        window.creditAnalysisFunction =function () {
            $("#creditAnalysisDiv").show();
            searchToScorePersons();
        }
         // 返回刀考勤周期页面
        window.closeMyMSG = function(){
            // window.parent.layer.closeAll();
            // let tempUrl = 'givingForProjPosDownload.html?pro_id='+pro_id + '&scoreLevel=' + scoreLevel;
            // var index = window.parent.layer.open({
            //     type: 2,
            //     title: '授分',
            //     content: tempUrl,
            //     skin: '',
            //     area: ['100%', '100%'],
            //     maxmin    : true,
            // });
              var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
              parent.layer.close(index); //再执行关闭   
        }
        // 授分有效人员列表
        window.searchToScorePersons=function() {

            //按照考勤次数授分
            if($("#creditStrategy_id").val() == "6") {
                if($("#attendTimes_id").val() == "") {
                    layer.msg("请输入考勤次数底值");
                    initTeachTable([]);
                    return false;
                } else {
                    if(checkAttendTimes() == false) {
                        initTeachTable([]);
                        return false;
                    } 
                }
            }

            var data1 = form.val("searchForQualifiedPersonnel");
            $.ajax({
                type 		: 'GET',
                contentType : 'application/json',
                url 		: huayi_projectscore_url + 'cmeProjAttendanceResult/getQualifiedPersonnel',
                data 		: {
                    downId: down_id,
                    creditStrategy: $('#creditStrategy_id').val(),
                    evaluationResults: $('#evaluationResults_id').val(),
                    passResult: $('#passResult_id').val(),
                    personName: $('#personName_id').val(),
                    unitId: localStorage.getItem("unit-id"),
                    unitName: $('#unitName_id').val(),
                    deptName: $('#deptName_id').val(),
                    titleName: $('#titleName_id').val(),
                    attendanceAddress: $('#attendanceAddress_id').val(),
                    personSpecName: $('#personSpecName_id').val(),
                    scoreLevelId: getUrlParam("scoreLevel"),
                    attendTimes: $("#attendTimes_id").val()
                },
                success 	: (res) => {
                    if (res.status == 200) {
                        allTeachData = res.data;
                        allTeachData.sort(
                            function compareFunction(param1, param2) {
                                let sortIndex = param1.personName.localeCompare(param2.personName, 'zh-Hans-CN', {sensitivity: 'accent'});
                                return sortIndex;
                            }
                        );
                        initTeachTable(res.data);
                    }else {
                        layer.msg(res.msg)
                    }
                },
                error       :  (XMLHttpRequest, textStatus, errorThrown) => {
                    layer.msg("请求失败")
                }
            })
            
        }

        let initTeachTable = function(data) {
            table.render({
                elem: '#creditAnalysis',
                title: '符合授分人员',
                defaultToolbar: [],
                toolbar: '#rowBar6',
                data: data,
                cols: [[
                    {align: 'center', type: 'checkbox', title: '选择'},
                    {field: 'comPersonId',align: 'center', width: 250, title: '主键',hide: true},
                    {field: 'personNo',align: 'center', width: 250, title: '人员编号'},
                    {field: 'personName',align: 'center', width: 200, title: '姓名', sort: true},
                    {field: 'unitName', align: 'center', title: '所在单位', sort: true},
                    {field: 'deptName', align: 'center', title: '科室', sort: true},
                    {field: 'titleName', align: 'center', title: '职称', sort: true},
                    {field: 'passResult', align: 'center', title: '考试结果', templet: function(data){
                        if(data.passResult == '1'){
                            return '通过';
                        }else{
                            return '未通过';
                        }
                        }
                    },
                    {field: 'evaluationResults', align: 'center', title: '评价结果', templet: function(data){
                        if(data.evaluationResults == '0'){
                            return '完成';
                        }else{
                            return '未完成';
                        }
                    }},
                    {field: 'playDurations', align: 'center', title: '观看时长',sort:true,hide: !((localStorage.getItem("standardkind-id") == "6427ddba-c02f-4229-bd73-49fc1c5d21f6") && openChannelId)},
                    {field: 'posTime', align: 'center', width: 200, title: '首次考勤时间', sort: true},
                    {field: 'attendTimes', align: 'center', title: '考勤次数', sort: true,hide:$("#creditStrategy_id").val() != "6"},
                    {align: 'center', title: '考勤信息', templet: '#rowBar5'},
                ]],
                cellMinWidth: 100,
                id: "comPersonIdListTable",
                page: false,
                limit: 10000,
                autoSort: false,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                done : function(res, curr, count){
                    $("#peopleScoreTitle").html(`待授分人数: (${res.data.length}人)`);
                    if( checkedPersonIds != undefined ){
                        //遍历集合
                        layui.each(res.data, function(index,item){
                            //将获取的选中行数据进行遍历
                            if( checkedPersonIds.indexOf('' + item.comPersonId + '') > -1 ){ 
                                //点击去属性 lay-id='表格id'； index：要回显的行数下标，从0开始
                                $("div[lay-id='comPersonIdListTable'] td .layui-form-checkbox").eq(index).click();
                            } 
                        });
                    }
                }
            })
        }

        $("#attendTimes_id").blur(function() {
            checkAttendTimes();
        });

        function checkAttendTimes() {
            var intvalue = /^[1-9]\d*$/g;
            let result = intvalue.test($("#attendTimes_id").val().toString());
            if(result == false ) {
                layer.alert("考勤次数底值只能是正整数",{icon:2});
                return false;
            }
        }

        table.on('sort(creditAnalysisFilter)', function(obj){
            if(allTeachData==null || allTeachData.length==0) return;
            let type = obj.type;
            allTeachData.sort(
                function compareFunction(param1, param2) {
                    let sortIndex = param1[obj.field].toString().localeCompare(param2[obj.field.toString()], 'zh-Hans-CN', {sensitivity: 'accent'});
                    if(type=="asc") return 0-sortIndex;
                    return sortIndex;
                }
            );
            table.reload('comPersonIdListTable', {
                data:allTeachData,
                initSort: obj,
            });
        })


        //以复选框事件为例
        table.on('checkbox(creditAnalysisFilter)', function(obj){
            
            debugger
            // 全选
            if(obj.type == 'all'){
                var checkStatus = table.checkStatus('comPersonIdListTable');
                if(obj.checked == true){
                    for (var i = 0; i < checkStatus.data.length; i++) {
                        let indx =  checkedPersonIds.indexOf(checkStatus.data[i].comPersonId);
                        // let indxObj =  checkedTableInfo.indexOf(checkStatus.data[i]);
                        let indxObj =  checkedTableInfo.has(checkStatus.data[i].comPersonId);
                        if(indx < 0 ){ 
                            // 插入选中数组
                            checkedPersonIds.push(checkStatus.data[i].comPersonId);
                            // checkedTableInfo.push(checkStatus.data[i]);
                            checkedTableInfo.set(checkStatus.data[i].comPersonId, checkStatus.data[i]);
                        }
                    }
                }else if(obj.checked == false){
                    var datas = table.cache["comPersonIdListTable"]
                    for (var i = 0; i < datas.length; i++) {
                        let indx =  checkedPersonIds.indexOf(datas[i].comPersonId);
                        // let indxObj =  checkedTableInfo.indexOf(datas[i]);
                        let indxObj =  checkedTableInfo.has(checkStatus.data[i].comPersonId);
                        if(indx >= 0 && indxObj){

                            checkedTableInfo.delete(checkStatus.data[i].comPersonId);
                        }
                    }
                }
            }else{
                let indx =  checkedPersonIds.indexOf(obj.data.comPersonId);
                // let indxObj =  checkedTableInfo.indexOf(obj.data);
                let indxObj =  checkedTableInfo.has(obj.data.comPersonId);
                if(obj.checked){

                        checkedPersonIds.push(obj.data.comPersonId);
                        // checkedTableInfo.push(obj.data);
                        checkedTableInfo.set(obj.data.comPersonId, obj.data);

                        // checkedTableInfo.splice(indxObj, 1);
                        checkedTableInfo.delete(obj.data.comPersonId);
                    }
                }

        window.exportByDown = function(downId, projectType, personIds){
            $.ajax({
                type 		: 'POST',
                contentType : 'application/json',
                url 		: huayi_projectscore_url + 'attendance/ExportExeclForAttendanceByDownVO',
                data 		: JSON.stringify({"downId": downId, "personIds": personIds, "projectType": projectType}),
                success 	: (data, textStatus, xhr) => {
                    if (data.status == 200) {
                        
                        // 导出execl
                        var datas= data.data
                        var aa= ['name','personNo','unit','dept','title','posTime','isPassExam','isEvaluation']
                        var bb= { name: '人员姓名',personNo: '人员编号',unit: '单位',dept: '科室', title: '职称', posTime: '考勤时间', appAddress: '考勤地址', isPassExam: '考试结果', isEvaluation: '评价结果'}
                        if(openChannelId) {
                            aa= ['name','personNo','unit','dept','title','posTime','playDurations','isPassExam','isEvaluation']
                            bb= { name: '人员姓名', personNo: '人员编号', unit: '单位',dept: '科室', title: '职称', posTime: '考勤时间', appAddress: '考勤地址', playDurations: '观看时长', isPassExam: '考试结果', isEvaluation: '评价结果'}
                        }
                        datas=excel.filterExportData(datas,aa);
                        datas.unshift(bb);
                        
                        excel.exportExcel(datas,'考勤详情.xlsx','xlsx');
                    }else {
                        layer.msg(data.msg)
                    }
                },
                error       :  (XMLHttpRequest, textStatus, errorThrown) => {
                    layer.msg("请求失败")
                }
            })
        }
