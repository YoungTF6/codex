<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title> 考勤分析</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>

    <style>
        #mystyle div div .layui-table-body.layui-table-main table tbody tr td[data-field="startDate"] {
            padding: 5px 2px;
        }

        #mystyle div div .layui-table-body.layui-table-main table tbody tr td[data-field="endDate"] {
            padding: 5px 2px;
        }

        #mystyle div div .layui-table-body.layui-table-main table tbody tr td[data-field="startDate"] div {
            border: 1px rgba(0, 0, 0, 0.301) solid;
            display: block;
            background-color: #fff;
        }

        #mystyle div div .layui-table-body.layui-table-main table tbody tr td[data-field="endDate"] div {
            border: 1px rgba(0, 0, 0, 0.301) solid;
            display: block;
            background-color: #fff;
        }
    </style>

</head>

<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <!--        表格区域-->
            <div class="layui-card-body layui_body_box" id="mystyle">
                <table class="layui-table" id="attendanceTimePeriod" lay-filter="attendanceTimePeriod_filter" style="margin: 0px 0px;">
                </table>
            </div>
            <div style="text-align: center;padding-bottom:15px;">
                <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="cycleManagement(1)">添加周期</button>
                <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" onclick="cycleManagement(0)">删除周期</button>
                <button type="button" class="layui-btn layui-btn-sm layui-btn-warm" onclick="getAllList()">考勤分析</button>
                <button type="button" class="layui-btn layui-btn-sm " onclick="closeMyMSG()">返回</button>
            </div>
        </div>

        <div class="layui-card" style="display: none" id="fenxi">
            <!--    搜索栏-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                <!-- <blockquote class="layui-form layui-form-item layui-elem-quote one-btn"> -->
                <div class="layui-inline">
                    <label class="layui-form-label">姓名</label>
                    <div class="layui-input-block" style="width: 160px;">
                        <input type="text" name="personName" id="personName_id" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">所在单位</label>
                    <div class="layui-input-block" style="width: 160px;">
                        <input type="text" name="unitName" id="unitName_id" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">科室</label>
                    <div class="layui-input-block" style="width: 160px;">
                        <input type="text" name="deptName" id="deptName_id" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">职称</label>
                    <div class="layui-input-block" style="width: 160px;">
                        <input type="text" name="titleName" id="titleName_id" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline" style="display: none;">
                    <label class="layui-form-label">考勤地址</label>
                    <div class="layui-input-block" style="width: 160px;">
                        <input type="text" name="attendanceAddress" id="attendanceAddress_id" autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="effectiveStaffList()" lay-filter="LAY-app-order-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </a>
                </div>
                <!-- </blockquote> -->
            </div>
            <!--    表格栏-->
            <div class="layui-card" style="text-align: center">
                <div class="layui-card-body layui_body_box">
                    <table class="layui-table" id="effectiveStaff" lay-filter="effectiveStaff_filter" style="margin: 0px 0px;">
                    </table>
                </div>
                <div style="text-align: center;padding-bottom:15px;">
                    <button type="button" class="layui-btn layui-btn-sm " onclick="generateEffectivePersonnel()">确认并生成考勤有效人员</button>
                    <button type="button" class="layui-btn layui-btn-sm " onclick="closeMyMSG()">返回</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="effectivAttendance">考勤详情</a>
</script>

    <script type="text/html" id="count">
    <span class="layui-btn layui-btn-radius layui-btn-primary " style="margin-right: 90%;" id="countForPerson"></span>
</script>
    <script>

        var teachId = getUrlParam("teachId");
        // var teachId='fa68114b-d81d-4af8-a381-f5507a897f0d';
        var downId = getUrlParam("downId");
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'laydate'], function () {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer;
            var laydate = layui.laydate;


            var startDate;
            var endDate;

            // 默认周期列表
            var datas = [
                { 'startDate': startDate, 'endDate': endDate },
                { 'startDate': startDate, 'endDate': endDate },
                { 'startDate': startDate, 'endDate': endDate },
                { 'startDate': startDate, 'endDate': endDate },
            ]
            // 初始化周期列表表单
            window.renderTable = function a() {
                table.render({
                    elem: '#attendanceTimePeriod',
                    title: '考勤时间列表',
                    defaultToolbar: [],
                    cols: [[
                        { align: 'center', toolbar: '#rowBar', type: 'checkbox', title: '选择' },
                        {
                            align: 'center', title: '考勤周期', templet: function () {
                                return '考勤周期'
                            }
                        },
                        { field: 'startDate', align: 'center', title: '开始时间', sort: true, event: 'setDate', edit: 'text', },
                        { field: 'endDate', align: 'center', title: '结束时间', sort: true, event: 'setDate', edit: 'text', },
                    ]],
                    cellMinWidth: 100,
                    id: "teachListTable",
                    page: false,
                    limit: 999,
                    data: datas,
                    height: 200,
                })
            }
            // 单元格编辑按钮
            table.on('tool(attendanceTimePeriod_filter)', function (obj) {
                var data = obj.data;
                if (obj.event === 'setDate') {
                    var field = $(this).data('field');
                    laydate.render({
                        elem: this.firstChild,
                        show: true,
                        type: 'datetime',
                        format: 'yyyy-MM-dd HH:mm:ss',
                        done: function (value, date) {
                            data[field] = value;
                            obj.update(data);
                        }
                    })
                }
            })

            // 获取指定课程最早和最晚的考勤时间
            window.getTeachAttendanceTime = function () {
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + 'attendance/getTeachAttendanceTime',
                    contentType: 'application/json;charset=UTF-8',
                    data: { 'teachId': teachId, "projectType": "1" },
                    dataType: 'json',
                    success: function (res) {
                        if (res.data != null) {
                            startDate = res.data.startDate;
                            endDate = res.data.endDate;
                            for (var i = 0; i < datas.length; i++) {
                                datas[i].startDate = startDate;
                                datas[i].endDate = endDate;
                            }
                        }
                        renderTable();
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
            }

            window.getBatchAttendanceTime = function () {
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + 'cmeProjPosDownload/cmeProjAttendBatchList/' + downId,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.success == true) {
                            datas = [];
                            for (var i = 0; i < res.data.length; i++) {
                                let startDate = res.data[i].startDate;
                                let endDate = res.data[i].endDate;
                                datas.push({ 'startDate': startDate, 'endDate': endDate });
                            }
                            renderTable();
                        } else {
                            layer.msg("程序出现问题", { icon: 2 });
                        }
                    },
                    error: function () {
                        layer.msg("发送请求失败", { icon: 2 });
                    }
                })
            }

            // 添加周期，缩减周期按钮
            window.cycleManagement = function cycleManagement(type) {
                // 1：添加周期 0：缩减周期
                if (type === 1) {
                    datas.push({ 'startDate': '', 'endDate': '' });
                    renderTable();
                } else {
                    if (datas.length < 2) {
                        layer.msg("最少保留一条数据")
                        return;
                    } else {
                        datas.pop();
                    }
                    renderTable();
                }
            }
            // 分析考勤按钮
            window.getAllList = function getAllList() {
                $('#fenxi').show();
                effectiveStaffList();
            }

            // 有效人员名单列表
            window.effectiveStaffList = function effectiveStaff() {
                var attendanceCycle = table.checkStatus('teachListTable').data;
                var attendanceCycleArray = {};
                // 判断选中的周期有没有为空的。
                if (attendanceCycle.length > 0) {
                    for (var i = 0; i < attendanceCycle.length; i++) {
                        if (attendanceCycle[i].startDate === '' || attendanceCycle[i].startDate === null || attendanceCycle[i].endDate === null || attendanceCycle[i].endDate === '') {
                            layer.msg("所选周期不能为空");
                            return;
                        }
                        attendanceCycleArray[i] = attendanceCycle[i].startDate + ',' + attendanceCycle[i].endDate
                    }
                }
                table.render({
                    method: 'post',
                    elem: '#effectiveStaff',
                    title: '考勤时间列表',
                    url: huayi_projectscore_url + 'cmeProjAttendance/attendanceAnalysis',
                    where: {
                        attendanceCycle: attendanceCycleArray,
                        personName: $('#personName_id').val(),
                        unitName: $('#unitName_id').val(),
                        deptName: $('#deptName_id').val(),
                        titleName: $('#titleName_id').val(),
                        attendanceAddress: $('#attendanceAddress_id').val(),
                        teachId: teachId,
                        downId: downId,
                    },
                    defaultToolbar: [],
                    toolbar: '#count',
                    cols: [[
                        { align: 'center', type: 'checkbox', title: '选择' },
                        { field: 'comPersonId', align: 'center', width: 250, title: '主键', hide: true },
                        { field: 'personNo', align: 'center', width: 250, title: '卡号', hide: true },
                        { field: 'personName', align: 'center', width: 120, title: '姓名' },
                        { field: 'unitName', align: 'center', title: '所在单位', sort: true },
                        { field: 'deptName', align: 'center', title: '科室', sort: true },
                        { field: 'titleName', align: 'center', title: '职称', sort: true },
                        { field: 'countForAttendance', align: 'center', title: '考勤次数', sort: true },
                        { align: 'center', title: '考勤信息', templet: '#rowBar' },
                    ]],
                    cellMinWidth: 100,
                    id: "effectiveStaffTable",
                    height: 360,
                    page: false,
                    parseData: function (res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.msg, //解析提示文本
                            "data": res.data, //解析数据列表
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    },
                    done: function (res, curr, count) {
                        document.getElementById("countForPerson").innerHTML = "共计:" + res.data.length + "人";

                    }
                })
            }

            // 生成有效人员表
            window.generateEffectivePersonnel = function () {
                var tableList = table.checkStatus('effectiveStaffTable')
                var personNos = [];
                var comPersonIds = [];
                if (tableList.data.length > 0) {
                    for (var i = 0; i < tableList.data.length; i++) {
                        personNos.push(tableList.data[i].personNo);
                        comPersonIds.push(tableList.data[i].comPersonId);
                    }
                    let ajaxObj = {};
                    if (window['value_qrcode_attend_mode'] == '2') {
                        ajaxObj.url =  huayi_projectscore_url + 'cmeProjAttendanceResult/saveForProjAtt';
                        ajaxObj.data = {
                            downId: downId,
                            comPersonIds: comPersonIds
                        };
                    } else {
                        ajaxObj.url =  huayi_projectscore_url + 'cmeProjAttendanceResult/save';
                        ajaxObj.data = {
                            projTeachId: teachId,
                            personNos: personNos,
                            comPersonIds: comPersonIds,
                            downId: downId
                        };
                    }

                    $.ajax({
                        type: 'post',
                        url: ajaxObj.url,
                        data: JSON.stringify(ajaxObj.data),
                        contentType: "application/json",
                        success: function (res) {
                            window.parent.layer.closeAll();
                            window.parent.layer.msg("生成有效人员成功")
                            // 返回授分页面
                        },
                        error: function (res) {
                            layer.msg("请求失败")
                        }
                    })
                } else {
                    layer.msg("所选数据为空");
                }

            }

            window.closeMyMSG = function () {
                window.parent.layer.closeAll();
            }
            // （行内按钮）查看考勤详细信息
            table.on('tool(effectiveStaff_filter)', function (obj) {
                var comPersonId = obj.data.comPersonId;
                if (obj.event === 'effectivAttendance') {
                    layer.open({
                        title: '考勤详细信息',
                        content: 'attendanceInfo.html?comPersonId=' + comPersonId + '&projTeachId=' + teachId + '&downId=' + downId + '&type=1',
                        type: 2,
                        area: ['500px', '300px'],
                    })
                }
                effectiveStaffList();
            })


            window.closeAllForMe = function () {
                layer.closeAll();
            }
            // 初始化内容
            $(function () {
                getConfig('value_qrcode_attend_mode', localStorage.getItem('unit-id'), null);
                // 2: 按照项目考勤   1或者null: 按照课程考勤
                if (window['value_qrcode_attend_mode'] == '2') {
                    getBatchAttendanceTime();

                } else {
                    getTeachAttendanceTime();
                }

                //renderTable();
            })

        })
    </script>

</body>

</html>
