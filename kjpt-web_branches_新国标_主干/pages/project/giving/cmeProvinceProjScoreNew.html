    <script type="text/html" id="rowBar">
        {{# if(d.checkState == 0){ }}
        <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #27b1a2;background-color: transparent;">编辑</a>

    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="add">添加学分</a>
        <a class="layui-btn layui-btn-sm layui-btn-radius" id="tempAdd">批量导入</a>
        <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="downTemp">导入模板下载</a>
        
    </script>
    <script>
        layui.use(['table', 'form', 'element', 'upload', 'laydate'], function () {
            var $ = layui.jquery
                , table = layui.table
                , element = layui.element
                , form = layui.form
                , laydate = layui.laydate
                , layer = layui.layer
                , upload = layui.upload;


            var unitId = localStorage.getItem("unit-id")
                , configDictId = '00a74154-6853-11ec-9896-fa163e376cc4' // 学分级别配置
                ;
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            var projNo = getQueryString("projNo");
            var projName = getQueryString("projName");
            var scoreLevel = getQueryString("scoreLevel");
            var startDate = getQueryString("startDate");
            var endDate = getQueryString("endDate");
            var downId = getQueryString("downId");
            var projId = getQueryString("projectId");
            var score = getQueryString("score");
            var period = getQueryString("period");
            var personLayerIndex = 0;

            // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem: '#cmeProvinceProjScoreList',
                    url: huayi_projectscore_url + 'cmeProvinceProjScore/relationList',
                    toolbar: '#bar',
                    where: {
                        unitId: unitId,
                        downId: downId
                    },
                    cols: [[ //表头
                        //-- 性别  年龄  职称级别      联系电话    工作单位            是否来自基层 单位所在地 
                        //--sex  age  title_level  mobile  person_unit_name  person_from_basic	person_unit_province
                        { field: 'scoreId', title: 'ID', sort: true, hide: 'true' }
                        , { align: 'center', width: 120, toolbar: '#rowBar', title: '操作' }
                        , { field: 'projName', title: '项目名称', width: 180, align: "center" }
                        , { field: 'projNo', title: '项目编号', sort: true, width: 120 }
                        , { field: 'personName', title: '姓名' }
                        , {
                            field: 'certType', title: '证件类型', width: 180, templet: function (data) {
                                let name ="";
                                switch(data.certType) {
                                    case "9fcb08ce-ee86-4e4c-9611-9d430101cea4":
                                        name ="身份证";
                                    break;
                                    case "3444541a-9703-44ed-aae6-9d8b01574916":
                                        name ="港澳台居民居住证";
                                    break;
                                    case "a85da857-fd72-4e9a-8657-afa900a0f569":
                                        name ="台湾居民来往大陆通行证";
                                    break;
                                    case "031d0bdc-8cd0-11ee-9c60-005056a64c01":
                                        name ="港澳居民来往内地通行证";
                                    break;
                                    case "d681a2b3-df10-421a-8279-afa900a0f569":
                                        name ="其他法定有效证件";
                                    break;
                                }
                                return name;
                            }
                        }
                        , { field: 'certId', title: '证件号', width: 180 }
                        , {
                            field: 'sex', title: '性别', width: 80, templet: function (data) {
                                if (data.sex == 1) return "男";
                                else if (data.sex == 2) return "女";
                                else return "";
                            }
                        }
                        , { field: 'age', title: '年龄', width: 80 }
                        //职称级别: 1 副高及以上  2 中级  3 初级  4 乡村医生
                        , {
                            field: 'titleLevel', title: '职称级别', width: 100, templet: function (data) {
                                if (data.titleLevel == 1) return "副高及以上";
                                else if (data.titleLevel == 2) return "中级";
                                else if (data.titleLevel == 3) return "初级";
                                else if (data.titleLevel == 4) return "乡村医生";
                                else return "";
                            }
                        }
                        , { field: 'score', title: '学分', sort: true, width: 80 }
                        , { field: 'period', title: '学时', width: 80 }
                        , { field: 'personUnitName', title: '工作单位', width: 180 }
                        , { field: 'personUnitProvince', title: '单位所在地', width: 120 }
                        , {
                            field: 'personFromBasic', title: '是否来自基层', width: 180, templet: function (data) {
                                if (data.personFromBasic == 1) return "是";
                                else if (data.personFromBasic == 0) return "否";
                                else return "";
                            }
                        }
                        , { field: 'certificateNo', title: '证书编号', sort: true }
                        , { field: 'unitName', title: '发证机构', sort: true, width: 180, align: "center" }
                        , {
                            field: 'checkState', title: '审核状态', sort: true,
                            templet: function (data) {
                                let checkStateText;
                                switch (data.checkState) {
                                    case "0":
                                        checkStateText = "未审核";
                                        break;
                                    case "1":
                                        checkStateText = "审核通过";
                                        break;
                                    case "2":
                                        checkStateText = "审核不通过";
                                        break;
                                    default:
                                        break;
                                }
                                return checkStateText;
                            }
                        }
                    ]],
                    cellMinWidth: 100,
                    id: "cmeProvinceProjScoreList",
                    height: 'full-50',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if (res.status === 200) {
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "count": res.data.recordsTotal, //解析数据长度
                                "data": res.data.records, //解析数据列表
                                "page": res.data.pageNum, //当前页
                                "limit": res.data.pageSize, //每页条数
                            }
                        } else {
                            layer.msg("请求失败");
                            console.log(res);
                        }
                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    },
                    done: function () {
                        var uploadInst = upload.render({
                            elem: '#tempAdd' //绑定元素
                            , url: huayi_projectscore_url + 'cmeProvinceProjScore/upload/' //上传接口
                            , accept: 'file'
                            , data: {
                                cmeStandardKindId: cmeStandardKindId,
                                unitId: unitId,
                                downId: downId
                            }
                            , choose: function (obj) {
                                // layer.msg("选择文件回调")
                            }
                            , done: function (res) {
                                if (res.success == true) {
                                    loaderTable();
                                    layer.msg("导入完成");
                                } else {
                                    layer.alert(res.msg);
                                }
                            }
                            , error: function () {
                                layer.msg("请求异常回调")
                                //请求异常回调
                            }
                        });
                    }
                });
            };
            // 初始化表格
            loaderTable();

            // 监听头部新增按钮
            table.on('toolbar(cmeProvinceProjScoreList)', function (obj) {
                //form.reset()不会重置隐藏域
                $("#form-addScore")[0].reset();
                $("#scoreId").val("");
                if (obj.event == 'add') {
                    $('#score').val(score);
                    $('#period').val(period);
                    personLayerIndex = layer.open({
                        type: 1,
                        title: '新增学分',
                        content: $('#addScore'),
                        skin: '',
                        area: ['760px', '500px'],
                    });
                }
                if (obj.event == 'downTemp') {
                    //下载模板
                    let downloadUrl = "/file/非本省人员名单导入模板.xlsx";
                    var iframe = document.createElement("iframe");
                    iframe.src = downloadUrl;
                    iframe.style.display = "none";
                    document.body.appendChild(iframe);
                }


            });

            // 身份证校验
            $('input[id=certIdInput]').change(function (e) {
                var certId = e.delegateTarget.value;
                if ($("#select_cert_type").val() == "9fcb08ce-ee86-4e4c-9611-9d430101cea4" &&  isCertId(certId) == false) {
                    layer.msg('请输入正确的身份证号', { icon: 5 });
                    return false;
                }
            }).blur(function () {
                if (isCertId($(this).val()) && $(this).val().length == 18) {
                    let nowYear = (new Date()).getFullYear();
                    let certYear = $(this).val().substr(6, 4);
                    let age = nowYear - parseInt(certYear);
                    let sex = $(this).val().substr(-2, 1) % 2 == 1 ? "1" : "2";
                    $("#ageInput").val(age);
                    $("[name='sex']").val(sex);
                    form.render('select');
                }
            });
            // 提交学分信息
            form.on('submit(submitScore)', function (data) {
                // 身份证校验
                if ($("#select_cert_type").val() == "9fcb08ce-ee86-4e4c-9611-9d430101cea4" && isCertId(data.field.certId) == false) {
                    layer.msg('请输入正确的身份证号', { icon: 5 });
                    return false;
                }
                if (parseFloat(data.field.score) <= 0 || parseFloat(data.field.score) > parseFloat(score)) {
                    layer.msg('学分应该在0和项目周期学分之间', { icon: 5 });
                    return false;
                }
                if (parseFloat(data.field.period) <= 0 || parseFloat(data.field.period) > parseFloat(period)) {
                    layer.msg('学时应该在0和项目周期学时之间', { icon: 5 });
                    return false;
                }
                // 用于判断是新增还是修改
                var scoreId = data.field.scoreId;
                data.field.unitId = unitId;
                data.field.cmeStandardKindId = cmeStandardKindId;
                data.field.startDate = startDate;
                data.field.endDate = endDate;
                data.field.scoreLevel = scoreLevel;
                data.field.projNo = projNo;
                data.field.projName = projName;
                data.field.projId = projId;
                data.field.downId = downId;

                var datas = JSON.stringify(data.field);
                var msg;
                var URL;
                if (scoreId === '' || scoreId === undefined) {
                    // 走新增逻辑
                    URL = huayi_projectscore_url + 'cmeProvinceProjScore/save';
                    msg = '新增学分信息成功';
                } else {
                    // 走修改逻辑
                    URL = huayi_projectscore_url + 'cmeProvinceProjScore/update';
                    msg = '修改学分信息成功';
                }
                $.ajax({
                    type: 'post',
                    url: URL,
                    data: datas,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.status === 200) {
                            $("#form-addScore")[0].reset();
                            // layer.close(layer.index);
                            layer.closeAll();
                            layer.msg(msg);
                            table.reload('cmeProvinceProjScoreList');
                        } else {
                            layer.msg(res.msg);
                        }
                        console.log(layer.index);
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
                return false;
            });

            table.on('tool(cmeProvinceProjScoreList)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    $.ajax({
                        url: huayi_projectscore_url + 'cmeProvinceProjScore/relation/' + datas.scoreId,
                        type: 'get',
                        dataType: 'json',
                        success: res => {
                            if (res.status == '200') {
                                form.val('add-score', res.data);
                                form.render('select');
                                personLayerIndex = layer.open({
                                    type: 1,
                                    title: '修改学分',
                                    content: $('#addScore'),
                                    skin: '',
                                    area: ['760px', '500px'],
                                });
                            } else {
                                layer.msg('获取学分信息失败');
                            }
                        },
                        error: (xhr, status, error) => {
                            layer.msg('网络异常，请稍后后再试');
                        }
                    });
                } else if (obj.event === 'del') {
                    layer.confirm('确认删除', { icon: 3, title: '提示' }, function () {
                        $.ajax({
                            type: 'get',
                            url: huayi_projectscore_url + 'cmeProvinceProjScore/delete',
                            data: {
                                scoreId: obj.data.scoreId
                            },
                            contentType: 'application/json;charset=UTF-8',
                            dataType: 'json',
                            success: function (res) {
                                if (res.status === 200) {
                                    layer.msg("删除成功");
                                    table.reload('cmeProvinceProjScoreList');
                                }
                            }
                        });
                    })

                }
            });
            // 加载学分级别
            $.ajax({
                type: "get",
                url: huayi_sjwh_url + "cmeCommonConfig",
                dataType: 'json',
                data: {
                    configDictId: configDictId,
                    cmeStandardKindId: cmeStandardKindId
                },
                success: function (data) {
                    $.each(data.data, function (index, item) {
                        $('#scoreLevel').append(new Option(item.configValue, item.scoreLevelId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            });
            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                }
            }

            $("#score").blur(function () {
                let scoreInput = $(this).val();
                if (parseFloat(scoreInput) <= 0 || parseFloat(scoreInput) > parseFloat(score)) {
                    layer.msg('学分应该在0和项目周期学分之间', { icon: 5 });
                    return false;
                }
            });
            $("#period").blur(function () {
                let periodInput = $(this).val();
                if (parseFloat(periodInput) <= 0 || parseFloat(periodInput) > parseFloat(period)) {
                    layer.msg('学时应该在0和项目周期学时之间', { icon: 5 });
                    return false;
                }
            });

            window.closeLayer = function () {
                layer.close(personLayerIndex); //再执行关闭   
            }
        });
    </script>
</body>

</html>
