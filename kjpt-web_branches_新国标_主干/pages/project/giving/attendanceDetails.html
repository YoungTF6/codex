<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>考勤明细</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <script type="text/javascript" src="../../../js/constantPage/projectConstant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <style>
        .layui-table-tool-temp {
            padding-right: 0px;
        }

        .layui-table-body {
            height: calc(100vh - 130px);
        }
    </style>

</head>

<body>

    <div class="layui-card">
        <!--    表格栏-->
        <div class="layui-card" style="text-align: center">
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="effectiveStaff" lay-filter="effectiveStaff_filter" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>
</body>

<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="effectivAttendance">考勤详情</a>
</script>

<script type="text/html" id="bar">
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="excel" style="float: right;">导出考勤明细</button>
</script>

<script>
    var batchId = getUrlParam("batchId");
    var teachId = getUrlParam("teachId");
    var downId = getUrlParam("downId");
    var cmeStandardKindId = localStorage.getItem('standardkind-id');
    var _isGuangdong = cmeStandardKindId == StandardKind.GUANG_DONG;
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        excel: 'excel'
    }).use(['table', 'form', 'laydate', 'excel','tool'], function () {

        var table = layui.table;
        var excel = layui.excel;
        var tool = layui.tool;

        window.renderTable = function () {

            let tableObj={};
            if(window['value_qrcode_attend_mode'] == '2') {
                tableObj.where =  {                     
                    batchId: batchId == 'undefined' ? null : batchId,
                    downId: downId,
                    cmeStandardKindId: cmeStandardKindId
                };
            } else {
                tableObj.where = { 
                    teachId: teachId,
                    downId: downId
                };
            }

            table.render({
                method: 'post',
                elem: '#effectiveStaff',
                title: '考勤时间列表',
                url:  huayi_projectscore_url + 'cmeProjAttendance/attendanceAnalysis',
                where: tableObj.where ,
                defaultToolbar: [],
                cols: [[
                    { field: 'comPersonId', align: 'center', width: 250, title: '主键', hide: true },
                    { field: 'personName', align: 'center', width: 120, title: '姓名', },
                    { field: 'personNo', align: 'center', width: 150, title: '人员编号' },
                    { field: 'unitName', align: 'center', title: '所在单位' },
                    { field: 'deptName', align: 'center', title: '科室' },
                    { field: 'titleName', align: 'center', title: '职称' },
                    {field: 'posTime', align: 'center', width: 200, title: '首次考勤时间'},
                    {field: 'meetingDuration',align: 'center', title: '参会时长',hide: !_isGuangdong,templet:(d) => {
                        if (d.meetingDuration == null || d.meetingDuration === '') {
                            return '';
                        }
                        if(d.downDuringInHours * 0.8 > d.meetingDuration) {
                            return `<span style='color:red;'> ${d.meetingDuration} </span>`;
                        } else {
                            return d.meetingDuration  ;
                        }
                    }},
                    { field: 'attendanceType', align: 'center',width: 160, title: '考勤方式' ,hide: (!_isGuangdong),
                        templet:function(d){
                            return tool.getAttendanceType(d.attendanceType);
                        }},
                    { align: 'center', title: '考勤信息', templet: '#rowBar' },
                    {title: "考勤时间是否与其他项目重叠", align: 'center',hide: !_isGuangdong,width:220,templet:(d) => { 
                        if( d.attendanceCross ) {
                            return `<span style='color:red;'>是</span>`;
                        } else {
                            return "否";
                        }}
                    }
                ]],
                cellMinWidth: 100,
                id: "effectiveStaffTable",
                //height: 360,
                page: false,
                toolbar: '#bar',
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
            })
        }
       
        /* 获取配置 */
        window.getConfig = function (configNames, scoreLevel) {
            $.ajax({
                async: false,
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data: {
                    unitId: localStorage.getItem("unit-id"),
                    configNames: configNames,
                    scoreLevelId: scoreLevel
                },
                success: function (res) {
                    if (res.success == true) {
                        window[configNames] = res.data[configNames];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error: function () {
                    layer.msg('获取配置失败');
                }
            });
        }
        

        // （行内按钮）查看考勤详细信息
        table.on('tool(effectiveStaff_filter)', function (obj) {
            var comPersonId = obj.data.comPersonId;
            if (obj.event === 'effectivAttendance') {
                layer.open({
                    title: '考勤详细信息',
                    content: 'attendanceInfo.html?comPersonId=' + comPersonId + '&projTeachId=' + teachId+'&downId='+downId+'&type=1',
                    type: 2,
                    area: ['500px', '300px'],
                })
            }
            // effectiveStaffList();
        })

        table.on('toolbar(effectiveStaff_filter)', function (obj) {
            if (obj.event === 'excel') {
                var index = layer.load(1);
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + 'attendance/exportExcel',
                    contentType: 'application/json;charset=UTF-8',
                    data: { 'teachId': teachId,
                            downId:downId,
                            batchId:batchId == 'undefined' ? null: batchId, 
                            'projectType': "1", 
                            'exportType': '1',
                            cmeStandardKindId:cmeStandardKindId 
                        },
                    dataType: 'json',
                    success: function (res) {
                        var data = res.data;
                        data = excel.filterExportData(data, [
                            'userName',
                            'personNo',
                            'sex',
                            'unitName',
                            'deptName',
                            'titleName',
                            'attendanceAddress',
                            'attendanceDate',
                            'attendanceCross'
                        ]);
                        data.forEach(e => {
                            e.attendanceCross = e.attendanceCross  ? '是' : '否';
                        })
                        let exportCols = { userName: '人员姓名', personNo: '人员编号', sex: '性别', unitName: '所属单位', deptName: '科室', 
                        titleName: '职称', attendanceAddress: '考勤地点', attendanceDate: '考勤时间',attendanceCross: '考勤时间是否与其他项目重叠'};
                        if(!_isGuangdong) {
                            delete data.attendanceCross;
                        }
                        data.unshift(exportCols);
                        excel.exportExcel(data, '考勤明细.xlsx', 'xlsx');
                        layer.close(index)
                    },
                    error: function () {
                        layer.close(index)
                        layer.msg("发送请求失败");
                    }
                })
            }
        })
    
        $(function() {
            getConfig('value_qrcode_attend_mode',null);
            renderTable();
        });
    })
</script>

</html>
