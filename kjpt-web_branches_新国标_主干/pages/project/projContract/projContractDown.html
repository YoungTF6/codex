<script>
    const USERTYPE = localStorage.getItem("user-type");
    const UNITUSERTYPE = localStorage.getItem("unit-user-type");
    const USERNAME = localStorage.getItem("user-name");
    const UNITID = localStorage.getItem("unit-id");
    const DEPTID = localStorage.getItem("dept-id");
    const CMESTANDARDKINDID = localStorage.getItem("standardkind-id");
</script>

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({

    });
    // 全局配置及引入相关的模块
    layui.use(['table', 'layer', 'form', 'tool', 'upload'], function () {
        var table = layui.table
            , form = layui.form
            , layer = layui.layer
            , tool = layui.tool
            , upload = layui.upload
            , uploadRenderFlag = false;


        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            $.ajax({
                async: false,
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    successFun(res);
                },
                error: function (res) {
                    failFun();
                }
            });
        }

        //解析url参数
        let getParamFromUrl = function (paramName) {
            let urlStr = location.search;
            if (urlStr.indexOf(paramName) < 0 || urlStr.indexOf("?") < 0) return;
            let paramKV = urlStr.substr(1).split("&");
            for (let i = 0; i < paramKV.length; i++) {
                if (paramKV[i].indexOf(paramName) >= 0) {
                    return paramKV[i].split("=")[1];
                }
            }
        }
        var ProjectId = getParamFromUrl("projectId");


        window.loaderTable = function () {
            table.render({
                elem: '#projContractDown',
                async: false,
                url: huayi_projectscore_url + 'cmeProjContract/projContractDownList/' + ProjectId,
                title: '项目批次',
                defaultToolbar: [],
                where: {
                    userType: USERTYPE,
                    unitUserType: UNITUSERTYPE,
                    unitId: UNITID,
                    deptId: DEPTID
                },
                cols: [[
                    { field: 'row', type: "numbers", width: 50, fixed: 'left', title: '序号' },
                    { align: 'center', width: 240, toolbar: '#barDemo', title: '操作' },
                    { field: 'status', title: '审批步骤', align: 'center', toolbar: '#viewBar', width: 120 },
                    {
                        field: 'approvalContent', title: '审核意见', sort: true, align: "center", minWidth: 150,
                        templet: function (data) {
                            let textVal = '';
                            if (data.checkState == 1 || data.checkState == 2) {
                                if (data.checkMemo) {
                                    textVal = data.checkMemo;
                                } else if (data.approvalContent) {
                                    textVal = data.approvalContent;
                                }
                            }
                            return textVal;
                        }
                    },
                    { field: 'downId', hide: true },
                    { field: 'projContractId', hide: true },
                    {
                        title: '举办前通知及议程查看', align: "center", minWidth: 180,toolbar: '#noticeView',
                        // templet: function (data) {
                        //     let html = `<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row btn-apply btn_upload" id="id_${data.projContractId}">上传通知和议程</a>`;
                        //     if (data.noticeFileList != null && data.noticeFileList.length > 0) {
                        //         html = html +  '<a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="noticePhoto">查看</a>';
                        //     }
                        //     return html;
                        // }
                    },
                    {
                        field: 'batch', title: '举办批次', sort: true, align: "center", width: 120,
                        templet: function (data) {
                            unitUserType = data.unitUserType;
                            return "第" + data.batch + "批次";
                        }
                    },
                    { field: 'projNo', title: '项目编号', align: "center", minWidth: 220 },
                    { field: 'projName', title: '项目名称', align: "center", minWidth: 180 },
                    { field: 'projManagerName', title: '项目负责人', align: "center", minWidth: 100 },
                    { field: 'startDt', title: '开始日期', align: "center", minWidth: 130 },
                    { field: 'endDt', title: '结束日期', align: "center", minWidth: 130 },
                    {
                        field: 'status', title: '审核状态', align: 'center',
                        templet: function (data) {
                            if (!data.hasOwnProperty("checkState")) return "未申请";
                            let state = data.checkState;
                            if (tool.isEmpty(state)) return "未申请";
                            if (state == 0) return "未上报";
                            if (state == 1) return "已退回";
                            if (state == 2) return "审批不通过";
                            if (state == 3) return "审批通过";
                            if (state == 4) return "审核中";
                            return "未填报";
                        }
                    }
                ]],
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "projContractDown",
                // height: 'full-167',
                height: 'full-60',
                parseData: function (res) {
                    if (res.status != 200) {
                        layer.msg(res.msg)
                        return;
                    }
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done: function (res, curr, count) {

                    renderUpload(res.data);

                }
            });
        };


        window.viewFlowProgress = function (data) {
            layer.open({
                type: 2,
                title: '',
                content: '../projectProgress/projApplyBeforeHoldProgress.html?downId=' + data.downId,
                area: ['560px', '380px'],
            })
        }

        window.getFullFlag = function (partName,cid) {
            let fullFlag = true;
            let url = huayi_projectscore_url + `cmeProjContract/projContractPartFullFlag/${cid}/${partName}`;
            $.ajax({
                async: false,
                type: "get",
                url: url,
                success: function (res) {
                    if (res.success) {

                        let fullObj = res.data;
                        console.log(fullObj);
                        if (partName == "All") {
                            fullFlag = fullObj.mainFullFlag
                                && fullObj.mainFullFlag
                                && fullObj.projinfoFullFlag
                                && fullObj.classFullFlag
                                && fullObj.quanlityFullFlag
                                && fullObj.fundsFullFlag
                                && fullObj.promiseFullFlag;
                        }

                        if (partName == "Notice") {
                            fullFlag = fullObj.noticeFullFlag
                        }

                    } else {
                        layer.msg(res.msg, { icon: 2 });
                    }
                },
                error: function () {
                    layer.msg("发送数据失败", { icon: 2 });
                }
            });
            return fullFlag;
        }

        // 根据学分区间返回考勤抽查次数最低要求
        window.getMinSpotCheckTimeByScore = function (scoreFact) {
            var score = parseFloat(scoreFact);
            if (isNaN(score)) return null;
            if ( score < 4) return 2;
            if (score >= 4 && score < 7) return 4;
            if (score >= 7 ) return 8;
            return null;
        }

        // 上报前读取项目简介和质量控制数据，校验考勤抽查次数是否满足学分规则
        window.validateSpotCheckTimeBeforeReport = function (projContractId) {
            var scoreFact = null;
            var spotCheckTime = null;

            $.ajax({
                async: false,
                url: huayi_projectscore_url + `cmeProjContract/projContractPartInfo/${projContractId}/CmeProjContractProjInfo`,
                type: "get",
                success: function (res) {
                    if (res.success && res.data && res.data.cmeProjContractProjInfo) {
                        scoreFact = res.data.cmeProjContractProjInfo.scoreFact;
                    }
                }
            });

            $.ajax({
                async: false,
                url: huayi_projectscore_url + `cmeProjContract/projContractPartInfo/${projContractId}/CmeProjContractQuality`,
                type: "get",
                success: function (res) {
                    if (res.success && res.data && res.data.cmeProjContractQuality) {
                        spotCheckTime = res.data.cmeProjContractQuality.spotCheckTime;
                    }
                }
            });

            var minSpotCheck = getMinSpotCheckTimeByScore(scoreFact);
            if (minSpotCheck == null) {
                return true;
            }
            var spotCheck = parseFloat(spotCheckTime);
            if (isNaN(spotCheck)) {
                return false;
            }
            return spotCheck >= minSpotCheck;
        }


        window.reportContract = function (data) {

            //todo 填写完成性验证,判断能否上报
            if( getFullFlag('All',data.projContractId)  == false) {
                layer.msg("合同书内容请填写完整", { icon: 2 });
                return false;
            }

            if( getFullFlag("Notice",data.projContractId) ==  false) {
                layer.msg("请上传通知和议程", { icon: 2 });
                return false;
            }

            if (validateSpotCheckTimeBeforeReport(data.projContractId) == false) {
                layer.msg("质量控制-考勤抽查次数不满足要求，请重新设置。", { icon: 2 });
                return false;
            }


            layer.confirm('确认上报', { icon: 3, title: '提示' }, function () {

                $("#btnReport").prop("disabled", "disabled");
                //上报请求
                let url =  huayi_projectscore_url + 'cmeProjCycleApplication/report/' + data.keyId;
                $.ajax({
                    url: url,
                    type: "get",
                    data: { deptId: localStorage.getItem("dept-id") },
                    success: function (res) {
                        if (res.success) {

                            layer.msg("上报成功", { icon: 1, time: 1000 }, function () {
                                table.reload("projContractDown");
                            });

                        } else {
                            layer.msg(res.msg, { icon: 2 });
                        }
                    },
                    error: function () {
                        layer.msg("发送数据失败", { icon: 2 });
                    }
                });
            })

        }

        //审批通过，不通过，或者退回需要添加
        window.approvalAjax = function (keyId, checkState, flowChainState, checkMemo) {
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + 'cmeProjCycleApplication/approval',
                data: {
                    keyId: keyId,
                    flowChainState: flowChainState,
                    approvalContent: checkMemo,
                    unitId: localStorage.getItem("unit-id")
                },
                dataType: 'json',
                success: function (res) {
                    if (res.success) {
                        layer.msg("审核成功", { icon: 1 });
                        table.reload('projContractDown');

                    } else {
                        layer.msg(res.msg, { icon: 0 });
                    }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            return false;
        }

        window.renderUpload = function (data) {

            data.forEach(d => {
                //if(d.projContractId == null) return;
                let projContractId = d.projContractId;
                let projId = d.projId;
                let downId = d.downId;
                let projNo = d.projNo;
                let projName = d.projName;
                let projManagerName = d.projManagerName;
                let projZhubanUnitName = localStorage.getItem("unit-name");
                let projChengbanUnitName = localStorage.getItem("unit-name");

                let loading;
                var files;
                var uploadTime = 0;
                let myUpload = upload.render({
                    elem: '#id_' + downId //绑定元素
                    , url: huayi_upload_url + "uploadApi/upload"
                    , accept: 'file'
                    , acceptMime: 'application/pdf'
                    , exts: 'pdf'
                    , multiple: true
                    , before: function (obj) {
                        uploadTime = 0;
                        files = obj.pushFile();
                        loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
                    }
                    , data: {
                        path: `/projApply/${CMESTANDARDKINDID}/${UNITID}`,
                        fileType: "DOC"
                    }
                    , allDone: function (obj) { //当文件全部被提交后，才触发
                        console.log("obj:");
                        console.log(obj);
                        uploadTime = 0;

                    }
                    , done: function (res, index, upload) {
                        layer.close(loading);
                        if (res.code == 200) {
                            console.log(files)
                            let file = files[index];

                            let remainPreFiles = (uploadTime == 0) ? false : true;

                            let url = huayi_projectscore_url + "cmeProjCycleApplication/saveFilePath";
                            let data = { filePath: res.data.picUrl, downId: downId, fileName: file.name, remainPreFiles: remainPreFiles };
                            uploadTime++;
                            $.ajax({
                                url: url,
                                data: data,
                                type: "post",
                                success: function (res) {
                                    if (res.success) {
                                        layer.msg("保存成功", { icon: 1 });
                                        loaderTable();
                                    } else {
                                        layer.msg(res.msg, { icon: 2 });
                                    }
                                },
                                error: function () {
                                    uploadTime = 0;
                                    layer.msg("发送数据失败", { icon: 2 });
                                }
                            });
                        } else {
                            layer.msg(res.msg, { icon: 2 });
                        }
                    }
                    , error: function () {
                        uploadTime = 0;
                    }
                });

            });

        }

        window.reloadTable = function() {
            table.reload("projContractDown");
        }

        //单元格工具事件
        table.on('tool(projContractDown)', function (obj) {
            var data = obj.data;
            var layEvent = obj.event;
            var tr = obj.tr;

            let projContractId = data.projContractId;
            let downId = data.downId;

            layui.sessionData("projContract", {
                key: "main",
                value: {
                    'projNo': data.projNo,
                    'projName': data.projName,
                    'projManagerName': data.projManagerName,
                    'projManagerTelephone': data.projManagerTelephone,
                    'knowledgeId': data.knowledgeId,
                    'knowledgeName': data.knowledgeName,
                    'knowledgeTwoId': data.knowledgeTwoId,
                    'knowledgeTwoName': data.knowledgeTwoName,
                    'score': data.score,
                    'period': data.period,
                    'limitPerson': data.limitPerson,
                    'startDt': data.startDt,
                    'endDt': data.endDt,
                    'studyAddress': data.studyAddress
                }
            });


            if (layEvent === 'input') {
                let url = `projContractInput.html?projId=${ProjectId}&downId=${downId}`;
                //如果直接写入url，projContractId==null的话，url会传递 projContractId为'null'
                if (projContractId != null) {
                    url = url + `&projContractId=${projContractId}`;
                }

                var index = layer.open({
                    title: false,
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: false,
                    closeBtn: false,
                    content: url,
                    scrollbar: false
                });
            }

            if (layEvent === 'detail') {

                let url = `projContractInput.html?projId=${ProjectId}&downId=${downId}`;
                //如果直接写入url，projContractId==null的话，url会传递 projContractId为'null'
                if (projContractId != null) {
                    url = url + `&projContractId=${projContractId}`;
                }
                url = url + "&oper=details";

                var index = layer.open({
                    title: false,
                    type: 2,
                    area: ['100%', '100%'],
                    maxmin: false,
                    closeBtn: false,
                    content: url,
                    scrollbar: false
                });
            }
            if (layEvent === 'pass') {
                let flowChainState = UNITUSERTYPE * 10 + 3;
                approvalAjax(downId, 6, flowChainState, '');
            }

            if (layEvent === 'back') {
                let flowChainState = unitUserType * 10 + 1;
                let pIn = layer.prompt({
                    formType: 2,
                    title: '审核意见',
                }, function (value, index, elem) {
                    approvalAjax(downId, 4, flowChainState, value);
                    layer.close(pIn);
                });
                return false;
            }


            if (layEvent === 'noticePhoto') {

                let arr = data.noticeFileList;
                if (arr != null && arr.length > 0) {
                    let valueArr = [];
                    arr.forEach(obj => {

                        valueArr.push({
                            "fileName": obj.fileName,
                            "filePath": obj.filePath
                        })
                    })
                    layui.sessionData("projContract", {
                        key: "noticeArr",
                        value: valueArr
                    });
                    window.open("contractPdfView.html",'_blank');
                }
            }

            if (layEvent === 'viewProgress') {
                viewFlowProgress(data);
            }

            if (layEvent === 'report') {
                reportContract(data);
            }

            if (layEvent === 'reproval') {
                reproval(data);
            }

            if (layEvent === 'recall') {

                layer.confirm('确认撤回', { icon: 3, title: '提示' }, function () {
                    $.ajax({
                        type: 'post',
                        url: huayi_projectscore_url + 'cmeProjCycleApplication/back',
                        data: {
                            approvalId: downId
                        },
                        success: function (res) {
                            if (res.status === 200) {
                                layer.close(layer.index);
                                layer.msg("撤回成功");
                                table.reload("projContractDown");
                            }
                        }
                    });
                })
            }

        });




        $(function () {
            loaderTable();
        });


    });

</script>
