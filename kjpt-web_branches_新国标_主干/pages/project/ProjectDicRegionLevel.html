<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>申报配置模板表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>

    <style>
        #formProjectDicRegionLevel .layui-inline-660 {
            width: 80%;
        }

        blockquote .layui-form-label {
            padding: 9px 10px;
            width: 100px;
        }
        blockquote .layui-input-block {
            margin-left: 120px;
        }
    </style>

</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                <div class="layui-inline">
                    <label class="layui-form-label">套</label>
                    <div class="layui-input-block">
                        <select name="cmeStandardKindId" id="standardKindSearch" lay-search></select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">配置模板名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="configName" id="configName" autocomplete="off" class="layui-input" autocomplete="off" placeholder="配置模板名称">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">是否允许备案</label>
                    <div class="layui-input-block">
                        <select id="isMayBeianis" lay-search>
                            <option value="">是否允许备案</option>
                            <option value="0">不允许</option>
                            <option value="1">允许</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">是否需专家评审</label>
                    <div class="layui-input-block">
                        <select id="isNeedExpertCheck" lay-search>
                            <option value="">是否需要专家评审</option>
                            <option value="0">不需评审</option>
                            <option value="1">需要评审</option>
                        </select>
                    </div>
                </div>
                
                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </a>
                </div>
            </blockquote>
        </div>

        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="projectDicRegionLevel" lay-filter="projectDicRegionLevel" style="margin: 0px 0px;">
            </table>
        </div>

        <!--        添加弹窗-->
        <div id="add-projectDicRegionLevel" style="display:none;text-align: center">
            <form class="layui-form" style="padding: 30px;" id="formProjectDicRegionLevel" lay-filter="add-filter">
                <div class="layui-form-item" style="display: none">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label">主键</label>
                        <div class="layui-input-block">
                            <input type="text" name="regionLevelId" autocomplete="off" class="layui-input"  >
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>配置名称</label>
                        <div class="layui-input-inline">
                            <input type="text" name="configName" placeholder="配置名称" autocomplete="off"  class="layui-input" lay-verify="configNameVerify">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>简称</label>
                        <div class="layui-input-inline">
                            <input type="text" name="shortName" placeholder="简称" autocomplete="off"  class="layui-input" lay-verify="shortNameVerify" maxlength="40">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>套</label>
                        <div class="layui-input-inline">
                            <select name="cmeStandardKindId" lay-search lay-filter = "layui-select-tao" id="cmeStandardKindId" lay-verify="required">
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>最高评审机构</label>
                        <div class="layui-input-inline">
                            <input type="text" id="topUnitId" name="topUnitId" lay-filter="unitSelect"  autocomplete="off" class="layui-input" readonly="true" lay-verify="required">
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>学分级别</label>
                        <div class="layui-input-inline">
                            <select name="scoreLevelId" lay-search lay-filter = "layui-select-level" id="scoreLevelId" lay-verify="required">
                               <option>请选择</option>>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>是否允许备案</label>
                        <div class="layui-input-inline">
                            <select name="isMayBeianis" id="isMayBeianisForm" lay-search lay-verify="required" lay-filter ="is-may-beianis">
                                <option value="">是否允许备案</option>
                                <option value="0">不允许</option>
                                <option value="1">允许</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">备案年份</label>
                        <div class="layui-input-inline">
                            <select name="beianisYear" id="beianisYear" lay-search lay-filter ="beianis-year" disabled="disabled" lay-verify="beianisYearVerify">
                                <option value="0">请选择备案几年</option>
                                <option value="1">1年</option>
                                <option value="2">2年</option>
                                <option value="3">3年</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">备案项目是否需执行情况反馈</label>
                        <div class="layui-input-inline">
                            <select name="isNeedFeedback" id="isNeedFeedback" lay-search lay-filter ="beianis-year" disabled="disabled" lay-verify="isNeedFeedbackVerify">
                                <option value="">请选择</option>
                                <option value="0">不需要</option>
                                <option value="1">需要</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>可申报批次</label>
                        <div class="layui-input-inline">
                            <select name="batch" lay-search lay-verify="required">
                                <option value="">可申报批次</option>
                                <option value="1">一批</option>
                                <option value="2">二批</option>
                                <option value="3">三批</option>
                                <option value="4">四批</option>
                                <option value="5">五批</option>
                                <option value="6">六批</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>每学分占几个学时</label>
                        <div class="layui-input-inline">
                            <input type="number" min="1" name="period" placeholder="请输入数字" autocomplete="off" class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>每天最高学时限制</label>
                        <div class="layui-input-inline">
                            <input type="number" min="1" name="maxPeriodPerDay" placeholder="请输入数字" autocomplete="off"  class="layui-input" lay-verify="required">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>最高学分限制</label>
                        <div class="layui-input-inline">
                            <input type="number" min="1" name="maxScore" placeholder="请输入数字" autocomplete="off"
                                   class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>是否需要专家评审</label>
                        <div class="layui-input-inline">
                            <select name="isNeedExpertCheck" lay-search lay-verify="required">
                                <option value="">是否需要专家评审</option>
                                <option value="0">不需评审</option>
                                <option value="1">需要评审</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>项目负责人每年最高申报数量</label>
                        <div class="layui-input-inline">
                            <input type="number" min="1" name="maxPrincipalCount" placeholder="请输入数字"  autocomplete="off" class="layui-input" lay-verify="required">
                        </div>
                    </div>

                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>单位类型</label>
                        <div class="layui-input-inline">
                            <select name="regionLevelType" id="regionLevelTypeForm" lay-search lay-verify="required">
                                <option value="">单位类型</option>
                                <option value="1">综合单位</option>
                                <option value="2">中医单位</option>
                                <option value="3">远程单位</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" id="lblProjType"><font color="red">*&nbsp;</font>项目类别</label>
                        <div class="layui-input-inline">
                            <select name="projType" id="projType" lay-search lay-verify="required">
                                <option value="1">推荐项目</option>
                                <option value="2">推广项目</option>
                                <option value="4">实践活动</option>
                            </select>
                        </div>
                    </div>

                </div>
                <div class="layui-form-item">
                    
                    <div class="layui-inline">
                        <label class="layui-form-label" id="lblProjectType"><font color="red">*&nbsp;</font>医学体系</label>
                        <div class="layui-input-inline">
                            <select name="projectType" id="projectType" lay-search lay-verify="required">
                                <option value="1">西医</option>
                                <option value="2">中医</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">备注</label>
                        <div class="layui-input-inline">
                            <textarea name="remark" placeholder="备注" class="layui-textarea" autocomplete="off" lay-verify="remarkVerify"></textarea>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                        <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                    </div>
                </div>
            </form>
        </div>


    </div>
</div>


<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn layui-btn-sm" lay-event="add">新增</a>
</script>
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a>
</script>


<script>
    layui.config({
        base        :   '/js/layui/ext/'
    }).extend({
        xmSelect    :   'xm-select',
        treeSelect  :   'treeSelect',
        tool        :   'tool'
    });

    // 全局配置及引入相关的模块
    layui.use([ 'table', 'form','xmSelect', 'treeSelect','tool' ], () => {
        let table = layui.table, form = layui.form, tool = layui.tool, layer = layui.layer, xmSelect = layui.xmSelect, treeSelect = layui.treeSelect;
        let ajaxNum = 0, loading = null;
        let loadObj = { topUnitId: '', unitId: '', cmeStandardKindId: '' };
        let standardKindObj={};

        // 关闭closeLoading的判断
        let closeLoading = () => {
            ajaxNum--;
            if (ajaxNum <= 0 && loading) layer.close(loading);
        }
        // 打开加载
        let openLoading = () => {
            if (ajaxNum == 0) loading = layer.msg('加载中', { icon: 16, shade: 0.3, time:0 });
            ajaxNum ++;
        }
        // 公共ajax
        let commonAjax = (type = 'get', url, data, failFun, successFun) => {
            openLoading();
            $.ajax({
                type    : type,
                url     : url,
                data    : data,
                success : res => {
                    closeLoading();
                    successFun(res);
                },
                error   : res => {
                    closeLoading();
                    failFun();
                }
            });
        }
        // 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem            : '#projectDicRegionLevel',
                url             : huayi_projectscore_url + 'projectDicRegionLevel/getRegionLevelList',
                title           : '用户表',
                defaultToolbar  : [],
                where           : {
                    isMayBeianis        : $('#isMayBeianis').val(),
                    isNeedExpertCheck   : $('#isNeedExpertCheck').val(),
                    configName          : $('#configName').val(),
                    cmeStandardKindId   : $('#standardKindSearch').val(),
                },
                cols: [ [
                    { align: 'center', minWidth: 150, toolbar: '#rowBar', title: '操作', fixed: 'left' },
                    { field: 'regionLevelId', title: '主键', hide: true },
                    { field: 'configName', title: '配置名称', minWidth: 100, align: 'center' },
                    { field: 'shortName', title: '简称', minWidth: 80, align: 'center' },
                    { field: 'cmeStandardKindName', title: '套', sort: true, align: 'center' },
                    { field: 'scoreLevelName', title: '学分级别', sort: true, align: 'center', minWidth: 200 },
                    { field: 'topUnitName', title: '最高评审机构单位编号', align: 'center', minWidth:160 },
                    { field: 'projType', title: '项目类别', sort: true, align: 'center', minWidth: 120,
                        templet: function(d) {
                            let text = "";
                            if (d.projType == 1) text ="推荐项目";
                            if (d.projType == 2) text ="推广项目";
                            if (d.projType == 4) text ="实践活动";
                            return text;
                        } 
                    },
                    { field: 'isMayBeianis', title: '是否允许备案', minWidth:120, align: 'center',
                        templet: d => d.isMayBeianis == 1 ? '允许' : '不允许' },
                    { field: 'isNeedExpertCheck', title: '是否需要专家评审', sort: true, align: 'center', minWidth:160,
                        templet: d => d.isNeedExpertCheck == 1 ? '需要评审' : '不需评审' },
                    { field: 'batch', title: '可申报批次', sort: true, minWidth:120, align: 'center' },
                    { field: 'period', title: '每学分占几个学时', sort: true, align: 'center' },
                    { field: 'maxPeriodPerDay', title: '每天最高学时限制', sort: true, align: 'center' },
                    { field: 'maxScore', title: '最高学分限制', sort: true, align: 'center' },
                    { field: 'maxPrincipalCount', title: '项目负责人每年最高申报数量一般为2个', sort: true, align: 'center' },
                    { field: 'remark', title: '备注', sort: true,hide: true, align: 'center' },
                    { field: 'addTime', title: '添加时间', sort: true, minWidth: 200, align: 'center' },
                    { field: 'updateTime', title: '更新时间', sort: true, hide: true }
                ] ],
                toolbar                 : '#bar',
                cellMinWidth            : 100,
                id                      : 'projectDicRegionLevel',
                height                  : 'full-200',
                page                    : true,
                limit                   : 10,
                limits                  : [ 10, 50, 100, 150, 200 ],
                parseData               : res => {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize, // 每页条数
                    } },
                request: {
                    pageName    : 'pageNum', // 页码的参数名称，默认：page
                    limitName   : 'pageSize' // 每页数据量的参数名，默认：limit
                }
            });
        };

        // 套初始化
        let standardKindInit = () => {
            commonAjax('get', huayi_sjwh_url + 'cmestandardkind/list/all', {},
                () => {layer.msg('套加载失败');},
                res => {
                    let options = '<option value="" > 请选择套标准 </option>';
                    for (let obj of res.data) {
                        standardKindObj[obj.cmeStandardKindId] = {
                            description:obj.description,
                            topUnitId:obj.topUnitId
                        };
                        options += '<option top-unit-id="' + obj.topUnitId + '" value="' + obj.cmeStandardKindId + '">'+obj.description+'</option>';
                    }
                    $('#cmeStandardKindId').append(options);
                    $('#standardKindSearch').append(options);
                    form.render('select');
                    bindStandardKind();
                });
        }

        // 监听套是否选中，选中的话需要更新机构和学分级别
        let bindStandardKind = () => {
            // 套的select下拉框选中触发事件
            form.on("select(layui-select-tao)", function(data) {
                // 清除掉机构树，下面会进行重新加载
                treeSelect.destroy('unitSelect');
                // document.getElementById('scoreLevelId').length = 0;
                if (data !="" && data!= null) {
                    let topUnitId= $(data.elem).find('option:selected').attr('top-unit-id');
                    let cmeStandardKindId = $(data.elem).find('option:selected').val();
                    loadUnitSelect(topUnitId);
                    loadLevelSelect(cmeStandardKindId);
                }
            });
        }

        $('#isMayBeianis').ready(() => {
            form.on('select(is-may-beianis)', function(data) {
                if (data.value == 1) {
                    $('#beianisYear').removeAttr('disabled');
                    $('#isNeedFeedback').removeAttr('disabled');
                } else {
                    $('#beianisYear').attr('disabled','disabled');
                    $('#beianisYear').val('');
                    $('#isNeedFeedback').attr('disabled','disabled');
                    $('#isNeedFeedback').val('');
                }
                form.render('select');
            });
        })

        // 编辑和新增都需要加载机构
        var loadUnitSelect = (topUnitId, unitId=null) => {
            if (tool.isEmpty(topUnitId)) return;
            if (loadObj.topUnitId == topUnitId) {
                treeSelect.checkNode('unitSelect', unitId);
                return;
            }
            treeSelect.destroy('unitSelect');
            openLoading
            treeSelect.render({
                elem    : '#topUnitId',
                data    : huayi_personorg_url + 'comunit/childrenAllTreeRedis?unitId='+topUnitId,
                headers : {
                    'Authorization' : localStorage.getItem('token'),
                    'KJPT-USER-ID'  : localStorage.getItem('user-id')
                },
                type    : 'get',
                search  : true,
                success : function(d) {
                    closeLoading();
                    !tool.isEmpty(unitId) && treeSelect.checkNode('unitSelect', unitId);
                },
                fail    : function(d) { closeLoading(); }
            });
        }

        // 加载学分级别，新增/编辑添加
        var loadLevelSelect = (standardkindId, data = null) => {
            if (tool.isEmpty(standardkindId)) return;
            if (data && loadObj.cmeStandardKindId == data.cmeStandardKindId) {
                form.val('add-filter', data);
                return;
            }
            commonAjax('get',huayi_sjwh_url + 'cmecomscorelevel/taoId',
                {cmeStandardKindId: standardkindId},
                () => {layer.msg('学分级别加载失败');},
                function(res) {
                    $('#scoreLevelId').find('option:gt(0)').remove();
                    res.data.forEach(d => {
                        let name = d.scoreLevelName + "("+d.versionYear+")";
                        $('#scoreLevelId').append("<option value='"+d.scoreLevelId+"'>"+name+"</option>");
                    });
                    data != null && form.val('add-filter', data);
                    form.render('select');
                });
        }

        // 删除
        let deleteRegionLevel = regionLevelId => {
            layer.confirm('确认删除', {icon: 3, title: '提示'}, () => {
                $.ajax({
                    type        : 'get',
                    url         : huayi_projectscore_url + 'projectDicRegionLevel/deleted',
                    data        : { regionLevelId: regionLevelId },
                    contentType : 'application/json;charset=UTF-8',
                    dataType    : 'json',
                    success     : res => {
                        if (res.status === 200) {
                            layer.msg('删除成功');
                            table.reload('projectDicRegionLevel');
                        }
                    }
                });
                layer.msg('删除成功');
            })
        }

        // 新增，编辑时打开弹窗
        let openFormWindow = (data = null) => {
            data != null && form.val('add-filter', data);
            layer.open({
                type    : 1,
                title   : (data = null) ? '新增' : '修改',
                content : $('#add-projectDicRegionLevel'),
                area    : [ '60%', '90%' ],
                cancel  : (index, layero) => { $('#formProjectDicRegionLevel')[0].reset(); }
            })
        }
        // 监听头部新增按钮
        table.on('toolbar(projectDicRegionLevel)', obj => {
            if (obj.event != 'add') return;
            $('#formProjectDicRegionLevel')[0].reset();
            treeSelect.destroy('unitSelect');
            openFormWindow();
            $('#topUnitId').val('');
            $('#scoreLevelId').find('option:gt(0)').remove();
            $('#beianisYear').attr('disabled', 'disabled');
            $('#beianisYear').val('');
            form.render('select');
        });

        // 监听行内按钮
        table.on('tool(projectDicRegionLevel)', obj => {
            var data = obj.data;
            if (obj.event === 'edit') {
                openFormWindow(data);
                loadLevelSelect(data.cmeStandardKindId, data);
                const topUnitId = standardKindObj[data.cmeStandardKindId].topUnitId;
                loadUnitSelect(topUnitId, data.topUnitId);
                if (data.isMayBeianis == 1) {
                    $('#beianisYear').removeAttr('disabled');
                    $('#isNeedFeedback').removeAttr('disabled');
                } else {
                    $('#beianisYear').attr('disabled', 'disabled') .val('');
                    $('#isNeedFeedback').attr('disabled', 'disabled') .val('');
                }
                form.render('select');
            }
            obj.event === 'del' && deleteRegionLevel(data.regionLevelId);
        });

        // 新增/修改表单提交
        form.on('submit(submit)', function (data) {
            // 用于判断是新增还是修改
            var formTableId = $("#add-projectDicRegionLevel input[name='regionLevelId']").val();
            var datas = JSON.stringify(data.field);
            var msg = '修改成功';
            var URL = huayi_projectscore_url + 'projectDicRegionLevel/update';
            if (formTableId === '' || formTableId === null) {
                // 走新增逻辑
                URL = huayi_projectscore_url + 'projectDicRegionLevel/save';
                msg = '新增成功';
            }
            $.ajax({
                type: 'post',
                url: URL,
                data: datas,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if (res.status === 200) {
                        layer.closeAll();
                        layer.msg(msg);
                        table.reload('projectDicRegionLevel');
                    } else if (res.status === 500) {
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            return false;
        });

        //自定义验证规则
        form.verify({
            configNameVerify : function(value) {
                if (value.length == 0) return '必填项不能为空';
                if (value.length > 30) return '配合名称长度不能超过30';
            },
            shortNameVerify :  function(value) {
                if (value.length == 0) return '必填项不能为空';
                if (value.length > 30) return '配合简称长度不能超过15';
            },
            beianisYearVerify: function(value) {
                const isMayBeianis = $("#isMayBeianisForm").val();
                if (isMayBeianis == 1 && tool.isEmpty(value)) return '备案年份不能为空';
            },
            isNeedFeedbackVerify:function(value) {
                const isMayBeianis = $("#isMayBeianisForm").val();
                if (isMayBeianis == 1 && tool.isEmpty(value)) return '备案项目是否需要执行情况反馈不能为空';
            },
            remarkVerify:function(value) {
                if (value.length>100) return '备注长度不能超过100';
            }
        });

        let htmlInit = () => {
            standardKindInit();
            // 初始化表格
            loaderTable();
        }

        htmlInit();
        
    });
</script>
</body>
</html>
