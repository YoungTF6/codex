<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>院内活动考勤明细</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8">
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script src="/js/jquery-3.5.1.min.js"></script>
    <script src="/js/layui-v2.6.8/layui/layui.js"></script>
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <style>
        .pageContainer {
            padding: 10px;
            background-color: #ffffff;
        }

        .searchSection {
            padding: 14px 14px 0 14px;
            border: 1px solid #f0f0f0;
            background: #fafafa;
            margin-bottom: 10px;
        }

        .tableSection {
            border: 1px solid #f0f0f0;
            background: #ffffff;
        }
    </style>
</head>
<body>
<div class="layui-fluid pageContainer">
    <div class="searchSection">
        <div class="layui_display">
            <form class="form-query layui-form" lay-filter="attendanceSearchForm">
                <div class="layui-inline">
                    <label class="layui-form-label">人员编号</label>
                    <div class="layui-input-block">
                        <input id="searchPersonNo" name="personNo" type="text" autocomplete="off" placeholder="请输入人员编号" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">姓名</label>
                    <div class="layui-input-block">
                        <input id="searchPersonName" name="personName" type="text" autocomplete="off" placeholder="请输入姓名" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">单位</label>
                    <div class="layui-input-block">
                        <input id="searchUnitName" name="unitName" type="text" autocomplete="off" placeholder="请输入单位名称" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">次数筛选</label>
                    <div class="layui-input-block">
                        <input id="searchAttendanceMinCount" name="attendanceMinCount" type="number" min="0" autocomplete="off" placeholder="大于等于几次" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">是否评价</label>
                    <div class="layui-input-block">
                        <select id="searchIsEvaluated" name="isEvaluated">
                            <option value="">全部</option>
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">是否考试</label>
                    <div class="layui-input-block">
                        <select id="searchIsExamPassed" name="isExamPassed">
                            <option value="">全部</option>
                            <option value="1">是</option>
                            <option value="0">否</option>
                        </select>
                    </div>
                </div>

                <div class="layui-inline">
                    <button class="layui-btn layui-btn-sm" lay-submit lay-filter="searchAttendanceDetail">
                        <i class="layui-icon layui-icon-search"></i>查询
                    </button>
                </div>
                
            </form>
        </div>
        
    </div>
    <div class="tableSection">
        <table id="attendanceDetailTableElem" lay-filter="attendanceDetailTable"></table>
    </div>
</div>

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool',
    });

    layui.use(['table', 'form', 'layer', 'tool'], function () {
        var table = layui.table;
        var form = layui.form;
        var tool = layui.tool;
        var layer = layui.layer;
        let groupProjectId = tool.getParamFromUrl("groupProjectId");
        let downId = tool.getParamFromUrl("downId");


        form.render();

        // 考勤明细原始数据（后续可替换为后端接口数据）
        var sourceList = [];
        var groupList = [];

        // 文案转换：是否状态字段统一展示“是/否”
        function renderYesNo(value) {
            if(value === true || value === 'true' || Number(value) === 1) {
                return '是';
            }
            return '否';
        }

        function renderExamResult(value) {
            return Number(value) === 1 ? '是' : '否';
        }

        // 根据搜索条件过滤表格数据
        function filterAttendanceList(query) {
            var minCount = query.attendanceMinCount === '' ? null : Number(query.attendanceMinCount);
            return groupList.filter(function (item) {
                var personNoOk = !query.personNo || (item.personNo || '').indexOf(query.personNo) > -1;
                var personNameOk = !query.personName || (item.personName || '').indexOf(query.personName) > -1;
                var unitNameOk = !query.unitName || (item.unitName || '').indexOf(query.unitName) > -1;
                // 分组后次数字段使用 groupNum
                var countOk = minCount === null || (!isNaN(minCount) && Number(item.groupNum) >= minCount);
                // 分组后评价、考试字段使用后端返回 existsInEvaluation/examResult
                var evaluatedVal = item.existsInEvaluation ? '1' : '0';
                var examVal = (item.examResult === null || item.examResult === undefined || item.examResult === '')
                    ? ''
                    : (Number(item.examResult) === 1 ? '1' : '0');
                var evaluatedOk = query.isEvaluated === '' || evaluatedVal === String(query.isEvaluated);
                var examOk = query.examResult === '';
                if (query.examResult === '1') {
                    examOk = examVal === '1';
                } else if (query.examResult === '0') {
                    // “否”场景同时兼容未参加/未出结果（空值）数据
                    examOk = examVal !== '1';
                }
                return personNoOk && personNameOk && unitNameOk && countOk && evaluatedOk && examOk;
            });
        }


        /**
         * 对数据进行分组
         */
        function getGroupList(arrList) {
            if (!Array.isArray(arrList) || !arrList.length) {
                return [];
            }
            var groupMap = {};
            arrList.forEach(function (item) {
                var groupKey = item && item.comPersonId ? String(item.comPersonId) : '';
                if (!groupKey) {
                    return;
                }
                if (!groupMap[groupKey]) {
                    groupMap[groupKey] = [];
                }
                groupMap[groupKey].push(item);
            });
            return Object.keys(groupMap).map(function (key) {
                var itemList = groupMap[key];
                var firstItem = itemList[0] || {};
                return $.extend({}, firstItem, {
                    // 分组条数：该人员原始考勤记录数量
                    groupNum: itemList.length
                });
            });
        }


        /**
         * 增加获取考勤数据的方法
         */
        function getAttendanceList() {
            if (!downId || !groupProjectId) {
                layer.msg('缺少downId或groupProjectId参数');
                return [];
            }
            var resultList = [];
            $.ajax({
                url: huayi_projectscore_url + 'cmeProjAttendance/getAttendanceByDownIdAndProjId',
                type: 'get',
                dataType: 'json',
                async: false,
                data: {
                    downId: downId,
                    projId: groupProjectId,
                    projectType: '2'
                },
                success: function (res) {
                    if (!res || Number(res.status) !== 200) {
                        layer.msg((res && (res.msg || res.message)) ? (res.msg || res.message) : '获取考勤明细失败');
                        return;
                    }
                    resultList = Array.isArray(res.data) ? res.data : [];
                },
                error: function () {
                    layer.msg('请求考勤明细失败，请稍后重试');
                }
            });
            return resultList;
        }


        // 渲染表格数据
        function renderAttendanceTable(dataList) {
            table.reload('attendanceDetailTable', {
                data: dataList || [],
                limit: 10000
            });
        }

        // 读取当前搜索条件
        function getSearchQuery() {
            return {
                personNo: ($('#searchPersonNo').val() || '').trim(),
                personName: ($('#searchPersonName').val() || '').trim(),
                unitName: ($('#searchUnitName').val() || '').trim(),
                attendanceMinCount: ($('#searchAttendanceMinCount').val() || '').trim(),
                isEvaluated: $('#searchIsEvaluated').val() || '',
                examResult: $('#searchIsExamPassed').val() || ''
            };
        }

        function getBarBtn() {
            return `<div><a class="layui-btn layui-btn-xs" lay-event="exportAllAttendance" >导出全部考勤</a>
            <a class="layui-btn layui-btn-xs" lay-event="exportUniqueAttendance" >导出去重考勤信息</a></div>`
        }

        // 将布尔/数字状态统一转换为“是/否”
        function parseYesNoForExport(value) {
            if (value === true || value === 'true' || Number(value) === 1) {
                return '是';
            }
            return '否';
        }

        // 导出考试结果时与表格展示逻辑保持一致
        function parseExamResultForExport(value) {
            return renderExamResult(value);
        }

        // 构建去重人员导出数据行
        function buildUniqueExportRows(list) {
            return (list || []).map(function (item) {
                return [
                    item.personName || '',
                    item.personNo || '',
                    item.unitName || '',
                    item.deptName || '',
                    item.titleName || '',
                    item.mobile || '',
                    item.groupNum || 0,
                    parseYesNoForExport(item.existsInEvaluation),
                    item.evaTime || '',
                    parseExamResultForExport(item.examResult),
                    item.examTime || '',
                    parseYesNoForExport(item.existsInScore)
                ];
            });
        }

        // 构建全部考勤记录导出数据行
        function buildAllExportRows(list) {
            return (list || []).map(function (item) {
                return [
                    item.personName || '',
                    item.personNo || '',
                    item.unitName || '',
                    item.deptName || '',
                    item.titleName || '',
                    item.mobile || '',
                    item.posTime || '',
                    item.appAddress || '',
                    parseYesNoForExport(item.existsInEvaluation),
                    item.evaTime || '',
                    parseExamResultForExport(item.examResult),
                    item.examTime || '',
                    parseYesNoForExport(item.existsInScore)
                ];
            });
        }

        // 导出考勤Excel
        function exportAttendanceExcel(list, fileName, useGroupNum) {
            if (!Array.isArray(list) || !list.length) {
                layer.msg('暂无可导出数据');
                return;
            }
            var uniqueExportHeader = ['姓名', '编号', '所在单位', '科室', '职称', '电话', '考勤次数', '是否评价', '评价时间', '是否考试通过', '通过时间', '是否已授分'];
            var allExportHeader = ['姓名', '编号', '所在单位', '科室', '职称', '电话', '考勤时间', '地点', '是否评价', '评价时间', '是否考试通过', '通过时间', '是否已授分'];
            var exportHeader = useGroupNum ? uniqueExportHeader : allExportHeader;
            var exportRows = useGroupNum ? buildUniqueExportRows(list) : buildAllExportRows(list);
            exportFileWithName(exportHeader, exportRows, 'xls', '考勤信息');
            layer.msg(fileName + '导出成功');
        }

        // 按指定文件名导出数据
        function exportFileWithName(headerArr, dataArr, type, fileName) {
            var exportType = type || 'xls';
            var textType = ({
                csv: 'text/csv',
                xls: 'application/vnd.ms-excel'
            })[exportType] || 'application/vnd.ms-excel';
            var dataTitle = (headerArr || []).join(',');
            var dataMain = (dataArr || []).map(function (row) {
                return (row || []).join(',');
            }).join('\r\n');
            var linkElem = document.createElement('a');
            linkElem.href = 'data:' + textType + ';charset=utf-8,\ufeff' + encodeURIComponent(dataTitle + '\r\n' + dataMain);
            linkElem.download = (fileName || 'table') + '.' + exportType;
            document.body.appendChild(linkElem);
            linkElem.click();
            document.body.removeChild(linkElem);
        }

        // 执行查询并刷新表格
        function searchAndRender() {
            var query = getSearchQuery();
            var list = filterAttendanceList(query);
            renderAttendanceTable(list);
        }

        // 初始化表格结构
        table.render({
            elem: '#attendanceDetailTableElem',
            id: 'attendanceDetailTable',
            data: [],
            page: false,
            toolbar: getBarBtn(),
            limit: 10000,
            text: { none: '暂无数据' },
            cols: [[
                { type: 'numbers', title: '序号', width: 60, align: 'center' },
                { field: 'personName', title: '姓名', minWidth: 100, align: 'center' },
                { field: 'personNo', title: '编号', minWidth: 130, align: 'center' },
                { field: 'unitName', title: '所在单位', minWidth: 160, align: 'center' },
                { field: 'deptName', title: '科室', minWidth: 120, align: 'center' },
                { field: 'titleName', title: '职称', minWidth: 110, align: 'center' },
                { field: 'mobile', title: '电话', minWidth: 130, align: 'center' },
                { field: 'groupNum', title: '考勤次数', width: 100, align: 'center' },
                { field: 'existsInEvaluation', title: '是否评价', width: 100, align: 'center', templet: function (d) { return renderYesNo(d.existsInEvaluation); } },
                { field: 'evaTime', title: '评价时间', minWidth: 160, align: 'center' },
                { field: 'existsInExam', title: '是否考试通过', width: 120, align: 'center', templet: function (d) { return renderExamResult(d.examResult); } },
                { field: 'examTime', title: '通过时间', minWidth: 160, align: 'center' },
                { field: 'existsInScore', title: '是否已授分', width: 110, align: 'center', templet: function (d) { return renderYesNo(d.existsInScore); } }
            ]]
        });

        // 工具栏导出事件
        table.on('toolbar(attendanceDetailTable)', function (obj) {
            if (obj.event === 'exportAllAttendance') {
                exportAttendanceExcel(sourceList, '全部考勤', false);
                return;
            }
            if (obj.event === 'exportUniqueAttendance') {
                exportAttendanceExcel(groupList, '去重考勤信息', true);
            }
        });

        // 查询按钮事件
        form.on('submit(searchAttendanceDetail)', function () {
            searchDataReaderTable();
            return false;
        });

        // 重置按钮事件
        $('#btnResetSearch').on('click', function () {
            form.val('attendanceSearchForm', {
                personNo: '',
                personName: '',
                unitName: '',
                attendanceMinCount: '',
                isEvaluated: '',
                isExamPassed: ''
            });
            form.render('select');
            searchAndRender();
        });

        // 通知未评价学员：先按当前查询条件筛出未评价人员
        $('#btnNotifyUnEvaluated').on('click', function () {
            var query = getSearchQuery();
            var list = filterAttendanceList(query).filter(function (item) {
                return Number(item.isEvaluated) === 0;
            });
            if (!list.length) {
                layer.msg('当前筛选条件下无未评价学员');
                return;
            }
            layer.msg('已筛选出 ' + list.length + ' 名未评价学员，可用于后续通知');
        });

        let searchDataReaderTable = function() {
            // 首次进入默认加载
            sourceList = getAttendanceList();
            groupList = getGroupList(sourceList);
            searchAndRender();
        }

        searchDataReaderTable();
        
    });
</script>
</body>
</html>
