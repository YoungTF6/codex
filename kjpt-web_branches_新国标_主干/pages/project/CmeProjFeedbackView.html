<script>
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        tool        :   'tool',
    });

    layui.use(['table', 'form','element','tool','upload'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery,tool = layui.tool;
        var upload = layui.upload;
        window.layer = layui.layer;
        window.loading;
        window.ajaxNum = 0;
        var element = layui.element,nowProjectId,nowUnitId;
        var nowDownId,year,cmeStandardKindId,nowApprovalId,nowBatch;
        let userStandardkindId = localStorage.getItem("standardkind-id");
        let userUnitId = tool.getParamFromUrl("unitIdValue");
        var nowFlowChainState;
        var windowIndex;//单前弹窗
        var approvalIndex;//审批意见弹窗
        var unitUserType = 0;
        const myUnitId = tool.getParamFromUrl("unitIdValue");
        let configName1 = "fun_feedback_file_upload",configName2="fun_feedback_tab",configName3="fun_feedback_proj_field",configName4="fun_feedback_is_analyse",configName5="fun_feedback_show_notice",configName6="fun_feedback_inspect",
        configName7="fun_feedback_score_check_pass",configName8="fun_feedback_teach_image",configName9="fun_feedback_ducha",configName10 = "fun_feedback_process_upload",configName11 = "fun_feedback_show_courseware";
        let configMap = {};
        let fileUpObj = [{"fileName":"会议通知和议程","require":false,"fileType":1},
            {"fileName":"会议现场照片","require":false,"fileType":2},
            {"fileName":"学员签到表","require":false,"fileType":3},
            {"fileName":"考试考题","require":false,"fileType":4},
            {"fileName":"执行情况反馈表","require":false,"fileType":5}];
        let showProjInfo = [{name:"projName",value:"项目名称:"},
            {name:"projNo",value:"项目编号:"},
            {name:"unitName",value:"填报单位:"},
            {name:"studyAddress",value:"举办地点:"},
            {name:"startDt",value:"开始时间:"},
            {name:"endDt",value:"结束时间"}];
        let reqInfoObj = [{name:"trainAnalyse",value:userStandardkindId=='acd09b62-333b-4aee-934f-9ec500a9d46d'?"实际培训效果分析(举办时间、地点、内容、参会人员情况、收到的效果)200字以上:":"实际培训效果分析:"},{name:"questionSuggest",value:"存在的问题和建议:"}];
        let flowArr = [],allFile,nowApprovalState;
        let fileUpObj2 = [{"fileName":"审核表","require":false,"fileType":21}];

        //关闭closeLoading的判断
        window.closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }

        window.openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }

        //
        if(userStandardkindId=='acd09b62-333b-4aee-934f-9ec500a9d46d') { //吉林套
            $("#div-handout").show();
        } else {
            $("#div-textbook").show();
        }

        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    closeLoading();
                    if(res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }

        // 表格配置
        let loaderTable = function (projectId) {
            table.render({
                elem: '#implementation',
                url: huayi_projectscore_url + 'cmeProjFeedbackApproval/getApprovalFeedbacks',
                method: 'post',
                where: {
                    projectId:projectId,
                    unitId:tool.getParamFromUrl("unitIdValue")
                },
                cols: [[
                    {align: 'center', width: 170, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    {field: 'status', title: '审批步骤', sort: true,align: 'center',width:120,toolbar: '#viewBar'},
                    {field: 'batch',title:"举办批次",sort:true,align: 'center',templet:function(data){
                        unitUserType = data.unitUserType;
                        return "第"+data["batch"]+"批次";
                    }},
                    {field: 'projNo', title: '项目编号', sort: true,align: 'center',width:180},
                    {field: 'projName', title: '项目名称', sort: true,align: 'center',width:180},
                    {field: 'startDt', title: '开始日期', sort: true,align: 'center',width:180},
                    {field: 'endDt', title: '结束日期', sort: true,align: 'center',width:180},
                    {field: 'approvalContent', title: '审核意见', sort: true,align: 'center',width:180,templet:function(d){
                        if(d.checkState==3 || tool.isEmpty(d.approvalContent)) return "";
                        return d.approvalContent;
                    }}
                ]],
                cellMinWidth: 100,
                id: "implementation",
                height: 'full-50',
                page: false,
                parseData: function (res) {
                    const filteredData = res.data.filter(item => item.checkState!== null);
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "data": filteredData, //解析数据列表
                    }
                },
                request: {},
                done:function(res,curr,count){}
            });
        };

        //ajax获取配置信息
        let getTabConfig = function(){
            let tempConfigUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${myUnitId}&configNames=${configName1}&configNames=${configName2}&configNames=${configName3}&configNames=${configName4}&configNames=${configName5}&configNames=${configName6}&configNames=${configName7}&configNames=${configName8}&configNames=${configName9}&configNames=${configName10}&configNames=${configName11}`;
            commonAjax("post",tempConfigUrl,{},function(){},
                function(res) {
                    if(res.status == 200) {
                        configMap = res.data;
                        createFeedback(res.data);
                    }else{
                        layer.msg("加载配置信息失败");
                    }
                }
            )
        }
        //构建tab头
        let createUploadHtml = function(type,page){
            if(type==1){
                return `<li class="tab-default layui-this" data-type="js-project-tab">第${page}页</li>`;
            }else if(type==2){
                return `<li class="tab-default" data-type="js-project-image">第${page}页</li>`;
            }else if(type==3){
                return `<li class="tab-default" data-type="js-project-people">第${page}页</li>`;
            }else if(type==4){
                return `<li class="tab-default" data-type="js-project-textbook">第${page}页</li>`;
            }else{
                return ``;
            }
        }

        //处理tab页，该可能是配置获得的，需要动态构建
        let createFeedback = function (datas) {
            //构建tab页
            let tabArr = tool.createFeedbackTab(datas,1,configName2,configName6);
            //第一页分析必填项构建
            tool.createFeedbackAnalyse(datas,reqInfoObj,configName4);
            //构建图片上传页
            if(tabArr.indexOf(2) > 0 || tabArr.indexOf("2") > 0) {
                fileUpObj = tool.createFeedbackImgUp(datas,fileUpObj,configName1,1);
                fileUpload();//文件上传按钮监听
            }
            //构建审核表上传页
            if(tabArr.indexOf(7) > 0 || tabArr.indexOf("7") > 0) {
                fileUpObj2 = tool.createFeedbackProcessUp(datas,fileUpObj2,configName10,1);
                fileUpload2();//文件上传按钮监听
            }
        }

        
        //给项目反馈信息赋值
        let createProjectTab = function(datas){
            let propertyObj = {"trainAnalyse":".js-trainAnalyse","questionSuggest":".js-questionSuggest","textbookWorks":".js-textbook-works","textbookType":"#textbookType","coursePeriod":".js-course-period","writeTime":".js-write-time","writeUnitPeople":".js-textbook-unit","textbookName":".js-teaxtbook-name","textbookSummary":".js-textbook-summarize"};
            if(datas == null) return;
            for (const key in propertyObj) {
                datas.hasOwnProperty(key) && $(propertyObj[key]).val(datas[key])
            }
            $("#textbookType2").val(datas["textbookType"]);
            form.render('select');
        }
        //创建项目上传图片的tab页
        let createImageTab = function(datas){
            //ajax请求获取该页面的数据
            if (datas == null) return;
            //图片渲染
            for (let i = 0; i < datas.length; i++) {
                let htmlText = `<li file-id="${datas[i]["feedbackFileId"]}">` +
                    `<a class="layui-btn layui-btn-xs btn-normal-row js-file-name" msg="${datas[i]["fileName"]}" filePath="${datas[i]["filePath"]}" onmouseover="mouseoverImageName(this)" onmouseout="mouseoutImageName(this)" onclick="downloadFeedFile(this)">${datas[i]["fileName"]}</a>`;
                $(`.js-feedback${datas[i].fileType}`).append(htmlText);
            }
        }
        
        //打开审批信息弹窗
        let openApprovalTextWindow = function(title="审批意见",content=false,area,shadeClose=false,closeBtn=1){
            approvalIndex = layer.open({
                type: 1,
                title: title,
                content: content,
                closeBtn:closeBtn,
                area: area,
                shadeClose: shadeClose
            })
        }
        //按钮点击事件
        let onClickBtn = function(){
            let approvalType = 0;
            //上一页
            $('.js-last').click(function(){
                let liElems = $('.js-tabs').children();
                for(let i=0;i<liElems.length;i++){
                    if(liElems[i].classList.contains("layui-this")){
                        liElems[i-1].click();
                        break;
                    }

                            $("#inspectTable").removeClass("layui-btn-disabled");
                            $("#inspectTable").attr("disabled", false);
                        }
                        if(elem.parentElement.classList.contains("inspect-img")) {
                            $("#inspectImg").removeClass("layui-btn-disabled");
                            $("#inspectImg").attr("disabled", false);
                        }
                        layer.msg(res.msg);
                    } else {
                        layer.msg(res.msg);
                    }
                },
                fail: function () {
                    closeLoading();
                    layer.msg("删除失败");
                }
            });
        }


         //tab页点击
        element.on('tab(tabcheck)', function(data){
            let num=data.index;
            let dataType = this.getAttribute("data-type");
            //全部隐藏
            $(".js-tab-page").addClass("js-hidden");
            $("."+dataType).removeClass("js-hidden");
            //存在就不创建，只需要解除hidden
            if($("."+dataType)[0].getAttribute("data-id")!=nowDownId && nowDownId != undefined){
                //获取数据并构建，同时还会设置到隐藏按钮
                changeStatusBtn(dataType);
            }
            //触发隐藏下面的按钮
            handlerNextAndLastBtns(num+1,dataType);
        });

        //预览
        window.onclickView = function (tabType) {
            if (tabType == 'js-project-tab') {
                layer.open({
                    title: '项目反馈表',
                    type: 2,
                    area: ['100%', '100%'],
                    content: 'CmeProjFeedbackPdf.html?downId=' + nowDownId + '&projId=' + nowProjectId + '&batch=' + nowBatch,
                });
            } else if (tabType == 'js-project-people') {
                layer.open({
                    title: '授分人员明细表',
                    type: 2,
                    area: ['100%', '100%'],
                    content: 'CmeProjFeedbackPeoplePdf.html?downId=' + nowDownId + '&projId=' + nowProjectId + '&batch=' + nowBatch,
                });
            } else if (tabType == 'js-project-textbook') {
                layer.open({
                    title: '教材明细',
                    type: 2,
                    area: ['100%', '100%'],
                    content: 'CmeProjFeedbackTextbookPdf.html?downId=' + nowDownId + '&projId=' + nowProjectId + '&batch=' + nowBatch,
                });

            } else if (tabType == 'js-inspect') {
                layer.msg("待开发。。。");

            }
            
        }

        //下载
        window.onclickDownload = function (tabType) {
            if (tabType == 'js-project-tab') {
                downloadPDF(tabType, "项目反馈信息");
            } else if (tabType == 'js-project-image') {
                downloadZip(tabType, "执行情况反馈课程图片");
            } else if (tabType == 'js-project-people') {
                downloadPDF(tabType, "授分人员明细表");
            } else if (tabType == 'js-project-textbook') {
                downloadPDF(tabType, "教材明细");
            } else if (tabType == 'js-inspect') {
                layer.msg("待开发。。。");

            } else {//全部下载
                downloadZip(tabType, "执行情况反馈相关文件");
            }
            
        }

        function downloadPDF(type, pdfName) {
            let index = layer.open({
                title    : '',
                closeBtn : 0,
                btn      : [],
                shade    : 0.3,
                content  :'<i class="layui-icon layui-icon-loading-1 layui-anim layui-anim-rotate' +
                    ' layui-anim-loop" style="font-size: 36px; margin-right: 15px; position: relative;' +
                    ' top: 7px;"></i><span id="packageMsg">正在导出，请稍候</span>',
                time     : 0
            });
            axios({
                    method: 'POST',
                    url: huayi_projectscore_url + "cmeProjFeedbackFile/downloadPdf",
                    params       : {downId:nowDownId, type:type, batch:nowBatch, projectId:nowProjectId, unitId:myUnitId},
                    responseType : 'blob'
                }).then(res => {
                    if (res.data.size < 100) {
                        layer.msg('未查询到信息', { icon: 7, time: 2000 });
                        return false;
                    }
                    const   blob = new Blob([res.data], { type: 'application/zip' }), // new一个二进制对象
                            url  = window.URL.createObjectURL(blob), // 转化为url
                            link = document.createElement('a'); // 创建个a标签
                    link.href = url;
                    link.download = pdfName + '.pdf'; // 重命名
                    link.click();
                    URL.revokeObjectURL(url); // 释放内存
                    layer.close(index);
                    layer.msg('导出完成', { icon: 1, time: 1500 });
                }).catch(function (thrown) {
                    layer.close(index);
                    if (axios.isCancel(thrown)) {
                        console.log('Request canceled', thrown.message);
                    } else {
                        console.error('Request failed', thrown);
                        layer.msg('导出失败', { icon: 2, time: 1500 });
                    }
                });
        }

        function downloadZip(type, pdfName) {
            let index = layer.open({
                title    : '',
                closeBtn : 0,
                btn      : [],
                shade    : 0.3,
                content  :'<i class="layui-icon layui-icon-loading-1 layui-anim layui-anim-rotate' +
                    ' layui-anim-loop" style="font-size: 36px; margin-right: 15px; position: relative;' +
                    ' top: 7px;"></i><span id="packageMsg">正在导出，请稍候</span>',
                time     : 0
            });
            axios({
                method       : 'POST',
                url          : huayi_projectscore_url + '/cmeProjFeedbackFile/downloadZip',
                params       : {downId:nowDownId, type:type, batch:nowBatch, projectId:nowProjectId, unitId:myUnitId},
                responseType : 'blob'
            }).then(res => {
                if (res.data.size < 100) {
                    layer.msg('未查询到信息', { icon: 7, time: 2000 });
                    return false;
                }
                const   blob = new Blob([res.data], { type: 'application/zip' }), // new一个二进制对象
                        url  = window.URL.createObjectURL(blob), // 转化为url
                        link = document.createElement('a'); // 创建个a标签
                link.href = url;
                link.download = pdfName + '.zip'; // 重命名
                link.click();
                URL.revokeObjectURL(url); // 释放内存
                layer.close(index);
                layer.msg('导出完成', { icon: 1, time: 1500 });
            }).catch(function (thrown) {
                layer.closeAll();
                if (axios.isCancel(thrown)) {
                    console.log('Request canceled', thrown.message);
                } else {
                    console.error('Request failed', thrown);
                    layer.msg('导出失败', { icon: 2, time: 1500 });
                }
            });
        }

        //文件下载或者文件另一个窗口打开
        window.downloadFeedFile = function(elem){
            let filePath = elem.getAttribute("filePath");
            let fileName = elem.innerText;
            if(fileName.indexOf(".jpg") >0||fileName.indexOf(".png") >0 || fileName.indexOf(".bmp") > 0 || fileName.indexOf(".JPG")>0 || fileName.indexOf(".PNG")>0 || fileName.indexOf(".BMP")>0||fileName.indexOf(".pdf")>0 || fileName.indexOf(".PDF")>0){
                window.open(filePath);
            }else{
                tool.downloadUseIfram(filePath);
            }
        }

    });

    //鼠标移入弹出文件信息
    let mouseoverImageName = function(elem){ showTips(elem.getAttribute("msg"), elem, '#000000', '#d3d3d3'); }

    //鼠标移出关闭文件信息
    let mouseoutImageName = function(elem){ closeTips(); }

    
</script>
