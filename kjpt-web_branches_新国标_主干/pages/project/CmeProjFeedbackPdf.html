<body>

    <button id="download_btn" class='layui-btn layui-btn-sm'><i class="layui-icon layui-icon-download-circle"></i>下载

<div class="container" id="pdf_container">

    <div class="table_big a4_portrait">
        <div class="table_title">
            <h1 style="font-weight: bold;">项目反馈表</h1>
        </div>
        <div class="table_div">
            <table class="table_info" id="table1">
                <tbody>
                <tr>
                    <td class="txt_title" style="width: 26px;">项目名称</td>
                    <td colspan="3" class="txt_content" id="projName"></td>
                </tr>
                <tr>
                    <td class="txt_title" style="width: 20%;">项目编号</td>
                    <td class="txt_content" id="projNo" style="width: 30%;"></td>
                    <td class="txt_title" style="width: 20%;">举办地点</td>
                    <td class="txt_content" id="studyAddress" style="width: 30%;"></td>
                </tr>
                <tr>
                    <td class="txt_title" style="width: 26px;">填报单位</td>
                    <td colspan="3" class="txt_content" id="unitName"></td>
                </tr>
                <tr>
                    <td class="txt_title" style="width: 100px;">开始时间</td>
                    <td class="txt_content" id="startDt"></td>
                    <td class="txt_title" style="width: 100px;">结束时间</td>
                    <td class="txt_content" id="endDt"></td>
                </tr>
                <tr>
                    <td class="txt_title" style="width: 26px;height: 100px;">实际培训效果分析</td>
                    <td colspan="3" class="txt_content" id="trainAnalyse"></td>
                </tr>
                <tr>
                    <td class="txt_title" style="width: 26px;height: 100px;">存在的问题和建议</td>
                    <td colspan="3" class="txt_content" id="questionSuggest"></td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

</div>

</body>


<script>
    $(function () {
        let unitId = localStorage.getItem("unit-id");
        var downId = getUrlParamByName('downId');
        var projId = getUrlParamByName('projId');
        var batch = getUrlParamByName('batch');
        let gProjectVo;
        let studyAddress = "";
        $.ajax({
            type: 'post',
            url: huayi_projectscore_url + "cmeProjFeedbackInfo/getInfoByDownId",
            data: { downId: downId },
            success: function (res) {
                if(res.status != 200) {
                    layer.msg(res.msg);
                    return;
                }

                gProjectVo = res.data;
                renderProject(gProjectVo);
            },
            error: function (res) {
                layer.msg(res.msg);
            }
        });

        $.ajax({
            type: 'post',
            url: huayi_projectscore_url + "cmeProjFeedbackApproval/getApplyFeedbacks",
            data: { projectId: projId, unitId:unitId },
            success: function (res) {
                if(res.status != 200) {
                    layer.msg(res.msg);
                    return;
                }

                studyAddress = res.data[batch-1].studyAddress;
                gProjectVo = res.data[batch-1];
                renderProject(gProjectVo);

                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + "cmeCmeProjTeach/getCourcesByDownId",
                    data: { downId: downId },
                    success: function (res) {
                        if(res.status != 200) {
                            layer.msg(res.msg);
                            return;
                        }
                        var tr = '<tr>' +
                                '<td class="txt_title" style="width: 26px;">课程名称</td>' +
                                '<td class="txt_title" style="width: 26px;">教师名称</td>' +
                                '<td class="txt_title" style="width: 26px;">学时</td>' +
                                '<td class="txt_title" style="width: 26px;">授课地点</td>' +
                                '</tr>';
                        var data = res.data;
                        for (var i = 0; i < data.length; i++) {
                            tr += '<tr>' +
                                    '<td class="txt_content">' + data[i].teachSubject + '</td>' +
                                    '<td class="txt_content">' + data[i].teacherNames + '</td>' +
                                    '<td class="txt_content">' + data[i].period + '</td>' +
                                    '<td class="txt_content">' + studyAddress + '</td>' +
                                '</tr>';
                        }
                        $('#table1').append(tr);
                    },
                    error: function (res) {
                        layer.msg(res.msg);
                    }
                });
            },
            error: function (res) {
                layer.msg(res.msg);
            }
        });

        

        function renderProject(projectVo) {
            if (!projectVo) {
                return false;
            }
            Object.keys(projectVo).forEach(key => {
                let $dom = $('#' + key);
                let val = projectVo[key];
                if (($dom.length > 0) && (typeof val) !== 'object') {
                    val = String(val);

                    $dom.text(val) || $dom.val(val);

                }
            });

        }

    });
</script>

</style>
