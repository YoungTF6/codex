<script>
    // 获取sessionStorage的值。
    var localTest = layui.data('attendanceInfo');
    var teachId=localTest.teachId;

    var speed = 10;
    var slide = document.getElementById("slide");
    var slide2 = document.getElementById("slide2");
    var slide1 = document.getElementById("slide1");
    slide2.innerHTML = slide1.innerHTML

    function Marquee() {
        if (slide2.offsetTop - slide.scrollTop <= 0)
            slide.scrollTop -= slide1.offsetHeight
        else {
            slide.scrollTop++
        }
    }

    var MyMar = setInterval(Marquee, speed)
    slide.onmouseover = function () {
        clearInterval(MyMar)
    };
    slide.onmouseout = function () {
        MyMar = setInterval(Marquee, speed)
    }

</script>
<script>
    var a=1;
    var isItTheFirstTime=true;
    // var qrcode = new QRCode(document.getElementById("qrCodeForTeach"), {
    //     width : 380,
    //     height : 380,
    //     correctLevel : QRCode.CorrectLevel.L
    // });
    // 获取实时签到信息表及已签到人数。
    function getAttendanceList(){
        var liForUl='';
        document.getElementById("listForAttendance").innerHTML=liForUl;
        // 获取一考勤人数列表
        $.ajax({
            type: 'get',
            url: huayi_projectscore_url + 'cmeProjAttendance',
            data: {
                teachId: teachId,
                online: localTest.online,
                isItTheFirstTime:isItTheFirstTime
            },
            contentType: 'application/json;charset=UTF-8',
            dataType: 'json',
            success: function (res) {
                for (var i=0;i<res.data.list.length;i++) {
                    if (res.data.list[i].personId =='0'){
                        continue;
                    }
                    liForUl=liForUl+ '<li class="right_lis">\n' +
                        // '<img src='+res.data.list[i].photo +'alt="" class="right_img">\n' +
                        '<img src="images/head_img.png" alt="" class="right_img">\n' +
                        '\n' +
                        '<div class="right_cont">\n' +
                        '<p class="right_news">姓名： <span>' + res.data.list[i].personName + '</span></p>\n' +
                        '<p class="right_text">考勤时间： <span>' + res.data.list[i].attendanceDate + '</span></p>\n' +
                        '\n' +
                        '<img src="images/prove_img.png" alt="" class="right_prove">\n' +
                        '</div>\n' +
                        '</li><br />';
                }
                document.getElementById("listForAttendance").innerHTML=liForUl;
                document.getElementById("total").innerHTML=res.data.total;          // 已考勤人数。
                isItTheFirstTime=false;
            },
            error: function () {
                layer.msg("失败");
            }
        })
    }    
    
    //获取单位
    window.getUnitId = function () {
        var unitId = localStorage.getItem("unit-id");
        return unitId;
    }

     /* 获取配置 */
     window.getConfig = function (config_name, scoreLevel) {
            $.ajax({
                async   : false,
                type    : 'post',
                url     : huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data    : { 
                    unitId       : window.getUnitId(), 
                    configNames  : config_name,
                    scoreLevelId : scoreLevel
                },
                success : function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error   : function () {
                    layer.msg('获取配置失败');
                }
            });
    }


    // 二维码生成及刷新
    function qrCodeForTeach(){

                // 二维码有效时间
        layui.data('attendanceInfo',{
            key: 'effectiveTime',
            value: a
        })
        // 添加当前登录用户所属套id
        layui.data('attendanceInfo',{
            key: 'cmeStandardKindId',
            value: localStorage.getItem("standardkind-id") =='{}' ? '' : localStorage.getItem("standardkind-id"),
        })
        // 时间戳
        $.ajaxSettings.async = false;
        $.getJSON("https://gettime.91huayi.com/GetTimeTicks.aspx?callback=?", function (data) {
            // 时间戳
            layui.data('attendanceInfo',{
                key: 'time',
                value: data.miao
            })

                    // 后台获取加密后的二维码内容，并重新渲染
        $.ajax({
            type: 'post',
            url: huayi_projectscore_url + 'cmeProjAttendance/generateQRCode',
            contentType: 'application/json;charset=UTF-8',
            data: JSON.stringify(layui.data('attendanceInfo')),
            async: false,
            dataType: 'json',
            success: function (res) {
                erweima=res.data.erweima;
                // qrcode.makeCode(erweima);
                $("#qrCodeForTeach").empty();
                $('#qrCodeForTeach').qrcode({
                    text: erweima,         //根据此串生成一个二维码
                    //render: "table",
                    //typeNumber: -1,
                    correctLevel: 0, //纠错等级
                    width:400,
                    height: 400     //设置高度
                });
            },
            error: function () {
                layer.msg("二维码生成失败");
            }
        })
            
        })
    }

    function selectChange(){
        a= $('select  option:selected').val();
        clearInterval(bb);
        clearInterval(cc);
        bb=setInterval("getAttendanceList()",a*1000);
        cc=setInterval("qrCodeForTeach()",a*1000);
        qrCodeForTeach()
    }

    var bb=setInterval("getAttendanceList()",a*1000);
    var cc=setInterval("qrCodeForTeach()",a*1000);


    window.getConfig("range_qrcode_valid_duration");

    function addSelect(){
        let seconds = (window["range_qrcode_valid_duration"]).split(',');
        seconds.forEach(e=>{
            let second = 0;
            let minute = 0;
            let hour = 0;
            let day = 0;
            let str = "";
            if (e <= 300){
                str = e+"秒";
                document.getElementById('selectForTime').options.add(new Option('二维码时效时间：'+str,e));
            }
            else if(e>300 && e<=60*60){
                str = e/60+"分钟";
                document.getElementById('selectForTime').options.add(new Option('二维码时效时间：'+str,e));
            }
            else if(e>=60*60 && e<=60*60*24){
                str = e/3600+"小时";
                document.getElementById('selectForTime').options.add(new Option('二维码时效时间：'+str,e));
            }
            else{
                str = e/86400+"天";
                document.getElementById('selectForTime').options.add(new Option('二维码时效时间：'+str,e));
            }
        });
    }

    // 全局配置及引入相关的模块
    layui.use(['table', 'form'], function () {
        var layer=layui.layer;
        var $=layui.jquery;
        layer.ready(function () {
            // 获取课程信息
            $.ajax({
                type: 'get',
                url: huayi_projectscore_url + 'cmeCmeProjTeach/checkOnWorkAttendance?projTeachId='+teachId,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    var obj=res.data[0];
                    document.getElementById("teachSubject").innerHTML=res.data[0].teachSubject;          // 课题名称
                    document.getElementById("teacherName").innerHTML=res.data[0].teacherNames;        // 教师名称
                    document.getElementById("startDate").innerHTML=res.data[0].startDate;          //开始时间
                    document.getElementById("endDate").innerHTML=res.data[0].endDate;            //结束时间
                    document.getElementById("studyAddress").innerHTML=localTest.address === "" || null ? "没有设置考勤地址" : localTest.address;            //授课地址
                    document.getElementById("fanwei").innerHTML= localTest.scope === "0" || null ? "无限制" : localTest.scope;
                    document.getElementById("limitPerson").innerHTML= localTest.online === "" || null  ? '无上限' : localTest.online;         //考勤上线
                },
                error: function () {
                    layer.msg("失败");
                }
            })
            addSelect();
            selectChange();
        })
    })
</script>
