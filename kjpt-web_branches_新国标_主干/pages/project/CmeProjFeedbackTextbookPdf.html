<script>
    $(function () {
        let unitId = localStorage.getItem("unit-id");
        var downId = getUrlParamByName('downId');
        var projId = getUrlParamByName('projId');
        var batch = getUrlParamByName('batch');
        let gProjectVo;
        $.ajax({
            type: 'post',
            url: huayi_projectscore_url + "cmeProjFeedbackInfo/getInfoByDownId",
            data: { downId: downId },
            success: function (res) {
                if(res.status != 200) {
                    layer.msg(res.msg);
                    return;
                }

                gProjectVo = res.data;
                renderProject(gProjectVo);
            },
            error: function (res) {
                layer.msg(res.msg);
            }
        });

        function renderProject(projectVo) {
            if (!projectVo) {
                return false;
            }
            Object.keys(projectVo).forEach(key => {
                let $dom = $('#' + key);
                let val = projectVo[key];
                if (key === 'textbookType') {
                    val = val == null ? '' : val === 1 ? '文字教材' : '音像教材';
                }
                if (($dom.length > 0) && (typeof val) !== 'object') {
                    val = String(val);

                    $dom.text(val) || $dom.val(val);

                }
            });

        }

    });
</script>
