<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="threeDayHoldProj" lay-filter="threeDayHoldProj"></table>
            </div>
            <!-- 弹窗,展示链接 -->
            <!-- <div id="showPolyvUrl" style=" display:none;text-align: center;width: 100%;height:100%">

                    <div class="polyv-box-flex">
                        <div>直播观看地址</div>
                        <div class="polyv-url js-polyv-url"></div>
                    </div>
                </div>
            </div> -->
        </div>
    </div>
    
<!--表格内数据编辑、删除按钮、holdQualification是举办权限，如果为true才能举办-->
<script type="text/html" id="rowBar">
    {{# if(d.channelId !=null && d.channelId != "") {  }}
    <a class="layui-btn layui-btn-xs" lay-event="viewPolyv">观看直播</a>
    {{# } }}
    <!-- <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="viewUrl">直播信息浏览</a> -->
</script>

<script>
    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool',
    });

    layui.use(['table', 'form', 'laydate', 'tool'], function () {
        var table = layui.table, form = layui.form, $ = layui.jquery, tool = layui.tool;
        var laydate = layui.laydate;
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        window.layer = layui.layer;
        window.loading;
        window.ajaxNum = 0;

        //关闭closeLoading的判断
        let closeLoading = function () {
            ajaxNum--;
            if (ajaxNum <= 0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function () {
            if (ajaxNum == 0) loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
            ajaxNum++;
        }
        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                data: data,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    closeLoading();
                    if(res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }

        let getThreeDayDown = function() {
            let downUrl = huayi_projectscore_url + 'projPolyv/getThreeDayDown?cmeStandardKindId='+cmeStandardKindId;
            commonAjax("post",downUrl,{},
                function(){
                    layer.msg("系统异常");
                },
                function(res){
                    if (res.status === 200) {
                        getDownCources(res.data);
                    }
                    else { layer.msg(res.msg); }
                })
        }
  
        //获取该周期的课程信息
        let getDownCources = function (downData) {
            //渲染表格
            table.render({
                elem: '#threeDayHoldProj',
                data: downData,
                cols: [[
                    { align: 'center', minWidth: 80, toolbar: '#rowBar', title: '操作', fixed: 'left' },
                    { field: 'projName', title: '项目名称', sort: true, align: "center" },
                    { field: 'batch', title: '批次', sort: true, align: "center",
                        templet: function (d) {
                            return `第${d.batch}批次`;
                        } 
                    },
                    { field: 'unitName', title: '举办单位', sort: true, align: "center" },
                    { field: 'startDt', title: '开始时间', sort: true, align: "center"},
                    { field: 'endDt', title: '结束时间', sort: true, align: "center"}
                ]],
                cellMinWidth: 100,
                id: "threeDayHoldProj",
                page: false,
                limit: 1000,
                done: function (res, curr, count) {  },
                error: function () {  }
            });
        }

        // 监听行内按钮
        table.on('tool(threeDayHoldProj)', function (obj) {
            var datas = obj.data;
            obj.event == "viewPolyv" && goViewPolyv(datas.downId);
            // obj.event == "viewUrl" && viewUrl(datas);
        });

        //进入直播观看页面
        let goViewPolyv = function(downId) {
            let viewUrl = huayi_projectscore_url + 'projPolyv/getUserWatchUrl?downId='+downId;
            commonAjax("post",viewUrl,{},
                function(){
                    layer.msg("系统异常");
                },
                function(res){
                    if (res.status === 200) {
                        window.open(res.data);
                    }
                    else { layer.msg(res.msg); }
                })
        }

        //查看直播链接，拥有外部登录
        // let viewUrl = function(data) {
        //     if(data.channelId==null || data.channelId ==""){
        //         layer.msg("该项目未建立直播信息");
        //         return;
        //     }
        //     //获取外部链接
        //     let polyvUrl = "https://live.polyv.cn/watch/"+data.channelId;
        //     layer.open({
        //         type: 1,
        //         title: '直播信息浏览',
        //         content: $('#showPolyvUrl'),
        //         area: ['90%', '150px'],
        //         success: function(){
        //             let htmlText = `
        //                 <div class="js-polyv-url">${polyvUrl}</div>
        //                 `;
        //             $(".js-polyv-url").html(htmlText);
        //         },
        //         cancel: function(index, layer){}
        //     });
        // }


        //页面初始化
        let htmlInit = function () {
            getThreeDayDown();
        }
        htmlInit();

    });
</script>
</body>

</html>
