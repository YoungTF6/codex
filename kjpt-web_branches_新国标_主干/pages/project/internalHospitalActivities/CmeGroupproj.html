<script>
    var projectStatus = 0;
    const _standardKindId = localStorage.getItem('standardkind-id');
    const _unitId = localStorage.getItem('unit-id');
    const _isHainan = '6eec6713-670a-43cc-ad4d-9bd700a92928' === _standardKindId; // 海南
    const _isShanxiJin = 'db0d980b-03d4-4c9c-b2d4-9f890109ed47' === _standardKindId; // 山西
    const _isGuangxi = StandardKind.GUANG_XI === _standardKindId;//广西
    const _isGansu = '7068a5c0-2cd3-471a-90b9-9bf100aec95a' === _standardKindId;//甘肃
    const _isjilin = 'acd09b62-333b-4aee-934f-9ec500a9d46d' === _standardKindId;//吉林
    const _isZheJiang = '190c480d-d43c-450b-8472-a6fd00a6729d' === _standardKindId;//浙江
    const _isFujian = '8b1e9418-47ff-4ff7-9dd9-a9e0009a6951' === _standardKindId;//福建
    const _isGuangDong = `289bf0ca-52cb-4b19-b737-9bd200a69ce1` === _standardKindId;//广东
    const _isNingxia = 'eee87ca0-7df1-426c-aae3-7cae782b4d6b' === _standardKindId;//宁夏
    const _isHenan = 'a6280900-a9c2-11ec-84d6-fa163e9b64fb' === _standardKindId;//河南
    const _isNeiMeng = StandardKind.NEI_MENG === _standardKindId;//内蒙
    const _isQingHai = StandardKind.QING_HAI === _standardKindId;//青海
    const _isSiChuan = StandardKind.SI_CHUAN === _standardKindId;//四川
    const  scanAttendLable = _isGuangDong ? "考勤设置" : "扫码考勤";
    
    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    }).use(['table', 'form', 'element', 'laydate', 'tool', 'treeSelect'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        let tool = layui.tool;
        var treeSelect = layui.treeSelect;
        var element = layui.element, laydate = layui.laydate;

        const tabIdByUrl = getUrlParamByName('tabId');
        const tabareaIdByUrl = getUrlParamByName('tabareaId');
        var tabIdCurrent = tabIdByUrl ? tabIdByUrl : 'tab_1_1'; // 当前选中的二级标签页
        var extendData = { holdState: 'NO_HOLD' }; // 签标签页的额外参数


        let gLayerIndex = -1;
        let gOpenedProjId = '';
        let gOpenedProjPeriod = 0;
        let gCmeYear = (new Date()).getFullYear();
        const BATCH_APPLY_PENDING_TAB_ID = 'tab_2_6';
        const BATCH_FEEDBACK_PENDING_TAB_ID = 'tab_3_6';

        function isFeedbackScoreCheckPass() {
            window.getConfig('fun_feedback_score_check_pass');
            return window['fun_feedback_score_check_pass'] == '1';
        }

        function getBatchApprovalConfig() {
            if (!_isHenan) return null;
            if (tabIdCurrent === BATCH_APPLY_PENDING_TAB_ID) {
                return {
                    endpoint: 'cmeGroupProjCycleApplication/batchApproval',
                    buildPayload(action, approvalContent, groupProjIds) {
                        return {
                            groupProjIds: groupProjIds,
                            action: action,
                            approvalContent: approvalContent || '',
                            unitId: localStorage.getItem('unit-id'),
                            userType: Number(localStorage.getItem('user-type')),
                            unitUserType: Number(localStorage.getItem('unit-user-type'))

        function callBatchApproval(action, approvalContent) {
            let batchConfig = getBatchApprovalConfig();
            if (!batchConfig) {
                return;
            }
            let groupProjIds = getSelectedGroupProjIds();
            if (groupProjIds.length === 0) {
                layer.msg('请先选择活动记录');
                return;
            }
            let loadingIndex = layer.load(1, {shade: 0.2});
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + batchConfig.endpoint,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                data: JSON.stringify(batchConfig.buildPayload(action, approvalContent, groupProjIds)),
                success: function (res) {
                    if (res.status === 200) {
                        layer.msg(res.msg || '批量审核完成');
                        loaderTable();
                    } else {
                        layer.msg(res.msg || '批量审核失败');
                    }
                },
                error: function () {
                    layer.msg('批量审核请求失败');
                },
                complete: function () {
                    layer.close(loadingIndex);
                }
            });
        }

        window.showProjApplyAndFeedback = function(scoreLevelId) {
            let arr = window["json_score_level_ids_open_apply_and_feedback"];
            if (arr == undefined) return false;
            // 如果 arr 是字符串，尝试解析成数组
            if (typeof arr === 'string') {
                try {
                    arr = JSON.parse(arr);
                } catch (e) {
                    return false; // JSON 解析失败，默认隐藏

            if (!Array.isArray(arr)) return false;
            return arr.includes(scoreLevelId);
        };

                    if (tabId.startsWith('tab_1')) {

                        $('#tab_1_6').html('学分待审核&nbsp;&nbsp;(' + data.SCORE_TO_CHECK + ')');
                    } else if (tabId.startsWith('tab_2')) {
                        // $('#tab_2_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_2_1').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_2_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                        if (0 < data.BACK) $('#tab_2_4').addClass('shake_tab');
                        $('#tab_2_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                        $('#tab_2_6').html('待审核&nbsp;&nbsp;(' + data.NO_CHECK + ')');

                            $('#knowledgeTwo_id').append("<option value=\"" + res.data.knowledge[i].knowledgeId + "\">" + res.data.knowledge[i].knowledgeName + "</option>");

                            $('#holdType').append("<option value=\"" + res.data.holdType[i].holdTypeId + "\">" + res.data.holdType[i].holdTypeName + "</option>");

                }

            let cgv = window["value_forbid_some_operate_on_last_year_data"];
            if(cgv == null || cgv == "") {
                return true;
            }

            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
        }
