<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>院内活动表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="/js/layui-v2.6.8/layui/layui.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script src="/js/common.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <script type="text/javascript" src="/js/tools/dict_tool.js"></script>

    <style type="text/css">
        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }

        .layui-tab-content {
            padding: 0 !important;
        }

        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }

        /* card tabs */
        .layui-tab-card-1 {
            background-color: #F5F5F5;
            padding: 10px 30px 0 30px;
            border: 0;
            box-shadow: none;
        }

        .layui-tab-title-1 {
            background-color: #f5f5f5 !important;
            height: auto;
            border: 0;
        }

        .layui-tab-title-1 li {
            margin-right: 40px !important;
            padding: 0;
            line-height: 32px;
            border: 0;
            border-bottom: 3px solid #F5F5F5;
            background-color: #F5F5F5;
            color: #404040;
        }

        .layui-tab-title-1 li:hover {
            background-color: #F5F5F5;
            color: #404040;
            opacity: 1;
        }

        .layui-tab-title-1 .layui-this {
            background-color: #f5f5f5 !important;
            color: #009688;
            border-bottom: 3px solid #009688;
        }

        .layui-tab-title-1 .layui-this:hover {
            color: #009688;
        }

        .layui-tab-title-1 .layui-this:after {
            border: 0;
        }

        .layui-tab-content.padding-0 {
            padding: 0;
        }
        .tab-title {
            display: flex;
        }

        .tab-title li {
            margin-right: 20px;
            padding: 8px 0;
            text-align: center;
            cursor: pointer;
        }

        /* 标签抖动 */
        .shake_tab {
            text-align: center;
            animation: shakeH .6s ease-in-out infinite alternate;
        }

        .hide {
            display: none;
        }

        /* 新增代码 */

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .layui-layer-setwin .layui-layer-close2 {
            right: -15px !important;
            top: -15px !important;
        }
        .batch-confirm-no-icon .layui-layer-ico {
            display: none !important;
        }
        .batch-confirm-no-icon .layui-layer-padding {
            padding-left: 20px !important;
        }

        .layui-treeSelect .ztree li {
            line-height: 19.5px !important;
        }
        .width_23_calc {
            width: calc(23%);
        } 
        .layui-table-fixed .layui-table-cell {
            height: auto;
            white-space: normal; 
        }
        .layui-table-cell {
            height: auto;
        }
    </style>
</head>

<body style="background: #fff;">

    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-tab" lay-filter="tabarea" id="tabarea">
          
                <ul class="layui-tab-title">
                    <li id="tab_1" lay-id='tab_1' class="tab-default layui-this">举办状态</li>
                    <li id="tab_2" lay-id='tab_2' class="tab-default" style="display: none">举办前申请情况</li>
                    <li id="tab_3" lay-id='tab_3' class="tab-default" style="display: none">执行情况反馈情况</li>                   
                </ul>
                <div class="layui-tab-content">
                    <div class="layui-tab-item">
                        <div class="layui-tab layui-tab-card layui-tab-card-1" lay-filter="tabarea_1" id="tabarea_1">
                            <ul class="layui-tab-title layui-tab-title-1">
                                <li id="tab_1_0" lay-id="tab_1_0">全部</li>
                                <li id="tab_1_5" lay-id="tab_1_5">部分已举办</li>
                                <li id="tab_1_1" lay-id="tab_1_1" class="layui-this">已举办</li>
                                <li id="tab_1_2" lay-id="tab_1_2">未举办</li>
                                <li id="tab_1_3" lay-id="tab_1_3">逾期未举办</li>
                                <!-- <li id="tab_1_4" lay-id="tab_1_4">学分待审核</li> -->
                            </ul>

                        </div>
                    </div>
                    <div class="layui-tab-item">
                        <div class="layui-tab layui-tab-card layui-tab-card-1" lay-filter="tabarea_2" id="tabarea_2">
                            <ul class="layui-tab-title layui-tab-title-1">
                                <li id="tab_2_1" lay-id="tab_2_1" class="layui-this">待审核</li>
                                <li id="tab_2_2" lay-id="tab_2_2">退回修改</li>
                                <li id="tab_2_3" lay-id="tab_2_3">审核通过</li>
                                <li id="tab_2_4" lay-id="tab_2_4">审核不通过</li>
                                <li id="tab_2_5" lay-id="tab_2_5">未申请</li>
                            </ul>
                        </div>
                    </div>
                    <div class="layui-tab-item">
                        <div class="layui-tab layui-tab-card layui-tab-card-1" lay-filter="tabarea_3" id="tabarea_3">
                            <ul class="layui-tab-title layui-tab-title-1">
                                <li id="tab_3_1" lay-id="tab_3_1" class="layui-this">待审核</li>
                                <li id="tab_3_2" lay-id="tab_3_2">退回修改</li>
                                <li id="tab_3_3" lay-id="tab_3_3">审核通过</li>
                                <li id="tab_3_4" lay-id="tab_3_4">审核不通过</li>
                                <li id="tab_3_5" lay-id="tab_3_5">未反馈</li>
                                <li id="tab_3_7" lay-id="tab_3_7" style="display: none">未反馈</li>
                                <li id="tab_3_8" lay-id="tab_3_8" style="display: none">已反馈</li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div>
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <form id="form-query">
                            <div class="layui-inline width_23_calc">
                                <label class="layui-form-label">举办年度</label>
                                <div class="layui-input-block">
                                    <select name="cmeYear" id="cmeYear" lay-filter="cmeYear"></select>
                                </div>
                            </div>

                            <!-- 项目级别 -->
                            <div class="layui-inline width_23_calc tree-select">
                                <label class="layui-form-label" name="lblActivityLevel"></label>
                                <div class="layui-input-block">
                                    <input type="text" autocomplete="off" class="layui-input" 
                                        lay-filter="scoreLevel" id="scoreLevel" name="scoreLevel" placeholder="请选择">
                                </div>
                            </div>

                            <!-- 活动形式 -->
                            <div class="layui-inline width_23_calc">
                                <label class="layui-form-label" name="lblActivityForm"></label>
                                <div class="layui-input-block">
                                    <select name="holdType" id="holdType" lay-filter="holdType"></select>
                                </div>
                            </div>
                            <!-- 活动内容（仅浙江显示） -->
                            <div class="layui-inline width_23_calc zhejiang_show" style="display:none;">
                                <label class="layui-form-label">活动内容</label>
                                <div class="layui-input-block">
                                    <select name="scoreType" id="scoreType_id">
                                        <option value="">全部</option>
                                        <option value="1">专业课</option>
                                        <option value="2">选修课</option>
                                        <option value="3">公需课</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline  width_23_calc">
                                <label class="layui-form-label" style="width: 85px;padding-right: 10px;" name="lblMedicalSystem"></label>
                                <div class="layui-input-block">
                                    <select name="medicalType" id="medicalType">
                                        <option value="">全部</option>
                                        <option value="1">西医</option>
                                        <option value="2">中医</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline width_23_calc">
                                <label class="layui-form-label">二级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeTwo" id="knowledgeTwo_id" lay-filter="knowledge_search_filter" lay-verify="required">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline width_23_calc">
                                <label class="layui-form-label">三级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeId" id="knowledgeId_id" lay-verify="required">
                                        <option value="">请先选择二级学科</option>
                                    </select>
                                </div>
                            </div>

                            <div class="layui-inline width_23_calc">
                                <label class="layui-form-label" style="width: 85px;padding-right: 10px;">院内活动名称</label>
                                <div class="layui-input-block">
                                    <input type="text" name="groupProjectName" id="groupProjectName_id" required lay-verify="required" placeholder="请输入院内活动名称"
                                        autocomplete="off" class="layui-input">
                                </div>
                            </div>

                            <div class="layui-inline width_23_calc">
                                <label class="layui-form-label" style="width: 85px;padding-right: 10px;">举办开始日期</label>
                                <div class="layui-input-block">
                                    <input type="text" name="startDate" id="startDate_id" required lay-verify="required" placeholder="请选择开始时间范围" autocomplete="off"
                                        class="layui-input">
                                </div>
                            </div>

                        </form>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <!--        表格区域-->
            <div id="batchApproveToolbar" style="display:none;padding:8px 5px 0 5px">
                <button type="button" class="layui-btn layui-btn-sm layui-btn-primary" id="btnBatchSelectPage">本页全选</button>
                <button type="button" class="layui-btn layui-btn-sm" id="btnBatchPass">审核通过</button>
                <button type="button" class="layui-btn layui-btn-sm" id="btnBatchBack">退回修改</button>
                <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" id="btnBatchReject">审核不通过</button>
            </div>
            <div class="layui-card-body" style="padding:7px 5px">
                <table class="layui-table" id="cmeGroupproj" lay-filter="cmeGroupproj" style="margin: 0px 0px;">
                </table>
            </div>

        </div>
    </div>
</body>

    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="maintainTestPaper">试卷查看</a>

<script type="text/html" id="groupFbCell">
    {{# if(showProjApplyAndFeedback(d.scoreLevel) ){ }}
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="feedbackApproval">执行情况反馈</a>

<script>
    var projectStatus = 0;
    const _standardKindId = localStorage.getItem('standardkind-id');
    const _unitId = localStorage.getItem('unit-id');
    const _isHainan = '6eec6713-670a-43cc-ad4d-9bd700a92928' === _standardKindId; // 海南
    const _isQinghai = '6427ddba-c02f-4229-bd73-49fc1c5d21f6' === _standardKindId; // 青海
    const _isGansu = '7068a5c0-2cd3-471a-90b9-9bf100aec95a' === _standardKindId; // 甘肃
    const _isNeimeng = '08e44437-5789-44e0-8ff8-9ecb00a6348a' === _standardKindId; // 内蒙古
    const _isShanxiJin = 'db0d980b-03d4-4c9c-b2d4-9f890109ed47' === _standardKindId; // 山西
    const _isGuangxi = '4a6d91fb-8ba4-4560-a801-9c6f00e6d999' === _standardKindId;//广西
    const _isjilin = 'acd09b62-333b-4aee-934f-9ec500a9d46d' === _standardKindId;//吉林
    const _isFujian = '8b1e9418-47ff-4ff7-9dd9-a9e0009a6951' === _standardKindId;//福建
    const _isNeiMeng = StandardKind.NEI_MENG === _standardKindId;//内蒙
    const _isZheJiang = '190c480d-d43c-450b-8472-a6fd00a6729d' === _standardKindId;//浙江
    const _isHenan = 'a6280900-a9c2-11ec-84d6-fa163e9b64fb' === _standardKindId;//河南
    const _isSiChuan = StandardKind.SI_CHUAN === _standardKindId;//四川

    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    }).use(['table', 'form', 'element', 'laydate', 'tool', 'treeSelect'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        let tool = layui.tool;
        var treeSelect = layui.treeSelect;
        var element = layui.element, laydate = layui.laydate;
        var tabIdCurrent = 'tab_1_1'; // 当前选中的二级标签页
        var extendData = { holdState: 'NO_HOLD' }; // 签标签页的额外参数


        let gLayerIndex = -1;
        let gOpenedProjId = '';
        let gOpenedProjPeriod = 0;
        let gCmeYear = (new Date()).getFullYear();
        const BATCH_APPLY_PENDING_TAB_ID = 'tab_2_1';
        const BATCH_FEEDBACK_PENDING_TAB_ID = 'tab_3_1';

        function isFeedbackScoreCheckPass() {
            window.getConfig('fun_feedback_score_check_pass');
            return window['fun_feedback_score_check_pass'] == '1';
        }

        function getBatchApprovalConfig() {
            if (!_isHenan) return null;
            if (tabIdCurrent === BATCH_APPLY_PENDING_TAB_ID) {
                return {
                    endpoint: 'cmeGroupProjCycleApplication/batchApproval',
                    buildPayload(action, approvalContent, groupProjIds) {
                        return {
                            groupProjIds: groupProjIds,
                            action: action,
                            approvalContent: approvalContent || '',
                            unitId: localStorage.getItem('unit-id'),
                            userType: Number(localStorage.getItem('user-type')),
                            unitUserType: Number(localStorage.getItem('unit-user-type'))
                        };
                    }
                };
            }
            if (tabIdCurrent === BATCH_FEEDBACK_PENDING_TAB_ID) {
                return {
                    endpoint: 'cmeGroupProjFeedbackApproval/batchApproval',
                    buildPayload(action, approvalContent, groupProjIds) {
                        return {
                            groupProjIds: groupProjIds,
                            action: action,
                            approvalContent: approvalContent || '',
                            unitId: localStorage.getItem('unit-id'),
                            isCheckPassScore: isFeedbackScoreCheckPass()
                        };
                    }
                };
            }
            return null;
        }

        function isBatchPendingTab() {
            return !!getBatchApprovalConfig();
        }

        function toggleBatchToolbar() {
            let batchConfig = getBatchApprovalConfig();
            if (!batchConfig) {
                $('#batchApproveToolbar').hide();
                return;
            }
            $('#batchApproveToolbar').show();
        }

        // 表格相关操作
        // 表格配置
        window.loaderTable = function () {
            let whereData = {
                holdState: '',
                applyBeforeHoldState: '',
                feedbackState: '',
                cmeYear: $('#cmeYear').val(),
                scoreLevel: $('#scoreLevel').val(),
                holdType: $('#holdType').val(),
                medicalType: $('#medicalType').val(),
                knowledgeId: $('#knowledgeId_id').val(),
                groupProjectName: $('#groupProjectName_id').val(),
                startDate: $('#startDate_id').val(),
                unitId: localStorage.getItem("unit-id"),
                selUnitId: (localStorage.getItem("menu-unit-id") != null) ? localStorage.getItem("menu-unit-id") : _unitId,
                unitUserType: localStorage.getItem('unit-user-type'),
                cmeStandardKindId: _standardKindId,
                withCheckInfo: true,
                // 活动内容（仅浙江使用）
                scoreType: _isZheJiang ? ($('#scoreType_id').val() || '') : ''
            };

            whereData = {...whereData,...extendData};


            let cols = [[
                // 项目级别、是否已举办、添加账号、修改时间、代办科室。
                { align: 'center', width: 65, title: '序号', templet: '#rank',fixed:"left" },
                { field: 'groupProjectName', align: 'center',minWidth:300,  title: '活动名称' },
                { field: 'otherNo', align: 'center', title: '编号', hide: !_isShanxiJin },
                { title: '举办前申请', align: 'center', toolbar: '#projApplyRowBar',hide:(_isFujian || _isjilin || _isHainan || _isGuangxi || _isSiChuan)},
                { align: 'center', title: '授分人员考勤明细', minWidth: 150, 
                        templet: d => '<a class="layui-btn layui-btn-xs btn-normal-row" lay-event="attendanceInfo">查看</a>' },
                { title: '执行情况反馈', align: 'center', templet: '#groupFbCell',hide: (_isFujian || _isSiChuan) },
                { title: '项目评价表', align: 'center', toolbar: '#rowBar5' ,hide: _isjilin},
                { title: '试卷查看', align: 'center', toolbar: '#examPaperRowBar' ,hide: _isjilin},
                { title: '考试结果查看', align: 'center', toolbar: '#examResultRowBar' ,hide: _isjilin},
                { title: '实际举办日期', minWidth:250,align: 'center', templet: d => multilineFromStr(d.batchDate)  },
                { title: '参加人数', align: 'center' ,templet: d => multilineFromStr(d.batchScoreCount) },
                { field: 'unitName', title: '所在单位', align: 'center',hide: _isjilin },
                { field: 'scoreLevelName', minWidth: 250, title: projectLabels.lblActivityLevel, align: 'center' },
                // 活动内容（仅浙江显示）
                { field: 'scoreType', title: '活动内容', align: 'center', minWidth: 120, hide: !_isZheJiang,
                    templet: function(d){
                        switch (Number(d.scoreType)) {
                            case 1: return '专业课';
                            case 2: return '选修课';
                            case 3: return '公需课';
                            default: return '';
                        }
                    }
                },
                { field: 'holdTypeName', title: projectLabels.lblActivityForm, align: 'center', },
                {
                        //所属医学体系
                        title: projectLabels.lblMedicalSystem,
                        align: 'center',
                        minWidth: 180,
                        templet: function(d) {
                            if(d.medicalType==1) return "西医";
                            if(d.medicalType==2) return "中医";
                            if(d.medicalType==3) return "蒙医";
                        }
                },
                { field: 'knowledgeName', title: '学科', align: 'center' },
                { field: 'score', title: '总学分', align: 'center' },
                { field: 'period', title: '总学时', align: 'center' },
                { field: 'projManager', title: '活动负责人', align: 'center' },
                { field: 'projManagerTelephone', title: '活动负责人联系电话', align: 'center' }
                // { field: 'addTime', title: '添加时间', align: 'center', width: 200 },
                // { field: 'updateTime', title: '修改时间', align: 'center', width: 200 }
            ]];
            if (isBatchPendingTab()) {
                cols[0].unshift({ type: 'checkbox', fixed: 'left', width: 50, align: 'center' });
            }

            table.render({
                elem: '#cmeGroupproj',
                url: huayi_projectscore_url + 'cmeGroupProj/getList',
                title: '项目表',
                defaultToolbar: [],
                where: whereData,
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                cols: cols,
                cellMinWidth: 150,
                id: "cmeGroupproj",
                height: 'full-210' ,
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    // let $targetLi = $('.layui-tab-title > li[lay-id="'+projectStatus+'"]');
                    // let newTxt = $targetLi.text().replaceAll(/\d+/g, res.data.recordsTotal);
                    // $targetLi.text(newTxt);
                    //getCountForStatus();
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页

        function callBatchApproval(action, approvalContent) {
            let batchConfig = getBatchApprovalConfig();
            if (!batchConfig) {
                return;
            }
            let groupProjIds = getSelectedGroupProjIds();
            if (groupProjIds.length === 0) {
                layer.msg('请先选择活动记录');
                return;
            }
            let loadingIndex = layer.load(1, {shade: 0.2});
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + batchConfig.endpoint,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                data: JSON.stringify(batchConfig.buildPayload(action, approvalContent, groupProjIds)),
                success: function (res) {
                    if (res.status === 200) {
                        layer.msg(res.msg || '批量审核完成');
                        loaderTable();
                    } else {
                        layer.msg(res.msg || '批量审核失败');
                    }
                },
                error: function () {
                    layer.msg('批量审核请求失败');
                },
                complete: function () {
                    layer.close(loadingIndex);
                }
            });
        }

        function bindBatchToolbar() {
            if (!_isHenan) return;
            function getBatchActionText(action) {
                if (action === 'PASS') return '审核通过';
                if (action === 'BACK') return '退回修改';
                return '审核不通过';
            }
            function ensureBatchSelection() {
                if (getSelectedGroupProjIds().length === 0) {
                    layer.msg('请先选择活动记录');
                    return false;
                }
                return true;
            }
            $('#btnBatchSelectPage').on('click', function () {
                let $headerCheckbox = $("div[lay-id='cmeGroupproj']").find(".layui-table-header input[name='layTableCheckbox']");
                $headerCheckbox.each(function () {
                    let $input = $(this);
                    if (!$input.prop('checked')) {
                        $input.next().click();
                    }
                });
            });
            $('#btnBatchPass').on('click', function () {
                if (!ensureBatchSelection()) return;
                layer.confirm(`将对选中项目进行批量“${getBatchActionText('PASS')}”操作`, {
                    title: '提示',
                    skin: 'batch-confirm-no-icon'
                }, function (index) {
                    callBatchApproval('PASS', '');
                    layer.close(index);
                });
            });
            $('#btnBatchBack').on('click', function () {
                if (!ensureBatchSelection()) return;
                layer.prompt({
                    formType: 2,
                    title: `将对选中项目进行批量“${getBatchActionText('BACK')}”操作<br/>审核意见`
                }, function (value, index) {
                    if (!value || !value.trim()) {
                        layer.msg('审核意见不能为空');
                        return;
                    }
                    callBatchApproval('BACK', value.trim());
                    layer.close(index);
                });
            });
            $('#btnBatchReject').on('click', function () {
                if (!ensureBatchSelection()) return;
                layer.prompt({
                    formType: 2,
                    title: `将对选中项目进行批量“${getBatchActionText('REJECT')}”操作<br/>审核意见`
                }, function (value, index) {
                    if (!value || !value.trim()) {
                        layer.msg('审核意见不能为空');
                        return;
                    }
                    callBatchApproval('REJECT', value.trim());
                    layer.close(index);
                });
            });
        }

        window.showProjApplyAndFeedback = function (scoreLevelId) {
            let arr = window["json_score_level_ids_open_apply_and_feedback"];
            if (arr == undefined) return false;
            // 如果 arr 是字符串，尝试解析成数组
            if (typeof arr === 'string') {
                try {
                    arr = JSON.parse(arr);
                } catch (e) {
                    return false; // JSON 解析失败，默认隐藏
                }
            }
            if (!Array.isArray(arr)) return false;
            return arr.includes(scoreLevelId);
        
        }

        /* 标签页计数 */
        function countNum() {
            let url = huayi_projectscore_url,
                data = getDefaultData(),
                tabId = tabIdCurrent;
            if (tabId.startsWith('tab_1')) {
                url += 'cmeGroupProj/holdState';
            } else if (tabId.startsWith('tab_2')) {
                url += 'cmeGroupProj/applyBeforeHoldState';
            } else if (tabId.startsWith('tab_3')) {
                url += 'cmeGroupProj/feedbackState';
            }
            let selUnitId = (localStorage.getItem("menu-unit-id") != null) ? localStorage.getItem("menu-unit-id") : _unitId;
            axios({
                method: 'get',
                url: url,
                responseType: 'json',
                params:  { ...data, "selUnitId": selUnitId ,withCheckInfo: true }
            }).then(response => {
                console.log(response);
                if (response.status == 200 && response.data.status == 200) {
                    let data = response.data.data;
                    if (tabId.startsWith('tab_1')) {
                        $('#tab_1_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_1_1').html('已举办&nbsp;&nbsp;(' + data.HOLD + ')');
                        $('#tab_1_5').html('部分已举办&nbsp;&nbsp;(' + data.PART_HOLD + ')');
                        $('#tab_1_2').html('未举办&nbsp;&nbsp;(' + data.NO_HOLD + ')');
                        $('#tab_1_3').html('逾期未举办&nbsp;&nbsp;(' + data.OVERDUE + ')');
                        // $('#tab_1_4').html('学分待审核&nbsp;&nbsp;(' + data.SCORE_TO_CHECK + ')');
                        if (0 < data.SCORE_TO_CHECK) $('#tab_1_4').addClass('shake_tab');
                    } else if (tabId.startsWith('tab_2')) {
                        $('#tab_2_1').html('待审核&nbsp;&nbsp;(' + data.NO_CHECK + ')');
                        $('#tab_2_2').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                        if (0 < data.BACK) $('#tab_2_2').addClass('shake_tab');
                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                        $('#tab_2_5').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                    } else if (tabId.startsWith('tab_3')) {
                        if (_isHainan) {
                            $('#tab_3_7').html('未反馈&nbsp;&nbsp;(' + data.HAINAN_NO_REPORT + ')');
                            $('#tab_3_8').html('已反馈&nbsp;&nbsp;(' + data.HAINAN_FINISH_REPORT + ')');
                        } else {
                            $('#tab_3_1').html('待审核&nbsp;&nbsp;(' + data.NO_CHECK + ')');
                            $('#tab_3_2').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                            if (0 < data.BACK) $('#tab_3_2').addClass('shake_tab');
                            $('#tab_3_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                            $('#tab_3_4').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                            $('#tab_3_5').html('未反馈&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        }
                    }
                } else {
                    layer.msg('项目统计失败', { icon: 2, time: 1000 });
                }
            }).catch(error => {
                layer.msg('项目统计异常', { icon: 7, time: 1000 });
                console.log(error);
            });
        }

                },
                success: function (re) {
                    if (re.success == true) {
                        layer.msg("分配成功");
                        loaderTable();

                    } else {
                        layer.msg(re.msg);
                    }
                }
            });
        }
        //选择完代办科室后，获取选择的科室信息,绑定项目
        window.cancelDistributeAgentDept = function (deptId, groupprojId) {
            console.log("deptId:" + deptId + ";   projId:" + groupprojId);
            $.ajax({
                async: false,
                type: "post",
                url: huayi_projectscore_url + "/cmeGroupProj/cancelDistributeAgentDept",
                data: {
                    unitId: localStorage.getItem("unit-id"),
                    deptId: deptId,
                    groupprojId: groupprojId,
                    userId: localStorage.getItem("user-id")
                },
                success: function (re) {
                    if (re.success == true) {
                        layer.msg("取消分配成功");
                        loaderTable();

                    } else {
                        layer.msg(re.msg);
                    }
                }
            });
        }

        /* 获取配置 */
        window.getConfig = function (config_name) {
            $.ajax({
                async: false,
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                data: {
                    unitId: localStorage.getItem('unit-id'),
                    configNames: config_name
                },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg('获取配置失败');
                    }
                },
                error: function () {
                    layer.msg('获取配置失败');
                }
            });
        }

      
        window.initScoreLevelSel = (cmeYear) => { 
            window.scoreLevelSel && (treeSelect.destroy('scoreLevel'), $('#scoreLevel').val(''));
            window.scoreLevelSel = treeSelect.render({
                elem    : '#scoreLevel',
                data    : huayi_sjwh_url + 'option/scoreLevel/tree/' + _standardKindId + '/' + cmeYear + '/_1_',
                type    : 'get',
                search  : true,
                style   : {
                    folder  : { enable: false }, // 父节点图标
                    line    : { enable: true} // 连接线
                },
                click   : d => (initHoldTypeSel()),
                success : d => (initHoldTypeSel())
            });
        }
        window.initHoldTypeSel = () => {
            let keyName     = projectLabels.lblProjectLevel,
                scoreLevel  = $('#scoreLevel').val();
            $.ajax({
                url     : huayi_sjwh_url + 'option/holdType/list/' + _standardKindId + '/' + scoreLevel + '/_1_',
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#holdType');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        }

        window.showGroupProjModal = showGroupProjModal;
        window.showCycleModal = showCycleModal;
        window.showCourseModal = showCourseModal;

        window.closeAllModal = function () {
            layer.closeAll();
        };
        window.closeNewestModal = function () {
            layer.close(gLayerIndex);
        }

        window.refreshTable = refreshTable;
        window.refreshCycle = refreshCycle;

        function refreshTable() {
            // layer.close(gLayerIndex);
            layer.closeAll();
            // loaderTable();
            table.reload('cmeGroupproj');
        }

        function refreshCycle() {
            layer.closeAll();
            showCycleModal(gOpenedProjId, gOpenedProjPeriod,gCmeYear);
        }

        // 1 proj
        function showGroupProjModal(action, data) {
            let create = ModalActionEnum.CREATE === action;
            let edit = ModalActionEnum.EDIT === action;
            let groupProjectId = (data == null) ? '' : data.groupProjectId;
            let deptId =  (data == null) ? '' : (data.deptId == null) ? '' : data.deptId;
            let cmeYear = (data==null)?'':(data.cmeYear==null)?'':data.cmeYear;
            gLayerIndex = layer.open({
                type: 2,
                shade: 0.6,
                shadeClose: true,
                title: create ? '添加院内活动' : (edit ? '编辑院内活动' : '院内活动'),
                content: `/pages/mod/group/modals/GroupModal.html?projId=${groupProjectId}&cmeYear=${cmeYear}&deptId=${deptId}&cmeStandardKindId=${_standardKindId}`,
                area: ['820px', '520px']
            });
        }

        // 2 cycle
        function showCycleModal(projId, projPeriod,cmeYear) {
            gOpenedProjId = projId;
            gOpenedProjPeriod = projPeriod;
            gCmeYear = cmeYear;
            gLayerIndex = layer.open({
                type: 2,
                shade: 0.6,
                shadeClose: true,
                title: '完善举办周期',
                content: '/pages/mod/group/modals/CycleModal.html?projId=' + projId + '&projPeriod=' + projPeriod+"&cmeYear="+cmeYear,
                area: ['100%', '100%']
            });
        }

        // 3 teach
        function showCourseModal(action, courseFormVal) {
            let create = ModalActionEnum.CREATE === action;
            let edit = ModalActionEnum.EDIT === action;
            // let urlParam = jsonStr2urlParam(JSON.stringify(courseFormVal));
            // console.info('-----urlParam: ', urlParam);
            layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: true,
                title: create ? '添加课程' : (edit ? '编辑课程' : ''),
                content: '/pages/mod/group/modals/CourseModal.html?' + jsonStr2urlParam(JSON.stringify(courseFormVal)),
                area: ['100%', '100%'],
                success: function (layero, index) {
                }
            });
        }

        //如果单位添加，显示
        //如果是科室添加，-->(允许单位对科室进行授分，那么显示;否则不显示)
        function isAwardColShow(deptName){
            if(deptName !="" && deptName != null){
                return window["fun_unit_award_groupproj_which_created_by_dept"] == 1;
            }
            else{
                return true;
            }
        }

        window.ableOperateLastYearData = function(dataYear) {
            let cgv = window["value_forbid_some_operate_on_last_year_data"];
            if(cgv == null || cgv == "") {
                return true;
            }
           
            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
        }

        $(function () {
            renderLables();
            
            if(!_isFujian) {
                $("#tab_2").show();
                $("#tab_3").show();
            }
            if(_isNeiMeng) {
                $("#tab_2").hide();
                $("#tab_3").show();
            }
            if(_isjilin) {
                $("#feedbackSearD").hide();
                $("#addUserSearD").hide();
                $("#tab_2").hide();
            }
            if(_isGansu || _isQinghai || _isSiChuan) {
                $("#tab_2").hide();
                $("#tab_3").hide();
            }
            if(_isHainan) {
                // 海南套：筛选框三级学科不可选
                $("#knowledgeId_id").val("").attr("disabled", "disabled");

                $("#tab_2").hide();   
                $("#tab_3_1").hide();
                $("#tab_3_2").hide();
                $("#tab_3_3").hide();
                $("#tab_3_4").hide();
                $("#tab_3_5").hide();
                $("#tab_3_7").hide();
                $("#tab_3_8").show();             
            }
            if(_isGuangxi) {
                $("#tab_2").hide();
                $("#tab_3").show();
            }
            
            //是否开通科室代办院内活动功能
            window.getConfig('fun_dept_agent_groupproj');
            //院内活动中，单位是否能对科室添加的院内活动授分
            window.getConfig('fun_unit_award_groupproj_which_created_by_dept');
            //院内活动开启举办前申请举办后反馈功能的学分分类集合
            window.getConfig('json_score_level_ids_open_apply_and_feedback');
            
            cmeYearInit();
            let cmeYear = $("#cmeYear").val();
            initScoreLevelSel(cmeYear);
            initHoldTypeSel();
            getsjwh(cmeYear);

            tool.setMedicalTypeSelectById("#medicalType");

        
            element.tabChange("tabarea", "tab_1");
            //tool.renderScoreLevel('#scoreLevel', '_1_');
            if(_unitId == "200077") {
                $("#scoreLevel").append('<option value="b0aa8f29-fac3-4174-ac8a-9e7000b8f2aa">其他Ⅱ类</option>');
            }
            // 浙江套显示活动内容相关查询/列
            if (_isZheJiang) {
                $('.zhejiang_show').show();
            }
            form.render();
            bindBatchToolbar();
            toggleBatchToolbar();
            loaderTable();
        })


    });

</script>


</html>
