    <style>
        .btn-apply {
            color: #70B603;
        }

        #implementationFeedback .layui-card {
            margin-bottom: 0px;
            width: 96%;
            margin: auto;
        }

        #implementationFeedback .tab-default {
            width: 55px;
        }

        #tabPage {
            width: 96%;
            margin: 0px auto 20px;
            min-height: 380px;
            border: 1px solid #e6e6e6;
            border-top: 0px;
            padding-top: 25px;
        }

        #implementationFeedback .project-form {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        #implementationFeedback .project-form .layui-form-item {
            min-width: 300px;
            max-width: 460px;
            width: 45%;
        }

        #implementationFeedback .project-form .layui-form-item1 {
            width: 88%;
            margin-bottom: 15px;
        }

        #implementationFeedback .project-form .layui-input-block {
            display: flex;
            align-items: center;
            text-align: left;
        }

        .js-project-image>div,
        .js-project-textbook>div {
            width: 90%;
            margin: 0px auto 15px;
            padding: 8px 0px;
            border: 1px solid;
            min-height: 70px;
            position: relative;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .js-project-textbook>div {
            min-height: 350px;
        }

        .js-project-image span {
            display: inline-block;
            margin-right: 7px;
        }

        .meeting-notice>div,
        .meeting-overrall-view>div,
        .student-signin-table>div,
        .exem-questions>div,
        .feedback-table>div {
            width: 100%;
            margin-bottom: 5px;
        }

        #tabPage .meeting-notice::after {
            content: "会议通知和议程";
        }

        #tabPage .meeting-overrall-view::after {
            content: "会议全景照片";
        }

        #tabPage .student-signin-table::after {
            content: "学员签到表";
        }

        #tabPage .exem-questions::after {
            content: "考试考题";
        }

        #tabPage .feedback-table::after {
            content: "执行情况反馈表";
        }

        .js-project-textbook>div::after {
            content: "教材明细";
        }

        .js-project-image>div::after,
        .js-project-textbook>div::after {
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 0px;
            top: -11px;
            background: #FFF;
        }

        .meeting-notice>ul,
        .meeting-overrall-view>ul,
        .student-signin-table>ul,
        .exem-questions>ul,
        .feedback-table>ul {
            margin: 0px auto;
            width: 96%;
            display: flex;
            flex-wrap: wrap;
        }

        .meeting-notice>ul>li,
        .meeting-overrall-view>ul>li,
        .student-signin-table>ul>li,
        .exem-questions>ul>li,
        .feedback-table>ul>li {
            width: 20%;
            float: left;
        }

        .meeting-notice>ul>li>a:nth-child(1),
        .meeting-overrall-view>ul>li>a:nth-child(1),
        .student-signin-table>ul>li>a:nth-child(1),
        .exem-questions>ul>li>a:nth-child(1),
        .feedback-table>ul>li>a:nth-child(1) {
            width: 150px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meeting-notice>ul>li>a:nth-child(2),
        .meeting-overrall-view>ul>li>a:nth-child(2),
        .student-signin-table>ul>li>a:nth-child(2),
        .exem-questions>ul>li>a:nth-child(2),
        .feedback-table>ul>li>a:nth-child(2) {
            margin-left: 0px;
        }

        .js-project-tab>div {
            width: 90%;
            margin: 0px auto;
        }

        .js-hidden,
        .js-project-image>.js-hidden {
            display: none;
        }

        .flow-detail-window {
            padding: 10px;
        }

        .flow-detail-window>div {
            font-weight: 900;
            font-size: 20px;
            text-align: center;
            margin: 15px auto 35px;
        }

        .flow-detail-window>ul>li {
            min-height: 60px;
            position: relative;
        }

        .flow-detail-window>ul>li:not(:last-child)::before {
            content: "";
            border-left: 1px solid #3c3c3c;
            position: absolute;
            left: 105px;
            height: 100%;
        }

        .flow-detail-window>ul>li::after {
            content: "";
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid #3c3c3c;
            background: #FFF;
            position: absolute;
            left: 95px;
        }

        .flow-detail-window>ul>.approval-pass::after {
            content: "";
            border-radius: 50%;
            border: 1px solid #70B603;
            background: #70B603;
            position: absolute;
        }

        .flow-detail-window>ul>.approval-pass:nth-child(n-1):before {
            /* border-left: 1px solid #70B603; */
            border-color: #70B603;
        }

        .flow-detail-window>ul>li>div {
            display: block;
            min-width: 65px;
            max-width: 190px;
            margin: 0px 20px;
            float: left;
            min-height: 10px;
        }

        div.aaa {
            width: 100%;
            height: 100%;
            padding: 5px 5px;
            margin-bottom: 30px;
            /* margin-top:50px; */
            /* margin-left:150px; */
            border: 2px solid #CCCCCC;
            border-radius: 0.5em;
        }

        span.title {
            display: block;
            width: 150px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        span.title2 {
            display: block;
            width: 330px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        .file-title {
            display: inline-block;
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 30px;
            top: -11px;
            background: #FFF;
        }

        @media only screen and (max-width: 1200px) and (min-width:1000px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 25%;
            }
        }

        @media only screen and (max-width: 999px) and (min-width:650px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 33%;
            }
        }

        @media only screen and (max-width: 649px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 50%;
            }
        }
    </style>
</head>

<body>
    <div class="layui-fluid">
        <div class="layui-card">

            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="applyBeforeHold" lay-filter="applyBeforeHold" style="margin: 0px 0px;">
                </table>
            </div>

            <!--        申请弹窗-->
            <div id="add-applyBeforeHold" style=" display:none;">

                <form class="layui-form" style="padding: 30px;" id="form-applyBeforeHold" lay-filter="add-filter">
                    <div class="aaa" id="projInfoDiv">
                        <span class="title" id="projectInfo" style="font-size: 20px; color: #05ACAC;">项目基本信息</span>
                        <div class="row">
                            <div class="layui-form-item" style="display: none">
                                <div class="layui-inline layui-inline-660">
                                    <label class="layui-form-label">主键</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="keyId" autocomplete="off" class="layui-input">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="projNameBlock" style="display: block;">
                                    <label class="layui-form-label">活动名称</label>
                                    <div class="layui-input-inline" style="width: 500px;">
                                        <input type="text" name="projName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="projNameBlock" style="display: block;">
                                    <label class="layui-form-label">学分分类</label>
                                    <div class="layui-input-inline" >
                                        <input type="text" name="scoreLevelName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="holdTypeBlock" style="display: block;">
                                    <label class="layui-form-label">活动方式</label>
                                    <div class="layui-input-inline" >
                                        <input type="text" name="holdTypeName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="periodBlock" style="display: block;">
                                    <label class="layui-form-label">学时</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="periodProj" name="period" autocomplete="off"
                                            disabled="true" lay-verify="number|period"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="scoreBlock" style="display: block;">
                                    <label class="layui-form-label">学分</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="score" name="score" autocomplete="off"
                                            disabled="true" lay-verify="number|applScore"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="projManagerBlock" style="display: block;">
                                    <label class="layui-form-label" id="projManagerLabel">活动负责人</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="projManager" name="projManager" autocomplete="off"
                                            placeholder="请输入" class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                                <div class="layui-inline" id="projManagerTelephoneBlock" style="display: block;">
                                    <label class="layui-form-label">活动负责人联系电话</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="projManagerTelephone" name="projManagerTelephone" autocomplete="off"
                                            placeholder="请输入联系电话" class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                                <div class="layui-inline" id="limitPersonBlock" style="display: block;">
                                    <label class="layui-form-label">拟授分人数</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="limitPerson" name="limitPerson" autocomplete="off"
                                            placeholder="请输入拟授分人数" class="layui-input"
                                            lay-verify="number|required" onkeyup="value=value.replace(/[^\d]/g,'')">
                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item" id="holdPlaceBlock" style="display: none;">
                                <div class="layui-inline"> <label class="layui-form-label">举办地点</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="holdPlace" name="holdPlace" autocomplete="off"
                                            placeholder="请输入" class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                            </div>
                            <!-- 活动内容（仅浙江显示） -->
                            <div class="layui-form-item zhejiang_show" id="scoreTypeNameBlock" style="display: none;">
                                <div class="layui-inline">
                                    <label class="layui-form-label">活动内容</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="scoreTypeName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="aaa" id="batchInfoDiv">
                        <span class="title" style="font-size: 20px; color: #05ACAC;">批次信息</span>
                        <div class="row">
                            <div class="layui-form-item">
                                <div class="layui-inline" style="display: block;">
                                    <label class="layui-form-label" style="width: 120px;">项目举办开始日期</label>
                                    <div class="layui-input-inline">
                                        <input id="batchStartDt" type="text" name="startDt" autocomplete="off"
                                            class="layui-input" disabled="true">
                                    </div>
                                </div>
                                <div class="layui-inline" style="display: block;">
                                    <label class="layui-form-label" style="width: 120px;">项目举办结束日期</label>
                                    <div class="layui-input-inline">
                                        <input id="batchEndDt" type="text" name="endDt" autocomplete="off"
                                            class="layui-input" disabled="true">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="aaa" id="teachInfoDiv">
                        <span class="title" id="teachInfo" style="font-size: 20px; color: #05ACAC;">课程信息</span>
                        <div class="row">
                            <div class="layui-card-body layui_body_box">
                                <table class="layui-table" id="cmeProjPosDownList" lay-filter="cmeProjPosDownList"
                                    style="margin: 0px 0px;">
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="aaa" id="filesDiv" style="display: none;">
                        <span class="title title2" id="filesTitle"
                            style="font-size: 20px; color: #05ACAC;">会议通知及日程</span>
                        <div class="row">
                            <div class="js-project-image js-tab-page">
                            </div>
                        </div>
                    </div>


                    <div class="layui-form-item" id="submitAndResetApproval" style="width: 100%;">
                        <div class="layui-input-block" style="padding-left: 30%; padding-top: 10px;">
                            <button class="layui-btn" lay-submit lay-filter="pass" type="button">审核通过</button>
                            <button class="layui-btn" lay-submit lay-filter="back">退回修改</button>
                            <button class="layui-btn" lay-submit lay-filter="notPass">审核不通过</button>
                        </div>
                    </div>

                    <div class="layui-form-item" id="submitAndResetApply" style="width: 100%;">
                        <div class="layui-input-block" style="text-align: center;">
                            <button class="layui-btn" lay-submit lay-filter="saveInfo">保存并返回列表</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!--        添加课程弹窗-->
    <div id="addTeach" style=" display:none;">
        <form class="layui-form" style="padding: 30px;" id="form-addTeach" lay-filter="add-teach">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjTeachId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>

            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">课程开始日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="startDate" id="startDate" autocomplete="off" class="layui-input"
                            placeholder="请选择">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">课程结束日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="endDate" id="endDate" autocomplete="off" class="layui-input"
                            placeholder="请选择">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">讲授题目</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachSubject" id="teachSubject" autocomplete="off" class="layui-input"
                            placeholder="讲授题目">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label" id="periodLabel">学时</label>
                    <div class="layui-input-inline">
                        <input type="text" name="period" id="period" autocomplete="off" class="layui-input"
                            placeholder="" lay-verify="period|required">
                    </div>
                </div>
            </div>
            <div class="layui-form-item" id="submitAndResetTeach">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="submitTeach">提交</button>
                    <button id="resetBtn" type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>

        </form>
    </div>

    <!--        添加教师弹窗-->
    <div id="addTeacher" style=" display:none;">
    <style>

            width: 32.5%;
            margin-right: 0%;
            margin-bottom: 15px;
            float: left;
            display: block;
        }
        #form-addTeacher .layui-input-inline {
            width: calc(100% - 120px) !important;

        }
        #form-addTeacher .layui-form-label {
            width: 90px;
            padding: 9px 5px;
        }
        /* Fix the dropdown positioning for treeSelect / specSelect */
        #form-addTeacher .layui-form-item {
            clear: both;
        }
        #form-addTeacher .layui-form-item::after {
            content: '';
            display: block;

        <form class="layui-form" style="padding: 30px;" id="form-addTeacher" lay-filter="add-teacher">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjTeacherId" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">课程id</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjTeachId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;" id="needScoreBlock">
                    <label class="layui-form-label">是否主讲人授分</label>
                    <div class="layui-input-inline">
                        <select name="needScore" id="needScore" lay-filter="needScore">
                            <option value="true">是</option>
                            <option value="false">否</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">授课教师</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachName" id="teachName" autocomplete="off" class="layui-input"
                            placeholder="授课教师">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;" id="teachNoBlock">
                    <label class="layui-form-label"><span class="tips_inp" data-id="spanOnCert" style="display:none;">*</span>证件号码</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachNo" id="teachNo" autocomplete="off" class="layui-input"
                            placeholder="请输入身份证号">
                    </div>
                </div>
                <div class="layui-inline" style="display: none;" id="personNoBlock">
                    <label class="layui-form-label">医通卡号</label>
                    <div class="layui-input-inline">
                        <input type="text" name="personNo" id="personNo" autocomplete="off" class="layui-input"
                            placeholder="请输入医通卡号">
                    </div>
                </div>
                <div class="layui-inline" id="sexBlock" style="display: block;">
                    <label class="layui-form-label">性别</label>
                    <div class="layui-input-inline">
                        <select name="sex" lay-verify="required">
                            <option value="">请选择性别</option>
                            <option value="1">男</option>
                            <option value="0">女</option>
                        </select>
                    </div>
                </div>
            
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">出生日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="birthday" id="birthday" autocomplete="off" class="layui-input"
                            placeholder="请选择">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">学历</label>
                    <div class="layui-input-inline" style="text-align: left;">
                        <select name="education" id="select_education">
                            <option value="">请选择学历</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline layui-form" lay-filter="specSelectArea" style="display: block;">
                    <label class="layui-form-label">专业</label>
                    <div class="layui-input-inline">
                        <input type="text" autocomplete="off" class="layui-input" lay-filter="specSelect"
                            id="specSelect" placeholder="请选择专业">
                    </div>
                    <input type="hidden" id="hidden_spec" name="dept">
                </div>

                }
                toggleTeacherNoStatus();
            }
            $("#teachNo").on("input", function () {
                toggleTeacherNoStatus();
            });
            $("#personNo").on("input", function () {
                toggleTeacherNoStatus();
            });
            form.on('select(needScore)', function () {
                if (isGuangdongTeacherCard) {
                    $("[data-id='spanOnCert']").hide();
                }
                toggleTeacherNoStatus();
            });
            initTeacherCardLayout();

            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }
            //获取配置信息, 行政单位审核举办前申请时, 添加显示申报时的项目公布信息及课程教师信息
            let getConfig = function () {
                let configName1 = "fun_apply_approval_proj"
                    , configName2 = "fn_projapply_holdform_other"
                    , configName3 = "value_forbid_some_operate_on_last_year_data";
                let configUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${unitId}&configNames=${configName1}&configNames=${configName2}&configNames=${configName3}`
                commonAjax('post', configUrl,
                    {}, function () { layer.msg("配置信息加载失败"); },
                    function (res) {
                        if (res.status == 200 || tool.isEmpty(res.data)) {
                            if (res.data.hasOwnProperty(configName1) && res.data[configName1] == 1) {
                                isLoadApplProj = true;
                            }
                            if (res.data.hasOwnProperty(configName2) && res.data[configName2] == 1) {
                                isHoldeFormPlus = true;
                            }
                            if (res.data.hasOwnProperty(configName3)) {
                                window[configName3] = res.data[configName3];
                            }
                        } else { layer.msg("配置信息加载失败"); }
                    });
            }
            getConfig();
            getTabConfig();//请求config,并初始化tab页

            window.ableOperateLastYearData = function (dataYear) {
                let cgv = window["value_forbid_some_operate_on_last_year_data"];
                if (cgv == null || cgv == "" || localStorage.getItem("unit-user-type") == 5) {
                    return true;
                }

                let able = true;
                let deadline = new Date(cgv);
                let now = new Date();
                if (parseInt(dataYear) < now.getFullYear()) {
                    if (deadline < now) {
                        able = false;
                    }
                }
                return able;
            }


            let initHtml = function () {
                // 初始化表格
                loaderTable();
                if (standardkindId == qing_hai_tao_id) {
                    $("#linkmanLabel").text("经办人");
                } else {
                    $("#linkmanLabel").text("联系人");
                }
            }
            initHtml();
        });

    </script>
</body>
