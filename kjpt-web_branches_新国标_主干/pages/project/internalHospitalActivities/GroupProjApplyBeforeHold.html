    <style>
        .btn-apply {
            color: #70B603;
        }

        #implementationFeedback .layui-card {
            margin-bottom: 0px;
            width: 96%;
            margin: auto;
        }

        #implementationFeedback .tab-default {
            width: 55px;
        }

        #tabPage {
            width: 96%;
            margin: 0px auto 20px;
            min-height: 380px;
            border: 1px solid #e6e6e6;
            border-top: 0px;
            padding-top: 25px;
        }

        #implementationFeedback .project-form {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        #implementationFeedback .project-form .layui-form-item {
            min-width: 300px;
            max-width: 460px;
            width: 45%;
        }

        #implementationFeedback .project-form .layui-form-item1 {
            width: 88%;
            margin-bottom: 15px;
        }

        #implementationFeedback .project-form .layui-input-block {
            display: flex;
            align-items: center;
            text-align: left;
        }

        .js-project-image>div,
        .js-project-textbook>div {
            width: 90%;
            margin: 0px auto 15px;
            padding: 8px 0px;
            border: 1px solid;
            min-height: 70px;
            position: relative;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .js-project-textbook>div {
            min-height: 350px;
        }

        .js-project-image span {
            display: inline-block;
            margin-right: 7px;
        }

        .meeting-notice>div,
        .meeting-overrall-view>div,
        .student-signin-table>div,
        .exem-questions>div,
        .feedback-table>div {
            width: 100%;
            margin-bottom: 5px;
        }

        #tabPage .meeting-notice::after {
            content: "会议通知和议程";
        }

        #tabPage .meeting-overrall-view::after {
            content: "会议全景照片";
        }

        #tabPage .student-signin-table::after {
            content: "学员签到表";
        }

        #tabPage .exem-questions::after {
            content: "考试考题";
        }

        #tabPage .feedback-table::after {
            content: "执行情况反馈表";
        }

        .js-project-textbook>div::after {
            content: "教材明细";
        }

        .js-project-image>div::after,
        .js-project-textbook>div::after {
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 0px;
            top: -11px;
            background: #FFF;
        }

        .meeting-notice>ul,
        .meeting-overrall-view>ul,
        .student-signin-table>ul,
        .exem-questions>ul,
        .feedback-table>ul {
            margin: 0px auto;
            width: 96%;
            display: flex;
            flex-wrap: wrap;
        }

        .meeting-notice>ul>li,
        .meeting-overrall-view>ul>li,
        .student-signin-table>ul>li,
        .exem-questions>ul>li,
        .feedback-table>ul>li {
            width: 20%;
            float: left;
        }

        .meeting-notice>ul>li>a:nth-child(1),
        .meeting-overrall-view>ul>li>a:nth-child(1),
        .student-signin-table>ul>li>a:nth-child(1),
        .exem-questions>ul>li>a:nth-child(1),
        .feedback-table>ul>li>a:nth-child(1) {
            width: 150px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meeting-notice>ul>li>a:nth-child(2),
        .meeting-overrall-view>ul>li>a:nth-child(2),
        .student-signin-table>ul>li>a:nth-child(2),
        .exem-questions>ul>li>a:nth-child(2),
        .feedback-table>ul>li>a:nth-child(2) {
            margin-left: 0px;
        }

        .js-project-tab>div {
            width: 90%;
            margin: 0px auto;
        }

        .js-hidden,
        .js-project-image>.js-hidden {
            display: none;
        }

        .flow-detail-window {
            padding: 10px;
        }

        .flow-detail-window>div {
            font-weight: 900;
            font-size: 20px;
            text-align: center;
            margin: 15px auto 35px;
        }

        .flow-detail-window>ul>li {
            min-height: 60px;
            position: relative;
        }

        .flow-detail-window>ul>li:not(:last-child)::before {
            content: "";
            border-left: 1px solid #3c3c3c;
            position: absolute;
            left: 105px;
            height: 100%;
        }

        .flow-detail-window>ul>li::after {
            content: "";
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid #3c3c3c;
            background: #FFF;
            position: absolute;
            left: 95px;
        }

        .flow-detail-window>ul>.approval-pass::after {
            content: "";
            border-radius: 50%;
            border: 1px solid #70B603;
            background: #70B603;
            position: absolute;
        }

        .flow-detail-window>ul>.approval-pass:nth-child(n-1):before {
            /* border-left: 1px solid #70B603; */
            border-color: #70B603;
        }

        .flow-detail-window>ul>li>div {
            display: block;
            min-width: 65px;
            max-width: 190px;
            margin: 0px 20px;
            float: left;
            min-height: 10px;
        }

        div.modleBoder {
            height: 100%;
            padding: 5px 30px;
            margin-bottom: 30px;
            /* margin-top:50px; */
            /* margin-left:150px; */
            border: 2px solid #CCCCCC;
            border-radius: 0.5em;
        }

        span.title {
            display: block;
            width: 150px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        span.title2 {
            display: block;
            width: 330px;
            /* height:50px; */
            position: relative;
            top: -15px;
            text-align: center;
            background: white;
        }

        .file-title {
            display: inline-block;
            position: absolute;
            padding: 0px 2px 0px 4px;
            left: 30px;
            top: -11px;
            background: #FFF;
        }

        .js-upload-btn-box {
            margin-left: 10px;
        }

        @media only screen and (max-width: 1200px) and (min-width:1000px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 25%;
            }
        }

        @media only screen and (max-width: 999px) and (min-width:650px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 33%;
            }
        }

        @media only screen and (max-width: 649px) {

            .meeting-notice>ul>li,
            .meeting-overrall-view>ul>li,
            .student-signin-table>ul>li,
            .exem-questions>ul>li,
            .feedback-table>ul>li {
                width: 50%;
            }
        }

        #upload-tip {
            padding-left: 10px;
            font-style: normal;
            font-size: 12px;
            color: #f25643;
        }

        .tips_inp {
            color: red;
        }
    </style>
</head>

    <div class="layui-fluid">
        <div class="layui-card">

                    <input type="hidden" id="hdnDownId" />
                    <input type="button" id="btnUploadTeach" style="display:none;" />
                    <div class="modleBoder">
                        <span class="title" id="projectInfo" style="font-size: 20px; color: #05ACAC;">项目基本信息</span>
                        <div id="projInfo" class="row">
                            <div class="layui-form-item" style="display: none">
                                <div class="layui-inline layui-inline-660">
                                    <label class="layui-form-label">主键</label>
                                    <div class="layui-input-block">
                                        <input type="text" name="keyId" autocomplete="off" class="layui-input">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="projNameBlock" style="display: block;">
                                    <label class="layui-form-label">活动名称</label>
                                    <div class="layui-input-inline" style="width: 500px;">
                                        <input type="text" name="projName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="projNameBlock" style="display: block;">
                                    <label class="layui-form-label">学分分类</label>
                                    <div class="layui-input-inline" >
                                        <input type="text" name="scoreLevelName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="holdTypeBlock" style="display: block;">
                                    <label class="layui-form-label">活动方式</label>
                                    <div class="layui-input-inline" >
                                        <input type="text" name="holdTypeName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="periodBlock" style="display: block;">
                                    <label class="layui-form-label">学时</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="periodProj" name="period" autocomplete="off"
                                            disabled="true" lay-verify="number|period"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                                <div class="layui-inline" id="scoreBlock" style="display: block;">
                                    <label class="layui-form-label">学分</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="score" name="score" autocomplete="off"
                                            disabled="true" lay-verify="number|applScore"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <div class="layui-inline" id="projManagerBlock" style="display: block;">
                                    <label class="layui-form-label" id="projManagerLabel">活动负责人</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="projManager" name="projManager" autocomplete="off"
                                            placeholder="请输入" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-inline" id="projManagerTelephoneBlock" style="display: block;">
                                    <label class="layui-form-label">活动负责人联系电话</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="projManagerTelephone" name="projManagerTelephone" autocomplete="off"
                                            placeholder="请输入联系电话" class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-inline" id="limitPersonBlock" style="display: block;">
                                    <label class="layui-form-label">拟授分人数</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="limitPerson" id="limitPerson" autocomplete="off"
                                            disabled="true" placeholder="请输入拟授分人数" class="layui-input layui-disabled" lay-verify="number"
                                            onkeyup="value=value.replace(/[^\d]/g,'')">
                                        <!-- <span style="color: red;">设置为0，招收人数为无限制</span> -->
                                    </div>
                                </div>
                            </div>

                            <div class="layui-form-item" id="holdPlaceBlock" style="display: none;">
                                <div class="layui-inline"> <label class="layui-form-label">举办地点</label>
                                    <div class="layui-input-inline">
                                        <input type="text" id="holdPlace" name="holdPlace" autocomplete="off"
                                            placeholder="请输入" class="layui-input">
                                    </div>
                                </div>
                            </div>
                            <!-- 活动内容（仅浙江显示） -->
                            <div class="layui-form-item zhejiang_show" id="scoreTypeNameBlock" style="display: none;">
                                <div class="layui-inline">
                                    <label class="layui-form-label">活动内容</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="scoreTypeName" autocomplete="off" disabled="true"
                                            class="layui-input layui-disabled">
                                    </div>
                                </div>
                            </div>

                            <!-- <div class="layui-form-item"> -->
                            <!-- </div> -->
                        </div>
                    </div>
                    <div class="modleBoder" id="batchInfo">
                        <span class="title" style="font-size: 20px; color: #05ACAC;">批次信息</span>
                        <div class="row">
                            <div class="layui-form-item">
                                <div class="layui-inline" style="display: block;">
                                    <label class="layui-form-label" style="width: 120px;">活动举办开始日期</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="startDt" autocomplete="off"
                                            class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                                <div class="layui-inline" style="display: block;">
                                    <label class="layui-form-label" style="width: 120px;">活动举办结束日期</label>
                                    <div class="layui-input-inline">
                                        <input type="text" name="endDt" autocomplete="off"
                                            class="layui-input layui-disabled" disabled="true">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="modleBoder">
                        <span class="title" id="teachInfo" style="font-size: 20px; color: #05ACAC;">课程信息</span>
                        <div class="row">
                            <div class="layui-card-body layui_body_box" style="padding:10px 10px;">
                                <table class="layui-table cmeProjPosDownList" id="cmeProjPosDownList"
                                    lay-filter="cmeProjPosDownList" style="margin: 0px 0px;">
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="modleBoder" id="filesDiv" style="display: none;">
                        <span class="title" id="filesTitle" style="font-size: 20px; color: #05ACAC;">会议通知及日程</span>
                        <div class="row">
                            <div class="js-project-image js-tab-page">
                                <!-- <div class="meeting-notice js-hidden"> -->
                                <!-- <div class="meeting-notice">
                                    <div class="js-upload-btn-box">
                                        <a class="layui-btn layui-btn-sm layui-btn-radius js-upload-btn" data-type="1">上传</a>
                                        <span id="upload-tip">请上传 PDF 格式文件或 JPG、PNG 图片文件，且小于10M</span>
                                    </div>
                                    <ul class="js-meeting-notice"></ul>
                                </div> -->
                            </div>
                        </div>
                    </div>

                    <div class="layui-form-item" id="submitAndResetApply" style="width: 100%;">
                        <div style="text-align: center;">
                            <button class="layui-btn" lay-submit lay-filter="saveInfo">保存并返回列表</button>
                            <button class="layui-btn" lay-submit lay-filter="application" id="saveAndReport">保存并上报</button>
                        </div>
                    </div>

                    <div class="layui-form-item" id="submitAndResetApproval" style="width: 100%;">
                        <div class="layui-input-block" style="padding-left: 30%; padding-top: 10px;">
                            <button class="layui-btn" lay-submit lay-filter="pass" type="button">审核通过</button>
                            <button class="layui-btn" lay-submit lay-filter="back">退回修改</button>
                            <button class="layui-btn" lay-submit lay-filter="notPass">审核不通过</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

        <form class="layui-form" style="padding: 30px;" id="form-addTeach" lay-filter="add-teach">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjTeachId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>

            <div class="layui-form-item" id="teachDateDiv">

                    <div class="layui-input-inline">
                        <input type="text" name="startDate" id="startDate" autocomplete="off" class="layui-input"

                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label" style="padding: 9px 10px;width: 90px;">课程结束日期</label>

                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">讲授题目</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachSubject" id="teachSubject" autocomplete="off" class="layui-input"

                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label" id="periodLabel">学时</label>
                    <div class="layui-input-inline">
                        <input type="text" name="period" id="period" autocomplete="off" class="layui-input"

                    </div>
                </div>
            </div>

            <div class="layui-form-item" id="submitAndResetTeach">

                </div>
            </div>

        </form>
    </div>

        <form style="padding: 30px;" id="form-addTeacher" class="layui-form" lay-filter="add-teacher">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjTeacherId" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline layui-inline-660">
                    <label class="layui-form-label">课程id</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjTeachId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>
            <div class="layui-form-item" id="teacherRowOne">
                <div class="layui-inline" style="display: block;" id="needScoreBlock">
                    <label class="layui-form-label">是否主讲人授分</label>
                    <div class="layui-input-inline">
                        <select name="needScore" id="needScore" lay-filter="needScore">
                            <option value="true" selected>是</option>
                            <option value="false">否</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline" style="display: block;" id="teachNoBlock">
                    <label class="layui-form-label"><span class="tips_inp" data-id="spanOnCert"
                            id="spanOnTeachNo">*</span>证件号码</label>
                    <div class="layui-input-inline">
                        <input type="text" name="teachNo" id="teachNo" autocomplete="off" class="layui-input" placeholder="请输入身份证号">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;" id="teacherNameBlock">
