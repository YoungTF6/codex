<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>浙江学术会议项目备案</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" type="text/css"
          href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 个人学分录入样式  -->
    <link rel="stylesheet" href="/css/score/score.css?version=413" media="all">
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <!-- pdf查看 -->
    <script type="text/javascript" src="/js/pdfjs/build/pdf.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/api/number.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <style>
        .layui-form-label-t {
            float: left;
            display: block;
            padding: 9px 15px;
            /* width: 80px; */
            font-weight: 400;
            line-height: 20px;
            text-align: right;
            width: 150px;
        }

        .layui-input-block-t {
            /* width: 200px; */
            margin-left: 180px;
        }
        #checkStatusSearchBox .layui-form-select dl {
            max-height: 350px;
        }

        /* 表单容器样式 */
        .form-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 5px;
            background-color: #fff;
        }

        /* 上传区域样式 */
        .upload-section {
            margin-top: 20px;
        }

        /* 文件列表样式 */
        .file-list {
            margin-top: 10px;
        }

        /* 文件项样式 */
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #e6e6e6;
            border-radius: 3px;
            margin-bottom: 10px;
        }

        /* 文件信息样式 */
        .file-info {
            flex: 1;
        }

        /* 文件操作样式 */
        .file-actions {
            margin-left: 10px;
        }

        /* PDF图标样式 */
        .pdf-icon {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }

        .layui-form-radio{
            margin-top:0;
        }

        /* 弹窗内容左对齐（覆盖 score.css 的 flex 居中） */
        #editScore .score-model,
        #editScore .score-model > div{
            text-align: left !important;
        }
        /* score.css: div.score-model>div 默认 display:flex + justify-content:center，会导致内容整体居中 */
        #editScore .score-model > div{
            display: block !important;
            justify-content: flex-start !important;
            width: calc(100% - 30px) !important;
            max-width: none !important;
            margin: 15px 15px !important;
        }
        /* 标题仍保持居中展示（不影响内容左对齐） */
        #editScore .score-model > .title{
            display: block;
            text-align: center;
        }

        /* 主表格表头样式（参考 diffPlaceRecord 的观感） */
        .layui-table-view[lay-id="deptScoreTable"]{
            border-color: #d2d2d2;
        }
        .layui-table-view[lay-id="deptScoreTable"] .layui-table-header{
            background-color: #f2f2f2;
        }
        .layui-table-view[lay-id="deptScoreTable"] .layui-table-header th{
            background-color: #f2f2f2;
            border-color: #d2d2d2;
            color: #333;
            font-weight: 400;
        }
        .layui-table-view[lay-id="deptScoreTable"] .layui-table-body td,
        .layui-table-view[lay-id="deptScoreTable"] .layui-table-fixed th,
        .layui-table-view[lay-id="deptScoreTable"] .layui-table-fixed td{
            border-color: #d2d2d2;
        }
        .layui-table-view[lay-id="deptScoreTable"] .layui-table-fixed .layui-table-header th{
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <!-- 搜索区域 -->
        <div id="searchCard" class="layui-form layui-card-header layuiadmin-card-header-auto">
            <!-- 年度 -->
            <div class="layui-inline">
                <label class="layui-form-label">年度：</label>
                <div class="layui-input-block">
                    <select id="cmeYearSearch" lay-filter="cmeYearSearch" style="width: 120px;">
<!--                        <option value="">全部</option>-->
                    </select>
                </div>
            </div>
            <!-- 会议名称 -->
            <div class="layui-inline">
                <label class="layui-form-label">会议名称：</label>
                <div class="layui-input-block">
                    <input type="text" id="projectName" placeholder="请输入会议名称" autocomplete="off" class="layui-input" style="width: 200px;">
                </div>
            </div>
            <!-- 审核状态（单位角色使用） -->
            <div class="layui-inline" id="checkStatusSearchBox">
                <label class="layui-form-label">审核状态：</label>
                <div class="layui-input-block">
                    <select name="checkStatus" id="checkStatusSearch" lay-filter="layui-select-type" style="width: 120px;">
                        <option value="">全部</option>
                        <option value="0">未提交</option>
                        <option value="1">已提交</option>
<!--                        <option value="2">审核通过</option>-->
<!--                        <option value="3">审核不通过</option>-->
                    </select>
                </div>
            </div>
            <!-- 主办单位（市级/省级使用） -->
            <div class="layui-inline" id="organizerBox" style="display: none;">
                <label class="layui-form-label">主办单位：</label>
                <div class="layui-input-block">
                    <input type="text" id="organizer" placeholder="支持模糊查询" autocomplete="off" class="layui-input" style="width: 200px;">
                </div>
            </div>
            <!-- 编号（市级/省级使用） -->
            <div class="layui-inline" id="recordNoBox" style="display: none;">
                <label class="layui-form-label">编号：</label>
                <div class="layui-input-block">
                    <input type="text" id="recordNo" placeholder="支持模糊查询" autocomplete="off" class="layui-input" style="width: 160px;">
                </div>
            </div>
            <!-- 分值（市级/省级使用） -->
            <div class="layui-inline" id="scoreSearchBox" style="display: none;">
                <label class="layui-form-label">分值：</label>
                <div class="layui-input-block">
                    <input type="text" id="scoreSearch" placeholder="请输入分值" autocomplete="off" class="layui-input" style="width: 100px;">
                </div>
            </div>
            <!-- 举办周期（市级/省级使用） -->
            <div class="layui-inline" id="holdDateBox" style="display: none;">
                <label class="layui-form-label">举办周期：</label>
                <div class="layui-input-block">
                    <input type="text" id="holdDateStart" placeholder="开始时间" autocomplete="off" class="layui-input" style="width: 150px; display: inline-block;">
                    <span style="margin: 0 5px;">至</span>
                    <input type="text" id="holdDateEnd" placeholder="结束时间" autocomplete="off" class="layui-input" style="width: 150px; display: inline-block;">
                </div>
            </div>
            <!-- 审核状态（市级/省级使用） -->
            <div class="layui-inline" id="govCheckStatusSearchBox" style="display: none;">
                <label class="layui-form-label">审核状态：</label>
                <div class="layui-input-block">
                    <select name="govCheckStatus" id="govCheckStatusSearch" lay-filter="layui-select-type" style="width: 150px;">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <button class="layui-btn layui-btn-blue" id="searchBtn" onclick="loaderTable()"
                        lay-filter="table-search" data-type="reload">
                    查询
                </button>
            </div>
            <div class="layui-inline" id="exportBtnBox" style="display: none;">
                <button class="layui-btn layui-btn-normal" type="button" id="exportBtn">导出</button>
            </div>
        </div>

        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="deptScoreBox" lay-filter="dept-score-box">
            </table>
        </div>

        <!-- 修改的弹窗 -->
        <div id="editScore" style="display: none;">
            <form class="layui-form" id="formScore" lay-filter="edit-score">
                <div class="score-model">
                    <span class="title">添加项目</span>
                    <input type="hidden" name="projId" id="projId" autocomplete="off" class="layui-input">
                    <div>
                        <!-- 主办单位 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>主办单位</span>
                            <span style="display: inline-block; width: 300px; padding: 9px 15px; border: 1px solid #e6e6e6; border-radius: 2px; background-color: #f2f2f2;"><span id="holdUnitText"></span></span>
                            <input type="hidden" name="holdUnit" id="holdUnitInput">
                        </div>

                        <!-- 协办单位/承办单位 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>协办单位/承办单位</span>
                            <input type="text" name="coorganizerUndertakeUnit" lay-verify="required" placeholder="请输入协办单位/承办单位" autocomplete="off" class="layui-input" style="width: 500px; display: inline-block;">
                        </div>
                        
                        <!-- 会议名称 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>会议名称</span>
                            <input type="text" name="projName" placeholder="请输入会议名称" autocomplete="off" class="layui-input" lay-verify="required" required style="width: 500px; display: inline-block;">
                        </div>
                        
                        <!-- 专委会（二级机构）和会议对象 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>专委会（二级机构）</span>
                            <input type="text" name="specialCommittee" placeholder="请输入专委会" lay-verify="required" autocomplete="off" class="layui-input" style="width: 200px; display: inline-block; margin-right: 50px;">
                            
                            <span style="display: inline-block; width: 80px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>会议对象</span>
                            <input type="text" name="meetingTarget" placeholder="请输入会议对象" lay-verify="required" autocomplete="off" class="layui-input" style="width: 200px; display: inline-block;">
                        </div>
                        
                        <!-- 会议内容简述 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px; vertical-align: top;"><font color="red">*&nbsp;</font>会议内容简述</span>
                            <textarea name="meetingContent" placeholder="2000字内" lay-verify="required" autocomplete="off" class="layui-textarea" style="width: 500px; display: inline-block; height: 100px;"></textarea>
                        </div>
                        
                        <!-- 举办日期和举办地点 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>举办日期</span>
                            <div style="display: inline-block; margin-right: 50px;">
                                <input type="text" name="startDate" placeholder="开始时间" lay-verify="required" required autocomplete="off" class="layui-input" style="width: 180px; display: inline-block;">
                                <span style="margin: 0 5px;">至</span>
                                <input type="text" name="endDate" placeholder="结束时间" lay-verify="required" required autocomplete="off" class="layui-input" style="width: 180px; display: inline-block;">
                            </div>
                            
                            <span style="display: inline-block; width: 80px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>举办地点</span>
                            <input type="text" name="studyAddress" placeholder="请输入举办地点" autocomplete="off" class="layui-input" lay-verify="required" required style="width: 200px; display: inline-block;">
                        </div>
                        
                        <!-- 会议时长和拟招人数 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>会议时长（小时）</span>
                            <input type="text" name="meetingDuration" placeholder="最低3小时" autocomplete="off" class="layui-input" lay-verify="required|number" required style="width: 200px; display: inline-block; margin-right: 50px;" oninput="this.value = this.value.replace(/[^0-9]/g, '');" onblur="checkMeetingDuration(this)">
                            
                            <span style="display: inline-block; width: 80px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>拟招人数</span>
                            <input type="text" name="limitPerson" placeholder="请输入拟招人数" autocomplete="off" class="layui-input" lay-verify="required|number" required style="width: 200px; display: inline-block;" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                        </div>
                        
                        <!-- 培训形式 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left; clear: both;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px; vertical-align: top;margin-top: 10px;"><font color="red">*&nbsp;</font>培训形式</span>
                            <div style="display: inline-block; text-align: left;">
                                <div style="margin-bottom: 10px;display: flex;align-items: center;">
                                    <input type="radio" name="trainingForm" title="线上，平台名称或网址" value="online" lay-filter="trainingForm">
                                    <input type="text" name="onlinePlatform" placeholder="" autocomplete="off" class="layui-input layui-disabled"  style="width: 300px; display: inline-block; margin-left: 10px;" disabled>
                                </div>
                                <div>
                                    <input type="radio" name="trainingForm" title="线下，地点" value="offline" lay-filter="trainingForm">
                                    <input type="text" name="offlineAddress" placeholder="" autocomplete="off" class="layui-input layui-disabled" style="width: 300px; display: inline-block; margin-left: 10px;" disabled>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 培训内容 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left; clear: both;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>培训内容</span>
                            <div style="display: inline-block; text-align: left;">
                                <input type="radio" name="trainingContent" title="学术报告" value="academic" lay-filter="trainingContent">
                                <input type="radio" name="trainingContent" title="专题讲座" value="lecture" lay-filter="trainingContent" style="margin-left: 20px;">
                                <input type="radio" name="trainingContent" title="手术示范" value="operation" lay-filter="trainingContent" style="margin-left: 20px;">
                                <input type="radio" name="trainingContent" title="模拟教学" value="simulation" lay-filter="trainingContent" style="margin-left: 20px;">
                                <input type="radio" name="trainingContent" title="其他" value="other" style="margin-left: 20px;" lay-filter="trainingContent">
                                <input type="text" name="otherMessage" placeholder="请输入其他内容" autocomplete="off" class="layui-input layui-disabled" style="width: 200px; display: inline-block; margin-left: 10px;" disabled>
                            </div>
                        </div>
                        
                        <!-- 联系人和联系方式 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>联系人</span>
                            <input type="text" name="linkman" placeholder="请输入联系人" autocomplete="off" class="layui-input" lay-verify="required" required style="width: 200px; display: inline-block; margin-right: 50px;">
                            
                            <span style="display: inline-block; width: 80px; text-align: right; margin-right: 10px;"><font color="red">*&nbsp;</font>联系方式</span>
                            <input type="text" name="linkmanPhone" placeholder="请输入联系方式" autocomplete="off" class="layui-input" lay-verify="required" required style="width: 200px; display: inline-block;">
                        </div>
                        
                        <!-- 上传附件 -->
                        <div class="form-row" style="margin-bottom: 15px; text-align: left;">
                            <span style="display: inline-block; width: 120px; text-align: right; margin-right: 10px;"></span>
                            <button type="button" class="layui-btn" id="chooseFileBtn" style="background-color: #1E9FFF; color: white; margin-right: 10px;">选择附件</button>
                            <button type="button" class="layui-btn" id="submitFileBtn" style="background-color: #5FB878; color: white; margin-right: 10px;">开始上传</button>
                            <span style="color: red;">请将举办通知（正式）、议程、会议预算（根据预算模板）按顺序排列合并为一个文件上传，支持PDF格式，10M以下。</span>
                        </div>
                        
                        <!-- 文件列表 -->
                        <div class="form-row" style="margin-bottom: 15px;width:100%">

                            <table class="layui-table">
                                <thead>
                                    <tr>
                                        <th>文件名</th>
                                        <th>大小</th>
                                        <th>预览</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="fileList">
                                    <!-- 文件列表将通过JS动态添加 -->
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- 按钮 -->
                        <div class="form-row" style="margin-top: 30px; width: 100%;text-align: center;">
                            <button class="layui-btn" btn-type="save" lay-submit lay-filter="submit" style="background-color: #5FB878; color: white; margin-right: 20px;">保存</button>
                            <a class="layui-btn layui-btn-primary js-back">返回</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>


        <!-- 查看学分详情的弹窗 -->
        <div id="scoreInfoWindow" style="display: none;">
            <form class="layui-form approval-score-form" lay-filter="score-info-form">
                <input type="hidden" name="projId">

            </form>
        </div>

        <!-- 查看备案进度 -->
        <div id="approvalLogWindow" style="display: none;">
            <div style="margin: 10px;">
                <table class="layui-table" id="approvalLogTable" lay-filter="approvalLogTable" ></table>
            </div>
        </div>

    </div>
</div>

<!-- 预览 -->
<div id="viewFile" style="display: none;"></div>
<script>
        const unitUserType = localStorage.getItem("unit-user-type");
        const userType = localStorage.getItem("user-type");
        var userName = localStorage.getItem("user-name");
        const realname = localStorage.getItem("realname");
        const unitId = localStorage.getItem("unit-id");
        const unitName = localStorage.getItem("unit-name");
        
        // 检查会议时长
        function checkMeetingDuration(input) {
            var value = parseInt(input.value);
            if (isNaN(value) || value < 3) {
                layer.msg('每天会议时长最低3小时，请输入有效的整数', { icon: 5 });
                input.value = '';
            }
        }
    </script>
<!-- 表头按钮 -->
<script type="text/html" id="toolBar">
    <div >
        <!-- 单位角色 -->
        {{# if(userType == '12'){ }}
        <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="addProj">添加</a>
        <!-- <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="report">上报</a> -->
        <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="downloadTemplate">下载模板</a>
        <!-- 文字提示 -->
        <span style="margin-left: 10px; color: red;">学术会议预算模板下载</span>
        {{# } }}

<!--        {{# if(userType == '11'){ }}-->
<!--        <a class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius" lay-event="excel"-->
<!--           style="float: right;">导出Excel</a>-->
<!--        {{# } }}-->
    </div>
</script>
<!-- 机构角色 行内操作按钮 -->
<script type="text/html" id="rowBar1">
    <!-- 未提交(0) 或 被退回(3, 5, 7) 时可以提交/修改/删除 -->
    {{# if(d.checkStatus == 0 || d.checkStatus == 3 || d.checkStatus == 5 || d.checkStatus == 7){ }}
        {{# if(d.checkStatus == 0){ }}
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="submit">提交</a>
        {{# }else{ }}
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="submit">重新提交</a>
        {{# } }}
        <a class="layui-btn layui-btn-xs layui-btn-warm btn-warm-row" lay-event="view">修改</a>
        <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="delete">删除</a>
    {{# }else{ }}
        <!-- 其他已提交状态只能查看 -->
        <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="view">查看</a>
    {{# } }}
</script>
<!-- 政府角色 行内操作按钮 -->
<script type="text/html" id="rowBar2">
    <!-- 地市审核 -->
    {{# if(unitUserType == 4 && d.checkStatus == 1){ }}
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="approval">查看并审核</a>
    {{# } }}
    <!-- 省厅审核 -->
    {{# if(unitUserType == 5 && d.checkStatus >= 1){ }}

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({

        let cmeStandardKindId = localStorage.getItem('standardkind-id');
        let ZHE_JIANG_TAO_ID = '190c480d-d43c-450b-8472-a6fd00a6729d',
            HE_NAN_TAO_ID = 'a6280900-a9c2-11ec-84d6-fa163e9b64fb';

        let unitUserTypeNum = parseInt(unitUserType, 10);

        let approvalData = {
            checkStatus: 4,
            approvalPassText: "初审通过",
            approvalNoPassText: "初审不通过"
        };
        if (unitUserTypeNum == 4) {
            approvalData.checkStatus = 2;
            approvalData.approvalPassText = "地市同意";
            approvalData.approvalNoPassText = "地市不同意";
        }
        if (userName == '82000200' || userName == '16000041') {
            approvalData.checkStatus = 6;
            approvalData.approvalPassText = "同意报备";
            approvalData.approvalNoPassText = "不同意报备";
        }

        if(userName == '82000201') userName = '82000202';
        let nextApproval = (userName == '82000200' || userName == '82000201' || userName == '82000202' ) ? userName : unitId;

        // 初始化日期选择
        laydate.render({ elem: 'input[name="startDate"]', type: 'datetime' });
        laydate.render({ elem: 'input[name="endDate"]', type: 'datetime' });

        // 初始化年度选择
        let cmeYear = new Date().getFullYear();
        // for (let i = 0; i < 1; i++) {
        //     let option = `<option value="${cmeYear - i}">${cmeYear - i}</option>`;
        //     $("#cmeYear").append(option);
        // }

        // 显示2023年到当前年度
        $("#cmeYearSearch").append('<option value="">全部</option>');
        while (cmeYear >= 2023) {
            let option = `<option value="${cmeYear}">${cmeYear}</option>`;
            $("#cmeYearSearch").append(option);
            // 默认选中当前年度
            if (cmeYear == new Date().getFullYear()) {
                $("#cmeYearSearch").val(cmeYear);
            }
            cmeYear--;
        }
        
        // 初始化日期选择器
        laydate.render({ elem: '#holdDateStart', type: 'datetime' });
        laydate.render({ elem: '#holdDateEnd', type: 'datetime' });

        // 初始化学分级别
        let scoreLevelList = [{ id: '50b9f143-57d2-4a64-abab-814c03c58505', name: '异地备案国家级' },
            { id: '995b7e47-e89f-4433-b90e-a7a5e5cbf363', name: '异地备案省级' }];
        scoreLevelList.forEach(scoreLevel => {
            let option = `<option value="${scoreLevel.id}">${scoreLevel.name}</option>`;
            if ($("#scoreLevel").length > 0) {
                $("#scoreLevel").append(option);
            }
            if ($("#scoreLevelSearch").length > 0) {
                $("#scoreLevelSearch").append(option);
            }
        });

        // 审核状态下拉（市级 / 省级），逻辑与 diffPlaceRecord 保持一致
        // 枚举：0-未提交, 1-已提交/未审核, 2-地市同意, 3-地市不同意, 4-初审通过, 5-初审不通过, 6-同意备案, 7-不同意备案, 8-待审核(特殊标记)
        let option = `<option value="2">地市同意</option>
                            <option value="3">地市不同意</option>
                            <option value="4">初审通过</option>
                            <option value="5">初审不通过</option>
                            <option value="6">同意备案</option>
                            <option value="7">不同意备案</option>`;
        if(cmeStandardKindId == HE_NAN_TAO_ID){
            option = `<option value="2">地市同意</option>
                            <option value="3">地市不同意</option>
                            <option value="6">同意备案</option>
                            <option value="7">不同意备案</option>`;
        }
        let option1 = `<option value="1">未审核</option>`;
        let optionAll = `<option value="">全部</option>`
        let optionPending = `<option value="1">待审核</option>`;
        // 市级
        if(unitUserType == 4 || unitUserType == '4'){
            $("#govCheckStatusSearch").html(optionAll + option1 + option);
            $("#govCheckStatusSearch").val('1');
        }
        // 省级
        if(unitUserType == 5 || unitUserType == '5'){
            if(userName == '82000200' ){
                $("#govCheckStatusSearch").html(optionAll + option);
                $("#govCheckStatusSearch").val('4');
            } else if(unitId == '330001' || userName == '16000041'){
                $("#govCheckStatusSearch").html(optionAll + optionPending + option);
                $("#govCheckStatusSearch").val('8');
            }else{
                $("#govCheckStatusSearch").html(optionAll + option);
            }
        }
        // 重新渲染下拉，确保选项可见
        form.render('select');

        // 显示搜索项
        $("#searchCard").show();
        // 单位角色：只显示 年度 / 会议名称 / 审核状态
        if (unitUserTypeNum == 2 || !unitUserTypeNum) {
            $("#checkStatusSearchBox").show();
            $("#organizerBox,#recordNoBox,#scoreSearchBox,#holdDateBox,#govCheckStatusSearchBox,#exportBtnBox").hide();
        }
        // 市级 / 省级：显示图示中的搜索项
        if (unitUserTypeNum == 4 || unitUserTypeNum == 5) {
            $("#organizerBox,#recordNoBox,#scoreSearchBox,#holdDateBox,#govCheckStatusSearchBox,#exportBtnBox").show();
            $("#checkStatusSearchBox").hide();
        }

        // 工具函数
        let removeFormValue = function () {
            $('#formScore')[0].reset();
            $('#fileList').empty();
            fileUrls = [];
        };

        // 培训形式/内容：输入框启用态控制
        let setInputState = function ($input, enabled) {
            $input.prop('disabled', !enabled);
            $input.toggleClass('layui-disabled', !enabled);
        };
        let normalizeTrainingContentValue = function (v) {
            if (v === 1 || v === '1') return 'academic';
            if (v === 2 || v === '2') return 'lecture';
            if (v === 3 || v === '3') return 'operation';
            if (v === 4 || v === '4') return 'simulation';
            if (v === 5 || v === '5') return 'other';
            if (v === 'academic' || v === 'lecture' || v === 'operation' || v === 'simulation' || v === 'other') return v;
            return '';
        };
        let syncTrainingFormInputs = function (trainingFormVal, editable = true) {
            const $online = $('input[name="onlinePlatform"]');
            const $offline = $('input[name="offlineAddress"]');

            if (!editable) {
                setInputState($online, false);
                setInputState($offline, false);
                return;
            }

            if (trainingFormVal === 'online') {
                setInputState($online, true);
                setInputState($offline, false);
                $offline.val('');
            } else if (trainingFormVal === 'offline') {
                setInputState($online, false);
                setInputState($offline, true);
                $online.val('');
            } else {
                setInputState($online, false);
                setInputState($offline, false);
                $online.val('');
                $offline.val('');
            }
        };
        let syncTrainingContentOtherInput = function (trainingContentVal, editable = true) {
            const $other = $('input[name="otherMessage"]');

            if (!editable) {
                setInputState($other, false);
                return;
            }

            if (trainingContentVal === 'other') {
                setInputState($other, true);
            } else {
                setInputState($other, false);
                $other.val('');
            }
        };
        let initTrainingInputState = function (editable = true) {
            const trainingFormVal = $('input[name="trainingForm"]:checked').val();
            const trainingContentVal = $('input[name="trainingContent"]:checked').val();
            syncTrainingFormInputs(trainingFormVal, editable);
            syncTrainingContentOtherInput(trainingContentVal, editable);
        };
        
        let isCanChooseBtn = function (flag) {
            $('#chooseFileBtn').prop('disabled', !flag).toggleClass('layui-btn-disabled', !flag);
        };
        
        let isCanSubmitBtn = function (flag) {
            $('#submitFileBtn').prop('disabled', !flag).toggleClass('layui-btn-disabled', !flag);
        };

        let closeLoading = function () {
            ajaxNum--;
            if (ajaxNum <= 0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function () {
            if (ajaxNum == 0) loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
            ajaxNum++;
        }
        let getScoreLevel = () => {
            // 由于表单已修改，scoreLevel 字段不存在，直接返回空字符串
            return '';
        }
        let getVerParams = () => {
            return {
                cmeStandardKindId: cmeStandardKindId,
                versionYear: getCmeYear()
            };
        }
        let getCmeYear = () => {
            return $('#cmeYear').val();
        }
        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                data: JSON.stringify(data),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    closeLoading();
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }
        /* 列表基础参数 */
        let getDefaultData = function () {
            let checkStatus = $("#checkStatusSearch").val()

            if (unitUserType == 4 || unitUserType == 5) {
                checkStatus = $("#govCheckStatusSearch").val()
            }
            console.log('checkStatus:',checkStatus)
            let res = {
                // 后端查询 DTO 字段对齐（POST + JSON）
                unitId: unitId,
                cmeYear: $("#cmeYearSearch").val(),
                projectName: $("#projectName").val(),
                hostUnitName: $("#organizer").val(),
                score: $("#scoreSearch").val(),
                startTime: $("#holdDateStart").val(),
                endTime: $("#holdDateEnd").val(),
                projNo: $("#recordNo").val(),
                checkStatus: checkStatus
            };
            console.log(res)
            return res;
        }
        let checkStatusFun = function (d) {
            // 审核状态：0-未提交, 1-已提交/未审核, 2-地市同意, 3-地市不同意, 4-初审通过, 5-初审不通过, 6-同意备案, 7-不同意备案
            switch (d.checkStatus) {
                case '0': case 0: return '未提交';
                case '1': case 1: return '已提交';
                case '2': case 2: return '地市同意';
                case '3': case 3: return '地市不同意';
                case '4': case 4: return '初审通过';
                case '5': case 5: return '初审不通过';
                case '6': case 6: return '同意备案';
                case '7': case 7: return '不同意备案';
            }
            return '';
        }

        // 不同角色显示不同表格列
        let getTableCol = () => {

            let cols = [];

            // 统一的列定义，与截图一致
            cols = [
                {
                    type: 'CheckCustom', title: '选择', fixed: 'left', align: 'center', width: 60,
                    templet: function (d) {
                        let checkHtml = (d.checkStatus == 0) ? `<input type="checkbox" name="select_one" lay-filter="select_one" title="" lay-skin="primary" data-id="${d.projId}">` : `<img src="/img/score/disableIcon.png">`;
                        return checkHtml;
                    }
                },
                { title: '操作', align: 'center', width: 150, toolbar: userType == '12' ? '#rowBar1' : '#rowBar2', fixed: 'left' },
                { field: 'projName', title: '会议名称', align: 'center', width: 180, templet: '#viewProjName' },
                { field: 'holdUnit', title: '主办单位', align: 'center', width: 150 },
                { field: 'specialCommittee', title: '专委会', align: 'center', width: 120 },
                { field: 'meetingDuration', title: '时长', align: 'center', width: 80 },
                { field: 'score', title: '学分', align: 'center', width: 80 },
                { field: 'limitPerson', title: '拟招人数', align: 'center', width: 100 },
                {
                    title: '举办时间',
                    align: 'center',
                    width: 320,
                    templet: function(d) {
                        // 处理空值，避免显示"undefined"或"null"
                        const start = d.startDate || '';
                        const end = d.endDate || '';
                        // 拼接规则：有开始和结束则显示 "开始 - 结束"，只有一个则显示对应值，都没有则为空
                        return start && end ? `${start} - ${end}` : start || end || '';
                    }
                },
                { field: 'addTime', title: '提交时间', align: 'center', width: 150 },
                { field: 'checkStatus', title: '审核状态', align: 'center', width: 120, templet: (data) => checkStatusFun(data) },
                { field: 'approvalUnitName', title: '审核单位', align: 'center', width: 200 },
                { field: 'approvalContent', title: '审核意见', align: 'center', width: 120 },
                { field: 'projNo', title: '报备后编号', align: 'center', width: 120, templet: function(d) {
                        return (d.checkStatus == 6 || d.checkStatus === '6') ? (d.projNo || '') : '';
                    } },
                { field: 'trainingForm', title: '培训形式', align: 'center', width: 100, templet: function(d) {
                        if (d.trainingForm == 1 || d.trainingForm === 'online') {
                            return '线上';
                        } else if (d.trainingForm == 2 || d.trainingForm === 'offline') {
                            return '线下';
                        }
                        return '';
                    }},
                // { field: 'trainingContent', title: '培训内容', align: 'center', width: 100 }
                { field: 'trainingContent', title: '培训内容', align: 'center', width: 100, templet: function(d) {
                        if (d.trainingContent == 1 || d.trainingContent === 'academic') {
                            return '学术报告';
                        } else if (d.trainingContent == 2 || d.trainingContent === 'lecture') {
                            return '专题讲座';
                        } else if (d.trainingContent == 3 || d.trainingContent === 'operation') {
                            return '手术示范';
                        } else if (d.trainingContent == 4 || d.trainingContent === 'simulation') {
                            return '模拟教学';
                        } else if (d.trainingContent == 5 || d.trainingContent === 'other') {
                            return '其他';
                        }
                        return '';
                    }}
            ];

            return cols;
        }

        window.loaderTable = function () {
            table.render({
                elem: "#deptScoreBox",
                id: "deptScoreTable",
                url: huayi_projectscore_url + "cme-meeting-record-proj/page",
                method: 'post',
                contentType: 'application/json;charset=utf-8',
                toolbar: '#toolBar',
                height: 500,
                cellMinWidth: 100,
                defaultToolbar: [],
                page: true,
                limits: [10, 50, 100, 150, 200],
                where: getDefaultData(),
                request: {
                    pageName: 'pageNum',
                    limitName: 'pageSize'
                },
                cols: [getTableCol()],
                parseData: function (res) {
                    console.log(res)
                    return {
                        "code": res.status === 200 ? 0 : res.status,
                        "msg": res.status === 200 ? res.message : '获取数据失败',
                        "count": res.data?.recordsTotal,
                        "data": res.data?.records,
                        "page": res.data?.pageNum,
                        "limit": res.data?.pageSize,
                    }
                },
                done: function (res, curr, count) {
                    let trElems = $(".layui-table-fixed .layui-table-body .layui-table tbody tr");
                    if (res.data?.length != trElems.length) return;
                    form.on("checkbox(select_one)", function () {
                        if (!$(this).prop("checked")) {
                            $("input[name=selectFlag]").prop('checked', false);
                        }
                        form.render();
                    });
                },
                error: function () { }
            });
        }
        loaderTable();
        
        // 确保loaderTable在全局可用
        window.loaderTable = loaderTable;

        // 稍后绑定添加按钮和下载模板链接的点击事件
        // 因为addProj和downloadTemplate函数还未定义
        
        table.on('toolbar(dept-score-box)', function (obj) {
            obj.event == "addProj" && addProj();
            obj.event == "report" && reportScore();
            obj.event == "downloadTemplate" && downloadTemplate();
            obj.event == "excel" && excelDownload();
        });
        table.on('tool(dept-score-box)', function (obj) {
            const rowData = obj.data;
            // 查看：未提交时进入可编辑页面，其他状态进入只读查看页面
            if (obj.event === "view") {
                if (rowData.checkStatus === 0 || rowData.checkStatus === '0') {
                    editRowScore(rowData);
                } else {
                    viewRowScore(rowData);
                }
            }
            obj.event == "edit" && editRowScore(rowData);
            obj.event == "delete" && deleteRowScore(rowData);
            obj.event == "reportRow" && reportRowScore(rowData);
            obj.event == "approval" && approvalRowScore(rowData);
            obj.event == "submit" && submitRowScore(rowData);
        })

        // 提交项目
        let submitRowScore = function (rowData) {
            // 使用新的接口更新审核状态
            const updateData = {
                projIds: [rowData.projId],
                checkStatus: 1
            };
            
            layer.confirm('确定提交吗？', { icon: 3, title: '提示' }, function (index) {
                layer.close(index);
                updateData.unitId = unitId;
                updateData.unitName = realname;

                console.log(updateData)
                openLoading();
                $.ajax({
                    type: 'post',
                    url: huayi_projectscore_url + "cme-meeting-record-proj/approval",
                    data: JSON.stringify(updateData),
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    // headers: {
                    //     'KJPT-USER-ID': localStorage.getItem('userId') || ''
                    // },
                    success: function (res) {
                        console.log(res)
                        closeLoading();
                        if (res.status === 200) {
                            layer.msg("提交成功", {icon: 1, time: 1500}, function(){
                                loaderTable();
                            });
                        } else {
                            layer.msg(res.msg || "提交失败");
                        }
                    },
                    error: function () {
                        closeLoading();
                        layer.msg("提交失败");
                    }
                });
            });
        }

        // 下载模板
        let downloadTemplate = function () {
            layer.msg("下载模板");
            let downloadUrl = "";
            if(cmeStandardKindId == ZHE_JIANG_TAO_ID){
                downloadUrl = "/file/recordMeetingProjectTemplate_ZHEJIANG.docx";
            }else if(cmeStandardKindId == HE_NAN_TAO_ID){
                downloadUrl = "/file/recordProjectTemplate_HENAN.docx";
            }
            let a = document.createElement('a');
            a.href = downloadUrl;
            a.download = '学术会议预算模版.docx';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // 返回按钮点击事件
        $('.js-back').click(function() {
            layer.closeAll();
        });

        //上报的方法
        let reportScore = function () {
            let projIds = [];
            $.each($(".layui-table-fixed input[name=select_one]"), function (i, value) {
                if ($(this).prop('checked') === true && this.getAttribute("data-id").length > 0) {
                    projIds.push(this.getAttribute("data-id"));
                }
            });
            if (projIds.length <= 0) {
                layer.msg("请至少选中一条");
                return;
            }
            projIds = Array.from(new Set(projIds));
            submitApproval({ projIds: projIds, checkStatus: 1 });
        }
        let reportRowScore = function (rowData) {
            submitApproval({ projIds: [rowData.projId], checkStatus: 1 });
        }

        // 提交审核
        let submitApproval = function (data) {
            layer.confirm('确定提交吗？', { icon: 3, title: '提示' }, function (index) {
                // 根据 CmeRecordProjApproval 实体类构建参数
                let approvalParams = {
                    projId: data.projId,
                    projIds: data.projIds || [data.projId],
                    checkStatus: data.checkStatus,
                    approvalContent: data.approvalContent || '',
                    unitId: unitId,           // 当前机构ID
                    unitName: realname,       // 当前机构名称/审核人姓名
                    backedData: data.backedData !== undefined ? data.backedData : 0,
                    cstate: 1                 // 正常状态
                };

                openLoading();
                $.ajax({
                    type: 'post',
                    url: huayi_projectscore_url + "cme-meeting-record-proj/approval",
                    data: JSON.stringify(approvalParams),
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    headers: {
                        'KJPT-USER-ID': localStorage.getItem('userId') || '' // 添加缺少的请求头
                    },
                    success: function (res) {
                        closeLoading();
                        if (res.status === 200) {
                            layer.closeAll();
                            loaderTable();
                            layer.msg("操作成功");
                        } else {
                            layer.msg(res.msg || "操作失败");
                        }
                    },
                    error: function (xhr) {
                        closeLoading();
                        layer.msg("请求失败，状态码：" + xhr.status);
                    }
                })
            });
        }

        // 预览并审核（改为通过 $.ajax 带 Token 获取 PDF 流）
        let approvalRowScore = function (rowData) {
            const auditPdfUrl = huayi_projectscore_url + "cme-meeting-record-proj/viewAuditPdf?projId=" + rowData.projId;
            
            const loading = layer.msg('正在生成审核报备表...', {icon: 16, shade: 0.3, time: 0});
            
            $.ajax({
                type: 'get',
                url: auditPdfUrl,
                xhrFields: {
                    responseType: 'blob'
                },
                headers: {
                    'KJPT-USER-ID': localStorage.getItem('userId') || ''
                },
                success: function (blob) {
                    layer.close(loading);
                    const fileUrl = URL.createObjectURL(blob);
                    let buttons = ['查看备案进度', '关闭'];

                    if (rowData.nextApproval == nextApproval) {
                        buttons = [approvalData.approvalPassText, approvalData.approvalNoPassText, '查看备案进度', '关闭'];
                    }
                    
                    layer.open({
                        type: 2,
                        title: '项目备案详情及附件预览',
                        area: ['90%', '95%'],
                        offset: 'auto',
                        content: fileUrl,
                        // btn: [approvalData.approvalPassText, approvalData.approvalNoPassText, '查看备案进度', '关闭'],
                        btn: buttons,
                        yes: function(index, layero) {
                            // submitApproval({

        let getFilesByScoreId = function(projId,type){
            fileUrls = [];
            $('#fileList').empty();

            // 统一处理表头：始终显示“操作”表头，防止错位
            const $fileTable = $('#fileList').closest('table');
            const $opTh = $fileTable.find('thead th').eq(4);
            $opTh.show();
            
            openLoading();
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + 'cmeRecordProj/file',
                data: {projId: projId},
                success: function (res) {
                    closeLoading();
                    if(res.status == 200){
                        if(res.data == null) return;
                        if(res.data.length >= fileNums){
                            isCanChooseBtn(false);
                            isCanSubmitBtn(false);
                        }else{
                            isCanChooseBtn(true);
                            isCanSubmitBtn(false);
                        }
                        if(res.data.length == 0){
                            return;
                        }
                        fileUrls = [];
                        for(let tempObj of res.data){
                            fileUrls.push({fileName:tempObj.fileName,
                                fileUrl:tempObj.fileUrl,
                                fileSize:tempObj.fileSize,
                                tempId:tempObj.keyId});
                            createPhoto(tempObj.fileName,tempObj.fileSize,tempObj.fileUrl,tempObj.keyId,type);
                        }

                        // view 模式：隐藏删除按钮；政府角色(4/5)：即使出现也禁用点击
                        if(type === 'view'){
                            $('#fileList').find('a.layui-btn-danger').hide();
                        }

                        const unitUserTypeNumLocal = parseInt(unitUserType, 10);
                        const isGovReadOnly = (unitUserTypeNumLocal === 4 || unitUserTypeNumLocal === 5);
                        if(isGovReadOnly){
                            $('#fileList').find('a.layui-btn-danger').each(function(){
                                $(this)
                                    .addClass('layui-btn-disabled')
                                    .css('pointer-events','none')
                                    .attr('disabled', true)
                                    .removeAttr('onclick');
                            });
                        }
                    }else{ layer.msg("获取证明文件失败"); }
                },
                error: function () {
                    closeLoading();
                    layer.msg("获取证明文件失败");
                }
            });
        }

        let createPhoto = function(fileName,fileSize,fileUrl,fileId="",type="edit"){

            let btnHtml = `<td></td>`,jsClass=``;
            if(type=="edit"){
                btnHtml = `<td><a class="layui-btn layui-btn-xs layui-btn-danger" file-id="${fileId}" onclick="deletePhoto(this)">删除</a></td>`;

                btnHtml = `<td><a class="layui-btn layui-btn-xs layui-btn-danger" file-id="${fileId}" onclick="deleteMobilePhoto(this)">删除</a></td>`;
            }
            if(type!="view") jsClass = `js-photo`;
            let fileHtml = `<tr>
                    <td>${fileName}</td><td>${fileSize}kb</td>
                    <td><img class="image-table-tr ${jsClass}" onclick="viewPhoto('${fileUrl}')" src="${imgSrc}" alt="${fileName}" file-size="${fileSize}" file-id="${fileId}"></td>
                    <td>已上传</td>

        // 获取文件类型/上传路径（uploadApi/upload 需要 data 参数）
        let getFileType = function(filesObj) {
            let tempDatas = {};
            let year = new Date().getFullYear();
            // 会议备案材料上传目录（服务端按 path 归档）
            let path = `/meetingRecordProj/${cmeStandardKindId}/${year}/${unitId}`;
            for (let key in filesObj) {
                const file = filesObj[key];
                let fileData = { path: path, scale: 0.6, outputQuality: 0.6 };
                if (file && file.size > 3000000) {
                    fileData = { path: path, scale: 0.3, outputQuality: 0.3 };
                }
                const tempType = (file && file.type) ? file.type : '';
                if (tempType.indexOf("image") >= 0) {
                    fileData.fileType = "IMAGE";
                } else if (tempType.indexOf("application/pdf") >= 0) {
                    fileData.fileType = "DOC";
                } else {
                    fileData.fileType = "OTHER";
                }
                tempDatas[key] = fileData;
            }
            return tempDatas;
        }

                isCanSubmitBtn(true);
                var that = this;
                uploadFiles = obj.pushFile(); // 将每次选择的文件追加到文件队列

                if(Object.keys(uploadFiles).length + fileUrls.length >= fileNums){
                    isCanChooseBtn(false);
                }

                // 读取本地文件
                obj.preview(function (index, file, result) {
                    let imgSrc = (file.type && file.type.indexOf("pdf") >= 0) ? '/img/pdf.png' : result;
                    var tr = $([`<tr id="upload-${index}">`,
                        `<td><a>${file.name}</a></td><td>${(file.size / 1014).toFixed(1)}kb</td>`,
                        `<td><img id="showSmallPic${index}" src="${imgSrc}" alt="${file.name}" class="image-table-tr js-photo"></td>`,
                        `<td>未上传</td>`,
                        `<td>`,
                        `<button class="layui-btn layui-btn-xs demo-reload layui-hide">重传</button>`,
                        `<button class="layui-btn layui-btn-xs layui-btn-danger demo-delete">删除</button>`,
                        `</td>`,
                        `</tr>`].join(''));

                    // 单个重传
                    tr.find('.demo-reload').on('click', function () {
                        obj.upload(index, file);
                    });

                    // 删除
                    tr.find('.demo-delete').on('click', function () {
                        for (let i = 0; i < fileUrls.length; i++) {
                            if (fileUrls[i].tempId == index) {
                                fileUrls.splice(i, 1);
                                break;
                            }
                        }
                        delete uploadFiles[index];
                        tr.remove();
                        // 清空 input file 值，以免删除后出现同名文件不可选
                        try { uploadListIns.config.elem.next()[0].value = ''; } catch (e) {}
                        isCanChooseBtn(true);
                        (Object.keys(uploadFiles).length == 0) && isCanSubmitBtn(false);
                    });

                    that.elemList.append(tr);
                    $("#showSmallPic"+index).bind('click',function () { viewPhoto(result,file); });
                });
            },
            done: function (res, index, upload) { // 成功的回调
                var that = this;
                if (res && res.code == 200) { // 上传成功
                    let sizeKb = uploadFiles[index] ? (uploadFiles[index].size / 1014).toFixed(1) : '';
                    fileUrls.push({
                        fileName: uploadFiles[index] ? uploadFiles[index].name : '',
                        fileUrl: res.data && res.data.picUrl ? res.data.picUrl : '',
                        fileSize: sizeKb,
                        tempId: index
                    });

                    var tr = that.elemList.find('tr#upload-' + index);
                    var tds = tr.children();
                    tds.eq(3).html('已上传');
                    tds.eq(4).find('.demo-delete').addClass('layui-hide');
                    delete uploadFiles[index];
                    (Object.keys(uploadFiles).length == 0) && isCanSubmitBtn(false);
                    return;
                }
                this.error(index, upload);
            },
            error: function (index, upload) { // 错误回调
                var that = this;
                var tr = that.elemList.find('tr#upload-' + index);
                var tds = tr.children();
                tds.eq(3).html('上传失败');
                tds.eq(4).find('.demo-reload').removeClass('layui-hide');
                $('#chooseFileBtn').prop('disabled', false).removeClass('layui-btn-disabled');
                $('#submitFileBtn').prop('disabled', false).removeClass('layui-btn-disabled');
            }
        });

        // 顶部“导出”按钮
        $('#exportBtn').on('click', function () {
            excelDownload();
        });

    })
</script>
</body>

</html>
