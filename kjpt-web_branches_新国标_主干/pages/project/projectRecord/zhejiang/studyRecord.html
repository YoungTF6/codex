<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool',
        ysUpload: 'ysUpload'
    });
    layui.use(['table', 'form', 'ysUpload', 'laydate', 'tool'], function () {
        var table = layui.table, form = layui.form, laydate = layui.laydate, tool = layui.tool, ysUpload = layui.ysUpload;
        var element = layui.element;
        var height = 0, ajaxNum = 0, loading, nowRowData;
        let fileUrls = [],uploadFiles = [], fileNums = 1, fileSize = 15 * 1024,viewFile = "viewFile", scale = 3;

        let cmeStandardKindId = localStorage.getItem('standardkind-id');
        let unitId = localStorage.getItem('unit-id');
        let unitName = localStorage.getItem('unit-name');
        let ZHE_JIANG_TAO_ID = '190c480d-d43c-450b-8472-a6fd00a6729d',
            HE_NAN_TAO_ID = 'a6280900-a9c2-11ec-84d6-fa163e9b64fb';

        let approvalData = {
            checkStatus: 4,
            approvalPassText: "初审通过",
            approvalNoPassText: "初审不通过"
        };
        if (unitUserType == 4) {
            approvalData.checkStatus = 2;
            approvalData.approvalPassText = "地市同意";
            approvalData.approvalNoPassText = "地市不同意";
        }
        if (userName == '82000200' || userName == '16000041') {
            approvalData.checkStatus = 6;
            approvalData.approvalPassText = "同意备案";
            approvalData.approvalNoPassText = "不同意备案";
        }

        // 初始化日期选择
        laydate.render({ elem: 'input[name="startDate"]', type: 'datetime' });
        laydate.render({ elem: 'input[name="endDate"]', type: 'datetime' });

        // 初始化年度选择
        let cmeYear = new Date().getFullYear();
        // for (let i = 0; i < 1; i++) {
        //     let option = `<option value="${cmeYear - i}">${cmeYear - i}</option>`;
        //     // $("#cmeYear").append(option);
        //     $("#cmeYearSearch").append(option);
        // }

        // 显示2023年到当前年度
        $("#cmeYearSearch").append('<option value="">全部</option>');
        while (cmeYear >= 2023) {
            let option = `<option value="${cmeYear}">${cmeYear}</option>`;
            $("#cmeYearSearch").append(option);
            // 默认选中当前年度
            if (userType == 11 && cmeYear == new Date().getFullYear()) {
                $("#cmeYearSearch").val(cmeYear);
            }
            cmeYear--;
        }
        form.render('select');

        // 初始化学分级别
        let scoreLevelList = [{ id: '50b9f143-57d2-4a64-abab-814c03c58505', name: '异地备案国家级' },
            { id: '995b7e47-e89f-4433-b90e-a7a5e5cbf363', name: '异地备案省级' }];
        scoreLevelList.forEach(scoreLevel => {
            let option = `<option value="${scoreLevel.id}">${scoreLevel.name}</option>`;
            $("#scoreLevel").append(option);
            $("#scoreLevelSearch").append(option);
        });

        // 审核状态：0-未提交, 1-已提交/未审核, 2-地市同意, 3-地市不同意, 4-初审通过, 5-初审不通过, 6-同意备案, 7-不同意备案
        //    地市默认显示：未审核。审核状态显示：未审核、地市同意、地市不同意、初审通过、初审不通过。
        let option = `<option value="2">地市同意</option>
                            <option value="3">地市不同意</option>
                            <option value="4">初审通过</option>
                            <option value="5">初审不通过</option>
                            <option value="6">同意备案</option>
                            <option value="7">不同意备案</option>`;
        if(cmeStandardKindId == HE_NAN_TAO_ID){
            option = `<option value="2">地市同意</option>
                            <option value="3">地市不同意</option>
                            <option value="6">同意备案</option>
                            <option value="7">不同意备案</option>`;
        }
        let option1 = `<option value="1">未审核</option>`;
        let optionAll = `<option value="">全部</option>`
        let optionPending = `<option value="1">待审核</option>`;
        if(unitUserType == 4){
            $("#checkStatusSearch").html(optionAll + option1 + option);
            $("#checkStatusSearch").val('');
            form.render('select'); // 新增
        }

        // 省级用户默认显示：待审核。审核状态显示：全部、未审核、地市同意、地市不同意、初审通过、初审不通过、同意备案、不同意备案、待审核。
        console.log('unitUserType---',unitUserType)
        if(unitUserType == 5){
            if(userName == '82000200' ){
                // 省级特殊账号（82000200）默认显示：初审通过。审核状态显示：全部、未审核、地市同意、地市不同意、初审通过、初审不通过、同意备案、不同意备案。
                $("#checkStatusSearch").html(optionAll + option);
                $("#checkStatusSearch").val('4');
                form.render('select'); // 新增
            } else if(unitId == '330001' || userName == '16000041'){
                // 添加待审核
                // option += `<option value="4">待审核</option>`;
                $("#checkStatusSearch").html(optionAll + optionPending + option);
                $("#checkStatusSearch").val('8');
                form.render('select'); // 新增
            }else{
                $("#checkStatusSearch").html(optionAll + option);
                form.render('select'); // 新增
            }
        }

        // 单位角色
        if(userType == '12'){
            $("#cmeYearSearchBox").show();
            // 审核状态默认未审核
            // $("#checkStatusSearch").val('0');
        }else if (userType == '11') {
            // 政府角色显示搜索项: 年度, 审核状态, 学分级别
            $("#checkStatusLabel").html("审核状态");
            $("#cmeYearSearchBox").show();
            $("#scoreLevelSearchBox").show();
            // 审核状态
            // $("#checkStatusSearch").val('');
        }

        let closeLoading = function () {
            ajaxNum--;
            if (ajaxNum <= 0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function () {
            if (ajaxNum == 0) loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
            ajaxNum++;
        }

        let getVerParams = () => {
            return {
                cmeStandardKindId: cmeStandardKindId,
                // versionYear         : $('#cmeYear').val()
                versionYear: getCmeYear()
            };
        }
        let getCmeYear = () => {
            return $('#cmeYear').val();
        }
        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                async: false,
                data: data,
                success: function (res) {
                    closeLoading();
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }
        /* 列表基础参数 */
        let getDefaultData = function () {
            let res = {
                unitId: unitId,
                scoreLevelId: $('#scoreLevelSearch').val(),
                cmeYear: $("#cmeYearSearch").val(),
            };
            let checkStatus = $('#checkStatusSearch').val();

        let getFilesByScoreId = function(projId,type){
            $(".js-photo-box").removeClass("hidden-el");
            commonAjax('post',huayi_projectscore_url + 'cmeAdvancedRecordProj/file',

                            isCanChooseBtn(true);

                        if(res.data.length == 0 && !isUploadPhoto){
                            $(".js-photo-box").addClass("hidden-el");

                        fileUrls = [];
                        for(let tempObj of res.data){
                            fileUrls.push({fileName:tempObj.fileName,
                                fileUrl:tempObj.fileUrl,
                                fileSize:tempObj.fileSize,
                                tempId:tempObj.keyId});
                            createPhoto(tempObj.fileName,tempObj.fileSize,tempObj.fileUrl,tempObj.keyId,type);

                    }else{ layer.msg("获取证明文件失败"); }
                }
            );

            let btnHtml = `<td></td>`,jsClass=``;

                    <td>${fileName}</td><td>${fileSize}kb</td>
                    <td><img class="image-table-tr ${jsClass}" onclick="viewPhoto('${fileUrl}')" src="${imgSrc}" alt="${fileName}" file-size="${fileSize}" file-id="${fileId}"></td>

            // 举办形式（trainingForm）联动校验：与 meetingRecord 逻辑保持一致
            if (data.field.trainingForm === '1' || data.field.trainingForm === 1) {
                if (!data.field.onlinePlatform) {
                    layer.msg("请填写线上平台名称或网址", { icon: 5 });
                    return false;
                }
                data.field.offlineAddress = '';
            } else if (data.field.trainingForm === '2' || data.field.trainingForm === 2) {
                if (!data.field.offlineAddress) {
                    layer.msg("请填写线下地点", { icon: 5 });
                    return false;
                }
                data.field.onlinePlatform = '';
            } else {
                layer.msg("请选择举办形式", { icon: 5 });
                return false;
            }

            // 资助类别联动校验：仅“自筹经费”时允许并要求填写经费来源
            if (data.field.fundingType === '3' || data.field.fundingType === 3) {
                if (!data.field.fundingSource) {
                    layer.msg("请选择自筹经费时，请填写经费来源", { icon: 5 });
                    return false;
                }
            } else {
                data.field.fundingSource = '';
            }

            data.field.cmeRecordProjFileList = fileUrls;
            // 获取当前单位id
            data.field.unitId = unitId;

            let url = '';
            if(data.field.projId){
                url = huayi_projectscore_url + "cmeAdvancedRecordProj/update";
            }else{
                url = huayi_projectscore_url + "cmeAdvancedRecordProj/save";
            }
            $.ajax({
                type: 'post',
                url: url,
                data: JSON.stringify(data.field),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    closeLoading();
                    if (res.status === 200) {
                        layer.closeAll();
                        loaderTable();
                        layer.msg("保存成功");
                    } else {
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    closeLoading();
                    layer.msg("保存失败");
                }
            })

            return false;
        })

        // 举办形式：选中才允许对应输入框填写
        form.on('radio(trainingForm)', function (data) {
            if ($('#editScore input[name="projName"]').prop('disabled')) return;
            syncHoldFormInputs(data.value, true);
        });

        // 资助类别：仅“自筹经费”时允许填写经费来源
        form.on('radio(fundingType)', function (data) {
            if ($('#editScore input[name="projName"]').prop('disabled')) return;
            syncFundingTypeInputs(data.value, true);
        });

        // 删除
        let deleteRowScore = function (rowData) {
            console.log(rowData);
            layer.confirm('确定要删除吗？', { icon: 3, title: '提示' }, function (index) {
                commonAjax('get', huayi_projectscore_url + "cmeAdvancedRecordProj/delete",
                    { "id": rowData.projId }, function () { layer.msg("删除失败"); },
                    function (res) {
                        console.log(res)
                        if (res === true || res.status === 200 || res.success === true) {
                            layer.msg("删除成功");
                            loaderTable();
                        } else { layer.msg(res.msg); }
                    }
                );
                layer.close(index);
            });
        }

        // 导出Excel
        let excelDownload = function(){
            layer.msg("下载中，请稍等",{icon:6 ,time: 2000});
            let url = huayi_projectscore_url + "cmeAdvancedRecordProj/excel";
            let params =  getDefaultData();
            tool.exportExcelPost(url,params,"异地备案项目表.xlsx");
        }

        // 上传文件
        var uploadListIns = ysUpload.render({
            elem: '#chooseFileBtn',
            elemList: $('#fileList'), // 列表元素对象
            url: huayi_upload_url + 'uploadApi/upload', // 实际使用时改成您自己的上传接口即可。
            exts: 'pdf',
            accept: 'file',
            multiple: true,
            number: fileNums,
            size: fileSize,
            auto: false,
            bindAction: '#submitFileBtn',
            before: function(obj){
                this.data = getFileType(obj.pushFile());
            },
            choose: function (obj) {
                isCanSubmitBtn(true);
                var that = this;
                uploadFiles = obj.pushFile(); // 将每次选择的文件追加到文件队列
                // 文件上传数量限制
                if(Object.keys(uploadFiles).length + fileUrls.length >= fileNums){
                    isCanChooseBtn(false);
                }
                // 读取本地文件
                obj.preview(function (index, file, result) {
                    let imgSrc = file.type.indexOf("pdf") >=0? '/img/pdf.png' : result;
                    var tr = $([`<tr id="upload-${index}">`,
                        `<td><a>${file.name}</a></td><td>${(file.size / 1014).toFixed(1)}kb</td>`,
                        `<td><img id="showSmallPic${index}" src="${imgSrc}" alt="${file.name}" class="image-table-tr js-photo"></td>`,
                        `<td>未上传</td>`,
                        `<td>`,
                        `<button class="layui-btn layui-btn-xs demo-reload layui-hide">重传</button>`,
                        `<button class="layui-btn layui-btn-xs layui-btn-danger demo-delete">删除</button>`,
                        `</td>`,
                        `</tr>`].join(''));

                    // 单个重传
                    tr.find('.demo-reload').on('click', function () {
                        obj.upload(index, file);
                    });

                    // 删除
                    tr.find('.demo-delete').on('click', function () {
                        for (let i = 0; i < fileUrls.length; i++) {
                            if (fileUrls[i].tempId == index) {
                                fileUrls.splice(i, 1);
                                break;
                            }
                        }
                        delete uploadFiles[index]; // 删除对应的文件
                        tr.remove(); // 删除表格行
                        // 清空 input file 值，以免删除后出现同名文件不可选
                        uploadListIns.config.elem.next()[0].value = '';
                        isCanChooseBtn(true);
                        (Object.keys(uploadFiles).length == 0) && isCanSubmitBtn(false);
                    });

                    that.elemList.append(tr);
                    // element.render('progress'); // 渲染新加的进度条组件
                    $("#showSmallPic"+index).bind('click',function () { viewPhoto(result,file); });
                });
            },
            done: function (res, index, upload) { // 成功的回调
                var that = this;
                if (res.code == 200) { // 上传成功
                    let fileSize = (uploadFiles[index].size / 1014).toFixed(1);
                    fileUrls.push({
                        fileName: uploadFiles[index].name,
                        fileUrl: res.data.picUrl,
                        fileSize: fileSize,
                        tempId: index
                    })

                    var tr = that.elemList.find('tr#upload-' + index)
                    var tds = tr.children();
                    tds.eq(3).html('已上传'); // 清空操作
                    // tds.eq(3).find('.demo-reload').addClass('layui-hide');
                    tds.eq(4).find('.demo-delete').addClass('layui-hide');
                    delete uploadFiles[index]; // 删除文件队列已经上传成功的文件
                    (Object.keys(uploadFiles).length == 0) && isCanSubmitBtn(false);
                    return;
                }
                this.error(index, upload);
            },
            allDone: function (obj) { // 多文件上传完毕后的状态回调
                console.log(obj)
            },
            error: function (index, upload) { // 错误回调
                var that = this;
                var tr = that.elemList.find('tr#upload-' + index);
                var tds = tr.children();
                // 显示重传
                tds.eq(2).html('上传失败');
                tds.eq(3).find('.demo-reload').removeClass('layui-hide');
            },
            // progress: function(n, elem, e, index){ // 注意：index 参数为 layui 2.6.6 新增
            //     element.progress('progress-demo-'+ index, n + '%'); // 执行进度条。n 即为返回的进度百分比
            // }
        });

        //获取文件类型
        let getFileType = function(filesObj) {
            let tempDatas = {};
            let year = new Date().getFullYear();
            let path = `/diffPlaceProjRecord/${cmeStandardKindId}/${year}/${unitId}`;
            for(let key in filesObj){
                let fileData = {path:path,scale:0.6,outputQuality:0.6};
                // 判断文件大小, 超过3M压缩比例改为0.3
                debugger
                if(filesObj[key].size > 3000000 ){
                    fileData = {path:path,scale:0.3,outputQuality:0.3};
                }
                const tempType = filesObj[key].type;
                if(tempType.indexOf("image") >= 0){
                    fileData.fileType = "IMAGE";
                } else if(tempType.indexOf("application/pdf") >= 0){
                    fileData.fileType = "DOC";
                } else {
                    fileData.fileType = "OTHER";
                }
                tempDatas[key] = fileData;
            }
            return tempDatas;
        }

        //是否可以选择按钮
        let isCanChooseBtn = function (flag = true) {
            if (flag) {
                $("#chooseFileBtn").removeClass("layui-btn-disabled");
                $("#chooseFileBtn").attr("disabled", false);
            } else {
                $("#chooseFileBtn").addClass("layui-btn-disabled");
                $("#chooseFileBtn").attr("disabled", true);
            }
        }

        //是否可以提交按钮
        let isCanSubmitBtn = function (flag = true) {
            if (flag) {
                $('#submitBox').show();
                $('#chooseFileBtn, #submitFileBtn').show();
                $('#fileBox').show();
                $("#submitFileBtn").removeClass("layui-btn-disabled");
                $("#submitFileBtn").attr("disabled", false);
            } else {
                $("#submitFileBtn").addClass("layui-btn-disabled");
                $("#submitFileBtn").attr("disabled", true);
            }
        }

        // 举办形式：与 meetingRecord 页一致，选中后才允许填写对应输入框
        let setInputState = function ($input, enabled) {
            $input.prop('disabled', !enabled);
            $input.prop('readonly', !enabled);
            $input.css('pointer-events', enabled ? 'auto' : 'none');
            $input.toggleClass('layui-disabled', !enabled);
        }
        let syncHoldFormInputs = function (holdFormVal, editable = true) {
            const $online = $('input[name="onlinePlatform"]');
            const $offline = $('input[name="offlineAddress"]');

            if (!editable) {
                setInputState($online, false);
                setInputState($offline, false);
                return;
            }

            if (holdFormVal === '1' || holdFormVal === 1) {
                setInputState($online, true);
                setInputState($offline, false);
                $offline.val('');
            } else if (holdFormVal === '2' || holdFormVal === 2) {
                setInputState($online, false);
                setInputState($offline, true);
                $online.val('');
            } else {
                setInputState($online, false);
                setInputState($offline, false);
                $online.val('');
                $offline.val('');
            }
        }
        let initHoldFormInputState = function (editable = true) {
            const holdFormVal = $('input[name="trainingForm"]:checked').val();
            syncHoldFormInputs(holdFormVal, editable);
        }

        // 资助类别：仅“自筹经费”时允许填写经费来源
        let syncFundingTypeInputs = function (fundingTypeVal, editable = true) {
            const $fundingSource = $('input[name="fundingSource"]');

            if (!editable) {
                setInputState($fundingSource, false);
                return;
            }

            if (fundingTypeVal === '3' || fundingTypeVal === 3) {
                setInputState($fundingSource, true);
            } else {
                setInputState($fundingSource, false);
                $fundingSource.val('');
            }
        }
        let initFundingTypeInputState = function (editable = true) {
            const fundingTypeVal = $('input[name="fundingType"]:checked').val();
            syncFundingTypeInputs(fundingTypeVal, editable);
        }

        // 清空表单
        let removeFormValue = function(){
            // 解除表单禁用
            $('#editScore input, #editScore select, #editScore textarea, #editScore button').prop('disabled', false);
            // 恢复单位名称输入框默认状态（添加时会再次固定）
            $('input[name="holdUnit"]').prop('readonly', false).removeClass('layui-disabled');
            $('#unitName').prop('disabled', true);
            fileUrls = [];
            if(uploadFiles!=null){
                for(let index in uploadFiles){ delete uploadFiles[index]; }
            }
            isCanChooseBtn(true);
            isCanSubmitBtn(false);
            $("#fileList").html("");
            $("#formScore")[0].reset();
            $("input[type='hidden']").val("");
            form.render();
        }

        $(".js-back").click(function(){  removeFormValue(); layer.closeAll(); });

        // 按键esc关闭弹窗
        $(document).keydown(function (event) {
            if (event.keyCode == 27) {
                removeFormValue();
                layer.closeAll();
            }
        });
    })
</script>
