<script>

    layui.config({
            base: '/js/layui/ext/'
        }).extend({
            tool    :   'tool'
        });
    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element','tool'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var tool = layui.tool;
        var year = document.getElementById("holdYear");
        var userid= localStorage.getItem("unit-id");
        var my = new Date();
        var status=0;
        var tabNumber=getUrlParam("tabNumber");
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        var debounceTime=1500;//防抖时间
        const _isZheJiang = cmeStandardKindId === '190c480d-d43c-450b-8472-a6fd00a6729d';
        const _isGuangdong = cmeStandardKindId === "289bf0ca-52cb-4b19-b737-9bd200a69ce1";

        // 将constantPage.js 常量赋值给label
        $("label").each(function() {
            const name = $(this).attr("name");
            if (projectLabels[name] !== undefined) {
                $(this).text(projectLabels[name]);
            }
        });

        function updateButtons() {
            var buttonP = document.getElementById("btnpass"); // 获取按钮元素
            var buttonNP = document.getElementById("btnnopass");  
            var buttonBack = document.getElementById("btnsendback");

            if (cmeStandardKindId === "4a6d91fb-8ba4-4560-a801-9c6f00e6d999") {
                buttonP.textContent = "审查通过"; 
                buttonNP.textContent = "审查不通过"; 
                buttonBack.textContent = "退回下级"; 
            }else if(cmeStandardKindId === "190c480d-d43c-450b-8472-a6fd00a6729d"){
                buttonP.textContent = "审核通过";
                buttonNP.textContent = "审核不通过"; 
                buttonBack.textContent = "退回修改"; 
                // 调整顺序：通过、退回、不通过
                var btnpass = document.getElementById("btnpass");
                var btnnopass = document.getElementById("btnnopass");
                var btnsendback = document.getElementById("btnsendback");
                var parent = btnpass.parentNode;
                if (parent && parent.contains(btnpass) && parent.contains(btnnopass) && parent.contains(btnsendback)) {
                    parent.removeChild(btnnopass);
                    parent.removeChild(btnsendback);
                    parent.insertBefore(btnsendback, btnnopass.nextSibling);
                    parent.insertBefore(btnnopass, btnsendback.nextSibling);
                }
            } else if (_isGuangdong) {
                buttonP.textContent = "审核通过";
                buttonNP.textContent = "审核不通过"; 
                buttonBack.textContent = "退回修改";

            }else {
                buttonP.textContent = "预审通过";
                buttonNP.textContent = "预审不通过"; 
                buttonBack.textContent = "退回修改"; 
            }
        }

        function buildBaseColumns() {
            var columns = [
                {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                    field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                        var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.projectId+'"><i class="layui-icon"></i>';
                        if( status==0){
                            return d.isPass != null || d.flowChainState != "0"  ?'已审核':templateHtml
                        }else{
                            return d.isPass != null && d.flowChainState > d.orgChainState ?'上级已审核':templateHtml
                        }
                    }
                },
                {field: 'center', width: 200, toolbar: '#rowBar', title: '操作',align:'center'},
                {
                    field: 'decl_url',
                    title: '申报书url',
                    hide: true
                }
            ];

            if(localStorage.getItem("standardkind-id")!="73ba18db-33fd-4746-ab41-9beb009f69a1"){
                columns.push({field: 'center',width: 100,toolbar: '#rowCheckBar',title: '审批进度',align: 'center'});
            }
            if(cmeStandardKindId=="eee87ca0-7df1-426c-aae3-7cae782b4d6b"){
                columns.push({field:'center', title:'申报书', width:173, templet: '#uploadDecl',align: 'center'});
            }
            if (_isZheJiang) {
                columns.push({field:'center', title:'项目负责人课件', width:173, templet: '#uploadDecl',align: 'center'});
            }
            if (_isGuangdong) {
                columns.push({field:'center', title:'承诺书', width:173, templet: '#uploadDecl',align: 'center'});
            }
            return columns;
        }

        function bindDeclPreviewButtons(rows) {
            if (!_isZheJiang && !_isGuangdong && cmeStandardKindId != "eee87ca0-7df1-426c-aae3-7cae782b4d6b") {
                return;
            }
            for (var i = 0; i < rows.length; i++) {
                var tr = $(".layui-table-body tr[data-index=" + i + "]");
                var declUrl = rows[i].declUrl;
                if (declUrl) {
                    tr.find('.view-btn').show();
                }
                tr.find('.file-url').val(declUrl || '');
            }
            $('.view-btn').off('click').on('click', function(){
                var url = $(this).siblings('.file-url').val();
                if(url){
                    window.open(url);
                }else{
                    layer.msg('暂无附件');
                }
            });
        }

        $(function () {
            tool.setMedicalTypeSelectById("#projectType");
            ddlList();
            loaderTable();
            loadReport();
            ddlscoreLevel();
            if(tabNumber!=null && tabNumber!=''){
                $('.layui-tab-title li').eq(tabNumber).addClass('tab_this layui-this').siblings().removeClass('tab_this layui-this');
                status=tabNumber;
                loaderTable();
                displayBtn();
            }
            updateButtons();
            loadLimitNum();

        });
        window.colArray = buildBaseColumns();

        $.ajax({
                type:"POST",
                headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                async:false,
                url: huayi_projectscore_url +"project/comcolumnList",
                data:JSON.stringify({"module_name": "ProjectOrgCheck"}),
                contentType:"application/json",
                success:function(data){
                    $.each(data.data,function(index,item){
                        let column="";
                        if(item.columnCamelCase=="projectCode"){
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                        }else{
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                        }
                        window.colArray.push(column);
                    })
                },
                error: function (data, xhr,  stus) {
                    layer.msg("响应失败");
                }
            })


// 表格相关操作
        // 表格配置
        function loaderTable() {
            window.mainTable = table.render({
                elem: '#project',
                url: huayi_projectscore_url + 'project/selectOrgCheck',
                title: '用户表',
                method: 'post',
                defaultToolbar: [],
                where: {
                    HoldYear: $('#holdYear').val(),
                    CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                    ProjectName: $('#projectName').val(),
                    ProjectCode: $('#projectCode').val(),
                    DictId: $('#holdType').val(),
                    personName: $('#PrincipalName').val(),
                    unitName: $('#UnitName').val(),
                    knowledge2: $('#knowledge2').val(),
                    knowledge3: $('#knowledge3').val(),
                    UnitChildren:localStorage.getItem("menu-unit-id"),
                    cmeStandardKindId:localStorage.getItem("standardkind-id"),
                    status:status,
                    isOrgAllCheck:1,
                    unitId:localStorage.getItem("unit-id"),
                    projType : $('#ActivityType').val(),
                    scoreType : $('#ActivityContent').val(),
                    projectType:  $('#projectType').val()
                },

                cols:[
                    //{field: 'center', width: 160, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    window.colArray
                ],
                done:function(res, curr, count){
                    for(var i = 0;i<res.data.length;i++){
                        var state = res.data[i].isPass; //根据status状态判断，不为0时，禁止勾选
                        var checkallinfo=$("#checkboxAll").is(":checked");
                        var checkboxCurrent=$("#checkboxCurrent").is(":checked");
                        var templateHtml ="";
                        //如果全选
                        if (checkallinfo || checkboxCurrent){
                            var index = res.data[i]['LAY_TABLE_INDEX'];
                            if(state==null)
                            {
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                            }
                        }
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });
                    }
                    bindDeclPreviewButtons(res.data || []);
                },
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "project",
                height: 'full-255',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });
        };
        window.colSettingClaaback = function( obj){
            var str={"module_name":"ProjectOrgCheck"};
            $.ajax({
                type:"POST",
                headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                },
                url: huayi_projectscore_url +"project/comcolumnList",

                data:JSON.stringify(str),
                contentType:"application/json",
                success:function(data){
                    window.colArray = buildBaseColumns();
                    $.each(data.data,function(index,item){
                        let column="";
                        if(item.columnCamelCase=="projectCode"){
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                        }else{
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                        }
                        window.colArray.push(column);
                    })
                    loaderTable();
                    if(obj && obj.success){
                        layer.close(window.colLayerIndex);
                    }
                    else{
                        layui.msg(obj.msg);
                    }
                },
                error: function (data, xhr,  stus) {
                    layer.msg("响应失败");

                url: huayi_projectscore_url +"projectDDL/selectknowledge",
                data: {type:3,know2: $('#knowledge2').val(),cmeStandardKindId:localStorage.getItem('standardkind-id')},
                dataType: 'json',
                success: function (data) {
                    $('#knowledge3').empty();
                    $('#knowledge3').append(new Option("全部",""));
                    $.each(data.data,function(index,item){
                        $('#knowledge3').append(new Option(item.knowledgeName,item.knowledgeId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            });
        })
        form.on('select(loadHoldType)', function(data) {
            getDicApplyDate();
            loadLimitNum();
            //加载举办方式
            let keyName     = projectLabels.lblProjectLevel,
            scoreLevel  = $('#CmeComScoreLevel').val();
            $.ajax({
                url     : huayi_sjwh_url + 'option/holdType/list/' +  localStorage.getItem("standardkind-id")+ '/' + scoreLevel + '/1__',
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#holdType');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            $.ajax({
                url     : huayi_sjwh_url + 'option/scoreLevelContent/list',
                data    : { scoreLevel: scoreLevel },
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#ActivityContent');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.value + '">' + d.scoreLevelContentName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        })

        function loadLimitNum(){
            if(localStorage.getItem("standardkind-id")!="08e44437-5789-44e0-8ff8-9ecb00a6348a" && localStorage.getItem("standardkind-id")!="8b1e9418-47ff-4ff7-9dd9-a9e0009a6951"){
                $('#applyLimit').html("");
                return;
            }else{
                $.ajax({
                    type:"POST",
                    async: false,
                    url: huayi_projectscore_url + "project/getProjlimited",
                    data:  JSON.stringify({
                        unitid: localStorage.getItem("unit-id"),
                        holdyear: $('#holdYear').val(),
                        scoreLevelId: $('#CmeComScoreLevel').val(),
                        cme_standard_kind_id: localStorage.getItem("standardkind-id")
                    }),
                    contentType: "application/json",
                    dataType: "json",
                    success: function(data) {
                
                        // 渲染模板
                        if(data!=null){
                            if(data.status==501){
                                $('#applyLimit').html("");
                            }else{
                                if(localStorage.getItem("standardkind-id")==="08e44437-5789-44e0-8ff8-9ecb00a6348a"){
                                    lblmsg="项目剩余上报数量:"+data.data;
                                }else{
                                    lblmsg="项目上报数量:"+data.data;
                                }
                                $('#applyLimit').html(lblmsg);
                            }
                        }else
                        {
                            $('#applyLimit').html("");
                        }  
                    },
                    error: function(data, xhr, stus) {
                        layer.msg("响应失败");
                    }
                })
            }
           
        }
        function getDicApplyDate(){
            if ($('#CmeComScoreLevel').val()===null || $('#CmeComScoreLevel').val()==="" )  
                return;
            
            // 项目级别发生改变时更改 lab内容
            $.ajax({
                type: "post",
                //url: huayi_projectscore_url + "projectApplyDate/getDicApplyDateByParam",
                url: huayi_projectscore_url+"projectApplyDate/isDelay",
                async: false,
                //data: {
                    //unitId: localStorage.getItem("unit-id"),
                    //scoreLevelId: $('#CmeComScoreLevel').val(),
                    //holdYear: $('#holdYear').val(),
                    //type: 1
                //},
                data: {year:$('#holdYear').val(),unitId:localStorage.getItem("unit-id"),scoreLevelId:$('#CmeComScoreLevel').val(),type:1,from:''},
                dataType: 'json',
                success: function(data) {
                    //$('#applydateDg').html(  data.data=="" || data.data==null?"上级单位未设置":'申报截止时间为: '+data.data);
                    $('#applydateDg').html("审核时间:"+data.data.startDate+"~"+data.data.endDate);
                },
                error: function(data, xhr, stus) {
                    //layer.msg("响应失败");
                }
            })
        }


        //鼠标悬停提示特效
        $("#hint").hover(function () {
            openMsg();
        }, function () {
            layer.close(subtips);
        });
        function openMsg() {
            subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
        }
        element.on('tab(tabcheck)', function(data){
            var nums=data.index;
            status=nums;
            

            loaderTable();
            loadReport();
            updateButtons();
            //屏蔽按钮
            switch (status) {
                case 2: $("#btnpass").attr("style","display:none");
                    break;
                case 3: $("#btnsendback").attr("style","display:none");
                    break; 
                case 4: $("#btnnopass").attr("style","display:none");
                    break;
            }

        });
        function displayBtn(){
            if(status==2){
                $('#btnpass').attr('style','display:none');
            }else if(status==3){
                $('#btnsendback').attr('style','display:none');
            }else if(status==4){
                $('#btnnopass').attr('style','display:none');
            }
        }
        function getProjleveltype(projectidlist){
            var projecttypelist=[];
            var leveltypemessage;
            $.ajax({
                type: "post",
                async: false,
                url: huayi_projectscore_url +"project/getProjleveltype",
                data: {ProjectIdList:JSON.stringify(projectidlist)},
                dataType: 'json',
                success: function (data) {
                    $.each(data.data,function(index,item){
                        let tempObj = {};
                        tempObj[item.score_level_id] = item.case;
                        projecttypelist.push(tempObj);
                    })
                    let tempParam = {year: $('#holdYear').val(),unitId:localStorage.getItem("unit-id"),type:1,scoreLevelList:projecttypelist};
                    $.ajax({
                        type: "POST",
                        async: false,
                        url: huayi_projectscore_url+"projectApplyDate/isCheckDelay",
                        data: JSON.stringify(tempParam),
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success:function(object){
                            if(object.data.status=='5'){
                                leveltypemessage= "";
                            }else{
                                leveltypemessage=object.data.msg;
                            }
                        }
                    })
                },
                error: function (data) {
                    leveltypemessage="响应失败";
                }
            });
            return leveltypemessage;
        }
        window.getVerParams = () => {
            return {
                cmeStandardKindId   : dictTool.getStandardKindId(),
                versionYear         : $('#holdYear').val()
            };
        }
        window.initKnowledgeSelBatch = () => {
            $('#knowledge3').empty();
            dictTool.initKnowledgeSel('#knowledge2', '二级学科', { ...getVerParams(), knowledgeType: 2 });
            $('#knowledge3').find('option:gt(0)').remove();
            let knowledgeTwoId = $('#knowledge2').val();
            if (knowledgeTwoId) 
                dictTool.initKnowledgeSel('#knowledge3', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: knowledgeTwoId });
            form.on('select(knowledge2)', data => 
                dictTool.initKnowledgeSel('#knowledge3', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: data.value }));
        }


    });

</script>

</body>
</html>
