    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element','upload'], function() {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery;
            var layer = layui.layer,upload = layui.upload;
            var element = layui.element;
            var year = $('#holdYear').val();
            var my = new Date();
            var userid= localStorage.getItem("unit-id");
            var status = -1;
            var standardkindId=localStorage.getItem("standardkind-id");
            const _isZheJiang = standardkindId === '190c480d-d43c-450b-8472-a6fd00a6729d';
            const _isGuangdong = standardkindId === "289bf0ca-52cb-4b19-b737-9bd200a69ce1";

            function getDeclUploadColumnTitle(titleName) {
                if (!_isZheJiang) {
                    return titleName;
                }
                return titleName + '<span style="display:inline-block;margin-left:6px;width:16px;height:16px;line-height:16px;text-align:center;border-radius:50%;border:1px solid #ff6700;color:#ff6700;cursor:pointer;font-size:12px;vertical-align:middle;" title="上传要求" onclick="return window.showZheJiangUploadTip(event)">?</span>';
            }

            window.showZheJiangUploadTip = function(event, shouldStopPropagation, autoClose) {
                if (event && shouldStopPropagation) {
                    event.stopPropagation();
                }
                var tipLayerIndex = layer.alert('文件为PDF格式，大小限制15M以下。', {
                    title: '提示信息'
                });
                if (autoClose) {
                    setTimeout(function() {
                        layer.close(tipLayerIndex);
                    }, 3000);
                }
                return shouldStopPropagation ? false : true;
            };

            function showZheJiangUploadHoverTip(elem) {
                return layer.tips('文件为PDF格式，大小限制15M以下。', elem, {
                    tips: [1, '#ff6700'],
                    time: 0
                });
            }
            
            // 将constantPage.js 常量赋值给label
            $("label").each(function() {
                const name = $(this).attr("name");
                if (projectLabels[name] !== undefined) {
                    $(this).text(projectLabels[name]);
                }
            });

            window.colArray = [{
                field: 'center',
                width: 160,
                toolbar: '#rowBar',
                title: '操作',
                fixed: 'left'
            }, {
                field: 'status',
                title: '状态',
                hide: true
            }, {
                field: 'projectId',
                title: '项目id',
                hide: true
            },{
                field: 'decl_url',
                title: '申报书url',
                hide: true
            },{
                field: 'submit',
                title: '上报状态',
                hide: true
            },{
                field: 'sendback',
                title: '退回状态',
                hide: true
            }];

            const validStandardkindIds = new Set([
                            "eee87ca0-7df1-426c-aae3-7cae782b4d6b", //宁夏
                            '190c480d-d43c-450b-8472-a6fd00a6729d', //浙江-中医
                            '289bf0ca-52cb-4b19-b737-9bd200a69ce1' //广东
                        ]);
             const validScoreLevelIds = new Set([
                            "4b757548-d79a-11ef-9827-fa163edddcb5",
                            'a6318a31-d165-40fa-b892-a12300e5aa1d',
                            '0d93c670-e9de-11ef-b19f-fa163e2ff656',
                            'd0b501c2-1229-11f1-aa66-005056a64c01',
                            '9fc492c4-a98a-11f0-a821-005056a64c01'
                        ]);
            const guangdongScoreLevelIds = new Set([
                            '95b9ef88-7265-11f0-adb9-005056a64c01',
                            '3037222a-2e5d-11f1-a586-005056a64c01'
                        ]);
            
            if(localStorage.getItem("standardkind-id")!="73ba18db-33fd-4746-ab41-9beb009f69a1"){
                let column=""; 
                column={field: 'center',width: 100,toolbar: '#rowCheckBar',title: '审批进度',align: 'center',};
                window.colArray.push(column);
            }

            //如果是宁夏，拼接申报书上传列
            if(validStandardkindIds.has(standardkindId) && !_isGuangdong){
                let column="",titleName="";
                if (standardkindId=="eee87ca0-7df1-426c-aae3-7cae782b4d6b"){
                    titleName="申报书上传";
                } else if (_isZheJiang) {
                    titleName="项目负责人课件上传";
                } else if (_isGuangdong) {
                    titleName="承诺书上传";
                }else{
                    titleName="同行评议上传";
                }
                column={field:'center', title:getDeclUploadColumnTitle(titleName), width:173, templet: '#uploadDecl',align: 'center'};
                window.colArray.push(column);
            }
            $.ajax({
                type: "POST",
                headers: {
                    "Accept": 'application/json',
                    "Authorization": localStorage.getItem("token"),
                    "KJPT-USER-ID": localStorage.getItem("user-id"),
                    "cmestandard-id": localStorage.getItem("standardkind-id")
                },
                async: false,
                url: huayi_projectscore_url + "project/comcolumnList",
                data: JSON.stringify({
                    "module_name": "ProjectPersonDept"
                }),
                contentType: "application/json",
                success: function(data) {
                    $.each(data.data, function(index, item) {
                        let column="";
                        if(item.columnCamelCase=="projectCode"){
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                        }else{
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                        }
                        window.colArray.push(column);
                    })
                },
                done: function () {
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });
                    },
                error: function(data, xhr, stus) {
                    layer.msg("响应失败");
                }
            })


            // 表格相关操作
            // 表格配置
            function loaderTable() {
                window.mainTable = table.render({
                    elem: '#project',
                    url: huayi_projectscore_url + 'project/selectProjByPerDept',
                    title: '用户表',
                    defaultToolbar: [],
                    method: 'post',
                    where: {
                        HoldYear: $('#holdYear').val(),
                        CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                        ProjectName: $('#projectName').val(),
                        ProjectCode: $('#projectCode').val(),
                        DictId: $('#holdType').val(),
                        personName: $('#PrincipalName').val(),
                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        userCreate: localStorage.getItem("user-id"),
                        unitId: localStorage.getItem("unit-id"),
                        status: status,
                        projType : $('#ActivityType').val(),
                        scoreType : $('#ActivityContent').val(),
                        projectType:  $('#projectType').val()
                    },

                    cols: [
                        //{field: 'center', width: 160, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                        window.colArray
                    ],
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: "project",
                    height: 'full-230',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    done: function (res) {
                        toggleProjectDeclTemplateBtn();
                        // 获取当前行的数据
                        for(var i = 0;i<res.data.length;i++){
                            var tr = $(".layui-table-body tr[data-index="+i+"]");
                            var scoreLevelId = res.data[i].scoreLevelId;
                            tr.attr('data-score-level-id', scoreLevelId || '');
                            var declUrl = res.data[i].declUrl;
                            if(declUrl){
                                //隐藏当前行uploadBtn 显示viewBtn和deleteBtn
                                tr.find('.upload-btn').hide();
                                tr.find('.view-btn').show();
                                //如果flowChainState！=0 隐藏删除按钮
                                if(res.data[i].submit!=0 && res.data[i].sendback!=1){
                                    tr.find('.delete-btn').hide();
                                }else{
                                    tr.find('.delete-btn').show();
                                }
                            }
                            // 指定项目级别不显示“上传”按钮
                            if(_isZheJiang && !validScoreLevelIds.has(scoreLevelId)){
                                tr.find('.upload-btn').hide();
                            }else if(_isGuangdong && !guangdongScoreLevelIds.has(scoreLevelId)){
                                tr.find('.upload-btn').hide();
                            }
                            //给当前行file-url赋值
                            tr.find('.file-url').val(declUrl);
                        }

                        // 绑定上传按钮事件
                        $('.upload-btn').each(function(index, element){
                            if (_isZheJiang) {
                                $(element).off('mouseenter.zhejiangUploadTip mouseleave.zhejiangUploadTip')
                                    .on('mouseenter.zhejiangUploadTip', function() {
                                        var tipLayerIndex = showZheJiangUploadHoverTip(this);
                                        $(this).data('zhejiangUploadTipIndex', tipLayerIndex);
                                    })
                                    .on('mouseleave.zhejiangUploadTip', function() {
                                        var tipLayerIndex = $(this).data('zhejiangUploadTipIndex');
                                        if (tipLayerIndex) {
                                            layer.close(tipLayerIndex);
                                            $(this).removeData('zhejiangUploadTipIndex');
                                        }
                                    });
                            }
                            //绑定上传按钮事件时如果当前行decl_url不为空则显示预览和删除按钮
                            upload.render({
                                elem: element,
                                url: huayi_upload_url + 'uploadApi/upload',
                                accept: 'file',
                                exts: 'pdf',
                                size: 1024*15,
                                before: function(obj){
                                    // 显示等待提示
                                    layer.load();
                                    
                                    let year = new Date().getFullYear();
                                    this.data = {
                                        fileType: "DOC",
                                        path: `/projDecl/${standardkindId}/${year}/${userid}`,
                                    };
                                },
                                done: function(res, index, upload){
                                    // 关闭等待提示
                                    layer.closeAll('loading');
                                    
                                    if (res.code == 200) { // 上传成功
                                        var url = res.data.picUrl; // 假设返回的 JSON 数据中包含文件的 URL
                                        // 将 URL 存储在隐藏的输入框中
                                        $(element).siblings('.file-url').val(url);
                                        // 上传成功后显示预览和删除按钮
                                        $(element).hide();
                                        $(element).siblings('.view-btn').show();
                                        $(element).siblings('.delete-btn').show();
                                        // 上传成功后需要将url存储到数据库
                                        var $tr = $(element).closest('tr');
                                        var projectId = $tr.find('td[data-field="projectId"] .layui-table-cell').text();
                                        saveProjDeclUrl(projectId, url);
                                    } else {
                                        layer.msg('上传失败');
                                    }
                                },
                                error: function(){
                                    // 关闭等待提示
                                    layer.closeAll('loading');
                                    
                                    layer.msg('上传错误');
                                }
                            });
                        });
                        // 绑定预览按钮事件
                        $('.view-btn').each(function(index, element){
                            $(element).on('click', function(){
                                let url = $(element).siblings('.file-url').val();
                                if(url){
                                    window.open(url);
                                }else{
                                    layer.msg('请先上传文件');
                                }
                            });
                        })
                        // 绑定删除按钮事件
                        $('.delete-btn').each(function(index, element){
                            $(element).on('click', function(){
                                let url = $(element).siblings('.file-url').val();
                                //获取projid
                                var $tr = $(element).closest('tr');
                                var projId = $tr.find('td[data-field="projectId"] .layui-table-cell').text();
                                if(url){
                                    layer.confirm('确定要删除吗', {
                                        icon: 3,
                                        title: '提示'
                                    }, function() {
                                        $.ajax({
                                            type: 'post',
                                            url: huayi_projectscore_url + 'project/projDecldel',
                                            data: {
                                                projectId: projId
                                            },
                                            dataType: 'json',
                                            success: function(res) {
                                                if (res.status == 200) {
                                                    layer.msg("删除成功");
                                                    $(element).siblings('.file-url').val('');
                                                    $(element).siblings('.view-btn').hide();
                                                    $(element).siblings('.upload-btn').show();
                                                    $(element).hide();

                                                }else{
                                                    layer.msg('删除失败');
                                                }
                                            }
                                        });
                                    });
                                }else{
                                    layer.msg('请先上传文件');
                                }
                            });
                        });
                    },
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };
            window.colSettingClaaback = function(obj) {
                var str = {
                    "module_name": "Project"
                };
                $.ajax({
                    type: "POST",
                    headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                    async: false,
                    url: huayi_projectscore_url + "project/comcolumnList",
                    //url:'http://localhost:20004/permission/comcolumn/getDisplayList',
                    //data:{"module_name": "projectReport"},

                    data: JSON.stringify(str),
                    contentType: "application/json",
                    success: function(data) {
                        window.colArray = [{
                            field: 'center',
                            width: 160,
                            toolbar: '#rowBar',
                            title: '操作',
                            fixed: 'left'
                        },{
                            field: 'status',
                            title: '状态',
                            hide: true
                        }];
                        $.each(data.data, function(index, item) {
                            let column="";
                            if(item.columnCamelCase=="projectCode"){
                                column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                            }else{
                                column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                            }
                            window.colArray.push(column);
                        })
                        loaderTable();
                        if (obj && obj.success) {
                            layer.close(window.colLayerIndex);
                        } else {
                            layui.msg(obj.msg);
                        }
                    },
                    error: function(data, xhr, stus) {
                        layer.msg("响应失败");
                    }
                })
            }


            $(function() {
                //var endYear = my.getFullYear() + 1; // 获取当前年份
                // var endYear = my.getFullYear() + 1; // 获取当前年份
                // for (var i = endYear; i > endYear - 6; i--) {
                //     $('#holdYear').append(new Option(i, i)); //往下拉菜单里添加元素
                // }
                // form.render('select'); //刷新select选择框渲染
                //加载申报年度
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url +"projectDicRegionLevel/getHoldYear",
                    data: {cmeStandardKind:localStorage.getItem("standardkind-id"),unitId:localStorage.getItem("unit-id")},
                    dataType: 'json',
                    async: false,
                    success: function (data) {
                        $('#holdYear').empty();
                        for(var year of data.data.entries()){
                            $('#holdYear').append(new Option(year[1],year[1]));//往下拉菜单里添加元素
                        }
                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function (data) {
                        layer.msg("响应失败1");
                    }
                });
                ddlList();
                loaderTable();
                loadReport();

            });
            $(".tab_others").on("click", function() {
                var index = $(this).index();
                $(this).addClass("tab_this").siblings().removeClass("tab_this");

            });

            table.on('sort(project)', function(obj){ //sort 是工具条事件名
                //如果你的表格列表里有设置排序sort, 需要添加一个sort监听事件, 根据单元格内容的高度重新计算表格的行高
                $(".layui-table-main tr").each(function(index, val) {
                    $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                });
            });
            function ddlList() { 
                //加载项目级别
                $.ajax({
                    type: "post",
                    url: huayi_projectscore_url + "projectDicRegionLevel/getLevelsByStandardId",
                    data: {
                        getLevelsByStandardId: localStorage.getItem("standardkind-id"),
                        holdYear: $('#holdYear').val(),
                        unitId:userid
                    },
                    dataType: 'json',
                    success: function(data) {
                        $('#CmeComScoreLevel').empty();
                        $('#CmeComScoreLevel').append(new Option("全部", "")); //往下拉菜单里添加元素
                        $.each(data.data, function(index, item) {
                            $('#CmeComScoreLevel').append(new Option(item.scoreLevelName, item.scoreLevelId)); //往下拉菜单里添加元素
                        })
                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function(data) {
                        layer.msg("响应失败");
                    }
                });
                
            }

            function loadReport() {
                //加载ProjectTabsNum
                $.ajax({
                    type: "get",
                    url: huayi_projectscore_url + "projectDDL/projectTabsNum",
                    dataType: "json",
                    data: {
                        year: $('#holdYear').val(),
                        unitid: localStorage.getItem("unit-id"),
                        type: 15,
                        userid: localStorage.getItem("user-id"),
                        CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                        ProjectName: $('#projectName').val(),
                        ProjectCode: $('#projectCode').val(),
                        personName: $('#PrincipalName').val(),
                        DictId: $('#holdType').val(),
                        projType : $('#ActivityType').val(),
                        scoreType : $('#ActivityContent').val(),
                        projectType:  $('#projectType').val()
                    },
                    success: function(data) {
                        $('#loadNoReport').html('未上报(' + data.data[0]['noReport'] + ')');
                        $('#loadhasReported').html('已上报(' + data.data[0]['hasReported'] + ')');
                        $('#loadCheckPass').html('审核通过(' + data.data[0]['checkPass'] + ')');
                        $('#loadsendBack').html('退回修改(' + data.data[0]['sendBack'] + ')');
                        $('#loadCheckNoPass').html('审核不通过(' + data.data[0]['checkNoPass'] + ')');
                    },
                    error: function(data) {
                        layer.msg("响应失败");
                    }
                })
            }




            // 监听头部新增按钮
            table.on('toolbar(project)', function(obj) {
                var datas = obj.data;
                //document.getElementById("form-Project").reset();
                if (obj.event === 'add') {
                    layer.open({
                        title: '选择您要申报的项目级别',
                        content: "AddProject.html?source=dept",
                        type: 2,
                        area: ['580px', '400px'],
                        end: function(index, layero){
                            loaderTable();
                            loadReport();
                        }
                    })
                } else if (obj.event === 'downloadDeclTemplate') {
                    downloadProjectDeclTemplate();
                } else if (obj.event === 'excel') {

                    var loading=layer.load(0, {
                        shade: false
                    });
                    //导出excel
                    axios({
                        method: 'GET',
                        url: huayi_projectscore_url + "projectExclel/excelPersonDept",
                        responseType: 'blob',
                        headers: {
                            "Accept": 'application/json',
                            "Authorization": localStorage.getItem("token"),
                            "KJPT-USER-ID": localStorage.getItem("user-id"),
                            "cmestandard-id": localStorage.getItem("standardkind-id")
                        },
                        params: {
                            HoldYear: $('#holdYear').val(),
                            CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                            ProjectName: $('#projectName').val(),
                            ProjectCode: $('#projectCode').val(),
                            DictId: $('#holdType').val(),
                            personName: $('#PrincipalName').val(),
                            cmeStandardKindId: localStorage.getItem("standardkind-id"),
                            userCreate: localStorage.getItem("user-id"),
                            unitId: localStorage.getItem("unit-id"),
                            status: status,
                            projType : $('#ActivityType').val(),
                            scoreType : $('#ActivityContent').val(),
                            projectType:  $('#projectType').val()
                        }
                    }).then(function (res) {
                        layer.close(loading);
                        var data = res.data;
                        var blob = new Blob([data], {type: 'application/octet-stream'});
                        var url = URL.createObjectURL(blob);
                        var exportLink = document.createElement('a');
                        exportLink.setAttribute("download","项目信息.xlsx");
                        exportLink.href = url;
                        document.body.appendChild(exportLink);
                        exportLink.click();
                    })
                } else if (obj.event === 'visbale') {
                    window.colLayerIndex = layer.open({
                        content: "../../column_setting.html?module_name=Project&callBack=colSettingClaaback",
                        type: 2,
                        area: ['600px', '600px']
                    })
                }
            });

            window.addEventListener('message', event => {
                let fromFr = event.origin.indexOf('kjptfr.wsglw.net') !== -1;
                let fromFrTest = event.origin.indexOf('121.36.86.74') !== -1;
                if ('declare' === event.data.sender || fromFr || fromFrTest) {
                    // console.info('ProjectPersonDept.message');
                    // console.info(JSON.stringify(event.data));
                    if(event.data.closeModal){
                        layui.layer.closeAll();
                    }
                    table.reload('project');
                }
            });

            // 监听行内按钮
            table.on('tool(project)', function(obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    let standardKindId = localStorage.getItem("standardkind-id");
                    let unitId = localStorage.getItem('unit-id');
                    let userId = localStorage.getItem("user-id");
                    //let cptUrl = getCptUrl(datas.holdYear, datas.scoreLevelId, 'declare') 
                        ///+ '&standard_kind_id=' + standardKindId
                       // + '&unit_id=' + unitId
                        //+ '&user_id=' + userId
                        //+ '&score_level_id=' + datas.scoreLevelId
                       // + '&hold_year=' + datas.holdYear
                       // + '&source=dept'
                       // + '&project_id=' + datas.projectId
                        //+ '&zh_cn=' + datas.projectType;

                    form.val('add-filter', datas);
                    let cptUrl = getProjectPageUrl(
                        datas.holdYear,
                        datas.scoreLevelId,
                        datas.projectId,
                        'dept',
                        0,
                        datas.projType,
                        datas.regionLevelId,
                        datas.projectType,
                        datas.priviousCheckUnitId
                    );
                    if (cptUrl === '') {
                        layer.msg('暂无申报页面配置');
                        return;
                    }
                    layer.open({
                        type: 2,
                        title: '修改',
                        content: cptUrl,
                        skin: '',
                        area: ['100%', '100%'],
                    })
                } else if (obj.event === 'del') {
                    layer.confirm('确定要删除吗', {
                        icon: 3,
                        title: '提示'
                    }, function() {
                        $.ajax({
                            type: 'get',
                            url: huayi_projectscore_url + 'project/delete',
                            data: {
                                projectId: datas.projectId
                            },
                            dataType: 'json',
                            success: function(res) {
                                if (res.status === 200) {
                                    layer.msg("删除成功");
                                    loadReport();
                                    table.reload('project');
                                }
                            }
                        });
                    })
                } else if (obj.event === 'submitProj') {
                    //获取当前行file-url 的数据 如果是空且是宁夏则提示上传申报书
                    if(validStandardkindIds.has(standardkindId)){
                        let url = obj.tr.find('.file-url').val();
                        if(!url && standardkindId==="eee87ca0-7df1-426c-aae3-7cae782b4d6b"){
                            layer.msg('请先上传申报书');
                            return;
                        }else if(!url && _isZheJiang && validScoreLevelIds.has(datas.scoreLevelId)) {
                            layer.msg('请先上传项目负责人课件');
                            return;
                        }else if(!datas.declUrl && _isGuangdong && guangdongScoreLevelIds.has(datas.scoreLevelId)) {
                            layer.msg('请先上传承诺书');
                            return;
                        }else if(!url && !_isZheJiang && !_isGuangdong){
                            layer.msg('请先上传同行评议');
                            return;
                        }
                    }

                    //判断是否在上报时间内
                    $.ajax({
                        type: "POST",
                        url: huayi_projectscore_url+"projectApplyDate/isDelay",
                        data: {year:datas.holdYear,unitId:userid,scoreLevelId:datas.scoreLevelId,type:1,from:'unit.report',regionLevelId: datas.regionLevelId},
                        dataType: 'json',
                        success:function(object){
                            if (_isGuangdong && object.data.status != '5') {
                                layer.msg(object.data.msg);
                            }else{
                                layer.confirm('确定要上报吗', {
                                    icon: 3,
                                    title: '提示'
                                }, function() {
                                    $.ajax({
                                        type: 'post',
                                        url: huayi_projectscore_url + 'project/projectSubPerDept',
                                        data: {
                                            projectId: datas.projectId,
                                            userid: localStorage.getItem("user-id"),
                                            userType: localStorage.getItem("user-type")
                                        },
                                        dataType: 'json',
                                        success: function(res) {
                                            if (res.status === 200) {
                                                layer.msg("提交成功");
                                                loadReport();
                                                //隐藏 deleteBtn 删除
                                                obj.tr.find('.delete-btn').hide();
                                                table.reload('project');

                                            }else{
                                                layer.msg(res.msg);
                                            }
                                        }
                                    });
                                })
                            }
                        }

                    })

                    
                } else if (obj.event === 'view') {
                     
                    let cptUrl = getProjectPageUrl(
                        obj.data.holdYear,
                        obj.data.scoreLevelId,
                        obj.data.projectId,
                        'dept',
                        1,
                        obj.data.projType,
                        obj.data.regionLevelId,
                        obj.data.projectType,
                        datas.priviousCheckUnitId
                    );
                    if (cptUrl === '') {
                        layer.msg('暂无申报页面配置');
                        return;
                    }
                    layer.open({
                        type: 2,
                        title: '浏览',
                        content: cptUrl,
                        skin: '',
                        area: ['100%', '100%'],
                    })
                }else if( obj.event ==='viewSubmitProj'){
                    layer.open({
                        type: 2,
                        title: '',
                        content: 'projectProgress/projCheckProgress.html?projectId=' + obj.data.projectId,
                        area: ['560px', '380px'],
                    })
                }
            });

            //下拉框值改变
            form.on('select(loadReport)', function(data) {
                    //年度切换时重置其他条件
                    $('#holdType').empty().append($('<option value="">请选择</option>'));
                    $('#ActivityContent').empty().append($('<option value="">请选择</option>'));
                    $('#ActivityType').empty().append($('<option value="">请选择</option>'));
                    $('#projectType').val('');
                    loadReport();
                    loaderTable();
                    ddlList();
            })

            form.on('select(loadHoldType)', function(data) {
                //加载举办方式
                let keyName     = projectLabels.lblProjectLevel,
                scoreLevel  = $('#CmeComScoreLevel').val();
                $.ajax({
                    url     : huayi_sjwh_url + 'option/holdType/list/' +  localStorage.getItem("standardkind-id")+ '/' + scoreLevel + '/1__',
                    async   : false,
                    success : re => {
                        if (re.status == 200) {
                            let $item = $('#holdType');
                            $item.empty().append($('<option value="">请选择</option>'));
                            $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                        } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                    },
                    error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
                });
                $.ajax({
                    url     : huayi_sjwh_url + 'option/scoreLevelContent/list',
                    data    : { scoreLevel: scoreLevel },
                    async   : false,
                    success : re => {
                        if (re.status == 200) {
                            let $item = $('#ActivityContent');
                            $item.empty().append($('<option value="">请选择</option>'));
                            $.each(re.data, (i, d) => $item.append($('<option value="' + d.value + '">' + d.scoreLevelContentName + '</option>')));
                        } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                    },
                    error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
                });
                form.render();
            })
            
            //鼠标悬停提示特效
            $("#hint").hover(function() {
                openMsg();
            }, function() {
                layer.close(subtips);
            });

            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {
                    tips: [1, '#ff6700'],
                    time: 30000
                });
            }
            element.on('tab(tabcheck)', function(data) {
                var nums = data.index;
                status = nums;
                loaderTable();
                loadReport();
            });

            //点击查询按钮，重载表格
            $('#searchBtn').on('click', function() {
                loaderTable();
                loadReport();
            });
            //存储申报书上传的url
            function saveProjDeclUrl(projectId,url) {
                $.ajax({
                    type: 'post',
                    url: huayi_projectscore_url + 'project/saveProjDeclUrl',
                    data: {
                        projectId: projectId,
                        declUrl: url,
                        declType:1
                    },
                    dataType: 'json',
                    success: function(res) {
                        if (res.status === 200) {
                            layer.msg("上传成功");
                        }
                    }
                });
            }

        });
    </script>
