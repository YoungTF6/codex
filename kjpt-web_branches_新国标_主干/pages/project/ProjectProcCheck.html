<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        tool: 'tool'
    })
    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element','tool'], function () {
        var table = layui.table,form = layui.form;
        var $ = layui.jquery,layer = layui.layer;
        var element = layui.element,tool = layui.tool;
        var year = document.getElementById("holdYear");
        var userid= localStorage.getItem("unit-id");
        var my = new Date();
        var status=0;
        var tabNumber=getUrlParam("tabNumber");
        var unitTypelocal=localStorage.getItem("unit_type");
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        var debounceTime=1500;
        const _isZheJiang = cmeStandardKindId === '190c480d-d43c-450b-8472-a6fd00a6729d';
 
        const _isGuangdong = cmeStandardKindId === "289bf0ca-52cb-4b19-b737-9bd200a69ce1";

        function refreshPdfExportButtons() {
            $("button[lay-event='pdf2']").toggle(_isGuangdong);
        }

        function requireScoreLevelForPdf() {
            if ($('#CmeComScoreLevel').val()) {
                return true;
            }
            layer.alert('请选择学分分类，点击查询后进行导出。', {icon: 5});
            return false;
        }
        
         // 将constantPage.js 常量赋值给label
         $("label").each(function() {
            const name = $(this).attr("name");
            if (projectLabels[name] !== undefined) {
                $(this).text(projectLabels[name]);
            }
        });

        function updateButtons() {
            var buttonP = document.getElementById("checkP"); // 获取按钮元素
            var buttonNP = document.getElementById("checkNP");  
            var buttonBack = document.getElementById("checkBack");

            if (cmeStandardKindId === "4a6d91fb-8ba4-4560-a801-9c6f00e6d999") {
                buttonP.textContent = "审查通过"; 
                buttonNP.textContent = "审查不通过"; 
                buttonBack.textContent = "退回下级"; 
            } else if (_isGuangdong) {
                buttonP.textContent = "审核通过";
                buttonNP.textContent = "审核不通过"; 
                buttonBack.textContent = "退回修改";

            }else {
                buttonP.textContent = "预审通过";
                buttonNP.textContent = "预审不通过"; 
                buttonBack.textContent = "退回修改"; 
            }
        }

        function getTabLabelConfig() {
            if (cmeStandardKindId === "4a6d91fb-8ba4-4560-a801-9c6f00e6d999") {
                return {
                    unreviewed: '未审查',
                    checkPass: '审查通过',
                    sendBack: '退回下级',
                    noPass: '审查不通过'
                };
            }
            if (_isGuangdong) {
                return {
                    unreviewed: '未审核',
                    checkPass: '审核通过',
                    sendBack: '退回修改',
                    noPass: '审核不通过'
                };
            }
            return {
                unreviewed: '未审核',
                checkPass: '预审通过',
                sendBack: '退回修改',
                noPass: '预审不通过'
            };
        }

        function renderTabsCount(tabsData) {
            const cfg = getTabLabelConfig();
            const countData = tabsData || {};
            $('#loadUnreviewed').html(`${cfg.unreviewed}(${countData.unreviewed || 0})`);
            $('#loadCheckPass').html(`${cfg.checkPass}(${countData.checkPass || 0})`);
            $('#loadsendBack').html(`${cfg.sendBack}(${countData.sendBack || 0})`);
            $('#loadNoPass').html(`${cfg.noPass}(${countData.checkNoPass || 0})`);
        }

        var menuUnitId ;
        $(function () {
            tool.setMedicalTypeSelectById("#projectType");
            //加载申报年度
            $.ajax({
                type: "post",
                url: huayi_projectscore_url +"projectDicRegionLevel/getHoldYear",
                data: {cmeStandardKind:localStorage.getItem("standardkind-id"),unitId:localStorage.getItem("unit-id")},
                dataType: 'json',
                async: false,
                success: function (data) {
                    for(var year of data.data.entries()){
                        $('#holdYear').append(new Option(year[1],year[1]));//往下拉菜单里添加元素
                    }
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败1");
                }
            });
            ddlList();
            loadReport();
            loaderTable();
            displayBtn();
            refreshPdfExportButtons();
            if(tabNumber!=null && tabNumber!=''){
                $('.layui-tab-title li').eq(tabNumber).addClass('tab_this layui-this').siblings().removeClass('tab_this layui-this');
                status=tabNumber;
                loaderTable();
                displayBtn();
            }
            updateButtons();

        });
        window.colArray=[
            {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                    var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.projectId+'"><i class="layui-icon"></i>';
                        //利用三元表达式判断本条数据是否需要加载checkbox
                        if( status==0){
                            return d.flowChainState != '50' ?'已审核':templateHtml
                        }else{
                            return d.finalStatus != 0 ?'已终审':templateHtml
                        }

            }},
            {field: 'center', width: 250, toolbar: '#rowBar', title: '操作',align:'center'},
        ];
        //如果是宁夏，拼接申报书上传列
        if(cmeStandardKindId=="eee87ca0-7df1-426c-aae3-7cae782b4d6b"){
            let column=""; 
            column={field:'center', title:'申报书', width:173, templet: '#uploadDecl',align: 'center'};
            window.colArray.push(column);
        }
        if (_isZheJiang) {
            let column="";
            column={field:'center', title:'项目负责人课件', width:173, templet: '#uploadDecl',align: 'center'};
            window.colArray.push(column);
        }
        // if (_isGuangdong) {
        //     let column="";
        //     column={field:'center', title:'承诺书', width:173, templet: '#uploadDecl',align: 'center'};
        //     window.colArray.push(column);
        // }

        $.ajax({
                type:"POST",
                headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                async:false,
                url: huayi_projectscore_url +"project/comcolumnList",
                //url:'http://localhost:20004/permission/feign/getDisplayList',
                data:JSON.stringify({"module_name": "ProjectProcCheck"}),
                contentType:"application/json",
                success:function(data){
                    $.each(data.data,function(index,item){
                        let column="";
                        if(item.columnCamelCase=="projectCode"){
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,toolbar:'#viewProjInfo',width: item.columnwidth};
                        }else{
                            column={field: item.columnCamelCase, title: item.columnName, sort: item.orderable,width: item.columnwidth};
                        }
                        window.colArray.push(column);
                    })
                },
                error: function (data, xhr,  stus) {
                    layer.msg("响应失败");
                }
            })


// 表格相关操作
        // 表格配置
        function loaderTable() {
            window.mainTable = table.render({
                elem: '#project',
                url: huayi_projectscore_url + 'project/listProc',
                title: '用户表',
                defaultToolbar: [],
                where: {
                    HoldYear: $('#holdYear').val(),
                    CmeComScoreLevel: $('#CmeComScoreLevel').val(),
                    ProjectName: $('#projectName').val(),
                    ProjectCode: $('#projectCode').val(),
                    DictId: $('#holdType').val(),
                    personName: $('#PrincipalName').val(),
                    unitName: $('#UnitName').val(),
                    knowledge2: $('#knowledge2').val(),
                    knowledge3: $('#knowledge3').val(),
                    UnitChildren: localStorage.getItem("menu-unit-id") ?? localStorage.getItem("unit-id"),
                    cmeStandardKindId:localStorage.getItem("standardkind-id"),
                    status:status,
                    unitId:localStorage.getItem("unit-id"),
                    unitType: unitTypelocal,
                    projectType: $('#projectType').val(),
                    projectNature: $('#projectNature').val(),
                    projType : $('#ActivityType').val(),
                    scoreType : $('#ActivityContent').val()
                },

                cols:[
                    //{field: 'center', width: 160, toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    window.colArray
                ],
                done:function(res, curr, count){
                    for(var i = 0;i<res.data.length;i++){
                        var state = res.data[i].isPass; //根据status状态判断，不为0时，禁止勾选
                        var checkallinfo=$("#checkboxAll").is(":checked");
                        var checkboxCurrent=$("#checkboxCurrent").is(":checked");
                        var templateHtml ="";
                        //如果全选
                        if (checkallinfo || checkboxCurrent){
                            var index = res.data[i]['LAY_TABLE_INDEX'];
                            if(state==null)
                            {
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                            }
                        }
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });

                        // 获取当前行的数据
                        for(var i = 0;i<res.data.length;i++){
                            var tr = $(".layui-table-body tr[data-index="+i+"]");
                            var declUrl = res.data[i].declUrl;
                            if(declUrl){
                                tr.find('.view-btn').show();
                            }
                            //给当前行file-url赋值
                            tr.find('.file-url').val(declUrl);
                        }
                        // 绑定预览按钮事件
                        $('.view-btn').each(function(index, element){
                            $(element).on('click', function(){
                                let url = $(element).siblings('.file-url').val();
                                if(url){
                                    window.open(url);
                                }else{
                                    layer.msg('请先上传文件');
                                }
                            });
                        })
                        refreshPdfExportButtons();
                    }
                },
                toolbar: '#bar',
                cellMinWidth: 100,
                id: "project",
                height: 'full-270', 
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    if(res.status===500){
                        layer.msg("参数不合法");
                        return;
                    }
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });

                        form.render('select'); //刷新select选择框渲染
                    },
                    error: function (data) {
                        layer.msg("响应失败1");
                    }
                });
            }else{
                $('#knowledge3').empty();
                $('#knowledge3').append(new Option("全部",""));
                form.render('select'); //刷新select选择框渲染
            }
        })
        form.on('select(loadHoldType)', function(data) {
            //加载举办方式
            let keyName     = projectLabels.lblProjectLevel,
            scoreLevel  = $('#CmeComScoreLevel').val();
            $.ajax({
                url     : huayi_sjwh_url + 'option/holdType/list/' +  localStorage.getItem("standardkind-id")+ '/' + scoreLevel + '/1__',
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#holdType');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            $.ajax({
                url     : huayi_sjwh_url + 'option/scoreLevelContent/list',
                data    : { scoreLevel: scoreLevel },
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#ActivityContent');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.value + '">' + d.scoreLevelContentName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        })

        //鼠标悬停提示特效
        $("#hint").hover(function () {
            openMsg();
        }, function () {
            layer.close(subtips);
        });
        function openMsg() {
            subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
        }
        element.on('tab(tabcheck)', function(data){
            var nums=data.index;
            status=nums;
            loaderTable();
            displayBtn();
            loadReport();
            updateButtons();

            //屏蔽按钮
            switch (status) {
                case 2: $("#checkP").attr("style","display:none");
                    break;
                case 3: $("#checkBack").attr("style","display:none");
                    break; 
                case 4: $("#checkNP").attr("style","display:none");
                    break;
            }
        });

        function displayBtn(){
            if(status==2){
                $('#checkP').attr('style','display:none');
            }else if(status==3){
                $('#checkBack').attr('style','display:none');
            }else if(status==4){
                $('#checkNP').attr('style','display:none');
            }
        }
        window.getVerParams = () => {
            return {
                cmeStandardKindId   : dictTool.getStandardKindId(),
                versionYear         : $('#holdYear').val()
            };
        }
        window.initKnowledgeSelBatch = () => {
            $('#knowledge3').empty();
            dictTool.initKnowledgeSel('#knowledge2', '二级学科', { ...getVerParams(), knowledgeType: 2 });
            $('#knowledge3').find('option:gt(0)').remove();
            let knowledgeTwoId = $('#knowledge2').val();
            if (knowledgeTwoId) 
                dictTool.initKnowledgeSel('#knowledge3', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: knowledgeTwoId });
            form.on('select(knowledge2)', data => 
                dictTool.initKnowledgeSel('#knowledge3', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: data.value }));
        } 

    });

</script>

</body>
</html>
