<script>
    var scaleNum = window.screen.width / 1000;
    document.getElementsByTagName('html')[0].style.fontSize = (100 * scaleNum) + 'px';

    var projId = getUrlParam("proj_id"); //项目id
    var downId =  getUrlParam("down_id"); 
    var projTeachId = getUrlParam("teach_id");  //课程id
    var activeSecond = getUrlParam("active_second"); //有效时间
    var typeId = getUrlParam("type_id"); //项目类型1继教项目  2集体活动
    var miao = getUrlParam("miao"); //时间戳
    
    function checkLogin() {

        if (!checkString("txt_certid", "", "证件号")) return false;
        if (!checkString("txt_username", "", "姓名")) return false;
        //if (!checkString("txt_phone", "", "手机号")) return false;
        var mobile = $("#txt_phone").val();
        if (mobile != "" && mobile.length != 11) {
            layer.alert('请输入有效的手机号码！');
            $("#txt_phone").focus();
            return false;
        }
        var myreg = /^(1\d{10})$/;
        if (mobile != "" && !myreg.test(mobile)) {
            layer.alert('请输入有效的手机号码！');
            $("#txt_phone").focus();
            return false;
        }

        saveAttend();
    }

    function checkString(id, errorStr,fieldName) {
        if($("#"+id).val() == errorStr) {
            layer.alert("请输入"+fieldName);
            return false;
        }
        return true;
    }

    function saveAttend(isOn) {
        $.ajax({
            url: huayi_personorg_url + "comperson/doesCertIdExists",
            data: { certId: $("#txt_certid").val().toUpperCase() },
            success: function (result) {
                if (result.success == true) {
                    if (result.data.does_exists == 1 && result.data.cme_standard_kind_id == '7068a5c0-2cd3-471a-90b9-9bf100aec95a' ) {
                        // 打开考试页面
                        layer.open({
                            type: 2,
                            title: '考试',
                            content: 'examPaper.html?proj_id=' + projId + '&teach_id=' + projTeachId + 
                                    '&active_second=' + activeSecond + '&type_id=' + typeId + 
                                    '&miao=' + miao + '&down_id=' + downId + '&cert_id=' + $("#txt_certid").val(),
                            area: ['100%', '100%'],
                        closeBtn: 0
                        });
                        return;
                    } else if (result.data.does_exists == 0) {
                        layer.alert('系统不存在这个人的账号！');
                        return;
                    } else {
                        layer.alert('查无此人，请确认证件号输入是否正确。如确认无误，请您联系所在单位继教管理员。');
                        return;
                    }
                }else{
                    layer.alert(result.msg);
                }
            }
        });

        //     error: function(re) {

        //         return false;
        //     }
        // });


    }

    function onCancel() {
        $(".laybel_box").css("display", "none");
    }

    function isWeiXin() {
        var ua = window.navigator.userAgent.toLowerCase();
        if (ua.match(/MicroMessenger/i) == 'micromessenger') {
            return true;
        } else {
            return false;
        }
    };

    function goback() {
        if (isWeiXin()) {
            WeixinJSBridge.call('closeWindow');
        } else {
            var userAgent = navigator.userAgent;
            if (userAgent.indexOf("Firefox") != -1 || userAgent.indexOf("Chrome") != -1) {
                window.location.href = "about:blank";
            } else if (userAgent.indexOf('Android') > -1 || userAgent.indexOf('Linux') > -1) {
                window.opener = null; window.open('about:blank', '_self', '').close();
            } else {
                window.opener = null;
                window.open("about:blank", "_self");
                window.close();
            }
        }
    }
