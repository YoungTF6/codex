<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <title>举办资格管理</title>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>
    <style>
        #table_down {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="table_down" lay-filter="table_down"></table>
            </div>
        </div>
    </div>


    <script type="text/javascript">
        window.loading;
        window.ajaxNum = 0;
        window.nowProjectId = getQueryString('projectId');


        layui.config({
            base : '/js/layui/ext/'
        }).use([ 'table', 'form', 'element' ], () => {
            let { table, form, layer, element } = layui;


            // 关闭 closeLoading 的判断
            window.closeLoading = () => {
                ajaxNum--;
                if (ajaxNum<=0 && loading) layer.close(loading);
            }

            window.openLoading = () => {
                if (ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
                ajaxNum ++;
            }


            // 表格配置
            let loaderTable = projectId => {
                openLoading();
                table.render({
                    elem         : '#table_down',
                    url          : huayi_projectscore_url + 'cmeProjPosDownload/list',
                    method       : 'get',
                    where        : {
                        projId            : projectId,
                        holdQualification : true
                    },
                    cols         : [ [
                        { align: 'center', width: 130, title: '操作', fixed: 'left', templet: d => {
                            let $tmpl = $('<a class="layui-btn layui-btn-xs"></a>');
                            if (d.holdState) $tmpl.addClass('layui-btn-disabled btn-disabled-row').text('取消举办资格');
                            else if (d.holdQualification) $tmpl.addClass('layui-btn-danger btn-danger-row').attr('lay-event', 'qualificationDisabled').text('取消举办资格');
                            else $tmpl.addClass('btn-row').attr('lay-event', 'qualification').text('赋予举办资格');
                            return $tmpl.prop('outerHTML');
                        } },
                        { field: 'batch', title: '举办批次', sort:true, align: 'center', minWidth: 110, templet: d => '第' + d.batch + '批次' },
                        { field: 'projNo', title: '项目编号', sort: true, align: 'center', minWidth: 160 },
                        { field: 'projName', title: '项目名称', sort: true, align: 'center', minWidth: 200,
                            templet: d => '<span title="' + d.projName + '">' + d.projName + '</span>' },
                        { field: 'startDt', title: '开始日期', sort: true, align: 'center', minWidth: 110 },
                        { field: 'endDt', title: '结束日期', sort: true, align: 'center', minWidth: 110 },
                        { title: '举办状态', align: 'center', minWidth: 100, templet: d => {
                            if (d.holdState) return '已举办';
                            if (d.overdueState) return '逾期未举办';
                            return '未举办';
                        } }
                    ] ],
                    cellMinWidth : 100,
                    id           : 'implementation',
                    height       : 'full-52',
                    page         : false,
                    parseData    : res => {
                        return {
                            'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                            'msg'   : res.message, // 解析提示文本
                            'data'  : res.data // 解析数据列表
                        }
                    },
                    request      : {},
                    done         : (res, curr, count) => closeLoading(),
                    error        : () => closeLoading()
                });
            };


            // 页面初始化
            let htmlInit = () => {
                if (nowProjectId) loaderTable(nowProjectId);
                else layer.msg('缺少必要参数', { icon : 7, time: 1500 });
            }

            htmlInit();


            // 监听行内按钮
            table.on('tool(table_down)', obj => {
                let datas = obj.data;

                if (obj.event.indexOf('qualification') >= 0) {
                    let data = { downId : datas.downId }, 
                        msg  = '';
                    if (obj.event === 'qualification') {
                        data = $.extend({}, data, { holdQualification : true });
                        msg  = '将赋予该逾期未举办批次举办资格，是否确认?';
                    } else {
                        data = $.extend({}, data, { holdQualification : false });
                        msg  = '将取消该逾期未举办批次的举办资格，项目举办单位将无法进行任何举办操作，是否确认?';
                    }
                    layer.alert(msg, function (index) {
                        axios({
                            method       : 'post',
                            url          : huayi_projectscore_url + 'cmeProjPosDownload/update',
                            responseType : 'json',
                            data         : data
                        }).then(res => {
                            if (res.status == 200 && res.data.status == 200 && res.data.data == true) {
                                loaderTable(nowProjectId);
                                layer.msg('操作成功', { icon : 1, time: 1500 });
                            } else layer.msg('操作失败', { icon : 2, time: 1500 });
                        }).catch(error => {
                            layer.msg('网络异常，请稍后再试', { icon : 7, time: 1500 });
                            console.log(error);
                        });
                    });
                }

            });

        });
    </script>
</body>
</html>
