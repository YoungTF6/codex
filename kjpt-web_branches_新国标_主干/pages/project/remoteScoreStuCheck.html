<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>远程学分审核</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">

    <script type="text/javascript" src="../../js/common.js"></script>
    <script type="text/javascript" src="../../js/api/manage.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }
    </style>
</head>

<body style="background-color: white;">

    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label" style="font-weight: bold;">项目名称:</label>
                            <label id="projName" style="line-height: 20px;float: left;padding: 9px 15px;"></label>
                        </div>

                        <div class="layui-inline">
                            <label class="layui-form-label" style="font-weight: bold;">项目编号:</label>
                            <label id="projNo" style="line-height: 20px;float: left;padding: 9px 15px;"></label>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="font-weight: bold;">举办方式:</label>
                            <label id="holdType" style="line-height: 20px;float: left;padding: 9px 15px;"></label>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="font-weight: bold;">学分级别:</label>
                            <label id="scoreLevel" style="line-height: 20px;float: left;padding: 9px 15px;"></label>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="font-weight: bold;">举办单位:</label>
                            <label id="holdUnit" style="line-height: 20px;float: left;padding: 9px 15px;"></label>
                        </div>
                        <div class="layui-inline">
                            <button class="layui-btn layui-btn-sm btnRounded" id="exceltool" onclick="toexcel()" style="float: right; margin-right: -109px;">导出Excel</button>
                        </div>
                        
                    </div>
                </div>
            </div>


            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="stuInfo" lay-filter="stuInfo" style="margin: 0px 0px;"></table>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <script type="text/html" id="bar">
        <input type="checkbox" name="like1[read]" id="checkboxCurrent" lay-filter="checkboxCurrent"  title="本页全选">
        <input type="checkbox" name="like1[read]" id="checkboxAll"  lay-filter="checkboxAll"  title="所有全选">
        <button class="layui-btn layui-btn-sm btnRounded" lay-event="AllCheckPass">审核通过</button>
        <button class="layui-btn layui-btn-sm layui-btn-danger" lay-event="AllCheckNoPass">审核不通过</button>
   
  
        
        
    </script>
 

    <script>
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element', 'laydate'], function() {
            var table = layui.table,form = layui.form;
            var $ = layui.jquery,laydate = layui.laydate;
            var layer = layui.layer,element = layui.element;
            var projNo= decodeURI(getUrlParam("projNo"));
            var checkStates=getUrlParam("checkState");
            var singleProjName=decodeURI(decodeURIComponent(getUrlParam("singleProjName")));
            var period=getUrlParam("period");
            var score=getUrlParam("score");
            var teachUnitName=decodeURI(getUrlParam("teachUnitName"));
            var studydatecollection=decodeURI(getUrlParam("studyDateCollection"));
            var scorelevelid=getUrlParam("scoreLevelId");
            var holdtype=getUrlParam("holdType"); 
            var cmeStandardKindIdtool=localStorage.getItem("standardkind-id");
            var holdTypeName=decodeURI(getUrlParam("holdTypeName")); 
            var scoreLevelName=decodeURI(getUrlParam("scoreLevelName")); 
            var unitUserType= localStorage.getItem("unit-user-type");

            var personName= decodeURI(getUrlParam("personName")); 
            var idCardNo= decodeURI(getUrlParam("idCardNo")); 

            $(function() {

                $('#projName').text('');
                $('#projNo').text('');
                $('#holdType').text('');
                $('#scoreLevel').text('');
                $('#holdUnit').text('');

                $('#projName').append(decodeURIComponent(singleProjName));
                $('#projNo').append(projNo);
                $('#holdType').append(holdTypeName);
                $('#scoreLevel').append(scoreLevelName);
                $('#holdUnit').append(teachUnitName);

                if(cmeStandardKindIdtool!="6eec6713-670a-43cc-ad4d-9bd700a92928"){
                    $("#exceltool").attr("style", "display:none"); 
                }
                loaderTable();
                //loadProjInfo();

            });

            // 表格相关操作
            // 表格配置
            function loaderTable() {
                window.mainTable = table.render({
                    elem: '#stuInfo',
                    url: huayi_projectscore_url + 'cmeSingleprojScore/getRemoteScoreStuList',
                    title: '学分表',
                    method: 'post',
                    defaultToolbar: [],
                    where: {
                        singleProjNo: projNo,
                        singleProjName: singleProjName,
                        period: period,
                        score: score,
                        teachUnitName: teachUnitName,
                        checkState: checkStates,
                        studyDateCollection: studydatecollection,
                        scoreLevel: scorelevelid,
                        holdType:holdtype,
                        unitId: localStorage.getItem("unit-id"),
                        menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        unitUserType: localStorage.getItem("unit-user-type"),
                        personName: personName,
                        idCardNo: idCardNo
                    },
                    cols: [[
                        {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                            field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                                var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.scoreId+'"><i class="layui-icon"></i>';
                                    //利用三元表达式判断本条数据是否需要加载checkbox
                                    if (unitUserType!=5){
                                        return d.checkState != 0?'已审核':templateHtml;
                                    }else{
                                        if(d.checkState==0 || d.unitUserType!=5){
                                            return templateHtml;
                                        }else{
                                            return '已审核';
                                        }
                                    }
                        }},
                        {field: 'personName', title: '姓名', sort: true,align: 'center'},
                        {field: 'personNo', title: '人员编号', sort: true,align: 'center',width:120},
                        {field: 'sex', title: '性别', sort: true,align: 'center',width:80},
                        {field: 'unitId', title: '单位编号', sort: true,align: 'center',width:140},
                        {field: 'titleName', title: '职称', sort: true,align: 'center'},
                        {field: 'unitName', title: '单位名称', sort: true,align: 'center',width:180},
                        {field: 'cityName', title: '所属地市', sort: true,align: 'center',width:180},
                        {field: 'addTime', title: '添加时间', sort: true,align: 'center',width:190},
                        {field: 'studyDate', title: '授分日期', sort: true,align: 'center',width:150},
                        {field: 'score', title: '学分', sort: true,align: 'center',width:80},
                        {field: 'period', title: '学时', sort: true,align: 'center',width:80},
                        {field: 'checkStateName', title: '审核状态', sort: true,align: 'center',width:120}
                    ]],
                    done:function(res, curr, count){
                        for(var i = 0;i<res.data.length;i++){
                            var state = res.data[i].isPass; //根据status状态判断，不为0时，禁止勾选
                            var checkallinfo=$("#checkboxAll").is(":checked");
                            var checkboxCurrent=$("#checkboxCurrent").is(":checked");
                            var templateHtml ="";
                            //如果全选
                            if (checkallinfo || checkboxCurrent){
                                var index = res.data[i]['LAY_TABLE_INDEX'];
                                if(state==null)
                                {
                                    $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                    $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                                }
                            }
                        }
                    },
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: "stuInfo",
                    height: 'full-200',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            $(".tab_others").on("click", function() {
                var index = $(this).index();
                $(this).addClass("tab_this").siblings().removeClass("tab_this");

            });
            window.toexcel=function(){
                //导出excel
                var loading=layer.load(0, {
                        shade: false
                    });
                    axios({
                        method: 'GET',
                        url: huayi_projectscore_url + "projectExclel/excelExportRemotStu",
                        responseType: 'blob',
                        headers: {
                            "Accept": 'application/json',
                            "Authorization": localStorage.getItem("token"),
                            "KJPT-USER-ID": localStorage.getItem("user-id"),
                            "cmestandard-id": localStorage.getItem("standardkind-id")
                        },
                        params: {
                            singleProjNo: projNo,
                            singleProjName: singleProjName,
                            period: period,
                            score: score,
                            teachUnitName: teachUnitName,
                            checkState: checkStates,
                            studyDateCollection: studydatecollection,
                            scoreLevel: scorelevelid,
                            holdType:holdtype,
                            unitId: localStorage.getItem("unit-id"),
                            menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                            cmeStandardKindId: localStorage.getItem("standardkind-id"),
                            unitUserType: localStorage.getItem("unit-user-type"),
                            personName: personName,
                            idCardNo: idCardNo
                        }
                    }).then(function (res) {
                        layer.close(loading);
                        var data = res.data;
                        var blob = new Blob([data], {type: 'application/octet-stream'});
                        var url = URL.createObjectURL(blob);
                        var exportLink = document.createElement('a');
                        exportLink.setAttribute("download","人员明细.xlsx");
                        exportLink.href = url;
                        document.body.appendChild(exportLink);
                        exportLink.click();
                    })

            };


            // function loadProjInfo() {
            //     //加载项目信息
            //     $.ajax({
            //         type: "post",
            //         url: huayi_projectscore_url + "cmeSingleprojScore/getRemoteScoreList",
            //         data: {
            //             // singleProjNo: projNo,
            //             // unitId: localStorage.getItem("unit-id"),
            //             // cmeStandardKindId: localStorage.getItem("standardkind-id"),
            //             // studyDateCollection:studydatecollection
            //             studyDateCollection: $('#studyDateCollection').val(),
            //             singleProjNo: $('#singleProjNo').val(),
            //             singleProjName: $('#singleProjName').val(),
            //             checkState: $('#checkState').val(),
            //             holdType: $('#holdType').val(),
            //             scoreLevel: $('#scoreLevel').val(),
            //             unitId: localStorage.getItem("unit-id"),
            //             teachUnit: $('#teachUnit').val(),
            //             cmeStandardKindId: localStorage.getItem("standardkind-id")
            //         },
            //         dataType: 'json',
            //         success: function(data) {
            //             $('#projName').append(data.data.records[0].singleProjName);
            //             $('#projNo').append(data.data.records[0].singleProjNo);
            //             $('#holdType').append(data.data.records[0].holdTypeName);
            //             $('#scoreLevel').append(data.data.records[0].scoreLevelName);
            //             $('#holdUnit').append(data.data.records[0].teachUnitName);
            //         },
            //         error: function(data) {
            //             layer.msg("响应失败");
            //         }
            //     });
            // }
            // 监听头部新增按钮
            table.on('toolbar(stuInfo)', function(obj) {
                var datas = obj.data;
            if (obj.event === 'AllCheckPass' || obj.event === 'AllCheckNoPass') {
                //审核项目 判断是否全选
                var checkallinfo=$("#checkboxAll").is(":checked");
                var scoreIdlist =[];
                var missage="";
                var postprojStatus=0;
                var child = $("input[name='layTableCheckbox']");
                        child.each(function (index, item) {
                            if(item.checked===true){
                                scoreIdlist.push(item.defaultValue);
                            }
                    });
                    if(scoreIdlist.length == 0){
                        layer.msg("请选择项目");
                        return;
                    }
                if(obj.event === 'AllCheckPass' ){
                    missage="确定全部审核通过吗?";
                    postprojStatus=3;
                }else if(obj.event === 'AllCheckNoPass'){
                    missage="确定全部审核不通过吗?";
                    postprojStatus=2;
                }
                if(checkallinfo){
                    if(obj.event === 'AllCheckPass' ){
                        layer.confirm(missage, {icon: 3, title: '提示'}, function () {
                            $.ajax({
                                type: "post",
                                url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreById",
                                data: {
                                    singleProjNo: projNo,
                                    singleProjName: singleProjName,
                                    period: period,
                                    score: score,
                                    teachUnitName: teachUnitName,
                                    studyDateCollection: studydatecollection,
                                    scoreLevel: scorelevelid,
                                    holdType:holdtype,
                                    unitId: localStorage.getItem("unit-id"),
                                    menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                                    projStatus:postprojStatus,
                                    ifAvail: 1,
                                    type:1,
                                    unitUserType: localStorage.getItem("unit-user-type")
                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('stuInfo');
                                        loaderTable();
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            });
                        })
                    }else if(obj.event === 'AllCheckNoPass'){
                        layer.prompt({formType: 2,title: missage},
                            function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                }else{
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreById",
                                        data:{
                                            singleProjNo: projNo,
                                            singleProjName: singleProjName,
                                            period: period,
                                            score: score,
                                            teachUnitName: teachUnitName,
                                            studyDateCollection: studydatecollection,
                                            scoreLevel: scorelevelid,
                                            holdType:holdtype,
                                            unitId: localStorage.getItem("unit-id"),
                                            menuUnitId: localStorage.getItem("menu-unit-id")==null?localStorage.getItem("unit-id"):localStorage.getItem("menu-unit-id"),
                                            projStatus:postprojStatus,
                                            checkMemo: value,
                                            ifAvail: 4,
                                            type:1,
                                            unitUserType: localStorage.getItem("unit-user-type")
                                        },
                                        dataType: 'json',
                                        success: function (res) {
                                            if (res.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('stuInfo');
                                                loaderTable();
                                            }
                                        },
                                        error: function (res) {
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            }
                        );
                    }
                }else{
                    var child = $("input[name='layTableCheckbox']");
                        child.each(function (index, item) {
                            if(item.checked===true){
                                scoreIdlist.push(item.defaultValue);
                            }
                    });
                    if(scoreIdlist.length == 0){
                        layer.msg("请选择项目");
                        return;
                    }else{

                    if(obj.event === 'AllCheckPass' ){
                        layer.confirm("确定审核通过吗", {icon: 3, title: '提示'}, function () {
                            $.ajax({
                                type: "post",
                                url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreById",
                                data: {
                                    scoreIds: JSON.stringify(scoreIdlist),
                                    projStatus:postprojStatus,
                                    unitId:localStorage.getItem("unit-id"),
                                    ifAvail: 1,
                                    type:2
                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('stuInfo');
                                        loaderTable();
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            });
                        })
                    }else if(obj.event === 'AllCheckNoPass'){
                        layer.prompt({formType: 2,title: missage},
                            function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                }else{
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url +"cmeSingleprojScore/checkRemoteScoreById",
                                        data:{
                                            scoreIds: JSON.stringify(scoreIdlist),
                                            projStatus:postprojStatus,
                                            unitId:localStorage.getItem("unit-id"),
                                            ifAvail: 4,
                                            type:2,
                                            checkMemo: value
                                        },
                                        dataType: 'json',
                                        success: function (res) {
                                            if (res.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('stuInfo');
                                                loaderTable();
                                            }
                                        },
                                        error: function (res) {
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            });
                        }
                    }

                }
            }
            });
            //全选
            form.on('checkbox(checkboxAll)', function(data){
                if(data.elem.checked){
                    $("#checkboxCurrent").prop("checked",false);
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = true;
                    });
                }else{
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = false;
                    });
                }
                form.render('checkbox');
            });
            //本页全选
            form.on('checkbox(checkboxCurrent)', function(data){
                if(data.elem.checked){
                    $("#checkboxAll").prop("checked",false);
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = true;
                    });
                }else{
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = false;
                    });
                }
                form.render('checkbox');
            });

        });
    </script>

</body>

</html>
