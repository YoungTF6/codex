            table.on('tool(downInfo_filter)', function (obj) {
                var downId = obj.data.downId;
                if (obj.event === 'recognitionPass_event') {
                    if (obj.data.recognitionPass) {
                        layer.msg("人脸识别通过")
                    } else {
                        layer.msg("人脸识别未通过")
                    }
                } else if (obj.event === 'evaluation_event') {
                    if (obj.data.evaluation) {
                        layer.msg("已对项目评价")
                    } else {
                        layer.msg("未对项目评价")
                    }

                } else if (obj.event === 'viewTheResults') {
                    if (obj.data.passingTheExam) {
                        layer.open({
                            type: 2,
                            content: '../CmeExamPaper.html?projectId  =' + projectId,
                            area: ['90%', '90%'],
                            title: '考试结果',
                        })
                    } else {
                        layer.msg("未通过考试不能查看")
                    }
                }
            })

            table.on('toolbar(downInfo_filter)', function (obj) {
                
                let checkStatus = table.checkStatus('teachersListTable');
                console.log("checkStatus:");
                console.log(checkStatus);
                if (checkStatus.data.length > 0) {
                    for (var i = 0; i < checkStatus.data.length; i++) {
                        var checkStatusDTO = {};
                        checkStatusDTO.businessId = checkStatus.data[i].scoreId
                        checkStatusDTO.flowChainId = checkStatus.data[i].flowChainId
                        checkStatusDTO.flowChainState = checkStatus.data[i].flowChainState
                        checkStatusDTO.beProvScore = checkStatus.data[i].provScore
                        checkStatusDTO.beTeacherScore = checkStatus.data[i].teacherScore
                        CheckStatusDTOs.push(checkStatusDTO)
                    }
                } else {
                    layer.msg("请选择审核人员");
                    return;
                }
              
                if (obj.event === 'checkPass') {
                    check(3,'');
                } else if (obj.event === 'checkNoPass') {
                    layer.open({
                        type: 2,
                        title: '审核意见',
                        content: '../modals/checkMemo.html?checkStatus=2',
                        area: ['700px', '420px']
                    })
                } else if (obj.event === 'returnToModify') {                    
                    layer.open({
                        type: 2,
                        title: '审核意见',
                        content: '../modals/checkMemo.html?checkStatus=1',
                        area: ['700px', '420px']
                    });
                }
            })

            // 审核提交数据
            window.check = function (checkStatus,checkMemo) {
                let checkData = {
                    dataList    : CheckStatusDTOs,
                    unitId      : localStorage.getItem("unit-id") == '{}' ? null : localStorage.getItem("unit-id"),
                    userName    : localStorage.getItem("user-name") == '{}' ? null : localStorage.getItem("user-name"),
                    checkStatus : checkStatus,
                    checkMemo   : checkMemo
                };
                $.ajax({
                    type: 'post',
                    url: huayi_projectscore_url + 'cmeProjScore/checkScore',
                    contentType: 'application/json;charset=UTF-8',
                    data: JSON.stringify(checkData),
                    dataType: 'json',
                    success: function (res) {
                        loaderTable();
                        layer.msg(res.data)
                    },
                    error: function (res) {
                        layer.msg("发送请求失败")
                    },
                    complete: function() {
                        CheckStatusDTOs = [];
                    }
                })
            }

            window.choose = function () {
                // 获取点击选择的数据并填充到输入框
                myIndex = layer.open({
                    type: 2,
                    title: '选择原因',
                    content: '../maintenanceOfAuditOpinions/CmeCheckReasonForLayer.html',
                    skin: '',
                    area: ['60%', '60%'],
                })
            }


            window.ableOperateLastYearData = function(dataYear) {
                let cgv = window["value_forbid_some_operate_on_last_year_data"];
                if(cgv == null || cgv == "" || localStorage.getItem("unit-user-type") == 5) {
                    return true;
                }
            
                let able = true;
                let deadline = new Date(cgv);
                let now = new Date();
                if(parseInt(dataYear) < now.getFullYear()){
                    if(deadline < now) {
                        able = false;
                    }
                }
                return able;
            }


            /* 获取配置 */
            window.getConfig = function (config_name) {
                $.ajax({
                    async: false,
                    type: 'post',
                    url: huayi_sjwh_url + 'cmeCommonConfig/getConfigByUnitFromRedis',
                    data: {
                        unitId: localStorage.getItem("unit-id"),
                        configNames: config_name
                    },
                    success: function (res) {
                        if (res.success == true) {
                            window[config_name] = res.data[config_name];
                        } else {
                            layer.msg('获取配置失败');
                        }
                    },
                    error: function () {
                        layer.msg('获取配置失败');
                    }
                });
            }


            $(function () {
                (cmeStandardKindId == HENAN) && $("#scoreMode").val("1");
                (cmeStandardKindId == GUANGXI || cmeStandardKindId == GANSU || cmeStandardKindId == FUJIAN) && $("#checkState").val("0");
                form.render("select");

                form.render("select");
                getConfig("value_forbid_some_operate_on_last_year_data");
                loaderTable();
            });
        })
    </script>
