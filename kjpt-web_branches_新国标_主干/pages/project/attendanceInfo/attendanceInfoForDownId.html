<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
</head>
<style>
</style>
<body>

<div class="layui-card" style="text-align: center;">
    <!--        表格区域-->
    <div class="layui-card-body layui_body_box"> 
        <table class="layui-table" id="downInfo" lay-filter="downInfo" style="margin: 0px 0px;">
        </table>
    </div>
</div>

<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="attendanceInfo">查看授分人员考勤明细</a>
</script>

<script type="text/html" id="rowBar1">
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="review">审核</a>
    {{# if(isHunanShengting()) { }}
         <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="updateScore">修改学分</a>
         <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="updatePeriod">修改学时</a>
    {{#   } }}
   
</script>


<!--   修改学分或者学时     -->
<div class="layui-form" style="background-color: #fff;display: none; text-align: center; padding:20px;" 
    lay-filter="divUpdateSP"  id="divUpdateSP">
    <div class="layui-form-item" id="scoreDiv" style="display: none">
        <input type="hidden" name="downId" id="downId" />
        <input type="hidden" name="type" id="type" />
        <label class="layui-form-label">学分修改为</label>
        <div class="layui-input-block">
            <input type="text" name="realScore"  id="realScore" lay-verify="required|positive" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item" id="periodDiv" style="display: none">
        <label class="layui-form-label">学时修改为</label>
        <div class="layui-input-block" >
            <input type="text" name="realPeriod" id="realPeriod"   lay-verify="required|positive" autocomplete="off" class="layui-input">
        </div>
    </div>
    <div class="layui-btn-container" style="padding-top:12px;">
        <button type="button" class="layui-btn" id='btnSave' lay-submit lay-filter="btnSave">保存</button>
        <button type="button" class="layui-btn" id='btnCancel'>取消</button>
    </div>
</div>

<script>
    var type=getUrlParam("type");
    var projectId=getUrlParam("projectId");
    var cmeYear=getUrlParam("cmeYear");
    layui.use(['table', 'form','laydate','laytpl'],function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var laytpl = layui.laytpl;

        var upSPIndex ;

        window.isHunanShengting = function(){
            return localStorage.getItem("unit-id") == "180000" || localStorage.getItem("unit-id") == "200000";
        }


        table.render({
            elem: '#downInfo',
            title: '周期信息',
            url: huayi_projectscore_url+'cmeProjPosDownload/getListForProj',
            where: {
                projId: projectId
            },
            cols: [[
                {align: 'center', title: '审核',templet: '#rowBar1', hide: type==1,width:240},
                {align: 'center', title: '授分人员考勤明细',templet: '#rowBar' ,hide: type==2,width:200},
                {field: 'downId', align: 'center', title: '主讲人id', hide: true},
                {field: 'projName', align: 'center', title: '项目名称',width:150 },
                {field: 'projNo', align: 'center', title: '项目编号',width:150},
                {field: 'hasScored', align: 'center', title: '是否已授分', width:100,templet:function(d){
                    return d.hasScored?"是":"否";
                }},
                {field: 'scoreCount', align: 'center', title: '授分人数', width:90 },
               // {field: 'scoreToCheckCount', align: 'center', title: '待审核人数', width:100},
                {field: 'teachUnitName', align: 'center', title: '举办单位', hide: false,  width:130 },
                {field: 'planScore', align: 'center', title: '拟授学分',  width:100 ,hide: !isHunanShengting()},
                {field: 'planPeriod', align: 'center', title: '拟授学时',  width:100 ,hide: !isHunanShengting()},
                {field: 'realScore', align: 'center', title: '实授学分', width:100},
                {field: 'realPeriod', align: 'center', title: '实授学时', width:100},
                {field: 'startDt', align: 'center', title: '开始时间', width:160},
                {field: 'endDt', align: 'center', title: '结束时间', width:160}
            ]],
            defaultToolbar: [],
            id: "downInfo",
            page: false,
            height: window.innerHeight-45,
            parseData: function (res) {
                return {
                    "code": res.status === 200 ? 0 : res.status, //解析接口状态
                    "msg": res.msg, //解析提示文本
                    "data": res.data, //解析数据列表
                }

            },
            request: {
                pageName: 'pageNum', //页码的参数名称，默认：page
                limitName: 'pageSize' //每页数据量的参数名，默认：limit
            }
        })

        table.on('tool(downInfo)',function (obj) {
            var downId = obj.data.downId;
            var planScore = obj.data.planScore;
            var planPeriod = obj.data.planPeriod;
            var realScore = obj.data.realScore;
            var realPeriod = obj.data.realPeriod;
            var score = obj.data.score;
            var period = obj.data.period;
            if (obj.event === 'attendanceInfo'){
                layer.open({
                    type: 2,
                    // 去除省厅查看有效人员列表的功能，直接查看考勤详情
                    content: 'givingList.html?downId='+obj.data.downId,
                    // content: '../giving/attendanceInfoForGovernment.html?downId='+downId,
                    area: ['90%', '90%'],
                    title: '授分人员考勤明细',
                    cancel: function (index ,layero) {
                        table.reload("downInfo");
                    }
                })
            }else if (obj.event === 'review') {
                let index = layer.open({
                    type: 2,
                    content: 'checkProjScore.html?downId='+obj.data.downId+"&cmeYear="+cmeYear,
                    area: ['90%', '100%'],
                    title: '学分审核',
                    cancel: function (index ,layero) {
                        table.reload("downInfo");
                    }
                });
                layer.full(index);
            }else if (obj.event === 'updateScore') {
                upSPIndex = layer.open({
                    type: 1,
                    content: $('#divUpdateSP'),
                    area: ['28%', '35%'],
                    title: '修改学分',
                    success: function() {
                        $("#scoreDiv").show();
                        $("#periodDiv").hide();
                        form.val("divUpdateSP",{
                            downId: downId,
                            realPeriod: realPeriod,
                            realScore: realScore,
                            type: 1
                        });
                        form.render();
                    },
                    cancel: function (index ,layero) {
                        layer.close(index);
                    }
                });
            }else if (obj.event === 'updatePeriod') {
                upSPIndex = layer.open({
                    type: 1,
                    content: $('#divUpdateSP'),
                    area: ['28%', '35%'],
                    title: '修改学时',
                    success: function() {
                        $("#scoreDiv").hide();
                        $("#periodDiv").show();
                        form.val("divUpdateSP",{
                            downId: downId,
                            realScore: realScore,
                            realPeriod: realPeriod,
                            type: 2
                        });
                        form.render();
                    },
                    cancel: function (index ,layero) {
                        layer.close(index);
                    }
                });
            }
        })
    
        form.verify({
            positive: [/^[+]{0,1}(\d+)$|^[+]{0,1}(\d+\.\d+)$/,'必须输入正数'] 
        });


        form.on('submit(btnSave)', function(data){
            var fields = data.field;
            fields.userId = localStorage.getItem("user-id");
            $.ajax({
                url: huayi_projectscore_url + "cmeProjPosDownload/updateProjScoreAndPeriod",
                type: "post",
                data: fields,
                success: function (re) {
                    if (re.success == true) {
                        if(upSPIndex != null) {
                            let str = $("#type").val() == "1" ? "学分" : "学时";
                            layer.msg("修改"+str+"成功", {icon:1,time:2000 },function(){
                                layer.close(upSPIndex);
                                table.reload("downInfo");
                            });
                        }
                    } else {
                        layer.msg(re.msg, {icon:2,time:3000 });
                    }
                }
            });

        });

        $("#btnCancel").click(function(){
            if(upSPIndex != null) {
                layer.close(upSPIndex);
            }
        });


    })
</script>
</body>
</html>
