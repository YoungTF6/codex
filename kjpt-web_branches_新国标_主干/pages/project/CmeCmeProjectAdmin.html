<script type="text/javascript">
    layui.config({
        base        : '/js/layui/ext/'
    }).extend({
        xmSelect    : 'xm-select',
        treeSelect  : 'treeSelect',
        tool        : 'tool'
    }).use([ 'table', 'form', 'laydate', 'element', 'treeSelect','tool' ], () => {
        let { table, form, layer, laydate, treeSelect, element,tool } = layui;

        const yearCur = new Date().getFullYear();


        /** 初始化页面 */
        $(() => {

            if(dictTool.getStandardKindId() == StandardKind.HAI_HAN) {
                // 海南套：筛选框三级学科不可选
                $("#knowledgeThree").val("").attr("disabled", "disabled");
            }
            dictTool.getConfigByUnitFromRedis('fun_pre_register', 'fun_proj_admin_show_score_period_cols', 'fun_proj_admin_show_actual_score_col','project_change_score_level_user');

            // 配置依赖：initScoreLevelSel / 表格列显隐等会读取 window 配置，需先加载配置再初始化页面与表格
            window.init();

            countTabNum(); // 获取标签页计数

            tableOp.init(); // 初始化表格

            if (dictTool.getStandardKindId() == StandardKind.SHAN_XI) $('#tab_2, #tabarea_2').hide(); // 山西隐藏举办前申请
            if (dictTool.getStandardKindId() == StandardKind.ZHE_JIANG) $('#materialDiv').show(); // 山西隐藏举办前申请

        });


        window.tabIdCurrent     = 'tab_1_1', // 当前选中二级标签
        window.extendData       = { holdState: 'HOLD' }, // 签标页额外参数
        window.userNameData      = {userName:localStorage.getItem('user-name')},
        window.allConditionFlag = false; // 是否显示全部条件

        /**
         * 获取 URL 参数值
         * @param {string} name 参数名
         * @returns {string} 参数值（不存在返回空字符串）
         */
        window.getUrlParam = (name) => {
            if (!name) return '';
            const search = window.location.search || '';
            const query = search.startsWith('?') ? search.slice(1) : search;
            if (!query) return '';
            const pairs = query.split('&');
            for (let i = 0; i < pairs.length; i++) {
                const item = pairs[i] || '';
                if (!item) continue;
                const idx = item.indexOf('=');
                const key = idx > -1 ? item.slice(0, idx) : item;
                if (key !== name) continue;
                const val = idx > -1 ? item.slice(idx + 1) : '';
                try {
                    return decodeURIComponent(val || '');
                } catch (e) {
                    return val || '';
                }
            }
            return '';
        };

        /**
         * 根据 URL 参数 tab 设置默认选中 Tab（兼容：未传参不影响默认行为）
         * 支持：tab_1_0/tab_1_1/tab_1_2/tab_1_3/tab_1_4/tab_1_5/tab_2_1..tab_2_5/tab_3_1..tab_3_5
         */
        window.applyDefaultTabFromUrl = () => {
            const tab = (window.getUrlParam('tab') || '').trim();
            if (!tab) return;

            const allowedTabs = new Set([
                'tab_1_0','tab_1_1','tab_1_2','tab_1_3','tab_1_4','tab_1_5',
                'tab_2_1','tab_2_2','tab_2_3','tab_2_4','tab_2_5',
                'tab_3_1','tab_3_2','tab_3_3','tab_3_4','tab_3_5'
            ]);
            if (!allowedTabs.has(tab)) return;

            const topTab = tab.startsWith('tab_1_') ? 'tab_1' : tab.startsWith('tab_2_') ? 'tab_2' : 'tab_3';
            const subFilter = topTab === 'tab_1' ? 'tabarea_1' : topTab === 'tab_2' ? 'tabarea_2' : 'tabarea_3';

            // 一级 tab
            const topTabEl = document.getElementById(topTab);
            if (topTabEl) {
                // 一级 tab 没有 lay-id，不能用 element.tabChange；通过点击触发 element.on('tab(tabarea)')
                topTabEl.click();
            }

            // 二级 tab
            tabIdCurrent = tab;
            element.tabChange(subFilter, tab);

            // 切换后按既有逻辑刷新

                $('.layui-tab-card-1').hide();
                switch (tabIdTemp) {
                    case 'tab_1':
                        $('#tabarea_1').show();
                        $("#searchDateType option:eq(0)").prop("selected", true);
                        $("#searchDateType option:gt(0)").prop("disabled", true);
                        tabIdCurrent = 'tab_1_1';
                        element.tabChange('tabarea_1', 'tab_1_1');
                        break;

                    case 'tab_2':
                        $('#tabarea_2').show();
                        $("#searchDateType option:gt(0)").removeAttr("disabled");
                        tabIdCurrent = 'tab_2_1';
                        element.tabChange('tabarea_2', 'tab_2_1');
                        break;

                    case 'tab_3':
                        $('#tabarea_3').show();
                        $("#searchDateType option:gt(0)").removeAttr("disabled");
                        tabIdCurrent = 'tab_3_1';
                        element.tabChange('tabarea_3', 'tab_3_1');
                        break;

                    default:
                        return;
                }
                form.render();
                tabChange();
            });

            /* 举办状态，二级选项卡 */
            element.on('tab(tabarea_1)', function (data) {
                const tabIdTemp = this.getAttribute('id');
                if (tabIdCurrent == tabIdTemp) return; // 所选标签页为已选中状态时
                else {
                    tabIdCurrent = tabIdTemp;
                    tabChange();
                }
            });

                else {
                    tabIdCurrent = tabIdTemp;
                    tabChange();
                }

                    'tab_1_5': { holdState: 'PART_HOLD' },
                    'tab_1_2': { holdState: 'NO_HOLD' },
                    'tab_1_3': { holdState: 'OVERDUE' },
                    'tab_1_4': { holdState: 'SCORE_TO_CHECK' },
                    'tab_2_1': { applyBeforeHoldState: 'NO_CHECK' },
                    'tab_2_2': { applyBeforeHoldState: 'BACK' },
                    'tab_2_3': { applyBeforeHoldState: 'FINISH' },
                    'tab_2_4': { applyBeforeHoldState: 'NOT_PASS' },
                    'tab_2_5': { applyBeforeHoldState: 'NO_REPORT' },
                    'tab_3_1': { feedbackState: 'NO_CHECK' },
                    'tab_3_2': { feedbackState: 'BACK' },
                    'tab_3_3': { feedbackState: 'FINISH' },
                    'tab_3_4': { feedbackState: 'NOT_PASS' },
                    'tab_3_5': { feedbackState: 'NO_REPORT' }

                if (!extendData) return;
                window.tableOp.reload();
            }

        /* 标签页计数：holdState / applyBeforeHoldState / feedbackState 与 list 共用 getQueryParams（含广东 type=5 默认 scoreLevelList） */
        window.countTabNum = () => {
            let url   = huayi_projectscore_url,
                data  = { ...tableOp.getQueryParams(),  topUnitId: getMenuUnitId() || dictTool.getUnitId(), ...userNameData },
                tabId = tabIdCurrent;
            if (tabId.startsWith('tab_1')) url += 'cmeCmeProj/holdState';
            else if (tabId.startsWith('tab_2')) url += 'cmeCmeProj/applyBeforeHoldState';
            else if (tabId.startsWith('tab_3')) url += 'cmeCmeProj/feedbackState';
            axios({
                method       : 'get',
                url          : url,
                responseType : 'json',
                params       : data
            }).then(response => {
                if (response.status == 200 && response.data.status == 200) {
                    let data = response.data.data;
                    if (tabId.startsWith('tab_1')) {
                        $('#tab_1_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_1_1').html('已举办&nbsp;&nbsp;(' + data.HOLD + ')');
                        $('#tab_1_5').html('部分已举办&nbsp;&nbsp;(' + data.PART_HOLD + ')');
                        $('#tab_1_2').html('未举办&nbsp;&nbsp;(' + data.NO_HOLD + ')');
                        $('#tab_1_3').html('逾期未举办&nbsp;&nbsp;(' + data.OVERDUE + ')');
                        $('#tab_1_4').html('学分待审核&nbsp;&nbsp;(' + data.SCORE_TO_CHECK + ')');
                        if (0 < data.SCORE_TO_CHECK) $('#tab_1_4').addClass('shake_tab');
                    } else if (tabId.startsWith('tab_2')) {
                        $('#tab_2_1').html('待审核&nbsp;&nbsp;(' + data.NO_CHECK + ')');
                        $('#tab_2_2').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');

                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                        $('#tab_2_5').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                    } else if (tabId.startsWith('tab_3')) {
                        $('#tab_3_1').html('待审核&nbsp;&nbsp;(' + data.NO_CHECK + ')');
                        $('#tab_3_2').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');

                return treeDataForRender;

                if(localStorage.getItem('unit-user-type') == "5") {

                        { field: 'batchDate', title: '实际举办日期', align: 'center', minWidth: 200, sort: true, templet: d => tableOp.multilineFromStr(d.batchDate) },
                        { field: 'feedbackDiffDays', title: '反馈时间', align: 'center', minWidth: 100,  templet: d => tableOp.multilineFromStr(d.feedbackDiffDays),
                            hide:  (dictTool.getStandardKindId().toLowerCase() != StandardKind.ZHE_JIANG) },
                        { field: 'actualScores', title: '实授学分', align: 'center', minWidth: 100, templet: d => tableOp.multilineFromStr(d.actualScores) },
                        { field: 'actualPeriods', title: '实授学时', align: 'center', minWidth: 100, templet: d => tableOp.multilineFromStr(d.actualPeriods) },
                        { field: 'score', title: '项目学分', align: 'center', templet: d => d.score.toFixed(2), minWidth: 100 },
                        { field: 'period', title: '项目学时', align: 'center', templet: d => d.period.toFixed(2), minWidth: 100 },
                        // { field: 'holdFormName', title: '举办形式', align: 'center', minWidth: 110, sort: true },
                        { field: 'holdTypeName', title: projectLabels.lblActivityForm, align: 'center', minWidth: 110, sort: true },
                        { field: 'scoreLevelContentName', title: projectLabels.lblActivityContent, align: 'center', minWidth: 110, sort: true },
                        { field: 'projTypeName', title: projectLabels.lblActivityType, align: 'center', minWidth: 110, sort: true },
                        { field: 'medicalTypeName', title: projectLabels.lblMedicalSystem, align: 'center', minWidth: 130, sort: true },
                        { field: 'knowledgeName', title: '学科', align: 'center', minWidth: 130, sort: true },
                        { field: 'projManager', title: '举办单位联系人', align: 'center', minWidth: 130 },
                        { field: 'projManagerTelephone', title: '联系电话', align: 'center', minWidth: 120 },
                        { field: 'studyAddress', title: '举办地点', align: 'center', minWidth: 150, templet: d => tableOp.rowWithTitle(d.studyAddress) }
                    ] ],
                    cellMinWidth    : 100,
                    id              : 'table-cmeCmeProj',
                    height          : tableOp.computeHeight(),
                    page            : true,
                    limit           : 10,
                    limits          : [10, 50, 100, 150, 200],
                    parseData       : res => {
                        return {
                            'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                            'msg'   : res.message, // 解析提示文本
                            'count' : res.data.recordsTotal, // 解析数据长度
                            'data'  : res.data.records, // 解析数据列表
                            'page'  : res.data.pageNum, // 当前页
                            'limit' : res.data.pageSize, // 每页条数
                        } },
                    request         : {
                        pageName    : 'pageNum', // 页码的参数名称，默认：page
                        limitName   : 'pageSize' // 每页数据量的参数名，默认：limit
                    },
                    done            : (res, curr, count) => {
                        // 山西隐藏举办前申请
                        if (dictTool.getStandardKindId() == StandardKind.SHAN_XI) $('[data-field=1]').css('display', 'none');

                        // 表格显示多行时操作列调整
                        $('.layui-table-main tr').each((i, val) =>
                            $($('.layui-table-fixed-l .layui-table-body tbody tr, .layui-table-fixed-r .layui-table-body tbody tr')[i]).height($(val).height()));
                        form.render();

                        // 是否可以处理往年数据
                        // if (res.data && res.data.length > 0) {
                        //     dictTool.getConfigByUnitFromRedis('value_forbid_some_operate_on_last_year_data');
                        //     let cmeYear     = res.data[0].cmeYear,
                        //         ableOper    = ableOperateLastYearData(cmeYear);
                        //     if (ableOper == false) $('td[data-field=projApply], td[data-field=projScore], td[data-field=projFeedback]')
                        //         .find('a').removeAttr('lay-event').addClass('layui-disabled');
                        // }
                    }
                });

                tableOp.initListener();
            },

            initListener: () => {
                /* 导出Excel */
                $('#btn-exportExcel').on('click', () => {
                    let loadIdx = layer.open({
                        title       : '',
                        closeBtn    : 0,
                        btn         : false,
                        shade       : 0.3,
                        content     : '<i class="layui-icon layui-icon-loading-1 layui-anim layui-anim-rotate layui-anim-loop"' +
                            ' style="font-size: 36px; margin-right: 15px; position: relative; top: 4px;"></i>' +
                            '<span id="packageMsg" style="position: relative; top: -4px;">正在导出，请稍候</span>',
                        time        : 0
                    });
                    axios({
                        method          : 'post',
                        url             : huayi_projectscore_url + 'cmeCmeProj/excel',
                        responseType    : 'blob',
                        data            : { ...tableOp.getQueryParams(), ...extendData },
                        headers         : {
                            'Accept': 'application/json',
                            'Authorization': localStorage.getItem('token'),
                            'KJPT-USER-ID': localStorage.getItem('user-id'),
                            'cmestandard-id': localStorage.getItem('standardkind-id')
                        },
                        // data: data,
                    }).then(res => {
                        let data        = res.data,
                            blob        = new Blob([data], { type: 'application/octet-stream' }),
                            url         = URL.createObjectURL(blob),
                            exportLink  = document.createElement('a');
                        exportLink.setAttribute('download', '项目信息.xlsx');
                        exportLink.href = url;
                        document.body.appendChild(exportLink);
                        exportLink.click();
                        layer.closeAll();
                        layer.msg('导出成功', { icon: 1, time: 1500 });
                    }).catch(function(thrown) {
                        layer.closeAll();
                        if (axios.isCancel(thrown)) {
                            console.log('Request canceled', thrown.message);
                        } else {
                            console.error('Request failed', thrown);
                            layer.msg('导出失败', { icon: 2, time: 1500 });
                        }
                    });
                });

                /* 行工具条 */
                table.on('tool(table-cmeCmeProj)', obj => {
                    let event       = obj.event,
                        data        = obj.data,
                        projId      = obj.tr[0].cells[0].innerText,
                        scoreLevel      = obj.tr[0].cells[3].innerText,
                        layerConf   = {
                            type        : 2,
                            area        : [ '100%', '100%' ],
                            maxmin      : true,
                            scrollbar   : false
                        };

                    switch (event) {
                        case 'holdQualification':
                            layer.open({ ...layerConf,
                                title   : '举办资格管理',
                                content : 'holdQualification.html?projectId=' + projId
                            });
                            break;

                        case 'beforeHoldApproval':
                            layer.open({ ...layerConf,
                                title   : (dictTool.getStandardKindId().toLowerCase()== StandardKind.HU_BEI)?'举办前预审':'举办前申请审核',
                                content: 'ProjApplyBeforeHoldApproval.html?projectId=' + projId + '&scoreLevel=' + data.scoreLevel + '&cmeYear=' + data.cmeYear ,
                                end     : () => window.tableOp.reload()
                            });
                            break;
                        case 'showProjContract':
                            //市级走正常的举办前申请页面
                            if(scoreLevel == "59f4ef52-dd6d-11f0-ba6d-005056a64c01" || scoreLevel == "57390d56-fa89-4577-a999-a0ce04c20e36") {
                                layer.open({ ...layerConf,
                                    title   : (dictTool.getStandardKindId().toLowerCase()== StandardKind.HU_BEI)?'举办前预审':'举办前申请审核',
                                    content: 'ProjApplyBeforeHoldApproval.html?projectId=' + projId + '&scoreLevel=' + data.scoreLevel + '&cmeYear=' + data.cmeYear ,
                                    end     : () => window.tableOp.reload()
                                });
                            } else {
                                layer.open({
                                    title: "合同书审核",
                                    type: 2,
                                    area: ['100%', '100%'],
                                    maxmin: false,
                                    content: 'projContract/projContractDownApproval.html?projectId=' + projId,
                                    scrollbar: true,
                                    end     : () => window.tableOp.reload()
                                });
                            }

                        break;
                        case 'showAttendanceDetail':
                            var attendanceDetailUrl = '/pages/project/attendanceForProj/attendanceDetailEntrance.html?projectId=' + projId
                                + '&scoreLevel=' + scoreLevel
                                + '&cmeYear=' + data.cmeYear;
                            var index = layer.open({
                                title: '项目周期',
                                type: 2,
                                area: ['100%', '100%'],
                                maxmin: true,
                                content: attendanceDetailUrl,
                                scrollbar: false
                            });
                            break;
                        case 'preRegister':
                            layer.open({ ...layerConf,
                                title   : '预报名查看',
                                content : 'CmeProjPreRegisterConfigApproval.html?projectId=' + projId
                            });
                            break;

                        case 'attendanceInfo':
                            layer.open({ ...layerConf,
                                title   : '授分人员考勤明细',
                                content : 'attendanceInfo/attendanceInfoForDownId.html?projectId=' + projId + '&type=1'
                            });
                            break;

                        case 'feedbackCheck':
                            layer.open({ ...layerConf,
                                title   : '执行情况反馈审核',
                                content: 'CmeProjFeedbackApproval.html?projectId=' + projId + '&cmeYear=' + data.cmeYear ,
                                end     : () => window.tableOp.reload()
                            });
                            break;

                        case 'scoreCheck':
                            layer.open({ ...layerConf,
                                title   : '学分审核 - 周期',
                                content: 'attendanceInfo/attendanceInfoForDownId.html?projectId=' + projId + '&type=2'+ '&cmeYear=' + data.cmeYear
                            });
                            break;

                        case 'evaluation':
                            layer.open({ ...layerConf,
                                title   : '项目评价表',
                                content : 'CmeProjEvaluation.html?projectId=' + projId
                            });
                            break;

                        case 'paper':
                            layer.open({ ...layerConf,
                                title   : '试卷查看',
                                content : 'CmeExamQuestion.html?projectId=' + projId +'&paperName=测试&projectType=1'
                            });
                            break;

                        case 'exam':
                            layer.open({ ...layerConf,
                                title   : '考试结果查看',
                                content : 'CmeExamResultPeople.html?projectId=' + projId
                            });
                            break;

                        case 'scorePolicy':
                            layer.open({
                                ...layerConf,
                                area    : [ '300px', '400px' ],
                                title   : '设置授分策略',
                                content : 'scorePolicy.html?projectId=' + projId
                            });
                            break;

                    };
                });

                /* 全局排序 */
                table.on('sort(table-cmeCmeProj)', function (obj) {
                    // 注：sort 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
                    // console.log(obj.field);
                    // console.log(obj.type);
                    // console.log(this);
                    let data_default    = getQueryParams(),
                        orderField      = getRightField(obj.field),
                        orderType       = obj.type,
                        orderExtendData = { ...extendData, orderField: orderField, orderType: orderType };
                    tableOp.reload();
                });
                table.on('sort(table-cmeCmeProj)', obj => {
                    // 表格显示多行时操作列调整
                    $('.layui-table-main tr').each((i, val) =>
                        $($('.layui-table-fixed-l .layui-table-body tbody tr, .layui-table-fixed-r .layui-table-body tbody tr')[i]).height($(val).height()));
                });

                form.on('switch(toggleAllow)', data =>
                    toggleAllowManualInput({'projId': data.elem.attributes['projId'].nodeValue, 'allowManualInput': data.elem.checked }));
            },

            rowWithTitle: val => val ? '<span title="' + val + '">' + val + '</span>' : '',

            multilineFromStr: str => {
                let html = '';
                if (str) $.each(str.split('\\n'), (i, item) => html += '<p>' + item + '</p>');
                return html;
            },

            computeHeight: () => {
                let windowHeight    = $(window).height(),
                    divTop          = $('#table-cmeCmeProj').offset().top,
                    divHeight       = windowHeight - divTop;
                return  'full-' + Math.floor(divTop + 16);
            },

            getQueryParams: data => {
                const params = { ...$('#form-query').serializeObject(), ...getVerParams(),
                    topUnitId               : getMenuUnitId(),
                    unitId                  : dictTool.getUnitId(),
                    knowledgeTwoId          : $('#knowledgeTwo').val(),
                    knowledgeId             : $('#knowledgeThree').val(),
                    searchFlow              : (tabIdCurrent.indexOf("tab_2") > -1) ? "applyCycle" : (tabIdCurrent.indexOf("tab_3") > -1) ? "feedback" : "",
                    withCheckInfo           : true,
                    holdState               : null,
                    applyBeforeHoldState    : null,
                    feedbackState           : null,
                    ...data
                };
                if (isSendScoreLevelList() && window.projAdminDefaultScoreLevelList) {
                    params.scoreLevelList = window.projAdminDefaultScoreLevelList;
                }
                return params;
            },

            reload: config => {
                countTabNum(); // 刷新标签页计数
                table.reload('table-cmeCmeProj', {
                    height  : tableOp.computeHeight(),
                    where   : { ...tableOp.getQueryParams(), ...extendData },
                    page    : { curr: 1 }, // 重新从第 1 页开始
                    ...config
                });
            }

        };

        window.getRightField = field => {
            let rightFieldName = humpToUnderline(field);
            return (rightFieldName != 'proj_name') ? rightFieldName.replace('_name','_id') : rightFieldName;
        };
        window.humpToUnderline = str => {
            let temp = str.replace(/[A-Z]/g, match => '_' + match.toLowerCase());
            return (temp.slice(0, 1) === '_') ? temp.slice(1) : temp; // 如果首字母是大写，执行replace时会多一个_，这里需要去掉
        };

        window.toggleAllowManualInput = data => {
            let projId      = data.projId,
                toggleAllow =  data.allowManualInput;
            $.ajax({
                async   : false,
                type    : 'post',
                url     : huayi_projectscore_url + `cmeCmeProj/toggleAllowManualInput/${projId}/${toggleAllow}`,
                success : re => {
                    if (re.success == true) {
                        let allow =  re.data;
                        window.tableOp.reload({});
                        layer.msg('设置成功', { icon: 1, time: 1500 });
                    } else layer.msg(re.msg, { icon: 7, time: 1500 });
                },
                error   : () => layer.msg('数据发送异常', { icon: 7, time: 1500 })
            });
        };



        /** 获取左侧单位树单位 */
        window.getMenuUnitId = () => localStorage.getItem('menu-unit-id') || localStorage.getItem('unit-id');

        window.getVerParams = () => {
            return {
                cmeStandardKindId   : dictTool.getStandardKindId(),
                versionYear         : $('#cmeYear').val()
            };
        };


        window.pageNum = 1;
        $(window).resize(() => {
            let pageNumCur = $('.layui-laypage-curr > em:nth-child(2)').text();
            pageNum = pageNumCur || pageNum;
            tableOp.reload({ page: { curr: pageNum } });
        });

    });
</script>
