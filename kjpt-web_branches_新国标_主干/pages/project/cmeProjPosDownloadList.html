<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>选择考勤机</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>

    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
    <script type="text/javascript" src="/js/tools/urlTools.js"></script>
    <style>
        /* 该页面用于嵌入到 SignInOut.html 子表下方，
           样式直接按嵌入态设定，去掉冗余外间距。 */
        body { margin: 0; overflow: hidden; }

        /* 考勤机列表强制竖排（layui primary 复选框默认是 inline-block） */
        /* #attendanceList .layui-form-checkbox[lay-skin=primary] {
            display: block;
            margin-left: 0;
            margin-top: 6px;
        } */

        /* 「请选择考勤机」标题区：垂直留白较 layui 默认约减半（兼容 padding 版与 height/line-height 版） */
        /* .cme-pos-download-card .layui-card-header {
            height: auto;
            min-height: 0;
            line-height: 1.4;
            padding: 1px 15px;
        } */

        /* 考勤机列表过长时在弹窗内滚动，避免底部内容被截断 */
        #attendanceList {
            max-height: 280px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 8px;
            padding-bottom: 16px;
            box-sizing: border-box;
            /* background-color: rgb(243, 239, 239); */
        }

        #attendanceList .layui-form-checkbox {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body style="background-color: white;">
    <div class="layui-fluid">
        <div class="layui-card cme-pos-download-card">
            <!-- <div class="layui-card-header">请选择考勤机</div> -->
            <div class="layui-card-body">
                <form class="layui-form" id="attendanceForm">
                    <div class="layui-form-item">
                        <label class="layui-form-label"></label>
                        <div class="layui-input-block">
                            <input type="checkbox" name="selectAll" lay-skin="primary" title="全选" lay-filter="selectAll">
                        </div>
                    </div>

                    <div id="attendanceListContainer" class="layui-form-item">
                        <label class="layui-form-label"></label>
                        <div class="layui-input-block" id="attendanceList">
                            <!-- 动态渲染的考勤机列表 -->
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 按钮区域 -->
    <!-- <div style="text-align: center; margin-top: 20px;">
        <button class="layui-btn layui-btn-normal" id="confirmBtn">确 定</button>
        <button class="layui-btn layui-btn-primary" id="cancelBtn">取 消</button>
    </div> -->

    <script>
        layui.use(['form'], function () {
            var form = layui.form;
            var $ = layui.jquery;

            var downId = getQueryString("downId");
            var unitId = localStorage.getItem("unit-id");
            var unitName = localStorage.getItem("unit-name");

            // 嵌入父页（如 AttendanceGroupChooseSignInOut）时，勾选前调用父页 validateAttendBatchTimesForEmbed 校验各考勤时间段
            function tryValidateAttendTimesBeforeBind() {
                // try {
                    if (window.parent && window.parent !== window &&
                        typeof window.parent.validateAttendBatchTimesForEmbed === 'function') {
                        return !!window.parent.validateAttendBatchTimesForEmbed(downId);
                    }
                // } catch (e) { /* 跨域等 */ }
                return true;
            }

            // 把当前文档高度通知宿主页，便于其将 iframe 高度自适应到内容
            function notifyParentResize() {
                try {
                    var h = Math.max(
                        document.documentElement ? document.documentElement.scrollHeight : 0,
                        document.body ? document.body.scrollHeight : 0
                    );
                    parent.postMessage({
                        type: 'attend-device-frame-resize',
                        name: window.name,
                        height: h + 4
                    }, '*');
                } catch (e) { /* 跨域或 parent 不可用时静默忽略 */ }
            }

            // function notifyParentBindStatus(hasBind) {
            //     try {
            //         if (window.parent && window.parent !== window && typeof window.parent.onAttendDeviceBindStatusChange === 'function') {
            //             window.parent.onAttendDeviceBindStatusChange(downId, hasBind);
            //         }
            //     } catch (e) { /* 跨域或 parent 不可用时静默忽略 */ }
            // }

            // 加载考勤机列表
            window.initAttendanceList = function () {
                $.ajax({
                    url: huayi_projectscore_url + "cmeProjPosDownloadList/getPosList",
                    type: "GET",
                    data: { downId: downId, unitId: unitId },
                    success: function (res) {
                        if (res.success && res.data && res.data.length > 0) {
                            var listHtml = '';
                            var hasBind = false;
                            res.data.sort(function (a, b) {
                                return parseInt(a.listId) - parseInt(b.listId);
                            });
                            res.data.forEach(function (item) {
                                var isChecked = item.isBind ? "checked" : "";
                                // lay-filter="attendanceMachine" 用于 form.on('checkbox(...)') 监听勾选/取消勾选
                                listHtml += `<input type="checkbox" name="attendanceMachine" lay-filter="attendanceMachine" value="${item.posId}" lay-skin="primary" 
                                title="${unitName} ${item.listId}号考勤机, 编号: ${item.posId} ${item.posVersion > 10 ? '(已升级)' : '(未升级)'}  " ${isChecked}>`;
                            });
                            $("#attendanceList").html(listHtml);
                            form.render('checkbox');
                        } else {
                            $("#attendanceList").html('<div style="color:#999;line-height:28px;">未查询到可用的考勤机</div>'); 
                        }
                        notifyParentResize();
                    },
                    error: function () {
                        $("#attendanceList").html('<div style="color:#999;line-height:28px;">获取考勤机失败，请稍后重试</div>');
                        notifyParentResize();
                    }
                });
            };

            // 全选 / 反选联动：勾选后批量同步下层 checkbox，并触发一次自动保存
            form.on('checkbox(selectAll)', function (data) {
                var checked = data.elem.checked;
                if (checked && !tryValidateAttendTimesBeforeBind()) {
                    data.elem.checked = false;
                    form.render('checkbox');
                    return;
                }
                $('input[name="attendanceMachine"]').prop('checked', checked);
                form.render('checkbox');
                // prop('checked') 不会触发 layui 的 attendanceMachine 事件，所以这里需显式保存一次
                saveAttendanceMachines(true);
            });

            // 任一考勤机 checkbox 勾选/取消勾选时，自动保存（静默模式）
            // 注：此处 form.on 使用 lay-filter='attendanceMachine'，由列表项 input 上的 lay-filter 触发
            form.on('checkbox(attendanceMachine)', function (data) {
                if (data.elem.checked && !tryValidateAttendTimesBeforeBind()) {
                    data.elem.checked = false;
                    form.render('checkbox');
                    return;
                }
                saveAttendanceMachines(true);
            });

            // 提交选中的考勤机
            // 语义：以当前勾选集合作为该 downId 下绑定的最终态；允许 0 选中（表示清空该批次全部绑定）
            // silent=true：勾选/取消勾选驱动的自动保存，成功不弹 toast、不触发父页 reloadTable，避免 iframe 反复重载闪烁
            // silent=false（默认）：显式调用场景，与原弹窗保存交互一致
            window.saveAttendanceMachines = function (silent) {
                if (!downId) {
                    layer.msg("缺少批次标识");
                    return;
                }

                var selectedMachines = [];
                $('input[name="attendanceMachine"]:checked').each(function () {
                    selectedMachines.push({
                        downId: downId,
                        posId: $(this).val()
                    });
                });

                $.ajax({
                    url: huayi_projectscore_url + "cmeProjPosDownloadList/updatePosList?downId=" + encodeURIComponent(downId),
                    type: "POST",
                    data: JSON.stringify(selectedMachines),
                    contentType: "application/json",
                    success: function (res) {
                        if (res.success) {
                            notifyParentBindStatus(selectedMachines.length > 0);
                            if (!silent) {
                                layer.msg("绑定成功");
                                if (parent && typeof parent.reloadTable === 'function') {
                                    parent.reloadTable();
                                }
                            }
                        } else {
                            layer.msg(res.msg || "绑定失败");
                        }
                    },
                    error: function () {
                        layer.msg("网络异常，请稍后重试");
                    }
                });
            };

            $(function () {
                initAttendanceList();
            });

            function getQueryString(name) {
                var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
                var r = window.location.search.substr(1).match(reg);
                if (r != null) return decodeURIComponent(r[2]);
                return null;
            }
        });
    </script>
</body>
</html>
