<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>预报名管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
        media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="/js/jquery/jquery3.6.0/jquery-3.6.0.min.js"></script>
<script src="/js/jquery/jquery3.6.0/jquery-migrate-3.4.0.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>


    <style>
        /* #form-ProjectDicRegionYear .layui-inline-660 {
            width: 80%;
        } */
        .multiple {
            height: 38px !important;
        }

        .lay-ext-mulitsel .layui-input.multiple a {
            margin-top: 5px !important;

        }
    </style>
</head>

<body>

    <div class="layui-fluid">

        <!-- 周期列表 -->
        <div id="cmeProjPosDownListBlock" class="layui-card">
            <!--        表格区域         -->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="cmeProjPosDownList" lay-filter="cmeProjPosDownList"
                            style="margin: 0px 0px;">
                        </table>
                    </div>
                </div>

            </div>
        </div>

        <!-- 预报名管理 -->
        <div id="preRegisterConfigBlock" style="display: none;">
            <div style="padding-bottom: 10px;">
                <button type="button" class="layui-btn" id="returnDownList">返回周期列表</button>
            </div>
            <div class="layui-card">
                <div class="layui-tab layui-tab-brief" lay-filter="preRegisterTabBrief">
                    <ul class="layui-tab-title">
                        <li lay-id="preRegisterConfig" class="layui-this">预报名管理</li>
                        <li lay-id="preRegisterPersonList">预报名名单</li>
                    </ul>
                    <div class="layui-tab-content" style="height: 100%;">
                        <!-- 预报名配置 -->
                        <div class="layui-tab-item layui-show">
                            <form class="layui-form" style="padding: 30px;" id="form-registerConfig"
                                lay-filter="form-registerConfig">
                                <div class="layui-form-item" style="display: none">
                                    <div class="layui-inline layui-inline-660">
                                        <label class="layui-form-label" style="width: 160px;">主键</label>
                                        <div class="layui-input-block">
                                            <input type="text" name="keyId" autocomplete="off" class="layui-input">
                                        </div>
                                    </div>
                                </div>

                                <div class="layui-form-item">
                                    <div class="layui-inline">
                                        <label class="layui-form-label" style="width: 160px;">
                                            <font color="red">*&nbsp;</font>预报名人数上限(人)
                                        </label>
                                        <div class="layui-input-inline">
                                            <input name="maximum" class="layui-input" autocomplete="off" type="number"
                                                required maxlength="5" max="99999"
                                                onKeyUp="this.value=this.value.replace(/[^\.\d]/g,'');this.value=this.value.replace('.','');"
                                                oninput="if(value>99999)value=99999">
                                        </div>
                                    </div>
                                    <div class="layui-inline">
                                        <label class="layui-form-label" style="width: 160px;">
                                            <font color="red">*&nbsp;</font>其中本院人数占比
                                        </label>
                                        <div class="layui-input-inline">
                                            <select name="proportion" lay-filter="proportion">
                                                <option value="">请选择</option>
                                                <option value="0">0%</option>
                                                <option value="10">10%</option>
                                                <option value="20">20%</option>
                                                <option value="30">30%</option>
                                                <option value="40">40%</option>
                                                <option value="50">50%</option>
                                                <option value="60">60%</option>
                                                <option value="70">70%</option>
                                                <option value="80">80%</option>
                                                <option value="90">90%</option>
                                                <option value="100">100%</option>
                                            </select>
                                            <!-- <input name="proportion" class="layui-input" autocomplete="off"
                                                type="number" required maxlength="2" oninput="if(value>100)value=100"> -->
                                        </div>
                                    </div>
                                    <div class="layui-inline">
                                        <label class="layui-form-label" style="width: 160px;">预报名范围</label>
                                        <div class="layui-input-inline">
                                            <select name="scope" lay-filter="scope">
                                                <option value="0">不限制</option>
                                                <option value="1">本省</option>
                                                <option value="2">本市</option>
                                                <option value="3">本县</option>
                                                <option value="4">本单位</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <div class="layui-inline">
                                        <label class="layui-form-label" style="width: 160px;">
                                            <font color="red">*&nbsp;</font>
                                            预报名开始时间</label>
                                        <div class="layui-input-inline">
                                            <input type="text" name="startTime" id="startTime" autocomplete="off"
                                                class="layui-input" placeholder="请选择">
                                        </div>
                                    </div>
                                    <div class="layui-inline">
                                        <label class="layui-form-label" style="width: 160px;">
                                            <font color="red">*&nbsp;</font>
                                            预报名结束时间</label>
                                        <div class="layui-input-inline">
                                            <input type="text" name="endTime" id="endTime" autocomplete="off"
                                                class="layui-input" placeholder="请选择">
                                        </div>
                                    </div>

                                    <div class="layui-inline" id="isPublishBlock">
                                        <label class="layui-form-label" style="width: 160px;">
                                            是否开启预报名
                                        </label>
                                        <div class="layui-input-inline">
                                            <select name="isPublish" lay-filter="isPublish">
                                                <option value="false">否</option>
                                                <option value="true">是</option>
                                            </select>
                                            <!-- <p style="color: red;">若选择公布，系统将根据您设置的报名范围进行公布，此范围内的学员即可进行预报名</p> -->
                                        </div>
                                    </div>
                                </div>
                                <div class="layui-form-item">
                                    <label class="layui-form-label" style="width: 160px;">
                                        <font color="red">*&nbsp;</font>
                                        预报名专业:</label>
                                    <div class="layui-input-inline" id="zTreeSelectM" style="width: 300px;"></div>
                                </div>
                                <div class="layui-form-item" style="display: none;">
                                    <div class="layui-inline">
                                        <label class="layui-form-label" style="width: 170px;">预报名专业</label>
                                        <div class="layui-input-inline">
                                            <div class="eletree"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="layui-form-item" id="submitAndReset">
                                    <div style="text-align: center;">
                                        <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                                        <button id="resetBtn" type="reset"
                                            class="layui-btn layui-btn-primary">重置</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <!-- 预报名学员列表 -->
                        <div class="layui-tab-item">
                            <div style="padding-left: 15px;margin-bottom: 10px;">
                                <button type="button" class="layui-btn layui-btn-sm"
                                    id="excelExportPerson">导出Excel</button>
                            </div>
                            <!--        表格区域-->
                            <div class="layui-card-body layui_body_box">
                                <table class="layui-table" id="preRegisterPerson" lay-filter="preRegisterPerson"
                                    style="margin: 0px 0px;">
                                </table>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
        <span id="{{d.downId}}" class="oprateSpan" data-holdQualification="{{d.holdQualification}}">
            {{# if(d.holdQualification==true){  }}
           <a class="layui-btn layui-btn-xs" lay-event="addRegister" style="color: #ffb82e;background-color: transparent;">预报名</a>
           {{# }else{  }}
           <a class="layui-btn layui-btn-xs  layui-disabled"  style="color: #ffb82e;background-color: transparent;">预报名</a>
           {{# } }}
        </span>    
    </script>

    <script>
        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            eleTree: 'eleTree',
            xmSelect: 'xm-select',
            zTreeSelectM: 'zTreeSelectM'
        });
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element', 'laydate', 'eleTree', 'xmSelect', 'zTreeSelectM'], function () {
            var $ = layui.jquery
                , table = layui.table
                , element = layui.element
                , form = layui.form
                , laydate = layui.laydate
                , xmSelect = layui.xmSelect
                , eleTree = layui.eleTree
                , zTreeSelectM = layui.zTreeSelectM
                , layer = layui.layer;

            var projId = '';
            var downId = '';
            var oldProportion ;
            var specArrs = [];
            var checkNotExists = true;
            //解析url参数
            let getParamFromUrl = function (paramName) {
                let urlStr = location.search;
                if (urlStr.indexOf(paramName) < 0 || urlStr.indexOf("?") < 0) return;
                let paramKV = urlStr.substr(1).split("&");
                for (let i = 0; i < paramKV.length; i++) {
                    if (paramKV[i].indexOf(paramName) >= 0) {
                        return paramKV[i].split("=")[1];
                    }
                }
            }
            var nowProjectId = getParamFromUrl("projectId");
            if (nowProjectId != null && nowProjectId != "" && nowProjectId != undefined) {
                projId = nowProjectId;
            }


            // 初始化专业列表
            var el = eleTree({
                el: '.eletree',
                showCheckbox: true,
                highlightCurrent: true,
                data: [],
                sort: true,
                initSort: {
                    field: 'order',
                    type: 'asc'
                },
                request: {          // 对于树形数据字段名重定义
                    name: "name",
                    key: "id",
                    children: "children",
                    pid: "pid"
                },

            });
            var industryTreeData = [];
            var _zTreeSelectM;

            window.getSpecTree = function () {
                $.ajax({
                    type: 'get',
                    url: huayi_sjwh_url + 'comPersonSpec/tree',
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        var allNodes = el.getAllNodeData();
                        if (allNodes.length > 0) {
                            var rootId = allNodes[0].id;
                            el.remove(rootId)
                        }

                        for (let i = 0; i < res.length; i++) {
                            let firstClassSpecObj = res[i];
                            //firstClassSpecObj.parentId="00000000-0000-0000-0000-000000000000";
                            firstClassSpecObj.pid = "00000000-0000-0000-0000-000000000000";
                        }
                        let data = {};
                        data.children = res;
                        data.id = "00000000-0000-0000-0000-000000000000";
                        data.pid = "";
                        data.order = 1;
                        data.name = "全部";
                        data.personSpecName = "全部";
                        data.listOrder = 1;
                        data.personSpecId = "00000000-0000-0000-0000-000000000000";
                        data.parentId = "";

                        industryTreeData.push(data);
                        console.log(industryTreeData);

                        _zTreeSelectM = zTreeSelectM({
                            elem: '#zTreeSelectM',//元素容器【必填】
                            data: industryTreeData,//候选数据【必填】
                            width: 600,  //设置了长度
                            selected: [3, 6, 29],//默认值
                            max: 10000,//最多选中个数
                            name: 'field',//input的name 不设置与选择器相同(去#.)
                            delimiter: ',',//值的分隔符
                            field: { idName: 'id', titleName: 'name' },//候选项数据的键名
                            zTreeSetting: { //zTree设置
                                check: {
                                    enable: true,
                                    chkboxType: { "Y": "s", "N": "ps" }
                                },
                                data: {
                                    simpleData: {
                                        enable: false
                                    },
                                    key: {
                                        name: 'name',
                                        children: 'children'
                                    }
                                },
                                callback: {
                                    beforeDragOpen: false
                                }
                            }
                        });
                        el.append(industryTreeData)
                        el.setChecked(specArrs)
                    }
                });
            }

            window.getPreRegisterConfig = function () {
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + 'cmeProjPreRegisterConfig/' + projId + "/" + downId,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        console.log(res.data)
                        if (res.data != null) {
                            // 专业树
                            var personSpecStr = res.data.personSpec;
                            specArrs = personSpecStr.split(",");
                            el.setChecked(specArrs);
                            _zTreeSelectM.set(specArrs);
                            oldProportion = res.data.proportion;
                            // 表单
                            form.val('form-registerConfig', {
                                "maximum": res.data.maximum // "name": "value"
                                , "proportion": res.data.proportion
                                , "scope": res.data.scope
                                , "personSpec": res.data.personSpec
                                , "startTime": res.data.startTime
                                , "endTime": res.data.endTime
                                , "isPublish": res.data.isPublish + ""
                                , "keyId": res.data.keyId
                            });
                            checkNotExists = false;
                        } else {
                            checkNotExists = true;
                        }

                    }
                });
            }

            // 表单提交
            form.on('submit(submit)', function (data) {
                console.log(data.field)

                let check = window.checkInput(data.field);
                if (check) {
                    data.field.addUser = localStorage.getItem("user-id");
                    if (data.field.addUser == '') {
                        data.field.addUser = localStorage.getItem("user-id");
                    }
                    console.log('zTreeSelectM 当前选中的值名：', _zTreeSelectM.selected);
                    console.log('zTreeSelectM 当前选中的值：', _zTreeSelectM.values);
                    // 获取专业集合
                    var specArr = _zTreeSelectM.selected;
                    let allIndex = specArr.indexOf("00000000-0000-0000-0000-000000000000");
                    console.log("allIndex:" + allIndex);
                    if (allIndex >= 0) {
                        specArr.splice(allIndex);
                    }
                    // 专业树赋值
                    var specIds = '';
                    for (var i = 0; i < specArr.length; i++) {
                        specIds += specArr[i].id;
                        specIds += ','
                    }
                    console.log(specIds)
                    data.field.personSpec = specIds;
                    data.field.projId = projId;
                    data.field.downId = downId;
                    var datas = JSON.stringify(data.field);
                    var URL;

                    if (checkNotExists) {
                        // 走新增逻辑
                        URL = huayi_projectscore_url + 'cmeProjPreRegisterConfig/save';
                    } else {
                        // 走修改逻辑
                        URL = huayi_projectscore_url + 'cmeProjPreRegisterConfig/update';
                    }

                    $.ajax({
                        type: 'post',
                        url: URL,
                        data: datas,
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("保存成功");
                                // 返回周期列表
                                _zTreeSelectM.set();//默认值
                                $('#cmeProjPosDownListBlock').css("display", "block");
                                $('#preRegisterConfigBlock').css("display", "none");
                            } else if (res.status === 500) {
                                layer.msg(res.msg);
                            }
                        },
                        error: function () {
                            layer.msg("发送请求失败");
                        }
                    });
                }
                return false;
            });

            //检查输入项
            window.checkInput = function (field) {
                console.log("field:");
                console.log(field);
                if (field.maximum == "" || field.maximum == undefined || field.maximum == null) {
                    layer.msg("请输入预报名人数上限");
                    return false;
                }
                // 校验人数占比, 若已有预报名信息, 则只能提高不能降低比例
                debugger
                var preRegisterPersonTotal;
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + 'cmeProjPreRegisterPerson/listRelated?downId=' + downId,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    async: false, 
                    success: function (res) {
                        if (res.status === 200) {
                            preRegisterPersonTotal = res.data.recordsTotal;
                        } else if (res.status === 500) {
                            layer.msg(res.msg);
                        }
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                });
                if(preRegisterPersonTotal > 0 && oldProportion > field.proportion){
                    layer.msg('已存在预报名信息, 本院人数占比不可降低')
                    return false;
                }
                if (field.proportion == "" || field.proportion == undefined || field.proportion == null) {
                    layer.msg("请输入本院人数占比");
                    return false;
                }

                if (field.startTime == "" || field.startTime == undefined || field.startTime == null) {
                    layer.msg("请选择预报名开始时间");
                    return false;
                }

                if (field.endTime == "" || field.endTime == undefined || field.endTime == null) {
                    layer.msg("请选择预报名结束时间");
                    return false;
                }
                if (_zTreeSelectM.values == "" || _zTreeSelectM.values == undefined || _zTreeSelectM.values == null) {
                    layer.msg("请选择预报名专业");
                    return false;
                }
                return true;

            }


            // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem: '#cmeProjPosDownList',
                    url: huayi_projectscore_url + 'cmeProjPreRegisterConfig/list',
                    title: '项目周期',
                    defaultToolbar: [],
                    where: {
                        projId: projId,
                    },
                    cols: [[
                        { title: '操作', toolbar: '#rowBar', align: "center" },
                        {
                            field: 'batch', title: '举办批次', sort: true, align: "center",
                            templet: function (data) {
                                return "第" + data.batch + "批次";
                            }
                        },
                        { field: 'startDt', title: '举办开始日期', align: "center" }
                        , { field: 'endDt', title: '举办结束日期', align: "center" }
                    ]],
                    cellMinWidth: 100,
                    id: "cmeProjPosDownList",
                    height: 'full-90',
                    parseData: function (res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }, done: function () {
                        let holdTipIndex = null;
                        $(".oprateSpan[data-holdqualification='false']").each(function (i, e) {
                            let id = "#" + $(this).attr("id");
                            $(e).parents("tr").mouseenter(function () {
                                holdTipIndex = layer.tips('该周期因逾期未举办或其他原因，已被取消举办资格,详情请咨询上级主管部门', id, {
                                    tips: [2, '#78BA32']
                                });
                            })
                        });
                    }
                });

            };


            // 初始化预报名名单列表
            window.loaderTablePerson = function () {
                table.render({
                    elem: '#preRegisterPerson',
                    url: huayi_projectscore_url + 'cmeProjPreRegisterPerson/listRelated',
                    title: '预报名名单',
                    defaultToolbar: [],
                    where: {
                        projId: projId,
                        downId: downId,
                    },
                    cols: [[
                        // { field: 'keyId', title: '主键', sort: true, align: "center" },
                        { field: 'personName', title: '姓名', sort: true, align: "center", width: "15%" },
                        { field: 'titleName', title: '当前职称', sort: true, align: "center", width: "15%" },
                        { field: 'deptName', title: '所在科室', sort: true, align: "center", width: "15%" },
                        { field: 'unitName', title: '所在单位', sort: true, align: "center", width: "20%" },
                        { field: 'specName', title: '专业', sort: true, align: "center", width: "15%" },
                        { field: 'mobile', title: '联系方式', sort: true, align: "center", width: "15%" },
                    ]],
                    cellMinWidth: 100,
                    id: "preRegisterPerson",
                    // height: 'full-400',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });

            };

            // 进入预报名配置
            table.on('tool(cmeProjPosDownList)', function (obj) {
                downId = obj.data.downId;
                if (obj.event == "addRegister") {
                    $("#form-registerConfig")[0].reset();
                    $('#preRegisterConfigBlock').css("display", "block");
                    $('#cmeProjPosDownListBlock').css("display", "none");
                    console.log("addRegister");
                    element.tabChange('preRegisterTabBrief', 'preRegisterConfig');
                    getPreRegisterConfig();
                    loaderTablePerson();
                }
            });

            // 返回周期列表
            layui.$('#returnDownList').on('click', function () {
                _zTreeSelectM.set();//默认值
                $('#cmeProjPosDownListBlock').css("display", "block");
                $('#preRegisterConfigBlock').css("display", "none");
            });

            // 导出Excel
            layui.$('#excelExportPerson').on('click', function () {
                //导出excel
                axios({
                    method: 'get',
                    url: huayi_projectscore_url + 'cmeProjPreRegisterPerson/excelExportPerson?projId=' + projId + "&downId=" + downId,
                    responseType: 'blob',
                    headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                    params: {
                    }
                }).then(function (res) {
                    var data = res.data;
                    var blob = new Blob([data], { type: 'application/octet-stream' });
                    var url = URL.createObjectURL(blob);
                    var exportLink = document.createElement('a');
                    exportLink.setAttribute("download", "预报名人员名单.xlsx");
                    exportLink.href = url;
                    document.body.appendChild(exportLink);
                    exportLink.click();
                })
            });


            //监听重置按钮
            $('form').find(':reset').click(function () {
                $("input[name='maximum']").val("");
                // $("input[name='proportion']").val("");
                $("select[name='scope'] option:first").prop("selected", "selected");
                $("select[name='isPublish'] option:first").prop("prop", "selected");
                $("select[name='proportion'] option:first").prop("selected", "selected");
                form.render('select');
                $("input[name='startTime']").val("");
                $("input[name='endTime']").val("");

                _zTreeSelectM.set();//默认值
                return false;
            });

            //页面加载完毕
            $(function () {
                //日期
                laydate.render({
                    elem: '#startTime',
                    type: 'datetime',
                    trigger: "click"
                });
                laydate.render({
                    elem: '#endTime',
                    type: 'datetime',
                    trigger: "click"
                });
                //获取专业树
                getSpecTree();

                // 初始化表格
                loaderTable();

            });


        });

    </script>
