<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> 考勤记录分析</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script src="/js/common.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <style>
      /* 新增代码 */
        html,body{
            background: #fff;
        }
      .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-layer-page .layui-layer-btn{
            text-align: center;
        }
        .no-click {
            pointer-events: none;
        }

    </style>
</head>
<body>
<div class="layui-fluid" >
    <table style="width: 80%;float: left;display: none ">
        <tr></tr>
    </table>
    <button style="width: 15%; float: left;display: none" type="button" class="layui-btn" onclick="toGivingForProjPosDownload()">返回授分</button>

    <div class="layui-card" style="text-align: center">
        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="teachList" lay-filter="teachListFilter" style="margin: 0px 0px;">
            </table>
        </div>
        <button type="button" class="layui-btn layui-btn-sm" onclick="creditAnalysisFunction()">筛选授分人员</button>
        <button type="button" class="layui-btn layui-btn-sm" onclick="closeMyMSG()">返回</button>
    </div>
    <div id="creditAnalysisDiv" style="display: none" class="layui-card">
        <!--    搜索栏-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" lay-filter="searchForQualifiedPersonnel" style="background: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label"><span style="color: red">*</span>授分策略</label>
                        <div class="layui-input-block">
                            <select name="creditStrategy" id="creditStrategy_id" lay-filter="creditStrategy_id" lay-verify="required"></select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">项目评价</label>
                        <div class="layui-input-block">
                            <select name="evaluationResults" id="evaluationResults_id" lay-verify="required">
                                <option value="">请选择</option>
                                <option value="0">完成</option>
                                <option value="1">未完成</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">考试</label>
                        <div class="layui-input-block">
                            <select name="passResult" id="passResult_id" lay-verify="required">
                                <option value="">请选择</option>
                                <option value="1">通过</option>
                                <option value="0">不通过</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" id="personName_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">所在单位</label>
                        <div class="layui-input-block" >
                            <input type="text" name="unitName" id="unitName_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block" >
                            <input type="text" name="deptName" id="deptName_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block" >
                            <input type="text" name="titleName" id="titleName_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">专业</label>
                        <div class="layui-input-block" >
                            <input type="text" name="personSpecName" id="personSpecName_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline" style="display:none;">
                        <label class="layui-form-label">考勤地址</label>
                        <div class="layui-input-block" >
                            <input type="text" name="attendanceAddress" id="attendanceAddress_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline" id="attendTimesDiv" style="display:none;">
                        <label class="layui-form-label">考勤次数 ≥</label>
                        <div class="layui-input-block" >
                            <input type="number" step="1" name="attendTimes" id="attendTimes_id" autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="searchToScorePersons()"
                        lay-filter="LAY-app-order-search"
                        data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div style="padding: 15px 15px 0 15px;" class="layui-row">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;width:100%;gap:12px;">
                <div style="display:inline-flex;flex-wrap:wrap;gap:8px;align-items:center;">
                    <button type="button" class="layui-btn layui-btn-sm" onclick="openAwardDate()">授分</button>
                    <button type="button" id="allChooseBtn" class="layui-btn layui-btn-sm" onclick="openAllChoose()">已选中(0)人</button>
                    <button type="button" id="TableCheckOff" class="layui-btn layui-btn-sm" >取消全部选中人员</button>
                </div>
                <div style="flex-shrink:0;">
                    <button type="button" class="layui-btn layui-btn-sm layui-btn-normal export-all-batch-btn">导出本批次全部考勤</button>
                </div>
            </div>
            <div style="width:100%;padding-top:10px;box-sizing:border-box;">
                <label style="color:red;display:none;line-height:1.6;" class="guangxi-show" >授分后必须填写相应的执行情况反馈，以完成学习记录。无反馈将影响上级部门审核。感谢配合！</label>
            </div>
        </div>
        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="creditAnalysis" lay-filter="creditAnalysisFilter" style="margin: 0px 0px;">
            </table>
        </div>

    </div>
    <!-- 已选择待授分人员 -->
    <div style="display: none" id="creditAnalysisCheckedDiv" class="layui-card-body layui_body_box">
        <table class="layui-table" id="creditAnalysisChecked" lay-filter="creditAnalysisCheckedFilter"
             style="margin: 0px 0px;" >
        </table>
    </div>
    <form class="layui-form" style="display: none" id="fromForCreditStrategy">
        <div class="layui-form-item" style="width: 90%;margin: 10px auto;">
            <label class="layui-form-label">请选择授分日期</label>
            <div class="layui-input-block">
                <input type="text" name="title" id="creditStrategyDate_ids"  lay-verify="required" placeholder="请选择授分日期" autocomplete="off" class="layui-input">
            </div>
        </div>
    </form>

</div>

<!--分析列-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="analyzedForStudent">考勤分析</a>
</script>
<script type="text/html" id="rowBar3">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="effectivAttendance">考勤有效人员</a>
</script>

<script type="text/html" id="rowBar4">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="attendanceList">查看</a>
</script>


<script type="text/html" id="rowBar5">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="effectivAttendance">考勤信息</a>
</script>

<script type="text/html" id="rowBar6">
    <a class="layui-btn layui-btn-xs layui-btn-normal btn-normal-row" lay-event="exportAttendance">导出EXECL</a>
    <label style="font-size:15px;float: right;padding-right: 40%;color: #1E9FFF;" id="peopleScoreTitle"></label>
</script>
<script>

    // 全局配置及引入相关的模块
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        myTable: 'table',
        excel: 'excel',
        tool: 'tool'
    })
    layui.use(['form', 'laydate','myTable', 'excel', 'tool'], function () {
        var table = layui.myTable,form = layui.form,$ = layui.jquery;
        var layer = layui.layer,laydate=layui.laydate,excel =layui.excel,tool = layui.tool;
        let projectId,downId,projectType,startDate,endDate;
        var scoreLevel = getUrlParam("scoreLevel");

        var checkedPersonIds = [] , checkedTableInfo = new Map();
        var teacherPersonList = [], singleScoreList = [];
        var cmeStandardKindId = localStorage.getItem('standardkind-id');
        var _isGuangxi = cmeStandardKindId == '4a6d91fb-8ba4-4560-a801-9c6f00e6d999';


        if(_isGuangxi) {
            $(".guangxi-show").show();
        }
        let tableInit = function() {
            table.render({
                elem: '#teachList',
                url: huayi_projectscore_url + 'cmeGroupprojPosDownload/cmeGroupProjAttendBatchList/'+downId,
                title: '课程列表',
                defaultToolbar: [],
                where: {
                    downId: downId,
                    projectType: projectType
                },
                cols: [[
                    {align: 'center', toolbar: '#rowBar4', title: '考勤明细'},
                    {align: 'center', field: 'group1', width: 150, toolbar: '#rowBar', title: '考勤分析'},
                    {align: 'center', field: 'group2', toolbar: '#rowBar3',title: '考勤有效人员'},
                    {align: 'center', field:'startDate',title: '开始时间'},
                    {align: 'center', field:'endDate',title: '结束时间'}
                ]],
                cellMinWidth: 100,
                id: "teachListTable",
                page: false,
                limit: 100,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }
                },
                done: function(res, curr, count) {
                    var data = res.data;
                    for(var i = 0; i < data.length; i++){
                        if(i == 0) {
                            $('tr[data-index="' + 0 + '"] td[data-field="group1"]').attr('rowspan',data.length);
                            $('tr[data-index="' + 0 + '"] td[data-field="group2"]').attr('rowspan',data.length);
                        }
                        if(i > 0){
                            $('tr[data-index="' + i + '"] td[data-field="group1"]').remove();
                            $('tr[data-index="' + i + '"] td[data-field="group2"]').remove();
                        }
                    }
                }
            })
        }

        //考勤分析页面
        let attendanceAnalysis = function(data) {
            layer.open({
                // 考勤分析页面
                closeBtn  : false,
                title: false,
                type: 2,
                content: '../../givingForGroup/attendanceAnalysis.html?projectType='+projectType+'&downId='+downId,
                area: ['100%', '100%'],
                cancel: function (index ,layero) { table.reload("teachListTable");}
            })
        }

        //教师授分页面
        let teachScore = function(data) {
            layer.open({
                // 教师授分页面
                type: 2,
                content: '../../givingForGroup/GivingForTeachers.html?teachId='+data.teachId+'&downId='+downId+'&projectType='+projectType+'&startDate='+data.startDate+'&endDate='+data.endDate,
                area: ['100%', '100%'],
                title: '给讲师授分页面',
                cancel: function (index ,layero) { table.reload("teachListTable");}
            })
        }
        //查看课程下有效授分人员页面
        let attendanceResult = function(data) {
            layer.open({
                type: 2,
                content: '../../givingForGroup/teachIdAttendanceResult.html?downId='+downId+'&projectType='+projectType+'&startDate='+startDate+'&endDate='+endDate,
                area: ['100%', '100%'],
                title: '考勤有效人员',
                cancel: function (index ,layero) {  table.reload("teachListTable"); }
            })
        }

        //考勤有效人员
        let attendancePerson = function(data) {
            layer.open({
                type: 2,
                content: '../../givingForGroup/attendanceDetails.html?batchId='+data.batchId+'&downId='+downId+'&projectType=2',
                area: ['100%', '100%'],
                title: '考勤人员列表',
                cancel: function (index ,layero) {  table.reload("teachListTable"); }
            })
        }

        // 监听行内按钮
        table.on('tool(teachListFilter)',function (obj) {
            //考勤分析页面
            obj.event == 'pendingPointsForStudent' && attendanceAnalysis(obj.data);
            obj.event == 'analyzedForStudent' && attendanceAnalysis(obj.data);
            // 教师授分页面
            obj.event == 'pendingPointsForTeach' && teachScore(obj.data);
            obj.event == 'awarded' && teachScore(obj.data);
            //查看课程下有效授分人员页面
            obj.event == 'effectivAttendance' && attendanceResult(obj.data);
            //考勤有效人员
            obj.event == 'attendanceList' && attendancePerson(obj.data);
        })

        // 按钮{已完成全部课程考勤分析，进入下一步}
        window.creditAnalysisFunction =function () {
            $("#creditAnalysisDiv").show();
            searchToScorePersons();
        }
         // 返回考勤周期页面
        window.closeMyMSG = function(){
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭
        }
        // 授分有效人员列表
        window.searchToScorePersons=function() {
            //按照考勤次数授分
            if($("#creditStrategy_id").val() == "6") {
                if(checkAttendTimes() == false) {
                    initTeachTable([]);
                    return false;
                }
            }
            var data1 = form.val("searchForQualifiedPersonnel");
            $.ajax({
                type 		: 'GET',
                contentType : 'application/json',
                url 		: huayi_projectscore_url + 'giving/givingForDownId',
                data 		: {
                    projectType:projectType,
                    downId: downId,
                    creditStrategy: $('#creditStrategy_id').val(),
                    evaluationResults: $('#evaluationResults_id').val(),
                    passResult: $('#passResult_id').val(),
                    personName: $('#personName_id').val(),
                    unitName: $('#unitName_id').val(),
                    deptName: $('#deptName_id').val(),
                    titleName: $('#titleName_id').val(),
                    attendanceAddress: $('#attendanceAddress_id').val(),
                    personSpecName: $('#personSpecName_id').val(),
                    studyDate: $("#creditStrategyDate_ids").val(),
                    scoreLevelId: scoreLevel,
                    attendTimes: $("#attendTimes_id").val(),
                     cmeStandardKindId: cmeStandardKindId
                },
                success 	: (res) => {
                    if (res.status == 200) {
                        allTeachData = res.data;
                        allTeachData.sort(
                            function compareFunction(param1, param2) {
                                let sortIndex = param1.personName.localeCompare(param2.personName, 'zh-Hans-CN', {sensitivity: 'accent'});
                                return sortIndex;
                            }
                        );
                        initTeachTable(res.data);
                    }else {
                        layer.msg(res.msg)
                    }
                },
                error       :  (XMLHttpRequest, textStatus, errorThrown) => {
                    layer.msg("请求失败")
                }
            })
        }

        let initTeachTable = function(data) {
            var scoredComPersonIdMap = {};
            layui.each(singleScoreList || [], function (_, s) {
                if (s && s.comPersonId != null && s.comPersonId !== '') {
                    scoredComPersonIdMap[String(s.comPersonId)] = true;
                }
            });
            var tableData = [];
            layui.each(data || [], function (_, item) {
                var row = $.extend({}, item);
                if (scoredComPersonIdMap[String(row.personId)] === true) {
                    row.myDisableStatus = true;
                }
                tableData.push(row);
            });
            table.render({
                elem: '#creditAnalysis',
                data: tableData,
                title: '符合授分人员',
                defaultToolbar: [],
                toolbar: '#rowBar6',
                cols: [[
                    {
                        align: 'center', width: 60, field: '_rowSelect', title: '选择',
                        templet: function (d) {
                            if (d.myDisableStatus) {
                                return '<img src="/img/score/disableIcon.png" style="width:20px;cursor:not-allowed;" alt="已完成主讲人授分" title="已完成主讲人授分">';
                            }
                            return '<input type="checkbox" name="layTableCheckbox" lay-skin="primary"><i class="layui-icon"></i>';
                        }
                    },
                    {field: 'personId',align: 'center', width: 250, title: '主键',hide: true},
                    {field: 'personNo',align: 'center', width: 120, title: '人员编号',hide: false},
                    {field: 'personName',align: 'center', width: 120, title: '姓名', sort: true},
                    {field: 'unitName', align: 'center', title: '所在单位', sort: true},
                    {field: 'deptName', align: 'center', title: '科室', sort: true},
                    {field: 'titleName', align: 'center', title: '职称', sort: true},
                    {field: 'posTime', align: 'center', title: '首次考勤时间', sort: true},
                    {field: 'attendTimes', align: 'center', title: '考勤次数', sort: true, hide:$("#creditStrategy_id").val() != "6"},
                    {align: 'center', title: '考勤信息', templet: '#rowBar5'},
                ]],
                cellMinWidth: 100,
                id: "comPersonIdListTable",
                page: false,
                limit: 10000,
                autoSort: false,
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.msg, //解析提示文本
                        "data": res.data, //解析数据列表
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done : function(res, curr, count){
                    var selectableCount = 0;
                    layui.each(res.data || [], function (_, row) {
                        if (!row.myDisableStatus) selectableCount++;
                    });
                    $("#peopleScoreTitle").html(`待授分人数: (${selectableCount}人)`);
                    var $wrap = $("div[lay-id='comPersonIdListTable']");
                    var $headCell = $wrap.find('.layui-table-header th[data-field="_rowSelect"] .layui-table-cell');
                    if ($headCell.length && $headCell.find('input[lay-filter="layTableAllChoose"]').length === 0) {
                        $headCell.html('<input type="checkbox" name="layTableCheckbox" lay-skin="primary" lay-filter="layTableAllChoose"><i class="layui-icon"></i>');
                    }
                    if( checkedPersonIds != undefined ){
                        layui.each(res.data, function(index,item){
                            if (item.myDisableStatus) {
                                var pid = item.personId;
                                for (var ci = checkedPersonIds.length - 1; ci >= 0; ci--) {
                                    if (String(checkedPersonIds[ci]) === String(pid)) {
                                        checkedPersonIds.splice(ci, 1);
                                    }
                                }
                                checkedTableInfo.delete(pid);
                                checkedTableInfo.delete(String(pid));
                                return;
                            }
                            if( checkedPersonIds.indexOf('' + item.personId + '') > -1 ){
                                var $cb = $wrap.find('.layui-table-body tbody tr[data-index="' + index + '"] .layui-form-checkbox');
                                if ($cb.length) $cb.trigger('click');
                            }
                        });
                    }
                    var chooseBtn = $("#allChooseBtn");
                    if (chooseBtn && chooseBtn[0]) {
                        chooseBtn[0].innerHTML = '已选中(' + checkedPersonIds.length + ')人';
                    }
                    form.render('checkbox');
                }
            })
        }


        function checkAttendTimes() {
            var intvalue = /^[1-9]\d*$/g;
            let result = intvalue.test($("#attendTimes_id").val().toString());
            if(result == false ) {
                layer.alert("请输入正确的考勤次数底值",{icon:2});
                $("#attendTimes_id").focus();
            }
            return result;
        }

        //以复选框事件为例
        table.on('checkbox(creditAnalysisFilter)', function(obj){

            // 全选
            if(obj.type == 'all'){
                var checkStatus = table.checkStatus('comPersonIdListTable');
                if(obj.checked == true){
                    for (var i = 0; i < checkStatus.data.length; i++) {
                        if (checkStatus.data[i].myDisableStatus) continue;
                        let indx =  checkedPersonIds.indexOf(checkStatus.data[i].personId);
                        let indxObj =  checkedTableInfo.has(checkStatus.data[i].personId);
                        if(indx < 0 ){
                            // 插入选中数组
                            checkedPersonIds.push(checkStatus.data[i].personId);
                            checkedTableInfo.set(checkStatus.data[i].personId, checkStatus.data[i]);
                        }
                    }
                }else if(obj.checked == false){
                    var datas = table.cache["comPersonIdListTable"]
                    for (var i = 0; i < datas.length; i++) {
                        let indx =  checkedPersonIds.indexOf(datas[i].personId);
                        if(indx >= 0){
                            // 从选中数组中去除
                            checkedPersonIds.splice(indx, 1);
                            checkedTableInfo.delete(datas[i].personId);
                            checkedTableInfo.delete(String(datas[i].personId));
                        }
                    }
                }
            }else{
                let indx =  checkedPersonIds.indexOf(obj.data.personId);
                let indxObj =  checkedTableInfo.has(obj.data.personId);
                if(obj.checked){
                    if(indx < 0 ){
                        checkedPersonIds.push(obj.data.personId);
                        checkedTableInfo.set(obj.data.personId, obj.data);
                    }
                }else{
                    if(indx >= 0){
                        checkedPersonIds.splice(indx, 1);
                        checkedTableInfo.delete(obj.data.comPersonId);
                    }
                }
            }

            // let indx =  checkedPersonIds.indexOf(obj.data.personId);
            // let indxObj =  checkedTableInfo.indexOf(obj);
            // if(obj.checked){
            //     if(indx < 0 ){
            //         checkedPersonIds.push(obj.data.personId);
            //         checkedTableInfo.push(obj.data);
            //     }
            // }else{
            //     if(indx >= 0){
            //         checkedPersonIds.splice(indx, 1);
            //         checkedTableInfo.splice(indxObj, 1);
            //     }

        window.exportBatchAllAttendanceExcel = function (downId, projectType, personIds) {
            $.ajax({
                type: 'POST',
                contentType: 'application/json',
                url: huayi_projectscore_url + 'attendance/ExportExeclForAttendanceByDownVO',
                data: JSON.stringify({"downId": downId, "personIds": personIds, "projectType": projectType}),
                success: (data, textStatus, xhr) => {
                    if (data.status == 200) {
                        var datas = data.data
                        var showAttendanceTypeCol = datas && datas.some(function (row) {
                            var v = row.signType;
                            return v !== null && v !== undefined && v !== '';
                        });
                        var aa = ['name', 'personNo', 'unit', 'dept', 'title', 'posTime', 'appAddress', 'isPassExam', 'isEvaluation']
                        var bb = { name: '人员姓名', personNo: '人员编号', unit: '单位', dept: '科室', title: '职称', posTime: '考勤时间', appAddress: '考勤地址', isPassExam: '考试结果', isEvaluation: '评价结果'}
                        if (showAttendanceTypeCol) {
                            aa.splice(aa.indexOf('appAddress') + 1, 0, 'signTypeLabel');
                            bb.signTypeLabel = '考勤类型';
                        }
                        datas = excel.filterExportData(datas, aa);
                        datas.unshift(bb);
                        excel.exportExcel(datas, '考勤详情.xlsx', 'xlsx');
                    } else {
                        layer.msg(data.msg)
                    }
                },
                error: (XMLHttpRequest, textStatus, errorThrown) => {
                    layer.msg("请求失败")
                }
            })
        }

        let givingScore = function(comPersonId) {
            console.log("jQuery version: " + $.fn.jquery);
            let scoreDate = $("#creditStrategyDate_ids").val();
            if(scoreDate ==null || scoreDate == "") {
                layer.msg("授分时间不能为空");
                return;
            }
            $(".layui-layer-btn0").prop("disabled","disabled").addClass("layui-disabled").addClass("no-click");
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + 'giving/giving',
                data: JSON.stringify({
                    // 周期id
                    downId: downId,
                    // 授分策略
                    creditStrategy: $("#creditStrategy_id").val(),
                    // 授分人员
                    comPersonIds: comPersonId,
                    // 授分日期
                    creditStrategyDate: $("#creditStrategyDate_ids").val(),
                    studyDate: $("#creditStrategyDate_ids").val(),
                    projectType: projectType,
                    unitId: localStorage.getItem("unit-id"),
                    deptId: localStorage.getItem("dept-id"),
                    userType: localStorage.getItem("user-type"),
                    addUser: localStorage.getItem("user-name"),
                    cmeStandardKindId: localStorage.getItem("standardkind-id")
                }),
                contentType : "application/json",
                success: function (res) {
                    if(res.success == true){
                        $("#TableCheckOff").click();
                        layer.closeAll();
                        layer.msg(res.data);
                    }else{
                        layer.msg(res.msg);
                        $(".layui-layer-btn0").removeAttr("disabled","disabled").removeClass("layui-disabled").removeClass("no-click");
                    }
                },
                error: function (res) {
                    layer.msg("请求失败");
                    $(".layui-layer-btn0").removeAttr("disabled","disabled").removeClass("layui-disabled").removeClass("no-click");
                }
            })
        }

            $("#attendTimes_id").val(minTimes).on("input",function() {
