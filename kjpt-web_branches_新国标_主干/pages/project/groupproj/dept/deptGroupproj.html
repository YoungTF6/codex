        /* 标签页计数 */
        function countNum() {
            let url = huayi_projectscore_url,
                data = getDefaultData(),
                tabId = tabIdCurrent;
            if (tabId.startsWith('tab_1')) {
                url += 'cmeGroupProj/holdState';
            } else if (tabId.startsWith('tab_2')) {
                url += 'cmeGroupProj/applyBeforeHoldState';
            } else if (tabId.startsWith('tab_3')) {
                url += 'cmeGroupProj/feedbackState';
            }
            axios({
                method: 'get',
                url: url,
                responseType: 'json',
                params:  { ...data, withCheckInfo:false }
            }).then(response => {
                
                if (response.status == 200 && response.data.status == 200) {
                    var data = response.data.data;
                    if (tabId.startsWith('tab_1')) {
                        $('#tab_1_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_1_1').html('未举办&nbsp;&nbsp;(' + data.NO_HOLD + ')');
                        $('#tab_1_5').html('部分已举办&nbsp;&nbsp;(' + data.PART_HOLD + ')');
                        $('#tab_1_2').html('已举办&nbsp;&nbsp;(' + data.HOLD + ')');
                        $('#tab_1_3').html('待授分&nbsp;&nbsp;(' + data.TO_SCORE + ')');
                        $('#tab_1_4').html('逾期未举办&nbsp;&nbsp;(' + data.OVERDUE + ')');
                    } else if (tabId.startsWith('tab_2')) {
                        // $('#tab_2_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_2_1').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_2_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                        if (0 < data.BACK) $('#tab_2_4').addClass('shake_tab');
                        $('#tab_2_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                    } else if (tabId.startsWith('tab_3')) {
                        // $('#tab_3_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');                        
                        if (_isHainan) {
                            $('#tab_3_7').html('未反馈&nbsp;&nbsp;(' + data.HAINAN_NO_REPORT + ')');
                            $('#tab_3_8').html('已反馈&nbsp;&nbsp;(' + data.HAINAN_FINISH_REPORT + ')');
                        } else {
                            $('#tab_3_1').html('未反馈&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                            $('#tab_3_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                            $('#tab_3_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                            $('#tab_3_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ') ');
                            if (0 < data.BACK) $('#tab_3_4').addClass('shake_tab');
                            $('#tab_3_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                        }
                        
                    }
                } else {
                    layer.msg('项目统计失败', { icon: 2, time: 1000 });
                }
            }).catch(error => {
                layer.msg('项目统计异常', { icon: 7, time: 1000 });
                console.log(error);
            });
        }

        function normalizeDateValue(value) {
            if (!value) return value;
            if ('string' === typeof value) return value.replace(/-/g, '/');
            return value;
        }

        function getCycleDurationHours(startDate, endDate) {
            if (!startDate || !endDate) {
                return 0;
            }
            let startTime = new Date(normalizeDateValue(startDate)).getTime();
            let endTime = new Date(normalizeDateValue(endDate)).getTime();
            if (Number.isNaN(startTime) || Number.isNaN(endTime)) {
                return 0;
            }
            return (endTime - startTime) / 3600000;
        }

        function hasCycleDurationShorterThanPreset(cycleVoList, presetPeriod) {
            let presetHours = Number(presetPeriod || 0);
            if (!(presetHours > 0) || !Array.isArray(cycleVoList) || 0 === cycleVoList.length) {
                return false;
            }
            return cycleVoList.some(cycleVo => getCycleDurationHours(cycleVo.startDate, cycleVo.endDate) < presetHours);
        }

        function validateHainanCyclesBeforeSubmit(groupProj) {
            let groupProjId = groupProj.groupProjId;
            if (!_isHainan || !groupProjId) {
                return Promise.resolve(true);
            }
            return axios({
                method: 'get',
                url: huayi_projectscore_url + 'pgsi/gproj/detail/' + groupProjId,
                responseType: 'json'
            }).then((response) => {
                let jsonRes = response.data || {};
                if (!jsonRes.success) {
                    layer.msg(jsonRes.msg || '加载举办周期失败');
                    return false;
                }
                let cycleVoList = jsonRes.data && jsonRes.data.cycleVoList ? jsonRes.data.cycleVoList : [];
                if (hasCycleDurationShorterThanPreset(cycleVoList, groupProj.period)) {
                    layer.msg(HAINAN_CYCLE_DURATION_ERROR);
                    return false;
                }
                return true;
            }).catch(() => {
                layer.msg('加载举办周期失败');
                return false;
            });
        }

        $("#period").on("input", function(event) {
            var $this = $(this);
            var value = $this.val();

            // 允许退格清空，避免单字符无法修改
            if (value === "") {
                return;
            }
            
            // 仅当输入为整数时，按省份规则自动计算学分
            if (/^\d+$/.test(value)) {
                if(_isGuangxi) {
                    let period = parseInt(value);
                    if(Number.isNaN(period)) {
                        $("#score").val(0);
                    } else {
                        let score = period < 6 ? 0.2 : 1;
                        $("#score").val(score);
                    }
                } else if(_isHenan || _isHainan || _isGuangdong ) {
                    let period = parseInt(value);
                    if(Number.isNaN(period)) {
                        $("#score").val(0);
                    }else if(period <= 30) {
                        let result =  period / 6;
                        let score = (result == parseInt(result)) ? result : parseInt(result)+0.2;
                        $("#score").val(score);
                    }else {
                        $("#score").val(5);
                    }
                }             
                if(_isNingxia) {
                    let period = parseInt(value);
                    if(Number.isNaN(period)) {
                        $("#score").val(0);
                    }else if(period < 1) {
                        $("#score").val(0);
                    }else {
                        let score = period < 6 ? 0.2 : 1;
                        $("#score").val(score);
                    }
                } 
                return;
            } else {
                // 如果不是整数，撤销这次输入
                $this.val($this.data('lastValidValue'));
                
            }

        let htmlInit = function () {
            
            getConfig("fun_dept_agent_groupproj");
            getConfig("range_dept_agent_groupproj_func_cols");
            getConfig('value_forbid_some_operate_on_last_year_data');
            //院内活动开启举办前申请举办后反馈功能的学分分类集合
            getConfig('json_score_level_ids_open_apply_and_feedback');
            getConfig("special_cme_groupuproj_score_level");
           
            tool.renderCheckType('#checkTypeSelector');
            dateInit();
            getTwoKnowledge();
            getHoldType();
            renderScoreLevel('scoreLevelSearch','holdTypeSearch');
            element.tabChange("tabarea", "tab_1");
            loaderTable();
            bindToolbar();
            specialConfig();

            if(!_isFuJian) {
                $("#tab_2").show();
                $("#tab_3").show();
            } 
            if(_isNeiMeng) {
                $("#tab_2").hide();
                $("#tab_3").show();
            }
            if(_isjilin) {
                $("#tab_2").hide();
            }
            if(_isGanSu || _isQingHai || _isSiChuan) {
                $("#tab_2").hide();
                $("#tab_3").hide();
            }
            if(_isZheJiang) {
                $("#tab_1_3").hide();
                $(".zhejiang_show").show();
            }
            if(_isHainan) {

                // 海南套：筛选框三级学科不可选
                $("#knowledgeThreeSearch").val("").attr("disabled", "disabled");

                $("#tab_2").hide();
                $("#tab_3_1").hide();
                $("#tab_3_2").hide();
                $("#tab_3_3").hide();
                $("#tab_3_4").hide();
                $("#tab_3_5").hide();
                $("#tab_3_6").hide();
                $("#tab_3_7").show();
                $("#tab_3_8").show();
            }
            if(_isGuangxi) {
                $("#tab_2").hide();
                $("#tab_3").show();
            }

        }

        $(function() {
            htmlInit();
        })

       

        
        window.ableOperateLastYearData = function(dataYear) {
            let cgv = window["value_forbid_some_operate_on_last_year_data"];
            if(cgv == null || cgv == "") {
                return true;
            }
           
            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
        }

    });
</script>
