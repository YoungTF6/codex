<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>申报时间设置</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <!--  -->
    <script src="../../js/common.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <style>
        .layui-table th{
            font-weight: bold;
        }
        #form-ProjectApplyDelay .layui-inline-660 {
            width: 80%;
        }
        .apply-project-name{
            font-weight: 900;
        }
        .delay-project-name{
            font-weight: 600;
        }

        #searchBody .layui-inline-550{
            width: 230px;
        }
        .layui-treeSelect.layui-form-select .layui-anim{
            max-width: 250px;
        }

        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .layui-btn,.layui-edge,.layui-inline,img {
            vertical-align: initial;
        }
        .input-span{
            text-align: left;
            margin-top: 10px;
            color: #FF5722;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="searchBody">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">选择年度</label>
                        <div class="layui-input-block">
                            <select name="target" lay-filter="aihao" id="holdYear">
                            </select>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="getTableData()"
                        lay-filter="table-search"
                        data-type="reload">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="projectTopUnitApplyDate" lay-filter="project-apply-date" style="margin: 0px 0px;" style="display: none;">
            </table>
            <table class="layui-table" id="projectApplyDate" lay-filter="project-apply-date" style="margin: 0px 0px;">
            </table>
          
            <div id="bottomSaveBtnBox" style="text-align: center;padding: 0px 10px 10px;">
                <a class="layui-btn layui-btn-sm" lay-event="submit" id="bottomSaveApplyBtn">保存</a>
            </div>
        </div>

        <!--        添加弹窗-->
        <div id="add-projectApplyDelay" style=" display:none;text-align: center">
            <form class="layui-form" style="padding: 30px;" id="form-ProjectApplyDelay" lay-filter="add-filter">
                <div class="layui-form-item" style="display: none">
                    <input type="text" name="delayId" id="delayId" class="layui-input">
                    <input type="text" name="regionLevelId" class="layui-input">
                    <input type="text" name="applyId" id="applyId" class="layui-input">
                    <input type="text" name="scoreLevelName" class="layui-input">
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660" id="topUnitIdBlock">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>下级单位</label>
                        <div class="layui-input-block">
                            <input type="text" id="underUnitId" name="unitId" lay-filter="unitSelect"  autocomplete="off" class="layui-input" readonly="true">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline layui-inline-660">
                        <label class="layui-form-label">申报截止时间</label>
                        <div class="layui-input-block">
                            <input type="text" name="dateEnd" id="delayDateEnd" placeholder="申报截止时间" autocomplete="off"  class="layui-input window-data-input" readonly>
                            <div class="input-span js-only-provice">申报时间不可晚于主管单位上报时间</div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item js-only-provice">
                    <div class="layui-inline layui-inline-660" id="windowGovBlock">
                        <label class="layui-form-label">主管单位上报截止日期</label>
                        <div class="layui-input-block">
                            <input type="text" name="govDateEnd" id="delayDateGov" placeholder="主管单位上报截止日期" autocomplete="off" class="layui-input window-data-input" readonly>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <button class="layui-btn" lay-submit lay-filter="submit">提交</button>
                </div>
            </form>
        </div>


    </div>
</div>


<script>
    // 全局配置及引入相关的模块
    layui.config({
        base:'../../js/layui/ext/'
    })
    layui.use(['table', 'form', 'laydate','treeTable', 'treeSelect'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery,layer = layui.layer;
        var laydate = layui.laydate,treeTable = layui.treeTable,treeSelect = layui.treeSelect;
        var unitId = localStorage.getItem('unit-id');
        //用户类型类型
        const unitUserType = localStorage.getItem('unit-user-type');
        let standardkindid=localStorage.getItem("standardkind-id");
        //是否是省级用户,true是省级，false是市级
        const isProvice = unitUserType=='5'?true:false;
        let defaultMinDate = new Date('1111');
        let defaultMaxDate = new Date('9999');
        let toolObj = {"addChildren":"addDelay(data)","edit":"editDelay(data)","del":"delDelay(data)"};
        
        var nowTableData,nowTopUnitTableData,nowApplyDatas=[],nowTopUnitApplyDatas=[],nowWindowApply;
        var isOpen = false;
        let loading,ajaxNum=0;
        var bindDateObj = {};
        var windowDateObj = {};
        let _isZheJiang  = '190c480d-d43c-450b-8472-a6fd00a6729d' === standardkindid;


        //关闭closeLoading的判断
        let closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }

        //处理空值
        let handlerEmpty = function(data){
            let text = (data != "undefined" && data != null && data != "") ? data: "";
            return text;
        }
        let handlerTopUnitEmpty = function(data){
            let text = ( data != "undefined~undefined") ? data: "";
            return text;
        }

        //处理表格中的数据，后台构建逻辑太复杂，放到前端构建
        let handlerTableData = function(data){
            if(!data.hasOwnProperty("config")){
                nowTableData = {};
                nowTopUnitTableData={};
                return data;
            }
            nowApplyDatas = [];
            nowTopUnitApplyDatas=[];
            let tableIndex = 1;
            const configs = data.config;
            let delays = data.delays;
            let applys = data.applys;
            let tableData = new Array();
            let tableTopUnitData = new Array();
            //根据配合进行构建
            for (let i = 0; i < configs.length; i++) {
                const config = configs[i];
                let projTypeValue = config.projType == 1 ? "-推荐项目":config.projType == 2 ? "-推广项目":"";

                if(config.topUnitId == unitId) {
                    //菜单数据
                    let menuObj = {type:1,open:true,treeId:tableIndex++,parentId:0,menu:`<span class="apply-project-name">${config.year}年${config.scoreLevelName}${projTypeValue}</span>`};
                    tableData.push(menuObj);
                    //找到批次下的
                    for (let j = 1; j <= config.batch; j++) {
                        //找到是否有数据
                        let applyData = getApplyData(applys,config,j);
                        applyData.treeId = tableIndex++;
                        applyData.parentId = menuObj.treeId;
                        applyData.open = isOpen;
                        applyData.topUnitId = config.topUnitId;
                        nowApplyDatas.push(applyData);
                        tableData.push(applyData);
                        //获取延期数据
                        if(applyData.hasOwnProperty("applyId")){
                            let delayArr = getDelayDatas(delays,applyData);
                            if(delayArr.length==0) continue;
                            let delayMenu = {type:3,open:isOpen,treeId:tableIndex++,parentId:applyData.treeId,menu1:'<span class="delay-project-name">延迟下级单位</span>',menu2:'<span class="delay-project-name">项目申报到主管单位截止日期</span>',menu3:'<span class="delay-project-name">主管单位上报截止日期</span>',menu4:'<span class="delay-project-name">操作</span>'};
                            tableData.push(delayMenu);
                            for (let m = 0; m < delayArr.length; m++) {
                                let tempDelay = delayArr[m];
                                tempDelay.treeId = tableIndex++;
                                tempDelay.parentId = applyData.treeId;
                                tableData.push(tempDelay);
                            }
                        }

                    }
                    //找备案
                    if(config.isMayBeianis ==1){
                        let beianisData = getBeianisData(applys,config,2);
                        beianisData.treeId = tableIndex++;
                        beianisData.parentId = menuObj.treeId
                        beianisData.topUnitId = config.topUnitId;
                        nowApplyDatas.push(beianisData);
                        tableData.push(beianisData);
                        //获取延期数据
                        if(beianisData.hasOwnProperty("applyId")){
                            let delayArr = getDelayDatas(delays,beianisData);
                            if(delayArr.length!=0){
                                let delayMenu = {type:3,open:isOpen,treeId:tableIndex++,parentId:beianisData.treeId};
                                tableData.push(delayMenu);
                                for (let m = 0; m < delayArr.length; m++) {
                                    let tempDelay = delayArr[m];
                                    tempDelay.treeId = tableIndex++;
                                    tempDelay.parentId = beianisData.treeId;
                                    tableData.push(tempDelay);
                                }
                            }
                        }
                    }
                    //找专家评审
                    if(config.isNeedExpertCheck == 1){
                        let expertCheckData = getBeianisData(applys,config,3);
                        expertCheckData.treeId = tableIndex++;
                        expertCheckData.parentId = menuObj.treeId;
                        expertCheckData.topUnitId = config.topUnitId;
                        nowApplyDatas.push(expertCheckData);
                        tableData.push(expertCheckData);
                    }
                }else{
                    //菜单数据
                    let menuObj = {type:1,open:true,treeId:tableIndex++,parentId:0,menu:`<span class="apply-project-name">${config.year}年${config.scoreLevelName}${projTypeValue}</span>`};
                    tableTopUnitData.push(menuObj);
                    //找到批次下的
                    for (let j = 1; j <= config.batch; j++) {
                        //多批次下的数据上级设置时间才push
                        let applyData = getApplyData(applys,config,j);
                        if(applyData.govDateEnd!=null){
                            applyData.treeId = tableIndex++;
                            applyData.parentId = menuObj.treeId;
                            applyData.open = isOpen;
                            applyData.unitId = unitId;
                            applyData.topUnitId = config.topUnitId;
                            nowTopUnitApplyDatas.push(applyData);
                            tableTopUnitData.push(applyData);
                        }
                    }
                    //找备案
                    if(config.isMayBeianis ==1){
                        let beianisData = getBeianisData(applys,config,2);
                        beianisData.treeId = tableIndex++;
                        beianisData.parentId = menuObj.treeId
                        beianisData.topUnitId = config.topUnitId;
                        nowTopUnitApplyDatas.push(beianisData);
                        tableTopUnitData.push(beianisData);
                    }
                }
                
            }
            // return tableData;
            nowTableData = tableData;
            nowTopUnitTableData=tableTopUnitData;
        }

        
        //得到批次数据
        let getApplyData = function(applys,config,batch){
            for (let m = 0; m < applys.length; m++) {
                let data = applys[m];
                if(applys[m].typeId != 1) continue;
                //找到批次等于的数据
                if(data.regionYearId==config.regionYearId && data.batch == batch){
                    data.type = 2;
                    data.open = isOpen;
                    return data;
                }
            }
            let obj = {type:2,open:isOpen,typeId:1,batch:batch,regionLevelId:config.regionLevelId,regionYearId:config.regionYearId,cmeStandardKindId:config.cmeStandardKindId,scoreLevelId:config.scoreLevelId,holdYear:config.year};
            return obj;
        }
        //得到是否备案数据或者专家评审数据
        let getBeianisData = function(applys,config,typeId=2){
            for (let m = 0; m < applys.length; m++) {
                let data = applys[m];
                if(applys[m].typeId != typeId){
                    continue;
                }
                //找到批次等于的数据
                if(data.regionYearId==config.regionYearId){
                    data.type = 2;
                    data.open = isOpen;
                    return data;
                }
            }
            let obj = {type:2,open:isOpen,typeId:typeId,batch:0,regionLevelId:config.regionLevelId,regionYearId:config.regionYearId,cmeStandardKindId:config.cmeStandardKindId,scoreLevelId:config.scoreLevelId,holdYear:config.year};
            return obj;
        }
        //获取延期数据
        let getDelayDatas = function(delays,apply){
            let dataArr = [];
            for (let i = 0; i < delays.length; i++) {
                if(delays[i].applyId == apply.applyId){
                    let tempDelay = delays[i];
                    tempDelay.type = 4;
                    dataArr.push(tempDelay);
                }
            }
            return dataArr;
        }
        //ajax获取数据
        window.getTableData = function(){
            // let params ={holdYear:$('#holdYear').val(),scoreLevelName: $('#scoreLevelName').val(),unitId: unitId};
            let params ={holdYear:$('#holdYear').val(),scoreLevelName: "",unitId: unitId};
            openLoading();
            $.ajax({
                type: 'get',
                url: huayi_projectscore_url + 'projectApplyDate/selectByHoldYear',
                data: params,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    closeLoading();
                    handlerTableData(res.data);
                    if(res.data.hasOwnProperty("config")) {
                        $("#bottomSaveBtnBox").show();
                    } else {
                        $("#bottomSaveBtnBox").hide();
                    }
                    loaderTable();
                    loaderTopUnitTable();
                },
                error: function(res){ closeLoading(); }
            });
        }

        

        // 渲染树形表格
        let loaderTable = function () { 
            treeTable.render({
                elem: '#projectApplyDate',
                id:'applyTable',
                data: nowTableData,
                title: '项目申报表',
                tree: {
                    iconIndex: 0,           // 折叠图标显示在第几列
                    isPidData: true,        // 是否是id、pid形式数据
                    idName: 'treeId',  // id字段名称
                    pidName: 'parentId',     // pid字段名称
                    arrowType: 'arrow1',
                    getIcon: function(d) {  // 自定义图标
                        // d是当前行的数据
                        if (d.parentId == 0) {  // 判断是否有子集haveChild
                            return '<i class="ew-tree-icon layui-icon layui-icon-layer"></i>';
                        } else {
                            return '<i class="ew-tree-icon"></i>';
                        }
                    }
                },
                cols: [[
                    {field: 'typeId', title: '类型' ,align: 'center',
                        templet: function(data){
                            if(data.type == 1) return data.menu;
                            if(data.type == 2) return getTypeName(data);
                            return "";
                        }
                    },
                    {field: 'dateStart', title: '项目申报起始日期', align: 'center',
                        templet: function(data){
                            if(data.type == 2) return `<input type="text" autocomplete="off" class="layui-input date-type-input" name="dateStart" tree-id="${data.treeId}" value="${handlerEmpty(data.dateStart)}" readonly>`;
                            if(data.type == 3) return data.menu1;
                            if(data.type == 4) return data.unitName;
                        }
                    },
                    {field: 'dateEnd', title: '项目申报到主管单位截止日期', align: 'center',
                        templet: function(data){
                            if(data.type == 2) return `<input type="text" autocomplete="off" class="layui-input date-type-input" name="dateEnd" tree-id="${data.treeId}" value="${handlerEmpty(data.dateEnd)}" readonly>`;
                            if(data.type == 3) return data.menu2;
                            if(data.type == 4) return handlerEmpty(data.dateEnd);
                        }
                    },
                    {field: 'govDateEnd', title: '主管单位上报截止日期', align: 'center',hide:!isProvice,
                        templet: function(data){
                            if(data.type == 2 && data.typeId != 3) return `<input type="text" autocomplete="off" class="layui-input date-type-input" tree-id="${data.treeId}" name="govDateEnd" value="${handlerEmpty(data.govDateEnd)}" readonly> ` ;
                            if(data.type == 3) return data.menu3;
                            if(data.type == 4) return handlerEmpty(data.govDateEnd);
                        }
                    },
                    {align: 'center', title: '操作', fixed: 'right',
                        templet: function(data){
                            if(data.type == 2 && data.typeId != 3) {
                                return '<a class="layui-btn layui-btn-xs" lay-event="addChildren" style="color: #27b1a2;background-color: transparent;">下级单位延迟设定</a>';
                            }
                            if(data.type == 3) return data.menu4;
                            if(data.type == 4) {
                                return `<a class="layui-btn layui-btn-xs btn-row" lay-event="edit">编辑</a><a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="del">删除</a>`;
                            }
                        }
                    }
                ]],
                // toolbar: '#subjectApply',
                defaultToolbar: '',
                done:function(res,curr,count){
                     bindDateTime(nowTableData);
                     checkTableStyle(res);
                }
            });
        };
        // 渲染树形表格
        let loaderTopUnitTable = function () {
            if (unitUserType == '5' || !['4a6d91fb-8ba4-4560-a801-9c6f00e6d999', '73ba18db-33fd-4746-ab41-9beb009f69a1','190c480d-d43c-450b-8472-a6fd00a6729d'].includes(standardkindid)) {
                return;
            }
            treeTable.render({
                elem: '#projectTopUnitApplyDate',
                id:'applyTopUnitTable',
                data: nowTopUnitTableData,
                title: '项目申报表',
                tree: {
                    iconIndex: 0,           // 折叠图标显示在第几列
                    isPidData: true,        // 是否是id、pid形式数据
                    idName: 'treeId',  // id字段名称
                    pidName: 'parentId',     // pid字段名称
                    arrowType: 'arrow1',
                    getIcon: function(d) {  // 自定义图标
                        // d是当前行的数据
                        if (d.parentId == 0) {  // 判断是否有子集haveChild
                            return '<i class="ew-tree-icon layui-icon layui-icon-layer"></i>';
                        } else {
                            return '<i class="ew-tree-icon"></i>';
                        }
                    }
                },
                cols: [[
                    {field: 'typeId', title: '类型' ,align: 'center',
                        templet: function(data){
                            if(data.type == 1) return data.menu;
                            if(data.type == 2) return getTypeName(data);
                            return "";
                        }
                     },
                    {field: 'dateStart', title: '项目申报起始日期', align: 'center',hide:!isProvice,
                        templet: function(data){
                            if(data.type == 2) return `<input type="text" autocomplete="off" class="layui-input date-type-input" name="dateStart" tree-id="${data.treeId}" value="${handlerEmpty(data.dateStart)}" readonly>`;
                            if(data.type == 3) return data.menu1;
                            if(data.type == 4) return data.unitName;
                        }
                    },
                    {field: 'dateEnd', title: '项目申报到主管单位截止日期', align: 'center',hide:!isProvice,
                        templet: function(data){
                            if(data.type == 2) return `<input type="text" autocomplete="off" class="layui-input date-type-input" name="dateEnd" tree-id="${data.treeId}" value="${handlerEmpty(data.dateEnd)}" readonly>`;
                            if(data.type == 3) return data.menu2;
                            if(data.type == 4) return handlerEmpty(data.dateEnd);
                        }
                    },
                    {field: 'dateDistinctEnd', title: '设置申报截止日期', align: 'center',
                        templet: function(data){
                            if(data.type == 2) return `<input type="text" autocomplete="off" class="layui-input date-type-input" name="dateDistinctEnd" tree-id="${data.treeId}" value="${handlerEmpty(data.dateDistinctEnd)}" readonly>`;
                            if(data.type == 3) return data.menu2;
                            if(data.type == 4) return handlerEmpty(data.dateDistinctEnd);
                        }
                    },
                    {field: 'govDateEnd', title: '主管单位上报截止日期', align: 'center',hide:!isProvice,
                        templet: function(data){
                            if(data.type == 2 && data.typeId != 3) return `<input type="text" autocomplete="off" class="layui-input date-type-input" tree-id="${data.treeId}" name="govDateEnd" value="${handlerEmpty(data.govDateEnd)}" readonly> ` ;
                            if(data.type == 3) return data.menu3;
                            if(data.type == 4) return handlerEmpty(data.govDateEnd);
                        }
                     }, 
                     { title: '上级单位设置的起止日期', align: 'center',
                        templet: function(data){
                            //if(data.type == 2) return `<input type="text" autocomplete="off" class="layui-input date-type-input" name="dateEnd" tree-id="${data.treeId}" value="${handlerTopUnitEmpty(data.dateStart+'~'+data.dateEnd)}" readonly>`;
                             return `<label class="layui-form-label">${handlerTopUnitEmpty(data.dateStart+'~'+data.dateEnd)}</label>`;
 
                        }
                    }
                ]],
                // toolbar: '#subjectApply',
                defaultToolbar: '',
                done:function(res,curr,count){
                    bindDateTime(nowTopUnitTableData,nowTableData);
                    checkTableStyle(res);
                }
            });
        };

        //表格时间组件绑定
        // let bindDateTime = function(){
        //     lay('.date-type-input').each(function(){
        //         let treeId = this.getAttribute("tree-id");
        //         let type = this.name;
        //         let minDate,maxDate;
        //         for (let i = 0; i < nowApplyDatas.length; i++) {
        //             if(nowApplyDatas[i].treeId == treeId){
        //                 minDate = getMinDate(type,nowApplyDatas[i]);
        //                 maxDate = getMaxDate(type,nowApplyDatas[i]);
        //                 break;
        //             }
        //         }
        //         bindDateObj[treeId+type] = laydate.render({
        //             elem:this,
        //             type: 'datetime',
        //             trigger:'click',
        //             btns:['confirm'],
        //             min:minDate,
        //             max:maxDate,
        //             done: function(value,date,endDate){
        //                 changeBindElem(this.elem , value,nowApplyDatas);
        //             }
        //         })
        //     })
        // }
        let bindDateTime = function(applyDatas,applyTopUnitDatas){
            lay('.date-type-input').each(function(){
                let treeId = this.getAttribute("tree-id");
                let type = this.name;
                let minDate,maxDate,applyData;
                for (let i = 0; i < applyDatas.length; i++) {
                    if(applyDatas[i].treeId == treeId){
                        minDate = getMinDate(type, applyDatas[i]);
                        maxDate = getMaxDate(type, applyDatas[i]);
                        applyData = applyDatas[i];
                        break;
                    }
                }
                if(applyTopUnitDatas!=null){
                    
                for (let i = 0; i < applyTopUnitDatas.length; i++) {
                    if(applyTopUnitDatas[i].treeId == treeId){
                        minDate = getMinDate(type, applyTopUnitDatas[i]);
                        maxDate = getMaxDate(type, applyTopUnitDatas[i]);
                        applyData = applyTopUnitDatas[i];
                        break;
                    }
                }
                }
                bindDateObj[treeId+type] = laydate.render({
                    elem: this,
                    type: 'datetime',
                    trigger: 'click',
                    btns: ['confirm'],
                    min: minDate,
                    max: maxDate,
                    done: function(value, date, endDate){
                        changeBindElem(this.elem , value, applyData);
                    }
                })
                
            })
        }
        

        //给时间绑定组件进行设置最小最大时间限制
        let setConfigMinMax = function(elem,min,max){
            elem.config.min = {
                year:new Date(min).getFullYear(),
                month:new Date(min).getMonth(),
                date:new Date(min).getDate(),
                hours:new Date(min).getHours(),
                minutes:new Date(min).getMinutes(),
                seconds:new Date(min).getSeconds()
            }
            elem.config.max = {
                year:new Date(max).getFullYear(),
                month:new Date(max).getMonth(),
                date:new Date(max).getDate(),
                hours:new Date(max).getHours(),
                minutes:new Date(max).getMinutes(),
                seconds:new Date(max).getSeconds()
            }
        }

        // let changeBindElem = function(elem,value){

        //     if(tempObj.hasOwnProperty(type)){

        //             let tempType = tempObj[type][i];
        //             if(tempApplyDate.typeId == 3 && tempType == "govDateEnd") continue;
        //             let minDate = getMinDate(tempType,tempApplyDate);

        //             setConfigMinMax(bindDateObj[treeId+tempType],minDate,maxDate);
        //         }

        let changeBindElem = function(elem, value, applyDatas){
            let applyDataArray = [applyDatas];
            let tempObj = {"dateStart":["dateEnd","govDateEnd"],
            "dateEnd":["dateStart","govDateEnd"],
            "govDateEnd":["dateEnd","dateStart"],
            "dateDistinctEnd":["dateStart","govDateEnd"]};
            let treeId = elem.attr("tree-id");
            let type = elem.attr("name");
            let tempApplyDate;
            for (let i = 0; i < applyDataArray.length; i++) {
                if(applyDataArray[i].treeId == treeId){
                    
                    console.log('applyDatas[i]:', applyDataArray[i]);
                    applyDataArray[i][type] = value;
                    tempApplyDate = applyDataArray[i];
                }
            }
            if(tempObj.hasOwnProperty(type)){
                for (let i = 0; i < tempObj[type].length; i++) {
                    let tempType = tempObj[type][i];
                    if(tempApplyDate.typeId == 3 && tempType == "govDateEnd") continue;
                    let minDate = getMinDate(tempType,tempApplyDate);
                    let maxDate = getMaxDate(tempType,tempApplyDate);
                    setConfigMinMax(bindDateObj[treeId+tempType],minDate,maxDate);
                }
            }
        }
        //监听弹窗的时间组件
        let initDelayDate = function(){
            lay('.window-data-input').each(function(){
                windowDateObj[this.name] = laydate.render({
                    elem:this,
                    type: 'datetime',
                    trigger:'click',
                    btns:['confirm'],
                    done: function(value,date,endDate){
                        changeWindowBindElem(this.elem,value);
                    }
                })
            })
        }

        //选择时间后对应的一系列选择框发生限制变化
        let changeWindowBindElem = function(elem,value){
            let type = elem.attr("name");
            for (let obj of nowApplyDatas) {
                if(obj.applyId == $("#applyId").val()){
                    let minDate = (type == "dateEnd")? obj.dateEnd : obj.govDateEnd;
                    let defaultMaxDate = "8888-8-8";
                    setConfigMinMax(windowDateObj[type],minDate,defaultMaxDate);
                    break;
                }
            }
        }

        //打开弹窗的时候需要开始限定一下时间取值
        let limitWindowDate = function(){
            let tempObj = ["dateEnd","govDateEnd"];
            let defaultMaxDate = "8888-8-8";
            for (let attr of tempObj) {
                let tempDateEnd = (nowWindowApply)? nowWindowApply.dateEnd:"";
                let tempDateGov = (nowWindowApply)? nowWindowApply.govDateEnd:"";
                if($("#delayId").val() != ""){
                    for (let i = 0; i < nowApplyDatas.length; i++) {
                        if(nowApplyDatas[i].applyId == $("#applyId").val()){
                            tempDateEnd = nowApplyDatas[i].dateEnd;
                            tempDateGov = nowApplyDatas[i].govDateEnd;
                            break;
                        }
                    }
                }
                let minDate = (attr=="dateEnd") ? tempDateEnd :tempDateGov;
                // let maxDate = (attr=="govDateEnd") ? "8888-8-8" :tempDateGov;
                setConfigMinMax(windowDateObj[attr] ,minDate,defaultMaxDate);
            }
        }

        //获取该时间组件的最小时间
        let getMinDate = function(type,data,defaultStr="1111-1-1"){
            if(type=="dateStart") return defaultStr;
            let dateStart = (data.hasOwnProperty("dateStart"))?handlerEmpty(data.dateStart) : "";
            dateStart = (dateStart == "") ? defaultStr : dateStart;
            if(type=="dateEnd") {
                return handerDate(dateStart);
            }
            if(type=="govDateEnd"){
                let dateEnd = (data.hasOwnProperty("dateEnd")) ? handlerEmpty(data.dateEnd) : "";
                dateEnd = (dateEnd=="") ? defaultStr : dateEnd;
                let minDate = (new Date(dateStart) > new Date(dateEnd)) ? dateStart : dateEnd;
                return handerDate(minDate);
            }
            if(type=="dateDistinctEnd") {
                return handerDate(dateStart);
            }
        }

        //获取该时间组件的最大时间
        let getMaxDate = function(type,data,defaultStr = "9999-1-1"){
            let govDateEnd ;
            //如果是市级，那么返回主管单位设置的截至时间
            if (data.topUnitId != unitId) {
                govDateEnd = (data.hasOwnProperty("dateEnd")) ? handlerEmpty(data.dateEnd) : "";
            }else{
                govDateEnd = (data.hasOwnProperty("govDateEnd")) ? handlerEmpty(data.govDateEnd) : "";
            }
            govDateEnd = (govDateEnd=="" || data.typeId==3) ? defaultStr : govDateEnd;
            if(type=="dateStart"){
                let dateEnd = (data.hasOwnProperty("dateEnd")) ? handlerEmpty(data.dateEnd) : "";
                dateEnd = (dateEnd=="") ? defaultStr : dateEnd;
                let maxDate = (new Date(dateEnd) > new Date(govDateEnd)) ? govDateEnd : dateEnd;
                return handerDate(maxDate,0);
            }
            //获取delay数据
            let tempDelays = [];
            if(data.hasOwnProperty("applyId")){
                for (let i = 0; i < nowTableData.length; i++) {
                    if(nowTableData[i].type == 4 && nowTableData[i].applyId == data.applyId){
                        tempDelays.push(nowTableData[i]);
                    }
                }
            }
            if(type=="dateEnd") {
                if (unitUserType!='5'){
                    for (let i = 0; i < tempDelays.length; i++) {
                        govDateEnd =   tempDelays[i].dateEnd;
                    }
                }else{
                    for (let i = 0; i < tempDelays.length; i++) {
                        govDateEnd = (new Date(govDateEnd) > new Date(tempDelays[i].dateEnd)) ? tempDelays[i].dateEnd : govDateEnd;
                    }
                }
                return handerDate(govDateEnd,0);
            }
            if(type=="govDateEnd") {
                for (let i = 0; i < tempDelays.length; i++) {
                    defaultStr = (new Date(defaultStr) > new Date(tempDelays[i].govDateEnd)) ? tempDelays[i].govDateEnd : defaultStr;
                }
                return handerDate(defaultStr,0);
            }
            if(type=="dateDistinctEnd"){
                if (unitUserType!='5'){
                    for (let i = 0; i < tempDelays.length; i++) {
                        govDateEnd =   tempDelays[i].dateEnd;
                    }
                }else{
                    for (let i = 0; i < tempDelays.length; i++) {
                        govDateEnd = (new Date(govDateEnd) > new Date(tempDelays[i].dateEnd)) ? tempDelays[i].dateEnd : govDateEnd;
                    }
                }
                return handerDate(govDateEnd,0);
            }
        }

        //年度下拉框初始化
        let initSelect = function(){
            let year = new Date().getFullYear();
            if(_isZheJiang){
                year = year - 1;
            }
            let lastYear = year + 1;
            var options = '<option selected value="'+lastYear+'">'+lastYear+'</option>';
            // nowYear--
            for(var i =0; i< 6; i++){
                // let year = nowYear--;
                options += '<option value="'+year+'">'+year+'</option>';
                year = year  - 1;
            }
            $('#holdYear').append(options);
            form.render('select');
            getTableData();
        }

        //获取下级机构树
        var loadUnitTree = function(unitId){
            treeSelect.destroy('unitSelect');
            openLoading();
            treeSelect.render({
                elem    : '#underUnitId',
                data    : huayi_personorg_url + 'comunit/childrenAllTreeRedis?unitId='+unitId,
                headers : {
                    'Authorization' : localStorage.getItem('token'),
                    'KJPT-USER-ID'  : localStorage.getItem('user-id')
                },
                type    : 'get',
                search  : true,
                success : function(res){  closeLoading(); },
                fail    : function(res){  closeLoading(); }
            });
        }

        //处理时间，默认+1
        var handerDate = function(dateStr,type=1){
            let dateNum = (type==1) ? new Date(dateStr).getTime()+1000 : new Date(dateStr).getTime()-1000;
            let dateObj = new Date(dateNum);
            var year = dateObj.getFullYear();
            var month = dateObj.getMonth() + 1 < 10 ? "0" + (dateObj.getMonth() + 1) : dateObj.getMonth() + 1;
            var date = dateObj.getDate() < 10 ? "0" + dateObj.getDate() : dateObj.getDate();
            var hour = dateObj.getHours()< 10 ? "0" + dateObj.getHours() : dateObj.getHours();
            var minute = dateObj.getMinutes()< 10 ? "0" + dateObj.getMinutes() : dateObj.getMinutes();
            var second = dateObj.getSeconds()< 10 ? "0" + dateObj.getSeconds() : dateObj.getSeconds();
            return year + "-" + month + "-" + date+" "+hour+":"+minute+":"+second;
        }

        //新增下级单位延迟
        var addDelay = function(data){
            if(!data.hasOwnProperty("applyId") || handlerEmpty(data.dateEnd)=="" || handlerEmpty(data.govDateEnd)==""){
                layer.msg("请先设置该批次日期并保存");
                return;
            }
            clearFormData();
            nowWindowApply = data;
            let data2 = JSON.parse(JSON.stringify(data));
            data2.dateEnd = handerDate(data2.dateEnd);
            data2.govDateEnd = handerDate(data2.govDateEnd);
            data2.unitId = "";
            form.val('add-filter', data2);
            limitWindowDate();
            const tempArea = isProvice ? ['600px', '450px'] : ['600px', '300px'];
            layer.open({
                type: 1,
                title: '下级单位延迟设定',
                content: $('#add-projectApplyDelay'),
                skin: '',
                area: tempArea,
                cancel: function(index, layero){
                    clearFormData();
                    return true;
                }
            })
        }

        //去除表单数据
        let clearFormData = function(){
            $("#topUnitIdBlock").css("pointer-events","unset");//去除禁选
            $(".curSelectedNode").removeClass("curSelectedNode");//去除之前选中的高亮
            $("#form-ProjectApplyDelay")[0].reset();
        }

        //编辑下级单位延迟
        var editDelay = function(datas){
            form.val('add-filter', datas);
            limitWindowDate();
            treeSelect.checkNode('unitSelect', datas.unitId);
            $("#topUnitIdBlock").css("pointer-events","none");
            layer.open({
                type: 1,
                title: '修改延迟',
                content: $('#add-projectApplyDelay'),
                area: ['500px', '400px'],
                cancel: function(index, layero){
                    $("#form-ProjectApplyDelay")[0].reset();
                    return true;
                }
            })
        }

        //删除下级单位延迟
        var delDelay = function(datas){
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                openLoading();
                $.ajax({
                    type: 'get',
                    url: huayi_projectscore_url + 'projectDicApplyDelay/deleted',
                    data: { delayId: datas.delayId},
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        closeLoading();
                        if (res.status === 200) {
                            layer.msg("删除成功");
                            getTableData();
                        }else{ layer.msg("删除失败"); }
                    },
                    error:function(res){
                        closeLoading();
                        layer.msg("删除失败");
                    }
                });
            })
        }

        //获取要保存的数据
        let getSaveApplyData = function(){
            let tempData = [];
            //先筛选一遍,剔除没有值的
            for (let i = 0; i < nowApplyDatas.length; i++) {
                let elem = nowApplyDatas[i];
                //专家评审
                if(elem.typeId == 3){
                    if(!elem.hasOwnProperty("dateStart") && !elem.hasOwnProperty("dateEnd")) continue;
                    if(elem.hasOwnProperty("dateStart") && elem.hasOwnProperty("dateEnd")){
                        tempData.push(elem);
                    }else{
                        layer.msg("开始时间,截止时间需全部设置");
                        return [];
                    }
                }else{
                    //如果省级都要验证
                    if(isProvice) {
                        if(!elem.hasOwnProperty("dateStart") && !elem.hasOwnProperty("dateEnd") && !elem.hasOwnProperty("govDateEnd")) continue;
                        if(elem.hasOwnProperty("dateStart") && elem.hasOwnProperty("dateEnd") && elem.hasOwnProperty("govDateEnd")){
                            tempData.push(elem);
                        }else{
                            layer.msg("开始时间,截止时间需全部设置");
                            return [];
                        }
                    }else{
                        if(!elem.hasOwnProperty("dateStart") && !elem.hasOwnProperty("dateEnd")) continue;
                        if(elem.hasOwnProperty("dateStart") && elem.hasOwnProperty("dateEnd")){
                            elem["govDateEnd"] = '9999-09-09 00:00:00';
                            tempData.push(elem);
                        }else{
                            layer.msg("开始时间,截止时间需全部设置");
                            return [];
                        }
                    }
                    
                }
            }
            //地市要保存的数据
            for(let i=0;i<nowTopUnitApplyDatas.length;i++){
                let elem = nowTopUnitApplyDatas[i];
                if(!elem.hasOwnProperty("dateDistinctEnd")) continue;
                if( elem.hasOwnProperty("dateDistinctEnd")){
                    tempData.push(elem);
                }else{
                    layer.msg("截止时间需全部设置");
                    return [];
                }
            }
            
            return tempData;
        }

        //监听按钮
        let bindBtnClick = function () {
            $('#bottomSaveApplyBtn').click(function () {
                subApplyData();
            })
        }

        let subApplyData = function() {
            let tempApplys = getSaveApplyData();
            if(tempApplys.length == 0) return;
            openLoading();
            //构建数据
            $.ajax({
                type: 'post',
                url: huayi_projectscore_url + 'projectApplyDate/insertList',
                data:JSON.stringify(tempApplys) ,
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    closeLoading();
                    if (res.status === 200) {
                        getTableData();
                        layer.msg("保存成功");
                    }else{ layer.msg("保存失败"); }
                },
                error: function(res){ closeLoading();  }
            }); 
        }

        //表格树监听表头的提交按钮
        // treeTable.on('toolbar(projectApplyDate)',function(obj){
        //     if(obj.event === "submit"){
                
        //     }

        //表格树监听行内元素
        treeTable.on('tool(projectApplyDate)',function(obj){

            if(toolObj.hasOwnProperty(obj.event)){
                eval(toolObj[obj.event]);
            }
        })

        // 下级单位延迟数据提交
        form.on('submit(submit)', function (data) {
            // 用于判断是新增还是修改
            var formTableId = $("#add-projectApplyDelay input[name='delayId']").val();
            var URL = huayi_projectscore_url + 'projectDicApplyDelay/update';//默认修改
            if (formTableId == '' || formTableId == null) {
                URL = huayi_projectscore_url + 'projectDicApplyDelay/saveAutoCompleted';// 走新增逻辑
                if(data.field.unitId == ""){
                    layer.msg("机构是必填字段",{icon:5});
                    return false;
                }
                if(data.field.unitId == unitId){
                    layer.msg("不能选本级机构",{icon:5});
                    return false;
                }
            }
            if(new Date(data.field.dateEnd) >= new Date(data.field.govDateEnd)){
                layer.msg("申报时间不可晚于主管单位上报时间",{icon:5});
                return false;
            }
            //数据判断，时间应该保证endDate < govDate
            openLoading();
            $.ajax({
                type: 'post',
                url: URL,
                data: JSON.stringify(data.field),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    closeLoading();
                    if(res.status == 200){
                        getTableData();
                        layer.closeAll();
                        clearFormData();
                        layer.msg("保存成功");
                    }else{ layer.msg(res.msg); }
                },
                error: function () {
                    closeLoading();
                    layer.msg("发送请求失败");
                }
            })
            return false;
        });

        let getTypeName = function(data){
            let typeText = "";
            switch (data.typeId) {
                case 1:
                    typeText = "第『"+data.batch+"』批新项目";
                    break;
                case 2:
                    typeText = "备案项目申报";
                    break;
                case 3:
                    typeText = "专家评审";
                    break;
                default:
                    typeText = '未知的类型';
                    break;
            }
            return typeText;
        }

        //处理表格样式
        let checkTableStyle = function(data){
            let trIndex = 0; 
            for(let i=0;i<data.length;i++){
                //项目级别节点
                let parentElem = data[i];
                $(".layui-table tbody tr").eq(parentElem.treeId-1).css("background-color","#F2F2F2");
                // $(".layui-table tbody tr").eq(parentElem.treeId-1).children("td").eq(0).css("background-color","#F2F2F2");
                if(parentElem.hasOwnProperty("children")){
                    for(let j=0;j<parentElem.children.length;j++){
                        //项目申请节点

                        // $(".layui-table tbody tr").eq(applyElem.treeId-1).css("background-color","#f2f2f2");

                            //合并单元格
                            //$(".layui-table tbody tr").eq(applyElem.treeId).children("td").eq(0).attr("rowspan",applyElem.children.length);
                            for(let l = 0;l<applyElem.children.length;l++){
                                //项目延期节点
                                let deplyElem = applyElem.children[l];
                                let trElem = $(".layui-table tbody tr").eq(deplyElem.treeId-1);
                                //隐藏td，因为td只在第一个保留
                                //if(l!=0) trElem.children("td").eq(0).hide();
                                if(deplyElem.dataType == -2){
                                    // $(".layui-table tbody tr").eq(deplyElem.treeId-1).css("background-color","#f2f2f2");
                                    for(let t = 1;t<trElem.children('td').length;t++){
                                        trElem.children("td").eq(t).css("background-color","#f2f2f2");
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        //是否隐藏下级延迟设定的主管单位上报时间
        let isHiddenDeley = function() {
            if(!isProvice) {
                $(".js-only-provice").hide();
            }
        }

        let htmlInit = function(){
            initSelect();
            initDelayDate();
            loadUnitTree(unitId);
            bindBtnClick();
            isHiddenDeley();
        }
        htmlInit();
    });
