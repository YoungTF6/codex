<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>考试结果查看</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>

    <style>


    </style>

</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="cmeExamResult" lay-filter="cme_exam_result" style="margin: 0px 0px;">
            </table>
        </div>

    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row" lay-event="view">查看</a>
</script>

<script>
    // 全局配置及引入相关的模块
    layui.use(['table', 'form','upload'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery,layer = layui.layer;
        var peopleUrl = huayi_projectscore_url + 'cmeExamResult/getExamPerson';
        var nowProjectId;

        // 表格相关操作
        // 表格配置
        let loaderTable = function (isOpen) {
            table.render({
                elem: '#cmeExamResult',
                url: peopleUrl,
                title: '考试结果人员表',
                defaultToolbar: [],
                where: {
                    projectId:nowProjectId
                },
                cols: [[
                    {align: 'center', toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    {field: 'personName', title: '姓名',align:'center',width:110},
                    {field: 'certId', title: '身份证号',align:'center'},
                    {field: 'unitName', title: '所在单位',align:'center',width:230},
                    {field: 'deptName', title: '科室',align:'center'},
                    {field: 'titleName', title: '职称',align:'center'}
                ]],
                cellMinWidth: 40,
                id: "cmeExamResult",
                height: 'full-60',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done:function(res,curr,count){}
            });
        };

        //监听行内元素
        let bindTableTool = function(){
            table.on('tool(cme_exam_result)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'view') {
                    layer.open({
                        type: 2,
                        title: "  ",
                        content: "CmeExamPaper.html?projectId="+nowProjectId,
                        area:["80%","50%"]
                    });
                }
            })
        }

        //解析url参数
        let getParamFromUrl = function(paramName){
            let urlStr = location.search;
            if(urlStr.indexOf(paramName) < 0 || urlStr.indexOf("?")<0) return;
            let paramKV = urlStr.substring(1).split("&");
            for(let i = 0;i<paramKV.length;i++){
                if(paramKV[i].indexOf(paramName) >= 0 ){
                    return paramKV[i].split("=")[1];
                }
            }
        }

        let htmlInit = function(){
            nowProjectId = getParamFromUrl("projectId");
            if(nowProjectId!=null && nowProjectId!=""&&nowProjectId!=undefined){
                loaderTable();//初始化表格
                bindTableTool();//监听行内元素
            }else {
                layer.msg("缺少必要参数");
            }
        }
        htmlInit();

    });

</script>
</body>
</html>
