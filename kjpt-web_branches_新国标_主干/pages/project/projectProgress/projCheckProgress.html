<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
        <title>审批进度</title>
        <meta name="renderer" content="webkit">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
        <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
        <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
        <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>


        <link rel="stylesheet" href="../../../css/project/timeline.css" media="all">
        <!--    请求路径配置-->
        <script type="text/javascript" src="../../../js/constant.js"></script>
        <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
        <!--    ajax全局配置-->
        <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
        <link rel="stylesheet" href="../../../css/communal.css" media="all">
        <script type="text/javascript" src="../../../js/common.js"></script>

</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <div class="layui-card">
                    <div class="layui-card-body" id="message">
                        <ul class="timeLine" id="ulcheck">
                            <!-- 动态生成的内容将插入到这里 -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 样式优化 -->
    <style>
        .auto-wrap-link {
            color: red;
            display: inline-block;
            white-space: nowrap; /* 禁止换行 */
            overflow: hidden; /* 隐藏超出部分 */
            text-overflow: ellipsis; /* 超出部分显示省略号 */
            width: 240px; /* 设置宽度，超出部分会被隐藏 */
        }
        .auto-wrap-link .label {
            white-space: nowrap;
        }
        /* .timeLine li {
            margin-bottom: 10px;
        } */
    </style>

    <!-- 脚本优化 -->
    <script>
        layui.use(['table', 'form', 'element'], function () {
            const table = layui.table;
            const form = layui.form;
            const $ = layui.jquery;
            const layer = layui.layer;
            const element = layui.element;

            // 获取本地存储数据
            const unitId = localStorage.getItem("unit-id");
            const userName = localStorage.getItem("user-name");
            const userType = localStorage.getItem("user-type");
            const cmeStandardKind = localStorage.getItem("standardkind-id");
            const projectId = getUrlParam("projectId");
            const pagseType = getUrlParam("pagseType");

            // 页面加载完成后调用
            $(function () {
                loadNoticeMessage();
            });

            // 格式化审核意见
            function formatCheckMemo(checkMemo) {
                if (!checkMemo) return "无";
                return checkMemo.length > 116 ? checkMemo.substring(0, 116) + "..." : checkMemo;
            }

            // 加载审核信息
            async function loadNoticeMessage() {
                try {
                    const response = await $.ajax({
                        type: "POST",
                        url: `${huayi_projectscore_url}unitOption/getSubmitProjStatus`,
                        data: { projectId, unitId, userName, userType },
                        dataType: "json"
                    });

                    const { data } = response;
                    const $ulcheck = $("#ulcheck");
                    $ulcheck.empty();

                    if (data) {
                        const fragment = document.createDocumentFragment();
                        data.forEach(item => {
                            const li = document.createElement("li");
                            li.className = "layui-anim";

                            let htmlString = "";
                            if (item.unitId === "218115" || item.unitId === "218133") {
                                item.unitname = "海南省卫生健康委员会";
                            }

                            if (item.isPass == null) {
                                var statusText = (item.isDept == 1) ? '未提交' : '待审核';
                                htmlString = `
                                    <p class="timeLineAwaitP">${statusText}<span class="await"></span></p>
                                    <div class="conawait"></div>
                                    <div class="conawaitfont">${item.unitname}</div>
                                `;
                            } else if (item.isPass === 4) {
                                htmlString = `
                                    <p class="timeLineAwaitP">待上报<span class="await"></span></p>
                                    <div class="conawait"></div>
                                    <div class="conawaitfont">${item.unitname}</div>
                                `;
                            } else if (item.isPass === 0) {
                                htmlString = `
                                    <p class="timeLineAuditP">已提交<span class="audit">${item.dateCreate.substring(0, 10)}</span></p>
                                    <div class="conaudit"></div>
                                    <div class="conauditfont">${item.unitname}</div>
                                `;
                            } else if (item.isPass === 1) {
                                htmlString = `
                                    <p class="timeLineNoPass">退回修改<span class="noPass">${item.dateCreate.substring(0, 10)}</span></p>
                                    <div class="conNoPass"></div>
                                    <div class="conNoPassfont">
                                        ${item.unitname}<br/>
                                        <a href="#" title="${item.content}" class="auto-wrap-link">
                                            <span class="label">意见：</span>${formatCheckMemo(item.content)}
                                        </a>
                                    </div>
                                `;
                            } else if (item.isPass === 2) {
                                if(item.flowChainState === "52" && cmeStandardKind==="a6280900-a9c2-11ec-84d6-fa163e9b64fb" && pagseType==="summary"){
                                    htmlString = `
                                        <p class="timeLineNoPass">审核不通过<span class="noPass">审核不通过</span></p>
                                        <div class="conNoPass"></div>
                                        <div class="conNoPassfont">
                                            ${item.unitname}<br/>
                                            意见:<a href="#" title="" style="color: red;">审核不通过</a>
                                        </div>
                                    `;
                                }else{
                                    htmlString = `
                                        <p class="timeLineNoPass">审核不通过<span class="noPass">${item.dateCreate.substring(0, 10)}</span></p>
                                        <div class="conNoPass"></div>
                                        <div class="conNoPassfont">
                                            ${item.unitname}<br/>
                                            意见:<a href="#" title="${item.content}" style="color: red;">${formatCheckMemo(item.content)}</a>
                                        </div>
                                    `;
                                }
                                
                            } else if (item.isPass === 3) {
                                if (item.unitUserType !== 5) {
                                    htmlString = `
                                        <p class="timeLineAuditP">审核通过<span class="audit">${item.dateCreate.substring(0, 10)}</span></p>
                                        <div class="conaudit"></div>
                                        <div class="conauditfont">${item.unitname}</div>
                                    `;
                                } else if (item.flowChainState === "53") {
                                    if( item.finalStatus === 0){
                                        htmlString = `
                                        <p class="timeLineAuditP">初审通过<span class="audit">${item.dateCreate.substring(0, 10)}</span></p>
                                        <div class="conaudit"></div>
                                        <div class="conauditfont">${item.unitname}</div>`;
                                    }else if (item.finalStatus === 3) {
                                        htmlString = `
                                        <p class="timeLineAuditP">终审通过<span class="audit">${item.dateCreate.substring(0, 10)}</span></p>
                                        <div class="conaudit"></div>
                                        <div class="conauditfont">${item.unitname}</div>`;
                                    }else  if (item.finalStatus === 1) {
                                        htmlString = `
                                        <p class="timeLineNoPass">退回修改<span class="noPass">${item.dateCreate.substring(0, 10)}</span></p>
                                        <div class="conNoPass"></div>
                                        <div class="conNoPassfont">
                                            ${item.unitname}<br/>
                                            <a href="#" title="${item.content}" class="auto-wrap-link">
                                                <span class="label">意见：</span>${formatCheckMemo(item.content)}
                                            </a>
                                        </div>
                                    `;
                                    }else if (item.finalStatus === 2) {
                                        htmlString = `
                                        <p class="timeLineNoPass">审核不通过<span class="noPass">${item.dateCreate.substring(0, 10)}</span></p>
                                        <div class="conNoPass"></div>
                                        <div class="conNoPassfont">
                                            ${item.unitname}<br/>
                                            意见:<a href="#" title="${item.content}" style="color: red;">${formatCheckMemo(item.content)}</a>
                                        </div>
                                    `;
                                    }
                                }
                            }

                            li.innerHTML = htmlString;
                            fragment.appendChild(li);
                        });

                        $ulcheck.append(fragment);
                    }
                } catch (error) {
                    console.error("加载审核信息失败：", error);
                    layer.msg("加载审核信息失败，请稍后重试！");
                }
            }
        });
    </script>
</body>
</html>
