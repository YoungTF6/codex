<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta charset="UTF-8">
        <title>审批进度</title>
        <meta name="renderer" content="webkit">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
        <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
        <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
        <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>


        <link rel="stylesheet" href="../../../css/project/timeline.css" media="all">
        <!--    请求路径配置-->
        <script type="text/javascript" src="../../../js/constant.js"></script>
        <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
        <!--    ajax全局配置-->
        <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
        <link rel="stylesheet" href="../../../css/communal.css" media="all">
        <script type="text/javascript" src="../../../js/common.js"></script>

    </head>

    <body>

    <div class="layui-fluid">
        <div class="layui-card">
        <div class="layui-card-body" style="padding: 15px;">
            <form class="layui-form" action="" lay-filter="component-form-group">
            <div class="layui-card">
                <div class="layui-card-header" style="text-align: center;font-weight:bold;font-size: 17px;" id="title">
                    审批进度
                </div>
                <div class="layui-card-body" id="message">
                    <ul class="timeLine" id="ulcheck">                     
                    </ul>
                </div>
            </div>
            </form>
        </div>
        </div>
    </div>
    </body>

    <script>
          // 全局配置及引入相关的模块
    layui.use(['table', 'form','element'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var unitId= localStorage.getItem("unit-id");
        var userName= localStorage.getItem("user-name");
        var userType= localStorage.getItem("user-type");
        var downId = getUrlParam("downId");
        $(function () {
            noticeMessage();
        });

        //TODO
        function noticeMessage(){
            $.ajax({
                type: "POST",
                url: huayi_projectscore_url+"cmeProjFeedbackApproval/getApprovalStep",
                data: {downId:downId,unitId:unitId},
                dataType: 'json',
                success:function(obj){
                    if(obj.status != 200) {
                        return;
                    }
                    $('#ulcheck').empty();
                    var htmlString="";
                    if(obj.data.length>0){
                            $.each(obj.data, function(index, item) {
                                if(item.unitId=='218134' || item.unitId=='218133') {
                                     item.unitname='海南省卫生健康委员会';
                                }
                                if(item.unitId=='330001') {
                                     item.unitname='浙江省继续医学教育委员会';
                                }
                                if(item.content){
                                    // 将换行符替换为空格
                                    item.content=item.content.replace(/\n/g,"&nbsp;");
                                    if(item.content.length>20){
                                        item.content=item.content.substring(0,20)+"...";
                                    }
                                }
                                if(item.isPass==null){
                                    htmlString="<li class=\"layui-anim\"><p class=\"timeLineAwaitP\">待审核<span class=\"await\"></span></p><div class=\"conawait\"></div>"+
                                               "<div class=\"conawaitfont\">"+item.unitname+"</div></li>";
                                }else if(item.isPass==4){
                                    htmlString="<li class=\"layui-anim\"><p class=\"timeLineAwaitP\">待审核<span class=\"await\"></span></p><div class=\"conawait\"></div>"+
                                               "<div class=\"conawaitfont\">"+item.unitname+"</div></li>";
                                }                                
                                else if(item.isPass==0){
                                    htmlString="<li class=\"layui-anim\"><p class=\"timeLineAuditP\">已提交<span class=\"audit\">"+item.updateTime.substring(0,10)+"</span></p>"+
                                               "<div class=\"conaudit\"></div><div class=\"conauditfont\">"+item.unitname+"</div></li>";
                                }else if(item.isPass==1){
                                    htmlString="<li class=\"layui-anim\"><p class=\"timeLineNoPass\">退回修改<span class=\"noPass\">"+item.updateTime.substring(0,10)+"</span></p>"+
                                               "<div class=\"conNoPass\"></div><div class=\"conNoPassfont\">"+item.unitname+"<br/>意见:<a href=\"#\" title = "+item.content+" style=\"color: red;\">"+item.content+"</a></div></li>";
                                }else if(item.isPass==2){
                                    htmlString="<li class=\"layui-anim\"><p class=\"timeLineNoPass\">审核不通过<span class=\"noPass\">"+item.updateTime.substring(0,10)+"</span></p>"+
                                               "<div class=\"conNoPass\"></div><div class=\"conNoPassfont\">"+item.unitname+"<br/>意见:<a href=\"#\" title = "+item.content+" style=\"color: red;\">"+item.content+"</a></div></li>";
                                }else if(item.isPass==3){
                                    htmlString="<li class=\"layui-anim\"><p class=\"timeLineAuditP\">审核通过<span class=\"audit\">"+item.updateTime.substring(0,10)+"</span></p>"+
                                               "<div class=\"conaudit\"></div><div class=\"conauditfont\">"+item.unitname+"</div></li>";
                                }

                                $('#ulcheck').append(htmlString); //往下拉菜单里添加元素
                            })
                        }
                }

            })
        }
      })
    </script>
</html>
