<script>
    layui.config({
        base: '../../js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'element', 'treeSelect'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var treeSelect = layui.treeSelect;
        var element = layui.element;
        const HAINAN = '6eec6713-670a-43cc-ad4d-9bd700a92928';
        const SHANXI = 'db0d980b-03d4-4c9c-b2d4-9f890109ed47';
        const HUBEI  =  "73ba18db-33fd-4746-ab41-9beb009f69a1";
        const NEIMENG = "08e44437-5789-44e0-8ff8-9ecb00a6348a";
        const ZHEJIANG = "190c480d-d43c-450b-8472-a6fd00a6729d";
        const GUANGDONG = "289bf0ca-52cb-4b19-b737-9bd200a69ce1";
        const HENAN = "a6280900-a9c2-11ec-84d6-fa163e9b64fb";

        var extendData = { holdState: 'HOLD' }; // 签标签页的额外参数

        //获取套
        window.getCmeStandardKindId = function () {
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            if (cmeStandardKindId == "" || cmeStandardKindId == null || cmeStandardKindId == undefined) {
                cmeStandardKindId = "b7864061-7bd4-4ee7-a868-9b24009e92df";
            }
            return cmeStandardKindId;
        }
        //获取单位
        window.getUnitId = function () {
            var unitId = localStorage.getItem("unit-id");
            return unitId;
        }
        window.getdeptId = function () {
            var deptId = localStorage.getItem("dept-id");
            return deptId;
        }

        var tabIdCurrent = 'tab_1_1'; // 当前选中的二级标签页
        var extendData = { holdState: 'NO_HOLD' }; // 签标签页的额外参数
        var allConditionFlag = false; // 是否显示全部条件

        //初始化查询
        window.init = function () {

            if(window.getCmeStandardKindId() == HAINAN) {
                // 海南套：筛选框三级学科不可选
                $("#knowledgeThree").val("").attr("disabled", "disabled");
            }

            laydate.render({
                elem: '#searchStartDate' //指定元素
            });
            laydate.render({
                elem: '#searchEndDate' //指定元素
            });

            //年度初始化
            var currentYear = (new Date()).getFullYear();
            for (var i = currentYear; i >= currentYear - 8; i--) {
                var option = "";
                if (i == currentYear) {
                    option = $("<option value='" + i + "' selected>" + i + "</option>");
                } else {
                    option = $("<option value='" + i + "'>" + i + "</option>");
                }
                $("#cmeYear").append(option);
            }

            form.on('select(cmeYear)', date => {initScoreLevelSel(); initKnowledgeSelBatch(); $("#projType").val("");$("#medicalType").val(""); });

            initScoreLevelSel();

            //二级学科
            initKnowledgeSelBatch();

            (window.getCmeStandardKindId()==NEIMENG) && $("#medicalType").append("<option value='3'>蒙医</option>");

            form.render("select", "searchDiv");


        };

        //初始化表格
        window.initTable = function () {
            let data_default = {
                cmeStandardKindId: getCmeStandardKindId(),
                unitId: window.getUnitId(),
                cmeYear: $("#cmeYear").val(),
                medicalType: $("#medicalType").val(),
                deptId: window.getdeptId(),
                projNo:  $("#projNo").val(),
                withCheckInfo: false
            };
            const projNoTitle =  window.getCmeStandardKindId() == StandardKind.GUANG_DONG ? '项目（活动）编号' : '项目编号';
            const projNameTitle =  window.getCmeStandardKindId() == StandardKind.GUANG_DONG ? '项目（活动）名称' : '项目名称';

            let cols = [
                        {
                            field: 'projNo',
                            align: 'center',
                            title: projNoTitle,
                            minWidth: 200
                        },
                        {
                            field: 'projName',
                            title: projNameTitle,
                            align: 'center',
                            minWidth: 300,
                            sort: true
                        },
                        {
                            field: 'projDownload',
                            align: 'center',
                            title: '维护举办周期',
                            minWidth: 120,
                            templet: function (data) {
                                let html = "";
                                let downCount = data.downCount;
                                if (downCount == 0) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPosDownList" style="color: #FF5722;background-color: transparent;">未维护</a>';
                                } else {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPosDownList" style="color: #FFB800;background-color: transparent;">维护</a>';
                                }
                                return html;
                            }
                        }, {
                            field: 'projExam',
                            align: 'center',
                            title: '维护试卷',
                            minWidth: 100,
                            templet: function (data) {
                                let examPaperState = data.examPaperState;
                                // * 0:  未维护 没有添加试题
                                // * 1： 未启用 添加了试题，但是没有启用试卷
                                // * 2： 已启用 启用了试卷
                                let html = '';
                                if (examPaperState === 0) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPaper" style="color: #FF5722;background-color: transparent;">未维护</a>'
                                }
                                if (examPaperState === 1) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPaper" style="color: #FF5722;background-color: transparent;">未启用</a>'
                                }
                                if (examPaperState === 2) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="showPaper" style="color: #5FB878;background-color: transparent;">已启用</a>'
                                }
                                return html;
                            }
                        }, {
                            field: 'projApply',
                            align: 'center',
                            title: (window.getCmeStandardKindId().toLowerCase()== HUBEI)?'举办前预审':'举办前申请',
                            minWidth: 100,
                            hide: (window.getCmeStandardKindId().toLowerCase() == ZHEJIANG),
                            templet: function (data) {
                                let downNotApplyCount = data.downNotApplyCount;
                                let html = '';
                                if (data.downCount == 0) {
                                    html = '<a class="layui-btn layui-btn-xs"  style="color: #FF5722;background-color: transparent;">请添加周期</a>';
                                }
                                else if (downNotApplyCount != 0) {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="ShowProjApplyBeforeHold" style="color: #FF5722;background-color: transparent;">未申请(' + downNotApplyCount + ')</a>'
                                }
                                else {
                                    html = '<a class="layui-btn layui-btn-xs" lay-event="ShowProjApplyBeforeHold" style="color: #5FB878;background-color: transparent;">已申请</a>'
                                }
                                return html;
                            }
                        },  {
                            field: 'projContract',
                            align: 'center',
                            title: '项目举办审核',
                            minWidth: 130,
                            hide: (window.getCmeStandardKindId().toLowerCase() != ZHEJIANG),
                            templet: function (data) {

                                if (data.downCount == 0) {
                                    return '<a class="layui-btn layui-btn-xs"  style="color: #FF5722;background-color: transparent;">请添加周期</a>';
                                }
                                //未申请数量
                                let downNotApplyCount = data.downNotApplyCount;
                                //科室已申请，单位待审核数量
                                let downUnitToCheckApplyCount = data.downUnitToCheckApplyCount

                                let html = "";
                                if(true) {
                                    if (downUnitToCheckApplyCount != 0) {
                                        html = '<a class="layui-btn layui-btn-xs" lay-event="showProjContract" style="color: #FF5722;background-color: transparent;">待审核(' + downUnitToCheckApplyCount + ')</a>'
                                    }
                                    else if (downNotApplyCount != 0) {
                                        html = '<a class="layui-btn layui-btn-xs" lay-event="showProjContract" style="color: #FF5722;background-color: transparent;">未申请(' + downNotApplyCount + ')</a>'

        /* 标签页计数 */
        window.countNum = function () {
            let url = huayi_projectscore_url;
            let data = getDefaultData();
            //let data = $.extend({}, getDefaultData(), { topUnitId: getUnitId() });
            if (tabIdCurrent.startsWith('tab_1')) {
                url += 'cmeCmeProj/holdState';
            } else if (tabIdCurrent.startsWith('tab_2')) {
                url += 'cmeCmeProj/applyBeforeHoldState';
            } else if (tabIdCurrent.startsWith('tab_3')) {
                url += 'cmeCmeProj/feedbackState';
            }
            axios({
                method: 'get',
                url: url,
                responseType: 'json',
                params: data
            }).then(response => {
                if (response.status == 200 && response.data.status == 200) {
                    var data = response.data.data;
                    if (tabIdCurrent.startsWith('tab_1')) {
                        $('#tab_1_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_1_1').html('未举办&nbsp;&nbsp;(' + data.NO_HOLD + ')');
                        $('#tab_1_5').html('部分已举办&nbsp;&nbsp;(' + data.PART_HOLD + ')');
                        $('#tab_1_2').html('已举办&nbsp;&nbsp;(' + data.HOLD + ')');
                        $('#tab_1_3').html('待授分&nbsp;&nbsp;(' + data.TO_SCORE + ')');
                        $('#tab_1_4').html('逾期未举办&nbsp;&nbsp;(' + data.OVERDUE + ')');
                    } else if (tabIdCurrent.startsWith('tab_2')) {
                        //$('#tab_2_0').html('全部&nbsp;&nbsp;(' + data.ALL + ')');
                        $('#tab_2_1').html('未申请&nbsp;&nbsp;(' + data.NO_REPORT + ')');
                        $('#tab_2_2').html('审核中&nbsp;&nbsp;(' + data.CHECKING + ')');
                        $('#tab_2_3').html('审核通过&nbsp;&nbsp;(' + data.FINISH + ')');
                        $('#tab_2_4').html('退回修改&nbsp;&nbsp;(' + data.BACK + ')');
                        if (0 < data.BACK) $('#tab_2_4').addClass('shake_tab');
                        $('#tab_2_5').html('审核不通过&nbsp;&nbsp;(' + data.NOT_PASS + ')');
                    } else if (tabIdCurrent.startsWith('tab_3')) {

        window.ableOperateLastYearData = function(dataYear) {
            let cgv = window["value_forbid_some_operate_on_last_year_data"];

            }

            let able = true;
            let deadline = new Date(cgv);
            let now = new Date();
            if(parseInt(dataYear) < now.getFullYear()){
                if(deadline < now) {
                    able = false;
                }
            }
            return able;
        }

                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'CmeProjPosDownList.html?projId=' + projId + "&cmeYear=" + data.cmeYear,
                        closeBtn: 1
                    });
                    layer.full(index);
                    break;
                case 'showPaper':
                    var index = layer.open({
                        title: '维护试卷',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'CmeExamQuestion.html?projectId=' + projId + "&paperName=测试&projectType=1",
                        scrollbar: false
                    });
                    break;
                case 'showAttendanceDetail':
                    var attendanceDetailUrl = 'attendanceForProj/attendanceDetailEntrance.html?projectId=' + projId
                        + '&scoreLevel=' + scoreLevel
                        + '&cmeYear=' + data.cmeYear;
                    var index = layer.open({
                        title: '项目周期',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: attendanceDetailUrl,
                        scrollbar: false
                    });
                    break;
                case 'ShowProjApplyBeforeHold':
                    var index = layer.open({
                        title: (window.getCmeStandardKindId().toLowerCase()== HUBEI)?'举办前预审':'举办前申请',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'ProjApplyBeforeHold.html?projectId=' + projId + '&scoreLevel=' + data.scoreLevel + '&cmeYear=' + data.cmeYear,
                        scrollbar: false
                    });
                    break;
                case 'showProjContract':
                    var index;
                    //市级走正常的举办前申请页面
                    if(scoreLevel == "59f4ef52-dd6d-11f0-ba6d-005056a64c01") {
                        index = layer.open({
                            title: (window.getCmeStandardKindId().toLowerCase()== HUBEI)?'举办前预审':'举办前申请',
                            type: 2,
                            area: ['100%', '100%'],
                            maxmin: true,
                            content: 'ProjApplyBeforeHold.html?projectId=' + projId + '&scoreLevel=' + data.scoreLevel + '&cmeYear=' + data.cmeYear,
                            scrollbar: false
                        });
                    } else {
                        index = layer.open({
                            title: "合同书",
                            type: 2,
                            area: ['100%', '100%'],
                            maxmin: false,
                            content: 'projContract/projContractDown.html?projectId=' + projId,
                            scrollbar: true
                        });
                    }
                    break;
                case 'ShowCmeProjPreRegisterConfig':
                    var index = layer.open({
                        title: '预报名管理',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'CmeProjPreRegisterConfig.html?projectId=' + projId,
                        scrollbar: false
                    });
                    break;
                case 'ShowAttendance':
                    let attendanceQuery = 'pro_id=' + projId + '&scoreLevel=' + scoreLevel;
                    let isSignInOutType = (window.getCmeStandardKindId().toLowerCase() == GUANGDONG || 
                                           window.getCmeStandardKindId().toLowerCase() == HENAN);
                    let attendanceUrl = (isSignInOutType ? 'attendanceForTeach/AttendanceProjChooseSignInOut.html?' 
                                                    : 'attendanceForTeach/AttendanceProjChoose.html?') + attendanceQuery;
                    //let attendanceUrl = 'attendanceForTeach/AttendanceProjChoose.html?pro_id=' + projId + '&scoreLevel=' + scoreLevel;
                    var index = layer.open({
                        closeBtn: false,
                        title: false,
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: false,
                        content: attendanceUrl,
                        scrollbar: false
                    });
                    break;
                case 'ShowGivingScore':
                    var index = layer.open({
                        title: '授分',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'giving/givingForProjPosDownload.html?pro_id=' + projId + '&scoreLevel=' + scoreLevel + '&cmeYear=' + data.cmeYear,
                        scrollbar: false
                    });
                    break;
                case 'ShowCmeProjFeedback':
                    var index = layer.open({
                        title: '执行情况反馈',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'CmeProjFeedback.html?projectId=' + projId + '&cmeYear=' + data.cmeYear ,
                        scrollbar: false
                    });
                    break;
                case 'ShowCmeProjEvaluation':
                    var index = layer.open({
                        title: '项目评价表',
                        type: 2,
                        area: ['100%', '100%'],
                        maxmin: true,
                        content: 'CmeProjEvaluation.html?projectId=' + projId,
                        scrollbar: false
                    });
                    break;
            };

        });

        /* 选项卡 */
        // 一级选项卡
        element.on('tab(tabarea)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent.startsWith(tabIdTemp)) { // 所选标签页为已选中状态时
                return;
            }

            $('.layui-tab-card-1').hide();
            switch (tabIdTemp) {
                case 'tab_1':
                    $('#tabarea_1').show();
                    $("#holdRateSpan").show();
                    $("#feedbackRateSpan").hide();
                    tabIdCurrent = 'tab_1_1';
                    element.tabChange('tabarea_1', 'tab_1_1');
                    window.getHoldRate();
                    break;
                case 'tab_2':
                    $('#tabarea_2').show();
                    $("#holdRateSpan").hide();
                    $("#feedbackRateSpan").hide();
                    tabIdCurrent = 'tab_2_1';
                    element.tabChange('tabarea_2', 'tab_2_1');
                    break;
                case 'tab_3':
                    $('#tabarea_3').show();
                    $("#holdRateSpan").hide();
                    $("#feedbackRateSpan").show();
                    tabIdCurrent = 'tab_3_1';
                    element.tabChange('tabarea_3', 'tab_3_1');
                    window.getFeedbackRate();
                    break;
                default:
                    return;
            }
            tabChange();
        });
        // 举办状态，二级选项卡
        element.on('tab(tabarea_1)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent == tabIdTemp) { // 所选标签页为已选中状态时
                return;
            } else {
                tabIdCurrent = tabIdTemp;
                tabChange();
            }
        });
        // 举办签申请情况，二级选项卡
        element.on('tab(tabarea_2)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent == tabIdTemp) { // 所选标签页为已选中状态时
                return;
            } else {
                tabIdCurrent = tabIdTemp;
                tabChange();
            }
        });
        // 执行情况反馈情况，二级选项卡
        element.on('tab(tabarea_3)', function (data) {
            const tabIdTemp = this.getAttribute('id');
            if (tabIdCurrent == tabIdTemp) { // 所选标签页为已选中状态时
                return;
            } else {
                tabIdCurrent = tabIdTemp;
                tabChange();
            }
        });


        $(function () {
            renderLables();
            window.init();
            window.getConfig('range_dept_agent_proj_func_cols');
            window.getConfig('fun_add_proj_in_cme_proj_list');
            countNum();
            window.initTable();
            window.getHoldRate();


            //山西隐藏举办前申请列
            if (getCmeStandardKindId() == SHANXI) {
                $("#tab_2").hide();
                $("#tabarea_2").hide();
            }

            //湖北套要求举办前申请tab名字改为举办前预审
            if (getCmeStandardKindId() == HUBEI) {
                $("#tab_2").text("举办前预审情况");
            }

            //查找代办科室的功能列，如果不存在举办前申请与执行情况反馈，就隐藏掉其中的tab页面
            let fun_cols = window["range_dept_agent_proj_func_cols"].split('|');
            let fun_proj_apply = 0;
            let fun_proj_feedback = 0;
            for (let i = 0; i < fun_cols.length; i++) {
                let fun_col = fun_cols[i];
                if (fun_col == "projApply") {
                    fun_proj_apply = 1;
                }
                if (fun_col == "projFeedback") {
                    fun_proj_feedback = 1;
                }
            }
            if (fun_proj_apply == 0) {
                $("#tab_2").hide();
                $("#tabarea_2").hide();
            }
            if (fun_proj_feedback == 0) {
                $("#tab_3").hide();
                $("#tabarea_3").hide();
            }


            if (window["fun_add_proj_in_cme_proj_list"] == "1") {
                $("#addTempProjBtn").show();

                if(getCmeStandardKindId() == HUBEI) {
                    $('#addTempProjBtn').on('click', function () {
                        showTempProjModalHubei();
                    });
                }
            }
        });

    });
</script>
