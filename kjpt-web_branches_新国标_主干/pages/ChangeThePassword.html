<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>修改密码页</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css"
          media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>


    <!--    请求路径配置-->
    <script type="text/javascript" src="../js/constant.js"></script>
    <script type="text/javascript" src="../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../js/tools/form_validation_tool.js"></script>
    <script type="text/javascript" src="../js/tools/urlTools.js"></script>
    <script type="text/javascript" src="../js/tools/verification.js"></script>

    <link rel="stylesheet" href="../css/communal.css" media="all">
    <style>
        /*“设置密码”样式*/
        .textStyle {
            color: #181a1b;
            /*font-weight: bold;*/
            font-size: 40px;
            font-family: "微软雅黑", Arial, Helvetica, sans-serif;
        }

        /*“登录密码规则”样式*/
        .textStyleFor {
            color: #181a1b;
            font-family: "微软雅黑", Arial, Helvetica, sans-serif;
            font-size: 30px;
            font-weight: bold;
        }

        /*表单所在div样式*/
        .div1 {
            width: 40%;
            margin-left: 30%;
        }

        /*设置密码和确认密码样式*/
        .spanForPassword {
            font-size: 20px;
            font-weight: bold;
            font-family: "微软雅黑", Arial, Helvetica, sans-serif;
        }

        .layui-form-label {
            width: 110px;
        }

        .layui-form-item .layui-input-inline {
            width: 400px;
        }

        .image {
            padding-top: 6px;
        }

        /* 全角转半角提示 */
        .pwd-tip-half {
            color: #666;
            font-size: 12px;
            margin: 0;
        }
    </style>
</head>
<body>
<div>
    <div>
        <div style="border-bottom: #181a1b solid 1px;display: none;"><span class="textStyle">设置新密码</span></div>
        <div class="div1">
            <span class="textStyleFor" style="display: none">登录密码规则</span><br><br>
            <form class="layui-form layui-container">
                <div class="layui-form-item">
                    <span class="layui-form-label spanForPassword"></span>
                    <div class="layui-input-inline">
                        <p class="pwd-tip-half">输入时全角字符将自动转换为半角，请以半角字符为准。</p>
                    </div>
                </div>
                <div class="layui-form-item">
                    <span class="layui-form-label spanForPassword">设置新密码<span style="color: red">*</span></span>
                    <div class="layui-input-inline" style="position: relative;">
                        <input type="password" name="password" placeholder="8-16位字符，可包含数字，字母（区分大小写）、特称字符" autocomplete="off"
                               class="layui-input" lay-verify="pass" id="newpassword">
                    </div>
                    <img class="image" id="images-password" src="../img/eyes-close-medium.png">
                    <span id="strength" style="display:none;"> 密码强度: <b>弱</b></span>
                </div>
                <div class="layui-form-item">
                    <span class="layui-form-label spanForPassword">确认新密码<span style="color: red">*</span></span>
                    <div class="layui-input-inline" style="position: relative;">
                        <input type="password" name="confirmPassword" placeholder="请再次输入新密码" autocomplete="off"
                               class="layui-input" lay-verify="confirmPassword">
                    </div>
                    <img class="image" id="image-password" src="../img/eyes-close-medium.png">
                </div>
                <br>
                <br>
                <div class="layui-form-item" style="margin-left: 18%;">
                    <div class="layui-input-block">
                        <button class="layui-btn" lay-submit lay-filter="changeBtn">保存</button>
                        <!--<button type="reset" class="layui-btn layui-btn-primary">重置</button>-->
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    /* 全局配置及引入相关的模块 */
    layui.config({
        base: '../js/layui/ext/'
    }).extend({
        passwordIntensity: 'passwordIntensity'
    }).use(['form', 'passwordIntensity'], function () {
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var passwordIntensity = layui.passwordIntensity
        // var ins =passwordIntensity.render({
        //     elem: '#newpassword',
        //     data: '111222',
        // })

        form.verify({
            confirmPassword: function (value, item) {
                if (value == null || value== '' || value != $('[name="password"]').val()) {
                    return "两次密码不一致";
                }
            }
            //我们既支持上述函数式的方式，也支持下述数组的形式
            //数组的两个值分别代表：[正则匹配、匹配不符时的提示文字]
            , pass: [
                /^(?=.*[0-9])(?=.*[a-zA-Z])(?=.*[^a-zA-Z0-9]).{8,16}$/
                , '密码中必须包含字母（不区分大小写）、数字、特称字符，至少8个字符，最多16个字符'
            ]
        });

        $('[name="password"]').hover(function () {
            layer.tips('请输入8-16位字符, 可包含数字, 字母（区分大小写）、特称字符', '#newpassword', {tips: [1, "#red"], time: 2000})
        },function () {
            layer.close(layer.index)
        })

        /* 输入时全角自动转半角（修改密码页）；加防抖，避免全角/IME 下按一次键出现两个字符 */
        function applyHalfWidthToInput($input) {
            var val = $input.val();
            if (val == null) return;
            var half = strTool.toHalfWidth(val);
            if (half !== val) {
                var start = $input[0].selectionStart, end = $input[0].selectionEnd;
                $input.val(half);
                $input[0].setSelectionRange(start, end);
            }
        }
        function scheduleHalfWidth($input) {
            var timer = $input.data('_halfWidthTimer');
            if (timer) clearTimeout(timer);
            timer = setTimeout(function () {
                $input.removeData('_halfWidthTimer');
                applyHalfWidthToInput($input);
            }, 200);
            $input.data('_halfWidthTimer', timer);
        }
        $('[name="password"]').add('[name="confirmPassword"]').on('input', function () {
            scheduleHalfWidth($(this));
        });

        /* 显示密码 */
        $('#images-password').on('click', e => {
            let src = e.currentTarget.src;
            if (src.indexOf('eyes-open-medium.png') >= 0) {
                $(e.currentTarget).attr('src', '../img/eyes-close-medium.png');
                $('[name="password"]').attr('type', 'password');
            } else {
                $(e.currentTarget).attr('src', '../img/eyes-open-medium.png');
                $('[name="password"]').attr('type', 'text');
            }
        });
        /* 显示密码 */
        $('#image-password').on('click', e => {
            let src = e.currentTarget.src;
            if (src.indexOf('eyes-open-medium.png') >= 0) {
                $(e.currentTarget).attr('src', '../img/eyes-close-medium.png');
                $('[name="confirmPassword"]').attr('type', 'password');
            } else {
                $(e.currentTarget).attr('src', '../img/eyes-open-medium.png');
                $('[name="confirmPassword"]').attr('type', 'text');
            }
        });

        /* 密码强度校验 */
        $('[name="password"]').on('keyup', e => {
            let pwd = $(e.currentTarget).val();

            if (pwdTool.isStrong(pwd)) {
                $('#strength b').html('强').css('color', '#138434');

            } else if (pwdTool.isMedium(pwd)) {
                $('#strength b').html('中').css('color', '#4151ec');

            } else {
                $('#strength b').html('弱').css('color', '');
            }

            $('#strength').show();
        });


        form.on('submit(changeBtn)',function (data) {
            var formData=data.field;
            formData.personId=localStorage.getItem("user-id");
            var password1 = formData.password;
            var password2 = formData.confirmPassword;
            if (password1.length > 25 || password1.length < 8) {
                layer.msg("密码位数应该大于等于8位，小于等于25位");
                return;
            }
            if (isNumberAndLetterAndSpecialCh(password1) == false) {
                layer.msg("密码应该由字母+数字+特殊符号组成");
                return;
            }
            if (password1 != password2) {
                layer.msg("重复密码和密码应该一致");
                return;
            }
            $.ajax({
                url         : huayi_permission_url + 'comuser/update/password',
                type        : 'post',
                // contentType : 'application/json',
                dataType    : 'json',
                data        :
                    {
                        personId: formData.personId,
                        password: formData.password,
                        confirmPassword: formData.confirmPassword
                    },
                success     : (res) => {
                    layer.alert(res.data)
                    return true;
                },
                error       : (xhr, status, error) => {
                    layer.msg('验证码验证失败', { time : 1500 });
                }
            });
            return false;
        })
    })

</script>
</body>
</html>
