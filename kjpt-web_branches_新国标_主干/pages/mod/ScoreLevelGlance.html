<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"

            <div class="layui_mess">

        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">

<!-- toolbar -->
<script type="text/html" id="toolbarTplt">
    <a class="layui-btn layui-btn-sm" lay-event="exportExcel" style="float: right;">导出Excel</a>
</script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        excel: 'excel',
        lat: 'lat',
        tableMerge: 'tableMerge'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'excel', 'lat', 'tableMerge'], function () {
        let table = layui.table;
        let form = layui.form;
        let $ = layui.jquery;
        let lat = layui.lat;
        let tableMerge = layui.tableMerge;
        $(function () {
            lat.renderCmeYear('select[name=cmeYear]');
            renderTable();
            loadData(_cur_year);
        });
        table.on('toolbar(scoreLevelTable)', function (obj) {
            if ('exportExcel' === obj.event) {
                // lay_exportExcel('scoreLevelTable', '学分级别.xlsx', 'xlsx');
                let fileName = '学分分类.xls';
                var data = table.cache['scoreLevelTable'];
                table.exportFile('scoreLevelTable', data, fileName);
            }
        });
        form.on('select(cmeYear)', function (data) {
            loadData(data.value);
        });
        function loadData(year) {
            getScoreLevelOption(year, '___').then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    let slList = jsonRes.data;
                    //
                    table.reload('scoreLevelTable', {
                        data: slList,
                        done: function (res, curr, count) {
                            setTimeout(() => {
                                $('.layui-table-header .layui-form-checkbox').click();
                                tableMerge.render(this);
                                // setRowColors(res.data);
                            }, 200);
                        }
                    });
                } else {
                    lat.failMsg(jsonRes.msg);
                }
            }).catch(error => {
                lat.errorMsg('error:加载学分级别');
            }).finally(() => {
            });
        }
        function refreshTable() {
        }
        function renderTable() {
            table.render({
                id: 'scoreLevelTable',
                elem: '#scoreLevelTable',
                height: 'full-100',
                toolbar: '#toolbarTplt',
                defaultToolbar: [],
                loading: true,
                page: false,
                limit: 999,
                cols: [[
                    {title: '选择1', width: 60, align: 'center', type: 'checkbox', fixed: 'left', hide: true},
                    {field: 'kindName', merge: ['kindId'], title: '学分分类', minWidth: 120, align: 'center', sort: false},
                    {field: 'scoreLevelName', title: '学分子分类', minWidth: 120, align: 'center', sort: false}
                ]],
                // initSort: {
                //     field: 'kindName',
                //     type: 'asc'
                // },
                data: [{
                    kindName: "123", scoreLevelName: "abc"
                }],
                done: function (res, curr, count) {
                    $('.layui-table-header .layui-form-checkbox').click();
                }
            });
        }
        function setRowColors(data) {
            var colorMap = {}; // 用于存储 kindId 对应的颜色
            var colors = ['#f0f8ff', '#faebd7', '#7fffd4', '#f0ffff', '#f5f5dc']; // 定义一组颜色
            // 遍历数据，为相同 kindId 的行设置相同颜色
            for (var i = 0; i < data.length; i++) {
                var kindId = data[i].kindId;
                if (!colorMap[kindId]) {
                    // 如果当前 kindId 还没有颜色，从颜色数组中取一个
                    colorMap[kindId] = colors[Object.keys(colorMap).length % colors.length];
                }
                // 设置行背景颜色
                $('.layui-table-body tbody tr[data-index="' + i + '"]').css('background-color', colorMap[kindId]);
            }
        }
    });
</script>
