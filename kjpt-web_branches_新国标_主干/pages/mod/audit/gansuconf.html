<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>gansu.conf</title>
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <!--<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">-->
    <!-- base -->
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-form" id="conf_form" style="width: 60%; margin-top: -320px;">
            <div class="layui-form-item">
                <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>可提交年度</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="cme_year[2025]" value="2025" title="2025" lay-skin="primary" lay-filter="cme_year">
                    <input type="checkbox" name="cme_year[2024]" value="2024" title="2024" lay-skin="primary" lay-filter="cme_year">
                    <input type="checkbox" name="cme_year[2023]" value="2023" title="2023" lay-skin="primary" lay-filter="cme_year">
                    <input type="checkbox" name="cme_year[2022]" value="2022" title="2022" lay-skin="primary" lay-filter="cme_year">
                    <input type="checkbox" name="cme_year[2021]" value="2021" title="2021" lay-skin="primary" lay-filter="cme_year">
                    <input type="checkbox" name="cme_year[2020]" value="2020" title="2020" lay-skin="primary" lay-filter="cme_year">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>可补提交年度</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="bu_year[2024]" value="2024" title="2024" lay-skin="primary" lay-filter="bu_year">
                    <input type="checkbox" name="bu_year[2023]" value="2023" title="2023" lay-skin="primary" lay-filter="bu_year">
                    <input type="checkbox" name="bu_year[2022]" value="2022" title="2022" lay-skin="primary" lay-filter="bu_year">
                    <input type="checkbox" name="bu_year[2021]" value="2021" title="2021" lay-skin="primary" lay-filter="bu_year">
                    <input type="checkbox" name="bu_year[2020]" value="2020" title="2020" lay-skin="primary" lay-filter="bu_year">
                </div>
            </div>
            <div class="layui-form-item">
                <a class="layui-btn" id="btn_save" style="display: block; margin-left: 160px; width: 66px;">保存</a>
            </div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript">
    layui.config({
        base: '/js/layui/ext/',
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table, layer = layui.layer, form = layui.form, laydate = layui.laydate, dropdown = layui.dropdown, element = layui.element, $ = layui.jquery, xmSelect = layui.xmSelect, lat = layui.lat;
        layer.ready(function () {
            getAction(`${huayi_sjwh_url}audit/gansu/conf/date`).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    let arr = jsonRes.data.split('#');
                    echo(arr[0], arr[1]);
                }
            });
        });
        $('#btn_save').click(function () {
            let years = checkboxVals('cme_year');
            let buyears = checkboxVals('bu_year');
            if (!years) {
                lat.failMsg('请选择可提交年度');
                return false;
            }
            if (!buyears) {
                lat.failMsg('请选择可补提交年度');
                return false;
            }
            postAction(`${huayi_sjwh_url}audit/gansu/conf/date_set`, {'val': `${years}#${buyears}`}).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    lat.okMsg('已保存');
                }
            });
        });
        form.on('checkbox(cme_year)', function (data) {
            let y = data.value;
            if(data.elem.checked)
            $(`input[name^=bu_year][value=${y}]`).prop('checked', false).attr('disabled', true).addClass('layui-btn-disabled');
            else $(`input[name^=bu_year][value=${y}]`).attr('disabled', false);
            form.render('checkbox');
        });
        form.on('checkbox(bu_year)', function (data) {
            let y = data.value;
            if(data.elem.checked)
            $(`input[name^=cme_year][value=${y}]`).prop('checked', false).attr('disabled', true).addClass('layui-btn-disabled');
            else $(`input[name^=cme_year][value=${y}]`).attr('disabled', false);
            form.render('checkbox');
        });
        function echo(years, buyears) {
            echoCheckbox('cme_year', years);
            echoCheckbox('bu_year', buyears);
            form.render();
        }
    });
</script>
<style>
    html, body, .layui-fluid, .layui-card {
        height: 100%;
    }
    .layui-card {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .layui-form-label {
        width: 120px;
    }
    .layui-input-block {
        margin-left: 160px;
    }
    .layui-form-select {
        width: 80%;
    }
</style>
</html>
