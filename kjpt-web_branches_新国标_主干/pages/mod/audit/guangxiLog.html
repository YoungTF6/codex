<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let gLayerIndex = -1;
        let gPageNum = 1, gTitleSel;
        window.refreshTable = refreshTable;
        $(function () {
            renderTitle();
            renderTable();
        });
        function renderTable() {
            table.render({
                id: 'table_id',
                elem: '#table_id',
                height: 'full-160',
                defaultToolbar: [],
                url: getUrl(),
                method: 'POST',
                contentType: 'application/json',
                loading: true,
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                request: {
                    pageName: 'pageNum', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据量的参数名，默认：limit
                },
                parseData: function (res) {
                    let page = res.result || {};
                    gPageNum = page.current;
                    return {
                        'code': res.code === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message || res.msg, // 解析提示文本
                        'count': page.total, // 解析数据长度
                        'data': page.records, // 解析数据列表
                        'page': page.current, // 当前页
                        'limit': page.size // 每页条数
                    }
                },
                done: function (res, curr, count) {
                    //
                    gPageNum = curr;
                },
                error: function (error, msg) {
                    $('.layui-table-main').html(`<div class="layui-none">${error.responseText}</div>`);
                },
                cols: [getCols()],
                data: [{
                    personNo: "123"
                }],
            });
        }
        function isScore() {
            return 'score' === $('select[name=type]').val();
        }
        function refreshTable(ec) {
            let c = {
                url: getUrl(),
                where: getSifter(),
                cols: [getCols()],
            };
            ec ? $.extend(true, c, ec) : '';
            table.reload('table_id', c);
        }
        function getSifter() {
            return {
                'cmeYear': $('select[name=cmeYear]').val(),
                'personNo': $('input[name=personNo]').val(),
                'personName': $('input[name=personName]').val(),
                'certId': $('input[name=certId]').val(),
                'pushState': $('select[name=pushState]').val(),
                'titleLevelIds': $('select[name=titleLevelIds]').val(),
                'titleIds': gTitleSel.getValue('valueStr'),
                'batchLabel': $('input[name=batchLabel]').val(),
                'passResult': $('select[name=passResult]').val(),
                'verLabel': 1,
            };
        }
        function getUrl() {
            let dev = 'http://localhost:10086'; // dev
            let prod = 'http://211.97.79.16:18001/guangxi_dock'; // prod
            return `${prod}/guangxi/test/${isScore() ? 'score' : 'period'}/log/page`;
        }
        function getCols() {
            return [
                {field: 'cmeYear', title: '年度', width: 70, align: 'center', fixed: 'left', sort: false,},
                {field: 'personNo', title: '人员编号', minWidth: 110, align: 'center', fixed: 'left', sort: true,},
                {field: 'personName', title: '人员姓名', minWidth: 110, align: 'center', fixed: 'left', sort: true,},
                {field: 'certId', title: '证件号', minWidth: 180, align: 'center', sort: true, templet: data => desensitization.certId(data.certId)},
                {field: 'unitName', title: '单位', minWidth: 210, align: 'center', sort: true,},
                {field: 'titleLevelName', title: '职称级别', minWidth: 106, align: 'center', sort: true,},
                {field: 'titleName', title: '职称', minWidth: 106, align: 'center', sort: true,},
                {field: 'score1', title: 'Ⅰ类学分', minWidth: 100, align: 'center', sort: true, hide: !isScore()},
                {field: 'score2', title: 'Ⅱ类学分', minWidth: 100, align: 'center', sort: true, hide: !isScore()},
                {field: 'totalScore', title: '总学分', minWidth: 90, align: 'center', sort: true,},
                {field: 'totalPeriod', title: '总学时', minWidth: 90, align: 'center', sort: true,},
                {field: 'passResult', title: '达标结果', minWidth: 106, align: 'center', sort: true, templet: data => PassResultEnum[data.passResult] || ''},
                // {field: 'courseHours', title: '推送学时', minWidth: 90, align: 'center', sort: true,},
                {
                    field: 'pushState', title: '推送状态', minWidth: 140, align: 'center', sort: true, templet: data => {
                        let txt = isScore() ? '学分' : '学时';
                        let res = '';
                        if (1 === data.pushState) res = `<span style="color: #27b1a2;">${txt}推送成功</span>`;
                        if (2 === data.pushState) res = `<span style="color: #f56c6c;">${txt}推送失败</span>`;
                        if (3 === data.pushState) res = `<span style="color: #f56c6c;">身份证校验失败</span>`;
                        return res;
                    }
                },
                {field: 'createTime', title: '推送时间', minWidth: 180, align: 'center', sort: true,},
                {field: 'batchLabel', title: '推送批次', minWidth: 220, align: 'center', sort: true, templet: data => data.batchLabel || ''},
                {field: 'remark', title: '备注', minWidth: 200, align: 'center', sort: true,},
            ];
        }
        function renderTitle() {
            let conf = {
                el: 'div[name=titleIds]',
                autoRow: false,
                radio: true,
                filterable: true,
                direction: 'auto',
                size: 'small',
                clickClose: true,
                height: '300px',
                data: title_tree,
                prop: {
                    name: 'titleName',
                    value: 'titleId',
                },
                tree: {
                    show: true,
                    clickExpand: true,
                    clickCheck: true,
                    showFolderIcon: true,
                    showLine: true,
                    indent: 20,
                    simple: true,
                    strict: false
                },
                theme: {
                    color: '#5FB878'
                },
                model: {
                    type: 'fixed',
                    icon: 'hidden',
                    label: {
                        type: 'text'
                    }
                },
            };
            gTitleSel = xmSelect.render(conf);
        }
    });
</script>
