<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>audit.qinghai-1</title>
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->

    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <!--<script type="text/javascript" src="/pages/mod/js/mng.js"></script>-->
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <link rel="stylesheet" href="https://testkjpt.wsglw.net/pages/mod/css/queryarea.css" media="all">
    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
    </style>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block">
                            <select name="cmeYear" id="cmeYearSelector" lay-verify="">
                                <!-- don't have all option -->
                                <!--<option value="">全部</option>-->
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="personNo" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">证件号</label>
                        <div class="layui-input-block">
                            <input type="text" name="certId" lay-verify="" autocomplete="off"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">专业</label>
                        <div class="layui-input-block">
                            <div id="specTreeSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block">
                            <input type="text" name="deptName" id="deptNameInput" placeholder=""
                                   autocomplete="off" class="layui-input"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">职称级别</label>
                        <div class="layui-input-block">
                            <select name="titleLevelId" lay-verify="">
                                <option value="">全部</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">达标结果</label>
                        <div class="layui-input-block">
                            <select name="passResult">
                                <option value="">全部</option>
                                <option value="1">达标</option>
                                <option value="0">不达标</option>
                                <option value="2">其它</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="padding: 0 2px;">公需课<br>同步状态</label>
                        <div class="layui-input-block">
                            <select name="synced">
                                <option></option>
                                <option value="1">已同步</option>
                                <option value="0">未同步</option>
                            </select>
                        </div>
                    </div>
                    <!--<div class="layui-inline">-->
                    <!--    <label class="layui-form-label">score_state</label>-->
                    <!--    <div class="layui-input-block">-->
                    <!--        <select name="score_state">-->
                    <!--            <option></option>-->
                    <!--            <option value="161">161-推送成功</option>-->
                    <!--            <option value="162">162-推送失败</option>-->
                    <!--            <option value="0">0-未提交</option>-->
                    <!--            <option value="123">123-单位提交</option>-->
                    <!--            <option value="143">143-地市通过</option>-->
                    <!--            <option value="153">153-省委通过</option>-->
                    <!--            <option value="122">122-审核不通过</option>-->
                    <!--            <option value="171">171-提交人社成功</option>-->
                    <!--            <option value="172">172-提交人社失败</option>-->
                    <!--        </select>-->
                    <!--    </div>-->
                    <!--</div>-->
                    <div class="layui-inline">
                        <label class="layui-form-label">推送状态</label>
                        <div class="layui-input-block">
                            <select name="scoreState1">
                                <option></option>
                                <option value="x">未推送</option>
                                <option value="1">推送成功</option>
                                <option value="2">推送失败</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label" style="padding: 0 2px;">年度审验<br>状态</label>
                        <div class="layui-input-block">
                            <select name="scoreState2">
                                <option></option>
                                <option value="0" class="only_gov">待本级审核</option>
                                <option value="x">未提交</option>
                                <option value="123">单位提交</option>
                                <option value="143">地市审核通过</option>
                                <option value="153">省卫健委审核通过</option>
                                <option value="122">审核不通过</option>
                                <option value="171">提交人社成功</option>
                                <option value="172">提交人社失败</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <button class="layui-btn layui-btn-sm" lay-submit
                            onclick="refreshTable({page: {curr: 1}})" style="margin:auto 0">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </button>
                </div>
            </div>
        </div>
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea2" style="">
            <!-- row1 -->
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block" id="year_checkbox_container">
                            <!--<input type="checkbox" name="cmeYear[2022]" value="2022" title="2022" lay-skin="primary" lay-filter="cmeYearCheckBox">-->
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit
                                onclick="exportPdfMulti()" style="margin:auto 0">
                            <i class="layui-icon layui-icon-export layuiadmin-button-btn"></i>导出学习档案（多年度）
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="qhcTable" lay-filter="qhcTable"
                   style="margin: 0;"></table>
        </div>
    </div>
</div>
<div style="display: none" id="dldp">
    <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
        <div class="layui-progress-bar" lay-percent="0%"></div>
    </div>
</div>
</body>
<script type="text/html" id="checkStepCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="glance">浏览</a>
</script>
<script type="text/html" id="scoreDetailCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="scoreDetail">学分明细</a>
</script>
<!-- toolbar -->
<script type="text/html" id="qhcTableToolbar">
    <div id="unitToolbar" style="display: none">
        <div class="layui-input-inline">
            <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
        </div>
        <a class='layui-btn layui-btn-sm' lay-event='submitbatch'>提交</a>
        <li class="layui-input-inline" style="float: right;">
            <a class="layui-btn layui-btn-xs btn-row a-pdf-icon" lay-event="exportPdf">导出终审通过人员学习档案</a>
            <a class="layui-btn layui-btn-xs btn-row a-excel-icon" lay-event="all_excel">导出列表</a>
            <a class="layui-btn layui-btn-xs btn-row a-excel-icon" lay-event="pass_excel">导出终审通过人员列表</a>
        </li>
    </div>
    <div id="govToolbar" style="display: none">
        <div class="layui-input-inline">
            <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
        </div>
        <a class='layui-btn layui-btn-sm only_province hide' lay-event='pushBatch' id="push_btn">推送</a>
        <a class='layui-btn layui-btn-sm' lay-event='approve'>审核通过</a>
        <a class='layui-btn layui-btn-sm layui-btn-danger' lay-event='back'>审核不通过</a>
        <li class="layui-input-inline" style="float: right;">
            <a class="layui-btn layui-btn-xs btn-row a-excel-icon" lay-event="all_excel">导出列表</a>
            <a class="layui-btn layui-btn-xs btn-row a-excel-icon" lay-event="pass_excel">导出终审通过人员列表</a>
        </li>
    </div>
</script>
<script type="text/javascript" src="/pages/mod/audit/js/qinghai1.js"></script>
<style>
    .a-excel-icon {
        background: transparent url(/img/icon_excel.gif) center left no-repeat;
        padding-left: 18px;
    }
    .a-pdf-icon {
        background: transparent url(/img/icon_pdf.gif) center left no-repeat;
        padding-left: 18px;
    }
    #queryArea2 {
        padding-top: 0;
        padding-bottom: 0;
        height: auto;
    }
    .layui-btn-disabled, .layui-btn-disabled:active, .layui-btn-disabled:hover {
        background-color: #d2d2d2 !important;
        color: #fff !important;
    }
</style>
</html>
