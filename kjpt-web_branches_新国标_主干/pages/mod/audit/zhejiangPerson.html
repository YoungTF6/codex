<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>浙江多年度审验个人版</title>
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-table-tool-temp {
            padding-right: 0;
        }
    </style>
</head>
<body style="background-color: white;">
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-form layui-card-header layuiadmin-card-header-auto">
                <!-- row1 -->
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label">年度</label>
                            <div class="layui-input-block" id="year_checkbox_container"></div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <button class="layui-btn layui-btn-sm" id="exportPdfBtn" style="margin:auto 0">
                                <i class="layui-icon layui-icon-export layuiadmin-button-btn"></i>导出PDF
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <div style="display: none" id="dldp">
        <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
            <div class="layui-progress-bar" lay-percent="0%"></div>
        </div>
    </div>
</body>
<script>
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        verifyScore: 'verifyScore',
        tool: 'tool',
    });

    layui.use(['verifyScore','layer','form','tool','element'], function () {
        const verifyScore = layui.verifyScore;
        const form = layui.form;
        const tool = layui.tool;
        const element = layui.element;
        let isClick = false;

        let bindBtn = function () {
            $('#exportPdfBtn').on('click', function () {
                if (isClick) {
                    return false;
                }
                let cmeYears = verifyScore.getCheckBox('cmeYear');
                if (!cmeYears || cmeYears.length == 0) {
                    layer.msg("请选择年度", {icon: 0, time: 2000});
                    return false;
                }
                if (cmeYears.length > 5) {
                    layer.msg("最多选择五个年度", {icon: 0, time: 2000});
                    return false;
                }
                let visit = huayi_sjwh_url + 'audit/pdf/down'; // zhejiang-2 comPersonIds
                let personInfo = JSON.parse(localStorage.getItem('kk_psninfo') || '{}');
                let params = {
                    'pdfType': 2,
                    'standardKindId': localStorage.getItem('standardkind-id'),
                    'comPersonIds': personInfo.comPersonId,
                    'cmeYear': '2023',
                    'cmeYears': cmeYears.join(','),
                    'multiYear': true,
                    'unitId': localStorage.getItem('unit-id'),
                    'depth': 1
                };
                isClick = true;
                let index = verifyScore.openDldp();
                
                tool.exportExcelPost(visit, params, '继续医学教育学分验证证明.pdf',()=>{
                    isClick = false;
                    verifyScore.closeDldp(index);
                });
            })
        }

        let htmlInit = function () {
            verifyScore.addWatermark('浙江省');
            verifyScore.renderYearBox('#year_checkbox_container', new Date().getFullYear());
            bindBtn();
        }

        htmlInit();

    })
</script>
</html>
