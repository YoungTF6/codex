<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>audit.henan-1</title>
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <!--<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">-->
    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <!-- 2.6.4 -->
    <!--<link rel="stylesheet" href="/js/layui-v2.6.4/layui/css/layui.css" media="all">-->
    <!--<script type="text/javascript" src="/js/layui-v2.6.4/layui/layui.js"></script>-->
    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-table-tool-temp {
            padding-right: 0;
        }
    </style>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block">
                            <select name="cmeYear">
                                <option value="2025" selected>2025</option>
                                <option value="2024">2024</option>
                                <option value="2023">2023</option>
                                <option value="2022">2022</option>
                                <option value="2021">2021</option>
                                <option value="2020">2020</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_unit only_not_person">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block">
                            <div id="deptIdSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="number" name="personNo" placeholder="请输入" autocomplete="off"
                                   class="layui-input"/>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">人员姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" placeholder="请输入" autocomplete="off"
                                   class="layui-input"/>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">达标情况</label>
                        <div class="layui-input-block">
                            <select name="passResult">
                                <option value=""></option>
                                <option value="1">达标</option>
                                <option value="0">不达标</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">上报状态</label>
                        <div class="layui-input-block">
                            <select name="reportState">
                                <option value=""></option>
                                <option value="90">未上报</option>
                                <option value="91">已上报</option>
                                <option value="92">撤回</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">审核状态</label>
                        <div class="layui-input-block">
                            <select name="lastState">
                                <option value=""></option>
                                <option value="100">待本级审核</option>
                                <option value="0">未审核</option>
                                <option value="3">审核通过</option>
                                <option value="2">审核不通过</option>
                                <option value="1">审核退回</option>
                                <option value="99">已推送人社</option>
                                <option value="98">推送人社失败</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">职称级别</label>
                        <div class="layui-input-block" style="width: 169px;">
                            <select name="titleLevel">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name="titleId" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline only_not_person">
                        <label class="layui-form-label">人员状态</label>
                        <div class="layui-input-block">
                            <select name="personStateId">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline only_gov only_not_person">
                        <label class="layui-form-label">参审人员<br>上报类别</label>
                        <div class="layui-input-block">
                            <select name="category">
                                <option value=""></option>
                                <option value="1">西医</option>
                                <option value="2">中医</option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员类别</label>
                        <div class="layui-input-block">
                            <select name="medicaltype">
                                <option value="">全部</option>
                                <option value="1">西医类别</option>
                                <option value="2">中医类别</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm btnRounded" lay-submit onclick="refreshAuditTable({page: {curr: 1}})">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="auditTable" lay-filter="auditTable" style="margin: 0;"></table>
        </div>
    </div>
</div>
<div style="display: none" id="dldp">
    <div class="layui-progress layui-progress-big" lay-showpercent="true" lay-filter="dldp">
        <div class="layui-progress-bar" lay-percent="0%"></div>
    </div>
</div>
</body>
<!-- operation cell-->
<script type="text/html" id="operationCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="detail">详细情况明细</a>
    <a class="layui-btn layui-btn-xs btn-row" lay-event="collect">各类学分汇总</a>
    {{# if(canRecall(d)) { }}
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row hide only_unit only_not_person" lay-event="recall">撤回</a>
    {{# } else { }}
    <a class="layui-btn layui-btn-xs btn-row layui-btn-disabled btn-disabled-row hide only_unit only_not_person">撤回</a>
    {{# } }}
    {{# if(canPushAgain(d)) { }}
    <a class="layui-btn layui-btn-xs btn-row hide only_gov only_not_person" lay-event="pushAgain">二次推送</a>
    {{# } else { }}
    <a class="layui-btn layui-btn-xs btn-row layui-btn-disabled btn-disabled-row hide only_gov only_not_person">二次推送</a>
    {{# } }}
</script>
<!-- toolbar -->
<script type="text/html" id="tableToolbar">
    <div class="layui_mess">
        <div class="layui_display">
            <div class="layui-input-inline only_not_person">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选"
                       lay-filter="layTableAllChoose">
            </div>
            <a class='layui-btn layui-btn-sm hide only_unit only_not_person' lay-event='reportEn'>上报西医</a>
            <a class='layui-btn layui-btn-sm hide only_unit only_not_person' lay-event='reportZh'>上报中医</a>
            <a class='layui-btn layui-btn-sm hide only_gov' lay-event='approve'>审核通过</a>
            <!--<a class='layui-btn layui-btn-sm layui-btn-danger hide only_gov' lay-event='reject'>审核不通过</a>-->
            <a class='layui-btn layui-btn-sm layui-btn-danger hide only_gov' lay-event='back'>审核退回</a>
            <!--<li class="layui-input-inline" style="float: right;margin-right: -80px">-->
            <!--    <a class="layui-btn layui-btn-xs btn-row a-excel-icon" lay-event="exportList">导出终审通过人员列表</a>-->
            <!--</li>-->
            <li class="layui-input-inline hide only_pdfc" style="float: right;margin-left: 10px">
                <a class="layui-btn layui-btn-xs btn-row a-pdf-icon" lay-event="downpdf_c">下载证书(按查询条件下载已达标且审核通过人员的证书)</a>
            </li>
            <li class="layui-input-inline hide only_pdfp" style="float: right;margin-left: 10px">
                <a class="layui-btn layui-btn-xs btn-row a-pdf-icon" lay-event="downpdf_p">年度合格证书</a>
            </li>
        </div>
    </div>
</script>
<script type="text/javascript" src="/pages/mod/audit/js/henan1.js"></script>
<style>
    /* 隐藏`input.number`箭头 */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none !important;
    }
    input[type='number'] {
        -moz-appearance: textfield;
    }
    /**/
    .layui-form-select {
        width: 166px !important;
    }
    .a-excel-icon {
        background: transparent url(/img/icon_excel.gif) center left no-repeat;
        padding-left: 18px;
    }
    .a-pdf-icon {
        background: transparent url(/img/icon_pdf.gif) center left no-repeat;
        padding-left: 18px !important;
    }
    .layui-btn + .layui-btn {
        margin-left: 0 !important;
    }
    .layui-btn-xs {
        padding: 0 2px;
    }
    div.layui-table-cell:has(a[lay-event=detail]) {
        padding: 0 2px !important;
    }
</style>
</html>
