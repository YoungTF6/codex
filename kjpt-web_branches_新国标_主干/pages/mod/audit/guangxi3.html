<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block" style="width:186px;">
                            <select name="cmeYear" id="cmeYearSelector" lay-verify="" lay-filter="cmeYear">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm btnRounded" lay-submit
                                onclick="refreshTable()">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">

<!-- checkbox cell -->
<script type="text/html" id="checkboxTpl">
    <input type="checkbox" name="select_one" lay-filter="select_one" title="" lay-skin="primary"
           data-id="{{ d.projId }}">
</script>
<!-- toolbar -->
<script type="text/html" id="tableToolbar">
    <div class="layui_mess">
        <div class="layui_display">
            <div class="layui-input-inline">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选"
                       lay-filter="layTableAllChoose">
            </div>
            <li class="layui-input-inline" style="margin-left: 10px">
                <a class="layui-btn layui-btn-sm" lay-event="downAuditPdfBatch">导出PDF</a>
            </li>
            <li class="layui-input-inline" style="margin-left: 10px">
                <span style="color:red">有效学分可以进行证书打印</span>
            </li>
        </div>
    </div>
</script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        window.refreshTable = refreshTable;
        layer.ready(function () {
            lat.verifyTenancy(_isGuangxi);
            watermark.set('广西壮族自治区');
            lat.renderCmeYear('select[name=cmeYear]');
        });
        $(function () {
            renderTable();
        });
        table.on('toolbar(scoreTable)', function (obj) {
            let checkStatus = table.checkStatus(obj.config.id);
            let selectedRowArr = checkStatus.data;
            selectedRowArr = selectedRowArr.filter(row => {
                return '' === canExport(row);
            });
            if (selectedRowArr.length < 1) {
                lat.failMsg('先选择学分，再导出证书');
                return false;
            }
            if ('downAuditPdfBatch' === obj.event) {
                let visit = huayi_sjwh_url + 'audit/pdf/down'; // 广西-3 scoreIds
                let selYear = $('select[name=cmeYear]').val();
                let scoreIds = selectedRowArr.map(row => row.scoreId).join(',');
                let params = {
                    'standardKindId': _standardKindId,
                    'pdfType': 3,
                    'unitId': _unitId,
                    'scoreIds': scoreIds,
                    'comPersonIds': _pid,
                    'cmeYear': selYear,
                    'cmeYears': selYear,
                    'personCmeYear': selYear,
                    'multiYear': false,
                }
                lat.downloadWithProgress(visit, params, '学分证书.pdf');
            }
        });
        function getSifter() {
            let cmeYear = $('select[name=cmeYear]').val()
            return {
                'scoreTypeVal': 7,
                'cmeYear': cmeYear,
                'comPersonId': _pid,
                'startDate': cmeYear + '-01-01 00:00:00',
                'endDate': cmeYear + '-12-31 23:59:59',
            };
        }
        function renderTable() {
            table.render({
                elem: '#scoreTable',
                id: 'scoreTable',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                height: 'full-178',
                url: huayi_projectscore_url + 'pgsi/score/page/byperson',
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                toolbar: '#tableToolbar',
                defaultToolbar: [],
                cols: [[
                    {
                        title: '选择', width: 60, align: 'center', fixed: 'left', templet: (data) => {
                            let msg = canExport(data);
                            if (!msg) {
                                return '<input type="checkbox" name="layTableCheckbox" lay-skin="primary">';
                            } else {
                                return '<img src="/pages/mod/img/checkbox-disable.png" style="width:24px;" alt="' + msg + '" onmouseenter="showTips(this)" onmouseleave="closeTips()"/>';
                            }
                        }
                    },
                    {title: '选择1', width: 60, align: 'center', type: 'checkbox', hide: true},
                    {
                        field: 'scoreTypeVal',
                        title: '学分类型',
                        minWidth: 135,
                        fixed: 'left',
                        align: 'center',
                        sort: true,
                        templet: (data) => _txt.scoreTypeVal(data.scoreTypeVal) + '学分'
                    },
                    {field: 'projName', title: '项目名称', minWidth: 135, fixed: 'left', align: 'center', sort: true},
                    {field: 'projNo', title: '项目编号', minWidth: 135, fixed: 'left', align: 'center', sort: true},
                    {field: 'scoreLevelName', title: '学分级别', minWidth: 120, align: 'center', sort: true},
                    {field: 'holdTypeName', title: '举办方式', minWidth: 120, align: 'center', sort: true},
                    {field: 'score', title: '学分', minWidth: 135, align: 'center', sort: true},
                    {field: 'period', title: '学时', minWidth: 135, align: 'center', sort: true},
                    {field: 'studyDate', title: '授分日期', minWidth: 120, align: 'center', sort: true},
                    {
                        field: 'teachUnitText',
                        title: '授分单位',
                        minWidth: 135,
                        align: 'center',
                        sort: true
                    },
                    {field: 'checkState', title: '审核状态', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.checkState(data)},
                    {field: 'checkUnitName', title: '审核单位', minWidth: 120, align: 'center', sort: true},
                    {field: 'checkTime', title: '审核时间', minWidth: 120, align: 'center', sort: true},
                    {field: 'ifAvail', title: '是否有效', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.ifAvail(data)},
                ]]
            });
        }
        function refreshTable() {
            table.reload('scoreTable', {
                where: getSifter()
            });
        }
        function canExport(row) {
            if (1 === row.ifAvail) return '';
            else return '学分无效';
        }
    });
</script>
