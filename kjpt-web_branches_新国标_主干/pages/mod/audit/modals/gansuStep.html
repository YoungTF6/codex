<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!--<div class="layui-card-header" style="text-align: center;font-weight:bold;font-size: 17px;" id="title">-->
        <!--    审批进度-->
        <!--</div>-->
        <div class="layui-card-body">
            <ul class="timeLine" id="step_ul">
            </ul>
        </div>
    </div>
</div>
</body>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let layer = layui.layer;
        let $ = layui.jquery;
        const _cmeYear = getOrDefault(getUrlParamByName("cmeYear"), '');
        const _comPersonId = getOrDefault(getUrlParamByName('comPersonId'), '');
        const _titleLevelId = getOrDefault(getUrlParamByName('titleLevelId'), '');
        const _promote = +getOrDefault(getUrlParamByName('promote'), '0');
        const _flow = getOrDefault(getUrlParamByName('flow'), '');
        layer.ready(function () {
            postAction(`${huayi_sjwh_url}/audit/gansu/step`, {
                'cmeYear': _cmeYear,
                'comPersonId': _comPersonId
            }).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        let arr = jsonRes.data;
                        let logArr = arr.filter(i => i.label === 'log');//.sort((a, b) => {});
                        let upwardArr = arr.filter(i => i.label === 'upward'); // .sort((a, b) => a.unitUserType - b.unitUserType);
                        //
                        let itemArr = Array(upwardArr[0]);
                        let lastUnitId = upwardArr[0]['unitId'];
                        if (logArr.length > 0) {
                            itemArr = [...logArr];
                            lastUnitId = logArr[logArr.length - 1]['unitId'];
                        }
                        //
                        let append = false;
                        upwardArr.forEach((item, idx) => {
                            if (append && _flow.includes('' + item.unitUserType)) {
                                itemArr.push(item);
                            }
                            if (!append) append = item.unitId === lastUnitId;
                        });
                        //
                        renderStep(itemArr);
                    }
                }
            )
        });
        function renderStep(arr) {
            let lis = '';
            arr.forEach(item => {
                console.info(JSON.stringify(item));
                let state = item.state || 0;
                let fs = state % 10;
                if (2 === fs) lis += red(item.unitName, item.createTime, item.opinion || '');
                else if (3 === fs) lis += green(item.unitUserType, item.unitName, item.createTime);
                else lis += gray(item.unitUserType, item.unitName);
            });
            let $ul = $('#step_ul');
            $ul.empty().html(lis);
        }
        function red(unitName, createTime, opinion) {
            return `<li class="layui-anim">
                <p class="timeLineNoPass">审核不通过<span class="noPass">${createTime}</span></p>
                <div class="conNoPass"></div>
                <div class="conNoPassfont">
                ${unitName}<br/>
                意见:<a href="#" title="${opinion}" style="color: red;">${opinion.substring(0, 10) + '...'}</a>
                </div>
                </li>`;
        }
        function green(uut, unitName, createTime) {
            let txt = '审核通过';
            if (2 === uut) txt = '提交';
            return `<li class="layui-anim">
                <p class="timeLineAuditP">${txt}<span class="audit">${createTime}</span></p>
                <div class="conaudit"></div>
                <div style="width: 190px;" class="conauditfont">${unitName}</div>
                </li>`;
        }
        function gray(uut, unitName) {
            let txt = '待审核';
            if (2 === uut) txt = '待提交';
            return `<li class="layui-anim">
                <p class="timeLineAwaitP">${txt}<span class="audit"></span></p>
                <div class="conawait"></div>
                <div class="conawaitfont">${unitName}</div>
                </li>`;
        }
    });
</script>
