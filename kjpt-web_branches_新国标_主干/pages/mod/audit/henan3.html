<script type="text/html" id="tableToolbar">
    <div class="layui_mess">
        <div class="layui_display">
            <div class="layui-input-inline">
                <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选"

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let gLayerIndex = -1;
        window.refreshTable = refreshTable;
        $(function () {
            lat.verifyTenancy(_isHenan);
            watermark.set('河南省卫生健康委员会');
            lat.renderCmeYear('#cmeYearSelector');
            //
            renderScoreTable();
        });
        function onDownload(score) {
            // if (Number(score.maxSeq) >= 0) {
            //     return '';
            // }
            // return '项目未开启下载证书功能';
            return '';
        }
        function canDownload(score) {
            if (1 !== Number(score.ifAvail)) {
                return '只能导出有效学分';
            }
            return '';
        }
        function renderScoreTable() {
            table.render({
                id: 'scoreTable',
                elem: '#scoreTable',
                height: 'full-100',
                toolbar: _isJiaozuo ? '#tableToolbar' : '',
                defaultToolbar: [],
                url: huayi_projectscore_url + 'pgsi/score/page/byperson',
                method: 'POST',
                contentType: 'application/json',
                loading: true,
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                request: {
                    pageName: 'pageNum', // 页码的参数名称，默认：page
                    limitName: 'pageSize' // 每页数据量的参数名，默认：limit
                },
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    };
                },
                cols: [[
                    {
                        title: '选择',
                        width: 60,
                        align: 'center',
                        // fixed: 'left',
                        hide: !_isJiaozuo,
                        templet: (data) => {
                            let msg = canDownload(data);
                            if (!msg) {
                                return '<input type="checkbox" name="layTableCheckbox" lay-skin="primary">';
                            } else {
                                return '<img src="/img/checkbox-disable.png" style="width:24px;" alt="' + msg + '" onmouseenter="showTips(this)" onmouseleave="closeTips()"/>';
                            }
                        }
                    },
                    {title: '选择1', width: 60, align: 'center', fixed: 'left', type: 'checkbox', hide: true},
                    {
                        field: 'scoreTypeVal',
                        title: '学分类型',
                        minWidth: 120,
                        align: 'center',
                        sort: true,
                        templet: (data) => _txt.scoreTypeVal(data.scoreTypeVal) + '学分'
                    },
                    {field: 'projNo', title: '项目编号', minWidth: 120, align: 'center', sort: true},
                    {field: 'projName', title: '项目名称', minWidth: 120, align: 'center', sort: true},
                    {field: 'scoreLevelName', title: '学分级别', minWidth: 120, align: 'center', sort: true},
                    {field: 'period', title: '学时', minWidth: 120, align: 'center', sort: true},
                    {field: 'score', title: '学分', minWidth: 120, align: 'center', sort: true},
                    {field: 'studyDate', title: '授分日期', minWidth: 120, align: 'center', sort: true},
                    {field: 'teachUnitText', title: '授分单位', minWidth: 120, align: 'center', sort: true},
                    {field: 'checkState', title: '审核状态', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.checkState(data)},
                    {field: 'checkUnitName', title: '审核单位', minWidth: 120, align: 'center', sort: true},
                    {field: 'checkTime', title: '审核时间', minWidth: 120, align: 'center', sort: true},
                    {field: 'ifAvail', title: '是否有效', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.ifAvail(data)},
                ]],
                data: [{
                    personNo: "123"
                }],
                done: function (res, curr, count) {
                    let scoreVoList = res.data;
                    if (scoreVoList && scoreVoList.length > 9999999) {
                        let scoreIdArr = scoreVoList.map(s => s.scoreId);
                        let visit = huayi_sjwh_url + 'audit/seq/proj/cert/max';
                        postAction(visit, {scoreIdList: scoreIdArr}).then(response => {
                            let jsonRes = response.data;
                            let seqVoList = jsonRes.data;
                            if (jsonRes.success && seqVoList) {
                                let scoreIdSeq = {};
                                seqVoList.forEach(i => scoreIdSeq[i.scoreId] = i.seq);
                                //
                                scoreVoList.forEach((scoreVo, idx) => {
                                    scoreVo.maxSeq = scoreIdSeq[scoreVo.scoreId];
                                    let msg = onDownload(scoreVo) || canDownload(scoreVo);
                                    if (msg) {
                                        let str = '<img src="/img/checkbox-disable.png" style="width:24px;" alt="' + msg + '" onMouseEnter="showTips(this)" onMouseLeave="closeTips()">';
                                        $('tr[data-index=' + idx + '] .laytable-cell-1-0-0').html(str);
                                    } else {
                                    }
                                });
                            }
                        }).catch(error => {
                            lat.errorMsg('error:projCertSeqMax');
                        }).finally(() => {
                        });
                    }
                }
            });
        }
        table.on('toolbar(scoreTable)', function (obj) {
            let checkStatus = table.checkStatus(obj.config.id);
            let selectedRowArr = checkStatus.data;
            let selScoreIds = selectedRowArr.filter(row => !onDownload(row) && !canDownload(row)).map(row => row.scoreId).join(',');
            let selComPersonIds = selectedRowArr.filter(row => !onDownload(row) && !canDownload(row)).map(row => row.comPersonId).join(',');
            if ('downAuditPdfBatch' === obj.event) {
                if (selScoreIds) {
                    let visit = huayi_sjwh_url + 'audit/pdf/down'; // 河南-3 scoreIds
                    let selYear = $('select[name=cmeYear]').val();
                    let params = {
                        "standardKindId": _standardKindId,
                        "unitId": _unitId,
                        "pdfType": 3,
                        "scoreIds": selScoreIds,
                        "comPersonIds": selComPersonIds,
                        // "cmeYear": selYear,
                        "cmeYears": selYear,
                        "cityUnitId": '160900', // 焦作
                    };
                    lat.downloadWithProgress(visit, params, '继续医学教育证书.pdf');
                } else {
                    lat.failMsg('先选择学分');
                }
            }
        });
        function getSifter() {
            let cmeYear = $('select[name=cmeYear]').val();
            return {
                scoreTypeVal: 4,
                scoreLevel: $('select[name=scoreLevelId]').val(),
                cmeYear: cmeYear,
                startDate: cmeYear + '-01-01 00:00:00',
                endDate: cmeYear + '-12-31 23:59:59',
                comPersonId: _pid,
            };
        }
        function refreshTable() {
            table.reload('scoreTable', {
                where: getSifter()
            });
        }
    });
</script>
