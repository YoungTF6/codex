<script type="text/javascript">
    // 面向市内/区、县级实践活动申报：tab 标题及表单标签中的“项目”改为“活动”
    (function () {
        var GD_CITY_SCORE_LEVEL_ID = '95b9ef88-7265-11f0-adb9-005056a64c01';   // 面向市内开展的实践活动
        var GD_COUNTY_SCORE_LEVEL_ID = '3037222a-2e5d-11f1-a586-005056a64c01'; // 区、县级继教实践活动
        var scoreLevelId = getUrlParamByName('score_level_id');
        if ([GD_CITY_SCORE_LEVEL_ID, GD_COUNTY_SCORE_LEVEL_ID].indexOf(scoreLevelId) === -1) {
            return;
        }
        // 仅替换元素直接文本节点中的“项目”，保留必填星号 <span> 等子元素
        function replaceProjInDirectText(el) {
            for (var i = 0; i < el.childNodes.length; i++) {
                var node = el.childNodes[i];
                if (node.nodeType === 3 && node.nodeValue.indexOf('项目') > -1) {
                    node.nodeValue = node.nodeValue.replace(/项目/g, '活动');
                }
            }
        }
        // 处理 tab 标题与表单标签
        function applyReplace(root) {
            jQuery(root).find('.page-tab-title > li, label').each(function () {
                replaceProjInDirectText(this);
            });
        }
        jQuery(function () {
            applyReplace(document);
            // page2/3/4 通过 iframe onload 异步内联进 DOM，监听后补充替换
            var content = document.querySelector('.page-tab-content');
            if (content && window.MutationObserver) {
                var observer = new MutationObserver(function (mutations) {
                    for (var i = 0; i < mutations.length; i++) {
                        var added = mutations[i].addedNodes;
                        for (var j = 0; j < added.length; j++) {
                            if (added[j].nodeType === 1) {
                                applyReplace(added[j]);
                            }
                        }
                    }
                });
                observer.observe(content, {childList: true, subtree: true});
            }
        });
    })();
</script>
<script type="text/javascript" src="/pages/mod/declare/js/report.js"></script>
<script type="text/javascript">
    const validateProgressLength = (value, min, max) => {
        let len = (value || '').length;
        if (len < min) return `不少于${min}字`;
        if (len > max) return `最多${max}字`;
    };
    const gdGzPractice = {
        cityScoreLevelId: '95b9ef88-7265-11f0-adb9-005056a64c01',
        countyScoreLevelId: '3037222a-2e5d-11f1-a586-005056a64c01',
        titleLevel: {
            middle: 'da42823c-796c-4377-a616-9b2f01271376',
            deputySenior: '6351aa8b-bba0-4805-99ca-9b2f01271376',
            senior: '3d5f8e06-1274-454c-9c55-9b2f01271376'
        },
        getScoreLevelId: function (scoreLevelId) {
            return scoreLevelId || _dbase.info.scoreLevelId || getUrlParamByName('score_level_id') || '';
        },
        isTargetScoreLevel: function (scoreLevelId) {
            scoreLevelId = this.getScoreLevelId(scoreLevelId);
            return [this.cityScoreLevelId, this.countyScoreLevelId].includes(scoreLevelId);
        },
        isGuangzhouUnit: function () {
            const gzId = '190100';
            let topUnitId = getUrlParamByName('top_unit_id');
            if (!topUnitId || topUnitId === '000000') {
                const detail = typeof gProjectDetail !== 'undefined' ? gProjectDetail : {};
                topUnitId = detail.previousCheckUnitId || detail.priviousCheckUnitId || '';
            }
            if (topUnitId && topUnitId !== '000000' && topUnitId === gzId) {
                return true;
            }
            return _unitUpward.includes('190100');
        },
        isEnabled: function (scoreLevelId) {
            return this.isTargetScoreLevel(scoreLevelId) && this.isGuangzhouUnit();
        },
        validateCoursePeriod: function (period) {
            const periodNum = Number(period);
            if (!isNaN(periodNum) && periodNum > 3) {
                return '讲授学时最大为3';
            }
            return '';
        },
        validatePeriodVsDays: function (days, totalPeriod) {
            const dayNum = Number(days);
            const periodNum = Number(totalPeriod);
            if (isNaN(periodNum) || periodNum <= 0) {
                return '';
            }
            if (isNaN(dayNum) || dayNum <= 0) {
                return '请先填写举办周期';
            }
            if (dayNum * 6 < periodNum) {
                return '举办天数不满足要求';
            }
            return '';
        },
        isCityLevel: function (scoreLevelId) {
            return this.getScoreLevelId(scoreLevelId) === this.cityScoreLevelId;
        },
        maxScore: function (scoreLevelId) {
            if (!this.isEnabled(scoreLevelId)) return 10;
            return this.isCityLevel(scoreLevelId) ? 2 : 1;
        },
        allowedTitleLevels: function (scoreLevelId) {
            return this.isCityLevel(scoreLevelId)
                ? [this.titleLevel.deputySenior, this.titleLevel.senior]
                : [this.titleLevel.middle, this.titleLevel.deputySenior, this.titleLevel.senior];
        },
        isAllowedTitleNode: function (node, scoreLevelId) {
            if (!node) return false;
            if (node.titleLevel) return this.allowedTitleLevels(scoreLevelId).includes(node.titleLevel);

            const levelNum = parseInt(node.level);
            if (isNaN(levelNum)) return false;
            return this.isCityLevel(scoreLevelId) ? levelNum > 2 : levelNum > 1;
        },
        filterTitleTree: function (titleTreeData, scoreLevelId) {
            if (!this.isEnabled(scoreLevelId) || !Array.isArray(titleTreeData)) return titleTreeData;
            const that = this;
            const filterNodes = function (nodes) {
                return (nodes || []).map(function (node) {
                    const nextNode = $.extend(true, {}, node);
                    nextNode.children = filterNodes(nextNode.children || []);

                    if (that.isAllowedTitleNode(nextNode, scoreLevelId) || nextNode.children.length > 0) {
                        return nextNode;
                    }
                    return null;
                }).filter(function (node) {
                    return !!node;
                });
            };
            return filterNodes(titleTreeData);
        },
        findTitleNode: function (titleTreeData, titleId) {
            if (!titleTreeData || !titleId) return null;
            for (let i = 0; i < titleTreeData.length; i++) {
                const node = titleTreeData[i];
                if (node.titleId === titleId) return node;
                const child = this.findTitleNode(node.children || [], titleId);
                if (child) return child;
            }
            return null;
        },
        getPage4Root: function () {
            const $form = $('#page4-form');
            if ($form.length) {
                return $form;
            }
            const iframe = document.querySelector('iframe[name=ifm4], iframe[src*="declare4th"]');
            if (iframe && iframe.contentDocument) {
                return $(iframe.contentDocument).find('#page4-form');
            }
            return $form;
        },
        getCycleDays: function () {
            const $root = this.getPage4Root().length ? this.getPage4Root().closest('#projectDetailPage4') : $(document);
            const $scope = $root.length ? $root : $(document);
            const startStr = $scope.find('input[name="dateStart"]').eq(0).val();
            const endStr = $scope.find('input[name="dateEnd"]').eq(0).val();
            if (!startStr || !endStr) {
                return 0;
            }
            const start = moment(startStr);
            const end = moment(endStr);
            if (!start.isValid() || !end.isValid()) {
                return 0;
            }
            return end.diff(start, 'days') + 1;
        },
        getDaysFromCycleArr: function (cycleArr) {
            if (!cycleArr || !cycleArr.length) return 0;
            const startStr = cycleArr[0].dateStart || '';
            const endStr = cycleArr[0].dateEnd || '';
            if (!startStr || !endStr) return 0;
            const start = moment(startStr);
            const end = moment(endStr);
            if (!start.isValid() || !end.isValid()) return 0;
            return end.diff(start, 'days') + 1;
        },
        getCourseTotalPeriod: function (courseArr, calc) {
            let total = 0;
            if (courseArr && courseArr.length > 0) {
                for (let i = 0, len = courseArr.length; i < len; i++) {
                    const period = Number(courseArr[i].period);
                    if (!isNaN(period)) {
                        total = accAdd(total, period);
                    }
                }
                if (total > 0) return total;
            }
            calc = calc || (typeof _dbase !== 'undefined' ? _dbase.calc : null);
            if (!calc) return 0;
            return accAdd(calc.period_ll || 0, calc.period_sy || 0);
        },
        validateSavedDaysVsCourses: function (courseArr, calc) {
            if (!this.isEnabled()) return '';
            const ctx = {
                calc: calc || _dbase.calc,
                projectDetail: typeof gProjectDetail !== 'undefined' ? gProjectDetail : {},
                courseArr: courseArr || [],
                cycleArr: typeof gCycleArr !== 'undefined' ? gCycleArr : []
            };
            const days = this.getDays({}, ctx);
            if (days <= 0) return '';
            const totalPeriod = this.getCourseTotalPeriod(courseArr, ctx.calc);
            return this.validatePeriodVsDays(days, totalPeriod);
        },
        getTotalPeriod: function (ctx) {
            const $form = this.getPage4Root();
            const formPeriod = Number($form.find('input[name=period]').val());
            const calcPeriod = Number(ctx.calc && ctx.calc.period);
            const detailPeriod = Number(ctx.projectDetail && ctx.projectDetail.period);
            const courseTotal = (ctx.courseArr || []).reduce(function (total, course) {
                const period = Number(course.period);
                return isNaN(period) ? total : accAdd(total, period);
            }, 0);
            if (!isNaN(calcPeriod) && calcPeriod > 0) return calcPeriod;
            if (!isNaN(formPeriod) && formPeriod > 0) return formPeriod;
            if (!isNaN(detailPeriod) && detailPeriod > 0) return detailPeriod;
            if (courseTotal > 0) return courseTotal;
            return 0;
        },
        getDays: function (params, ctx) {
            ctx = ctx || {};
            const $form = this.getPage4Root();
            const formDays = Number($form.find('input[name=days]').val());
            const calcDays = Number(ctx.calc && ctx.calc.days);
            const detailDays = Number(ctx.projectDetail && ctx.projectDetail.days);
            const paramDays = Number(params && params.days);
            const cycleDays = this.getCycleDays();
            const cycleArr = ctx.cycleArr || (typeof gCycleArr !== 'undefined' ? gCycleArr : []);
            const cycleArrDays = this.getDaysFromCycleArr(cycleArr);
            if (!isNaN(paramDays) && paramDays > 0) return paramDays;
            if (!isNaN(formDays) && formDays > 0) return formDays;
            if (!isNaN(calcDays) && calcDays > 0) return calcDays;
            if (!isNaN(detailDays) && detailDays > 0) return detailDays;
            if (cycleDays > 0) return cycleDays;
            if (cycleArrDays > 0) return cycleArrDays;
            return 0;
        }
    };
    $.extend(true, _dbase, {
        var: {
            cycleLimit: gdGzPractice.isEnabled() ? 1 : _dbase.var.cycleLimit
        },
        _courseTableColArr: [
            {field: 'teacherName', title: '姓名', align: 'center', minWidth: 90, edit: 'text', sort: false, hide: false, fixed: 'left'},
            {field: 'certType', title: '证件类型', align: 'center', minWidth: 145, sort: false, hide: false, templet: '#courseCertTypeCell'},
            {field: 'idCardNo', title: '证件号码', align: 'center', minWidth: 180, edit: 'text', sort: false, hide: false},
            {field: 'titleId', title: '专业技术职务', align: 'center', minWidth: 123, sort: false, hide: false, templet: '#courseTitleIdCell'},
            {field: 'researchDirection', title: '主要研究方向', align: 'center', minWidth: 123, edit: 'text', sort: false, hide: false},
            {field: 'workUnit', title: '所在单位', align: 'center', minWidth: 120, edit: 'text', sort: false, hide: false},
            {field: 'teachTopic', title: '讲授题目', align: 'center', minWidth: 200, edit: 'text', sort: false, hide: false},
            {field: 'content', title: '内容', align: 'center', minWidth: 400, edit: 'text', sort: false, hide: false},
            {field: 'period', title: '讲授学时', align: 'center', minWidth: 95, edit: 'text', sort: false, hide: false},
            {field: 'teachingMethod', title: '教学方法', align: 'center', minWidth: 143, sort: false, hide: false, templet: '#courseTeachingMethodCell'},
            {field: 'operate', title: '操作', align: 'center', minWidth: 70, sort: false, hide: false, templet: '#courseOperationCell'}
        ],
        verify: {
            course: {
                mustCertId: false,
                arr: function () {
                    return gdGzPractice.validateSavedDaysVsCourses(
                        typeof gCourseArr !== 'undefined' ? gCourseArr : [],
                        _dbase.calc
                    );
                },
                single: (course) => {
                    if (gdGzPractice.isEnabled()) {
                        return gdGzPractice.validateCoursePeriod(course.period);
                    }
                    const period = Number(course.period);
                    if (isNaN(period)) return '';
                    if (period > 3) {
                        return '讲授学时最大为3';
                    }
                    return '';
                },
            },
            json: {
                progress: (value, item) => validateProgressLength(value, 300, 3000),
                question: (value, item) => validateProgressLength(value, 300, 3000),
                target: (value, item) => validateProgressLength(value, 300, 3000),
                innovation: (value, item) => validateProgressLength(value, 300, 3000),
                projAnalyze: (value, item) => validateProgressLength(value, 1, 3000),
                jobSummary: (value, item) => validateProgressLength(value, 1, 3000),
                days: (value, item) => {
                    const dayVal = Number(value);
                    if (!isNaN(dayVal) && dayVal > 7) return '举办周期不能超过7天';
                    const startStr = $('input[name="dateStart"]').eq(0).val();
                    const endStr = $('input[name="dateEnd"]').eq(0).val();
                    if (startStr && endStr) {
                        const s = moment(startStr);
                        const e = moment(endStr);
                        if (s.isValid() && e.isValid()) {
                            const diff = e.diff(s, 'days') + 1;
                            if (diff > 7) return '举办周期不能超过7天';
                        }
                    }
                    if (!gdGzPractice.isEnabled()) return;
                    const days = gdGzPractice.getDays({ days: value }, {
                        calc: _dbase.calc,
                        projectDetail: typeof gProjectDetail !== 'undefined' ? gProjectDetail : {},
                        courseArr: typeof gCourseArr !== 'undefined' ? gCourseArr : []
                    });
                    const totalPeriod = gdGzPractice.getTotalPeriod({
                        calc: _dbase.calc,
                        projectDetail: typeof gProjectDetail !== 'undefined' ? gProjectDetail : {},
                        courseArr: typeof gCourseArr !== 'undefined' ? gCourseArr : []
                    });
                    return gdGzPractice.validatePeriodVsDays(days, totalPeriod);
                },
                period: (value, item) => {
                    if (value < 0) return '授课时长不满足要求';
                    if (!gdGzPractice.isEnabled()) return;
                    const days = gdGzPractice.getDays({}, {
                        calc: _dbase.calc,
                        projectDetail: typeof gProjectDetail !== 'undefined' ? gProjectDetail : {},
                        courseArr: typeof gCourseArr !== 'undefined' ? gCourseArr : []
                    });
                    return gdGzPractice.validatePeriodVsDays(days, value);
                },
            },
        },
        calc: {
            calcDays: function(cycleArr) {
                const that = this;
                var startStr = '';
                var endStr = '';
                if (cycleArr && cycleArr.length > 0) {
                    startStr = cycleArr[0].dateStart || '';
                    endStr = cycleArr[0].dateEnd || '';
                }
                if (!startStr || !endStr) {
                    var $startInput = $('input[name="dateStart"]').eq(0);
                    var $endInput = $('input[name="dateEnd"]').eq(0);
                    if ($startInput.length === 0 || $endInput.length === 0) return;
                    startStr = $startInput.val();
                    endStr = $endInput.val();
                }
                if (startStr && endStr) {
                    var s = moment(startStr);
                    var e = moment(endStr);
                    if (s.isValid() && e.isValid()) {
                        var diff = e.diff(s, 'days') + 1;
                        if (diff > 0) {
                            if (diff > 7) {
                                layui.lat.failMsg('举办周期不能超过7天');
                            }
                            that.days = diff;
                            if (typeof gProjectDetail !== 'undefined') {
                                gProjectDetail.days = diff;
                            }
                            if (typeof that.setPage4InputValue === 'function') {
                                that.setPage4InputValue($('#page4-form'), 'days', diff);
                            } else {
                                var $daysInput = $('input[name="days"]');
                                if ($daysInput.length && $daysInput.val() != diff) {
                                    $daysInput.val(diff);
                                }
                            }
                        }
                    }
                }
            },
            calcPeriod: function (courseArr) {
                const that = this;
                if (courseArr && courseArr.length > 0) {
                    that.period = that.period_ll = that.period_sy = 0;
                    for (let i = 0, len = courseArr.length; i < len; i++) {
                        const course = courseArr[i];
                        const period = Number(course.period);
                        if (isNaN(period)) continue;
                        that.period = accAdd(that.period, period);
                        if (isLilunCourse(course)) {
                            that.period_ll = accAdd(that.period_ll, period);
                        } else {
                            that.period_sy = accAdd(that.period_sy, period);
                        }
                    }
                } else {
                    that.period = accAdd(that.period_ll, that.period_sy);
                }
            },
            setPage4InputValue: function ($form, name, value) {
                if (!$form || $form.length < 1) return;
                const text = (value === null || value === undefined) ? '' : String(value);
                $form.find('input[name="' + name + '"]').each(function () {
                    const input = this;
                    const $input = $(input);
                    $input.prop('disabled', false).removeClass('layui-disabled');
                    input.value = text;
                    input.setAttribute('value', text);
                    $input.val(text);
                    $input.prop('disabled', true).addClass('layui-disabled');
                });
            },
            syncPage4CalcFields: function () {
                const that = this;
                const snap = that._page4Display;
                const fields = {
                    period: snap ? snap.period : that.period,
                    theoryPeriod: snap ? snap.period_ll : that.period_ll,
                    experimentPeriod: snap ? snap.period_sy : that.period_sy,
                    score: snap ? snap.score : that.score
                };
                if (typeof gProjectDetail !== 'undefined') {
                    gProjectDetail.period = fields.period;
                    gProjectDetail.theoryPeriod = fields.theoryPeriod;
                    gProjectDetail.experimentPeriod = fields.experimentPeriod;
                    gProjectDetail.score = fields.score;
                }
                let retry = 15;
                const fillFields = function () {
                    const $form = $('#page4-form');
                    if ($form.length > 0) {
                        that.setPage4InputValue($form, 'period', fields.period);
                        that.setPage4InputValue($form, 'theoryPeriod', fields.theoryPeriod);
                        that.setPage4InputValue($form, 'experimentPeriod', fields.experimentPeriod);
                        that.setPage4InputValue($form, 'score', fields.score);
                        return;
                    }
                    if (retry-- > 0) {
                        setTimeout(fillFields, 150);
                    }
                };
                fillFields();
            },
            calcScore: function (courseArr) {
                const that = this;
                if (courseArr && courseArr.length > 0) {
                    that._lastCourseArr = courseArr;
                    that.calcPeriod(courseArr);
                } else if (that._lastCourseArr && that._lastCourseArr.length > 0) {
                    that.calcPeriod(that._lastCourseArr);
                } else {
                    that.period = accAdd(that.period_ll, that.period_sy);
                }
                let totalPeriod = accAdd(that.period_ll, that.period_sy);
                let score = totalPeriod > 0 && totalPeriod < 6 ? 0.2 : Math.floor(totalPeriod / 6);
                that.score = Math.min(gdGzPractice.maxScore(), score);
                that._page4Display = {
                    period: that.period,
                    period_ll: that.period_ll,
                    period_sy: that.period_sy,
                    score: that.score
                };
                that.syncPage4CalcFields();
            },
        },
        guard: {
            filterPrincipalTitleTree: function (titleTreeData, ctx) {
                return gdGzPractice.filterTitleTree(titleTreeData, ctx.scoreLevelId);
            },
            beforeSubmitPrincipal: function (params, ctx) {
                if (!gdGzPractice.isEnabled(ctx.scoreLevelId)) return '';
                const titleNode = gdGzPractice.findTitleNode(ctx.titleTreeData || [], params.titleId);

                if (!titleNode || (!titleNode.titleLevel && !titleNode.level)) return '获取负责人职称失败，请重新选择职称';
                if (!gdGzPractice.isAllowedTitleNode(titleNode, ctx.scoreLevelId)) {
                    return gdGzPractice.isCityLevel(ctx.scoreLevelId)
                        ? '市级活动项目负责人职称需为副高级及以上'
                        : '区、县级活动项目负责人职称需为中级及以上';
                }
                return '';
            },
            beforeSubmitCourse: function (courseArr, ctx) {
                if (!gdGzPractice.isEnabled(ctx.scoreLevelId)) return '';
                for (let i = 0, len = courseArr.length; i < len; ++i) {
                    const msg = gdGzPractice.validateCoursePeriod(courseArr[i].period);
                    if (msg) return msg;
                }
                return gdGzPractice.validateSavedDaysVsCourses(courseArr, _dbase.calc);
            },
            beforeSubmitCycle: function (params, ctx) {
                if (!gdGzPractice.isEnabled(ctx.scoreLevelId)) return '';
                if ((ctx.cycleArr || []).length > 1) return '广州市实践活动只允许一个举办批次';

                const days = gdGzPractice.getDays(params, ctx);
                const totalPeriod = gdGzPractice.getTotalPeriod(ctx);
                return gdGzPractice.validatePeriodVsDays(days, totalPeriod);
            }
        },
        fix: {
            fixForm: function () {
                if (gdGzPractice.isEnabled()) {
                    _dbase.var.cycleLimit = 1;
                }
            }
        },
    });
</script>

<script type="text/javascript" src="/pages/mod/declare/js/d.js"></script>
<script type="text/javascript">
    (function () {
        function getCourseArrFromTable() {
            if (_dbase.calc._lastCourseArr && _dbase.calc._lastCourseArr.length > 0) {
                return _dbase.calc._lastCourseArr;
            }
            return (layui.table.cache['courseTable'] || []).filter(Boolean);
        }

        function seedCalcFromProjectDetail() {
            if (typeof gProjectDetail === 'undefined' || !gProjectDetail || !_dbase.calc) return;
            const detail = gProjectDetail;
            const period = Number(detail.period);
            const theoryPeriod = Number(detail.theoryPeriod);
            const experimentPeriod = Number(detail.experimentPeriod);
            if (!isNaN(period)) _dbase.calc.period = period;
            if (!isNaN(theoryPeriod)) _dbase.calc.period_ll = theoryPeriod;
            if (!isNaN(experimentPeriod)) _dbase.calc.period_sy = experimentPeriod;
            if (detail.score !== undefined && detail.score !== null && detail.score !== '') {
                _dbase.calc.score = Number(detail.score);
            }
            const detailDays = Number(detail.days);
            if (!isNaN(detailDays) && detailDays > 0) {
                _dbase.calc.days = detailDays;
            }
            _dbase.calc._page4Display = {
                period: _dbase.calc.period,
                period_ll: _dbase.calc.period_ll,
                period_sy: _dbase.calc.period_sy,
                score: _dbase.calc.score
            };
        }

        function initCalcFromDetailOrCourses() {
            if (!_dbase.calc) return;
            const courseArr = (typeof gCourseArr !== 'undefined' && gCourseArr && gCourseArr.length > 0)
                ? gCourseArr
                : getCourseArrFromTable();
            if (courseArr.length > 0) {
                _dbase.calc._lastCourseArr = courseArr.slice();
                _dbase.calc.calcScore(courseArr);
                const calcHasPeriod = Number(_dbase.calc.period) > 0
                    || Number(_dbase.calc.period_ll) > 0
                    || Number(_dbase.calc.period_sy) > 0;
                if (calcHasPeriod) return;
            }
            seedCalcFromProjectDetail();
        }

        function recalcFromCourses() {
            if (!_dbase.calc || typeof _dbase.calc.calcScore !== 'function') return;
            const courseArr = getCourseArrFromTable();
            if (courseArr.length > 0) {
                _dbase.calc.calcScore(courseArr);
            }
        }

        function applyCalcToProjectDetail(forceRecalc) {
            if (forceRecalc) {
                recalcFromCourses();
            } else {
                initCalcFromDetailOrCourses();
            }
            if (typeof gProjectDetail === 'undefined' || !_dbase.calc) return;
            const calcHasPeriod = Number(_dbase.calc.period) > 0
                || Number(_dbase.calc.period_ll) > 0
                || Number(_dbase.calc.period_sy) > 0;
            if (!calcHasPeriod && !forceRecalc) return;
            gProjectDetail.period = _dbase.calc.period;
            gProjectDetail.theoryPeriod = _dbase.calc.period_ll;
            gProjectDetail.experimentPeriod = _dbase.calc.period_sy;
            gProjectDetail.score = _dbase.calc.score;
        }

        function syncPage4DisplayOnly() {
            if (_dbase.calc && !_dbase.calc._page4Display) {
                initCalcFromDetailOrCourses();
            }
            if (_dbase.calc && _dbase.calc._page4Display) {
                var d = _dbase.calc._page4Display;
                _dbase.calc.period = d.period;
                _dbase.calc.period_ll = d.period_ll;
                _dbase.calc.period_sy = d.period_sy;
                _dbase.calc.score = d.score;
            }
            applyCalcToProjectDetail(false);
            if (_dbase.calc && typeof _dbase.calc.syncPage4CalcFields === 'function') {
                _dbase.calc.syncPage4CalcFields();
            }
        }

        function syncDaysFromCycle() {
            if (!_dbase.calc || typeof _dbase.calc.calcDays !== 'function') return;
            const cycleArr = typeof gCycleArr !== 'undefined' ? gCycleArr : [];
            if (cycleArr.length > 0) {
                _dbase.calc.calcDays(cycleArr);
            }
        }

        function schedulePage4CalcSync() {
            syncDaysFromCycle();
            syncPage4DisplayOnly();
            [100, 300, 600, 1200].forEach(function (ms) {
                setTimeout(function () {
                    syncDaysFromCycle();
                    syncPage4DisplayOnly();
                }, ms);
            });
        }

        function mergeCalcIntoParams(params) {
            if (!params || !_dbase.calc) return params;
            params.period = _dbase.calc.period;
            params.theoryPeriod = _dbase.calc.period_ll;
            params.experimentPeriod = _dbase.calc.period_sy;
            params.score = _dbase.calc.score;
            return params;
        }

        function patchEchoCycle() {
            if (!_echo || _echo._gdEchoCyclePatched) return;
            const rawEchoCycle = _echo.echoCycle;
            _echo.echoCycle = function () {
                initCalcFromDetailOrCourses();
                applyCalcToProjectDetail(false);
                rawEchoCycle.call(_echo);
                schedulePage4CalcSync();
            };
            _echo._gdEchoCyclePatched = true;
        }

        function patchEchoProj() {
            if (!_echo || _echo._gdEchoProjPatched) return;
            const rawEchoProj = _echo.echoProj;
            _echo.echoProj = function () {
                if (_dbase.info.projectId) {
                    initCalcFromDetailOrCourses();
                }
                return rawEchoProj.call(_echo);
            };
            _echo._gdEchoProjPatched = true;
        }

        function patchLoadProjectDetail() {
            if (!_action || _action._gdLoadDetailPatched) return;
            const rawLoad = _action.loadProjectDetail;
            _action.loadProjectDetail = function (projectId) {
                rawLoad.call(_action, projectId);
                if (!projectId) return;
                const tryInit = function () {
                    if (typeof gProjectDetail !== 'undefined' && gProjectDetail
                        && (gProjectDetail.period || gProjectDetail.theoryPeriod || gProjectDetail.experimentPeriod)) {
                        initCalcFromDetailOrCourses();
                        return;
                    }
                    if (tryInit.retry-- > 0) {
                        setTimeout(tryInit, 100);
                    }
                };
                tryInit.retry = 30;
                setTimeout(tryInit, 0);
            };
            _action._gdLoadDetailPatched = true;
        }

        function patchFormVal() {
            if (!layui.form || layui.form._gdPage4ValPatched) return;
            const rawVal = layui.form.val;
            layui.form.val = function (filter, obj) {
                const result = rawVal.apply(this, arguments);
                if (filter === 'page4-form' && obj && _dbase.calc && typeof _dbase.calc.syncPage4CalcFields === 'function') {
                    if (obj.period !== undefined || obj.theoryPeriod !== undefined
                        || obj.experimentPeriod !== undefined || obj.score !== undefined
                        || obj.days !== undefined) {
                        setTimeout(function () {
                            syncDaysFromCycle();
                            syncPage4DisplayOnly();
                        }, 0);
                    }
                }
                return result;
            };
            layui.form._gdPage4ValPatched = true;
        }

        function patchSubmit3() {
            if (!_action || _action._gdSubmit3Patched) return;
            const rawSubmit3 = _action.submit3;
            _action.submit3 = function (courseArr, toNext) {
                if (courseArr && courseArr.length > 0 && _dbase.calc) {
                    _dbase.calc._lastCourseArr = courseArr.slice();
                }
                return rawSubmit3.call(_action, courseArr, toNext);
            };
            _action._gdSubmit3Patched = true;
        }
        function patchSubmit4() {
            if (!_action || _action._gdSubmit4Patched) return;
            const rawSubmit4 = _action.submit4;
            _action.submit4 = function (params, flag) {
                applyCalcToProjectDetail(true);
                mergeCalcIntoParams(params);
                if (_dbase.calc && typeof _dbase.calc.syncPage4CalcFields === 'function') {
                    _dbase.calc.syncPage4CalcFields();
                }
                return rawSubmit4.call(_action, params, flag);
            };
            _action._gdSubmit4Patched = true;
        }

        function patchSave4() {
            if (!_action || _action._gdSave4Patched) return;
            const rawSave4 = _action.save4;
            _action.save4 = function (params, doReport) {
                applyCalcToProjectDetail(true);
                mergeCalcIntoParams(params);
                const projParams = {
                    projectId: _dbase.info.projectId,
                    period: _dbase.calc.period,
                    theoryPeriod: _dbase.calc.period_ll,
                    experimentPeriod: _dbase.calc.period_sy,
                    score: _dbase.calc.score,
                    days: params.days || _dbase.calc.days,
                    changeKnowledgeId: false,
                    fresh: false
                };
                if (_dbase.calc.syncPage4CalcFields) {
                    _dbase.calc.syncPage4CalcFields();
                }
                declareProjAction(projParams).finally(function () {
                    if (_dbase.calc.syncPage4CalcFields) {
                        _dbase.calc.syncPage4CalcFields();
                    }
                    rawSave4.call(_action, params, doReport);
                });
            };
            _action._gdSave4Patched = true;
        }

        function patchTabChange() {
            if (!layui.element || layui.element._gdTabChangePatched) return;
            const rawTabChange = layui.element.tabChange;
            layui.element.tabChange = function (filter, layId) {
                const ret = rawTabChange.apply(this, arguments);
                if (filter === 'declare-tab' && layId === 'page4') {
                    schedulePage4CalcSync();
                }
                return ret;
            };
            layui.element._gdTabChangePatched = true;
        }

        function bindPage4CalcRefresh() {
            layui.element.on('tab(declare-tab)', function () {
                if (this.getAttribute('lay-id') !== 'page4') return;
                schedulePage4CalcSync();
            });
        }

        function patchSubmit4Guard() {
            if (!_action || _action._gdPeriodGuardPatched) return;
            const rawSubmit4 = _action.submit4;
            _action.submit4 = function (params, flag) {
                if (gdGzPractice.isEnabled() && _dbase.calc && typeof _dbase.calc.calcDays === 'function') {
                    _dbase.calc.calcDays(gCycleArr);
                }
                return rawSubmit4.call(_action, params, flag);
            };
            _action._gdPeriodGuardPatched = true;
        }

        function ensureDisplayPatches() {
            if (typeof _action === 'undefined' || !_action.loadProjectDetail) return false;
            patchLoadProjectDetail();
            patchEchoProj();
            patchEchoCycle();
            patchFormVal();
            return true;
        }

        if (!ensureDisplayPatches()) {
            var patchTimer = setInterval(function () {
                if (ensureDisplayPatches()) {
                    clearInterval(patchTimer);
                }
            }, 20);
        }

        $(function () {
            ensureDisplayPatches();
            patchSubmit3();
            patchSubmit4();
            patchSubmit4Guard();
            patchSave4();
            patchTabChange();
            bindPage4CalcRefresh();
        });
    })();
</script>
