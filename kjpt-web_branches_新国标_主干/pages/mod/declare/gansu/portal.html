<script type="text/javascript">
    const scoreLevelId = getUrlParamByName('score_level_id');
    $.extend(true, _dbase, {
        _courseTableColArr: [
            {field: 'teacherName', title: '姓名', align: 'center', minWidth: 90, edit: 'text', sort: false, hide: false, fixed: 'left'},
            {field: 'certType', title: '证件类型', align: 'center', minWidth: 145, sort: false, hide: false, templet: '#courseCertTypeCell'},
            {field: 'idCardNo', title: '证件号码', align: 'center', minWidth: 180, edit: 'text', sort: false, hide: false},
            {field: 'titleId', title: '专业技术职务', align: 'center', minWidth: 123, sort: false, hide: false, templet: '#courseTitleIdCell'},
            {field: 'researchDirection', title: '主要研究方向', align: 'center', minWidth: 123, edit: 'text', sort: false, hide: false},
            {field: 'workUnit', title: '所在单位', align: 'center', minWidth: 120, edit: 'text', sort: false, hide: false},
            {field: 'teachTopic', title: '讲授题目', align: 'center', minWidth: 200, edit: 'text', sort: false, hide: false},
            {field: 'content', title: '内容', align: 'center', minWidth: 400, edit: 'text', sort: false, hide: false},
            {field: 'period', title: '教学时长', align: 'center', minWidth: 95, edit: 'text', sort: false, hide: false},
            {field: 'teachingMethod', title: '教学方法', align: 'center', minWidth: 143, sort: false, hide: false, templet: '#courseTeachingMethodCell'},
            {field: 'operate', title: '操作', align: 'center', minWidth: 70, sort: false, hide: false, templet: '#courseOperationCell'}
        ],
        verify: {
            course: {
                mustCertId: false
            },
            json: {
                score: (value, item) => {
                    if (value<1) return '学分不满足要求';
                }
            },
        },

        calc: {
            // === 核心逻辑：计算天数 ===
            calcDays: function() {
                // eq(0) 表示只取第 1 个找到的元素
                var $startInput = $('input[name="dateStart"]').eq(0);
                var $endInput = $('input[name="dateEnd"]').eq(0);

                // 如果连第一行都没有（比如表格是空的），直接返回
                if ($startInput.length === 0 || $endInput.length === 0) return;

                var startStr = $startInput.val();
                var endStr = $endInput.val();

                // 只有当第一行的开始和结束都有值时，才计算
                if (startStr && endStr) {
                    var s = moment(startStr);
                    var e = moment(endStr);
                    if (s.isValid() && e.isValid()) {
                        var diff = e.diff(s, 'days') + 1;
                        if (diff > 0) {
                            var $daysInput = $('input[name="days"]');
                            // 只要算出来的跟现在的不一样，就覆盖
                            if ($daysInput.val() != diff) {
                                $daysInput.val(diff);
                            }
                        }
                    }
                }
                // 否则（第一行是残缺的），什么也不做，保持原样（或者保持d.js填入的0）
            },
            calcScore: function () {
                var isDebug = false;

                // --- 核心逻辑变更：DOM 拥有最高优先级 ---
                // 不管内存里有没有值，先去读页面上的输入框。
                // 因为点击保存后，d.js 会把最新的后端数据填入输入框，这是最准确的数据源。

                var domLL = $('input[name="theoryPeriod"]').val();
                var domSY = $('input[name="experimentPeriod"]').val();

                var ll = 0;
                var sy = 0;

                // 1. 处理理论学时 (LL)
            // 只要 DOM 里有数（哪怕是 0，只要不是空字符串），就优先用 DOM 的
                if (domLL !== undefined && domLL !== "") {
                    ll = parseFloat(domLL) || 0;
                    if(isDebug) console.log('>>> 优先读取 DOM 理论学时:', ll);
                } else {
                    // 只有当 DOM 读不到时，才去读内存兜底
                    ll = parseFloat(_dbase.period_ll) || 0;
                }

                // 2. 处理实验学时 (SY)
                if (domSY !== undefined && domSY !== "") {
                    sy = parseFloat(domSY) || 0;
                    if(isDebug) console.log('>>> 优先读取 DOM 实验学时:', sy);
                } else {
                    sy = parseFloat(_dbase.period_sy) || 0;
                }

                // 3. 计算
                var total = accAdd(ll, sy);
                //如果市级,则score=total/6，否则score=total/3
                var score = Math.floor(scoreLevelId === '09431aaa-2270-11f1-8a80-005056a64c01' ? total / 6 : total / 3);

                // 4. 更新内存 (把从 DOM 拿到的新值存起来，防止下次切 Tab 丢失)
                _dbase.period_ll = ll;
                _dbase.period_sy = sy;
                _dbase.score = score;

                // 5. 渲染
                if (_dbase.info.holdYear > 2025) {
                    var scoreLimit = (scoreLevelId === '09431aaa-2270-11f1-8a80-005056a64c01') ? 5 : 10;
                    var score = Math.min(score, scoreLimit);
                    _dbase.score = score;
                    layui.form.val('page4-form', {
                        theoryPeriod: ll,
                        experimentPeriod: sy,
                        score: score
                    });
                    if(isDebug) console.log('计算修正完毕: 理论', ll, '实验', sy, '学分', score);
                }
            }
        },
        fix: {
            fixForm: function () {
                if (_dbase.info.holdYear > 2025) {
                    $('input[name=score]').attr('disabled', 'true').toggleClass('layui-disabled');

                    // 延迟 1 秒触发，确保后端数据已经就位
                    // 只要用户点“项目其它信息”这个标签，就强制算一遍
                    $('body').on('click', 'li[lay-id="page4"]', function() {
                        // console.log('>>> 检测到点击 Tab 4，准备重算...');
                        // 稍微延迟 200ms，等 Tab 切换动画完成，输入框显示出来后再算
                        setTimeout(function() {
                            _dbase.calc.calcScore();
                            _dbase.calc.calcDays();
                        }, 200);
                    });

                    // 2. 监听【保存并进入下一页】的点击
                    // 因为点这个按钮会自动跳到 Tab 4，但不会触发上面的 li 点击事件
                    $('body').on('click', 'button[lay-filter="saveToNext"]', function() {
                        // console.log('>>> 检测到点击保存并跳转，延迟触发...');
                        // 延迟 1.5秒，等待保存请求结束 + 页面自动跳转完成
                        setTimeout(function() {
                            _dbase.calc.calcScore();
                            _dbase.calc.calcDays();
                        }, 1500);
                    });

                    // 3. 监听【保存】按钮 (防止在当前页保存后数据被 d.js 覆盖)
                    $('body').on('click', 'button[lay-filter="save"]', function() {
                        // console.log('>>> 检测到点击保存，延迟触发...');
                        setTimeout(function() {
                            _dbase.calc.calcScore();
                            _dbase.calc.calcDays();
                        }, 1500);
                    });
                }
            }
        },
    });

    // 缓存 Promise
    var cachedTitleDataPromise = null;
</script>
<script type="text/javascript">
    (function() {
        window.titleSelectors = {};
        window.titleConfigs = {};
        window.gansuCourseTitleMap = window.gansuCourseTitleMap || {};
        window.gansuFreshCourseMap = window.gansuFreshCourseMap || {};
        window.savedTitleData = null; // 用于缓存原始职称数据
        window.gCourseArr = window.gCourseArr || []; // 确保gCourseArr存在
        window.teachingMethodEventsBound = false; // 标记事件是否已绑定
        let isDataCached = false; //是否已缓存数据
        function doFilter(data, minLevel) {
            if (!data || !Array.isArray(data)) return data;
            return data.map(function(item) {
                var newItem = $.extend(true, {}, item);
                if (newItem.children && Array.isArray(newItem.children)) {
                    newItem.children = newItem.children.filter(function(child) {
                        var levelNum = parseInt(child.level);
                        return !isNaN(levelNum) && levelNum > minLevel;
                    });
                }
                return newItem;
            }).filter(function(item) {
                return item.children && item.children.length > 0;
            });
        }

        // 获取正确的职称ID输入框选择器
        function getTitleIdInputSelector(index) {
            // 如果是leader（负责人），使用特殊的选择器
            if (index === 'leader') {
                return '#titleIdInp';
            }
            // 尝试多种方式获取选择器
            var selectors = [
                '#titleIdInp' + index,
                'input[name="titleId"][idx="' + index + '"]',
                '#projectDetailPage3 input[name="titleId"]:eq(' + index + ')',
                '#projectDetailPage3 select[name="titleId"]:eq(' + index + ')'
            ];
            for (var i = 0; i < selectors.length; i++) {
                try {
                    var $input = $(selectors[i]);
                    if ($input.length > 0) {
                        // 如果是通用选择器，尝试找到对应行的
                        if (selectors[i] === 'input[name="titleId"]' && index !== undefined) {
                            $input = $input.eq(index);
                        }
                        if ($input.length > 0) {
                            return selectors[i];
                        }
                    }
                } catch (e) {
                    console.warn(">>> [选择器错误]", selectors[i], e);
                }
            }
            return '';
        }

        function getSelectedTitleValues(values) {
            if (values && Array.isArray(values.arr)) {
                return values.arr;
            }
            if (Array.isArray(values)) {
                return values;
            }
            return [];
        }

        // 获取职称ID值（处理对象情况）
        function getTitleIdValue(values) {
            var titleValues = getSelectedTitleValues(values);
            if (!titleValues || titleValues.length === 0) {
                return '';
            }
            var value = titleValues[0];
            // 如果是对象，提取id属性
            if (typeof value === 'object' && value !== null) {
                return value.id || value.value || value.titleId || '';
            }
            // 如果是字符串或数字，直接返回
            return String(value);
        }

        // 一级节点仅用于展开/合并：parentId 为空的节点不允许被选中
        function isTopLevelTitle(values) {
            var titleValues = getSelectedTitleValues(values);
            if (!titleValues || titleValues.length === 0) return false;
            var value = titleValues[0];
            if (typeof value !== 'object' || value === null) return false;
            var titleId = getTitleIdValue(titleValues);
            if (titleId && window.savedTitleData && Array.isArray(window.savedTitleData)) {
                return window.savedTitleData.some(function(item) {
                    return item && String(item.titleId) === String(titleId);
                });
            }
            var parentId = value.parentId;
            return (parentId === undefined || parentId === null || parentId === '');
        }

        // 重新绑定职称选择器的事件
        function rebindTitleSelectorEvents(index, selectorInstance) {
            if (!selectorInstance) {
                return;
            }
            if (selectorInstance._gansuTitleRebound) {
                return;
            }
            selectorInstance._gansuTitleRebound = true;
            // 监听layui.lat的选择器事件
            if (selectorInstance.on) {
                selectorInstance.on('change', function(values) {
                    // 点击一级节点只展开/合并，不产生选中值
                    if (isTopLevelTitle(values)) {
                        try {
                            if (selectorInstance.setValue) selectorInstance.setValue([]);
                        } catch (e) {}

                        var $titleInput0 = $(getTitleIdInputSelector(index));
                        if ($titleInput0.length > 0) {
                            $titleInput0.val('');
                        }
                        if (index !== 'leader') {
                            if (!window.gCourseArr[index]) window.gCourseArr[index] = {};
                            window.gCourseArr[index]['titleId'] = null;
                            updateLayuiTableCache(index);
                        }
                        return;
                    }

                    // 获取正确的职称ID
                    var titleId = getTitleIdValue(values);
                    // 设置到隐藏输入框
                    var $titleInput = $(getTitleIdInputSelector(index));
                    if ($titleInput.length > 0) {
                        $titleInput.val(titleId);
                    }
                    
                    // 如果是课程行，更新gCourseArr中的数据
                    if (index !== 'leader' && window.gCourseArr && window.gCourseArr[index]) {
                        window.gCourseArr[index]['titleId'] = titleId;
                    }
                    
                    // 如果是课程行，更新表格缓存
                    if (index !== 'leader') {
                        updateLayuiTableCache(index);
                    }
                });
            }
        }

        // 更新layui表格缓存
        function updateLayuiTableCache(index) {
            if (index === 'leader') return false;
            if (!window.layui || !window.layui.table) {
                return false;
            }
            
            try {
                // 查找课程表格
                var tableId = findCourseTableId();
                if (!tableId) {
                    return false;
                }
                
                var tableCache = window.layui.table.cache[tableId];
                if (tableCache && tableCache[index]) {
                    // 获取当前DOM值
                    var teachingMethod = $('#teachingMethod' + index).val();
                    var $titleInput = $(getTitleIdInputSelector(index));
                    var titleId = $titleInput.length > 0 ? $titleInput.val() : '';
                    if (!titleId) {
                        titleId = getSelectedTitleId(index) || window.gansuCourseTitleMap[index] || tableCache[index]['titleId'] || '';
                    }
                    
                    // 更新缓存
                    tableCache[index]['teachingMethod'] = teachingMethod || '';
                    // 避免在保存前同步时把已选职称覆盖为空
                    if (titleId) {
                        tableCache[index]['titleId'] = titleId;
                    }
                    return true;
                }
            } catch (error) {
                console.error(">>> [更新表格缓存失败]", error);
            }
            return false;
        }

        // 查找课程表格ID
        function findCourseTableId() {
            if (!window.layui || !window.layui.table) return null;
            // 查找包含courseTable的表格
            for (var tableId in window.layui.table.cache) {
                if (tableId.includes('course') || tableId.includes('Course')) {
                    return tableId;
                }
            }
            return null;
        }

        function getSelectedTitleId(index) {
            var selectorInstance = window.titleSelectors ? window.titleSelectors[index] : null;
            if (selectorInstance && selectorInstance.getValue) {
                var titleId = getTitleIdValue(selectorInstance.getValue());
                if (titleId) return titleId;
            }
            var $titleInput = $(getTitleIdInputSelector(index));
            var inputTitleId = $titleInput.length > 0 ? $titleInput.val() : '';
            if (inputTitleId) return inputTitleId;
            if (window.layui && layui.table && layui.table.cache && layui.table.cache.courseTable && layui.table.cache.courseTable[index]) {
                return layui.table.cache.courseTable[index].titleId || '';
            }
            return '';
        }

        function syncCourseTitleValue(index, titleId) {
            if (index === 'leader' || index === undefined || index === null || titleId === undefined) {
                return;
            }
            var $titleInput = $(getTitleIdInputSelector(index));
            if ($titleInput.length > 0) {
                $titleInput.val(titleId || '');
            }
            if (titleId) {
                window.gansuCourseTitleMap[index] = titleId;
            } else {
                delete window.gansuCourseTitleMap[index];
            }
            // 强制同步到 gCourseArr
            if (window.gCourseArr && Array.isArray(window.gCourseArr)) {
                var course = window.gCourseArr[index];
                if (course) {
                    course.titleId = titleId || null;
                }
            }
            // 强制同步到 layui.table.cache.courseTable
            if (window.layui && layui.table && layui.table.cache && layui.table.cache.courseTable && Array.isArray(layui.table.cache.courseTable)) {
                var cacheCourse = layui.table.cache.courseTable[index];
                if (cacheCourse) {
                    cacheCourse.titleId = titleId || null;
                }
            }
            // 强制同步到 reload 数据（如果有）
            if (window.lastCourseReloadData && Array.isArray(window.lastCourseReloadData)) {
                var reloadCourse = window.lastCourseReloadData[index];
                if (reloadCourse) {
                    reloadCourse.titleId = titleId || null;
                }
            }
        }

        function syncCourseTitleBeforeReload(courseData) {
            if (!Array.isArray(courseData)) {
                return;
            }
            courseData.forEach(function(course) {
                if (course && course.courseId && course.fresh === true) {
                    window.gansuFreshCourseMap[course.courseId] = true;
                }
            });
            var tableCache = (window.layui && layui.table && layui.table.cache && layui.table.cache.courseTable) ? layui.table.cache.courseTable : [];
            tableCache.forEach(function(cacheCourse, index) {
                if (!cacheCourse) return;
                var course = null;
                if (cacheCourse.courseId) {
                    course = courseData.find(function(item) {
                        return item && item.courseId === cacheCourse.courseId;
                    });
                }
                if (!course) {
                    course = courseData[index];
                }
                if (!course) return;
                var titleId = getSelectedTitleId(index) || window.gansuCourseTitleMap[index] || cacheCourse.titleId;
                if (titleId) {
                    course.titleId = titleId;
                }
                var teachingMethod = $('#teachingMethod' + index).val();
                if (teachingMethod) {
                    course.teachingMethod = teachingMethod;
                }
                if (course.courseId && window.gansuFreshCourseMap[course.courseId]) {
                    course.fresh = true;
                }
            });
        }

        function restoreFreshCourseFlag(courseData) {
            if (!Array.isArray(courseData)) {
                return;
            }
            courseData.forEach(function(course) {
                if (course && course.courseId && window.gansuFreshCourseMap[course.courseId]) {
                    course.fresh = true;
                }
            });
        }

        function installCourseTableReloadPatch() {
            if (!window.layui || !layui.table || layui.table._gansuCourseReloadPatched) {
                return;
            }
            var rawReload = layui.table.reload;
            layui.table.reload = function(id, options, deep) {
                if (id === 'courseTable' && options && Array.isArray(options.data)) {
                    window.lastCourseReloadData = options.data;
                    syncCourseTitleBeforeReload(options.data);
                }
                return rawReload.call(this, id, options, deep);
            };
            layui.table._gansuCourseReloadPatched = true;
        }

        // 重新渲染职称选择器（负责人行固定 >2，课程行根据教学方法过滤）
        function rerenderTitleSelector(index, teachingMethod) {
            var conf = window.titleConfigs[index];
            if (!conf || !window.savedTitleData) {
                return;
            }
            // 确定过滤级别
            var filterLevel;
            if (index === 'leader') {
                // 负责人行：固定 >2
                filterLevel = 2;
            } else {
                // 课程行：根据教学方法
                filterLevel = teachingMethod === "实验技术" ? 1 : 2;
            }
            // 使用过滤函数过滤数据
            var filteredData = doFilter(window.savedTitleData, filterLevel);
            // 清空现有的职称选择器DOM
            $(conf.elem).empty();
            // 延迟重新渲染，确保DOM已清空
            setTimeout(function(){
                try {
                    // 重新调用渲染函数，使用过滤后的数据
                    if (window.layui && window.layui.lat && window.layui.lat.renderTitleTreeSelector) {
                        var newInstance = window.layui.lat.renderTitleTreeSelector(
                            conf.elem, 
                            filteredData, 
                            conf.config
                        );
                        // 更新实例引用
                        window.titleSelectors[index] = newInstance;
                        // 重新绑定职称选择器事件
                        rebindTitleSelectorEvents(index, newInstance);
                        // 重新渲染表单，确保layui样式生效
                        if (window.layui.form) {
                            window.layui.form.render();
                        }
                    }
                } catch (error) {
                    console.error(">>> [重新渲染职称选择器失败]", error);
                }
            }, 100);
        }

        var checkLat = setInterval(function() {
            // 等待d.js的uiComponent.renderTitleSel加载完成
            let isTitleSelLoaded = document.querySelector('#titleTreeSelector') !== null && document.querySelector('#titleTreeSelector').children.length > 0;
            if (isTitleSelLoaded && window.layui && layui.lat && layui.lat.renderTitleTreeSelector && layui.form) {
                var _rawRender = layui.lat.renderTitleTreeSelector;
                var form = layui.form;
                
                // 1. 拦截渲染函数 - 负责人行固定>2，课程行根据教学方法
                layui.lat.renderTitleTreeSelector = function(elem, data, config) {
                    // 统一：点击节点仅展开（特别是一级），不通过点击触发选中
                    config = config || {};
                    config.tree = config.tree || {};
                    config.tree.clickExpand = true;
                    config.tree.clickCheck = false;

                    var targetElem = $(elem);
                    var targetId = targetElem.attr('id') || "";
                    var idx = targetElem.attr('idx') || (targetId === 'titleTreeSelector' ? 'leader' : null);
                    // 缓存原始数据，供后续重绘使用,只初始化缓存
                    if (!isDataCached && data && data.length > 0) {
                        window.savedTitleData = data;
                        isDataCached = true; // 设置标志位，后续不再缓存
                    }
                    installCourseTableReloadPatch();
                    // 保存配置
                    if (idx) {
                        var rawOn = config.on;
                        config.on = function(selectData) {
                            var rawResult;
                            if (typeof rawOn === 'function') {
                                rawResult = rawOn.call(this, selectData);
                            }
                            if (idx !== 'leader' && !isTopLevelTitle(selectData)) {
                                var selectedTitleId = getTitleIdValue(selectData);
                                syncCourseTitleValue(idx, selectedTitleId);
                            }
                            return rawResult;
                        };
                        window.titleConfigs[idx] = { elem: elem, config: config, originalData: data };
                    }
                    // 确定过滤级别
                    var filterLevel;
                    if (idx === 'leader') {
                        // 负责人行：固定 >2
                        filterLevel = 2;
                    } else if (idx) {
                        // 课程行：根据教学方法
                        var teachingMethod = $('#teachingMethod' + idx).val();
                        filterLevel = 2; // 默认面授

                        if (teachingMethod === "实验技术") {
                            filterLevel = 1;
                        }
                    } else {
                        // 其他情况（可能不是表格行）
                        filterLevel = 2;
                    }

                    // 过滤数据
                    var filteredData = doFilter(data, filterLevel);
                    var selectorInstance = _rawRender.call(this, elem, filteredData, config);
                    if (idx) {
                        window.titleSelectors[idx] = selectorInstance;
                        if (idx !== 'leader' && window.gansuCourseTitleMap[idx]) {
                            setTimeout(function() {
                                var cachedTitleId = window.gansuCourseTitleMap[idx];
                                if (cachedTitleId && selectorInstance && selectorInstance.setValue) {
                                    selectorInstance.setValue([cachedTitleId]);
                                    syncCourseTitleValue(idx, cachedTitleId);
                                }
                            }, 0);
                        }
                        
                        // 初始渲染时绑定事件
                        setTimeout(function() {
                            rebindTitleSelectorEvents(idx, selectorInstance);
                        }, 200);
                    }

                    // 负责人回填补丁
                    if (targetId === 'titleTreeSelector') {
                        setTimeout(function() {
                            if (window.gProjectDetail && gProjectDetail.principalVO && gProjectDetail.principalVO.titleId) {
                                selectorInstance.setValue([gProjectDetail.principalVO.titleId]);
                            }
                        }, 300);
                    }
                    return selectorInstance;
                };
                
                // 初始化获取职称树数据 增加了一次请求，考虑优化
                getTitleTreeData().then(response => {
                    response = response.data;
                    if (response.success) {
                    titleTreeData = response.data;
                    } else {
                    lat.failMsg(response.msg);
                    }
                }).catch(error => {
                    lat.errorMsg("error:加载titleTreeData");
                }).finally(() => {
                    var titleTreeCopy = JSON.parse(JSON.stringify(titleTreeData));

                    layui.lat.renderTitleTreeSelector('#titleTreeSelector',titleTreeCopy, {
                        'tree': {
                            clickExpand: true,
                            clickCheck: false
                        },
                        'name': "titleId",
                        'layVerify': "required",
                        'layVerType': "请选择职称"
                    });
                });


                // 教学方法事件绑定函数
                function bindTeachingMethodEvents() {
                    // 先移除旧的事件监听器
                    $(document).off('change', 'select[name="teachingMethod"]');
                    // 绑定新的change事件 - 修复版：确保按规则刷新并更新缓存
                    $(document).on('change', 'select[name="teachingMethod"]', function(e) {
                        e.stopPropagation();
                        
                        var $select = $(this);
                        var index = $select.attr('idx');
                        var value = $select.val();
                        // 后续处理逻辑...
                        if (index !== undefined) {
                            // 关键：立即更新教学方法到gCourseArr和表格缓存
                            if (!window.gCourseArr[index]) {
                                window.gCourseArr[index] = {};
                            }
                            window.gCourseArr[index]['teachingMethod'] = value;
                            // 立即更新表格缓存中的教学方法
                            updateLayuiTableCache(index);
                            // A. 清空职称值
                            if (window.titleSelectors[index] && window.titleSelectors[index].setValue) {
                                window.titleSelectors[index].setValue([]);
                            }
                            var $titleInput = $(getTitleIdInputSelector(index));
                            if ($titleInput.length > 0) {
                                $titleInput.val('');
                            }
                            if (window.gCourseArr && window.gCourseArr[index]) {
                                window.gCourseArr[index]['titleId'] = null;
                            }

                            // B. 执行重绘更新过滤 - 调用重新渲染函数
                            var conf = window.titleConfigs[index];
                            if (conf && window.savedTitleData) {
                                // 调用重新渲染函数（会根据value参数过滤）
                                rerenderTitleSelector(index, value);
                            } else {
                                console.warn(">>> [重绘跳过] 原因: 配置或原始数据缺失", {hasConf:!!conf, hasData:!!window.savedTitleData});
                            }
                        }
                    });

                    // 方法2: 监听select元素的点击（展开下拉）
                    $(document).off('click', 'select[name="teachingMethod"]').on('click', 'select[name="teachingMethod"]', function() {
                        console.log("✅ [select点击事件] 元素被点击", $(this).attr('id'));
                    });
        
                    // 方法3: 监听focus事件
                    $(document).off('focus', 'select[name="teachingMethod"]').on('focus', 'select[name="teachingMethod"]', function() {
                        console.log("✅ [select focus事件] 元素获得焦点", $(this).attr('id'));
                    });
        
                    // 方法4: 检查并绑定现有元素
                    setTimeout(function() {
                        var selects = $('select[name="teachingMethod"]');
                        selects.each(function(i, el) {
                            var $el = $(el);
                            // 确保lay-filter属性存在
                            if (!$el.attr('lay-filter')) {
                                $el.attr('lay-filter', 'teachingMethod');
                            }
                        });
                        
                        // 如果有layui.form，尝试用layui的方式绑定
                        if (window.layui && layui.form) {
                            try {
                                layui.form.on('select(teachingMethod)', function(data) {
                                    // 处理layui事件
                                    var index = $(data.elem).attr('idx');
                                    var value = data.value;
                                    
                                    if (index !== undefined) {
                                        // 立即更新教学方法
                                        if (!window.gCourseArr[index]) {
                                            window.gCourseArr[index] = {};
                                        }
                                        window.gCourseArr[index]['teachingMethod'] = value;
                                        updateLayuiTableCache(index);
                                        
                                        // 重新渲染职称选择器
                                        var conf = window.titleConfigs[index];
                                        if (conf && window.savedTitleData) {
                                            rerenderTitleSelector(index, value);
                                        }
                                    }
                                });
                            } catch (e) {
                                console.error(">>> layui事件绑定失败:", e);
                            }
                        }
                    }, 500);
                    
                    window.teachingMethodEventsBound = true;
                }

                // 保存按钮事件处理 - 确保获取最新值
                function bindSaveButtonEvents() {
                    // 监听保存按钮，强制同步一次数据
                    $(document).on('click', 'button[lay-submit], .layui-btn[lay-event="saveCourse"], button[lay-filter="save"], button[lay-filter="saveToNext"]', function(e) {
                        if (window.layui && layui.table && layui.table.cache && layui.table.cache.courseTable) {
                            restoreFreshCourseFlag(layui.table.cache.courseTable);
                        }
                        // 保存前强制同步一次数据（作为保险）
                        setTimeout(function() {
                            // 同步所有教学方法到表格缓存
                            $('select[name="teachingMethod"]').each(function() {
                                var index = $(this).attr('idx');
                                var value = $(this).val();
                                
                                if (index !== undefined && index !== 'leader') {
                                    // 更新gCourseArr
                                    if (!window.gCourseArr[index]) {
                                        window.gCourseArr[index] = {};
                                    }
                                    window.gCourseArr[index]['teachingMethod'] = value;
                                    // 更新表格缓存
                                    updateLayuiTableCache(index);
                                }
                            });
                        }, 50);
                    });
                }

                var layuiCheck = setInterval(function() {
                    if (window.layui) {
                        clearInterval(layuiCheck);
                        // 延迟绑定，确保表格已渲染
                        setTimeout(function() {
                            // 绑定教学方法事件
                            bindTeachingMethodEvents();
                            // 绑定保存按钮事件
                            bindSaveButtonEvents();
                        }, 1000);
                        
                        // 使用MutationObserver监听动态添加的元素
                        var observer = new MutationObserver(function(mutations) {
                            mutations.forEach(function(mutation) {
                                if (mutation.type === 'childList') {
                                    $(mutation.addedNodes).each(function() {
                                        var $node = $(this);
                                        // 检查是否有teachingMethod下拉框
                                        if ($node.is('select[name="teachingMethod"]') || 
                                            $node.find('select[name="teachingMethod"]').length > 0) {
                                            // 重新绑定事件
                                            setTimeout(bindTeachingMethodEvents, 300);
                                        }
                                    });
                                }
                            });
                        });
                        
                        observer.observe(document.body, {
                            childList: true,
                            subtree: true
                        });
                    }
                }, 100);

                clearInterval(checkLat);
            }
        }, 100);
        
        // 添加调试函数
        window.debugTitle = {
            // 测试重新渲染
            testRedraw: function(index) {
                var $select = $('#teachingMethod' + index);
                if ($select.length) {
                    var value = $select.val() || '面授';
                    $select.val(value === '面授' ? '实验技术' : '面授').trigger('change');
                }
            },
            
            // 检查职称过滤
            checkTitleFilter: function(index) {
                var teachingMethod = $('#teachingMethod' + index).val() || '面授';
                var filterLevel = teachingMethod === "实验技术" ? 1 : 2;
                
                if (window.savedTitleData) {
                    var filtered = doFilter(window.savedTitleData, filterLevel);
                    return filtered;
                }
                return null;
            },
            
            // 手动触发教学方法事件
            triggerTeachingMethod: function(index) {
                var $select = $('#teachingMethod' + index);
                if ($select.length) {
                    $select.val('实验技术').trigger('change');
                }
            }
        };
    })();
</script>
<script type="text/javascript" src="/pages/mod/declare/js/d.js"></script>
