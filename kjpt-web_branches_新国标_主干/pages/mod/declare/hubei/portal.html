<script type="text/javascript">
    $.extend(true, _dbase, {
        verify: {
            json: {
                progress: [/^[\s\S]{1,2000}$/, '最多2000个汉字'],
                question: [/^[\s\S]{1,1000}$/, '最多1000个汉字'],
                target: [/^[\s\S]{1,1000}$/, '最多1000个汉字'],
                innovation: [/^[\s\S]{1,1000}$/, '最多1000个汉字'],
                projAnalyze: [/^[\s\S]{1,1000}$/, '最多1000个汉字'],
                jobSummary: [/^[\s\S]{1,1000}$/, '最多1000个汉字'],
                resume: [/^[\s\S]{1,300}$/, '最多300汉字'],
                experience: [/^[\s\S]{1,300}$/, '最多300汉字'],
                training: [/^[\s\S]{1,800}$/, '最多800汉字'],
                study: [/^[\s\S]{1,800}$/, '最多800汉字'],
                article: [/^[\s\S]{1,800}$/, '最多800汉字'],
            },
            course: {
                mustCertId: false,
                single: function (course) {
                    if (Number(course.period) > 3) return '每名讲者授课总学时不能超过3学时';
                }
            },
        },
        calc: {
            day2score: true,
            calcScore: function (courseArr, cycleArr) {
                const that = this;
                // byPeriod: 项目'教学总时数'÷3后向下取整
                let a = Math.floor(that.period / 3);
                // byDay: 项目'天数'x2,学分只能调减不能调增
                let b = 9999;
                if (cycleArr && cycleArr.length > 0) {
                    let diff = parseDiff(cycleArr[0]['dateStart'], cycleArr[0]['dateEnd']);
                    b = Math.min(diff * 2, 10);
                }
                that.score = Math.min(a, b);
                $('input[name=score]').val(that.score);
                layui.form.val('page4-form', {score: that.score});
            },
        },
        fix: {
            fixForm: function () {
                const that = this;
                let $duty = $('#duty');
                let $assnDuty = $('#assnDuty');
                if (isAssnProj(_dbase.info.scoreLevelId)) {
                    $duty.hide();
                    $assnDuty.show();
                    $('input[name=duty]').attr('lay-verify', '');
                } else {
                    $duty.show();
                    $assnDuty.hide();
                    $('input[name=assnDuty]').attr('lay-verify', '');
                }
                $('input[name=score]').attr('disabled', 'true').toggleClass('layui-disabled');
                if (isHubeiProvinceProj(_dbase.info.scoreLevelId)) {
                    that.fixhubeipt(false, false);
                }
            },
            fixhubeipt: function (show, required, disable) {
                let $ptSel = $('select[name=extType]');
                let $star = $ptSel.parent().prev().find('span');
                if (show) {
                    $ptSel.parent().parent().show();
                    if (required) {
                        $ptSel.attr('lay-verify', 'required');
                        $star.show();
                    } else {
                        $ptSel.attr('lay-verify', '');
                        $star.hide();
                    }
                } else {
                    $ptSel.parent().parent().hide();
                    $ptSel.attr('lay-verify', '');
                    $ptSel.val('');
                }
                layui.form.render('select');
            },
        },
        htarr: [
            {'holdTypeId': '4d75b492-33a6-44b0-aec6-9beb00aa2e72', 'holdTypeName': '学术讲座'},
            {'holdTypeId': 'a2223403-7748-4553-bd6c-9beb00aa30eb', 'holdTypeName': '专题讨论会'},
            {'holdTypeId': '24881288-7df6-4034-81ba-9beb00aa33a1', 'holdTypeName': '研讨班'},
            {'holdTypeId': '36a39ada-53d7-4d64-a018-9beb00aa3501', 'holdTypeName': '讲习班'},
            {'holdTypeId': '07ea0fce-97f8-4d3d-bf94-9beb00aa2c24', 'holdTypeName': '学习班'},
            {'holdTypeId': '1d3f2c3a-0c87-4226-b10d-9beb00aa3864', 'holdTypeName': '其他'},
        ],
    });
</script>
