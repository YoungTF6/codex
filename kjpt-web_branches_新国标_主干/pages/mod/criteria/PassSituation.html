<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>达标情况明细查询</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script><script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

    </style>
</head>
<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card">

        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" id="queryArea"
             style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">年度</label>
                        <div class="layui-input-block">
                            <select name="cmeYear" id="cmeYearSelector" lay-verify="">
                                <!-- don't have all option -->
                                <!--<option value=""></option>-->
                            </select>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">人员编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="personNo" id="personNoInput" placeholder=""
                                   autocomplete="off"
                                   class="layui-input"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">姓名</label>
                        <div class="layui-input-block">
                            <input type="text" name="personName" id="personNameInput" placeholder=""
                                   autocomplete="off"
                                   class="layui-input"/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">科室</label>
                        <div class="layui-input-block">
                            <div id="deptTreeSelector" data-name="" style="width: 180px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name="" style="width: 182px;"></div>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label">人员状态</label>
                        <div class="layui-input-block">
                            <select name="personStateId" id="personStateIdSelector">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm btnRounded" lay-submit
                                onclick="loadPassSituationTable()">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="passSituationTable" lay-filter="passSituationTable"
                   style="margin: 0;"></table>
        </div>

    </div>
</div>

</body>


<!-- Operation Cell -->
<script type="text/html" id="operationCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="passInfoA">详细情况明细</a>
    <a class="layui-btn layui-btn-xs btn-row" lay-event="passInfoB">各类学分汇总</a>
</script>


<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;

        let gTitleTreeData = [];
        let gTitleTreeSelector;
        let gDeptTreeData = [];
        let gDeptTreeSelector;

        window.loadPassSituationTable = loadPassSituationTable;

        $(function () {

            lat.renderCmeYear('#cmeYearSelector');

            getTitleTreeData().then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gTitleTreeData = jsonRes.data;
                }
            }).catch(error => {
                layer.msg('error:加载titleTreeData');
            }).finally(() => {
                gTitleTreeSelector = lat.renderTitleTreeSelector('#titleTreeSelector', gTitleTreeData);
            });

            getDeptTreeData(_unitId, 9).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gDeptTreeData = jsonRes.data;
                }
            }).catch(error => {
                layer.msg('error:加载titleTreeData');
            }).finally(() => {
                gDeptTreeSelector = lat.renderDeptTreeSelector('#deptTreeSelector', gDeptTreeData);
            });

            lat.renderPersonState('#personStateIdSelector');

            loadPassSituationTable();
        });

        table.on('tool(passSituationTable)', function (obj) {
            let rowData = obj.data;
            if ('passInfoA' === obj.event) {
                // 详细情况明细
                console.info(rowData.comPersonId);
                alert('详细情况明细');
            } else if ('passInfoB' === obj.event) {
                // 各类学分汇总
                console.info(JSON.stringify(rowData.csklEntryList));
                alert('各类学分汇总');
            }
        })


        function loadPassSituationTable() {
            table.render({
                id: 'passSituationTable',
                elem: '#passSituationTable',
                page: true,
                height: 'full-100',
                url: huayi_sjwh_url + 'audit/common/csklVo/page/last',
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: {
                    standardKindId: _standardKindId,
                    unitId: _unitId,
                    depth: _depth,
                    personCmeYear: $('#cmeYearSelector').val(),
                    personNo: $('input[name=personNo]').val(),
                    personName: $('input[name=personName]').val(),
                    titleId: gTitleTreeSelector ? gTitleTreeSelector.getValue('valueStr') : '',
                    deptId: gDeptTreeSelector ? gDeptTreeSelector.getValue('valueStr') : '',
                    personStateId: $('#personStateIdSelector').val()
                },
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                defaultToolbar: [],
                cols: [[
                    {field: 'personNo', title: '人员编号', minWidth: 120, align: 'center', sort: true, fixed: 'left'},
                    {field: 'personName', title: '姓名', minWidth: 120, align: 'center', sort: true, fixed: 'left'},
                    {field: 'gender', title: '性别', width: 80, align: 'center', sort: true},
                    {field: 'deptName', title: '科室', minWidth: 120, align: 'center', sort: true},
                    {field: 'unitName', title: '单位', minWidth: 180, align: 'center', sort: true},
                    {field: 'titleName', title: '职称', minWidth: 120, align: 'center', sort: true},
                    {field: 'specName', title: '专业', minWidth: 120, align: 'center', sort: true},
                    {field: 'birthday', title: '出生日期', minWidth: 120, align: 'center', sort: true},
                    {field: 'personStateName', title: '人员状态', minWidth: 120, align: 'center', sort: true},
                    {field: 'totalScore', title: '总学分', width: 90, align: 'center', sort: true},
                    {field: 'totalPeriod', title: '总学时', width: 90, align: 'center', sort: true},
                    {title: '操作', minWidth: 220, align: 'center', sort: true, templet: '#operationCell'},
                    {field: 'scoreI', title: 'Ⅰ类学分', minWidth: 102, align: 'center', sort: true},
                    {field: 'scoreIi', title: 'Ⅱ类学分', minWidth: 102, align: 'center', sort: true},
                    {field: 'scoreOther', title: '其它学分', minWidth: 102, align: 'center', sort: true},
                    {
                        field: 'passResult',
                        title: '达标情况',
                        minWidth: 120,
                        align: 'center',
                        sort: true,
                        templet: (data) => PassResultEnum[data.passResult.toString()]
                    },
                    {field: 'reason', title: '不达标原因', minWidth: 240, align: 'center', sort: true}
                ]]
            });
        }
    });
</script>

<style>

</style>
</html>
