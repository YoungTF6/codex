<script>

    const _ciphertext = getOrDefault(getUrlParamByName('verify'), 'a7da1622-1f3d-4215-9d66-ff85f23c06d8');
    const _pdfType = getOrDefault(getUrlParamByName('pdfType'), 2);
    let gAuditPdfVo = auditPdfVoResponseData.data;

    $(function () {
        console.info('ciphertext: %s, pdfType: %s', _ciphertext, _pdfType);
        loadAuditPdfVo();
    });

    function loadAuditPdfVo() {
        let visit = huayi_sjwh_url + 'audit/verify/qrcode/' + _ciphertext + '/' + _pdfType;
        getAction(visit).then(response => {
            let jsonRes = response.data;
            if (jsonRes.success) {
                gAuditPdfVo = jsonRes.data;
            }
        }).catch(error => {
            console.info('error:加载AuditPdfVo');
        }).finally(() => {
            renderAuditPdfVo();
        });
    }

    function renderAuditPdfVo() {
        let gender = gAuditPdfVo.gender;
        if ('1' === gender) {
            gender = '男';
        } else if ('2' === gender) {
            gender = '女';
        }
        if (gAuditPdfVo) {
            // 内蒙套隐藏证书编号
            if ('08e44437-5789-44e0-8ff8-9ecb00a6348a' === gAuditPdfVo.standardKindId) {
                $('#cert_no_li').css('display', 'none');
            }
            let unitName = gAuditPdfVo.scoreVoList[0].unitName;
            let teachUnitText = gAuditPdfVo.scoreVoList[0].teachUnitText;
            $("#person_name").text(gAuditPdfVo.personName);
            $("#age").text(gAuditPdfVo.age);
            $('#gender').text(gender);
            $("#cert_id").text(gAuditPdfVo.certId);
            $("#cert_no").text(gAuditPdfVo.certNo);
            $("#proj_name").text(gAuditPdfVo.scoreVoList[0].projName);
            $("#proj_no").text(gAuditPdfVo.scoreVoList[0].projNo);
            $("#holdDate").text(gAuditPdfVo.scoreVoList[0].startDate + '至' + gAuditPdfVo.scoreVoList[0].endDate);
            $("#teach_unit_name").text(teachUnitText ? teachUnitText : unitName);
            $("#score").text(gAuditPdfVo.scoreVoList[0].score);
            $("#period").text(gAuditPdfVo.scoreVoList[0].period);
        }
    }

</script>
