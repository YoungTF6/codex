<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <title>VerifyScoreAudit</title>

    <link rel="stylesheet" href="/pages/mod/verify/css/reset.css" media="all">
    <link rel="stylesheet" href="/pages/mod/verify/css/layout.css" media="all">

    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script><script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <script type="text/javascript" src="/pages/mod/verify/js/rem.js"></script>
    <script type="text/javascript" src="/pages/mod/verify/js/mock.js"></script>
    <style>
        .title {
            padding: 0.2rem 0 1rem 0;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
        }
        .main_top_default {
            background-size: 100% 15.4rem;
        }   
        #base-info span {
            display: inline-block;
        }
        #base-info-left {
            width: 65%;
        }
        #base-info-right {
            float: right;
            width: 30%;
        }
        #photo {
            margin-top: 0.5rem;
            border: #fff 1px solid;
            border-radius: 0.3rem;
            width: 100%;
        }
        #base-info .field-name {
            padding: 0.2rem 0;
            font-size: 0.8rem;
            font-weight: bold;
        }
        #base-info .field-val {
            padding: 0.2rem 0;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .main_list_item ul {
            margin: 0 0.8rem;
            width: 14.4rem;
        }
        .main_list_item ul li p {
            margin-right: 0.8rem;
        }

        .bold { font-weight: bold; }
        .hide { display: none; }
        .placeholder { display: inline-block; }
        .placeholder.w-1 { width: 1ch; }
        .placeholder.w-5 { width: 5ch; }
    </style>
</head>
<body>
    <div class="box">
        <div class="main">
            <div class="main_top_default">
                <div class="top_tab">
                    <div class="title">
                        <span class="field-val" id="cmeYear">-</span><span id="title"></span>
                    </div>
                    <div id="base-info">
                        <span id="base-info-left">
                            <div class="field-name">姓名</div>
                            <div class="field-val" id="personName">-</div>
                            <div class="field-name">身份证号码</div>
                            <div class="field-val" id="certId">-</div>
                        </span>
                        <span id="base-info-right">
                            <img id="photo" src="/img/person/nophoto.png">
                        </span>
                    </div>
                </div>
                <div class="main_list">
                    <ul>
                        <li>
                            <b class="dw">&nbsp;单位</b>
                            <p class="field-val" id="unitName">-</p>
                        </li>
                        <li>
                            <b class="ks">&nbsp;科室</b>
                            <p class="field-val" id="deptName">-</p>
                        </li>
                        <li>
                            <b class="zc">&nbsp;职称</b>
                            <p class="field-val" id="titleName">-</p>
                        </li>
                    </ul>
                </div>
                <div class="main_list_item hide">
                    <ul>
                        <li>
                            <b class="nd">&nbsp;总<i class="placeholder w-1"></i>学<i class="placeholder w-1"></i>时</b>
                            <p class="field-val" id="totalPeriod">-</p>
                        </li>
                        <li>
                            <b class="nd">&nbsp;总<i class="placeholder w-1"></i>学<i class="placeholder w-1"></i>分</b>
                            <p class="field-val" id="totalScore">-</p>
                        </li>
                        <li>
                            <b class="yi">&nbsp;Ⅰ&nbsp;类学分</b>
                            <p class="field-val" id="score1">-</p>
                        </li>
                        <li>
                            <b class="er">&nbsp;Ⅱ&nbsp;类学分</b>
                            <p class="field-val" id="score2">-</p>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>

<script>
    const   _ciphertext = getUrlParamByName('verify'),
            _pdfType    = getUrlParamByName('pdfType'),
            _score      = getUrlParamByName('score');
            
    // let     gAuditPdfVo = auditPdfVoResponseData.data;


    $(() => {
        loadAuditPdfVo();
    });


    function loadAuditPdfVo() {
        if (!_ciphertext) return false;
        if (_score && _score === 't') {
            $('.main_list_item').removeClass('hide');
            $('#title').html('年度湖南省专业技术人员<br>继续医学教育学分总表');
        } else {
            $('.main_list').css('margin-bottom', '1.5rem');
            $('#title').html('年度湖南省年度专业科目<br>培训合格证明');
        }
        getAction(huayi_sjwh_url + 'audit/verify/qrcode/' + _ciphertext + '/' + _pdfType).then(res => {
            let jsonRes = res.data;
            if (jsonRes.success) gAuditPdfVo = jsonRes.data;
        })
        .catch(error => layer.msg('Error：加载证书信息失败', { icon: 7, time: 1500 }))
        .finally(() => {
            if (!gAuditPdfVo) return false;

            let photoUrl = gAuditPdfVo.photo;
            if (photoUrl) $('#photo').attr('src', photoUrl);

            $('.field-val').each((i, item) => {
                let fieldName   = $(item).attr('id'),
                    fieldVal    = gAuditPdfVo[fieldName];
                    console.log(fieldName, fieldVal);       
                if (fieldVal) $(item).text(fieldVal);
            });
        });
    }
</script>
</html>
