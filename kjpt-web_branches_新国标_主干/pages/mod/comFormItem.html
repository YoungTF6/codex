<label class="layui-form-label form-batch">申报批次</label>
<div class="layui-input-block form-batch">
    <select name="batch" id="batch">
        <option value="">全部</option>
        <option value="1">第一批</option>
        <option value="2">第二批</option>
    </select>
</div>

<label class="layui-form-label form-batch-required"><i class="required-item"></i>申报批次</label>
<div class="layui-input-block form-batch-required">
    <select name="batch" lay-verify="required">
        <option value="">请选择</option>
        <option value="1">第一批</option>
        <option value="2">第二批</option>
    </select>
</div>
