<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>group-modal-default</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <!-- 1.2.1 -->
    <!--<link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">-->
    <!--<script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <!-- 2.6.8 -->
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <script type="text/javascript" src="/js/common.js"></script>
    <script type="text/javascript" src="/pages/mod/libs/netflix.mng.min.js"></script>
    <script type="text/javascript" src="/pages/mod/js/kjpt.js"></script>
    <script type="text/javascript" src="/js/api/number.js"></script>
    <style>
        .layui-form-select dl {
            max-height: 200px;
        }
        .layui-form-label {
            width: 110px !important;
            padding: 9px 10px !important;
        }
        .layui-input-block {
            margin-left: 130px !important;
        }
    </style>
</head>
<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card" style="padding:20px; margin-top: -16px;">
        <blockquote class="layui-elem-quote layui-quote-nm only_hunan hide" style="color: #f56c6c;">单位组织的学术活动”每人每年有效学分最多10分，超过10分按照10分计入达标。</blockquote>
        <form class="layui-form" id="groupProjForm" lay-filter="groupProjForm">
            <!-- row1 -->
            <input type="hidden" name="groupProjId">
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>举办年度</label>
                    <div class="layui-input-block">
                        <select name="cmeYear" id="cmeYearSelector" lay-verify="required">
                            <option value=""></option>
                        </select>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>活动名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="groupProjName" lay-verify="required|groupProjName" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
            </div>
            <!-- row2 -->
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span data-id="lblProjectLevel" data-name="scoreLevel" data-required="1" data-check-parent="0" data-view-mode="010" data-label="学分分类">学分分类</span></label>
                    <div class="layui-input-block">
                        <div data-id=""></div>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span data-id="lblActivityForm" data-name="holdType" data-required="1" data-multi="0" data-view-mode="___">活动形式</span></label>
                    <div class="layui-input-block">
                        <div data-id=""></div>
                    </div>
                </div>
            </div>
            <!-- row -->
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span data-id="lblActivityContent" data-name="scoreType" data-required="1" data-label="">活动内容</span></label>
                    <div class="layui-input-block">
                        <div data-id=""></div>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>拟授分人数</label>
                    <div class="layui-input-block">
                        <input type="number" max="300" name="limitPerson" placeholder="" autocomplete="off" class="layui-input number_zzs" lay-verify="required"/>
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>所属医学体系</label>
                    <div class="layui-input-block">
                        <select name="medicalType" lay-search="true" lay-verify="required">
                            <option value=""></option>
                            <option value="1">西医</option>
                            <option value="2">中医</option>
                        </select>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label">考核方式</label>
                    <div class="layui-input-block">
                        <select name="checkType" id="checkTypeSelector" lay-search="true">
                            <option value=""></option>
                        </select>
                    </div>
                </div>
            </div>
            <!-- row -->
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>二级学科</label>
                    <div class="layui-input-block">
                        <select name="twoKnowledgeId" lay-filter="twoKnowledgeIdSelector" id="twoKnowledgeIdSelector"
                                lay-verify="required" lay-search="true">
                            <option value=""></option>
                        </select>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label"><span style="color: red; ">*&nbsp;</span>三级学科</label>
                    <div class="layui-input-block">
                        <select name="knowledgeId" lay-filter="knowledgeIdSelector" id="knowledgeIdSelector"
                                lay-search="" lay-verify="required|knowledgeId">
                            <option value="">请先选择二级学科</option>
                        </select>
                    </div>
                </div>
            </div>
            <!-- row5 -->
            <!-- row6 -->
            <input type="hidden" name="score" value="0">
            <input type="hidden" name="period" value="0">
            <div class="layui-form-item">
                <div class="layui-col-sm6">
                    <label class="layui-form-label" id="noLabel">其他编号</label>
                    <div class="layui-input-block">
                        <input type="text" name="otherNo" placeholder="" autocomplete="off" class="layui-input"/>
                    </div>
                </div>
                <div class="layui-col-sm6">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-input-block">
                        <input type="text" name="remark" placeholder="" autocomplete="off" class="layui-input"/>
                    </div>
                </div>
            </div>
            <!-- row7 -->
            <div class="layui-form-item">
                <div class="layui-col-sm12">
                    <div style="text-align: center;">
                        <button class="layui-btn" type="submit" lay-submit lay-filter="saveBack">保存并返回列表</button>
                        <button class="layui-btn" type="submit" lay-submit lay-filter="nextStep">下一步添加举办周期
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script type="text/javascript" src="/pages/mod/group/js/group_modal.js"></script>
<script type="text/javascript" src="/pages/mod/js/label_data.js"></script>
<script type="text/javascript" src="/pages/mod/libs/vendor.gq12mdzl.d3ec9qak.js"></script>
<script type="text/javascript" src="/pages/mod/js/prod.tmp.js"></script>
<style>
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none !important;
    }
    input[type='number'] {
        -moz-appearance: textfield;
    }
</style>
</html>
