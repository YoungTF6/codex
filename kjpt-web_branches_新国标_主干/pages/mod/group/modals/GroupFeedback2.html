            formData.groupProjId = s;
            formData.downId = o;
            formData.createBy = _userId;

            var url = huayi_sjwh_url + "group/feedback/details/save";
            postAction(url, formData).then(e => {
                e = e.data;
                if (e.success) {
                    //设置隐藏域feedbackDetailsId
                    d('input[name="feedbackDetailsId"]').val(e.data.feedbackDetailsId);
                } else {
                    l.failMsg(e.msg);
                }
            }).catch(e => {
                l.errorMsg("error:保存反馈详情")
            }).finally(() => {
            });
        }

        //根据groupProjId、downId获取反馈详情并回显
        function loadGroupFeedbackDetails() {
            var url = huayi_sjwh_url + "group/feedback/details/" + s + "/" + o;
            getAction(url).then(e => {
                e = e.data;
                if (e.success) {
                    var data = e.data;
                    if (data) {
                        d('textarea[name="trainAnalyse"]').val(data.trainAnalyse);
                        d('textarea[name="questionSuggest"]').val(data.questionSuggest);
                        d('input[name="feedbackDetailsId"]').val(data.feedbackDetailsId);
                    }
                } else {
                    l.failMsg(e.msg);
                }
            }).catch(e => {
                l.errorMsg("error:加载反馈详情")
            }).finally(() => {
            });
        }

    });
</script>
