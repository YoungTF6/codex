<script type="text/html" id="operationCell">
    {{# if(d.flState > 0) { }}
    <!-- <a class="layui-btn layui-btn-xs btn-row" lay-event="viewFeedback">已反馈</a> -->
    <a class="layui-btn layui-btn-xs btn-row" lay-event="editFeedback">已反馈</a>
    {{# } else { }}
    <a class="layui-btn layui-btn-xs btn-row layui-btn-warm btn-warm-row" lay-event="editFeedback">未反馈</a>
    {{# } }}
</script>

<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'upload', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let upload = layui.upload;
        let lat = layui.lat;

        const _gProjId = getOrDefault(getUrlParamByName('g_proj_id'), PseudoNull.UUID);
        const _gScoreLevelId = getOrDefault(getUrlParamByName('g_score_level_id'), PseudoNull.UUID);

        let gLayerIndex = -1;
        let gDownId;

        layer.ready(function () {
            renderCycleTable();
            loadCycleList();
        });


        // page.cycle ========================================================

        function loadCycleList() {
            let visit = `${huayi_sjwh_url}group/feedback/cycle/list/${_gProjId}`;
            getAction(visit).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gCycleVoList = jsonRes.data;
                } else {
                    lat.failMsg(jsonRes.msg);
                }
            }).catch(error => {
                lat.errorMsg('error:加载周期列表');
            }).finally(() => {
                reloadCycleTable();
            });
        }

        function renderCycleTable() {
            table.render({
                id: 'cycleTable',
                elem: '#cycleTable',
                height: 'full-100',
                defaultToolbar: [],
                loading: true,
                cols: [[
                    {title: '操作', minWidth: 188, align: 'center', fixed: 'left', templet: '#operationCell'},
                    {
                        field: 'batch',
                        title: '批次',
                        minWidth: 120,
                        align: 'center',
                        sort: true,
                        templet: (data) => '第' + data.LAY_INDEX + '批次'
                    },
                    {field: 'startDate', title: '开始日期', minWidth: 120, align: 'center', sort: true},
                    {field: 'endDate', title: '结束日期', minWidth: 120, align: 'center', sort: true}
                ]],
                data: [{
                    startDate: "2023-09-09"
                }],
                done: function (res, curr, count) {

                }
            });
        }

        function reloadCycleTable() {
            table.reload('cycleTable', {
                data: gCycleVoList
            });
        }

        table.on('tool(cycleTable)', function (obj) {
            let rowData = obj.data;
            gDownId = rowData.downId;
            if ('editFeedback' === obj.event) {
                let limitvalue = judgeAndApply(rowData.downId, rowData.endDate);
                if (!limitvalue) {
                    return;
                }
                showFbModal('edit');
            } else if ('viewFeedback' === obj.event) {
                showFbModal('view');
            }
        });

        //判断反馈时限
        let judgeAndApply = function(downId, endDtValue) {
            let limitvalue = true;
                $.ajax({
                    type: 'POST',
                    url: huayi_projectscore_url + "cmeProjFeedbackInfo/getFeedbackLimit",
                    async:false,
                    data: {
                        endDt:endDtValue,
                        scoreLevelId: _gScoreLevelId,
                        unitId:localStorage.getItem("unit-id")
                    },
                    success: function (res) {
                        if(res.status != 200) {
                            layer.msg(res.msg);
                            limitvalue = false;
                            return limitvalue;
                        }
                    },
                    error: function (res) {
                        layer.msg(res.msg);
                        limitvalue = false;
                        return limitvalue;
                    }
                });
            return limitvalue;
        }

        function showFbModal(action) {
            _isGov && (action = 'view');
            let haveParent = top !== self;
            let lay = haveParent ? parent.layer : layer;
            gLayerIndex = lay.open({
                type: 2,
                shade: 0.6,
                shadeClose: true,
                title: '执行情况反馈',
                content: `/pages/mod/group/modals/GroupFeedback2.html?action=${action}&g_proj_id=${_gProjId}&down_id=${gDownId}`,
                area: ['100%', '100%'],
                success: function (layero, index) {

                },
                end: function (layero, index) {
                    loadCycleList();
                }
            });
        }


    });
</script>
