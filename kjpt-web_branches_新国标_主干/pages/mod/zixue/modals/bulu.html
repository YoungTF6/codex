<script type="text/javascript">

// 通用学分级别树加载方法，支持自定义参数与成功失败回调
    let loadScoreLevelTree = (options = {}) => {
        const {
            year = '',
            viewMode = '111',
            standardKindId = _skId,
            onSuccess = null,
            onError = null
        } = options;
        const requestUrl = `${huayi_sjwh_url}option/scoreLevel/tree/${standardKindId}/${year}/${viewMode}`;
        return getAction(requestUrl).then(response => {
            const respData = response && response.data;
            const treeData = Array.isArray(respData) ? respData : (respData && Array.isArray(respData.data) ? respData.data : []);
            if (typeof onSuccess === 'function') {
                onSuccess(treeData, response);
            }
            return treeData;
        }).catch(error => {
            if (typeof onError === 'function') {
                onError(error);
            }
            return Promise.reject(error);
        });
    }

// 通用举办方式加载方法，支持自定义参数与成功失败回调
    let loadHoldTypeList = (options = {}) => {
        const {
            scoreLevel = '',
            viewMode = '111',
            standardKindId = _skId,
            onSuccess = null,
            onError = null
        } = options;
        const requestUrl = `${huayi_sjwh_url}option/holdType/list/${standardKindId}/${scoreLevel}/${viewMode}`;
        return getAction(requestUrl).then(response => {
            const respData = response && response.data;
            const listData = Array.isArray(respData) ? respData : (respData && Array.isArray(respData.data) ? respData.data : []);
            if (typeof onSuccess === 'function') {
                onSuccess(listData, response);
            }
            return listData;
        }).catch(error => {
            if (typeof onError === 'function') {
                onError(error);
            }
            return Promise.reject(error);
        });
    }

// 通用学科树加载方法，支持自定义参数与成功失败回调
    let loadKnowledgeTree = (options = {}) => {
        const {
            cmeYear = '',
            standardKindId = _skId,
            onSuccess = null,
            onError = null
        } = options;
        const requestUrl = `${huayi_sjwh_url}option/knowledge/tree/data`;
        const optionDto = {
            standardKindId: standardKindId,
            cmeYear: cmeYear || ''
        };
        return postAction(requestUrl, optionDto).then(response => {
            const jsonRes = response && response.data;
            const treeData = jsonRes && Array.isArray(jsonRes.data) ? jsonRes.data : [];
            if (jsonRes && jsonRes.success) {
                if (typeof onSuccess === 'function') {
                    onSuccess(treeData, response);
                }
                return treeData;
            }
            if (typeof onError === 'function') {
                onError(response);
            }
            return Promise.reject(response);
        }).catch(error => {
            if (typeof onError === 'function') {
                onError(error);
            }
            return Promise.reject(error);
        });
    }

    function customBuildTree(data, parentId, idField, parentField) {
        if (!Array.isArray(data)) {
            return [];
        }
        
        const result = [];
        const map = {};
        
        data.forEach(item => {
            map[item[idField]] = item;
        });
        
        data.forEach(item => {
            const parent = map[item[parentField]];
            if (item[parentField] === parentId) {
                result.push(item);
            } else if (parent) {
                if (!parent.children) {
                    parent.children = [];
                }
                parent.children.push(item);
            }
        });
        
        return result;
    }

    // 获取学分级别已选叶子节点，非叶子节点返回 null
    function getSelectedLeafScoreLevelNode() {
        if (!window.gScoreLevelInst) {
            return null;
        }
        const selectedList = window.gScoreLevelInst.getValue();
        const selectedNode = selectedList && selectedList[0];
        if (!selectedNode) {
            return null;
        }
        const hasChildren = Array.isArray(selectedNode.children) && selectedNode.children.length > 0;
        return hasChildren ? null : selectedNode;
    }
    
    const _blrender = {
        data: {
            'scoreLevel': [],
            'knowledge': [],
            'holdType': [],
        },
        // 递归处理学分级别树，仅允许叶子节点可选
        formatScoreLevelTreeData: function (treeData) {
            if (!Array.isArray(treeData)) {
                return [];
            }
            return treeData.map(item => {
                const children = this.formatScoreLevelTreeData(item.children || []);
                const hasChildren = children.length > 0;
                return Object.assign({}, item, {
                    disabled: hasChildren,
                    children: children
                });
            });
        },
        // 递归处理学科树，仅允许叶子节点可选
        formatKnowledgeTreeData: function (treeData) {
            if (!Array.isArray(treeData)) {
                return [];
            }
            return treeData.map(item => {
                const children = this.formatKnowledgeTreeData(item.children || []);
                const hasChildren = children.length > 0;
                return Object.assign({}, item, {
                    disabled: hasChildren,
                    children: children
                });
            });
        },
        // 渲染学分级别树，数据来源后端接口（与学科一致：先同步 render 占位，保证 name=scoreLevelId 的校验隐藏域存在，再异步 update 树数据）
        scoreLevel: function (year, callback) {
            const that = this;
            const renderYear = year || $('select[name=bl_year]').val();
            if (!window.gScoreLevelInst) {
                window.gScoreLevelInst = layui.xmSelect.render({
                    el: 'div[name=scoreLevelTree]',
                    autoRow: false,
                    radio: true,
                    filterable: true,
                    direction: 'auto',
                    size: 'small',
                    clickClose: false,
                    height: '300px',
                    name: 'scoreLevelTree',
                    layVerify: 'required',
                    layReqText: '请选择学分级别',
                    data: [],
                    tree: {
                        show: true,
                        clickExpand: true,
                        clickCheck: true,
                        showFolderIcon: true,
                        showLine: true,
                        indent: 20,
                        simple: true,
                        strict: false
                    },
                    prop: {
                        name: 'name',
                        value: 'id',
                        children: 'children'
                    },
                    model: {
                        type: 'fixed',
                        icon: 'hidden',
                        label: {
                            type: 'text'
                        }
                    },
                    on: {
                        change: function () {
                            const selectedList = window.gScoreLevelInst.getValue();
                            const selectedNode = selectedList && selectedList[0];
                            const hasChildren = selectedNode && Array.isArray(selectedNode.children) && selectedNode.children.length > 0;
                            if (hasChildren) {
                                $('input[name=scoreLevelTree]').val('');
                                if (!window.gScoreLevelParentWarned) {
                                    lat.failMsg('父级不可选，请选择末级节点');
                                    window.gScoreLevelParentWarned = true;
                                }
                                return;
                            }
                            const valueText = window.gScoreLevelInst.getValue('valueStr');
                            $('input[name=scoreLevelTree]').val(valueText || '');
                        }
                    }
                });
            }
            if (!renderYear) {
                if (typeof callback === 'function') callback([]);
                return;
            }
            loadScoreLevelTree({
                year: renderYear,
                viewMode: '111',
                onSuccess: function (treeData) {
                    that.data.scoreLevel = that.formatScoreLevelTreeData(treeData);
                    window.gScoreLevelInst.update({data: that.data.scoreLevel});
                    window.gScoreLevelInst.setValue([]);
                    $('input[name=scoreLevelTree]').val('');
                    if (typeof callback === 'function') callback(that.data.scoreLevel);
                },
                onError: function () {
                    that.data.scoreLevel = [];
                    window.gScoreLevelInst.update({data: []});
                    window.gScoreLevelInst.setValue([]);
                    $('input[name=scoreLevelTree]').val('');
                    lat.failMsg('学分级别加载失败');
                    if (typeof callback === 'function') callback([]);
                }
            });
        },
        knowledge: function (year, callback) {
            const that = this;
            const renderYear = year || $('select[name=bl_year]').val();
            if (!window.gKnowledgeInst) {
                window.gKnowledgeInst = layui.xmSelect.render({
                    el: 'div[name=knowledgeId]',
                    autoRow: false,
                    radio: true,
                    filterable: true,
                    direction: 'auto',
                    size: 'small',
                    clickClose: false,
                    height: '300px',
                    name: 'knowledgeId',
                    layVerify: 'required',
                    layReqText: '请选择学科',
                    data: [],
                    tree: {
                        show: true,
                        clickExpand: true,
                        clickCheck: true,
                        showFolderIcon: true,
                        showLine: true,
                        indent: 20,
                        simple: true,
                        strict: false
                    },
                    prop: {
                        name: 'knowledgeName',
                        value: 'knowledgeId',
                        children: 'children'
                    },
                    theme: {
                        color: '#5FB878'
                    },
                    model: {
                        type: 'fixed',
                        icon: 'hidden',
                        label: {
                            type: 'text'
                        }
                    },
                    on: {
                        change: function () {
                            const selectedList = window.gKnowledgeInst.getValue();
                            const selectedNode = selectedList && selectedList[0];
                            if (selectedNode && Array.isArray(selectedNode.children) && selectedNode.children.length > 0) {
                                window.gKnowledgeInst.setValue([]);
                            }
                        }
                    }
                });
            }
            loadKnowledgeTree({
                cmeYear: renderYear,
                onSuccess: function (treeData) {
                    that.data.knowledge = that.formatKnowledgeTreeData(treeData);
                    window.gKnowledgeInst.update({data: that.data.knowledge});
                    if (typeof callback === 'function') callback(that.data.knowledge);
                },
                onError: function () {
                    that.data.knowledge = [];
                    window.gKnowledgeInst.update({data: []});
                    window.gKnowledgeInst.setValue([]);
                    lat.failMsg('学科加载失败');
                    if (typeof callback === 'function') callback([]);
                }
            });
            return window.gKnowledgeInst;
        },
        holdType: function () {
            const that = this;
            let $sel = $('select[name=holdTypeId]');
            $sel.empty().append(new Option());
            loadHoldTypeList({
                scoreLevel: '',
                viewMode: '111',
                onSuccess: function (listData) {
                    that.data.holdType = listData;
                    that.data.holdType.forEach(item => {
                        $sel.append(new Option(item.holdTypeName, item.holdTypeId));
                    });
                    layui.form.render('select');
                },
                onError: function () {
                    that.data.holdType = [];
                    $sel.empty().append(new Option());
                    layui.form.render('select');
                    lat.failMsg('举办方式加载失败');
                }
            });
        },
    }
</script>
<script type="text/javascript">
    layui.config({
        base: '/js/layui/ext/',
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat',
        ysUpload: 'ysUpload',
        tool: 'tool',
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat', 'upload', 'ysUpload', 'tool'], function () {
        let table = layui.table, layer = layui.layer, form = layui.form, laydate = layui.laydate, dropdown = layui.dropdown;
        let element = layui.element, $ = layui.jquery, xmSelect = layui.xmSelect, lat = layui.lat, upload = layui.upload;
        let tool = layui.tool;
        let gLayerIndex = -1, gScoreArr = [], gblCert = 0, gblScore = 0, gblId = getUrlParamByName('id'), gknowinst, gdsel;
        const _pid = getOrDefault(getUrlParamByName('pid'), '');
        const _action = getUrlParamByName('action');
        const currentYear = new Date().getFullYear()-1; 
        tool.createHainanYear('cmeYearSelect',true);
        window.getChildUnitMsg = setUnitFromModal;
        window.viewupldfile = function (elem) {
            let url = $(elem).data('url');
            parent.viewupldfile(url);
        }
        layer.ready(function () {
            _blrender.scoreLevel();
            gknowinst = _blrender.knowledge();
            _blrender.holdType();

            gdsel = lat.renderDaySelector('input[name=studyDate]', '', {min: `${currentYear}-01-01`, max: `${currentYear}-12-31`});
        });
        $(function () {
            _score.renderTable();
            _upld.render();
            _upld2.render();
            bind();
            if (gblId) {
                _blact.detail(gblId);
            } else {
                echobl({'cmeYear': currentYear, 'blCert': 0, 'blScore': 0});
            }
            
        });

        table.on('tool(table_id)', function (obj) {
            let rowData = obj.data;
            if ('viewscorefile' === obj.event) {
                let arr = JSON.parse(rowData.scoreFile).map(f => {
                    return {'fileName': f.file_name, 'scorePhotoUrl': f.file_url}
                });
                if (arr.length < 1) {
                    lat.failMsg('无附件');
                    return false;
                }
                localStorage.setItem('tmp_single_photo', JSON.stringify(arr));
                layer.open({
                    type: 2,
                    shade: 0.4,
                    shadeClose: true,
                    title: '学分证明照片',
                    content: '/pages/mod/check/modals/SinglePhotoModal_2.html?score_id=1',
                    area: ['100%', '100%'],
                    end: function (layero, index) {
                        localStorage.removeItem('tmp_single_photo');
                    }
                });
            } else if ('editscore' === obj.event) {
                _score.showmodal(rowData);
            } else if ('delscore' === obj.event) {
                _score.del(rowData);
            }
        });
        form.on('select(bl_year)', function (data) {
            let y = data.value;
            $('select[name=score_year]').empty().append(new Option(y, y));
            _blrender.scoreLevel(y);
            _blrender.knowledge(y);
            form.render('select');
            _fix.dd();
            lay_day_sel_update(gdsel, '', `${y}-01-01`, `${y}-12-31`);
        });
        form.on('checkbox(bl_flag)', function (data) {
            let flag = data.elem.checked;
            function abc() {
                data.elem.checked = true;
                form.render('checkbox');
            }
            if ('cert' === data.value) {
                if (!flag && _upld.getarr().length > 0) {
                    lat.failMsg('已上传材料，请删除后再取消勾选');
                    abc();
                    return false;
                }
                gblCert = +flag;
            }
            if ('score' === data.value) {
                if (!flag && gScoreArr.length > 0) {
                    lat.failMsg('已录入学分，请删除后再取消勾选');
                    abc();
                    return false;
                }
                gblScore = +flag;
            }
            _fix.dd();
        });
        form.on('submit(score_save)', function (data) {
            let fields = data.field;
            let fa = _upld2.getarr();
            if (fa.length < 1) {
                lat.failMsg('请上传学分证明材料');
                return false;
            }
            fields.scoreFile = JSON.stringify(fa);
            const selectedLeafScoreLevelNode = getSelectedLeafScoreLevelNode();
            fields.scoreLevelId = selectedLeafScoreLevelNode ? (selectedLeafScoreLevelNode.id || '') : '';
            fields.scoreLevelName = selectedLeafScoreLevelNode ? (selectedLeafScoreLevelNode.name || '') : '';
            $('input[name=scoreLevelTree]').val(fields.scoreLevelId);
            if (!fields.scoreLevelId) {
                lat.failMsg('请选择学分级别');
                return false;
            }
            fields.holdTypeName = $('select[name=holdTypeId]').siblings().find(`dd[lay-value=${fields.holdTypeId}]`).text();
            fields.knowledgeName = gknowinst.getValue('nameStr');
            _score.sou(fields);
            layer.closeAll();
            return false;
        });
        form.verify({
            'projNo': [/^.{0,30}$/, '项目编号最多30个字'],
            'projName': [/^.{1,75}$/, '项目名称最多75个字'],
            // 'score':
            // 'period':
            'teachUnitName': [/^.{1,60}$/, '发证机构最多60个字'],
            'remark': [/^.{0,100}$/, '备注最多100个字'],
        });
        function echobl(bl) {
            $('select[name=bl_year]').val(bl.cmeYear).siblings().find(`dd[lay-value=${bl.cmeYear}]`).click();
            gblCert = bl.blCert;
            gblScore = bl.blScore;
            let a = '' + gblCert + gblScore;
            echoCheckbox('bl_flag', {'00': '', '01': 'score', '10': 'cert', '11': 'cert,score'}[a]);
            //
            let buluFile = bl.buluFile || '[]';
            _upld.reset();
            _upld.appendFile(JSON.parse(buluFile));
            //
            gScoreArr = bl.scoreList || [];
            gScoreArr.forEach(s => s.fakeId = uuid());
            _score.refreshTable();
            _fix.dd();
        }
        function abulu() {
            let cmeYear = $('select[name=bl_year]').val();
            gScoreArr.forEach(s => {
                s.cmeYear = cmeYear;
                s.comPersonId = _pid;
            })
            return {
                'cmeYear': cmeYear,
                'blCert': gblCert,
                'blScore': gblScore,
                'buluFile': JSON.stringify(_upld.getarr()),
                'scoreList': gScoreArr,
            };
        }
        function bind() {
            $('#btn_save').click(function () {
                _blact.savebulu(abulu());
            });
            $('#btn_submit').click(function () {
                let a = abulu();
                if (1 === a.blCert && (!a.buluFile || '[]' === a.buluFile || '' === a.buluFile)) {
                    lat.failMsg('未上传补打证书证明材料');
                } else if (1 === a.blScore && (!a.scoreList || a.scoreList.length < 1)) {
                    lat.failMsg('未补录学分');
                } else if (!issameyear(a)) {
                    lat.failMsg('所选年度和授分日期所在年度不一致');
                } else {
                    a.state = 20;
                    a.statex = '0xxx';
                    _blact.savebulu(a);
                }
            });
            function issameyear(bl) {
                let y = bl.cmeYear;
                let sl = bl.scoreList;
                if (sl && sl.length > 0) {
                    for (let i = 0; i < sl.length; ++i) {
                        if (!sl[i].studyDate.startsWith(y)) return false;
                    }
                    return true;
                } else {
                    return true;
                }
            }
            $('#btn_addscore').on('click', function () {
                _score.showmodal(null);
            });
            $('#btn_sel_unit').click(() => {
                layer.open({
                    area: ['80%', '80%'],
                    type: 2,
                    title: '选择单位',
                    content: '/pages/controls/unit/unitsMessage.html'
                });
                return false;
            });
        }
        function setUnitFromModal(unitId, unitName, hospitalLevelId, unitLevelName) {
            form.val('score_form', {
                'teachUnitId': unitId,
                'teachUnitName': unitName,
            });
        }
        const _fix = {
            cancert: function (year) {
                return +year <= 2021;
            },
            canscore: function (year) {
                return true;
            },
            dd: function () {
                let y = $('select[name=bl_year]').val();
                if (this.cancert(y)) {
                    $(`input[name^=bl_flag][value=cert]`).attr('disabled', false);
                } else {
                    $(`input[name^=bl_flag][value=cert]`).prop('checked', false).attr('disabled', true).addClass('layui-btn-disabled');
                    gblCert = 0;
                }
                if (this.canscore(y)) {
                    $(`input[name^=bl_flag][value=score]`).attr('disabled', false);
                } else {
                    $(`input[name^=bl_flag][value=score]`).prop('checked', false).attr('disabled', true).addClass('layui-btn-disabled');
                    gblScore = 0;
                }
                if (0 === gblCert) $('#btn_upload').addClass("layui-btn-disabled").attr("disabled", true);
                if (1 === gblCert) $('#btn_upload').removeClass("layui-btn-disabled").attr("disabled", false);
                if (0 === gblScore) $('#btn_addscore').addClass("layui-btn-disabled").attr("disabled", true);
                if (1 === gblScore) $('#btn_addscore').removeClass("layui-btn-disabled").attr("disabled", false);
                if ('view' === _action) {
                    $('#btn_upload').addClass("layui-btn-disabled").attr("disabled", true);
                    $('#btn_addscore').addClass("layui-btn-disabled").attr("disabled", true);
                    $('#btn_save').attr('disabled', 'true').addClass('layui-btn-disabled');
                    $('#btn_submit').attr('disabled', 'true').addClass('layui-btn-disabled');
                    $('a[data-action=del]').hide();
                    $(document).find('input,select').attr('disabled', 'true').addClass('layui-btn-disabled');
                }
                form.render();
            },
        }
        const _score = {
            sou: function (score) {
                let u = false;
                for (let i = 0; i < gScoreArr.length; ++i) {
                    if (gScoreArr[i].fakeId === score.fakeId) {
                        u = true;
                        Object.assign(gScoreArr[i], score);
                    }
                }
                if (!u) gScoreArr.push(score);
                this.refreshTable();
            },
            del: function (row) {
                for (let i = 0; i < gScoreArr.length; ++i) {
                    if (gScoreArr[i].fakeId === row.fakeId)
                        gScoreArr.splice(i, 1)
                }
                this.refreshTable();
            },
            showmodal: function (row) {
                this.echoscore(row);
                gLayerIndex = layer.open({
                    type: 1,
                    shade: 0.4,
                    shadeClose: false,
                    title: '学分',
                    content: $('#score_modal'),
                    area: ['90%', '90%'],
                    cancel: function () {
                    },
                });
            },
            echoscore: function (_score) {
                let s = _score;
                if (!s) s = {
                    'scoreId': '',
                    'fakeId': uuid(),
                    'projNo': '', // 'projNo',
                    'projName': '', // 'projName',
                    'scoreLevelId': '', // '54beb50e-36b7-4e87-a777-9bdd00af1d1b',
                    'knowledgeTwoId': '', // '19cdf6be-ab24-4ac4-bd48-9b2f01006a65',
                    'knowledgeId': '', // '5c2c56c3-1f15-46c1-957f-9b2f01006a65',
                    'holdTypeId': '', // '494f1858-68df-11ee-886d-005056a64c01',
                    'studyDate': '', // '2025-01-01',
                    'score_year': $('select[name=bl_year]').val(),
                    'score': null, // '2',
                    'period': null, // '3',
                    'teachUnitName': null, // 'abc',
                    'scoreFile': '[]'
                };
                _upld2.reset();
                let arr = JSON.parse(s.scoreFile);
                if (arr.length < 1) $('#file_list').empty();
                else _upld2.appendFile(arr);
                form.val('score_form', s);
                gknowinst.setValue(s.knowledgeId ? [s.knowledgeId] : []);
                // 与学科一致：先按本条学分的年度加载学分级别树，树就绪后再 setValue 回显（避免树未加载或 update 清空后无法选中）
                const scoreYearForTree = s.score_year || s.cmeYear || $('select[name=bl_year]').val();
                window.gScoreLevelParentWarned = false;
                _blrender.scoreLevel(scoreYearForTree, function () {
                    if (!window.gScoreLevelInst) {
                        return;
                    }
                    const levelId = s.scoreLevelId ? String(s.scoreLevelId) : '';
                    window.gScoreLevelInst.setValue(levelId ? [levelId] : []);
                });
            },
            renderTable: function () {
                table.render({
                    id: 'table_id',
                    elem: '#table_id',
                    height: '400',
                    defaultToolbar: [],
                    loading: true,
                    page: false,
                    limit: 999,
                    cols: [[
                        {
                            field: '', title: '操作', minWidth: 140, align: 'center', templet: () => {
                                return `<a class="layui-btn layui-btn-sm btn-row" lay-event="editscore">编辑</a>
                                    <a class="layui-btn layui-btn-sm btn-row layui-btn-danger btn-danger-row" lay-event="delscore">删除</a>`;
                            }, hide: 'view' === _action,
                        },
                        {field: 'projName', title: '活动名称', minWidth: 200, align: 'center', sort: true,},
                        {field: 'scoreLevelName', title: '活动级别', minWidth: 120, align: 'center', sort: true,},
                        {field: 'holdTypeName', title: '活动形式', minWidth: 120, align: 'center', sort: true,},
                        {field: 'studyDate', title: '活动时间', minWidth: 120, align: 'center', sort: true,},
                        {field: 'score', title: '学分', minWidth: 60, align: 'center', sort: true,},
                        {field: 'period', title: '学时', minWidth: 60, align: 'center', sort: true,},
                        {field: 'teachUnitName', title: '授分单位', minWidth: 180, align: 'center', sort: true,},
                        {
                            field: '', title: '附件', minWidth: 60, align: 'center', sort: true, templet: data => {
                                let a = JSON.parse(data.scoreFile);
                                if (a.length < 1) return '';
                                return `<a class="layui-btn layui-btn-xs btn-row" lay-event="viewscorefile">查看</a>`
                            }
                        },
                    ]],
                    data: gScoreArr,
                });
            },
            refreshTable: function () {
                table.reload('table_id', {data: gScoreArr});
            }
        }
        const _blact = {
            detail: function (id) {
                postAction(`${huayi_sjwh_url}/zixue/bulu/detail/${id}`).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        echobl(jsonRes.data);
                    } else {
                        lat.failMsg('fail');
                    }
                }).catch(() => lat.errorMsg('error'));
            },
            savebulu: function (data) {
                data.buluId = gblId;
                data.comPersonId = _pid;
                data.unitId = _unitId;
                postAction(`${huayi_sjwh_url}zixue/bulu/save`, data).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success) {
                        gblId = '';
                        closeCurrModal();
                    } else {
                        lat.failMsg(jsonRes.message);
                    }
                }).catch(error => {
                    lat.errorMsg('error');
                });
            }
        }
    });
</script>
<style>
    #file_ul {
        width: 90%;
        margin: auto;
    }
    .layui-input {
        width: 260px;
    }
    #qr_code {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
    }
    .thumb_img {
        max-width: 100%;
        height: 46px;
        padding-right: 10px;
    }
</style>
</html>
