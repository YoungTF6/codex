<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>

    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <link rel="stylesheet" href="/css/score/score.css" media="all">
    <!-- 请求路径配置 -->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>

    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>

    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;

        .layui-form-select .layui-input {

<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label">活动名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="projName" placeholder="" autocomplete="off"
                                   class="layui-input layui-disabled" disabled/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">项目编号</label>
                        <div class="layui-input-block">
                            <input type="text" name="projNo" placeholder="" autocomplete="off"
                                   class="layui-input layui-disabled" disabled/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">活动日期</label>
                        <div class="layui-input-block">
                            <input type="text" name="studyDate" placeholder="" autocomplete="off"
                                   class="layui-input layui-disabled" disabled/>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">职称</label>
                        <div class="layui-input-block">
                            <div id="titleTreeSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">专业</label>
                        <div class="layui-input-block">
                            <div id="specTreeSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">所在单位</label>
                        <div class="layui-input-block">
                            <div id="unitTreeSelector" data-name="" style="width: 166px;"></div>
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit
                                onclick="refreshTable()">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit
                                onclick="closeCurrModal()">
                            <i class="layui-icon layui-icon-return layuiadmin-button-btn"></i>返回
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="ppdCheckTable" lay-filter="ppdCheckTable" style="margin: 0;"></table>
        </div>
    </div>
</div>
</body>
<!-- ppdCheckTable toolbar -->
<script type="text/html" id="ppdToolbar">
    <input type="checkbox" name="layTableCheckbox" value="cp" title="本页全选" lay-filter="layTableAllChoose">
    <a class='layui-btn layui-btn-sm' lay-event='approveBtn'>审核通过</a>
    <a class='layui-btn layui-btn-sm layui-btn-danger' lay-event='rejectBtn'>审核不通过</a>
    <a class="layui-btn layui-btn-sm layui-btn-warm" lay-event="backBtn">退回修改</a>
    <a class="table-tips" style="color: red">提示：远程学分仅省卫健委和指定市县卫健委可在远程学分审核模块审核</a>
</script>
<script type="text/html" id="thumbCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="showThumb">查看</a>
    {{# if(d.evidenceNameVerifyAbnormal){ }}
    <span class="evidence-verify-warn-badge">!</span>
    {{# } }}
</script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let gLayerIndex = -1;
        const _scoreIds = getOrDefault(localStorage.getItem('tmp_score_ids'), PseudoNull.UUID); // getOrDefault(getUrlParamByName('scoreIds'), PseudoNull.UUID);
        localStorage.removeItem('tmp_score_ids');
        const _projNo = getOrDefault(getUrlParamByName('projNo'), '');
        const _projName = getOrDefault(getUrlParamByName('projName'), '');
        const _studyDate = getOrDefault(getUrlParamByName('studyDate'), '');
        // const _startDate = toDayHeader(getOrDefault(getUrlParamByName('startDate'), ''));
        // const _endDate = toDayTail(getOrDefault(getUrlParamByName('endDate'), ''));
        // const _score = getOrDefault(getUrlParamByName('score'), 0);
        // const _period = getOrDefault(getUrlParamByName('period'), 0);
        // const _scoreLevel = getOrDefault(getUrlParamByName('scoreLevel'), '');
        // const _knowledgeId = getOrDefault(getUrlParamByName('knowledgeId'), '');
        // const _holdType = getOrDefault(getUrlParamByName('holdType'), '');
        // const _checkState = getOrDefault(getUrlParamByName('checkState'), '');
        // const _checkStates = getOrDefault(getUrlParamByName('checkStates'), '');
        // const _flowChainState = getOrDefault(getUrlParamByName('flowChainState'), null);
        // const _excludeFcs = getOrDefault(getUrlParamByName('excludeFcs'), null);
        // const _includeFcsListT = getOrDefault(getUrlParamByName('includeFcsList'), '');
        // const _excludeFcsListT = getOrDefault(getUrlParamByName('excludeFcsList'), '');
        // const _includeFcsList = _includeFcsListT ? _includeFcsListT.split(',') : null;
        // const _excludeFcsList = _excludeFcsListT ? _excludeFcsListT.split(',') : null;
        // console.info('checkState: %s, checkStates: %s', _checkState, _checkStates);
        // console.info('====> includeFcsList: %s, excludeFcsList: %s', _includeFcsListT, _excludeFcsListT);
        // console.info('====> includeFcsList: %s, excludeFcsList: %s', _includeFcsList, _excludeFcsList);
        let gTitleTreeData = [];
        let gSpecTreeData = [];
        let gUnitTreeData = [];
        let gTitleTreeSelector;
        let gSpecTreeSelector;
        let gUnitTreeSelector;
        let gReason;
        let gAction;
        const EVIDENCE_VERIFY_WARN_TIP = '该佐证材料照片中疑似未包含学分归属人姓名，请您关注并查验';
        /** 为佐证核验异常角标绑定 layer 悬停提示，避免表格单元格裁剪原生 title */
        function bindEvidenceVerifyWarnBadgeTips(tableView) {
            let tipIndex;
            tableView.find('.evidence-verify-warn-badge')
                .off('mouseenter.evidenceWarn mouseleave.evidenceWarn')
                .on('mouseenter.evidenceWarn', function () {
                    tipIndex = layer.tips(EVIDENCE_VERIFY_WARN_TIP, this, {tips: [2, '#808080']});
                })
                .on('mouseleave.evidenceWarn', function () {
                    layer.close(tipIndex);
                });
        }
        window.solveReason = solveReason;
        window.loadTable = loadPpdCheckTable;
        window.refreshTable = refreshTable;
        window.showTips = showTips;
        window.closeTips = closeTips;
        let phototitle = _isZhejiang ? '佐证材料' : '学分证明照片';
        $(function () {
            $('input[name="projName"]').val(_projName);
            $('input[name="projNo"]').val(_projNo);
            $('input[name="studyDate"]').val(_studyDate);
            loadPpdCheckTable();
        });
        layer.ready(function () {
            // title
            getTitleTreeData().then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gTitleTreeData = jsonRes.data;
                }
            }).catch(error => {
                layer.msg('error:加载titleTreeData');
            }).finally(() => {
                gTitleTreeSelector = lat.renderTitleTreeSelector('#titleTreeSelector', gTitleTreeData, {
                    radio: false,
                    clickClose: false,
                    model: {
                        icon: 'show'
                    },
                    tree: {
                        strict: true
                    }
                });
            });
            // spec
            getSpecTreeData(3).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gSpecTreeData = jsonRes.data;
                }
            }).catch(error => {
                layer.msg('error:加载specTreeData');
            }).finally(() => {
                gSpecTreeSelector = lat.renderSpecTreeSelector('#specTreeSelector', gSpecTreeData, {
                    radio: false,
                    clickClose: false,
                    model: {
                        icon: 'show'
                    },
                    tree: {
                        strict: true
                    }
                });
            });
            // unit
            getUnitTreeData(_unitId).then(response => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    gUnitTreeData = jsonRes.data;
                }
            }).catch(error => {
                layer.msg('error:加载unitTreeData');
            }).finally(() => {
                gUnitTreeSelector = lat.renderUnitTreeSelector('#unitTreeSelector', gUnitTreeData);
            });
        });
        table.on('tool(ppdCheckTable)', function (obj) {
            let rowData = obj.data;
            if ('showThumb' === obj.event) {
                if (rowData.scoreTypeVal === 4 || rowData.scoreTypeVal === 2) {
                    layer.msg(`继教项目和院内活动无${phototitle}`);
                    return false;
                }
                let visit = huayi_projectscore_url + 's1/single/photo/' + rowData.scoreId;
                getAction(visit).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success && jsonRes.data.length > 0) {
                        localStorage.setItem('tmp_single_photo', JSON.stringify(jsonRes.data));
                        parent.layer.open({
                            type: 2,
                            shade: 0.4,
                            shadeClose: true,
                            title: phototitle,
                            content: '/pages/mod/check/modals/SinglePhotoModal_2.html?score_id=1',
                            area: ['100%', '100%'],
                            end: function (layero, index) {
                                localStorage.removeItem('tmp_single_photo');
                            }
                        });
                    } else {
                        layer.msg('未查询到该个人活动相关的照片');
                    }
                }).catch(error => {
                    layer.msg(`error:加载${phototitle}`);
                }).finally(() => {
                    //
                });
            }
        });
        table.on('toolbar(ppdCheckTable)', function (obj) {
            let checkStatus = table.checkStatus(obj.config.id);
            let selectedRowArr = checkStatus.data;
            selectedRowArr = selectedRowArr.filter(selectedRow => !_tips.canCheck(selectedRow));
            if (selectedRowArr.length < 1) {
                layer.msg('先选择要审核的学分');
                return false;
            }
            //
            let params;
            if ('approveBtn' === obj.event) {
                gReason = '';
                gLayerIndex = layer.open({
                    type: 2,
                    shade: 0.4,
                    shadeClose: true,
                    title: '审核意见',
                    content: `./ReasonModal.html?phase=3&state=3`,
                    area: ['800px', '600px'],
                    end: function (layero, index) {
                        if (ModalActionEnum.CONFIRM === gAction) {
                            params = {
                                'msiList': getMsiList(selectedRowArr, {
                                    'checkState': CheckStateEnum.APPROVE,
                                    'flowChainState': getFcsByCs(CheckStateEnum.APPROVE),
                                    'checkUnit': _unitId,
                                    'checkUser': _unitId,
                                    'checkMemo': gReason
                                }),
                                'action': 'approve-single-modal',
                                'fcs': getFcsByCs(CheckStateEnum.APPROVE),
                                'fp': fp,
                                'userId': _userId,
                            };
                            docheckscore(params);
                        }
                    }
                });
            } else if ('rejectBtn' === obj.event || 'backBtn' === obj.event) {
                let isReject = 'rejectBtn' === obj.event;
                let isBack = 'backBtn' === obj.event;
                gReason = '';
                gLayerIndex = layer.open({
                    type: 2,
                    shade: 0.4,
                    shadeClose: true,
                    title: isReject ? '不通过原因' : '退回原因',
                    content: `./ReasonModal.html?phase=3&state=${isReject ? 2 : 1}`,
                    area: ['800px', '600px'],
                    end: function (layero, index) {
                        if (ModalActionEnum.CONFIRM === gAction) {
                            params = {
                                'msiList': getMsiList(selectedRowArr, {
                                    'checkState': isReject ? CheckStateEnum.REJECT : CheckStateEnum.REVISION,
                                    'flowChainState': getFcsByCs(isReject ? CheckStateEnum.REJECT : CheckStateEnum.REVISION),
                                    'checkUnit': _unitId,
                                    'checkUser': _unitId,
                                    'checkMemo': gReason
                                }),
                                'action': 'reject-single-modal',
                                'fcs': getFcsByCs(isReject ? CheckStateEnum.REJECT : CheckStateEnum.REVISION),
                                'fp': fp,
                                'userId': _userId,
                            };
                            docheckscore(params);
                        }
                    }
                });
            }
        });
        function solveReason(reason, action) {
            gReason = reason;
            gAction = action;
            layer.close(gLayerIndex);
        }
        function loadPpdCheckTable() {
            table.render({
                id: 'ppdCheckTable',
                elem: '#ppdCheckTable',
                height: 'full-100',
                url: huayi_projectscore_url + 'pgsi/score/page/byproj', // byProj
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                page: true,
                limit: getPageSize(),
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                toolbar: '#ppdToolbar',
                defaultToolbar: [],
                cols: [[
                    {
                        title: '选择',
                        width: 60,
                        align: 'center',
                        fixed: 'left',
                        // type: 'checkbox',
                        templet: function (data) {
                            let m = _tips.canCheck(data);
                            if (m) return `<img src="/pages/mod/img/disableIcon.png" style="width:24px;" alt="${m}" onmouseenter="showTips(this)" onmouseleave="closeTips()"/>`;
                            else return `<input type="checkbox" name="layTableCheckbox" lay-skin="primary">`;
                        }
                    },
                    {field: 'personName', title: '姓名', minWidth: 120, align: 'center', fixed: 'left', sort: true},
                    {field: 'personNo', title: '人员编号', minWidth: 120, align: 'center', fixed: 'left', sort: true},
                    {field: 'score', title: '学分', minWidth: 80, align: 'center', sort: true},
                    {field: 'period', title: '学时', minWidth: 80, align: 'center', sort: true},
                    {field: 'titleName', title: '职称', minWidth: 120, align: 'center', sort: true},
                    {field: 'specName', title: '专业', minWidth: 120, align: 'center', sort: true},
                    {field: 'personUnitName', title: '单位', minWidth: 120, align: 'center', sort: true},
                    {field: 'deptName', title: '科室', minWidth: 120, align: 'center', sort: true},
                    {field: 'addUnitName', title: '发证机构', minWidth: 160, align: 'center', sort: true, templet: (data) => _txt.fazhengUnit(data)},
                    {field: '', title: phototitle, minWidth: 130, align: 'center', sort: true, templet: '#thumbCell'},
                    {field: 'checkState', title: '审核状态', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.checkState(data)},
                    {field: 'ifAvail', title: '有效状态', minWidth: 120, align: 'center', sort: true, templet: (data) => _txt.ifAvail(data)},
                    {field: 'checkUnitName', title: '审核单位', minWidth: 120, align: 'center', sort: true},
                    {field: 'checkMemo', title: '审核意见', minWidth: 120, align: 'center', sort: true},
                    {field: 'checkTime', title: '审核时间', minWidth: 120, align: 'center', sort: true},
                    {field: 'addTime', title: '录入时间', minWidth: 162, align: 'center', sort: true},
                    {field: 'scoreMode', title: '录入方式', width: 120, align: 'center', sort: true, templet: (data) => _txt.scoreMode(data)},
                    {field: 'remark', title: '备注', minWidth: 220, align: 'center', sort: true}
                ]],
                data: [],
                done: function (res, curr, count) {
                    let tableView = this.elem.next();
                    for (let i = 0; i < res.data.length; i++) {
                        if (res.data[i].evidenceNameVerifyAbnormal) {
                            tableView.find('tr[data-index="' + i + '"]').addClass('score-evidence-name-abnormal');
                        }
                    }
                    bindEvidenceVerifyWarnBadgeTips(tableView);
                }
            });
        }
        function refreshTable() {
            table.reload('ppdCheckTable', {
                where: getSifter()
            });
        }
        function getSifter() {
            let selUnitId = gUnitTreeSelector ? gUnitTreeSelector.getValue('valueStr') : '';
            let unitId = selUnitId ? selUnitId : pickUnitId(_unitId);
            return {
                'unitId': unitId,
                'depth': 9,
                'scoreTypeVal': 1,
                'showReScore': true,
                'scoreIds': _scoreIds,
                // 'projNo': _projNo,
                // 'projName': _projName,
                // 'score': Number.parseFloat(_score),
                // 'period': Number.parseFloat(_period),
                // 'studyDate': _studyDate,
                // 'scoreLevel': _scoreLevel,
                // 'knowledgeId': _knowledgeId,
                // 'holdType': _holdType,
                // 'checkState': _checkState,
                // 'checkStates': _checkStates,
                // 'flowChainState': _flowChainState,
                // 'excludeFcs': _excludeFcs,
                // 'includeFcsList': _includeFcsList,
                // 'excludeFcsList': _excludeFcsList,
                // 'startDate': _startDate,
                // 'endDate': _endDate,
                'titleIds': idsFromTreeStrict(gTitleTreeSelector, 'titleId'),
                'specIds': idsFromTreeStrict(gSpecTreeSelector, 'personSpecId'),
                'showEp': true,
                'downId': PseudoNull.UUID,
                // 'statex': '___4',
            };
        }
        function docheckscore(params) {
            // console.info('checkScore params: ', JSON.stringify(params));
            // check
            checkScoreAction(params).then((response) => {
                let jsonRes = response.data;
                if (jsonRes.success) {
                    layer.msg('审核完成', {time: 500}, function () {
                        table.reload('ppdCheckTable');
                    });
                } else {
                    layer.msg(jsonRes.msg);
                }
            }).catch(error => {
                layer.msg('error:修改学分');
            }).finally(() => {
            });
        }
    });
</script>

        display: block !important;

    .score-evidence-name-abnormal > td {
        background: #fff1f0 !important;
        color: #cf1322;
    }
    .evidence-verify-warn-badge {
        display: inline-block;
        margin-left: 6px;
        width: 16px;
        height: 16px;
        line-height: 16px;
        border-radius: 50%;
        text-align: center;
        background: #ff4d4f;
        color: #fff;
        font-size: 12px;
        cursor: help;
    }
</style>
</html>
