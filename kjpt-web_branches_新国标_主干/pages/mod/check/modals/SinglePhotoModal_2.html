<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat',
        tool: 'tool'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat','tool'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let tool = layui.tool;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let gLayerIndex = -1;
        let gCurSrc;
        window.ifmload = function () {
            this.className = '';
            (this.contentDocument || this.contentWindow.document).body.style.backgroundColor = 'whitesmoke';
        }
        let _arr = [{
            'scorePhotoUrl': 'http://222.143.64.114:8017/file/individualScoreManage/a6280900-a9c2-11ec-84d6-fa163e9b64fb/2025/162903/1762766705791-ad9eb5d1-f391-4f6f-88e7-389ab9f4688b.png',
            'fileName': '李莉图片.png',
            'photoSize': '123'
        }, {
            'scorePhotoUrl': 'http://222.143.64.114:8017/file/individualScoreManage/a6280900-a9c2-11ec-84d6-fa163e9b64fb/2025/162903/1762767305382-274f4aed-efaf-460b-a326-4d2ce82455e8.jpg',
            'fileName': '杜秋燕.jpg',
            'photoSize': '267.0'
        }, {
            'scorePhotoUrl': 'http://222.143.64.114:8017/file/individualScoreManage/a6280900-a9c2-11ec-84d6-fa163e9b64fb/2023/162907/1698285667470-fbd6efb7-af44-4ad7-8f93-f174f3fa1b2e.pdf',
            'fileName': '秦娜1.pdf',
            'photoSize': '138.9'
        }];
        const _fileArr = JSON.parse(getOrDefault(localStorage.getItem('tmp_single_photo'), JSON.stringify(_arr)));
        layer.ready(function () {
            $('.layui-layer-title', parent.document).hide();
            renderTab();
            element.tabChange('file_tab', 0);
        });
        $(function () {
        });
        element.on('tab(file_tab)', function (data) {
            let layId = +(this.getAttribute('lay-id'));
            let file = _fileArr[layId];
            setContent(file.previewUrl)
        });
        function renderTab() {
            let $tabTitle = $('.layui-tab-title');
            $tabTitle.empty();
            _fileArr.forEach((file, idx) => {
                let url = file.scorePhotoUrl;
                // if (isImg(url)) file.previewUrl = kkurl(url);
                // else file.previewUrl = kkurl(url);
                if (isImg(url)) file.previewUrl = tool.getComAliyunUrl(url);
                else file.previewUrl = tool.getComAliyunUrl(url);
                file.idx = idx;
                let isFirst = 0 === idx;
                $tabTitle.append(`<li lay-id="${idx}" class="${isFirst ? 'layui-this' : ''}">${file.fileName}</li>`)
                isFirst && setContent(file.previewUrl);
            });
        }
        function setContent(src) {
            if (src !== gCurSrc) {
                gCurSrc = src;
                let $iframe = $('.layui-tab-content iframe');
                $iframe.attr('src', src);
            }
        }
    });
</script>
