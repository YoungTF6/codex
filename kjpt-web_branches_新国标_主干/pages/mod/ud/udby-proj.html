<script type="text/html" id="personDetailCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="personDetailBtn">人员明细</a>
</script>
<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let lat = layui.lat;
        let xmSelect = layui.xmSelect;
        let gLayerIndex = -1;
        let rowData4pdlModal;
        window.loadByProjectTable = loadByProjectTable;
        table.on('tool(byProjectTable)', function (obj) {
            let rowData = obj.data;
            if (obj.event === 'personDetailBtn') {
                rowData4pdlModal = rowData;
                showPersonDetailModal(rowData);
            }
        });
        $(function () {
            _lbl_inst.sdysel = lat.renderDaySelector('#startDateSelector', yearFirstDay(), {min: `${_cur_year}-01-01`, max: `${_cur_year}-12-31`});
            _lbl_inst.edysel = lat.renderDaySelector('#endDateSelector', today(), {min: `${_cur_year}-01-01`, max: `${_cur_year}-12-31`});
            loadByProjectTable();
        });
        function loadByProjectTable() {
            const isDeptUser = localStorage.getItem('user-type') === '13';
            table.render({
                elem: "#byProjectTable",
                url: huayi_projectscore_url + 'pgsi/pg/proj/page',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: {
                    unitId: _unitId,
                    depth: 1,
                    scoreTypeVal: 6, // getOrDefault($('#scoreTypeValSelector').val(), 6),
                    scoreLevelIds: _lbl_inst.getVal('lblScoreLevel_ids'),
                    knowledgeIds: _lbl_inst.getVal('lblKnowledge_ids'),
                    holdType: _lbl_inst.getVal('lblActivityForm_id'),
                    projName: $('input[name=projName]').val(),
                    startDate: toDayHeader($('#startDateSelector').val()),
                    endDate: toDayTail($('#endDateSelector').val()),
                    attachId: $('input[name=attachId]').val(),
                    haveScore: true,
                    checkStates: $('select[name=checkStates]').val(),
                    deptIds: isDeptUser ? localStorage.getItem('kk_deptids') : null,
                },
                id: '',
                page: true,
                height: 'full-225',
                method: 'post',
                contentType: 'application/json',
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                cols: [[
                    {
                        width: 100,
                        align: 'center',
                        fixed: 'left',
                        title: '人员明细',
                        templet: '#personDetailCell'
                    },
                    {field: 'projNo', minWidth: 160, align: 'center', title: '项目编号', sort: true},
                    {field: 'projName', minWidth: 190, align: 'center', title: '项目名称', sort: true},
                    {field: 'startDate', minWidth: 120, align: 'center', title: '开始时间', sort: true},
                    {field: 'endDate', minWidth: 120, align: 'center', title: '截止时间', sort: true},
                    {field: 'scoreLevelName', minWidth: 120, align: 'center', title: projectLabels.lblScoreLevel, sort: true},
                    {field: 'knowledgeName', minWidth: 140, align: 'center', title: '学科', sort: true},
                    {field: 'holdTypeName', minWidth: 120, align: 'center', title: projectLabels.lblActivityForm, sort: true},
                    {field: 'checkTypeName', minWidth: 120, align: 'center', title: '考核方式', sort: true},
                    {field: 'remark', minWidth: 120, align: 'center', title: '备注', sort: true}
                ]]
            });
            return false;
        }
        function showPersonDetailModal(rowData) {
            let scoreTypeVal = rowData.scoreTypeVal;
            let projId = rowData.projId;
            let downId = rowData.downId;
            let states = $('select[name=checkStates]').val() || '';
            gLayerIndex = layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: true,
                title: '人员明细',
                content: `./modals/UdPersonModal.html?from=byProject&scoreTypeVal=${scoreTypeVal}&projId=${projId}&downId=${downId}&scoreCeil=${rowData.score}&states=${states}`,
                area: ['100%', '100%']
            });
        }
    });
</script>
