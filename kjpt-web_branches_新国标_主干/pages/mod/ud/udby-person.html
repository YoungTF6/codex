<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'flow', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let flow = layui.flow;
        let gDeptTreeSelector;
        let gPersonList = [];
        let gUniquePerson;
        let gLayerIndex = -1;
        let gUlContent;
        let gAllSideAElement;
        let gComPersonId = PseudoNull.UUID;
        let gCriteriaScoredPersonArr;
        window.setPerson = setPerson;
        window.queryScoredPerson = queryScoredPerson;
        window.loadByPersonTable = loadByPersonTable;
        window.refreshTable = refreshTable;
        // form.on('select(queryOption)', function (data) {
        //     let queryKeyword = $('#queryKeyword');
        //     $(queryKeyword).find("option").remove();
        //     $(queryKeyword).append('<option value=""></option>');
        //     if (data.value === 'scoreLevel') {
        //         lat.renderScoreLevel('#queryKeyword', _cur_year, '___');
        //     } else if (data.value === 'knowledgeId') {
        //         lat.render2ndKnowledge('#queryKeyword', _cur_year);
        //     } else if (data.value === 'holdType') {
        //         lat.renderHoldType('#queryKeyword', '___');
        //     }
        // });
        form.on('radio(radioItem)', function (data) {
            let idx = data.value;
            console.info('click radio: ', idx);
            gUniquePerson = gCriteriaScoredPersonArr[idx];
            setPerson_();
        });
        table.on('tool(byPersonTable)', function (obj) {
            let rowData = obj.data;
            if (obj.event === 'modifyScoreBtn') {
                showModifyScoreModal(rowData);
            } else if (obj.event === 'delScoreBtn') {
                gLayerIndex = layer.confirm('确定删除' + rowData.personName + '的《' + rowData.projName + '》学分吗？', {
                    title: '提示',
                    btn: ['删除', '取消']
                }, function () {
                    // confirm
                    let params = {
                        'msiList': getMsiList(Array.of(rowData), {}),
                        'action': 'remove',
                        'fp': fp,
                        'userId': _userId,
                    };
                    // remove
                    removeScoreAction(params).then((response) => {
                        let responseData = response.data;
                        if (responseData.success) {
                            layui.layer.msg('删除学分完成');
                            // parent.layer.close(gLayerIndex);
                            table.reload('byPersonTable');
                        } else {
                            layer.msg(responseData.msg);
                        }
                    }).catch((error) => {
                        layer.msg('error:删除学分');
                    }).finally(() => {
                    });
                }, function () {
                    // cancel
                    // parent.layer.close(gLayerIndex);
                });
            }
        });
        flow.load({
            elem: '#side-ul',
            done: function (page, next) {
                let visit = huayi_personorg_url + 'omme/person/page/last/lite';
                let params = {
                    scoreTypeVal: 7,
                    unitId: _unitId,
                    depth: 1,
                    pageNum: 1,
                    pageSize: 9999,
                    deptIds: localStorage.getItem('kk_deptids'),
                };
                let liArr = [];
                postAction(visit, params).then(response => {
                    let jsonRes = response.data;
                    if (jsonRes.success && jsonRes.data.records.length > 0) {
                        gPersonList = jsonRes.data.records;
                        layui.each(gPersonList, function (index, personItem) {
                            liArr.push('<li class="scroll-item">' +
                                '<a class="scroll-title" onclick="setPerson(' + index + ')">' +
                                personItem.personName + ' (' + personItem.certId.substr(personItem.certId.length - 4, personItem.certId.length) + ')' +
                                '</a>' +
                                '</li>');
                        });
                        next(liArr.join(''), page < jsonRes.data.pageTotal);
                    }
                }).catch(error => {
                    layer.msg('error:加载人员列表');
                }).finally(() => {
                    gUlContent = $('#side-ul').html();
                    gAllSideAElement = $("#side-ul a");
                });
            }
        });
        $(function () {
            lat.renderScoreLevel('#queryKeyword', _cur_year, '___');
            _lbl_inst.sdysel = lat.renderDaySelector('#startDateSelector', yearFirstDay(), {min: `${_cur_year}-01-01`, max: `${_cur_year}-12-31`});
            _lbl_inst.edysel = lat.renderDaySelector('#endDateSelector', today(), {min: `${_cur_year}-01-01`, max: `${_cur_year}-12-31`});
            gDeptTreeSelector = lat.renderDeptTreeSelector('#deptIdSelector', JSON.parse(localStorage.getItem('kk_depttree') || '[]'));
            // initSideUl();
            loadByPersonTable();
            $('input[name="personFilter"]').on('change', function () {
                let val = this.value;
                let ule = $('#side-ul');
                if (val) {
                    $(ule).find('li').each(function (index, lie) {
                        if ($(lie).text().indexOf(val) !== -1) {
                            $(lie).show();
                        } else {
                            $(lie).hide();
                        }
                    });
                } else {
                    $(ule).empty();
                    $(ule).html(gUlContent);
                    gAllSideAElement = $("#side-ul a");
                }
            });
        });
        function loadByPersonTable() {
            table.render({
                id: 'byPersonTable',
                elem: '#byPersonTable',
                url: huayi_projectscore_url + 'pgsi/score/page/byperson', // byPerson
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                method: 'post',
                contentType: 'application/json',
                where: getSifterScore(),
                page: true,
                height: 'full-182',
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                cols: [[
                    // {
                    //     width: 60,
                    //     align: 'center',
                    //     fixed: 'left',
                    //     templet: '#checkboxTpl',
                    //     // title: '<input type="checkbox" name="select_all" lay-skin="primary" lay-filter="select_all">'
                    //     title: '选择'
                    // },
                    {
                        title: '选择',
                        width: 60,
                        align: 'center',
                        fixed: 'left',
                        templet: function (data) {
                            let m = _tips.canUd(data);
                            if (m) return `<img src="/pages/mod/img/disableIcon.png" style="width:24px;" alt="${m}" onmouseenter="showTips(this)" onmouseleave="closeTips()"/>`;
                            return '<input type="checkbox" name="layTableCheckbox" lay-skin="primary">';
                        }
                    },
                    {
                        align: 'center', title: '操作', minWidth: 120, fixed: 'left', templet: data => {
                            if (_tips.canUd(data))
                                return `<a class="layui-btn layui-btn-xs layui-btn-disabled btn-row btn-disabled-row">修改</a>
                                        <a class="layui-btn layui-btn-xs layui-btn-disabled btn-row btn-disabled-row">删除</a>`;
                            else
                                return `<a class="layui-btn layui-btn-xs btn-row" lay-event="modifyScoreBtn">修改</a>
                                        <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row" lay-event="delScoreBtn">删除</a>`
                        }
                    },
                    {field: 'projName', minWidth: 200, align: 'center', title: '项目名称', sort: true},
                    {field: 'extdata', minWidth: 200, align: 'center', title: '详细信息', sort: true, templet: data => _txt.ext__data(data)},
                    {field: 'studyDate', minWidth: 104, align: 'center', title: '日期', sort: true},
                    {field: 'projName', minWidth: 120, align: 'center', title: '内容', sort: true},
                    {field: 'scoreLevelName', minWidth: 120, align: 'center', title: projectLabels.lblScoreLevel, sort: true},
                    {field: 'knowledgeName', minWidth: 120, align: 'center', title: '学科', sort: true},
                    {field: 'holdTypeName', minWidth: 105, align: 'center', title: projectLabels.lblActivityForm, sort: true},
                    {field: 'score', minWidth: 80, align: 'center', title: '学分', sort: true},
                    {field: 'period', minWidth: 80, align: 'center', title: '学时', sort: true},
                    {field: 'teachUnitText', minWidth: 180, align: 'center', title: '发证机构', sort: true, templet: (data) => _txt.fazhengUnit(data)},
                    {field: 'checkState', minWidth: 120, align: 'center', title: '审核状态', sort: true, templet: (data) => _txt.checkState(data)},
                    {field: 'checkMemo', minWidth: 120, align: 'center', title: '审核意见', sort: true},
                    {field: 'checkUnitName', minWidth: 160, align: 'center', title: '审核单位', sort: true},
                    {field: 'remark', minWidth: 120, align: 'center', title: '备注', sort: true}
                ]],
                done: function (res, curr, count) {
                    gComPersonId = PseudoNull.UUID;
                    form.on("checkbox(select_all)", function () {
                        let isChecked = $(this).prop("checked");
                        $.each($("input[name=select_one]"), function (i, value) {
                            if ($(this).prop('disabled') === false) {
                                $(this).prop("checked", isChecked);
                            }
                        });
                        $.each($("input[name=selectFlag]:first"), function (i, value) {
                            if ($(this).prop('disabled') === false) {
                                $(this).prop("checked", isChecked);
                            }
                        });
                        form.render();
                    });
                }
            });
        }
        function refreshTable() {
            table.reload('byPersonTable');
        }
        function getSifterPerson() {
            let queryOption = $('#queryOption');
            let queryKeyword = $('#queryKeyword');
            return {
                scoreTypeVal: 7, // getOrDefault($('#scoreTypeValSelector').val(), 7),
                unitId: _unitId,
                depth: 1,
                pageNum: 1,
                pageSize: 9999,
                deptId: gDeptTreeSelector.getValue('valueStr'),
                deptIds: localStorage.getItem('kk_deptids'),
                personNo: $('#personNoInput').val(),
                personName: $('#personNameInput').val(),
                certId: $('#certIdInput').val(),
                scoreLevelIds: _lbl_inst.getVal('lblScoreLevel_ids'), // $(queryOption).val() === 'scoreLevel' ? $(queryKeyword).val() : '',
                knowledgeIds: _lbl_inst.getVal('lblKnowledge_id'), //$(queryOption).val() === 'knowledgeId' ? $(queryKeyword).val() : '',
                holdType: _lbl_inst.getVal('lblActivityForm_id'), //$(queryOption).val() === 'holdType' ? $(queryKeyword).val() : '',
                startDate: toDayHeader($('input[name="startDate"]').val()),
                endDate: toDayTail($('input[name="endDate"]').val()),
            };
        }
        function getSifterScore() {
            let queryOption = $('#queryOption');
            let queryKeyword = $('#queryKeyword');
            return {
                scoreTypeVal: 7, // getOrDefault($('#scoreTypeValSelector').val(), 7),
                comPersonId: gComPersonId,
                // deptId: gDeptTreeSelector.getValue('valueStr'),
                // personNo: $('#personNoInput').val(),
                // personName: $('#personNameInput').val(),
                scoreLevelIds: _lbl_inst.getVal('lblScoreLevel_ids'), // $(queryOption).val() === 'scoreLevel' ? $(queryKeyword).val() : '',
                knowledgeIds: _lbl_inst.getVal('lblKnowledge_ids'), //$(queryOption).val() === 'knowledgeId' ? $(queryKeyword).val() : '',
                holdType: _lbl_inst.getVal('lblActivityForm_id'), //$(queryOption).val() === 'holdType' ? $(queryKeyword).val() : '',
                startDate: toDayHeader($('input[name="startDate"]').val()),
                endDate: toDayTail($('input[name="endDate"]').val()),
                // showReScore: true,
                checkStates: $('select[name=checkStates]').val(),
            };
        }
        function showModifyScoreModal(rowData) {
            localStorage.setItem('tmp_modify_score', JSON.stringify(rowData));
            layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: true,
                title: '修改学分',
                content: './modals/ModifyScoreModal.html',
                area: ['80%', '486px'],
                success: function (layerDom, index) {
                    //
                },
                end: function () {
                    localStorage.removeItem('tmp_modify_score');
                }
            });
        }
        function showRadioModal() {
            let $radioContainer = $('#radioModal .layui-form-item');
            $radioContainer.empty();
            gCriteriaScoredPersonArr.forEach((criteriaScoredPerson, index) => {
                let personName = criteriaScoredPerson.personName;
                let cert = criteriaScoredPerson.certId;
                cert = cert.substr(cert.length - 4, cert.length);
                let text = personName + " (" + cert + ")";
                let radio = '<input type="radio" name="radioItem" lay-filter="radioItem" value="' + index + '" title="' + text + '">';
                $radioContainer.append(radio);
            });
            form.render('radio');
            gLayerIndex = layer.open({
                type: 1,
                shade: 0.4,
