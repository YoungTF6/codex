<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ud-batch</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>

    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <script src="/js/layui-v2.6.8/layui/layui.js"></script>
    <!-- admin.css -->
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <!-- 请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!-- ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>

    <style>
        /* 新增代码 */
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;

<body style="background-color: white;">
<div class="layui-fluid">
    <div class="layui-card">
        <!-- 查询区域 -->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                    <div class="layui-inline">
                        <label class="layui-form-label"><span data-id="lblYear" data-name="">年度</span></label>
                        <div class="layui-input-block"></div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label"><span data-id="lblScoreLevel" data-name="" data-check-parent="1">学分级别</span></label>
                        <div class="layui-input-block"></div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">开始日期</label>
                        <div class="layui-input-block">
                            <input type="text" name="startDate" class="layui-input" id="startDateSelector"
                                   autocomplete="off" placeholder="选择开始日期">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">结束日期</label>
                        <div class="layui-input-block">
                            <input type="text" name="endDate" class="layui-input" id="endDateSelector"
                                   autocomplete="off" placeholder="选择结束日期">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">活动名称</label>
                        <div class="layui-input-block">
                            <input type="text" name="projName" autocomplete="off" placeholder="输入关键字"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label">审核状态</label>
                        <div class="layui-input-block">
                            <select name="checkStates">
                                <option></option>
                                <option value="0,4">未审核</option>
                                <option value="1">退回修改</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui_display">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit
                                onclick="loadBatchTable()">
                            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 数据表格 -->
        <div class="layui-card-body layui_body_box" style="padding-left: 0;padding-right: 0">
            <table class="layui-table" id="batchTable" lay-filter="batchTable" style="margin: 0;"></table>
        </div>
    </div>
</div>
</body>
<!-- PersonDetail Cell -->
<script type="text/html" id="personDetailCell">
    <a class="layui-btn layui-btn-xs btn-row" lay-event="personDetailBtn">人员明细</a>
</script>
<script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        lat: 'lat'
    }).use(['table', 'layer', 'jquery', 'form', 'laydate', 'element', 'xmSelect', 'lat'], function () {
        let table = layui.table;
        let layer = layui.layer;
        let form = layui.form;
        let laydate = layui.laydate;
        let dropdown = layui.dropdown;
        let element = layui.element;
        let $ = layui.jquery;
        let xmSelect = layui.xmSelect;
        let lat = layui.lat;
        let gLayerIndex = -1;
        let rowData4pdlModal;
        window.loadBatchTable = loadBatchTable;
        window.refreshTable = refreshTable;
        table.on('tool(batchTable)', function (obj) {
            let rowData = obj.data;
            if (obj.event === 'personDetailBtn') {
                showPersonDetailModal(rowData);
            }
        });
        $(function () {
            _lbl_inst.sdysel = lat.renderDaySelector('#startDateSelector', yearFirstDay(), {min: `${_cur_year}-01-01`, max: `${_cur_year}-12-31`});
            _lbl_inst.edysel = lat.renderDaySelector('#endDateSelector', today(), {min: `${_cur_year}-01-01`, max: `${_cur_year}-12-31`});
            loadBatchTable();
        });
        function loadBatchTable() {
            table.render({
                elem: '#batchTable',
                url: huayi_projectscore_url + 's1/proj/page',
                method: 'post',
                contentType: 'application/json',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                where: getSifter(),
                id: 'batchTable',
                page: true,
                height: 'full-170',
                parseData: function (res) {
                    return {
                        'code': res.status === 200 ? 0 : res.status, // 解析接口状态
                        'msg': res.message, // 解析提示文本
                        'count': res.data.recordsTotal, // 解析数据长度
                        'data': res.data.records, // 解析数据列表
                        'page': res.data.pageNum, // 当前页
                        'limit': res.data.pageSize // 每页条数
                    }
                },
                request: {
                    pageName: 'pageNum',  // 页码的参数名称，默认：page
                    limitName: 'pageSize'  // 每页数据量的参数名，默认：limit
                },
                cols: [[
                    {align: 'center', title: '人员明细', templet: '#personDetailCell', width: 100, fixed: 'left'},
                    {field: 'projNo', minWidth: 120, align: 'center', title: '项目编号', sort: true},
                    {field: 'projName', minWidth: 200, align: 'center', title: '活动名称', sort: true},
                    {field: 'extdata', minWidth: 200, align: 'center', title: '详细信息', sort: true, templet: data => _txt.ext__data(data)},
                    {field: 'scoreLevelName', minWidth: 150, align: 'center', title: projectLabels.lblScoreLevel, sort: true},
                    {field: 'knowledgeName', minWidth: 120, align: 'center', title: '学科', sort: true},
                    {field: 'holdTypeName', minWidth: 120, align: 'center', title: projectLabels.lblActivityForm, sort: true},
                    {field: 'score', minWidth: 60, align: 'center', title: '学分', sort: true},
                    {field: 'period', minWidth: 60, align: 'center', title: '学时', sort: true},
                    {field: 'studyDate', minWidth: 120, align: 'center', title: '活动日期', sort: true},
                    {field: 'teachUnit', title: '举办单位', minWidth: 160, align: 'center', sort: true, templet: data => _txt.holdUnit(data)},
                    {field: 'personCnt', minWidth: 60, align: 'center', title: '人数', sort: true},
                ]]
            });
        }
        function refreshTable() {
            table.reload('batchTable', {where: getSifter()});
        }
        function getSifter() {
            return {
                standardKindId: _standardKindId,
                unitId: _unitId,
                depth: 1,
                scoreTypeVal: 1,
                scoreLevelIds: _lbl_inst.getVal('lblScoreLevel_ids'),
                projName: $('input[name="projName"]').val(),
                startDate: toDayHeader($('input[name="startDate"]').val()),
                endDate: toDayTail($('input[name="endDate"]').val()),
                showReScore: true,
                addUnit: _unitId,
                checkStates: $('select[name=checkStates]').val(),
                deptIds: localStorage.getItem('kk_deptids'),
            };
        }
        function showPersonDetailModal(rowData) {
            let scoreTypeVal = rowData.scoreTypeVal;
            let scoreIds = rowData.scoreIds;
            let projName = rowData.projName;
            let score = rowData.score;
            let period = rowData.period;
            let states = $('select[name=checkStates]').val() || '';
            localStorage.setItem('tmp_score_ids', scoreIds);
            layer.open({
                type: 2,
                shade: 0.4,
                shadeClose: true,
                title: '人员明细',
                content: `./modals/UdPersonModal.html?from=batch&scoreTypeVal=${scoreTypeVal}&projName=${projName}&score=${score}&period=${period}&states=${states}`,
                area: ['100%', '100%'],
                end: function (layero, index) {
                    refreshTable();
                }
            });
        }
    });
</script>
