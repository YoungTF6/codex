<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>专家库管理</title>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/constant.js"></script>
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/tools/form_validation_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/dict_tool.js"></script>
    <script type="text/javascript" src="../../js/tools/dateTools.js"></script>
    <style>
        body {
            background: #fff;
        }
        .layui_body_box {
            padding: 0;
        }
        .layui-table, .layui-table-view {
            margin: 0;
        }
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }
        .layui-btn + .layui-btn {
            margin-left: 10px;
        }
        input + .layui-btn {
            margin-left: 14px;
        }
        .layui-layer-page .layui-layer-content {
            overflow: unset !important;
            overflow-y: visible !important;
        }
        .layui-card-body .layui-table {
            margin: 0;
        }
        .layui-table-header th .layui-table-cell {
            text-align: center;
        }
        .condition-area .layui_display:nth-child(1)  {
            margin-right: 15px;
        }

        #form-pwReset {
            text-align: center;
            padding: 50px 50px 0px 20px;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <!-- 搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto condition-area">
                <div class="layui_mess">
                    <div class="layui_display">
                        <form id="form-query">
                            <div class="layui-inline">
                                <label class="layui-form-label">聘任年度</label>
                                <div class="layui-input-block">
                                    <!-- <input type="text" name="appointYear" id="appointYear" placeholder="请选择" autocomplete="off" class="layui-input" readonly> -->
                                    <select name="appointYear" id="appointYear" lay-filter="appointYear"></select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">二级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeTwoId" id="knowledgeTwoId" lay-filter="knowledgeTwoId" lay-search>
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">三级学科</label>
                                <div class="layui-input-block">
                                    <select name="knowledgeThreeId" id="knowledgeThreeId" lay-filter="knowledgeThreeId" lay-search>
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">职称</label>
                                <div class="layui-input-block">
                                    <select name="titleId" id="titleId" lay-filter="titleId" lay-search>
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">所属单位</label>
                                <div class="layui-input-block">
                                    <input type="text" name="unitName" id="unitName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label">姓名</label>
                                <div class="layui-input-block">
                                    <input type="text" name="expertName" id="expertName" placeholder="请输入" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="tableOp.init()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>&nbsp;查询</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- 表格区域 -->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="table-projectExpert" lay-filter="table-projectExpert"></table>
        </div>


        <!-- 修改密码弹窗-->
        <div id="layer-pwReset" class="hide">
            <form class="layui-form" id="form-pwReset" lay-filter="form-pwReset">
                <div class="layui-form-item">
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <label class="layui-form-label"><i class="required-item"></i>新密码</label>
                        <div class="layui-input-block">
                            <input type="password" id="update-password1" name="password" placeholder="新密码" 
                                    autocomplete="off" class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline layui-col-xs12 layui-col-sm12 layui-col-md12">
                        <label class="layui-form-label"><i class="required-item"></i>确认密码</label>
                        <div class="layui-input-block">
                            <input type="password" id="update-password2" name="password" placeholder="确认密码" 
                                    autocomplete="off" class="layui-input" lay-verify="required">
                        </div>
                    </div>
                </div>
                
                <input type="hidden" name="expertId" id="update-expertId">
            </form>
        </div>
    </div>


    <!-- 表格内数据编辑、删除按钮 -->
    <script type="text/html" id="rowBar">
        {{# if (myConfig !== 1) { }}
        <a class="layui-btn layui-btn-xs btn-normal-row" lay-event="resetPasswords">重置密码</a>
        {{# } }}
        <a class="layui-btn layui-btn-xs btn-normal-row" lay-event="edit">编辑</a>
        <a class="layui-btn layui-btn-xs btn-danger-row" lay-event="del">删除</a>
    </script>
    <!-- 表格头的操作按钮 -->
    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="appoint">聘任</a>
        <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="download">专家模板下载</a>
        <a class="layui-btn layui-btn-sm layui-btn-radius" id="uploadExpert">专家导入</button>
        <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="resetpassword">批量重置密码</a>
    </script>
    <script type="text/javascript">
        const   myConfig        = 1,
                date            = new Date(),
                yearCur         = date.getFullYear(),
                standardKindId  = dictTool.getStandardKindId();
        
        let     appointYear     = yearCur;


        /** 全局配置及引入相关的模块 */
        layui.config({
            base        : '/js/layui/ext/'
        }).extend({
            xmSelect    : 'xm-select'
        }).use([ 'table', 'form', 'laydate', 'upload', 'xmSelect' ], () => {
            let { table, form, layer, laydate, upload } = layui, xmSelectYear, layerIndex;

                 
            /** 初始化页面 */
            $(() => {
                /*laydate.render({
                    elem    : '#appointYear', // 指定元素
                    type    : 'year',
                    btns    : [ 'now', 'confirm' ],
                    value   : yearCur,
                    done    : (value, date, endDate) => (appointYear = value, initKnowledgeSelBatch(), tableOp.reload())
                });*/
                for (let i = yearCur + 1; i > yearCur - 6; i--) {
                    $('#appointYear').append($('<option value="' + i + '" ' + (i == yearCur ? 'selected' : '') + '>' + i + '</option>'));
                }
                form.on('select(appointYear)', data => (appointYear = data.value, initKnowledgeSelBatch(), tableOp.reload()));

                initKnowledgeSelBatch();
                initTitle();

                tableOp.init();

                form.render();
            });

            window.initKnowledgeSelBatch = () => {
                dictTool.initKnowledgeSel('#knowledgeTwoId', '二级学科', { ...getVerParams(), knowledgeType: 2 });
                $('#knowledgeThreeId').find('option:gt(0)').remove();
                let pId = $('#knowledgeTwoId').val();
                if (pId) dictTool.initKnowledgeSel('#knowledgeThreeId', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: pId });

                form.on('select(knowledgeTwoId)', data => {
                    $('#knowledgeThreeId').find('option:gt(0)').remove();
                    let pId = data.value;
                    if (pId) dictTool.initKnowledgeSel('#knowledgeThreeId', '三级学科', { ...getVerParams(), knowledgeType: 3, knowledgeTwoId: pId });
                    form.render();
                });

                form.render();
            };
            
            window.initTitle = () => {
                $('#titleId, #titleId_id').find('option:gt(0)').remove();
                $.ajax({
                    type        : 'get',
                    url         : huayi_sjwh_url + 'comTitle/list/all',
                    contentType : 'application/json;charset=UTF-8',
                    data        : { 'titleKind': 3 },
                    dataType    : 'json',
                    success     : res => {
                        if (res.data && res.data.length > 0) {
                            $.each(res.data, (i, item) =>
                                $('#titleId, #titleId_id').append('<option value=\'' + item.titleId + '\'>' + item.titleName + '</option>'));
                            layui.form.render('select');
                        } else layer.msg('职称加载失败', { icon: 7, time: 1500 });
                    },
                    error       : () => layer.msg('职称加载失败', { icon: 7, time: 1500 })
                });
            };


            /** 表格相关 */
            window.tableOp = {

                init: () => {
                    table.render({
                        elem            : '#table-projectExpert',
                        url             : huayi_personorg_url + 'projectExpert/listWithInfo',
                        defaultToolbar  : [],
                        where           : tableOp.getQueryParams(),
                        cols            : [ [
                            { fixed: 'left', type: 'checkbox', width: 50 },
                            { fixed: 'left', width: myConfig !== 1 ? 190 : 120, align: 'center', toolbar: '#rowBar', title: '操作' },
                            { field: 'expertName', title: '专家姓名', sort: true, minWidth: 110, align: 'center' },
                            { field: 'appointYear', title: '聘任年度', sort: true, minWidth: 110, align: 'center' },
                            { field: 'expertGender', title: '性别', sort: true, minWidth: 80, align: 'center', templet: d => d.expertGender === 1 ? '男' : '女' },
                            { field: 'userName', title: '用户名', sort: true, minWidth: 110, hide: myConfig === 1 },
                            { field: 'expertMobile', title: '手机号', sort: true, minWidth: 130, align: 'center' },
                            { field: 'titleName', title: '职称', sort: true, minWidth: 150, align: 'center' },
                            { field: 'knowledgeTwoName', title: '二级学科', sort: true, minWidth: 150, align: 'center' },
                            { field: 'knowledgeName', title: '三级学科', sort: true, minWidth: 150, align: 'center' },
                            { field: 'expertAddress', title: '联系地址', sort: true, minWidth: 180 },
                            { field: 'unitName', title: '单位', sort: true, minWidth: 180 },
                            { field: 'addTime', title: '添加时间', sort: true, minWidth: 180, align: 'center' }
                        ] ],
                        toolbar         : '#bar',
                        cellMinWidth    : 100,
                        id              : 'table-projectExpert',
                        height          : tableOp.computeHeight(),
                        page            : true,
                        limit           : 10,
                        limits          : [ 10, 50, 100, 150, 200 ],
                        parseData       : res => {
                            return {
                                'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                                'msg'   : res.message, // 解析提示文本
                                'count' : res.data.recordsTotal, // 解析数据长度
                                'data'  : res.data.records, // 解析数据列表
                                'page'  : res.data.pageNum, // 当前页
                                'limit' : res.data.pageSize, // 每页条数
                            }
                        },
                        request         : {
                            pageName    : 'pageNum', // 页码的参数名称，默认：page
                            limitName   : 'pageSize' // 每页数据量的参数名，默认：limit
                        },
                        done            : (res, curr, count) => {
                            // $('#uploadExpert').on('click', () => layer.msg('正在改造中', { icon: 7, time: 1500 }));
                            upload.render({
                                elem        : '#uploadExpert', // 绑定元素
                                url         : huayi_personorg_url + 'projectExpert/upload/', //上传接口
                                accept      : 'file',
                                data        : {
                                    'standardkindId'    : dictTool.getStandardKindId(),
                                    'appointUnitId'     : dictTool.getUnitId()
                                },
                                // exts        : 'zip|rar|7z',
                                done        : res => {
                                    if(res.success){
                                        tableOp.init();
                                        layer.alert(res.data);
                                    } else {
                                        layer.msg(res.msg, { icon: 7, time: 1500 });
                                    }
                                    
                                },
                                error       : () => layer.msg('请求异常回调', { icon: 7, time: 1500 })
                            });
                        }
                    });

                    tableOp.initListener();
                },

                initListener: () => {
                    table.on('toolbar(table-projectExpert)', obj => {
                        let { event } = obj;

                        if (event === 'appoint') {
                            layerIndex = layer.open({
                                type    : 2,
                                title   : '聘任',
                                content : 'projectExpertDetail.html',
                                area    : [ '800px', '625px' ]
                            });
                        } 
                        else if (event === 'download') {
                            window.location.href = '/file/project_template/' + localStorage.getItem('standardkind-id') + '/专家模板.xlsx';
                        } 
                        else if (event === 'resetpassword') {
                            let data        = table.checkStatus('table-projectExpert').data, // 获取选中状态的数据
                                expertIds   = '';
                            if (data.length <= 0) {
                                layer.msg('请选择要操作的专家', { icon: 7, time: 1500 });
                                return;
                            }
                            $.each(data, (i, item) => expertIds = item.expertId + ',' + expertIds);
                            layerIndex = layer.open({
                                type        : 1,
                                title       : '批量重置密码',
                                content     : $('#layer-pwReset').html(),
                                area        : [ '500px', '300px' ],
                                btn         : [ '确定', '取消' ],
                                btnAlign    : 'c',
                                btn1        : (index, layero) => updatePassword(expertIds, index, layero),
                                btn2        : (index, layero) => layer.close(index)
                            });
                        }
                    });

                    table.on('tool(table-projectExpert)', obj => {
                        let { data, event } = obj,
                            { expertId } = data;

                        if (event === 'edit') {
                            layerIndex = layer.open({
                                type    : 2,
                                title   : '修改',
                                content : 'projectExpertDetail.html?expertId=' + expertId + '&expertInfoId=' + data.expertInfoId,
                                area    : [ '800px', '625px' ]
                            });
                        } 
                        else if (event === 'del') {
                            layer.confirm('确认删除', { icon: 3, title: '提示' }, () => {
                                $.ajax({
                                    type        : 'get',
                                    url         : huayi_personorg_url + 'projectExpert/deleted',
                                    data        : {
                                        expertId        : expertId,
                                        appointUnitId   : dictTool.getUnitId()
                                    },
                                    contentType : 'application/json;charset=UTF-8',
                                    dataType    : 'json',
                                    success     : res => {
                                        if (res.status === 200) {
                                            layer.msg(res.data, { icon: 1, time: 1500 });
                                            tableOp.reload();
                                        } else layer.msg('操作失败', { icon: 7, time: 1500 });
                                    },
                                    error       : () => layer.msg('操作失败', { icon: 7, time: 1500 })
                                });
                            });
                        } 
                        else if (event === 'resetPasswords') {
                            form.val('form-pwReset');
                            layerIndex = layer.open({
                                type        : 1,
                                title       : '重置密码',
                                btnAlign    : 'c',
                                content     : $('#layer-pwReset').html(),
                                area        : [ '500px', '300px' ],
                                btn         : [ '提交', '取消' ],
                                btn1        : (index, layero) => updatePassword(expertId, index, layero),
                                btn2        : (index, layero) => layer.close(index)
                            });
                        }
                    });

                    form.on('input(update-password2)', data => layer.msg('输入完成提示', { icon: 1, time: 1500 }));
                },

                computeHeight: () => {
                    let windowHeight    = $(window).height(),
                        divTop          = $('#table-projectExpert').offset().top,
                        divHeight       = windowHeight - divTop;
                    return  'full-' + Math.floor(divTop + 16);
                },

                getQueryParams: data => {
                    return { 
                        ...$('#form-query').serializeObject(),
                        appointUnitId       : dictTool.getUnitId(),
                        cmeStandardKindId   : dictTool.getStandardKindId,
                        appointYear         : appointYear,
                        ...data
                    };
                },

                reload: config => {
                    table.reload('table-projectExpert', {
                        height  : tableOp.computeHeight(),
                        where   : tableOp.getQueryParams(),
                        page    : { curr: 1 }, // 重新从第 1 页开始
                        ...config
                    });
                }

            };

            
            /** 修改密码 */
            window.updatePassword = (entityIds, index, mylayero) => {
                let password    = mylayero.find('#update-password1').val(),
                    password1   = mylayero.find('#update-password2').val();
                if (!password || !password1) {
                    layer.msg('密码不能为空', { icon: 7, time: 1500 });
                    return;
                }
                if (password1 != password) {
                    layer.msg('两次密码不一致', { icon: 7, time: 1500 })
                    return;
                }
                $.ajax({
                    type        : 'post',
                    url         : huayi_permission_url + 'comuser/updatePasswordByEntityIds',
                    data        : JSON.stringify({
                        entityId    : entityIds,
                        password    : password
                    }),
                    contentType : 'application/json;charset=UTF-8',
                    dataType    : 'json',
                    success     : res => {
                        if (res.status === 200) {
                            layer.msg('修改成功', { icon: 1, time: 1500 });
                            layer.close(layerIndex);
                            tableOp.reload();
                        } else layer.msg(res.msg, { icon: 7, time: 1500 });
                    },
                    error       : () => layer.msg('操作失败', { icon: 7, time: 1500 })
                });
            };


            window.getVerParams = () => ({
                cmeStandardKindId   : standardKindId,
                versionYear         : appointYear
            });
    

            window.pageNum = 1;
            $(window).resize(() => {
                let pageNumCur = $('.layui-laypage-curr > em:nth-child(2)').text();
                pageNum = pageNumCur || pageNum;
                tableOp.reload({ page: { curr: pageNum } });
            });
            
        });
    </script>
</body>
</html>
