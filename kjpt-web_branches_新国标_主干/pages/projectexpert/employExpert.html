            <div class="layui-inline">

<script type="text/javascript">
    layui.use(['table','element'],function () {
        var table = layui.table;
        var $ = layui.jquery;
        var element = layui.element;
        var from = layui.from;

        table.render({
            elem: '#employExpertId',
            defaultToolbar: [],
            cols: [[ //表头
                {field: 'id', title: 'ID', width: 80, sort: true, fixed: 'left'},
                {field: 'username', title: '用户名', width: 80},
            ]],
            data:[],
            id: 'employExpertId-reload'
        })
        loaderTable = function () {
            // layer.msg("调用重载表格方法");
            table.reload('employExpertId-reload', tableconfig);
        }
        // 正常表格
        var tableconfig={
            cols: [[ //表头
                {field: 'id', title: 'ID', width: 80, sort: true, fixed: 'left'},
                {field: 'username', title: '用户名', width: 80},
                {field: 'password', title: '密码', width: 80},
            ]],
            data:[{id: 1,username: '测试'},
                {id: 1,username: '测试'},
                {id: 1,username: '测试'},
                {id: 1,username: '测试'}],
        }

        // 选项卡触发事件。
        element.on('tab(my-tables)',function () {
            var type=this.getAttribute('lay-id');
            layer.msg(type);
            table.reload('employExpertId-reload',tableconfig);
        })

        layer.ready(function () {
            element.render();
            element.tabChange('my-tables', 0);
        })
    })
</script>
