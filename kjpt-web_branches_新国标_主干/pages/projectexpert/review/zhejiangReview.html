<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <title>评审表（浙江）</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <script type="text/javascript" src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../../js/common.js"></script>
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <script src="../../../js/tools/urlTools.js"></script>
    <style>
        .layui-card {
            box-shadow: none;
            margin-bottom: 70px !important;
            padding-bottom: 5px;
        }

        .layui-card-body {
            padding: 20px;
        }

        .footer {
            text-align: center;
            position: fixed;
            left: 0;
            bottom: 0;
            margin-bottom: 0;
            width: 100%;
            background-color: #fff;
            padding: 15px 0;
        }

        .reason-container {
            margin-top: 10px;
        }

        .reason-list-wrapper {
            height: 260px;
            border: 1px solid #e6e6e6;
            padding: 8px;
            overflow-y: auto;
            background-color: #fafafa;
        }

        .reference-item {
            padding: 6px 8px;
            margin: 4px 0;
            cursor: pointer;
            background-color: #f8f8f8;
            border-radius: 3px;
        }

        .reference-item:hover {
            background-color: #e6e6e6;
        }

        .reason-textarea {
            height: 260px;
        }
    </style>
</head>

<body>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body layui_body_box">
                <div id="expertReviewProject">
                    <form class="layui-form" id="form1" lay-filter="review-form">
                        <!-- 隐藏字段 -->
                        <div class="layui-form-item hide">
                            <div class="layui-inline">
                                <label class="layui-form-label"></label>
                                <div class="layui-input-block">
                                    <input type="hidden" name="projectId" id="projectId_form" autocomplete="off" class="layui-input">
                                    <input type="hidden" name="reviewId" id="reviewId_form" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                        </div>

                        <!-- 推荐意见 -->
                        <div class="layui-form-item">
                            <label class="layui-form-label">
                                <span class="required-item"></span>
                                <label id="requiredText">推荐意见</label>
                            </label>
                            <div class="layui-input-block">
                                <input type="radio" name="reviewResult" lay-filter="review-result" value="1" title="推荐" checked>
                                <input type="radio" name="reviewResult" lay-filter="review-result" value="2" title="不推荐">
                            </div>
                        </div>

                        <!-- 评分 -->
                        <div class="layui-form-item" id="score-div">
                            <label class="layui-form-label">
                                <span class="required-item"></span>评分
                            </label>
                            <div class="layui-input-inline">
                                <input type="text"
                                       name="grade"
                                       id="grade_form"
                                       autocomplete="off"
                                       class="layui-input"
                                       lay-verify="required|gradeRange"
                                       placeholder="请输入"
                                       oninput="if(!/^[0-9]+$/.test(value))value=value.replace(/\\D/g,'');if(value>100)value=100;if(value<0)value=null">
                            </div>
                            <div class="layui-form-mid layui-word-aux">分</div>
                        </div>

                        <!-- 评分说明提示 -->
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <span style="color: red;">
                                    注：请根据项目情况进行综合评分，推荐通过项目评分范围在90-100分区间；推荐不通过项目评分范围在60-70分区间
                                </span>
                            </div>
                        </div>

                        <!-- 不推荐原因参考 & 录入（左右布局） -->
                        <div class="layui-row reason-container">
                            <!-- 左侧：不推荐原因参考 -->
                            <div class="layui-col-md6" id="reasonListContainer">
                                <div class="layui-form-item">
                                    <label class="layui-form-label">不推荐原因参考</label>
                                    <div class="layui-input-block">
                                        <div class="reason-list-wrapper" id="reasonList">
                                            <div class="reference-item">本地区已有类似项目，且水平优于此项目。</div>
                                            <div class="reference-item">不属"四新"内容。</div>
                                            <div class="reference-item">体现"三性"较差。</div>
                                            <div class="reference-item">内容一般。</div>
                                            <div class="reference-item">内容陈旧。</div>
                                            <div class="reference-item">内容散，无重点。</div>
                                            <div class="reference-item">内容杂乱，主题不突出。</div>
                                            <div class="reference-item">内容先进性不强。</div>
                                            <div class="reference-item">项目缺乏实质性内容，实用性差。</div>
                                            <div class="reference-item">题目与授课内容不符。</div>
                                            <div class="reference-item">主办单位无举办项目的实力。</div>
                                            <div class="reference-item">项目内容与授课教师的专业特长不符。</div>
                                            <div class="reference-item">项目外请专家过多。</div>
                                            <div class="reference-item">项目水平未达到省级继教项目的要求。</div>
                                            <div class="reference-item">项目无新意。</div>
                                            <div class="reference-item">师资力量弱。</div>
                                            <div class="reference-item">主办单位资质不够。</div>
                                            <div class="reference-item">项目举办时间过长。</div>
                                            <div class="reference-item">本项目未达到省级继教项目水平。</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 右侧：评审意见 / 不推荐原因录入 -->
                            <div class="layui-col-md6">
                                <div class="layui-form-item" id="explanation-div">
                                    <label class="layui-form-label">
                                        <span id="explanationRequiredSpan"></span>
                                        <span id="explanationLabelText">推荐原因</span>
                                    </label>
                                    <div class="layui-input-block">
                                        <textarea name="explanation"
                                                  id="explanation_form"
                                                  class="layui-textarea reason-textarea"
                                                  maxlength="300"
                                                  placeholder="请填写推荐原因"></textarea>
                                        <div class="layui-word-aux" id="explanationCounter">0 / 300 字</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 底部按钮 -->
                        <div class="layui-form-item footer">
                            <button class="layui-btn" lay-submit lay-filter="formDemo">提交</button>
                            <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">

        const projectId      = getUrlParam('projectId'),
              reviewId       = getUrlParam('reviewId'),
              updateFlag     = reviewId && reviewId.length === 36;
        const standardKindId = localStorage.getItem('standardkind-id');
        const userType       = localStorage.getItem('user-type');

        layui.use(['form'], () => {
            const form = layui.form;
            const $    = layui.$;

            // 自定义评分区间校验 & 评审意见字数限制
            form.verify({
                gradeRange: function (value) {
                    if (!value) {
                        return '评分不能为空';
                    }
                    const grade = Number(value);
                    if (isNaN(grade)) {
                        return '评分必须是数字';
                    }
                    const reviewResult = $('input[name="reviewResult"]:checked').val();
                    if (reviewResult === '1') {
                        if (grade < 90 || grade > 100) {
                            return '推荐时评分需在 90-100 分之间';
                        }
                    } else if (reviewResult === '2') {
                        if (grade < 60 || grade > 70) {
                            return '不推荐时评分需在 60-70 分之间';
                        }
                    }
                },
                explanationLimit: function (value) {
                    if (value && value.length > 300) {
                        return '评审意见/不推荐原因最多输入 300 字';
                    }
                }
            });

            // 推荐/不推荐共用 explanation 字段，动态控制必填与文案
            const $explanationLabelSpan  = $('#explanationRequiredSpan');
            const $explanationLabelText  = $('#explanationLabelText');
            const $explanation           = $('#explanation_form');
            const $reasonListContainer   = $('#reasonListContainer');
            const $explanationCounter    = $('#explanationCounter');

            // 初始化字数统计
            const updateExplanationCounter = () => {
                const len = ($explanation.val() || '').length;
                $explanationCounter.text(len + ' / 300 字');
            };
            updateExplanationCounter();

            // 输入时实时更新字数，确保不超过 300
            $explanation.on('input propertychange', () => {
                let val = $explanation.val() || '';
                if (val.length > 300) {
                    val = val.slice(0, 300);
                    $explanation.val(val);
                }
                updateExplanationCounter();
            });

            function updateExplanationState(reviewResult) {
                if (reviewResult === '2') {
                    // 不推荐：说明作为“不推荐原因录入”，必填
                    $explanationLabelSpan.addClass('required-item');
                    $explanation.attr('lay-verify', 'required|explanationLimit');
                    $explanationLabelText.text('不推荐原因录入');
                    $explanation.attr('placeholder', '请录入不推荐原因，或在左侧选择原因自动加入');
                    $reasonListContainer.show();
                } else {
                    // 推荐：说明作为“推荐意见”，非必填
                    $explanationLabelSpan.removeClass('required-item');
                    $explanation.attr('lay-verify', 'explanationLimit');
                    $explanationLabelText.text('推荐原因');
                    $explanation.attr('placeholder', '请填写推荐原因');
                    $reasonListContainer.hide();
                }
            }

            // 单选切换时更新必填规则
            form.on('radio(review-result)', function (data) {
                updateExplanationState(data.value);
            });

            // 不推荐原因参考点击追加到右侧录入框
            $('#reasonList').on('click', '.reference-item', function () {
                const text     = $(this).text();
                let   oldValue = $explanation.val() || '';
                if (oldValue) {
                    // 去掉尾部空白后换行追加一条新原因
                    oldValue = oldValue.replace(/\s*$/, '') + '\n' + text;
                } else {
                    oldValue = text;
                }
                // 统一走一次 300 字截断逻辑
                if (oldValue.length > 300) {
                    oldValue = oldValue.slice(0, 300);
                }
                $explanation.val(oldValue);
                updateExplanationCounter();
            });

            // 获取评审信息（回显）
            if (updateFlag) {
                $.ajax({
                    type     : 'get',
                    url      : huayi_projectscore_url + 'projectExpertReview/' + reviewId,
                    async    : false,
                    dataType : 'json',
                    success  : res => {
                        if (res && res.status === 200) {
                            const data = res.data;
                            form.val('review-form', data);
                            $('[name=reviewResult][value=' + data.reviewResult + ']').prop('checked', true);
                            form.render('radio');

                            const reviewResult = $('[name="reviewResult"]:checked').val();
                            updateExplanationState(reviewResult);
                            updateExplanationCounter();
                        } else {
                            layer.msg('获取评审信息失败', { icon: 7, time: 1000 });
                        }
                    },
                    error   : () => layer.msg('获取评审信息失败', { icon: 7, time: 1000 })
                });
                } else {
                // 新建时默认按“推荐”状态：说明作为“推荐意见”，非必填
                updateExplanationState('1');
            }

            // 表单提交
            form.on('submit(formDemo)', data => {
                const reviewResult = data.field.reviewResult;
                if (!reviewResult) {
                    layer.msg('请选择推荐意见', { icon: 7, time: 1000 });
                    return false;
                }

                $.ajax({
                    type        : 'post',
                    url         : huayi_projectscore_url + 'projectExpertReview/' + (updateFlag ? 'update' : 'save'),
                    contentType : 'application/json;charset=UTF-8',
                    async       : false,
                    data        : JSON.stringify({
                        projectId      : projectId,
                        id             : updateFlag ? reviewId : '',
                        reviewResult   : reviewResult,
                        explanation    : $('#explanation_form').val(),
                        grade          : $('#grade_form').val(),
                        standardKindId : standardKindId
                    }),
                    dataType    : 'json',
                    success     : res => {
                        layer.msg(res.msg || '提交成功', { time: 1000 });
                        window.parent.tableOp && window.parent.tableOp.reload();
                        window.parent.layer && window.parent.layer.closeAll();
                    },
                    error       : () => {
                        window.parent.tableOp && window.parent.tableOp.reload();
                        window.parent.layer && window.parent.layer.closeAll();
                    }
                });

                return false;
            });

            // 重置表单
            $('#form1').on('reset', function () {
                setTimeout(() => {
                    $('input[name="reviewResult"][value="1"]').prop('checked', true);
                    form.render('radio');
                    $('#grade_form').val('');
                    $explanation.val('');
                    updateExplanationState('1');
                }, 0);
            });
        });
    </script>
</body>
</html>
