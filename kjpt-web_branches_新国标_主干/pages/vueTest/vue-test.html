<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Vue + Element Plus 示例</title>
  <!-- 引入 Element Plus 样式 -->
  <link rel="stylesheet" href="/js/element-plus/css/index.css" />
  <!-- 引入 Vue 3 -->
  <script src="/js/vue/vue-3.5.27/vue.global.prod.js"></script>
  <!-- 引入 Element Plus -->
  <script src="/js/element-plus/index.full.js"></script>
</head>
<body>
  <div id="app">
    <el-container style="height: 100vh;">
      <el-header style="background-color: #B3C0D1; color: #333; line-height: 60px;">
        <h2>Element Plus + Vue 页面示例</h2>
      </el-header>
      <el-main>
        <el-row :gutter="20">
          <el-col :span="12">
            <el-card shadow="hover">
              <template #header>
                <span>卡片标题</span>
              </template>
              <p>欢迎使用 Element Plus！</p>
              <el-button type="primary" @click="handleClick">点击我</el-button>
            </el-card>
          </el-col>
          <el-col :span="12">
            <el-card shadow="hover">
              <template #header>
                <span>表单示例</span>
              </template>
              <el-form :model="form" label-width="80px">
                <el-form-item label="用户名">
                  <el-input v-model="form.username" placeholder="请输入用户名"></el-input>
                </el-form-item>
                <el-form-item label="密码">
                  <el-input type="password" v-model="form.password" placeholder="请输入密码"></el-input>
                </el-form-item>
                <el-form-item>
                  <el-button type="success" @click="onSubmit">提交</el-button>
                </el-form-item>
              </el-form>
            </el-card>
          </el-col>
        </el-row>
      </el-main>
    </el-container>
  </div>

  <script>
    const { createApp, reactive } = Vue;
    const { ElMessage } = ElementPlus;
    const app = createApp({
      setup() {
        const form = reactive({
          username: '',
          password: ''
        });

        const handleClick = () => {
          ElMessage.success('按钮被点击了！');
        };

        const onSubmit = () => {
          ElMessage.info(`提交的用户名: ${form.username}`);
        };

        return {
          form,
          handleClick,
          onSubmit
        };
      }
    });
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
