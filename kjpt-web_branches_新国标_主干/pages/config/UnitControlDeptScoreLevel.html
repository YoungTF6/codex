<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <title>其他级别院内活动单位维护（省厅）</title>

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <!-- 工具 -->
    <script type="text/javascript" src="../../js/base64.js"></script>

    <style>
        #content-left {
            display: inline-block;
            width: 250px;
            border: 1px solid #e6e6e6;
            margin: 0 10px 0 0;
            vertical-align: top;
            overflow: auto;
            padding: 10px;
            height: 570px;
        }
        #content-right {
            display: inline-block;
            width: calc(100% - 290px);
            vertical-align: top;
        }
        #unit-tree {
            width: 310px;
        }

        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-form.layui-border-box.layui-table-view {
            margin: 0 !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .layui-treeSelect .ztree li {
            line-height: initial !important;
            padding: 2px 0;
        }
        .table_toolbar_right {
            float: right;
            position: relative;
            right: -120px;
        }
    </style>
</head>

<body class="body-area">

    <div style="padding: 10px;">
        <!-- 搜索 -->
        <div class="layui-inline">
            <input type="text" id="searchKey" name="unitCode" placeholder="请输入搜索关键字" class="layui-input">
        </div>
        <a class="layui-btn layui-btn-sm" onclick="searchBtn()" id="searchBtn" >
            <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
        </a>

        <a class="layui-btn layui-btn-sm" onclick="addBtn()" id="addBtn" >添加</a>

        <a class="layui-btn layui-btn-sm  layui-btn-danger" onclick="delBtn()" id="delBtn" >删除</a>

    </div>
    
    <div class="layui-fluid">

        <!-- 下级单位树 -->
        <div class="layui-card" id="content-left">
            <div id="unit-tree"></div>
        </div>
        
        <!-- 统计表格 -->
        <div class="layui-card" id="content-right">

            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" style="margin: 0px 0px;"
                        id="table_compliance" lay-filter="table_compliance">
                </table>
            </div>

        </div>
    </div>


    <script type="text/javascript">
        const unitId            = localStorage.getItem('unit-id'),
              unitName          = localStorage.getItem('unit-name'),
              userId          = localStorage.getItem('user-id'),
              cmeStandardKindId = localStorage.getItem('standardkind-id');

        let   menuUnitId        = localStorage.getItem('menu-unit-id');
              menuUnitId        = (null == menuUnitId || menuUnitId.trim().length < 1) ? unitId : menuUnitId;


        layui.config({
            base : '../../js/layui/ext/'
        }).extend({
            eleTree    : 'eleTree',
        });

        /* 全局配置及引入相关的模块 */
        layui.use(['table', 'form', 'jquery', 'layer', 'eleTree'], function() {
            var table       = layui.table,
                form        = layui.form,
                $           = layui.jquery,
                layer       = layui.layer,
                eleTree     = layui.eleTree;

            var eleTreeUnit         = null,
                unitIds = '';

            /* 页面初始化 */
            $(() => {
                // 单位树
                let unitDict = {},
                    rootKey  = ''; // 虚拟root节点
                $.ajax({
                    type        : 'get',
                    url         : huayi_personorg_url + 'comunit/childrenAllTreeNew?unitId=' + menuUnitId + '&depth=0',
                    contentType : 'application/json;charset=UTF-8',
                    dataType    : 'json',
                    async       : false,
                    success     : res => {
                        let rootNode             = [{ name : '全选', id : rootKey }];
                            rootNode[0].children = res[0].children;
                        eleTreeUnit = eleTree({
                            el                  : '#unit-tree',
                            defaultExpandedKeys : [rootKey],
                            // defaultCheckedKeys  : [rootKey],
                            expandOnClickNode   : false,
                            highlightCurrent    : true,
                            showCheckbox        : true,
                            data                : rootNode,
                            sort                : true,
                            initSort            : {
                                field : 'order',
                                type  : 'asc'
                            },
                            request             : { // 对于树形数据字段名重定义
                                name     : 'name',
                                key      : 'id',
                                children : 'children',
                                pid      : 'pid'
                            },
                            customText          : function (data) {
                                let s                 = data.name;
                                    unitDict[data.id] = data.name;

                                return s;
                            }
                        });
                    }
                });


                debugger
                // let height = $(window).height();
                // $('#content-left').css('height', height - 56);
                // let height_h = $('#content-right .layui-card-header').height();
                // $('#content-right .layui-card-body').css('height', height - height_h - 80);

                // $(window).resize(e => {
                //     let height = $(window).height();
                //     $('#content-left').css('height', height - 56);
                //     let height_h = $('#content-right .layui-card-header').height();
                //     $('#content-right .layui-card-body').css('height', height - height_h - 80);
                // });

            });

             // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem: '#table_compliance',
                    method: 'post',
                    url: huayi_permission_url + '/comMenuUser/unitScoreLevelControl/list',
                    title: '配置单位',
                    defaultToolbar: [],
                    where: {
                        taoId: cmeStandardKindId,
                        menuId: '543697a0-e693-04f7-d182-087cc250f916',
                    },
                    cols: [[
                        { field: 'unitName', title: '单位名称', width: 200, sort: true },
                        { field: 'unitPropertyName', title: '单位属性', width: 200, sort: true },
                        { field: 'unitId', title: '单位编号', width: 110, sort: true },
                        { field: 'parentUnitName', title: '上级单位', width: 150, sort: true },
                        { field: 'operateUser', title: '添加用户', width: 150, sort: true },
                        { field: 'addTime', title: '添加时间', width: 150, sort: true },
                    ]],
                    toolbar: '#bar',
                    cellMinWidth: 100,
                    id: "comUnit",
                    height: 'full-90',
                    page: false,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if (res.status == 200) {
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "count": res.data.recordsTotal, //解析数据长度
                                "data": res.data, //解析数据列表
                                "page": res.data.pageNum, //当前页
                                "limit": res.data.pageSize, //每页条数
                            }
                        } else {
                            layer.msg(res.msg);
                            return false;
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };
            loaderTable();


            window.searchBtn = function(){
                eleTreeUnit.search(document.querySelector("#searchKey").value, function(value, data) {
                    if (!value) return true;
                    return data.name.indexOf(value) !== -1;
                })
            }

            // 添加配置
            window.addBtn = function(){
                unitIds = '';
                // 选择单位ID
                if (null != eleTreeUnit) {
                    let checkedArray = eleTreeUnit.getChecked(false, false);
                    for (let i = 0; i < checkedArray.length; i++) {
                        if (checkedArray[i].id.trim().length > 0) {
                            unitIds += checkedArray[i].id + ','
                        }
                    }
                    if (checkedArray.length < 1) {
                        layer.msg('请选择要查询的子单位', { icon: 7, time: 1500 });
                        return false;
                    }
                    unitIds = unitIds.substring(0, unitIds.length - 1);
                    console.log(unitIds)

                    // 保存单位配置
                    $.ajax({
                        url:    huayi_permission_url + '/comMenuUser/unitScoreLevelControl/add',
                        type     : 'post',
                        data: {
                            operateUser: userId,
                            unitIds: unitIds,
                            menuId: '543697a0-e693-04f7-d182-087cc250f916',
                        },
                        dataType : 'json',
                        success  : function(res) {
                            if (res.status == 200) {
                                layer.msg('保存成功', { icon: 1, time: 1000 }, function () {
                                    loaderTable();
                                });
                            } else {
                                layer.msg('保存失败', { icon: 7, time: 1500 });
                            }
                        },
                        error    : function () {
                            layer.msg('保存失败', { icon: 7, time: 1500 });
                        }
                    });
                    
                }
            }

            // 删除配置
            window.delBtn = function(){
                layer.confirm('确认删除吗？', function (index) {
                    unitIds = '';
                    // 选择单位ID
                    if (null != eleTreeUnit) {
                        let checkedArray = eleTreeUnit.getChecked(false, false);
                        for (let i = 0; i < checkedArray.length; i++) {
                            if (checkedArray[i].id.trim().length > 0) {
                                unitIds += checkedArray[i].id + ','
                            }
                        }
                        if (checkedArray.length < 1) {
                            layer.msg('请选择要查询的子单位', { icon: 7, time: 1500 });
                            return false;
                        }
                        unitIds = unitIds.substring(0, unitIds.length - 1);
                        console.log(unitIds)

                        // 保存单位配置
                        $.ajax({
                            url:    huayi_permission_url + '/comMenuUser/unitScoreLevelControl/del',
                            type     : 'post',
                            data: {
                                unitIds: unitIds,
                                menuId: '543697a0-e693-04f7-d182-087cc250f916',
                            },
                            dataType : 'json',
                            success  : function(res) {
                                if (res.status == 200) {
                                    layer.msg('删除成功', { icon: 1, time: 1000 }, function () {
                                        loaderTable();
                                    });
                                } else {
                                    layer.msg('删除失败', { icon: 7, time: 1500 });
                                }
                            },
                            error    : function () {
                                layer.msg('删除失败', { icon: 7, time: 1500 });
                            }
                        });
                        
                    } 
                });
                
            }

   
                

        });

    </script>
</body>

</html>
