<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>全局配置</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <style>
        #addGlobalConfig .layui-inline {
            width: 80%;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">
                <div class="layui-inline">
                    <label class="layui-form-label">配置编码</label>
                    <div class="layui-input-block">
                        <input type="text" name="configCode" id="configCodeSearch" placeholder="请填写配置编码" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">配置类型</label>
                    <div class="layui-input-block">
                        <select name="configType" id="configTypeSearch" lay-filter = "layui-select-type">
                            <option value="">请选择</option>
                            <option value="0">默认单一值类型</option>
                            <option value="1">功能开关类型</option>
                            <option value="2">枚举取值类型</option>
                            <option value="3">时间范围取值类型</option>
                            <option value="4">数值范围取值类型</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm btn-search" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
                    </a>
                </div>
            </blockquote>
        </div>

        <!--表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="globalConfigTable" lay-filter="globalConfigTable" style="margin: 0px 0px;"></table>
        </div>

        <!-- 添加弹窗-->
        <div id="addGlobalConfig" style=" display:none;text-align: center">
            <form class="layui-form" style="padding: 30px;" id="globalConfigForm" lay-filter="add-filter">
                <input type="hidden" name="configId" autocomplete="off" class="layui-input">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>配置code</label>
                        <div class="layui-input-block">
                            <input type="text" name="configCode" placeholder="请填写配置code" autocomplete="off" class="layui-input" lay-verify="configCode">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>配置</label>
                        <div class="layui-input-block">
                            <input type="text" name="configValue" placeholder="请填写配置" autocomplete="off" class="layui-input" lay-verify="configValue">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>备注</label>
                        <div class="layui-input-block">
                            <textarea name="remark" placeholder="请填写备注" class="layui-textarea" autocomplete="off" lay-verify="remark"></textarea>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">开始时间</label>
                        <div class="layui-input-block">
                            <input type="text" name="startTime" id="startTimeF" readonly autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">结束时间</label>
                        <div class="layui-input-block">
                            <input type="text" name="endTime" id="endTimeF" readonly autocomplete="off" class="layui-input">
                        </div>
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label"><font color="red">*&nbsp;</font>配置类型</label>
                        <div class="layui-input-block">
                            <select name="configType" lay-filter = "layui-select-type" lay-verify="configType">
                                <option value="">请选择</option>
                                <option value="0">默认单一值类型</option>
                                <option value="1">功能开关类型</option>
                                <option value="2">枚举取值类型</option>
                                <option value="3">时间范围取值类型</option>
                                <option value="4">数值范围取值类型</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label">分割字符</label>
                        <div class="layui-input-block">
                            <input type="text" name="splitSign" placeholder="请填写分割字符" autocomplete="off" class="layui-input" lay-verify="splitSign">
                        </div>
                    </div>
                </div>
                
                
                
                
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" lay-submit lay-filter="submit">提交</button>
                    </div>
                </div>
            </form>
        </div>
        
    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    <a class="layui-btn layui-btn-xs  layui-btn-normal btn-normal-row js-bar-btn" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger btn-danger-row js-bar-btn" lay-event="del">删除</a>
</script>
<script type="text/html" id="bar">
    <a class="layui-btn layui-btn-sm layui-btn-radius js-bar-btn" lay-event="add">添加</a>
</script>
<script>
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        tool        :   'tool'
    });

    layui.use(['table', 'form','tool','laydate'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery;
        var layer = layui.layer,tool=layui.tool,laydate=layui.laydate;

        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#globalConfigTable',
                url: huayi_sjwh_url + 'cmeGlobalConfig/list',
                title: '全局配置表',
                defaultToolbar: [],
                where: {
                    configCode: $('#configCodeSearch').val(),
                    configType: $('#configTypeSearch').val(),
                },
                cols: [[
                    {align: 'center',width: 120,toolbar: '#rowBar', title: '操作', fixed: 'left'},
                    {field: 'configType', title: '配置类型',align: 'center',width: 150,
                    templet:function(d){
                        if(d.configType==0) return "默认单一值类型";
                        if(d.configType==1) return "功能开关类型";
                        if(d.configType==2) return "枚举取值类型";
                        if(d.configType==3) return "时间范围取值类型";
                        if(d.configType==4) return "数值范围取值类型";
                        return "";
                    }},
                    {field: 'configCode', title: '配置code',align: 'center',width: 200},
                    {field: 'configValue', title: '配置值',align: 'center',width: 100}, 
                    {field: 'remark', title: '备注',align: 'center',width: 220},
                    {field: 'splitSign', title: '分割字符',align: 'center',width: 100},
                    {field: 'startTime', title: '开始时间',align: 'center',width: 180},
                    {field: 'endTime', title: '结束时间',align: 'center',width: 180},
                    {field: 'addTime', title: '创建时间',align: 'center',width: 180},
                    {field: 'updateTime', title: '更新时间',align: 'center',width: 180}
                ]],
                toolbar: '#bar',
                id: "commonGlobalConfig",
                minWidth: 120,
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done:function(res,curr,count){
                    curr > 1 && res.data.length === 0 && loaderTable();
                }
            });
        };

        // 监听头部新增按钮
        table.on('toolbar(globalConfigTable)', function (obj) {
            if(obj.event != "add") return;
            openFormWindow();
        });

        // 监听行内按钮
        table.on('tool(globalConfigTable)', function (obj) {
            obj.event == "edit" && openFormWindow(obj.data);
            obj.event == "del" && deleteConfigDict(obj.data.configId);
        });

        //新增，编辑时打开弹窗
        let openFormWindow = function(data=""){
            const title = (data=="") ? "新增":"修改";
            if(data=="") $("#addGlobalConfig input[name='configId']").val('');
            form.val("add-filter",data);
            layer.open({
                type: 1,
                title: title,
                content: $('#addGlobalConfig'),
                area: ['600px', '450px'],
                cancel: function(index, layero){ $("#globalConfigForm")[0].reset(); }
            })
        }

        let deleteConfigDict = function(configId){
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function () {
                $.ajax({
                    type: 'get',
                    url: huayi_sjwh_url + 'cmeCommonConfigDict/deleted',
                    data: { configId: configId },
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.status === 200) {
                            layer.msg("删除成功");
                            loaderTable();
                        }else{
                            layer.msg(res.msg);
                        }
                    }
                });
            })
        }

        // form表单相关操作
        // 新增/修改表单提交
        form.on('submit(submit)', function (data) {
            var configId = $("#globalConfigForm input[name='configId']").val();
            let URL = huayi_sjwh_url + 'cmeGlobalConfig/update';
            if(configId=="" || configId==null) {
                URL = huayi_sjwh_url + 'cmeGlobalConfig/add';
            }
            $.ajax({
                type: 'post',
                url: URL,
                data:JSON.stringify(data.field),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.status == 200){
                        layer.closeAll();
                        loaderTable();
                        $("#globalConfigForm")[0].reset()
                        layer.msg("保存成功");
                    }else{
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            return false;
        });

        //自定义验证规则
        form.verify({
            configCode: function(value){
                if(value.length == 0) return '配置code不能为空';
                if(value.length > 60) return '配置code最长不超过60个字符';
            },
            configValue: function(value){
                if(value.length == 0) return '配置值不能为空';
                if(value.length > 100) return '配置名称最长不超过100个字符';
            },
            remark: function(value){
                if(value.length == 0) return '备注不能为空';
                if(value.length > 200) return '答案最长不超过200个字符';
            },
            splitSign: function(value) {
                if(tool.isEmpty(value) && value.length>=4) {
                    return '分割字符最长不超过4个字符';
                }
            }
        });

        let dateInit = function() {
            laydate.render({elem:"#startTimeF", type: 'date'});
            laydate.render({elem:"#endTimeF", type: 'date'});
        }

        //页面初始化，通过查看参数是否都在来进行是否加载页面
        let htmlInit = function(){
            loaderTable();
            dateInit();
        }

        htmlInit();
    });
</script>
</body>
</html>
