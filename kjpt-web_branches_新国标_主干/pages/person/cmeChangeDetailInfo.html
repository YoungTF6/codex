<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>详细说明</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
    <style type="text/css">
        .popdiv {
            width: 660px;
            /* border: #7d9ecb solid 1px; */
            background: #fff;
            margin: 0 auto;
        }

        .popdiv .outer {
            margin: 0 1px 1px 1px;
            background: #E3E3E5;
            padding: 18px 14px 0 14px;
        }

        .popdiv .inner {
            border: #9F9F9F solid 0px;
            background: #fff;
            padding: 14px 30px;
            font-size: 12px;
            color: #000;
            position: relative;
        }

        .popdiv fieldset {
            padding: 5px 5px 10px 5px;
            border: 1px solid #E8E8E8;
            background: #fff;
            text-align: center;
            margin-top: 10px;
        }

        .popdiv fieldset {
            padding: 5px 5px 10px 5px;
            border: 1px solid #E8E8E8;
            background: #fff;
            text-align: center;
            margin-top: 10px;
        }

        .popdiv fieldset legend {
            color: #274DA2;
            font-weight: bold;
            padding: 3px 5px 3px 5px;
            background: #fff;
            text-align: left;
            margin-left: 10px;
            font-size: 12px;
        }

        .popdiv .left {
            text-align: left;
        }
    </style>
</head>

<body class="popdiv">
    <div class="inner">
        <fieldset class="fieldForm">
            <legend>详细说明</legend>
            <table>
                <tbody id="textTbody"></tbody>
            </table>
        </fieldset>
    </div>
</body>

<script>
    // 全局配置及引入相关的模块
    const   _standardKindId = localStorage.getItem('standardkind-id'),
                _isZheJiang     = StandardKind.ZHE_JIANG ===_standardKindId;
    if(_isZheJiang) {
        $('#textTbody').html(`<tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            1) 新一年度人员职称、状态发生变动时，请“添加”一条新的变动情况，不要改动之前的人员变动情况，否则会影响该人员和单位的达标统计；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            2) 如为调入人员，请不要修改或删除该人员之前在其他单位的人员变动情况，否则会影响该人员和单位的达标统计；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            3) 新一年度人员职称、状态没有变化的人员，不需要“添加”新的变动情况，系统会默认采用最近年度的职称和人员状态。
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            4) “正常”状态：适用于当前在职的医务人员，可录入学分和计入达标统计；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            5) “不计达标”状态：适用于无职称或特殊人员，可录入学分，系统涉及到达标类型统计时不将此人员计入；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            6) “注销”状态：适用于退休人员，系统任何查询、学分录入和统计功能都不显示此人员。
                        </td>
                    </tr>`);
    } else {
        $('#textTbody').html(`<tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            1) 新一年度人员职称、状态发生变动时，请“添加”一条新的变动情况，不要改动之前的人员变动情况，否则会影响该人员和单位的达标统计；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            2) 如为调入人员，请不要修改或删除该人员之前在其他单位的人员变动情况，否则会影响该人员和单位的达标统计；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            3) 新一年度人员职称、状态没有变化的人员，不需要“添加”新的变动情况，系统会默认采用最近年度的职称和人员状态。
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            4) “正常”状态：适用于当前在职的医务人员，可录入学分和计入达标统计；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            5) “不计达标”状态：适用于无职称或特殊人员，可录入学分，系统涉及到达标类型统计时不将此人员计入；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            6) “产假”状态：适用于产假人员，计算此人达标情况时，按产假达标要求进行判断；
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            7) “注销”状态：适用于退休人员，系统任何查询、学分录入和统计功能都不显示此人员。
                        </td>
                    </tr>
                    <tr>
                        <td class="left" style="text-indent: 2em; position: relative; padding-bottom: 10px;
                        padding-top: 10px;">
                            8) “新入职人员6个月以上”状态：适用于已在职6个月以上且不满一年的医务人员，可录入学分和计入达标统计；达标标准要求与“正常”状态不同。注：仅部分地区可设置本状态。
                        </td>
                    </tr>`);
    }

</script>


</html>
