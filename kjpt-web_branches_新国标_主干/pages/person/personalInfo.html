<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="margin:0 auto;">
                <div class="layui-form" lay-filter="cmeDetail">

                    <fieldset class="layui-elem-field" style="margin-top: 10px; padding: 30px;">
                        <legend style="color:rgb(55, 192, 112);text-align: left;font-weight: bold;font-size: 18px;">基本信息

                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">性别:</label>

                                    <label class="layui-form-label" id="labelSex"
                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item margin-bottom-0">
                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">民族:</label>
                                <div class="layui-input-inline">
                                    <label class="layui-form-label" id="labelNationName"
                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">手机号:</label>
                                <div class="layui-input-inline" style="text-align: left;">
                                    <label class="layui-form-label" id="labelMobile"
                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                        </div>

                        <div class="layui-form-item margin-bottom-0">
                            <div class="layui-inline layui-form" lay-filter="deptSelectArea">
                                <label class="layui-form-label" style="width: 100px;">证件号:</label>
                                <div class="layui-input-inline">
                                    <label class="layui-form-label" id="labelCertId"
                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">出生日期:</label>
                                <div class="layui-input-inline">

                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                        </div>

                        <div class="layui-form-item margin-bottom-0">
                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">学历:</label>
                                <div class="layui-input-inline">
                                    <label class="layui-form-label" id="labelEducationName"
                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">学位:</label>
                                <div class="layui-input-inline" style="text-align: left;">
                                    <label class="layui-form-label" id="labeldegreeName"
                                        style="width: 100px;text-align:left"></label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item margin-bottom-0">

                            <div class="layui-inline">
                                <label class="layui-form-label" style="width: 100px;">联系电话:</label>
                                <div class="layui-input-inline">
                                    <label class="layui-form-label" id="labelTelephone"
                                        style="width: 100px;text-align:left"></label>

                    </div>

<script>
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect'
    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'element', 'treeSelect'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var treeSelect = layui.treeSelect;
        var element = layui.element;
        var comPersonId=null;


        //获取套
        window.getUserId = function () {
            var userId = localStorage.getItem("user-id");
            if (userId == null || userId == "" || userId == undefined) {
                userId = "df2c2d92-dc77-469c-8c29-fd79708c90f0";
            }
            return userId;
        };

        window.initComPerson = function (data) {
            comPersonId=data.comPersonId;
            $("#labelPersonName").text(data.personName);
            $("#labelSex").text(data.sex);
            $("#labelNationName").text(data.nationName);
            $("#labelPartyName").text(data.partyName);
            $("#labelCertId").text(data.certId.substring(0,14) +'****');
            if (data.birthday != null && data.birthday != undefined && data.birthday != "") {
                let birthday = data.birthday.substring(0, 10);
                $("#labelBirthday").text(birthday);
            }
            $("#labelEducationName").text(data.educationName);
            $("#labeldegreeName").text(data.degreeName);
            $("#labelMobile").text(data.mobile);
            $("#labelTelephone").text(data.telephone);
            $("#labelEmail").text(data.email);
            $("#labelUnitName").text(data.unitName);
            $("#labelHospitalDutyName").text(data.hospitalDutyName);
            $("#labelPersonStateName").text(data.personStateName);
            $("#labelTransferStateName").text(data.transferStateName);
            $("#labelTitleName").text(data.titleName);
            $("#labelPersonNo").text(data.personNo);

        };

        window.initCmePersonTable = function (cmePersonList) {
            table.render({
                elem: '#cmePerson',
                url: '',
                title: '人员变动',
                defaultToolbar: [],
                cols: [
                    [
                        {field: 'cmeYear',align: 'center',title: '年度',minWidth: 100},
                        {field: 'unitName',align: 'center',title: '单位',minWidth: 200},
                        {field: 'personStateName',align: 'center',title: '状态',minWidth: 100},
                        {field: 'titleName',align: 'center',title: '职称',minWidth: 150}
                    ]
                ],
                cellMinWidth: 100,
                id: 'cmePerson',
                height: 'full',
                page: false,
                data:cmePersonList
            });
        };

        $(function () {
            $.ajax({
                url: huayi_personorg_url + "comperson/getPersonalInfoByUserId",
                data: { userId: getUserId() },
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                success: function (res) {
                    if (res.success == true) {
                        if (res.data != null && res.data != undefined && res.data != "") {
                            let data = res.data;
                            let cmePersonList = res.data.cmePersonList;
                            initComPerson(data);
                            initCmePersonTable(cmePersonList);
                        }
                    } else {
                        layer.msg("处理出错");
                    }
                },
                error: function () {
                    layer.msg("请求出错");
                }

            });

        });

        $("#btnSave").click(function(){
           location.href="personalEdit.html?operate=edit&comPersonId="+comPersonId;

        });

    });
</script>
