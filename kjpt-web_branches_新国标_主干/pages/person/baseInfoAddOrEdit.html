<script>



    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect',
        tool: 'tool'
    });

    layui.use(['form', 'jquery', 'layer', "laydate", 'xmSelect', 'treeSelect','tool'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var xmSelect = layui.xmSelect;
        var treeSelect = layui.treeSelect;
        var tool = layui.tool;
        var origiMobile = "";
        var curDeptId = "";
        var fun_person_photo_required;

        const IS_HENAN = StandardKind.HE_NAN == getCmeStandardKindId();
        const IS_JILIN =  StandardKind.JILIN == getCmeStandardKindId();
        const IS_ZHEJIANG = StandardKind.ZHE_JIANG == getCmeStandardKindId();
        const IS_SHANXI =  StandardKind.SHAN_XI == getCmeStandardKindId();
        const IS_GUANGDONG =  StandardKind.GUANG_DONG == getCmeStandardKindId();

        specialConfig();

        window.getUnitId = function () {
            return localStorage.getItem("unit-id");
        }
        function getCmeStandardKindId () {
            return localStorage.getItem("standardkind-id");
        }




        //获取配置的值
        window.getConfig = function (config_name) {
            var config_value = "";
            $.ajax({
                async: false,
                type: "post",
                url: huayi_sjwh_url + "cmeCommonConfig/getConfigByUnitFromRedis",
                data: { unitId: localStorage.getItem("unit-id"), configNames: config_name },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg("获取配置出错");
                    }
                },
                error: function () {
                    layer.msg("获取配置出错");
                }
            });
        }


        window.getDeptId = function () {
            if (localStorage.getItem("user-type") == 13) {
                let userId = localStorage.getItem("user-id");
                $.ajax({
                    async: false,
                    headers: {
                        'Authorization': localStorage.getItem('token'),
                        'KJPT-USER-ID': localStorage.getItem('user-id')
                    },
                    url: huayi_permission_url + "comuser/detail",
                    type: "get",
                    data: { userId: userId },
                    success: function (res) {
                        if (res.success == true) {
                            if (res.data != null && res.data != undefined && res.data != "") {
                                curDeptId = res.data.base.unitId;
                            }
                        }
                    },
                    error: function () {
                        layer.msg("发送信息失败");
                    }
                });
            }
        }


        /** 科室选择下拉列表初始化 */
        var deptTreeSelect;
        window.initDeptTree = function (deptId) {
            var unitId = window.getUnitId();
            deptTreeSelect = treeSelect.render({
                elem: '#deptSelect',
                data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + unitId,
                type: 'get',
                search: true,
                style: {
                    folder: {     // 父节点图标
                        enable: true   // 是否开启：true/false
                    },
                    line: {     // 连接线
                        enable: true   // 是否开启：true/false
                    }
                },
                click: function (data) {
                    $("#hidden_dept_id").val(data.current.id);
                },
                success: function () {
                    treeSelect.refresh('deptSelect');
                    if (deptId != null && deptId != undefined && deptId != "") {
                        deptTreeSelect.checkNode('deptSelect', deptId);
                    }
                }
            });
        }

        //初始化人员状态下拉框
        window.initPersonState = function () {
            var cmeStandardKindId = getCmeStandardKindId();
            $.ajax({
                async: false,
                url: huayi_personorg_url + "comperson/getPersonStateListByCmeStandardKindId",
                type: "post",
                data: { cmeStandardKindId: cmeStandardKindId,kind:1 },
                success: function (result) {
                    if (result.success == true) {
                        var personStateList = result.data;
                        personStateList.forEach(e => {
                            $("<option value=" + e.person_state_id + ">" + e.person_state_name + "</option>").appendTo($("#select_person_state_id"));
                        });

                        form.render();
                    }
                    else {
                        layer.msg("加载人员状态下拉框出现问题");
                    }
                }
            });
        }


        /* 专业树初始化 */
        var specTreeSelect;
        window.initSpecTree = function (spec) {
            specTreeSelect = treeSelect.render({
                elem: '#specSelect',
                data: huayi_sjwh_url + 'comPersonSpec/tree',
                type: 'get',
                search: true,
                style: {
                    folder: {   // 父节点图标
                        enable: true   // 是否开启：true/false
                    },
                    line: {     // 连接线
                        enable: true   // 是否开启：true/false
                    }
                },
                click: function (data) {
                    $("#hidden_spec").val(data.current.id);
                },
                success: function () {
                    treeSelect.refresh('specSelect');
                    if (spec != null && spec != undefined && spec != "") {
                        specTreeSelect.checkNode('specSelect', spec);
                    }
                }
            });
        }


        //初始化单个下拉框
        window.initPerDic = function (select_id, kind_id, errorStr) {
            $.ajax({
                async: false,
                url: huayi_sjwh_url + "comdictionary/getDicsByKindId",
                data: { kindId: kind_id },
                success: function (result) {
                    if (result.success == true) {
                        var objList = result.data;
                        var obj = {};
                        for (var i = 0; i < objList.length; i++) {
                            obj = objList[i];

                            function (index) {

                    if (comperson.checkState == 1 && comperson.transferState != 1) {
                        layer.alert("您输入的证件号码在 " + comperson.unitName + " 单位中已存在，请勿重复添加<br/>" + "重复人员的编号为：" + comperson.personNo, function () {
                            $('#btnSave').addClass("layui-btn-disabled").attr("disabled", true);
                            window.layClose();

                    }
                    if (comperson.checkState == 1 && comperson.transferState == 1) {
                        layer.alert("您输入的证件号码在系统中已存在，为已调出状态，请至人员调动管理模块进行调入", function () {

                        });

                } else {
                    if ($("#select_cert_type").val() == "9fcb08ce-ee86-4e4c-9611-9d430101cea4") {
                        initOtherInfoByCertId(certId);
                    }
                }

                        layer.alert("您输入的证件号码在系统中已存在<br/>" + "重复人员的编号为：" + comperson.personNo, function () {

                    }
                }
            }

                disabled("text_title_name");
                disabled("date_grant_date");

                //当时无职称的时候
                if ($("#hidden_title_id").val().toLowerCase() == "35208e7a-f827-498e-997d-9b2f0124b233") {
                    disabled("date_job_date");
                    disabled("checkbox_does_engage");
                }
                if (comPerson.photo !== "" && comPerson.photo != null && comPerson.photo != undefined) {
                    $("#div_show_photo").show();
                    $("#hidden_photo").val(comPerson.photo);
                }
                form.render();
            }
            else {
                //新增时，如果是单位角色，加载科室树。如果是科室角色，科室直接不可编辑
                if (curDeptId != null && curDeptId != "") {
                    $("#hidden_dept_id").val(curDeptId);
                    $("#deptSelect").val(localStorage.getItem('realname')).addClass("layui-disabled");
                } else {
                    window.initDeptTree();
                }
                window.initSpecTree();
            }
            form.render("select");

        });


    });

</script>

</html>
