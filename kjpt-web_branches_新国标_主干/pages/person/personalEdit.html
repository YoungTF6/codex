<script>

    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        xmSelect: 'xm-select',
        treeSelect: 'treeSelect',
        tool: 'tool'
    });

    layui.use(['form', 'jquery', 'layer', "laydate", 'xmSelect', 'treeSelect','tool'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var layer = layui.layer;
        var laydate = layui.laydate;
        var xmSelect = layui.xmSelect;
        var treeSelect = layui.treeSelect;
        var origiMobile = "";
        var fun_person_photo_required;
        var tool = layui.tool;
        var $ = layui.jquery;

        const IS_JILIN =  StandardKind.JILIN == getCmeStandardKindId();
        const IS_ZHEJIANG = StandardKind.ZHE_JIANG == getCmeStandardKindId();
        const IS_SHANXI =  StandardKind.SHAN_XI == getCmeStandardKindId();

        specialConfig();

        window.getUnitId = function () {
            return localStorage.getItem("unit-id");
        }
        function getCmeStandardKindId() {
            return localStorage.getItem("standardkind-id");
        }

        //获取配置的值
        window.getConfig = function (config_name) {
            var config_value = "";
            $.ajax({
                async: false,
                type: "post",
                url: huayi_sjwh_url + "cmeCommonConfig/getConfigByUnitFromRedis",
                data: { unitId: localStorage.getItem("unit-id"), configNames: config_name },
                success: function (res) {
                    if (res.success == true) {
                        window[config_name] = res.data[config_name];
                    } else {
                        layer.msg("获取配置出错");
                    }
                },
                error: function () {
                    layer.msg("获取配置出错");
                }
            });
        }



        /** 科室选择下拉列表初始化 */
        var deptTreeSelect;
        window.initDeptTree = function (deptId) {
            var unitId = window.getUnitId();
            deptTreeSelect = treeSelect.render({
                elem: '#deptSelect',
                data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + unitId,
                type: 'get',
                search: true,
                style: {
                    folder: {     // 父节点图标
                        enable: true   // 是否开启：true/false
                    },
                    line: {     // 连接线
                        enable: true   // 是否开启：true/false
                    }
                },
                click: function (data) {
                    $("#hidden_dept_id").val(data.current.id);
                },
                success: function () {
                    if (deptId != null && deptId != undefined && deptId != "") {
                        deptTreeSelect.checkNode('deptSelect', deptId);
                    }
                }
            });
        }

        //初始化人员状态下拉框
        window.initPersonState = function () {
            var cmeStandardKindId = getCmeStandardKindId();
            $.ajax({
                async: false,
                url: huayi_personorg_url + "comperson/getPersonStateListByCmeStandardKindId",
                type: "post",
                data: { cmeStandardKindId: cmeStandardKindId },
                success: function (result) {
                    if (result.success == true) {
                        var personStateList = result.data;
                        var personState = {};
                        for (var i = 0; i < personStateList.length; i++) {
                            personState = personStateList[i];
                            $("<option value=" + personState.person_state_id + ">" + personState.person_state_name + "</option>")
                                .appendTo($("#select_person_state_id"));
                        }
                        form.render();
                    }
                    else {
                        layer.msg("加载人员状态下拉框出现问题");
                    }
                }
            });
        }


        /* 专业树初始化 */
        var specTreeSelect;
        window.initSpecTree = function (spec) {
            specTreeSelect = treeSelect.render({
                elem: '#specSelect',
                data: huayi_sjwh_url + 'comPersonSpec/tree',
                type: 'get',
                search: true,
                style: {

                    }
                },
                click: function (data) {
                    $("#hidden_spec").val(data.current.id);
                },
                success: function () {
                    if (spec != null && spec != undefined && spec != "") {
                        specTreeSelect.checkNode('specSelect', spec);

                }
            });

        //初始化单个下拉框

                    if (result.success == true) {
                        var objList = result.data;

            //初始化民族行政职务
            window.initPerDic("select_administratorduty", 10, "初始化行政职务下拉框失败");

            //初始化院内职务
            window.initPerDic("select_hospital_duty", 6, "初始化院内职务下拉框失败");

        }

        window.initAll = function () {
            let now = new Date();
            let curYear = now.getFullYear();
            let month = now.getMonth() + 1;
            let day = now.getDate();
            laydate.render({
                elem: '#date_birthday'
                , trigger: 'click'
                , max: curYear + '-' + month + '-' + day
            });
            laydate.render({
                elem: '#date_grant_date'
                , trigger: 'click'
                , max: curYear + '-' + month + '-' + day
            });
            laydate.render({
                elem: '#date_job_date'
                , trigger: 'click',
                type: "year"
                , max: (curYear) + '-1-1'
            });

            window.initDics();

        }

        window.layClose = function () {
            var index = parent.layer.getFrameIndex(window.name); //先得到当前iframe层的索引
            parent.layer.close(index); //再执行关闭
        }

        window.getChildTitle = function (titleId, titleName, type_id, list_order) {
            $("#hidden_title_id").val(titleId);
            $("#text_title_name").val(titleName);
        }

        window.initComperson = function (comperson) {
            if (getQueryString("operate") == "add") {
                comperson.certId = $("#text_cert_id").val();
            }
            comperson.sex = $.trim(comperson.sex);
            form.val("cmeDetail", comperson);

            $("#hidden_dept_id").val(comperson.deptId);
            $("#deptSelect").val(comperson.deptName);
            $("#hidden_spec").val(comperson.spec);
            $("#specSelect").val(comperson.personSpecName);

            if (comperson.jobDate == null) {
                $("#checkbox_does_engage").prop("checked", true);
                $("#date_job_date").val("").addClass("layui-disabled").attr("disabled", "disabled");
            }
            form.render();
        }


        $("#text_title_name").focus(function () {
            layer.open({
                type: 2,
                content: "../controls/selectTitle/selectTitle.html",
                area: ['610px', '380px'],
                scrollbar: false
            });
        });


        form.on('checkbox(checkbox_does_engage)', function (data) {
            var checked = data.elem.checked;
            if (checked == true) {

                $("#date_job_date").val("").addClass("layui-disabled").attr("disabled", "disabled");
            }
            else {
                $("#date_job_date").removeAttr("disabled").removeClass("layui-disabled");
            }
        });

        window.checkInput = function () {
            if (checkCertInfo() == false) {
                return false;
            }
            if ($("#hidden_title_id").val() == "") {
                layer.msg('请选择职称', { icon: 5 });
                return false;
            }
            if ($("#hidden_dept_id").val() == "") {
                layer.msg('请选择科室', { icon: 5 });
                return false;
            }
            // if ($("#checkbox_does_engage").prop("checked") == false) {
            //     if ($("#date_job_date").val() == "") {
            //         layer.msg('请选择职称聘任年度', { icon: 5 });
            //         return false;
            //     }
            // }
            // if ($("#hidden_spec").val() == "") {
            //     layer.msg('请选择专业', { icon: 5 });
            //     return false;
            // }
            if (checkMobile($("#text_mobile").val()) == false) {
                layer.msg('请输入正确的手机号', { icon: 5 });
                return false;
            }
            if ($("#text_mobile").val() != origiMobile) {
                if (checkMobileExists($("#text_mobile").val())) {
                    layer.msg('系统中已存在您输入的手机号,请更换', { icon: 5 });
                    return false;
                }
            }


            return true;
        }

        function checkCertInfo() {
            let certType = $("#select_cert_type").val();
            let certId = $("#text_cert_id").val();

            if (certType == "9fcb08ce-ee86-4e4c-9611-9d430101cea4") {
                if (isCertId(certId) == false) {
                    layer.msg('请输入正确的身份证号', { icon: 5 });
                    return false;
                }
            }
            if (certType == "3444541a-9703-44ed-aae6-9d8b01574916") {
                if (isGATCertId(certId) == false) {
                    layer.msg('请输入正确的港澳台居民居住证', { icon: 5 });
                    return false;
                }
            }
        }




        window.getPerComPerson = function (kind, value) {
            //首先判断已存在，如果存在，那么查询注册审核状态，如果注册审核状态为通过，查询调动状态
            var comperson = null;
            var data = null;
            if (kind == "certId") {
                data = { certId: value };
            }
            if (kind == "comPersonId") {
                data = { comPersonId: value };
            }
            if (kind == "personNo") {
                data = { personNo: value };
            }

            $.ajax({
                async: false,
                url: huayi_personorg_url + "comperson/getOne",
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                data: data,
                success: function (result) {
                    if (result.success == true) {
                        comperson = result.data;
                        let unitName = comperson.unitName;
                        if (unitName != "") {
                            $("#unitName1").text("【" + unitName + "】");
                        }

                    } else {
                        layer.msg(result.msg);
                    }
                },
                error: function () {
                    layer.msg("请求出现问题");
                }
            });
            return comperson;
        }

        //该控制字段 is_update 只用于 看似是添加，实则是更新的场景(当单位添加的身份证号是人员注册但是未审核通过的场景)
        var is_update = 0;
        form.on('submit(btnSave)', function (data) {
            if (checkInput() == true) {
                var hasCertIdExists;
                var certIdPersonNameMatches;

                //编辑
                if ((getQueryString("operate") == "edit")) {
                    var personObj = data.field;
                    personObj.photo = personObj.photo.replace(/"/g, "");
                    personObj.userId = localStorage.getItem('user-id');
                    //source 是什么意思 ？？？？
                    personObj.source = 1;
                    personObj.operateUser = localStorage.getItem("user-name");
                    personObj.operateUnit = localStorage.getItem("unit-id");
                    $.ajax({
                        async: false,
                        url: huayi_personorg_url + "comperson/update",
                        headers: {
                            'Authorization': localStorage.getItem('token'),
                            'KJPT-USER-ID': localStorage.getItem('user-id')
                        },
                        type: "post",
                        data: JSON.stringify(personObj),
                        contentType: "application/json",
                        dataType: "json",
                        success: function (result) {
                            debugger
                            if (result.success == true) {
                                location.href = "personalInfo.html";
                            }
                            else {
                                layer.msg("编辑人员失败,失败原因:" + result.msg);
                            }
                        },
                        error: function () {
                            layer.msg("发送请求失败");
                        }
                    });
                }


            }
        });


        /*
             check_state 审核状态0:默认值未审核 1：审核通过  4 驳回  注：单位只能查询或统计未审核和审核通过的记录
             单位添加人员时，填写身份证号码，此时判断该身份证有三种情况：
             1、身份证号不符合填写规则，提示“请正确填写您的证件号码”。
             2、证件号在人员库已存在，且已有单位接收时提示“您输入的证件号码在XXXX单位中已存在，请勿重复添加”。
             3、当证件号在人员库已存在，且为调出状态时，提示：“您输入的证件号码在系统中已存在，为已调出状态，请至人员调动管理模块进行调入”。
             4、当证件号已注册，但接收单位未接收或驳回状态时，提示“该证件号码个人已注册，但接收单位未审核或已驳回，是否获取该人注册信息直接添加？”，
                点击是，添加页面所有信息直接读取个人注册的信息。
        */
        $("#text_cert_id").blur(function () {
            if (getQueryString("operate") == "add") {

                var certId = $("#text_cert_id").val();
                if ($.trim(certId) == "") {
                    layer.msg('请输入证件号码', { icon: 5 });
                    return false;
                }
                if (checkCertInfo() == false) return false;

                var comperson = window.getPerComPerson("certId", certId);
                if (comperson != null) {
                    if (comperson.checkState == 0) {
                        layer.alert("该证件号码个人已注册，但接收单位未审核或已驳回，是否获取该人注册信息直接添加？", function (index) {
                            layer.close(index);
                            window.initComperson(comperson);
                            treeSelect.destroy('deptSelect');
                            window.initDeptTree(comperson.deptId);
                            treeSelect.destroy('specSelect');
                            window.initSpecTree(comperson.spec);
                            is_update = 1;
                        });
                    }
                    if (comperson.checkState == 1 && comperson.transferState != 1) {
                        layer.alert("您输入的证件号码在" + comperson.unitName + "单位中已存在，请勿重复添加", function () {
                            $('#btnSave').addClass("layui-btn-disabled").attr("disabled", true);
                            window.layClose();
                        });


                    }
                    if (comperson.checkState == 1 && comperson.transferState == 1) {
                        layer.alert("您输入的证件号码在系统中已存在，为已调出状态，请至人员调动管理模块进行调入", function () {
                            $('#btnSave').addClass("layui-btn-disabled").attr("disabled", true);
                            window.layClose();
                        });
                    }
                } else {

                    if ($("#select_cert_type").val() == "9fcb08ce-ee86-4e4c-9611-9d430101cea4") {
                        if (certId.length == 18) {
                            var birthday = certId.substring(6, 14);
                            var gender = certId.substring(16, 17);
                            var year = birthday.substring(0, 4);
                            var month = birthday.substring(4, 6);
                            var day = birthday.substring(6, 8);
                            $("#date_birthday").val(year + "-" + month + "-" + day);
                            var gender_value = (gender % 2 == 0) ? "女" : "男";
                            $("#select_sex").val(gender_value);
                            form.val("cmeDetail", { sex: gender_value });

                        }
                    }
                }
            }
        });

        //上传图片
        $("#btnImgUpload").click(function () {
            var unitId = window.getUnitId();
            var personNo = $("#hidden_person_no").val();
            layer.open({
                title: "上传头像",
                type: 2,
                area: ['800px', '550px'],
                fixed: false, //不固定
                maxmin: true,
                content: 'cropHtml/cropPhoto.html?unitId=' + unitId + '&personNo=' + personNo + "&cmeStandardKindId=" + getCmeStandardKindId(),
                closeBtn: 1
            });
        });

        //得到图片地址
        window.getPhotoUrl = function (photoUrl, winName) {
            layer.msg("上传成功");
            console.log(photoUrl.replace(/"/g, ''));
            $("#div_show_photo").show();
            $("#hidden_photo").val(photoUrl);

            var index = layer.getFrameIndex(winName);
            layer.close(index);
        }
        //查看图片
        $("#div_show_photo").click(function () {
            let photoUrl = $("#hidden_photo").val().replace(/"/g, '');
            photoUrl = tool.getComAliyunUrl(photoUrl);
            $("#show_img").attr("src", photoUrl);

            layer.open({
                type: 1,
                shade: false,
                title: false,
                content: $('#layer_notice')
            });
        });
        //添加人员成功后，修改图片名臣
        window.changePhotoName = function (photoUrl, personNo) {
            if (personNo === "") {
                return;
            }
            //photoPath newName
            var photoUrl = photoUrl.replace(/"/g, "");
            var start = photoUrl.indexOf("/photo");
            var end = photoUrl.length;
            var photoPath = photoUrl.substring(start + 1, end);

            $.ajax({
                async: false,
                type: "post",
                url: huayi_personorg_url + "uploadApi/ChangeImageName",
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                data: { photoPath: photoUrl, newName: personNo },
                success: function (result) {
                    if (result.success == true) {
                        let newPath = result.data;
                        $.ajax({
                            headers: {
                                'Authorization': localStorage.getItem('token'),
                                'KJPT-USER-ID': localStorage.getItem('user-id')
                            },
                            url: huayi_personorg_url + "comperson/updatePhoto",
                            data: { personNo: personNo },
                            type: "post",
                            success: function (result1) {
                                if (result1.success == true) {

                                } else {
                                    layer.msg(result1.msg);
                                }
                            }

                        });


                    } else {
                        layer.msg("图片名称修改失败:" + result.msg);
                    }
                },
                error: function () {
                    layer.msg("请求报错");
                }
            });
        }

        // 判断手机号是否已经存在
        window.checkMobileExists = function (mobile) {
            mobile = encodeAesString(mobile).toString();
            var check = false;
            $.ajax({
                async: false,
                type: "get",
                url: huayi_personorg_url + "comperson/doesMobileExists",
                data: { "mobile": mobile },
                success: function (result) {
                    if (result.success == true) {
                        check = result.data > 0 ? true : false;
                    }
                },
                error: function () {
                    layer.msg("请求报错");
                }
            });
            return check;
        }


        window.inputMobileBlur = function () {
            if (getQueryString("operate") == "edit") {
                let inputMobile = $("#text_mobile").val();
                if (inputMobile != origiMobile) {
                    if (checkMobileExists(inputMobile)) {
                        layer.msg("系统中已存在您输入的手机号,请更换");
                    }
                }
            }


        }

        function specialConfig() {
            if (IS_SHANXI) {
                $(".shanxi_hide").hide();
            } else {
                $(".shanxi_hide").show();
            }

            if(IS_ZHEJIANG) {
                $(".zhejiang_show").show();
                $(".zhejiang_hide").hide();
                $(".zhejiang_hide").find("input,select").removeAttr("lay-verify");
            } else {
                $(".zhejiang_show").hide();
                $(".zhejiang_hide").show();
                $(".zhejiang_show").find("input,select").removeAttr("lay-verify");
            }
        }


        $(function () {
            window.initAll();
            getConfig("fun_person_photo_required");
            if (window["fun_person_photo_required"] == "1") {
                $("#photo_required_span").show();
            } else {
                $("#photo_required_span").hide();
            }
            let standardkindId = getCmeStandardKindId().toLowerCase();


            if (getQueryString("operate") == "edit") {
                var comPersonId = getQueryString("comPersonId");
                var comPerson = getPerComPerson("comPersonId", comPersonId);
                origiMobile = comPerson.mobile;
                window.initComperson(comPerson);
                //window.initDeptTree(comPerson.deptId);

                $("#select_cert_type").addClass("layui-disabled").attr("disabled", "disabled");
                $("#text_cert_id").addClass("layui-disabled").attr("disabled", "disabled");
                $("#text_person_name").addClass("layui-disabled").attr("disabled", "disabled");
                $("#select_sex").addClass("layui-disabled").attr("disabled", "disabled");
                $("#date_birthday").addClass("layui-disabled").attr("disabled", "disabled");
                $("#select_is_intheseries").addClass("layui-disabled").attr("disabled", "disabled");
                if (standardkindId !== StandardKind.HE_NAN) $("#specSelect").addClass("layui-disabled").attr("disabled", "disabled");
                else window.initSpecTree(comPerson.spec);
                $("#select_person_state_id").addClass("layui-disabled").attr("disabled", "disabled");
                $("#text_title_name").addClass("layui-disabled").attr("disabled", "disabled");
                $("#date_grant_date").addClass("layui-disabled").attr("disabled", "disabled");
                // $("#date_job_date").addClass("layui-disabled").attr("disabled", "disabled");
                // $("#checkbox_does_engage").addClass("layui-disabled").attr("disabled", "disabled");
                //根据配置，单位角色判断是否可以修改证件信息
                getConfig("fun_unit_modify_cert_info");
                if (window["fun_unit_modify_cert_info"] == "0") {
                    $("#text_mobile").addClass("layui-disabled").attr("disabled", "disabled");
                }
                   //根据配置，单位角色判断是否可以修改证件信息
                getConfig("fun_modify_dept_when_checked_person_edit");
                if (window["fun_modify_dept_when_checked_person_edit"] == "1") {
                     treeSelect.destroy('deptSelect');
                     window.initDeptTree(comPerson.deptId);
                } else {
                    $("#deptSelect").addClass("layui-disabled").attr("disabled", "disabled");
                }



                if (comPerson.photo !== "" && comPerson.photo != null && comPerson.photo != undefined) {
                    $("#div_show_photo").show();
                    $("#show_img").attr("src", comPerson.photo).show();
                    $("#hidden_photo").val(comPerson.photo);
                }
                form.render();
            }
        });


    });
</script>
