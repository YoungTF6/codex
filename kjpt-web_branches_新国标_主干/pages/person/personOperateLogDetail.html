<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>人员信息变更日志详情</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="../../css/communal.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!-- 请求路径配置 -->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!-- ajax全局配置 -->
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="../../js/axios.min.js"></script>
    <script type="text/javascript" src="../../js/auth.js"></script>
    <!-- 工具 -->
    <script type="text/javascript" src="../../js/tools/urlTools.js"></script>
    <script type="text/javascript" src="../../js/base64.js"></script>

    <style>
        #userInfo {
            font-weight: bold; 
            position: relative; 
            top: 2px; 
            left: 50px;
        }
    </style>
</head>
<body>
    <div class="layui-fluid">
        <div class="layui-card">

            <!-- 表格区域 -->
            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="comPersonOperateLog" lay-filter="comPersonOperateLog" style="margin: 0px 0px;"></table>
            </div>

        </div>
    </div>


    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="back">返回</a>
        <span id="userInfo"></span>
    </script>
    <script>
        


        /* 全局配置及引入相关的模块 */
        layui.use([ 'table', 'form' ], () => {
            let { table, form, layer } = layui;


            /* 表格相关操作 */
            // 表格配置
            window.loaderTable = () => {
                table.render({
                    elem            : '#comPersonOperateLog',
                    url             : huayi_personorg_url + 'comPersonOperateLog/list',
                    headers         : {
                        'Authorization' : localStorage.getItem('token'),
                        'KJPT-USER-ID'  : localStorage.getItem('user-id')
                    },
                    title           : '用户表',
                    defaultToolbar  : [],
                    toolbar         : '#bar',
                    where           : {
                        comPersonId : Base64.decode(getQueryString('pid')),
                        type        : Base64.decode(getQueryString('type') || '')
                    },
                    cols            : [ [
                        { field: 'addTime', title: '操作时间', align: 'center', width: 170, sort: true },
                        { field: 'operateUser', title: '操作账号', align: 'center', width: 200, sort: true },
                        { field: 'operateRealname', title: '操作账号名称', align: 'center', minWidth: 200, sort: true },
                        { field: 'ip', title: 'IP地址', align: 'center', width: 150, sort: true },
                        { field: 'showinfo', title: '操作内容', minWidth: 200 }
                    ] ],
                    cellMinWidth    : 100,
                    id              : 'comPersonOperateLog',
                    height          : 'full-55',
                    page            : true,
                    limit           : 10,
                    limits          : [ 10, 50, 100, 150, 200 ],
                    parseData       : res => {
                        return {
                            'code'  : res.status === 200 ? 0 : res.status, // 解析接口状态
                            'msg'   : res.message, // 解析提示文本
                            'count' : res.data.recordsTotal, // 解析数据长度
                            'data'  : res.data.records, // 解析数据列表
                            'page'  : res.data.pageNum, // 当前页
                            'limit' : res.data.pageSize, // 每页条数
                        }
                    },
                    request         : {
                        pageName    : 'pageNum',    // 页码的参数名称，默认：page
                        limitName   : 'pageSize'    // 每页数据量的参数名，默认：limit
                    },
                    done            : (res, curr, count) => $('#userInfo').html(Base64.decode(getQueryString('info')))
                });
            };

            // 初始化表格
            loaderTable();

            // 监听头部新增按钮
            table.on('toolbar(comPersonOperateLog)', obj => {
                let datas = obj.data;

                if (obj.event === 'back') parent.layer.closeAll();
                
            });

            // 监听行内按钮
            table.on('tool(comPersonOperateLog)', obj => {
                let datas = obj.data,
                    event = obj.event;

            });

        });
    </script>
</body>
</html>
