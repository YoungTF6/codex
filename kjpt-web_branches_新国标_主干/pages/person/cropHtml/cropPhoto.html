<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="JavaScript image cropper.">
    <meta name="author" content="Chen Fengyuan">
    <title>Cropper.js</title>
    <!-- <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.13.0/css/all.css" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" href="css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="css/cropper.css">
    <link rel="stylesheet" href="css/main.css">
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <style type="text/css">
        .fa-exam-alt:before {
            content: "\f007";
        }
    </style>

</head>

<body>
    <!-- Content -->
    <div class="container" style="margin-top: 20px;">
        <div class="row">
            <div style="flex: 0 0 99%; max-width: 99%;">
                <!-- <h3>Demo:</h3> -->
                <div class="docs-demo">
                    <div class="img-container" style="height: 400px;">
                        <!-- <img alt="" src="images/info.jpg"> -->
                        <img alt="" id="infoImg">
                    </div>
                </div>
            </div>
            <!-- <div class="col-md-3"> -->
            <!-- <h3>Preview:</h3> -->
            <!-- <div class="docs-preview clearfix">
                    <div class="img-preview preview-lg">
                    </div>
                </div> -->
            <!-- </div> -->
        </div>
        <div class="row" id="actions">
            <div id="docs-buttons" style="flex: 0 0 99%; max-width: 99%;">

                <div class="btn-group">
                    <button type="button" class="btn btn-primary" onclick="showExam()" title="exam">
                        <span class="docs-tooltip" data-toggle="tooltip" title="查看上传照片范例">
                            <span class="fa fa-exam-alt" style="padding-left: 5px;">范例
                            </span></span>
                    </button>

                    <button type="button" class="btn btn-primary" data-method="reset" title="Reset">
                        <span class="docs-tooltip" data-toggle="tooltip" title="重新选择裁剪区域">
                            <span class="fa fa-sync-alt">重选
                            </span> </span>
                    </button>

                    <label class="btn btn-primary btn-upload" for="inputImage" title="Upload image file">
                        <input type="file" class="sr-only" id="inputImage" name="file" accept="image/*">
                        <span class="docs-tooltip" data-toggle="tooltip" title="上传待裁剪的图片">
                            <span class="fa fa-upload">选择</span></span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-primary" data-method="zoom" data-option="0.1" title="Zoom In">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片放大"><span
                                class="fa fa-search-plus"></span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="zoom" data-option="-0.1"
                        title="Zoom Out">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片缩小"><span
                                class="fa fa-search-minus"></span></span>
                    </button>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-primary" data-method="move" data-option="-10"
                        data-second-option="0" title="Move Left">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片向左"><span
                                class="fa fa-arrow-left"></span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="move" data-option="10"
                        data-second-option="0" title="Move Right">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片向右"><span
                                class="fa fa-arrow-right"></span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="move" data-option="0"
                        data-second-option="-10" title="Move Up">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片向上"><span
                                class="fa fa-arrow-up"></span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="move" data-option="0"
                        data-second-option="10" title="Move Down">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片向下"><span
                                class="fa fa-arrow-down"></span></span>
                    </button>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-primary" data-method="rotate" data-option="-45"
                        title="Rotate Left">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片左旋"><span
                                class="fa fa-undo-alt"></span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="rotate" data-option="45"
                        title="Rotate Right">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片右旋"><span
                                class="fa fa-redo-alt"></span></span>
                    </button>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-primary" data-method="scaleX" data-option="-1"
                        title="Flip Horizontal">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片水平翻转"><span
                                class="fa fa-arrows-alt-h"></span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="scaleY" data-option="-1"
                        title="Flip Vertical">
                        <span class="docs-tooltip" data-toggle="tooltip" title="图片垂直翻转"><span
                                class="fa fa-arrows-alt-v"></span></span>
                    </button>
                </div>
                <div class="btn-group" style="display: none;">
                    <button type="button" class="btn btn-primary" data-method="crop" title="Crop">
                        <span class="docs-tooltip" data-toggle="tooltip" title=""
                            data-original-title="cropper.crop()"><span class="fa fa-check">
                            </span></span>
                    </button>
                    <button type="button" class="btn btn-primary" data-method="clear" title="Clear">
                        <span class="docs-tooltip" data-toggle="tooltip" title=""
                            data-original-title="cropper.clear()"><span class="fa fa-times">
                            </span></span>
                    </button>
                </div>

                <div class="btn-group btn-group-crop">
                    <button type="button" class="btn btn-success" data-method="getCroppedCanvas"
                        data-option="{ &quot;maxWidth&quot;: 4096, &quot;maxHeight&quot;: 4096 }">
                        <span class="docs-tooltip" data-toggle="tooltip" title="裁剪并展示">
                            完成</span>
                    </button>

                </div>
                <!-- Show the cropped image in modal -->
                <div class="modal fade docs-cropped" id="getCroppedCanvasModal" role="dialog" aria-hidden="true"
                    aria-labelledby="getCroppedCanvasTitle" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="getCroppedCanvasTitle">
                                    展示</h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                            <div class="modal-body" id="div_canvas_crop">
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal" id="btn_close">
                                    关闭</button>
                                <a class="btn btn-primary" id="download" href="javascript:void(0);"
                                    download="cropped.jpg">
                                    确定</a>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- /.modal -->
            </div>
            <!-- /.docs-buttons -->
        </div>
    </div>

    <div id="layer_notice" style="display: none;">
        <img id="show_img" src="images/exam.png" height="400px" />
    </div>

    <!-- Scripts -->
    <script src="js/jquery.slim.min.js" crossorigin="anonymous"></script>
    <script src="js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/cropper.js"></script>
    <script src="js/main.js"></script>
    <script src="/js/layer/layer.js"></script>


</body>

</html>
<script>

    (function ($) {
        $.getUrlParam = function (name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return unescape(r[2]); return null;
        }

        $("#infoImg").attr("src", "images/info.jpg");
    })(jQuery);

    $("#download").click(function () {
        var dataUrl = $(div_canvas_crop).find("canvas")[0].toDataURL();
        var file = dataUrlTofile(dataUrl);
        var unitId = $.getUrlParam("unitId");
        var cmeStandardKindId = $.getUrlParam("cmeStandardKindId");

        var xhr;
        if (window.XMLHttpRequest) {
            xhr = new XMLHttpRequest();
        } else {
            xhr = new ActiveXObject('Microsoft.XMLHTTP');
        }

        var formData = new FormData();
        formData.append("file", file);
        formData.append("fileType", "IMAGE");
        formData.append("outputQuality", 0.6);
        formData.append("path", "/photo/" + cmeStandardKindId + "/" + unitId);
        formData.append("scale", 0.6);

        var url = huayi_upload_url + "uploadApi/upload";
        xhr.open("POST", url, true);
        xhr.onload = uploadComplete;
        xhr.onerror = uploadFailed;
        xhr.send(formData);
    });

    //base64转file
    window.dataUrlTofile = function (dataUrl) {
        var arr = dataUrl.split(','),
            mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]),
            n = bstr.length,
            u8arr = new Uint8Array(n);
        while (n--) {
            u8arr[n] = bstr.charCodeAt(n);
        }
        var file = new File([u8arr], "myPhoto.jpg", { type: mime });
        file.lastModifiedDate = new Date();
        return file;
    }

    //图片上传完毕
    window.uploadComplete = function (event) {
        let xhr = event.target;
        let result = JSON.parse(xhr.responseText);
        console.log("result.data.picUrl:" + result.data.picUrl);
        if (result.code == 200) {
            parent.getPhotoUrl(result.data.picUrl, window.name);
        }

    }

    window.uploadFailed = function () {
        layer.msg("人员头像上传失败！");
    }

    window.showExam = function () {
        layer.open({
            type: 1,
            shade: false,
            title: false,
            content: $('#layer_notice'),
            offset: '22px'
        });
    }




</script>
