<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>录入个人学分-非向导录入</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="/js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="/js/layui-v2.6.8/layui/layui.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/api/number.js"></script>

    <!-- 个人学分录入样式  -->
    <link rel="stylesheet" href="../score\cme_singleproj_score\grant_score_singleproj.css" media="all">

</head>

<body>
    <div class="layui-bg-gray" style="padding: 30px;">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header myBoder">
                        <h3 style="font-weight: bold;">特定考核人员设定</h3>
                    </div>
                    <div class="layui-card-body myBoder">

                        <form class="layui-form" id="form-applyBeforeHold" lay-filter="add-filter">
                            <div class="score-model">
                                <span class="title">基本信息设定</span>
                                    <div class="layui-form-item-box">
                                        <div class="layui-form-item">
                                            <label class="layui-form-label"  style="width: 95px;">
                                                <font color="red">*&nbsp;</font>达标生效年度</label>
                                            <div class="layui-input-block" style="margin-left: 130px;">
                                                <select name="cmeYear" id="year" lay-verify="required" lay-filter="year"
                                                    lay-verify="1">
                                                    <option value="">请选择</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="layui-form-item">
                                            <label class="layui-form-label"><font color="red">*&nbsp;</font>需要学习的专项课程</label>
                                            <div class="layui-input-block">
                                                <select name="specId" id="scoreName" lay-verify="required">
                                                    <option value="">请选择</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                            </div>

                            <div id="add-score-people">
                                <!--筛选授分人员-->
                                <div class="score-model">
                                    <span class="title">选择设定人员</span>
                                    <div class="layui-form">
                                        <div class="layui-form-item layui-form-item2" style="width: 270px;">
                                            <label class="layui-form-label">身份证号:</label>
                                            <div class="layui-input-block">
                                                <input type="text" id="certId" placeholder="请输入身份证号" autocomplete="off"
                                                    class="layui-input">
                                            </div>
                                        </div>
                                        <div class="layui-form-item layui-form-item2" style="width: 220px;">
                                            <label class="layui-form-label">人员姓名:</label>
                                            <div class="layui-input-block">
                                                <input type="text" id="personName" placeholder="请输入人员姓名"
                                                    autocomplete="off" class="layui-input">
                                            </div>
                                        </div>
                                        <div class="layui-form-item layui-form-item2" style="width: 220px;">
                                            <label class="layui-form-label">职称:</label>
                                            <div class="layui-input-block">
                                                <input type="text" autocomplete="off" class="layui-input" lay-filter="text_title_names" id="text_title_names" placeholder="请选择">
                                                <input type="hidden" autocomplete="off" class="layui-input" lay-filter="hidden_title_ids " id="hidden_title_ids">
                                            </div>
                                            <!-- <div class="layui-input-block">
                                                <input type="text" id="titleName" placeholder="请输入职称"
                                                    autocomplete="off" class="layui-input">
                                            </div> -->
                                        </div>
                                        <div class="layui-form-item layui-form-item2" style="margin-left: 10px;">
                                            <button class="layui-btn" lay-filter="search" id="search">查询</button>
                                        </div>

                                    </div>
                                    <div class="layui-form-item">
                                        <button class="layui-btn" lay-submit lay-filter="submit">保存</button>
                                        <a class="layui-btn js-back">关闭</a>
                                    </div>
                                    <!-- 选择筛选人员 -->
                                    <div class="people-box">
                                        <div class="dept-box" style="height: 500px;">
                                            <div>
                                                <div>选择科室</div>
                                                <div id="deptTree"></div>
                                            </div>
                                        </div>
                                        <div id="peopleFransfer"></div>
                                    </div>
                                </div>

                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
<!--活动信息-->
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        eleTree: 'eleTree',
        tool:'tool'
    });
    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'transfer', 'eleTree','tool'], function () {
        var $ = layui.jquery, table = layui.table, tool=layui.tool
            , form = layui.form, laydate = layui.laydate
            , transfer = layui.transfer
            , eleTree = layui.eleTree, layer = layui.layer
            ;

        var el = null, deptId = null;
        var unitId = localStorage.getItem("unit-id");
        var userId = localStorage.getItem("user-id");
        var cmeStandardKindId = localStorage.getItem("standardkind-id");

        var personValue = [];
        let globalPersonData = {};//人员科室数据

        
        // 年度下拉框初始化
        var initYears = function () {
            $.ajax({
                async: false,
                url: huayi_personorg_url + 'cmeSpecPersonpassConfig/selectCmeYear',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                dataType: "json",
                success: function (result) {
                    if (result.success == true) {
                        var dataList = result.data;
                        $("#year").html("");
                        for (var i = 0; i < dataList.length; i++) {
                            var $option = $("<option value='" + dataList[i].cmeYear + "'>" + dataList[i].cmeYear + "</option>");
                            $("#year").append($option);
                        }
                        form.render('select');
                        initscoreName();
                    }
                    else {
                        layer.msg(result.msg);
                    }
                }
            });
        }

        form.on("select(year)", function (data) {
            initscoreName();
        });

         // 课程下拉框初始化
         var initscoreName = function () {
            $.ajax({
                async: false,
                url: huayi_personorg_url + 'cmeSpecPersonpassConfig/getListByYear',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                data: {
                    cmeYear: $('#year').val(),
                    cmeStandardKindId: cmeStandardKindId
                },
                dataType: "json",
                success: function (result) {
                    if (result.success == true) {
                        var dataList = result.data;
                        $("#scoreName").html("");
                        for (var i = 0; i < dataList.length; i++) {
                            var $option = $("<option value='" + dataList[i].specId +  "'>" + dataList[i].scoreName + "</option>");
                            $("#scoreName").append($option);
                        }
                        form.render('select');
                    }
                    else {
                        layer.msg(result.msg);
                    }
                }
            });
        }
        initYears();
        //穿梭框
        let transferInit = function (personData) {
            //渲染
            transfer.render({
                elem: '#peopleFransfer',  //绑定元素
                title: ['候选人员', '已选人员'],
                width: '40%',
                height: 500,
                data: personData,
                value: personData,
                id: 'demo1', //定义索引
                showSearch: true,
                parseData: function (res) {
                    return {
                        "value": res.id //数据值
                        , "title": res.nameAndId //数据标题
                        , "disabled": res.disabled  //是否禁用
                        , "checked": res.checked //是否选中
                    }
                },
                onchange: function(data,index) {
                    let changeNum = data.length;
                    let tempElem = document.getElementById("peopleFransfer");
                    tool.transferChangeTitle(tempElem,index,changeNum,transfer);
                    tool.transferAllTipBind(tempElem,globalPersonData);
                }
            });
        }

        // 查询按钮
        $("#search").click(function () {
            var certId = $("#certId").val();
            var personName = $("#personName").val();
            // var titleName = $("#titleName").val();
            var hidden_title_ids = $("#hidden_title_ids").val();
            if(certId == "" && personName == "" && hidden_title_ids == ""){
                layer.msg("请输入查询条件");
                return false;
            }
            var data = {
                certId: certId,
                personName: personName,
                titleIds: hidden_title_ids
            }
            console.log(data)
            searchForData(data)
            return false;
        });
        // 发送请求到后台，请求人员列表。
        window.searchForData = function (searchData) {
            if(searchData == null) searchData = {};
            if(tool.isEmpty(unitId)){
                layer.msg("请登录账号");
                return;
            }
            if(tool.isEmpty(deptId) || deptId == unitId){
                searchData.unitId = unitId;
            } else{
                searchData.deptId = deptId;
            }
            
            searchData.specId = $("#scoreName").val();

            // 获得右侧数据
            var personDatas = transfer.getData('demo1');
            if (personDatas.length > 0) {
                for (let tempPerson of personDatas) {
                    personValue.push(tempPerson.value);
                }
            }
            $.ajax({
                type: 'get',
                url: huayi_personorg_url + 'comperson/selectComPersonForConfig',
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                data: searchData,
                success: function (res) {
                    if (res.status === 200) {
                        for(let tempPo of res.data) {
                            globalPersonData[tempPo.id] = tempPo.deptName;
                        }
                        createTransferData(res.data,personDatas);
                    }else{
                        layer.msg(res.msg)
                    }
                }
            })
        }

        //构建穿梭框的数据，data是新数据，chooseData是之前已经选的数据
        let createTransferData = function(data,chooseData){
            if(data.length == 0) layer.msg("无人员数据");
            let rightArr = [];
            //需要去除data里chooseData里面已经存在的
            aa:
            for(let chooseObj of chooseData){
                rightArr.push(chooseObj.value);
                for (let dataObj of data) {
                    if(dataObj.id == chooseObj.value) continue aa;
                }
                let tempData = {id:chooseObj.value,nameAndId:chooseObj.title};
                data.push(tempData);
            }
            let leftNum = data.length-rightArr.length;
            transfer.reload('demo1', {
                data: data, value: rightArr,
                title: [`候选人员(${leftNum})`, `已选人员(${rightArr.length})`],
            });
            //绑定监听
            tool.transferAllTipBind(document.getElementById("peopleFransfer"),globalPersonData);
        }  

        el = eleTree({
            el: '#deptTree',
            data: [],
            // url: huayi_personorg_url + 'comdept/tree/unit',
            // where: { unitId: '190021' },
            // showCheckbox: true, // 复选
            highlightCurrent: true, // 选中高亮
            accordion: true, // 是否每次只打开一个同级树节点展开
            response: {
                statusName: 'status',
                statusCode: 200,
                dataName: 'data'
            },
            request: {          // 对于后台数据重新定义名字
                name: "deptName",
                key: "deptId",
                children: "children",
                pid: "parentId",
            },
        });
        el.on("click", function (data) {
            if(this.srcElement.classList.contains("eleTree-dropdown")){
                return;
            }
            deptId = data.data.deptId;
            searchForData();
        })
        // 获取科室信息
        let getDeptTree = function (deptData) {
            $.ajax({
                type: 'get',
                url: huayi_personorg_url + 'comdept/tree/unit',
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                data: { unitId: unitId },
                success: function (res) {
                    let tempObj = {
                        deptId: unitId,id: unitId,unitId: unitId,
                        deptName: "全部",name: "全部",shortName: "全部",
                        listOrder: 0,order: 100,parentId: "",pid: "",
                        children:res,
                    }
                    let data = [];
                    if(res!=null && res.length > 0){
                        data.push(tempObj);
                    }
                    el.append(data)
                }
            })
        }

        //科室树形结构
        let createTree = function (deptData) {
            tree.render({
                elem: '#deptTree',
                data: deptData,
                click: function (obj) {
                    transferInit(personData);
                }
            });
        }

           //公共ajax
        let commonAjax = function(type="get",url,data,failFun,successFun){
            $.ajax({
                type    :   type,
                url     :   url,
                data    :   data,
                success :   function (res) {
                    successFun(res);
                },
                error    :   function(res){
                    failFun();
                }
            });
        }

        // 职称选择
        $("#text_title_names").click(function () {
            var titleIds = $("#hidden_title_ids").val();
            console.log(titleIds);
            layer.open({
                type: 2,
                content: "../controls/selectTitle/selectTitles.html?titleIds=" + titleIds,
                area: ['700px', '480px'],
                scrollbar: false
            });
        });

        // 职称选择
        window.getChildTitles = (hidden_title_ids, titleNames) => {
            $("#text_title_names").val(titleNames);
            $("#hidden_title_ids").val(hidden_title_ids);
        }
            
        // 保存提交
        form.on('submit(submit)', function (data) {
            debugger
            var personDatas = transfer.getData('demo1');
            if (personDatas.length <= 0) {
                layer.msg("请选择人员",{icon:5});
                return false;
            }
            let personIds = [];
            for (var j = 0; j < personDatas.length; j++) {
                personIds.push(personDatas[j].value);
            }
       
            data.field.comPersonIds = personIds;
            data.field.addUnitid = userId;
            $.ajax({
                type: 'post',
                url: huayi_personorg_url + 'cmeSpecPersonpass/save',
                data: JSON.stringify(data.field),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if (res.status === 200) {
                        transfer.reload('demo1', { data: [],value: []});
                        layer.msg("保存成功");
                    } else {
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    console.log("发送请求失败");
                }
            })
            return false;
        });
        //页面初始化
        let htmlInit = function () {
            //初始化科室树，如果科室都相同就可以在此处加载
            getDeptTree();
            transferInit(personValue);
        }
        $(".js-back").click(function(){
            parent.layer.closeAll();
        });

        htmlInit();
        // Esc关闭弹窗
        window.onkeyup = function (ev) {
            var key = ev.keyCode || ev.which;
            if (key == 27) {
                layer.close(layer.index);
                console.log('layer.index = ' + layer.index)
            }
        }
    });

</script>
</html>
