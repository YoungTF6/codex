<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人员特殊达标标准</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/axios.min.js"></script>
    <script type="text/javascript" src="/js/auth.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <link rel="stylesheet" href="/css/score/scoreStatistics.css" media="all">
    <style>
        .layui-layer-content {
            overflow: visible !important;
        }

        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }


        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }

        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }

        .layui-treeSelect .ztree li {
            line-height: initial !important;
            padding: 2px 0;
        }

        .layui-table-tool-temp {
            padding-right: 10px;
        }
    </style>
</head>

<body class="body-area">
    <div class="layui-fluid">
        <div class="layui-card">
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width: 85px;padding-right: 10px;">达标生效年度</label>
                            <div class="layui-input-block" >
                                <select name="year" lay-filter="layui-select-year" id="year" >
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">姓名</label>
                            <div class="layui-input-block">
                                <input type="text" id="personName" placeholder="姓名" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">证件号</label>
                            <div class="layui-input-block">
                                <input type="text" id="certId" placeholder="证件号" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div id="deptSelectArea"  class="layui-inline layui-form  tree-select" lay-filter="deptSelectArea">
                            <label class="layui-form-label">科室</label>
                            <div class="layui-input-block">
                                <input type="text" autocomplete="off" class="layui-input" disabled lay-filter="deptSelect" id="deptSelect" name="deptId"
                                    placeholder="请选择单位">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">职称</label>
                            <div class="layui-input-block">
                                <input type="text" autocomplete="off" class="layui-input" lay-filter="text_title_names" id="text_title_names" placeholder="请选择">
                                <input type="hidden" autocomplete="off" class="layui-input" lay-filter="hidden_title_ids " id="hidden_title_ids">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">需要学习专项课程名称</label>
                            <div class="layui-input-block">
                                <select lay-filter="scoreNameSelect" id="scoreNameSelect" >
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <!-- <div class="layui-input-block"> -->
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="reloadTable()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                            <!-- </div> -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="tableList" lay-filter="tableList" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>


</body>

<!--详细情况明细-->
<script type="text/html" id="rowBarDel">
    <a class="layui-btn layui-btn-xs btn-danger-row" lay-event="del" >移除</a>
</script>

<script type="text/html" id="bar">
    <input type="checkbox" name="like1[read]" id="checkboxCurrent" style="float: left;" lay-filter="checkboxCurrent"  title="本页全选">
    <button class="layui-btn layui-btn-sm btnRounded" id="choosePerson" lay-event="choosePerson" >选定人群</button>
    <div class="layui-inline">
        <p id="personNum" style="color: red;"></p>
    </div>
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="excel" style="float: right;">导出EXCEL</button>
</script>
<script>
    layui.config({
        base: '/js/layui/ext/'
    }).extend({
        treeSelect: 'treeSelect',
        xmSelect: 'xm-select',
        eleTree: 'eleTree',
        tool: 'tool'
    });
    layui.use(['table', 'form', 'element', 'laydate', 'tool', 'treeSelect', 'xmSelect'], function () {
        var $ = layui.jquery
            , table = layui.table
            , element = layui.element
            , form = layui.form
            , laydate = layui.laydate
            , layer = layui.layer
            , treeSelect = layui.treeSelect
            , xmSelect = layui.xmSelect
            , tool = layui.tool;

        var unitId = localStorage.getItem("unit-id")
            , menuUnitId = tool.isEmpty(localStorage.getItem("menu-unit-id"))?unitId: localStorage.getItem("menu-unit-id")
            , cmeStandardKindId = localStorage.getItem("standardkind-id")
            , userType = localStorage.getItem("user-type")
            , userName = localStorage.getItem("user-name")
            , deptId
            , recordsTotal
            , pageSize
            , xmSelectPersonState
            ;


        // 年度下拉框初始化
        var initYears = function () {
            $.ajax({
                async: false,
                url: huayi_personorg_url + 'cmeSpecPersonpassConfig/selectCmeYear',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                dataType: "json",
                success: function (result) {
                    if (result.success == true) {
                        var dataList = result.data;
                        $("#year").html("");
                        for (var i = 0; i < dataList.length; i++) {
                            var $option = $("<option value='" + dataList[i].cmeYear + "'>" + dataList[i].cmeYear + "</option>");
                            $("#year").append($option);
                        }
                        form.render('select');
                        initscoreName();
                    }
                    else {
                        layer.msg(result.msg);
                    }
                }
            });
        }

        form.on("select(layui-select-year)", function (data) {
            initscoreName();
        });

         // 课程下拉框初始化
         var initscoreName = function () {
            $.ajax({
                async: false,
                url: huayi_personorg_url + 'cmeSpecPersonpassConfig/getListByYear',
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                data: {
                    cmeYear: $('#year').val(),
                    cmeStandardKindId: cmeStandardKindId
                },
                dataType: "json",
                success: function (result) {
                    if (result.success == true) {
                        var dataList = result.data;
                        $("#scoreNameSelect").html("<option value=''>请选择</option>");
                        for (var i = 0; i < dataList.length; i++) {
                            var $option = $("<option value='" + dataList[i].specId +  "'>" + dataList[i].scoreName + "</option>");
                            $("#scoreNameSelect").append($option);
                        }
                        form.render('select');
                    }
                    else {
                        layer.msg(result.msg);
                    }
                }
            });
        }

        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#tableList',
                id: 'tableList',
                url: huayi_personorg_url + 'cmeSpecPersonpass/list',
                defaultToolbar: [],
                toolbar: '#bar',
                cellMinWidth: '80px',
                height: 'full-190',
                page: true,
                limit: 50,
                limits: [10, 50, 100, 150, 200],
                where: {
                    deptId: $('#deptSelect').val(),
                    personName: $('#personName').val(),
                    titleId: $('#hidden_title_ids').val(),
                    certId: $('#certId').val(),
                    cmeStandardKindId: cmeStandardKindId,
                    cmeYear: $('#year').val(),
                    specId: $('#scoreNameSelect').val(),
                    unitId: unitId
                },
                cols: [[
                        { field: 'center', width: 80, toolbar: '#rowBarDel', title: '操作', align: 'center' },
                        { field: 'personName', title: '姓名', width: 100},
                        { field: 'sex', title: '性别', width: 80},
                        { field: 'deptName', title: '科室', width: 150},
                        { field: 'titleName', title: '职称', width: 150},
                        { field: 'cmeYear', title: '年度', width: 100 },
                        { field: 'scoreName', title: '需要学习专项课程名称', width: 250 },
                        // { field: '', title: '达标要求浏览', width: 150},
                    ]],
                parseData: function (res) {
                    if (res.status === 200) {
                        recordsTotal = res.data.recordsTotal;
                        pageSize = res.data.pageSize;
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }
                    } else {
                        layer.msg("请求失败");
                        console.log(res);
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done: function (res, curr, count) {
                    // 加载统计人数
                    loaderPersonNum();
                }
            });

        };

         //表格再次加载
         window.reloadTable = function () {
            table.reload("tableList", {
                url: huayi_personorg_url + 'cmeSpecPersonpass/list',
                where: {
                    deptId: $('#deptSelect').val(),
                    personName: $('#personName').val(),
                    titleId: $('#hidden_title_ids').val(),
                    certId: $('#certId').val(),
                    cmeStandardKindId: cmeStandardKindId,
                    cmeYear: $('#year').val(),
                    specId: $('#scoreNameSelect').val(),
                    unitId: unitId
                },
                page: {
                    curr: 1 //重新从第 1 页开始
                }
            });
        };

        // 获取人数统计
        window.loaderPersonNum = function () {
            $.ajax({
                async: false,
                url: huayi_personorg_url + 'cmeSpecPersonpass/countSate',
                data: {
                    deptId: $('#deptSelect').val(),
                    personName: $('#personName').val(),
                    titleId: $('#hidden_title_ids').val(),
                    certId: $('#certId').val(),
                    specId: $('#scoreNameSelect').val(),
                    cmeYear: $('#year').val(),
                    cmeStandardKindId: cmeStandardKindId,
                    unitId: unitId
                },
                headers: {
                    'Authorization': localStorage.getItem('token'),
                    'KJPT-USER-ID': localStorage.getItem('user-id')
                },
                dataType: "json",
                success: function (result) {
                    if (result.success == true) {
                        var dataList = result.data;
                        var htm = '本年度特定考核人员总人数' + dataList[0].count + '人，其中';
                        if(dataList.length > 1){
                            for (var i = 1; i < dataList.length; i++) {
                                i != 1 ? htm += '，' : '';
                                htm +=  dataList[i].scoreName + dataList[i].count + '人';
                            }
                            $("#personNum").html(htm);
                        }
                    }
                    else {
                        layer.msg(result.msg);
                    }
                }
            })
        };

        table.on('tool(tableList)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'del') {
                layer.confirm('确定删除？', {icon: 3, title: '提示'}, function (index) {
                    console.log(datas)
                    $.ajax({
                        type: 'get',
                        url: huayi_personorg_url + 'cmeSpecPersonpass/deleted',
                        data: { cmeSpecPersonpassId: datas.cmeSpecPersonpassId },
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("删除成功");
                                loaderTable();
                            }else{
                                layer.msg(res.msg);
                            }
                        }
                    });
                });

            }
        });
        // 监听头部导出按钮
        table.on('toolbar(tableList)', function (obj) {
            var datas = obj.data;
            var personIds = [];

            console.log(personIds);
            var data = {
                        deptId: $('#deptSelect').val(),
                        personName: $('#personName').val(),
                        titleId: $('#hidden_title_ids').val(),
                        certId: $('#certId').val(),
                        cmeStandardKindId: cmeStandardKindId,
                        cmeYear: $('#year').val(),
                        specId: $('#scoreNameSelect').val(),
                        unitId: unitId,
                        pageNum: 1,
                        pageSize: 9999
                    };
            // 全部导出
            var checkallinfo = $("#checkboxCurrent").is(":checked");
            if (obj.event === 'excel') {
                
                debugger
                if (checkallinfo) {
                    //获取当前页
                    var recodePage = $(".layui-laypage-skip .layui-input").val();
                    //获取当前页条数
                    var recodeLimit = $(".layui-laypage-limits").find("option:selected").val();
                    data.pageNum = recodePage;
                    data.pageSize = recodeLimit;
                } else {
                    
                }
                layer.msg('正在导出')
                //导出excel
                axios({
                    method: 'post',
                    url: huayi_personorg_url + 'cmeSpecPersonpass/exportExcel',
                    responseType: 'blob',
                    headers: {
                        "Accept": 'application/json',
                        "Authorization": localStorage.getItem("token"),
                        "KJPT-USER-ID": localStorage.getItem("user-id"),
                        "cmestandard-id": localStorage.getItem("standardkind-id")
                    },
                    data: data,
                }).then(function (res) {
                    var data = res.data;
                    var blob = new Blob([data], { type: 'application/octet-stream' });
                    var url = URL.createObjectURL(blob);
                    var exportLink = document.createElement('a');
                    exportLink.setAttribute("download", "人员达标情况.xlsx");
                    exportLink.href = url;
                    document.body.appendChild(exportLink);
                    exportLink.click();
                    layer.msg("导出成功")
                })
            } else if (obj.event === 'choosePerson') {
                layer.open({
                    type: 2,
                    title: '详细情况明细',
                    content: 'cmeSpecPersonChoose.html',
                    area: ['100%', '100%'],
                })
            }
        });

        //本页全选
        form.on('checkbox(checkboxCurrent)', function (data) {
            // if (data.elem.checked) {
            //     $("#checkboxAll").prop("checked", false);
            //     var child = $("input[name='layTableCheckbox']");
            //     child.each(function (index, item) {
            //         item.checked = true;
            //     });
            // } else {
            //     var child = $("input[name='layTableCheckbox']");
            //     child.each(function (index, item) {
            //         item.checked = false;
            //     });
            // }
            // form.render('checkbox');
        });


        // 科室树初始化
        var deptTreeSelect = treeSelect.render({
            elem: '#deptSelect',
            data: huayi_personorg_url + 'comdept/tree/unit?unitId=' + localStorage.getItem("unit-id"),
            type: 'get',
            search: true,
            style: {
                folder: { // 父节点图标
                    enable: true // 是否开启：true/false
                },
                line: { // 连接线
                    enable: true // 是否开启：true/false
                }
            }
        });
        

        // 职称选择
        $("#text_title_names").click(function () {
            var titleIds = $("#hidden_title_ids").val();
            console.log(titleIds);
            layer.open({
                type: 2,
                content: "../controls/selectTitle/selectTitles.html?titleIds=" + titleIds,
                area: ['700px', '480px'],
                scrollbar: false
            });
        });

        // 职称选择
        window.getChildTitles = (hidden_title_ids, titleNames) => {
            $("#text_title_names").val(titleNames);
            $("#hidden_title_ids").val(hidden_title_ids);
        }

        //页面加载入口
        let htmlInit = function () {
            initYears();
            // deptSelectDis();
            loaderTable()
        }
        htmlInit();
        // Esc关闭弹窗
        window.onkeyup = function (ev) {
            var key = ev.keyCode || ev.which;
            if (key == 27) {
                layer.close(layer.index);
                console.log('layer.index = ' + layer.index)
            }
        }
    });
</script>
