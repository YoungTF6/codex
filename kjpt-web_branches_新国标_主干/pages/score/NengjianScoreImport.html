    <script>
        layui.config({
            base:'../../js/layui/ext/'
        }).extend({
            xmSelect: 'xm-select'
        }).use(['table', 'form', 'element','upload', 'laydate','xmSelect'], function () {
            var $ = layui.jquery
                , table = layui.table
                , element = layui.element
                , form = layui.form
                , upload = layui.upload
                , laydate = layui.laydate
                , layer = layui.layer;
                
            var uploadInst = null;
            var selectedStandardId = null;

            var unitId = localStorage.getItem("unit-id")
                , configDictId = '00a74154-6853-11ec-9896-fa163e376cc4' // 学分级别配置
                ;
            var cmeStandardKindId = localStorage.getItem("standardkind-id");

            // 筛选折叠事件
            $('#advancedSearchPanel').hide();
            $('#toggleAdvancedSearch').on('click', function () {
                var $icon = $('#toggleIcon');
                var $text = $('#toggleText');
                var $panel = $('#advancedSearchPanel');

                if ($panel.is(':visible')) {
                    // 当前是展开状态 → 点击后收起
                    $panel.slideUp(300, function () {
                        $icon.removeClass('layui-icon-down').addClass('layui-icon-right');
                        $text.text('展开更多');
                    });
                } else {
                    // 当前是收起状态 → 点击后展开
                    $panel.slideDown(300, function () {
                        $icon.removeClass('layui-icon-right').addClass('layui-icon-down');
                        $text.text('收起');
                    });
                }
            });


          // 在页面初始化部分添加日期选择器
            laydate.render({
                elem: '#trainingStartDateStart',
                type: 'date'
            });
            laydate.render({
                elem: '#trainingStartDateEnd',
                type: 'date'
            });
            laydate.render({
                elem: '#approvalTimeStart',
                type: 'date'
            });
            laydate.render({
                elem: '#approvalTimeEnd',
                type: 'date'
            });
            

            // 套下拉选
            $.ajax({
                url: huayi_sjwh_url +"cmestandardkind/list/all",
                type: 'get',
                async:false,
                dataType: 'json',
                contentType: 'application/json;charset=UTF-8',
                success: function (res) {
                    if (res.status == 200) {
                        var dataArr = [];
                        $.each(res.data, function (index, item) {
                            var option = {
                                name:item.description,
                                value:item.cmeStandardKindId,
                                selected:false
                            }
                            dataArr.push(option)
                        });

                        xmSelectStandard = layui.xmSelect.render({
                            el: '#unitStandardSelect',
                            radio: true,
                            layVerify:"required",
                            autoRow:true,
                            filterable: true,
                            name: 'cmeStandardKindId',
                            data: dataArr,
                            on: function(data) {
                                //arr:  当前已选中的数据
                                var arr = data.arr;
                                if (arr.length > 0) {
                                    selectedStandardId = arr[0].value;
                                }
                                //isAdd, 此次操作是新增还是删除
                                var isAdd = data.isAdd;
                                if(!isAdd){
                                    selectedStandardId = '';
                                }
                            }
                        });
                    } else {
                        layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
                            time: 1000, //1s后自动关闭
                            end: function (o) {
                                layui.layer.closeAll();
                            }
                        });
                    }
                },
                error: function (req, msg) {
                    layui.layer.msg('系统繁忙，请稍后重试', {
                        time: 1000, //1s后自动关闭
                        end: function (o) {
                            layui.layer.closeAll();
                        }
                    });
                }
            });

            

            // 获取表格查询的where条件
            window.getTableWhere = function (importIds,gtScore) {
                return {
                    unitId: unitId,
                    name: $('#name').val(),
                    certId: $('#certId').val(),
                    phoneNumber: $('#phoneNumber').val(),
                    projectNo: $('#projectNo').val(),
                    projectName: $('#projectName').val(),
                    certificateCode: $('#certificateCode').val(),
                    applyingUnit: $('#applyingUnit').val(),
                    trainingStartDateStart: $('#trainingStartDateStart').val(),
                    trainingStartDateEnd: $('#trainingStartDateEnd').val(),
                    approvalTimeStart: $('#approvalTimeStart').val(),
                    approvalTimeEnd: $('#approvalTimeEnd').val(),
                    batchNumber: $('#batchNumber').val(),
                    syncStatus: $('#syncStatus').val(),
                    syncFailureReason: $('#syncFailureReason').val(),
                    cmeStandardKindId:selectedStandardId,
                    importIds: importIds,
                    gtScore: gtScore
                };
            };
            
            // 表格配置
            window.loaderTable = function (gtScore) {
                height = `full-${Math.round($("#searchDiv").height()+90)}`;
                table.render({
                    elem: '#nengjianScoreImportList',
                    url: huayi_projectscore_url + 'nengjianScoreImport/list',
                    toolbar: '#toolbarDemo',
                    where: getTableWhere(null,gtScore),
                    // 修改表格配置中的cols部分
                    cols: [[ //表头
                        {fixed:'checkbox',type: 'checkbox', fixed: 'left'},
                        , { field: 'id', title: 'ID', sort: true, hide: 'true' }
                        , { field: 'studentId', title: '省级学号', width: 120, align: "center"}
                        , { field: 'name', title: '姓名', width: 100, align: "center"}
                        , { field: 'gender', title: '性别', width: 80, align: "center"}
                        , { field: 'certId', title: '身份证号', width: 180 }
                        , { field: 'phoneNumber', title: '手机号', width: 120 }
                        , { field: 'projectNo', title: '项目编号', width: 120}
                        , { field: 'projectName', title: '项目名称', width: 180}
                        , { field: 'score', title: '学分', width: 80 }
                        , { field: 'certificateCode', title: '证书编码', width: 150 }
                        , { field: 'applyingUnit', title: '申报单位', width: 180}
                        // , { field: 'applyingUnitId', title: '申报单位编号', width: 150}
                        , { field: 'trainingStartDate', title: '培训开始时间', width: 160}
                        , { field: 'trainingEndDate', title: '培训结束时间', width: 160}
                        , { field: 'approvalTime', title: '审核时间', width: 160}
                        , { field: 'workUnit', title: '工作单位', width: 180}
                        , { field: 'province', title: '单位所在省份', width: 120}
                        , { field: 'city', title: '单位所在市', width: 120}
                        , { field: 'district', title: '所在区县', width: 120}
                        , { field: 'lastSyncTime', title: '最近一次同步时间', width: 160}
                        , { 
                            field: 'syncStatus', 
                            title: '同步状态', 
                            width: 120,
                            templet: function (data) {
                                let syncStatusText;
                                switch (data.syncStatus) {
                                    case "未同步":
                                        syncStatusText = "<span style='color: #999;'>未同步</span>";
                                        break;
                                    case "同步中":
                                        syncStatusText = "<span style='color: #FF9800;'>同步中</span>";
                                        break;
                                    case "同步成功":
                                        syncStatusText = "<span style='color: #4CAF50;'>同步成功</span>";
                                        break;
                                    case "同步失败":
                                        syncStatusText = "<span style='color: #F44336;'>同步失败</span>";
                                        break;
                                    default:
                                        syncStatusText = '';
                                        break;
                                }
                                return syncStatusText;
                            }
                        }
                        , { field: 'syncFailureReason', title: '同步不成功原因', width: 180 }
                        , { field: 'batchNumber', title: '导入批次', width: 150}
                        , { field: 'cmeStandardKindName', title: '套标准名称', width: 150}
                    ]],
                    cellMinWidth: 100,
                    id: "nengjianScoreImportList",
                    height: height,
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if(res.status === 200){
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "count": res.data.recordsTotal, //解析数据长度
                                "data": res.data.records, //解析数据列表
                                "page": res.data.pageNum, //当前页
                                "limit": res.data.pageSize, //每页条数
                                "gt3ScoreCnt": res.data.gt3ScoreCnt, //大于3学分数量
                            }
                        }else{
                            layer.msg("请求失败");
                            console.log(res);
                        }
                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    },
                    done: function (res, curr, count) {
                        console.log("res",res);
                        // 大于3学分提醒
                        var gt3ScoreCnt = res.gt3ScoreCnt;
                        if(gt3ScoreCnt > 0){
                            $('#gt3-score-cnt').css('display', 'inline-block');
                            $('#gt3-score-cnt').text(`大于3学分数量：${gt3ScoreCnt}`);
                        }else{
                            $('#gt3-score-cnt').hide();
                        }
                    }
                });
            };

            // 处理文件上传
            window.handleFileUpload = function() {
                if (!selectedStandardId) {
                    layer.msg('请先选择套标准', {icon: 2});
                    return;
                }

                var fileInput = document.getElementById('hiddenFileInput');
                if (fileInput.files.length === 0) {
                    layer.msg('请选择要上传的文件', {icon: 2});
                    return;
                }

                var file = fileInput.files[0];

                // 校验文件大小，不能大于100M
                var maxSize = 100 * 1024 * 1024;
                if (file.size > maxSize) {
                    layer.msg('文件大小不能超过100MB', {icon: 2});
                    fileInput.value = ''; // 清空文件选择
                    return;
                }

                // 创建 FormData 对象来发送文件
                var formData = new FormData();
                formData.append('file', file);
                formData.append('cmeStandardKindId', selectedStandardId);

                // 发送上传请求
                $.ajax({
                    url: huayi_projectscore_url + 'nengjianScoreImport/upload',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(res) {
                        if (res.success == true) {
                            // 开启轮询，获取进度
                            // startProgressPolling(res.data.taskId);
                            toSyncLogPage(true);
                        } else {
                            layer.alert(res.msg);
                        }
                    },
                    error: function(xhr, status, error) {
                        layer.alert('上传失败：' + error);
                    }
                });

                // 清空文件输入，允许再次选择
                fileInput.value = '';
            };

            // 初始化表格
            loaderTable();

            // 监听头部新增按钮
            table.on('toolbar(nengjianScoreImportList)', function (obj) {
                // 导入excel
                if (obj.event == 'import') {
                    // 检查套标准是否已选择
                    if (!selectedStandardId) {
                        layer.msg('请先选择套标准', {icon: 2});
                    } else {
                        // 直接触发文件选择并上传
                        $('#hiddenFileInput').trigger('click');
                    }
                }
                return false;
            });

            $("#btnInfoConfirm").click(function () {
                layer.close(infoIndex);
            });


            table.on('tool(nengjianScoreImportList)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    // $('#submitScore').css("display", "inline-block");

                    $.ajax({
                        url      : huayi_projectscore_url + 'nengjianScoreImport/relation/' + datas.scoreId,
                        type     : 'get',
                        dataType : 'json',
                        success  : res => {
                            if (res.status == '200') {
                                form.val('add-score', res.data);
                                form.render('select');
                                layer.open({
                                    type    : 1,
                                    title   : '修改学分',
                                    content : $('#addScore'),
                                    skin    : '',
                                    area    : [ '760px', '500px' ],
                                });
                            } else {
                                layer.msg('获取学分信息失败');
                            }
                        },
                        error    : (xhr, status, error) => {
                            layer.msg('网络异常，请稍后后再试');
                        }
                    });

                    // form.val('add-score', datas);
                    // form.render('select');
                    // layer.open({
                    //     type: 1,
                    //     title: '修改学分',
                    //     content: $('#addScore'),
                    //     skin: '',
                    //     area: ['760px', '500px'],
                    // })

                } else if (obj.event === 'del') {
                    layer.confirm('确认删除', { icon: 3, title: '提示' }, function () {
                        $.ajax({
                            type: 'get',
                            url: huayi_projectscore_url + 'nengjianScoreImport/delete',
                            data: {
                                scoreId: obj.data.scoreId
                            },
                            contentType: 'application/json;charset=UTF-8',
                            dataType: 'json',
                            success: function (res) {
                                if (res.status === 200) {
                                    layer.msg("删除成功");
                                    table.reload('nengjianScoreImportList');
                                }
                            }
                        });
                    })

                }
            });


            //执行同步
            $('#btnSync').click(function(){
                var verifyObj = getSelectedImportIds();
                if(!verifyObj.verify){
                    return;
                }
                const importIds = verifyObj.importIds;
                
                // 拼接表格查询的where条件
                const whereCondition = getTableWhere(importIds);
                console.log('同步条件:', whereCondition);
                
                layer.confirm('您确定要执行同步吗？', {
                    icon: 3,
                    title: '确认同步',
                    btn: ['确定', '取消']
                }, function(index){
                    // 用户点击"确定"时的操作
                    var loading = layer.load(0, {shade: false});
                    setTimeout(function () {execSync(whereCondition,loading);},10);
                    layer.close(index); 
                }, function(index){
                    // 用户点击"取消"时的操作
                    layer.close(index);
                });
            })

            // 获取复选框中选中的ID数组
            function getSelectedImportIds(){
                // 获取表格中复选框选中的数据
                var checkStatus = table.checkStatus('nengjianScoreImportList');
                var selectedData = checkStatus.data; // 获取选中行的数据
                
                // 检查选中数量是否超过100个
                if(selectedData.length > 100) {
                    layer.msg('单次最多选择100条', {icon: 2});
                    return {
                        verify: false
                    };
                }
                
                // 获取选中行的ID数组
                var importIds = [];
                for(var i = 0; i < selectedData.length; i++) {
                    importIds.push(selectedData[i].id);
                }
                return {
                    verify: true,
                    importIds: importIds
                };
            }

            var lock=false;
            function execSync(whereCondition,loading){
                if(lock){
                    //正在提交
                    return;
                }
                lock=true;
                $.ajax({
                    url: huayi_projectscore_url + 'nengjianScoreImport/execSync',
                    type: 'post',
                    async:false,
                    dataType: 'json',
                    data: JSON.stringify(Object.fromEntries(
                        Object.entries(whereCondition).filter(([_, value]) => 
                            value !== null && value !== undefined && value !== ''
                        )
                    )),
                    contentType: 'application/json;charset=UTF-8',
                    success: function (res) {
                        layer.close(loading);
                        lock=false;
                        table.reload('nengjianScoreImportList');
                        if (res.status == 200) {
                            toSyncLogPage(true);
                        } else {
                            layui.layer.msg(res.msg || '系统繁忙，请稍后重试', {
                                time: 1000, //1s后自动关闭
                                end: function (o) {
                                    layui.layer.closeAll();
                                }
                            });
                        }
                    },
                    error: function (req, msg) {
                        lock=false;
                        layui.layer.msg('系统繁忙，请稍后重试', {
                            time: 1000, //1s后自动关闭
                            end: function (o) {
                                layui.layer.closeAll();
                            }
                        });
                    }
                });
            }
            
            // 执行日志点击
            $("#btnSyncLog").click(function(){ 
                toSyncLogPage(false);
            });
            // 跳转到日志页面
            /**
             * @param {boolean} isAutoRefresh 是否自动刷新
             */
            function toSyncLogPage(isAutoRefresh){
                layer.open({
                    type: 2,
                    title: '能建中心学分导入日志',
                    shadeClose: true,
                    shade: 0.8,
                    area: ['100%', '100%'],
                    content: `NengjianScoreImportLog.html?isAutoRefresh=${isAutoRefresh}`,
                    cancel: function(index, layero){
                        // 关闭弹窗时刷新父页面表格
                        loaderTable();
                        return true;
                    }
                });
            }

            // 大于3学分按钮点击事件
            $('#gt3-score-cnt').click(function(){
                loaderTable(3);
            })

            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }

        });
    </script>
</body>

</html>
