        let isUploadPhoto=true,isIndividualAdd=true,configFileNum= 10;
        let scale = 3,viewFile = "viewFile";
        let sendClickNum=0;//是否发送请求获取图片
        let getPhotoUrl = huayi_projectscore_url + `cmeSingleprojScoreMobilePhoto/list`;

                                     , '51b03eba-afd8-43bc-9fbc-9beb00b0a84d', '607e63ee-d516-4e22-bf05-9beb00b0a84d']
        
        // 上传文件大小限制 河南限制3M
        let fileSize = standardkindId == 'a6280900-a9c2-11ec-84d6-fa163e9b64fb' ? 3*1024 : 10*1024;
        // 限制文件类型
        let fileExts = standardkindId == 'a6280900-a9c2-11ec-84d6-fa163e9b64fb' ? 'jpg|png|bmp|jpeg' : 'jpg|png|bmp|jpeg|pdf';
        
        //关闭closeLoading的判断
        let closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++; 
        }

        window.getCmeStandardKindId = function () {
            return localStorage.getItem("standardkind-id");
        }
        //表格加载
        let tableInit = function(){
            table.render({
                elem : "#activityInfoTable",
                id: "scoreTable",
                data: tableData,
                page: false,
                cellMinWidth: 100,
                done: function(res,curr,count){
                    form.render();
                    if(null != personName && personName != ""){
                        $(".js-people-input").val(personName);
                    }
                    bindInputValChange();
                },
                cols: [[
                    {type:'radio'},
                    {field:'order',title: '名称',align:"center"},
                    {field:'score',title: '学分',align:"center"},
                    {field:'period',title: '学时',align:"center",templet:'#test1'
                        , hide: standardkindId == '190c480d-d43c-450b-8472-a6fd00a6729d' ? true : false},
                    {field:'',title: '选择人员',align:"center",templet:'#test2'}
                ]]
            });
        }

        //监听input值改变
        let bindInputValChange = function(){
            //输入框的值改变时触发
            $(".js-score-input").change("input",function(e){
                const index = getIndex(e.target);
                const value = e.target.value;
                const name = e.target.name;
                table.cache['scoreTable'][index][name] = value;
            });
        }

        //判断数据是第几行，这里获取的是下表
        let getIndex = function(elem) {
            if(elem.tagName == "TR"){
                return elem.getAttribute("data-index");
            }else {
                return getIndex(elem.parentElement);
            }
        }

        //获取举办方式
        let getHoldType = function(){
            commonAjax('get',holdTypeUrl,{"standardKindId":standardkindId,projectType:3,userType:3},
                function(){layer.msg("获取举办方式失败");},
                function(res){
                    $.each(res.data, function (index, item) {
                        $('#holdType').append(new Option(item.holdTypeName, item.holdTypeId));
                    })
                    form.render('select');
                });
        }

        let initFrom = function(){
            $("#hidden_unit_id").val(unitId);
            $("#text_unit_name").val(nowUnitName);
            // laydate.render({ elem: '#activityDate', type: 'date',max: maxDate()});
        }

        //                 bindTwoKnowledge();
        //             } else { layer.msg('二级学科加载失败'); }

        // //监听二级学科，获取三级学科
        // let bindTwoKnowledge = function(){
        //     // 三级学科 todo
        //     form.on('select(knowledgeTwo)', function (data) {
        //         var knowledgeTwoId = data.value;
        //         getThreeKnowledge(knowledgeTwoId,function(){});
        //     });
        // }
        // //获取三级学科
        // let getThreeKnowledge = function(knowledgeTwoId,setFormData){
        //     commonAjax('get',twoKnowledgeUrl,
        //         {"knowledgeType":3,knowledgeTwoId:knowledgeTwoId},
        //         function(){layer.msg("三级学科加载失败");},
        //         function(res){
        //             if (res.success == true) {
        //                 $('#knowledgeThree').find('option:gt(0)').remove();
        //                 for (var i = 0; i < res.data.length; i++) {
        //                     var option = $('<option value="' + res.data[i].knowledgeId + '">' + res.data[i].knowledgeName + '</option>');
        //                     $('#knowledgeThree').append(option);
        //                 }
        //                 form.render('select');
        //                 setFormData();
        //             } else { layer.msg('三级学科加载失败'); }
        //         });
        // }
        //获取科室信息
        let getPersonInfo = function() {
            commonAjax('get',personUrl,{userId:userId},function(){layer.msg("人员信息获取失败");},
                function(res){
                    if(res.status == 200){
                        if(res.data.hasOwnProperty("comPersonId")){
                            personId = res.data["comPersonId"];
                            personName = res.data["personName"];
                            $("#comPersonId").val(personId);
                            $(".js-people-input").val(personName);
                        }else{
                            layer.msg("该人员无法录入个人学分");
                        }
                    }else{ layer.msg("加载失败"); }
                });
        }

        //获取授分标准信息
        let getScoreStandard = function() {
            const grantscoreStandardId = tool.getParamFromUrl("grantscoreStandardId");
            commonAjax('get',grandStandedUrl+grantscoreStandardId,{},
                function(){layer.msg("加载授分标准信息失败");},
                function(res){
                    if(res.code == 0){
                        createData(res.data);
                    }else{ layer.msg("加载授分标准信息失败"); }
                });
        }
        //构建表格加载的data
        let createData = function(data){
            $("#scoreLevelHide").val(data["type"]);
            for (let i = 0; i < grandData.length; i++) {
                let obj = {};
                if(data["score"+(i+1)] > 0) {
                    let period = 0;
                    // if(window.getCmeStandardKindId() == GUANGDONG) {
                        period = data["score"+(i+1)] * 6;
                    // }
                    obj["order"] = data[grandData[i]];
                    obj["score"] = data["score"+(i+1)];
                    obj["period"] = period;
                    tableData.push(obj);
                }
            }
            tableInit();
        }

        let bindAllBtn = function(){
            //机构名输入的时候，清空机构id
            $("#text_unit_name").keyup(function(){  $("#hidden_unit_id").val(""); });
            //选择单位按钮点击
            $("#selectUnitBtn").click(function () {
                layer.open({
                    area: ['700px', '600px'],
                    type: 2,
                    title: '选择单位',
                    content: '../../controls/unit/unitsMessage.html'});
                return false;
            });
            $(".js-close").click(function () { window.close(); })
            $("#mobileChooseFileBtn").click(function(){
                $(`#qrCode`).empty();
                let uploadFileNum = $("#fileList").children().length;
                let mobileUrl = window.location.origin + `/pages/mobile/scoreImgUpload.html?userId=${userId}&unitId=${unitId}&standardkindId=${standardkindId}&timestamp=${timestamp}&configFileNum=${configFileNum}&uploadFileNum=${uploadFileNum}`;
                $('#qrCode').qrcode({
                    text    :   mobileUrl,
                    width   :   '280',
                    height  :   '280'
                }); 
                layer.open({
                    type: 1
                    ,title: false //不显示标题栏
                    ,closeBtn: false
                    ,area: ['300px','300px']
                    ,shade: 0.8
                    ,shadeClose :true
                    ,scrollbar :true
                    ,id: 'LAY_layuipro' //设定一个id，防止重复弹出
                    ,moveType: 1 //拖拽模式，0或者1
                    ,content: $(`#qrCode`)
                });
                sendClickNum++;
                if(sendClickNum==1){
                    delayTime = 5000;
                    getTempMobileFile();
                }
            });
        }

        //轮训向服务器获取手机上传的图片,只执行一次
        let getTempMobileFile = function(){
            if(sendClickNum==0 || $("#fileList").children().length >= configFileNum) return;
            setTimeout(getMobileRequrest, delayTime);
        }

        //向后台发送请求
        let getMobileRequrest = function(){
            let getPhotoData = {userId:userId,timestamp:timestamp};
            $.ajax({

        let createPhoto = function(datas){
            let tempPhotos = [];

            for (let i = 0; i < datas.length; i++) {
                for (let j = 0; j < fileUrls.length; j++) {
                    if(datas[i].scorePhotoUrl == fileUrls[j].scorePhotoUrl) continue aa;
                }
                tempPhotos.push(datas[i]);
            }
            for (let i = 0; i < tempPhotos.length; i++) {
                if(fileUrls.length >= configFileNum){
                    break;
                }
                let tempPhoto = tempPhotos[i];
                fileUrls.push({
                    fileName:tempPhoto.fileName,
                    scorePhotoUrl:tempPhoto.scorePhotoUrl,
                    photoSize:tempPhoto.photoSize,
                    tempId:tempPhoto.keyId
                })
                let fileHtml = `<tr id="upload-${tempPhoto.keyId}">
                    <td>${tempPhoto.fileName}</td><td>${tempPhoto.photoSize}kb</td>
                    <td><img class="image-table-tr" onclick="viewPhoto('${tempPhoto.scorePhotoUrl}')" src="${tempPhoto.scorePhotoUrl}" alt="${tempPhoto.fileName}" file-size="${tempPhoto.photoSize}" file-id="${tempPhoto.keyId}"></td>
                    <td>已上传</td>
                    <td>
                        <a class="layui-btn layui-btn-xs layui-btn-danger" file-id="${tempPhoto.keyId}" onclick="deletePhoto(this)">删除</a>
                    </td>
                    </tr>`;
                $("#fileList").append(fileHtml);
                delayTime = delayTime + 1000;
            }
            if($("#fileList").children().length >= configFileNum) {
                isCanChooseBtn(false);
                isCanOpenQcode(false);

                        tr.find('.demo-reload').on('click', function () { obj.upload(index, file); });
                        //删除
                        tr.find('.demo-delete').on('click', function () {
                            layer.confirm('确认删除', {icon: 3, title: '提示'}, function (windowIndex) {
                                for(let i=0 ; i<fileUrls.length ; i++){

                                    }

                                tr.remove();

                    })
                },
                done: function(res,index,upload){
                    let that = this;
                    let tr = that.elemList.find('tr#upload-' + index);
                    let tds = tr.children();
                    if(res.code == 200){
                        let fileSize = (this.files[index].size/1014).toFixed(1);
                        let fileName = this.files[index].name;
                        fileUrls.push({
                            fileName:this.files[index].name,

                            photoSize:fileSize,
                            tempId:index
                        })
                        tds.eq(3).html('已上传');
                        tds.eq(4).find('.demo-reload').addClass('layui-hide'); //显示重传
                        delete this.files[index]; //删除文件队列已经上传成功的文件
                        if(Object.keys(this.files).length == 0){
                            isCanSubmitBtn(false);
                        }
                        return;
                    }
                    this.error(index, upload);
                },
                error: function(index,upload){
                    var that = this;
                    var tr = that.elemList.find('tr#upload-' + index);
                    var tds = tr.children();
                    tds.eq(3).html('上传失败');
                    tds.eq(4).find('.demo-reload').removeClass('layui-hide'); //显示重传

        //获取文件类型
        let getFileType = function(filesObj) {
            let tempDatas = {};
            let year = new Date().getFullYear();
            let path = `/individualScoreManage/${standardkindId}/${year}/${unitId}`;
            for(let key in filesObj){
                let fileData = {path:path,scale:0.6,outputQuality:0.6};
                // 判断文件大小, 超过3M压缩比例改为0.3
                debugger
                if(filesObj[key].size > 3000000 ){
                    fileData = {path:path,scale:0.3,outputQuality:0.3};
                }
                const tempType = filesObj[key].type;
                if(tempType.indexOf("image") >= 0){
                    fileData.fileType = "IMAGE";
                } else if(tempType.indexOf("application/pdf") >= 0){
                    fileData.fileType = "DOC";
                } else {
                    fileData.fileType = "OTHER";
                }
                tempDatas[key] = fileData;
            }
            return tempDatas;
        }

         //pdf预览解析
         let createPdf = function(pdfElem,id){
            let currentPages=1;
            let totalPages=0;
            var reader = new FileReader();
            reader.readAsDataURL(pdfElem);
            reader.onload = function(e) {
                let loadingTask = pdfjsLib.getDocument({
                    url: this.result,
                    cMapUrl: "/js/pdfjs/web/cmaps/",
                    cMapPacked: true
                });
                loadingTask.promise.then(function(pdf){
                    if(pdf){
                        totalPages =  pdf.numPages;
                        for (let i = 1; i <= totalPages; i++) {
                            var canvas = document.createElement('canvas');
                            canvas.id = "pageNum" + i;
                            $(`#${id}`).append(canvas);
                            var context = canvas.getContext('2d');
                            renderImg(pdf,i,context);
                        }
                    }
                })
            }
        }

        //解析pdf一页
        let renderImg = function(pdfFile,pageNum,canvasContext){
            let pageElem =  pdfFile.getPage(pageNum);
            pageElem.then(function(page){
                var viewport = page.getViewport({scale:scale});
                var newcanvas = canvasContext.canvas;
                newcanvas.width = viewport.width;
                newcanvas.height = viewport.height;
                newcanvas.style.width = "100%";
                var renderContext = {
                    canvasContext :  canvasContext,
                    viewport:viewport
                };
                page.render(renderContext);
            })
            return;
        }
