<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>录入个人学分-向导录入第二步</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <script type="text/javascript" src="/js/moment.min.js"></script>
    <link rel="stylesheet" href="/pages/score/cme_singleproj_score/css/singleproj.css" media="all">

    <style>
        .myBoder {
            border: 1px solid #6086b5;
        }
    </style>
</head>

<body>


    <div class="layui-bg-gray" style="padding: 30px;">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header myBoder">
                        <h3 class="stepTitle" style="font-weight: bold;">第二步 请输入具体数据，系统将自动计算应授学分</h3>
                    </div>
                    <div class="layui-card-body myBoder">
                        <div id="inputPeriod" style="padding: 10px; margin:0px 10px 10px 10px;">
                            <div class="layui-inline" style="display: block;">
                                <p id="description"></p><br>
                            </div>
                            <div>
                                <label>实际完成</label>
                                <div class="layui-inline">
                                    <input type="number" id="completePeriod" class="layui-input" min="0">
                                </div>
                                <label id="unitName"></label>
                            </div>
                            <div id="step" style="padding-top: 20px; padding-left: 50px;">
                                <a href="dept_score_guide.html" class="layui-btn layui-btn-sm">上一步</a>
                                <a id="nextStep" class="layui-btn layui-btn-sm">下一步</a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
<script>
    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate'], function () {
        var $ = layui.jquery, table = layui.table, form = layui.form, laydate = layui.laydate, layer = layui.layer;
        
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        const _isGuangdong = cmeStandardKindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1';
        //解析url参数
        let getParamFromUrl = function (paramName) {
            let urlStr = location.search;
            if (urlStr.indexOf(paramName) < 0 || urlStr.indexOf("?") < 0) return;
            let paramKV = urlStr.substring(1).split("&");
            for (let i = 0; i < paramKV.length; i++) {
                if (paramKV[i].indexOf(paramName) >= 0) {
                    return paramKV[i].split("=")[1];
                }
            }
        }

        let htmlInit = function () {
            let grantName = decodeURI(getParamFromUrl("grantName") || '');
            let unitName = decodeURI(getParamFromUrl("unitName"));
            let description = decodeURI(getParamFromUrl("description"));
            let unitNum = decodeURI(getParamFromUrl("unitNum"));
            let unitScore = decodeURI(getParamFromUrl("unitScore"));
            let unitMaxscore = decodeURI(getParamFromUrl("unitMaxscore"));
            let scoreLevel = decodeURI(getParamFromUrl("scoreLevel"));
            let cmeYear = decodeURI(getParamFromUrl('cmeYear'));
            var updateNextStepHref = function (completePeriod) {
                $("#nextStep").attr('href', 'dept_score_singleproj.html?v=' + today() + '&completePeriod=' + completePeriod
                    + '&unitNum=' + unitNum + '&unitScore=' + unitScore + '&unitMaxscore=' + unitMaxscore
                    + '&unitName=' + unitName + '&grantName=' + encodeURIComponent(grantName) + '&scoreLevel=' + scoreLevel + '&cmeYear=' + cmeYear);
            }

            $("#unitName").text(unitName);
            $("#description").text(description);
            if (_isGuangdong && grantName) {
                $(".stepTitle").text(grantName);
            }
            
            if (description.includes("每1次") && _isGuangdong) {
                $("#completePeriod").val(1);
                $("#completePeriod").attr("disabled", true);
            }

            // 输入框禁用时也要预先生成下一步链接
            updateNextStepHref($("#completePeriod").val() || '');

            $(function(){
                //输入框的值改变时触发
                $("#completePeriod").on("input",function(e){
                    updateNextStepHref(e.delegateTarget.value);
                    console.log($("#nextStep").attr('href'));

                });
            });

            // 下一步前校验输入
            $('#nextStep').click(function () {
                if (description.includes("每1次") && _isGuangdong) {
                    $("#completePeriod").val(1);
                }
                updateNextStepHref($("#completePeriod").val() || '');

                let completePeriod = $("#completePeriod").val();
                if (completePeriod < 0) {
                    layer.msg('实际完成内容不能小于0', {icon: 5})
                    return false
                }
                if(completePeriod == '' || completePeriod == null || completePeriod == undefined){
                    layer.msg('实际完成内容不能为空')
                    return false
                }else{
                    const urlStr = `dept_score_singleproj.html?completePeriod=${completePeriod}
                    &unitNum=${unitNum}&unitScore=${unitScore}&unitMaxscore=${unitMaxscore}
                    &scoreLevel=${scoreLevel}&unitName=${unitName}&cmeYear=${cmeYear}`;
                    // window.open(urlStr);
                }
            })

        }
        htmlInit();

    });

</script>
</body>

</html>
