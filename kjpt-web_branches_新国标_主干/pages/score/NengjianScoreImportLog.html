<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>能建中心学分导入日志</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="../../js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/layui-v2.6.8/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/tools/verification.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <script type="text/javascript" src="../../js/common.js"></script>
</head>

<body style="background: #fff;">
    <div class="layui-fluid">
        <div class="layui-card">
            <!-- 替换原有的搜索框区域 -->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">

                        <div class="layui-inline">
                            <label class="layui-form-label">日志类型</label>
                            <div class="layui-input-block">
                                <select name="logType" id="logType">
                                    <option value="">全部</option>
                                    <option value="1">数据导入</option>
                                    <option value="2">手动同步</option>
                                    <option value="3">定时同步</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">执行状态</label>
                            <div class="layui-input-block">
                                <select name="executeStatus" id="executeStatus">
                                    <option value="">全部</option>
                                    <option value="1">导入上传中</option>
                                    <option value="2">导入解析中</option>
                                    <option value="3">导入检查中</option>
                                    <option value="4">导入保存中</option>
                                    <option value="5">导入上传成功</option>
                                    <option value="6">导入上传失败</option>
                                    <option value="11">同步处理中</option>
                                    <option value="12">同步成功</option>
                                    <option value="13">同步失败</option>
                                </select>
                            </div>
                        </div>

                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn"
                                lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="nengjianScoreImportList" lay-filter="nengjianScoreImportList"
                    style="margin: 0px 0px;">
                </table>

                <!-- 触发方式 -->
                <script type="text/html" id="logTypeTpl">
                    {{#  if(d.logType === 1){ }}
                        <span>数据导入</span>
                    {{# } else if(d.logType=== 2) { }}
                        <span>手动同步</span>
                    {{# } else if(d.logType=== 3) { }}
                        <span>定时同步</span>
                    {{# } else{ }}
                        <span style="color:red">未知类型</span>
                    {{# } }}
                </script>
                <!-- 执行状态 -->
                <script type="text/html" id="executeStatusTpl">
                    {{#  if(d.executeStatus === 1){ }}
                        <span style="color: blue;">导入上传中</span>
                    {{# } else if(d.executeStatus=== 2) { }}
                        <span style="color: blue;">导入解析中</span>
                    {{# } else if(d.executeStatus=== 3) { }}
                        <span style="color: blue;">导入检查中</span> 
                    {{# } else if(d.executeStatus=== 4) { }}
                        <span style="color: blue;">导入保存中</span>
                    {{# } else if(d.executeStatus=== 5) { }}
                        <span style="color: green;">导入上传成功</span>
                    {{# } else if(d.executeStatus=== 6) { }}
                        <span style="color: red;">导入上传失败</span>
                    {{# } else if(d.executeStatus=== 11) { }}
                        <span style="color: blue;">同步处理中</span>
                    {{# } else if(d.executeStatus=== 12) { }}
                        <span style="color: green;">同步成功</span>
                    {{# } else if(d.executeStatus=== 13) { }}
                        <span style="color: red;">同步失败</span>
                    {{# } else{ }}
                        <span style="color:red">未知类型</span>
                    {{# } }}
                </script>
            </div>
        </div>
    </div>
    <!-- 表格头部工具栏，导入按钮 -->
    <script type="text/html" id="toolbarDemo">
    </script>

    <script>
        layui.use(['table', 'form', 'element'], function () {
            var $ = layui.jquery
                , table = layui.table
                , element = layui.element
                , form = layui.form;
                var refreshTimer  = null;
            
                
            htmlInit();

            function htmlInit () {
                // 初始化表格
                loaderTable();
                var isAutoRefresh = getUrlParam("isAutoRefresh");
                if(isAutoRefresh=="true"){
                    // 每10秒执行一次刷新
                    refreshTimer  =  setInterval(function() {
                        loaderTable();
                    }, 10000); 
                }
                
            }

            // 表格配置
            function loaderTable () {
                table.render({
                    elem: '#nengjianScoreImportList',
                    url: huayi_projectscore_url + 'nengjianScoreImportLog/list',
                    toolbar: '#toolbarDemo',
                    where: {
                        triggerType: $('#logType').val(),
                        executeStatus: $('#executeStatus').val()
                    },
                    cols: [[ //表头
                        , { field: 'id', title: 'logId', sort: true, hide: 'true' }
                        , { field: 'logType', title: '日志类型', width: 120, align: "center",templet: "#logTypeTpl"}
                        , { field: 'executeStatus', title: '执行状态', width: 120, align: "center",templet: "#executeStatusTpl"}
                        , { field: 'totalCnt', title: '总记录数', width: 120 , align: "center"}
                        , { field: 'successCnt', title: '成功记录数', width: 120, align: "center" }
                        , { field: 'failCnt', title: '失败记录数', width: 120, align: "center"}
                        , { field: 'addTime', title: '新增时间', width: 200 , align: "center"}
                        , { field: 'updateTime', title: '变更时间', width: 200, align: "center" }
                        , { field: 'errorMessage', title: '异常信息', width: 200, align: "center"}
                        , { field: 'paramInfo', title: '入参信息', width: 300, align: "center"}
                    ]],
                    cellMinWidth: 100,
                    id: "nengjianScoreImportList",
                    height: 'full-170',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if(res.status === 200){
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "count": res.data.recordsTotal, //解析数据长度
                                "data": res.data.records, //解析数据列表
                                "page": res.data.pageNum, //当前页
                                "limit": res.data.pageSize, //每页条数
                            }
                        }else{
                            layer.msg("请求失败");
                            console.log(res);
                        }
                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            //监听查询
            $('#searchBtn').click(function () {
                loaderTable(); 
            });

            // 页面关闭时清理定时器
            $(window).on('beforeunload', function() {
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
            });

            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }
        });
    </script>
</body>

</html>
