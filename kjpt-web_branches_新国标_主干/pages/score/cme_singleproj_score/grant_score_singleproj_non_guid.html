                            <div id="add-score-people">
                                <!--筛选授分人员-->

<script type="text/javascript" src="/pages/score/cme_singleproj_score/js/evidenceOcrVerify.js"></script>
<!--活动信息-->
<script>
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        eleTree: 'eleTree',
        tool:'tool',
        ysUpload:'ysUpload'
    });
    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'upload', 'transfer', 'eleTree','tool','ysUpload'], function () {
        var $ = layui.jquery, table = layui.table, tool=layui.tool
            , form = layui.form, laydate = layui.laydate
            , transfer = layui.transfer, upload = layui.upload
            , eleTree = layui.eleTree, layer = layui.layer,ysUpload=layui.ysUpload
            ;

        var el = null, deptId = null, fileUrls = [],submitScore;
        var unitId = localStorage.getItem("unit-id");
        var userId = localStorage.getItem("user-id");
        var nowUnitName = localStorage.getItem("unit-name");
        let unitUserType = localStorage.getItem("unit-user-type");
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        let isUploadPhoto = true,isIndividualAdd = true,configFileNum= 10;
        let scale = 3,viewFile = "viewFile";
        let timestamp = new Date().getTime();
        let sendClickNum=0;//是否发送请求获取图片
        let getPhotoUrl = huayi_projectscore_url + `cmeSingleprojScoreMobilePhoto/list`;
        let delayTime = 5000;//延时执行的时间

        // 上传文件大小限制 河南限制3M
        let fileSize = cmeStandardKindId == 'a6280900-a9c2-11ec-84d6-fa163e9b64fb' ? 3*1024 : 10*1024;
        // 限制文件类型
        let fileExts = cmeStandardKindId == 'a6280900-a9c2-11ec-84d6-fa163e9b64fb' ? 'jpg|png|bmp|jpeg' : 'jpg|png|bmp|jpeg|pdf';
        
        var personValue = [];
        let globalPersonData = {};//人员科室数据
        window.getSingleScorePersonIds = function () {
            return transfer.getData('demo1').map(function (item) { return item.value; });
        };

        // // 手机上传图片
        // $("#phoneUploadBtn").click(function () {
        //     layer.msg('打开二维码');
        //     //示范一个公告层
        //     layer.open({
        //         type: 1
        //         ,title: false //不显示标题栏
        //         ,closeBtn: true
        //         ,area: ['400px', '400px']
        //         ,shade: 0.8
        //         ,id: 'LAY_layuipro' //设定一个id，防止重复弹出
        //         ,btnAlign: 'c'
        //         ,moveType: 1 //拖拽模式，0或者1
        //         ,content: '<div id="qrcode" style="float:center;"></div>'});

        //     $('#qrcode').qrcode({
        //         text: 'http://www.runoob.com?userId=' + userId ,         //根据此串生成一个二维码
        //         correctLevel: 0, //纠错等级
        //         width:300,
        //         height: 300     //设置高度
        //     });
        // });

        // 多文件列表
        var uploadListIns = ysUpload.render({
            elem: '#chooseFileBtn'
            , elemList: $('#fileList') //列表元素对象
            , url: huayi_upload_url + 'uploadApi/upload'
            , exts     : fileExts
            , size: fileSize //大小小于10M
            , accept: 'file'
            , multiple: false
            , number: configFileNum
            , auto: (cmeStandardKindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1')
            , bindAction: '#submitFileBtn'
            , before   : function (obj) {
                this.data = getFileType(this.files);
            }
            , choose: function (obj) {
                isCanSubmitBtn(true);
                var that = this;
                var files = this.files = obj.pushFile(); //将每次选择的文件追加到文件队列
                var imgLength = Object.keys(files).length;
                // 文件上传数量限制
                if(Object.keys(files).length + fileUrls.length >= configFileNum){
                    isCanChooseBtn(false);
                    isCanOpenQcode(false);
                }
                //读取本地文件
                obj.preview(function (index, file, result) {
                    let imgSrc = file.type.indexOf("pdf") >=0? '/img/pdf.png' : result;
                    var tr = $(['<tr id="upload-' + index + '">'
                        , '<td><a >' + file.name + '</a></td>'
                        , '<td>' + (file.size / 1014).toFixed(1) + 'kb</td>'
                        , '<td><img id="showSmallPic' + index + '" src="'
                             + imgSrc + '" alt="' + file.name + '" class="layui-upload-img"></td>'
                        , '<td>' + (cmeStandardKindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1' ? '上传' : '未上传') + '</td>'
                        , '<td>'
                        // , '<button class="layui-btn layui-btn-xs demo-reload layui-hide">重传</button>'
                        , '<button class="layui-btn layui-btn-xs layui-btn-danger demo-delete" type="button">删除</button>'
                        , '<button class="layui-btn layui-btn-xs layui-btn-danger demo-delete2" type="button" style="display: none;">删除</button>'
                        , '</td>'
                        , '</tr>'].join(''));

                    //单个重传
                    tr.find('.demo-reload').on('click', function () {
                        obj.upload(index, file);
                    });

                    //删除
                    tr.find('.demo-delete').on('click', function () {
                        layer.confirm('确认删除', { icon: 3, title: '提示' }
                        , function () {
                            for(let i=0 ; i<fileUrls.length ; i++){
                                if(fileUrls[i].tempId==index){
                                    fileUrls.splice(i,1);
                                    break;
                                }
                            }
                            delete files[index]; //删除对应的文件
                            tr.remove();
                            uploadListIns.config.elem.next()[0].value = ''; //清空 input file 值，以免删除后出现同名文件不可选
                            isCanChooseBtn(true);
                            isCanOpenQcode(true);
                            Object.keys(files).length == 0 && isCanSubmitBtn(false);
                            layer.closeAll();
                        })
                    });
                    // 保存提交时删除, 无需确认
                    tr.find('.demo-delete2').on('click', function () {
                        for(let i=0 ; i<fileUrls.length ; i++){
                            if(fileUrls[i].tempId==index){
                                fileUrls.splice(i,1);
                                break;
                            }
                        }
                        delete files[index]; //删除对应的文件
                        tr.remove();
                        uploadListIns.config.elem.next()[0].value = ''; //清空 input file 值，以免删除后出现同名文件不可选
                        isCanChooseBtn(true);
                        isCanOpenQcode(true);
                        Object.keys(files).length == 0 && isCanSubmitBtn(false);
                    });

                    that.elemList.append(tr);

                    //某图片放大预览
                    $("#showSmallPic"+index).bind('click',function () { 
                        viewPhoto(result,file); 
                    });
                });
            }
            , done: function (res, index, upload) { //成功的回调
                // 保存文件路径
                var that = this;
                if(res.code == 200){ //上传成功
                    var tr = that.elemList.find('tr#upload-' + index)
                        , tds = tr.children();
                        let fileSize = (this.files[index].size/1014).toFixed(1);
                    fileUrls.push({
                        fileName:this.files[index].name,
                        scorePhotoUrl:res.data.picUrl,
                        photoSize:fileSize,
                        tempId:index
                    });
                    tds.eq(3).html('已上传');
                    tds.eq(4).find('.demo-reload').addClass('layui-hide'); //显示重传
                    delete this.files[index]; //删除文件队列已经上传成功的文件
                    // 全部上传完成弹框提示
                    Object.keys(this.files).length == 0 && isCanSubmitBtn(false);
                    return;
                }
                this.error(index, upload);
            }
            , allDone: function (obj) { //多文件上传完毕后的状态回调
                console.log(obj)
            }
            , error: function (index, upload) { //错误回调
                var that = this;
                var tr = that.elemList.find('tr#upload-' + index)
                    , tds = tr.children();
                tds.eq(3).html('上传失败');
                tds.eq(4).find('.demo-reload').removeClass('layui-hide'); //显示重传
            }
        });
        if (cmeStandardKindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1') {
            $('#submitFileBtn').hide();
        }

        //获取文件类型
        let getFileType = function(filesObj) {
            let tempDatas = {};
            let year = new Date().getFullYear();
            let path = `/individualScoreManage/${cmeStandardKindId}/${year}/${unitId}`;
            for(let key in filesObj){
                let fileData = {path:path,scale:0.6,outputQuality:0.6};
                // 判断文件大小, 超过3M压缩比例改为0.3
                debugger
                if(filesObj[key].size > 3000000 ){
                    fileData = {path:path,scale:0.3,outputQuality:0.3};
                }
                const tempType = filesObj[key].type;
                if(tempType.indexOf("image") >= 0){
                    fileData.fileType = "IMAGE";
                } else if(tempType.indexOf("application/pdf") >= 0){

        //pdf预览解析
        let createPdf = function(pdfElem,id){
            let currentPages=1;
            let totalPages=0;
            var reader = new FileReader();
            reader.readAsDataURL(pdfElem);
            reader.onload = function(e) {
                let loadingTask = pdfjsLib.getDocument({
                    url: this.result,
                    cMapUrl: "/js/pdfjs/web/cmaps/",
                    cMapPacked: true
                });
                loadingTask.promise.then(function(pdf){
                    if(pdf){
                        totalPages =  pdf.numPages;
                        for (let i = 1; i <= totalPages; i++) {
                            var canvas = document.createElement('canvas');
                            canvas.id = "pageNum" + i;
                            $(`#${id}`).append(canvas);
                            var context = canvas.getContext('2d');
                            renderImg(pdf,i,context);
                        }
                    }
                })
            }
        }
               //解析pdf一页
        let renderImg = function(pdfFile,pageNum,canvasContext){
            let pageElem =  pdfFile.getPage(pageNum);
            pageElem.then(function(page){
                var viewport = page.getViewport({scale:scale});
                var newcanvas = canvasContext.canvas;
                newcanvas.width = viewport.width;
                newcanvas.height = viewport.height;
                newcanvas.style.width = "100%";
                var renderContext = {
                    canvasContext :  canvasContext,
                    viewport:viewport
                };
                page.render(renderContext);
            })
            return;
        }

            $(".js-close").click(function(){ window.close(); });
            $("#mobileChooseFileBtn").click(function(){
                $(`#qrCode`).empty();
                let uploadFileNum = $("#fileList").children().length;
                let mobileUrl = window.location.origin + `/pages/mobile/scoreImgUpload.html?userId=${userId}&unitId=${unitId}&standardkindId=${cmeStandardKindId}&timestamp=${timestamp}&configFileNum=${configFileNum}&uploadFileNum=${uploadFileNum}`;
                $('#qrCode').qrcode({
                    text    :   mobileUrl,
                    width   :   '280',
                    height  :   '280'
                }); 
                layer.open({
                    type: 1
                    ,title: false //不显示标题栏
                    ,closeBtn: false
                    ,area: ['300px','300px']
                    ,shade: 0.8
                    ,shadeClose :true
                    ,scrollbar :true
                    ,id: 'LAY_layuipro' //设定一个id，防止重复弹出
                    ,moveType: 1 //拖拽模式，0或者1
                    ,content: $(`#qrCode`)
                });
                sendClickNum++;
                if(sendClickNum==1){
                    delayTime = 5000;
                    getTempMobileFile();
                }
            });
        }

        
        //轮训向服务器获取手机上传的图片,只执行一次
        let getTempMobileFile = function(){
            if(sendClickNum==0 || $("#fileList").children().length >= configFileNum) return;
            setTimeout(getMobileRequrest, delayTime);
        }

        //向后台发送请求
        let getMobileRequrest = function(){
            let getPhotoData = {userId:userId,timestamp:timestamp};
            $.ajax({
                type    :   "post",
                url     :   getPhotoUrl,
                data    :   JSON.stringify(getPhotoData),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success :   function (res) {
                    if(res.status==200 && !tool.isEmpty(res.data)&& res.data.length >0){
                        createPhoto(res.data);
                    }
                    getTempMobileFile();
                },
                error    :   function(res){ getTempMobileFile(); }
            });
        }

        let createPhoto = function(datas){
            let tempPhotos = [];
            aa:
            for (let i = 0; i < datas.length; i++) {
                for (let j = 0; j < fileUrls.length; j++) {
                    if(datas[i].scorePhotoUrl == fileUrls[j].scorePhotoUrl) continue aa;
                }
                tempPhotos.push(datas[i]);
            }
            for (let i = 0; i < tempPhotos.length; i++) {
                if(fileUrls.length >= configFileNum){
                    break;
                }
                let tempPhoto = tempPhotos[i];
                fileUrls.push({
                    fileName:tempPhoto.fileName,
                    scorePhotoUrl:tempPhoto.scorePhotoUrl,
                    photoSize:tempPhoto.photoSize,
                    tempId:tempPhoto.keyId
                })
                let fileHtml = `<tr id="upload-${tempPhoto.keyId}">
                    <td>${tempPhoto.fileName}</td><td>${tempPhoto.photoSize}kb</td>
                    <td><img class="image-table-tr" onclick="viewPhoto('${tempPhoto.scorePhotoUrl}')" src="${tempPhoto.scorePhotoUrl}" alt="${tempPhoto.fileName}" file-size="${tempPhoto.photoSize}" file-id="${tempPhoto.keyId}"></td>
                    <td>已上传</td>
                    <td>
                        <a class="layui-btn layui-btn-xs layui-btn-danger" file-id="${tempPhoto.keyId}" onclick="deletePhoto(this)">删除</a>
                    </td>
                    </tr>`;
                $("#fileList").append(fileHtml);
                delayTime = delayTime + 1000;
            }
            if($("#fileList").children().length >= configFileNum) {
                isCanChooseBtn(false);
                isCanOpenQcode(false);
                sendClickNum = 0;
                delayTime = 5000;

            }
        }
        
        //删除图片
        window.deletePhoto = function(elem){
            layer.confirm('确认删除', {icon: 3, title: '提示'}, function (windowIndex) {
                let index = elem.getAttribute("file-id");
                let deleteUrl = huayi_projectscore_url + "cmeSingleprojScoreMobilePhoto/deleteById";
                commonAjax('post',deleteUrl,{keyId:index},
                    function(){layer.msg("删除失败");},
                    function(res){
                        if(res.status == 200){
                            for(let i=0 ; i<fileUrls.length ; i++){
                                if(fileUrls[i].tempId==index){
                                    fileUrls.splice(i,1);
                                    break;
                                }
                            }
                            elem.parentElement.parentElement.remove();
                            isCanOpenQcode(true);
                            isCanChooseBtn(true);
                        }else{ 
                            layer.msg("删除失败");
                        }
                    });
                layer.close(windowIndex);
            })
        }

                //表单一些元素加载
        let formInit = function(){
            $("#hidden_unit_id").val(unitId);
            $("#text_unit_name").val(nowUnitName);
            laydate.render({elem: '#activityDate',type: 'date',max: maxDate()});
        }
        //页面初始化
        let htmlInit = function () {
            formInit();
            bindAllBtn();
            //初始化科室树，如果科室都相同就可以在此处加载
            if(unitUserType == 5){
                // 隐藏科室树
                $("#deptTreeDiv").hide();
            }else{
                // 显示科室树
                $("#deptTreeDiv").show();
                getDeptTree();
            }
            transferInit(personValue);
            getConfig();
        }
        $(".js-back").click(function(){ window.close(); });

        htmlInit();
        // Esc关闭弹窗
        window.onkeyup = function (ev) {
            var key = ev.keyCode || ev.which;
            if (key == 27) {
                layer.close(layer.index);
                console.log('layer.index = ' + layer.index)
            }
        }
    });

</script>
</html>
