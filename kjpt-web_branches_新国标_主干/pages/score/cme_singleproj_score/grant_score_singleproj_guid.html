<body>

    <!-- 筛选条件 -->

            {{# }else{ }}

                &unitNum={{d.unitNum}}&unitScore={{d.unitScore}}&unitMaxscore={{d.unitMaxscore}}&scoreLevel={{d.type}}&cmeYear={{d.cmeYear}}" class="layui-btn layui-btn-xs" lay-event="scoreInput"

    <script>
        layui.config({
            base: '/js/layui/ext/'
        }).extend({
            eleTree: 'eleTree',
            xmSelect: 'xm-select',
            zTreeSelectM: 'zTreeSelectM'
        });
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element', 'laydate', 'eleTree', 'xmSelect', 'zTreeSelectM'], function () {
            var $ = layui.jquery
                , table = layui.table
                , element = layui.element
                , form = layui.form
                , laydate = layui.laydate
                , xmSelect = layui.xmSelect
                , eleTree = layui.eleTree
                , zTreeSelectM = layui.zTreeSelectM
                , layer = layui.layer;

            var specArrs = [];
            var unitId = localStorage.getItem("unit-id");
            var userType = localStorage.getItem("user-type");
            var cmeStandardKindId = localStorage.getItem("standardkind-id");
            var hasGrantscoreType = false;
            var grantscoreType = '';
            const _isGuangdong = cmeStandardKindId === '289bf0ca-52cb-4b19-b737-9bd200a69ce1';
            // window.disabledParent = false;

            let getConfig = function(){
                let configName1 = "fn_grantscore_type";
                let configUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${unitId}&configNames=${configName1}`;
                $.ajax({
                    type    :   "post",
                    url     :   configUrl,
                    async   :   false,
                    success :   function (res) {
                        if(res.status == 200){
                            if(res.data){
                                if(res.data.hasOwnProperty(configName1) && res.data[configName1] == 1){
                                    hasGrantscoreType = true;
                                }
                            }else{ layer.msg("配置加载失败"); }
                        }else{ layer.msg("配置信息加载失败"); }
                    }
                });
            }
            getConfig();

            // 隐藏授分标准分类选项卡
            if(hasGrantscoreType){
                $('#tabDiv').show();
                grantscoreType = '10';
            }else{
                $('#tabDiv').hide();
            }

            // 鼠标悬浮切换选项卡
            $(function () {
                $('.layui-tab--hover .layui-tab-title li').mouseenter(function () {
                    $(this).addClass('layui-this').siblings().removeClass('layui-this')
                    const tabRoot = $(this).closest('.layui-tab--hover')
                    const tabContent = tabRoot.find('.layui-tab-content')
                    const index = $(this).index()
                    tabContent.find('.layui-tab-item').eq(index).addClass('layui-show').siblings().removeClass('layui-show')
                
                    // 重新加载表格
                    grantscoreType = this.getAttribute("value");
                    loaderTable();
                })
            })
           

            // 表格配置
            window.loaderTable = function () {
                var colsArr;
                if(hasGrantscoreType){
                    colsArr = [[
                        { field: 'xuhao', title: '序号', templet: '#rank',align: "center", width: 60 },
                        { field: 'name', title: '具体名称', align: "center" },
                        { title: '操作', toolbar: '#rowBar', align: "center", width: 120 },
                        { field: 'description', title: '具体规定', align: "center" },
                        { field: 'scoreLevelName', title: projectLabels.lblScoreLevel, align: "center" }
                    ]];
                }else{
                    if(_isGuangdong){
                        colsArr = [[
                            { field: 'xuhao', title: '序号', templet: '#rank',align: "center", width: 60 },
                            { title: '操作', toolbar: '#rowBar', align: "center", width: 120 },
                            { field: 'scoreKindName', title: projectLabels.lblScoreLevel, align: "center"},
                            { field: 'name', title: '具体名称', align: "center" },
                            { field: 'description', title: '具体规定', align: "center" },
                            { field: 'scoreLevelName', title: projectLabels.lblScoreLevelChild, align: "center" }
                        ]];
                    }else{ 
                        colsArr = [[
                            { field: 'xuhao', title: '序号', templet: '#rank',align: "center", width: 60 },
                            { title: '操作', toolbar: '#rowBar', align: "center", width: 120 },
                            { field: 'name', title: '具体名称', align: "center" },
                            { field: 'description', title: '具体规定', align: "center" },
                            { field: 'scoreLevelName', title: projectLabels.lblScoreLevel, align: "center" }
                        ]];
                    }
                }
                table.render({
                    elem: '#cmeProjPosDownList',
                    url: huayi_sjwh_url + 'cmegrantscorestandard/wizardEntryList',
                    title: '向导录入',
                    async:false,
                    defaultToolbar: [],
                    where: {
                        cmeStandardKindId: cmeStandardKindId,
                        cmeYear: $('#cmeYear').val(),
                        unitId: unitId,
                        userType: userType,
                        projType: 3,
                        type: $('#scoreLevel').val(),
                        grantscoreType: grantscoreType,
                        hasGrantscoreType: hasGrantscoreType
                    },
                    cols: colsArr,
                    cellMinWidth: 100,
                    id: "cmeProjPosDownList",
                    // height: 'full-400',
                    page: false,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        // TODO: 临时限制 筛选数据, 上级单位是开封卫健委，则仅展示 授分标准名称包含“开封” 的数据
                        // $.ajax({
                        //     async:false,
                        //     url: huayi_personorg_url + "comunit/parentUnits?unitId="+unitId,
                        //     success: function(data){
                        //         for (var i = 0; i < data.length; i++) {
                        //             if(data[i].unitId=='160500'){
                        //                 for (var j = 0; j < res.data.length; j++) {
                        //                     if(res.data[j].name.indexOf("开封") == -1){
                        //                         res.data.splice(j, 1);
                        //                         j--;
                        //                     }
                        //                 }
                        //                 break;
                        //             }
                        //         }
                        //     }
                        // })

                        if (res.status != 200) {
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": '获取数据失败', //解析提示文本
                            }                        
                        }
                        res.data.forEach(function (item) {
                            item.cmeYear = $('#cmeYear').val();
                        });
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.length, //解析数据长度
                            "data": res.data, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    done: function (res, curr, count) {
                        if(hasGrantscoreType){
                            // mergeRows(res);
                        }
                    }
                });
            };
            // 初始化表格
            loaderTable();

            // 合并单元格
            function mergeRows(res) {

                var data = res.data;
                var mergeIndex = 0;//定位需要添加合并属性的行数
                var mark = 1; //这里涉及到简单的运算，mark是计算每次需要合并的格子数
                var columsName = ['grantscoreType'];//需要合并的列名称
                var columsIndex = [1];//需要合并的列索引值

                for (var k = 0; k < columsName.length; k++) { //这里循环所有要合并的列
                    var trArr = $(".layui-table-body>.layui-table").find("tr");//所有行
                    for (var i = 1; i < res.data.length; i++) { //这里循环表格当前的数据
                        var tdCurArr = trArr.eq(i).find("td").eq(columsIndex[k]);//获取当前行的当前列
                        var tdPreArr = trArr.eq(mergeIndex).find("td").eq(columsIndex[k]);//获取相同列的第一列

                        if (data[i][columsName[k]] === data[i-1][columsName[k]] && (k === 0 || (k != 0 && data[i][columsName[k-1]] === data[i-1][columsName[k-1]]))) { //后一行的值与前一行的值做比较，相同就需要合并
                            mark += 1;
                            tdPreArr.each(function () {//相同列的第一列增加rowspan属性
                                $(this).attr("rowspan", mark);
                            });
                            tdCurArr.each(function () {//当前行隐藏
                                $(this).css("display", "none");
                            });
                        }else {
                            mergeIndex = i;
                            mark = 1;//一旦前后两行的值不一样了，那么需要合并的格子数mark就需要重新计算
                        }
                    }
                    mergeIndex = 0;
                    mark = 1;
                }
            }
            // 监听行内按钮
            // table.on('tool(cmeProjPosDownList)', function (obj) {
            //     var datas = obj.data;
            //     if (obj.event === 'scoreInput') {

            //     }
            // });

        });

    </script>
