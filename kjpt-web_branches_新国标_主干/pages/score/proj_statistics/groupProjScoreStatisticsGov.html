<script>
    layui.config({
        base: '../../../js/layui/ext/'
    }).extend({
        tool: 'tool',

    });

    // 全局配置及引入相关的模块
    layui.use(['table', 'form', 'laydate', 'element','tool','excel','treeSelect'], function () {
        let table = layui.table,form = layui.form,$ = layui.jquery,layer = layui.layer;
        let laydate = layui.laydate,element = layui.element,tool=layui.tool,excel=layui.excel,treeSelect=layui.treeSelect;
        let unitId = localStorage.getItem("unit-id");
        let menuUnitId = tool.isEmpty(localStorage.getItem("menu-unit-id"))?unitId: localStorage.getItem("menu-unit-id");
        let standardkindId = localStorage.getItem("standardkind-id");
        let scoreTableHeight,titleTableHeight,classifyHeight;
        let ajaxNum =0,loading=null,colsData = {},projectId=null;
        let nowProjectType = 2;//2院内活动
        let nowProjectId, nowGroupProjName;
        const JILIN = "acd09b62-333b-4aee-934f-9ec500a9d46d";
        let nowYear = new Date().getFullYear();

        //初始化搜索lable
        $("label").each(function() {
            const id = $(this).attr("id");
            if (projectLabels[id] !== undefined) {
                $(this).text(projectLabels[id]);
            }
        });

        //关闭closeLoading的判断
        let closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }
        //公共ajax
        let commonAjax = function(type="get",url,data,failFun,successFun){
            openLoading();
            $.ajax({
                type    :   type,
                url     :   url,
                data    :   data,
                success :   function (res) {
                    closeLoading();
                    successFun(res);
                },
                error    :   function(res){
                    closeLoading();
                    failFun();
                }
            });
        }
        //公共表格
        let commonTable = function(url,elem,id,height,params,tempColArr,isPage=true,minWidth=60,toolbar="#scoreExcBar"){
            const request = (isPage)?{pageName: 'pageNum', limitName: 'pageSize' }:{};
            table.render({
                elem    :   elem,
                id      :   id,
                url     :   url,
                toolbar :   toolbar,
                defaultToolbar  :   [],
                cellMinWidth    :   minWidth,
                height  :   height,
                page    :   isPage,
                limit   :   10,
                limits  :   [10, 50, 100, 150, 200],
                where   :   params,
                cols    :   tempColArr,
                parseData: function (res) {
                    let tempObj = {"code": res.status === 200 ? 0 : res.status,"msg": res.message};
                    if(res.status != 200) return tempObj;
                    if(isPage){
                        tempObj["data"] = res.data.records;
                        tempObj["count"] = res.data.recordsTotal;
                        tempObj["page"] = res.data.pageNum;
                        tempObj["limit"] = res.data.pageSize;
                        return tempObj;
                    }
                    tempObj["data"] = res.data;
                    return tempObj;
                },
                request: request
            });
        }
        //获取举办方式
        // let getHoldType = function(){
        //     commonAjax('get',huayi_sjwh_url + "cmeHoldType/listByStandardKindId",
        //         {"standardKindId":standardkindId},
        //         function(){layer.msg("获取举办方式失败");},
        //         function(res){
        //             tool.appendSelect("#holdType1",res.data,"holdTypeId","holdTypeName");
        //         });
        // }
        //时间组件绑定
        let dateInit = function(){
            let startDt = new Date();
            let endDt = new Date();
            startDt.getMonth(1);
            startDt.setDate(1);
            laydateStart1 = laydate.render({elem:"#searchStartDate1",type: 'date',value:startDt});
            laydateEnd1 = laydate.render({elem:"#searchEndDate1",type: 'date',value:endDt});
            laydateStart2 = laydate.render({
                elem:"#searchStartDate2",
                type: 'date',
                value:startDt,
                btns: ['clear', 'now'],
                done: function(value, date, endDate) {
                    // 获取选择的开始日期年份
                    var startYear = date.year;
                    // 获取结束日期输入框的值
                    var endDateValue = document.getElementById('searchEndDate2').value;
                    if (endDateValue) {
                        var endYear = new Date(endDateValue).getFullYear();
                        // 如果结束日期年份与开始日期年份不一致，清空结束日期
                        if (endYear !== startYear) {
                            document.getElementById('searchEndDate2').value = '';
                            layer.msg('结束日期必须与开始日期在同一年');
                        }
                    }
                }
            });
            laydateEnd2 = laydate.render({
                elem:"#searchEndDate2",
                type: 'date',
                value:endDt,
                btns: ['clear', 'now'],
                done: function(value, date, endDate) {
                    // 获取选择的结束日期年份
                    var endYear = date.year;
                    // 获取开始日期输入框的值
                    var startDateValue = document.getElementById('searchStartDate2').value;
                    if (startDateValue) {
                        var startYear = new Date(startDateValue).getFullYear();
                        // 如果开始日期年份与结束日期年份不一致，清空结束日期
                        if (startYear !== endYear) {
                            document.getElementById('searchEndDate2').value = '';
                            layer.msg('结束日期必须与开始日期在同一年');
                        }
                    }
                }
            });
            laydateStart4 = laydate.render({
                elem:"#searchStartDate4",
                type: 'date',
                value:startDt,
                btns: ['clear', 'now'],
                done: function(value, date, endDate) {
                    // 获取选择的开始日期年份
                    var startYear = date.year;
                    // 获取结束日期输入框的值
                    var endDateValue = document.getElementById('searchEndDate4').value;
                    if (endDateValue) {
                        var endYear = new Date(endDateValue).getFullYear();
                        // 如果结束日期年份与开始日期年份不一致，清空结束日期
                        if (endYear !== startYear) {
                            document.getElementById('searchEndDate4').value = '';
                            layer.msg('结束日期必须与开始日期在同一年');
                        }
                    }
                }
            });
            laydateEnd4 = laydate.render({
                elem:"#searchEndDate4",
                type: 'date',
                value:endDt,
                btns: ['clear', 'now'],
                done: function(value, date, endDate) {
                    // 获取选择的结束日期年份
                    var endYear = date.year;
                    // 获取开始日期输入框的值
                    var startDateValue = document.getElementById('searchStartDate4').value;
                    if (startDateValue) {
                        var startYear = new Date(startDateValue).getFullYear();
                        // 如果开始日期年份与结束日期年份不一致，清空结束日期
                        if (startYear !== endYear) {
                            document.getElementById('searchEndDate4').value = '';
                            layer.msg('结束日期必须与开始日期在同一年');
                        }
                    }
                }
            });
        }
        //获取学分级别
        // let getScoreLevel = function(){
        //     commonAjax('get',huayi_sjwh_url +"cmecomscorelevel/taoId",
        //         {cmeStandardKindId: standardkindId},
        //         function(){layer.msg("学分级别加载失败");},
        //         function(res){
        //             tool.appendSelect("#scoreLevel1",res.data,"scoreLevelId","scoreLevelName");
        //         });
        // }
        window.getScoreLevel = () => {
            window.scoreLevelSel && (treeSelect.destroy('scoreLevel'), $('#scoreLevel').val(''));
            window.scoreLevelSel = treeSelect.render({
                elem    : '#scoreLevel',
                data    : huayi_sjwh_url + 'option/scoreLevel/tree/' + standardkindId + '/' + nowYear + '/_1_',
                type    : 'get',
                search  : true,
                style   : {
                    folder  : { enable: false }, // 父节点图标
                    line    : { enable: true} // 连接线
                },
                click   : d => (getHoldType(),getScoreType()),
                success : d => (getHoldType(),getScoreType())
            });
        }
         //获取举办方式
        window.getHoldType = () => {
            let keyName     = projectLabels.lblProjectLevel,
                scoreLevel  = $('#scoreLevel').val();
            if(tool.isEmpty(scoreLevel)){
                $('#holdType').find('option:gt(0)').remove();
                layui.form.render('select');
                return;
            }
            $.ajax({
                url     : huayi_sjwh_url + 'option/holdType/list/' + standardkindId + '/' + scoreLevel + '/1__',
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        let $item = $('#holdType');
                        $item.empty().append($('<option value="">请选择</option>'));
                        $.each(re.data, (i, d) => $item.append($('<option value="' + d.holdTypeId + '">' + d.holdTypeName + '</option>')));
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        }
        //获取活动内容
        window.getScoreType = () => {
            let keyName     = projectLabels.lblActivityContent,
                scoreLevel  = $('#scoreLevel').val();
            if(tool.isEmpty(scoreLevel)){
                $('#scoreType').find('option:gt(0)').remove();
                layui.form.render('select');
                return;
            }
            $.ajax({
                url     : huayi_sjwh_url + 'option/scoreLevelContent/list',
                data    : { scoreLevel: scoreLevel },
                async   : false,
                success : re => {
                    if (re.status == 200) {
                        tool.appendSelect("#scoreType",re.data,"value","scoreLevelContentName");
                    } else layer.msg(keyName + '加载失败', { icon: 7, time: 1500 });
                },
                error   : () => layer.msg(keyName + '加载失败', { icon: 7, time: 1500 })
            });
            form.render();
        }
        //获取职称统计表格的项
        let getPeopleTitleField = function(){
            commonAjax('get',huayi_projectscore_url + 'statisticsUtility/getProjStatisticsTitles',
                {"cmeStandardKindId":standardkindId},
                function(){layer.msg("加载职称项失败");},
                function(res){
                    if (res.success == true) {
                        for (const obj of res.data) { colsData[obj.tableIndex]=obj.tableCols;  }
                    } else { layer.msg('加载职称项失败'); }
                }
            );
        }
        //获取二级学科
        let getTwoKnowledge = function(){
            $("#knowledgeThree1").empty();
            commonAjax('get',huayi_sjwh_url + 'comKnowledge',{"knowledgeType":2,"cmeStandardKindId":standardkindId,"versionYear":nowYear},
                function(){layer.msg("二级学科加载失败");},
                function(res){
                    if (res.success == true) {
                        tool.appendSelect("#knowledgeTwo1",res.data,"knowledgeId","knowledgeName");
                        bindTwoKnowledge();
                    } else { layer.msg('二级学科加载失败'); }
                }
            );
        }
        //监听二级学科，获取三级学科
        let bindTwoKnowledge = function(){
            form.on('select(knowledgeTwo1)', function (data) {
                //如果data.value为空，清空三级学科
                if(tool.isEmpty(data.value)){
                    $('#knowledgeThree1').find('option:gt(0)').remove();
                    layui.form.render('select');
                    return;
                }
                getThreeKnowledge(data.value,function(){}); 
            });
        }
        //获取三级学科
        let getThreeKnowledge = function(knowledgeTwoId,setFormData){
            commonAjax('get', huayi_sjwh_url + 'comKnowledge',
                {"knowledgeType":3,"knowledgeTwoId":knowledgeTwoId,"cmeStandardKindId":standardkindId,"versionYear":nowYear},
                function(){layer.msg("三级学科加载失败");},

         //获取举办年度，格式化开始结束时间
         let getCmeYearStartEnd = function(cmeYear,startObjId,endObjId,index){
            let minMaxObj ;
            startDate = cmeYear + "-01-01";
            endDate = cmeYear + "-12-31";
            $("#"+startObjId).val(startDate);
            $("#"+endObjId).val(endDate);
            startD = new Date(startDate);
            endD = new Date(endDate);
            minMaxObj = {
                min:{ year: startD.getFullYear(),month: startD.getMonth(), date: startD.getDate()}, 
                max:{ year: endD.getFullYear(),month: endD.getMonth(), date:  endD.getDate()+1}
            };
            window["laydateStart"+index].config.min =  minMaxObj.min;
            window["laydateStart"+index].config.max =  minMaxObj.max;
            window["laydateEnd"+index].config.min =  minMaxObj.min;
            window["laydateEnd"+index].config.max =  minMaxObj.max;
        }

        //获取举办年度
        let cmeYearInit = function() {
            var currentYear = (new Date()).getFullYear();
            for (var i = currentYear; i >= currentYear - 8; i--) {
                let option = "";
                if (i == currentYear) {
                    option = "<option value='" + i + "' selected>" + i + "</option>";
                } else {
                    option = "<option value='" + i + "'>" + i + "</option>";
                }
                $("#cmeYear1").append($(option));
                $("#cmeYear2").append($(option));
                $("#cmeYear3").append($(option));
                $("#cmeYear4").append($(option));
            }
            form.render("select");
        }

        //监听举办年度
        form.on('select(cmeYear1)', function(data){
            nowYear = data.value;
            getScoreLevel();
            getTwoKnowledge();
            getCmeYearStartEnd(nowYear,"searchStartDate1","searchEndDate1",1);
        });

            getHoldType();
            getScoreLevel();
            getTwoKnowledge();
            getPeopleTitleField();
            cmeYearInit();
            getCmeYearStartEnd(nowYear,"searchStartDate1","searchEndDate1",1);
        }
        htmlInit();
    });
