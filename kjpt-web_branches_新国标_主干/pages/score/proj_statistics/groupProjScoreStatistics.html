<script>

    });

        let table = layui.table, form = layui.form, $ = layui.jquery, layer = layui.layer;
        let laydate = layui.laydate, element = layui.element, tool = layui.tool;
        let selectM = layui.selectM, eleTree = layui.eleTree;
        var treeSelect = layui.treeSelect;
        let unitId = localStorage.getItem("unit-id");

        let nowProjectType = 2;//2表示院内活动

        const _isDept = 13 === Number(localStorage.getItem('user-type'));
        const _deptId = localStorage.getItem('dept-id');
        const JILIN = "acd09b62-333b-4aee-934f-9ec500a9d46d";

        layer.ready(function(){
            _isDept && $('.only_unit').hide();
        });

        

        //关闭closeLoading的判断
        let closeLoading = function () {
            ajaxNum--;
            if (ajaxNum <= 0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function () {
            if (ajaxNum == 0) loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
            ajaxNum++;
        }
        //多选框渲染
        let loadSelectM = function (elem, data, id, name) {
            return selectM({
                elem: elem,
                data: data,
                max: 100,
                //input的name 不设置与选择器相同(去#.)
                // name: 'tag2',
                //值的分隔符
                delimiter: ',',
                //候选项数据的键名
                field: { idName: id, titleName: name },
            });
        }
        //公共ajax
        let commonAjax = function (type = "get", url, data, failFun, successFun) {
            openLoading();
            $.ajax({
                type: type,
                url: url,
                data: data,
                success: function (res) {
                    closeLoading();
                    successFun(res);
                },
                error: function (res) {
                    closeLoading();
                    failFun();
                }
            });
        }
        //公共表格
        let commonTable = function (url, elem, id, height, params, tempColArr, isPage = true, title = "table", minWidth = 60, toolbar = "#scoreExcBar") {
            const request = (isPage) ? { pageName: 'pageNum', limitName: 'pageSize' } : {};
            table.render({
                elem: elem,
                id: id,
                url: url,
                toolbar: toolbar,
                defaultToolbar: [],
                cellMinWidth: minWidth,
                height: height,
                title: title,
                page: isPage,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                where: params,
                cols: tempColArr,
                parseData: function (res) {
                    let tempObj = { "code": res.status === 200 ? 0 : res.status, "msg": res.message };
                    if (res.status != 200) return tempObj;
                    if (isPage) {
                        tempObj["data"] = res.data.records;
                        tempObj["count"] = res.data.recordsTotal;
                        tempObj["page"] = res.data.pageNum;
                        tempObj["limit"] = res.data.pageSize;
                        return tempObj;
                    }
                    tempObj["data"] = res.data;
                    return tempObj;
                },
                request: request
            });
        }
        //获取举办方式

                            return '<i class="layui-icon" style="color: #FF5722">&#10006;</i>';
                        }
                        return `<i class="layui-icon" style="color: #00B83F">&#xe605;</i>`;
                    }, hide: standardkindId == JILIN
                },
                {
                    field: 'has_pass_exam', title: '是否通过考试', align: 'center', minWidth: 160,
                    event: 'viewTheResults', fixed: 'left',
                    templet: function (d) {
                        if (d["has_pass_exam"] != 1) {
                            // return '主办单位未启动';
                            return '<i class="layui-icon" style="color: #FF5722">&#10006;</i>';
                        }
                        return `<i class="layui-icon" style="color: #00B83F">&#xe605;</i>`;
                    }, hide: standardkindId == JILIN
                },
                { field: 'person_name', title: '姓名', align: 'center', minWidth: 100 },
                { field: 'cert_id', title: '证件号', align: 'center', minWidth: 170 },
                { field: 'person_no', title: '人员编号', align: 'center', minWidth: 130 },
                { field: 'dept_name', title: '科室', align: 'center', minWidth: 120 },
                { field: 'mobile', title: '联系方式', align: 'center', minWidth: 120 },
                { field: 'score', title: '学分', align: 'center' },
                { field: 'period', title: '学时', align: 'center' },
                { field: 'unit_name', title: '所在单位', align: 'center', minWidth: 200 },
                { field: 'title_name', title: '职称', align: 'center', minWidth: 100 },
                { field: 'spec_name', title: '专业', align: 'center', minWidth: 120 },
                { field: 'study_date', title: '授分日期', align: 'center', minWidth: 120 },
                { field: 'add_time', title: '录入时间', align: 'center', minWidth: 190 },
                { field: 'score_mode_name', title: '录入方式', align: 'center', minWidth: 180 },
                { field: 'check_state_name', title: '学分审核状态', align: 'center', minWidth: 180 },
                { field: 'if_avail_name', title: '学分有效状态', align: 'center', minWidth: 180 }
            ]];
            let params = { downId: downId,standardKindId:standardkindId };
            commonTable(huayi_projectscore_url + 'projectScoreStatistis/getGroupScorePeopleDetail',
                '#peopleScoreTable', 'peopleScore', height, params, colsArr);
        }

        let getCmeYearStartEnd = function(cmeYear,startObjId,endObjId,index){
            let minMaxObj ;
            let url = huayi_sjwh_url + "cmeYear";
            $.ajax({
                async: false,
                url:url,
                data: { cmeYear:cmeYear,cmeStandardKindId: standardkindId },
                success: function(res) {
                    let data = res.data;
                    let startDate = "";
                    let endDate = "";
                    if(data != null && data.length > 0) {
                        startDate = data[0].startDate;
                        endDate = data[0].endDate;
                    
                        $("#"+startObjId).val(startDate);
                        $("#"+endObjId).val(endDate);
                      
                       
                        startD = new Date(startDate);
                        endD = new Date(endDate);
                        minMaxObj = {
                            min:{ year: startD.getFullYear(),month: startD.getMonth(), date: startD.getDate()}, 
                            max:{ year: endD.getFullYear(),month: endD.getMonth(), date:  endD.getDate()+1}
                        };
                        window["laydateStart"+index].config.min =  minMaxObj.min;
                        window["laydateStart"+index].config.max =  minMaxObj.max;
                        window["laydateEnd"+index].config.min =  minMaxObj.min;
                        window["laydateEnd"+index].config.max =  minMaxObj.max;
                    }
                }
            });
        }

        form.on('select(cmeYear1)', function(data){
            let cmeYear = data.value;
            $('#knowledgeThree1').find('option:gt(0)').remove();
            form.render("select");
            getCmeYearStartEnd(cmeYear,"searchStartDate1","searchEndDate1",1);
            renderPage1DDL(cmeYear);
        });
        form.on('select(cmeYear2)', function(data){
            let cmeYear = data.value;
            getKnowledgeTree(cmeYear);
            getCmeYearStartEnd(data.value,"searchStartDate2","searchEndDate2",2);
            renderPage2DDL(cmeYear);
        });
        form.on('select(cmeYear3)', function(data){
            getCmeYearStartEnd(data.value,"searchStartDate3","searchEndDate3",3);
        });
        form.on('select(cmeYear4)', function(data){
            getCmeYearStartEnd(data.value,"searchStartDate4","searchEndDate4",4);
        });


        //监听单选框
        form.on("radio(dept_type)", function (data) { getDeptNumStatistics(); })

        //导出excel文件
        table.on('toolbar(groupScoreTable)', function (obj) {
            if (null == table.cache["scoreTable"] || table.cache["scoreTable"].length == 0) {
                layer.msg("无数据导出");
                return;
            }
            let params = getGroupScoresParam();
            let url = huayi_projectscore_url + "projectScoreStatistis/exportGroupScoreStatistisExcel";
            tool.exportExcelPost(url, params, "学分审核情况.xlsx");
        });
        //导出人员明细
        table.on('toolbar(peopleScoreTable)', function (obj) {
            if (null == table.cache["peopleScore"] || table.cache["peopleScore"].length == 0) {
                layer.msg("无数据导出");
                return;
            }
            let params = Object.assign({}, obj.config.where);
            if (!tool.isEmpty(nowGroupProjName)) {
                params.projectName = nowGroupProjName;
            }
            let url = huayi_projectscore_url + "projectScoreStatistis/exportGroupPeopleDetailExcel";
            let exportFileName = tool.isEmpty(nowGroupProjName) ? "授分人员明细" : nowGroupProjName;
            tool.exportExcelPost(url, params, exportFileName + ".xlsx");
        });
        //导出院内活动举办情况
        table.on('toolbar(groupHoldTable)', function (obj) {
            if (null == table.cache["groupHold"] || table.cache["groupHold"].length == 0) {
                layer.msg("无数据导出");
                return;
            }
            let params = getGroupHoldParam();
            let url = huayi_projectscore_url + "projectScoreStatistis/exportGroupHoldStatisticsExcel";
            tool.exportExcelPost(url, params, "项目开展情况分类.xlsx");
        })
        //科室参加明细
        table.on('toolbar(peopleDeptTable)', function (obj) {
            if (null == table.cache["deptTable"] || table.cache["deptTable"].length == 0) {
                layer.msg("无数据导出");
                return;
            }
            const deptType = $('input[name="deptType"]:checked').val();
            let params = { unitId: unitId, downId: nowGroupData["down_id"], deptType: deptType };
            let url = huayi_projectscore_url + "projectScoreStatistis/exportGroupDeptStatisticsExcel";
            tool.exportExcelPost(url, params, "科室参加明细.xlsx");
        });
        //导出项目参加人员统计
        table.on('toolbar(groupTitleTable)', function (obj) {
            const titleType = $('input[name="titleType"]:checked').val();
            const fieldData = colsData[titleType];
            let exportArr = [];
            let tempArr = ["其他编号", "活动名称", "开始时间", "结束时间"];
            for (const obj of fieldData) {
                tempArr.push(obj["title_name"]);
            }
            exportArr.push(tempArr);
            for (const obj of table.cache['groupTitle']) {
                let projNo = tool.isEmpty(obj["proj_no"]) ? "" : obj["proj_no"];
                let projName = tool.isEmpty(obj["proj_name"]) ? "" : obj["proj_name"];
                let startDt = tool.isEmpty(obj["start_dt"]) ? "" : obj["start_dt"].replace("T", " ");
                let endDt = tool.isEmpty(obj["end_dt"]) ? "" : obj["end_dt"].replace("T", " ");
                let tempData = [projNo, projName, startDt, endDt];
                for (const fieldObj of fieldData) {
                    obj.hasOwnProperty(fieldObj["title_id"]) ? tempData.push(obj[fieldObj["title_id"]]) : tempData.push(0);
                }
                exportArr.push(tempData);
            }
            child.window.exportUrl(exportArr, "项目参加人员统计.xlsx", "xlsx");
        });
        //导出项目分类综合统计
        table.on('toolbar(groupClassifyTable)', function (obj) {
            let exportArr = [];
            exportArr.push(["名称", "场次", "参加人数"]);
            for (const obj of table.cache['groupClassify']) {
                exportArr.push([obj["name"], obj["down_count"], obj["person_count"]]);
            }
            child.window.exportUrl(exportArr, "项目分类综合统计.xlsx", "xlsx");
        });


        //学分审核情况查看--人员明细
        table.on('tool(groupScoreTable)', function (obj) {
            nowProjectId = obj.data.group_proj_id;
            nowGroupProjName = obj.data.group_proj_name;
            layer.open({
                type: 1,
                title: '授分人员明细',
                content: $('#peopleScoreBox'),
                area: ['100%', '100%'],
                success: function (layero, index) { getPeopleScoreData(obj.data["down_id"]); }
            })
        });
        //活动开展情况--科室明细
        table.on('tool(groupHoldTable)', function (obj) {
            nowGroupData = obj.data;
            layer.open({
                type: 1,
                title: '科室参加明细',
                content: $('#peopleDeptBox'),
                area: ['100%', '100%'],
                success: function (layero, index) { getDeptNumStatistics(); },
                cancel: function (index, layero) {
                    $("input[name=deptType][value='']").prop("checked", true);
                    form.render(null, 'dept-form');
                }
            })
        });

        //人员明细中，监听是否考试，是否评价
        table.on("tool(peopleScoreTable)", function (obj) {
            if (obj.event == "evaluation_event" && obj.data["has_join_evaluate"] == 1) {
                layer.open({
                    type: 2,
                    content: `/pages/project/CmeProjEvaluationPeople.html?projectId =${nowProjectId}&personId=${obj.data["com_person_id"]}&projectType=2`,
                    area: ['80%', '80%'],
                    title: '评价结果',
                })
            } else if (obj.event == "viewTheResults" && obj.data["has_pass_exam"] == 1) {
                layer.open({
                    type: 2,
                    content: `/pages/project/CmeExamPaper.html?projectId=${nowProjectId}`,
                    area: ['80%', '80%'],
                    title: '考试结果',
                })
            }
        })

        /* 选项卡,点击tab也会切换，同时判断height来决定是否获取数据 */
        element.on('tab(tabarea)', function (data) {
            $(".layui-tab-item").removeClass("layui-show");
            $(".layui-tab-item")[data.index].classList.add("layui-show");
        });

        //关闭学科树
        let closeKnowledgeTree = function () {
            tool.removeAttr([$("#knowledgeTreeBox")[0]]);
            let targetChild = tool.getElemByClass($("#knowledgeTreeInput")[0], "layui-edge");
            targetChild != null && targetChild.classList.remove("ts-icon-expand");
        }
        //打开学科树
        let openKnowledgeTree = function () {
            $("#knowledgeTreeBox").css('display', 'block');
            let targetChild = tool.getElemByClass($("#knowledgeTreeInput")[0], "layui-edge");
            targetChild != null && targetChild.classList.add("ts-icon-expand");
        }

        //监听点击document元素触发
        let bindOtherElem = function () {
            let targetElem1 = document.getElementById("knowledgeTreeInput");
            let targetElem2 = document.getElementById("knowledgeTreeBox");
            let targetElem3 = document.getElementById("scoreLevel2");
            let targetElem4 = document.getElementById("holdType2");
            $(document).bind("click", function (e) {
                let cssDisplay = $("#knowledgeTreeBox")[0].style.display;
                cssDisplay != "block" && tool.isTargetArea(e.target, targetElem1, 4) && openKnowledgeTree();
                cssDisplay == "block" && !e.target.classList.contains("eleTree-dropdown-code")
                    && !e.target.classList.contains("eleTree-checkbox-code")
                    && !tool.isTargetArea(e.target, targetElem1, 4) &&
                    !tool.isTargetArea(e.target, targetElem2, 8) && closeKnowledgeTree();
                if (!tool.isTargetArea(e.target, targetElem3, 6) && !tool.isTargetArea(e.target, targetElem4, 6)) {
                    $("#scoreLevel2").removeClass("layui-form-selected");
                    $("#holdType2").removeClass("layui-form-selected");
                }
            })
        }

        //页面加载入口
        let htmlInit = function () {
            renderLables();
            cmeYearInit();
            dateInit();
            
            renderPage1DDL($("#cmeYear1").val());
            renderPage2DDL($("#cmeYear2").val());


            getKnowledgeTree($("#cmeYear2").val());
            initDeptTrees();
            getPeopleTitleField();
            bindOtherElem();
        }
        htmlInit();
    });
</script>
