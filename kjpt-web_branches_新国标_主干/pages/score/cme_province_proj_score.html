<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>外省人员学分录入</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="../../js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/layui-v2.6.8/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/tools/verification.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>
    <script type="text/javascript" src="/js/constantPage/projectConstant.js"></script>

    <style>
        .layui-layer-content {
            overflow: visible !important;
        }

        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui_display {
            flex: 1 auto;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }

        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }



        .layui-table-tool-temp {
            padding-right: 10px;
        }
    </style>
</head>

<body style="background: #fff;">
    <div class="layui-fluid">
        <div class="layui-card">
             <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label">项目编号</label>
                            <div class="layui-input-block">
                                <input type="text" name="projNo" id="projNo" placeholder="项目编号" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">项目名称</label>
                            <div class="layui-input-block">
                                <input type="text" name="projName" id="projName" placeholder="项目名称" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">姓名</label>
                            <div class="layui-input-block">
                                <input type="text" name="personName" id="personName" placeholder="姓名" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">身份证号</label>
                            <div class="layui-input-block">
                                <input type="text" name="certId" id="certId" placeholder="身份证号" autocomplete="off"
                                    class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">审核状态</label>
                            <div class="layui-input-block">
                                <select name="checkState" lay-filter="checkState" id="checkState" lay-verify="1">
                                    <option value=""></option>
                                    <option value="0">未审核</option>
                                    <option value="1">审核通过</option>
                                    <option value="2">审核不通过</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">年度</label>
                            <!-- TODO: 近五年? 搜索时对应哪个字段 -->
                            <div class="layui-input-block">
                                <select name="year" lay-filter="layui-select-year" id="year" lay-verify="1">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                                <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()"
                                    lay-filter="table-search" data-type="reload">
                                    <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                                </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="cmeProvinceProjScoreList" lay-filter="cmeProvinceProjScoreList"
                    style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>

    <!--        添加弹窗-->
    <div id="addScore" style=" display:none;">
        <form class="layui-form" style="padding: 30px;" id="form-addScore" lay-filter="add-score">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="scoreId" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>项目名称
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="projName" id="projName" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="项目名称">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>项目编号
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="projNo" id="projNo" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="项目编号">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>姓名
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="personName" id="personName" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="姓名">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>性别
                    </label>
                    <div class="layui-input-inline">
                        <select name="sex" lay-verify="required">
                            <option value="">请选择性别</option>
                            <option value="1">男</option>
                            <option value="2">女</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>身份证号
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="certId" id="certIdInput" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="身份证号">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label" name="lblProjectLevel">
                        <font color="red">*&nbsp;</font>学分级别
                    </label>
                    <div class="layui-input-inline">
                        <select name="scoreLevel" id="scoreLevel" lay-verify="required">
                            <option value="">请选择</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>开始日期
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="startDate" id="startDate" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="请选择">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>截止日期
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="endDate" id="endDate" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="请选择">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>学分
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="score" id="score" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="学分">
                    </div>
                </div>
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">
                        <font color="red">*&nbsp;</font>学时
                    </label>
                    <div class="layui-input-inline">
                        <input type="text" name="period" id="period" autocomplete="off" class="layui-input"
                            lay-verify="required" placeholder="学时">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline" style="display: block;">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-input-inline" style="width: 500px;">
                        <input type="text" name="remark" id="remark" autocomplete="off" class="layui-input"
                            placeholder="备注">
                    </div>
                </div>
            </div>
            <div class="layui-form-item" id="submitScore">
                <div style="text-align: center;">
                    <button class="layui-btn" lay-submit lay-filter="submitScore">保存</button>
                    <button id="closeBtn" type="close" class="layui-btn layui-btn-primary">关闭</button>
                </div>
            </div>

        </form>
    </div>

    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
        {{# if(d.checkState == 0){ }}
        <a class="layui-btn layui-btn-xs" lay-event="edit" style="color: #27b1a2;background-color: transparent;">编辑</a>
        <a class="layui-btn layui-btn-xs" lay-event="del" style="color: #f25643;background-color: transparent;">删除</a>
        {{# }else{ }}
        <img src="../../img/score/disableIcon.png" style="width:20px;">
        {{# } }}

    </script>
    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>添加学分</a>
    </script>
    <script>
        layui.use(['table', 'form', 'element', 'laydate'], function () {
            var $ = layui.jquery
                , table = layui.table
                , element = layui.element
                , form = layui.form
                , laydate = layui.laydate
                , layer = layui.layer;


            var unitId = localStorage.getItem("unit-id")
                , configDictId = '00a74154-6853-11ec-9896-fa163e376cc4' // 学分级别配置
                ;
            var cmeStandardKindId = localStorage.getItem("standardkind-id");

            // 年度下拉框
            var date = new Date();
            var year = date.getFullYear();
            var options;
            for (var i = 0; i < 5; i++) {
                options += '<option value="' + year + '">' + year + '年</option>';
                year = year - 1;
            }
            $('#year').append(options);
            form.render('select');

            laydate.render({
                elem: '#startDate',
                type: 'date'
            });
            laydate.render({
                elem: '#endDate',
                type: 'date'
            });
            // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem: '#cmeProvinceProjScoreList',
                    url: huayi_projectscore_url + 'cmeProvinceProjScore/relationList',
                    toolbar: false,
                    //toolbar: '#bar',
                    where: {
                        unitId: unitId,
                        projName: $('#projName').val(),
                        projNo: $('#projNo').val(),
                        personName: $('#personName').val(),
                        certId: $('#certId').val(),
                        checkState: $('#checkState').val(),
                        year: $('#year').val(),
                    },
                    cols: [[ //表头
                        { field: 'scoreId', title: 'ID', sort: true, hide: 'true' }
                        , { align: 'center', width: 120, toolbar: '#rowBar', title: '操作',hide:true }
                        , { field: 'projName', title: '项目名称' , width: 180,align:"center"}
                        , { field: 'projNo', title: '项目编号', sort: true , width: 120}
                        , { field: 'personName', title: '姓名'}
                        , { field: 'certId', title: '身份证号', width: 180 }
                        , { field: 'startDate', title: '开始日期', sort: true, width: 105 }
                        , { field: 'endDate', title: '截止日期', sort: true, width: 105 }
                        , { field: 'score', title: '学分', sort: true, width: 80 }
                        , { field: 'period', title: '学时', width: 80  }
                        , { field: 'scoreLevelName', title: projectLabels.lblScoreLevel, sort: true , width: 180,align:"center"}
                        , { field: 'certificateNo', title: '证书编号', sort: true }
                        , { field: 'unitName', title: '发证机构', sort: true ,width: 180,align:"center" }
                        , {
                            field: 'checkState', title: '审核状态', sort: true,
                            templet: function (data) {
                                let checkStateText;
                                switch (data.checkState) {
                                    case "0":
                                        checkStateText = "未审核";
                                        break;
                                    case "1":
                                        checkStateText = "审核通过";
                                        break;
                                    case "2":
                                        checkStateText = "审核不通过";
                                        break;
                                    default:
                                        break;
                                }
                                return checkStateText;
                            }
                        }
                    ]],
                    cellMinWidth: 100,
                    id: "cmeProvinceProjScoreList",
                    height: 'full-170',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if(res.status === 200){
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "count": res.data.recordsTotal, //解析数据长度
                                "data": res.data.records, //解析数据列表
                                "page": res.data.pageNum, //当前页
                                "limit": res.data.pageSize, //每页条数
                            }
                        }else{
                            layer.msg("请求失败");
                            console.log(res);
                        }
                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };
            // 初始化表格
            loaderTable();

            // 监听头部新增按钮
            table.on('toolbar(cmeProvinceProjScoreList)', function (obj) {
                debugger
                // document.getElementById("form-addScore").reset();
                $("#form-addScore")[0].reset();
                if (obj.event == 'add') {
                    layer.open({
                        type: 1,
                        title: '新增学分',
                        content: $('#addScore'),
                        skin: '',
                        area: ['760px', '500px'],
                    })
                }
                // return false;
            });

            // 身份证校验
            $('input[id=certIdInput]').change(function(e) {
                var certId = e.delegateTarget.value;
                if (isCertId(certId) == false) {
                    layer.msg('请输入正确的身份证号', { icon: 5 });
                    return false;
                }
            });
            // 提交学分信息
            form.on('submit(submitScore)', function (data) {
                // 身份证校验
                if (isCertId(data.field.certId) == false) {
                    layer.msg('请输入正确的身份证号', { icon: 5 });
                    return false;
                }
                // 用于判断是新增还是修改
                var scoreId = data.field.scoreId;
                data.field.unitId = unitId;
                data.field.cmeStandardKindId = cmeStandardKindId;
                var datas = JSON.stringify(data.field);
                var msg;
                var URL;
                if (scoreId === '' || scoreId === undefined) {
                    // 走新增逻辑
                    URL = huayi_projectscore_url + 'cmeProvinceProjScore/save';
                    msg = '新增学分信息成功';
                } else {
                    // 走修改逻辑
                    URL = huayi_projectscore_url + 'cmeProvinceProjScore/update';
                    msg = '修改学分信息成功';
                }
                $.ajax({
                    type: 'post',
                    url: URL,
                    data: datas,
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    success: function (res) {
                        if (res.status === 200) {
                            $("#form-addScore")[0].reset();
                            // layer.close(layer.index);
                            layer.closeAll();
                            layer.msg(msg);
                            table.reload('cmeProvinceProjScoreList');
                        } else if (res.status === 500) {
                            layer.msg(res.msg);
                        }
                        console.log(layer.index);
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
                return false;
            });

            table.on('tool(cmeProvinceProjScoreList)', function (obj) {
                var datas = obj.data;
                if (obj.event === 'edit') {
                    // $('#submitScore').css("display", "inline-block");

                    $.ajax({
                        url      : huayi_projectscore_url + 'cmeProvinceProjScore/relation/' + datas.scoreId,
                        type     : 'get',
                        dataType : 'json',
                        success  : res => {
                            if (res.status == '200') {
                                form.val('add-score', res.data);
                                form.render('select');
                                layer.open({
                                    type    : 1,
                                    title   : '修改学分',
                                    content : $('#addScore'),
                                    skin    : '',
                                    area    : [ '760px', '500px' ],
                                });
                            } else {
                                layer.msg('获取学分信息失败');
                            }
                        },
                        error    : (xhr, status, error) => {
                            layer.msg('网络异常，请稍后后再试');
                        }
                    });

                    // form.val('add-score', datas);
                    // form.render('select');
                    // layer.open({
                    //     type: 1,
                    //     title: '修改学分',
                    //     content: $('#addScore'),
                    //     skin: '',
                    //     area: ['760px', '500px'],
                    // })

                } else if (obj.event === 'del') {
                    layer.confirm('确认删除', { icon: 3, title: '提示' }, function () {
                        $.ajax({
                            type: 'get',
                            url: huayi_projectscore_url + 'cmeProvinceProjScore/delete',
                            data: {
                                scoreId: obj.data.scoreId
                            },
                            contentType: 'application/json;charset=UTF-8',
                            dataType: 'json',
                            success: function (res) {
                                if (res.status === 200) {
                                    layer.msg("删除成功");
                                    table.reload('cmeProvinceProjScoreList');
                                }
                            }
                        });
                    })

                }
            });
            // 加载学分级别
            $.ajax({
                type: "get",
                url: huayi_sjwh_url + "cmeCommonConfig",
                dataType: 'json',
                data: {
                    configDictId: configDictId,
                    cmeStandardKindId: cmeStandardKindId
                },
                success: function (data) {
                    $.each(data.data, function (index, item) {
                        $('#scoreLevel').append(new Option(item.configValue, item.scoreLevelId));//往下拉菜单里添加元素
                    })
                    form.render('select'); //刷新select选择框渲染
                },
                error: function (data) {
                    layer.msg("响应失败");
                }
            });
            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }
        });
    </script>
</body>

</html>
