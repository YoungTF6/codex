<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>职称修改控制</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="../../js/layui-v2.6.8/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/layui-v2.6.8/layui/layui.js"></script>
    <script type="text/javascript" src="../../js/tools/verification.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../js/global_ajax_setting.js"></script>

    <style>
        .layui-layer-content {
            overflow: visible !important;
        }

        .tab_others {
            width: 100px !important;
        }

        .tab_this {
            width: 100px !important;
        }

        .layui_mess {
            display: flex;
            justify-content: space-between;
        }

        .layui_display {
            flex: 1 auto;
        }

        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
        }

        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            border-bottom: 1px solid #F5F5F5;
        }

        .layui-table-tool-temp {
            padding-right: 10px;
        }
    </style>
</head>

<body style="background: #fff;">
    <div class="layui-fluid">
        <div class="layui-card">
            <!--        搜索框区域-->
            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width: 120px;">单位编号</label>
                            <div class="layui-input-inline">
                                <input type="text" name="unitId" id="unitId" placeholder="单位编号" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width: 120px;">单位名称</label>
                            <div class="layui-input-inline">
                                <input type="text" name="unitName" id="unitName" placeholder="单位名称" autocomplete="off" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width: 120px;">往年职称修改状态</label>
                            <div class="layui-input-inline">
                                <select name="titleUpdateState" lay-filter="titleUpdateState" id="titleUpdateState" lay-verify="1">
                                    <option value="">全部</option>
                                    <option value="true">允许</option>
                                    <option value="false">不允许</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label" style="width: 120px;">职称降级修改状态</label>
                            <div class="layui-input-inline">
                                <select name="titleDemotionState" lay-filter="titleDemotionState" id="titleDemotionState" lay-verify="1">
                                    <option value="">全部</option>
                                    <option value="true">允许</option>
                                    <option value="false">不允许</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="layui-card-body layui_body_box">
                <table class="layui-table" id="titleUpdateConfigList" lay-filter="titleUpdateConfigList" style="margin: 0px 0px;">
                </table>
            </div>
        </div>
    </div>

    <!--        添加弹窗-->
    <div id="addConfig" style=" display:none;">
        <form class="layui-form" style="padding: 30px;" id="form-addConfig" lay-filter="add-score">
            <div class="layui-form-item" style="display: none">
                <div class="layui-inline">
                    <label class="layui-form-label">主键</label>
                    <div class="layui-input-block">
                        <input type="text" name="id" autocomplete="off" class="layui-input">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label" style="width: 120px;">往年职称修改状态</label>
                    <div class="layui-input-inline">
                        <input type="radio" name="canModifyPreYearTitle" value="true" title="允许" checked="">
                        <input type="radio" name="canModifyPreYearTitle" value="false" title="不允许">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label" style="width: 120px;">职称降级修改状态</label>
                    <div class="layui-input-inline">
                        <input type="radio" name="canReduceCurYearTitle" value="true" title="允许" checked="">
                        <input type="radio" name="canReduceCurYearTitle" value="false" title="不允许">
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label" style="width: 110px;">
                        <span color="red">*&nbsp;</span>选择生效单位
                    </label>
                    <div class="layui-input-inline" style="width: 200px;">
                        <input type="text" id="unitTreeSelect" name="unitId" lay-filter="unitTreeSelect" autocomplete="off" class="layui-input" readonly="true">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label" style="width: 110px;">
                        <span color="red">*&nbsp;</span>选择失效时间
                    </label>
                    <div class="layui-input-inline" style="width: 200px;">
                        <input type="text" name="expirationTime" id="expirationTime" autocomplete="off" class="layui-input" lay-verify="" placeholder="请选择">
                    </div>
                </div>
            </div>
            <div class="layui-form-item" id="submitScore" style="padding-top: 40px;">
                <div style="text-align: center;">
                    <button class="layui-btn" lay-submit  lay-filter="submitScore">保存</button>
                    <button id="closeBtn" type="close" class="layui-btn layui-btn-primary">关闭</button>
                </div>
            </div>

        </form>
    </div>

    <!--表格内数据编辑、删除按钮-->
    <script type="text/html" id="rowBar">
        {{# if(d.canModifyPreYearTitle == true || d.canReduceCurYearTitle == true  ){ }}
        <a class="layui-btn layui-btn-xs" lay-event="close" style="color: #27b1a2;background-color: transparent;">关闭</a>
        {{# }else{ }}
        {{# } }}
    </script>
    <script type="text/html" id="bar">
        <a class="layui-btn layui-btn-sm" lay-event="add"><i class="layui-icon layui-icon-add-1"></i>添加</a>
    </script>
    <script>
        layui.config({
            base: '../../js/layui/ext/'
        })
        layui.use(['table', 'form', 'element', 'laydate', 'treeSelect'], function () {
            var $ = layui.jquery, table = layui.table, element = layui.element, form = layui.form,
                laydate = layui.laydate, layer = layui.layer, treeSelect = layui.treeSelect;

            var unitId = localStorage.getItem("unit-id")
                , unitName = localStorage.getItem("unit-name")
                , managerId = localStorage.getItem("manager-id")
                , standardkindId = localStorage.getItem("standardkind-id");
            var managerName = '', managerPhone = '';


            function min() {
                var nowDate = new Date();
                return nowDate.getFullYear() + "-" + (nowDate.getMonth() + 1) + "-" + nowDate.getDate();
            }
            laydate.render({
                elem: '#expirationTime',
                type: 'datetime',
                min: min()
            });

            // 表格配置
            window.loaderTable = function () {
                table.render({
                    elem: '#titleUpdateConfigList',
                    url: huayi_sjwh_url + 'cmeUpdateCmePersonOnTitleConfig/list',
                    toolbar: '#bar',
                    defaultToolbar: [],
                    where: {
                        unitId: $('#unitId').val(),
                        unitName: $('#unitName').val(),
                        canModifyPreYearTitle: $('#titleUpdateState').val(),
                        canReduceCurYearTitle: $('#titleDemotionState').val(),
                        cmeStandardKindId: standardkindId,
                        setUnitId: unitId
                    },
                    cols: [[ //表头
                        { field: 'id', title: 'ID', hide: 'true' }
                        , { align: 'center', toolbar: '#rowBar', width: 70, title: '操作' }
                        // , { align: 'center', width: 120, toolbar: '#rowBar', title: '操作' }
                        , { field: 'unitId', title: '单位编号', align: 'center', width: 90 }
                        , { field: 'unitName', title: '单位名称', align: 'center', width: 180, align: "center" }
                        , {
                            field: 'canModifyPreYearTitle', title: '往年职称修改状态', align: 'center', width: 150,
                            templet: function (data) {
                                let checkStateText;
                                switch (data.canModifyPreYearTitle) {
                                    case true:
                                        checkStateText = "允许";
                                        break;
                                    case false:
                                        checkStateText = "不允许";
                                        break;
                                    default:
                                        checkStateText = "";
                                        break;
                                }
                                return checkStateText;
                            }
                        }
                        , {
                            field: 'canReduceCurYearTitle', title: '职称降级修改状态', align: 'center', width: 150,
                            templet: function (data) {
                                let checkStateText;
                                switch (data.canReduceCurYearTitle) {
                                    case true:
                                        checkStateText = "允许";
                                        break;
                                    case false:
                                        checkStateText = "不允许";
                                        break;
                                    default:
                                        checkStateText = "";
                                        break;
                                }
                                return checkStateText;
                            }
                        }
                        , { field: 'expirationTime', title: '失效时间', align: 'center', width: 160, align: "center" }
                        , { field: 'setUserName', title: '操作账号', align: 'center', width: 190, align: "center" }
                        , { field: 'setManagerName', title: '操作人姓名', align: 'center', width: 120, align: "center" }
                        , { field: 'setManagerMobile', title: '操作人手机号码', align: 'center', width: 160, align: "center" }
                        , { field: 'addTime', title: '操作时间', align: 'center', width: 160, align: "center" }
                    ]],
                    cellMinWidth: 90,
                    id: "titleUpdateConfigList",
                    height: 'full-170',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function (res) {
                        if (res.status === 200) {
                            return {
                                "code": res.status === 200 ? 0 : res.status, //解析接口状态
                                "msg": res.message, //解析提示文本
                                "count": res.data.recordsTotal, //解析数据长度
                                "data": res.data.records, //解析数据列表
                                "page": res.data.pageNum, //当前页
                                "limit": res.data.pageSize, //每页条数
                            }
                        } else {
                            layer.msg("请求失败");
                            console.log(res);
                        }
                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };
            // 初始化表格
            loaderTable();

            // 监听头部新增按钮
            table.on('toolbar(titleUpdateConfigList)', function (obj) {
                // 初始化
                loadUnitTree(unitId);

                $("#form-addConfig")[0].reset();
                if (obj.event == 'add') {
                    layer.open({
                        type: 1,
                        title: '新增职称修改配置',
                        content: $('#addConfig'),
                        skin: '',
                        area: ['80%', '60%'],
                    })
                }
                // return false;
            });

            table.on('tool(titleUpdateConfigList)', function (obj) {
                // 获取管理员信息, 以保存操作记录
                if(managerName == ''){
                    getManagerById();
                }
                var datas = obj.data;
                datas.canModifyPreYearTitle = false;
                datas.canReduceCurYearTitle = false;
                datas.setManagerName = managerName;
                datas.setManagerMobile = managerPhone;
                console.log(datas);
                if (obj.event === 'close') {
                    layer.confirm('确认关闭', { icon: 3, title: '提示' }, function () {
                        datas.validState = false;
                        $.ajax({
                            url: huayi_sjwh_url + 'cmeUpdateCmePersonOnTitleConfig/update',
                            type: 'post',
                            data: JSON.stringify(datas),
                            contentType: 'application/json;charset=UTF-8',
                            dataType: 'json',
                            success: res => {
                                if (res.status == '200') {
                                    layer.msg('关闭成功')
                                    table.reload('titleUpdateConfigList');
                                } else {
                                    layer.msg('获取职称修改配置信息失败');
                                }
                            },
                            error: (xhr, status, error) => {
                                layer.msg('网络异常，请稍后后再试');
                            }
                        });
                    })
                }
            });

            // 提交职称修改配置信息
            form.on('submit(submitScore)', function (data) {
                layer.confirm("确认要添加此配置吗？", { icon: 3, title: '提示' },  function () {
                    // 获取管理员信息, 以保存操作记录
                    if(managerName == ''){
                        getManagerById();
                    }
                    var treeObj = treeSelect.zTree('unitTreeSelect');
                    var selected = treeObj.getSelectedNodes();
                    if (selected.length > 0) {
                        data.field.unitName = selected[0].name;
                    }
                    data.field.setUnitId = unitId;
                    data.field.setUserName = unitName;
                    data.field.cmeStandardKindId = standardkindId;
                    data.field.setManagerName = managerName;
                    data.field.setManagerMobile = managerPhone;
                    console.log(data.field);
                    var datas = JSON.stringify(data.field);
                    $.ajax({
                        type: 'post',
                        url: huayi_sjwh_url + 'cmeUpdateCmePersonOnTitleConfig/save',
                        data: datas,
                        contentType: 'application/json;charset=UTF-8',
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.closeAll();
                                layer.msg('添加成功');
                                table.reload('titleUpdateConfigList');
                            } else if (res.status === 500) {
                                layer.msg(res.msg);
                            }
                        },
                        error: function () {
                            layer.msg("发送请求失败");
                        }
                    })
                });
                return false;
            });

            // 获取管理员信息
            var getManagerById = function (){
                $.ajax({
                    type: 'get',
                    url: huayi_permission_url + 'comUserManager/getManagerById',
                    data: {
                        managerId: managerId
                    },
                    contentType: 'application/json;charset=UTF-8',
                    dataType: 'json',
                    async: false,
                    success: function (res) {
                        if (res.status === 200) {
                            managerName = res.data.userRealName;
                            managerPhone = res.data.userPhone;
                        } else if (res.status === 500) {
                            layer.msg('获取管理员信息失败')
                            console.log(res.msg);
                        }
                    },
                    error: function () {
                        layer.msg("发送请求失败");
                    }
                })
            }

            //获取下级机构树
            var loadUnitTree = function (unitId) {
                var loading = layer.msg('加载中', { icon: 16, shade: 0.3, time: 0 });
                treeSelect.destroy('unitTreeSelect');
                treeSelect.render({
                    elem: '#unitTreeSelect',
                    data: huayi_personorg_url + 'comunit/childrenAllTreeRedis?unitId=' + unitId,
                    headers: {
                        'Authorization': localStorage.getItem('token'),
                        'KJPT-USER-ID': localStorage.getItem('user-id')
                    },
                    type: 'get',
                    search: true,
                    success: function (res) { layer.close(loading); },
                    fail: function (res) { layer.close(loading); }
                });
            }
            // Esc关闭弹窗
            window.onkeyup = function (ev) {
                var key = ev.keyCode || ev.which;
                if (key == 27) {
                    layer.close(layer.index);
                    console.log('layer.index = ' + layer.index)
                }
            }
        });
    </script>
</body>

</html>
