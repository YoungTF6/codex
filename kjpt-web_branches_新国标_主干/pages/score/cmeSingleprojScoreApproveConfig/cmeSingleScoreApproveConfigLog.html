<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>个人活动学分-审批流程配置</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8"/>
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <script type="text/javascript" src="/js/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>
    <link rel="stylesheet" href="/css/communal.css" media="all">
    <script type="text/javascript" src="/js/api/manage.js"></script>
    <!--    请求路径配置-->
    <script type="text/javascript" src="/js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="/js/global_ajax_setting.js"></script>
    <style>
        #addConfigBox .layui-inline {
            width: 50%;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-card">
        <!--        搜索框区域-->
        <!-- <div class="layui-form layui-card-header layuiadmin-card-header-auto">
            <blockquote class="layui-form layui-form-item layui-elem-quote one-btn" lay-filter="query-form">

                <div class="layui-inline">
                    <label class="layui-form-label">最高机构</label>
                    <div class="layui-input-block">
                        <input type="text" name="topUnitId" id="topUnitIdSearch" readonly autocomplete="off" class="layui-input">
                    </div>
                </div>

                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm btn-search" id="searchBtn" onclick="loaderTable()" lay-filter="table-search" data-type="reload">
                        <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
                    </a>
                </div>
            </blockquote>
        </div> -->

        <!--表格区域-->
        <div class="layui-card-body layui_body_box">
            <table class="layui-table" id="configDictTable" lay-filter="configDictTable" style="margin: 0px 0px;"></table>
        </div>

        <!--        添加弹窗-->
        <div id="addConfigBox" style=" display:none;text-align: center">
            <form class="layui-form" style="padding: 30px;" id="configForm" lay-filter="add-filter">
                <input type="hidden" name="configId" autocomplete="off" class="layui-input">
                <input type="hidden" name="cmeStandardKindId" autocomplete="off" class="layui-input">
                <input type="hidden" name="topUnitId" autocomplete="off" class="layui-input">
                <input type="hidden" name="configDictId" autocomplete="off" class="layui-input">
                <input type="hidden" name="configDictCode" autocomplete="off" class="layui-input">
                
                <div class="layui-form-item">
                    <div class="layui-inline" style="width: 400px;text-align: left;">
                        <input type="radio" name="configValue" value="1" title="学员录入学分->科室管理员审核->单位管理员审核" checked><br>
                        <input type="radio" name="configValue" value="0" title="学员录入学分->单位管理员审核">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-sm" id="closeConfigFormBtn" style="margin-left:10px;">关闭</button>
                        <button class="layui-btn layui-btn-sm" lay-submit lay-filter="submit">保存</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="text/html" id="bar">
    <span style="color:#31BDEC" id="cmeSingleScoreApprove"></span><br>
    <a class="layui-btn layui-btn-sm layui-btn-radius" lay-event="add">设置个人活动审核流程</a>
</script>
<script>
    // 全局配置及引入相关的模块
    layui.config({
        base : '/js/layui/ext/'
    }).extend({
        treeSelect  :   'treeSelect',
        tool        :   'tool'
    });

    layui.use(['table', 'form','upload','tool','treeSelect'], function () {
        var table = layui.table,form = layui.form,$ = layui.jquery;
        var layer = layui.layer,tool=layui.tool,treeSelect=layui.treeSelect;
        let ajaxNum =0,loading=null;
        let configDictObj = {},standardKindIdObj={};
        let nowTopUnitId = null;

        let standardkindId = localStorage.getItem("standardkind-id");
        let unitId = localStorage.getItem("unit-id");
        let userId = localStorage.getItem("user-id");
        let managerId = localStorage.getItem("manager-id");
        let configName = "fun_dept_check_singleproj_score";
        let configMap = {};

        //关闭closeLoading的判断
        let closeLoading = function(){
            ajaxNum--;
            if(ajaxNum<=0 && loading) layer.close(loading);
        }
        //打开加载
        let openLoading = function(){
            if(ajaxNum == 0) loading = layer.msg('加载中', {icon: 16, shade: 0.3, time:0});
            ajaxNum ++;
        }
        //公共ajax
        let commonAjax = function(type="get",url,data,failFun,successFun){
            openLoading();
            $.ajax({
                type    :   type,
                url     :   url,
                data    :   data,
                success :   function (res) {
                    closeLoading();
                    if(res.status != 200) {
                        layer.msg(res.msg);
                        return;
                    }
                    successFun(res);
                },
                error    :   function(res){
                    closeLoading();
                    failFun();
                }
            });
        }
        // 表格配置
        window.loaderTable = function () {
            table.render({
                elem: '#configDictTable',
                url: huayi_sjwh_url + 'cmeCommonConfigLog/getConfigLog',
                title: '日志',
                defaultToolbar: [],
                where: {
                    topUnitId: unitId,
                    cmeStandardKindId: standardkindId,
                    configCode: configName
                },
                cols: [[
                    {field: 'addTime', title: '操作时间 ',align: 'center',sort: true},
                    {field: 'flowPath', title: '对应流程',minWidth:160,align: 'center'},
                    {field: 'userRealName', title: '操作用户',minWidth:160,align: 'center'},
                ]],
                toolbar: '#bar',
                id: "commonConfigDict",
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }
                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                },
                done:function(res,curr,count){
                    curr > 1 && res.data.length === 0 && loaderTable();
                }
            });
        };
        
        // 监听头部新增按钮
        table.on('toolbar(configDictTable)', function (obj) {
            if(!tool.isEmpty(configMap[configName])) {
                $("input[name='configValue'][value='" + configMap[configName] + "']").prop("checked", true);
                form.render('radio');
            }
            getApprovalStep();
            openFormWindow();
        });

        //新增，编辑时打开弹窗
        let openFormWindow = function(data=null){
            data!=null && form.val("add-filter",data);
            layer.open({
                type: 1,
                title: "设置学分审核流程",
                content: $('#addConfigBox'),
                area: ['50%', '50%'],
                cancel: function(index, layero){ $("#configForm")[0].reset(); }
            })
        }



        // form表单相关操作
        // 表单提交
        form.on('submit(submit)', function (data) {
            var configId = $("#configForm input[name='configId']").val();
            let URL = huayi_sjwh_url + 'cmeCommonConfig/update';
            if(configId=="" || configId==null) {
                URL = huayi_sjwh_url + 'cmeCommonConfig/save';
            }
            $.ajax({
                type: 'post',
                url: URL,
                data:JSON.stringify(data.field),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.status == 200){
                        saveLog(data.field.configValue);
                        layer.closeAll();
                        loaderTable();
                        getTabConfig();
                        $("#configForm")[0].reset()
                        layer.msg("保存成功");
                    }else{
                        layer.msg(res.msg);
                    }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
            return false;
        });

         //ajax获取配置信息
        let getTabConfig = function () {
            let tempConfigUrl = huayi_sjwh_url + `cmeCommonConfig/getConfigByUnitFromRedis?unitId=${unitId}&configNames=${configName}`;
            commonAjax("post",tempConfigUrl,{},function(){},
                function(res) {
                    if(res.status == 200) {
                        configMap = res.data;
                        if (configMap[configName] == "1") {
                             $("#cmeSingleScoreApprove").text("当前个人活动学分审核流程为：个人->科室->单位");
                        } else if (configMap[configName] == "0") {
                             $("#cmeSingleScoreApprove").text("当前个人活动学分审核流程为：个人->单位");
                        } else {
                             $("#cmeSingleScoreApprove").text("当前个人活动学分审核流程未设置");
                        }
                    }else{
                        layer.msg("加载配置信息失败");
                    }
                }
            )
        }
        //配置字典
        let configDictInit = function(){
            commonAjax('get',huayi_sjwh_url +"cmeCommonConfigDict",{},
                function(){layer.msg("配置字典加载失败");},
                function(res){
                    for(let tempObj of res.data){
                        if(tempObj.configDictCode == configName){
                            $('#configForm input[name="configDictId"]').val(tempObj.keyId);
                            $('#configForm input[name="configDictCode"]').val(tempObj.configDictCode);
                            break;
                        }
                    }
                });
        }
        //获取当前流程
        let getApprovalStep = function(){
            let configDictId = $('#configForm input[name="configDictId"]').val();
            commonAjax('get',huayi_sjwh_url +"cmeCommonConfig/list",{cmeStandardKindId:standardkindId,configDictId:configDictId,pageNum: 1,pageSize: 99999},
                function(){layer.msg("加载失败");},
                function(res){
                    if(res.status == 200) {
                        for(let tempObj of res.data.records){
                            if (tempObj.topUnitId == unitId) {
                                $("#configForm input[name='configId']").val(tempObj.configId);
                                break;
                            }
                        }
                    }
                });
        }

        //保存日志
        let saveLog = function (configValue) {
            let data = {
                userId: userId,
                managerId: managerId,
                cmeStandardKindId: standardkindId,
                topUnitId: unitId,
                flowPath: configValue == "1" ? "学员录入学分->科室管理员审核->单位管理员审核" : "学员录入学分->单位管理员审核",
                configCode: configName,
                configValue: configValue
            };
            $.ajax({
                type: 'post',
                url: huayi_sjwh_url + 'cmeCommonConfigLog/saveConfigLog',
                data:JSON.stringify(data),
                contentType: 'application/json;charset=UTF-8',
                dataType: 'json',
                success: function (res) {
                    if(res.status == 200){
                    }
                },
                error: function () {
                    layer.msg("发送请求失败");
                }
            })
        }

        //页面初始化
        let htmlInit = function(){
            configDictInit();
            getTabConfig();
            loaderTable();
            $('#configForm input[name="cmeStandardKindId"]').val(standardkindId);
            $('#configForm input[name="topUnitId"]').val(unitId);
            $('#configForm input[name="userId"]').val(userId);
        }

        htmlInit();

    });

</script>
</body>
</html>
