<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="renderer" content="webkit">

    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">

    <script type="text/javascript" src="../../../js/api/cpt.js"></script>

    <script type="text/javascript" src="../../../js/constant.js"></script>
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <script type="text/javascript" src="../../../js/common.js"></script>

        .tab_others {

            background-color: #f5f5f5;color:#404040;margin-left: 6px;

<body style="background-color: white;">

<div class="layui-fluid">
    <div class="layui-card">
        <!-- 搜索框区域-->
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
            <div class="layui_mess">
                <div class="layui_display">
                <div class="layui-inline">
                    <label class="layui-form-label">申请年份</label>
                    <div class="layui-input-block">
                        <select name="applyYear" id="applyYear"  lay-filter="loadReport">
                        </select>
                      </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">申请原因</label>
                    <div class="layui-input-block">
                        <select name="applyReason" id="applyReason">
                            <option value="">全部</option>
                            <option value="1">病假（三个月以内）</option>
                            <option value="2">孕产假（三个月以内）</option>
                            <option value="3">工作原因延误培训</option>
                            <option value="4">其它情况</option>
                        </select>
                      </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">人员编号</label>
                    <div class="layui-input-block">
                        <input type="text" name="personNo" id="personNo" placeholder="请填写人员编号" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">人员姓名</label>
                    <div class="layui-input-block">
                        <input type="text" name="personName" id="personName" placeholder="请填写人员姓名" autocomplete="off"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">审核状态</label>
                    <div class="layui-input-block">
                        <select name="checkState" id="checkState">
                            <option value="">全部</option>
                            <option value="0">待审核</option>
                            <option value="1">审核通过</option>
                            <option value="2">审核不通过</option>
                            <option value="3">退回修改</option>
                        </select>
                      </div>
                </div>
            </div>
            <div class="layui_display">
                <div class="layui-inline">
                    <a class="layui-btn layui-btn-sm" lay-submit lay-filter="search">
                      <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!--  表格区域-->
    <div class="layui-card-body layui_body_box">
        <div class="layui-tab-content">
            <div class="layui-tab-item layui-show">
                <table class="layui-table" id="score" lay-filter="score" style="margin: 0px 0px;"></table>
            </div>
        </div>
    </div>
</div>

<!--表格内数据编辑、删除按钮-->
<script type="text/html" id="rowBar">
    {{# if( d.checkState==0 ){}}
        <a class="layui-btn layui-btn-xs" lay-event="checkPass" style="color: #27b1a2;background-color: transparent;">通过</a>
        <a class="layui-btn layui-btn-xs" lay-event="checkNoPass" style="color: #f25643;background-color: transparent;">不通过</a>
        <a class="layui-btn layui-btn-xs" lay-event="sendBack" style="color: #ffb82e;background-color: transparent;">退回修改</a>
    {{# }}}
</script>
<script type="text/html" id="bar">
    <input type="checkbox" name="like1[read]" id="checkboxCurrent"  lay-filter="checkboxCurrent" title="本页全选">
    <!-- <input type="checkbox" name="like1[read]" id="checkboxAll"  lay-filter="checkboxAll" title="所有全选"> -->
    <button class="layui-btn layui-btn-sm btnRounded" lay-event="AllCheckPass" style="width: 80px;">审核通过</button>
    <button class="layui-btn layui-btn-sm layui-btn-danger" lay-event="AllCheckNoPass" style="width: 80px;">审核不通过</button>
    <button class="layui-btn layui-btn-sm layui-btn-warm" lay-event="AllsendBack" style="width: 80px;">退回修改</button>
    <br>
    <div style="color:#fb5c5c;line-height: 20px;display: inline-flex;margin-top: 10px;">
        申请原因说明：1.病休（三个月以内）：提供符合病休要求的相关证明，例如单位盖章的病休通知单或其他病休证明。2.孕产假（三个月以内）：提供符合孕产假的相关证明，例如单位盖章的孕产假审批单或其他证明。3.工作原因延误培训：提供由单位递交学员参加本单位重点工作的相关佐证材料。4.其它情况：需提供经主管部门审核认定的相关佐证材料。
    </div>
</script>

<script>

    // 全局配置及引入相关的模块
    layui.use(['table', 'form','element'], function () {
        var table = layui.table;
        var form = layui.form;
        var $ = layui.jquery;
        var layer = layui.layer;
        var element = layui.element;
        var unitId= localStorage.getItem("unit-id");
        var my = new Date();
        var cmeStandardKindId = localStorage.getItem("standardkind-id");
        var debounceTime=1500;//防抖时间

        $(function () {
            ddlList();
            loaderTable();

        });
        window.colArray=[
            {   //这里使用layui给我们提供的自定义模版功能来达到checkbox控制效果
                field:'CheckCustom' ,title:'选择',align: 'center',width:80,templet:function (d) {
                    var templateHtml = ' <input type="checkbox" name="layTableCheckbox" lay-skin="primary" value="'+d.applyScoreId+'"><i class="layui-icon"></i>';
                    return d.checkState != "0"  ?'已审核':templateHtml
                        
            }},
            {field: 'center', width: 200, toolbar: '#rowBar', title: '操作',align:'center'},
            { field: 'personNo', title: '人员编号', sort: true, align: 'center' },
            { field: 'personName', title: '人员姓名', sort: true, align: 'center' },
            { field: 'applyTime', title: '申请时间', sort: true, align: 'center' },
            { field: 'checkTime', title: '审核时间', sort: true, align: 'center' , templet:function (d) {
                    if(d.checkState == "0"){
                        return "";
                    }
                    return d.checkTime;
            }},
            { field: 'checkState', title: '审核状态', sort: true, align: 'center', templet:function (d) {
                    if(d.checkState == "0"){
                        return "待审核";
                    } else if(d.checkState == "1"){
                        return "审核通过";
                    } else if(d.checkState == "2"){
                        return "审核不通过";
                    } else if(d.checkState == "3"){
                        return "退回修改";
                    }
                    return "";
                        
            }},
            { field: 'checkOpinion', title: '审核意见', sort: true, align: 'center', templet:function (d) {
                    if(d.checkState == "0"){
                        return "";
                    }
                    return d.checkOpinion==null?"":d.checkOpinion;
            }},
            { field: 'scorePhono', title: '学分证明照片', sort: true, align: 'center', templet:function (d) {
                    if(d.filePath != null && d.filePath != ""){
                        return `<a onclick="window.open('${d.filePath}')" style="color: #27b1a2;">查看</a>`;
                    }
                    return "";
                        
            }}
        ];


// 表格相关操作
        // 表格配置
        function loaderTable() {
            window.mainTable = table.render({
                elem: '#score',
                url: huayi_projectscore_url + 'cmeApplyRemoteScore/list',
                title: '审核补录学分申请',
                method: 'get',
                defaultToolbar: [],
                toolbar: '#bar',
                where: {
                    applyYear: $('#applyYear').val(),
                    personNo: $('#personNo').val(),
                    personName: $('#personName').val(),
                    applyReason: $('#applyReason').val(),
                    checkState: $('#checkState').val(),
                    checkUnit: localStorage.getItem("unit-id")
                },

                cols:[
                    window.colArray
                ],
                done:function(res, curr, count){
                    for(var i = 0;i<res.data.length;i++){
                        var state = res.data[i].checkState; //根据status状态判断，不为0时，禁止勾选
                        var checkallinfo=$("#checkboxAll").is(":checked");
                        var checkboxCurrent=$("#checkboxCurrent").is(":checked");
                        var templateHtml ="";
                        //如果全选
                        if (checkallinfo || checkboxCurrent){
                            var index = res.data[i]['LAY_TABLE_INDEX'];
                            if(state==0)
                            {
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").prop('checked',true);
                                $(".layui-table tr[data-index="+index+"] input[type='checkbox']").next().addClass('layui-form-checked');
                            }
                        }
                        // layui表格单元格设置高度自适应后, 设置为fixed的表格列的高度无法自适应的处理
                        $(".layui-table-main tr").each(function(index, val) {
                            $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                        });
                    }
                },
                cellMinWidth: 100,
                id: "score",
                height: 'full-150',
                page: true,
                limit: 10,
                limits: [10, 50, 100, 150, 200],
                parseData: function (res) {
                    return {
                        "code": res.status === 200 ? 0 : res.status, //解析接口状态
                        "msg": res.message, //解析提示文本
                        "count": res.data.recordsTotal, //解析数据长度
                        "data": res.data.records, //解析数据列表
                        "page": res.data.pageNum, //当前页
                        "limit": res.data.pageSize, //每页条数
                    }

                },
                request: {
                    pageName: 'pageNum', //页码的参数名称，默认：page
                    limitName: 'pageSize' //每页数据量的参数名，默认：limit
                }
            });
        };

        $(".tab_others").on("click", function () {
            var index = $(this).index();
             $(this).addClass("tab_this").siblings().removeClass("tab_this");

        });

        table.on('sort(score)', function(obj){ //sort 是工具条事件名
                //如果你的表格列表里有设置排序sort, 需要添加一个sort监听事件, 根据单元格内容的高度重新计算表格的行高
                $(".layui-table-main tr").each(function(index, val) {
                    $($(".layui-table-fixed .layui-table-body tbody tr")[index]).height($(val).height());
                });
            });
        

        // 监听头部按钮
        table.on('toolbar(score)', function (obj) {
            var datas = obj.data;
            if (obj.event === 'AllCheckPass' || obj.event === 'AllCheckNoPass' || obj.event === 'AllsendBack') {
                //审核项目 判断是否全选
                var checkallinfo=$("#checkboxAll").is(":checked");
                var applyidList =[];
                var missage="";
                var checkState=1;
                if(obj.event === 'AllCheckPass' ){
                    missage="确定审核通过吗?";
                    checkState=1;
                }else if(obj.event === 'AllCheckNoPass'){
                    missage="确定审核不通过吗?";
                    checkState=2;
                }else{
                    missage="确定退回吗?";
                    checkState=3;
                }
                //TODU  做到了这里  全部审核通过，需要改后端审核接口（需要配合写接口）
                if(checkallinfo){
                    if (obj.event === 'AllCheckPass') {
                        layer.confirm(missage, {icon: 3, title: '提示'}, debounce(function () {
                            $.ajax({
                                type:"post",
                                url: huayi_projectscore_url + "cmeApplyRemoteScore/checkCmeApplyRemoteScore",
                                data:{
                                    applyYear: $('#applyYear').val(),
                                    personNo: $('#personNo').val(),
                                    personName: $('#personName').val(),
                                    applyReason: $('#applyReason').val(),
                                    checkState: checkState,
                                    checkUnit: localStorage.getItem("unit-id"),
                                    checkallinfo: checkallinfo

                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('score');
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            });
                            layer.close(index);
                        },debounceTime))
                    } else {
                        layer.prompt({formType: 2,title: missage},
                            debounce(function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                    layer.close(index);
                                }else{
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url + "cmeApplyRemoteScore/checkCmeApplyRemoteScore",
                                        data:{
                                            applyYear: $('#applyYear').val(),
                                            personNo: $('#personNo').val(),
                                            personName: $('#personName').val(),
                                            applyReason: $('#applyReason').val(),
                                            checkState: checkState,
                                            checkOpinion: value,
                                            checkUnit: localStorage.getItem("unit-id"),
                                            checkallinfo: checkallinfo

                                        },
                                        dataType: 'json',
                                        success: function (res) {
                                            if (res.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('score');
                                            }
                                        },
                                        error: function (res) {
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            },debounceTime)
                        );
                    }
                    
                }else{
                    var child = $("input[name='layTableCheckbox']");
                        child.each(function (index, item) {
                            if(item.checked===true){
                                applyidList.push(item.defaultValue);
                            }
                    });
                    if(applyidList.length == 0){
                        layer.msg("请选择申请");
                        return;
                    }
                    if (obj.event === 'AllCheckPass') {
                        layer.confirm(missage, {icon: 3, title: '提示'}, debounce(function () {
                            $.ajax({
                                type:"post",
                                url: huayi_projectscore_url + "cmeApplyRemoteScore/checkCmeApplyRemoteScore",
                                data:{
                                    applyIds: JSON.stringify(applyidList), 
                                    checkState: checkState

                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("审核成功");
                                        table.reload('score');
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            });
                            layer.close(index);
                        },debounceTime))
                    } else {
                        layer.prompt({formType: 2,title: missage},
                            debounce(function(value, index, elem){
                                if(value.length>100){
                                    layer.alert("最多支持100个汉字");
                                    layer.close(index);
                                }else{
                                    $.ajax({
                                        type:"post",
                                        url: huayi_projectscore_url + "cmeApplyRemoteScore/checkCmeApplyRemoteScore",
                                        data:{
                                            applyIds: JSON.stringify(applyidList), 
                                            checkState: checkState,
                                            checkOpinion: value

                                        },
                                        dataType: 'json',
                                        success: function (res) {
                                            if (res.status === 200) {
                                                layer.msg("审核成功");
                                                table.reload('score');
                                            }
                                        },
                                        error: function (res) {
                                            layer.msg("响应失败");
                                        }
                                    })
                                    layer.close(index);
                                }
                            },debounceTime)
                        );
                    }
                }
            }
        });

        // 监听行内按钮
        table.on('tool(score)', function (obj) {
            var datas = obj.data;
            var applyidList =[];
            applyidList.push(datas.applyScoreId);
            var missage = "";
            var checkState=1;
            if(obj.event === 'checkPass'){
                checkState=1;
                missage="确定审核通过吗?";
            }else if(obj.event === 'checkNoPass'){
                checkState=2;
            }else{
                checkState=3;
            }
            if (obj.event === 'checkPass') {
                layer.confirm(missage, {icon: 3, title: '提示'}, debounce(function () {
                    $.ajax({
                        type:"post",
                        url: huayi_projectscore_url + "cmeApplyRemoteScore/checkCmeApplyRemoteScore",
                        data:{
                            applyIds: JSON.stringify(applyidList),
                            checkState: checkState,
                            checkOpinion: value,
                            checkallinfo: false
                        },
                        dataType: 'json',
                        success: function (res) {
                            if (res.status === 200) {
                                layer.msg("操作成功");
                                table.reload('score');
                            }
                        },
                        error: function (res) {
                            layer.msg("响应失败");
                        }
                    })
                    layer.close(index);
                },debounceTime))   
            } else {
                layer.prompt({formType: 2,title: '审核意见'},
                    debounce(function(value, index, elem){
                        if(value.length>100){
                            layer.alert("最多支持100个汉字");
                            layer.close(index);
                        }else{
                            $.ajax({
                                type:"post",
                                url: huayi_projectscore_url + "cmeApplyRemoteScore/checkCmeApplyRemoteScore",
                                data:{
                                    applyIds: JSON.stringify(applyidList),
                                    checkState: checkState,
                                    checkOpinion: value,
                                    checkallinfo: false
                                },
                                dataType: 'json',
                                success: function (res) {
                                    if (res.status === 200) {
                                        layer.msg("操作成功");
                                        table.reload('score');
                                    }
                                },
                                error: function (res) {
                                    layer.msg("响应失败");
                                }
                            })
                            layer.close(index);
                        }
                    },debounceTime)
                );
            }
            
        });

        // form表单相关操作
        // 监听查询
        form.on('submit(search)', function (data) {
            loaderTable();
        });
        
        //全选
        form.on('checkbox(checkboxAll)', function(data){
            // console.log(data.elem); //得到checkbox原始DOM对象
            // console.log(data.elem.checked); //是否被选中，true或者false
            // console.log(data.value); //复选框value值，也可以通过data.elem.value得到
            // console.log(data.othis); //得到美化后的DOM对象
            if(data.elem.checked){
                $("#checkboxCurrent").prop("checked",false);
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = true;
                });
            }else{
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = false;
                });
            }
            form.render('checkbox');
        });

        //本页全选
        form.on('checkbox(checkboxCurrent)', function(data){
            if(data.elem.checked){
                $("#checkboxAll").prop("checked",false);
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = true;
                });
            }else{
                var child = $("input[name='layTableCheckbox']");
                child.each(function (index, item) {
                    item.checked = false;
                });
            }
            form.render('checkbox');
        });

        //鼠标悬停提示特效
        $("#hint").hover(function () {
            openMsg();
        }, function () {
            layer.close(subtips);
        });

        function openMsg() {
            subtips = layer.tips('提示信息', '#hint', {tips: [1, '#ff6700'], time: 30000});
        }


        function ddlList(){
            let currentYear = (new Date()).getFullYear();
            for (let i = currentYear-1; i >= currentYear - 6; i--) {
                let option = '';
                if (i == currentYear) {
                    option = $('<option value="' + i + '" selected>' + i + '</option>');
                }
                else {
                    option = $('<option value="' + i + '">' + i + '</option>');
                }
                $('#applyYear').append(option);
            }
            form.render('select'); //刷新select选择框渲染
        }

    });

</script>

</body>
</html>
