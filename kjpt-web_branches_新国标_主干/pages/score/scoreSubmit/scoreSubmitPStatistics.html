<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>人社推送成果查询(个人)</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,user-scalable=yes, minimum-scale=0.4, initial-scale=0.8" />
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="https://cdn.91huayi.com/hywupload/common/layui/v121/std/style/admin.css" media="all">
    <!--<script src="https://cdn.91huayi.com/hywupload/common/layui/v121/std/layui/layui.js"></script>-->
    <script type="text/javascript" src="../../../js/jquery-3.5.1.min.js"></script>
    <script type="text/javascript" src="../../../js/layui-v2.6.8/layui/layui.js"></script>

    <!--    请求路径配置-->
    <script type="text/javascript" src="../../../js/constant.js"></script>
    <!--    ajax全局配置-->
    <script type="text/javascript" src="../../../js/global_ajax_setting.js"></script>
    <link rel="stylesheet" href="../../../css/communal.css" media="all">
    <script type="text/javascript" src="../../../js/axios.min.js"></script>
    <style>
        .layui_mess {
            display: flex;
            justify-content: space-between;
        }
        .layui-form-select .layui-input {
            padding-right: 0;
        }

        .tab_others {
            background-color: #009688;
            color: #ffffff;
            margin-left: 6px;
            width: 173px;
        }
        .tab_this {
            background-color: #f5f5f5;
            color: #404040;
            margin-left: 6px;
            width: 173px;
            border-bottom: 1px solid #F5F5F5;
        }

        .layui-card-body.layui_body_box {
            padding: 0 !important;
        }
        .layui-tab-content {
            padding: 0;
        }
    </style>
</head>

<body style="background-color: white;">

    <div class="layui-fluid">
        <div class="layui-card">

            <div class="layui-form layui-card-header layuiadmin-card-header-auto" style="background-color: #f5f5f5;">
                <div class="layui_mess">
                    <div class="layui_display">
                        <div class="layui-inline">
                            <label class="layui-form-label">年度</label>
                            <div class="layui-input-block">
                                <select name="scoreYear" lay-filter="layui-select-year" id="scoreYear" lay-verify="1">
                                    <option value="">全部</option>
                                </select>
                            </div>
                        </div>

                    </div>
                    <div class="layui_display">
                        <div class="layui-inline">
                            <a class="layui-btn layui-btn-sm" id="searchBtn" lay-submit lay-filter="search">
                                <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>查询
                            </a>
                        </div>
                    </div>
                </div>
            </div>


            <!--        表格区域-->
            <div class="layui-card-body layui_body_box">
                <div class="layui-tab-content">
                    <div class="layui-tab-item layui-show">
                        <table class="layui-table" id="personCredit" lay-filter="personCredit" style="margin: 0px 0px;"></table>
                    </div>
                </div>

            </div>
        </div>
    </div>


    <script>
        layui.config({
            base: '../../../js/layui/ext/'
        }).extend({
            treeSelect: 'treeSelect'
        });
        // 全局配置及引入相关的模块
        layui.use(['table', 'form', 'element', 'laydate', 'treeSelect'], function() {
            var table = layui.table;
            var form = layui.form;
            var $ = layui.jquery,laydate = layui.laydate;
            var layer = layui.layer,treeSelect = layui.treeSelect;
            var element = layui.element;
            var usertype=localStorage.getItem("user-type");
            var menuUnitId ;

            $(() => {

                // 年度下拉框
                var date = new Date();
                var year = date.getFullYear();
                var options;
                for (var i = 0; i < 7; i++) {
                    options += '<option value="' + year + '">' + year + '年</option>';
                    year = year - 1;
                }
                $('#scoreYear').append(options);
                form.render('select');
                
                //加载表格
                loaderTable();

            });
        
            window.colArray=[

                    {field: 'scoreYear', title: '年度', sort: true,align: 'center'},
                    {field: 'course', title: '课程名称', sort: true,align: 'center',width: 130},
                    {field: 'personName', title: '姓名', sort: true,align: 'center'},
                    {field: 'unitName', title: '单位', sort: true,align: 'center',width: 120},
                    {field: 'titleName', title: '职称', sort: true,align: 'center'},
                    {field: 'submitStatus', title: '是否上报', sort: true,align: 'center',
                        templet: function (data) {
                            if(data.submitStatus == 1 || data.submitStatus == 2){
                                return '是';
                            } 
                            return '否';
                        }
                    },
                    {field: 'submitDate', title: '上报时间', sort: true,align: 'center'},
                    {field: 'submitStatus', title: '反馈结果', sort: true,align: 'center',
                        templet: function (data) {
                                if(data.submitStatus == 1){
                                    return '上报成功';
                                } 
                                return '上报失败';
                            }
                    },
                    {field: 'errormsg', title: '返回信息', sort: true,align: 'center',width: 160}
                  
            ];


            // 表格相关操作
            // 表格配置
            function loaderTable() {
                menuUnitId = localStorage.getItem("menu-unit-id");
                menuUnitId = menuUnitId == '' || menuUnitId == null ? localStorage.getItem("unit-id") : menuUnitId;
                window.mainTable = table.render({
                    elem: '#personCredit',
                    url: huayi_projectscore_url + 'comNumScoreSubmit/statisticsAll',
                    title: '人社推送表',
                    defaultToolbar: [],
                    where: {
                        scoreYear: $('#scoreYear').val(),

                        cmeStandardKindId: localStorage.getItem("standardkind-id"),
                        userCreate: localStorage.getItem("user-id"),
                        unitId: menuUnitId
                    },

                    cols: [
                        window.colArray
                    ],
                    done:function(res, curr, count){
                        
                    },
                    // toolbar: '#bar',
                    cellMinWidth: 100,
                    id: "personCredit",
                    height: 'full-155',
                    page: true,
                    limit: 10,
                    limits: [10, 50, 100, 150, 200],
                    parseData: function(res) {
                        return {
                            "code": res.status === 200 ? 0 : res.status, //解析接口状态
                            "msg": res.message, //解析提示文本
                            "count": res.data.recordsTotal, //解析数据长度
                            "data": res.data.records, //解析数据列表
                            "page": res.data.pageNum, //当前页
                            "limit": res.data.pageSize, //每页条数
                        }

                    },
                    request: {
                        pageName: 'pageNum', //页码的参数名称，默认：page
                        limitName: 'pageSize' //每页数据量的参数名，默认：limit
                    }
                });
            };

            // 监听查询
            form.on('submit(search)', function (data) {
                loaderTable();
                
            });

             //全选
            form.on('checkbox(checkboxAll)', function(data){
                // console.log(data.elem); //得到checkbox原始DOM对象
                // console.log(data.elem.checked); //是否被选中，true或者false
                // console.log(data.value); //复选框value值，也可以通过data.elem.value得到
                // console.log(data.othis); //得到美化后的DOM对象
                if(data.elem.checked){
                    $("#checkboxCurrent").prop("checked",false);
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = true;
                    });
                }else{
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = false;
                    });
                }
                form.render('checkbox');
            });
            //本页全选
            form.on('checkbox(checkboxCurrent)', function(data){
                if(data.elem.checked){
                    $("#checkboxAll").prop("checked",false);
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = true;
                    });
                }else{
                    var child = $("input[name='layTableCheckbox']");
                    child.each(function (index, item) {
                        item.checked = false;
                    });
                }
                form.render('checkbox');
            });
            function openMsg() {
                subtips = layer.tips('提示信息', '#hint', {
                    tips: [1, '#ff6700'],
                    time: 30000
                });
            }

            //点击查询按钮，重载表格
            $('#searchBtn').on('click', function() {
                loaderTable();
            });


        });
        
    </script>

</body>

</html>
