		<script type="text/javascript">
			$(document).keypress(function(e) {
				// 回车键事件
				if (e.which == 13) {
					$('input[type="button"]').click();
				}
			});

			var open = 0;


			/* 全屏 */
			var fullscreen = function() {
				elem = document.body;
				if (elem.webkitRequestFullScreen) {
					elem.webkitRequestFullScreen();
				} else if (elem.mozRequestFullScreen) {
					elem.mozRequestFullScreen();
				} else if (elem.requestFullScreen) {
					elem.requestFullscreen();
				} else {
					// 浏览器不支持全屏API或已被禁用
				}
			}


			layui.use(['form', 'layer', 'jquery'], function() {
				let layer = layui.layer;

				/* 验证码初始化 */
				var a = $('#mpanel').pointsVerify({
					defaultNum : 4,	//默认的文字数量
					checkNum   : 3,	//校对的文字数量
					vSpace     : 5,	//间隔
					imgUrl	   : 'login_files/images/',
					// imgName    : ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg'],
					imgName    : ['8.jfif', '9.jfif', '10.jpg', '11.webp'],
					imgSize    : {
						width  : '400px',
						height : '250px',
					},
					barSize    : {
						width  : '400px',
						height : '40px',
					},
					ready 	   : function() {
					},
					success    : function() {
						$("#mpanel").hide();

						var formData = {
							username : $('#user_name').val(),
							password : $('#password').val()
						}
						let index = layer.msg('<span style="color: #666666;">&nbsp;正在登录&nbsp;···</span>',
								{ icon: 16, shade: 0.3, time:0 });
						$.ajax({
							type 		: "POST",
							contentType : "application/json",
							// url 		: huayi_url + "passport/login",
							url 		: huayi_permission_url + "login",
							data 		: JSON.stringify({
									// username: formData.username,
									// password: formData.password
									userName : formData.username,
									userPwd	 : formData.password
							}),
							success 	: function(data, textStatus, xhr) {
								let datas = data.data;
								if (data.status == 200) {
									localStorage.clear();
									localStorage.setItem('token', xhr.getResponseHeader("Authorization"));
									localStorage.setItem('token-exp-time', xhr.getResponseHeader("token-exp-time"));
									localStorage.setItem('refresh-token', xhr.getResponseHeader("refresh-token"));
									localStorage.setItem('user-id', xhr.getResponseHeader("KJPT-USER-ID"));
									localStorage.setItem('unit-id', datas.unitId);
									localStorage.setItem('unit-name', datas.unitName);
									localStorage.setItem('standardkind-id', datas.standardKindId);
									localStorage.setItem('user-name', $('#user_name').val());
									localStorage.setItem('user-type', datas.userType);
									localStorage.removeItem('menu-unit-id');
									window.location.href = "index.html";
								} else {
									layer.alert("<sapn style='color: #000;'>" + data.msg + "</span>");
										$('.verify-refresh').click();
								}
								layer.close(index);
							},
							error 		: function(XMLHttpRequest, textStatus, errorThrown) {
								layer.alert("<sapn style='color: #666666;'>登录失败</span>");
								$('.verify-refresh').click();
								layer.close(index);
							}
						});
					},
					error      : function() {
						// alert('验证失败！');
					}
				});


				/* 登录 */
				$("#login_btn").on("click", function () {
					var formData = {
						username : $("#user_name").val(),
						password : $("#password").val()
					}
					if (!(formData.username && formData.password)) {
						layer.alert("<sapn style='color: #666666;'>请将用户名，密码填写完整</sapn>");
						return false;
					}

					// 验证码校验
					$("#mpanel").show();
				});

			});
		</script>
		<script type="text/javascript" src="./login_files/ThreeWebGL.js"></script>
		<script type="text/javascript" src="./login_files/ThreeExtras.js"></script>
		<script type="text/javascript" src="./login_files/Detector.js"></script>
		<script id="vs" type="x-shader/x-vertex">
			varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }
		</script>
		<script id="fs" type="x-shader/x-fragment">
			uniform sampler2D map; uniform vec3 fogColor; uniform float fogNear; uniform float fogFar; varying vec2 vUv; void main() { float depth = gl_FragCoord.z / gl_FragCoord.w; float fogFactor = smoothstep( fogNear, fogFar, depth ); gl_FragColor = texture2D( map, vUv ); gl_FragColor.w *= pow( gl_FragCoord.z, 20.0 ); gl_FragColor = mix( gl_FragColor, vec4( fogColor, gl_FragColor.w ), fogFactor ); }
		</script>
		<script type="text/javascript">
			if(!Detector.webgl) Detector.addGetWebGLMessage();
			var canvas = document.createElement('canvas');
			canvas.width = 32;
			canvas.height = window.innerHeight;
			var context = canvas.getContext('2d');
			var gradient = context.createLinearGradient(0, 0, 0, canvas.height);
			gradient.addColorStop(0, "#1e4877");
			gradient.addColorStop(0.5, "#4584b4");
			context.fillStyle = gradient;
			context.fillRect(0, 0, canvas.width, canvas.height);
			document.body.style.background = 'url(' + canvas.toDataURL('image/png') + ')';
			var container;
			var camera, scene, renderer, sky, mesh, geometry, material, i, h, color, colors = [],
				sprite, size, x, y, z;
			var mouseX = 0,
				mouseY = 0;
			var start_time = new Date().getTime();
			var windowHalfX = window.innerWidth / 2;
			var windowHalfY = window.innerHeight / 2;
			init();
			animate();

			function init() {
				container = document.createElement('div');
				document.body.appendChild(container);
				camera = new THREE.Camera(30, window.innerWidth / window.innerHeight, 1, 3000);
				camera.position.z = 6000;
				scene = new THREE.Scene();
				geometry = new THREE.Geometry();
				var texture = THREE.ImageUtils.loadTexture("./login_files/yun.png");
				texture.magFilter = THREE.LinearMipMapLinearFilter;
				texture.minFilter = THREE.LinearMipMapLinearFilter;
				var fog = new THREE.Fog(0x4584b4, -100, 3000);
				material = new THREE.MeshShaderMaterial({
					uniforms: {
						"map": {
							type: "t",
							value: 2,
							texture: texture
						},
						"fogColor": {
							type: "c",
							value: fog.color
						},
						"fogNear": {
							type: "f",
							value: fog.near
						},
						"fogFar": {
							type: "f",
							value: fog.far
						},
					},
					vertexShader: document.getElementById('vs').textContent,
					fragmentShader: document.getElementById('fs').textContent,
					depthTest: false
				});
				var plane = new THREE.Mesh(new THREE.Plane(64, 64));
				for(i = 0; i < 8000; i++) {
					plane.position.x = Math.random() * 1000 - 500;
					plane.position.y = -Math.random() * Math.random() * 200 - 15;
					plane.position.z = i;
					plane.rotation.z = Math.random() * Math.PI;
					plane.scale.x = plane.scale.y = Math.random() * Math.random() * 1.5 + 0.5;
					GeometryUtils.merge(geometry, plane)
				}
				mesh = new THREE.Mesh(geometry, material);
				scene.addObject(mesh);
				mesh = new THREE.Mesh(geometry, material);
				mesh.position.z = -8000;
				scene.addObject(mesh);
				renderer = new THREE.WebGLRenderer({
					antialias: false
				});
				renderer.setSize(window.innerWidth, window.innerHeight);
				container.appendChild(renderer.domElement);
				document.addEventListener('mousemove', onDocumentMouseMove, false);
				window.addEventListener('resize', onWindowResize, false)
			}

			function onDocumentMouseMove(event) {
				mouseX = (event.clientX - windowHalfX) * 0.25;
				mouseY = (event.clientY - windowHalfY) * 0.15
			}

			function onWindowResize(event) {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight)
			}

			function animate() {
				requestAnimationFrame(animate);
				render()
			}

			function render() {
				position = ((new Date().getTime() - start_time) * 0.03) % 8000;
				camera.position.x += (mouseX - camera.target.position.x) * 0.001;
				camera.position.y += (-mouseY - camera.target.position.y) * 0.001;
				camera.position.z = -position + 8000;
				camera.target.position.x = camera.position.x;
				camera.target.position.y = camera.position.y;
				camera.target.position.z = camera.position.z - 1000;
				renderer.render(scene, camera)
			}


		</script>

		<div><canvas width="1920" height="881"></canvas></div>
